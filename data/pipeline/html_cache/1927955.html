oes not independently manage external communications, except when acting on behalf of a sales team member within clearly defined authority and templates. The position is functionally directed by the supported sales staff, with formal reporting into Finance.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Review inbound emails for the supported sales staff and action items that are clear and routine within agreed authority\u003c/p\u003e\u003cp\u003e• Prepare draft skeleton responses for emails where the likely response path is known but requires salesperson review\u003c/p\u003e\u003cp\u003e• Add useful context, notes, and preparation material to next-day calendar entries, including customer background, open items, prior commitments, and internal dependencies\u003c/p\u003e\u003cp\u003e• Liaise directly with internal staff to resolve straightforward questions, chase actions, clarify ownership, and help close out disputes or blockers\u003c/p\u003e\u003cp\u003e• Maintain and improve CRM quality through timely note entry, activity logging, follow-up capture, record updates, and proactive identification of missing information\u003c/p\u003e\u003cp\u003e• Help identify overdue actions, stalled items, and follow-up gaps across the supported sales roles\u003c/p\u003e\u003cp\u003e• Maintain working guidelines for what can be actioned directly, what should be drafted, and what must be escalated\u003c/p\u003e\u003cp\u003e• Provide administrative support for quotes, orders, internal approvals, meeting preparation, and sales follow-up workflows where required\u003c/p\u003e\u003cp\u003e• Escalate recurring issues, process bottlenecks, and cross-functional friction points through the Finance reporting line\u003c/p\u003e\u003cp\u003e• Operate as a shared service resource taking ownership over prioritization and multitasking on a needs-basis\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDaily Task\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Manage three inboxes for sales staff, aiming for a zero inbox outcome\u003c/p\u003e\u003cp\u003e• Maintain end-of-day pending task lists for salespeople\u003c/p\u003e\u003cp\u003e• Review bills in Xero (totals, tax, classification)\u003c/p\u003e\u003cp\u003e• Enter orders (high-volume, multi-line)\u003c/p\u003e\u003cp\u003e• Take ownership of internal inter-departmental issues as primary facilitator\u003c/p\u003e\u003cp\u003e• Translate meeting outcomes from sales staff into CRM\u003c/p\u003e\u003cp\u003e• Calendar next steps (follow-ups, calls/emails, end-of-day reports as appropriate)\u003c/p\u003e\u003cp\u003e• Book travel for the sales team and handle general admin tasks\u003c/p\u003e\u003cp\u003e• Add context to next-day fresh leads in CRM/email\u003c/p\u003e\u003cp\u003e• Provide proactive support to sales staff based on needs\u003c/p\u003e\u003cp\u003e• Expand support scope across more sales staff (Australia or Vietnam)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBoundaries / scope\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Internal support role only\u003c/p\u003e\u003cp\u003e• No independent ownership of customer relationships\u003c/p\u003e\u003cp\u003e• No unsupervised external communication unless explicitly delegated within agreed rules\u003c/p\u003e\u003cp\u003e• No commercial decision-making authority unless documented\u003c/p\u003e\u003cp\u003e• Works under service expectations and guardrails defined by the supported sales team\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSuccess measures\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Reduction in admin time carried by sales staff\u003c/p\u003e\u003cp\u003e• Increased selling and follow-up time for the three supported roles\u003c/p\u003e\u003cp\u003e• Faster turnaround on routine internal actions\u003c/p\u003e\u003cp\u003e• Improved CRM completeness and data quality\u003c/p\u003e\u003cp\u003e• Better preparedness for scheduled meetings and follow-ups\u003c/p\u003e\u003cp\u003e• Fewer dropped actions and fewer unresolved internal blockers\u003c/p\u003e\u003cp\u003e• Positive service feedback from the supported sales staff\u003c/p\u003e\u003cp\u003eReporting line\u003c/p\u003e\u003cp\u003e• Functional direction and day-to-day prioritization: supported sales staff\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T1278,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJet Technologies is expanding in Vietnam and we’re looking for a Sales \u0026 Admin Support to join our growing team and support our regional operations across APAC.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThis is a high-responsibility role, not a basic admin position. You will act as the coordination backbone for the sales team, ensuring nothing is missed, delayed, or dropped.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eWe’re looking for someone highly capable, detail-oriented, and proactive, who can work closely with our international sales team and directly contribute to business growth.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRole purpose\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eSupport three sales roles by handling internal administrative and coordination tasks that reduce non-selling workload, improve responsiveness, and increase time available for customer follow-up and revenue-generating activity.\u003c/p\u003e\u003cp\u003eThe role acts as a shared service across the sales team, working within agreed guidelines to triage communications, prepare draft responses, maintain CRM quality, enrich upcoming calendar activity with relevant context, and coordinate with internal teams to resolve questions, actions, and disputes.\u003c/p\u003e\u003cp\u003eThe role is primarily internal-facing and does not indepe u003cp\u003e\u003cstrong\u003eDaily Task\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Manage three inboxes for sales staff, aiming for a zero inbox outcome\u003c/p\u003e\u003cp\u003e• Maintain end-of-day pending task lists for salespeople\u003c/p\u003e\u003cp\u003e• Review bills in Xero (totals, tax, classification)\u003c/p\u003e\u003cp\u003e• Enter orders (high-volume, multi-line)\u003c/p\u003e\u003cp\u003e• Take ownership of internal inter-departmental issues as primary facilitator\u003c/p\u003e\u003cp\u003e• Translate meeting outcomes from sales staff into CRM\u003c/p\u003e\u003cp\u003e• Calendar next steps (follow-ups, calls/emails, end-of-day reports as appropriate)\u003c/p\u003e\u003cp\u003e• Book travel for the sales team and handle general admin tasks\u003c/p\u003e\u003cp\u003e• Add context to next-day fresh leads in CRM/email\u003c/p\u003e\u003cp\u003e• Provide proactive support to sales staff based on needs\u003c/p\u003e\u003cp\u003e• Expand support scope across more sales staff (Australia or Vietnam)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBoundaries / scope\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Internal support role only\u003c/p\u003e\u003cp\u003e• No independent ownership of customer relationships\u003c/p\u003e\u003cp\u003e• No unsupervised external communication unless explicitly delegated within agreed rules\u003c/p\u003e\u003cp\u003e• No commercial decision-making authority unless documented\u003c/p\u003e\u003cp\u003e• Works under service expectations and guardrails defined by the supported sales team\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSuccess measures\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Reduction in admin time carried by sales staff\u003c/p\u003e\u003cp\u003e• Increased selling and follow-up time for the three supported roles\u003c/p\u003e\u003cp\u003e• Faster turnaround on routine internal actions\u003c/p\u003e\u003cp\u003e• Improved CRM completeness and data quality\u003c/p\u003e\u003cp\u003e• Better preparedness for scheduled meetings and follow-ups\u003c/p\u003e\u003cp\u003e• Fewer dropped actions and fewer unresolved internal blockers\u003c/p\u003e\u003cp\u003e• Positive service feedback from the supported sales staff\u003c/p\u003e\u003cp\u003eReporting line\u003c/p\u003e\u003cp\u003e• Functional direction and day-to-day prioritization: supported sales staff\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:{\"skillName\":\"Administration Support\",\"skillId\":156209,\"skillWeight\":100,\"isExisted\":false}\n29:{\"skillName\":\"CRM\",\"skillId\":4660,\"skillWeight\":100,\"isExisted\":false}\n2a:{\"skillName\":\"English\",\"skillId\":100,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Sales Support\",\"skillId\":3033,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Schedule Planning\",\"skillId\":85009,\"skillWeight\":100,\"isExisted\":false}\n27:[\"$28\",\"$29\",\"$2a\",\"$2b\",\"$2c\"]\n2e:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"Competitive salary, 13th month salary with annual bonuses based on job performance.\"}\n2f:{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"Full health and social insurance coverage in compliance with Vietnamese law.\u003cbr/\u003eSupport for health insurance coverage to ensure employees' well-being.\"}\n30:{\"benefitId\":3,\"benefitIconName\":\"fa-file-image-o\",\"benefitName\":\"Paid Leave\",\"benefitNameVI\":\"Nghỉ phép có lương\",\"benefitValue\":\"12 days per year annual paid leave and public holidays according to Vietnamese labor laws.\"}\n31:{\"benefitId\":4,\"benefitIconName\":\"fa-graduation-cap\",\"benefitName\":\"Training\",\"benefitNameVI\":\"Đào tạo\",\"benefitValue\":\"Offering various training programs both domestically and internation
