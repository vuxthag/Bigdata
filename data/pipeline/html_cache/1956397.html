unks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tae0,"])</script><script>self.__next_f.push([1,"Vững nền tảng – Vững niềm tin – Vững bước tương lai\r\nTại Công ty Cổ phần Thiết bị Mỹ Kim, chúng tôi không chỉ thi công công trình – chúng tôi kiến tạo những giá trị bền vững cho cộng đồng và đất nước. Là đơn vị tiên phong trong lĩnh vực xây lắp – lắp đặt thiết bị kỹ thuật cho các dự án vốn ngân sách nhà nước, Mỹ Kim đã và đang trở thành đối tác chiến lược đáng tin cậy của nhiều chủ đầu tư, tổng thầu lớn trong cả nước.\r\nLĩnh vực hoạt động chuyên sâu\r\nMỹ Kim tự hào sở hữu năng lực thi công đồng bộ, tổng thể và đa ngành, với các mũi nhọn bao gồm:\r\n•\tCung cấp, lắp đặt thang máy, thang cuốn hiện đại cho công trình công cộng và hạ tầng đô thị.\r\n•\tThiết kế và triển khai hệ thống cầu hành khách (Passenger Boarding Bridge) tại các cảng hàng không trọng điểm.\r\n•\tTổng thầu thi công hệ thống cơ điện (M\u0026E) với giải pháp toàn diện, tối ưu vận hành cho công trình dân dụng và công nghiệp.\r\n•\tLắp đặt các thiết bị viễn thông, radar, hệ thống điều hành và quản lý bay, thiết bị tìm kiếm – cứu nạn biển, đảm bảo an ninh – an toàn quốc gia.\r\nGiá trị khác biệt tạo nên thương hiệu Mỹ Kim\r\n✅ Uy tín được xây dựng từ thực tế công trình\r\nChúng tôi không hứa suông. Chúng tôi chứng minh năng lực bằng tiến độ thực tế, chất lượng thi công và sự hài lòng của khách hàng qua từng dự án.\r\n✅ Nhân sự tinh nhuệ – Kỹ thuật tinh thông\r\nĐội ngũ kỹ sư, chuyên gia của Mỹ Kim luôn sẵn sàng nhận nhiệm vụ trong những môi trường thi công phức tạp, yêu cầu kỹ thuật cao và khối lượng lớn.\r\n✅ Cam kết “3 Đúng”: Đúng tiến độ – Đúng tiêu chuẩn – Đúng cam kết\r\nMỗi công trình là một lời hứa danh dự. Chúng tôi thi công không chỉ bằng kỹ thuật mà bằng cả uy tín nghề nghiệp.\r\nTầm nhìn \u0026 Sứ mệnh\r\nVới khát vọng vươn xa, Mỹ Kim hướng tới trở thành doanh nghiệp hàng đầu trong lĩnh vực thi công thiết bị công nghệ cao, góp phần hiện đại hóa hạ tầng quốc gia.\r\nSứ mệnh của chúng tôi là: Mang đến giải pháp thi công tối ưu – Bảo chứng chất lượng – Đồng hành phát triển cùng chủ đầu tư.\r\n________________________________________\r\n“Mỹ Kim – Nơi công nghệ gặp gỡ chuẩn mực thi công”\r\n“Mỗi dự án – Một viên ngọc sáng của niềm tin”"])</script><script>self.__next_f.push([1,"24:T804,"])</script><script>self.__next_f.push([1,"\u003cp\u003e-\tQuản lý và giám sát quản trị chung toàn bộ công tác tài chính, kế toán của công ty, tổ chức thực hiện các nghiệp vụ kế toán và cập nhật, rà soát số liệu kế toán, chứng từ, hóa đơn, hợp đồng của công ty phù hợp với các quy định của pháp luật\u003c/p\u003e\u003cp\u003e-\tXây dựng và hoàn thiện hệ thống quy trình, quy chế, chức năng nhiệm vụ, định mức chi phí, sổ tay kế toán cho các phần hành kế toán của công ty phù hợp với chuẩn mực kế toán, luật thuế và quy định của công ty.\u003c/p\u003e\u003cp\u003e-\tLập kế hoạch ngân sách, dòng tiền các công trình, dự án và công ty theo định kỳ\u003c/p\u003e\u003cp\u003e-\tPhối hợp phòng thầu, phòng thanh quyết toán, tính toán giá vốn các hợp đồng, dự án khi tham gia đấu thầu\u003c/p\u003e\u003cp\u003e-\tLập kế hoạch doanh thu, chi phí, lợi nhuận từng dự án, công ty và quản trị doanh thu, chi phí, lợi nhuận của từng hợp đồng theo kế hoạch đã được phê duyệt\u003c/p\u003e\u003cp\u003e-\tCân đối doanh thu, chi phí, thuế đầu ra, đầu vào, đảm bảo tính hợp lý theo dự toán công trình, hoạt động công ty.\u003c/p\u003e\u003cp\u003e-\tLàm việc với các cơ quan chức năng có liên quan: thuế, ngân hàng, cơ quan nhà nước, cơ quan thanh tra kiểm tra …. khi có phát sinh\u003c/p\u003e\u003cp\u003e-\tTổ chức thực hiện lưu trữ, bảo quản hồ sơ, chứng từ, tài liệu phòng kế toán theo quy định của Công ty và yêu cầu pháp luật hiện hành.\u003c/p\u003e\u003cp\u003e-\tChịu trách nhiệm lập báo cáo tài chính, báo cáo thuế, báo cáo quản trị định kỳ tháng/quý/năm và hồ sơ vay vốn ngân hàng khi có yêu cầu\u003c/p\u003e\u003cp\u003e-\tTham mưu cho Ban lãnh đạo về việc sử dụng,quản lý hiệu quả nguồn vốn và các hoạt động kiểm soát chi phí, phát triển doanh thu….\u003c/p\u003e\u003cp\u003e-\tCác công việc phát sinh theo yêu cầu của Tổng Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T719,\u003cp\u003e-\tNữ. Độ tuổi từ 30 – 40 tuổi;\u003c/p\u003e\u003cp\u003e-\tTốt nghiệp Đại học trở lên các chuyên ngành: Kế toán, Tài chính, Kiểm toán;\u003c/p\u003e\u003cp\u003e-\tTối thiểu 02 năm kinh nghiệm ở vị trí tương đương (Trưởng phòng Tài chính – Kế toán, Kế toán trưởng, Giám đốc Tài chính). Có chứng chỉ Kế toán trưởng;\u003c/p\u003e\u003cp\u003e-\tƯu tiên ứng viên từng làm tại doanh nghiệp triển khai dự án (xây dựng, nội thất, thiết bị…). Kiến thức chuyên sâu về kế toán, tài chính, thuế và hệ thống kiểm soát nội bộ;\u003c/p\u003e\u003cp\u003e-\tKỹ năng lãnh đạo, lập kế hoạch, phân tích và ra quyết định;\u003c/p\u003e\u003cp\u003e-\tThành thạo tin học văn phòng và phần mềm kế toán (MISA, Fast, Bravo, v.v.);\u003c/p\u003e\u003cp\u003e-\tKhả năng giao tiếp tốt, xử lý tình huống linh hoạt, chịu được áp lực cao;\u003c/p\u003e\u003cp\u003e-\tTư duy chiến lược, tinh thần trách nhiệm và chính trực.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThu nhập cạnh tranh: Lương tới 35 triệu/tháng, thưởng theo dự án \u0026 kết quả công việc.\u003c/p\u003e\u003cp\u003e-\tThưởng các dịp lễ, Tết (30/4, 1/5, 2/9, Tết Âm lịch…), thưởng nóng theo thành tích.\u003c/p\u003e\u003cp\u003e-\tChính sách phúc lợi: sinh nhật, 8/3, 20/10, Trung thu, 1/6 cho con em…\u003c/p\u003e\u003cp\u003e-\tĐược nâng lương định kỳ hằng năm, Cơ hội phát triển nghề nghiệp và thăng tiến lên các vị trí quản lý cấp cao hơn.\u003c/p\u003e\u003cp\u003e-\tDu xuân, nghỉ mát, các hoạt động nội bộ gắn kết tập thể.\u003c/p\u003e\u003cp\u003e-\tĐầy đủ chế độ BHXH, BHYT, nghỉ phép và quyền lợi khác theo quy định pháp luật.\u003c/p\u003e\u003cp\u003e-\tThời gian làm việc: Thứ 2 – Thứ 6, và Thứ 7 cách tuần (08h00 – 17h30).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e26:Tae0,"])</script><script>self.__next_f.push([1,"Vững nền tảng – Vững niềm tin – Vững bước tương lai\r\nTại Công ty Cổ phần Thiết bị Mỹ Kim, chúng tôi không chỉ thi công công trình – chúng tôi kiến tạo những giá trị bền vững cho cộng đồng và đất nước. Là đơn vị tiên phong trong lĩnh vực xây lắp – lắp đặt thiết bị kỹ thuật cho các dự án vốn ngân sách nhà nước, Mỹ Kim đã và đang trở thành đối tác chiến lược đáng tin cậy của nhiều chủ đầu tư, tổng thầu lớn trong cả nước.\r\nLĩnh vực hoạt động chuyên sâu\r\nMỹ Kim tự hào sở hữu năng lực thi công đồng bộ, tổng thể và đa ngành, với các mũi nhọn bao gồm:\r\n•\tCung cấp, lắp đặt thang máy, thang cuốn hiện đại cho công trình công cộng và hạ tầng đô thị.\r\n•\tThiết kế và triển khai hệ thống cầu hành khách (Passenger Boarding Bridge) tại các cảng hàng không trọng điểm.\r\n•\tTổng thầu thi công hệ thống cơ điện (M\u0026E) với giải pháp toàn diện, tối ưu vận hành cho công trình dân dụng và công nghiệp.\r\n•\tLắp đặt các thiết bị viễn thông, radar, hệ thống điều hành và quản lý bay, thiết bị tìm kiếm – cứu nạn biển, đảm bảo an ninh – an toàn quốc gia.\r\nGiá trị khác biệt tạo nên thương hiệu Mỹ Kim\r\n✅ Uy tín được xây dựng từ thực tế công trình\r\nChúng tôi không hứa suông. Chúng tôi chứng minh năng lực bằng tiến độ thực tế, chất lượng thi công và sự hài lòng của khách hàng qua từng dự án.\r\n✅ Nhân sự tinh nhuệ – Kỹ thuật tinh thông\r\nĐội ngũ kỹ sư, chuyên gia của Mỹ Kim luôn sẵn sàng nhận nhiệm vụ trong những môi trường thi công phức tạp, yêu cầu kỹ thuật cao và khối lượng lớn.\r\n✅ Cam kết “3 Đúng”: Đúng tiến độ – Đúng tiêu chuẩn – Đúng cam kết\r\nMỗi công trình là một lời hứa danh dự. Chúng tôi thi công không chỉ bằng kỹ thuật mà bằng cả uy tín nghề nghiệp.\r\nTầm nhìn \u0026 Sứ mệnh\r\nVới khát vọng vươn xa, Mỹ Kim hướng tới trở thành doanh nghiệp hàng đầu trong lĩnh vực thi công thiết bị công nghệ cao, góp phần hiện đại hóa hạ tầng quốc gia.\r\nSứ mệnh của chúng tôi là: Mang đến giải pháp thi công tối ưu – Bảo chứng chất lượng – Đồng hành phát triển cùng chủ đầu tư.\r\n________________________________________\r\n“Mỹ Kim – Nơi công nghệ gặp gỡ chuẩn mực thi công”\r\n“Mỗi dự án – Một viên ngọc sáng của niềm tin”"])</script><script>self.__next_f.push([1,"29:Tae0,"])</script><script>self.__next_f.push([1,"Vững nền tảng – Vững niềm tin – Vững bước tương lai\r\nTại Công ty Cổ phần Thiết bị Mỹ Kim, chúng tôi không chỉ thi công công trình – chúng tôi kiến tạo những giá trị bền vững cho cộng đồng và đất nước. Là đơn vị tiên phong trong lĩnh vực xây lắp – lắp đặt thiết bị kỹ thuật cho các dự án vốn ngân sách nhà nước, Mỹ Kim đã và đang trở thành đối tác chiến lược đáng tin cậy của nhiều chủ đầu tư, tổng thầu lớn trong cả nước.\r\nLĩnh vực hoạt động chuyên sâu\r\nMỹ Kim tự hào sở hữu năng lực thi công đồng bộ, tổng thể và đa ngành, với các mũi nhọn bao gồm:\r\n•\tCung cấp, lắp đặt thang máy, thang cuốn hiện đại cho công trình công cộng v
