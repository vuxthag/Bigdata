rofrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tdd6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJob Objective/ Mục Tiêu Công Việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eThe job objective is to ensure that export and import goods are according to plan and customer’s request about quantity, container standards, loading specifications, delivery time, and receipt time. Declaring import and export goods in accordance with Vietnam customs regulations. Receive information, exchange and convey information accurately and quickly between relevant parties. Work closely with Forwarder/ Customs Clearance/ Trucking for smooth operation, solving ad-hoc issue during and after order delivery.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eMục tiêu công việc là đảm bảo hàng hóa xuất khẩu và nhập khẩu đúng kế hoạch, đúng yêu cầu của khách hàng về số lượng, tiêu chuẩn container, quy cách xếp hàng, thời gian giao hàng, thời gian nhận hàng. Thực hiện việc khai báo hàng hóa xuất nhập khẩu theo đúng quy định của hải quan việt nam. Nhận thông tin, trao đổi, truyền đạt đúng và nhanh chóng thông tin giữa các bên liên quan. Phối hợp chặt chẽ giữa cắc đối tác giao nhận, khai hải quan, vận tải để vận hành trơn tru, giải quyết các vấn đề đặt biệt trong và sau khi giao hàng\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e/ \u003cstrong\u003eTrách Nhiệm Chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e1.\tBe responsible to work with third party logistics company to timely ensure documents and booking information for import/export of containers. \u003c/em\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm làm việc với công ty giao nhận bên thứ ba để đảm bảo kịp thời các tài liệu và thông tin đặt chỗ cho việc nhập/xuất khẩu container\u003c/p\u003e\u003cp\u003e\u003cem\u003e2.\tEnsure the ground-work for declarations, certificate of origin, and other documentation for audits, customs, finance department.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐảm bảo công việc chuẩn bị cho các bản kê khai, giấy chứng nhận xuất xứ và các tài liệu khác cho kiểm toán, hải quan, phòng tài chính.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e3.\tFollow and update shipping plans based on customer requests and the company's production plan.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTheo dõi và cập nhật kế hoạch xuất hàng dựa theo yêu cầu từ khách hàng và kế hoạch sản xuất của công ty\u003c/p\u003e\u003cp\u003e\u003cem\u003e4.\tNotify related departments, customers about shipping date and its document.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e Gửi chứng từ và thông báo với các bộ phận liên quan và khách hàng về ngày xuất hàng hóa .\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e5.\tReceive and resolve arising goods problems and customer feedback after customers receive the goods. \u003c/em\u003e\u003c/p\u003e\u003cp\u003eTiếp nhận và giải quyết các vẫn đề về hàng hóa phát sinh, phản ảnh của khách hàng sau khi khách hàng nhận hàng hóa\u003cem\u003e.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e6.\tIn addition to coordinating shipping, this position will also be in-charge of coordinating customer/logistics related inspections\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eNgoài việc phối hợp vận chuyển, vị trí này cũng sẽ phụ trách việc phối hợp các cuộc kiểm tra liên quan đến khách hàng/ giao nhận.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e7.\tHelp follow customer orders along the organization where required and ensuring the data is updated for the sales and relevant team members\u003c/em\u003e\u003c/p\u003e\u003cp\u003eGiúp theo dõi đơn hàng của khách hàng trong tổ chức nơi cần thiết và đảm bảo dữ liệu được cập nhật cho bộ phận bán hàng và các thành viên liên quan\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tb2e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQualifications\u003c/strong\u003e/ \u003cstrong\u003eBằng cấp tổi thiểu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tEducation: Bachelor's degree in Supply Chain Management, Business Administration, or a related field\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTrình độ học vấn: Tốt nghiệp đại học chuyên ngành Quản lý Chuỗi Cung Ứng, Quản trị Kinh doanh, hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e•\tExperience: Minimum of 2 years experience in logistic, or a similar role, preferably within a manufacturing environment.\u003c/p\u003e\u003cp\u003eKinh nghiệm: Tối thiểu 2 năm kinh nghiệm giao nhận hoặc vai trò tương tự, ưu tiên có kinh nghiệm trong môi trường sản xuất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tExcellent communication in English, written and spoken\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiao tiếp tiếng Anh xuất sắc, cả viết và nói\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tStrong understanding of supply chain and sale.\u003c/p\u003e\u003cp\u003eHiểu biết sâu sắc về chuỗi cung ứng và bán hàng\u003c/p\u003e\u003cp\u003e•\tAdvanced Microsoft Office Skill\u003c/p\u003e\u003cp\u003eKỹ năng sử dụng Microsoft Office nâng cao\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tExcellent communication, problem solving, analytical, management and leadership skills\u003c/em\u003e\u003c/p\u003e\u003cp\u003eKỹ năng giao tiếp, giải quyết vấn đề, phân tích, quản lý và lãnh đạo xuất sắc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBenefits / Quyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• \u003cem\u003eAttractive and negotiable salary based on experience and capability.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eMức lương thỏa thuận, cạnh tranh theo năng lực và kinh nghiệm.\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Company shuttle buses available from Ho Chi Minh City and Bien Hoa.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eCó xe đưa đón: 2 tuyến xe buýt từ TP. HCM và Biên Hòa.\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Full participation in Social, Health and Unemployment Insurance as regulated by law.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eĐược tham gia đầy đủ các chế độ BHXH, BHYT, BHTN theo quy định.\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Professional and friendly working environment with growth and advancement opportunities.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eMôi trường làm việc chuyên nghiệp, thân thiện, có cơ hội phát triển và thăng tiến.\u003c/p\u003e\u003cp\u003e\u003cem\u003e• 13th-month salary\u003c/em\u003e\u003c/p\u003e\u003cp\u003eLương Tháng 13\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Social insurance participation during probation period\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTham gia bảo hiểm xã hội trong thời gian thử việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e* Working hours:\u003c/em\u003e\u003c/strong\u003e\u003cem\u003e Monday to Saturday (Saturday is Work from Home).\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThời gian làm việc: Thứ 2 đến Thứ 7 (Thứ 7 làm việc tại nhà).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e* Working Location:\u003c/e  and booking information for import/export of containers. \u003c/em\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm làm việc với công ty giao nhận bên thứ ba để đảm bảo kịp thời các tài liệu và thông tin đặt chỗ cho việc nhập/xuất khẩu container\u003c/p\u003e\u003cp\u003e\u003cem\u003e2.\tEnsure the ground-work for declarations, certificate of origin, and other documentation for audits, customs, finance department.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐảm bảo công việc chuẩn bị cho các bản kê khai, giấy chứng nhận xuất xứ và các tài liệu khác cho kiểm toán, hải quan, phòng tài chính.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e3.\tFollow and update shipping plans based on customer requests and the company's production plan.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTheo dõi và cập nhật kế hoạch xuất hàng dựa theo yêu cầu từ khách hàng và kế hoạch sản xuất của công ty\u003c/p\u003e\u003cp\u003e\u003cem\u003e4.\tNotify related departments, customers about shipping date and its document.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e Gửi chứng từ và thông báo với các bộ phận liên quan và khách hàng về ngày xuất hàng hóa .\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e5.\tReceive and resolve arising goods problems and customer feedback after customers receive the goods. \u003c/em\u003e\u003c/p\u003e\u003cp\u003eTiếp nhận và giải quyết các vẫn đề về hàng hóa phát sinh, phản ảnh của khách hàng sau khi khách hàng nhận hàng hóa\u003cem\u003e.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e6.\tIn addition to coordinating shipping, this position will also be in-charge of coordinating customer/logistics related inspections\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eNgoài việc phối hợp vận chuyển, vị trí này cũng sẽ phụ trách việc phối hợp các cuộc kiểm tra liên quan đến khách hàng/ giao nhận.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e7.\tHelp follow customer orders along the organization where requ
