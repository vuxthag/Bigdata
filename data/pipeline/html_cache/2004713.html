lf.__next_f.push([1,"\u003cp\u003eBạn đã học ngành khoa học  như Hóa học; Sinh học – Công nghệ Sinh học; Khoa học Vật Liệu nhưng có khả năng ứng dụng kiến thức của mình trong lĩnh vực Kinh doanh – Phát triển Sản phẩm?\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBạn yêu thích giao tiếp và chia sẻ kiến thức để tối ưu hóa quy trình kiểm nghiệm; nghiên cứu cùng khách hàng? \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHãy gia nhập đội ngũ của chúng tôi!\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVề chúng tôi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCông ty TNHH Thiết bị Khoa học Lan Oanh (O.S.I Co., Ltd.) là nhà cung cấp kinh nghiệm và uy tín  các thiết bị, hóa chất khoa học chất lượng cao cho các phòng kiểm tra chất lượng sản phẩm của ngành Dược phẩm; Công nghiệp Thực phẩm; Khoa học Vật liệu; các phòng thí nghiệm, viện nghiên cứu, trường đại học chuyên ngành Hóa. Sinh học; Công nghệ Sinh học trên toàn quốc từ năm 1996. Chúng tôi cùng các đối tác nước ngoài của công ty chúng tôi tự hào mang đến cho khách hàng những giải pháp tiên tiến, hiệu quả, đáp ứng mọi nhu cầu nghiên cứu và phát triển.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCơ hội phát triển sự nghiệp:\u003c/strong\u003e Làm việc trong môi trường chuyên nghiệp, năng động, được đào tạo và phát triển kỹ năng chuyên môn, kỹ năng bán hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThu nhập:\u003c/strong\u003e Mức lương cạnh tranh, quy chế thưởng công bằng và minh bạch, phúc lợi tốt.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tSản phẩm chất lượng:\u003c/strong\u003e Kinh doanh các sản phẩm thiết bị, hóa chất khoa học hàng đầu thế giới.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐội ngũ chuyên nghiệp:\u003c/strong\u003e Làm việc cùng những đồng nghiệp tài năng, nhiệt huyết, giàu kinh nghiệm.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐóng góp cho khoa học – cho xã hội:\u003c/strong\u003e Góp phần vào sự phát triển của khoa học và công nghệ Việt Nam.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMô tả công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTiếp cận và xây dựng mối quan hệ với khách hàng tiềm năng là các phòng thí nghiệm, viện nghiên cứu, trường đại học.\u003c/p\u003e\u003cp\u003e•\tTư vấn, giới thiệu và bán các thiết bị, dụng cụ, hóa chất khoa học phù hợp với nhu cầu của khách hàng.\u003c/p\u003e\u003cp\u003e•\tThực hiện các buổi demo, đào tạo hướng dẫn sử dụng sản phẩm cho khách hàng.\u003c/p\u003e\u003cp\u003e•\tXây dựng và duy trì mối quan hệ tốt đẹp với khách hàng, đảm bảo sự hài lòng của khách hàng.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, cập nhật thông tin thị trường, đối thủ cạnh tranh.\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch kinh doanh, báo cáo kết quả công việc theo định kỳ.\u003c/p\u003e\u003cp\u003e•\tChăm sóc khách hàng sau bán hàng, giải quyết các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với bộ phận admin chuẩn bị và theo dõi hồ sơ chào thầu/ chào giá, hợp đồng mua bán.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với bộ phận kỹ thuật  để đảm bảo quá trình giao hàng, lắp đặt, hướng dẫn vận hành và bảo trì.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e** Phỏng vấn trước Tết, đi làm sau Tết\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T9b9,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYêu cầu công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp đại học chuyên ngành Hóa Chất Sinh Học, Sinh học phân tử\u003c/p\u003e\u003cp\u003e hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên đã có kinh nghiệm trong lĩnh vực kinh doanh thiết bị, hóa chất khoa học.\u003c/p\u003e\u003cp\u003e•\tKiến thức chuyên môn vững vàng về các thiết bị, hóa chất khoa học.\u003c/p\u003e\u003cp\u003e•\tCó hiểu biết hoặc khả năng tiếp cận nhanh với các sản phẩm kỹ thuật trong lĩnh vực vi sinh, phân tích, kiểm nghiệm.\u003c/p\u003e\u003cp\u003e•\tKỹ năng bán hàng, giao tiếp, đàm phán, thuyết phục tốt.\u003c/p\u003e\u003cp\u003e•\tKhả năng làm việc độc lập, làm việc nhóm, chịu được áp lực công việc.\u003c/p\u003e\u003cp\u003e•\tNhiệt tình, năng động, có tinh thần trách nhiệm cao, sẵn sàng đi công tác khi cần.\u003c/p\u003e\u003cp\u003e•\tBản thân có tính kỷ luật và trung thực. \u003c/p\u003e\u003cp\u003e•\tCó kỹ năng giao tiếp \u0026 đọc hiểu tài liệu tiếng Anh chuyên ngành là một điểm cộng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương: Thỏa thuận theo năng lực\u003c/p\u003e\u003cp\u003e•\tThưởng: Theo doanh số mục tiêu và quy định của công ty, hiệu quả công việc theo 02 kỳ/năm.\u003c/p\u003e\u003cp\u003e•\tPhụ cấp: Ăn trưa. SIM điện thoại công ty cung cấp. Chi phí hỗ trợ xăng xe hàng tháng. Khi đi công tác: công ty thanh toán chi phí theo khung quy định của công ty.\u003c/p\u003e\u003cp\u003e•\tBảo hiểm: BHXH, BHYT, BHTN theo quy định của pháp luật.\u003c/p\u003e\u003cp\u003e•\tNghỉ phép: Theo quy định của pháp luật.\u003c/p\u003e\u003cp\u003e•\tĐào tạo: Tham gia các khóa đào tạo nâng cao chuyên môn, kỹ năng trong và ngoài nước (theo đánh giá và năng lực và hiệu quả nhân viên đóng góp cho công ty)\u003c/p\u003e\u003cp\u003e•\tCơ hội thăng tiến: Lên các vị trí quản lý sản phẩm hay team-leader. \u003c/p\u003e\u003cp\u003e•\tNhân viên gắn bó lâu dài sẽ có những phúc lợi khác. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCách thức ứng tuyển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGửi CV (yêu cầu tiếng Việt) và thư ứng tuyển (tiếng Việt) đến địa chỉ email: \u003c/p\u003e\u003cp\u003e•\tHoặc nộp hồ sơ trực tiếp tại:  95/3 Lương Định Của, khu phố 3, phường An
