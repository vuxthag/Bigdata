6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T2044,"])</script><script>self.__next_f.push([1,"\u003cp\u003ePosition Organisational Learning \u0026 Development Coordinator\u003c/p\u003e\u003cp\u003eTeam People and Culture\u003c/p\u003e\u003cp\u003eStatus Full time and flexible hours as work arises\u003c/p\u003e\u003cp\u003eLocation Hanoi\u003c/p\u003e\u003cp\u003eLast updated January 2026\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Purpose\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTo enable Blue Dragon’s people to learn, grow, and thrive by nurturing meaningful learning and development whilst building the systems that support them to do their best work for children and communities.\u003c/p\u003e\u003cp\u003eJob Context Blue Dragon Children’s Foundation is on a mission to end human trafficking. We believe that every child deserves exceptional care and a chance to thrive. Blue Dragon kids are street kids, children with disabilities, and young people who have been trafficked. After rescuing children from danger and slavery, we reunite them with their family and provide all the services needed for recovery and growth while advocating for improvements to policy and law.\u003c/p\u003e\u003cp\u003eThe People and Culture department finds the best talents, cares for them, develops them and supports them to achieve Blue Dragon’s mission. The department is responsible for human resource functions, learning and development, and for nurturing and developing Blue Dragon’s culture and leadership throughout the organisation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBlue Dragon is a child-safe organisation, committed to the protection and exceptional care of children. We require all staff and volunteers to agree to and abide by our Child Protection Code of Conduct. We offer equal employment opportunities to all qualified persons without discrimination or harassment. We will make any necessary job accommodation for persons with disabilities or special needs.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Objectives\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Uphold and actively promote Blue Dragon’s mission, values, and child-safe principles through all learning and development activities, onboarding processes, and people-related initiatives.\u003c/p\u003e\u003cp\u003e• Provide high-quality learning and development services that support staff effectiveness, engagement, and professional growth across the organisation.\u003c/p\u003e\u003cp\u003e• Support the consistent implementation of Blue Dragon’s Human Resources Manual, People \u0026 Culture policies, and related guidelines by integrating policy awareness and compliance into onboarding and training programs.\u003c/p\u003e\u003cp\u003e• Support leaders and teams to strengthen a positive, values-based organisational culture by embedding learning, development, and continuous improvement practices into daily work.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMain Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Organisational Learning \u0026 Development Coordinator supports the People \u0026 Culture Director and P\u0026C team in delivering effective learning and development and onboarding services, while providing operational and coordination support for learning systems and initiatives aligned with Blue Dragon’s mission, culture, and people priorities.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Onboarding \u0026 Orientation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Design, coordinate, and deliver effective onboarding and orientation programs for new employees, ensuring alignment with Blue Dragon’s mission, values, policies, and operational context.\u003c/p\u003e\u003cp\u003e• Plan and manage onboarding schedules, materials, facilitators, and logistics to ensure a consistent and positive experience for all new hires.\u003c/p\u003e\u003cp\u003e• Evaluate onboarding effectiveness through structured feedback, participation tracking, and early performance indicators, and continuously improve programs based on findings.\u003c/p\u003e\u003cp\u003e• Maintain and regularly update onboarding content, materials, and documentation to reflect organisational changes, policies, and best practices.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Learning \u0026 Development Delivery\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Coordinate with internal trainers, subject matter experts, and external training providers to design and deliver learning and development programs.\u003c/p\u003e\u003cp\u003e• Deliver internal training sessions and support the implementation of instructor-led, blended, and online learning activities.\u003c/p\u003e\u003cp\u003e• Support job-based capability development by aligning training programs with job roles, functional needs, and individual development requirements.\u003c/p\u003e\u003cp\u003e• Ensure training activities are delivered in a timely, effective, and learner-focused manner across the organisation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Learning Systems \u0026 Reporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Manage and maintain the Learning Management System (LMS) and training databases, ensuring accurate, complete, and up-to-date training records, while supporting the development, administration and continuous improvement of online and digital learning content and delivery.\u003c/p\u003e\u003cp\u003e• Maintain training documentation and ensure audit readiness and compliance with organisational standards, donor requirements, and safeguarding obligations.\u003c/p\u003e\u003cp\u003e• Prepare regular and ad-hoc learning and development reports, dashboards, and summaries for internal stakeholders, ensuring accuracy and timeliness.\u003c/p\u003e\u003cp\u003e• Monitor training participation, completion rates, and learning outcomes to support data-informed decision-making.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. Culture \u0026 Engagement\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Support the implementation of organisation-wide culture and engagement initiatives, including staff weeks, staff surveys, internal meetings, and people-focused events.\u003c/p\u003e\u003cp\u003e• Coordinate and maintain the Blue Dragon Leadership Library and other learning resources that support leadership and cultural development.\u003c/p\u003e\u003cp\u003e• Develop and support culture-related learning activities that reinforce Blue Dragon’s values and encourage values-based behaviours in daily work.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eE. Strategic \u0026 Policy Support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Support the implementation, documentation, and ongoing maintenance of organisation-wide learning and development strategies, ensuring alignment with Blue Dragon’s mission, culture, and people priorities.\u003c/p\u003e\u003cp\u003e• Support working out, developing, and gradually implementing learning and development–related frameworks and systems as the organisation continues to grow and mature.\u003c/p\u003e\u003cp\u003e• Support developing and the initial setup of Learning and Development Pathways by assisting with information gathering, documentation, coordination of learning content, and pilot implementation aligned with job roles and organisational priorities.\u003c/p\u003e\u003cp\u003e• Support working towards the development of an Organisational Competency Framework, including assisting with data collection, benchmarking, documentation, and translating agreed competencies into practical learning activities and training materials.\u003c/p\u003e\u003cp\u003e• Support early-stage succession planning, talent pool, and leadership development initiatives by assisting with administrative processes, learning coordination, tracking development activities, and maintaining relevant documentation as systems are being built.\u003c/p\u003e\u003cp\u003e• Support career development and internal mobility initiatives by coordinating learning activities and training records that align with emerging career paths and capability expectations as defined by the organisation.\u003c/p\u003e\u003cp\u003e• Support the progressive establishment and improvement of learning systems, including learning databases and, when applicable, the introduction or enhancement of a Learning Management System (LMS).\u003c/p\u003e\u003cp\u003e• Apply a technology and AI-aware mindset to learning and development by supporting the exploration, testing, and adoption of appropriate digital tools and AI-enabled solutions that improve learning delivery, tracking, reporting, and user experience.\u003c/p\u003e\u003cp\u003e• Stay informed about practical and scalable trends in learning and development, digital learning, and AI applications, and proactively suggest realistic, resource-appropriate improvements that can support the organisation’s current stage of development.\u003c/p\u003e\u003cp\u003e• Carry out other learning and development or People \u0026 Culture–related tasks as assigned by the People \u0026 Culture Director, in line with the role’s scope and organisational priorities.\u003c/p\u003e\u003cp\u003eSupport\u003c/p\u003e\u003cp\u003eThis position reports to the People \u0026 Culture Director, is supported by the People \u0026 Culture Director, People \u0026 Culture team, and works collaboratively with all staff across the organisation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Ta5b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKey selection criteria\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEssential Criteria\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Bachelor’s degree in Human Resources Management, Education, Economics, Law, or a related field, or equivalent practical experience in learning and development or human resources.\u003c/p\u003e\u003cp\u003e• At least 3 years of hands-on experience in a learning and development, training coordination, or human resources role, preferably in a complex, multi-program, or mission-driven organisation.\u003c/p\u003e\u003cp\u003e• Demonstrated experience in coordinating and facilitating onboarding, orientation, or internal training activities, with strong presentation, facilitation, and communication skills.\u003c/p\u003e\u003cp\u003e• Experience working with Learning Management Systems (LMS) or digital learning platforms, including maintaining training records, learning documentation, and reporting.\u003c/p\u003e\u003cp\u003e• Demonstrated hands-on experience in applying technology and AI-enabled tools to support learning and development activities, such as digital training delivery, learning administration, content support, data tracking, or process improvement.\u003c/p\u003e\u003cp\u003e• Ability to explain learning and training concepts to diverse audiences in a clear,structured, and practical manner.\u003c/p\u003e\u003cp\u003e• Strong organisational and administrative skills, with the ability to manage multiple tasks, maintain accurate records, and meet deadlines.\u003c/p\u003e\u003cp\u003e• Excellent interpersonal skills with a collaborative, service-oriented, and supportive working style.\u003c/p\u003e\u003cp\u003e• Strong English and Vietnamese language skills, both written and spoken.\u003c/p\u003e\u003cp\u003e• Willingness and ability to travel to program locations to support training delivery when required.\u003c/p\u003e\u003cp\u003e• Proficiency in Microsoft Office applications (Word, Excel, PowerPoint) for documentation, reporting, and training coordination.\u003c/p\u003e\u003cp\u003e• Demonstrated flexibility, adaptability, and willingness to learn and grow in a developing organisational environment.\u003c/p\u003e\u003cp\u003e• Strong alignment with Blue Dragon’s mission and values, with a genuine interest in working in an organisation supporting disadvantaged young people.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDesirable Criteria\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Experience working in a multidisciplinary or cross-functional team, supporting people, training, or organisational initiatives across different functions or locations.\u003c/p\u003e\u003cp\u003e• Working knowledge of design or content-support tools (e.g. Illustrator, Photoshop, or similar) to assist with the preparation of training or communication materials.\u003c/p\u003e\u003cp\u003e• Experience working in an INGO, NGO, or other mission-driven environment.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePlease submit your CV in English.\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T2044,"])</script><script>self.__next_f.push([1,"\u003cp\u003ePosition Organisational Learning \u0026 Development Coordinator\u003c/p\u003e\u003cp\u003eTeam People and Culture\u003c/p\u003e\u003cp\u003eStatus Full time and flexible hours as work arises\u003c/p\u003e\u003cp\u003eLocation Hanoi\u003c/p\u003e\u003cp\u003eLast updated January 2026\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Purpose\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTo enable Blue Dragon’s people to learn, grow, and thrive by nurturing meaningful learning and development whilst building the systems that support them to do their best work for children and communities.\u003c/p\u003e\u003cp\u003eJob Context Blue Dragon Children’s Foundation is on a mission to end human trafficking. We believe that every child deserves exceptional care and a chance to thrive. Blue Dragon kids are street kids, children with disabilities, and young people who have been trafficked. After rescuing children from danger and slavery, we reunite them with their family and provide all the services needed for recovery and growth while advocating for improvements to policy and law.\u003c/p\u003e\u003cp\u003eThe People and Culture department finds the best talents, cares for them, develops them and supports them to achieve Blue Dragon’s mission. The department is responsible for human resource functions, learning and development, and for nurturing and developing Blue Dragon’s culture and leadership throughout the organisation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBlue Dragon is a child-safe organisation, committed to the protection and exceptional care of children. We require all staff and volunteers to agree to and abide by our Child Protection Code of Conduct. We offer equal employment opportunities to all qualified persons without discrimination or harassment. We will make any necessary job accommodation for persons with disabilities or special needs.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Objectives\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Uphold and actively promote Blue Dragon’s mission, values, and child-safe principles through all learning and development activities, onboarding processes, and people-related initiatives.\u003c/p\u003e\u003cp\u003e• Provide high-quality learning and development services that support staff effectiveness, engagement, and professional growth across the organisation.\u003c/p\u003e\u003cp\u003e• Support the consistent implementation of Blue Dragon’s Human Resources Manual, People \u0026 Culture policies, and related guidelines by integrating policy awareness and compliance into onboarding and training programs.\u003c/p\u003e\u003cp\u003e• Support leaders and teams to strengthen a positive, values-based organisational culture by embedding learning, development, and continuous improvement practices into daily work.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMain Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Organisational Learning \u0026 Development Coordinator supports the People \u0026 Culture Director and P\u0026C team in delivering effective learning and development and onboarding services, while providing operational and coordination support for learning systems and initiatives aligned with Blue Dragon’s mission, culture, and people priorities.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Onboarding \u0026 Orientation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Design, coordinate, and deliver effective onboarding and orientation programs for new employees, ensuring alignment with Blue Dragon’s mission, values, policies, and operational context.\u003c/p\u003e\u003cp\u003e• Plan and manage onboarding schedules, materials, facilitators, and logistics to ensure a consistent and positive experience for all new hires.\u003c/p\u003e\u003cp\u003e• Evaluate onboarding effectiveness through structured feedback, participation tracking, and early performance indicators, and continuously improve programs based on findings.\u003c/p\u003e\u003cp\u003e• Maintain and regularly update onboarding content, materials, and documentation to reflect organisational changes, policies, and best practices.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Learning \u0026 Development Delivery\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Coordinate with internal trainers, subject matter experts, and external training providers to design and deliver learning and development programs.\u003c/p\u003e\u003cp\u003e• Deliver internal training sessions and support the implementation of instructor-led, blended, and online learning activities.\u003c/p\u003e\u003cp\u003e• Support job-based capability development by aligning training programs with job roles, functional needs, and individual development requirements.\u003c/p\u003e\u003cp\u003e• Ensure training activities are delivered in a timely, effective, and learner-focused manner across the organisation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Learning Systems \u0026 Reporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Manage and maintain the Learning Management System (LMS) and training databases, ensuring accurate, complete, and up-to-date training records, while supporting the development, administration and continuous improvement of online and digital learning content and delivery.\u003c/p\u003e\u003cp\u003e• Maintain training documentation and ensure audit readiness and compliance with organisational standards, donor requirements, and safeguarding obligations.\u003c/p\u003e\u003cp\u003e• Prepare regular and ad-hoc learning and development reports, dashboards, and summaries for internal stakeholders, ensuring accuracy and timeliness.\u003c/p\u003e\u003cp\u003e• Monitor training participation, completion rates, and learning outcomes to support data-informed decision-making.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. Culture \u0026 Engagement\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Support the implementation of organisation-wide culture and engagement initiatives, including staff weeks, staff surveys, internal meetings, and people-focused events.\u003c/p\u003e\u003cp\u003e• Coordinate and maintain the Blue Dragon Leadership Library and other learning resources that support leadership and cultural development.\u003c/p\u003e\u003cp\u003e• Develop and support culture-related learning activities that reinforce Blue Dragon’s values and encourage values-based behaviours in daily work.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eE. Strategic \u0026 Policy Support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Support the implementation, documentation, and ongoing maintenance of organisation-wide learning and development strategies, ensuring alignment with Blue Dragon’s mission, culture, and people priorities.\u003c/p\u003e\u003cp\u003e• Support working out, developing, and gradually implementing learning and development–related frameworks and systems as the organisation continues to grow and mature.\u003c/p\u003e\u003cp\u003e• Support developing and the initial setup of Learning and Development Pathways by assisting with information gathering, documentation, coordination of learning content, and pilot implementation aligned with job roles and organisational priorities.\u003c/p\u003e\u003cp\u003e• Support working towards the development of an Organisational Competency Framework, including assisting with data collection, benchmarking, documentation, and translating agreed competencies into practical learning activities and training materials.\u003c/p\u003e\u003cp\u003e• Support early-stage succession planning, talent pool, and leadership development initiatives by assisting with administrative processes, learning coordination, tracking development activities, and maintaining relevant documentation as systems are being built.\u003c/p\u003e\u003cp\u003e• Support career development and internal mobility initiatives by coordinating learning activities and training records that align with emerging career paths and capability expectations as defined by the organisation.\u003c/p\u003e\u003cp\u003e• Support the progressive establishment and improvement of learning systems, including learning databases and, when applicable, the introduction or enhancement of a Learning Management System (LMS).\u003c/p\u003e\u003cp\u003e• Apply a technology and AI-aware mindset to learning and development by supporting the exploration, testing, and adoption of appropriate digital tools and AI-enabled solutions that improve learning delivery, tracking, reporting, and user experience.\u003c/p\u003e\u003cp\u003e• Stay informed about practical and scalable trends in learning and development, digital learning, and AI applications, and proactively suggest realistic, resource-appropriate improvements that can support the organisation’s current stage of development.\u003c/p\u003e\u003cp\u003e• Carry out other learning and development or People \u0026 Culture–related tasks as assigned by the People \u0026 Culture Director, in line with the role’s scope and organisational priorities.\u003c/p\u003e\u003cp\u003eSupport\u003c/p\u003e\u003cp\u003eThis position reports to the People \u0026 Culture Director, is supported by the People \u0026 Culture Director, People \u0026 Culture team, and works collaboratively with all staff across the organisation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:Ta5b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKey selection criteria\u003
