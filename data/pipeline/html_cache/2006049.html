húng tôi đã cùng nhau gặt hái những thành quả ban đầu, dẫn dắt bởi đội ngũ tin tưởng, trong một môi trường cởi mở, nơi luôn đón nhận thách thức và không ngừng đổi mới. Hướng về một tương lai lớn mạnh hơn, A Plus cam kết tạo ra những giá trị đột phá trong thời đại chuyển đổi số và trí tuệ AI.\r\n\r\nVÀI THÔNG TIN VỀ APLUS\r\n\r\nVăn hóa:\r\nVăn hóa chính là nền tảng bền vững giúp chúng tôi phát triển và kết nối từng thành viên. Được toàn đội ngũ cùng nhau xây dựng và không ngừng hoàn thiện, văn hóa của chúng tôi đặt trọng tâm vào việc “sống” với những giá trị cốt lõi. Điển hình như giá trị “trách nhiệm”, nhìn mọi thứ từ mình; hành động với giá trị “Integrity” mỗi ngày; tinh thần “lắng nghe \u0026 chia sẻ” để thấu hiểu cùng nhau phát triển.\r\n\r\nChuyển đổi số: \r\nChúng tôi sử dụng hệ thống Platform Salesforce cho thị trường quốc tế và nền tảng quản trị doanh nghiệp toàn diện Base.vn. Bên cạnh đó A Plus đang từng bước đưa AI vào trong môi trường làm việc thực tiễn để giải quyết các vấn đề hiệu quả, tăng năng suất và chất lượng.\r\nA Plus đang sử dụng Okrs để quản trị mục tiêu một cách thống nhất, minh bạch, xuyên suốt từ trên xuống dưới và từ dưới lên trên.\r\n\r\nThị trường\r\nLà một công ty xuất khẩu B to B đến 14 quốc gia, chủ yếu ở châu Âu và Mỹ, dù doanh số còn khiêm tốn, chúng tôi luôn khao khát nâng cao trải nghiệm khách hàng. Bên cạnh các phương thức truyền thống, chúng tôi đang tập trung vào việc cải thiện dịch vụ thông qua các giải pháp số hóa (Digital) tiên tiến.\r\n\r\nVà…\r\n\r\nChúng tôi còn rất nhiều điểm cần cải thiện (forward) và chuyển hóa (transform), có thể kể đến như: Sự quyết liệt, sẵn sàng đẩy mình vào các thử thách khó khăn. Đội ngũ này tự mày mò học hỏi là nhiều, thiếu các nhân tài, chuyên gia bên ngoài.\r\n\r\nTHÔNG ĐIỆP TỪ A PLUS\r\n1. Là một doanh nghiệp xuất khẩu, cam kết không ngừng chuyển hóa chính mình, chúng tôi nhận thấy những cơ hội lớn từ những thay đổi nhanh chóng của công nghệ hiện nay.\r\n2. Hành trình của chúng tôi hiện nay là tái tạo chính mình – một tổ chức với 15 năm kinh nghiệm – qua việc đổi mới tư duy và khám phá liên tục (Version 2.0).\r\n3. Với tinh thần Teamwork, chúng tôi tin tưởng, chia sẻ và truyền cảm hứng cho nhau để xây dựng đội nhóm và phát triển con người.\r\n4. Để hiểu nhau hơn, chúng tôi sẽ dành cho bạn 1-2 tuần trải nghiệm thực tế tại công ty giúp bạn tiếp cận văn hóa và cách thức làm việc của tổ chức (vì chúng tôi trân trọng và hướng đến sự đồng hành lâu dài cùng bạn).\r\n5. Cùng với sự đồng hành, đội ngũ quản lý và lãnh đạo của chúng tôi sẵn sàng lắng nghe để gợi mở tiềm năng và truyền sức mạnh cho bạn.\r\n6. Chúng tôi luôn đánh giá cao đến tố chất và giá trị tốt đẹp ẩn chứa bên trong con người bạn thay vì chỉ chú trọng đến kỹ năng.\r\n7. Bền bỉ kinh doanh trong ngành truyền thống suốt 15 năm, giờ đây chúng tôi xem doanh nghiệp của mình có phần như phòng thí nghiệm, được thử nghiệm những điều mới.\r\n8. Với chúng tôi công việc cũng chính là cuộc sống. Chúng tôi mong muốn được là chính mình và sống hết mình khi làm việc tại đây.\r\n\r\nGIA NHẬP APLUS, BẠN SẼ:\r\n- Trở thành một phần của tập thể đoàn kết, cùng nhau chinh phục những mục tiêu chung đầy cảm hứng.\r\n- Được trao quyền và cơ hội để phát triển bản thân, thử nghiệm những ý tưởng mới và tạo ra những giá trị đột phá.\r\n- Làm việc trong môi trường năng động và sáng tạo, nơi tiếng nói của bạn được lắng nghe và tôn trọng.\r\nHãy cùng A Plus kiến tạo một hành trình đầy cảm hứng!"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T146e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. Giới thiệu vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eA Plus đang tìm những bạn \u003cstrong\u003ecó tư duy mở, dám làm, dám thử và muốn đồng hành trong hành trình mở rộng thị trường xuất khẩu quốc tế\u003c/strong\u003e hoặc những bạn muốn vượt khỏi vai trò Sales không chỉ truyền thống mà nâng cấp \u003cstrong\u003eSales dựa trên dữ liệu và AI\u003c/strong\u003e, A Plus đang tìm bạn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVị trí Trợ lý Sales B2B Quốc Tế – Next Gen (Powered by Digital \u0026 AI)\u003c/strong\u003e dành cho những bạn yêu thích làm việc với khách hàng nước ngoài, ham học hỏi nhưng cũng mạnh dạn hành động, biết dùng Digital \u0026 AI để làm việc thông minh và hiệu quả hơn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBạn sẽ vừa hỗ trợ, vừa cùng đội ngũ kiến tạo cách làm Sales B2B xuất khẩu kiểu mới — mạch lạc, chuyên nghiệp, dựa trên nền tảng Digital, dữ liệu và AI. Vai trò này giúp bạn tiếp cận khách hàng quốc tế, theo dõi đơn hàng, kết nối nhiều bộ phận và góp phần xây dựng trải nghiệm khách hàng liền mạch mà các thị trường châu Âu – Mỹ đặc biệt coi trọng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Mô tả công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Tham gia cùng CEO và đội ngũ kiến tạo cách tiếp cận Sales B2B hiện đại \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCùng CEO và đội ngũ nhìn lại hành trình khách hàng với tư duy mới, nơi Digital \u0026 AI mở ra nhiều khả năng hiệu quả hơn cho thị trường quốc tế.\u003c/p\u003e\u003cp\u003e•\tTiếp thu và thực hành tư duy Sales hiện đại: rõ ràng, có phương pháp, dựa trên dữ liệu và tôn trọng trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e•\tMạnh dạn đề xuất các cải tiến nhỏ hằng ngày và tham gia vào định hướng dài hạn giúp quy trình Sales tinh gọn, hiệu quả và có chiều sâu.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ xây dựng phương pháp Sales phù hợp thời đại mới – nơi Mindset + Toolset giúp bạn làm việc sâu, chính xác, có tính hệ thống.\u003c/p\u003e\u003cp\u003eBạn không chỉ hỗ trợ — bạn tham gia tạo nên cách làm Sales B2B quốc tế tiên phong của A Plus.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tạo trải nghiệm khách hàng liền mạch và đáng tin cậy\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGiao tiếp email tự động với khách nước ngoài bằng sự tinh tế, rõ ràng và nhất quán.\u003c/p\u003e\u003cp\u003e•\tXây chuẩn bị báo giá, dữ liệu kỹ thuật, hình ảnh và thông tin sản phẩm theo tiêu chuẩn cao của thị trường quốc tế.\u003c/p\u003e\u003cp\u003e•\tTheo dõi toàn bộ phản hồi và bước tiếp theo trên hệ thống để hành trình khách hàng xuyên suốt, không đứt đoạn.\u003c/p\u003e\u003cp\u003e•\tKết nối mạch lạc giữa Thị trường – Cung ứng – KCS – Logistics để khách hàng cảm nhận sự chuyên nghiệp và đồng nhất của A Plus từ trao đổi đến giao hàng.\u003c/p\u003e\u003cp\u003eBạn góp phần tạo nên trải nghiệm khách hàng “mạch lạc – minh bạch – tiêu chuẩn quốc tế” mà SME tiên phong làm được.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Khai thác đòn bẩy Digital \u0026 AI để làm việc nhanh hơn, sáng hơn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tSử dụng Salesforce/Agentforce/Chat GPT Team + AI như nền tảng trung tâm để quản lý khách hàng, dữ liệu và pipeline.\u003c/p\u003e\u003cp\u003e•\tDùng AI để viết email, phân tích yêu cầu, so sánh thông tin sản phẩm và tổng hợp dữ liệu.\u003c/p\u003e\u003cp\u003e•\tXây dựng thói quen làm việc dựa trên dữ liệu và hệ thống — tối ưu từng bước mỗi ngày để công việc trở nên chuyên nghiệp, hiệu quả và nhất quán hơn.\u003c/p\u003e\u003cp\u003e•\tChủ động khám phá, đề xuất và thử nghiệm các công cụ số, tận dụng sức mạnh của AI để rút ngắn tiến độ và nâng cao chất lượng đầu ra.\u003c/p\u003e\u003cp\u003eDigital \u0026 AI không phải khẩu hiệu — đó là cách bạn làm việc hằng ngày để tạo lợi thế vượt trội.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Marketing B2B quốc tế gắn chặt với Sales và hành trình khách hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChuẩn bị tài liệu, hình ảnh, mô tả sản phẩm rõ ràng và dễ sử dụng cho khách hàng quốc tế.\u003c/p\u003e\u003cp\u003e•\tThu thập insight và phản hồi thị trường để đội ngũ cải thiện sản phẩm và cách truyền tải thông tin.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ các hoạt động Marketing thiết yếu gi  1 chuyên môn, \u003c/strong\u003ethích phân tích \u0026 sáng tạo bằng công nghệ, \u003cstrong\u003ehoặc Marketing, Ngoại thương, Kinh tế, Kinh doanh\u003c/strong\u003e \u003cstrong\u003equốc tế\u003c/strong\u003e có tư duy số, nhanh nhạy với Digital \u0026 AI.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t\u003c/strong\u003eSinh viên mới, sắp ra trường hoặc 1–5 năm kinh nghiệm trong Sales, B2B, Logistic, Xuất nhập khẩu hoặc lĩnh vực có liên quan, có tư duy kết hợp giữa công nghệ – dữ liệu – kinh doanh (Tech x Business) và yêu thích môi trường B2B quốc tế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*Quyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t\u003c/strong\u003eLương khởi điểm\u003cstrong\u003e 7–10 triệu\u003c/strong\u003e tùy năng lực + Thưởng.\u003c/p\u003e\u003cp\u003e•\tLàm việc trực tiếp với CEO, đội ngũ thị trường xuất khẩu giàu kinh nghiệm, đội Digital và AI đang tiếp tục phát triển của công ty.\u003c/p\u003e\u003cp\u003e•\tMôi trường học nhanh – làm thật – thử nghiệm liên tục.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t\u003c/strong\u003eLộ trình phát triển rõ ràng: \u003cstrong\u003eTrợ lý → Sales Exec → Senior → Leader (Digital/AI/Customer Experience)\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia vào giai đoạn chuyển đổi số – AI quan trọng nhất của A Plus.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T1427,"])</script><script>self.__next_f.push([1,"Trang tuyển dụng chính thức: https://aplus.talent.vn/\r\n\r\nSau 15 năm vững bước trong lĩnh vực kinh doanh, chúng tôi đang định hình lại chính mình với một phiên bản hoàn toàn mới. Từ cốt lõi là một doanh nghiệp xuất khẩu vật liệu xây dựng đá ốp lát đáng tin cậy tại châu Âu và Mỹ, giờ đây, chúng tôi đang kiến tạo thêm những không gian phát triển mới, sáng tạo và giá trị hơn. Hành trình này đã bắt đầu từ việc đổi mới văn hóa doanh nghiệp và thay đổi tư duy, chúng tôi đang tăng tốc trong công cuộc chuyển đổi số, mở ra những xu hướng mới của thị trường.\r\n\r\nChúng tôi đã cùng nhau gặt hái những thành quả ban đầu, dẫn dắt bởi đội ngũ tin tưởng, trong một môi trường cởi mở, nơi luôn đón nhận thách thức và không ngừng đổi mới. Hướng về một tương lai lớn mạnh hơn, A Plus cam kết tạo ra những giá trị đột phá trong thời đại chuyển đổi số và trí tuệ AI.\r\n\r\nVÀI THÔNG TIN VỀ APLUS\r\n\r\nVăn hóa:\r\nVăn hóa chính là nền tảng bền vững giúp chúng tôi phát triển và kết nối từng thành viên. Được toàn đội ngũ cùng nhau xây dựng và không ngừng hoàn thiện, văn hóa của chúng tôi đặt trọng tâm vào việc “sống” với những giá trị cốt lõi. Điển hình như giá trị “trách nhiệm”, nhìn mọi thứ từ mình; hành động với giá trị “Integrity” mỗi ngày; tinh thần “lắng nghe \u0026 chia sẻ” để thấu hiểu cùng nhau phát triển.\r\n\r\nChuyển đổi số: \r\nChúng tôi sử dụng hệ thống Platform Salesforce cho thị trường quốc tế và nền tảng quản trị doanh nghiệp toàn diện Base.vn. Bên cạnh đó A Plus đang từng bước đưa AI vào trong môi trường làm việc thực tiễn để giải quyết các vấn đề hiệu quả, tăng năng suất và chất lượng.\r\nA Plus đang sử dụng Okrs để quản trị mục tiêu một cách thống nhất, minh bạch, xuyên suốt từ trên xuống dưới và từ dưới lên trên.\r\n\r\nThị trường\r\nLà một công ty xuất khẩu B to B đến 14 quốc gia, chủ yếu ở châu Âu và Mỹ, dù doanh số còn khiêm tốn, chúng tôi luôn khao khát nâng cao trải nghiệm khách hàng. Bên cạnh các phương thức truyền thống, chúng tôi đang tập trung vào việc cải thiện dịch vụ thông qua các giải pháp số hóa (Digital) tiên tiến.\r\n\r\nVà…\r\n\r\nChúng tôi còn rất nhiều điểm cần cải thiện (forward) và chuyển hóa (transform), có thể kể đến như: Sự quyết liệt, sẵn sàng đẩy mình vào các thử thách khó khăn. Đội ngũ này tự mày mò học hỏi là nhiều, thiếu các nhân tài, chuyên gia bên ngoài.\r\n\r\nTHÔNG ĐIỆP TỪ A PLUS\r\n1. Là một doanh nghiệp xuất khẩu, cam kết không ngừng chuyển hóa chính mình, ó tư duy mở, dám làm, dám thử và muốn đồng hành trong hành trình mở rộng thị trường xuất khẩu quốc tế\u003c/strong\u003e hoặc những bạn muốn vượt khỏi vai trò Sales không chỉ truyền thống mà nâng cấp \u003cstrong\u003eSales dựa trên dữ liệu và AI\u003c/strong\u003e, A Plus đang tìm bạn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVị trí Trợ lý Sales B2B Quốc Tế – Next Gen (Powered by Digital \u0026 AI)\u003c/strong\u003e dành cho những bạn yêu thích làm việc với khách hàng nước ngoài, ham học hỏi nhưng cũng mạnh dạn hành động, biết dùng Digital \u0026 AI để làm việc thông minh và hiệu quả hơn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBạn sẽ vừa hỗ trợ, vừa cùng đội ngũ kiến tạo cách làm Sales B2B xuất khẩu kiểu mới — mạch lạc, chuyên nghiệp, dựa trên nền tảng Digital, dữ liệu và AI. Vai trò này giúp bạn tiếp cận khách hàng quốc tế, theo dõi đơn hàng, kết nối nhiều bộ phận và góp phần xây dựng trải nghiệm khách hàng liền mạch mà các thị trường châu Âu – Mỹ đặc biệt coi trọng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Mô tả công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Tham gia cùng CEO và đội ngũ kiến tạo cách tiếp cận Sales B2B hiện đại \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCùng CEO và đội ngũ nhìn lại hành trình khách hàng với tư duy mới, nơi Digital \u0026 AI mở ra nhiều khả năng hiệu quả hơn cho thị trường quốc tế.\u003c/p\u003e\u003cp\u003e•\tTiếp thu và thực hành tư duy Sales hiện đại: rõ ràng, có phương pháp, dựa trên dữ liệu và tôn trọng trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e•\tMạnh dạn đề xuất các cải tiến nhỏ hằng ngày và tham gia vào định hướng dài hạn giúp quy trình Sales tinh gọn, hiệu quả và có chiều sâu.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ xây dựng phương pháp Sales phù hợp thời đại mới – nơi Mindset + Toolset giúp bạn làm việc sâu, chính xác, có tính hệ thống.\u003c/p\u003e\u003cp\u003eBạn không chỉ hỗ trợ — bạn tham gia tạo nên cách làm Sales B2B quốc tế tiên phong của A Plus.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tạo trải nghiệm khách hàng liền mạch và đáng tin cậy\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGiao tiếp email tự động với khách nước ngoài bằng sự tinh tế, rõ ràng và nhất quán.\u003c/p\u003e\u003cp\u003e•\tXây chuẩn bị báo giá, dữ liệu kỹ thuật, hình ảnh và thông tin sản phẩm theo tiêu chuẩn cao của thị trường quốc tế.\u003c/p\u003e\u003cp\u003e•\tTheo dõi toàn bộ phản hồi và bước tiếp theo trên hệ thống để hành trình khách hàng xuyên suốt, không đứt đoạn.\u003c/p\u003e\u003cp\u003e•\tKết nối mạch lạc giữa Thị trường – Cung ứng – KCS – Logistics để khách hàng cảm nhận sự chuyên nghiệp và đồng nhất của A Plus từ trao đổi đến giao hàng.\u003c/p\u003e\u003cp\u003eBạn góp phần tạo nên trải nghiệm khách hàng “mạch lạc – minh bạch – tiêu chuẩn quốc tế” mà SME tiên phong làm được.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Khai thác đòn bẩy Digital \u0026 AI để làm việc nhanh hơn, sáng hơn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tSử dụng Salesforce/Agentforce/Chat GPT Team + AI như nền tảng trung tâm để quản lý khách hàng, dữ liệu và pipeline.\u003c/p\u003e\u003cp\u003e•\tDùng AI để viết email, phân tích yêu cầu, so sánh thông tin sản phẩm và tổng hợp dữ liệu.\u003c/p\u003e\u003cp\u003e•\tXây dựng thói quen làm việc dựa trên dữ liệu và hệ thống — tối ưu từng bước mỗi ngày để công việc trở nên chuyên nghiệp, hiệu quả và nhất quán hơn.\u003c/p\u003e\u003cp\u003e•\tChủ động khám phá, đề xuất và thử nghiệm các công cụ số, tận dụng sức mạnh của AI để rút ngắn tiến độ và nâng cao chất lượng đầu ra.\u003c/p\u003e\u003cp\u003eDigital \u0026 AI không phải khẩu hiệu — đó là cách bạn làm việc hằng ngày để tạo lợi thế vượt trội.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Marketing B2B quốc tế gắn chặt với Sales và hành trình khách hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChuẩn bị tài liệu, hình ảnh, mô tả sản phẩm rõ ràng và dễ sử dụng cho khách hàng quốc tế.\u003c/p\u003e\u003cp\u003e•\tThu thập insight và phản hồi thị trường để đội ngũ cải thiện sản phẩm và cách truyền tải thông tin.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ các hoạt động Marketing thiết yếu giúp khách hiểu nhanh – đúng – đủ về A Plus và sản phẩm.\u003c/p\u003e\u003cp\u003e•\tĐóng vai trò cầu nối giữa Sales – Marketing – Khách hàng, đảm bảo mọi thông tin được truyền đạt nhất quán, chính xác và đúng trọng tâm\u003c/p\u003e\u003cp\u003eMarketing tại A Plus là để khách hiểu rõ — nhanh — chính xác — phù hợp thị trường quốc tế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eXin vui lòng chia sẻ tại phần THƯ GIỚI THIỆU: Vì sao bạn quan tâm đến vị trí này tại A Plus và Bạn sẽ đem đến điều gì để cùng chúng tôi phát triển, xây dựng tổ chức trong bối cảnh mới hiện nay.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T9dd,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTư duy \u0026 phẩm chất\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTư duy mở, ham học nhưng cũng mạnh dạn làm – dám thử – dám đề xuất.\u003c/p\u003e\u003cp\u003e•\tChủ động tìm hiểu, tinh thần trách nhiệm cao, không ngại việc mới.\u003c/p\u003e\u003cp\u003e•\tCó tư duy logic – hệ thống – phân tích dữ liệu và bài toán kinh doanh (Business Analysis).\u003c/p\u003e\u003cp\u003e•\tNhạy bén với công nghệ, hiểu được cách công cụ số và AI có thể tối ưu quy trình kinh doanh.\u003c/p\u003e\u003cp\u003e•\tA Plus tìm người có tiềm năng trở thành “Business Partner” – Bạn không đơn thuần là người thực thi, bạn là người cùng định hình cách tổ chức này vận hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t\u003c/strong\u003eKỹ năng email chuyên nghiệp bằng tiếng Anh.\u003c/p\u003e\u003cp\u003e•\tTiếng Anh đọc – viết tốt, giao tiếp cơ bản là lợi thế.\u003c/p\u003e\u003cp\u003e•\tCó khả năng làm việc với dữ liệu, tài liệu, dashboard hoặc bá ofile/100289.png\",\"https://images.vietnamworks.com/company_profile/100290.png\"]\n42:[\"https://www.youtube.com/watch?v=oaYZfbCthzU\"]\n43:T1427,"])</script><script>self.__next_f.push([1,"Trang tuyển dụng chính thức: https://aplus.talent.vn/\r\n\r\nSau 15 năm vững bước trong lĩnh vực kinh doanh, chúng tôi đang định hình lại chính mình với một phiên bản hoàn toàn mới. Từ cốt lõi là một doanh nghiệp xuất khẩu vật liệu xây dựng đá ốp lát đáng tin cậy tại châu Âu và Mỹ, giờ đây, chúng tôi đang kiến tạo thêm những không gian phát triển mới, sáng tạo và giá trị hơn. Hành trình này đã bắt đầu từ việc đổi mới văn hóa doanh nghiệp và thay đổi tư duy, chúng tôi đang tăng tốc trong công cuộc chuyển đổi số, mở ra những xu hướng mới của thị trường.\r\n\r\nChúng tôi đã cùng nhau gặt hái những thành quả ban đầu, dẫn dắt bởi đội ngũ tin tưởng, trong một môi trường cởi mở, nơi luôn đón nhận thách thức và không ngừng đổi mới. Hướng về một tương lai lớn mạnh hơn, A Plus cam kết tạo ra những giá trị đột phá trong thời đại chuyển đổi số và trí tuệ AI.\r\n\r\nVÀI THÔNG TIN VỀ APLUS\r\n\r\nVăn hóa:\r\nVăn hóa chính là nền tảng bền vững giúp chúng tôi phát triển và kết nối từng thành viên. Được toàn đội ngũ cùng nhau xây dựng và không ngừng hoàn thiện, văn hóa của chúng tôi đặt trọng tâm vào việc “sống” với những giá trị cốt lõi. Điển hình như giá trị “trách nhiệm”, nhìn mọi thứ từ mình; hành động với giá trị “Integrity” mỗi ngày; tinh thần “lắng nghe \u0026 chia sẻ” để thấu hiểu cùng nhau phát triển.\r\n\r\nChuyển đổi số: \r\nChúng tôi sử dụng hệ thống Platform Salesforce cho thị trường quốc tế và nền tảng quản trị doanh nghiệp toàn diện Base.vn. Bên cạnh đó A Plus đang từng bước đưa AI vào trong môi trường làm việc thực tiễn để giải quyết các vấn đề hiệu quả, tăng năng suất và chất lượng.\r\nA Plus đang sử dụng Okrs để quản trị mục tiêu một cách thống nhất, minh bạch, xuyên suốt từ trên xuống dưới và từ dưới lên trên.\r\n\r\nThị trường\r\nLà một công ty xuất khẩu B to B đến 14 quốc gia, chủ yếu ở châu Âu và Mỹ, dù doanh số còn khiêm tốn, chúng tôi luôn khao khát nâng cao trải nghiệm khách hàng. Bên cạnh các phương thức truyền thống, chúng tôi đang tập trung vào việc cải thiện dịch vụ thông qua các giải pháp số hóa (Digital) tiên tiến.\r\n\r\nVà…\r\n\r\nChúng tôi còn rất nhiều điểm cần cải thiện (forward) và chuyển hóa (transform), có thể kể đến như: Sự quyết liệt, sẵn sàng đẩy mình vào các thử thách khó khăn. Đội ngũ này tự mày mò học hỏi là nhiều, thiếu các nhân tài, chuyên gia bên ngoài.\r\n\r\nTHÔNG ĐIỆP TỪ A PLUS\r\n1. Là một doanh nghiệp xuất khẩu, cam kết không ngừng chuyển hóa chính mình, chúng tôi nhận thấy những cơ hội lớn từ những thay đổi nhanh chóng của công nghệ hiện nay.\r\n2. Hành trình của chúng tôi hiện nay là tái tạo chính mình – một tổ chức với 15 năm kinh nghiệm – qua việc đổi mới tư duy và khám phá liên tục (Version 2.0).\r\n3. Với tinh thần Teamwork, chúng tôi tin tưởng, chia sẻ và truyền cảm hứng cho nhau để xây dựng đội nhóm và phát triển con người.\r\n4. Để hiểu nhau hơn, chúng tôi sẽ dành cho bạn 1-2 tuần trải nghiệm thực tế tại công ty giúp bạn tiếp cận văn hóa và cách thức làm việc của tổ chức (vì chúng tôi trân trọng và hướng đến sự đồng hành lâu dài cùng bạn).\r\n5. Cùng với sự đồng hành, đội ngũ quản lý và lãnh đạo của chúng tôi sẵn sàng lắng nghe để gợi mở tiềm năng và truyền sức mạnh cho bạn.\r\n6. Chúng tôi luôn đánh giá cao đến tố chất và giá trị tốt đẹp ẩn chứa bên trong con người bạn thay vì chỉ chú trọng đến kỹ năng.\r\n7. Bền bỉ kinh doanh trong ngành truyền thống suốt 15 năm, giờ đây chúng tôi xem doanh nghiệp của mình có phần như phòng thí nghiệm, được thử nghiệm những điều mới.\r\n8. Với chúng tôi công việc cũng chính là cuộc sống. Chúng tôi mong muốn được là chính mình và sống hết mình khi làm việc tại đây.\r\n\r\nGIA NHẬP APLUS, BẠN SẼ:\r\n- Trở thành một phần của tập thể đoàn kết, cùng nhau chinh phục những mục tiêu chung đầy cảm hứng.\r\n- Được trao quyền và cơ hội để phát triển bản thân, thử nghiệm những ý tưởng mới và tạo ra những giá trị đột phá.\r\n- Làm việc trong môi trường năng động và sáng tạo, nơi tiếng nói của bạn được lắng nghe và tôn trọng.\r\nHãy cùng A Plus kiến tạo một hành trình đầy cảm hứng!"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"40:{\"companyId\":298728,\"jobImageURLs\":\"$41\",\"jobVideoURLs\":\"$42\",\"companyName\":\"Công ty Cổ phần Khoáng sản Vật liệu Á CỘNG\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/e1/11317618.png\",\"companySizeId\":\"\",\"companyProfile\":\"$43\",\"contactName\":\"Phòng Nhân sự\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Phòng 1A, tầng 4, Broadway B, 102 Nguyễn Lương Bằng, Phường Tân Mỹ, TP. Hồ Chí Minh\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images.vietnamworks.com/pictureofcompany/4d/company-info-cover-picture-url-298728-1754274181.png\"}\n45:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-01-25T12:20:57+07:00\",\"expiredOn\":\"2026-04-16T23:59:59+07:00\"}\n44:[\"$45\"]\n46:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"28:{\"jobId\":2006049,\"jobTitle\":\"Trợ Lý Sales B2B Quốc Tế – Next Gen (Powered By Digital \u0026 AI)\",\"userId\":5542924,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/e1/11317618.png\",\"alias\":\"tro-ly-sales-b2b-quoc-te-next-gen-powered-by-digital-and-ai\",\"createdOn\":\"2026-01-25T12:20:47+07:00\",\"approvedOn\":\"2026-03-17T11:30:17+07:00\",\"expiredOn\":\"2026-04-16T23:59:59+07:00\",\"lastUpdatedOn\":\"2026-03-17T11:30:17+07:00\",\"lastSyncedOn\":\"2026-04-12T12:05:23+07:00\",\"companyName\":\"Công ty Cổ phần Khoáng sản Vật liệu Á CỘNG\",\"companyId\":298728,\"companyProfile\":\"$29\",\"companySizeI
