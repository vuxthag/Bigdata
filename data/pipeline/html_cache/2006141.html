í tiến thủ.\u003c/p\u003e\u003cp\u003e3.\tChúng tôi ưu tiên những ứng viên trung thực, báo cáo thẳng thắn và sẵn sàng thừa nhận sai sót; không ưu tiên những ứng viên báo cáo sai lệch, vòng vo hoặc che giấu lỗi lầm.\u003c/p\u003e\u003cp\u003e4.\tChúng tôi ưu tiên những ứng viên có tinh thần trách nhiệm, nỗ lực và chủ động tìm cách đạt mục tiêu; không ưu tiên những ứng viên viện lý do, né tránh nỗ lực hoặc thiếu quyết tâm hoàn thành mục tiêu.\u003c/p\u003e\u003cp\u003e5.\tChúng tôi ưu tiên những ứng viên đặt lợi ích công ty và lợi ích chung lên hàng đầu; không ưu tiên những ứng viên chỉ quan tâm lợi ích cá nhân hoặc bộ phận.\u003c/p\u003e\u003cp\u003e6.\tChúng tôi ưu tiên những ứng viên biết tuân thủ các quyết định chung, giữ đúng cam kết và kiên trì thực hiện; không ưu tiên những ứng viên thường xuyên thay đổi ý kiến, thiếu thống nhất hoặc không giữ cam kết.\u003c/p\u003e\u003cp\u003e7.\tChúng tôi ưu tiên những ứng viên luôn tìm kiếm sự cải tiến, có tinh thần tiến bộ và không hài lòng với hiện trạng; không ưu tiên những ứng viên thiếu tinh thần cải thiện hoặc chỉ muốn duy trì lối mòn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*** Quyền lợi được hưởng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Tổng thu nhập hấp dẫn , THƯỞNG 2 LẦN/NĂM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Môi trường làm việc chuyên nghiệp, năng động, sáng tạo…\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Tham gia đầy đủ các loại bảo hiểm (gồm lương cơ bản và phụ cấp lương) theo đúng quy định của nhà nước.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thưởng lễ, Tết, Lương tháng thứ 13/14 và thưởng thành tích trong năm.\u003c/p\u003e\u003cp\u003e- Du lịch Công ty hàng năm, tiệc cuối năm.\u003c/p\u003e\u003cp\u003e- Được tham gia Bảo hiểm Y tế, BH xã hội, BH thất nghiệp theo quy định, bảo hiểm sức khỏe, rủi ro 24h.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.
