 đang tìm kiếm những “chiến binh” kinh doanh trẻ, nhiệt huyết để tham gia vào đội ngũ phát triển thị trường theo mô hình \u003cstrong\u003eMerchant of Record (MoR)\u003c/strong\u003e. Tại đây, bạn không chỉ cung cấp các sản phẩm cho nền sản xuất công nghiệp; mà bạn còn cung cấp một giải pháp đặc biệt - \u003cstrong\u003eGiải pháp hợp nhất nhà cung cấp (Vendor Consolidation) \u003c/strong\u003egiúp các nhà máy tối ưu hóa quy trình mua hàng. Đây là cơ hội lý tưởng cho các bạn có nền tảng kỹ thuật muốn chuyển hướng sang kinh doanh thương mại chuyên nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Nhiệm vụ cụ thể (Mô tả công việc)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTìm kiếm \u0026 Tiếp cận:\u003c/strong\u003e Chủ động tìm kiếm thông tin các nhà máy sản xuất (Điện tử, Bán dẫn, Cơ khí chính xác, Khuôn mẫu, Nhựa, Thép, Vật liệu tiên tiến,...) tại các Khu công nghiệp mục tiêu. Liên hệ với bộ phận Mua hàng hoặc Kỹ thuật/QA/QC/FA/Sản xuất,... để giới thiệu năng lực kinh nghiệm của MLink (MTECHNOLOGY).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTư vấn giải pháp: \u003c/strong\u003ePhân tích hiện trạng chuỗi cung ứng của khách hàng, để đề xuất mô hình \u003cstrong\u003e'Hợp nhất nhà cung cấp' (Vendor Consolidation)\u003c/strong\u003e, làm nổi bật lợi ích về tinh gọn chứng từ và an toàn pháp lý (MoR) nhằm xúc tiến ký kết Hợp đồng khung (Master Agreement)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKhảo sát nhu cầu (Cùng team Kỹ thuật): \u003c/strong\u003eĐến trực tiếp nhà máy để nắm bắt nhu cầu máy móc, thiết bị, vật tư tiêu hao, linh kiện thay thế mà khách hàng đang sử dụng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThương mại \u0026 Báo giá:\u003c/strong\u003e Làm việc với bộ phận Thu mua nội bộ (MLink) để lấy giá đầu vào, tính toán biên lợi nhuận và soạn thảo báo giá gửi khách hàng. Theo đuổi báo giá cho đến khi nhận được Đơn đặt hàng (PO).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản lý đơn hàng: \u003c/strong\u003ePhối hợp với bộ phận Admin để đảm bảo hàng hóa được giao đúng tiến độ và chứng từ (Hợp đồng, Biên bản giao hàng, Hóa đơn) được xử lý chính xác, hỗ trợ thu hồi công nợ đúng hạn.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T7fa,\u003cp\u003e\u003cstrong\u003e3. Yêu cầu ứng viên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHọc vấn:\u003c/strong\u003e Tốt nghiệp Cao đẳng/Đại học. Ưu tiên các bạn khối Kỹ thuật (Cơ khí, Điện, Tự động hóa, Vật liệu, Hoá học, Vật lý, Vi mạch bán dẫn...) (hoặc Kinh tế và có yêu thích, có kinh nghiệm với môi trường kỹ thuật công nghiệp).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e+ Từ 1 - 2 năm kinh nghiệm bán hàng hoặc tiếp thị (ưu tiên B2B trong mảng nhà máy sản xuất công nghiệp).\u003c/p\u003e\u003cp\u003e+ Chào đón các bạn Kỹ sư vận hành/Kỹ thuật viên/Chuyên viên phòng thí nghiệm phân tích,... muốn chuyển sang làm Sale.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKỹ năng \u0026 Thái độ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e+ Không ngại di chuyển đi thị trường (các KCN).\u003c/p\u003e\u003cp\u003e+ Giao tiếp tự tin, mạch lạc.\u003c/p\u003e\u003cp\u003e+ Có tư duy về phục vụ khách hàng và ham học hỏi kiến thức sản phẩm mới.\u003c/p\u003e\u003cp\u003e+ Nắm được cơ bản về quy trình mua bán trong doanh nghiệp (Báo giá -\u0026gt; PO -\u0026gt; Hóa đơn) là một lợi thế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quyền lợi \u0026 Thu nhập\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThu nhập hấp dẫn:\u003c/strong\u003e Lương cứng từ 15 triệu - 25 triệu (tùy năng lực) + Thưởng hoa hồng dựa trên quy định của công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng nóng:\u003c/strong\u003e Thưởng ngay khi mở được tài khoản khách hàng doanh nghiệp mới.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐào tạo bài bản:\u003c/strong\u003e Đượ
