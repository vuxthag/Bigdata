ng trình quà tặng online \u0026 offline của hệ thống: tổng hợp thông tin khách hàng trúng thưởng, chuẩn bị quà tặng, liên lạc khách để gửi quà.\u003c/p\u003e\u003cp\u003e•\tXử lý công tác hậu cần và tham gia hỗ trợ các chương trình hoạt náo bán hàng, lễ khai trương, workshop, hội chợ quảng bá, hợp tác với đối tác…theo sự phân công của Quản lý.\u003c/p\u003e\u003cp\u003e•\tXử lý công tác hậu cần và tham gia hỗ trợ các hoạt động quay phim, chụp hình, livestream quảng cáo của công ty.\u003c/p\u003e\u003cp\u003e•\tXử lý công tác hậu cần và tham gia hỗ trợ các hoạt động booking KOL/KOC, quảng cáo của công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3/ Quản lý dữ liệu \u0026 báo cáo hiệu suất:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổng hợp dữ liệu, phân tích và báo cáo các dữ liệu khách hàng, dữ liệu phân tích thị trường hoặc các chương trình marketing.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4/ Theo dõi chi phí và lưu trữ hồ sơ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm tra lưu trữ các hồ sơ tài liệu, hợp đồng của bộ phận marketing.\u003c/p\u003e\u003cp\u003e•\tTheo dõi chi phí Trade Marketing.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5/ Các công việc khác theo phân công của Trưởng phòng MKT\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e(Thông tin công việc cụ thể sẽ được trao đổi thêm khi phỏng vấn)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T55c,\u003cp\u003e•\tTốt nghiệp cao đẳng trở lên, chuyên ngành Marketing, Quản trị kinh doanh hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có kinh nghiệm trong ngành FMCG hoặc bán lẻ.\u003c/p\u003e\u003cp\u003e•\tThành thạo tin học văn phòng (đặc biệt là Excel).\u003c/p\u003e\u003cp\u003e•\tKỹ năng xử lý số liệu nhanh và chính xác.\u003c/p\u003e\u003cp\u003e•\tKỹ năng sắp xếp công việc \u0026 quản l
