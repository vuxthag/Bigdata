ữ phát triển truyền thống văn hoá doanh nghiệp, tinh thần tự tôn dân tộc nhằm góp phần xây dựng hình ảnh đất nước Việt Nam giàu đẹp, thịnh vượng.\r\n\r\nLấy TÂM – TRÍ – TIN – TÍN – TINH – TIẾN làm giá trị cốt lõi cho toàn bộ hoạt động của Tập đoàn \u0026 hệ thống các công ty thành viên – trực thuộc; Toàn thể ban lãnh đạo và cán bộ nhân viên Tập đoàn T\u0026T Group luôn nỗ lực không ngừng để hiện thực hoá khát vọng dẫn đầu, đồng thời tạo ra các giá trị tốt đẹp cũng như lợi ích cho đối tác, cộng đồng và đất nước. Đó là:\r\n- Tận tâm \u0026 trí tuệ trong từng chi tiết để đạt tới hiệu quả cao nhất.\r\n- Đóng góp tích cực cho sự phát triển của nền kinh tế, xã hội Việt Nam \u0026 tạo dựng một cộng đồng thịnh vượng chung.\r\n- Phát triển bền vững, thượng tôn pháp luật, đặt lợi ích kinh tế gắn liền với phát triển cộng đồng \u0026 môi trường sống.\r\n- Dành cho đối tác, khách hàng những quyền lợi tốt nhất bên cạnh những sản phẩm, dịch vụ chất lượng và uy tín cao.\r\n- Kết hợp hài hoà bản sắc văn hoá Việt Nam và tinh hoa thế giới trong từng sản phẩm, dịch vụ.\r\n- Không ngừng đổi mới để đạt mục tiêu tăng trưởng bền vững \u0026 hiện thực hoá tầm nhìn trở thành người dẫn đầu."])</script><script>self.__next_f.push([1,"24:T1689,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.   Tổ chức công tác kế toán dự án tại Công ty mẹ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tXác định các chức danh công việc và xây dựng các mô tả chức danh công việc của phòng\u003c/p\u003e\u003cp\u003e-\tXác định các quy định, quy trình của phòng cần xây dựng\u003c/p\u003e\u003cp\u003e-\tXác định định biên nhân sự của Phòng Dự Án trong từng thời kỳ\u003c/p\u003e\u003cp\u003e-\tXây dựng các biểu mẫu báo cáo kế toán dự án\u003c/p\u003e\u003cp\u003e-\tĐào tạo, hướng đẫn về mặt chuyên môn kế toán dự án đối với các phòng trong Ban Kế Toán và kế toán tại các công ty thành viên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.  Định hướng và hướng dẫn công tác kế toán bán hàng, chi phí, giá thành và công nợ dự án của toàn tập đoàn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐịnh hướng và hướng dẫn các quy chế, quy định, quy trình của kế toán bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ của dự án\u003c/p\u003e\u003cp\u003e-\tĐịnh hướng và hướng dẫn biểu mẫu báo cáo bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ của dự án\u003c/p\u003e\u003cp\u003e-\tĐịnh hướng và hướng dẫn checklist khi kiểm soát, thẩm định thông tin bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ của dự án\u003c/p\u003e\u003cp\u003e-\tĐịnh hướng và hướng dẫn nguyên tắc xây dựng, quản lý hệ thống tài khoản, vụ việc, khoản mục phí của dự án...\u003c/p\u003e\u003cp\u003e-\tĐịnh hướng và hướng dẫn về hạch toán kế toán bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ của dự án\u003c/p\u003e\u003cp\u003e-\tXây dựng điều khoản thương mại mẫu của các hợp đồng về bán hàng, chi phí và công nợ của dự án\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tKiểm tra, giám sát công tác kế toán bán hàng, chi phí, giá thành và công nợ toàn tập đoàn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThẩm định các quy chế, quy định, quy trình, hướng dẫn liên quan tới quản lý bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ dự án\u003c/p\u003e\u003cp\u003e-\tGiám sát và kiểm tra việc tuân thủ các quy chế, quy định, quy trình, hướng dẫn của các bên liên quan tới quản lý bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ của dự án\u003c/p\u003e\u003cp\u003e-\tGiám sát và kiểm tra công tác kế toán bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ tại các công ty thành viên là chủ đầu tư trong toàn tập đoàn\u003c/p\u003e\u003cp\u003e-\tThẩm định các nội dung liên quan về giá và các điều khoản thương mại của gói thầu/hợp đồng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tTham gia thương thảo, đàm phán với nhà thầu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐàm phán, thương thảo với nhà thầu về giá và các điều khoản thương mại của hợp đồng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tKế toán bán hàng, chi phí, giá thành và công nợ của dự án do Công ty CP Tập Đoàn T\u0026T là chủ đầu tư \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003ea.\tSoát xét các nghiệp vụ liên quan tới bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và nợ phải trả của dự án \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTiếp nhận các yêu cầu soát xét cùng hồ sơ, tài liệu, thông tin liên quan tới bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ của dự án\u003c/p\u003e\u003cp\u003e-\tXác định danh mục các nội dung mà kế toán sẽ soát xét \u003c/p\u003e\u003cp\u003e-\tThực hiện soát xét theo phạm vi, nội dung, khía cạnh đã xây dựng\u003c/p\u003e\u003cp\u003e-\tThảo luận kết quả soát xét với các bên liên quan để tổng hợp, báo cáo kết quả.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eb.\tTính giá thành của các dự án\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThu thập các thông tin làm cơ sở tính giá thành của dự án\u003c/p\u003e\u003cp\u003e-\tThảo luận với các bên về các yếu tố có thể ảnh hưởng tới giá thành dự án\u003c/p\u003e\u003cp\u003e-\tTính giá thành của dự án\u003c/p\u003e\u003cp\u003e-\tĐánh giá sự phù hợp của giá thành sau khi tính với đặc điểm của dự án\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003ec.\tQuyết toán dự án hoàn thành\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tLựa chọn đơn vị kiểm toán dự án hoàn thành\u003c/p\u003e\u003cp\u003e-\tPhối hợp với các bên liên quan cung cấp thông tin và giải trình số liệu phục vụ quyết toán dự án hoàn thành\u003c/p\u003e\u003cp\u003e-\tSoát xét báo cáo quyết toán dự án hoàn thành\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003ed.\t Hạch toán các khoản chi, chi phí, giá thành, doanh thu và công nợ của dự án\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tLập chứng từ kế toán cho các nghiệp vụ phát sinh\u003c/p\u003e\u003cp\u003e-\tGhi sổ các nghiệp vụ phát sinh theo chuẩn mực, chế độ kế toán hiện hành\u003c/p\u003e\u003cp\u003e-\tLưu trữ chứng từ kế toán.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003ee.\tQuản trị các khoản chi, chi phí, giá thành, doanh thu và công nợ của dự án\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tCập nhật đầy đủ, chính xác, kịp thời các khoản doanh thu, chi phí, thanh toán chi phí, giá thành, công nợ của các dự theo các biểu mẫu quy định phục vụ cho công tác quản trị\u003c/p\u003e\u003cp\u003e-\tCung cấp đầy đủ, kịp thời thông tin phục vụ công tác quản lý cho các cấp lãnh đạo, phòng ban khi yêu cầu\u003c/p\u003e\u003cp\u003e-\tTuân thủ các quy trình, quy định có liên quan đã được ban hành\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003ef.\tGiám sát, tham mưu, tư vấn\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tDự báo các rủi ro liên quan đến kế toán, thuế của dự án và đề xuất giải pháp khắc phục.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Td1f,"])</script><script>self.__next_f.push([1,"Khởi đầu là một trong những doanh nghiệp tư nhân sớm nhất của Việt Nam, với khát vọng và sứ mệnh mang lại những giá trị tốt đẹp cho cộng đồng và phát triển kinh tế đất nước, năm 1993 Công ty TNHH Công nghệ \u0026 Thương mại (T\u0026T Ltd., Co.) được thành lập. Ngành nghề kinh doanh chính là phân phối các sản phẩm điện máy, Công ty T\u0026T đã nhanh chóng tạo dựng được tên tuổi và trở thành nhà phân phối chính thức, độc quyền tại miền Bắc của các thương hiệu lớn hàng đầu thế giới như Panasonic, National, Mitsuishi, Toshiba.\r\n\r\nVới sứ mệnh \"đem lại những giá trị tốt đẹp vì sự phát triển của xã hội\" trong gần 30 năm qua, Tập đoàn T\u0026T group đã có những bước phát triển mạnh mẽ và trở thà Chính sách lương:\r\nCông ty Cổ phần Tập đoàn T\u0026T luôn đảm bảo mọi quyền lợi của người lao động. Người lao động làm việc tại T\u0026T được hưởng mức lương cạnh tranh so với mặt bằng chung của thị trường và nâng bậc lương theo đúng quy định của pháp luật, đảm bảo công khai, công bằng, minh bạch, thể hiện được chính sách phát triển của T\u0026T. \r\nChính sách thưởng:\r\nT\u0026T luôn có chính sách khen thưởng kịp thời nhằm động viên, khuyến khích cán bộ nhân viên nỗ lực cống hiến và phấn đấu hết mình để xây dựng Công ty ngày một phát triển. Cán bộ công nhân viên tại Tập đoàn được thưởng thường niên trong các dịp lễ, tết tùy thuộc vào kết quả sản xuất kinh doanh của Tập đoàn. \r\nChế độ phúc lợi:\r\nTất cả cán bộ công nhân viên ký Hợp đồng lao động chính thức với T\u0026T đều được hưởng các chế độ BHXH, BHYT, BH thất nghiệp đúng theo quy định của nhà nước.\r\nHàng năm, T\u0026T đều tổ chức cho cán bộ nhân viên đi tham quan, nghỉ mát để mọi người có cơ hội giao lưu, thư giãn, nghỉ ngơi. Tập đoàn còn thường xuyên quan tâm, tặng quà cho người lao động và gia đình vào những ngày kỷ niệm trong năm như: ngày Quốc tế phụ nữ, ngày Quốc tế thiếu nhi, Tết Trung thu, và các ngày hiếu hỉ của người lao động. \r\nChính sách đào tạo:\r\nXuất phát từ nhận thức về tầm quan trọng của nguồn nhân lực, Tập đoàn T\u0026T rất quan tâm và coi trọng việc đào tạo, nâng cao kiến thức chuyên môn, kỹ năng làm việc nhằm tạo điều kiện cho cán bộ công nhân viên thực hiện công việc một cách hiệu quả nhất, phát triển sự nghiệp. \r\nCơ hội thăng tiến:\r\nT\u0026T luôn tạo mọi điều kiện cho người lao động có cơ hội thăng tiến trong công việc nhất là những người có tính cầu tiến, ham học hỏi, năng động, sáng tạo trong công việc. \r\nĐến với T\u0026T người lao động sẽ cảm nhận được sự thân thiện, đoàn kết  và một môi trường làm việc thật sự chuyên nghiệp."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:Td1f,"])</script><script>self.__next_f.push n\u003c/p\u003e\u003cp\u003e-\tĐịnh hướng và hướng dẫn nguyên tắc xây dựng, quản lý hệ thống tài khoản, vụ việc, khoản mục phí của dự án...\u003c/p\u003e\u003cp\u003e-\tĐịnh hướng và hướng dẫn về hạch toán kế toán bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ của dự án\u003c/p\u003e\u003cp\u003e-\tXây dựng điều khoản thương mại mẫu của các hợp đồng về bán hàng, chi phí và công nợ của dự án\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tKiểm tra, giám sát công tác kế toán bán hàng, chi phí, giá thành và công nợ toàn tập đoàn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThẩm định các quy chế, quy định, quy trình, hướng dẫn liên quan tới quản lý bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ dự án\u003c/p\u003e\u003cp\u003e-\tGiám sát và kiểm tra việc tuân thủ các quy chế, quy định, quy trình, hướng dẫn của các bên liên quan tới quản lý bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ của dự án\u003c/p\u003e\u003cp\u003e-\tGiám sát và kiểm tra công tác kế toán bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và công nợ tại các công ty thành viên là chủ đầu tư trong toàn tập đoàn\u003c/p\u003e\u003cp\u003e-\tThẩm định các nội dung liên quan về giá và các điều khoản thương mại của gói thầu/hợp đồng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tTham gia thương thảo, đàm phán với nhà thầu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐàm phán, thương thảo với nhà thầu về giá và các điều khoản thương mại của hợp đồng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tKế toán bán hàng, chi phí, giá thành và công nợ của dự án do Công ty CP Tập Đoàn T\u0026T là chủ đầu tư \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003ea.\tSoát xét các nghiệp vụ liên quan tới bán hàng, chi phí, giá thành, quyết toán dự án hoàn thành và nợ phải trả của dự án \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTiếp nhận các yêu cầu soát xét cùng hồ sơ, tài liệu, thông tin liên o nhất từ đối tác, Chính phủ và cộng đồng xã hội.\r\n\r\nT\u0026T Group đặt mục tiêu giữ vững vị trí top 10 Tập đoàn kinh tế tư nhân đa ngành lớn nhất Việt Nam và top 50 Tập đoàn có tầm ảnh hưởng tại châu Á \u0026 khu vực. Để thực thi hiệu quả, Tập đoàn đã xây dựng chiến lược phát triển phù hợp theo từng thời kỳ với định hướng lâu dài, bền vững theo các chuẩn mực quốc tế đi đôi với hoạt động quản trị minh bạch. Kinh doanh dựa trên triết lý phát triển hài hoà giữa lợi ích kinh tế và lợi ích mang lại cho cộng đồng, xã hội; Tập đoàn đã luôn gìn giữ phát triển truyền thống văn hoá doanh nghiệp, tinh thần tự tôn dân tộc nhằm góp phần xây dựng hình ảnh đất nước Việt Nam giàu đẹp, thịnh vượng.\r\n\r\nLấy TÂM – TRÍ – TIN – TÍN – TINH – TIẾN làm giá trị cốt lõi cho toàn bộ hoạt động của Tập đoàn \u0026 hệ thống các công ty thành viên – trực thuộc; Toàn thể ban lãnh đạo và cán bộ nhân viên Tập đoàn T\u0026T Group luôn nỗ lực không ngừng để hiện thực hoá khát vọng dẫn đầu, đồng thời tạo ra các giá trị tốt đẹp cũng như lợi ích cho đối tác, cộng đồng và đất nước. Đó là:\r\n- Tận tâm \u0026 trí tuệ trong từng chi tiết để đạt tới hiệu quả cao nhất.\r\n- Đóng góp tích cực cho sự phát triển của nền kinh tế, xã hội Việt Nam \u0026 tạo dựng một cộng đồng thịnh vượng chung.\r\n- Phát triển bền vững, thượng tôn pháp luật, đặt lợi ích kinh tế gắn liền với phát triển cộng đồng \u0026 môi trường sống.\r\n- Dành cho đối tác, khách hàng những quyền lợi tốt nhất bên cạnh những sản phẩm, dịch vụ chất lượng và uy tín cao.\r\n- Kết hợp hài hoà bản sắc văn hoá Việt Nam và tinh hoa thế giới trong từng sản phẩm, dịch vụ.\r\n- Không ngừng đổi mới để đạt mục tiêu tăng trưởng bền vững \u0026 hiện thực hoá tầm nhìn trở thành người dẫn đầu."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"42:T943,"])</script><script>self.__next_f.push([1,"Chính sách lương:\r\nCông ty Cổ phần Tập đoàn T\u0026T luôn đảm bảo mọi quyền lợi của người lao động. Người lao động làm việc tại T\u0026T được hưởng mức lương cạnh tranh so với mặt bằng chung của thị trường và nâng bậc lương theo đúng quy định của pháp luật, đảm bảo công khai, công bằng, minh bạch, thể hiện được chính sách phát triển của T\u0026T. \r\nChính sách thưởng:\r\nT\u0026T luôn có chính sách khen thưởng kịp thời nhằm động viên, khuyến khích cán bộ nhân viên nỗ lực cống hiến và phấn đấu hết mình để xây dựng Công ty ngày một phát triển. Cán bộ công nhân viên tại Tập đoàn được thưởng thường niên trong các dịp lễ, tết tùy thuộc vào kết quả sản xuất kinh doanh của Tập đoàn. \r\nChế độ phúc lợi:\r\nTất cả cán bộ công nhân viên ký Hợp đồng lao động chính thức với T\u0026T đều được hưởng các chế độ BHXH, BHYT, BH thất nghiệp đúng theo quy định của nhà nước.\r\nHàng năm, T\u0026T đều tổ chức cho cán bộ nhân viên đi tham quan, nghỉ mát để mọi người có cơ hội giao lưu, thư giãn, nghỉ ngơi. Tập đoàn còn thường xuyên quan tâm, tặng quà cho người lao động và gia đình vào những ngày kỷ niệm trong năm như: ngày Quốc tế phụ nữ, ngày Quốc tế thiếu nhi, Tết Trung thu, và các ngày hiếu hỉ của người lao động. \r\nChính sách đào tạo:\r\nXuất phát từ nhận thức về tầm quan trọng của nguồn nhân lực, Tập đoàn T\u0026T rất quan tâm và coi trọng việc đào tạo, nâng cao kiến thức chuyên môn, kỹ năng làm việc nhằm tạo điều kiện cho cán bộ công nhân viên thực hiện công việc một cách hiệu quả nhất, phát triển sự nghiệp. \r\nCơ hội thăng tiến:\r\nT\u0026T luôn tạo mọi điều kiện cho người lao động có cơ hội thăng tiến trong công việc nhất là những người có tính cầu tiến, ham học hỏi, năng động, sáng tạo trong công việc. \r\nĐến với T\u0026T người lao động sẽ cảm nhận được sự thân thiện, đoàn kết  và một môi trường làm việc thật sự chuyên nghiệp."])</script><script>self.__next_f.push([1,"3f:{\"companyId\":44262,\"jobImageURLs\":\"$40\",\"jobVideoURLs\":null,\"companyName\":\"T\u0026T Group\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/68/10572150.png\",\"companySizeId\":\"\",\"c
