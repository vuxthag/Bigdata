SUNSHINE GROUP, TASECO LAND, … Các tổng thầu hàng đầu như: COTECCONS, HÒA BÌNH, RICCONS, DELTA.... và các đơn vị nhôm kính là đối tác chiến lược như: EUROWINDOWN, CAG, HASKY …\r\n\r\nSỨ MỆNH CÔNG TY\r\nXingfa Quảng Đông đặt mục tiêu cải tiến hệ thống quản lý nội bộ để giá trị sản lượng tăng 15% hàng năm, đồng thời đẩy nhanh việc chuyển đổi công nghệ và thiết bị hiện tại, khai thác tiềm năng nội tại và mở rộng chi phí để thay thế công nghệ sản xuất lạc hậu, đi đầu trong đổi mới công nghệ và giải quyết khó khan về năng lực sản xuất thấp.\r\nXingfa mong muốn tăng cường khả năng đổi mới kỹ thuật, phát triển các sản phẩm công nghệ cao (VD công viện nghiên cứu nhôm định hình hàng không vũ trụ… Vật liệu manomet được sử dụng trong sản xuất và xử lý bề mặt, như vậy giá trị của nhôm định hình sẽ được cải thiện và tăng lên.)\r\n\r\nTRIẾT LÝ CÔNG TY\r\nTinh thần Xingfa:\r\nCần cù, khám phá, đổi mới, thực tế để phục vụ xã hội\r\n\r\nNguyên tắc kinh doanh:\r\n“Hướng đến con người, uy tín và chất lương”\r\n\r\nNguyên tắc quản lý: \r\n“Nghiêm minh, có năng lực, chí công vô tư”\r\n\r\nLời hứa của Xingfa:\r\nXingfa có thể không sản xuất những sản phẩm tinh vi nhất trên thế giới, nhưng sẽ tạo ra những sản phẩm tốt hơn với giá cả cạnh tranh và đem lại cho bạn dịch vụ tốt nhất.\r\n\r\nMục tiêu của Xingfa:\r\nXây dựng thương hiệu Xingfa lớn hơn, mạnh mẽ và vượt trội hơn.\r\n\r\nSỨC MẠNH DOANH NGHIỆP\r\nCuối thế kỷ 20 và đầu thế kỷ 21, Nhôm Xingfa đã chiếm được vị trí số 1 rất nhiều hạng mục trong nghành, là doanh nghiệp đầu tiên:\r\n•\tÁp dụng dự án mạng thông tin quản lý hiện đại ERP\r\n•\tXây dựng một phòng thí nghiệm được công nhận trên toàn quốc về nhôm định hình\r\n•\tXây dựng trung tâm nghiên cứu và phát triển công nghệ nhôm định hình trọng điểm cấp tỉnh\r\n•\tTrở thành doanh nghiệp thí điểm bằng sáng chế cấp tỉnh và doanh nghiệp quyết định quyền sở hữu trí tuệ cấp tỉnh\r\n•\tXây dựng trung tâm công nghệ doanh nghiệp cấp tỉnh\r\n•\tThiết lập trạm nghiên cứu khoa học sau tiến sĩ\r\nNhãn hiệu Xingfa đã được công nhận là “ Nhãn hiệu nổi tiếng của Trung Quốc”, danh hiệu này giúp nâng cao uy tín và khả năng cạnh tranh của Công ty TNHH Nhôm Xingfa Quảng Đông.\r\nĐể tăng cường ảnh hưởng toàn cầu của các sản phảm Xingfa, và để tạo nên một thương hiệu thế kỷ, Xingfa tích cực thực hiện các thỏa thuận hợp tác với các công ty nổi tiếng ở nước ngoài. Kể từ năm 2008, lãnh đạo công ty đã chú ý đến các quốc gia mới nổi ở Đông Nam Á, và dành thời gian khám phá thị trường mới này. \r\n\r\nMẠNG LƯỚI KINH DOANH\r\nXingfa có mặt khắp nơi trên thế giới: \r\nArgentina, Mỹ, Úc, Bỉ, Brazil, Brunei, Malaysia, Cameroon, Canada, Chile, Đan Mạch, Dominica, Ai Cập, Ethiopia, Fiji, Phần Lan, Pháp, Guiana thuộc Pháp, Đức, Guinea, Guyana, Hungary, Ấn Độ, Indonesia, Israel, Ý, Nhật Bản, Jordan, Campuchia, Hàn Quốc, Lào, Macao, Malaysia, Martinique, Mauritius, Mexico, Nepal, New Zealand, Pakistan, Panama, Philippines, Quatar, Reunion, Romania, Ả Rập Saudi, Singapore, Slovenia, Nam Phi, Tây Ban Nha, Sri Lanka, Thụy Điển, Thái Lan, UAE, Anh, Việt Nam\r\n\r\nXingfa tại Việt Nam:\r\nNhôm Xingfa có mặt tại Việt Nam từ rất sớm và được đông đảo người tiêu dùng cũng như các nhà thầu xây dựng uy tín tin dùng, đánh giá cao bởi những đặc tính ưu việt của nó so với các loại nhôm thông thường. Trong hơn 20 năm phát triển tại thị trường Việt Nam, sản phảm nhôm Xingfa luôn nhận được sự tin tưởng và ủng hộ của đông đảo quý khách hàng.\r\nNhằm mục tiêu nâng cao chất lượng phục vụ, Công ty TNHH Nhôm Xingfa Quảng Đông đã thành lập VPĐD tại thị trường Việt Nam với ba văn phòng đặt tại Hà Nội, Đà Năng và HCM. Ngoài ra chúng tôi cũng có 3 nhà phân phối luôn đồng hành cùng để phục vụ Qúy khách hàng, đó là Công ty TNHH Cửa sổ Việt Châu Á Asean Window, Công ty CP phát triển Công nghệ Việt Ý, Công ty TNHH MTV SX TM Hùng Long.\r\n\r\nVĂN PHÒNG ĐẠI DIỆN CHÍNH THỨC TẠI VIỆT NAM\r\nTRỤ SỞ CHÍNH: Tầng 10, Tòa CharmVit Tower, 117 Trần Duy Hưng, Trung Hòa, Cầu Giấy, Hà Nội\r\nVP MIỀN NAM: 109 Nguyễn Cơ Thạch, tps://images.vietnamworks.com/company_profile/90672.jpg\",\"https://images.vietnamworks.com/company_profile/90674.jpg\",\"https://images.vietnamworks.com/company_profile/96288.jpg\"]\n45:T1cdf,"])</script><script>self.__next_f.push([1,"Mã bưu chính: 528137\r\nWedsite: www.xingfa.com\r\n\r\nCông ty TNHH Nhôm Xingfa Quảng Đông có trụ sở chính đặt tại thành phố Phật Sơn, tỉnh Quảng Đông, được thành lập lần đầu tiên vào năm 1984 và được niêm yết tại Sở giao dịch chứng khoán Hồng Kông ( mã: 0098) vào ngày 31 tháng 3 năm 2008.\r\n\r\nKể từ khi thành lập vào năm 1984, Nhôm Xingfa luôn tuân thủ tôn chỉ kinh doanh “ hướng đến con người, uy tín và chất lượng”.\r\n\r\nNhôm Xingfa là một trong những nhà sản xuất nhôm đùn sớm nhất ở Trung Quốc và hiện đã trở thành một doanh nghiệp có quy mô lớn chuyên sản xuất nhôm định hình xây dựng và công nghiệp và là cơ sở sản xuất được Bộ Xây dựng Trung Quốc chỉ định. Kể từ đó, phạm vi tiếp thị thương hiệu không ngừng được mở rộng, Xingfa đã xuất khẩu các sản phẩm nhôm đến gần 60 quốc gia và khu vực trên thế giới.\r\n\r\nHiện tại, nhôm Xingfa sở hữu 1200 bằng sáng chế cấp nhà nước và hơn 200.000 chủng loại sản phẩm với quy cách và mẫu mã khác nhau.\r\nCác sản phẩm nhôm xây dựng ( cửa đi, cửa sổ và mặt dựng) là nền tảng của Nhôm Xingfa. Xingfa vinh dự khi được góp sức tạo nên các tòa nhà cao cấp mang tính chất biểu tượng, mang tính bước ngoặt như tòa nhà cao nhất thế giới, Dubai Burj Khalifa, Beijing Daxing Sân bay quốc tế, Tháp truyền hình Minh châu phương đông Thượng Hải.\r\nTại thị trường Việt Nam, chúng tôi cũng rất vinh dự khi được đồng hành với các chủ đầu tư lớn như: VINGROUP, SUNGROUP, MIK GROUP, SUNSHINE GROUP, TASECO LAND, … Các tổng thầu hàng đầu như: COTECCONS, HÒA BÌNH, RICCONS, DELTA.... và các đơn vị nhôm kính là đối tác chiến lược như: EUROWINDOWN, CAG, HASKY …\r\n\r\nSỨ MỆNH CÔNG TY\r\nXingfa Quảng Đông đặt mục tiêu cải tiến hệ thống quản lý nội bộ để giá trị sản lượng tăng 15% hàng năm, đồng thời đẩy nhanh việc chuyển đổi công nghệ và thiết bị hiện tại, khai thác tiềm năng nội tại và mở rộng chi phí để thay thế công nghệ sản xuất lạc hậu, đi đầu trong đổi mới công nghệ và giải quyết khó khan về năng lực sản xuất thấp.\r\nXingfa mong muốn tăng cường khả năng đổi mới kỹ thuật, phát triển các sản phẩm công nghệ cao (VD công viện nghiên cứu nhôm định hình hàng không vũ trụ… Vật liệu manomet được sử dụng trong sản xuất và xử lý bề mặt, như vậy giá trị của nhôm định hình sẽ được cải thiện và tăng lên.)\r\n\r\nTRIẾT LÝ CÔNG TY\r\nTinh thần Xingfa:\r\nCần cù, khám phá, đổi mới, thực tế để phục vụ xã hội\r\n\r\nNguyên tắc kinh doanh:\r\n“Hướng đến con người, uy tín và chất lương”\r\n\r\nNguyên tắc quản lý: \r\n“Nghiêm minh, có năng lực, chí công vô tư”\r\n\r\nLời hứa của Xingfa:\r\nXingfa có thể không sản xuất những sản phẩm tinh vi nhất trên thế giới, nhưng sẽ tạo ra những sản phẩm tốt hơn với giá cả cạnh tranh và đem lại cho bạn dịch vụ tốt nhất.\r\n\r\nMục tiêu của Xingfa:\r\nXây dựng thương hiệu Xingfa lớn hơn, mạnh mẽ và vượt trội hơn.\r\n\r\nSỨC MẠNH DOANH NGHIỆP\r\nCuối thế kỷ 20 và đầu thế kỷ 21, Nhôm Xingfa đã chiếm được vị trí số 1 rất nhiều hạng mục trong nghành, là doanh nghiệp đầu tiên:\r\n•\tÁp dụng dự án mạng thông tin quản lý hiện đại ERP\r\n•\tXây dựng một phòng thí nghiệm được công nhận trên toàn quốc về nhôm định hình\r\n•\tXây dựng trung tâm nghiên cứu và phát triển công nghệ nhôm định hình trọng điểm cấp tỉnh\r\n•\tTrở thành doanh nghiệp thí điểm bằng sáng chế cấp tỉnh và doanh nghiệp quyết định quyền sở hữu trí tuệ cấp tỉnh\r\n•\tXây dựng trung tâm công nghệ doanh nghiệp cấp tỉnh\r\n•\tThiết lập trạm nghiên cứu khoa học sau tiến sĩ\r\nNhãn hiệu Xingfa đã được công nhận là “ Nhãn hiệu nổi tiếng của Trung Quốc”, danh hiệu này giúp nâng cao uy tín và khả năng cạnh tranh của Công ty TNHH Nhôm Xingfa Quảng Đông.\r\nĐể tăng cường ảnh hưởng toàn cầu của các sản phảm Xingfa, và để tạo nên một thương hiệu thế kỷ, Xingfa tích cực thực hiện các thỏa thuận hợp tác với các công ty nổi tiếng ở nước ngoài. Kể từ năm 2008, lãnh đạo công ty đã chú ý đến các quốc gia mới nổi ở Đông Nam Á, và dành thời gian khám phá thị trường mới này. \r\n\r\nMẠNG LƯỚI KINH DOANH\r\nXingfa có mặt khắp nơi trên thế giới: \r\nArgentina, Mỹ, Úc, Bỉ, Brazil, Brunei, Malaysia, Cameroon, Canada, Chile, Đan Mạch, Dominica, Ai Cập, Ethiopia, Fiji, Phần Lan, Pháp, Guiana thuộc Pháp, Đức, Guinea, Guyana, Hungary, Ấn Độ, Indonesia, Israel, Ý, Nhật Bản, Jordan, Campuchia, Hàn Quốc, Lào, Macao, Malaysia, Martinique, Mauritius, Mexico, Nepal, New Zealand, Pakistan, Panama, Philippines, Quatar, Reunion, Romania, Ả Rập Saudi, Singapore, Slovenia, Nam Phi, Tây Ban Nha, Sri Lanka, Thụy Điển, Thái Lan, UAE, Anh, Việt Nam\r\n\r\nXingfa tại Việt Nam:\r\nNhôm Xingfa có mặt tại Việt Nam từ rất sớm và được đông đảo người tiêu dùng cũng như các nhà thầu xây dựng uy tín tin dùng, đánh giá cao bởi những đặc tính ưu việt của nó so với các loại nhôm thông thường. Trong hơn 20 năm phát triển tại thị trường Việt Nam, sản phảm nhôm Xingfa luôn nhận được sự tin tưởng và ủng hộ của đông đảo quý khách hàng.\r\nNhằm mục tiêu nâng cao chất lượng phục vụ, Công ty TNHH Nhôm Xingfa Quảng Đông đã thành lập VPĐD tại thị trường Việt Nam với ba văn phòng đặt tại Hà Nội, Đà Năng và HCM. Ngoài ra chúng tôi cũng có 3 nhà phân phối luôn đồng hành cùng để phục vụ Qúy khách hàng, đó là Công ty TNHH Cửa sổ Việt Châu Á Asean Window, Công ty CP phát triển Công nghệ Việt Ý, Công ty TNHH MTV SX TM Hùng Long.\r\n\r\nVĂN PHÒNG ĐẠI DIỆN CHÍNH THỨC TẠI VIỆT NAM\r\nTRỤ SỞ CHÍNH: Tầng 10, Tòa CharmVit Tower, 117 Trần Duy Hưng, Trung Hòa, Cầu Giấy, Hà Nội\r\nVP MIỀN NAM: 109 Nguyễn Cơ Thạch, Phường An Lợi Đông, Quận 2, TP. HCM\r\nVP MIỀN TRUNG: Số 481 đường 29 tháng 3, Hòa Xuân, Cẩm Lệ, Đà Nẵng\r\nNHÀ PHÂN PHỐI CHÍNH THỨC TẠI VIỆT NAM\r\nCÔNG TY TNHH CỬA SỔ VIỆT Á ASEANWINDOW\r\nĐịa chỉ: A7/40, Ấp 1, Đường Vĩnh Lộc B, Huyện Bình Chánh, TP HCM\r\nCÔNG TY CỔ PHẦN PHÁT TRIỂN CÔNG NGHỆ VIỆT Ý\r\nĐịa chỉ: Lô 5-10A KCN Hoàng Mai, Quậ
