\n\r\nTrực thuộc Tập đoàn Công nghiệp – Viễn thông Quân đội (Viettel) – một doanh nghiệp quốc phòng, an ninh do Nhà nước sở hữu 100% vốn điều lệ dưới sự quản lý trực tiếp của Bộ Quốc phòng, VAM là đơn vị giữ vai trò chiến lược trong phát triển tài sản quốc gia và của Viettel.\r\nTừ hơn 18 năm qua, VAM đã vững vàng tiến bước, xây dựng và vận hành hệ thống tài sản đa dạng và quy mô lớn, với hơn 300 tòa nhà, trung tâm thương mại, hạ tầng khu đô thị, trụ sở cơ quan, công trình phục vụ quốc phòng và các dự án trọng điểm của Nhà nước. \r\nMột số thành tựu nổi bật:\r\n* VAM quản lý vận hành dự án trọng điểm của Bộ Quốc phòng – Trung tâm Phát thanh \u0026 Truyền hình Quân đội – đảm bảo tiêu chuẩn cao về kỹ thuật, bảo trì, an ninh, vận hành chuyên nghiệp.\r\n* Triển khai các dự án hạ tầng số, trung tâm dữ liệu lớn như Tổng Trạm An Khánh, phục vụ không chỉ Viettel mà cả các cơ quan Chính phủ, Bộ Quốc phòng, hệ thống tài chính – ngân hàng, y tế, công nghệ thông tin.\r\nVề sứ mệnh, VAM không chỉ là người xây dựng, quản lý, khai thác tài sản – mà là người kiến tạo môi trường làm việc, cơ sở hạ tầng hiện đại, bền vững, đáp ứng đòi hỏi cao về kỹ thuật, an ninh, thẩm mỹ và vận hành cho Viettel, Bộ Quốc phòng và các đối tác công – tư.\r\nVề định hướng phát triển, VAM mong muốn tiếp tục mở rộng hệ thống tài sản, đa dạng hóa loại hình quản lý, tăng cường công nghệ số, tự động hóa, áp dụng các tiêu chuẩn tiên tiến quốc tế trong quản lý vận hành để nâng cao chất lượng dịch vụ – đồng thời là nơi để nhân viên có cơ hội phát triển chuyên môn cao, tham gia các dự án mang tầm quốc gia."])</script><script>self.__next_f.push([1,"24:T1063,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Nghiên cứu và phân tích thị trường (40%)\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản trị thông tin và phân tích dữ liệu về thị trường bất động sản văn phòng (giá thuê, công suất, nhu cầu khách hàng, đối thủ cạnh tranh, xu hướng phát triển khu vực).\u003c/p\u003e\u003cp\u003e•\tTham mưu, đề xuất với Ban Giám đốc về chiến lược định vị sản phẩm BĐS, mức giá và mô hình khai thác phù hợp từng khu vực, từng giai đoạn phát triển của Công ty.\u003c/p\u003e\u003cp\u003e•\tDự báo xu hướng thị trường để tham mưu chiến lược đầu tư bất động sản, phát triển quỹ văn phòng cho thuê hiệu quả.\u003c/p\u003e\u003cp\u003e•\tCác báo cáo tổng hợp, phân tích dữ liệu hiệu quả, có chất lượng.\u003c/p\u003e\u003cp\u003e•\tBáo cáo chiến lược định vị sản phẩm có sự cạnh tranh và khác biệt mang lại giá trị cho Công ty, Tập đoàn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tư vấn phát triển dự án bất động sản (30%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTư vấn cho các Ban ĐHDA về chiến lược phát triển dự án BĐS từ giai đoạn nghiên cứu tiền khả thi, lập phương án đầu tư, thiết kế đến vận hành khai thác.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với Ban dự án trong xây dựng phương án thiết kế và định hướng phương án vận hành để đảm bảo sản phẩm văn phòng đáp ứng nhu cầu thị trường.\u003c/p\u003e\u003cp\u003e•\tTư vấn cho Ban Giám đốc Công ty về phương án phát triển các sản phẩm Bất động sản văn phòng: mô hình cho thuê linh hoạt (coworking, serviced office, long-term lease...).\u003c/p\u003e\u003cp\u003e•\tĐảm bảo tối đa hóa khả năng cho thuê các dự án Bất động sản\u003c/p\u003e\u003cp\u003e•\tHình ảnh và uy tín các sản phẩm BĐS được nâng cao trên thị trường trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản lý, xây dựng chiến lược khai thác tài sản (10%)\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý công tác xây dựng chiến lược, lập kế hoạch khai thác, đánh giá hiệu quả việc khai thác vận hành của danh mục các tài sản văn phòng hiện hữu (tỷ lệ lấp đầy, doanh thu, chi phí vận hành).\u003c/p\u003e\u003cp\u003e•\tTư vấn các chính sách, quy trình cho thuê, quản lý khách hàng, chăm sóc khách hàng doanh nghiệp.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ đàm phán, ký kết hợp đồng thuê, gia hạn, chấm dứt hợp đồng.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo tỷ lệ lấp đầy vượt kế hoạch.\u003c/p\u003e\u003cp\u003e•\tChính sách linh hoạt, quy trình phù hợp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản lý quan hệ khách hàng và thương hiệu sản phẩm (10%)\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý và phát triển mạng lưới đối tác tập khách hàng thuê chiến lược (tập đoàn, doanh nghiệp công nghệ, ngân hàng, tổ chức quốc tế...).\u003c/p\u003e\u003cp\u003e•\tTư vấn chiến lược phát triển thương hiệu bất động sản Viettel Asset.\u003c/p\u003e\u003cp\u003e•\tTư vấn xu hướng không gian làm việc xanh, thông minh, ứng dụng công nghệ trong quản lý vận hành tài sản.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo quản lý và duy trì mối quan hệ với khách hàng mục tiêu, có phương pháp tiếp cận khách hàng mục tiêu hiệu quả.\u003c/p\u003e\u003cp\u003e•\tNâng cao uy tín và thương hiệu Viettel\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Quản lý nội bộ và phát triển đội ngũ (10%)\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý và đào tạo, bồi dưỡng cán bộ, xây dựng đội ngũ chuyên môn về tư vấn phát triển BĐS khai thác cho thuê sản phẩm văn phòng.\u003c/p\u003e\u003cp\u003e•\tTư vấn việc xây dựng, chuẩn hóa và giám sát thực hiện quy trình quản trị, vận hành bảo đảm minh bạch, hiệu quả.\u003c/p\u003e\u003cp\u003e•\tKiểm soát các cơ chế kiểm tra, giám sát, đánh giá cán bộ, bảo đảm năng lực, phẩm chất đáp ứng yêu cầu lâu dài.\u003c/p\u003e\u003cp\u003e•\tĐội ngũ cán bộ có chuyên môn sâu, năng lực cao\u003c/p\u003e\u003cp\u003e•\tHệ thống quản lý chuyên nghiệp, minh bạch; bảo đảm tính kế thừa, ổn định trong phát triển nguồn nhân lực.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T553,\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học bằng Khá trở lên các ngành: Bất động sản, Kinh tế, Quản trị Kinh doanh, Xây dựng, Quy hoạch.\u003c/p\u003 hiết kế và định hướng phương án vận hành để đảm bảo sản phẩm văn phòng đáp ứng nhu cầu thị trường.\u003c/p\u003e\u003cp\u003e•\tTư vấn cho Ban Giám đốc Công ty về phương án phát triển các sản phẩm Bất động sản văn phòng: mô hình cho thuê linh hoạt (coworking, serviced office, long-term lease...).\u003c/p\u003e\u003cp\u003e•\tĐảm bảo tối đa hóa khả năng cho thuê các dự án Bất động sản\u003c/p\u003e\u003cp\u003e•\tHình ảnh và uy tín các sản phẩm BĐS được nâng cao trên thị trường trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản lý, xây dựng chiến lược khai thác tài sản (10%)\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý công tác xây dựng chiến lược, lập kế hoạch khai thác, đánh giá hiệu quả việc khai thác vận hành của danh mục các tài sản văn phòng hiện hữu (tỷ lệ lấp đầy, doanh thu, chi phí vận hành).\u003c/p\u003e\u003cp\u003e•\tTư vấn các chính sách, quy trình cho thuê, quản lý khách hàng, chăm sóc khách hàng doanh nghiệp.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ đàm phán, ký kết hợp đồng thuê, gia hạn, chấm dứt hợp đồng.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo tỷ lệ lấp đầy vượt kế hoạch.\u003c/p\u003e\u003cp\u003e•\tChính sách linh hoạt, quy trình phù hợp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản lý quan hệ khách hàng và thương hiệu sản phẩm (10%)\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý và phát triển mạng lưới đối tác tập khách hàng thuê chiến lược (tập đoàn, doanh nghiệp công nghệ, ngân hàng, tổ chức quốc tế...).\u003c/p\u003e\u003cp\u003e•\tTư vấn chiến lược phát triển thương hiệu bất động sản Viettel Asset.\u003c/p\u003e\u003cp\u003e•\tTư vấn xu hướng không gian làm việc xanh, thông minh, ứng dụng công nghệ trong quản lý vận hành tài sản.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo quản lý và duy trì mối quan hệ với khách hàng mục tiêu, có phương pháp tiếp cận khách hàng mục tiêu hiệu quả.\u003c/p\u003e\u003cp\u003e•\tNâng cao uy tín và thương hiệu Viettel\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Quản lý
