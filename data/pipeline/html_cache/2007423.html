đúng tiến độ cho các dự án mà chúng tôi thực hiện.\r\n\r\nSỨ MỆNH\r\nVới khẩu hiệu: “Làm sao chúng ta có thể làm tốt hơn nữa”, chúng tôi phấn đấu đem đến:\r\n•\tNhững thiết kế và công trình chất lượng hoàn hảo;\r\n•\tAn toàn lao động tuyệt đối nơi công trình;\r\n•\tTrách nhiệm với môi trường và khu vực lân cận;\r\n•\tVăn hóa ứng xử với khách hàng và nhân viên;\r\n•\tDự toán chuẩn về chi phí xây dựng, thành phẩm, sửa chữa, và thiết bị theo nhu cầu của Chủ đầu tư.\r\n\r\nGIÁ TRỊ CỐT LÕI\r\n\r\nTin cậy - Danh dự - Thích nghi - Lạc quan\r\nINCONS đã thành công trong việc tạo dựng tên tuổi hàng đầu của mình trong lĩnh vực Tổng thầu Thiết kế - Xây dựng và Quản lý Dự án hơn 15 năm qua với những công trình và dự án lớn ở những thành phố lớn và tiêu biểu của Việt Nam như Hà Nội, Đà Nẵng, Nha Trang, Phan Thiết và Thành Phố Hồ Chí Minh. INCONS đã tạo dựng một đội ngũ nhân sự tài năng và nhiều kinh nghiệm bao gồm cả các chuyên gia kỳ cựu nước ngoài. INCONS có một hệ thống quản lý tốt, có năng lưc thi công nhanh với chi phí hợp lý và đang hướng đến trở thành một công ty hàng đầu Việt Nam về Tổng thầu Thiết kế - Xây dựng và Quản lý Dự án."])</script><script>self.__next_f.push([1,"24:Te87,"])</script><script>self.__next_f.push([1,"Thành lập năm 2010, hơn 15 năm qua INCONS đã thành công về tên tuổi hàng đầu của mình trong lĩnh vực Tổng thầu Thiết kế Xây dựng ở những thành phố lớn và tiêu biểu của Việt Nam như: Hà Nội, Đà Nẵng, Nha Trang, Phan Thiết và Thành Phố Hồ Chí Minh … Những nơi mà chất lượng xây dựng đòi hỏi cao trong thiết kế, an toàn xây dựng là trên hết, tiến độ công trình đúng hạn là bắt buộc, và không phát sinh chi phí … tạo nên sự cạnh tranh tuyệt đối tại thị trường Việt Nam.\r\n\r\nVới nguồn nhân lực năng động, chuyên sâu, cùng hệ thống quản lý chuyên nghiệp, công nghệ tiên tiến, INCONS tự tin có đủ năng lực thực hiện trọn gói mọi dự án từ thiết kế đến xây dựng, quản lý và thi công các công trình cao tầng, khách sạn, khu nghỉ dưỡng, nhà xưởng công nghiệp … Hàng loạt các công trình quy mô trên khắp cả nước cũng như sự đánh giá cao từ các Đối tác, Chủ đầu tư trong – ngoài nước là minh chứng thực tế cho thành công hôm nay của INCONS.\r\n\r\nTương lai không chỉ dừng lại ở những số liệu tăng trưởng trên thương trường, vì vậy, không ngừng sáng tạo và hiện thực hóa những ý tưởng táo bạo, luôn bắt kịp xu hướng thiết kế và kỹ thuật hiện đại của thế giới chính là kim chỉ nam đưa INCONS tự tin tiến vào tương lai, trở thành một trong những thương hiệu Tổng thầu Xây dựng hàng đầu Việt Nam.\r\n\r\nTẦM NHÌN\r\n•\tCam kết trở thành Đối tác hàng đầu trong việc lựa chọn nhà thầu của Chủ đầu tư.\r\n•\tLuôn theo đuổi chất lượng hoàn hảo thông qua sự cống hiến, sự chính trực … của đội ngũ nhân viên giàu kinh nghiệm và nhiều đam mê, quyết tâm mang đến hiệu suất, chất lượng, lợi nhuận và luôn đúng tiến độ cho các dự án mà chúng tôi thực hiện.\r\n\r\nSỨ MỆNH\r\nVới khẩu hiệu: “Làm sao chúng ta có thể làm tốt hơn nữa”, chúng tôi phấn đấu đem đến:\r\n•\tNhững thiết kế và công trình chất lượng hoàn hảo;\r\n•\tAn toàn lao động tuyệt đối nơi công trình;\r\n•\tTrách nhiệm với môi trường và khu vực lân cận;\r\n•\tVăn hóa ứng xử với khách hàng và nhân viên;\r\n•\tDự toán chuẩn về chi phí xây dựng, thành phẩm, sửa chữa, và thiết bị theo nhu cầu của Chủ đầu tư.\r\n\r\nGIÁ TRỊ CỐT LÕI\r\nTin cậy - Danh dự - Thích nghi - Lạc quan\r\n\r\nDỊCH VỤ\r\n\r\n1. DỊCH VỤ TỔNG THẦU THIẾT KẾ THI CÔNG:\r\n\r\nVới bề dày kinh nghiệm trong việc cung cấp đầy đủ các dịch vụ xây lắp, thời gian qua INCONS đã thi công nhiều công trình tầm cỡ gồm: các tòa nhà thương mại, nhà cao tầng, khách sạn và khu nghỉ dưỡng liên hợp, các dự án công nghiệp, các dự án phức hợp tại sân bay.\r\n\r\n2. QUẢN LÝ DỰ ÁN, TƯ VẤN GIÁM SÁT, TƯ VẤN ĐẤU  THẦU:\r\n\r\nINCONS phát triển các dự án bất động sản có chất lượng cao về mọi phương diện: quản lý dự án, quản lý chi phí, tư vấn giám sát, tư vấn đấu thầu, quy hoạch, thiết kế, thi công, trang trí nội thất, phân phối… nhằm đáp ứng nhu cầu ngày một khắt khe
