m việc trên thị trường đầy đủ, hiệu quả.\u003c/p\u003e\u003cp\u003e- Chi trì các cuộc họp rà soát, triển khai hàng tháng với đội ngũ nhân viên trong khu vực.\u003c/p\u003e\u003cp\u003e- Dao tạo, huấn luyện nhân viên; hỗ trợ nhân viên cải thiện kỹ nang, Quản lý nhân viên trong bộ phận để dat được kết quả kinh doanh và chỉ tiêu đề ra.\u003c/p\u003e\u003cp\u003e- Thường xuyên quan tâm, hỗ trợ nhân viên cấp dưới của mình để kịp thời giải quyết khi có vấn đề xảy ra.\u003c/p\u003e\u003cp\u003e- Kiém soát, quản lý được hiệu quả, tiến độ công việc của các nhân viên cũng như đảm bảo hệ thống báo cáo, đo lường KPI/scorecard đầy đủ, chính xác, hiệu quả.\u003c/p\u003e\u003cp\u003e- Thực hiện khen thưởng, xử lý kỷ luật rõ ràng cũng như khích lệ đúng lúc, phát huy tinh thần làm việc tích cực, hăng hái.\u003c/p\u003e\u003cp\u003e- Xây dựng và thực hiện kế hoạch phát triển nhân viên, và giúp từng thành viên phát triển nghề nghiệp chuyên môn tại Mesa.\u003c/p\u003e\u003cp\u003e- Quản lý các vấn đề liên quan đến chỉ tiêu và ngân sách.\u003c/p\u003e\u003cp\u003e- Thực hiện Báo cáo chính xác và tuân thủ theo đúng thời gian quy định.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T1823,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKiến thức về Kinh Doanh - Technical Logistics mastery\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thành thạo các phần mềm bán hàng và các công cụ, báo cáo đo lường yếu tố nền tảng, phân phối và dữ liệu bán hàng.\u003c/p\u003e\u003cp\u003e• Thành thạo hồ sơ pháp lý và các thủ tục, giấy tờ liên quan đàm phán, thỏa thuận với với khách hàng.\u003c/p\u003e\u003cp\u003e• Biết phân tích dữ liệu kinh doanh, vấn đề để đưa ra quyết định hoặc đề nghị đúng đắn, kịp thời kèm theo các đánh giá rủi ro.\u003c/p\u003e\u003cp\u003e• Lập kế hoạch ngân sách, kế hoạch chỉ tiêu hàng năm và theo dõi chúng. Điều đình giá cả và quản lý bán hàng dựa trên tuân thủ các chính sách giá cả, tín dụng của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiao tiếp \u0026 thuyết phục hiệu quả - Effective communication \u0026 influencing\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có khả năng giao tiếp thuyết phục và chuyên nghiệp.\u003c/p\u003e\u003cp\u003e• Thông báo các nhóm các thay đổi, sự kiện quan trọng.\u003c/p\u003e\u003cp\u003e• Tổ chức và điều phối các buổi họp nhóm.\u003c/p\u003e\u003cp\u003e• Truyền đạt thông tin đầy đủ để nhóm làm việc hiệu quả.\u003c/p\u003e\u003cp\u003e• Báo cáo thông tin lên cấp trên hiệu quả.\u003c/p\u003e\u003cp\u003e• Nắm vững được điểm mạnh, điểm cần cải thiện của nhân viên và xây dựng kế hoạch để huấn luyện cho nhân viên của mình.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLãnh đạo \u0026 Làm việc nhóm - Leadership \u0026 Team work\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Đưa ra tầm nhìn, nhận ra cơ hội và hình thành một định hướng về những gì có thể đạt được.\u003c/p\u003e\u003cp\u003e• Lôi kéo, tạo điều kiện, thúc đẩy nhân viên phấn khởi, tự tin, mơ ước lớn. Gặt hái những thành công vượt bậc thông qua nhân viên của mình.\u003c/p\u003e\u003cp\u003e• Làm gương nhân viên bằng cách luôn làm việc và hành xử theo các giá trị văn hóa Công ty.\u003c/p\u003e\u003cp\u003e• Kết nối hiệu quả với các phòng ban liên quan.\u003c/p\u003e\u003cp\u003e• Khuyến khích người khác, lắng nghe ý tưởng của họ và biến thành hành động.\u003c/p\u003e\u003cp\u003e• Hiểu rõ vai trò trách nhiệm của từng thành viên trong tổ chức, tôn trọng và chia sẻ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý khách hàng / đối tác - client management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng mối quan hệ tốt với các đối tác.\u003c/p\u003e\u003cp\u003e• Tạo sự tin tưởng đối với các đối tác và đồng nghiệp khi có cơ hội giao tiếp; làm việc.\u003c/p\u003e\u003cp\u003e• Nắm bắt các thông tin và chia sẻ thông tin chính xác.\u003c/p\u003e\u003cp\u003e• Luôn có thái độ thiện chí và đáp ứng một cách tốt nhất yêu cầu của đối tác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhát triển con người — human development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Hiểu rõ vai trò trách nhiệm của từng thành viên trong tổ chức.\u003c/p\u003e\u003cp\u003e• Đảm bảo tất cả thành viên trong tổ chức tuân thủ đúng quy trình làm việc và luôn cải thiện quy trình nhằm đáp ứng công việc một cách hiệu quả nhất theo mục tiêu chung của tổ chức.\u003c/p\u003e\u003cp\u003e• Tiếp thu những ý kiến phản hồi để luôn luôn cải thiện và phát triển khả năng của mình.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhù hợp với văn hóa công ty- Agility to adopt with company culture\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có khả năng thích nghi nhanh chóng với môi trường và chịu được áp lực công việc.\u003c/p\u003e\u003cp\u003e• Am hiểu thủ tục hồ sơ, giấy tờ pháp lý và các quy định về thủ tục hồ sơ của Công ty.\u003c/p\u003e\u003cp\u003e• Phù hợp với văn hóa công ty: Làm điều đúng, Hướng đến mục tiêu chung; Trao quyền hiệu quả; Học hỏi và cải tiến không ngừng; Tôn trọng và tin tưởng năng lực mỗi cá nhân. Cam kết và chịu trách nhiệm thực thi văn hóa Công ty để tạo ra giá trị vì tổ chức.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm, chủ động, tập trung vào kết quả - responsible, proactive \u0026 result oriented\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có trách nhiệm công việc cao, chủ động đề ra kế hoạch thực thi.\u003c/p\u003e\u003cp\u003e• Năng động tìm mọi cách để đạt kết quả cuối cùng.\u003c/p\u003e\u003cp\u003e• Đưa ra quyết định nhanh chóng, phù hợp để giúp kinh doanh phát triển.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSáng tạo, đổi mới nhưng kiên định — creative, innovative but persistent \u0026 resilient\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Làm việc với tinh thần chủ động, cải tiến và đề ra mục tiêu thách thức để thực hiện.\u003c/p\u003e\u003cp\u003e• Khuyến khích ý tưởng cấp tiến, sự khác biệt, thách thức các giả thiết.\u003c/p\u003e\u003cp\u003e• Tạo động lực đối với các thành viên khác để cùng tham gia.\u003c/p\u003e\u003cp\u003e• Không dễ bỏ cuộc, tìm ra cách thức hoạt động hiệu quả nhất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm xã hội — social responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Dẫn đầu các chương trình xã hội bền vững, an toàn, sức khỏe, xanh trong mọi chính sách và hoạt động.\u003c/p\u003e\u003cp\u003e• Sử dụng hiệu quả và tiết kiệm các nguồn lực, chi phí.\u003c/p\u003e\u003cp\u003e• Công việc nội bộ — internal operations\u003c/p\u003e\u003cp\u003e• Thực thi các quy trình, thủ tục.\u003c/p\u003e\u003cp\u003e• Thực hiện công việc theo quy trình và trách nhiệm.\u003c/p\u003e\u003cp\u003e• Thực hiện báo cáo kịp thời theo quy định.\u003c/p\u003e\u003cp\u003e• Rà soát và xem xét báo cáo nhân viên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCác yêu cầu khác — others requirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kinh nghiệm và kỹ năng cần thiết\u003c/p\u003e\u003cp\u003e  - 5 kinh nghiệm làm việc tại vị trí Quản lý, huấn luyện, đào tạo đội ngũ bán hàng và ít nhất 5 năm trong lĩnh vực Phân phối.\u003c/p\u003e\u003cp\u003e  - Am hiểu về hoạt động Công ty phân phối và bán lẻ.\u003c/p\u003e\u003cp\u003e  - Tiếng Anh giao tiếp.\u003c/p\u003e\u003cp\u003e• Các yêu cầu khác:\u003c/p\u003e\u003cp\u003e  - Tốt nghiệp Đại Học - Chuyên ngành Quản trị kinh doanh hoặc chuyên ngành liên quan.\u003c/p\u003e\u003cp\u003e  - Ngoại hình, tác phong và sức khỏe tốt.\u003c/p\u003e\u003cp\u003e  - Có thể đi công tác xa (Tỉnh, chi nhánh).\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Ta0d,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Thống nhất kế hoạch chiến lược thị trường, các mục tiêu kinh doanh và triển khai kế hoạch hành động tháng/quý/năm cho khu vực.\u003c/p\u003e\u003cp\u003e- Triển khai và đạt được các chỉ tiêu về bao trùm, năng suất bán hàng, phân phối, bày biện hàng hóa hiện diện tại quầy kệ và các chỉ tiêu yếu tố nền tảng khác.\u003c/p\u003e\u003cp\u003e- Triển khai và kiểm soát thực hiện các chương trình khuyến mãi, trưng bày hiệu quả và đảm bảo việc sử dụng, kiểm soát ngân sách hiệu quả.\u003c/p\u003e\u003cp\u003e- Tim kiếm, phát triển khách hàng mới và xây dựng, duy trì mối quan hệ tốt với các Khách hàng chiến lược, tận dụng tối đa lợi thế có được để gia tăng doanh số.\u003c/p\u003e\u003cp\u003e- Hoach định bao trùm trong khu vực và định kỳ cải tiến mô hình bao trùm dựa trên các tính toán và thống nhất hiệu quả chỉ phí đầu tư với các phòng ban liên quan.\u003c/p\u003e\u003cp\u003e- Theo dõi và phân tích Kết quả kinh doanh trong khu vực, lên kế hoạch cải thiện, điều chỉnh kịp thời và triển khai, giám sát thực hiện để đạt được mục tiêu đề ra.\u003c/p\u003e\u003cp\u003e- Thuong xuyên đi thực tế thị trường và duy trì lịch làm việc trên thị trường đầy đủ, hiệu quả.\u003c/p\u003e\u003cp\u003e- Chi trì các cuộc họp rà soát, triển khai hàng tháng với đội ngũ nhân viên trong khu vực.\u003c/p\u003e\u003cp\u003e- Dao tạo, huấn luyện nhân viên; hỗ trợ nhân viên cải thiện kỹ nang, Quản lý nhân viên trong bộ phận để dat được kết quả kinh doanh và chỉ tiêu đề ra.\u003c/p\u003e\u003cp\u003e- Thường xuyên quan tâm, hỗ trợ nhân viên cấp dưới của mình để kịp thời giải quyết khi có vấn đề xảy ra.\u003c/p\u003e\u003cp\u003e- Kiém soát, quản lý được hiệu quả, tiến độ công việc của các nhân viên cũng như đảm bảo hệ thống báo cáo, đo lường KPI/scorecard đầy đủ, chính xác, hiệu quả.\u003c/p\u003e\u003cp\u003e- Thực hiện khen thưởng, xử lý kỷ luật rõ ràng cũng như khích lệ đúng lúc, phát huy tinh thần làm việc tích cực, hăng hái.\u003c/p\u003e\u003cp\u003e- Xây dựng và thực hiện kế hoạch phát triển nhân viên, và giúp từng thành viên phát triển nghề nghiệp chuyên môn tại Mesa.\u003c/p\u003e\u003cp\u003e- Quản lý các vấn đề liên quan đến chỉ tiêu và ngân sách.\u003c/p\u003e\u003cp\u003e- Thực hiện Báo cáo chính xác và tuân thủ theo đúng thời gian quy định.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:T1823,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKiến thức về Kinh Doanh - Technical Logistics mastery\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thành thạo các phần mềm bán hàng và các công cụ, báo cáo đo lường yếu tố nền tảng, phân phối và dữ liệu bán hàng.\u003c/p\u003e\u003cp\u003e• Thành thạo hồ sơ pháp lý và các thủ tục, giấy tờ liên quan đàm phán, thỏa thuận với với khách hàng.\u003c/p\u003e\u003cp\u003e• Biết phân tích dữ liệu kinh doanh, vấn đề để đưa ra quyết định hoặc đề nghị đúng đắn, kịp thời kèm theo các đánh giá rủi ro.\u003c/p\u003e\u003cp\u003e• Lập kế hoạch ngân sách, kế hoạch chỉ tiêu hàng năm và theo dõi chúng. Điều đình giá cả và quản lý bán hàng dựa trên tuân thủ các chính sách giá cả, tín dụng của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiao tiếp \u0026 thuyết phục hiệu quả - Effective communication \u0026 influencing\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có khả năng giao tiếp thuyết phục và chuyên nghiệp.\u003c/p\u003e\u003cp\u003e• Thông báo các nhóm các thay đổi, sự kiện quan trọng.\u003c/p\u003e\u003cp\u003e• Tổ chức và điều phối các buổi họp nhóm.\u003c/p\u003e\u003cp\u003e• Truyền đạt thông tin đầy đủ để nhóm làm việc hiệu quả.\u003c/p\u003e\u003cp\u003e• Báo cáo thông tin lên cấp trên hiệu quả.\u003c/p\u003e\u003cp\u003e• Nắm vững được điểm mạnh, điểm cần cải thiện của nhân viên và xây dựng kế hoạch để huấn luyện cho nhân viên của mình.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLãnh đạo \u0026 Làm việc nhóm - Leadership \u0026 Team work\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Đưa ra tầm nhìn, nhận ra cơ hội và hình thành một định hướng về những gì có thể đạt được.\u003c/p\u003e\u003cp\u003e• Lôi kéo, tạo điều kiện, thúc đẩy nhân viên phấn khởi, tự tin, mơ ước lớn. Gặt hái những thành công vượt bậc thông qua nhân viên của mình.\u003c/p\u003e\u003cp\u003e• Làm gương nhân viên bằng cách luôn làm việc và hành xử theo các giá trị văn hóa Công ty.\u003c/p\u003e\u003cp\u003e• Kết nối hiệu quả với các phòng ban liên quan.\u003c/p\u003e\u003cp\u003e• Khuyến khích người khác, lắng nghe ý tưởng của họ và biến thành hành động.\u003c/p\u003e\u003cp\u003e• Hiểu rõ vai trò trách nhiệm của từng thành viên trong tổ chức, tôn trọng và chia sẻ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý khách hàng / đối tác - client management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng mối quan hệ tốt với các đối tác.\u003c/p\u003e\u003cp\u003e• Tạo sự tin tưởng đối với các đối tác và đồng nghiệp khi có cơ hội giao tiếp; làm việc.\u003c/p\u003e\u003cp\u003e• Nắm bắt các thông tin và chia sẻ thông tin chính xác.\u003c/p\u003e\u003cp\u003e• Luôn có thái độ thiện chí và đáp ứng một cách tốt nhất yêu cầu của đối tác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhát triển con người — human development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Hiểu rõ vai trò trách nhiệm của từng thành viên trong tổ chức.\u003c/p\u003e\u003cp\u003e• Đảm bảo tất cả thành viên trong tổ chức tuân thủ đúng quy trình làm việc và luôn cải thiện quy trình nhằm đáp ứng công việc một cách hiệu quả nhất theo mục tiêu chung của tổ chức.\u003c/p\u003e\u003cp\u003e• Tiếp thu những ý kiến phản hồi để luôn luôn cải thiện và phát triển khả năng của mình.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhù hợp với văn hóa công ty- Agility to adopt with company culture\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có khả năng thích nghi nhanh chóng với môi trường và chịu được áp lực công việc.\u003c/p\u003e\u003cp\u003e• Am hiểu thủ tục hồ sơ, giấy tờ pháp lý và các quy định về thủ tục hồ sơ của Công ty.\u003c/p\u003e\u003cp\u003e• Phù hợp với văn hóa công ty: Làm điều đúng, Hướng đến mục tiêu chung; Trao quyền hiệu quả; Học hỏi và cải tiến không ngừng; Tôn trọng và tin tưởng năng lực mỗi cá nhân. Cam kết và chịu trách nhiệm thực thi văn hóa Công ty để tạo ra giá trị vì tổ chức.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm, chủ động, tập trung vào kết quả - responsible, proactive \u0026 result oriented\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có trách nhiệm công việc cao, chủ động đề ra kế hoạch thực thi.\u003c/p\u003e\u003cp\u003e• Năng động tìm mọi cách để đạt kết quả cuối cùng.\u003c/p\u003e\u003cp\u003e• Đưa ra quyết định nhanh chóng, phù hợp để giúp kinh doanh phát triển.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSáng tạo, đổi mới nhưng kiên định — creative, innovative but persistent \u0026 resilient\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Làm việc với tinh thần chủ động, cải tiến và đề ra mục tiêu thách thức để thực hiện.\u003c/p\u003e\u003cp\u003e• Khuyến khích ý tưởng cấp tiến, sự khác biệt, thách thức các giả thiết.\u003c/p\u003e\u003cp\u003e• Tạo động lực đối với các thành viên khác để cùng tham gia.\u003c/p\u003e\u003cp\u003e• Không dễ bỏ cuộc, tìm ra cách thức hoạt động hiệu quả nhất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm xã hội — social responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Dẫn đầu các chương trình xã hội bền vững, an toàn, sức khỏe, xanh trong mọi chính sách và hoạt động.\u003c/p\u003e\u003cp\u003e• Sử dụng hiệu quả và tiết kiệm các nguồn lực, chi phí.\u003c/p\u003e\u003cp\u003e• Công việc nội bộ — internal operations\u003c/p\u003e\u003cp\u003e• Thực thi các quy trình, thủ tục.\u003c/p\u003e\u003cp\u003e• Thực hiện công việc theo quy trình và trách nhiệm.\u003c/p\u003e\u003cp\u003e• Thực hiện báo cáo kịp thời theo quy định.\u003c/p\u003e\u003cp\u003e• Rà soát và xem xét báo cáo nhân viên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCác yêu cầu khác — others requirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kinh nghiệm và kỹ năng cần thiết\u003c/p\u003e\u003cp\u003e  - 5 kinh nghiệm làm việc tại vị trí Quản lý, huấn luyện, đào tạo đội ngũ bán hàng và ít nhất 5 năm trong lĩnh vực Phân phối.\u003c/p\u003e\u003cp\u003e  - Am hiểu về hoạt động Công ty phân phối và bán lẻ.\u003c/p\u003e\u003cp\u003e  - Tiếng Anh giao tiếp.\u003c/p\u003e\u003cp\u003e• Các yêu cầu khác:\u003c/p\u003e\u003cp\u003e  - Tốt nghiệp Đại Học - Chuyên ngành Quản trị kinh doanh hoặc chuyên ngành
