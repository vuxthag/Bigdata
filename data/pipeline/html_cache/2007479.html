f9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T718,September 19, 2019 - One Mount was established with the ambition of building Vietnam's most trusted ecosystem, empowering all people and businesses to realize their full potential at the intersection of technology and humanity. Our main products include:\r\n\r\n1. VinShop (operated under One Mount Distribution), a dedicated retail app enabling independent shop owners to grow their business via tech enabled supply chain and inventory management\r\n2. VinID (operated under One Mount Consumer), a super app and Vietnam's largest consumer loyalty program integrating many functions such as payment, housing management, goods purchase, and financial services\r\n3. OneHousing (operated under One Mount Real Estate), a one-stop destination for all needs in housing, supporting buying, selling, investing and other real-estate-related services.\r\n\r\n\r\nOUR WORK: All employees are empowered to grow their most meaningful careers at One Mount. "])</script><script>self.__next_f.push([1,"With every single new feature launched, every innovation implemented, and every market challenge solved, One Mount Staff are proud to be making positive changes on Vietnamese people's daily lives by leveraging the advantages of technological sophistication. \r\nTo us, the value of work creates strong motivation for continuous learning, remarkable innovation and outcomes-driven spirit.\r\n\r\nOUR LIFE: The inspiring purpose and fast-pace of work quickly makes One Mount become a second home for talents across the globe. The variance in age, gender, regions and perspectives shaped  the cultural diversity, fosters team creativity, and increases employee engagement. \r\nOne Mount chooses to promote the \"Success Culture\" with 5 core values probably stated as Result-driven, Breakthrough perspectives, Business mindset, Collaboration and Efficiency in the journey of creating values for all.24:Tf23,"])</script><script>self.__next_f.push([1,"\u003cp\u003eChúng tôi đang tìm kiếm Chuyên Gia An Ninh Nội Bộ / Investigation Specialist có kinh nghiệm trong lĩnh vực điều tra, kiểm soát gian lận, làm việc với cơ quan chức năng và đảm bảo an ninh hệ thống doanh nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eVị trí phù hợp với ứng viên từng làm tại:\u003c/p\u003e\u003cp\u003e- Công an\u003c/p\u003e\u003cp\u003e- Bộ đội\u003c/p\u003e\u003cp\u003e- Ngân hàng\u003c/p\u003e\u003cp\u003e- Internal Control / Compliance\u003c/p\u003e\u003cp\u003e- Fraud Investigation\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tTham gia xây dựng hệ thống quy định, quy trình, hướng dẫn đầy đủ, hiệu quả và phù hợp với chức năng, nhiệm vụ và thực tế hoạt động.\u003c/p\u003e\u003cp\u003e•\tThiết lập địa bàn được giao một cách khoa học, phù hợp với mô hình quản trị của công ty, qua đó tổ chức công tác an ninh địa bàn được đảm bảo hiệu quả, an toàn, bí mật. Mục tiêu xây dựng bản đồ vùng trũng có nguy cơ cao xảy ra rủi ro gian lận và dự báo những vấn đề phức tạp có thể xảy ra liên quan đến an ninh hệ thống và tổ chức các biện pháp phòng ngừa kịp thời.\u003c/p\u003e\u003cp\u003e•\tThực hiện công tác phát hiện, điều tra, ngăn chặn, đề xuất xử lý vi phạm, biện pháp khắc phục phòng ngừa tiêu cực, tham nhũng, gian lận có \u003cstrong\u003e\u003cem\u003ecấp độ rất nghiêm trọng\u003c/em\u003e\u003c/strong\u003e phát sinh từ bên trong và bên ngoài.\u003c/p\u003e\u003cp\u003e•\tThực hiện phối hợp an ninh với các đơn vị trong hệ sinh thái như TCB, Masan, MH, Vingroup… theo chỉ đạo.\u003c/p\u003e\u003cp\u003e•\tTìm kiếm, thiết lập, duy trì các mối quan hệ công hữu ích: Trực tiếp tìm kiếm, thiết lập, duy trì các mối quan hệ công hữu ích tại các cơ quan Nhà nước, cơ quan thực thi pháp luật, tư pháp (Công an, Tòa án, Viện kiểm sát, Thi hành án…), các đối tác doanh nghiệp, các cá nhân có tác dụng, ảnh hưởng trên phạm vi Trung ương và các địa bàn dự án.\u003c/p\u003e\u003cp\u003e•\tThực hiện công tác đối ngoại: Liên hệ, làm việc với các cơ quan Nhà nước, các đối tác, doanh nghiệp và các cá nhân để xử lý, giải quyết các công việc tranh chấp, xung đột lợi ích, các vụ việc liên quan  nhằm đảm bảo lợi ích triệt để và hợp pháp cho Tập đoàn.\u003c/p\u003e\u003cp\u003e•\tTham gia một số hoạt động đảm bảo công tác an ninh, an toàn: Tham gia triển khai một số công tác đảm bảo an ninh an toàn và trực tiếp ngăn chặn nhân tố mất an ninh an toàn về tài sản, tính mạng, sức khỏe của con người, cơ sở vật chất cho Tập đoàn; Trực tiếp xử lý một số tình huống mất an ninh, an toàn khẩn cấp như cháy nổ, dịch bệnh, CBNV bị đe dọa, tấn công … ở tất cả các cấp độ (rất thấp - rất cao); Trực tiếp tham gia một số chiến dịch hành động chống lại các động thái tấn công từ bên ngoài theo từng sự vụ trên cơ sở kết hợp với các hệ thống nội bộ và các cơ quan bảo vệ pháp luật ở các địa phương.\u003c/p\u003e\u003cp\u003e•\tKiểm soát, phòng ngừa rủi ro liên quan đến các khoản phải thu; phối hợp xây dựng và triển khai phương án thu hồi.\u003c/p\u003e\u003cp\u003e•\tThực hiện theo ủy quyền tố giác hình sự, khởi kiện dân sự (khi có yêu cầu) gồm: các công việc tại giai đoạn tiền tố tụng, tố tụng, thi hành án và làm việc, phối hợp với Tòa án, Viện kiểm sát, Thi hành án và các cơ quan chức năng liên quan.\u003c/p\u003e\u003cp\u003e•\tThực hiện các nhiệm vụ khác theo yêu cầu của Giám đốc An ninh nội bộ và Giám đốc Ban An ninh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T9cd,"])</script><script>self.__next_f.push([1,"\u003cp\u003e•\tTốt nghiệp đại học chính quy trở lên (ưu tiên các chuyên ngành Kinh tế, Quản trị, Luật, Công an hoặc tương đương).\u003c/p\u003e\u003cp\u003e•\t05 năm kinh nghiệm làm việc trong lĩnh vực điều tra, an ninh, kiểm soát nội bộ hoặc lĩnh vực chuyên môn tương đương.\u003c/p\u003e\u003cp\u003e•\tCó kiến thức bao quát về các rủi ro trong các hoạt động kinh doanh: công nghệ, bán lẻ, bất động sản, tài chính, chuỗi cung ứng.\u003c/p\u003e\u003cp\u003e•\tAm hiểu việc vận hành các thiết bị kỹ thuật nghiệp vụ; am hiểu công nghệ và có khả năng áp dụng kiến thức vào công việc hiệu quả.\u003c/p\u003e\u003cp\u003e•\tCó khả năng thống kê, phân tích dữ liệu, khả năng dự báo, phát hiện bất thường theo các mục tiêu đã đề ra.\u003c/p\u003e\u003cp\u003e•\tKhả năng thực hiện công việc độc lập; làm việc dưới áp lực.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên từng làm việc tại Công an, Quân đội, Ngân hàng, tập đoàn lớn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eLương \u0026 Phụ cấp:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLương cứng cạnh tranh.\u003c/p\u003e\u003cp\u003e•\tLương tháng 13, thưởng hiệu quả theo quý, thưởng dự án, thưởng hiệu quả công việc cuối năm.\u003c/p\u003e\u003cp\u003e•\tPhụ cấp ăn trưa: 730.000đ/tháng.\u003c/p\u003e\u003cp\u003e•\tPhép năm: 18 ngày/năm (chưa bao gồm 1 ngày nghỉ sinh nhật, ngày nghỉ lễ theo lịch nhà nước).\u003c/p\u003e\u003cp\u003e•\tSức khỏe: Bảo hiểm xã hội, bảo hiểm sức khỏe, khám định kỳ hàng năm.\u003c/p\u003e\u003cp\u003e•\tMáy tính xách tay, màn hình và các phương tiện/tài khoản/công cụ cần thiết khác cho công việc.\u003c/p\u003e\u003cp\u003eCơ hội nghề nghiệp:\u003c/p\u003e\u003cp\u003e•\tXét tăng lương hàng năm và cơ hội thăng tiến.\u003c/p\u003e\u003cp\u003e•\tCon đường sự nghiệp đa dạng: Quản lý hoặc Chuyên gia và cơ hội điều chuyển nội bộ giữa các team.\u003c/p\u003e\u003cp\u003e•\tNguồn học miễn phí trên các nền tảng Udemy, Coursera, O'relly; hội thảo nội bộ,...\u003c/p\u003e\u003cp\u003e•\tCông nhận và khen thưởng ở cấp độ nhóm và Công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eMôi trường làm việc:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc trẻ trung, năng động và hợp tác.\u003c/p\u003e\u003cp\u003e•\tKhu thư giãn: chơi game, bóng bàn, yoga, phòng tập gym,...\u003c/p\u003e\u003cp\u003e•\tTeambuilding hàng quý / hàng năm \u0026 các sự kiện nội bộ gắn kết.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T718,September 19, 2019 - One Mount was established with the ambition of building Vietnam's most trusted ecosystem, empowering all people and businesses to realize their full potential at the intersection of technology and humanity. Our main products include:\r\n\r\n1. VinShop (operated under One Mount Distribution), a dedicated retail app enabling independent shop owners to grow their business via tech enabled supply chain and inventory management\r\n2. VinID (operated under One Mount Consumer), a super app and Vietnam's largest consumer loyalty program integrating many functions such as payment, housing management, goods purchase, and financial services\r\n3. OneHousing (operated under One Mount Real Estate), a one-stop destination for all needs in housing, supporting buying, selling, investing and other real-estate-related services.\r\n\r\n\r\nOUR WORK: All employees are empowered to grow their most meaningful careers at One Mount. With every single new feature launched, every innovation implemented, and every market challenge solved, One Mount Staff are proud to be making positive changes o
