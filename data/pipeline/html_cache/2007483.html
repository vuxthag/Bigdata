5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T2368,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJob Objective/ Mục Tiêu Công Việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager will play a key role in ensuring projects meet objectives on time and on budget by increasing employee adoption and usage. This person will focus on the people side of change, including changes to business processes, systems, and technology, job roles, and organization structures.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eERP Manager sẽ đóng vai trò then chốt trong việc đảm bảo các dự án đạt được mục tiêu đúng tiến độ và trong phạm vi ngân sách thông qua việc nâng cao mức độ tiếp nhận và sử dụng hệ thống của nhân viên. Vị trí này tập trung vào yếu tố con người trong quá trình thay đổi, bao gồm thay đổi về quy trình kinh doanh, hệ thống và công nghệ, vai trò công việc cũng như cơ cấu tổ chức.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities/ Trách Nhiệm Chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eERP Program Governance \u0026 Strategy\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager owns the Epicor Kinetic ERP program charter and objective, ensuring alignment with the company’s strategic objectives and the operational requirements of LED lighting manufacturing and distribution. This role governs ERP scope, priorities, and stage-gate controls to ensure Epicor Kinetic effectively supports production planning, shop-floor execution, quality management, inventory control, and downstream distribution.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản trị \u0026 Chiến lược Chương trình ERP\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager chịu trách nhiệm quản lý chương trình và mục tiêu của hệ thống Epicor Kinetic, đảm bảo sự phù hợp với mục tiêu chiến lược và đặc thù vận hành của doanh nghiệp sản xuất thiết bị điện tử (đèn LED) theo dây chuyền. Vai trò này quản trị phạm vi, ưu tiên và các cổng kiểm soát theo giai đoạn, nhằm đảm bảo Epicor Kinetic hỗ trợ hiệu quả lập kế hoạch sản xuất, điều hành sản xuất, quản lý chất lượng, tồn kho và hoạt động phân phối.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDelivery Management (Discovery to Adoption)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager leads the end-to-end implementation of Epicor Kinetic across manufacturing, supply chain, finance, and distribution functions. This includes managing discovery, solution design, configuration, testing, UAT, go-live, and stabilization, while ensuring minimal disruption to LED production lines, material flow, and order fulfillment.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Triển khai (từ Khám phá đến Tiếp nhận)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager chịu trách nhiệm triển khai Epicor Kinetic xuyên suốt các khối sản xuất, chuỗi cung ứng, tài chính và phân phối. Công việc bao gồm khảo sát, thiết kế giải pháp, cấu hình hệ thống, kiểm thử, UAT, go-live và ổn định sau triển khai, đồng thời đảm bảo hạn chế tối đa gián đoạn dây chuyền sản xuất, luồng nguyên vật liệu và tiến độ giao hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRoadmap \u0026 Epicor Kinetic Manufacturing Solution Architecture\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager develops short- and long-term Epicor Kinetic roadmaps tailored to discrete manufacturing of electronic products, including BOM management, routings, work centers, production lines, capacity planning, MRP, and traceability. This role defines system configuration versus customization, integration with MES or shop-floor systems (if applicable), and ensures scalability for volume growth and product variants.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLộ trình \u0026 Kiến trúc Giải pháp Sản xuất Epicor Kinetic\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager xây dựng lộ trình Epicor Kinetic phù hợp với mô hình sản xuất rời rạc (discrete manufacturing) của sản phẩm điện tử, bao gồm quản lý BOM, routing, công đoạn, dây chuyền sản xuất, năng lực sản xuất, MRP và truy xuất nguồn gốc. Vai trò này xác định ranh giới giữa cấu hình tiêu chuẩn và tùy biến, tích hợp với hệ thống MES/xưởng (nếu có), đồng thời đảm bảo khả năng mở rộng khi tăng sản lượng và đa dạng hóa chủng loại đèn LED.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStakeholder Engagement \u0026 Communications\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager engages key stakeholders across production, engineering, quality, warehouse, sales, and finance to ensure Epicor Kinetic adoption aligns with day-to-day manufacturing and distribution operations. This role coordinates structured communications to support production supervisors, planners, and shop-floor users during system changes.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGắn kết Các Bên Liên Quan \u0026 Truyền thông\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager phối hợp chặt chẽ với các bên liên quan thuộc khối sản xuất, kỹ thuật, chất lượng, kho vận, kinh doanh và tài chính nhằm đảm bảo Epicor Kinetic được áp dụng hiệu quả trong vận hành hàng ngày. Vai trò này tổ chức truyền thông có cấu trúc, hỗ trợ quản đốc, kế hoạch sản xuất và người dùng tại xưởng trong quá trình thay đổi hệ thống.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChange Management, Training \u0026 Shop-floor Adoption\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager leads change management for Epicor Kinetic with a strong focus on users adoption. This includes role-based impact assessments for production operators, supervisors, planners, and warehouse staff; developing practical, task-oriented training materials; and ensuring system usability supports fast, accurate execution on production lines.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Thay đổi, Đào tạo \u0026 Tiếp nhận tại Xưởng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager dẫn dắt quản lý thay đổi đối với Epicor Kinetic, đặc biệt tập trung vào mức độ tiếp nhận của người dùng. Công việc bao gồm đánh giá tác động theo từng vai trò (công nhân, quản đốc, kế hoạch, kho), xây dựng tài liệu đào tạo mang tính thực hành cao và đảm bảo hệ thống dễ sử dụng, hỗ trợ thao tác nhanh, chính xác trên dây chuyền sản xuất đèn LED.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVendor \u0026 Epicor Partner Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager manages Epicor implementation partners with proven manufacturing expertise, ensuring solutions meet the specific needs of LED lighting production, quality control, and distribution. This role governs SOWs, SLAs, acceptance criteria, and change requests while ensuring system performance meets operational KPIs.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Đối tác \u0026 Nhà cung cấp Epicor\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager quản lý các đối tác triển khai Epicor có kinh nghiệm trong lĩnh vực sản xuất, đảm bảo giải pháp đáp ứng đúng nhu cầu sản xuất đèn LED, kiểm soát chất lượng và phân phối. Vai trò này kiểm soát SOW, SLA, tiêu chí nghiệm thu và các yêu cầu thay đổi, đồng thời đảm bảo hiệu năng hệ thống đáp ứng các KPI vận hành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBusiness \u0026 Operations Process Alignment\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager ensures Epicor Kinetic standardizes and optimizes end-to-end processes from material procurement, production execution, quality inspection, finished goods warehousing, to order fulfillment and distribution. This role connects data and processes across departments to support operational efficiency and decision-making.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLiên kết Quy trình Kinh doanh \u0026 Vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager đảm bảo Epicor Kinetic chuẩn hóa và tối ưu quy trình xuyên suốt từ mua nguyên vật liệu, sản xuất, kiểm tra chất lượng, lưu kho thành phẩm đến xử lý đơn hàng và phân phối. Vai trò này kết nối dữ liệu và quy trình giữa các phòng ban nhằm nâng cao hiệu quả vận hành và hỗ trợ ra quyết định.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOperational Performance Monitoring \u0026 Issue Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager monitors Epicor Kinetic KPIs related to production efficiency, yield, scrap, inventory accuracy, and on-time delivery. This role proactively manages system and process issues, drives continuous improvement initiatives, and ensures critical production-impacting incidents are escalated and resolved promptly.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTheo dõi Hiệu suất Vận hành \u0026 Quản lý Sự cố\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager theo dõi các KPI trên Epicor Kinetic liên quan đến hiệu suất sản xuất, tỷ lệ đạt, phế phẩm, độ chính xác tồn kho và giao hàng đúng hạn. Vai trò này chủ động quản lý sự cố hệ thống và quy trình, thúc đẩy cải tiến liên tục và đảm bảo các sự cố ảnh hưởng trực tiếp đến sản xuất được escalte và xử lý kịp thời.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:Tdd2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQualifications/ Yêu cầu năng lực - Trình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducation: \u003c/strong\u003eBachelor’s degree in Information Technology, Engineering, Business, Operations Management, or related fields. ERP, project management, or supply chain certifications are a plus but not required.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHọc vấn:\u003c/strong\u003e Tốt nghiệp đại học chuyên ngành CNTT, Kỹ thuật, Quản trị Kinh doanh, Quản trị Vận hành hoặc lĩnh vực liên quan. Chứng chỉ ERP, quản lý dự án hoặc chuỗi cung ứng là lợi thế nhưng không bắt buộc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProfessional Experience: \u003c/strong\u003eThe candidate has 5–7 years of ERP experience, with at least 5 years in ERP implementation within manufacturing environments, preferably electronic or discrete manufacturing. Hands-on experience with Epicor Kinetic or similar manufacturing-focused ERP systems is highly preferred.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm Chuyên môn\u003c/strong\u003e:Ứng viên có 5–7 năm kinh nghiệm ERP, trong đó tối thiểu 5 năm triển khai ERP trong môi trường sản xuất, ưu tiên sản xuất điện tử hoặc sản xuất rời rạc. Kinh nghiệm thực tế với Epicor Kinetic hoặc hệ thống ERP chuyên cho sản xuất là lợi thế lớn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProject \u0026 Change Management: \u003c/strong\u003eStrong experience in managing cross-functional ERP projects, including scope, timeline, budget, and vendor coordination. Solid understanding of change management to drive user adoption across shop-floor and office users.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Dự án \u0026 Thay đổi\u003c/strong\u003e: Có kinh nghiệm quản lý dự án ERP đa phòng ban, kiểm soát phạm vi, tiến độ, ngân sách và phối hợp đối tác. Hiểu rõ quản lý thay đổi để thúc đẩy tiếp nhận hệ thống từ xưởng sản xuất đến khối văn phòng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eManufacturing \u0026 ERP Functional Knowledge: \u003c/strong\u003eGood understanding of manufacturing ERP processes such as BOM, routing, production lines, MRP, inventory, quality, and traceability, particularly in high-volume LED manufacturing environments.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKiến thức ERP \u0026 Nghiệp vụ Sản xuất:\u003c/strong\u003e Hiểu rõ các nghiệp vụ ERP trong sản xuất như BOM, routing, dây chuyền sản xuất, MRP, tồn kho, chất lượng và truy xuất nguồn gốc, đặc biệt trong môi trường sản xuất đèn LED sản lượng lớn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eData Analysis \u0026 System Thinking: \u003c/strong\u003eStrong analytical and system-thinking skills to evaluate production performance, inventory accuracy, scrap, and on-time delivery using ERP data, and translate insights into operational improvements.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhân tích Dữ liệu \u0026 Tư duy Hệ thống\u003c/strong\u003e: Có năng lực phân tích và tư duy hệ thống, sử dụng dữ liệu ERP để đánh giá hiệu suất sản xuất, tồn kho, phế phẩm và giao hàng, từ đó đề xuất cải tiến vận hành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCommunication \u0026 Leadership: \u003c/strong\u003eAble to communicate clearly across all levels, from shop-floor operators to senior management, and effectively translate ERP concepts into practical operational language.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiao tiếp \u0026 Lãnh đạo:\u003c/strong\u003e Giao tiếp hiệu quả với mọi cấp, từ công nhân xưởng đến lãnh đạo, và có khả năng chuyển hóa khái niệm ERP thành ngôn ngữ vận hành dễ hiểu\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T2368,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJob Objective/ Mục Tiêu Công Việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager will play a key role in ensuring projects meet objectives on time and on budget by increasing employee adoption and usage. This person will focus on the people side of change, including changes to business processes, systems, and technology, job roles, and organization structures.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eERP Manager sẽ đóng vai trò then chốt trong việc đảm bảo các dự án đạt được mục tiêu đúng tiến độ và trong phạm vi ngân sách thông qua việc nâng cao mức độ tiếp nhận và sử dụng hệ thống của nhân viên. Vị trí này tập trung vào yếu tố con người trong quá trình thay đổi, bao gồm thay đổi về quy trình kinh doanh, hệ thống và công nghệ, vai trò công việc cũng như cơ cấu tổ chức.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities/ Trách Nhiệm Chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eERP Program Governance \u0026 Strategy\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager owns the Epicor Kinetic ERP program charter and objective, ensuring alignment with the company’s strategic objectives and the operational requirements of LED lighting manufacturing and distribution. This role governs ERP scope, priorities, and stage-gate controls to ensure Epicor Kinetic effectively supports production planning, shop-floor execution, quality management, inventory control, and downstream distribution.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản trị \u0026 Chiến lược Chương trình ERP\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager chịu trách nhiệm quản lý chương trình và mục tiêu của hệ thống Epicor Kinetic, đảm bảo sự phù hợp với mục tiêu chiến lược và đặc thù vận hành của doanh nghiệp sản xuất thiết bị điện tử (đèn LED) theo dây chuyền. Vai trò này quản trị phạm vi, ưu tiên và các cổng kiểm soát theo giai đoạn, nhằm đảm bảo Epicor Kinetic hỗ trợ hiệu quả lập kế hoạch sản xuất, điều hành sản xuất, quản lý chất lượng, tồn kho và hoạt động phân phối.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDelivery Management (Discovery to Adoption)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager leads the end-to-end implementation of Epicor Kinetic across manufacturing, supply chain, finance, and distribution functions. This includes managing discovery, solution design, configuration, testing, UAT, go-live, and stabilization, while ensuring minimal disruption to LED production lines, material flow, and order fulfillment.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Triển khai (từ Khám phá đến Tiếp nhận)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager chịu trách nhiệm triển khai Epicor Kinetic xuyên suốt các khối sản xuất, chuỗi cung ứng, tài chính và phân phối. Công việc bao gồm khảo sát, thiết kế giải pháp, cấu hình hệ thống, kiểm thử, UAT, go-live và ổn định sau triển khai, đồng thời đảm bảo hạn chế tối đa gián đoạn dây chuyền sản xuất, luồng nguyên vật liệu và tiến độ giao hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRoadmap \u0026 Epicor Kinetic Manufacturing Solution Architecture\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager develops short- and long-term Epicor Kinetic roadmaps tailored to discrete manufacturing of electronic products, including BOM management, routings, work centers, production lines, capacity planning, MRP, and traceability. This role defines system configuration versus customization, integration with MES or shop-floor systems (if applicable), and ensures scalability for volume growth and product variants.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLộ trình \u0026 Kiến trúc Giải pháp Sản xuất Epicor Kinetic\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager xây dựng lộ trình Epicor Kinetic phù hợp với mô hình sản xuất rời rạc (discrete manufacturing) của sản phẩm điện tử, bao gồm quản lý BOM, routing, công đoạn, dây chuyền sản xuất, năng lực sản xuất, MRP và truy xuất nguồn gốc. Vai trò này xác định ranh giới giữa cấu hình tiêu chuẩn và tùy biến, tích hợp với hệ thống MES/xưởng (nếu có), đồng thời đảm bảo khả năng mở rộng khi tăng sản lượng và đa dạng hóa chủng loại đèn LED.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStakeholder Engagement \u0026 Communications\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager engages key stakeholders across production, engineering, quality, warehouse, sales, and finance to ensure Epicor Kinetic adoption aligns with day-to-day manufacturing and distribution operations. This role coordinates structured communications to support production supervisors, planners, and shop-floor users during system changes.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGắn kết Các Bên Liên Quan \u0026 Truyền thông\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager phối hợp chặt chẽ với các bên liên quan thuộc khối sản xuất, kỹ thuật, chất lượng, kho vận, kinh doanh và tài chính nhằm đảm bảo Epicor Kinetic được áp dụng hiệu quả trong vận hành hàng ngày. Vai trò này tổ chức truyền thông có cấu trúc, hỗ trợ quản đốc, kế hoạch sản xuất và người dùng tại xưởng trong quá trình thay đổi hệ thống.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChange Management, Training \u0026 Shop-floor Adoption\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager leads change management for Epicor Kinetic with a strong focus on users adoption. This includes role-based impact assessments for production operators, supervisors, planners, and warehouse staff; developing practical, task-oriented training materials; and ensuring system usability supports fast, accurate execution on production lines.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Thay đổi, Đào tạo \u0026 Tiếp nhận tại Xưởng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager dẫn dắt quản lý thay đổi đối với Epicor Kinetic, đặc biệt tập trung vào mức độ tiếp nhận của người dùng. Công việc bao gồm đánh giá tác động theo từng vai trò (công nhân, quản đốc, kế hoạch, kho), xây dựng tài liệu đào tạo mang tính thực hành cao và đảm bảo hệ thống dễ sử dụng, hỗ trợ thao tác nhanh, chính xác trên dây chuyền sản xuất đèn LED.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVendor \u0026 Epicor Partner Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager manages Epicor implementation partners with proven manufacturing expertise, ensuring solutions meet the specific needs of LED lighting production, quality control, and distribution. This role governs SOWs, SLAs, acceptance criteria, and change requests while ensuring system performance meets operational KPIs.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Đối tác \u0026 Nhà cung cấp Epicor\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager quản lý các đối tác triển khai Epicor có kinh nghiệm trong lĩnh vực sản xuất, đảm bảo giải pháp đáp ứng đúng nhu cầu sản xuất đèn LED, kiểm soát chất lượng và phân phối. Vai trò này kiểm soát SOW, SLA, tiêu chí nghiệm thu và các yêu cầu thay đổi, đồng thời đảm bảo hiệu năng hệ thống đáp ứng các KPI vận hành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBusiness \u0026 Operations Process Alignment\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager ensures Epicor Kinetic standardizes and optimizes end-to-end processes from material procurement, production execution, quality inspection, finished goods warehousing, to order fulfillment and distribution. This role connects data and processes across departments to support operational efficiency and decision-making.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLiên kết Quy trình Kinh doanh \u0026 Vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager đảm bảo Epicor Kinetic chuẩn hóa và tối ưu quy trình xuyên suốt từ mua nguyên vật liệu, sản xuất, kiểm tra chất lượng, lưu kho thành phẩm đến xử lý đơn hàng và phân phối. Vai trò này kết nối dữ liệu và quy trình giữa các phòng ban nhằm nâng cao hiệu quả vận hành và hỗ trợ ra quyết định.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOperational Performance Monitoring \u0026 Issue Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe ERP Manager monitors Epicor Kinetic KPIs related to production efficiency, yield, scrap, inventory accuracy, and on-time delivery. This role proactively manages system and process issues, drives continuous improvement initiatives, and ensures critical production-impacting incidents are escalated and resolved promptly.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTheo dõi Hiệu suất Vận hành \u0026 Quản lý Sự cố\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eERP Manager theo dõi các KPI trên Epicor Kinetic liên quan đến hiệu suất sản xuất, tỷ lệ đạt, phế phẩm, độ chính xác tồn kho và giao hàng đúng hạn. Vai trò này chủ động quản lý sự cố hệ thống và quy trình, thúc đẩy cải tiến liên tục và đảm bảo các sự cố ảnh hưởng trực tiếp đến sản xuất được escalte và xử lý kịp thời.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:Tdd2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQualifications/ Yêu cầu năng lực - Trình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducation: \u003c/strong\u003eBachelor’s degree in Information Technology, Engineering, Business, Operations Management, or related fields. ERP, project management, or supply chain certifications are a plus but not required.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHọc vấn:\u003c/strong\u003e Tốt nghiệp đại học chuyên ngành CNTT, Kỹ thuật, Quản trị Kinh doanh, Quản trị Vận hành hoặc lĩnh vực liên quan. Chứng chỉ ERP, quản lý dự án hoặc chuỗi cung ứng là lợi thế nhưng không bắt buộc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProfessional Experience: \u003c/strong\u003eThe candidate has 5–7 years of ERP experience, with at least 5 years in ERP implementation within manufacturing environments, preferably electronic or discrete manufacturing. Hands-on experience with Epicor Kinetic or similar manufacturing-focused ERP systems is highly preferred.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm Chuyên môn\u003c/strong\u003e:Ứng viên có 5–7 năm kinh nghiệm ERP, trong đó tối thiểu 5 năm triển khai ERP trong môi trường sản xuất, ưu tiên sản xuất điện tử hoặc sản xuất rời rạc. Kinh nghiệm thực tế với Epicor Kinetic hoặc hệ thống ERP chuyên cho sản xuất là lợi thế lớn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProject \u0026 Change Management: \u003c/strong\u003eStrong experience in managing cross-functional ERP projects, including scope, timeline, budget, and vendor coordination. Solid understanding of change management to drive user adoption across shop-floor and office users.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Dự án \u0026 Thay đổi\u003c/strong\u003e: Có kinh nghiệm quản lý dự án ERP đa phòng ban, kiểm soát phạm vi, tiến độ, ngân sách và phối hợp đối tác. Hiểu rõ quản lý thay đổi để thúc đẩy tiếp nhận hệ thống từ xưởng sản xuất đến khối văn phòng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eManufacturing \u0026 ERP Functional Knowledge: \u003c/strong\u003eGood understanding of manufacturing ERP processes such as BOM, routing, production lines, MRP, inventory, quality, and traceability, particularly in high-volume LED manufacturing environments.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKiến thức ERP \u0026 Nghiệp vụ Sản xuất:\u003c/strong\u003e Hiểu rõ các nghiệp vụ ERP trong sản xuất như BOM, routing, dây chuyền sản xuất, MRP, tồn kho, chất lượng và truy xuất nguồn gốc, đặc biệt trong môi trường sản xuất đèn LED sản lượng lớn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eData Analysis \u0026 System Thinking: \u003c/strong\u003eStrong analytical and system-thinking skills to evaluate production performance, inventory accuracy, scrap, and on-time delivery using ERP data, and translate insights into operational improvements.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhân tích Dữ liệu \u0026 Tư duy Hệ thống\u003c/strong\u003e: Có năng lực phân tích và tư duy hệ thống, sử dụng dữ liệu ERP để đánh giá hiệu suất sản xuất, tồn kho, phế phẩm và giao hàng, từ đó đề xuất cải tiến vận hành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCommunication \u0026 Leadership: \u003c/strong\u003eAble to communicate clearly across all levels, from shop-floor operators to senior management, and effectively translate ERP concepts into practical operational language.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiao tiếp \u0026 Lãnh đạo:\u003c/strong\u003e Giao tiếp hiệu quả với mọi cấp, từ công nhân xưởng đến lãnh đạo, và có khả năng chuyển hóa khái niệm ERP thành ngôn ngữ vận hành dễ hiểu\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2a:{\"skillName\":\"ERP\",\"skillId\":1832,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Data Analysis\",\"skillId\":15900,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"LED\",\"skillId\":1138161,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"ERP Implementation\",\"skillId\":43119,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"LED\",\"skillId\":1178684,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"MRP\",\"skillId\":9865,\"skillWeight\":100,\"isExisted\":false}\n29:[\"$2a\",\"$2b\",\"$2c\",\"$2d\",\"$2e\",\"$2f\"]\n31:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"High competitive salary and year-end bonus\"}\n32:{\"benefitId\":11,\"benefitIconName\":\"fa-cab\",\"benefitName\":\"Transportation\",\"benefitNameVI\":\"Xe đưa đón\",\"benefitValue\":\"Shuttle bus from Bien Hoa and Thu Duc Intersection\"}\n33:{\"benefitId\":15,\"benefitIconName\":\"fa-check-square-o\",\"benefitName\":\"Others\",\"benefitNameVI\":\"Khác\",\"benefitValue\":\"Saturday can be flexible to work from home without having to go to the company\"}\n30:[\"$31\",\"$32\",\"$33\"]\n36:{\"lat\":10.701188,\"lon\":106.934688}\n35:{\"workingLocationId\":214442,\"addressId\":127985,\"cityId\":19,\"districtId\":252,\"address\":\"Lô 206, đường D2, Khu công nghiệp Dệt may Nhơn Trạch, Xã Nhơn Trạch, Tỉnh Đồng Nai, Việt Nam\",\"geoLoc\":\"$36\",\"cityName\":\"Dong Nai\",\"cityNameVI\":\"Đồng Nai\"}\n38:{\"lat\":10.823099,\"lon\":106.629664}\n37:{\"workingLocationId\":102905,\"addressId\":7919,\
