f-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tb7d,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eGIỚI THIỆU VỀ CPT STEEL\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCPT Steel là doanh nghiệp hàng đầu trong lĩnh vực thiết kế, sản xuất và cung cấp giải pháp nhà thép tiền chế (Pre-Engineered Buildings – PEB), với hơn 20 năm kinh nghiệm và hệ thống nhà máy tại khu vực Đông Nam Á.\u003c/p\u003e\u003cp\u003e•\tTại thị trường Việt Nam, CPT Steel đã xây dựng được hệ thống khách hàng và đội ngũ bán hàng mạnh, đặc biệt tăng trưởng nhanh trong những năm gần đây.\u003c/p\u003e\u003cp\u003e•\tNhằm mở rộng độ phủ thị trường và phát triển thêm các phân khúc khách hàng, chúng tôi đang tìm kiếm Giám đốc Bán hàng phụ trách Ban kinh doanh mới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTỔNG QUAN VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eĐây là vị trí dành cho ứng viên có năng lực bán hàng dự án thực chiến, có thể:\u003c/p\u003e\u003cp\u003e•\tChủ động khai thác khách hàng và mang dự án về ngay trong những tháng đầu\u003c/p\u003e\u003cp\u003e•\tTrực tiếp tham gia toàn bộ chu trình bán hàng dự án Nhà thép tiền chế/ Kết cấu thép\u003c/p\u003e\u003cp\u003e•\tĐồng thời từng bước xây dựng và dẫn dắt đội ngũ bán hàng\u003c/p\u003e\u003cp\u003eĐây không phải vị trí quản lý thuần túy, mà là vai trò vừa làm kinh doanh trực tiếp, vừa phát triển đội ngũ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Phát triển kinh doanh \u0026 bán hàng dự án\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTìm kiếm, phát triển và khai thác các cơ hội dự án xây dựng sử dụng giải pháp Nhà thép tiền chế như nhà xưởng, nhà máy, kho bãi, công trình công nghiệp\u003c/p\u003e\u003cp\u003e•\tXây dựng và duy trì mối quan hệ với:\u003c/p\u003e\u003cp\u003e-\tChủ đầu tư\u003c/p\u003e\u003cp\u003e-\tBan quản lý dự án\u003c/p\u003e\u003cp\u003e-\tTổng thầu / nhà thầu chính (EPC, Contractor)\u003c/p\u003e\u003cp\u003e-\tDoanh nghiệp sản xuất, nhà đầu tư FDI\u003c/p\u003e\u003cp\u003e•\tChủ động dẫn dắt toàn bộ quy trình bán hàng: Tìm kiếm → tiếp cận → đề xuất giải pháp → báo giá → đàm phán → ký hợp đồng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tư vấn giải pháp kỹ thuật \u0026 phối hợp nội bộ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc với khách hàng để tư vấn giải pháp kết cấu thép / nhà thép tiền chế\u003c/p\u003e\u003cp\u003e•\tPhối hợp với bộ phận kỹ thuật để xây dựng phương án thiết kế và báo giá\u003c/p\u003e\u003cp\u003e•\tTrình bày giải pháp với khách hàng dựa trên bản vẽ kỹ thuật (AutoCAD)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Xây dựng và phát triển đội ngũ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTrong giai đoạn đầu: tập trung ra đơn và phát triển thị trường\u003c/p\u003e\u003cp\u003e•\tKhi Ban kinh doanh phát triển:\u003c/p\u003e\u003cp\u003e-\tTham gia tuyển dụng và xây dựng đội ngũ (3–5 nhân sự)\u003c/p\u003e\u003cp\u003e-\tĐào tạo và dẫn dắt đội ngũ Sales Engineer / Sales\u003c/p\u003e\u003cp\u003e-\tThiết lập quy trình bán hàng hiệu quả\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T651,\u003cp\u003e\u003cstrong\u003eYÊU CẦU BẮT BUỘC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e(Ứng viên không đáp ứng các tiêu chí dưới đây sẽ không phù hợp)\u003c/p\u003e\u003cp\u003e•\tTối thiểu 3 năm kinh nghiệm\u003cstrong\u003e bán hàng dự án Nhà thép tiền c
