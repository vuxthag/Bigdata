xây dựng; soát xét dự toán, quyết toán và nghiệm thu công trình.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản trị và Đào tạo \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổ chức tuyển dụng, đào tạo, phân công và hướng dẫn công việc cho nhân viên phòng Kỹ thuật và nhân sự tại hiện trường.\u003c/p\u003e\u003cp\u003e•\tTrực tiếp đánh giá năng lực, thực hiện các chính sách động viên, khen thưởng, kỷ luật và đề xuất giải pháp quản lý nhân sự hiệu quả sau mỗi dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kiểm soát chi phí và Báo cáo tham mưu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm soát chi phí thi công, hạn chế tối đa hao hụt/phát sinh và đánh giá tính hiệu quả kinh tế sau khi kết thúc công trình.\u003c/p\u003e\u003cp\u003e•\tPhân tích dữ liệu, báo cáo định kỳ và tham vấn cho Ban Tổng Giám đốc về các biện pháp kỹ thuật, vật tư nhằm tối ưu giá thành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Đối ngoại và Nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐại diện Công ty đàm phán, làm việc với các đối tác (khách hàng, đơn vị tư vấn, nhà thầu phụ...) trong phạm vi phụ trách.\u003c/p\u003e\u003cp\u003e•\tThực hiện các nhiệm vụ khác theo yêu cầu từ Ban Tổng Giám đốc.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T805,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ, kinh nghiệm \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Kỹ sư Xây dựng, Kiến trúc sư hoặc Kỹ sư MEP hoặc trình độ cao hơn \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e-\u003c/strong\u003e Có ít nhất 03 năm kinh nghiệm trở lên làm trưởng nhóm quản lý/ thi công dự án trong các dự án nhà ở, chung cư cao tầng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có kiến thức tốt về xây d
