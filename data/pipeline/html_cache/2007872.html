\u003c/p\u003e\u003cp\u003e2. Phát triển hệ thống khách hàng và kênh phân phối\t\u003c/p\u003e\u003cp\u003e2.1\tXây dựng danh sách khách hàng tiềm năng, thiết lập và mở rộng các kênh phân phối trong nước và quốc tế\u003c/p\u003e\u003cp\u003e2.2\tDuy trì quan hệ bền vững với khách hàng mục tiêu và phát triển quan hệ bền vững với khách hàng hiện hữu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Lập và thực hiện kế hoạch kinh doanh\t\u003c/p\u003e\u003cp\u003e3.1\tPhát triển kế hoạch kinh doanh theo từng giai đoạn\u003c/p\u003e\u003cp\u003e3.2\tXác định mục tiêu kinh doanh cụ thể cho từng kênh phân phối\u003c/p\u003e\u003cp\u003e3.3\tĐề xuất chính sách giá và chương trình khuyến mãi nhằm tối ưu hóa doanh số và hiệu quả kinh doanh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4. Quản lý quan hệ khách hàng\t\u003c/p\u003e\u003cp\u003e4.1\tTổ chức hoạt động chăm sóc khách hàng\u003c/p\u003e\u003cp\u003e4.2\tThiết lập hệ thống thông tin phản hồi để nâng cao chất lượng dịch vụ và giữ chân khách hàng\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5.Quản lý hàng hóa\t\u003c/p\u003e\u003cp\u003e5.1\tTổ chức và kiểm soát hàng hóa theo đúng yêu cầu về số lượng, chất lượng, chủng loại và các điều kiện thỏa thuận với khách hàng\u003c/p\u003e\u003cp\u003e5.2\tPhối hợp với các phòng, ban liên quan để tối ưu hóa quy trình lưu kho và vận chuyển\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6. Quản lý hiệu quả kinh doanh\t\u003c/p\u003e\u003cp\u003e6.1\tTheo dõi doanh thu, chi phí, biên lợi nhuận theo từng sản phẩm/kênh bán hàng\u003c/p\u003e\u003cp\u003e6.2\tĐảm bảo hiệu quả thương mại theo các chỉ số KOR/KPI được giao\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7. Xử lý rủi ro kinh doanh\t\u003c/p\u003e\u003cp\u003e7.1\tXây dựng và triển khai kế hoạch dự phòng\u003c/p\u003e\u003cp\u003e7.2\tNhận diện và xử lý kịp thời các rủi ro phát sinh trong quá trình kinh doanh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e8. Báo cáo và phân tích kinh doanh\t\u003c/p\u003e\u003cp\u003e8.1\tThực hiện báo cáo định kỳ/thường xuyên về kết quả kinh doanh\u003c/p\u003e\u003cp\u003e8.2\t Phân tích dữ liệu kinh doanh để hỗ trợ việc ra quyết định của Ban TGĐ Công ty \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e9. Phối hợp phát triển kinh doanh nội bộ\t\u003c/p\u003e\u003cp\u003e9.1\tPhối hợp với Trung tâm khai thác kinh doanh bán chéo các sản phẩm, dịch vụ khác của công ty như dịch vụ Cảng và dịch vụ Logistics\u003c/p\u003e\u003cp\u003e9.2\tPhối hợp chặt chẽ với các phòng, ban, trung tâm trong Công ty để xử lý các nhiệm vụ theo chức năng, nhiệm vụ được giao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e10. Thực hiện các nhiệm vụ khác\t\u003c/p\u003e\u003cp\u003e10.1\tXây dựng hệ thống quy trình, quy định công việc chuyên môn.\u003c/p\u003e\u003cp\u003e10.2\tCác công việc khác theo phân công của Ban Tổng Giám đốc..\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Ta39,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Trình độ: Tốt nghiệp Đại học hoặc thạc sĩ trở lên chuyên ngành Kinh tế, Quản trị kinh doanh, Marketing, Ngoại thương, Logistics hoặc các ngành liên quan\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm: Tối thiểu năm kinh nghiệm ở vị trí Trưởng phòng Kinh doanh hoặc các vị trí quản lý tương đương trong lĩnh vực cảng biển, logistics, hoặc các ngành liên quan. Ưu tiên có kinh nghiệm trong lĩnh vực kinh doanh hàng hóa (cát, vật liệu xây dựng, than, ...).\u003c/p\u003e\u003cp\u003e3. Kiến thức\t:\u003c/p\u003e\u003cp\u003e- Kiến thức chuyên sâu về thị trường, sản phẩm, dịch vụ trong ngành cảng biển, logistics và kinh doanh thương mại.\u003c/p\u003e\u003cp\u003e- Kiến thức về luật pháp, quy định liên quan đến hoạt động kinh doanh, xuất nhập khẩu.\u003c/p\u003e\u003cp\u003e- Kiến thức về quản lý dự án, quản lý chất lượng\u003c/p\u003e\u003cp\u003e4. Ngoại ngữ:\tTiếng Anh thành thạo (nghe, nói, đọc, viết).\u003c/p\u003e\u003cp\u003e5. Kỹ năng:\u003c/p\u003e\u003cp\u003e- Kỹ năng lãnh đạo, quản lý đội nhóm.\u003c/p\u003e\u003cp\u003e- Kỹ năng lập kế hoạch, tổ chức và triển khai công việc.\u003c/p\u003e\u003cp\u003e- Kỹ năng đàm phán, thuyết trình, giao tiếp và xây dựng mối quan hệ.\u003c/p\u003e\u003cp\u003e- Kỹ năng phân tích, tổng hợp, giải quyết vấn đề và ra quyết định.\u003c/p\u003e\u003cp\u003e- Kỹ năng sử dụng thành thạo các phần mềm văn phòng (Word, Excel, PowerPoint) và các phần mềm quản lý kinh doanh.\u003c/p\u003e\u003cp\u003e6. Ý thức \u0026Thái độ:Trung thực, nhiệt tình, trách nhiệm, chủ động, sáng tạo, chịu áp lực cao trong công việc. Tuân thủ các giá trị cốt lõi của Tập đoàn\u003c/p\u003e\u003cp\u003e7. Yêu cầu khác: Sẵn sàng đi công tác khi có yêu cầu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Lương T13 + Thưởng hiệu quả. Mức lương: 35 triệu - 50 triệu/tháng\u003c/p\u003e\u003cp\u003e- Tham gia teambuilding cùng công ty 1 lần/1 năm\u003c/p\u003e\u003cp\u003e- Đóng BHXH và được bổ sung quyền lợi chăm sóc sức khỏe bằng 1 thẻ Bảo hiểm chăm sóc sức khỏe\u003c/p\u003e\u003cp\u003e- Thưởng các ngày lễ lớn (30/4 -1/5; 2/9; giỗ tổ hùng vương, tết dương lịch)\u003c/p\u003e\u003cp\u003e- Chế độ đối với con NLĐ: trung thu, 1/6 và tặng thưởng nếu con NLĐ đạt các danh hiệu học sinh giỏi, đạt danh hiệu các kỳ thi tỉnh, quốc gia)\u003c/p\u003e\u003cp\u003e- Hỗ trợ tiền ăn trưa: 35k/1 buổi trưa/1 ngày\u003c/p\u003e\u003cp\u003e- Làm việc từ thứ 2 đến sáng ngày thứ 7\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e* Địa điểm làm việc: Xã Mỹ Thủy, Quảng Trị\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Te63,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. TÓM TẮT MỤC ĐÍCH CÔNG VIỆC\t\t\u003c/strong\u003e\
