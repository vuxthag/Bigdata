hượng, tiếp nhận và phát triển dự án sau M\u0026A.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.Công tác triển khai thủ tục pháp lý dự án.\t\u003c/p\u003e\u003cp\u003e2.1 Tham mưu cho Lãnh đạo Phòng ĐT-PTDA để triển khai thực hiện các công việc: Lập, kiểm tra, trình phê duyệt; đôn đốc, theo dõi tiến độ xử lý hồ sơ các dự án đầu tư....\u003c/p\u003e\u003cp\u003e2.2 Chịu trách nhiệm thực hiện xây dựng, cập nhật hồ sơ năng lực; đề xuất đăng ký dự án, tham gia đấu giá/đấu thầu lựa chọn nhà đầu tư đối với dự án được phân công.\u003c/p\u003e\u003cp\u003e2.3 Chịu trách nhiệm triển khai thực hiện các thủ tục pháp lý dự án: QHCT, PCCC, ĐTM và Giấy phép môi trường, thiết kế, GPMB và giao thuê đất, chuyển mục đích sử dụng rừng, chuyển mục đích đất lúa, cấp GCN QSD đất, GPXD... theo phân công của Lãnh đạo Phòng ĐT-PTDA.\u003c/p\u003e\u003cp\u003e2.4 Theo dõi, phối hợp và giám sát đơn vị Tư vấn thực hiện các thủ tục có liên quan đến pháp lý dự án: Quy hoạch, Thiết kế, Tư vấn Môi trường, PCCC, Lâm nghiệp, Đo đạc, địa hình, địa chính...\u003c/p\u003e\u003cp\u003e2.5 Theo dõi, lưu trữ tất cả các tài liệu liên quan đến hồ sơ dự án (file số): Đề xuất dự án, hồ sơ đấu thầu/đấu giá/thỏa thuận nhận chuyển nhượng QSD đất; hồ sơ QH và thiết kế, hồ sơ về PCCC, ĐTM, GPMB… lưu trữ đầy đủ các văn bản/hồ sơ đi đến hợp lý, đầu đủ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3.Công tác pháp lý khác.\u003c/p\u003e\u003cp\u003e3.1 Làm việc với các cơ quan có thẩm quyền để hoàn thiện thủ tục pháp lý của dự án theo phân công công việc trong các giai đoạn tiềm hiểu đề xuất đầu tư, chuẩn bị đầu tư, thực hiện đầu tư và sau đầu tư.\u003c/p\u003e\u003cp\u003e3.2 Lập và trình duyệt các báo cáo pháp lý, giám sát đầu tư, giải trình thanh - kiểm tra; Thực hiện báo cáo định kỳ tháng/quý/năm theo yêu cầu của Cơ quan quản lý Nhà nước.\u003c/p\u003e\u003cp\u003e3.3 Chủ động cập nhật, rà soát các rà soát sự phù hợp quy hoạch, kế hoạch, quy định pháp lý mới… có liên quan để tham mưu hướng triển khai/ xử lý; đề xuất và đóng góp ý kiến về hồ sơ\u003c/p\u003e\u003cp\u003epháp lý dự án.\u003c/p\u003e\u003cp\u003e3.4 Tổ chức thực hiện các nhiệm vụ khác được Lãnh đạo Phòng ĐT-PTDA phân công (thường xuyên/ đột xuất).\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T608,\u003cp\u003e1. Trình độ: Tốt nghiệp đại học chính quy các chuyên ngành: Kinh tế xây dựng, kiến trúc, xây dựng, luật... hoặc liên quan.\t\t\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm: Tối thiểu 05 năm làm vị trí Chuyên viên  Pháp lý dự án hoặc tương đương.\t\t\u003c/p\u003e\u003cp\u003e3. Kiến thức\t:\u003c/p\u003e\u003cp\u003e- Nắm vững quy trình thủ tục pháp lý đầu tư, am hiểu pháp luật hiện hành trong lĩnh vực đầu tư dự án.\u003c/p\u003e\u003cp\u003e- Có kiến thức tốt về lập kế hoạch, soạn thảo văn bản...\t\u003c/p\u003e\u003cp\u003e4. Ngoại ngữ: Có ngoại ngữ là một lợi thế.\t\t\u003c/p\u003e\u003cp\u003e5. Kỹ năng:\u003c/p\u003e\u003cp\u003e- Có tính kỷ luật cao, chuyên nghiệp và trách nhiệm với công việc.\u003c/p\u003e\u003cp\u003e- Có kỹ năng giao tiếp và phối hợp làm việc nhóm/ độc lập.\u003c/p\u003e\u003cp\u003e- Có kỹ năng phân tích, soạn thảo văn bản.\u003c/p\u003e\u003cp\u003e- Có kỹ năng giao tiếp và phối hợp làm việc nhóm/ độc lập; thành thạo tin học văn phòng và các phần mềm phục vụ công việc pháp lý: Autocad, Microstation, Google Earth...biết Sử dụng AI Office là một lợi thế\u003c/p\u003e\u003cp\u003e- Chịu được áp lực công việc.\t\u003c/p\u003e\u003cp\u003e6. Ý thức \u0026Thái độ: Nhiệt tình, nhanh nhẹn, cẩn thận, trung thực; Bảo mật nội dung công việc.\t\t\u003c/p\u003e\u003cp\u003e7. Yêu cầu khác: Đã từng làm việc tại các Tập đoàn/ Doanh nghiệp lớn là một lợi thế, đi công tác khi có yêu cầu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e* Địa điểm làm việc: Xã Mỹ Thủy, Quảng Trị \u003c/p\u003e27:Tf87,"])</script><script>self.__next_f.push([1,"\u003cp\u003eChuyên viên pháp lý Dự án thực hiện tham mưu cho Trưởng phòng/Phó trưở
