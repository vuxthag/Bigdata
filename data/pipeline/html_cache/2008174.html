\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tede,"])</script><script>self.__next_f.push([1,"Tập đoàn Dệt May Việt Nam (Vinatex) là tổ hợp các công ty đa sở hữu gồm có công ty mẹ Tập đoàn Dệt May Việt Nam và các doanh nghiệp, đơn vị trực thuộc. Tập đoàn đang sở hữu những đơn vị kinh doanh có năng lực sản xuất, kinh doanh lớn và mạnh nhất trong ngành Dệt May Việt Nam. Phần lớn các thành viên Vinatex đều là công ty đã có thương hiệu mạnh, năng lực sản xuất, nền tảng khách hàng tốt và độc lập trong hoạt động kinh doanh. Vai trò của Công ty mẹ Vinatex là hoạch định các chiến lược phát triển và điều phối, liên kết các đơn vị thành viên để tăng cường hiệu quả của cả hệ thống.\r\n\r\nTrong quá trình 20 năm hình thành và phát triển, Tập đoàn Dệt May Việt Nam đã hoàn thành nhiệm vụ là hạt nhân, tiên phong mở đường xây dựng thị trường mới, hội nhập quốc tế, định hướng phát triển cho toàn Ngành, góp phần đưa Dệt May Việt Nam thành Ngành kinh tế xuất khẩu mũi nhọn của quốc gia. Với việc lấy trọng tâm là phục vụ khách hàng ngày một tốt hơn, xây dựng giá trị thương hiệu dựa trên sự hài lòng của khách hàng, Vinatex trở thành một trong những nhà sản xuất hàng dệt may hàng đầu Việt Nam và Châu Á, có khả năng cung cấp các dịch vụ may mặc trọn gói, thời trang, chất lượng cao và thân thiện với môi trường. \r\n\r\nSở hữu những đơn vị kinh doanh có năng lực sản xuất, kinh doanh lớn và mạnh nhất trong ngành Dệt May Việt Nam, Công ty mẹ Vinatex giữ vai trò hoạch định các chiến lược phát triển và điều phối, liên kết các đơn vị thành viên để tăng cường hiệu quả của cả hệ thống. \r\n\r\nVới những thành tựu nổi bật từ khi thành lập đến nay, Tập đoàn Dệt May Việt Nam đã vinh dự được Chủ tịch nước tặng phần thưởng cao quý: Huân chương Độc lập hạng Ba năm 2000, Huân chương Hồ Chí Minh năm 2005 và Huân Chương sao Vàng năm 2010; 6 đơn vị thành viên và 8 cá nhân được tặng danh hiệu Anh hùng Lao động thời kỳ đổi mới; 6 tập thể đạt danh hiệu Anh hùng Lực lượng vũ trang nhân dân, và hàng trăm huân, huy chương các loại cho tập thể và cá nhân. Đây là thành quả rất đáng tự hào và trân trọng của các thế hệ lãnh đạo, cán bộ, công nhân viên vàngười lao động đã dày công vun đắp qua các thời kỳ; thể hiện truyền thống đoàn kết, lao động cần cù, sáng tạo, đầy nhiệt huyết và trí tuệ của hàng trăm nghìn người lao động trong Tập đoàn Dệt May Việt Nam.\r\n\r\nTrong giai đoạn 5 năm tới \u003c2015-2020\u003e Tập đoàn Dệt May Việt Nam hoạt động theo mô hình mới – cổ phần hóa với sự đầu tư mạnh mẽ hơn về tài chính, nhân sự nhờ có sự tham gia của hai nhà đầu tư chiến lược VID và VIN Group. Cũng trong giai đoạn này, Vinatex thực hiện vai trò lịch sử của mình trong bước ngoặt để Dệt May Việt Nam phát triển nhảy vọt bằng việc chủ động đầu tư mạnh mẽ vào dệt, nhuộm hoàn tất, tháo gỡ nút thắt để hình thành chuỗi cung ứng hoàn chỉnh, giúp tạo giá trị gia tăng và lợi thế cạnh tranh cho Tập đoàn, giảm tỷ trọng nhập khẩu nguyên phụ liệu, nâng cao tỷ lệ nội địa hóa, đạt mức KNXK 5 tỷ USD trước 2020. \r\n\r\nWebsite: http://www.vinatex.com"])</script><script>self.__next_f.push([1,"24:T6eb,\u003cp\u003e\u003cstrong\u003e1. Lập trình và phát triển phần mềm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phân tích nghiệp vụ, lập tài liệu yêu cầu, lập trình và kiểm thử phần mềm;\u003c/p\u003e\u003cp\u003e- Phát triển công cụ nội bộ (workflow, báo cáo, biểu mẫu...) bằng nền tảng low-code/no-code như Power Platform, AppSheet\u003c/p\u003e\u003cp\u003e- Xây dựng giải pháp dữ liệu (ETL), thiết kế dashboard trên Power BI\u003c/p\u003e\u003cp\u003e- Lậ
