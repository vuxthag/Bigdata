s/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tc2e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKnowledge:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tối thiểu 2 năm kinh nghiệm trong vai trò Product Owner, Game Producer hoặc tương tự trong ngành game mobile hoặc công nghệ.\u003c/p\u003e\u003cp\u003e- Hiểu sâu về quy trình phát triển và vòng đời sản phẩm game.\u003c/p\u003e\u003cp\u003e- Kiến thức vững chắc về game design, player psychology và xu hướng game mobile.\u003c/p\u003e\u003cp\u003e- Kinh nghiệm làm việc với các chỉ số sản phẩm (retention, monetization, UA).\u003c/p\u003e\u003cp\u003e- Thành thạo phương pháp Agile/Scrum và kỹ năng xây dựng, quản lý roadmap sản phẩm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSkills:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đã chơi và hiểu nhiều thể loại game.\u003c/p\u003e\u003cp\u003e- Khả năng phân tích dữ liệu và thấu hiểu hành vi người chơi tốt.\u003c/p\u003e\u003cp\u003e- Kỹ năng lập kế hoạch, giao tiếp, thuyết trình, quản lý công việc và con người hiệu quả.\u003c/p\u003e\u003cp\u003e- Tư duy chiến lược và ra quyết định nhanh, chính xác.\u003c/p\u003e\u003cp\u003e- Teamwork xuất sắc, phối hợp hiệu quả với team Marketing, BI, Design, Dev.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAttitude:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đam mê với ngành game mobile, luôn cập nhật xu hướng và đối thủ cạnh tranh.\u003c/p\u003e\u003cp\u003e- Chủ động, quyết đoán, nhanh nhẹn và có khả năng đặt câu hỏi đúng trọng tâm.\u003c/p\u003e\u003cp\u003e- Cẩn thận, tỉ mỉ, cầu toàn và có tiêu chuẩn cao về chất lượng công việc.\u003c/p\u003e\u003cp\u003e- Có tinh thần trách nhiệm cao và mong muốn phát triển lâu dài cùng công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTHU NHẬP\u003c/
