s) to drive and expand our\u003c/p\u003e\u003cp\u003enew sales business.\u003c/p\u003e\u003cp\u003eThis role is accountable for:\u003c/p\u003e\u003cp\u003e• Driving new sales revenue growth.\u003c/p\u003e\u003cp\u003e• Developing strong customer relationships in the Oil \u0026 Gas, Petrochemical, and Heavy Industry\u003c/p\u003e\u003cp\u003esectors.\u003c/p\u003e\u003cp\u003e• Leading and coaching the sales team to deliver sustainable business performance.\u003c/p\u003e\u003cp\u003eYou will play a key leadership role in shaping TTE’s New Sales business and strengthening our long-\u003c/p\u003e\u003cp\u003eterm partnerships with industrial clients.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Key Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Plan and supervise the team to conduct Sales strategies for monthly/quarterly/yearly.\u003c/p\u003e\u003cp\u003e• Develop and maintain a strong relationship with potential and existing Customers and TTE’s\u003c/p\u003e\u003cp\u003eSupplier/Principals.\u003c/p\u003e\u003cp\u003e• Advise and consult customers about assigned products and assigned markets.\u003c/p\u003e\u003cp\u003e• Check and review bidding documents \u0026 collaborate with Sales Support to make quotation and biding.\u003c/p\u003e\u003cp\u003e• Manage costs related to sales activities of the section according to company rules, ensure saving and\u003c/p\u003e\u003cp\u003ereasonable.\u003c/p\u003e\u003cp\u003e• Manage all role of accounts which arranged or direct selling for difficult and large cases to meet and\u003c/p\u003e\u003cp\u003eexceed annual sales target for team.\u003c/p\u003e\u003cp\u003e• Represent the business at conferences, seminars and networking events.\u003c/p\u003e\u003cp\u003e• Cross functional collaboration with Salesman, Sales support team, Accounting… to ensure minimize\u003c/p\u003e\u003cp\u003edamage arising by late delivery or late payment of customers.\u003c/p\u003e\u003cp\u003e
