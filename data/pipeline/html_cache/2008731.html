e with 1,273 partners into an integrated Asia-Pacific Area, we have created a unique opportunity to accelerate our drive to become the most dominant professional services organization in the region. In this area, EY drives linkages across China, the Far East and Oceania and connect with the b"])</script><script>self.__next_f.push([1,"roader global economy. EY Vietnam is a member of EY Asia Pacific.\r\n\r\nEY Vietnam was the first international auditing and advisory firm to have established a legally recognized 100% foreign owned company in Vietnam. We were awarded our license in 1992 and are committed to the long-term development of Vietnam and its people. We have offices in Hanoi, Ho Chi Minh City and employ over 860 local and expatriate professional staff. We have a number of expatriates from United States of America, Europe, Australia, Japan, Korea, Malaysia, Singapore, and the Philippines as well as a large number of Vietnamese staff that have extensive experience in serving international clients locally in Vietnam and abroad. They are dedicated to providing the same level of professional service that our clients worldwide have come to expect.24:T879,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003ePosition title: Technology Senior Consultant – Digital Transformation \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAt EY we support you in achieving your unique potential both personally and professionally via a challenging and rewarding experiences to fulfill your career aspirations; supported by an atmosphere of integrity and teaming with some of the world's most successful companies. While, we encourage you to take personal responsibility for your career, we also support you in your professional development in every way we can. At EY you can be who you are and express your point of view, energy and enthusiasm, wherever you are in the world. It's how you make a difference.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWho you’ll work with: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTechnology Consulting Team of EY located in both Hanoi Office \u0026 Ho Chi Minh Office working directly with our clients across the country and the region.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat you’ll do: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eYou’ll work with a team of 4 or more consultants, led by an experienced Consultant, focusing on various aspects of engagements activities focusing on Technology domain.\u003c/p\u003e\u003cp\u003eIn general, the engagement activities includes:\u003c/p\u003e\u003cp\u003e- Conduct the working sessions with clients independently including interviews to gather User requirements on IT solutions, workshops to present work products, meetings to update/resolve project matters;\u003c/p\u003e\u003cp\u003e- Document, analyze collected information and proactively clarify clients’ business requirements and system functionality specifications if any;\u003c/p\u003e\u003cp\u003e- Hypothesise, analyse, conduct independent assessment on various aspects of technology with the help of EY Expertise and Tools\u003c/p\u003e\u003cp\u003e- Lead a team on client engagements to complete specific group of activities\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhile your focus areas in Technology would encompass either one or a combination\u003c/strong\u003e of the following domains:\u003c/p\u003e\u003cp\u003e- Digital Transformation: Digital Strategy, IT Operating Model, Enterprise Architecture\u003c/p\u003e\u003cp\u003e- Data Management: Data Engineering, Data Analytics, Data Science, Business Analytics\u003c/p\u003e\u003cp\u003e- Emerging Technologies:  AI, Intelligent Automation, Robotic Process Automation\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Ta37,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eWhat’ll make you successful:\u003c/strong\u003e  \u003c/p\u003e\u003cp\u003e- Min. 6 years working experience in IT Industry primarily focusing one / a combination of the focus areas mentioned above, with min. 2 years working on Projects / Assignment as a key member of the project delivery i.e. Project Manager, Asst. Project Manager, Workstream Leader\u003c/p\u003e\u003cp\u003e- Possess a strong understanding of organizations, processes and related regulations of any of following business functions:\u003c/p\u003e\u003cp\u003e\t\t*** Energy – Fossil / Renewable,\u003c/p\u003e\u003cp\u003e\t\t*** Manufacturing,\u003c/p\u003e\u003cp\u003e\t\t*** Supply Chain,\u003c/p\u003e\u003cp\u003e\t\t*** Commerce,\u003c/p\u003e\u003cp\u003e\t\t*** Logistics\u003c/p\u003e\u003cp\u003e- Proficiency in English \u0026 Vietnamese in speaking, reading and writing is a must\u003c/p\u003e\u003cp\u003e- Advanced skills in MS Excel, MS Powepoint and MS Word is a must\u003c/p\u003e\u003cp\u003e- Proven track of record in one of the following sectors is highly preferred:\u003c/p\u003e\u003cp\u003e\t\t*** Consulting i.e. Big 4 firms, other boutique consulting firms,\u003c/p\u003e\u003cp\u003e\t\t*** Energy – Fossil / Renewable,\u003c/p\u003e\u003cp\u003e\t\t*** Manufacturing – smart factory, connected devices\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQualifications:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Bachelor’s or Master Degree in Information Technology, Business Administration, Computer Science, or equivalent programs related to required areas;\u003c/p\u003e\u003cp\u003e- Professional Credentials i.e. CSM® by SCRUM, PMP® by PMI, TOGAF by The Open Group, and ITIL/ITSM would be an added advantage \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat We Offer You\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAt EY, we’ll develop you with future-focused skills and equip you with world-class experiences. We’ll empower you in a flexible environment, and fuel you and your e
