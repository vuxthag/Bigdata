unks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T95a,"])</script><script>self.__next_f.push([1,"1. Company snapshot\r\n Industry: Manufacturing/Production\r\nWebsite:  http://www.syntecclub.com.tw/Index.aspx\r\nFacebook Fan Page: http://www.facebook.com/SynteCNC\r\nWorking Hours: Regular hours, Mondays - Fridays\r\n\r\n2. About Syntec\r\nPC industry changes with each passing by day and makes a great technical impact on every industry. Internationally, the (CNC) controllers used by precision machinery industry are gradually developed in the PC-based software and hardware environments.\r\nTaiwan is known the PC Empire, ranked No.5 in total output value of machinery in the world, and challenges the exportation of machine tools for the third of the world. Also, Taiwan is ranked No.3 in woodworking machine production, No.6 in precision mold manufacture, No.5 in textile and rubber machinery. Obviously, Taiwan plays a very important role in the machine industry. So the participation of\r\nTaiwan in the controller ﬁeld can also catch up the worldwide trend. Under this background, we founded Syntec in 1995 which is a professional company in PC-based CNC controller research, development, marketing and service. Moreover, Syntec is the most completely and potentially professional PC-based controller company in series products.\r\n\r\n3. About Syntec Vietnam\r\nSyntec Vietnam is a newly formed company which represents Syntec to provide sales and service activities of Syntec in Vietnam.\r\n\r\n4. Business Culture\r\nHonesty: Tell no lie, talk the talk, walk the walk and announce bad news actively\r\nIntegrity: Not afraid to displease anyone, but brave insisting and askinig\r\nActivity: In the fastest time, the spirit of getting things done\r\nGroup: Communicate, concern and report actively\r\nInnovation: Seek better working habits at every moment\r\nFind the reason for failure and ﬁnd the way for success\r\n\r\n5. Vision and Mission\r\nVision : To be the most trustful partner of control system in machine tool industry\r\nMission: continuous innovation, providing high quality products and services to\r\nmeet the human use of machine tools, machine tools of becoming the best partner Electronic\r\n\r\n6. Business Philosophy\r\nWe build ﬂow of Organization and business to create ideal oﬃce environment\r\nWe keep oﬀer high quality and powerful service back-up by our continuous innovations and service teamwork to satisfy our customers.\r\nAs international vision, we create company value to reach business continuity"])</script><script>self.__next_f.push([1,"24:T11d7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tìm kiếm, phát triển và quản lý các cơ hội kinh doanh mới trong các thị trường, khu vực được phân công\u003c/p\u003e\u003cp\u003e• Phụ trách phát triển doanh số các sản phẩm và giải pháp: Máy CNC và giải pháp nâng cấp (retrofit CNC), Giải pháp tự động hóa (robot gắp – giải pháp robot), Giải pháp số hóa/Cloud (Synfactory) và các dịch vụ kỹ thuật liên quan\u003c/p\u003e\u003cp\u003e• Lập báo giá, hồ sơ đề xuất kỹ thuật – thương mại và phân tích chi phí cho khách hàng.\u003c/p\u003e\u003cp\u003e• Chịu trách nhiệm đạt chỉ tiêu doanh số, tăng trưởng doanh thu và mở rộng thị trường.\u003c/p\u003e\u003cp\u003e• Xây dựng và duy trì mối quan hệ lâu dài với khách hàng, đại lý và đối tác chiến lược.\u003c/p\u003e\u003cp\u003e• Phân tích nhu cầu khách hàng, tư vấn và đề xuất giải pháp kỹ thuật phù hợp.\u003c/p\u003e\u003cp\u003e• Thực hiện gặp gỡ khách hàng, thuyết trình giải pháp và trao đổi kỹ thuật.\u003c/p\u003e\u003cp\u003e• Theo dõi dự án từ giai đoạn tiếp nhận yêu cầu đến khi chốt đơn hàng và bàn giao.\u003c/p\u003e\u003cp\u003e• Cung cấp hỗ trợ kỹ thuật trước bán hàng, phối hợp xây dựng phương án giải pháp.\u003c/p\u003e\u003cp\u003e• Làm việc chặt chẽ với các bộ phận kỹ thuật, ứng dụng và dịch vụ để đảm bảo tính khả thi và hiệu quả của giải pháp.\u003c/p\u003e\u003cp\u003e• Hỗ trợ chạy thử thực tế, thử nghiệm giải pháp (POC) và nghiệm thu tại nhà máy (FAT) khi cần.\u003c/p\u003e\u003cp\u003e• Thu thập thông tin thị trường, phản hồi khách hàng để đề xuất cải tiến sản phẩm và giải pháp.\u003c/p\u003e\u003cp\u003e• Phân tích xu hướng thị trường, đối thủ cạnh tranh và nhu cầu khách hàng.\u003c/p\u003e\u003cp\u003e• Hỗ trợ ban lãnh đạo xây dựng chiến lược phát triển và mở rộng thị trường\u003c/p\u003e\u003cp\u003e• Phối hợp với các phòng ban nội bộ (kỹ thuật, service, hành chính kế toán, tổng công ty) để đảm bảo dự án triển khai đúng tiến độ.\u003c/p\u003e\u003cp\u003e• Lập báo cáo forecasts doanh số, pipeline reports và cập nhật tình hình kinh doanh.\u003c/p\u003e\u003cp\u003e• Tuân thủ các quy trình và chính sách của công ty.\u003c/p\u003e\u003cp\u003e• Hướng dẫn, hỗ trợ và đào tạo nhân viên kinh doanh/kỹ sư kinh doanh cấp dưới.\u003c/p\u003e\u003cp\u003e• Chia sẻ kiến thức chuyên môn và kinh nghiệm thực tế trong team.\u003c/p\u003e\u003cp\u003e• Đóng vai trò là đầu mối kỹ thuật – thương mại cho các dự án quan trọng, yêu cầu cao về giải pháp kỹ thuật tổng thể.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJOB DESCRIPTION\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eSenior Business Development Engineer\u003c/p\u003e\u003cp\u003e• Identify, develop, and manage new business opportunities in assigned markets or industries\u003c/p\u003e\u003cp\u003e• Drive sales of CNC machines (retrofit CNC machine), automation solutions (Robot solution-machine tending), Cloud (Synfactory), and related services support.\u003c/p\u003e\u003cp\u003e• Prepare technical–commercial proposals, quotations, and cost justifications\u003c/p\u003e\u003cp\u003e• Achieve assigned sales targets, revenue growth, and market expansion objectives\u003c/p\u003e\u003cp\u003e• Build and maintain strong relationships with key customers, distributors, and partners\u003c/p\u003e\u003cp\u003e• Understand customer requirements and propose suitable technical solutions\u003c/p\u003e\u003cp\u003e• Conduct regular customer visits, presentations, and technical discussions\u003c/p\u003e\u003cp\u003e• Manage project follow-ups from inquiry to order confirmation and handover\u003c/p\u003e\u003cp\u003e• Provide pre-sales technical support and solution recommendations\u003c/p\u003e\u003cp\u003e• Work closely with application, engineering, and service teams to ensure solution feasibility\u003c/p\u003e\u003cp\u003e• Support machine demos, proof of concept (POC), and factory acceptance tests (FAT) when required\u003c/p\u003e\u003cp\u003e• Collect market feedback and customer insights for product improvement\u003c/p\u003e\u003cp\u003e• Analyze market trends, competitors, and customer demands\u003c/p\u003e\u003cp\u003e• Support management in developing market entry and expansion strategies\u003c/p\u003e\u003cp\u003e• Coo
