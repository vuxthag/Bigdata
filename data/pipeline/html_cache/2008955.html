d contribute more to the community. \r\n\r\nFollowing that aspiration and vision in the last two decades, RT Holdings has been developing and expanding with a number of units, including:\r\n\r\n-          Western Australian International School System (WASS)\r\n\r\n-          Pennsylvania American International School System (PennSchool)\r\n\r\n-          Sydney International School System (SISS)\r\n\r\n-          Institute of Accounting and Business Management (IABM)\r\n\r\n-          American College of Vietnam (AmCollege)\r\n\r\n-          Indochina Study Abroad (ISA)\r\n\r\n-          Penn Academy\r\n\r\n-          Talents Development Academy (TDA)\r\n\r\nDespite having various educational levels and programs, all units in RT Holdings share a common point: an open-minded educational spirit, constantly innovative training methods, and a training method standardized to international quality through the world’s reputable accreditation programs. Many generations of students have grown up, become students at top Universities, and achieved a lot of success in their careers from the solid foundation that all the units in RT Holdings consistently build up every day.\r\n\r\nThe journey of nearly two decades of creation and innovation of RT Holdings have been driven by passion and enthusiasm, which comes from the passion, dedication and desires of Teachers who are always concerned about education.\r\n\r\nJoin us today to contribute your talents to the journey of raising up excellent young generations and making Vietnam one of the leading countries in the globalization of education.\r\n\r\nRT Holdings Team\r\n\r\nhttps://rtholdings.edu.vn/en/"])</script><script>self.__next_f.push([1,"3d:{\"companyId\":147367,\"jobImageURLs\":\"$3e\",\"jobVideoURLs\":\"$3f\",\"companyName\":\"RT Holdings\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/c2/11187106.png\",\"companySizeId\":\"\",\"companyProfile\":\"$40\",\"contactName\":\"HR Department\",\"contactEmail\
