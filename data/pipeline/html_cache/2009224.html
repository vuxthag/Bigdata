003cbr\u003e\u003c/p\u003e\u003cp\u003e- Lập kế hoạch kinh doanh, điều hành và giám sát toàn bộ, (hoặc chuyên trách trưởng phòng theo nhóm sản phẩm) hoạt động của phòng kinh doanh.\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm hoàn thành mục tiêu doanh số, chỉ tiêu KPI và chiến lược phát triển thị trường.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Phát triển khách hàng \u0026 thị trường\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Chủ động sử dụng các công cụ tìm kiếm Data và mở rộng mạng lưới khách hàng cung cấp nguyên liệu hạt nhựa, vật tư chống thấm (Cụ thể là sản phẩm: Băng cản nước) cho các nhà máy, thương hiệu có sản xuất hoá chất chống thấm nhưng không sản xuất được băng cản nước và đối tác phân phối.\u003c/p\u003e\u003cp\u003e- Phát triển và tối ưu dữ liệu khách hàng (data), ứng dụng công nghệ số, AI và CRM để tối đa hoá hiệu quả bán hàng, dự báo doanh thu và phân tích hành vi khách hàng.\u003c/p\u003e\u003cp\u003e- Xây dựng quan hệ chiến lược với khách hàng doanh nghiệp, đối tác kỹ thuật, nhà thầu, phân phối trong \u0026 ngoài nước.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Phát triển thị trường quốc tế\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Nghiên cứu thị trường xuất khẩu hạt nhựa PVC compoud, thấu hiểu nhu cầu logistics để thiết kế giải pháp kinh doanh phù hợp với khách hàng quốc tế.\u003c/p\u003e\u003cp\u003e- Phối hợp với các bộ phận liên quan (Logistics/ SCM/ Marketing) để đảm bảo chuỗi cung ứng xuyên biên giới hiệu quả và kịp thời.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Chiến lược bán hàng \u0026 báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Đề xuất, xây dựng và triển khai chiến lược bán hàng dài hạn và ngắn hạn.\u003c/p\u003e\u003cp\u003e- Theo dõi, phân tích số liệu kinh doanh để đề xuất điều chỉnh chiến lược, báo cáo định kỳ cho Ban Giám đốc.\u003c/p\u003e\u003cp\u003e- Xây dựng KPI, chính sách thưởng – hoa hồng thúc đẩy hiệu quả đội nhóm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e 5. Quản lý đội nhóm\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Tuyển dụng, đào tạo, đánh giá hiệu suất và phát triển năng lực đội ngũ kinh doanh.\u003c/p\u003e\u003cp\u003e- Tạo môi trường làm việc năng động, đổi mới sáng tạo và hướng tới kết quả.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Taa4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eII. Yêu cầu ứng viên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e Trình độ \u0026 kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên (Quản trị Kinh doanh, Marketing, Logistics, Ngoại thương, Kinh tế hoặc tương đương).\u003c/p\u003e\u003cp\u003e- Có ít nhất 3 – 5 năm kinh nghiệm ở vị trí kinh doanh/ BD, trong đó ít nhất 2 năm ở vị trí quản lý/ trưởng nhóm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng \u0026 kiến thức chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Am hiểu sâu thị trường vật liệu chống thấm (Cụ thể là sản phẩm: Băng cản nước) hoặc hạt nhựa PVC compound và phục vụ sản xuất. Cùng với sản phẩm sản xuất gia công các loại thanh nẹp nhựa PVC theo yêu cầu.\u003c/p\u003e\u003cp\u003e- Kỹ năng tìm kiếm khách hàng và phát triển data khách hàng (Database/ CRM).\u003c/p\u003e\u003cp\u003e- Ứng dụng công nghệ số và ứng dụng AI trong công việc (phân tích dữ liệu, dự báo thị trường, tối ưu quy trình bán hàng, tự động hoá báo cáo).\u003c/p\u003e\u003cp\u003e- Kiến thức cơ bản về Logistics và Supply Chain để hỗ trợ mở rộng thị trường xuất khẩu.\u003c/p\u003e\u003cp\u003e- Kỹ năng lãnh đạo, quản lý đội nhóm, thương lượng, đàm phán và ký kết hợp đồng.\u003c/p\u003e\u003cp\u003e- Giao tiếp tiếng Anh tốt là một lợi thế (ưu tiên ứng viên có kinh nghiệm làm việc quốc tế).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e Tố chất cá nhân\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Chủ động, tư duy chiến lược, chịu được áp lực công việc cao.\u003c/p\u003e\u003cp\u003e- Tư duy đổi mới, sáng tạo trong giải pháp kinh doanh.\u003c/p\u003e\u003cp\u003e- Tinh thần hợp tác liên phòng ban và hướng đến kết quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII. Quyền lợi hấp dẫn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Mức lương cạnh tranh \u0026 chương trình thưởng KPI hấp dẫn theo hiệu quả doanh số.\u003c/p\u003e\u003cp\u003e- Cơ hội phát triển nghề nghiệp rõ ràng, thăng tiến lên vị trí cao hơn trong hệ thống Sales/ BD – Quản lý.\u003c/p\u003e\u003cp\u003e- Đào tạo chuyên sâu về kỹ năng bán hàng, AI ứng dụng trong kinh doanh \u0026 phát triển dữ liệu.\u003c/p\u003e\u003cp\u003e- Các chế độ BHXH, phúc lợi đầy đủ theo luật Lao động.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNếu bạn là ứng viên:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm sales B2B, B2C, xây dựng hệ thống phân phối rõ ràng.\u003c/p\u003e\u003cp\u003e- Thích ứng nhanh với công nghệ, đặc biệt trong phát triển hệ thống data và AI.\u003c/p\u003e\u003cp\u003e- Mong muốn mở rộng thị trường quốc tế và phát triển đội ngũ kinh doanh mạnh mẽ — thì đây là vị trí lý tưởng cho bạn!\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Tac5,"])</script><script>self.__next_f.push([1,"\u003cp\u003eĐịa điểm làm việc: TP. Hồ Chí Minh. https://maps.app.goo.gl/AhrQwejWn5UFMuPA8\u003c/p\u003e\u003cp\u003e Hình thức làm việc: Toàn thời gian\u003c/p\u003e\u003cp\u003eMức lương: 30 – 50 triệu + Thưởng theo
