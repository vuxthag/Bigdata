inh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMain Responsibilities/ Nhiệm vụ chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Consulting and drafting, reviewing contracts: Drafting, reviewing, negotiating,\u003c/p\u003e\u003cp\u003econtracts and agreements related to livestock farming, slaughtering, processing, distribution, logistics, raw material and product sales, subcontracting, warehouse/factory leasing, services, NDAs, and other commercial contracts;\u003c/p\u003e\u003cp\u003eTư vấn và soạn thảo, soát xét hợp đồng: Soạn thảo, rà soát, đàm phán các hợp đồng, thỏa thuận liên quan đến hoạt động chăn nuôi, giết mổ, chế biến, phân phối, logistics, mua bán nguyên liệu – sản phẩm, gia công, thuê kho/xưởng, dịch vụ, NDA, hợp đồng thương mại khác;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Providing advice and guidance on the application of legal regulations related to: Food safety, veterinary medicine, quarantine, slaughter, processing and\u003c/p\u003e\u003cp\u003epreservation of meat products; Standards, technical regulations, product labeling, traceability; Product declaration, self-declaration of products, advertising and trade promotion of food; Consumer protection; Occupational safety, hygiene, and environmental protection in production activities and other areas related to the company's operations.\u003c/p\u003e\u003cp\u003eTư vấn và hướng dẫn áp dụng các quy định pháp luật liên quan đến: An toàn thực phẩm, thú y, kiểm dịch, giết mổ, chế biến và bảo quản sản phẩm từ thịt; Tiêu chuẩn, quy chuẩn kỹ thuật, ghi nhãn hàng hóa, truy xuất nguồn gốc; Công bố sản phẩm, tự công bố sản phẩm, quảng cáo và xúc tiến thương mại thực phẩm; Bảo vệ quyền lợi người tiêu dùng; An toàn lao động, vệ sinh lao động, môi trường trong hoạt động sản xuất và các lĩnh vực khác liên quan đến hoạt động của công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e-Legal procedures and permits related to: Business registration certificate, investment certificate; Licenses, approvals, and certifications of eligibility in the fields of livestock farming, slaughtering, food processing, environment, fire prevention and control, and food safety; Operations of branches, business locations, and subsidiaries (if any).\u003c/p\u003e\u003cp\u003eThủ tục pháp lý và giấy phép liên quan đến: Giấy chứng nhận đăng ký doanh nghiệp, đầu tư; Giấy phép, chấp thuận, chứng nhận đủ điều kiện trong lĩnh vực chăn nuôi, giết mổ, chế biến thực phẩm, môi trường, PCCC, ATTP; Hoạt động của chi nhánh, địa điểm kinh doanh, công ty con (nếu có).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Collaborate with external lawyers (if necessary) to resolve disputes and legal\u003c/p\u003e\u003cp\u003eissues arising in connection with the Company's operations;\u003c/p\u003e\u003cp\u003ePhối hợp với Luật sư (nếu cần) để tham gia giải quyết các tranh chấp và các vấn đề pháp lý phát sinh liên quan đến hoạt động của Công ty;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Dissemination of legal awareness and provide legal knowledge training to\u003c/p\u003e\u003cp\u003edepartments/divisions and employees within the Company.\u003c/p\u003e\u003cp\u003eTổ chức tuyên truyền, phổ biến nhận thức pháp luật và đào tạo về kiến thức pháp luật cho các Khối/Phòng ban và nhân viên trong Công ty;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Compile reports and perform other related tasks as assigned by Legal Manager\u003c/p\u003e\u003cp\u003eThực hiện tổng hợp báo cáo và các công việc khác có liên quan theo sự phân công của Trưởng phòng.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T94e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eEducation/ Học vấn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Bachelor’s degree in Law. Completion of a lawyer training course is preferred.\u003c/p\u003e\u003cp\u003eTốt nghiệp Đại học (chính quy) ngành Luật. Ưu tiên đã hoàn thành khóa đào tạo nghiệp vụ Luật sư.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExperience/ Kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Minimum 03 (three) years of experience working in the legal field at manufacturing, trading companies or law firms.\u003c/p\u003e\u003cp\u003eTối thiểu 03 (ba) năm kinh nghiệm làm trong lĩnh vực pháp chế tại các doanh nghiệp sản xuất, thương mại hoặc các công ty luật.\u003c/p\u003e\u003cp\u003eƯu tiên có kinh nghiệm trong lĩnh vực thực phẩm, nông nghiệp\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical Skills/ Kỹ năng chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Possesses expertise in civil law, corporate law, commercial law, food-safety law, competition law, consumer protection law, and litigation;\u003c/p\u003e\u003cp\u003e- Preference will be given to candidates with knowledge of food production law; \u003c/p\u003e\u003cp\u003e- Skills in drafting and reviewing legal documents, as well as skills in summarizing and reporting.\u003c/p\u003e\u003cp\u003eCó kiến thức chuyên môn về pháp luật dân sự, doanh nghiệp, thương mại, an toàn thực phẩm, cạnh tranh, bảo vệ người tiêu dùng, tố tụng;\u003c/p\u003e\u003cp\u003eƯu tiên có kiến thức pháp luật về sản xuất thực phẩm;\u003c/p\u003e\u003cp\u003eKỹ năng soạn thảo, rà soát văn bản pháp lý và kỹ năng tổng hợp, báo cáo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSoft Skills/ Kỹ năng mềm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Communication skills, ability to present information clearly and coherently;\u003c/p\u003e\u003cp\u003e- Planning and implementation skills;\u003c/p\u003e\u003cp\u003e- Ability to work independently and in a team;\u003c/p\u003e\u003cp\u003eKỹ năng giao tiếp, trình bày mạch lạc, rõ ràng;\u003c/p\u003e\u003cp\u003eKỹ r\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMain Responsibilities/ Nhiệm vụ chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Consulting and drafting, reviewing contracts: Drafting, reviewing, negotiating,\u003c/p\u003e\u003cp\u003econtracts and agreements related to livestock farming, slaughtering, processing, distribution, logistics, raw material and product sales, subcontracting, warehouse/factory leasing, services, NDAs, and other commercial contracts;\u003c/p\u003e\u003cp\u003eTư vấn và soạn thảo, soát xét hợp đồng: Soạn thảo, rà soát, đàm phán các hợp đồng, thỏa thuận liên quan đến hoạt động chăn nuôi, giết mổ, chế biến, phân phối, logistics, mua bán nguyên liệu – sản phẩm, gia công, thuê kho/xưởng, dịch vụ, NDA, hợp đồng thương mại khác;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Providing advice and guidance on the application of legal regulations related to: Food safety, veterinary medicine, quarantine, slaughter, processing and\u003c/p\u003e\u003cp\u003epreservation of meat products; Standards, technical regulations, product labeling, traceability; Product declaration, self-declaration of products, advertising and trade promotion of food; Consumer protection; Occupational safety, hygiene, and environmental protection in production activities and other areas related to the company's operations.\u003c/p\u003e\u003cp\u003eTư vấn và hướng dẫn áp dụng các quy định pháp luật liên quan đến: An toàn thực phẩm, thú y, kiểm dịch, giết mổ, chế biến và bảo quản sản phẩm từ thịt; Tiêu chuẩn, quy chuẩn kỹ thuật, ghi nhãn hàng hóa, truy xuất nguồn gốc; Công bố sản phẩm, tự công bố sản phẩm, quảng cáo và xúc tiến thương mại thực phẩm; Bảo vệ quyền lợi người tiêu dùng; An toàn lao động, vệ sinh lao động, môi trường trong hoạt động sản xuất và các lĩnh vực khác liên quan đến hoạt động của công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e-Legal procedures and permits rela
