03e\u003cp\u003e\u003cstrong\u003eB\tMô tả chi tiết Nghiệp Vụ:\t\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1. Xây dựng mô hình Quản lý rủi ro và cấu trúc quản trị vận hành hiệu quả.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thiết kế và triển khai xây dựng qui trình quản lý rủi ro tổng thể cho công ty, tập đoàn. \u003c/p\u003e\u003cp\u003e- Xây dựng khẩu vị rủi ro của Tập đoàn và được Ban Lãnh đạo phê duyệt\u003c/p\u003e\u003cp\u003e- Phát triển các công cụ và từng bước công nghệ hóa để nâng cao và thực hiện hiệu quả tất cả chương trình quản lý rủi ro vận hành và cấu trúc quản trị của công ty, tập đoàn. \u003c/p\u003e\u003cp\u003e- Thực hiện vai trò tư vấn, hỗ trợ các đơn vị tuyến 1 trong công tác đánh giá, phân tích rủi ro, xây dựng các tiêu chí giám sát, đo lường các rủi ro ảnh hưởng đến kinh doanh, vận hành. \u003c/p\u003e\u003cp\u003e- Đề xuất hoặc thực hiện, triển khai các dự án, công cụ quản lý để duy trì hoạt động kinh doanh liên tục của tập đoàn \u003c/p\u003e\u003cp\u003e- Chuẩn bị các báo cáo đánh giá các rủi ro trọng yếu của tập đoàn theo định kỳ hoặc theo yêu cầu để trình lên BĐH\"\t\t\t\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Điều hành hoạt động quản lý rủi ro hàng ngày \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phân công, triển khai thực hiện việc tư vấn, nhận diện các rủi ro trong quy trình vận hành của đơn vị\u003c/p\u003e\u003cp\u003e- Đảm bảo hiểu rõ được nguyên nhân của các sự cố được báo cáo, giám sát kế hoạch hành động kiểm soát rủi ro trong hoạt động vận hành và tư vấn đề xuất các giải pháp \u003c/p\u003e\u003cp\u003e- Đóng vai trò “Đại diện/Program Management office” để dẫn dắt các dự án, đào tạo, chia sẻ kiến thức, hiểu biết về quản lý rủi ro cho toàn thể công ty, tập đoàn \u003c/p\u003e\u003cp\u003e-  Hỗ trợ, phối hợp chặt chẽ, hỗ trợ cho các trưởng phòng ban khác trong việc quản lý và giảm thiểu rủi ro hàng ngày, bao gồm công tác đào tạo, tập huấn, đưa ra các sáng kiến để nâng cao kiến thức, nhận thức về quản lý rủi ro .\"\t\t\t\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3. Quản lý đội ngũ nhân viên\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thực hiện giao việc, đào tạo, hỗ trợ phát triển năng lực cho đội ngũ nhân viên \u003c/p\u003e\u003cp\u003e- Đánh giá hiệu quả công việc của nhân viên. \u003c/p\u003e\u003cp\u003e- Tuyển dụng và đề xuất phát triển nhân viên để nâng cao hiệu quả và đạt năng suất mục tiêu \t\t\t\t\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4. Thực hiện các nhiệm vụ khác  theo yêu cầu của cấp trên\t\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Chỉ số đo lường Hiệu quả công việc (KPI): \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tỷ lệ hoàn thành xây dựng khẩu vị rủi ro của Tập đoàn và được Ban Lãnh đạo phê duyệt\u003c/p\u003e\u003cp\u003e- Tỷ lệ hoàn thành các báo cáo rủi ro (Risk Dashboard) đúng hạn được phê duyệt\u003c/p\u003e\u003cp\u003e- Tỷ lệ hoàn thành xây dựng danh mục/cập nhật danh mục rủi ro trọng yếu của Tập đoàn\u003c/p\u003e\u003cp\u003e- Tỷ lệ hoàn thành xây dựng tài liệu đào tạo, trình bày phương pháp và kiến thức quản lý rủi ro\u003c/p\u003e\u003cp\u003e- Tỷ lệ hoàn thành bộ chỉ tiêu KRIs cho các rủi ro quan trọng\t\u003c/p\u003e\u003cp\u003e- Tỷ lệ hoàn thành hồ sơ đánh giá rủi ro của Phòng ban đúng hạn\u003c/p\u003e\u003cp\u003e- Tỷ lệ hoàn thành số lần thực hiện huấn luyện/chia sẻ nội dung QTRR cho các PB\u003c/p\u003e\u003cp\u003e- Tỷ lệ nhân viên nắm vững nghiệp vụ và hoàn thành công việc đúng hạn, không sai sót\t\t\u003c/p\u003e\u003cp\u003e- Tỷ lệ hoàn thành công việc đúng hạn theo yêu cầu.\t\t\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:T8a3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ: \u003c/strong\u003eTối thiểu cử nhân chu
