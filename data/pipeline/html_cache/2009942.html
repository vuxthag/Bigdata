ầu tư trang thiết bị hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e3. Kỹ thuật \u0026 kiểm soát chất lượng (QA/QC)\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm cao nhất về kỹ thuật ươm trồng, chăm sóc, tạo dáng và xử lý sâu bệnh.\u003c/p\u003e\u003cp\u003e- Ứng dụng các công nghệ và quy trình kỹ thuật tiên tiến để nâng cao tỷ lệ sống và chất lượng thẩm mỹ của cây.\u003c/p\u003e\u003cp\u003e- Trực tiếp xử lý các sự cố kỹ thuật phức tạp liên quan đến sinh lý thực vật và dịch bệnh.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e4. Điều hành sản xuất hằng ngày\u003c/p\u003e\u003cp\u003e- Lập và triển khai kế hoạch sản xuất 3–12 tháng.\u003c/p\u003e\u003cp\u003e- Quản lý khu nhà màng, nhà kính và vườn ươm ngoài trời.\u003c/p\u003e\u003cp\u003e- Phân công, giám sát công việc tưới – cắt tỉa – bón phân – phòng trừ sâu bệnh.\u003c/p\u003e\u003cp\u003e- Quản lý vật tư, giống, giá thể; theo dõi tồn kho.\u003c/p\u003e\u003cp\u003e- Báo cáo định kỳ về sản lượng, chất lượng cây và tình trạng sâu bệnh.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e5. KPIs chính\u003c/p\u003e\u003cp\u003e- Tỷ lệ cây sống và đạt chuẩn xuất vườn.\u003c/p\u003e\u003cp\u003e- Đáp ứng tiến độ cung ứng cho dự án.\u003c/p\u003e\u003cp\u003e- Tối ưu chi phí vận hành.\u003c/p\u003e\u003cp\u003e- Tỷ lệ nghiệm thu đạt ngay lần đầu.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T620,\u003cp\u003e\u003cstrong\u003eIII. Yêu cầu công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Trình độ học vấn\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên các chuyên ngành: Nông học, Lâm nghiệp, Bảo vệ thực vật, Công nghệ sinh học hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\u003c/p\u003e\u003cp\u003e- Tối thiểu 07–10 năm kinh nghiệm trong lĩnh vực nông/lâm nghiệp hoặc vườn ươm.\u003c/p\u003e\u003cp\u003e- Ít nhất 03 năm ở vị trí quản lý cấp cao (Giám đốc/Trưởng ban/Quản lý vườn ươm quy mô lớn).\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm setup vườn ươm mới, xây dựng quy trình vận hành là lợi thế lớn.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e3. Năng lực \u0026 kỹ năng\u003c/p\u003e\u003cp\u003e- Am hiểu sâu về sinh lý thực vật, đặc tính sinh trưởng của cây cảnh quan và các biện pháp phòng trừ sâu bệnh tổng hợp (IPM).\u003c/p\u003e\u003cp\u003e- Tư duy quy hoạch và chiến lược; có khả năng dự báo rủi ro thời tiết, dịch bệnh và lập kế hoạch “gối đầu” cho sản xuất.\u003c/p\u003e\u003cp\u003e- Kỹ năng lãnh đạo, ra quyết định và quản lý đội ngũ lao động số lượng lớn.\u003c/p\u003e\u003cp\u003e- Có khả năng lập và kiểm soát ngân sách; hiểu các nguyên tắc quy hoạch cảnh quan cơ bản.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e4. Phẩm chất cá nhân\u003c/p\u003e\u003cp\u003e- Kỷ luật cao, trách nhiệm và chịu được áp lực tiến độ.\u003c/p\u003e\u003cp\u003e- Tỉ mỉ, cẩn trọng, định hướng chất lượng.\u003c/p\u003e\u003cp\u003e- Chủ động, linh hoạt và giỏi xử lý các vấn đề phát sinh trong vận hành.\u003c/p\u003e27:Ta92,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. Mục tiêu vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Quản lý và vận hành toàn bộ hoạt động vườn ươm nhằm đảm bảo cung ứng cây xanh đúng số lượng – đúng chất lượng – đúng tiến độ theo yêu cầu các dự án cảnh quan.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Mô tả công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Quản lý \u0026 tổ chức vận hành\u003c/p\u003e\u003cp\u003e- Xây dựng cơ cấu tổ chức, định biên nhân sự và hệ thống quy trình vận hành chuẩn (SOP) cho toàn bộ hoạt động vườn ươm.\u003c/p\u003e\u003cp\u003e- Tuyển dụng, đào tạo và phát triển đội ngũ kỹ sư, kỹ thuật viên và công nhân vườn ươm.\u003c/p\u003e\u003cp\u003e- Thiết lập KPI, đánh giá hiệu quả công việc và xây dựng văn hóa làm việc kỷ luật – hiệu quả.\u003c/p\u003e\u003cp\u0
