, cung cấp các dịch vụ đa dạng, đáp ứng nhu cầu ngày càng cao của thị trường.\r\nHệ thống nhà hàng - khách sạn: Hệ thống khách sạn mang thương hiệu RAVATEL và Khách sạn 5 sao JW Marriott và hệ thống Nhà hàng Hải Sản Ghẹ Xanh, Nhà hàng – Trung tâm hội nghị tiệc cưới Rùa Vàng, TUTA thực hiện vận hành chuỗi cơ sở lưu trú đạt chuẩn 4-5 sao và ẩm thực đẳng cấp, mang đến trải nghiệm hoàn hảo cho khách hàng.\r\nNông nghiệp công nghệ cao: Đầu tư vào các mô hình sản xuất nông nghiệp hiện đại, bền vững, tạo ra sản phẩm chất lượng cao.\r\nTại TUTA, chúng tôi xây dựng văn hóa doanh nghiệp dựa trên giá trị cốt lõi \"tận tâm với công việc, tử tế với mọi người\". Đây không chỉ là kim chỉ nam cho mọi hoạt động, mà còn là lời cam kết của chúng tôi với nhân viên, đối tác và cộng đồng. Chúng tôi tìm kiếm những cá nhân tài năng và tâm huyết, cùng chúng tôi tạo nên những giá trị bền vững cho xã hội."])</script><script>self.__next_f.push([1,"24:Tdf1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Lập kế hoạch marketing tổng thể\u003c/p\u003e\u003cp\u003e- Tham mưu cho lãnh đạo trong việc xây dựng chiến lược phát triển thương hiệu trên toàn hệ thống TUTA Group như: chiến lược định vị thương hiệu, cấu trúc thương hiệu, bộ nhận diện thương hiệu, ...\u003c/p\u003e\u003cp\u003e- Xây dựng kế hoạch, quản lý và triển khai marketing tổng thể, đảm bảo tính nhất quán giữa thương hiệu, sản phẩm và truyền thông.\u003c/p\u003e\u003cp\u003e- Lập ngân sách marketing hàng năm, quý, tháng và kiểm soát chi phí, kiểm soát thực hiện.\u003c/p\u003e\u003cp\u003e- Trong quá trình thực hiện, đề xuất điều chỉnh kế hoạch marketing phù hợp với thay đổi của xu hướng thị trường.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e2. Triển khai hoạt động marketing thương hiệu\u003c/p\u003e\u003cp\u003e- Triển khai, kiểm soát hoạt động marketing phục vụ bán hàng của dự án và dịch vụ như: lên các ý tưởng, chiến dịch xúc tiến thúc đẩy bán hàng, thông điệp quảng cáo, hình ảnh quảng cáo.\u003c/p\u003e\u003cp\u003e- Thiết kế và phát hành tài liệu truyền thông phù hợp với các kế hoạch marketing, luôn cập nhật tài liệu để đáp ứng nhu cầu công ty và bắt kịp xu hướng thị trường.\u003c/p\u003e\u003cp\u003e- Phối hợp phòng kinh doanh tổ chức hội thảo, sự kiện mở bán, roadshow.\u003c/p\u003e\u003cp\u003e- Quản lý hình ảnh, bộ nhận diện thương hiệu của công ty trên tất cả các kênh truyền thông.\u003c/p\u003e\u003cp\u003e- Nghiên cứu, đề xuất \u0026 triển khai các hoạt động hợp tác trong hoạt động marketing như: hội nghị, triển lãm, hội chợ, tài trợ, giải thưởng ...\u003c/p\u003e\u003cp\u003e- Thiết lập và duy trì mối quan hệ với báo chí, truyền thông.\u003c/p\u003e\u003cp\u003e- Làm việc với các sở ban ngành liên quan đến thủ tục hành chính phục vụ hoạt động quảng cáo truyền thông.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e3. Triển khai hoạt động digital marketing\u003c/p\u003e\u003cp\u003e- Quản lý, triển khai ngân sách marketing và tối ưu hiệu suất các hoạt động bao gồm: Sản xuất các tài liệu bán hàng; Quản lý hoạt động của website; Quảng cáo truyền hình, đài phát thanh; Quảng cáo online, mạng xã hội; hệ thống biển bảng; tổ chức sự kiện,...\u003c/p\u003e\u003cp\u003e- Quản lý, kiểm soát toàn bộ các hoạt động marketing của dự án đối với các đối tác, đại lý phân phối để đảm bảo tính thống nhất và thẩm mỹ.\u003c/p\u003e\u003cp\u003e- Làm việc trực tiếp với đối tác truyền thông ( agency, báo chí …) để thực hiện các chiến dịch truyền thông. Theo dõi, phân tích hiệu quả marketing, đề xuất các cải tiến để tăng hiệu suất bán hàng.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e4. Quản lý, triển khai công việc phòng marketing\u003c/p\u003e\u003cp\u003e- Xây dựng/cập nhật, triển khai và kiểm soát thực hiện quy định, quy trình trong hoạt động marketing.\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng cơ cấu nhân sự phòng marketing phù hợp với yêu cầu công việc được giao.\u003c/p\u003e\u003cp\u003e- Tham gia tuyển dụng, đánh giá nh
