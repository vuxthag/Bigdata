oductive Choices, được thành lập từ năm 1994 và vận hành theo tiêu chuẩn Quốc tế dưới sự giám sát kỹ thuật và đào tạo liên tục của tổ chức MSI Reproductive Choices tại Việt Nam.\r\nHàng năm hệ thống phòng khám Dr.Marie phục vụ trên 50,000 lượt khách hàng với các dịch vụ chăm sóc sức khỏe toàn diện dành riêng cho phụ nữ mọi độ tuổi. Dr.Marie là hệ thống phòng khám chuyên khoa về sức khỏe phụ nữ tại Việt Nam với 11 chi nhánh tại 8 tỉnh, thành phố.\r\nCác phòng khám Dr.Marie được khách hàng đánh giá cao về sự sạch sẽ, quy trình phòng chống nhiễm khuẩn nghiêm ngặt, trình độ chuyên môn của y bác sĩ, và thái độ thân thiện và quan tâm chăm sóc của người cung cấp dịch vụ.\r\nVới 11 phòng khám tại 8 tỉnh, thành phố trên cả nước bao gồm Hà Nội, Hồ Chí Minh, Đà Nẵng, Nha Trang, Nghệ An, Hà Tĩnh, Đồng Nai, Cần Thơ. Dr.Marie là hệ thống phòng khám chuyên khoa cung cấp các dịch vụ chăm sóc sức khoẻ toàn diện dành cho phụ nữ tại Việt Nam. Đồng thời, Dr.Marie cũng là đối tác cung cấp dịch vụ chăm sóc sức khoẻ phụ nữ cho nhân viên cũng như khách hàng của nhiều doanh nghiệp như BIDV, Shinhan, CoopMart, VPBank, Leapstacks, Manulife, AIA, vv\r\nChúng tôi muốn những cá nhân ủng hộ sứ ​​mệnh của chúng tôi là xóa bỏ phá thai không an toàn vào năm 2030 và làm việc với chúng tôi để xây dựng một môi trường thuận lợi nhằm tăng khả năng tiếp cận các dịch vụ an toàn ở mọi nơi. Chúng tôi mong đợi tất cả các thành viên trong nhóm chia sẻ tầm nhìn và cam kết của chúng tôi để đạt được sứ mệnh của mình trong khi thúc đẩy bình đẳng và bảo vệ phúc lợi của tất cả khách hàng và đồng nghiệp.\r\n\r\nWebsite: https://drmarie.com.vn/"])</script><script>self.__next_f.push([1,"27:Tb87,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.\tCông việc hành chính - Lễ tân\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐón tiếp khách và khách hàng đến sử dụng dịch vụ nhiệt tình và lịch sự.\u003c/p\u003e\u003cp\u003e•\tPhụ trách và vận hành hệ thống thông tin, dữ liệu khách hàng.\u003c/p\u00  trường hòa nhập với lực lượng lao động đại diện cho các cộng đồng mà chúng tôi phục vụ. Chúng tôi tự hào là một nhà tuyển dụng có cơ hội bình đẳng và xem xét bình đẳng cho tất cả các ứng viên đủ điều kiện mà không phân biệt chủng tộc, dân tộc, tôn giáo, giới tính, bản dạng hoặc biểu hiện giới tính, khuynh hướng tình dục, nguồn gốc quốc gia, khuyết tật hoặc tuổi tác. Chúng tôi cam kết thúc đẩy sự bình đẳng và bảo vệ phúc lợi của tất cả các thành viên trong nhóm và khách hàng, tập trung vào các nhóm dễ bị tổn thương. \r\nHệ thống phòng khám sản phụ khoa mang tên Dr.Marie là đối tác chiến lược của tổ chức MSI Reproductive Choices, được thành lập từ năm 1994 và vận hành theo tiêu chuẩn Quốc tế dưới sự giám sát kỹ thuật và đào tạo liên tục của tổ chức MSI Reproductive Choices tại Việt Nam.\r\nHàng năm hệ thống phòng khám Dr.Marie phục vụ trên 50,000 lượt khách hàng với các dịch vụ chăm sóc sức khỏe toàn diện dành riêng cho phụ nữ mọi độ tuổi. Dr.Marie là hệ thống phòng khám chuyên khoa về sức khỏe phụ nữ tại Việt Nam với 11 chi nhánh tại 8 tỉnh, thành phố.\r\nCác phòng khám Dr.Marie được khách hàng đánh giá cao về sự sạch sẽ, quy trình phòng chống nhiễm khuẩn nghiêm ngặt, trình độ chuyên môn của y bác sĩ, và thái độ thân thiện và quan tâm chăm sóc của người cung cấp dịch vụ.\r\nVới 11 phòng khám tại 8 tỉnh, thành phố trên cả nước bao gồm Hà Nội, Hồ Chí Minh, Đà Nẵng, Nha Trang, Nghệ An, Hà Tĩnh, Đồng Nai, Cần Thơ. Dr.Marie là hệ thống phòng khám chuyên khoa cung cấp các dịch vụ chăm sóc sức khoẻ toàn diện dành cho phụ nữ tại Việt Nam. Đồng thời, Dr.Marie cũng là đối tác cung cấp dịch vụ chăm sóc sức khoẻ phụ nữ cho nhân viên cũng như khách hàng của nhiều doanh nghiệp như BIDV, Shinhan, CoopMart, VPBank, Leapstacks, Manulife, AIA, vv\r\nChúng tôi muốn những cá nhân ủng hộ sứ ​​mệnh của chúng tôi là xóa bỏ phá thai không an toàn vào năm 2030 và làm việc với chúng tôi để xây dựng một môi trường thuận lợi nhằm tăng khả năng tiếp cận các dịch vụ an toàn ở mọi nơi. Chúng tôi
