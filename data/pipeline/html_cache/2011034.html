ll be responsible for selling and designing \u003cstrong\u003epersonalized travel experiences\u003c/strong\u003e for international clients. Your key tasks include:\u003c/p\u003e\u003cp\u003e✔ \u003cstrong\u003eConsulting \u0026 Sales\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDirectly communicate with \u003cstrong\u003eEnglish-speaking clients\u003c/strong\u003e (both direct travelers and retail agents) to sell bespoke tours.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tRespond to inquiries with tailored proposals and quotations within 24 hours\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tFollow up with clients proactively to close deals and increase conversions\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e✔ Travel Planning \u0026 Coordination\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDesign customized \u003cstrong\u003etour programs and pricing\u003c/strong\u003e based on clients’ preferences.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tProvide clients with detailed destination insights\u003c/strong\u003e to enhance their travel experience.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCollaborate with the Operations \u0026 Reservations team\u003c/strong\u003e to ensure smooth service execution.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCoordinate with internal departments to resolve any on-ground issues\u003c/strong\u003e and maintain service quality.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e✔ Client Relationship Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBuild and maintain \u003cstrong\u003elong-term relationships\u003c/strong\u003e with clients and travel partners.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tOffer personalized service and expert consultation\u003c/strong\u003e to enhance customer satisfaction.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tIdentify opportunities to up-sell and cross-sell\u003c/strong\u003e destinations and services.\u003c/p\u003e\u003cp\u003e\u0
