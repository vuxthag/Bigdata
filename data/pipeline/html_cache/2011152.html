nh chi phí \u0026 rủi ro.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.3. Phối hợp liên phòng ban\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phối hợp chặt chẽ với bộ phận xây dựng, kỹ thuật, mua sắm, vận hành.\u003c/p\u003e\u003cp\u003e• Đảm bảo thiết kế phù hợp yêu cầu vận hành thực tế (operation-ready).\u003c/p\u003e\u003cp\u003e• Hỗ trợ giải quyết các vấn đề phát sinh trong quá trình thi công.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.4. Quản lý chất lượng \u0026 tiến độ thiết kế\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Theo dõi tiến độ thiết kế theo kế hoạch tổng thể dự án.\u003c/p\u003e\u003cp\u003e• Kiểm soát chất lượng đầu ra của các đơn vị tư vấn.\u003c/p\u003e\u003cp\u003e• Đảm bảo tuân thủ quy chuẩn, tiêu chuẩn pháp lý liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.5. Báo cáo \u0026 tư vấn cho Ban lãnh đạo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Báo cáo tiến độ, rủi ro, đề xuất phương án thiết kế.\u003c/p\u003e\u003cp\u003e• Tư vấn các quyết định liên quan đến thiết kế, vật liệu, giải pháp không gian.\u003c/p\u003e\u003cp\u003e• Tham gia đánh giá hiệu quả thiết kế sau khi đưa vào vận hành.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T978,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ \u0026 kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp đại học chuyên ngành: Kiến trúc, Quy hoạch, Thiết kế nội thất hoặc liên quan.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTối thiểu 7–10 năm kinh nghiệm trong lĩnh vực thiết kế/dự án BĐS.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm việc phía Chủ đầu tư là lợi thế lớn.\u003c/p\u003e\u003cp\u003e•\tƯu tiên từng tham gia dự án khách sạn, căn hộ dịch vụ, resort, dự án cao cấp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003
