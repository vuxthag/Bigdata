92b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n26:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tebd,"])</script><script>self.__next_f.push([1,"\u003cp\u003eI. MÔ TẢ CÔNG VIỆC\u003c/p\u003e\u003cp\u003e1. Công tác quản lý, điều hành hoạt động khai thác  \u003c/p\u003e\u003cp\u003eGiúp việc Tổng Giám đốc trong công tác tổ chức quản lý, điều hành và kiểm soát toàn bộ hoạt động khai thác cảng, bao gồm:  \u003c/p\u003e\u003cp\u003e• Hoạt động xếp dỡ, giao nhận và bảo quản hàng hóa;  \u003c/p\u003e\u003cp\u003e• Công tác điều động, giải phóng tàu và phương tiện ra vào cảng;  \u003c/p\u003e\u003cp\u003e• Hoạt động logistics và các dịch vụ liên quan.  \u003c/p\u003e\u003cp\u003eĐảm bảo các hoạt động khai thác được tổ chức, triển khai an toàn, hiệu quả, thông suốt, đúng quy định pháp luật và các quy định nội bộ của Công ty, góp phần hoàn thành các chỉ tiêu kế hoạch được giao.\u003c/p\u003e\u003cp\u003e2. Công tác quản trị Công ty  \u003c/p\u003e\u003cp\u003e• Tham mưu Tổng Giám đốc trong việc xây dựng, rà soát và tổ chức thực hiện chiến lược phát triển trung hạn, dài hạn của Công ty.  \u003c/p\u003e\u003cp\u003e• Phân tích, đánh giá thị trường, xu hướng phát triển ngành và môi trường cạnh tranh, từ đó đề xuất các giải pháp nâng cao năng lực khai thác, hiệu quả sản xuất kinh doanh và năng lực cạnh tranh của Công ty.  \u003c/p\u003e\u003cp\u003e• Tham gia xây dựng, rà soát và hoàn thiện các quy trình, quy định, quy chế quản lý liên quan nhằm nâng cao hiệu lực, hiệu quả điều hành và bảo đảm tính thống nhất trong toàn Công ty.  \u003c/p\u003e\u003cp\u003e• Tham gia góp ý, thẩm định các dự án, phương án sản xuất kinh doanh và các kế hoạch quan trọng khác khi được giao.\u003c/p\u003e\u003cp\u003e3. Công tác pháp chế và quản trị rủi ro  \u003c/p\u003e\u003cp\u003e• Giúp việc Tổng Giám đốc trong việc chỉ đạo và kiểm soát việc tuân thủ pháp luật trong các hoạt động thuộc lĩnh vực phụ trách và các hoạt động liên quan, bao gồm pháp luật doanh nghiệp, pháp luật hàng hải, pháp luật lao động, an toàn lao động, an ninh – an toàn cảng biển và các quy định pháp luật có liên quan.  \u003c/p\u003e\u003cp\u003e• Giúp việc Tổng Giám đốc trong công tác nhận diện, đánh giá và kiểm soát rủi ro trong hoạt động sản xuất kinh doanh, đề xuất và tổ chức thực hiện các biện pháp phòng ngừa, hạn chế và khắc phục rủi ro theo phân công.\u003c/p\u003e\u003cp\u003e4. Công tác đối ngoại  \u003c/p\u003e\u003cp\u003e• Theo sự ủy quyền của Tổng Giám đốc, thay mặt Công ty tham gia làm việc, giao dịch và phối hợp với Cảng vụ, Biên phòng, Hải quan, Công an và các cơ quan quản lý nhà nước liên quan đến lĩnh vực khai thác, ATLĐ, PCCC, môi trường và hoạt động chung của Công ty;  \u003c/p\u003e\u003cp\u003e• Tham gia duy trì, phát triển quan hệ hợp tác với khách hàng, hãng tàu và đối tác chiến lược nhằm góp phần mở rộng thị trường, bảo đảm lợi ích và nâng cao uy tín, hình ảnh của Công ty, tiếp thị đưa tàu, hàng về khai thác tại Cảng Đình Vũ.\u003c/p\u003e\u003cp\u003e5. Công tác quản lý và phát triển đội ngũ nhân sự  \u003c/p\u003e\u003cp\u003e• Quản lý, điều hành và giám sát hoạt động của đội ngũ CBCNV thuộc lĩnh vực phụ trách.  \u003c/p\u003e\u003cp\u003e• Tham gia công tác đào tạo, bồi dưỡng, phát triển đội ngũ cán bộ quản lý và nguồn nhân lực kế cận.\u003c/p\u003e\u003cp\u003e6. Nhiệm vụ khác  \u003c/p\u003e\u003cp\u003eThực hiện các nhiệm vụ khác theo sự phân công của Hội đồng quản trị và Tổng Giám đốc, phù hợp với chức danh, năng lực và yêu cầu quản lý, điều hành của Công ty trong từng thời kỳ.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Te76,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Trình độ đào tạo\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học trở lên các chuyên ngành/ lĩnh vực: Kinh tế, Quản trị kinh doanh, Quản lý vận tải biển, Logistics, Hàng hải, Kỹ thuật khai thác cảng.\u003c/p\u003e\u003cp\u003e• Ứng viên có bằng Thạc sĩ về Quản lý kinh tế, Quản trị kinh doanh, Quản trị logistics hoặc các lĩnh vực liên quan là một lợi thế.\u003c/p\u003e\u003cp\u003e2. Ngoại ngữ\u003c/p\u003e\u003cp\u003e• Sử dụng thành thạo tiếng Anh trong công việc; có khả năng giao tiếp, đàm phán và làm việc độc lập bằng tiếng Anh với đối tác, khách hàng và các cơ quan, tổ chức nước ngoài.\u003c/p\u003e\u003cp\u003e• Có khả năng sử dụng thêm ngoại ngữ khác như tiếng Trung, tiếng Hàn, tiếng Nhật… là một lợi thế.\u003c/p\u003e\u003cp\u003e3. Tin học\u003c/p\u003e\u003cp\u003e• Thành thạo tin học văn phòng.\u003c/p\u003e\u003cp\u003e• Am hiểu và có khả năng sử dụng các phần mềm liên quan đến khai thác cảng, hệ thống phần mềm phục vụ công tác quản lý, điều hành và phân tích hoạt động sản xuất kinh doanh.\u003c/p\u003e\u003cp\u003e4. Độ tuổi và kinh nghiệm\u003c/p\u003e\u003cp\u003e• Độ tuổi: không quá 45 tuổi.\u003c/p\u003e\u003cp\u003e• Có tối thiểu 05 năm kinh nghiệm quản lý trong lĩnh vực khai thác cảng, vận tải biển, logistics.\u003c/p\u003e\u003cp\u003e• Ưu tiên ứng viên đang giữ chức vụ phụ trách khai thác tại các cảng container.\u003c/p\u003e\u003cp\u003e5. Kiến thức chuyên môn\u003c/p\u003e\u003cp\u003e• Am hiểu nghiệp vụ kinh tế vận tải biển, ngoại thương, xếp dỡ hàng hóa, logistics; nắm bắt xu thế phát triển của ngành cảng biển trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e• Nắm vững kiến thức và thường xuyên cập nhật về pháp luật doanh nghiệp, pháp luật lao động, pháp luật hàng hải và các quy định pháp luật liên quan đến hoạt động của Công ty.\u003c/p\u003e\u003cp\u003e• Hiểu biết về các công ước quốc tế, thông lệ quốc tế trong lĩnh vực hàng hải, logistics và thương mại quốc tế.\u003c/p\u003e\u003cp\u003e• Có kiến thức về quản trị doanh nghiệp, quản trị rủi ro, quản trị chiến lược.\u003c/p\u003e\u003cp\u003e6. Năng lực, kỹ năng và phẩm chất\u003c/p\u003e\u003cp\u003e• Có tư duy chiến lược, kỹ năng hoạch định và tổ chức thực hiện chiến lược của Công ty.\u003c/p\u003e\u003cp\u003e• Kỹ năng quản lý, điều hành doanh nghiệp.\u003c/p\u003e\u003cp\u003e• Kỹ năng giao tiếp, thuyết trình, đàm phán, thương thảo.\u003c/p\u003e\u003cp\u003e• Kỹ năng phân tích, đánh giá hoạt động sản xuất kinh doanh; thẩm định kế hoạch, phương án, dự án; nhận diện và giải quyết vấn đề kịp thời, hiệu quả các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e• Có năng lực tạo động lực, dẫn dắt và phát triển đội ngũ. Có khả năng làm việc nhóm, làm việc dưới áp lực cao, sẵn sàng nhận nhiệm vụ khó và nhiệm vụ đột xuất.\u003c/p\u003e\u003cp\u003e• Có tinh thần trách nhiệm cao, tác phong làm việc chuyên nghiệp, bản lĩnh, quyết đoán, trung thực và đạo đức nghề nghiệp.\u003c/p\u003e\u003cp\u003e• Có ý thức kỷ luật, bảo mật thông tin và tuân thủ quy định của Pháp luật và Công ty.\u003c/p\u003e\u003cp\u003e7. Yêu cầu khác\u003c/p\u003e\u003cp\u003e• Có sức khỏe tốt để đảm nhiệm chức vụ.\u003c/p\u003e\u003cp\u003e• Ưu tiên ứng viên thuộc diện quy hoạch cán bộ lãnh đạo của Công ty đang công tác.\u003c/p\u003e\u003cp\u003e• Không đang trong thời gian thi hành kỷ luật tại Công ty đang công tác.\u003c/p\u003e\u003cp\u003e• Không thuộc các trường hợp bị cấm đảm nhiệm chức vụ theo quy định của pháp l u003cp\u003e2. Công tác quản trị Công ty  \u003c/p\u003e\u003cp\u003e• Tham mưu Tổng Giám đốc trong việc xây dựng, rà soát và tổ chức thực hiện chiến lược phát triển trung hạn, dài hạn của Công ty.  \u003c/p\u003e\u003cp\u003e• Phân tích, đánh giá thị trường, xu hướng phát triển ngành và môi trường cạnh tranh, từ đó đề xuất các giải pháp nâng cao năng lực khai thác, hiệu quả sản xuất kinh doanh và năng lực cạnh tranh của Công ty.  \u003c/p\u003e\u003cp\u003e• Tham gia xây dựng, rà soát và hoàn thiện các quy trình, quy định, quy chế quản lý liên quan nhằm nâng cao hiệu lực, hiệu quả điều hành và bảo đảm tính thống nhất trong toàn Công ty.  \u003c/p\u003e\u003cp\u003e• Tham gia góp ý, thẩm định các dự án, phương án sản xuất kinh doanh và các kế hoạch quan trọng khác khi được giao.\u003c/p\u003e\u003cp\u003e3. Công tác pháp chế và quản trị rủi ro  \u003c/p\u003e\u003cp\u003e• Giúp việc Tổng Giám đốc trong việc chỉ đạo và kiểm soát việc tuân thủ pháp luật trong các hoạt động thuộc lĩnh vực phụ trách và các hoạt động liên quan, bao gồm pháp luật doanh nghiệp, pháp luật hàng hải, pháp luật lao động, an toàn lao động, an ninh – an toàn cảng biển và các quy định pháp luật có liên quan.  \u003c/p\u003e\u003cp\u003e• Giúp việc Tổng Giám đốc trong công tác nhận diện, đánh giá và kiểm soát rủi ro trong hoạt động sản xuất kinh doanh, đề xuất và tổ chức thực hiện các biện pháp phòng ngừa, hạn chế và khắc phục rủi ro theo phân công.\u003c/p\u003e\u003cp\u003e4. Công tác đối ngoại  \u003c/p\u003e\u003cp\u003e• Theo sự ủy quyền của Tổng Giám đốc, thay mặt Công ty tham gia làm việc, giao dịch và phối hợp với Cảng vụ, Biên phòng, Hải quan, Công an và các cơ quan quản lý nhà nước liên quan đến lĩnh vực khai thác, ATLĐ, PCCC, môi trường và hoạt động chung của Công ty;  \u003c/p\u003e\u003cp\u003e• Tham gia duy trì, phát triển quan hệ hợp tác với khách hàng, hãng tàu và đối tác chiến lược nhằm góp phần mở rộng thị trường, bảo đảm lợi ích và nâng cao uy tín, hình ảnh của Công ty, tiếp thị đưa tàu, hàng về khai thác tại Cảng Đình Vũ.\u003c/p\u003e\u003cp\u003e5. Công tác quản lý và phát triển đội ngũ nhân sự  \u003c/p\u003e\u003cp\u003e• Quản lý, điều hành và giám sát hoạt động của đội ngũ CBCNV thuộc lĩnh vực phụ trách.  \u003c/p\u003e\u003cp\u003e• Tham gia công tác đào tạo, bồi dưỡng, phát triển đội ngũ cán bộ quản lý và nguồn nhân lực kế cận.\u003c/p\u003e\u003cp\u003e6. Nhiệm vụ khác  \u003c/p\u003e\u003cp\u003eThực hiện các nhiệm vụ khác theo sự phân công của Hội đồng quản trị và Tổng Giám đốc, phù hợp với chức danh, năng lực và yêu cầu quản lý, điều hành của Công ty trong từng thời kỳ.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"29:Te76,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Trình độ đào tạo\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học trở lên các chuyên ngành/ lĩnh vực: Kinh tế, Quản trị kinh doanh, Quản lý vận tải biển, Logistics, Hàng hải, Kỹ thuật khai thác cảng.\u003c/p\u003e\u003cp\u003e• Ứng viên có bằng Thạc sĩ về Quản lý kinh tế, Quản trị kinh doanh, Quản trị logistics hoặc các lĩnh vực liên quan là một lợi thế.\u003c/p\u003e\u003cp\u003e2. Ngoại ngữ\u003c/p\u003e\u003cp\u003e• Sử dụng thành thạo tiếng Anh trong công việc; có khả năng giao tiếp, đàm phán và làm việc độc lập bằng tiếng Anh với đối tác, khách hàng và các cơ quan, tổ chức nước ngoài.\u003c/p\u003e\u003cp\u003e• Có khả năng sử dụng thêm ngoại ngữ khác như tiếng Trung, tiếng Hàn, tiếng Nhật… là một lợi thế.\u003c/p\u003e\u003cp\u003e3. Tin học\u003c/p\u003e\u003cp\u003e• Thành thạo tin học văn phòng.\u003c/p\u003e\u003cp\u003e• Am hiểu và có khả năng sử dụng các phần mềm liên quan đến khai thác cảng, hệ thống phần mềm phục vụ công tác quản lý, điều hành và phân tích hoạt động sản xuất kinh doanh.\u003c/p\u003e\u003cp\u003e4. Độ tuổi và kinh nghiệm\u003c/p\u003e\u003cp\u003e• Độ tuổi: không quá 45 tuổi.\u003c/p\u003e\u003cp\u003e• Có tối thiểu 05 năm kinh nghiệm quản lý trong lĩnh vực khai thác cảng, vận tải biển, logistics.\u003c/p\u003e\u003cp\u003e• Ưu tiên ứng viên đang giữ chức vụ phụ trách khai thác tại các cảng container.\u003c/p\u003e\u003cp\u003e5. Kiến thức chuyên môn\u003c/p\u003e\u003cp\u003e• Am hiểu nghiệp vụ kinh tế vận tải biển, ngoại thương, xếp dỡ hàng hóa, logistics; nắm bắt xu thế phát triển của ngành cảng biển trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e• Nắm vững kiến thức và thường xuyên cập nhật về pháp luật doanh nghiệp, pháp luật lao động, pháp luật hàng hải và các quy định pháp luật liên quan đến hoạt động của Công ty.\u003c/p\u003e\u003cp\u003e• Hiểu biết về các công ước quốc tế, thông lệ quốc tế trong lĩnh vực hàng hải, logistics và thương mại quốc tế.\u003c/p\u003e\u003cp\u003e• Có kiến thức về quản trị doanh nghiệp, quản trị rủi ro, quản trị chiến lược.\u003c/p\u003e\u003cp\u003e6. Năng lực, kỹ năng và phẩm chất\u003c/p\u003e\u003cp\u003e• Có tư duy chiến lược, kỹ năng hoạch định và tổ chức thực hiện chiến lược của Công ty.\u003c/p\u003e\u003cp\u003e• Kỹ năng quản lý, điều hành doanh nghiệp.\u003c/p\u003e\u003cp\u003e• Kỹ năng giao tiếp, thuyết trình, đàm phán, thương thảo.\u003c/p\u003e\u003cp\u003e• Kỹ năng phân tích, đánh giá hoạt động sản xuất kinh doanh; thẩm định kế hoạch, phương án, dự án; nhận diện và giải quyết vấn đề kịp thời, hiệu quả các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e• Có năng lực tạo động lực, dẫn dắt và phát triển đội ngũ. Có khả năng làm việc nhóm, làm việc dưới áp lực cao, sẵn sàng nhận nhiệm vụ khó và nhiệm vụ đột xuất.\u003c/p\u003e\u003cp\u003e• Có tinh thần trách nhiệm cao, tác phong làm việc chuyên nghiệp, bản lĩnh, quyết đoán, trung thực và đạo đức nghề nghiệp.\u003c/p\u003e\u003cp\u003e• Có ý thức kỷ luật, bảo mật thông tin và tuân thủ quy định của Pháp luật và Công ty.\u003c/p\u003e\u003cp\u003e7. Yêu cầu khác\u003c/p\u003e\u003cp\u003e• Có sức khỏe tốt để đảm nhiệm chức vụ.\u003c/p\u003e\u003cp\u003e• Ưu tiên ứng viên thuộc diện quy hoạch cán bộ lãnh đạo của Công ty đang công tác.\u003c/p\u003e\u003cp\u003e• Không đang trong th
