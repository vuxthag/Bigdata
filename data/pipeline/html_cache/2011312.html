174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T497d,"])</script><script>self.__next_f.push([1,"\u003cp\u003ePHẦN 1: VAI TRÒ TỔNG QUÁT \u0026 CHỨC NĂNG.\u003c/p\u003e\u003cp\u003eVai trò của Trưởng Phòng Sản xuất \u0026 Quản lý Vận hành tại TLG Việt Nam là người lãnh đạo toàn bộ chuỗi giá trị sản xuất, đảm bảo quá trình chuyển đổi nguyên vật liệu thành sản phẩm cuối cùng diễn ra một cách An toàn, Hiệu quả và Chất lượng cao nhất, đáp ứng kịp thời nhu cầu thị trường và tối ưu hóa chi phí vận hành. Vai trò tổng quát được xác định qua 4 trụ cột chức năng chiến lược sau:\u003c/p\u003e\u003cp\u003e1. CHỨC NĂNG LÃNH ĐẠO CHIẾN LƯỢC R\u0026D VÀ CHẤT LƯỢNG SẢN PHẨM\u003c/p\u003e\u003cp\u003eChức năng này định hình vị trí Trưởng phòng là người kiến tạo sự khác biệt về chất lượng và đổi mới công thức cho thương hiệu sơn TLG Việt Nam.\u003c/p\u003e\u003cp\u003e1.1. Lãnh đạo nghiên cứu và phát triển công thức (R\u0026D)\u003c/p\u003e\u003cp\u003eo\tĐịnh hướng đổi mới: Thiết lập chiến lược nghiên cứu dài hạn, tập trung vào việc phát triển các công thức mới (Sơn thân thiện môi trường) và các cải tiến cho dòng sản phẩm hiện tại (Tuylips, Nano One) nhằm duy trì lợi thế cạnh tranh về sáng tạo.\u003c/p\u003e\u003cp\u003eo\tQuản lý danh mục công thức: Giám sát và phê duyệt các dự án R\u0026D, đảm bảo công thức mới không chỉ đạt tiêu chuẩn kỹ thuật mà còn khả thi về mặt sản xuất và hiệu quả về chi phí.\u003c/p\u003e\u003cp\u003eo\tChuyển giao công nghệ: Chủ trì quá trình chuyển giao công thức mới từ phòng thí nghiệm (R\u0026D) sang sản xuất đại trà (Sản xuất), đảm bảo tính chính xác và chất lượng ổn định ngay từ lô hàng đầu tiên.\u003c/p\u003e\u003cp\u003e1.2. Kiểm soát và đảm bảo chất lượng (QC)\u003c/p\u003e\u003cp\u003eo\tThiết lập tiêu chuẩn QC: Xây dựng và duy trì các tiêu chuẩn chất lượng nghiêm ngặt cho từng khâu: nguyên vật liệu đầu vào, bán thành phẩm và thành phẩm cuối cùng. Đảm bảo chất lượng đáp ứng và vượt trội so với yêu cầu thị trường.\u003c/p\u003e\u003cp\u003eo\tPhân tích lỗi và cải tiến: Phối hợp với Bộ phận R\u0026D và Quản lý chất lượng và các đơn vị Bán hàng để phân tích nguyên nhân gốc rễ của các lỗi chất lượng (Lỗi màu, lỗi độ bền, lỗi bao bì …) và chỉ đạo các hành động khắc phục, phòng ngừa để ngăn chặn tái diễn.\u003c/p\u003e\u003cp\u003eo\tKiểm soát nhà cung cấp nguyên liệu: Hợp tác với Phòng Kế toán để đánh giá chất lượng nguyên vật liệu từ các nhà cung cấp chính. Đảm bảo chỉ sử dụng nguyên liệu đầu vào đạt chuẩn để duy trì chất lượng thành phẩm.\u003c/p\u003e\u003cp\u003e1.3. Phát triển năng lực chuyên môn\u003c/p\u003e\u003cp\u003eo\tĐào tạo kỹ thuật: Chỉ đạo việc đào tạo chuyên sâu về kỹ thuật pha chế, phối màu và kiểm soát chất lượng cho nhân sự Sản xuất, Pha màu và QC, nhằm nâng cao tay nghề và giảm thiểu sai sót do con người.\u003c/p\u003e\u003cp\u003e2. CHỨC NĂNG QUẢN LÝ HIỆU SUẤT SẢN XUẤT VÀ KỸ THUẬT\u003c/p\u003e\u003cp\u003eChức năng này định hình Trưởng phòng Sản xuất \u0026 Quản lý vận hành là người quản lý nhà máy, đảm bảo mọi tài sản và nguồn lực được sử dụng một cách tối ưu.\u003c/p\u003e\u003cp\u003e2.1. Điều hành và giám sát hiệu suất sản xuất\u003c/p\u003e\u003cp\u003eo\tChỉ đạo vận hành hàng ngày: Chỉ đạo và giám sát trực tiếp các Bộ phận Sản xuất, Pha màu và Đóng gói thực hiện Lệnh Sản xuất theo đúng quy trình, công thức đã phê duyệt và đúng tiến độ.\u003c/p\u003e\u003cp\u003eo\tTối ưu hóa quy trình: Liên tục rà soát và áp dụng các phương pháp quản lý tinh gọn (5S, Kaizen …) để cải tiến quy trình, giảm thiểu lãng phí (thời gian chờ, vật liệu dư thừa …) và giảm tỷ lệ phế phẩm.\u003c/p\u003e\u003cp\u003eo\tQuản lý công suất: Theo dõi và tối ưu hóa Công suất Sản xuất của nhà máy và hiệu suất tổng thể thiết bị, đảm bảo sử dụng tối đa và hiệu quả máy móc, thiết bị hiện có.\u003c/p\u003e\u003cp\u003e2.2. Quản lý kỹ thuật và bảo trì hệ thống\u003c/p\u003e\u003cp\u003eo\tBảo trì: Chỉ đạo Bộ phận Kỹ thuật xây dựng và thực hiện các kế hoạch Bảo trì định kỳ cho toàn bộ hệ thống máy móc, thiết bị, dây chuyền sản xuất và hệ thống tiện ích (điện, nước, khí nén …) để giảm thiểu tối đa sự cố đột xuất.\u003c/p\u003e\u003cp\u003eo\tXử lý sự cố kỹ thuật: Thiết lập quy trình phản ứng nhanh để xử lý và khắc phục kịp thời các sự cố kỹ thuật xảy ra trong quá trình sản xuất, phối hợp chặt chẽ với các bộ phận liên quan để khôi phục hoạt động nhanh nhất.\u003c/p\u003e\u003cp\u003eo\tQuản lý Dự án kỹ thuật: Chủ trì các dự án nâng cấp, lắp đặt thiết bị, máy móc mới trong nhà máy. Đảm bảo việc lắp đặt đúng tiêu chuẩn kỹ thuật, an toàn và đúng tiến độ.\u003c/p\u003e\u003cp\u003e2.3. Quản lý đội ngũ và tài nguyên sản xuất\u003c/p\u003e\u003cp\u003eo\tPhân bổ nhân sự: Phân bổ nhân sự kỹ thuật và vận hành một cách hợp lý giữa các ca, các bộ phận (Sản xuất, Pha màu, Đóng gói) để đáp ứng mục tiêu sản lượng.\u003c/p\u003e\u003cp\u003eo\tKiểm soát tiêu hao tật tư: Giám sát chặt chẽ định mức tiêu hao nguyên vật liệu và vật tư kỹ thuật. Phân tích nguyên nhân chênh lệch giữa tiêu chuẩn và thực tế để có biện pháp kiểm soát chi phí.\u003c/p\u003e\u003cp\u003e3. CHỨC NĂNG ĐIỀU PHỐI CHUỖI CUNG ỨNG VÀ GIAO HÀNG\u003c/p\u003e\u003cp\u003eChức năng này bao gồm việc kết nối nhu cầu thị trường với năng lực sản xuất và phân phối sản phẩm sơn.\u003c/p\u003e\u003cp\u003e3.1. Quản lý lập kế hoạch sản xuất.\u003c/p\u003e\u003cp\u003eo\tChuyển đổi kế hoạch bán hàng: Tiếp nhận và phân tích Dự báo Bán hàng (từ Phòng Bán hàng Đại lý và Dự án) để lập Kế hoạch Sản xuất Tổng thể chi tiết theo tuần/tháng. Đảm bảo kế hoạch sản xuất cân đối với công suất nhà máy và nguồn cung nguyên vật liệu.\u003c/p\u003e\u003cp\u003eo\tLập lịch trình chi tiết: Xây dựng lịch trình sản xuất chi tiết cho từng dây chuyền, từng mã sản phẩm và điều phối nguồn lực (nhân công, máy móc, nguyên liệu) một cách chính xác để tối đa hóa hiệu suất và giảm thiểu thời gian chuyển đổi sản phẩm.\u003c/p\u003e\u003cp\u003e3.2. Quản lý tồn kho và kho vận\u003c/p\u003e\u003cp\u003eo\tGiám sát Thủ kho: Chỉ đạo Thủ kho và bộ phận kho vận trong việc quản lý, sắp xếp và bảo quản nguyên vật liệu đầu vào và thành phẩm theo đúng tiêu chuẩn kỹ thuật (đặc biệt là điều kiện nhiệt độ và an toàn PCCC).\u003c/p\u003e\u003cp\u003eo\tĐảm bảo độ chính xác tồn kho: Thiết lập và giám sát quy trình kiểm kê kho chặt chẽ (định kỳ, đột xuất). Chịu trách nhiệm về độ chính xác tồn kho trên hệ thống và thực tế; Đảm bảo dữ liệu luôn chính xác để hỗ trợ lập kế hoạch và bán hàng.\u003c/p\u003e\u003cp\u003eo\tTối ưu hóa mức tồn kho: Phân tích nhu cầu để xác định mức tồn kho an toàn cho các sản phẩm bán chạy, giảm thiểu rủi ro hết hàng và đồng thời giảm thiểu hàng tồn kho lỗi thời/hỏng hóc, nâng cao hiệu quả sử dụng vốn.\u003c/p\u003e\u003cp\u003e3.3. Điều phối giao hàng và logistics nội bộ\u003c/p\u003e\u003cp\u003eo\tGiám sát Bộ phận Giao hàng: Chỉ đạo và giám sát hoạt động của Bộ phận Giao hàng, đảm bảo việc lấy hàng, đóng gói và vận chuyển được thực hiện theo đúng Lệnh Xuất kho và thời gian yêu cầu của khách hàng/phòng bán hàng.\u003c/p\u003e\u003cp\u003eo\tTối ưu hóa chi phí Logistics: Liên tục rà soát và tối ưu hóa các tuyến đường, phương tiện, và quy trình giao hàng để giảm chi phí vận chuyển đồng thời duy trì chất lượng dịch vụ giao nhận.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4. CHỨC NĂNG ĐẢM BẢO AN TOÀN, SỨC KHỎE \u0026 MÔI TRƯỜNG.\u003c/p\u003e\u003cp\u003eChức năng này tập trung vào việc ngăn ngừa rủi ro và tuân thủ các quy định nghiêm ngặt của ngành sản xuất sơn.\u003c/p\u003e\u003cp\u003e4.1. Lập chính sách và Quy trình An toàn\u003c/p\u003e\u003cp\u003eo\tXây dựng Quy tắc An toàn: Chủ trì xây dựng, cập nhật và phổ biến các quy tắc, quy trình an toàn lao động cụ thể cho từng khu vực có nguy cơ cao (Pha chế hóa chất, Kho bãi, Vận hành máy móc) theo tiêu chuẩn pháp luật và tiêu chuẩn ngành.\u003c/p\u003e\u003cp\u003eo\tQuản lý rủi ro: Thường xuyên thực hiện đánh giá rủi ro tại nhà máy để xác định các mối nguy tiềm ẩn (cháy nổ, hóa chất độc hại, thiết bị lỗi) và đề xuất các biện pháp phòng ngừa triệt để.\u003c/p\u003e\u003cp\u003e4.2. Giám sát tuân thủ và phòng ngừa sự cố\u003c/p\u003e\u003cp\u003eo\tGiám sát An toàn hàng ngày: Tổ chức và giám sát việc kiểm tra tuân thủ Nội quy của toàn bộ nhân viên, bao gồm việc sử dụng đúng và đủ Trang bị Bảo hộ Lao động .Đảm bảo kỷ luật an toàn được duy trì một cách nghiêm ngặt.\u003c/p\u003e\u003cp\u003eo\tPCCC và ứng phó khẩn cấp: Chịu trách nhiệm về việc kiểm tra, bảo trì hệ thống Phòng cháy chữa cháy tại xưởng sản xuất. Tổ chức các buổi huấn luyện và diễn tập định kỳ về ứng phó khẩn cấp và sơ cấp cứu cho nhân sự nhà máy.\u003c/p\u003e\u003cp\u003e4.3. Quản lý sức khỏe và môi trường\u003c/p\u003e\u003cp\u003eo\tSức khỏe lao động: Phối hợp với Phòng Nhân sự Tổng hợp để giám sát việc thực hiện khám sức khỏe định kỳ và các chế độ nghỉ ngơi, phục hồi sức khỏe cho nhân viên, đặc biệt là những người tiếp xúc với môi trường sản xuất độc hại.\u003c/p\u003e\u003cp\u003eo\tKiểm soát môi trường: Đảm bảo toàn bộ hoạt động của nhà máy (tiếng ồn, ánh sáng, xử lý nước thải, khí thải) tuân thủ nghiêm ngặt các quy định về Bảo vệ Môi trường. Quản lý và giám sát quy trình xử lý chất thải nguy hại một cách hợp pháp và chính trực.\u003c/p\u003e\u003cp\u003e4.4. Điều tra và báo cáo sự cố\u003c/p\u003e\u003cp\u003eo\tĐiều tra tai nạn: Khi có sự cố hoặc tai nạn lao động xảy ra, phải lập tức tổ chức Điều tra nguyên nhân gốc rễ và lập báo cáo chính xác. Chỉ đạo các hành động khắc phục và phòng ngừa để ngăn chặn sự cố tái diễn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003ePHẦN III. NHIỆM VỤ.\u003c/p\u003e\u003cp\u003e1. CÁC NHIỆM VỤ THƯỜNG XUYÊN, HÀNG NGÀY.\u003c/p\u003e\u003cp\u003e1.1.\tĐiều hành \u0026 Giám sát Sản xuất Hàng ngày: Hàng ngày, chỉ đạo Bộ phận Sản xuất, Pha màu và Đóng gói triển khai Lệnh Sản xuất dựa trên Kế hoạch đã duyệt. Theo dõi tiến độ sản xuất, công suất máy móc và tình hình nhân sự tại chỗ.\u003c/p\u003e\u003cp\u003e1.2.\tKiểm tra Kỷ luật Vận hành: Giám sát và duy trì tính Kỷ luật nghiêm ngặt trong việc tuân thủ quy trình vận hành máy móc, thao tác pha chế, vệ sinh công nghiệp (5S) và các quy tắc nội quy nhà máy.\u003c/p\u003e\u003cp\u003e1.3.\tKiểm soát Chất lượng Bán thành phẩm/Thành phẩm: Giám sát Bộ phận Pha màu và QC thực hiện việc lấy mẫu, kiểm tra chất lượng của bán thành phẩm và thành phẩm theo tần suất quy định. Phê duyệt lô hàng đạt chuẩn nhập kho.\u003c/p\u003e\u003cp\u003e1.4.\tGiám sát Kho vận và Độ chính xác Tồn kho: Kiểm tra ngẫu nhiên hoạt động của Thủ kho và Giao hàng. Đảm bảo việc nhập/xuất nguyên vật liệu và thành phẩm được thực hiện Chính xác trên hệ thống phần mềm và thực tế.\u003c/p\u003e\u003cp\u003e1.5.\tQuản lý Bảo trì và Sửa chữa Thường xuyên: Giám sát Bộ phận Kỹ thuật thực hiện các công tác bảo trì thường xuyên/nhỏ để duy trì sự hoạt động ổn định của các thiết bị sản xuất sơn. Phê duyệt các yêu cầu vật tư, phụ tùng thay thế định kỳ.\u003c/p\u003e\u003cp\u003e1.6.\tTuần tra An toàn: Hàng ngày, thực hiện các chuyến tuần tra tại khu vực nhà máy, kho hóa chất và dây chuyền. Phát hiện kịp thời các rủi ro (lỗi thiết bị, vi phạm an toàn của nhân viên) và chỉ đạo khắc phục ngay lập tức, đảm bảo an toàn sản xuất.\u003c/p\u003e\u003cp\u003e1.7.\tXử lý vấn đề vận hành đột xuất: Phản ứng nhanh và trực tiếp xử lý các sự cố kỹ thuật nhỏ, lỗi chất lượng phát sinh trong ca, hoặc các vấn đề giao hàng cấp bách để không làm gián đoạn chuỗi cung ứng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. NHIỆM VỤ PHỐI HỢP LIÊN BỘ PHẬN/PHÒNG BAN\u003c/p\u003e\u003cp\u003e2.1.\tXác nhận Kế hoạch Sản xuất \u0026 Phân phối: Phối hợp với Phòng Bán hàng Đại lý miền Bắc, Phòng Dự án và Chi nhánh miền Nam để thống nhất dự báo nhu cầu và kế hoạch phân phối cho từng khu vực, đảm bảo năng lực sản xuất đáp ứng được mục tiêu doanh số kịp thời.\u003c/p\u003e\u003cp\u003e2.2.\tQuản lý cung ứng nguyên vật liệu chiến lược: Phối hợp chặt chẽ với Phòng Kế toán (Bộ phận Mua hàng) để xác định định mức và thời điểm mua sắm các nguyên vật liệu cốt lõi (hoá chất, bột màu). Đánh giá chất lượng nhà cung cấp để duy trì chất lượng sản phẩm ổn định.\u003c/p\u003e\u003cp\u003e2.3.\tQuản lý ngân sách và kiểm soát chi phí: Phối hợp với Phòng Kế toán để lập ngân sách vận hành và đầu tư hàng năm cho nhà máy. Cung cấp báo cáo chi phí sản xuất và giải trình chênh lệch chi phí, đảm bảo tính Hiệu quả và Chính xác.\u003c/p\u003e\u003cp\u003e2.4.\tQuản lý chất lượng và thương hiệu: Phối hợp với Phòng Marketing \u0026 Truyền thông để cung cấp thông tin kỹ thuật chính xác về sản phẩm (công thức, tính năng) phục vụ tài liệu Marketing và đào tạo. Tham gia xử lý khủng hoảng chất lượng ảnh hưởng đến Thương hiệu.\u003c/p\u003e\u003cp\u003e2.5.\tĐảm bảo tuân thủ và minh bạch: Cung cấp hồ sơ, tài liệu và báo cáo hoạt động sản xuất, tồn kho và an toàn môi trường khi có yêu cầu từ Ban Kiểm soát Nội bộ. Đảm bảo các quy trình vận hành và kho vận tuân thủ quy chế nội bộ và pháp luật.\u003c/p\u003e\u003cp\u003e2.6.\tHỗ trợ hệ thống Công nghệ Thông tin: Phối hợp với Phòng CNTT để cung cấp các yêu cầu về nghiệp vụ, quy trình cho việc triển khai, nâng cấp các hệ thống liên quan đến sản xuất (ERP, MES), đảm bảo dữ liệu sản xuất được thu thập chính xác.\u003c/p\u003e\u003cp\u003e2.7.\tBáo cáo và tham mưu lãnh đạo: Định kỳ và đột xuất, báo cáo trực tiếp lên Ban Tổng Giám đốc về hiệu suất vận hành (OEE, Tỷ lệ Phế phẩm), tình hình an toàn môi trường và các rủi ro chiến lược trong chuỗi cung ứng. Tham mưu về các dự án đầu tư công nghệ.\u003c/p\u003e\u003cp\u003e2.8.\tQuản lý nguồn lực và kỷ luật lao động: Phối hợp với Nhân sự Tổng hợp để xác định Định biên Nhân sự, tuyển dụng nhân sự cần thiết theo từng thời điểm; Xây dựng và thực hiện các chương trình đào tạo nghiệp vụ kỹ thuật chuyên sâu và các buổi huấn luyện an toàn lao động \u0026 vệ sinh môi trường bắt buộc, đảm bảo An toàn và nâng cao tay nghề công nhân. Tham gia vào quy trình xử lý kỷ luật và đánh giá việc tuân thủ Nội quy Công ty, Nội quy Lao động tại nhà máy, duy trì tính kỷ luật trong hoạt động sản xuất và vận hành.\u003c/p\u003e\u003cp\u003e2.9.\tQuản lý cơ sở vật chất và hành chính hỗ trợ: Phối hợp với Phòng Nhân sự Tổng hợp để đảm bảo các yêu cầu về bảo trì cơ sở vật chất (nhà xưởng, kho bãi), quản lý bảo vệ, vệ sinh, và cung cấp Bảo hộ Lao động (BHLĐ) được đáp ứng đầy đủ và kịp thời, hỗ trợ sản xuất hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. NHIỆM VỤ LẬP KẾ HOẠCH VÀ BÁO CÁO\u003c/p\u003e\u003cp\u003e3.1.\tLập kế hoạch sản xuất tổng thể: Định kỳ (tháng/quý), lập Kế hoạch Sản xuất tổng thể dựa trên dự báo bán hàng, năng lực sản xuất và mức tồn kho an toàn. Phân bổ mục tiêu sản lượng cho các bộ phận.\u003c/p\u003e\u003cp\u003e3.2. Lập kế hoạch và dự toán ngân sách: Phối hợp với Phòng Kế toán để xây dựng dự toán Ngân sách hàng năm cho các hoạt động vận hành (Chi phí nhân công, vật tư tiêu hao …) và các dự án đầu tư (Mua sắm thiết bị, nâng cấp nhà xưởng …).\u003c/p\u003e\u003cp\u003e3.3. Lập kế hoạch bảo trì dự phòng: Xây dựng Kế hoạch bảo trì chi tiết theo tuần/tháng/quý cho toàn bộ hệ thống máy móc, thiết bị và hạ tầng. Đảm bảo kế hoạch được thực hiện đúng để giảm thiểu sự cố đột xuất.\u003c/p\u003e\u003cp\u003e3.4. Báo cáo hiệu suất vận hành: Lập và gửi các báo cáo định kỳ (tuần/tháng/quý) lên Ban Tổng Giám đốc và các phòng ban liên quan về các chỉ số KPIs cốt lõi.\u003c/p\u003e\u003cp\u003e3.5. Phân tích và báo cáo chi phí sản xuất: Định kỳ, phân tích chi phí Sản xuất chi tiết, bao gồm chi phí nguyên vật liệu, nhân công và chi phí chung. Báo cáo chênh lệch chi phí so với định mức và đề xuất giải pháp tối ưu hóa hiệu quả.\u003c/p\u003e\u003cp\u003e3.6. Báo cáo An toàn, Sức khỏe \u0026 Môi trường: Lập các báo cáo tuân thủ an toàn môi trường theo quy định nội bộ và pháp luật. Báo cáo chi tiết về bất kỳ sự cố, tai nạn lao động hoặc vi phạm môi trường (nếu có), kèm theo phân tích nguyên nhân và hành động khắc phục.\u003c/p\u003e\u003cp\u003e3.7. Quản lý hồ sơ kỹ thuật và công thức: Thiết lập hệ thống lưu trữ Hồ sơ kỹ thuật (bản vẽ, sơ đồ máy, lịch sử bảo trì) và Hồ sơ công thức sản xuất (phiên bản, lịch sử thay đổi) một cách khoa học, chính xác và bảo mật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:Te4b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. KIẾN THỨC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.1. Kiến thức chuyên môn:\u003c/strong\u003e Am hiểu sâu sắc về các quy trình và công nghệ sản xuất sơn; nắm vững các tiêu chuẩn quốc tế về chất lượng (ISO 9001, v.v.), an toàn lao động và bảo vệ môi trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2. Kiến thức quản lý:\u003c/strong\u003e Có kiến thức về quản lý chuỗi cung ứng, kho bãi và logistics; hiểu biết cơ bản về quản trị nhân sự, lập ngân sách và quản lý chi phí.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.3. Kiến thức tổng quan:\u003c/strong\u003e Hiểu rõ các sản phẩm, đặc tính kỹ thuật và yêu cầu của thị trường đối với từng dòng sơn của công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. KỸ NĂNG: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.1. Kỹ năng chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tLập kế hoạch và điều hành: Xây dựng kế hoạch sản xuất hiệu quả, phân bổ nguồn lực và điều hành các hoạt động để đạt mục tiêu về sản lượng và chất lượng.\u003c/p\u003e\u003cp\u003eo\tKiểm soát chất lượng: Áp dụng các phương pháp và công cụ quản lý chất lượng để đảm bảo sản phẩm đầu ra luôn đạt tiêu chuẩn.\u003c/p\u003e\u003cp\u003eo\tPhân tích và tối ưu hóa: Phân tích dữ liệu sản xuất để phát hiện lãng phí, điểm nghẽn và đề xuất các giải pháp cải tiến liên tục (Kaizen, Lean Manufacturing).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.2. Kỹ năng mềm\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003eo\tLãnh đạo và quản lý đội nhóm: Dẫn dắt, đào tạo và phát triển đội ngũ nhân viên sản xuất, xây dựng môi trường làm việc kỷ luật và an toàn.\u003c/p\u003e\u003cp\u003eo\tGiải quyết vấn đề: Xử lý nhanh chóng và hiệu quả các sự cố kỹ thuật, vấn đề phát sinh trong quá trình sản xuất.\u003c/p\u003e\u003cp\u003eo\tGiao tiếp và phối hợp: Phối hợp nhịp nhàng với các phòng ban liên quan (R\u0026D, Kinh doanh, Kế toán) để đảm bảo toàn bộ chuỗi giá trị hoạt động trơn tru.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. THÁI ĐỘ/TINH THẦN LÀM VIỆC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.1. Chính trực:\u003c/strong\u003e Trung thực, minh bạch trong báo cáo sản xuất, quản lý nguyên vật liệu và không dung túng cho các hành vi gian lận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.2. Tận tâm:\u003c/strong\u003e Luôn cam kết và nỗ lực hết mình để đảm bảo tiến độ, chất lượng sản phẩm; sẵn sàng làm việc ngoài giờ khi có sự cố hoặc yêu cầu cấp bách.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.3. Sáng tạo:\u003c/strong\u003e Thường xuyên tìm tòi, đề xuất các ý tưởng cải tiến quy trình, tối ưu hóa công nghệ để nâng cao hiệu suất sản xuất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.4. Kỷ luật:\u003c/strong\u003e Tuân thủ nghiêm ngặt các quy định về an toàn, quy trình vận hành; xây dựng và duy trì một môi trường làm việc có tính kỷ luật cao.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.5. Đạo đức:\u003c/strong\u003e Có trách nhiệm cao với sản phẩm tạo ra, đảm bảo an toàn cho người lao động và môi trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. KINH NGHIỆM LÀM VIỆC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.1. Kinh nghiệm theo vị trí:\u003c/strong\u003e Tối thiểu 5-7 năm kinh nghiệm làm việc trong lĩnh vực sản xuất, trong đó có ít nhất 3 năm ở vị trí quản lý tương đương \u003cem\u003e(Trưởng phòng hoặc Giám đốc nhà máy)\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.2. Kinh nghiệm theo lĩnh vực:\u003c/strong\u003e Bắt buộc có kinh nghiệm làm việc trong ngành sản xuất sơn, hóa chất, vật liệu xây dựng hoặc các ngành công nghiệp có quy trình tương tự.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T497d,"])</script><script>self.__next_f.push([1,"\u003cp\u003ePHẦN 1: VAI TRÒ TỔNG QUÁT \u0026 CHỨC NĂNG.\u003c/p\u003e\u003cp\u003eVai trò của Trưởng Phòng Sản xuất \u0026 Quản lý Vận hành tại TLG Việt Nam là người lãnh đạo toàn bộ chuỗi giá trị sản xuất, đảm bảo quá trình chuyển đổi nguyên vật liệu thành sản phẩm cuối cùng diễn ra một cách An toàn, Hiệu quả và Chất lượng cao nhất, đáp ứng kịp thời nhu cầu thị trường và tối ưu hóa chi phí vận hành. Vai trò tổng quát được xác định qua 4 trụ cột chức năng chiến lược sau:\u003c/p\u003e\u003cp\u003e1. CHỨC NĂNG LÃNH ĐẠO CHIẾN LƯỢC R\u0026D VÀ CHẤT LƯỢNG SẢN PHẨM\u003c/p\u003e\u003cp\u003eChức năng này định hình vị trí Trưởng phòng là người kiến tạo sự khác biệt về chất lượng và đổi mới công thức cho thương hiệu sơn TLG Việt Nam.\u003c/p\u003e\u003cp\u003e1.1. Lãnh đạo nghiên cứu và phát triển công thức (R\u0026D)\u003c/p\u003e\u003cp\u003eo\tĐịnh hướng đổi mới: Thiết lập chiến lược nghiên cứu dài hạn, tập trung vào việc phát triển các công thức mới (Sơn thân thiện môi trường) và các cải tiến cho dòng sản phẩm hiện tại (Tuylips, Nano One) nhằm duy trì lợi thế cạnh tranh về sáng tạo.\u003c/p\u003e\u003cp\u003eo\tQuản lý danh mục công thức: Giám sát và phê duyệt các dự án R\u0026D, đảm bảo công thức mới không chỉ đạt tiêu chuẩn kỹ thuật mà còn khả thi về mặt sản xuất và hiệu quả về chi phí.\u003c/p\u003e\u003cp\u003eo\tChuyển giao công nghệ: Chủ trì quá trình chuyển giao công thức mới từ phòng thí nghiệm (R\u0026D) sang sản xuất đại trà (Sản xuất), đảm bảo tính chính xác và chất lượng ổn định ngay từ lô hàng đầu tiên.\u003c/p\u003e\u003cp\u003e1.2. Kiểm soát và đảm bảo chất lượng (QC)\u003c/p\u003e\u003cp\u003eo\tThiết lập tiêu chuẩn QC: Xây dựng và duy trì các tiêu chuẩn chất lượng nghiêm ngặt cho từng khâu: nguyên vật liệu đầu vào, bán thành phẩm và thành phẩm cuối cùng. Đảm bảo chất lượng đáp ứng và vượt trội so với yêu cầu thị trường.\u003c/p\u003e\u003cp\u003eo\tPhân tích lỗi và cải tiến: Phối hợp với Bộ phận R\u0026D và Quản lý chất lượng và các đơn vị Bán hàng để phân tích nguyên nhân gốc rễ của các lỗi chất lượng (Lỗi màu, lỗi độ bền, lỗi bao bì …) và chỉ đạo các hành động khắc phục, phòng ngừa để ngăn chặn tái diễn.\u003c/p\u003e\u003cp\u003eo\tKiểm soát nhà cung cấp nguyên liệu: Hợp tác với Phòng Kế toán để đánh giá chất lượng nguyên vật liệu từ các nhà cung cấp chính. Đảm bảo chỉ sử dụng nguyên liệu đầu vào đạt chuẩn để duy trì chất lượng thành phẩm.\u003c/p\u003e\u003cp\u003e1.3. Phát triển năng lực chuyên môn\u003c/p\u003e\u003cp\u003eo\tĐào tạo kỹ thuật: Chỉ đạo việc đào tạo chuyên sâu về kỹ thuật pha chế, phối màu và kiểm soát chất lượng cho nhân sự Sản xuất, Pha màu và QC, nhằm nâng cao tay nghề và giảm thiểu sai sót do con người.\u003c/p\u003e\u003cp\u003e2. CHỨC NĂNG QUẢN LÝ HIỆU SUẤT SẢN XUẤT VÀ KỸ THUẬT\u003c/p\u003e\u003cp\u003eChức năng này định hình Trưởng phòng Sản xuất \u0026 Quản lý vận hành là người quản lý nhà máy, đảm bảo mọi tài sản và nguồn lực được sử dụng một cách tối ưu.\u003c/p\u003e\u003cp\u003e2.1. Điều hành và giám sát hiệu suất sản xuất\u003c/p\u003e\u003cp\u003eo\tChỉ đạo vận hành hàng ngày: Chỉ đạo và giám sát trực tiếp các Bộ phận Sản xuất, Pha màu và Đóng gói thực hiện Lệnh Sản xuất theo đúng quy trình, công thức đã phê duyệt và đúng tiến độ.\u003c/p\u003e\u003cp\u003eo\tTối ưu hóa quy trình: Liên tục rà soát và áp dụng các phương pháp quản lý tinh gọn (5S, Kaizen …) để cải tiến quy trình, giảm thiểu lãng phí (thời gian chờ, vật liệu dư thừa …) và giảm tỷ lệ phế phẩm.\u003c/p\u003e\u003cp\u003eo\tQuản lý công suất: Theo dõi và tối ưu hóa Công suất Sản xuất của nhà máy và hiệu suất tổng thể thiết bị, đảm bảo sử dụng tối đa và hiệu quả máy móc, thiết bị hiện có.\u003c/p\u003e\u003cp\u003e2.2. Quản lý kỹ thuật và bảo trì hệ thống\u003c/p\u003e\u003cp\u003eo\tBảo trì: Chỉ đạo Bộ phận Kỹ thuật xây dựng và thực hiện các kế hoạch Bảo trì định kỳ cho toàn bộ hệ thống máy móc, thiết bị, dây chuyền sản xuất và hệ thống tiện ích (điện, nước, khí nén …) để giảm thiểu tối đa sự cố đột xuất.\u003c/p\u003e\u003cp\u003eo\tXử lý sự cố kỹ thuật: Thiết lập quy trình phản ứng nhanh để xử lý và khắc phục kịp thời các sự cố kỹ thuật xảy ra trong quá trình sản xuất, phối hợp chặt chẽ với các bộ phận liên quan để khôi phục hoạt động nhanh nhất.\u003c/p\u003e\u003cp\u003eo\tQuản lý Dự án kỹ thuật: Chủ trì các dự án nâng cấp, lắp đặt thiết bị, máy móc mới trong nhà máy. Đảm bảo việc lắp đặt đúng tiêu chuẩn kỹ thuật, an toàn và đúng tiến độ.\u003c/p\u003e\u003cp\u003e2.3. Quản lý đội ngũ và tài nguyên sản xuất\u003c/p\u003e\u003cp\u003eo\tPhân bổ nhân sự: Phân bổ nhân sự kỹ thuật và vận hành một cách hợp lý giữa các ca, các bộ phận (Sản xuất, Pha màu, Đóng gói) để đáp ứng mục tiêu sản lượng.\u003c/p\u003e\u003cp\u003eo\tKiểm soát tiêu hao tật tư: Giám sát chặt chẽ định mức tiêu hao nguyên vật liệu và vật tư kỹ thuật. Phân tích nguyên nhân chênh lệch giữa tiêu chuẩn và thực tế để có biện pháp kiểm soát chi phí.\u003c/p\u003e\u003cp\u003e3. CHỨC NĂNG ĐIỀU PHỐI CHUỖI CUNG ỨNG VÀ GIAO HÀNG\u003c/p\u003e\u003cp\u003eChức năng này bao gồm việc kết nối nhu cầu thị trường với năng lực sản xuất và phân phối sản phẩm sơn.\u003c/p\u003e\u003cp\u003e3.1. Quản lý lập kế hoạch sản xuất.\u003c/p\u003e\u003cp\u003eo\tChuyển đổi kế hoạch bán hàng: Tiếp nhận và phân tích Dự báo Bán hàng (từ Phòng Bán hàng Đại lý và Dự án) để lập Kế hoạch Sản xuất Tổng thể chi tiết theo tuần/tháng. Đảm bảo kế hoạch sản xuất cân đối với công suất nhà máy và nguồn cung nguyên vật liệu.\u003c/p\u003e\u003cp\u003eo\tLập lịch trình chi tiết: Xây dựng lịch trình sản xuất chi tiết cho từng dây chuyền, từng mã sản phẩm và điều phối nguồn lực (nhân công, máy móc, nguyên liệu) một cách chính xác để tối đa hóa hiệu suất và giảm thiểu thời gian chuyển đổi sản phẩm.\u003c/p\u003e\u003cp\u003e3.2. Quản lý tồn kho và kho vận\u003c/p\u003e\u003cp\u003eo\tGiám sát Thủ kho: Chỉ đạo Thủ kho và bộ phận kho vận trong việc quản lý, sắp xếp và bảo quản nguyên vật liệu đầu vào và thành phẩm theo đúng tiêu chuẩn kỹ thuật (đặc biệt là điều kiện nhiệt độ và an toàn PCCC).\u003c/p\u003e\u003cp\u003eo\tĐảm bảo độ chính xác tồn kho: Thiết lập và giám sát quy trình kiểm kê kho chặt chẽ (định kỳ, đột xuất). Chịu trách nhiệm về độ chính xác tồn kho trên hệ thống và thực tế; Đảm bảo dữ liệu luôn chính xác để hỗ trợ lập kế hoạch và bán hàng.\u003c/p\u003e\u003cp\u003eo\tTối ưu hóa mức tồn kho: Phân tích nhu cầu để xác định mức tồn kho an toàn cho các sản phẩm bán chạy, giảm thiểu rủi ro hết hàng và đồng thời giảm thiểu hàng tồn kho lỗi thời/hỏng hóc, nâng cao hiệu quả sử dụng vốn.\u003c/p\u003e\u003cp\u003e3.3. Điều phối giao hàng và logistics nội bộ\u003c/p\u003e\u003cp\u003eo\tGiám sát Bộ phận Giao hàng: Chỉ đạo và giám sát hoạt động của Bộ phận Giao hàng, đảm bảo việc lấy hàng, đóng gói và vận chuyển được thực hiện theo đúng Lệnh Xuất kho và thời gian yêu cầu của khách hàng/phòng bán hàng.\u003c/p\u003e\u003cp\u003eo\tTối ưu hóa chi phí Logistics: Liên tục rà soát và tối ưu hóa các tuyến đường, phương tiện, và quy trình giao hàng để giảm chi phí vận chuyển đồng thời duy trì chất lượng dịch vụ giao nhận.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4. CHỨC NĂNG ĐẢM BẢO AN TOÀN, SỨC KHỎE \u0026 MÔI TRƯỜNG.\u003c/p\u003e\u003cp\u003eChức năng này tập trung vào việc ngăn ngừa rủi ro và tuân thủ các quy định nghiêm ngặt của ngành sản xuất sơn.\u003c/p\u003e\u003cp\u003e4.1. Lập chính sách và Quy trình An toàn\u003c/p\u003e\u003cp\u003eo\tXây dựng Quy tắc An toàn: Chủ trì xây dựng, cập nhật và phổ biến các quy tắc, quy trình an toàn lao động cụ thể cho từng khu vực có nguy cơ cao (Pha chế hóa chất, Kho bãi, Vận hành máy móc) theo tiêu chuẩn pháp luật và tiêu chuẩn ngành.\u003c/p\u003e\u003cp\u003eo\tQuản lý rủi ro: Thường xuyên thực hiện đánh giá rủi ro tại nhà máy để xác định các mối nguy tiềm ẩn (cháy nổ, hóa chất độc hại, thiết bị lỗi) và đề xuất các biện pháp phòng ngừa triệt để.\u003c/p\u003e\u003cp\u003e4.2. Giám sát tuân thủ và phòng ngừa sự cố\u003c/p\u003e\u003cp\u003eo\tGiám sát An toàn hàng ngày: Tổ chức và giám sát việc kiểm tra tuân thủ Nội quy của toàn bộ nhân viên, bao gồm việc sử dụng đúng và đủ Trang bị Bảo hộ Lao động .Đảm bảo kỷ luật an toàn được duy trì một cách nghiêm ngặt.\u003c/p\u003e\u003cp\u003eo\tPCCC và ứng phó khẩn cấp: Chịu trách nhiệm về việc kiểm tra, bảo trì hệ thống Phòng cháy chữa cháy tại xưởng sản xuất. Tổ chức các buổi huấn luyện và diễn tập định kỳ về ứng phó khẩn cấp và sơ cấp cứu cho nhân sự nhà máy.\u003c/p\u003e\u003cp\u003e4.3. Quản lý sức khỏe và môi trường\u003c/p\u003e\u003cp\u003eo\tSức khỏe lao động: Phối hợp với Phòng Nhân sự Tổng hợp để giám sát việc thực hiện khám sức khỏe định kỳ và các chế độ nghỉ ngơi, phục hồi sức khỏe cho nhân viên, đặc biệt là những người tiếp xúc với môi trường sản xuất độc hại.\u003c/p\u003e\u003cp\u003eo\tKiểm soát môi trường: Đảm bảo toàn bộ hoạt động của nhà máy (tiếng ồn, ánh sáng, xử lý nước thải, khí thải) tuân thủ nghiêm ngặt các quy định về Bảo vệ Môi trường. Quản lý và giám sát quy trình xử lý chất thải nguy hại một cách hợp pháp và chính trực.\u003c/p\u003e\u003cp\u003e4.4. Điều tra và báo cáo sự cố\u003c/p\u003e\u003cp\u003eo\tĐiều tra tai nạn: Khi có sự cố hoặc tai nạn lao động xảy ra, phải lập tức tổ chức Điều tra nguyên nhân gốc rễ và lập báo cáo chính xác. Chỉ đạo các hành động khắc phục và phòng ngừa để ngăn chặn sự cố tái diễn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003ePHẦN III. NHIỆM VỤ.\u003c/p\u003e\u003cp\u003e1. CÁC NHIỆM VỤ THƯỜNG XUYÊN, HÀNG NGÀY.\u003c/p\u003e\u003cp\u003e1.1.\tĐiều hành \u0026 Giám sát Sản xuất Hàng ngày: Hàng ngày, chỉ đạo Bộ phận Sản xuất, Pha màu và Đóng gói triển khai Lệnh Sản xuất dựa trên Kế hoạch đã duyệt. Theo dõi tiến độ sản xuất, công suất máy móc và tình hình nhân sự tại chỗ.\u003c/p\u003e\u003cp\u003e1.2.\tKiểm tra Kỷ luật Vận hành: Giám sát và duy trì tính Kỷ luật nghiêm ngặt trong việc tuân thủ quy trình vận hành máy móc, thao tác pha chế, vệ sinh công nghiệp (5S) và các quy tắc nội quy nhà máy.\u003c/p\u003e\u003cp\u003e1.3.\tKiểm soát Chất lượng Bán thành phẩm/Thành phẩm: Giám sát Bộ phận Pha màu và QC thực hiện việc lấy mẫu, kiểm tra chất lượng của bán thành phẩm và thành phẩm theo tần suất quy định. Phê duyệt lô hàng đạt chuẩn nhập kho.\u003c/p\u003e\u003cp\u003e1.4.\tGiám sát Kho vận và Độ chính xác Tồn kho: Kiểm tra ngẫu nhiên hoạt động của Thủ kho và Giao hàng. Đảm bảo việc nhập/xuất nguyên vật liệu và thành phẩm được thực hiện Chính xác trên hệ thống phần mềm và thực tế.\u003c/p\u003e\u003cp\u003e1.5.\tQuản lý Bảo trì và Sửa chữa Thường xuyên: Giám sát Bộ phận Kỹ thuật thực hiện các công tác bảo trì thường xuyên/nhỏ để duy trì sự hoạt động ổn định của các thiết bị sản xuất sơn. Phê duyệt các yêu cầu vật tư, phụ tùng thay thế định kỳ.\u003c/p\u003e\u003cp\u003e1.6.\tTuần tra An toàn: Hàng ngày, thực hiện các chuyến tuần tra tại khu vực nhà máy, kho hóa chất và dây chuyền. Phát hiện kịp thời các rủi ro (lỗi thiết bị, vi phạm an toàn của nhân viên) và chỉ đạo khắc phục ngay lập tức, đảm bảo an toàn sản xuất.\u003c/p\u003e\u003cp\u003e1.7.\tXử lý vấn đề vận hành đột xuất: Phản ứng nhanh và trực tiếp xử lý các sự cố kỹ thuật nhỏ, lỗi chất lượng phát sinh trong ca, hoặc các vấn đề giao hàng cấp bách để không làm gián đoạn chuỗi cung ứng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. NHIỆM VỤ PHỐI HỢP LIÊN BỘ PHẬN/PHÒNG BAN\u003c/p\u003e\u003cp\u003e2.1.\tXác nhận Kế hoạch Sản xuất \u0026 Phân phối: Phối hợp với Phòng Bán hàng Đại lý miền Bắc, Phòng Dự án và Chi nhánh miền Nam để thống nhất dự báo nhu cầu và kế hoạch phân phối cho từng khu vực, đảm bảo năng lực sản xuất đáp ứng được mục tiêu doanh số kịp thời.\u003c/p\u003e\u003cp\u003e2.2.\tQuản lý cung ứng nguyên vật liệu chiến lược: Phối hợp chặt chẽ với Phòng Kế toán (Bộ phận Mua hàng) để xác định định mức và thời điểm mua sắm các nguyên vật liệu cốt lõi (hoá chất, bột màu). Đánh giá chất lượng nhà cung cấp để duy trì chất lượng sản phẩm ổn định.\u003c/p\u003e\u003cp\u003e2.3.\tQuản lý ngân sách và kiểm soát chi phí: Phối hợp với Phòng Kế toán để lập ngân sách vận hành và đầu tư hàng năm cho nhà máy. Cung cấp báo cáo chi phí sản xuất và giải trình chênh lệch chi phí, đảm bảo tính Hiệu quả và Chính xác.\u003c/p\u003e\u003cp\u003e2.4.\tQuản lý chất lượng và thương hiệu: Phối hợp với Phòng Marketing \u0026 Truyền thông để cung cấp thông tin kỹ thuật chính xác về sản phẩm (công thức, tính năng) phục vụ tài liệu Marketing và đào tạo. Tham gia xử lý khủng hoảng chất lượng ảnh hưởng đến Thương hiệu.\u003c/p\u003e\u003cp\u003e2.5.\tĐảm bảo tuân thủ và minh bạch: Cung cấp hồ sơ, tài liệu và báo cáo hoạt động sản xuất, tồn kho và an toàn môi trường khi có yêu cầu từ Ban Kiểm soát Nội bộ. Đảm bảo các quy trình vận hành và kho vận tuân thủ quy chế nội bộ và pháp luật.\u003c/p\u003e\u003cp\u003e2.6.\tHỗ trợ hệ thống Công nghệ Thông tin: Phối hợp với Phòng CNTT để cung cấp các yêu cầu về nghiệp vụ, quy trình cho việc triển khai, nâng cấp các hệ thống liên quan đến sản xuất (ERP, MES), đảm bảo dữ liệu sản xuất được thu thập chính xác.\u003c/p\u003e\u003cp\u003e2.7.\tBáo cáo và tham mưu lãnh đạo: Định kỳ và đột xuất, báo cáo trực tiếp lên Ban Tổng Giám đốc về hiệu suất vận hành (OEE, Tỷ lệ Phế phẩm), tình hình an toàn môi trường và các rủi ro chiến lược trong chuỗi cung ứng. Tham mưu về các dự án đầu tư công nghệ.\u003c/p\u003e\u003cp\u003e2.8.\tQuản lý nguồn lực và kỷ luật lao động: Phối hợp với Nhân sự Tổng hợp để xác định Định biên Nhân sự, tuyển dụng nhân sự cần thiết theo từng thời điểm; Xây dựng và thực hiện các chương trình đào tạo nghiệp vụ kỹ thuật chuyên sâu và các buổi huấn luyện an toàn lao động \u0026 vệ sinh môi trường bắt buộc, đảm bảo An toàn và nâng cao tay nghề công nhân. Tham gia vào quy trình xử lý kỷ luật và đánh giá việc tuân thủ Nội quy Công ty, Nội quy Lao động tại nhà máy, duy trì tính kỷ luật trong hoạt động sản xuất và vận hành.\u003c/p\u003e\u003cp\u003e2.9.\tQuản lý cơ sở vật chất và hành chính hỗ trợ: Phối hợp với Phòng Nhân sự Tổng hợp để đảm bảo các yêu cầu về bảo trì cơ sở vật chất (nhà xưởng, kho bãi), quản lý bảo vệ, vệ sinh, và cung cấp Bảo hộ Lao động (BHLĐ) được đáp ứng đầy đủ và kịp thời, hỗ trợ sản xuất hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. NHIỆM VỤ LẬP KẾ HOẠCH VÀ BÁO CÁO\u003c/p\u003e\u003cp\u003e3.1.\tLập kế hoạch sản xuất tổng thể: Định kỳ (tháng/quý), lập Kế hoạch Sản xuất tổng thể dựa trên dự báo bán hàng, năng lực sản xuất và mức tồn kho an toàn. Phân bổ mục tiêu sản lượng cho các bộ phận.\u003c/p\u003e\u003cp\u003e3.2. Lập kế hoạch và dự toán ngân sách: Phối hợp với Phòng Kế toán để xây dựng dự toán Ngân sách hàng năm cho các hoạt động vận hành (Chi phí nhân công, vật tư tiêu hao …) và các dự án đầu tư (Mua sắm thiết bị, nâng cấp nhà xưởng …).\u003c/p\u003e\u003cp\u003e3.3. Lập kế hoạch bảo trì dự phòng: Xây dựng Kế hoạch bảo trì chi tiết theo tuần/tháng/quý cho toàn bộ hệ thống máy móc, thiết bị và hạ tầng. Đảm bảo kế hoạch được thực hiện đúng để giảm thiểu sự cố đột xuất.\u003c/p\u003e\u003cp\u003e3.4. Báo cáo hiệu suất vận hành: Lập và gửi các báo cáo định kỳ (tuần/tháng/quý) lên Ban Tổng Giám đốc và các phòng ban liên quan về các chỉ số KPIs cốt lõi.\u003c/p\u003e\u003cp\u003e3.5. Phân tích và báo cáo chi phí sản xuất: Định kỳ, phân tích chi phí Sản xuất chi tiết, bao gồm chi phí nguyên vật liệu, nhân công và chi phí chung. Báo cáo chênh lệch chi phí so với định mức và đề xuất giải pháp tối ưu hóa hiệu quả.\u003c/p\u003e\u003cp\u003e3.6. Báo cáo An toàn, Sức khỏe \u0026 Môi trường: Lập các báo cáo tuân thủ an toàn môi trường theo quy định nội bộ và pháp luật. Báo cáo chi tiết về bất kỳ sự cố, tai nạn lao động hoặc vi phạm môi trường (nếu có), kèm theo phân tích nguyên nhân và hành động khắc phục.\u003c/p\u003e\u003cp\u003e3.7. Quản lý hồ sơ kỹ thuật và công thức: Thiết lập hệ thống lưu trữ Hồ sơ kỹ thuật (bản vẽ, sơ đồ máy, lịch sử bảo trì) và Hồ sơ công thức sản xuất (phiên bản, lịch sử thay đổi) một cách khoa học, chính xác và bảo mật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:Te4b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. KIẾN THỨC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.1. Kiến thức chuyên môn:\u003c/strong\u003e Am hiểu sâu sắc về các quy trình và công nghệ sản xuất sơn; nắm vững các tiêu chuẩn quốc tế về chất lượng (ISO 9001, v.v.), an toàn lao động và bảo vệ môi trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2. Kiến thức quản lý:\u003c/strong\u003e Có kiến thức về quản lý chuỗi cung ứng, kho bãi và logistics; hiểu biết cơ bản về quản trị nhân sự, lập ngân sách và quản lý chi phí.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.3. Kiến thức tổng quan:\u003c/strong\u003e Hiểu rõ các sản phẩm, đặc tính kỹ thuật và yêu cầu của thị trường đối với từng dòng sơn của công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. KỸ NĂNG: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.1. Kỹ năng chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tLập kế hoạch và điều hành: Xây dựng kế hoạch sản xuất hiệu quả, phân bổ nguồn lực và điều hành các hoạt động để đạt mục tiêu về sản lượng và chất lượng.\u003c/p\u003e\u003cp\u003eo\tKiểm soát chất lượng: Áp dụng các phương pháp và công cụ quản lý chất lượng để đảm bảo sản phẩm đầu ra luôn đạt tiêu chuẩn.\u003c/p\u003e\u003cp\u003eo\tPhân tích và tối ưu hóa: Phân tích dữ liệu sản xuất để phát hiện lãng phí, điểm nghẽn và đề xuất các giải pháp cải tiến liên tục (Kaizen, Lean Manufacturing).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.2. Kỹ năng mềm\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003eo\tLãnh đạo và quản lý đội nhóm: Dẫn dắt, đào tạo và phát triển đội ngũ nhân viên sản xuất, xây dựng môi trường làm việc kỷ luật và an toàn.\u003c/p\u003e\u003cp\u003eo\tGiải quyết vấn đề: Xử lý nhanh chóng và hiệu quả các sự cố kỹ thuật, vấn đề phát sinh trong quá trình sản xuất.\u003c/p\u003e\u003cp\u003eo\tGiao tiếp và phối hợp: Phối hợp nhịp nhàng với các phòng ban liên quan (R\u0026D, Kinh doanh, Kế toán) để đảm bảo toàn bộ chuỗi giá trị hoạt động trơn tru.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. THÁI ĐỘ/TINH THẦN LÀM VIỆC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.1. Chính trực:\u003c/strong\u003e Trung thực, minh bạch trong báo cáo sản xuất, quản lý nguyên vật liệu và không dung túng cho các hành vi gian lận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.2. Tận tâm:\u003c/strong\u003e Luôn cam kết và nỗ lực hết mình để đảm bảo tiến độ, chất lượng sản phẩm; sẵn sàng làm việc ngoài giờ khi có sự cố hoặc yêu cầu cấp bách.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.3. Sáng tạo:\u003c/strong\u003e Thường xuyên tìm tòi, đề xuất các ý tưởng cải tiến quy trình, tối ưu hóa công nghệ để nâng cao hiệu suất sản xuất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.4. Kỷ luật:\u003c/strong\u003e Tuân thủ nghiêm ngặt các quy định về an toàn, quy trình vận hành; xây dựng và duy trì một môi trường làm việc có tính kỷ luật cao.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.5. Đạo đức:\u003c/strong\u003e Có trách nhiệm cao với sản phẩm tạo ra, đảm bảo an toàn cho người lao động và môi trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. KINH NGHIỆM LÀM VIỆC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.1. Kinh nghiệm theo vị trí:\u003c/strong\u003e Tối thiểu 5-7 năm kinh nghiệm làm việc trong lĩnh vực sản xuất, trong đó có ít nhất 3 năm ở vị trí quản lý tương đương \u003cem\u003e(Trưởng phòng hoặc Giám đốc nhà máy)\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.2. Kinh nghiệm theo lĩnh vực:\u003c/strong\u003e Bắt buộc có kinh nghiệm làm việc trong ngành sản xuất sơn, hóa chất, vật liệu xây dựng hoặc các ngành công nghiệp có quy trình tương tự.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2a:{\"skillName\":\"An Toàn Sức Khỏe Môi Trường\",\"skillId\":382001,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Kiểm Soát Chất Lượng\",\"skillId\":2254,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Lập Kế Hoạch Sản Xuất\",\"skillId\":4893,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Quản Lý Sản Xuất\",\"skillId\":394,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Sản Xuất Sơn\",\"skillId\":28305,\"skillWeight\":100,\"isExisted\":false}\n29:[\"$2a\",\"$2b\",\"$2c\",\"$2d\",\"$2e\"]\n30:{\"benefitId\":15,\"benefitIconName\":\"fa-check-square-o\",\"benefitName\":\"Others\",\"benefitNameVI\":\"Khác\",\"benefitValue\":\"Theo quy định của công ty\"}\n2f:[\"$30\"]\n33:{\"lat\":20.590375,\"lon\":106.216914}\n32:{\"workingLocationId\":231137,\"addressId\":95568,\"cityId\":54,\"districtId\":0,\"address\":\"Hưng Hà, Thái Bình, Việt Nam\",\"geoLoc\":\"$33\",\"cityName\":\"Thai Binh\",\"cityNameVI\":\"Thái Bình\"}\n31:[\"$32\"]\n35:{\"industryId\":0,\"industryName\":\"\",\"industryNameVI\":\"\"}\n34:[\"$35\"]\n37:{\"industryV3Id\":30,\"indust
