\",\"companyId\":139723,\"companyProfile\":\"Chúng tôi là một công ty thương mại Nhật Bản, chuyên phân phối các sản phẩm thiết bị, máy móc công nghiệp, văn phòng phẩm, họa phẩm,... từ Nhật cho thị trường Việt Nam, đồng thời xuất khẩu các sản phẩm đồ gỗ và thủ công mỹ nghệ từ Việt Nam đi Nhật. \\r\\n\\r\\nNhân viên của chúng tôi được làm viêc trong một môi trường năng động nhưng cũng rất ổn định, có áp lực nhưng lại luôn thân thiện và tương trợ lẫn nhau.\\r\\n\\r\\nChúng tôi rất mong chào đón các gương mặt mới để cùng nhau xây dựng và phát triển kinh doanh của công ty tại Việt Nam.\",\"companySizeId\":2,\"contactName\":\"HR Dept.\",\"createdBy\":2901776,\"isOnline\":true,\"isActive\":true,\"isApproved\":true,\"isUnpaidDisable\":0,\"isCompleted\":true,\"isAnonymous\":false,\"isSalaryVisible\":true,\"isShowLogo\":true,\"isShowLogoInSearch\":false,\"jobDescription\":\"\u003cp\u003e• Chăm sóc data khách hàng được giao.\u003c/p\u003e\u003cp\u003e• Chủ động tìm kiếm, xây dựng khách hàng mới.\u003c/p\u003e\u003cp\u003e• Nghiên cứu thị trường, xác định phân khúc khách hàng, phát triển sản phẩm mới.\u003c/p\u003e\u003cp\u003e• Tư vấn kỹ thuật, hướng dẫn sử dụng và chăm sóc khách hàng sau bán hàng.\u003c/p\u003e\u003cp\u003e• Duy trì, kết nối và phát triển mối quan hệ với khách hàng.\u003c/p\u003e\u003cp\u003e• Báo cáo công việc và kế hoạch bán hàng tới quản lý trực tiếp ở Việt Nam và team ở Nhật Bản.\u003c/p\u003e\u003cp\u003e*\u003cstrong\u003eThời gian làm việc : 8h30-17h30\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*Ngày làm việc : Thứ 2 đến Thứ 6 và sáng Thứ 7\u003c/strong\u003e\u003c/p\u003e\",\"jobRequirement\":\"\u003cp\u003e\u003cstrong\u003eYêu cầu: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Cao đẳng/Đại học chuyên ngành \u003cstrong\u003eMôi trường, Kỹ thuật môi trường, Xử lý nước thải\u003c/strong\u003e hoặc các ngành liên quan.  \u003c/p\u003e\u003cp\u003e- Có kiến thức cơ bản về hệ thống xử lý nước thải, quy trình vận hành hoặc
