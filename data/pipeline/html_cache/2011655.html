03e while safeguarding core brand positioning.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Plan and deploy integrated brand campaigns (IMC)\u003c/strong\u003e across key online and offline touchpoints.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Contribute actively to creative direction and brand storytelling\u003c/strong\u003e, ensuring campaigns stand out in a competitive market.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCrisis Awareness \u0026 Brand Risk Handling\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Actively monitor market feedback, consumer sentiment, and social conversations related to the brand.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Participate in and support brand response planning for issues or potential crises\u003c/strong\u003e, including product-related discussions and public concerns.\u003c/p\u003e\u003cp\u003e- Coordinate closely with internal stakeholders (Brand, Media, PR, Customer Service, etc.) to ensure:\u003c/p\u003e\u003cp\u003e  - Aligned risks \u0026 messaging\u003c/p\u003e\u003cp\u003e  - Timely and responsible brand responses\u003c/p\u003e\u003cp\u003e- Help identify potential \u003cstrong\u003ebrand reputation risks\u003c/strong\u003e and propose preventive communication actions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCross-functional \u0026 Partner Collaboration\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Work closely with internal teams (Content, Media, E-commerce, Sales) to ensure consistent brand execution.\u003c/p\u003e\u003cp\u003e- Coordinate with external agencies, KOLs, and partners to deliver high-quality, brand-safe campaigns.\u003c/p\u003e\u003cp\u003e- Act as a key brand execution partner between the Vietnam market and regional/global teams.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T8b4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e3. Requirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBrand Strategy \u0026 Positioning \u003c/p\u003e\u003cp\u003e 003e\u003cstrong\u003e4. Why Join Petour?\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Own branding in one of the \u003cstrong\u003emost important markets\u003c/strong\u003e within the group.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Work on a brand with real scale, strong sales momentum, and high consumer attention\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Opportunity to grow from senior executor → future brand leader\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e- Dynamic environment with room for creativity, learning, and impact.\u003c/p\u003e\u003cp\u003e- Competitive compensation and exposure to regional brand projects.\u003c/p\u003e\u003cp\u003e- Attractive salary with a performance review every 6 months.\u003c/p\u003e\u003cp\u003e- 24 days of annual leave plus 24 remote-working days per year.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T9c8,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Role Summary\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWe are looking for a \u003cstrong\u003eBrand \u0026 Marketing Lead\u003c/strong\u003e to drive and elevate our brand performance in Vietnam - a \u003cstrong\u003ehigh-volume, high-visibility market\u003c/strong\u003e where flagship Vet products are among the \u003cstrong\u003etop-selling SKUs\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003eThis role is designed for a \u003cstrong\u003esenior brand professional who already has experience leading a small team\u003c/strong\u003e and is ready to take \u003cstrong\u003eend-to-end ownership of brand execution\u003c/strong\u003e, creative direction, and brand risk awareness.\u003c/p\u003e\u003cp\u003eThe Brand Lead will \u003cstrong\u003elead by expertise\u003c/strong\u003e, guide a \u003cstrong\u003esmall local team\u003c/strong\u003e, and work closely with regional and global stakeholders to ensure strong brand consistency, relevance, and resilience in a fast-moving FMCG environment.\u003c/p\u003e\u003c nsistent brand execution.\u003c/p\u003e\u003cp\u003e- Coordinate with external agencies, KOLs, and partners to deliver high-quality, brand-safe campaigns.\u003c/p\u003e\u003cp\u003e- Act as a key brand execution partner between the Vietnam market and regional/global teams.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:T8b4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e3. Requirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBrand Strategy \u0026 Positioning \u003c/p\u003e\u003cp\u003e● Develop and refine brand guidelines to align with company values, ensuring consistency \u003c/p\u003e\u003cp\u003eacross all touchpoints. \u003c/p\u003e\u003cp\u003e● Shape brand positioning based on market trends, consumer insights, and competitive \u003c/p\u003e\u003cp\u003elandscape. \u003c/p\u003e\u003cp\u003e● Oversee brand messaging to ensure it resonates with target audiences, fostering brand \u003c/p\u003e\u003cp\u003eloyalty. \u003c/p\u003e\u003cp\u003eMultichannel Brand Execution \u003c/p\u003e\u003cp\u003e● Manage and execute brand strategy across multiple channels, including digital, retail, \u003c/p\u003e\u003cp\u003esocial media, and offline activations. \u003c/p\u003e\u003cp\u003e● Drive initiatives to increase brand awareness and preference, ensuring brand consistency \u003c/p\u003e\u003cp\u003eacross different platforms. \u003c/p\u003e\u003cp\u003e● Track and optimize brand health metrics (brand awareness, perception, engagement). \u003c/p\u003e\u003cp\u003eCollaboration \u0026 Campaign Management \u003c/p\u003e\u003cp\u003e● Work closely with commercial teams to integrate branding efforts into sales-driven \u003c/p\u003e\u003cp\u003ecampaigns and activations. \u003c/p\u003e\u003cp\u003e● Support new product launches with compelling brand stories and campaign strategies. \u003c/p\u003e\u003cp\u003e● Balance commercial objectives with long-term brand positioning to sustain brand equity. \u003c/p\u003e\u003cp\u003eTeam Leader
