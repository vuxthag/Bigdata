aborate and brainstorm with lighting designers and creative teams as an industry trend contributor.\u003c/p\u003e\u003cp\u003e•\tTranslate design intent into manufacturable and commercially viable lighting solutions.\u003c/p\u003e\u003cp\u003e•\tInfluence and support product specification during early project phases.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. FS-Stage Support \u0026 Commercial Discipline \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPartner with sales teams during feasibility and early design stages.\u003c/p\u003e\u003cp\u003e•\tEnsure product selections align with MOQ requirements and realistic lead times.\u003c/p\u003e\u003cp\u003e•\tIdentify technical or commercial risks early to prevent late-stage re-specification.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. R\u0026D Project-Based Product Governance\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDevelop and maintain a structured Tota /project-based product catalogue.\u003c/p\u003e\u003cp\u003e•\tLead internal product launches and training for approved Tota solutions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Product Governance \u0026 Portfolio Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAct as the gatekeeper for new product introductions, customisation requests, and Tota usage.\u003c/p\u003e\u003cp\u003e•\tMaintain a Vietnam-focused product roadmap aligned with market needs and global strategy.\u003c/p\u003e\u003cp\u003e•\tReview portfolio performance and recommend optimisation, updates, or phase-outs.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Internal Enablement \u0026 Knowledge Leadership\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tEnsure product knowledge and documentation remain accurate and up to date.\u003c/p\u003e\u003cp\u003e•\tDeliver product and Tota training sessions to sales and technical teams.\u003c/p\u003e\u003cp\u003e•\tDeliver product and Tota training sessions to designers, industry partners.\u003c/p\u003e\u003cp\u003e•\tMaintain consiste
