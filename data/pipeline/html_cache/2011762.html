ic/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T11ad,"])</script><script>self.__next_f.push([1,"CÔNG TY CỔ PHẦN SHIELD DOOR chính thức thành lập vào ngày 07 tháng 12 năm 2023, với trụ sở chính đặt tại:\r\nSố 63A, ngách 173/134, phố Hoàng Hoa Thám, phường Ngọc Hà, quận Ba Đình, thành phố Hà Nội, Việt Nam.\r\n\r\nTuy là doanh nghiệp trẻ nhưng Shield Door quy tụ đội ngũ kỹ thuật viên, chuyên gia nhiều năm kinh nghiệm trong lĩnh vực cửa cuốn công nghiệp và cửa cuốn chống cháy cao cấp. Kết hợp với hệ thống dây chuyền sản xuất hiện đại, Shield Door nhanh chóng trở thành đối tác tin cậy, cung cấp giải pháp cửa cuốn chống cháy an toàn, thông minh cho hàng trăm công trình lớn nhỏ trên cả nước.\r\n\r\nSứ mệnh\r\nMang đến giải pháp cửa cuốn chống cháy toàn diện, giúp bảo vệ con người và tài sản trước nguy cơ cháy nổ.\r\n\r\nTầm nhìn\r\nTrở thành thương hiệu cửa cuốn chống cháy hàng đầu Việt Nam, tiên phong về chất lượng, công nghệ và tính an toàn, sẵn sàng vươn ra thị trường khu vực.\r\n\r\nCam kết chất lượng và an toàn\r\nSản phẩm đạt tiêu chuẩn EI 60, EI 90, EI 120 phút, đáp ứng quy chuẩn kiểm định PCCC tại Việt Nam.\r\nSử dụng vật liệu chống cháy độc quyền KH Shield, kết hợp công nghệ cách nhiệt – chống cháy lan, đảm bảo an toàn tối đa.\r\nQuy trình sản xuất và lắp đặt tuân thủ nghiêm ngặt theo tiêu chuẩn ISO 9001, kiểm soát chất lượng từ khâu nguyên liệu đến thành phẩm.\r\n2. Lĩnh vực hoạt động chính\r\nCông ty cổ phần Shield Door chuyên:\r\n\r\nSản xuất, cung cấp và lắp đặt cửa cuốn chống cháy cho công trình dân dụng và công nghiệp.\r\nPhân phối đa dạng dòng sản phẩm:\r\nCửa cuốn chống cháy EI Shielddoor.\r\nCửa cuốn thoát hiểm thông minh, tự động mở khi có sự cố.\r\nCửa cuốn tự động an toàn, tích hợp trực tiếp hệ thống PCCC.\r\nTư vấn giải pháp chống cháy tổng thể, phù hợp từng loại công trình, từ nhà ở, trung tâm thương mại tới nhà xưởng, hầm gửi xe.\r\n3. Năng lực \u0026 kinh nghiệm\r\nĐội ngũ kỹ thuật viên giàu kinh nghiệm, được đào tạo bài bản, am hiểu chuyên sâu về kỹ thuật cửa cuốn chống cháy.\r\nDây chuyền sản xuất hiện đại, tuân thủ tiêu chuẩn quốc tế, đảm bảo sản phẩm chất lượng cao.\r\nHàng loạt dự án tiêu biểu: Nhà máy, xưởng sản xuất, trung tâm thương mại, trường học, bệnh viện, tầng hầm gửi xe,…\r\nMột số công trình đã thực hiện: Samsung Bắc Ninh, GO! Thăng Long, và nhiều dự án quy mô lớn khác.\r\n4. Giá trị cốt lõi\r\nAn toàn tuyệt đối\r\nLuôn đặt an toàn con người và tài sản lên hàng đầu, mỗi sản phẩm trước khi xuất xưởng đều trải qua quy trình kiểm tra nghiêm ngặt.\r\n\r\nChất lượng bền vững\r\nSản phẩm sử dụng vật liệu KH Shield độc quyền, kết hợp thép mạ kẽm cao cấp, đảm bảo chống cháy lan, cách nhiệt hiệu quả, phù hợp các công trình đòi hỏi yêu cầu chống cháy khắt khe nhất.\r\n\r\nĐổi mới không ngừng\r\nLiên tục nghiên cứu, ứng dụng công nghệ mới vào sản phẩm, giúp cửa cuốn không chỉ chống cháy mà còn có tính năng thoát hiểm thông minh, dễ dàng tích hợp với hệ thống báo cháy và chữa cháy tại công trình.\r\n\r\n5. Chứng nhận \u0026 cam kết chất lượng\r\nChứng nhận ISO 9001 – hệ thống quản lý chất lượng tiêu chuẩn quốc tế.\r\nChứng nhận kiểm định PCCC theo quy định tại Việt Nam.\r\nBảo hành chính hãng 12 tháng, hỗ trợ kỹ thuật 24/7.\r\nDịch vụ bảo trì định kỳ giúp cửa cuốn vận hành ổn định lâu dài.\r\nCam kết giá thành hợp lý, tối ưu chi phí cho chủ đầu tư và nhà thầu nhưng vẫn đảm bảo chất lượng và an toàn tối đa.\r\n6. Kêu gọi hợp tác \u0026 liên hệ\r\nĐối tác tiềm năng\r\nShield Door mong muốn đồng hành cùng:\r\n\r\nNhà thầu xây dựng, chủ đầu tư, các đơn vị tư vấn thiết kế công trình dân dụng, công nghiệp.\r\nDoanh nghiệp thi công hệ thống PCCC.\r\nĐại lý phân phối cửa cuốn chống cháy trên toàn quốc."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T11ad,"])</script><script>self.__next_f.push([1,"CÔNG TY CỔ PHẦN SHIELD DOOR chính thức thành lập vào ngày 07 tháng 12 năm 2023, với trụ sở chính đặt tại:\r\nSố 63A, ngách 173/134, phố Hoàng Hoa Thám, phường Ngọc Hà, quận Ba Đình, thành phố Hà Nội, Việt Nam.\r\n\r\nTuy là doanh nghiệp trẻ nhưng Shield Door quy tụ đội ngũ kỹ thuật viên, chuyên gia nhiều năm kinh nghiệm trong lĩnh vực cửa cuốn công nghiệp và cửa cuốn chống cháy cao cấp. Kết hợp với hệ thống dây chuyền sản xuất hiện đại, Shield Door nhanh chóng trở thành đối tác tin cậy, cung cấp giải pháp cửa cuốn chống cháy an toàn, thông minh cho hàng trăm công trình lớn nhỏ trên cả nước.\r\n\r\nSứ mệnh\r\nMang đến giải pháp cửa cuốn chống cháy toàn diện, giúp bảo vệ con người và tài sản trước nguy cơ cháy nổ.\r\n\r\nTầm nhìn\r\nTrở thành thương hiệu cửa cuốn chống cháy hàng đầu Việt Nam, tiên phong về chất lượng, công nghệ và tính an toàn, sẵn sàng vươn ra thị trường khu vực.\r\n\r\nCam kết chất lượng và an toàn\r\nSản phẩm đạt tiêu chuẩn EI 60, EI 90, EI 120 phút, đáp ứng quy chuẩn kiểm định PCCC tại Việt Nam.\r\nSử dụng vật liệu chống cháy độc quyền KH Shield, kết hợp công nghệ cách nhiệt – chống cháy lan, đảm bảo an toàn tối đa.\r\nQuy trình sản xuất và lắp đặt tuân thủ nghiêm ngặt theo tiêu chuẩn ISO 9001, kiểm soát chất lượng từ khâu nguyên liệu đến thành phẩm.\r\n2. Lĩnh vực hoạt động chính\r\nCông ty cổ phần Shield Door chuyên:\r\n\r\nSản xuất, cung cấp và lắp đặt cửa cuốn chống cháy cho công trình dân dụng và công nghiệp.\r\nPhân phối đa dạng dòn
