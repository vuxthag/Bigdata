ác tàu mà còn tham gia vào các hoạt động thuê tàu, mua bán tàu, các dịch vụ liên quan thông qua các công ty con và chi nhánh như dịch vụ đại lý, giao nhận \u0026 logistic… cũng như các hoạt động liên doanh, liên kết.\r\nVSICO đã thiết lập, thực hiện, duy trì, vận hành có hiệu quả Hệ thống Quản lý An toàn, Chất lượng và Môi trường (SQEMS) và thường xuyên chú trọng bổ sung và cải tiến nâng cao hiệu lực của hệ thống theo các yêu cầu của Bộ luật Quản lý An toàn Quốc tế (ISM Code) và Công ước Lao động hàng hải 2006.\r\nVới bề dày truyền thống và sự tận tâm với khách hàng, VSICO tự hào là một trong những công ty vận tải biển hàng đầu của Việt Nam, phục vụ đông đảo khách hàng trong và ngoài nước. Chúng tôi cam kết sẽ không ngừng nỗ lực đảm bảo cung cấp cho khách hàng dịch vụ vận tải chất lượng, chuyên nghiệp và uy tín.\r\nĐội ngũ nhân viên của VSICO luôn hướng đến những giá trị cốt lõi: “TÍN – TÂM – TRÍ – NHÂN – TỐC” để hoàn thiện và ngày càng phát triển.\r\n\r\nVSICO có công ty thành viên trực thuộc là CÔNG TY TNHH ALBERTA VIỆT NAM. Công ty chuyên nhập khẩu và phân phối sản phẩm dầu nhớt Texas –Singapore. Thương hiệu dầu nhớt Texas là một trong những thương hiệu có chất lượng uy tín nhất tại Singapore và các nước khu vực Châu Á. Những sản phẩm dầu nhớt mang tên Texas đều đạt chứng nhận chất lượng API, ACEA,JASO, ILSAC và được cấp chỉ tiêu chất lượng của các hãng xe nổi tiếng như : Volvo,Renault,MB,B\u0026W,Detroit,Cummins…. \r\n\r\nVới sự phát triển trong thời gian tới, VSICO và Alberta đang cần tuyển một số lượng lớn nhân viên kinh doanh, bán hàng về ngành dầu nhớt nhiên liệu."])</script><script>self.__next_f.push([1,"24:T6d1,\u003cp\u003e\u003cstrong\u003e(Phụ trách chủ yếu Quản lý Thiết kế \u0026 Hồ sơ Thủ tục)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThông tin chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tMức lương:\u003c/strong\u003e 22 - 24 triệu VNĐ/tháng.\u003c/p\u003e\u003cp\
