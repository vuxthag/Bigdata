ác đối tác trong ngành vật liệu xây dựng, vật liệu hoàn thiện…\u003c/p\u003e\u003cp\u003e3.\tCó ít nhất 2 năm kinh nghiệm Kinh doanh phát triển dự án/ Sales Spec/Chuyên viên bán hàng trong ngành kinh doanh Dự án (các sản phẩm vật liệu nội thất, vật liệu xây dựng đưa vào dự án như gỗ công nghiệp, kính, thiết bị vệ sinh, gạch, thạch cao, sơn, thiết bị điều hòa, thang máy...), từng có tỷ lệ chốt Spec cao.\u003c/p\u003e\u003cp\u003e4.\tThành thạo tin học văn phòng \u003c/p\u003e\u003cp\u003e5.\tBiết tiếng Anh/ tiếng Nhật /Autocad là mội lợi thế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII/ Kỹ năng và Yêu cầu khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tKỹ năng thuyết trình và giải quyết vấn đề. Biết cách xử lý thông tin để bán hàng dự án \u003c/p\u003e\u003cp\u003e2.\tĐam mê công việc kinh doanh trong lĩnh vực vật liệu Nội thất/ Vật liệu hoàn thiện.\u003c/p\u003e\u003cp\u003e3.\tNăng động, sáng tạo, liên tục cập nhật tình hình biến động của thị trường, tự tin, xử lý vấn đề linh hoạt, quyết đoán. Có khả năng đi công tác.\u003c/p\u003e\u003cp\u003e4.\tNữ/Nam, tuổi từ 30 – 45, am hiểu về kế trúc nội/nội thất/ vật liệu trang trí….\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCÁC PHÚC LỢI DÀNH CHO BẠN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eI.\tHỖ TRỢ TỪ CÔNG TY:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tĐược trực tiếp đào tạo chuyên sâu về sản phẩm trước khi bán hàng.\u003c/p\u003e\u003cp\u003e2.\tHỗ trợ công cụ bán hàng, tài liệu bán hàng, danh sách khách hàng\u003c/p\u003e\u003cp\u003e3.\tHỗ trợ chi phí công tác, chi phí tiếp khách, …trong giao dịch bán hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII.\tCHẾ ĐỘ QUYỀN LỢI KHÁC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tThu nhập theo thỏa thuận (Lương cứng 20-30tr +  % DS). Thưởng lương tháng thứ 13 + thưởng Dự án, thưởng các ngày lễ, tết + phụ cấp xăn
