03e\u003cstrong\u003eMÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTóm lược: Vai trò này chịu trách nhiệm thúc đẩy các mảng kinh doanh phi tín dụng, bao gồm: Quản lý dòng tiền (Cash Management), Tài trợ thương mại (Trade Finance) và các dịch vụ thanh toán số. Mục tiêu trọng tâm là tăng thu nhập từ phí (Non-interest income) và tối ưu hóa nguồn vốn giá rẻ (CASA) thông qua việc gắn kết khách hàng vào hệ sinh thái giao dịch của NCB. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ hàng ngày \u0026 Chi tiết công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Thiết kế Giải pháp Thanh toán \u0026 Quản lý dòng tiền: Xây dựng các giải pháp thu hộ, chi hộ, quản lý thanh khoản tập trung (Liquidity Management) cho các tập đoàn có mạng lưới công ty con phức tạp.\u003c/p\u003e\u003cp\u003e2. Thúc đẩy nghiệp vụ Tài trợ Thương mại: Chỉ đạo các hoạt động liên quan đến L/C, bảo lãnh, tài trợ chuỗi cung ứng (Supply Chain Finance) nhằm hỗ trợ các doanh nghiệp xuất nhập khẩu.\u003c/p\u003e\u003cp\u003e3. Triển khai Ngân hàng Số (Digital Banking): Phối hợp với Khối Công nghệ và Khối Chuyển đổi số (nếu cần thiết) để liên tục nâng cấp nền tảng của ngân hàng giao dịch như Internet Banking/Mobile Banking/Transaction banking platform cho doanh nghiệp (Host to-Host, API Integration).\u003c/p\u003e\u003cp\u003e4. Quản trị dòng tiền của Đối tác Chiến lược: Phối hợp với Trung tâm Phát triển Sản phẩm nhằm thiết kế các giải pháp thanh toán đặc thù cho hệ sinh thái của Đối tác chiến lược (ví dụ: thanh toán vé máy bay, khách sạn, dịch vụ vui chơi giải trí tự động).\u003c/p\u003e\u003cp\u003e5. Tư vấn Kỹ thuật cho Sales: Trực tiếp hỗ trợ các trung tâm Corporate và SME trong việc tư vấn các giải pháp kỹ thuật cao về dòng tiền cho khách hàng để \"khóa\" khách hàng lại với hệ thống NCB.\u003c/p\u003e\u003cp\u003e6. Báo cáo và Tuân thủ (Regulatory \u0026 Internal Reporting): \u003c/p\u003e\u003cp\u003e- Báo cáo hàng ngày về biến động số dư tiền gửi (CASA) và thu nhập từ phí dịch vụ cho Giám đốc Khối Khách hàng Doanh nghiệp.\u003c/p\u003e\u003cp\u003e- Đảm bảo các giao dịch thanh toán quốc tế tuân thủ nghiêm ngặt quy định về quản lý ngoại hối và phòng chống rửa tiền (AML) của Ngân hàng Nhà nước (NHNN).\u003c/p\u003e\u003cp\u003e- Chuẩn bị dữ liệu báo cáo cho Kiểm toán (Audit) về tính an toàn và bảo mật của các luồng thanh toán điện tử. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý trực tiếp \u0026 Đối tác chiến lược \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Quản lý trực tiếp: Giám đốc Khối Khách hàng Doanh nghiệp.\u003c/p\u003e\u003cp\u003e2. Đối tác nội bộ (Stakeholders): \u003c/p\u003e\u003cp\u003e- Trung tâm Phát triển Sản phẩm: Phối hợp xây dựng các cấu trúc sản phẩm phí và tài trợ thương mại mới.\u003c/p\u003e\u003cp\u003e- Khối Công nghệ \u0026 Vận hành: Đối tác quan trọng nhất để triển khai các kết nối kỹ thuật (API) và xử lý giao dịch hậu cần.\u003c/p\u003e\u003cp\u003e- Khối Chuyển đổi số: Phối hợp trong các dự án nâng cấp trải nghiệm người dùng và nền tảng giao dịch số.\u003c/p\u003e\u003cp\u003e- Đối tác Chiến lược: Tích hợp hệ thống thanh toán của NCB vào nền tảng kinh doanh của đối tác. \u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T5c9,Ngân hàng TMCP Quốc Dân – NCB được thành lập từ năm 1995 theo Giấy phép số 00057/NH–CP ngày 18/09/1995 của Ngân hàng Nhà nước Việt Nam dưới tên gọi Ngân hàng Sông Kiên. Sau đó, từ một ngân hàng nông thôn, NCB đã chuyển đổi quy mô thành ngân hàng đô thị, đổi tên thành Ngân hàng TMCP Nam Việt– Navibank. Đến năm 2014, NCB chính thức được đổi tên thành NH TMCP Quốc Dân – NCB. Trải qua 28 năm hoạt động, NCB đã từng bước khẳng định được vị thế thương hiệu trên thị trường tài chính – tiền tệ Việt Nam.\r\n\r\nTừ đầu năm 2013, nhằm đáp ứng nhu cầu ngày càng tăng của thị trường và duy trì vị trí của mình trong môi trường cạnh tranh khốc liệt, Ngân hàng TMCP Quốc Dân đã bắt đầu tiến hành tái cấu trú
