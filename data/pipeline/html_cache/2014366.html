 tin (biên bản làm việc, email, tin nhắn, nhóm làm việc…) đầy đủ và gửi đúng người.\u003c/p\u003e\u003cp\u003e- Theo dõi và phản hồi các thông tin từ các phòng ban để báo cáo lại cho Tổng Giám đốc: Đảm bảo các thông tin được phản ánh kịp thời.\u003c/p\u003e\u003cp\u003e3. Giám sát và đánh giá kế hoạch công việc:\u003c/p\u003e\u003cp\u003e- Giám sát đánh giá hiệu quả công việc của các phòng ban đơn vị theo các chỉ đạo của Tổng Giám đốc: Đảm bảo các hoạt động diễn ra suôn sẻ và đạt hiệu quả.\u003c/p\u003e\u003cp\u003e- Tổng hợp, đánh giá kế hoạch công việc của các phòng ban đơn vị thông qua báo cáo tuần, tháng, quý, năm và báo cáo đột xuất: Tổng hợp đầy đủ, kịp thời và đưa ra các phân tích, đánh giá để tham mưu cho TGĐ trong các quyết định.\u003c/p\u003e\u003cp\u003e4. Quản lý tài liệu và hồ sơ nội bộ:\u003c/p\u003e\u003cp\u003e+ Quản lý và lưu trữ các tài liệu, hồ sơ nội bộ của công ty một cách khoa học và an toàn.\u003c/p\u003e\u003cp\u003e+ Đảm bảo tài liệu luôn sẵn có và dễ dàng truy cập khi cần thiết.\u003c/p\u003e\u003cp\u003eĐảm bảo tính chính xác và kịp thời.\u003c/p\u003e\u003cp\u003e5. Cập nhật, tóm lược thông tin về các văn bản pháp luật mới, tình hình báo chí về xu hướng thị trường, ngành liên quan đến hoạt động của công ty cho Tổng giám đốc.\u003c/p\u003e\u003cp\u003e- Đảm bảo thông tin được cập nhật chính xác và kịp thời giúp Ban TGĐ có những quyết định phù hợp.\u003c/p\u003e\u003cp\u003e6. Lập các báo cáo công việc gửi lên Tổng Giám đốc.\u003c/p\u003e\u003cp\u003e- Đầy đủ, chính xác và kịp thời.\u003c/p\u003e\u003cp\u003e7. Thực hiện các công việc khác theo yêu cầu của Ban Tổng Giám đốc.\u003c/p\u003e\u003cp\u003e- Chính xác và kịp thời.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T5e5,\u003cp\u003e1. Bằng cấp, Chứng chỉ\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên các chuyên ngành về Luật tại các trường Kinh tế/ Ngoại giao/Ngoại thương/ Thương mại/ Tài chính/ ….\u003c/p\u003e\u003cp\u003e2. Kiến thức cần thiết\u003c/p\u003e\u00
