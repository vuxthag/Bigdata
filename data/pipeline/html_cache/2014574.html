h chọn là đơn vị nộp thuế tiêu biểu.  Hiện nay Chicilon Media là thành viên Ban điều hành của Tổ chức Tiếp thị Thế giới (MMA) và là đơn vị thành viên của Hiệp hội Truyền thông Ngoài trời Quốc tế (WOO), Công ty cũng đóng vai trò là cố vấn cấp cao duy nhất của Hiệp hội Quảng cáo Việt Nam(VAA) và là công ty truyền thông duy nhất áp dụng quy chế về Chống hối lộ Chống tham nhũng (ABAC) do PWC Singapore xây dựng trong hoạt động kinh doanh của công ty.\r\n\r\nTầm nhìn của chúng tôi:\r\n- Xây dựng môi trường tập trung nhân tài trong ngành truyền thông, thông qua việc lựa chọn đội ngũ nhân sự “có tâm, có tài, có tầm” để không ngừng mở rộng quy mô đội nhóm. \r\n- Tạo dựng môi trường doanh nghiệp theo mô hình học hỏi “Học từ mọi người, học mọi lúc, học mọi nơi”. Trong năm 2023, công ty đã tổ chức 35 khoá đào tạo để không ngừng nâng cao năng lực cho đội ngũ nhân viên. \r\n- Thiết lập một nền tảng học tập đổi mới thông qua hợp tác với các trường đại học hàng đầu tại Việt Nam để cung cấp cơ hội học tập và phát triển nghề nghiệp liên tục.\r\n\r\nNếu bạn là người luôn sẵn sàng đón chờ những thử thách và yêu thích sự sáng tạo đổi mới, hãy sẵn sàng gửi CV của mình để cùng gia nhập vào gia đình Chicilon Media. Chúng tôi tin rằng với sự nỗ lực chung tay của tất cả mọi người, Chicilon Media chắc chắn sẽ chinh phục được những tầm cao hơn nữa.\r\n\r\nChicilon Media mong chờ sự gia nhập của Bạn!"])</script><script>self.__next_f.push([1,"40:{\"companyId\":135276,\"jobImageURLs\":\"$41\",\"jobVideoURLs\":\"$42\",\"companyName\":\"Chi Nhánh Công Ty Cổ Phần Công Nghệ Thông Tin Truyền Thông Thiên Hy Long Việt Nam\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/14/11420726.png\",\"companySizeId\":\"\",\"companyProfile\":\"$43\",\"contactName\":\"HR Department\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Tầng 30, tòa nhà Lotte, số 54 phố Liễu Giai, Phường Giảng Võ, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0
