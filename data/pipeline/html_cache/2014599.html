ủa Hiệp hội Truyền thông Ngoài trời Quốc tế (WOO), Công ty cũng đóng vai trò là cố vấn cấp cao duy nhất của Hiệp hội Quảng cáo Việt Nam(VAA) và là công ty truyền thông duy nhất áp dụng quy chế về Chống hối lộ Chống tham nhũng (ABAC) do PWC Singapore xây dựng trong hoạt động kinh doanh của công ty.\r\n\r\nTầm nhìn của chúng tôi:\r\n- Xây dựng môi trường tập trung nhân tài trong ngành truyền thông, thông qua việc lựa chọn đội ngũ nhân sự “có tâm, có tài, có tầm” để không ngừng mở rộng quy mô đội nhóm. \r\n- Tạo dựng môi trường doanh nghiệp theo mô hình học hỏi “Học từ mọi người, học mọi lúc, học mọi nơi”. Trong năm 2023, công ty đã tổ chức 35 khoá đào tạo để không ngừng nâng cao năng lực cho đội ngũ nhân viên. \r\n- Thiết lập một nền tảng học tập đổi mới thông qua hợp tác với các trường đại học hàng đầu tại Việt Nam để cung cấp cơ hội học tập và phát triển nghề nghiệp liên tục.\r\n\r\nNếu bạn là người luôn sẵn sàng đón chờ những thử thách và yêu thích sự sáng tạo đổi mới, hãy sẵn sàng gửi CV của mình để cùng gia nhập vào gia đình Chicilon Media. Chúng tôi tin rằng với sự nỗ lực chung tay của tất cả mọi người, Chicilon Media chắc chắn sẽ chinh phục được những tầm cao hơn nữa.\r\n\r\nChicilon Media mong chờ sự gia nhập của Bạn!"])</script><script>self.__next_f.push([1,"24:T9d7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Là cầu nối giữa Công ty và các khách hàng doanh nghiệp/tổ chức có nhu cầu quảng cáo, đóng vai trò then chốt trong việc mở rộng doanh thu và phát triển quan hệ khách hàng chiến lược;\u003c/p\u003e\u003cp\u003e• Tìm kiếm và phát triển khách hàng tiềm năng: Chủ động tiếp cận doanh nghiệp, tổ chức có nhu cầu truyền thông, quảng cáo;\u003c/p\u003e\u003cp\u003e• Tư vấn và xây dựng giải pháp truyền thông: Hiểu rõ nhu cầu và mục tiêu của khách hàng để đưa ra giải pháp phù hợp, mang lại hiệu quả truyền thông tối ưu;\u003c/p\u003e\u003cp\u003e• Chăm sóc và duy trì mối quan hệ lâu dài: Trực tiếp làm việc, đàm phán và đồng hành cùng khách hàng trong suốt quá trình hợp tác;\u003c/p\u003e\u003cp\u003e• Hoàn thành chỉ tiêu doanh số: Đảm bảo đạt và vượt KPI cá nhân;\u003c/p\u003e\u003cp\u003e• Phối hợp nội bộ: Làm việc chặt chẽ với Phó Giám đốc kinh doanh, Giám đốc Kinh doanh, và các bộ phận liên quan để triển khai hiệu quả các hợp đồng;\u003c/p\u003e\u003cp\u003e• Báo cáo định kỳ: Theo dõi tiến độ, cập nhật kết quả kinh doanh và lập báo cáo gửi quản lý.\u003c/p\u003e\u003cp\u003e• Thời gian: Thứ 2 - Thứ 6 | 8:00 - 17:30 (Nghỉ trưa 11:30 - 13:00)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐãi ngộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Mức lương cạnh tranh, được đề xuất dựa trên năng lực và kinh nghiệm của ứng viên + Trợ cấp gửi xe/ăn trưa + Hoa hồng hấp dẫn + Thưởng hàng tháng cho nhân viên có thành tích xuất sắc; \u003c/p\u003e\u003cp\u003e• Thưởng tháng 13, thưởng Lễ/Tết và các chương trình khen thưởng khác theo kết quả hoạt động;\u003c/p\u003e\u003cp\u003e• Được hưởng các chế độ phúc lợi từ công ty: Tham gia BHXH , Team building hàng năm, du lịch nước ngoài (dành cho nhân viên xuất sắc), khám sức khoẻ tổng quát định kì, bảo hiểm sức khoẻ, hỗ trợ học phí con học mẫu giáo với những nhân viên đạt tiêu chuẩn...;\u003c/p\u003e\u003cp\u003e• Cơ hội phát triển: Lộ trình thăng tiến minh bạch, có cơ hội đề bạt lên vị trí cấp quản lý. Đánh giá hiệu suất định kỳ và xét tăng lương hàng năm; \u003c/p\u003e\u003cp\u003e• Đào tạo và nâng cao năng lực: Được tham gia các khóa đào tạo chuyên môn, kỹ năng mềm. Có cơ hội tham dự các hội thảo trong ngành và các chương trình đào tạo chuyên sâu.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Td3f,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần CNTT Truyền thông Thiên Hy Long Việt Nam (Chicilon Media) được thành lập vào tháng 9/2006, với vốn đăng ký điều lệ 30 triệu USD và tổng vốn đầu tư 70 triệu USD.\r\nCông ty cung cấp cho doanh nghiệp giải pháp truyền thông hiệu quả nhất thông qua hệ thống màn hình TV và Poster
