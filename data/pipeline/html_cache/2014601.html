/script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"22:I[37580,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tcc2,"])</script><script>self.__next_f.push([1,"Domestic manufacturer with European standards\r\n\r\nWe are one of the leading domestic manufacturers of high-quality medicinal products.\r\n\r\nEstablished in 2004, certified in 2007 with WHO-GMP, in 2014 Davipharm reached first 100 registered products and started exporting its medicines to the Philippines and Cambodia. In 2017 Adamed Pharma S.A. acquired the controlling stake in Davipharm to upgrade the production standards, execute technology transfers, and develop export. In 2021 we opened the first certified HP Zone in Vietnam. Later that same year Davipharm had been certified with its first EU-GMP for the manufacturing operations (production and packing) of non-sterile products in capsules, hard shells and tablets. Since 2022 we have been focusing on the technology transfers. In 2023, Adamed acquired the remaining shares in Davipharm, becoming its sole shareholder. This acquisition infused Davipharm with a new vision centered on producing high-quality products adhering to EU-GMP standards and allowing the international expansion.\r\n\r\nThe integration with the Adamed Group plays a pivotal role in the company transformation. The harmonization of operational processes, sharing resources, learning from the best practices and following the corporate values, supports our efforts on the way to business excellence.\r\n\r\nOur strategic goals include reaching a top position in the domestic market and becoming number 1 pharmaceutical exporting company in Vietnam, focusing on R\u0026D excellence and new products launches, contract manufacturing, and close cooperation with academia to support products development and expand talent pools. Implementing ESG standards will ensure Davipharm’s position as a reliable and desired partner in the global supply chain.\r\n\r\nEmblematic of the foreign investment\r\nWhen in 2017 Adamed Pharma S.A. acquired 70% of shares in Davipharm, becoming the biggest direct Polish investor in Vietnam, it set very ambitious goals. With US$60 million investment to date, out of which over US$10 million has been spent on the upgrade of manufacturing processes and products quality, the company committed to contribute to the local economy not only by paying taxes and creating jobs, but also by providing high-quality medicines at affordable prices to local patients, thus supporting the Ministry of Health of Vietnam to optimize the spending on drugs.\r\n\r\nHP Zone and EU-GMP\r\nDavipharm’s High Potency Drugs (HP) Zone for production of cytotoxic/cytostatic oral solids was the first certified by DAV area in Vietnam for manufacturing, among other, oncology drugs in hard shell capsules, tablets, and coated tablets.\r\n\r\nDavipharm’s portfolio includes 28 HP drugs, including medicines to treat breast cancer, leukemia, pancreas, colorectal, stomach, cervix, prostate and lung cancer and glioblastoma.\r\n\r\nIn 2024, Davipharm got certified with EU-GMP for its HP Zone. This is the first HP Zone EU-GMP certification in Vietnam and in the region. This milestone highlights Davipharm’s pioneering role in the Vietnamese pharmaceutical industry and its unwavering commitment to maintaining the highest production standards.\r\n\r\nAdditionally, the company was re-certified with EU-GMP for non-sterile products such as hard capsules and tablets."])</script><script>self.__next_f.push([1,"24:T13c6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Tư vấn và soạn thảo hợp đồng:\u003c/p\u003e\u003cp\u003eTư vấn pháp lý, soạn thảo, rà soát và đàm phán các hợp đồng thương mại phục vụ hoạt động sản xuất – kinh doanh của Công ty, bao gồm nhưng không giới hạn:\u003c/p\u003e\u003cp\u003e\ta.\tHợp đồng mua hàng hóa và dịch vụ\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng mua bán hàng hóa trong nước và nhập khẩu nguyên vật liệu, máy móc, thiết bị phục vụ hoạt động sản xuất kinh doanh\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng dịch vụ như: thẩm định, bảo trì, phần mềm, xây dựng, dịch vụ môi trường, phòng cháy chữa cháy\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng kiểm nghiệm\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng bảo hiểm (cháy nổ, sức khỏe, xe)\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng dịch vụ quảng cáo, du lịch\u003c/p\u003e\u003cp\u003e\tb.\tHợp đồng bán hàng và thương mại\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng phân phối (bao gồm phân phối độc quyền)\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng xuất khẩu\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng cấp phép / license-out\u003c/p\u003e\u003cp\u003e\tc.\tHợp đồng liên quan đến nghiên cứu – phát triển\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng hợp tác nghiên cứu phát triển sản phẩm\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng chuyển giao công nghệ\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng gia công\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng tài trợ\u003c/p\u003e\u003cp\u003e\td.\tHợp đồng liên quan đến lao động\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng lao động\u003c/p\u003e\u003cp\u003e\t\t•\tThỏa thuận đào tạo\u003c/p\u003e\u003cp\u003e\t\t•\tHợp đồng thực tập sinh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Quản lý giấy phép và tuân thủ pháp lý:\u003c/p\u003e\u003cp\u003eQuản lý các giấy phép và nghĩa vụ tuân thủ pháp lý của doanh nghiệp (ngoại trừ các giấy phép thuộc hệ thống GMP), bao gồm:\u003c/p\u003e\u003cp\u003e\t• Tư vấn pháp lý liên quan đến điều kiện kinh doanh, phòng cháy chữa cháy, môi trường và các quy định pháp luật liên quan đến hoạt động của Công ty\u003c/p\u003e\u003cp\u003e\t•\tPhối hợp với công ty luật bên ngoài để hoàn thiện và cập nhật hồ sơ pháp lý của doanh nghiệp, bao gồm:\u003c/p\u003e\u003cp\u003e\t\t• Giấy chứng nhận đăng ký doanh nghiệp\u003c/p\u003e\u003cp\u003e\t\t• Chi nhánh và văn phòng đại diện\u003c/p\u003e\u003cp\u003e\t\t• Các thủ tục pháp lý khác theo yêu cầu của pháp luật\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Tư vấn pháp lý nội bộ:\u003c/p\u003e\u003cp\u003e• Cung cấp tư vấn pháp lý cho các phòng ban trong Công ty liên quan đến các vấn đề pháp lý phát sinh từ hoạt động vận hành và kinh doanh hàng ngày, bao gồm:\u003c/p\u003e\u003cp\u003e\t• Hoạt động sản xuất\u003c/p\u003e\u003cp\u003e\t• Hoạt động xuất nhập khẩu\u003c/p\u003e\u003cp\u003e\t• Hoạt động bán hàng và thương mại\u003c/p\u003e\u003cp\u003e\t• Các vấn đề pháp lý phát sinh khác trong quá trình vận hành\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e**********************************\u003c/p\u003e\u003cp\u003e1. Contract Advisory \u0026 Drafting\u003c/p\u003e\u003cp\u003eProvide legal advice and draft, review, and negotiate commercial contracts supporting the Company’s manufacturing and business operations, including but not limited to:\u003
