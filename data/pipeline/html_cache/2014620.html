/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tbc4,"])</script><script>self.__next_f.push([1,"Xuất phát với ước mơ xây dựng một doanh nghiệp Việt, có thể cung cấp, phát triển dịch vụ logistics toàn cầu, tin cậy dựa trên chất lượng dịch vụ, con người và công nghệ, cùng niềm đam mê với nghề logistics, những nhà sáng lập đã quy tụ và cùng khởi đầu ước mơ giản dị, xây dựng một công ty logistics chuyên nghiệp, tin cậy, khác biệt, chất lượng, tận tâm, có trách nhiệm với khách hàng. Bee Logistics đã được ra đời vào ngày 01 tháng 10 năm 2004 với 3 nhân viên đầu tiên tại văn phòng thành phố Hồ Chí Minh. Trải qua hơn 19 năm phát triển và trưởng thành, Bee Logistics đã có sự phát triển vượt bậc với lực lượng nhân sự trên toàn hệ thống là hơn 1,000 người với các văn phòng tại Việt Nam (35 văn phòng), Cambodia, Myanmar và các công ty liên doanh liên kết, văn phòng đại diện tại Thái Lan, Ấn Độ, Đài Loan, Hàn Quốc, Trung Quốc, Malaysia ….và hệ thống đối tác chiến lược trên toàn cầu.\r\nBắt đầu với dịch vụ gom hàng đường biển, đến nay Bee Logistics đã cung cấp hầu hết các dịch vụ logistics tích hợp, hiện đại từ khai thuê hải quan, vận chuyển hàng không, hàng container, hàng rời, vận tải đa phương thức, đường sắt, vận tải xuyên biên giới, dịch vụ door to door, hàng siêu trường, siêu trọng các dịch vụ giá trị gia tăng như đóng gói, lưu trữ… Dịch vụ của Bee Logistics cung cấp được cá biệt hóa để phù hợp với nhu cầu của từng khách hàng, đem lại lợi ích, hiệu quả và tính tin cậy cho chuỗi cung ứng, gia tăng tính cạnh tranh và tạo ra giá trị cho khách hàng.\r\nBee Logistics là một trong số ít doanh nghiệp tại Việt Nam có đầy đủ các giấy phép từ khai thuê hải quan, vận tải đa phương thức đến vận tải đơn được chấp thuận bởi Cục hàng hải liên bang Mỹ (FMC).\r\nMỗi thành viên của Bee Logistics đều trân trọng từng lô hàng mà khách hàng đã tin cậy gửi trao và luôn coi vấn đề của khách hàng chính là vấn đề của bản thân Công ty để không ngừng nỗ lực và đưa ra các giải pháp phù hợp, hợp lý, tư vấn cho khách hàng nhằm tối ưu hóa hiệu quả của chuỗi giá trị. Bee Logistics không chỉ cung cấp các dịch vụ logistics toàn cầu đến và đi từ các nơi có văn phòng mà còn cung cấp dịch vụ từ các nước thứ ba đến các nước khác dựa trên hệ thống đối tác toàn cầu tin cậy tại trên 200 nước và vùng lãnh thổ.\r\nToàn bộ dịch vụ của Bee Logistics được bảo hiểm bởi các công ty bảo hiểm uy tín như QBE, Bảo Minh, Bảo Việt, AON, BIC."])</script><script>self.__next_f.push([1,"24:Tbc2,"])</script><script>self.__next_f.push([1,"Xuất phát với ước mơ xây dựng một doanh nghiệp Việt, có thể cung cấp, phát triển dịch vụ logistics toàn cầu, tin cậy dựa trên chất lượng dịch vụ, con người và công nghệ, cùng niềm đam mê với nghề logistics, những nhà sáng lập đã quy tụ và cùng khởi đầu ước mơ giản dị, xây dựng một công ty logistics chuyên nghiệp, tin cậy, khác biệt, chất lượng, tận tâm, có trách nhiệm với khách hàng. Bee Logistics đã được ra đời vào ngày 01 tháng 10 năm 2004 với 3 nhân viên đầu tiên tại văn phòng thành phố Hồ Chí Minh. Trải qua hơn 17 năm phát triển và trưởng thành, Bee Logistics đã có sự phát triển vượt bậc với lực lượng nhân sự trên toàn hệ thống là hơn 900 người với các văn phòng tại Việt Nam (35 văn phòng), Cambodia, Myanmar và các công ty liên doanh liên kết, văn phòng đại diện tại Thái Lan, Ấn Độ, Đài Loan, Hàn Quốc, Trung Quốc, Malaysia ….và hệ thống đối tác chiến lược trên toàn cầu.\r\nBắt đầu với dịch vụ gom hàng đường biển, đến nay Bee Logistics đã cung cấp hầu hết các dịch vụ logistics tích hợp, hiện đại từ khai thuê hải quan, v
