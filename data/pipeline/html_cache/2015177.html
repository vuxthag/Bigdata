ragrances to perfume lives and memories, and develop innovative beauty and wellbeing solutions that make people look and feel good all over the world. Nature is both our responsibility and our most precious muse. We are just as committed to sustainability as we are to creating innovative products that satisfy consumer needs and anticipate their desires. With a collaborative approach that flavours co-creation, we have built a diverse portfolio across personal care, fabric care, hygiene, home care, fine fragrances, and beauty, reflecting our multidisciplinary expertise. This is Givaudan. Human by nature.\r\n\r\nLearn more at https://www.givaudan.com/fragrance-beauty."])</script><script>self.__next_f.push([1,"24:T1160,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJoin us and celebrate the beauty of human experience. Create for happier, healthier lives, with love for nature. Together, with kindness and humility, we deliver food innovations, craft inspired fragrances and develop beauty and wellbeing solutions that make people look and feel good.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eThere’s much to learn and many to learn from, with more than 16,000 employees around the world to explore ideas and ambitions with. Dive into varied, flexible, and stimulating environments. Meet empowered professionals to partner with, befriend, and stretch your skills alongside. \u003c/p\u003e\u003cp\u003eEvery day, your energy, your creativity, and your determination will shape our future, making a positive difference on billions of people. Every essence of you enriches our world. We are Givaudan. Human by nature.  \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSite Controller – Your future Position?\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eAs a Site Controller, you will be the contact point for direct site controlling activities for all functions present on site. Actively support the business controlling network by supplying local information when required. Provide business support to the local operations Manager to ensure efficiency and compliance.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCore Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eReporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tProvide analyses and interpretations of financial information to various functional management and stakeholders.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSite Support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tProvide recommendations on inventory management\u003c/p\u003e\u003cp\u003e•\tManage and coordinate the annual budget process for the site\u003c/p\u003e\u003cp\u003e•\tAttend and actively participate in site operations meetings to stay informed of site activities and provide finance support/ action where required\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCost Analysis\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tManage annual and periodic requirements of costing activities and analysis of COGS\u003c/p\u003e\u003cp\u003e•\tProvide detailed product costing analysis and support management in the evaluation of product costs\u003c/p\u003e\u003cp\u003e•\tAnalyse process order and product level variances on a monthly basis and work with the operations team to resolve and correct costing issues\u003c/p\u003e\u003cp\u003e•\tReview COGS summary with management\u003c/p\u003e\u003cp\u003e•\tCoordinate changes in master templates with local operations\u003c/p\u003e\u003cp\u003e•\tProvide input into recipe templates from a costing perspective\u003c/p\u003e\u003cp\u003e•\tAnalyse and explain local product margins\u003c/p\u003e\u003cp\u003e•\tRespond in a timely manner to pricing/commercial controlling requests\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFinancial Performance Analysis\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAnalyze and coordinate activities associated with operations performance on site\u003c/p\u003e\u003cp\u003e•\tContribute as an active member in site projects and initiatives that drive process/cost improvements\u003c/p\u003e\u003cp\u003e•\tSupport site management in the development and analysis of business plans, budgets, forecasts, cost savings opportunities, etc.\u003c/p\u003e\u003cp\u003e•\tPerform adhoc and proactive analysis of the monthly KPI’s and provide site and operational management with interpretive and predictive information for decision making\u003c/p\u003e\u003cp\u003e•\tParticipate in forecasting and mid-to long term planning for the factory\u003c/p\u003e\u003cp\u003e•\tSupport management in the strategic decision making for the site\u003c/p\u003e\u003cp\u003e•\tPerform regular cost center and investment reviews and follow-ups. Drives resolutions of variance issues\u003c/p\u003e\u003cp\u003e•\tReview SOD within the ERP system as required and manage any change requirements at a local level\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFinancial Analysis \u0026 Reporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tSupport requirements associated with the month-end financial close\u003c/p\u003e\u003cp\u003e•\tReview the analysis of the site P\u0026L and identifies variances vs. budget, last year and outlook.\u003c/p\u003e\u003cp\u003e•\tProactively drive and recommend corrective actions\u003c/p\u003e\u003cp\u003e•\tFinancial reporting as required\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInvestment Process\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tWork closely with site engineers, local management and regional controllers’ from the stage of evaluating capital proposals up until value realization\u003c/p
