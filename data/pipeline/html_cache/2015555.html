án hàng, cơ chế hoa hồng, hợp đồng mẫu\u003c/p\u003e\u003cp\u003e-\tChủ trì và phối hợp với các bộ phận liên quan để xây dựng và đề xuất: chính sách bán hàng, giá bán, phương thức thanh toán, chính sách ưu đãi.  \u003c/p\u003e\u003cp\u003e-\tTrực tiếp tham gia đàm phán, trao đổi dự thảo biên bản ghi nhớ, hơp tác với các khách hàng tiềm năng để thúc đẩy việc hợp tác kinh doanh, xúc tiến đầu tư. \u003c/p\u003e\u003cp\u003e-\tTư vấn cho khách hàng về các thủ tục đầu tư, xây dựng và hỗ trợ giải quyết các khó khăn, vướng mắc của khách hàng khi sử dụng sản phẩm dịch vụ của công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tPhát triển thị trường và khách hàng - 20%\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐề xuất các chương trình quảng cáo, xúc tiến đầu tư nhằm quảng bá sản phẩm và hình ảnh công ty tới khách hàng và đối tác mục tiêu. \u003c/p\u003e\u003cp\u003e-\tĐề xuất các kênh hợp tác nhằm thúc đẩy quá trình bán hàng, phân phối. \u003c/p\u003e\u003cp\u003e-\tLập kế hoạch kinh doanh, tiếp thị theo tháng, quý, năm và thực hiện báo cáo theo định kỳ cho Ban lãnh đạo. \u003c/p\u003e\u003cp\u003e-\tTìm kiếm danh sách các đại lý chuyên về cho thuê KCN phù hợp với phân khúc sản phẩm của công ty và các đối tác/khách hàng có nhu cầu thuê KCN.\u003c/p\u003e\u003cp\u003e-\tKiểm tra bộ hồ sơ Đại lý so sánh với các tiêu chí lựa chọn Đại lý.\u003c/p\u003e\u003cp\u003e-\tHỗ trợ ký kết hợp đồng hợp tác giữa Chủ Đầu Tư với các đại lý phân phối\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tQuản lý hệ thống kinh doanh - 20%\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tXây dựng slide thông tin giới thiệu về tiềm năng thị trường/ tiềm năng dự án\u003c/p\u003e\u003cp\u003e-\tTổ chức đào tạo sản phẩm trong hệ thống phân phối, training sản phẩm\u003c/p\u003e\u003cp\u003e-\tTheo dõi và đảm bảo việc thực hiện nghiêm túc của đại lý. Bám sát theo kế hoạch hành động của Chủ Đầu Tư\u003c/p\u003e\u003cp\u003e-\tHỗ trợ, giải đáp các vướng mắc/khó khăn của đại lý/ Sales trong quá trình
