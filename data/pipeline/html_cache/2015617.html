><script>self.__next_f.push([1,"\u003cp\u003e1. Hỗ trợ tái tục hợp đồng và cải thiện tỷ lệ duy trì hợp đồng:  \u003c/p\u003e\u003cp\u003e- Tham gia xây dựng kế hoạch hành động để cải thiện Tỷ lệ duy trì hợp đồng (K2/K3/K4…) theo từng giai đoạn và từng thời kỳ cho chi nhánh cùng với cấp quản lý trực tiếp.  \u003c/p\u003e\u003cp\u003e- Phối hợp cùng các cán bộ BIDV triển khai các hoạt động nhằm duy trì, cải thiện và gia tăng tỷ lệ duy trì hợp đồng của chi nhánh:  \u003c/p\u003e\u003cp\u003e• Chủ động lập danh sách Khách hàng cần chăm sóc hàng tháng, thực hiện gọi điện, liên lạc với khách khách hàng để nhắc phí. Nếu cần, có thể thực hiện tư vấn lại tại chi nhánh hoặc ngoài chi nhánh để khách hàng nắm được quyền lợi của mình khi tiếp tục duy trì hiệu lực hợp đồng BHNT.  \u003c/p\u003e\u003cp\u003e• Hướng dẫn khách hàng các quy trình và đóng phí tái tục; khôi phục hiệu lực hợp đồng bảo hiểm, cung cấp/thu thập biểu mẫu, hướng dẫn khách hàng điền biểu mẫu, chuyển thư/thông tin…  \u003c/p\u003e\u003cp\u003e• Phối hợp với chi nhánh được giao phụ trách để thực hiện thu phí tái tục từ các khách hàng của chi nhánh.  \u003c/p\u003e\u003cp\u003e• Tổ chức các chương trình/sự kiện để tư vấn lại và tri ân khách hàng cũ theo sự phân công của cấp trên  \u003c/p\u003e\u003cp\u003e2. Chăm sóc khách hàng sau bán:  \u003c/p\u003e\u003cp\u003e- Xây dựng mối quan hệ với Ban lãnh đạo và cán bộ BIDV nhằm tạo dựng cơ sở, nền tảng cho việc triển khai hoạt động kinh doanh, hỗ trợ khách hàng sau bán liên quan đến dịch vụ và sản phẩm của BML.  \u003c/p\u003e\u003cp\u003e- Phối hợp cùng các ICM tại Chi nhánh thực hiện kết nối và tư vấn lại cho Khách hàng sau ACK, đảm bảo Khách hàng nắm được các điều cần lưu ý của Hợp đồng.  \u003c/p\u003e\u003cp\u003e- Thực hiện các hoạt động chăm sóc khách hàng khác như: Thu xếp thủ tục giải quyết bồi thường bảo hiểm với khách hàng; Cung cấp thông tin liên quan đến hợp đồng cho khách hàng; Hướng dẫn khách hàng điều chỉnh thông tin hợp đồng bảo hiểm…  \u003c/p\u003
