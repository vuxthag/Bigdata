__next_f.push([1,"\u003cp\u003eI. Mô tả công việc\u003c/p\u003e\u003cp\u003e1. Thực hiện giám sát thi công xây dựng hạng mục cơ điện\u003c/p\u003e\u003cp\u003e• Lập kế hoạch công việc (hạng mục cơ điện) theo tuần, tháng; thực hiện công tác báo cáo theo quy định của Tập đoàn và theo quy định của cấp quản lý trực tiếp.\u003c/p\u003e\u003cp\u003e• Thực hiện kiểm tra kế hoạch chi tiết tiến độ thi công lắp đặt các hệ thống M\u0026E của công trình do nhà thầu lập trên cơ sở tiến độ tổng/các mốc chính/Hợp đồng đã được phê duyệt.\u003c/p\u003e\u003cp\u003e• Tham gia thực hiện giám sát an toàn lao động, vệ sinh môi trường, phòng cháy chữa cháy.\u003c/p\u003e\u003cp\u003e• Theo dõi và kiểm tra tiến độ chi tiết các hạng mục công việc và điều phối công việc của nhà thầu được giao nhiệm vụ phụ trách.\u003c/p\u003e\u003cp\u003e• Kiểm soát chất lượng, khối lượng thực hiện các hạng mục cơ điện của nhà thầu thi công.\u003c/p\u003e\u003cp\u003e• Tham gia nghiệm thu trang thiết bị, vật liệu cơ điện đưa vào lắp đặt cho công trình, đảm bảo tiêu chuẩn kỹ thuật theo thiết kế.\u003c/p\u003e\u003cp\u003e• Phát hiện, cảnh báo, nhắc nhở hoặc đề xuất đình chỉ thi công khi phát hiện vi phạm quy trình, quy phạm kỹ thuật, chất lượng, an toàn công trình theo thiết kế và biện pháp đã duyệt.\u003c/p\u003e\u003cp\u003e• Kiểm tra, đối chiếu tiến độ thực tế với báo cáo tiến độ định kỳ, phối hợp với các ban chuyên môn kiểm soát tiến độ điều chỉnh.\u003c/p\u003e\u003cp\u003e2. Thực hiện hồ sơ quản lý chất lượng hạng mục cơ điện\u003c/p\u003e\u003cp\u003e• Tham gia thực hiện nghiệm thu các công việc tại hiện trường liên quan đến hạng mục cơ điện trong suốt quá trình thi công công trình.\u003c/p\u003e\u003cp\u003e• Kiểm tra, tính toán khối lượng, hạng mục đã được nghiệm thu đạt tiêu chuẩn chất lượng hàng tháng của các nhà thầu cơ điện.\u003c/p\u003e\u003cp\u003e• Thực hiện các thủ tục liên quan đến bàn giao công trình.\u003c/p\u003e\u003cp\u003e• Kiểm soát tiến độ hoàn thiện các hồ sơ chất lượng, bản vẽ hoàn công trong thời hạn quy định và đề xuất phương án xử lý các vướng mắc trong quá trình kiểm tra hồ sơ.\u003c/p\u003e\u003cp\u003e• Quản lý lưu trữ hồ sơ quản lý chất lượng các hạng mục cơ điện tại Dự án.\u003c/p\u003e\u003cp\u003e3. Tổng hợp, báo cáo theo định kỳ hoặc đột xuất. Tham gia các cuộc họp giao ban với nhà thầu.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T834,"])</script><script>self.__next_f.push([1,"Tập đoàn Nam Cường Hà Nội đã trải qua hơn 30 năm hình thành và phát triển, với quy mô ban đầu là Tổ hợp dịch vụ Vận tải vật tư nông nghiệp và xây dựng Xuân Thủy vào năm 1984, ngày nay thương hiệu Tập đoàn Nam Cường Hà Nội đã phát triển và lớn mạnh không ngừng, đặc biệt là trên các lĩnh vực chính là xây dựng cơ sở hạ tầng, xây dựng khu đô thị, vận tải và du lịch.\r\nNgay từ những ngày đầu thành lập, hiện nay là Tập đoàn Nam Cường Hà Nội đã xác định phương châm kinh doanh lấy chữ tín làm tiêu chí phát triển. Các công trình mà Tập đoàn thực hiện đã góp phần thay da, đổi thịt bộ mặt đô thị tại các địa phương. Thương hiệu Tập đoàn Nam Cường Hà Nội từng ngày khẳng định vị thế hàng đầu trong ngành xây dựng hạ tầng và khu đô thị. Xác định giá trị cộng đồng, xã hội, môi trường tạo nên các sản phẩm bất động sản và khu đô thị hướng tới phục vụ không chỉ tầng lớp trung lưu và khá giả mà còn phục vụ cho tầng lớp có thu nhập thấp, để góp phần thực hiện chủ trương của Đảng và Nhà nước là mọi tầng lớp dân cư có điều kiện sử dụng và sở hữu nhà ở.\r\nNam Cường Hà Nội đang nỗ lực không ngừng đầu tư về trang thiết bị, nguồn nhân lực có đạo đức, chuyên môn và tâm huyết nhằm nâng cao chất lượng sản phẩm, dịch vụ cho khách hàng, Nam Cường Hà Nội đã nhận được sự tín nhiệm của nhiều khách hàng.\r\nTrong xu thế hội nhập của nền kinh tế, Tập đoàn Nam Cường Hà Nội luôn mong muốn được hợp tác, liên doanh, liên kết với các đối tác trong và ngoài nước để được cống hiến nhiều hơn nữa trong quá trình Công nghiệp hóa
