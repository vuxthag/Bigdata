)</script><script>self.__next_f.push([1,"24:T11e0,"])</script><script>self.__next_f.push([1,"\u003cp\u003eI. MỤC ĐÍCH CÔNG VIỆC:\u003c/p\u003e\u003cp\u003e- Đảm bảo công tác thiết kế phù hợp với các quy định của pháp luật, chiến lược phát triển và phục vụ tốt cho hoạt động sản xuất kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eII. CHỨC NĂNG VÀ NHIỆM VỤ:\u003c/p\u003e\u003cp\u003e1. Tham mưu giải pháp kỹ thuật\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban lãnh đạo thực hiện, ứng dụng các giải pháp kỹ thuật trong công tác thiết kế theo bộ môn quy hoạch, cây xanh cảnh quan, kiến trúc nội thất (từ ý tưởng không gian, vật liệu, trang thiết bị…) theo QCVN, TCVN, PCCC hiện hành đáp ứng theo tiêu chuẩn thương hiệu, quản lý khách sạn, phát triển dự án, bán hàng. Đề xuất các giải pháp kỹ thuật tương ứng.\u003c/p\u003e\u003cp\u003e2. Quản lý thiết kế quy hoạch, cảnh quan dự án\u003c/p\u003e\u003cp\u003e- Tổ chức lập - tổng hợp nhiệm vụ quy hoạch, nhiệm vụ thiết kế cho các dự án, các hạng mục công trình thuộc dự án được giao.\u003c/p\u003e\u003cp\u003e- Quản lý việc lập và điều chỉnh các đồ án quy hoạch xây dựng của dự án được giao theo nhiệm vụ/nhiệm vụ điều chỉnh Quy hoạch được duyệt và các Quy chuẩn, tiêu chuẩn, các văn bản có liên quan.\u003c/p\u003e\u003cp\u003e- Thỏa thuận phương án quy hoạch – thiết kế và trình Ban lãnh đạo Công ty phê duyệt.\u003c/p\u003e\u003cp\u003e- Phối hợp trình bày, bảo vệ hoặc chỉnh sửa hồ sơ trong quá trình trình cơ quan quản lý Nhà nước thẩm định/phê duyệt Nhiệm vụ quy hoạch/ Đồ án quy hoạch.\u003c/p\u003e\u003cp\u003e3. Quản lý, tổ chức điều phối các giai đoạn thiết kế quy hoạch, thiết kế xây dựng, cây xanh cảnh quan, kiến trúc nội thất của dự án\u003c/p\u003e\u003cp\u003e- Quản lý công tác khảo sát (địa hình, địa chất, thủy văn…), báo cáo đánh giá tác động môi trường, cấp giấy phép môi trường, các công tác lập thiết kế (Giai đoạn thiết kế ý tưởng; Giai đoạn thiết kế cơ sở; Giai đoạn thiết kế bản vẽ thi công,...).\u003c/p\u003e\u003cp\u003e- Trực tiếp làm việc với công ty tư vấn thiết kế trong và ngoài nước.\u003c/p\u003e\u003cp\u003e- Tổ chức lập danh mục, tiêu chuẩn kỹ thuật thiết bị, vật tư, vật liệu xây dựng, hoàn thiện, nội thất, định hướng các chủng loại cây xanh cho các khu đô thị và công trình tại các dự án.\u003c/p\u003e\u003cp\u003e- Phối hợp các đơn vị phòng ban như Ban KHĐT, đơn vị phụ trách Kinh doanh, các bộ môn để lập hồ sơ pháp lý thiết kế theo từng giai đoạn, bao gồm: Quy hoạch, TKCS, TKKT, TKBVTC.\u003c/p\u003e\u003cp\u003e- Phối hợp trình bày, bảo vệ hoặc chỉnh sửa hồ sơ trong quá trình trình cơ quan quản lý Nhà nước thẩm định/phê duyệt hồ sơ thiết kế các bộ môn.\u003c/p\u003e\u003cp\u003e- Tổ chức công tác thẩm định các giai đoạn TKCS đối với công trình cấp III trở xuống, TK triển khai sau TKCS đối với công trình cấp II trở lên.\u003c/p\u003e\u003cp\u003e- Nghiệm thu, thanh quyết toán sản phẩm thiết kế của nhà thầu theo từng giai đoạn.\u003c/p\u003e\u003cp\u003e4. Tham gia công tác đánh giá lựa chọn, làm việc với nhà thầu\u003c/p\u003e\u003cp\u003e- Lập chỉ dẫn kỹ thuật trong hồ mời thầu (hồ sơ yêu cầu), nhiệm vụ thiết kế đối với nhà thầu, nhà cung cấp các gói thầu liên quan đến tư vấn thiết kế/quy hoạch (Quy hoạch, Tư vấn đánh giá tác động, cấp giấy phép môi trường, Tư vấn thiết kế kỹ thuật các bộ môn,...).\u003c/p\u003e\u003cp\u003e- Tham gia đánh giá kỹ thuật các hồ sơ dự thầu tư vấn thiết kế, khảo sát.\u003c/p\u003e\u003cp\u003e5. Quản lý, điều phối công việc trong nhóm thuộc phạm vi quản lý\u003c/p\u003e\u003cp\u003e- Xây dựng kế hoạch, đào tạo nghiệp vụ, điều phối và phân công công việc CBNV thuộc phụ trách.\u003c/p\u003e\u003cp\u003e- Lập kế hoạch, kiểm soát, báo cáo kết quả thực hiện công việc của phòng, chịu trách nhiệm cho các công việc liên quan đến chuyên môn.\u003c/p\u003e\u003cp\u003e- Đầu mối chính để điều phối với các bộ môn khác, đảm bảo công việc đúng tiến độ và chất lượng theo chỉ đạo được giao.\u003c/p\u003e\u003cp\u003e- Xây dựng Quy định, Quy trình nghiệp vụ, đề xuất cải tiến thực hiện các công việc thuộc lĩnh vực quản lý.\u003c/p\u003e\u003cp\u003e- Các công việc khác theo phân công.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T9b1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Tốt nghiệp Đại học/Cao học chuyên ngành quy hoạch hoặc kiến trúc/kiến trúc cảnh quan/thiết kế đô thị/thiết kế nội thất\u003c/p\u003e\u003cp\u003e• Có tối thiểu 07 năm làm công tác thiết kế, kiểm soát thiết kế tại các đơn vị Chủ đầu tư, Tư vấn thiết kế\u003c/p\u003e\u003cp\u003e• Đã thực hiện ít nhất 03 dự án Khách sạn, Du lịch nghỉ dưỡng có quy mô tương tự dưới vai trò quản lý thiết kế, thiết kế nội thất\u003c/p\u003e\u003cp\u003e  - Đọc, dịch được các tài liệu bằng Tiếng anh, giao tiếp được bằng tiếng anh là một lợi thế\u003c/p\u003e\u003cp\u003e  - Có khả năng trao đổi công việc với các nhà vận hành, tư vấn nước ngoài, tổng thầu nước ngoài\u003c/p\u003e\u003cp\u003e  - Kiến thức chung Thị trường bất động sản, xu thế đầu tư xây dựng\u003c/p\u003e\u003cp\u003e  - Am hiểu sâu về quy hoạch hoặc kiến trúc, nội thất công trình (đặc biệt khu đô thi, reesort, nhà cao tầng,...) có giấy phép hành nghề tư vấn chuyên ngành;\u003c/p\u003e\u003cp\u003e  - Có kiến thức chuyên môn sâu về nhu cầu, thị hiếu thị trường về sản phẩm bất động sản.\u003c/p\u003e\u003cp\u003e  - Nắm vững các quy định pháp luật xây dựng, tiêu chuẩn, Quy chuẩn xây dựng và các quy định liên quan.\u003c/p\u003e\u003cp\u003eKỹ năng Quản lý thiết kế\u003c/p\u003e\u003cp\u003e• Khả năng thẩm định hồ sơ thiết kế, và phản biện tài liệu kỹ thuật, quy hoạch\u003c/p\u003e\u003cp\u003e• Kỹ năng Thiết kế\u003c/p\u003e\u003cp\u003e• Kỹ năng tổ chức, quản lý công việc\u003c/p\u003e\u003cp\u003e• Kỹ năng đào tạo, dẫn dắt\u003c/p\u003e\u003cp\u003e• Kỹ năng thuyết trình\u003c/p\u003e\u003cp\u003e• Kỹ năng giao tiếp\u003c/p\u003e\u003cp\u003e• Kỹ năng đàm phán\u003c/p\u003e\u003cp\u003e• n nữa trong quá trình Công nghiệp hóa, hiện đại hóa đất nước.\r\nWebsite: https://namcuong.com.vn/"])</script><script>self.__next_f.push([1,"2a:T11e0,"])</script><script>self.__next_f.push([1,"\u003cp\u003eI. MỤC ĐÍCH CÔNG VIỆC:\u003c/p\u003e\u003cp\u003e- Đảm bảo công tác thiết kế phù hợp với các quy định của pháp luật, chiến lược phát triển và phục vụ tốt cho hoạt động sản xuất kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eII. CHỨC NĂNG VÀ NHIỆM VỤ:\u003c/p\u003e\u003cp\u003e1. Tham mưu giải pháp kỹ thuật\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban lãnh đạo thực hiện, ứng dụng các giải pháp kỹ thuật trong công tác thiết kế theo bộ môn quy hoạch, cây xanh cảnh quan, kiến trúc nội thất (từ ý tưởng không gian, vật liệu, trang thiết bị…) theo QCVN, TCVN, PCCC hiện hành đáp ứng theo tiêu chuẩn thương hiệu, quản lý khách sạn, phát triển dự án, bán hàng. Đề xuất các giải pháp kỹ thuật tương ứng.\u003c/p\u003e\u003cp\u003e2. Quản lý thiết kế quy hoạch, cảnh quan dự án\u003c/p\u003e\u003cp\u003e- Tổ chức lập - tổng hợp nhiệm vụ quy hoạch, nhiệm vụ thiết kế cho các dự án, các hạng mục công trình thuộc dự án được giao.\u003c/p\u003e\u003cp\u003e- Quản lý việc lập và điều chỉnh các đồ án quy hoạch xây dựng của dự án được giao theo nhiệm vụ/nhiệm vụ điều chỉnh Quy hoạch được duyệt và các Quy chuẩn, tiêu chuẩn, các văn bản có liên quan.\u003c/p\u003e\u003cp\u003e- Thỏa thuận phương án quy hoạch – thiết kế và trình Ban lãnh đạo Công ty phê duyệt.\u003c/p\u003e\u003cp\u003e- Phối hợp trình bày, bảo vệ hoặc chỉnh sửa hồ sơ trong quá trình trình cơ quan quản lý Nhà nước thẩm định/phê duyệt Nhiệm vụ quy hoạch/ Đồ án quy hoạch.\u003c/p\u003e\u003cp\u003e3. Quản lý, tổ chức điều phối các giai đoạn thiết kế quy hoạch, thiết kế xây dựng, cây xanh cảnh quan, kiến trúc nội thất của dự án\u003c/p\u003e\u003cp\u003e- Quản lý công tác khảo sát (địa hình, địa chất, thủy văn…), báo cáo đánh giá tác động môi trường, cấp giấy phép môi trường, các công tác lập thiết kế (Giai đoạn thiết kế ý tưởng; Giai đoạn thiết kế cơ sở; Giai đoạn thiết kế bản vẽ thi công,...).\u003c/p\u003e\u003cp\u003e- Trực tiếp làm việc với công ty tư vấn thiết kế trong và ngoài nước.\u003c/p\u003e\u003cp\u003e- Tổ chức lập danh mục, tiêu chuẩn kỹ thuật thiết bị, vật tư, vật liệu xây dựng, hoàn thiện, nội thất, định hướng các chủng loại cây xanh cho các khu đô thị và công trình tại các dự án.\u003c/p\u003e\u003cp\u003e- Phối hợp các đơn vị phòng ban như Ban KHĐT, đơn vị phụ trách Kinh doanh, các bộ môn để lập hồ sơ pháp lý thiết kế theo từng giai đoạn, bao gồm: Quy hoạch, TKCS, TKKT, TKBVTC.\u003c/p\u003e\u003cp\u003e- Phối hợp trình bày, bảo vệ hoặc chỉnh sửa hồ sơ trong quá trình trình cơ quan quản lý Nhà nước thẩm định/phê duyệt hồ sơ thiết kế các bộ môn.\u003c/p\u003e\u003cp\u003e- Tổ chức công tác thẩm định các giai đoạn TKCS đối với công trình cấp III trở xuống, TK triển khai sau TKCS đối với công trình cấp II trở lên.\u003c/p\u003e\u003cp\u003e- Nghiệm thu, thanh quyết toán sản phẩm thiết kế của nhà thầu theo từng giai đoạn.\u003c/p\u003e\u003cp\u003e4. Tham gia công tác đánh giá lựa chọn, làm việc với nhà thầu\u003c/p\u003e\u003cp\u003e- Lập chỉ dẫn kỹ thuật trong hồ mời thầu (hồ sơ yêu cầu), nhiệm vụ thiết kế đối với nhà thầu, nhà cung cấp các gói thầu liên quan đến tư vấn thiết kế/quy hoạch (Quy hoạch, Tư vấn đánh giá tác động, cấp giấy phép môi trường, Tư vấn thiết kế kỹ thuật các bộ môn,...).\u003c/p\u003e\u003cp\u003e- Tham gia đánh giá kỹ thuật các hồ sơ dự thầu tư vấn thiết kế, khảo sát.\u003c/p\u003e\u003cp\u003e5. Quản lý, điều phối công việc trong nhóm thuộc phạm vi quản lý\u003c/p\u003e\u003cp\u003e- Xây dựng kế hoạch, đào tạo nghiệp vụ, điều phối và phân công công việc CBNV thuộc phụ trách.\u003c/p\u003e\u003cp\u003e- Lập kế hoạch, kiểm soát, báo cáo kết quả thực hiện công việc của phòng, chịu trách nhiệm cho các công việc liên quan đến chuyên môn.\u003c/p\u003e\u003cp\u003e- Đầu mối chính để điều phối với các bộ môn khác, đảm bảo
