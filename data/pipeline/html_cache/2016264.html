882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T15aa,"])</script><script>self.__next_f.push([1,"TẬP ĐOÀN VÀNG BẠC ĐÁ QUÝ DOJI, với tiền thân là Công ty Phát triển Công nghệ và Thương mại TTD được thành lập năm 1994. Vào thời điểm những năm 90 của thế kỉ 20, Công ty TTD chính là doanh nghiệp tiên phong trong hoạt động chuyên sâu về khai thác đá quý, chế tác cắt mài và xuất khẩu đá quý ra thị trường quốc tế, vốn là một lĩnh vực vô cùng mới mẻ tại Việt Nam. TTD trở thành Công ty đầu tiên đã đưa ra thị trường quốc tế sản phẩm đá Ruby sao Việt Nam với thương hiệu Việt Nam Star Ruby VSR. Kể từ đó, Công ty được mệnh danh là ông hoàng Ruby sao của thế giới, làm cho Việt Nam được khắc họa như một điểm sáng trên bản đồ Đá quý quốc tế.\r\n\r\nLiên tiếp từ năm 2009 đến 2023, Tập đoàn DOJI không ngừng phát triển vượt trội trong những lĩnh vực bản lề về Vàng bạc Đá quý (trải dài từ các hoạt động Khai thác Mỏ, Chế tác cắt mài Đá quý, Sản xuất hàng Trang sức; Kinh doanh Vàng miếng; Xuất nhập khẩu và mua bán vàng trang sức, mỹ nghệ; Mở rộng hệ thống chuỗi các Trung tâm Vàng bạc Trang sức trên khắp cả nước và mở rộng đầu tư Bất động sản, các khu dự án tiềm năng, đầu tư trong lĩnh vực du lịch, lấn sân sang lĩnh vực Tài chính Ngân hàng và tái cơ cấu thành công Ngân hàng TMCP TPBank.\r\n\r\nNăm 2007: Chính thức đổi tên thành Công Ty Cổ Phần Vàng Bạc Đá Quý và Đầu Tư Thương Mại Doji.  \r\nNăm 2009: Tái cơ cấu và chính thức trở thành Công ty Cổ phần Tập Đoàn Vàng Bạc Đá Quý DOJI  \r\nNăm 2012: DOJI tái cơ cấu thành công Ngân hàng TMCP Tiên Phong.  \r\nNăm 2014: DOJI mở rộng lĩnh vực kinh doanh và thành lập Công ty TNHH Đầu tư Bất động sản DOJILAND.  \r\nNăm 2019: Tòa nhà DOJI Tower - Trụ sở chính của Tập đoàn chính thức được khai trương, trở thành Trung tâm Vàng bạc Đá quý và Trang sức lớn nhất cả nước với lối kiến trúc đẳng cấp, độc đáo tại số 5 Lê Duẩn, quận Ba Đình, Hà Nội.  \r\nNăm 2020: Tập đoàn Vàng bạc Đá quý DOJI chính thức tiếp quản Công ty Thế giới Kim Cương – Top 3 doanh nghiệp Bán lẻ Trang sức lớn nhất Việt Nam-  \r\nNăm 2021: Khai trương DOJI Smart Hà Nội, DOJI Smart Đà Nẵng. Đây là Mô hình mua sắm trang sức thông minh lần đầu tiên xuất hiện tại Việt Nam.  \r\nNăm 2022: DOJI ra mắt DOJI Tower tại số 81 - 85 Hàm Nghi, Quận 1, TP HCM. \r\n\r\nTính đến nay, Tập đoàn DOJI có 15 Công ty thành viên hoạt động theo mô hình Công ty Mẹ - Con, 5 Công ty liên kết góp vốn và hơn 61 Chi nhánh, gần 200 trung tâm, cửa hàng trải dài trên toàn quốc cùng với hơn 400 đại lý, điểm bán…, tạo nên hệ thống phân phối sản phẩm phủ khắp hầu hết các vùng miền của Việt Nam. Tổng vốn điều lệ của Tập đoàn là 6.000 tỉ đồng với tổng tài sản là 15.000 tỉ đồng và tổng số lao động là gần 3.000 cán bộ nhân viên (CBNV). Sự vươn lên mạnh mẽ đã đưa DOJI trở thành Doanh nghiệp được Tổ chức đánh giá xếp hạng VNR 500 xếp hạng là Top 5 Doanh nghiệp tư nhân lớn nhất Việt Nam trong hơn một thập kỷ (2010 đến 2023). Ngoài ra, trong bảng tổng sắp các doanh nghiệp thuộc mọi thành phần kinh tế, DOJI thăng hạng liên tục và hiện nay đứng thứ 14 trong số 500 Doanh nghiệp lớn nhất Việt Nam. Cũng trong 14 năm liên tiếp (2010 đến 2023), Tập đoàn được công nhận là Thương hiệu Quốc Gia Việt Nam. Tập đoàn đã vinh dự đón nhận Huân chương Lao động Hạng Nhất của Chủ tịch nước CHXHCN Việt Nam trong dịp kỷ niệm 25 năm thành lập (2019), Huân chương Lao động Hạng Nhì trong dịp kỷ niệm 20 năm thành lập (2014) và Huân chương Lao động Hạng Ba (2011).\r\n\r\n* SỨ MỆNH của chúng tôi: Hướng tới con người và vì con người bằng những sản phẩm và dịch vụ chất lượng hàng đầu trong sản xuất kinh doanh và quản trị doanh nghiệp, vì sự phồn vinh xã hội, giá trị cá nhân và tinh hoa cuộc sống.\r\n\r\n* TẦM NHÌN, MỤC TIÊU CHIẾN LƯỢC: Không ngừng mở rộng sản xuất kinh doanh và phát triển bền vững để trở thành một Tập đoàn hàng đầu Việt Nam và khu vực trong các lĩnh vực Vàng bạc, Đá quý, Trang sức cũng như các lĩnh vực Bất động sản, Đầu tư, Thương mại và Dịch vụ.\r\n\r\n* GIÁ TRỊ VĂN HÓA CỐT LÕI: Liêm Chính - Sáng Tạo - Hợp Lực - Trí Thức - Nhân Ái\r\n\r\n* GIÁ TRỊ QUẢN LÝ CỐT LÕI: Lãnh đạo tập trung và phân quyền - Kỉ cương tổ chức - Công bằng và Nhân văn - Quản trị tiên tiến\r\n \r\nVới tầm nhìn chiến lược, quan điểm phát triển bền vững, tiềm lực hùng mạnh, Tập đoàn DOJI tiếp tục khẳng định đẳng cấp Thương hiệu quốc gia Việt Nam, sẵn sàng tâm thế hội nhập và vươn xa trong khu vực cũng như trên trường quốc tế trong tương lai."])</script><script>self.__next_f.push([1,"24:T663,\u003cp\u003e•\tXây dựng và tối ưu hóa quy trình mua sắm tập trung phù hợp với quy mô và đặc thù của Tập đoàn.\u003c/p\u003e\u003cp\u003e•\tLên kế hoạch và kiểm soát ngân sách mua sắm theo từng khối kinh doanh, dự án, đơn vị/bộ phận, CTTV. \u003c/p\u003e\u003cp\u003e•\tĐàm phán, ký kết và quản lý hợp đồng với các nhà cung cấp. Triển khai tìm kiếm nguồn cung/phân tích giá, đánh giá \u0026 đàm phàn với các NCC, nhà thầu để có giá tốt nhất, tối ưu chi phí cho Tập đoàn.\u003c/p\u003e\u003cp\u003e•\tQuản lý, điều hành và phân công công việc triển khai mua sắm các hạng mục bao gồm nhưng không giới hạn như: hạng mục liên quan đến xây dựng/cải tạo hệ thống trung tâm trang sức; các giải pháp công nghệ, phần mềm, dịch vụ bảo hiểm, quản lý tòa nhà, vệ sinh, bảo trì kỹ thuật; Hàng hóa, thực phẩm, thiết bị cho hệ thống kinh doanh; Marketing \u0026 dịch vụ thuê ngoài như đối tác quảng cáo, sự kiện, in ấn, thiết kế, digital...\u003c/p\u003e\u003cp\u003e•\tXử lý các vấn đề liên quan đến vi phạm Hợp đồng /thỏa thuận/đơn hàng cùng với các bên liên quan như sự cố về hàng hóa/ dịch vụ.\u003c/p\u003e\u003cp\u003e•\tQuản lý đội ngũ nhân sự mua sắm, đào tạo và phát triển năng lực đội ngũ chuyên môn theo từng ngành hàng.\ g cấp, độc đáo tại số 5 Lê Duẩn, quận Ba Đình, Hà Nội.  \r\nNăm 2020: Tập đoàn Vàng bạc Đá quý DOJI chính thức tiếp quản Công ty Thế giới Kim Cương – Top 3 doanh nghiệp Bán lẻ Trang sức lớn nhất Việt Nam-  \r\nNăm 2021: Khai trương DOJI Smart Hà Nội, DOJI Smart Đà Nẵng. Đây là Mô hình mua sắm trang sức thông minh lần đầu tiên xuất hiện tại Việt Nam.  \r\nNăm 2022: DOJI ra mắt DOJI Tower tại số 81 - 85 Hàm Nghi, Quận 1, TP HCM. \r\n\r\nTính đến nay, Tập đoàn DOJI có 15 Công ty thành viên hoạt động theo mô hình Công ty Mẹ - Con, 5 Công ty liên kết góp vốn và hơn 61 Chi nhánh, gần 200 trung tâm, cửa hàng trải dài trên toàn quốc cùng với hơn 400 đại lý, điểm bán…, tạo nên hệ thống phân phối sản phẩm phủ khắp hầu hết các vùng miền của Việt Nam. Tổng vốn điều lệ của Tập đoàn là 6.000 tỉ đồng với tổng tài sản là 15.000 tỉ đồng và tổng số lao động là gần 3.000 cán bộ nhân viên (CBNV). Sự vươn lên mạnh mẽ đã đưa DOJI trở thành Doanh nghiệp được Tổ chức đánh giá xếp hạng VNR 500 xếp hạng là Top 5 Doanh nghiệp tư nhân lớn nhất Việt Nam trong hơn một thập kỷ (2010 đến 2023). Ngoài ra, trong bảng tổng sắp các doanh nghiệp thuộc mọi thành phần kinh tế, DOJI thăng hạng liên tục và hiện nay đứng thứ 14 trong số 500 Doanh nghiệp lớn nhất Việt Nam. Cũng trong 14 năm liên tiếp (2010 đến 2023), Tập đoàn được công nhận là Thương hiệu Quốc Gia Việt Nam. Tập đoàn đã vinh dự đón nhận Huân chương Lao động Hạng Nhất của Chủ tịch nước CHXHCN Việt Nam trong dịp kỷ niệm 25 năm thành lập (2019), Huân chương Lao động Hạng Nhì trong dịp kỷ niệm 20 năm thành lập (2014) và Huân chương Lao động Hạng Ba (2011).\r\n\r\n* SỨ MỆNH của chúng tôi: Hướng tới con người và vì con người bằng những sản phẩm và dịch vụ chất lượng hàng đầu trong sản xuất kinh doanh và quản trị doanh nghiệp, vì sự phồn vinh xã hội, giá trị cá nhân và tinh hoa cuộc sống.\r\n\r\n* TẦM NHÌN, MỤC TIÊU CHIẾN LƯỢC: Không ngừng mở rộng sản xuất kinh doanh và phát triển bền vững để trở thành một Tập đoàn hàng đầu Việt Nam và khu vực trong các lĩnh vực Vàng bạc, Đá quý, Trang sức cũng như các lĩnh vực Bất động sản, Đầu tư, Thương mại và Dịch vụ.\r\n\r\n* GIÁ TRỊ VĂN HÓA CỐT LÕI: Liêm Chính - Sáng Tạo - Hợp Lực - Trí Thức - Nhân Ái\r\n\r\n* GIÁ TRỊ QUẢN LÝ CỐT LÕI: Lãnh đạo tập trung và phân quyền - Kỉ cương tổ chức - Công bằng và Nhân văn - Quản trị tiên tiến\r\n \r\nVới tầm nhìn chiến lược, quan điểm phát triển bền vững, tiềm lực hùng mạnh, Tập đoàn DOJI tiếp tục khẳng định đẳng cấp Thương hiệu quốc gia Việt Nam, sẵn sàng tâm thế hội nhập và vươn xa trong khu vực cũng như trên trường quốc tế trong tương lai."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:T15aa,"])</script><script>self.__next_f.push([1,"TẬP ĐOÀN VÀNG BẠC ĐÁ QUÝ DOJI, với tiền thân là Công ty Phát triển Công nghệ và Thương mại TTD được thành lập năm 1994. Vào thời điểm những năm 90 của thế kỉ 20, Công ty TTD chính là doanh nghiệp tiên phong trong hoạt động chuyên sâu về khai thác đá quý, chế tác cắt mài và xuất khẩu đá quý ra thị trường quốc tế, vốn là một lĩnh vực vô cùng mới mẻ tại Việt Nam. TTD trở thành Công ty đầu tiên đã đưa ra thị trường quốc tế sản phẩm đá Ruby sao Việt Nam với thương hiệu Việt Nam Star Ruby VSR. Kể từ đó, Công ty được mệnh danh là ông hoàng Ruby sao của thế giới, làm cho Việt Nam được khắc họa như một điểm sáng trên bản đồ Đá quý quốc tế.\r\n\r\nLiên tiếp từ năm 2009 đến 2023, Tập đoàn DOJI không ngừng phát triển vượt trội trong những lĩnh vực bản lề về Vàng bạc Đá quý (trải dài từ các hoạt động Khai thác Mỏ, Chế tác cắt mài Đá quý, Sản xuất hàng Trang sức; Kinh doanh Vàng miếng; Xuất nhập khẩu và mua bán vàng trang sức, mỹ nghệ; Mở rộng hệ thống chuỗi các Trung tâm Vàng bạc Trang sức trên khắp cả nước và mở rộng đầu tư Bất động sản, các khu dự án tiềm năng, đầu tư trong lĩnh vực du lịch, lấn sân sang lĩnh vực Tài chính Ngân hàng và tái cơ cấu thành công Ngân hàng TMCP TPBank.\r\n\r\nNăm 2007: Chính thức đổi tên thành Công Ty Cổ Phần Vàng Bạc Đá Quý và  in ấn, thiết kế, digital...\u003c/p\u003e\u003cp\u003e•\tXử lý các vấn đề liên quan đến vi phạm Hợp đồng /thỏa thuận/đơn hàng cùng với các bên liên quan như sự cố về hàng hóa/ dịch vụ.\u003c/p\u003e\u003cp\u003e•\tQuản lý đội ngũ nhân sự mua sắm, đào tạo và phát triển năng lực đội ngũ chuyên môn theo từng ngành hàng.\u003c/p\u003e\u003cp\u003e•\tPhối hợp chặt chẽ với các phòng ban để đảm bảo hiệu quả tổng thể.\u003c/p\u003e\u003cp\u003e•\tThực hiện các công việc khác theo yêu cầu của quản lý cấp trên\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e2b:T7be,\u003cp\u003e1.\tTrình độ học vấn: Đại học trở lên chuyên ngành Quản trị kinh doanh, Thương mại, Quản trị chuỗi cung ứng, Kinh tế hoặc các lĩnh vực liên quan.\u003c/p\u003e\u003cp\u003e2.\tKinh nghiệm làm việc:\u003c/p\u003e\u003cp\u003e-\tTối thiểu 05 năm kinh nghiệm ở vị trí Trưởng phòng Mua hàng hoặc tương đương, quản lý đội ngũ từ 5–10 nhân sự trở lên.\u003c/p"])</script><script>self.__next_f.push([1,"\u003e\u003cp\u003e-\tCó kinh nghiệm làm việc trong Tập đoàn hoặc doanh nghiệp quy mô lớn, ưu tiên lĩnh vực bán lẻ, FMCG, chuỗi siêu thị, trung tâm thương mại.\u003c/p\u003e\u003cp\u003e-\tCó kinh nghiệm xây dựng chiến lược mua hàng tập trung, quản lý ngân sách lớn và hệ thống nhà cung cấp đa ngành.\u003c/p\u003e\u003cp\u003e3.\tKiến thức và kỹ năng:\u003c/p\u003e\u003cp\u003e-\tAm hiểu hoạt động mua sắm đa nhóm ngành trong môi trường bán lẻ:\u003c/p\u003e\u003cp\u003exây dựng – nội thất – M\u0026E – ICT – thực phẩm – hàng hóa tiêu dùng – Marketing – dịch vụ vận hành…\u003c/p\u003e\u003cp\u003e-\tCó năng lực xây dựng chiến lược sourcing, phát triển và đánh giá nhà cung cấp, tối ưu chi phí và kiểm soát chất lượng.\u003c/p\u003e\u003cp\u003e-\tThành thạo phân tích chi phí, đàm phán hợp đồng giá trị lớn, quản trị rủi ro chuỗi cung ứng.\u003c/p\u003e\u003cp\u003e-\tCó kinh nghiệm xây dựng, chuẩn hóa và cải tiến quy trình mua sắm theo hướng minh bạch – hiệu quả – kiểm soát nội bộ tốt.\u003c/p\u003e\u003cp\u003e- uốc tế, vốn là một lĩnh vực vô cùng mới mẻ tại Việt Nam. TTD trở thành Công ty đầu tiên đã đưa ra thị trường quốc tế sản phẩm đá Ruby sao Việt Nam với thương hiệu Việt Nam Star Ruby VSR. Kể từ đó, Công ty được mệnh danh là ông hoàng Ruby sao của thế giới, làm cho Việt Nam được khắc họa như một điểm sáng trên bản đồ Đá quý quốc tế.\r\n\r\nLiên tiếp từ năm 2009 đến 2025, Tập đoàn DOJI không ngừng phát triển vượt trội trong những lĩnh vực bản lề về Vàng bạc Đá quý (trải dài từ các hoạt động Khai thác Mỏ, Chế tác cắt mài Đá quý, Sản xuất hàng Trang sức; Kinh doanh Vàng miếng; Xuất nhập khẩu và mua bán vàng trang sức, mỹ nghệ; Mở rộng hệ thống chuỗi các Trung tâm Vàng bạc Trang sức trên khắp cả nước và mở rộng đầu tư Bất động sản, các khu dự án tiềm năng, đầu tư trong lĩnh vực du lịch, lấn sân sang lĩnh vực Tài chính Ngân hàng và tái cơ cấu thành công Ngân hàng TMCP TPBank.\r\n\r\nNăm 2007: Chính thức đổi tên thành Công Ty Cổ Phần Vàng Bạc Đá Quý và Đầu Tư Thương Mại Doji.  \r\nNăm 2009: Tái cơ cấu và chính thức trở thành Công ty Cổ phần Tập Đoàn Vàng Bạc Đá Quý DOJI  \r\nNăm 2012: DOJI tái cơ cấu thành công Ngân hàng TMCP Tiên Phong.  \r\nNăm 2014: DOJI mở rộng lĩnh vực kinh doanh và thành lập Công ty TNHH Đầu tư Bất động sản DOJILAND.  \r\nNăm 2019: Tòa nhà DOJI Tower - Trụ sở chính của Tập đoàn chính thức được khai trương, trở thành Trung tâm Vàng bạc Đá quý và Trang sức lớn nhất cả nước với lối kiến trúc đẳng cấp, độc đáo tại số 5 Lê Duẩn, quận Ba Đình, Hà Nội.  \r\nNăm 2020: Tập đoàn Vàng bạc Đá quý DOJI chính thức tiếp quản Công ty Thế giới Kim Cương – Top 3 doanh nghiệp Bán lẻ Trang sức lớn nhất Việt Nam-  \r\nNăm 2021: Khai trương DOJI Smart Hà Nội, DOJI Smart Đà Nẵng. Đây là Mô hình mua sắm trang sức thông minh lần đầu tiên xuất hiện tại Việt Nam.  \r\nNăm 2022: DOJI ra mắt DOJI Tower tại số 81 - 85 Hàm Nghi, Quận 1, TP HCM. \r\n\r\nTính đến nay, Tập đoàn DOJI có 15 Công ty thành viên hoạt động theo mô hình Công ty Mẹ - Con, 5 Công ty liên kết góp vốn và hơn 61 Chi nhánh, gần 200 trung tâm, cửa hàng trải dài trên toàn quốc cùng với hơn 400 đại lý, điểm bán…, tạo nên hệ thống phân phối sản phẩm phủ khắp hầu hết các vùng miền của Việt Nam. Tổng vốn điều lệ của Tập đoàn là 6.000 tỉ đồng với tổng tài sản là 15.000 tỉ đồng và tổng số lao động là gần 3.000 cán bộ nhân viên (CBNV). Sự vươn lên mạnh mẽ đã đưa DOJI trở thành Doanh nghiệp được Tổ chức đánh giá xếp hạng VNR 500 xếp hạng là Top 5 Doanh nghiệp tư nhân lớn nhất Việt Nam trong hơn một thập kỷ (2010 đến 2023). Ngoài ra, trong bảng tổng sắp các doanh nghiệp thuộc mọi thành phần kinh tế, DOJI thăng hạng liên tục và hiện nay đứng thứ 14 trong số 500 Doanh nghiệp lớn nhất Việt Nam. Cũng trong 14 năm liên tiếp (2010 đến 2023), Tập đoàn được công nhận là Thương hiệu Quốc Gia Việt Nam. Tập đoàn đã vinh dự đón nhận Huân chương Lao động Hạng Nhất của Chủ tịch nước CHXHCN Việt Nam trong dịp kỷ niệm 25 năm thành lập (2019), Huân chương Lao động Hạng Nhì trong dịp kỷ niệm 20 năm thành lập (2014) và Huân chương Lao động Hạng Ba (2011).\r\n\r\n* SỨ MỆNH của chúng tôi: Hướng tới con người và vì con người bằng những sản phẩm và dịch vụ chất lượng hàng đầu trong sản xuất kinh doanh và quản trị doanh nghiệp, vì sự phồn vinh xã hội, giá trị cá nhân và tinh hoa cuộc sống.\r\n\r\n* TẦM NHÌN, MỤC TIÊU CHIẾN LƯỢC: Không ngừng mở rộng sản xuất kinh doanh và phát triển bền vững để trở thành một Tập đoàn hàng đầu Việt Nam và khu vực trong các lĩnh vực Vàng bạc, Đá quý, Trang sức cũng như các lĩnh vực Bất động sản, Đầu tư, Thương mại và Dịch vụ.\r\n\r\n* GIÁ TRỊ VĂN HÓA CỐT LÕI: Liêm Chính - Sáng Tạo - Hợp Lực - Trí Thức - Nhân Ái\r\n\r\n* GIÁ TRỊ QUẢN LÝ CỐT LÕI: Lãnh đạo tập trung và phân quyền - Kỉ cương tổ chức - Công bằng và Nhân văn - Quản trị tiên tiến\r\n \r\nVới tầm nhìn chiến lược, quan điểm phát triển bền vững, tiềm lực hùng mạnh, Tập đoàn DOJI tiếp tục khẳng định đẳng cấp Thương hiệu quốc gia Việt Nam, sẵn sàng tâm thế hội nhập và vươn xa trong khu vực cũng như trên trường quốc tế trong
