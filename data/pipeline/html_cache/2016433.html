db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T15e2,"])</script><script>self.__next_f.push([1,"Hơn 65 năm qua, bằng những nỗ lực không ngừng nghỉ, Công ty Cổ phần Dược phẩm Vĩnh Phúc - VINPHACO đã  khẳng định vị thế và uy tín của một Doanh nghiệp Dược phẩm hàng đầu Việt Nam, Với chiến lược phát triển bền vững và năng động để vươn lên tầm khu vực và Quốc tế.\r\n1.\tLĨNH VỰC SẢN XUẤT KINH DOANH\r\nVINPHACO là doanh nghiệp  sản xuất, kinh doanh, xuất nhập khẩu thuốc, thực phẩm bảo vệ sức khỏe, mỹ phẩm, vật tư y tế phục vụ cho công tác phòng, chữa bệnh, chăm sóc, bảo vệ và nâng cao sức khỏe cho nhân dân.\r\n1.1 Định hướng sản xuất\r\n•\tVới thế mạnh truyền thống về các sản phẩm thuốc tiêm, VINPHACO định hướng sẽ tiếp tục đẩy mạnh chiến lược:\r\n•\tTập trung vào nghiên cứu và phát triển các thuốc tiêm mới, chuyên khoa đặc trị định vị vào các khách hàng các bệnh viện đa khoa, chuyên khoa trung ương, tuyến tỉnh, tuyến huyện, các cơ sở khám chữa bệnh.\r\n•\tTập trung nghiên cứu và phát triển các sản phẩm mang tính độc đáo và có tính độc quyền.\r\n•\tCác thuốc tiêm thông thường định vị vào khách hàng ở thị trường OTC.\r\n1.2 Mạng lưới phân phối rộng khắp:\r\n•\tVINPHACO đã và đang xây dựng mạng lưới phân phối rộng khắp cả nước, có mặt trên 63 tỉnh thành: Với Văn phòng đại diện tại Hà Nội và các chi nhánh lớn đặt tại  Đà Nẵng, Tp. Hồ Chí Minh, Cần Thơ.\r\n•\tTại Vĩnh Phúc, VINPHACO có 1 Trung tâm dược phẩm và 7 chi nhánh phân phối tại tất cả các huyện, thị.\r\n1.3 Hoạt động kinh doanh xuất khẩu:\r\nSản phẩm của Vinphaco trong những năm qua đã được xuất khẩu tại nhiều nước tại các thị trường Châu Á, Châu Âu,…\r\n2.\tĐỘI NGŨ NHÂN SỰ\r\nVINPHACO luôn xác định BCNV là tài sản lớn nhất của Công ty để làm gia giá trị cho Công ty và cho chính mỗi người lao động. Vì vậy, công ty luôn chú trọng xây dựng môi trường làm việc “Chuyên nghiệp – Trí Tuệ - Nhân văn” cùng các chế độ lương, phúc lợi cạnh tranh và thu hút dành cho người lao động. \r\nNgười Vinphaco có phẩm chất và năng lực tốt, có đức, có tài, có tầm. Có tầm nhìn và ý chí phấn đấu vươn lên, khát khao làm việc và học hỏi, bản lĩnh vượt khó, năng động, sáng tạo để đạt mục tiêu phát triển. Trung thực, trung thành, tinh nhuệ, thiện chiến. Lao động chuyên nghiệp, năng suất, chất lượng, hiệu quả cao, nâng cao năng lực, cạnh trangh trong giai đoạn mới.\r\nNgười Vinphaco có các giá trị văn hóa tiêu biểu: Chuyên nghiệp, Trí Tuệ, Nhân văn, trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và các giá trị truyền thống của Vinphaco.\r\n3.\tVĂN HÓA DOANH NGHIỆP\r\nVăn hóa Vinphaco trước hết thấm đượm truyền thống văn hóa dân tộc Việt Nam trong lịch sử hàng ngàn năm dựng nước và giữ nước. Đó là truyền thống: yêu nước, đoàn kết, chống giặc ngoại xâm; tinh thần độc lập, tự chủ; ý chí phấn đấu vươn lên, bản lĩnh vượt khó trong quá trình phát triển. đồng thời, mang bản sắc văn hóa đặc trưngcủa Vinphaco: Chuyên nghiệp, Trí Tuệ và Nhân văn trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và giá trị truyền thống trong hơn 60 năm xây dựng và phát triển, luôn luôn hướng tới các giá trị Chân, Thiện, Mỹ, mà tất cả người lao động Vinphaco đều thực hiện.\r\n4.\tTRÁCH NHIỆM XÃ HỘI\r\nLà một đơn vị sản xuất kinh doanh Dược phẩm, VINPHACO luôn \"Lấy lợi ích cộng đồng làm khởi sự cho mọi hoạt động\". Vì thế, VINPHACO cam kết đóng góp cho sự phát triển ổn định và bền vững của công ty thông qua những việc làm nâng cao chất lượng cuộc sống của người lao động và các thành viên gia đình họ, cho cộng đồng và cho toàn xã hội.\r\nVINPHACO quyết tâm xây dựng một môi trường làm việc an toàn và lành mạnh, nơi người nhân viên có được cơ hội được phát huy năng lực.\r\n5.\tTRÁCH NHIỆM VỚI MÔI TRƯỜNG\r\nLà một đơn vị có ý thức bảo vệ môi trường, Dược phẩm Vĩnh Phúc liên tục tìm cách cải thiện môi trường qua việc hiểu rõ những thách thức và cơ hội trong ngành Công nghiệp Dược để hướng tới sự phát triển bền vững. \r\nLuôn nâng cao tinh thần trách nhiệm thông qua việc sử dụng các công nghệ sạch và phù hợp trong lĩnh vực sản xuất dược phẩm\r\nBên cạnh các tiêu chuẩn nghiêm ngặt về môi trường trong sản xuất dược phẩm, thực phẩm (GMP, GLP, GSP), Vinphaco luôn chú trọng đến việc giữ gìn vệ sinh và công tác phòng chống cháy nổ, xử lý chất thải công nghiệp, nguồn nước theo đúng các tiêu chuẩn ngành và của Nhà nước Việt Nam quy định."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:Tf57,"])</script><script>self.__next_f.push([1,"\u003cp\u003eI Công tác điều hành, quản lý Phòng nghiên cứu phát triển\u003c/p\u003e\u003cp\u003e1 Thiết lập và tổ chức thực hiện các nhiệm vụ, mục tiêu, chỉ tiêu công việc của Phòng.\u003c/p\u003e\u003cp\u003e2 Hướng dẫn, đào tạo nhân viên nâng cao chuyên môn nghiệp vụ, kỹ năng cần thiết nhằm phát huy tối đa khả năng để hoàn thành các mục tiêu, nhiệm vụ chung của Phòng.\u003c/p\u003e\u003cp\u003e3 Phổ biến các chiến lược, quy định của công ty hoặc các thay đổi trong quá trình hoạt động cho nhân viên của Phòng đầy đủ và kịp thời.\u003c/p\u003e\u003cp\u003e4 Theo dõi, đánh giá kết quả làm việc của nhân viên và đề xuất việc điều chỉnh lương, khen thưởng, kỷ luật, điều chuyển một cách phù hợp.\u003c/p\u003e\u003cp\u003e5 Báo cáo cho Giám đốc nhà máy, Tổng Giám đốc về tình hình và kết quả thực hiện các mục tiêu, nhiệm vụ trong phạm vi phụ trách theo quy định.\u003c/p\u003e\u003cp\u003eII Công tác chuyên môn\u003c/p\u003e\u003cp\u003e1 Rà soát, điều chỉnh, đưa ra phương án phù hợp trong xây công thức và quy trình thử nghiệm sản phẩm mới và sản phẩm cải tiến (hoạt chất mới, nguyên liệu thay thế)\u003c/p\u003e\u003cp\u003e2 Giám sát quá trình thực hiện nghiên cứu kỹ thuật sản xuất sản phẩm thuốc mới và sản phẩm cải tiến.\u003c/p\u003e\u003cp\u003e3 Hướng dẫn xử lý các vấn đề phát sinh trong quá trình nghiên cứu.\u003c/p\u003e\u003cp\u003e4 Kiểm tra các quy trình pha chế gốc, quy trình đóng gói gốc, tài liệu thẩm định QTSX trước khi ban hành.\u003c/p\u003e\u003cp\u003e5 Kiểm tra, giám sát việc đào tạo và chuyển giao quy trình công nghệ cho xưởng sản xuất.\u003c/p\u003e\u003cp\u003e6 Chỉ đạo, kiểm tra việc thẩm định quy trình sản xuất các sản phẩm của Công ty.\u003c/p\u003e\u003cp\u003e7 Kiểm tra công tác nghiên cứu theo dõi độ ổn định của thuốc. Xem xét kết quả nghiên cứu, kịp thời đưa ra các cảnh báo chất lượng sản phẩm cho hệ thống, lập kế hoạch cải tiến sản phẩm ( nếu cần).\u003c/p\u003e\u003cp\u003e8 Kiểm tra công tác xây dựng hồ sơ đăng ký cho các sản phẩm mới, xây dựng hồ sơ đăng ký thay đổi cho các sản phẩm có yêu cầu thay đổi, xây dựng hồ sơ gia hạn số đăng ký cho các sản phẩm hết số đăng ký, xây dựng hồ sơ đăng ký cho các sản phẩm xuất khẩu khi có yêu cầu.\u003c/p\u003e\u003cp\u003e9 Phối hợp với các đơn vị liên quan trong việc khắc phục các sự cố trong sản xuất liên quan tới công tác kỹ thuật.\u003c/p\u003e\u003cp\u003e10 Hỗ trợ và lựa chọn nhà cung cấp nguyên liệu, bao bì, khuôn mẫu, thiết bị cho nghiên cứu và nhà máy.\u003c/p\u003e\u003cp\u003e11 Xây dựng hợp đồng và thanh lý hợp đồng đào tạo, chuyển giao kỹ thuật sản xuất với các chuyên gia\u003c/p\u003e\u003cp\u003eTổ chức, giám sát quá trình nhận chuyển giao kỹ thuật từ chuyên gia.\u003c/p\u003e\u003cp\u003e12 Thực hiện nhiệm vụ do ban IMS phân công.\u003c/p\u003e\u003cp\u003e13 Phối hợp với các đơn vị liên quan trả lời khiếu nại của khách hàng, đối tác, cơ quan quản lý nhà nước và các đơn vị về các vấn đề liên quan đến chất lượng của sản phẩm sản xuất tại Công ty đang lưu hành trên thị trường.\u003c/p\u003e\u003cp\u003e14 Tham mưu cho ban Tổng giám đốc lựa chọn nhà cung cấp dịch vụ thử nghiệm lâm sàng, tương đương sinh học. Giám sát thực hiện các dự án thử nghiệm lâm sàng, thử tương đương sinh học cho các sản phẩm của Công ty theo yêu cầu.\u003c/p\u003e\u003cp\u003e15 Xác định nhu cầu đào tạo của đơn vị, tham mưu cho Tổng Giám đốc Công ty trong việc lựa chọn chuyên gia đào tạo.\u003c/p\u003e\u003cp\u003eV Thực hiện các nhiệm vụ khác theo sự phân công của Quản lý.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T706,\u003cp\u003eTrình độ chuyên môn: Tốt nghiệp đại học chính quy chuyên ngành Dược trở lên\u003c/p\u003e\u003cp\u003eKinh nghiệm công tác: Tối thiểu 5 năm kinh nghiệm ở vị trí tương đương\u003c/p\u003e\u003cp\u003eKiến thức:\u003c/p\u003e\u003cp\u003e+ Kiến thức về các hệ thống tiêu chuẩn, văn bản pháp lý của ngành Dược, An toàn thực phẩm.\u003c/p\u003e\u003cp\u003e+ Kiến thức về hoạt chất, dạng bào chế, công nghệ sản xuất Dược phẩm, thực phẩm bảo vệ sức khỏe, các sản phẩm với mục đích y tế khác.\u003c/p\u003e\u003cp\u003e+ Kiến thức về dược lý, dược lâm sàng.\u003c/p\u003e\u003cp\u003e+ Kiến thức về đăng ký sản phẩm.\u003c/p\u003e\u003cp\u003eKỹ năng\u003c/p\u003e\u003cp\u003e+ Kỹ năng làm việc thành công trong môi trường làm việc nhóm.\u003c/p\u003e\u003cp\u003e+ Kỹ năng giải quyết vấn đề và ra quyết định.\u003c/p\u003e\u003cp\u003e+ Kỹ năng phân tích, hoạch định và tổ chức.\u003c/p\u003e\u003cp\u003e+ Kỹ năng tổ chức, giám sát thực hiện công việc và quản lý thời gian, kỹ năng lập kế hoạch, báo cáo.\u003c/p\u003e\u003cp\u003e+ Kỹ năng giao tiếp tốt, biết lắng nghe, phản hồi thích hợp, duy trì được mức độ hài hòa với các CBNV trong phòng và các đơn vị liên quan.\u003c/p\u003e\u003cp\u003e+ Kỹ năng hướng dẫn, đào tạo, kèm cặp nhân viên.\u003c/p\u003e\u003cp\u003e+ Kỹ năng soạn thảo văn bản tốt, sử dụng thành thạo các phần mềm tin học văn phòng như word, excel.\u003c/p\u003e\u003cp\u003e+ Có thể sử dụng tiếng anh là một lợi thế.\u003c/p\u003e\u003cp\u003ePhẩm chất cá nhân:\u003c/p\u003e\u003cp\u003e+ Khỏe mạnh, tận tâm, trung thực, ý thức trách nhiệm cao.\u003c/p\u003e\u003cp\u003e+ Quan tâm, lắng nghe, chia sẻ với mọi người.\u003c/p\u003e\u003cp\u003e+ Thẳng thắn, chủ động, sáng tạo.\u003c/p\u003e\u003cp\u003e+ Cầu tiến, chăm chỉ, cẩn thận, học hỏi, thích nghi tốt.\u003c/p\u003e26:T15e2,"])</script><script>self.__next_f.push([1,"Hơn 65 năm qua, bằng những nỗ lực không ngừng nghỉ, Công ty Cổ phần Dược phẩm Vĩnh Phúc - VINPHACO đã  khẳng định vị thế và uy tín của một Doanh nghiệp Dược phẩm hàng đầu Việt Nam, Với chiến lược phát triển bền vững và năng động để vươn lên tầm khu vực và Quốc tế.\r\n1.\tLĨNH VỰC SẢN XUẤT KINH DOANH\r\nVINPHACO là doanh nghiệp  sản xuất, kinh doanh, xuất nhập khẩu thuốc, thực phẩm bảo vệ sức khỏe, mỹ phẩm, vật tư y tế phục vụ cho công tác phòng, chữa bệnh, chăm sóc, bảo vệ và nâng cao sức khỏe cho nhân dân.\r\n1.1 Định hướng sản xuất\r\n•\tVới thế mạnh truyền thống về các sản phẩm thuốc tiêm, VINPHACO định hướng sẽ tiếp tục đẩy mạnh chiến lược:\r\n•\tTập trung vào nghiên cứu và phát triển các thuốc tiêm mới, chuyên khoa đặc trị định vị vào các khách hàng các bệnh viện đa khoa, chuyên khoa trung ương, tuyến tỉnh, tuyến huyện, các cơ sở khám chữa bệnh.\r\n•\tTập trung nghiên cứu và phát triển các sản phẩm mang tính độc đáo và có tính độc quyền.\r\n•\tCác thuốc tiêm thông thường định vị vào khách hàng ở thị trường OTC.\r\n1.2 Mạng lưới phân phối rộng khắp:\r\n•\tVINPHACO đã và đang xây dựng mạng lưới phân phối rộng khắp cả nước, có mặt trên 63 tỉnh thành: Với Văn phòng đại diện tại Hà Nội và các chi nhánh lớn đặt tại  Đà Nẵng, Tp. Hồ Chí Minh, Cần Thơ.\r\n•\tTại Vĩnh Phúc, VINPHACO có 1 Trung tâm dược phẩm và 7 chi nhánh phân phối tại tất cả các huyện, thị.\r\n1.3 Hoạt động kinh doanh xuất khẩu:\r\nSản phẩm của Vinphaco trong những năm qua đã được xuất khẩu tại nhiều nước tại các thị trường Châu Á, Châu Âu,…\r\n2.\tĐỘI NGŨ NHÂN SỰ\r\nVINPHACO luôn xác định BCNV là tài sản lớn nhất của Công ty để làm gia giá trị cho Công ty và cho chính mỗi người lao động. Vì vậy, công ty luôn chú trọng xây dựng môi trường làm việc “Chuyên nghiệp – Trí Tuệ - Nhân văn” cùng các chế độ lương, phúc lợi cạnh tranh và thu hút dành cho người lao động. \r\nNgười Vinphaco có phẩm chất và năng lực tốt, có đức, có tài, có tầm. Có tầm nhìn và ý chí phấn đấu vươn lên, khát khao làm việc và học hỏi, bản lĩnh vượt khó, năng động, sáng tạo để đạt mục tiêu phát triển. Trung thực, trung thành, tinh nhuệ, thiện chiến. Lao động chuyên nghiệp, năng suất, chất lượng, hiệu quả cao, nâng cao năng lực, cạnh trangh trong giai đoạn mới.\r\nNgười Vinphaco có các giá trị văn hóa tiêu biểu: Chuyên nghiệp, Trí Tuệ, Nhân văn, trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và các giá trị truyền thống của Vinphaco.\r\n3.\tVĂN HÓA DOANH NGHIỆP\r\nVăn hóa Vinphaco trước hết thấm đượm truyền thống văn hóa dân tộc Việt Nam trong lịch sử hàng ngàn năm dựng nước và giữ nước. Đó là truyền thống: yêu nước, đoàn kết, chống giặc ngoại xâm; tinh thần độc lập, tự chủ; ý chí phấn đấu vươn lên, bản lĩnh vượt khó trong quá trình phát triển. đồng thời, mang bản sắc văn hóa đặc trưngcủa Vinphaco: Chuyên nghiệp, Trí Tuệ và Nhân văn trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và giá trị truyền thống trong hơn 60 năm xây dựng và phát triển, luôn luôn hướng tới các giá trị Chân, Thiện, Mỹ, mà tất cả người lao động Vinphaco đều thực hiện.\r\n4.\tTRÁCH NHIỆM XÃ HỘI\r\nLà một đơn vị sản xuất kinh doanh Dược phẩm, VINPHACO luôn \"Lấy lợi ích cộng đồng làm khởi sự cho mọi hoạt động\". Vì thế, VINPHACO cam kết đóng góp cho sự phát triển ổn định và bền vững của công ty thông qua những việc làm nâng cao chất lượng cuộc sống của người lao động và các thành viên gia đình họ, cho cộng đồng và cho toàn xã hội.\r\nVINPHACO quyết tâm xây dựng một môi trường làm việc an toàn và lành mạnh, nơi người nhân viên có được cơ hội được phát huy năng lực.\r\n5.\tTRÁCH NHIỆM VỚI MÔI TRƯỜNG\r\nLà một đơn vị có ý thức bảo vệ môi trường, Dược phẩm Vĩnh Phúc liên tục tìm cách cải thiện môi trường qua việc hiểu rõ những thách thức và cơ hội trong ngành Công nghiệp Dược để hướng tới sự phát triển bền vững. \r\nLuôn nâng cao tinh thần trách nhiệm thông qua việc sử dụng các công nghệ sạch và phù hợp trong lĩnh vực sản xuất dược phẩm\r\nBên cạnh các tiêu chuẩn nghiêm ngặt về môi trường trong sản xuất dược phẩm, thực phẩm (GMP, GLP, GSP), Vinphaco luôn chú trọng đến việc giữ gìn vệ sinh và công tác phòng chống cháy nổ, xử lý chất thải công nghiệp, nguồn nước theo đúng các tiêu chuẩn ngành và của Nhà nước Việt Nam quy định."])</script><script>self.__next_f.push([1,"29:T15e2,"])</script><script>self.__next_f.push([1,"Hơn 65 năm qua, bằng những nỗ lực không ngừng nghỉ, Công ty Cổ phần Dược phẩm Vĩnh Phúc - VINPHACO đã  khẳng định vị thế và uy tín của một Doanh nghiệp Dược phẩm hàng đầu Việt Nam, Với chiến lược phát triển bền vững và năng động để vươn lên tầm khu vực và Quốc tế.\r\n1.\tLĨNH VỰC SẢN XUẤT KINH DOANH\r\nVINPHACO là doanh nghiệp  sản xuất, kinh doanh, xuất nhập khẩu thuốc, thực phẩm bảo vệ sức khỏe, mỹ phẩm, vật tư y tế phục vụ cho công tác phòng, chữa bệnh, chăm sóc, bảo vệ và nâng cao sức khỏe cho nhân dân.\r\n1.1 Định hướng sản xuất\r\n•\tVới thế mạnh truyền thống về các sản phẩm thuốc tiêm, VINPHACO định hướng sẽ tiếp tục đẩy mạnh chiến lược:\r\n•\tTập trung vào nghiên cứu và phát triển các thuốc tiêm mới, chuyên khoa đặc trị định vị vào các khách hàng các bệnh viện đa khoa, chuyên khoa trung ương, tuyến tỉnh, tuyến huyện, các cơ sở khám chữa bệnh.\r\n•\tTập trung nghiên cứu và phát triển các sản phẩm mang tín nh của công ty hoặc các thay đổi trong quá trình hoạt động cho nhân viên của Phòng đầy đủ và kịp thời.\u003c/p\u003e\u003cp\u003e4 Theo dõi, đánh giá kết quả làm việc của nhân viên và đề xuất việc điều chỉnh lương, khen thưởng, kỷ luật, điều chuyển một cách phù hợp.\u003c/p\u003e\u003cp\u003e5 Báo cáo cho Giám đốc nhà máy, Tổng Giám đốc về tình hình và kết quả thực hiện các mục tiêu, nhiệm vụ trong phạm vi phụ trách theo quy định.\u003c/p\u003e\u003cp\u003eII Công tác chuyên môn\u003c/p\u003e\u003cp\u003e1 Rà soát, điều chỉnh, đưa ra phương án phù hợp trong xây công thức và quy trình thử nghiệm sản phẩm mới và sản phẩm cải tiến (hoạt chất mới, nguyên liệu thay thế)\u003c/p\u003e\u003cp\u003e2 Giám sát quá trình thực hiện nghiên cứu kỹ thuật sản xuất sản phẩm thuốc mới và sản phẩm cải tiến.\u003c/p\u003e\u003cp\u003e3 Hướng dẫn xử lý các vấn đề phát sinh trong quá trình nghiên cứu.\u003c/p\u003e\u003cp\u003e4 Kiểm tra các quy trình pha chế gốc, quy trình đóng gói gốc, tài liệu thẩm định QTSX trước khi ban hành.\u003c/p\u003e\u003cp\u003e5 Kiểm tra, giám sát việc đào tạo và chuyển giao quy trình công nghệ cho xưởng sản xuất.\u003c/p\u003e\u003cp\u003e6 Chỉ đạo, kiểm tra việc thẩm định quy trình sản xuất các sản phẩm của Công ty.\u003c/p\u003e\u003cp\u003e7 Kiểm tra công tác nghiên cứu theo dõi độ ổn định của thuốc. Xem xét kết quả nghiên cứu, kịp thời đưa ra các cảnh báo chất lượng sản phẩm cho hệ thống, lập kế hoạch cải tiến sản phẩm ( nếu cần).\u003c/p\u003e\u003cp\u003e8 Kiểm tra công tác xây dựng hồ sơ đăng ký cho các sản phẩm mới, xây dựng hồ sơ đăng ký thay đổi cho các sản phẩm có yêu cầu thay đổi, xây dựng hồ sơ gia hạn số đăng ký cho các sản phẩm hết số đăng ký, xây dựng hồ sơ đăng ký cho các sản phẩm xuất khẩu khi có yêu cầu.\u003c/p\u003e\u003cp\u003e9 Phối hợp với các đơn vị liên quan trong việc khắc phục các sự cố trong sản xuất liên quan tới công tác kỹ thuật.\u003c/p\u003e\u003cp\u003e10 Hỗ trợ và lựa chọn nhà cung cấp nguyên liệu, bao bì, khuôn mẫu, thiết bị cho nghiên cứu và nhà máy.\u003c/p\u003e\u003cp\u003e11 Xây dựng hợp đồng và thanh lý hợp đồng đào tạo, chuyển giao kỹ thuật sản xuất với các chuyên gia\u003c/p\u003e\u003cp\u003eTổ chức, giám sát quá trình nhận chuyển giao kỹ thuật từ chuyên gia.\u003c/p\u003e\u003cp\u003e12 Thực hiện nhiệm vụ do ban IMS phân công.\u003c/p\u003e\u003cp\u003e13 Phối hợp với các đơn vị liên quan trả lời khiếu nại của khách hàng, đối tác, cơ quan quản lý nhà nước và các đơn vị về các vấn đề liên quan đến chất lượng của sản phẩm sản xuất tại Công ty đang lưu hành trên thị trường.\u003c/p\u003e\u003cp\u003e14 Tham mưu cho ban Tổng giám đốc lựa chọn nhà cung cấp dịch vụ thử nghiệm lâm sàng, tương đương sinh học. Giám sát thực hiện các dự án thử nghiệm lâm sàng, thử tương đương sinh học cho các sản phẩm của Công ty theo yêu cầu.\u003c/p\u003e\u003cp\u003e15 Xác định nhu cầu đào tạo của đơn vị, tham mưu cho Tổng Giám đốc Công ty trong việc lựa chọn chuyên gia đào tạo.\u003c/p\u003e\u003cp\u003eV Thực hiện các nhiệm vụ khác theo sự phân công của Quản lý.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T706,\u003cp\u003eTrình độ chuyên môn: Tốt nghiệp đại học chính quy chuyên ngành Dược trở lên\u003c/p\u003e\u003cp\u003eKinh nghiệm công tác: Tối thiểu 5 năm kinh nghiệm ở vị trí tương đương\u003c/p\u003e\u003cp\u003eKiến thức:\u003c/p\u003e\u003cp\u003e+ Kiến thức về các hệ thống tiêu chuẩn, văn bản pháp lý của ngành Dược, An toàn thực phẩm.\u003c/p\u003e\u003cp\u003e+ Kiến thức về hoạt chất, dạng bào chế, công nghệ sản xuất Dược phẩm, thực phẩm bảo vệ sức khỏe, các sản phẩm với mục đích y tế khác.\u003c/p\u003e\u003cp\u003e+ Kiến thức về dược lý, dược lâm sàng.\u003c/p\u003e\u003cp\u003e+ Kiến thức về đăng ký sản phẩm.\u003c/p\u003e\u003cp\u003eKỹ năng\u003c/p\u003e\u003cp\u003e+ Kỹ năng làm việc thành công trong môi trường làm việc nhóm.\u003c/p\u003e\u003cp\u003e+ Kỹ năng giải quyết vấn đề và ra quyết định.\u003c/p\u003e\u003cp\u003e+ Kỹ năng phân tích, hoạch định và tổ ch ại Vĩnh Phúc, VINPHACO có 1 Trung tâm dược phẩm và 7 chi nhánh phân phối tại tất cả các huyện, thị.\r\n1.3 Hoạt động kinh doanh xuất khẩu:\r\nSản phẩm của Vinphaco trong những năm qua đã được xuất khẩu tại nhiều nước tại các thị trường Châu Á, Châu Âu,…\r\n2.\tĐỘI NGŨ NHÂN SỰ\r\nVINPHACO luôn xác định BCNV là tài sản lớn nhất của Công ty để làm gia giá trị cho Công ty và cho chính mỗi người lao động. Vì vậy, công ty luôn chú trọng xây dựng môi trường làm việc “Chuyên nghiệp – Trí Tuệ - Nhân văn” cùng các chế độ lương, phúc lợi cạnh tranh và thu hút dành cho người lao động. \r\nNgười Vinphaco có phẩm chất và năng lực tốt, có đức, có tài, có tầm. Có tầm nhìn và ý chí phấn đấu vươn lên, khát khao làm việc và học hỏi, bản lĩnh vượt khó, năng động, sáng tạo để đạt mục tiêu phát triển. Trung thực, trung thành, tinh nhuệ, thiện chiến. Lao động chuyên nghiệp, năng suất, chất lượng, hiệu quả cao, nâng cao năng lực, cạnh trangh trong giai đoạn mới.\r\nNgười Vinphaco có các giá trị văn hóa tiêu biểu: Chuyên nghiệp, Trí Tuệ, Nhân văn, trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và các giá trị truyền thống của Vinphaco.\r\n3.\tVĂN HÓA DOANH NGHIỆP\r\nVăn hóa Vinphaco trước hết thấm đượm truyền thống văn hóa dân tộc Việt Nam trong lịch sử hàng ngàn năm dựng nước và giữ nước. Đó là truyền thống: yêu nước, đoàn kết, chống giặc ngoại xâm; tinh thần độc lập, tự chủ; ý chí phấn đấu vươn lên, bản lĩnh vượt khó trong quá trình phát triển. đồng thời, mang bản sắc văn hóa đặc trưngcủa Vinphaco: Chuyên nghiệp, Trí Tuệ và Nhân văn trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và giá trị truyền thống trong hơn 60 năm xây dựng và phát triển, luôn luôn hướng tới các giá trị Chân, Thiện, Mỹ, mà tất cả người lao động Vinphaco đều thực hiện.\r\n4.\tTRÁCH NHIỆM XÃ HỘI\r\nLà một đơn vị sản xuất kinh doanh Dược phẩm, VINPHACO luôn \"Lấy lợi ích cộng đồng làm khởi sự cho mọi hoạt động\". Vì thế, VINPHACO cam kết đóng góp cho sự phát triển ổn định và bền vững của công ty thông qua những việc làm nâng cao chất lượng cuộc sống của người lao động và các thành viên gia đình họ, cho cộng đồng và cho toàn xã hội.\r\nVINPHACO quyết tâm xây dựng một môi trường làm việc an toàn và lành mạnh, nơi người nhân viên có được cơ hội được phát huy năng lực.\r\n5.\tTRÁCH NHIỆM VỚI MÔI TRƯỜNG\r\nLà một đơn vị có ý thức bảo vệ môi trường, Dược phẩm Vĩnh Phúc liên tục tìm cách cải thiện môi trường qua việc hiểu rõ những thách thức và cơ hội trong ngành Công nghiệp Dược để hướng tới sự phát triển bền vững. \r\nLuôn nâng cao tinh thần trách nhiệm thông qua việc sử dụng các công nghệ sạch và phù hợp trong lĩnh vực sản xuất dược phẩm\r\nBên cạnh các tiêu chuẩn nghiêm ngặt về môi trường trong sản xuất dược phẩm, thực phẩm (GMP, GLP, GSP), Vinphaco luôn chú trọng đến việc giữ gìn vệ sinh và công tác phòng chống cháy nổ, xử lý chất thải công nghiệp, nguồn nước theo đúng các tiêu chuẩn ngành và của Nhà nước Việt Nam quy định."])</script><script>self.__next_f.push([1,"40:{\"companyId\":197684,\"jobImageURLs\":null,\"jobVideoURLs\":null,\"companyName\":\"Công Ty Cổ Phần Dược Phẩm Vĩnh Phúc\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/73/10234951.png\",\"companySizeId\":\"\",\"companyProfile\":\"$41\",\"contactName\":\"Ms Trang\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Số 777 - Đường Mê Linh, Phường Khai Quang, Thành phố Vĩnh Yên, Tỉnh Vĩnh Phúc\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"https://www.vietnamworks.com/company/cong-ty-co-phan-duoc-pham-vinh-phuc\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":2,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n43:{\"serviceCode\":\"JPM\",\"startOn\":
