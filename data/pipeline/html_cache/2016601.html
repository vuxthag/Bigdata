a lớn như bia hơi Hà Nội, bia tươi Sài Gòn, Carlsberg, ... cùng nhiều hãng bia thủ công khác. Trong hơn 12 năm qua, Đức Minh đã không ngừng nâng cấp công nghệ, mở rộng quy mô sản xuất, tối ưu chất lượng sản phẩm và giá thành. Nhờ đó, bên cạnh mặt hàng chủ lực là các thiết bị bảo quản, chiết rót bia, Đức Minh đã dần khẳng định được sự uy tin và vị thế hàng đầu trong vai trò nhà sản xuất nội địa các thiết bị điện lạnh công nghiệp. Sản phẩm tủ đông lạnh công nghiệp mang thương hiệu Đức Minh đã được thị trường ghi nhận đạt chất lượng tương đương thiết bị nhập khẩu từ các thương hiệu nổi tiếng. Mọi sản phẩm được sản xuất bởi Đức Minh đều được chủ trọng tối ưu công năng chính, hưởng đến độ bền và tính ổn định trong vận hành. Đặc biệt, nhờ am hiểu thị trường. Đức Minh đã thực hiện nhiều điều chỉnh trên thiết kế thiết bị nhằm đáp ứng thói quen vận hành thực tế tại điểm bản cũng như phù hợp với điều kiện khí hậu nóng ẩm đắc thủ tại Việt Nam. Không chỉ vậy, với lợi thế về công nghệ và sự chủ động trong sản xuất, bên cạnh cung cấp thiết bị đơn chiếc, Đức Minh còn có thể mạnh trong lĩnh vực tư vấn, hỗ trợ khách hàng tìm kiếm, thiết kế các giải pháp đồng bộ, có tính ứng dụng cao, đáp ứng tốt các nhu cầu chuyên biệt, phức tạp như thiết bị quầy bar, hệ thống tủ trưng bày siêu thị hay những sản phẩm sản xuất theo yêu cầu có giá trị cao như tủ rượu vang, máy làm đá pha lên"])</script><script>self.__next_f.push([1,"24:T18ae,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMỤC TIÊU CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Báo cáo tài chính chính xác – minh bạch – đúng hạn.\u003c/p\u003e\u003cp\u003e• Hệ thống kiểm soát tài chính hoạt động hiệu quả, không có sai phạm nghiêm trọng.\u003c/p\u003e\u003cp\u003e• Dòng tiền ổn định, tỷ lệ chi phí hợp lý, lợi nhuận đạt hoặc vượt kế hoạch.\u003c/p\u003e\u003cp\u003e• Nâng cao năng lực đội ngũ kế toán. Bộ máy kế toán hoạt động hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. QT/T Tổ chức, điều hành và quản lý phòng Tài chính – Kế toán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng cơ cấu tổ chức, phân công nhiệm vụ, mô tả công việc cho từng nhân viên trong phòng.\u003c/p\u003e\u003cp\u003e• Ban hành và hướng dẫn thực hiện các quy trình, quy chế kế toán – tài chính nội bộ.\u003c/p\u003e\u003cp\u003e• Kiểm soát tiến độ công việc, đảm bảo tất cả chứng từ, sổ sách, báo cáo được thực hiện đúng hạn.\u003c/p\u003e\u003cp\u003e• Đào tạo, hướng dẫn nghiệp vụ, nâng cao năng lực chuyên môn cho nhân viên.\u003c/p\u003e\u003cp\u003e• Đánh giá kết quả công việc, đề xuất khen thưởng, kỷ luật, hoặc điều chỉnh nhân sự khi cần thiết.\u003c/p\u003e\u003cp\u003e• Xây dựng văn hóa làm việc trung thực, kỷ luật, minh bạch trong nội bộ phòng tài chính kế toán.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. QT/T Tổ chức công tác hạch toán kế toán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiểm tra, phê duyệt bộ ĐNTT, chứng từ kế toán.\u003c/p\u003e\u003cp\u003e• Giám sát hạch toán theo đúng chuẩn mực và quy định hiện hành.\u003c/p\u003e\u003cp\u003e• Kiểm soát công tác đối chiếu, kiểm tra số liệu giữa các bộ phận (kho, công nợ, ngân hàng, quỹ,…).\u003c/p\u003e\u003cp\u003e• Tổ chức kiểm kê quỹ, hàng hóa, tài sản định kỳ.\u003c/p\u003e\u003cp\u003e• Kiểm tra, hướng dẫn việc lưu trữ chứng từ, sổ sách khoa học.\u003c/p\u003e\u003cp\u003e• Quản lý công tác hoàn thiện, sắp xếp, lưu trữ bộ chứng từ thu/chi căn cứ quy định của luật thuế, luật kế toán và quy định nội bộ của công ty.\u003c/p\u003e\u003cp\u003e• Chỉ đạo chuẩn bị hồ sơ phục vụ kiểm toán, thanh tra, quyết toán thuế.\u003c/p\u003e\u003cp\u003e• Đảm bảo dữ liệu phục vụ kiểm toán, thanh tra. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. QT/T Lập kế hoạch và quản lý tài chính – ngân sách\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tìm hiểu, cập nhật lãi suất hiện tại từng thời điểm của thị trường.\u003c/p\u003e\u003cp\u003e• Đàm phán lãi suất và các biểu phí với các ngân hàng hoạt động.\u003c/p\u003e\u003cp\u003e• Điều hành \u0026 phê duyệt các vấn đề về thế chấp tài sản, rút tài sản, tăng giảm hạn mức với các ngân hàng.\u003c/p\u003e\u003cp\u003e• Điều hành và phê duyệt các vấn đề khác liên quan đến ngân hàng.\u003c/p\u003e\u003cp\u003e• Đánh giá công tác kiểm tra tính đúng đắn của các nghiệp vụ vay vốn.\u003c/p\u003e\u003cp\u003e• Lập kế hoạch tài chính năm, quý, tháng.\u003c/p\u003e\u003cp\u003e• Xây dựng dự toán thu – chi, dòng tiền, ngân sách.\u003c/p\u003e\u003cp\u003e• Theo dõi thực hiện ngân sách, phân tích chênh lệch so với kế hoạch.\u003c/p\u003e\u003cp\u003e• Quản lý dòng tiền, đảm bảo khả năng thanh toán.\u003c/p\u003e\u003cp\u003e• Làm việc với ngân hàng, tổ chức tín dụng về vay, bảo lãnh, lãi suất.\u003c/p\u003e\u003cp\u003e• Tham mưu phương án huy động và sử dụng vốn hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. QT/T Quản lý và kiểm soát chi phí, giá thành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng định mức chi phí cho từng hoạt động, dự án.\u003c/p\u003e\u003cp\u003e• Kiểm soát chi phí phát sinh, đảm bảo hợp lý, hợp lệ.\u003c/p\u003e\u003cp\u003e• Kiểm soát chi phí giá thành sản phẩm/dịch vụ.\u003c/p\u003e\u003cp\u003e• Phân tích chênh lệch chi phí, đề xuất tiết giảm.\u003c/p\u003e\u003cp\u003e• Báo cáo chi phí theo đơn vị, dự án, sản phẩm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. QT/T Quản lý công tác thuế và tuân thủ pháp luật tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiểm soát công tác:\u003c/p\u003e\u003cp\u003e  + Kê khai, nộp thuế đúng quy định (GTGT, TNDN, TNCN...).\u003c/p\u003e\u003cp\u003e  + Hoàn thiện, sắp xếp, lưu trữ hồ sơ chứng từ, hóa đơn hợp lý, hợp lệ từ đầu vào – đầu ra.\u003c/p\u003e\u003cp\u003e  + Cập nhật chính sách thuế, hướng dẫn áp dụng đúng luật.\u003c/p\u003e\u003cp\u003e  + Công tác lưu trữ hồ sơ kế toán, hồ sơ thuế phục vụ quyết toán.\u003c/p\u003e\u003cp\u003e• Làm việc và giải trình với cơ quan thuế, kiểm toán khi cần.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. QT/T Phân tích và tham mưu tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiểm soát công tác:\u003c/p\u003e\u003cp\u003e  + Lập báo cáo tài chính tháng, quý, năm.\u003c/p\u003e\u003cp\u003e  + Lập báo cáo quản trị nội bộ theo đơn vị, sản phẩm, dự án.\u003c/p\u003e\u003cp\u003e• Phân tích kết quả kinh doanh: doanh thu, chi phí, lợi nhuận, dòng tiền...\u003c/p\u003e\u003cp\u003e• Đánh giá rủi ro tài chính.\u003c/p\u003e\u003cp\u003e• Tham mưu chính sách tài chính, kế hoạch đầu tư cho Ban Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Kiểm soát nội bộ và phòng ngừa rủi ro tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng hệ thống kiểm soát nội bộ tài chính – kế toán.\u003c/p\u003e\u003cp\u003e• Kiểm soát, đánh giá việc tuân thủ quy trình, quy chế tài chính.\u003c/p\u003e\u003cp\u003e• Thiết lập cơ chế phê duyệt hai cấp cho các khoản chi lớn.\u003c/p\u003e\u003cp\u003e• Phát hiện, ngăn ngừa gian lận hoặc sai phạm tài chính.\u003c/p\u003e\u003cp\u003e• Báo cáo BGĐ khi có rủi ro phát sinh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Quan hệ đối ngoại trong lĩnh vực tài chính – kế toán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Làm việc với cơ quan thuế, ngân hàng, kiểm toán, bảo hiểm.\u003c/p\u003e\u003cp\u003e• Duy trì quan hệ tốt với đối tác tài chính, đảm bảo giao dịch thuận lợi.\u003c/p\u003e\u003cp\u003e• Đại diện công ty trong các cuộc kiểm toán, thanh tra.\u003c/p\u003e\u003cp\u003e• Điều hành công tác chuẩn bị hồ sơ, tài liệu theo yêu cầu của cơ quan quản lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e9. Thực hiện công việc khác theo phân công của Ban Giám đốc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tham gia họp điều hành, hỗ trợ xây dựng quy chế tài chính, lương – thưởng.\u003c/p\u003e\u003cp\u003e• Thực hiện nhiệm vụ đột xuất hoặc các dự án nội bộ khi được giao.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T7d5,\u003cp\u003e\u003cstrong\u003eTrình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Cao đẳng, Đại học ( Bắt Buộc)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChuyên ngành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tài chính - Kế toán ( Bắt buộc)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChứng chỉ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chứng chỉ Kế toán Trưởng (Bắt buộc) \u003c/p\u003e\u003cp\u003e- Tin học văn phòng (Thành thạo- bắt buộc)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có năng lực chuyên môn Kế toán tài chính chuyên sâu\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKiến thức\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-  ≥ 05 năm kinh nghiệm làm việc ở vị trí Kế toán trưởng các Công ty có quy mô từ 50 nhân sự trở lên; \u003c/p\u003e\u003cp\u003e- Doanh nghiệp có nghiệp vụ phát sinh nhiều từ 200 chứng từ trong 01 ngày\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm xây dựng, triển khai hệ thống, các công cụ phần mềm kế toán\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm xây dựng quy trình, mô tả công việc\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm làm việc với các tổ chức tín dụng \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng \u0026 Phẩm chất\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Quản lý thời gian \u0026 nhóm \u003c/p\u003e\u003cp\u003e- Tổ chức công việc \u0026 phân tích- xử lý thông tin\u003c/p\u003e\u003cp\u003e- Quản lý theo mục tiêu.\u003c/p\u003e\u003cp\u003e-  Ra quyết định\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhẩm chất:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trách nhiệm cao, tận tâm với công việc\u003c/p\u003e\u003cp\u003e- Chủ động\u003c/p\u003e\u003  vận hành. Đặc biệt, nhờ am hiểu thị trường. Đức Minh đã thực hiện nhiều điều chỉnh trên thiết kế thiết bị nhằm đáp ứng thói quen vận hành thực tế tại điểm bản cũng như phù hợp với điều kiện khí hậu nóng ẩm đắc thủ tại Việt Nam. Không chỉ vậy, với lợi thế về công nghệ và sự chủ động trong sản xuất, bên cạnh cung cấp thiết bị đơn chiếc, Đức Minh còn có thể mạnh trong lĩnh vực tư vấn, hỗ trợ khách hàng tìm kiếm, thiết kế các giải pháp đồng bộ, có tính ứng dụng cao, đáp ứng tốt các nhu cầu chuyên biệt, phức tạp như thiết bị quầy bar, hệ thống tủ trưng bày siêu thị hay những sản phẩm sản xuất theo yêu cầu có giá trị cao như tủ rượu vang, máy làm đá pha lên"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:T96b,"])</script><script>self.__next_f.push([1,"Công ty TNHH Thương mại và Sản xuất Đức Minh tự hào là đơn vị đầu tiên phát triển giải pháp bảo quản, chiết rót cho dòng sản phẩm bia tươi (bia hơi) đáp ứng các tiêu chí vận hành đặc thù của thị trường nội địa. Cho tới nay, Đức Minh đã trở thành thương hiệu bảo chứng chất lượng cho thiết bị bảo quản - chiết rót bia chất lượng cao, đáp ứng yêu cầu khắt khe cả về kỹ thuật lần vận hành của nhiều hãng bia lớn như bia hơi Hà Nội, bia tươi Sài Gòn, Carlsberg, ... cùng nhiều hãng bia thủ công khác. Trong hơn 12 năm qua, Đức Minh đã không ngừng nâng cấp công nghệ, mở rộng quy mô sản xuất, tối ưu chất lượng sản phẩm và giá thành. Nhờ đó, bên cạnh mặt hàng chủ lực là các thiết bị bảo quản, chiết rót bia, Đức Minh đã dần khẳng định được sự uy tin và vị thế hàng đầu trong vai trò nhà sản xuất nội địa các thiết bị điện lạnh công nghiệp. Sản phẩm tủ đông lạnh công nghiệp mang thương hiệu Đức Minh đã được thị trường ghi nhận đạt chất lượng tương đương thiết bị nhập khẩu từ các thương hiệu nổi tiếng. Mọi sản phẩm được sản xuất bởi Đức Minh đều được chủ trọng tối ưu công năng chính, hưởng đến độ bền và tính ổn định trong vận hành. Đặc biệt, nhờ am hiểu thị trường. Đức Minh đã thực hiện p\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. QT/T Tổ chức công tác hạch toán kế toán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiểm tra, phê duyệt bộ ĐNTT, chứng từ kế toán.\u003c/p\u003e\u003cp\u003e• Giám sát hạch toán theo đúng chuẩn mực và quy định hiện hành.\u003c/p\u003e\u003cp\u003e• Kiểm soát công tác đối chiếu, kiểm tra số liệu giữa các bộ phận (kho, công nợ, ngân hàng, quỹ,…).\u003c/p\u003e\u003cp\u003e• Tổ chức kiểm kê quỹ, hàng hóa, tài sản định kỳ.\u003c/p\u003e\u003cp\u003e• Kiểm tra, hướng dẫn việc lưu trữ chứng từ, sổ sách khoa học.\u003c/p\u003e\u003cp\u003e• Quản lý công tác hoàn thiện, sắp xếp, lưu trữ bộ chứng từ thu/chi căn cứ quy định của luật thuế, luật kế toán và quy định nội bộ của công ty.\u003c/p\u003e\u003cp\u003e• Chỉ đạo chuẩn bị hồ sơ phục vụ kiểm toán, thanh tra, quyết toán thuế.\u003c/p\u003e\u003cp\u003e• Đảm bảo dữ liệu phục vụ kiểm toán, thanh tra. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. QT/T Lập kế hoạch và quản lý tài chính – ngân sách\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tìm hiểu, cập nhật lãi suất hiện tại từng thời điểm của thị trường.\u003c/p\u003e\u003cp\u003e• Đàm phán lãi suất và các biểu phí với các ngân hàng hoạt động.\u003c/p\u003e\u003cp\u003e• Điều hành \u0026 phê duyệt các vấn đề về thế chấp tài sản, rút tài sản, tăng giảm hạn mức với các ngân hàng.\u003c/p\u003e\u003cp\u003e• Điều hành và phê duyệt các vấn đề khác liên quan đến ngân hàng.\u003c/p\u003e\u003cp\u003e• Đánh giá công tác kiểm tra tính đúng đắn của các nghiệp vụ vay vốn.\u003c/p\u003e\u003cp\u003e• Lập kế hoạch tài chính năm, quý, tháng.\u003c/p\u003e\u003cp\u003e• Xây dựng dự toán thu – chi, dòng tiền, ngân sách.\u003c/p\u003e\u003cp\u003e• Theo dõi thực hiện ngân sách, phân tích chênh lệch so với kế hoạch.\u003c/p\u003e\u003cp\u003e• Quản lý dòng tiền, đảm bảo khả năng thanh toán.\u003c/p\u003e\u003cp\u003e• Làm việc với ngân hàng, tổ chức tín dụng về vay, bảo lãnh, lãi suất.\u003c/p\u003e\u003cp\u003e• Tham mưu phương án huy động và sử dụng vốn hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. QT/T Quản lý và kiểm soát chi phí, giá thành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng định mức chi phí cho từng hoạt động, dự án.\u003c/p\u003e\u003cp\u003e• Kiểm soát chi phí phát sinh, đảm bảo hợp lý, hợp lệ.\u003c/p\u003e\u003cp\u003e• Kiểm soát chi phí giá thành sản phẩm/dịch vụ.\u003c/p\u003e\u003cp\u003e• Phân tích chênh lệch chi phí, đề xuất tiết giảm.\u003c/p\u003e\u003cp\u003e• Báo cáo chi phí theo đơn vị, dự án, sản phẩm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. QT/T Quản lý công tác thuế và tuân thủ pháp luật tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiểm soát công tác:\u003c/p\u003e\u003cp\u003e  + Kê khai, nộp thuế đúng quy định (GTGT, TNDN, TNCN...).\u003c/p\u003e\u003cp\u003e  + Hoàn thiện, sắp xếp, lưu trữ hồ sơ chứng từ, hóa đơn hợp lý, hợp lệ từ đầu vào – đầu ra.\u003c/p\u003e\u003cp\u003e  + Cập nhật chính sách thuế, hướng dẫn áp dụng đúng luật.\u003c/p\u003e\u003cp\u003e  + Công tác lưu trữ hồ sơ kế toán, hồ sơ thuế phục vụ quyết toán.\u003c/p\u003e\u003cp\u003e• Làm việc và giải trình với cơ quan thuế, kiểm toán khi cần.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. QT/T Phân tích và tham mưu tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiểm soát công tác:\u003c/p\u003e\u003cp\u003e  + Lập báo cáo tài chính tháng, quý, năm.\u003c/p\u003e\u003cp\u003e  + Lập báo cáo quản trị nội bộ theo đơn vị, sản phẩm, dự án.\u003c/p\u003e\u003cp\u003e• Phân tích kết quả kinh doanh: doanh thu, chi phí, lợi nhuận, dòng tiền...\u003c/p\u003e\u003cp\u003e• Đánh giá rủi ro tài chính.\u003c/p\u003e\u003cp\u003e• Tham mưu chính sách tài chính, kế hoạch đầu tư cho Ban Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Kiểm soát nội bộ và phòng ngừa rủi ro tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng hệ thống kiểm soát nội bộ tài chính – kế toán.\u003c/p\u003e\u003cp\u003e• Kiểm soát, đánh giá việc tuân thủ quy trình, quy chế tài chính.\u003c/p\u003e\u003cp\u003e• Thiết lập cơ chế phê duyệt hai cấp cho các khoản chi lớn.\u003c/p\u003e\u003cp\u003e• Phát hiện, ngăn ngừa gian lận hoặc sai phạm tài chính.\u003c/p\u003e\u003cp\u003e• Báo cáo BGĐ khi có rủi ro phát sinh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Quan hệ đối ngoại trong lĩnh vực tài chính – kế toán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Làm việc với cơ quan thuế, ngân hàng, kiểm toán, bảo hiểm.\u003c/p\u003e\u003cp\u003e• Duy trì quan hệ tốt với đối tác tài chính, đảm bảo giao dịch thuận lợi.\u003c/p\u003e\u003cp\u003e• Đại diện công ty trong các cuộc kiểm toán, thanh tra.\u003c/p\u003e\u003cp\u003e• Điều hành công tác chuẩn bị hồ sơ, tài liệu theo yêu cầu của cơ quan quản lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e9. Thực hiện công việc khác theo phân công của Ban Giám đốc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tham gia họp điều hành, hỗ trợ xây dựng quy chế tài chính, lương – thưởng.\u003c/p\u003e\u003cp\u003e• Thực hiện nhiệm vụ đột xuất hoặc các dự án nội bộ khi được giao.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T7d5,\u003cp\u003e\u003cstrong\u003eTrình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Cao đẳng, Đại học ( Bắt Buộc)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChuyên ngành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tài chính - Kế toán ( Bắt buộc)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChứng chỉ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chứng chỉ Kế toán Trưởng (Bắt buộc) \u003c/p\u003e\u003cp\u003e- Tin học văn phòng (Thành thạo- bắt buộc)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u ệ và sự chủ động trong sản xuất, bên cạnh cung cấp thiết bị đơn chiếc, Đức Minh còn có thể mạnh trong lĩnh vực tư vấn, hỗ trợ khách hàng tìm kiếm, thiết kế các giải pháp đồng bộ, có tính ứng dụng cao, đáp ứng tốt các nhu cầu chuyên biệt, phức tạp như thiết bị quầy bar, hệ thống tủ trưng bày siêu thị hay những sản phẩm sản xuất theo yêu cầu có giá trị cao như tủ rượu vang, máy làm đá pha lên"])</script><script>self.__next_f.push([1,"42:{\"companyId\":301909,\"jobImageURLs\":\"$43\",\"jobVideoURLs\":null,\"companyName\":\"Công Ty TNHH Thương Mại Và Sản Xuất Đức Minh\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/c8/11233629.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"Phòng Hành chính - Nhân sự\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Km 10, đại lộ Thăng Long, An Khánh, Hoài Đức, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n46:{\"serviceCode\":\"TPM\",\"startOn\":\"2026-03-02T11:09:09+07:00\",\"expiredOn\":\"2026-05-03T23:59:59+07:00\"}\n47:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-03-02T11:09:09+07:00\",\"expiredOn\":\"2026-05-03T23:59:59+07:00\"}\n45:[\"$46\",\"$47\"]\n48:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"28:{\"jobId\":2016601,\"jobTitle\":\"Trưởng Phòng Tài Chính Kế Toán (Lương Hấp Dẫn) / Thu Nhập 35 Triệu VND\",\"userId\":5637175,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/c8/11233629.png\",\"alias\":\"truong-phong-tai-chinh-ke-toan-luong-hap-dan-thu-nhap-35-trieu-vnd\",\"createdOn\":\"2026-03-02T11:07:45+07:00\",\"approvedOn\":\"2026-04-03T13:41:31+07:00\",\"expiredOn\":\"2026-05-03T23:59:59+07:00\",\"lastUpda
