ng máy tòa nhà, kênh Poster thang máy tòa nhà, kênh LED và Poster sân bay, kênh TV siêu thị, phủ sóng tại hơn 3000 toà nhà, 14 sân bay, 40 siêu thị trên 25 tỉnh thành phố trên toàn quốc, tiếp cận hơn 40 triệu lượt người tiêu dùng chủ lực tại thành phố mỗi ngày, là “Nền tảng truyền thông kỹ thuật số ngoài trời hiệu quả nhất” tại Việt Nam. \r\nNăm 2022, Chicilon Media nhận được rót vốn 38 triệu USD từ quỹ Vinacapital, tiếp tục khẳng định vị thế dẫn đầu và không ngừng mở rộng quy mô thị phần trên thị trường.  \r\nChicilon Media là đơn vị truyền thông 5 năm liên tiếp lọt trong Top 500 công ty tăng trưởng nhanh nhất và có lợi nhuận tốt nhất tại Việt Nam, cũng như 2 năm liên tiếp được Cục thuế Thành phố bình chọn là đơn vị nộp thuế tiêu biểu.  Hiện nay Chicilon Media là thành viên Ban điều hành của Tổ chức Tiếp thị Thế giới (MMA) và là đơn vị thành viên của Hiệp hội Truyền thông Ngoài trời Quốc tế (WOO), Công ty cũng đóng vai trò là cố vấn cấp cao duy nhất của Hiệp hội Quảng cáo Việt Nam(VAA) và là công ty truyền thông duy nhất áp dụng quy chế về Chống hối lộ Chống tham nhũng (ABAC) do PWC Singapore xây dựng trong hoạt động kinh doanh của công ty.\r\n\r\nTầm nhìn của chúng tôi:\r\n- Xây dựng môi trường tập trung nhân tài trong ngành truyền thông, thông qua việc lựa chọn đội ngũ nhân sự “có tâm, có tài, có tầm” để không ngừng mở rộng quy mô đội nhóm. \r\n- Tạo dựng môi trường doanh nghiệp theo mô hình học hỏi “Học từ mọi người, học mọi lúc, học mọi nơi”. Trong năm 2023, công ty đã tổ chức 35 khoá đào tạo để không ngừng nâng cao năng lực cho đội ngũ nhân viên. \r\n- Thiết lập một nền tảng học tập đổi mới thông qua hợp tác với các trường đại học hàng đầu tại Việt Nam để cung cấp cơ hội học tập và phát triển nghề nghiệp liên tục.\r\n\r\nNếu bạn là người luôn sẵn sàng đón chờ những thử thách và yêu thích sự sáng tạo đổi mới, hãy sẵn sàng gửi CV của mình để cùng gia nhập vào gia đình Chicilon Media. Chúng tôi tin rằng với sự nỗ lực chung tay của tất cả mọi người, Chicilon Media chắc chắn sẽ chinh phục được những tầm cao hơn nữa.\r\n\r\nChicilon Media mong chờ sự gia nhập của Bạn!"])</script><script>self.__next_f.push([1,"24:T1131,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eĐỊA ĐIỂM LÀM VIỆC\u003c/strong\u003e: Tầng 30 tháp Tây, Tòa Lotte Center, 54 Liễu Giai, Giảng Võ, Hà Nội\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eI. GIỚI THIỆU VỀ VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm \u003cstrong\u003eđầu cuối\u003c/strong\u003e cho toàn bộ hoạt động lắp đặt, bàn giao và sẵn sàng vận hành hệ thống thiết bị quảng cáo của Chicilon Media tại \u003cstrong\u003esiêu thị, điểm bán lẻ và tòa nhà\u003c/strong\u003e trong khu vực được phân công. Đây là vai trò quản lý hiện trường, không chỉ đảm bảo việc lắp đặt đúng kỹ thuật mà còn chịu trách nhiệm về \u003cstrong\u003etiến độ, chất lượng, tuân thủ, chi phí và trải nghiệm của các bên liên quan\u003c/strong\u003e. Người đảm nhiệm vị trí này đóng vai trò then chốt trong việc mở rộng và vận hành hiệu quả hệ sinh thái \u003cstrong\u003eDOOH \u0026 Retail Media ứng dụng 4G, NFC và AI\u003c/strong\u003e của Chicilon trên toàn quốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. TRÁCH NHIỆM \u0026 NHIỆM VỤ CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm tổng thể cho hoạt động lắp đặt thiết bị quảng cáo tại siêu thị, điểm bán lẻ, tòa nhà và các địa điểm triển khai khác trong khu vực phụ trách.\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch, tổ chức và điều phối thi công đảm bảo hoàn thành đúng tiến độ, đúng phạm vi và sẵn sàng đưa vào vận hành hệ thống.\u003c/p\u003e\u003cp\u003e•\tQuản lý trực tiếp đội ngũ kỹ thuật viên cố định và nhân sự thời vụ/thuê ngoài, đảm bảo nguồn lực đáp ứng yêu cầu dự án.\u003c/p\u003e\u003cp\u003e•\tChuẩn hóa quy trình và thao tác thi công nhằm đảm bảo chất lượng đồng đều, khả năng triển khai hàng loạt và dễ nhân rộng.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo việc tuân thủ nghiêm ngặt các quy định về điện, an toàn lao động, PCCC và quy chuẩn thi công tại siêu thị, tòa nhà.\u003c/p\u003e\u003cp\u003e•\tTrực tiếp làm việc và điều phối với ban quản lý siêu thị, ban quản lý tòa nhà, chủ đầu tư và các đầu mối liên quan tại hiện trường.\u003c/p\u003e\u003cp\u003e•\tChủ động xử lý các tình huống phát sinh trong quá trình thi công nhằm tránh gián đoạn, khiếu nại hoặc ảnh hưởng đến tiến độ dự án.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo mỗi điểm lắp đặt được nghiệm thu đầy đủ với hình ảnh hiện trường, mã IP, thông tin thiết bị và biên bản nghiệm thu hợp lệ.\u003c/p\u003e\u003cp\u003e•\tQuản lý và lưu trữ hồ sơ lắp đặt, nghiệm thu để sẵn sàng cho việc kiểm tra nội bộ hoặc đối soát với khách hàng.\u003c/p\u003e\u003cp\u003e•\tKiểm soát chi phí nhân công, chi phí thi công và hạn chế tối đa việc thi công lại gây lãng phí nguồn lực.\u003c/p\u003e\u003cp\u003e•\tTheo dõi và đánh giá hiệu suất thi công của đội ngũ, đề xuất các giải pháp cải tiến nhằm nâng cao hiệu quả vận hành.\u003c/p\u003e\u003cp\u003e•\tPhối hợp chặt chẽ với các phòng ban Kinh doanh, Phát triển truyền thông, Vận hành và Kỹ thuật để đảm bảo tiến độ dự án.\u003c/p\u003e\u003cp\u003e•\tBáo cáo định kỳ về tình hình lắp đặt, tiến độ, chất lượng và các rủi ro phát sinh cho cấp quản lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***PHÚC LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Chế độ lương phù hợp với năng lực;\u003c/p\u003e\u003cp\u003e• Thưởng tháng 13, thưởng Lễ/Tết và các chương trình khen thưởng khác theo kết quả hoạt động;\u003c/p\u003e\u003cp\u003e• Được hưởng các chế độ phúc lợi từ công ty: Tham gia BHXH , Team building hàng năm, du lịch nước ngoài (dành cho nhân viên xuất sắc), khám sức khoẻ tổng quát định kì, bảo hiểm sức khoẻ, hỗ trợ học phí con học mẫu giáo với những nhân viên đạt tiêu chuẩn...;\u003c/p\u003e\u003cp\u003e• Cơ hội phát triển: Lộ trình thăng tiến minh bạch, có cơ hội đề bạt lên vị trí Quản lý cao hơn. Đánh giá hiệu suất định kỳ và xét tăng lương hàng năm;\u003c/p\u003e\u003cp\u003e• Đào tạo và nâng cao năng lực: Được tham gia các khóa đào tạo chuyên môn, kỹ năng mềm. Có cơ hội tham dự các hội thảo trong ngành và các chương trình đào tạo chuyên sâu.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T6b2,\u003cp\u003e•\tTốt nghiệp đại học các ngành liên quan đến điện, điện tử, kỹ thuật, xây dựng hoặc các lĩnh vực tương đương.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCó tối thiểu 08 năm kinh nghiệm\u003c/strong\u003e trong lĩnh vực lắp đặt thiết bị quảng cáo, thiết bị siêu thị, điện nhẹ hoặc thiết bị thông minh.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCó kinh nghiệm quản lý đội ngũ thi công hoặc kỹ thuật từ 5 người trở lên\u003c/strong\u003e trong môi trường dự án.\u003c/p\u003e\u003cp\u003e•\tHiểu rõ quy trình thi công, tiêu chuẩn kỹ thuật và các yêu cầu an toàn tại siêu thị, tòa nhà hoặc không gian công cộng.\u003c/p\u003e\u003cp\u003e•\tCó khả năng lập kế hoạch, điều phối nhân sự và quản lý nhiều điểm lắp đặt song song.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp và làm việc với ban quản lý, chủ đầu tư và các bên liên quan tại hiện trường.\u003c/p\u003e\u003cp\u003e•\tCó khả năng xử lý tình huống, giải quyết vấn đề và ra quyết định nhanh trong môi trường áp lực cao.\u003c/p\u003e\u003cp\u003e•\tSẵn sàng làm việc ngoài giờ, thi công ban đêm và đi công tác theo yêu cầu dự án.\u003c/p\u003e\u003cp\u003e•\tCó tinh thần trách nhiệm cao, chủ động trong công việc và chịu trách nhiệm đến cùng cho kết quả.\u003c/p\u003e\u003cp\u003e•\tCó tư duy quản lý chi phí, tối ưu nguồn lực và chú trọng hiệu quả dài hạn.\u003c/p\u003e\u003cp\u003e•\tKhông đổ lỗi, có khả năng dẫn dắt và xây dựng đội ngũ thi công kỷ luật, chuyên nghiệp.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên đã từng triển khai dự án quy mô lớn hoặc hệ thống nhiều điểm lắp đặt trên diện rộng.\u003c/p\  quảng cáo của Chicilon Media tại \u003cstrong\u003esiêu thị, điểm bán lẻ và tòa nhà\u003c/strong\u003e trong khu vực được phân công. Đây là vai trò quản lý hiện trường, không chỉ đảm bảo việc lắp đặt đúng kỹ thuật mà còn chịu trách nhiệm về \u003cstrong\u003etiến độ, chất lượng, tuân thủ, chi phí và trải nghiệm của các bên liên quan\u003c/strong\u003e. Người đảm nhiệm vị trí này đóng vai trò then chốt trong việc mở rộng và vận hành hiệu quả hệ sinh thái \u003cstrong\u003eDOOH \u0026 Retail Media ứng dụng 4G, NFC và AI\u003c/strong\u003e của Chicilon trên toàn quốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. TRÁCH NHIỆM \u0026 NHIỆM VỤ CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm tổng thể cho hoạt động lắp đặt thiết bị quảng cáo tại siêu thị, điểm bán lẻ, tòa nhà và các địa điểm triển khai khác trong khu vực phụ trách.\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch, tổ chức và điều phối thi công đảm bảo hoàn thành đúng tiến độ, đúng phạm vi và sẵn sàng đưa vào vận hành hệ thống.\u003c/p\u003e\u003cp\u003e•\tQuản lý trực tiếp đội ngũ kỹ thuật viên cố định và nhân sự thời vụ/thuê ngoài, đảm bảo nguồn lực đáp ứng yêu cầu dự án.\u003c/p\u003e\u003cp\u003e•\tChuẩn hóa quy trình và thao tác thi công nhằm đảm bảo chất lượng đồng đều, khả năng triển khai hàng loạt và dễ nhân rộng.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo việc tuân thủ nghiêm ngặt các quy định về điện, an toàn lao động, PCCC và quy chuẩn thi công tại siêu thị, tòa nhà.\u003c/p\u003e\u003cp\u003e•\tTrực tiếp làm việc và điều phối với ban quản lý siêu thị, ban quản lý tòa nhà, chủ đầu tư và các đầu mối liên quan tại hiện trường.\u003c/p\u003e\u003cp\u003e•\tChủ động xử lý các tình huống phát sinh trong quá trình thi công nhằm tránh gián đoạn, khiếu nại hoặc ảnh hưởng đến tiến độ dự án.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo mỗi điểm lắp đặt được nghiệm thu đầy đủ với hình ảnh hiện trường, mã IP, thông tin thiết bị và biên bản nghiệm thu hợp lệ.\u003c/p\u003e\u003cp\u003e•\tQuản lý và lưu trữ hồ sơ lắp đặt, nghiệm thu để sẵn sàng cho việc kiểm tra nội bộ hoặc đối soát với khách hàng.\u003c/p\u003e\u003cp\u003e•\tKiểm soát chi phí nhân công, chi phí thi công và hạn chế tối đa việc thi công lại gây lãng phí nguồn lực.\u003c/p\u003e\u003cp\u003e•\tTheo dõi và đánh giá hiệu suất thi công của đội ngũ, đề xuất các giải pháp cải tiến nhằm nâng cao hiệu quả vận hành.\u003c/p\u003e\u003cp\u003e•\tPhối hợp chặt chẽ với các phòng ban Kinh doanh, Phát triển truyền thông, Vận hành và Kỹ thuật để đảm bảo tiến độ dự án.\u003c/p\u003e\u003cp\u003e•\tBáo cáo định kỳ về tình hình lắp đặt, tiến độ, chất lượng và các rủi ro phát sinh cho cấp quản lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***PHÚC LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Chế độ lương phù hợp với năng lực;\u003c/p\u003e\u003cp\u003e• Thưởng tháng 13, thưởng Lễ/Tết và các chương trình khen thưởng khác theo kết quả hoạt động;\u003c/p\u003e\u003cp\u003e• Được hưởng các chế độ phúc lợi từ công ty: Tham gia BHXH , Team building hàng năm, du lịch nước ngoài (dành cho nhân viên xuất sắc), khám sức khoẻ tổng quát định kì, bảo hiểm sức khoẻ, hỗ trợ học phí con học mẫu giáo với những nhân viên đạt tiêu chuẩn...;\u003c/p\u003e\u003cp\u003e• Cơ hội phát triển: Lộ trình thăng tiến minh bạch, có cơ hội đề bạt lên vị trí Quản lý cao hơn. Đánh giá hiệu suất định kỳ và xét tăng lương hàng năm;\u003c/p\u003e\u003cp\u003e• Đào tạo và nâng cao năng lực: Được tham gia các khóa đào tạo chuyên môn, kỹ năng mềm. Có cơ hội tham dự các hội thảo trong ngành và các chương trình đào tạo chuyên sâu.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T6b2,\u003cp\u003e•\tTốt nghiệp đại học các ngành liên quan đến điện, điện tử, kỹ thuật, xây dựng hoặc các lĩnh vực tương đương.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCó tối thiểu 08 năm kinh nghiệm\u003c/strong\u003e trong lĩnh vực lắp đặt thiết bị quảng cáo, thiết bị siêu thị, điện nhẹ hoặc thiết bị thông minh.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCó kinh nghiệm quản lý đội ngũ thi công hoặc kỹ thuật từ 5 người trở lên\u003c/strong\u003e trong môi trường dự án.\u003c/p\u003e\u003cp\u003e•\tHiểu rõ quy trình thi công, tiêu chuẩn kỹ thuật và các yêu cầu an toàn tại siêu thị, tòa nhà hoặc không gian công cộng.\u003c/p\u003e\u003cp\u003e•\tCó khả năng lập kế hoạch, điều phối nhân sự và quản lý nhiều điểm lắp đặt song song.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp và làm việc với ban quản lý, chủ đầu tư và các bên liên quan tại hiện trường.\u003c/p\u003e\u003cp\u003e•\tCó khả năng xử lý tình huống, giải quyết vấn đề và ra quyết định nhanh trong môi trường áp lực cao.\u003c/p\u003e\u003cp\u003e•\tSẵn sàng làm việc ngoài giờ, thi công ban đêm và đi công tác theo yêu cầu dự án.\u003c/p\u003e\u003cp\u003e•\tCó tinh thần trách nhiệm cao, chủ động trong công việc và chịu trách nhiệm đến cùng cho kết quả.\u003c/p\u003e\u003cp\u003e•\tCó tư duy quản lý chi phí, tối ưu nguồn lực và chú trọng hiệu quả dài hạn.\u003c/p\u003e\u003cp\u003e•\tKhông đổ lỗi, có khả năng dẫn dắt và xây dựng đội ngũ thi công kỷ luật, chuyên nghiệp.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên đã từng triển khai dự án quy mô lớn hoặc hệ thống nhiều điểm lắp đặt trên diện rộng.\u003c/p\u003e2d:{\"skillName\":\"Kênh Siêu Thị\",\"skillId\":1277495,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Thi Công Xây Lắp\",\"skillId\":589325,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Điện\",\"skillId\":809,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"Điện Tử\",\"skillId\":339,\"skillWeight\":100,\"i"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"sExisted\":false}\n31:{\"skillName\":\"Kỹ Thuật Toà Nhà\",\"skillId\":719208,\"skillWeight\":100,\"isExisted\":false}\n2c:[\"$2d\",\"$2e\",\"$2f\",\"$30\",\"$31\"]\n33:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitNa
