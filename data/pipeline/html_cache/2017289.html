gement, Business Administration, Investment Economics, Software, or Construction.\u003c/p\u003e\u003cp\u003e- Certifications in Data or related fields will be advantageous.\u003c/p\u003e\u003cp\u003e- Current work experience in roles that require strong data and logical skills, such as Growth Marketing, Auditing, Finance, Data Analysis\u003c/p\u003e\u003cp\u003e- 2+ years of experience in build, lead \u0026 managing a team of 5-10 members in digital marketing, users acquisition, growth hacking, or paid media.\u003c/p\u003e\u003cp\u003e- Proven track record of managing and scaling paid ad campaigns with multi-million dollar ad spend across platforms like Meta (Facebook \u0026 Instagram Ads), Google Ads, TikTok, and other digital channels\u003c/p\u003e\u003cp\u003e- Proficiency in BI tools, marketing automation, or advanced analytics (SQL, Python, or similar is a plus\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWHAT YOU CAN EXPECT\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAt Crossian, our people are the key to our success. We believe in creating an attractive total compensation package (TCP) that not only retains employees but allows them to excel in their profession. These include\u003c/p\u003e\u003cp\u003e- Attractive salary, bonus, fair and transparent scheme, income up to $10,000/month (basic salary up to $2000 depending on seniority + monthly commission)\u003c/p\u003e\u003cp\u003e- No Micro-management, we focus on objective oriented\u003c/p\u003e\u003cp\u003e- 100% remote working flexibility, non-binding working time and space according to office hours\u003c/p\u003e\u003cp\u003e- Full salary during probation\u003c/p\u003e\u003cp\u003e- 15+ days of paid annual leave\u003c/p\u003e\u003cp\u003e- Global health insurance package for yourself\u003c/p\u003e\u003cp\u003e- Guaranteed 13th month salary\u003c/p\u003e\u003cp\u003e- Special Company Year-end bonus \u0026 Department Year-end bonus as part of our profit sharing progra
