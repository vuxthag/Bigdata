-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tc7a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJOB PURPOSE | MỤC ĐÍCH CÔNG VIỆC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Manage the ceramic production process to ensure efficiency, quality, cost control, and on-time delivery.\u003c/p\u003e\u003cp\u003e- Quản lý quy trình sản xuất gốm sứ nhằm đảm bảo hiệu suất, chất lượng, kiểm soát chi phí và tiến độ giao hàng.\u003c/p\u003e\u003cp\u003e- Lead and develop the production team for high performance and continuous improvement.\u003c/p\u003e\u003cp\u003e- Lãnh đạo và phát triển đội ngũ sản xuất hướng đến hiệu quả cao và cải tiến liên tục.\u003c/p\u003e\u003cp\u003e- Ensure safe operations and compliance with company standards.\u003c/p\u003e\u003cp\u003eĐảm bảo hoạt động an toàn và tuân thủ các tiêu chuẩn của công ty.\u003c/p\u003e\u003cp\u003e- Collaborate across departments to support product quality and customer satisfaction.\u003c/p\u003e\u003cp\u003e- Phối hợp liên phòng ban nhằm nâng cao chất lượng sản phẩm và sự hài lòng của khách hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKEY RESPONSIBILITIES | TRÁCH NHIỆM CHÍNH:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Plan, organize, and control daily ceramic production to meet company goals.\u003c/p\u003e\u003cp\u003eLập kế hoạch, tổ chức và kiểm soát hoạt động sản xuất hằng ngày nhằm đạt chỉ tiêu của công ty.\u003c/p\u003e\u003cp\u003e- Supervise all stages: material preparation, molding/forming, firing, glazing, finishing, and packaging.\u003c/p\u003e\u003cp\u003e- Giám sát toàn bộ các công đoạn: chuẩn bị nguyên liệu, định hình, nung, tráng men, hoàn thiện và đóng gói.\u003c/p\u003e\u003cp\u003e- Ensure production output, quality, and delivery schedules are achieved.\u003c/p\u003e\u003cp\u003eĐảm bảo sản lượng, chất lượng và tiến độ giao hàng được thực hiện đúng kế hoạch.\u003c/p\u003e\u003cp\u003e- Implement and maintain lean production processes to improve efficiency and reduce waste.\u003c/p\u003e\u003cp\u003eÁp dụng và duy trì quy trình sản xuất tinh gọn nhằm nâng cao hiệu suất và giảm thiểu lãng phí.\u003c/p\u003e\u003cp\u003e- Coordinate with Engineering and Maintenance teams to ensure equipment reliability.\u003c/p\u003e\u003cp\u003e- Phối hợp với bộ phận Kỹ thuật và Bảo trì để đảm bảo máy móc hoạt động ổn định.\u003c/p\u003e\u003cp\u003e- Monitor and control production costs, materials, labor, and energy usage.\u003c/p\u003e\u003cp\u003eTheo dõi và kiểm soát chi phí sản xuất, nguyên vật liệu, nhân công và năng lượng.\u003c/p\u003e\u003cp\u003e- Lead, train, and develop production teams to maintain a skilled and motivated workforce.\u003c/p\u003e\u003cp\u003eLãnh đạo, đào tạo và phát triển đội ngũ sản xuất nhằm duy trì nguồn nhân lực có tay nghề và tinh thần làm việc cao.\u003c/p\u003e\u003cp\u003e- Ensure compliance with safety, environmental, and quality standards.\u003c/p\u003e\u003cp\u003eĐảm bảo tuân thủ các tiêu chuẩn về an toàn, môi trường và chất lượng.\u003c/p\u003e\u003cp\u003e- Work closely with QC, Logistics, and Planning departments to support smooth operations.\u003c/p\u003e\u003cp\u003ePhối hợp chặt chẽ với các bộ phận QC, Kho vận và Kế hoạch để đảm bảo hoạt động sản xuất liên tục và hiệu quả.\u003c/p\u003e\u003cp\u003e- Prepare regular production reports and propose improvement actions.\u003c/p\u003e\u003cp\u003eLập báo cáo sản xuất định kỳ và đề xuất các giải pháp cải tiến.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T1028,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eEDUCATIONAL REQUIREMENTS | HỌC VẤN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Bachelor’s degree in Mechanical Engineering, Industrial Management, or related technical fields.\u003c/p\u003e\u003cp\u003eTốt nghiệp Đại học chuyên ngành Kỹ thuật Cơ khí, Quản lý Công nghiệp hoặc các ngành kỹ thuật liên quan.\u003c/p\u003e\u003cp\u003e- Additional certifications in Production Management, Lean Manufacturing, or Six Sigma are preferred.\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên có chứng chỉ về Quản lý Sản xuất, Lean Manufacturing hoặc Six Sigma.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYEARS OF PROFESSIONAL EXPERIENCE | SỐ NĂM KINH NGHIỆM CHUYÊN MÔN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- At least 5 years of experience in production management, preferably in ceramics, furniture, or export manufacturing.\u003c/p\u003e\u003cp\u003eTối thiểu 5 năm kinh nghiệm trong lĩnh vực quản lý sản xuất, ưu tiên ngành gốm sứ, nội thất hoặc sản xuất xuất khẩu.\u003c/p\u003e\u003cp\u003e- Proven experience managing large-scale factory operations and leading multi-shift production teams.\u003c/p\u003e\u003cp\u003eCó kinh nghiệm quản lý vận hành nhà máy quy mô lớn và lãnh đạo đội ngũ sản xuất làm việc theo ca.\u003c/p\u003e\u003cp\u003e- Experience in process optimization, cost reduction, and productivity improvement.\u003c/p\u003e\u003cp\u003eCó kinh nghiệm tối ưu quy trình, giảm chi phí và cải thiện năng suất sản xuất.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKNOWLEDGE | KIẾN THỨC CHUYÊN MÔN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Strong understanding of ceramic manufacturing processes: raw material mixing, molding, firing, glazing, and finishing.\u003c/p\u003e\u003cp\u003eHiểu rõ quy trình sản xuất gốm sứ: trộn nguyên liệu, tạo hình, nung, tráng men và hoàn thiện sản phẩm.\u003c/p\u003e\u003cp\u003e- Knowledge of production planning, inventory control, and quality management systems (ISO, 5S, Lean).\u003c/p\u003e\u003cp\u003eAm hiểu về lập kế hoạch sản xuất, kiểm soát tồn kho và hệ thống quản lý chất lượng (ISO, 5S, Lean).\u003c/p\u003e\u003cp\u003e- Familiar with machinery operation, maintenance basics, and energy efficiency in ceramic production.\u003c/p\u003e\u003cp\u003eNắm vững vận hành máy móc, kiến thức cơ bản về bảo trì và tối ưu hiệu quả năng lượng trong sản xuất gốm sứ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSKILLS | KỸ NĂNG:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Strong leadership and people management skills; ability to motivate and develop teams.\u003c/p\u003e\u003cp\u003eKỹ năng lãnh đạo và quản lý con người xuất sắc; có khả năng truyền động lực và phát triển đội ngũ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- \u003c/strong\u003eGood analytical and problem-solving skills; data-driven decision making.\u003c/p\u003e\u003cp\u003eKỹ năng phân tích và giải quyết vấn đề tốt; ra quyết định dựa trên dữ liệu.\u003c/p\u003e\u003cp\u003e- Effective communication and coordination across departments.\u003c/p\u003e\u003cp\u003eGiao tiếp và phối hợp hiệu quả giữa các phòng ban.\u003c/p\u003e\u003cp\u003e- Proficiency in production software and tools (ERP, MES, Excel, Power BI).\u003c/p\u003e\u003cp\u003eThành thạo phần mềm và công cụ quản lý sản xuất (ERP, MES, Excel, Power BI).\u003c/p\u003e\u003cp\u003e- Good command of English in both technical and managerial contexts.\u003c/p\u003e\u003cp\u003eSử dụng tiếng Anh tốt trong môi trường kỹ thuật và quản lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLANGUAGE SKILLS | KỸ NĂNG NGÔN NGỮ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Good English communication skills (both written and spoken) to work effectively with international teams and customers.\u003c/p\u003e\u003cp\u003eSử ing departments to support smooth operations.\u003c/p\u003e\u003cp\u003ePhối hợp chặt chẽ với các bộ phận QC, Kho vận và Kế hoạch để đảm bảo hoạt động sản xuất liên tục và hiệu quả.\u003c/p\u003e\u003cp\u003e- Prepare regular production reports and propose improvement actions.\u003c/p\u003e\u003cp\u003eLập báo cáo sản xuất định kỳ và đề xuất các giải pháp cải tiến.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:T1028,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eEDUCATIONAL REQUIREMENTS | HỌC VẤN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Bachelor’s degree in Mechanical Engineering, Industrial Management, or related technical fields.\u003c/p\u003e\u003cp\u003eTốt nghiệp Đại học chuyên ngành Kỹ thuật Cơ khí, Quản lý Công nghiệp hoặc các ngành kỹ thuật liên quan.\u003c/p\u003e\u003cp\u003e- Additional certifications in Production Management, Lean Manufacturing, or Six Sigma are preferred.\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên có chứng chỉ về Quản lý Sản xuất, Lean Manufacturing hoặc Six Sigma.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYEARS OF PROFESSIONAL EXPERIENCE | SỐ NĂM KINH NGHIỆM CHUYÊN MÔN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- At least 5 years of experience in production management, preferably in ceramics, furniture, or export manufacturing.\u003c/p\u003e\u003cp\u003eTối thiểu 5 năm kinh nghiệm trong lĩnh vực quản lý sản xuất, ưu tiên ngành gốm sứ, nội thất hoặc sản xuất xuất khẩu.\u003c/p\u003e\u003cp\u003e- Proven experience managing large-scale factory operations and leading multi-shift production teams.\u003c/p\u003e\u003cp\u003eCó kinh nghiệm quản lý vận hành nhà máy quy mô lớn và lãnh đạo đội ngũ sản xuất làm việc theo ca.\u003c/p\u003e\u003cp\u003e- Experience in process optimization, cost reduction, and productivity improvement.\u003c/p\u003e\u003cp\u003eCó kinh nghiệm tối ưu quy trình, giảm chi phí và cải thiện năng suất sản xuất.\u003c/p\u003e\u003
