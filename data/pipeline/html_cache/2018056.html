unks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T580,We are Pizza 4P's, a chain of Japanese Italian Pizza restaurants in Viet Nam. We serve classic Neapolitan pizza, as well as Japanese Italian fusion cuisine. Since we opened in 2011, we have been ranked as one of the top restaurants in HCMC by Tripadvisor and Foody.\r\nWe are not just the restaurants that serves good food. What we are aiming to offer to our guests is a “wow” moment that they will remember for a long time through our great food and heartfelt service.\r\nCurrently, we are opening many positions to find candidate who can share and pursue the same goal with us.\r\nWorking at Pizza 4P's is not easy. We are very keen to details and expect a lot from our staffs. But for those who are passionate about restaurant and hospitality field, it's going to be a great place to work and learn from.\r\nWe are expanding the restaurant not only in Ho Chi Minh City, but also are going to open new branches in other Southeast As"])</script><script>self.__next_f.push([1,"ian cities, such as Bangkok and Singapore. If you are looking for an environment where you can show your talent and passion in a global scale, this is the place to be!\r\n\r\nMORE ABOUT US.\r\nPizza 4P’s Website: http://pizza4ps.com/\r\nPizza 4P’s Facebook Page: https://www.facebook.com/Pizza4Ps\r\nPizza 4P’s Foody Reviews: http://www.foody.vn/ho-chi-minh/pizza-4p-s\r\nPizza 4P’s Tripadvisor Reviews: http://goo.gl/Lnukw\r\nPizza 4P’s New York Times Article: http://goo.gl/jQaCxC24:T1157,"])</script><script>self.__next_f.push([1,"\u003cp\u003eCompany Description\u003c/p\u003e\u003cp\u003e4P’s, headquartered in Ho Chi Minh City, Vietnam, operates 40 worldwide restaurants. Our main restaurant, Pizza 4P’s, has 35 stores in Vietnam and manages global franchises like IPPUDO and ABOUT LIFE COFFEE BREWERS. Our core products are food and beverages, specifically pizza, with key differentiators of \"House-made cheeses\", \"Earth-to-people\" and \"Omotenashi\" hospitality.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003ePizza 4P’s is an innovative Vietnam-based Japanese Italian pizza restaurant that started in Vietnam with a simple yet powerful mission: “Delivering Wow, Sharing Happiness”. We are known for crafting artisanal pizzas, homemade cheese, and unique East-meets-West flavors while embracing sustainability and community impact at the heart of everything we do. Today, we operate restaurants across Vietnam, Cambodia, Japan, India and Indonesia, and continue to grow with a vision of bringing people together through memorable dining experiences.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eJob Description\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eI. ROLE PURPOSE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe Project Supervisor (Factory)\u003c/strong\u003e is responsible for leading the planning, technical coordination, and execution of factory/production facility development projects, including new setup, expansion, renovation, and upgrading works.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThis role ensures all projects are delivered on time, within budget, and in line with operational, technical, safety, and food production requirements through hands-on coordination with internal stakeholders, consultants, contractors, and equipment suppliers.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. KEY ACCOUNTABILITIES\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Project Planning \u0026 Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Take charge of production projects (Central Kitchen, Cheese factory, etc.) from inception to completion.\u003c/p\u003e\u003cp\u003e• Manage and work closely with external project consultants and contractors.\u003c/p\u003e\u003cp\u003e• Define project scope, timeline, budget, and technical requirements with internal stakeholders.\u003c/p\u003e\u003cp\u003e• Monitor project progress to ensure delivery on time, within budget, and to expected quality standards.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Technical Coordination \u0026 Design Review\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Review and coordinate layout, architectural, structural, MEP, and utility designs to ensure practicality and operational fit.\u003c/p\u003e\u003cp\u003e• Align project requirements and technical solutions by collaborating with internal teams, consultants, and suppliers.\u003c/p\u003e\u003cp\u003e• Ensure designs support production flow, food safety, and long-term maintenance needs.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.Construction, Fit-out \u0026 Installation Execution\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Manage on-site execution including construction, fit-out, MEP works, and equipment coordination.\u003c/p\u003e\u003cp\u003e• Monitor progress, quality, safety, and compliance with approved drawings and specifications.\u003c/p\u003e\u003cp\u003e• Resolve technical and site issues promptly to minimize delays and rework.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Equipment \u0026 Utility Integration\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Coordinate production equipment installation and integration with building systems.\u003c/p\u003e\u003cp\u003e• Plan and execute utility systems including HVAC, electrical, plumbing, drainage, fire protection, and refrigeration.\u003c/p\u003e\u003cp\u003e• Support testing, commissioning, and trial operations before final handover.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCompliance, Handover \u0026 Documentation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Ensure projects comply with company standards and relevant local regulations.\u003c/p\u003e\u003cp\u003e• Coordinate final inspections, defect rectification, and project handover to operations/production teams.\u003c/p\u003e\u003cp\u003e• Maintain comprehensive project records, reports, and technical documentation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII. SUCCESS METRICS \u0026 KPIS\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Project Delivery Excellence\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• % of projects completed within the approved timeline and budget.\u003c/p\u003e\u003cp\u003e• % reduction in technical defects during the handover phase.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Operational Alignment\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Success rate of utility and equipment integration (Zero major failures during commissioning).\u003c/p\u003e\u003cp\u003e• Level of compliance with food safety and production flow design requirements.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Stakeholder Satisfaction\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eFeedback rating from the production/operations team post-handover.\u00
