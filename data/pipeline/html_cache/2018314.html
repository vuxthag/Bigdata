03e• Xây dựng niềm tin với 270.000 khách hàng là đơn vị HCSN, doanh nghiệp, 2.5 triệu khách hàng cá nhân tại Việt Nam và 20 quốc gia\u003c/p\u003e\u003cp\u003e• Hơn 100 giải thưởng trong ngành CNTT trong nước và quốc tế\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNền tảng vững chắc cho phát triển sự nghiệp, thăng tiến, quyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•Lương cứng cạnh tranh. Thưởng năng suất dựa trên kết quả công việc từ 2 tháng lương.\u003c/p\u003e\u003cp\u003e• Đánh giá review lương 2 lần/năm, nhiều cơ hội tăng lương 50-70%/năm, thưởng sáng kiến...\u003c/p\u003e\u003cp\u003e• Huấn luyện “Hổ tướng”: chương trình đào tạo quản lý tài năng, bệ phóng trở thành Chiến tướng tinh nhuệ\u003c/p\u003e\u003cp\u003e• Giải thưởng “Gấu vàng\": nơi tôn vinh những tài năng xuất sắc nhất\u003c/p\u003e\u003cp\u003e• Gói chăm sóc sức khỏe toàn diện tại Medlatec, cháy hết mình tại các \u003c/p\u003e\u003cp\u003eCLB theo sở thích, chương trình teambuilding, du lịch định kỳ\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMôi trường thân thiện, chia sẻ, đồng hành:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kết nối tài năng: tập trung phát triển những con người có chung lý tưởng, mục tiêu, cùng trao giá trị và nhận thành công\u003c/p\u003e\u003cp\u003e• Tư duy đột phá: môi trường tôn trọng sự khác biệt và đề cao sáng tạo, MISA-er được tự do phát triển các ý tưởng tiến bộ, cải tiến công việc\u003c/p\u003e\u003cp\u003e• Công nghệ cao: trang bị máy tính làm việc, tối ưu hiệu suất công việc bằng ứng dụng công nghệ, phần mềm tự động\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"27:T81e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Quản trị kế hoạch nguồn lực, phát triển tổ chức: Tư vấn cho Lãnh đạo đơn vị về các vấn đề quản trị nhân sự và phát triển nguồn lực. Triển khai các chương trình quản trị nguồn lực, phát triển tổ chức (Lập định biên nhân sự, kế hoạch phát triển đội ngũ nhân sự kế th
