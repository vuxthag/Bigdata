py At Work\u003c/strong\u003e: MISA aims to build a workplace where you feel genuinely happy\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnology Pioneer with Strong Reputation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• MISA is recognized as one of the best IT enterprises in the Asia-Pacific region and a pioneer in exporting SaaS solutions\u003c/p\u003e\u003cp\u003e• Among the top IT companies with continuous growth: 20% annual increase in staff size, 15% annual revenue growth\u003c/p\u003e\u003cp\u003e• A team of nearly 4,000 talents driven by the ambition to bring “Make in Vietnam” tech products to the global stage\u003c/p\u003e\u003cp\u003eTrusted by 350,000 organizational customers (public sector units, enterprises) and 3.5 million individual users across Vietnam and 22 countries\u003c/p\u003e\u003cp\u003e• Over 100 prestigious national and international IT awards\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Te11,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eEducation \u0026 Experience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducation:\u003c/strong\u003e Bachelor’s degree or higher in Economics, Business Administration, Marketing, or related fields from Foreign Trade University, National Economics University, or overseas universities. Candidates holding an MBA degree are preferred.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExperience: \u003c/strong\u003eA minimum of 2-3 years of experience in market research, business development, or as an assistant to the Board of Management in large enterprises.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThinking \u0026 Skills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Strong skills in researching, synthesizing, analyzing, and processing market and product data.\u003c/p\u003e\u003cp\u003e• Critical thinking and problem-solving abilities.\u003c/p\u003e\u003cp\u003e• Proficiency in applying digital tools (e.g., AI, business analysis platforms).\u003c/p
