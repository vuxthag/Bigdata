p chế là nhân sự chủ chốt chịu trách nhiệm thiết lập hệ thống pháp lý toàn diện cho hoạt động của Tập đoàn. Nhiệm vụ trọng tâm là đảm bảo mọi hoạt động từ vận hành y khoa, đầu tư dự án đến quản trị nhân sự đều tuân thủ nghiêm ngặt pháp luật Việt Nam và các tiêu chuẩn quốc tế, đồng thời tối ưu hóa các thủ tục pháp lý để thúc đẩy kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. NHIỆM VỤ CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.1. Quản trị Tuân thủ \u0026 Kiểm soát Rủi ro\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thiết lập và giám sát hệ thống kiểm soát tuân thủ pháp luật trong toàn bộ các bệnh viện/phòng khám thuộc hệ thống.\u003c/p\u003e\u003cp\u003e• Rà soát, xây dựng và chuẩn hóa hệ thống mẫu biểu, các loại hợp đồng kinh tế, hợp đồng lao động, hợp đồng hợp tác của Tập đoàn.\u003c/p\u003e\u003cp\u003e• Nhận diện và đưa ra các giải pháp cảnh báo sớm về rủi ro pháp lý trong hoạt động khám chữa bệnh và kinh doanh y tế.\u003c/p\u003e\u003cp\u003e• Cung cấp kỹ năng làm việc theo pháp luật cho cán bộ nhân viên Tập đoàn; áp dụng pháp luật để bảo vệ quyền và lợi ích hợp pháp của Tập đoàn hoặc đề xuất các giải pháp tối ưu để giải quyết các vấn đề pháp lý phát sinh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.2. Tư vấn Pháp lý \u0026 Tố tụng chuyên sâu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tư vấn chiến lược: Tư vấn pháp lý cho Ban Tổng Giám đốc về các quyết định đầu tư, M\u0026A, hợp tác liên doanh với đối tác Nga và quốc tế. Cho ý kiến pháp lý liên quan đến các dự án đang triển khai hoặc chuẩn bị triển khai của Tập đoàn.\u003c/p\u003e\u003cp\u003e• Tham gia Tố tụng: Trực tiếp tham gia tố tụng với tư cách là người đại diện theo ủy quyền để bảo vệ quyền, lợi ích hợp pháp của Tập đoàn trong các vụ án về tranh chấp dân sự, kinh doanh thương mại, lao động, hành chính.\u003c/p\u003e\u003cp\u003e• Giải quyết khiếu nại: Soạn thảo và hỗ trợ chuẩn bị tài liệu liên quan đến các hoạt động khiếu nại, tố cáo đối với các Cơ quan Nhà nước, tổ chức hoặc cá nhân khi có tranh chấp xảy ra.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.3. Dịch vụ Pháp lý Doanh nghiệp \u0026 Đại diện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thủ tục hành chính y tế: Trực tiếp chỉ đạo thực hiện các thủ tục thành lập mới chi nhánh, thay đổi giấy phép hoạt động bệnh viện, danh mục kỹ thuật.\u003c/p\u003e\u003cp\u003e• Quản lý nhân sự nước ngoài: Quản lý pháp lý hồ sơ nhân sự nước ngoài (Giấy phép hành nghề, Giấy phép lao động, Visa/Thẻ tạm trú cho chuyên gia Nga).\u003c/p\u003e\u003cp\u003e• Đại diện ngoài tố tụng: Đại diện cho Tập đoàn làm việc với các cơ quan quản lý Nhà nước (Bộ Y tế, Sở Y tế, Sở Lao động...), các tổ chức và cá nhân nhằm mang lại quyền và nghĩa vụ chính đáng cho Tập đoàn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.4. Đào tạo \u0026 Phát triển\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Chủ trì đào tạo phổ biến kiến thức pháp luật y tế, pháp luật lao động cho đội ngũ quản lý và nhân viên.\u003c/p\u003e\u003cp\u003e• Cập nhật kịp thời các thay đổi về chính sách, luật định (Luật Khám bệnh, chữa bệnh; Luật BHYT...) để điều chỉnh vận hành phù hợp.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T77f,Tập đoàn Y tế Việt – Nga (VRR) được thành lập ngày 15/01/1998, tiền thân là Công ty Cổ phần Thủ công Mỹ nghệ Hoa Lư. Từ những bước đi đầu tiên trong lĩnh vực văn hóa – nghệ thuật, đến nay Tập đoàn đã phát triển thành một trong những đơn vị tiên phong trong lĩnh vực Y tế – Khám chữa bệnh – Phục hồi chức năng – Du lịch y tế tại Việt Nam.\r\nNăm 2007, Tập đoàn Y tế Việt - Nga đánh dấu bước ngoặt quan trọng khi xúc tiến thành công chương trình hợp tác Nhãn khoa giữa Bộ Y tế Việt Nam và Liên bang Nga, đặt nền móng cho sự ra đời của Bệnh viện Mắt Quốc tế Việt – Nga đầu tiên tại Hà Nội (2009).\r\nĐến nay, Tập đoàn đã xây dựng hệ thống b
