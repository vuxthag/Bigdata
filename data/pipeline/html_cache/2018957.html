tháng.\u003c/p\u003e\u003cp\u003e●\tTham mưu chiến lược: Tư vấn cho Ban Lãnh đạo về tình hình tài chính, các chính sách thuế, và các vấn đề tài chính khác để hỗ trợ ra quyết sách đúng đắn, kịp thời và hiệu quả.\u003c/p\u003e\u003cp\u003eQuản lý dòng tiền và công nợ\u003c/p\u003e\u003cp\u003e●\tThực hiện các nghiệp vụ giám sát nội bộ về quản lý thu-chi, quản lý công nợ phải thu, phải trả, đảm bảo tình hình tài chính luôn ổn định.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLập Báo cáo Quản trị:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e○\tBáo cáo Quản trị: Lập các báo cáo nội bộ theo yêu cầu của  Ban Lãnh đạo để kiểm soát chi phí và hiệu quả sử dụng tài sản.\u003c/p\u003e\u003cp\u003eKiểm soát Nội bộ \u0026 Lưu trữ:\u003c/p\u003e\u003cp\u003e●\tXây dựng Quy trình: Xây dựng, cải tiến và duy trì quy trình, quy định tài chính trong toàn công ty.\u003c/p\u003e\u003cp\u003e●\tKiểm tra Tuân thủ: Kiểm tra, kiểm soát tuân thủ quy trình, quy định tài chính trong toàn công ty.\u003c/p\u003e\u003cp\u003e●\tLưu trữ: Sắp xếp, bảo quản, lưu trữ chứng từ, sổ sách, báo cáo khoa học, hợp lý, bảo mật, và dễ tra cứu.\u003c/p\u003e\u003cp\u003e●\tTham gia đầy đủ các buổi đào tạo, hướng dẫn về an toàn lao động (ATLĐ), PCCC, nội dung công việc, tiết kiệm và sử dụng năng lượng. Tuân thủ quy trình, quy định chính sách  theo ISO môi trường 14001, an toàn 45001, chất lượng ISO 9001, năng lượng ISO 50001 và các chính sách theo tiêu chuẩn trách nhiệm xã hội BSCI.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhối hợp Nội bộ \u0026 Quan hệ Đối ngoại:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tPhối hợp Nâng cao Hiệu quả: Phối hợp với các phòng/bộ phận liên quan trong công ty để cập nhật thông tin tài chính\u003c/p\u003e\u003cp\u003e●\tQuan hệ đối ngoại: Giao dịch các khoản vay tín dụng với ngân hàng; làm việc với các cơ quan tài chính hữu quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. QUYỀN HẠN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tQuyền hạn: Đề xuất các chính sách tài chính; yêu cầu các bộ phận cung cấp hồ sơ tài chính; tham gia các cuộc họp giao ban để báo cáo tình hình chung.\u003c/p\u003e\u003cp\u003e●\tĐề xuất thưởng/phạt, xét duyệt tăng lương cho nhân sự trong phòng. Đề xuất tăng/giảm/điều chỉnh nhân sự phù hợp với tình hình thực tế trong phòng để đạt hiệu quả cao nhất.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. TRÁCH NHIỆM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tTrách nhiệm: Chịu trách nhiệm về tính ổn định tài chính và bảo mật thông tin tài liệu tài chính của công ty.\u003c/p\u003e\u003cp\u003e●\tBảo mật thông tin công ty, đặc biệt là các tài liệu kế toán và tài chính.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tadf,"])</script><script>self.__next_f.push([1,"\u003cp\u003e●\tTrình độ học vấn: Tốt nghiệp Đại học trở lên chuyên ngành Tài chính, Ngân hàng, Kế toán; ưu tiên chứng chỉ CFA, ACCA.\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm: 5-7 năm kinh nghiệm, trong đó 3-5 năm quản lý tài chính tại công ty sản xuất.\u003c/p\u003e\u003cp\u003e●\tKiến thức chuyên môn:\u003c/p\u003e\u003cp\u003eo\tNắm vững các chuẩn mực kế toán Việt Nam (VAS pháp luật về thuế, tài chính, đầu tư, tín dụng.\u003c/p\u003e\u003cp\u003eo\tCó kinh nghiệm trong việc xây dựng và quản lý ngân sách, phân tích tài chính.\u003c/p\u003e\u003cp\u003eo\tThành thạo sử dụng các phần mềm kế toán chuyên nghiệp (MISA, Fast, Bravo, SAP, Oracle) và các công cụ văn phòng (MS Excel nâng cao).\u003c/p\u003e\u003cp\u003e●\tKỹ năng:\u003c/p\u003e\u003cp\u003eo\tTư duy Phân tích \u0026 Tổng hợp: Khả năng phân tích dữ liệu tài chính phức tạp, nhận diện vấn đề và đưa ra giải pháp.\u003c/p\u003e\u003cp\u003eo\tKỹ năng Giao tiếp \u0026 Đàm phán: Giao tiếp rõ ràng, thuyết phục và đàm phán hiệu quả với các bên liên quan (nội bộ, cơ quan nhà nước, ngân hàng, kiểm toán, cơ quan chức năng).\u003c/p\u003e\u003cp\u003eo\tCẩn trọng \u0026 Tỉ mỉ: Độ chính xác cao trong công việc, khả năng làm việc chi tiết.\u003c/p\u003e\u003cp\u003eo\tKhả năng chịu áp lực: Làm việc hiệu quả dưới áp lực về thời gian và khối lượng công việc.\u003c/p\u003e\u003cp\u003eo\tThu thập, thống kê, tổng hợp và xử lý dữ liệu nhanh chóng, chính xác.\u003c/p\u003e\u003cp\u003e●\tNgoại ngữ: Có khả năng giao tiếp tiếng Anh hoặc tiếng Trung là một lợi thế.\u003c/p\u003e\u003cp\u003e●\tYêu cầu khác: Trung thực, chính trực, có đạo đức nghề nghiệp cao, tinh thần trách nhiệm và cam kết gắn bó lâu dài với công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e QUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tMức lương cạnh tranh, thưởng theo hiệu quả công việc.\u003c/p\u003e\u003cp\u003e●\tĐược hưởng các chế độ phúc lợi như: BHXH, BHYT, BHTN.\u003c/p\u003e\u003cp\u003e●\tĐược hưởng các khoản phụ cấp bao gồm: Phụ cấp nắng nóng, chế độ phụ nữ, xăng xe, điện thoại, nhà ở hàng tháng vào lương.\u003c/p\u003e\u003cp\u003e●\tThưởng các ngày lễ, ngày tết, sinh nhật, nghỉ mát, du lịch.\u003c/p\u003e\u003cp\u003e●\tMôi trường làm việc chuyên nghiệp, hỗ trợ phát triển kỹ năng lãnh đạo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e CÁCH THỨC ỨNG TUYỂN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tỨng viên gửi CV và thư xin việc về [Địa chỉ email tuyển dụng].\u003c/p\u003e\u003cp\u003e●\tTiêu đề email: “Ứng tuyển Trưởng phòng quản lý tài chính - [Họ và tên ứng viên]”.\u003c/p\u003e\u003cp\u003e●\tHạn nộp hồ sơ: [Ngày tháng năm].\u003c/p\u003e\u003cp\u003e●\tLiên hệ: [Tên người liên hệ - Phòng Nhân sự] - [Số điện thoại] (nếu có).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"26:T647,Hơn 20 năm phát triển với nền tảng bền vững và am hiểu sâu sắc thị trường nhôm, Tập đoàn nhôm Chiến Thắng đã xây dựng một vị trí vững chắc trong tâm trí khách hàng, là đối tác tin cậy m bảo tình hình tài chính luôn ổn định.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLập Báo cáo Quản trị:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e○\tBáo cáo Quản trị: Lập các báo cáo nội bộ theo yêu cầu của  Ban Lãnh đạo để kiểm soát chi phí và hiệu quả sử dụng tài sản.\u003c/p\u003e\u003cp\u003eKiểm soát Nội bộ \u0026 Lưu trữ:\u003c/p\u003e\u003cp\u003e●\tXây dựng Quy trình: Xây dựng, cải tiến và duy trì quy trình, quy định tài chính trong toàn công ty.\u003c/p\u003e\u003cp\u003e●\tKiểm tra Tuân thủ: Kiểm tra, kiểm soát tuân thủ quy trình, quy định tài chính trong toàn công ty.\u003c/p\u003e\u003cp\u003e●\tLưu trữ: Sắp xếp, bảo quản, lưu trữ chứng từ, sổ sách, báo cáo khoa học, hợp lý, bảo mật, và dễ tra cứu.\u003c/p\u003e\u003cp\u003e●\tTham gia đầy đủ các buổi đào tạo, hướng dẫn về an toàn lao động (ATLĐ), PCCC, nội dung công việc, tiết kiệm và sử dụng năng lượng. Tuân thủ quy trình, quy định chính sách  theo ISO môi trường 14001, an toàn 45001, chất lượng ISO 9001, năng lượng ISO 50001 và các chính sách theo tiêu chuẩn trách nhiệm xã hội BSCI.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhối hợp Nội bộ \u0026 Quan hệ Đối ngoại:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tPhối hợp Nâng cao Hiệu quả: Phối hợp với các phòng/bộ phận liên quan trong công ty để cập nhật thông tin tài chính\u003c/p\u003e\u003cp\u003e●\tQuan hệ đối ngoại: Giao dịch các khoản vay tín dụng với ngân hàng; làm việc với các cơ quan tài chính hữu quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. QUYỀN HẠN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tQuyền hạn: Đề xuất các chính sách tài chính; yêu cầu các bộ phận cung cấp hồ sơ tài chính; tham gia các cuộc họp giao ban để báo cáo tình hình chung.\u003c/p\u003e\u003cp\u003e●\tĐề xuất thưởng/phạt, xét duyệt tăng lương cho nhân sự trong phòng. Đề xuất tăng/giảm/điều chỉnh nhân sự phù hợp với tình hình thực tế trong phòng để đạt hiệu quả cao nhất.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u00
