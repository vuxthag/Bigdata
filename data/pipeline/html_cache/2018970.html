 lượng cao, tiêu chuẩn quốc tế.\r\n\r\nTọa lạc tại Bắc Ninh – một trong những tỉnh có nhiều khu công nghiệp"])</script><script>self.__next_f.push([1," trọng điểm của cả nước, Nhà máy sản xuất nhôm Việt Eco được đầu tư theo tiêu chuẩn quốc tế, sử dụng công nghệ hiện đại kết hợp với phương thức quản lý 4.0 không ngừng gia tăng năng lực sản xuất, đáp ứng nguồn cung cho thị trường.\r\n\r\nVới sự phát triển không ngừng về kỹ thuật và công nghệ cùng đội ngũ nhân sự trẻ, nhiệt huyết và sáng tạo, Nhà máy sản xuất nhôm Việt Eco thuộc Tập đoàn Nhôm Chiến Thắng và đang từng bước trên hành trình chinh phục vị trí dẫn đầu thị trường nhôm định hình tại Việt Nam.24:T1911,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. MỤC TIÊU CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng, vận hành và cải tiến hệ thống quản lý ISO tích hợp của Công ty theo yêu cầu tiêu chuẩn, pháp luật và định hướng Ban Lãnh đạo.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo duy trì hiệu lực chứng nhận ISO, kiểm soát tuân thủ và phòng ngừa rủi ro về chất lượng, môi trường, an toàn, năng lượng.\u003c/p\u003e\u003cp\u003e•\tNâng cao hiệu lực – hiệu quả hệ thống ISO, gắn với hoạt động sản xuất – kinh doanh và cải tiến liên tục.\u003c/p\u003e\u003cp\u003e•\tTổ chức, kiểm soát đánh giá nội bộ, đánh giá bên ngoài và đóng NC (Không phù hợp) đầy đủ, đúng hạn, có hiệu lực.\u003c/p\u003e\u003cp\u003e•\tĐào tạo nhận thức ISO cho trưởng phòng/ bộ phận thúc đẩy văn hóa tuân thủ và cải tiến.\u003c/p\u003e\u003cp\u003e•\tTham mưu, báo cáo tình trạng hệ thống ISO cho Ban Giám đốc, chủ trì Xem xét của Lãnh đạo.\u003c/p\u003e\u003cp\u003e•\tĐề xuất và triển khai các phần mềm quản lý tài liệu/quy trình để giảm thiểu giấy tờ (đặc biệt quan trọng với doanh nghiệp sản xuất lớn).\u003c/p\u003e\u003cp\u003e•\tThực hiện các công việc khác theo sự chỉ đạo của quản lý, BLĐ công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. NHIỆM VỤ CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản lý hệ thống ISO và tiêu chuẩn liên quan:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tSoạn thảo, cập nhật quy trình, hướng dẫn công việc, biểu mẫu phối hợp với Trưởng phòng và các bộ phận.\u003c/p\u003e\u003cp\u003eo\tHỗ trợ các phòng ban soạn thảo quy trình chuyên môn theo chuẩn ISO.\u003c/p\u003e\u003cp\u003eo\tĐề nghị Ban Giám đốc thành lập ban chỉ đạo xây dựng hệ thống ISO.\u003c/p\u003e\u003cp\u003eo\tPhối hợp xây dựng chính sách, mục tiêu hàng năm cho công ty và các bộ phận.\u003c/p\u003e\u003cp\u003eo\tGiám sát, cập nhật hàng tháng việc thực hiện mục tiêu (ISO 9001, 14001, 45001, 50001, BSCI), xác định nguyên nhân và khắc phục mục tiêu không đạt.\u003c/p\u003e\u003cp\u003eo\tPhối hợp với Phòng Kỹ thuật-Thiết bị và Kế toán lấy dữ liệu năng lượng (điện, gas) để tính đường năng lượng cơ sở ISO 50001, so sánh với năm cơ sở để đánh giá tiết kiệm năng lượng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTổ chức đào tạo và truyền thông nội bộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tĐào tạo nhận thức ISO cho trưởng phòng/ bộ phận mới và định kỳ\u003c/p\u003e\u003cp\u003eo\tHướng dẫn các bộ phận thực hiện đúng quy trình đã ban hành.\u003c/p\u003e\u003cp\u003eo\tTham gia đào tạo offline/online để nâng cao trình độ chuyên môn.\u003c/p\u003e\u003cp\u003e•\tTheo dõi việc thực hiện hệ thống ISO:\u003c/p\u003e\u003cp\u003eo\tLập kế hoạch kiểm tra nội bộ (Internal Audit) định kỳ hoặc đột xuất, phối hợp đánh giá chéo giữa các bộ phận.\u003c/p\u003e\u003cp\u003eo\tLập báo cáo đánh giá nội bộ, theo dõi khắc phục, phòng ngừa điểm không phù hợp.\u003c/p\u003e\u003cp\u003eo\tGiám sát các phòng ban tuân thủ quy trình, quy định đã ban hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tLàm đầu mối với đơn vị đánh giá bên ngoài:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tChuẩn bị hồ sơ, tài liệu, phối hợp các bộ phận cho đánh giá chứng nhận hoặc giám sát định kỳ (ISO 9001:2015, 14001:2015, 45001:2018, 50001:2018, BSCI, TCVN 12513, JIS H4100:2015).\u003c/p\u003e\u003cp\u003eo\tTiếp đoàn đánh giá, xử lý điểm không phù hợp, gửi lại đơn vị đánh giá.\u003c/p\u003e\u003cp\u003eo\tLàm việc với đơn vị tư vấn (nếu có) để triển khai tiêu chuẩn mới.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCải tiến hệ thống:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tBáo cáo điểm yếu, bất cập trong vận hành hệ thống ISO và các tiêu chuẩn.\u003c/p\u003e\u003cp\u003eo\tĐề xuất cải tiến nâng cao hiệu quả vận hành, chất lượng sản phẩm/dịch vụ.\u003c/p\u003e\u003cp\u003e•\tBáo cáo:\u003c/p\u003e\u003cp\u003eo\tTheo dõi mục tiêu chất lượng, môi trường, an toàn, năng lượng; phân tích dữ liệu, lập báo cáo định kỳ (tháng, quý, năm hoặc theo yêu cầu).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tNhiệm vụ khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tThực hiện các công việc khác theo yêu cầu của Trưởng phòng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. QUYỀN HẠN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐối với tài liệu và hệ thống:\u003c/p\u003e\u003cp\u003eo\tYêu cầu sửa đổi, ban hành mới, thu hồi tài liệu khi không phù hợp.\u003c/p\u003e\u003cp\u003eo\tKiểm soát lưu trữ, bảo mật tài liệu hệ thống ISO.\u003c/p\u003e\u003cp\u003e•\tĐối với các phòng ban:\u003c/p\u003e\u003cp\u003eo\tYêu cầu giải trình về điểm không phù hợp.\u003c/p\u003e\u003cp\u003eo\tTham gia cùng trưởng bộ phận đề xuất hành động khắc phục, phòng ngừa.\\\u003c/p\u003e\u003cp\u003e•\tQuyền đình chỉ tạm thời các hoạt động/công việc vi phạm nghiêm trọng quy trình ISO gây ảnh hưởng đến chất lượng sản phẩm hoặc an toàn\u003c/p\u003e\u003cp\u003e•\tQuyền từ chối phê duyệt các hồ sơ, tài liệu không đúng biểu mẫu, quy chuẩn của hệ thống.\u003c/p\u003e\u003cp\u003e•\tQuyền phê duyệt ngân sách trong phạm vi được cho phép cho các hoạt động đào tạo hoặc đánh giá bên ngoài.\u003c/p\u003e\u003cp\u003e•\tTrong hoạt động đánh giá nội bộ:\u003c/p\u003e\u003cp\u003eo\tĐánh giá bất kỳ bộ phận nào theo kế hoạch hoặc đột xuất.\u003c/p\u003e\u003cp\u003eo\tGhi nhận điểm không phù hợp, theo dõi hành động khắc phục.\u003c/p\u003e\u003cp\u003e•\tTrong cải tiến hệ thống:\u003c/p\u003e\u003cp\u003eo\tĐưa ra sáng kiến, đề xuất thay đổi phương pháp làm việc để nâng cao hiệu quả ISO.\u003c/p\u003e\u003cp\u003eo\tĐề xuất sử dụng nguồn lực (thời gian, nhân lực, chi phí) cho cải tiến.\u003c/p\u003e\u003cp\u003e•\tBáo cáo và kiến nghị:\u003c/p\u003e\u003cp\u003eo\tBáo cáo trực tiếp Ban Giám đốc về tình hình tuân thủ ISO.\u003c/p\u003e\u003cp\u003eo\tĐề xuất xử lý bộ phận/cá nhân vi phạm quy trình.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. TRÁCH NHIỆM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐảm bảo hệ thống quản lý ISO và các tiêu chuẩn liên quan vận hành hiệu quả, tuân thủ yêu cầu nội bộ và bên ngoài.\u003c/p\u003e\u003cp\u003e•\tKhông để xảy ra sự cố nghiêm trọng do lỗi hệ thống hoặc đánh giá bị từ chối do thiếu hồ sơ, minh chứng.\u003c/p\u003e\u003cp\u003e•\tBảo mật thông tin liên quan đến đánh giá, khách hàng, và hồ sơ hệ thống.\u003c/p\u003e\u003cp\u003e•\tThực hiện đầy đủ báo cáo định kỳ và đột xuất theo yêu cầu.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T608,\u003cp\u003e\u003cstrong\u003eYÊU CẦU CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTrình độ học vấn: Tốt nghiệp Đại học ngành Quản trị Kinh doanh, Kỹ thuật, hoặc liên quan.\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm: Tối thiểu 3-5 năm kinh nghiệm về quản lý hệ thống ISO trong các công ty sản xuất\u003c/p\u003e\u003cp\u003e•\tKỹ năng:\u003c/p\u003e\u003cp\u003eo\tThành thạo xây dựng, vận hành hệ thống ISO\u003c/p\u003e\u003cp\u003eo\tThành thạo soạn thảo văn bản, excel\u003c/p\u003e\u003cp\u003eo\tKỹ năng đào tạo, kiểm tra nội bộ, phân tích dữ liệu.\u003c/p\u003e\u003cp\u003eo\tGiao tiếp, phối hợp liên phòng ban, làm việc với đơn vị đánh giá.\u003c/p\u003e\u003cp\u003e•\tYêu cầu khác: Sức khỏe tốt, cẩn thận, tinh thần trách n an toàn, năng lượng.\u003c/p\u003e\u003cp\u003e•\tNâng cao hiệu lực – hiệu quả hệ thống ISO, gắn với hoạt động sản xuất – kinh doanh và cải tiến liên tục.\u003c/p\u003e\u003cp\u003e•\tTổ chức, kiểm soát đánh giá nội bộ, đánh giá bên ngoài và đóng NC (Không phù hợp) đầy đủ, đúng hạn, có hiệu lực.\u003c/p\u003e\u003cp\u003e•\tĐào tạo nhận thức ISO cho trưởng phòng/ bộ phận thúc đẩy văn hóa tuân thủ và cải tiến.\u003c/p\u003e\u003cp\u003e•\tTham mưu, báo cáo tình trạng hệ thống ISO cho Ban Giám đốc, chủ trì Xem xét của Lãnh đạo.\u003c/p\u003e\u003cp\u003e•\tĐề xuất và triển khai các phần mềm quản lý tài liệu/quy trình để giảm thiểu giấy tờ (đặc biệt quan trọng với doanh nghiệp sản xuất lớn).\u003c/p\u003e\u003cp\u003e•\tThực hiện các công việc khác theo sự chỉ đạo của quản lý, BLĐ công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. NHIỆM VỤ CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản lý hệ thống ISO và tiêu chuẩn liên quan:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tSoạn thảo, cập nhật quy trình, hướng dẫn công việc, biểu mẫu phối hợp với Trưởng phòng và các bộ phận.\u003c/p\u003e\u003cp\u003eo\tHỗ trợ các phòng ban soạn thảo quy trình chuyên môn theo chuẩn ISO.\u003c/p\u003e\u003cp\u003eo\tĐề nghị Ban Giám đốc thành lập ban chỉ đạo xây dựng hệ thống ISO.\u003c/p\u003e\u003cp\u003eo\tPhối hợp xây dựng chính sách, mục tiêu hàng năm cho công ty và các bộ phận.\u003c/p\u003e\u003cp\u003eo\tGiám sát, cập nhật hàng tháng việc thực hiện mục tiêu (ISO 9001, 14001, 45001, 50001, BSCI), xác định nguyên nhân và khắc phục mục tiêu không đạt.\u003c/p\u003e\u003cp\u003eo\tPhối hợp với Phòng Kỹ thuật-Thiết bị và Kế toán lấy dữ liệu năng lượng (điện, gas) để tính đường năng lượng cơ sở ISO 50001, so sánh với năm cơ sở để đánh giá tiết kiệm năng lượng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTổ chức đào tạo và truyền thông nội bộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tĐào tạo nhận thức ISO cho trưởng phòng/ bộ phận mới và định kỳ\u003c/p\u003e\u003cp\u003eo\tHướng dẫn các bộ phận thực hiện đúng quy trình đã ban hành.\u003c/p\u003e\u003cp\u003eo\tTham gia đào tạo offline/online để nâng cao trình độ chuyên môn.\u003c/p\u003e\u003cp\u003e•\tTheo dõi việc thực hiện hệ thống ISO:\u003c/p\u003e\u003cp\u003eo\tLập kế hoạch kiểm tra nội bộ (Internal Audit) định kỳ hoặc đột xuất, phối hợp đánh giá chéo giữa các bộ phận.\u003c/p\u003e\u003cp\u003eo\tLập báo cáo đánh giá nội bộ, theo dõi khắc phục, phòng ngừa điểm không phù hợp.\u003c/p\u003e\u003cp\u003eo\tGiám sát các phòng ban tuân thủ quy trình, quy định đã ban hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tLàm đầu mối với đơn vị đánh giá bên ngoài:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tChuẩn bị hồ sơ, tài liệu, phối hợp các bộ phận cho đánh giá chứng nhận hoặc giám sát định kỳ (ISO 9001:2015, 14001:2015, 45001:2018, 50001:2018, BSCI, TCVN 12513, JIS H4100:2015).\u003c/p\u003e\u003cp\u003eo\tTiếp đoàn đánh giá, xử lý điểm không phù hợp, gửi lại đơn vị đánh giá.\u003c/p\u003e\u003cp\u003eo\tLàm việc với đơn vị tư vấn (nếu có) để triển khai tiêu chuẩn mới.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCải tiến hệ thống:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tBáo cáo điểm yếu, bất cập trong vận hành hệ thống ISO và các tiêu chuẩn.\u003c/p\u003e\u003cp\u003eo\tĐề xuất cải tiến nâng cao hiệu quả vận hành, chất lượng sản phẩm/dịch vụ.\u003c/p\u003e\u003cp\u003e•\tBáo cáo:\u003c/p\u003e\u003cp\u003eo\tTheo dõi mục tiêu chất lượng, môi trường, an toàn, năng lượng; phân tích dữ liệu, lập báo cáo định kỳ (tháng, quý, năm hoặc theo yêu cầu).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tNhiệm vụ khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tThực hiện các công việc khác theo yêu cầu của Trưởng phòng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. QUYỀN HẠN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐối với tài liệu và hệ thống:\u003c/p\u003e\u003cp\u003eo\tYêu cầu sửa đổi, ban hành mới, thu hồi tài liệu khi không phù hợp.\u003c/p\u003e\u003cp\u003eo\tKiểm soát lưu trữ, bảo mật tài liệu hệ thống ISO.\u003c/p\u003e\u003cp\u003e•\tĐối với các phòng ban:\u003c/p\u003e\u003cp\u003eo\tYêu cầu giải trình về điểm không phù hợp.\u003c/p\u003e\u003cp\u003eo\tTham gia cùng trưởng bộ phận đề xuất hành động khắc phục, phòng ngừa.\\\u003c/p\u003e\u003cp\u003e•\tQuyền đình chỉ tạm thời các hoạt động/công việc vi phạm nghiêm trọng quy trình ISO gây ảnh hưởng đến chất lượng sản phẩm hoặc an toàn\u003c/p\u003e\u003cp\u003e•\tQuyền từ chối phê duyệt các hồ sơ, tài liệu không đúng biểu mẫu, quy chuẩn của hệ thống.\u003c/p\u003e\u003cp\u003e•\tQuyền phê duyệt ngân sách trong phạm vi được cho phép cho các hoạt động đào tạo hoặc đánh giá bên ngoài.\u003c/p\u003e\u003cp\u003e•\tTrong hoạt động đánh giá nội bộ:\u003c/p\u003e\u003cp\u003eo\tĐánh giá bất kỳ bộ phận nào theo kế hoạch hoặc đột xuất.\u003c/p\u003e\u003cp\u003eo\tGhi nhận điểm không phù hợp, theo dõi hành động khắc phục.\u003c/p\u003e\u003cp\u003e•\tTrong cải tiến hệ thống:\u003c/p\u003e\u003cp\u003eo\tĐưa ra sáng kiến, đề xuất thay đổi phương pháp làm việc để nâng cao hiệu quả ISO.\u003c/p\u003e\u003cp\u003eo\tĐề xuất sử dụng nguồn lực (thời gian, nhân lực, chi phí) cho cải tiến.\u003c/p\u003e\u003cp\u003e•\tBáo cáo và kiến nghị:\u003c/p\u003e\u003cp\u003eo\tBáo cáo trực tiếp Ban Giám đốc về tình hình tuân thủ ISO.\u003c/p\u003e\u003cp\u003eo\tĐề xuất xử lý bộ phận/cá nhân vi phạm quy trình.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. TRÁCH NHIỆM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐảm bảo hệ thống quản lý ISO và các tiêu chuẩn liên quan vận hành hiệu quả, tuân thủ yêu cầu nội bộ và bên ngoài.\u003c/p\u003e\u003cp\u003e•\tKhông để xảy ra sự cố nghiêm trọng do lỗi hệ thống hoặc đánh giá bị từ chối do thiếu hồ sơ, minh chứng.\u003c/p\u003e\u003cp\u003e•\tBảo mật thông tin liên quan đến đánh giá, khách hàng, và hồ sơ hệ thống.\u003c/p\u003e\u003cp\u003e•\tThực hiện đầy đủ báo cáo định kỳ và đột xuất theo yêu cầu.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T608,\u003cp\u003e\u003cstrong\u003eYÊU CẦU CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTrình độ học vấn: Tốt nghiệp Đại học ngành Quản trị Kinh doanh, Kỹ thuật, hoặc liên quan.\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm: Tối thiểu 3-5 năm kinh nghiệm về quản lý hệ thống ISO trong các công ty sản xuất\u003c/p\u003e\u003cp\u003e•\tKỹ năng:\u003c/p\u003e\u003cp\u003eo\tThành thạo xây dựng, vận hành hệ thống ISO\u003c/p\u003e\u003cp\u003eo\tThành thạo soạn thảo văn bản, excel\u003c/p\u003e\u003cp\u003eo\tKỹ năng đào tạo, kiểm tra nội bộ, phân tích dữ liệu.\u003c/p\u003e\u003cp\u003eo\tGiao tiếp, phối hợp liên phòng ban, làm việc với đơn vị đánh giá.\u003c/p\u003e\u003cp\u003e•\tYêu cầu khác: Sức khỏe tốt, cẩn thận, tinh thần trách nhiệm cao, bảo mật thông tin.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương cạnh tranh, thưởng theo hiệu quả công việc.\u003c/p\u003e\u003cp\u003e•\tChế độ bảo hiểm và phúc lợi theo quy định công ty.\u003c/p\u003e\u003cp\u003e•\tCơ hội tham gia đào tạo ISO, quản trị hệ thống trong và ngoài nước.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc chuyên nghiệp, hỗ trợ phát triển kỹ năng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCÁCH THỨC ỨNG TUYỂN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tỨng viên gửi CV và thư xin việc về [Địa chỉ email tuyển dụng].\u003c/p\u003e\u003cp\u003e•\tTiêu đề email: “Ứng tuyển Trưởng phòng ISO - [Họ và tên ứng viên]”.\u003c/p\u003e\u003cp\u003e•\tHạn np hồ sơ: [Ngày tháng năm].\u003c/p\u003e\u003cp\u003e•\tLiên hệ: [Tên người liên hệ - Phòng Nhân sự] - [Số điện thoại] (nếu có).\u003c/p\u003e2d:{\"skillName\":\"Quản Lý ISO\",\"skillId\":18245,\"skillWeight\":100,\"isExisted\":false}\n2e:{\
