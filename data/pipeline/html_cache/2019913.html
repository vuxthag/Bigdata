hành công ty con của Ngân hàng TMCP Việt Nam Thịnh Vượng (VP Bank), sau khi VPBank nâng tỷ lệ sở hữu vốn tại OPES trên 90%. \r\nNăm 2025, OPES đạt danh hiệu Top 50 khối Doanh nghiệp vừa và Top 5 nhóm ngành Bảo hiểm trong Bảng xếp hạng 100 Nơi làm việc tốt nhất Việt Nam 2025. Cũng trong năm này, OPES đã liên tục gặt hái các thành tựu nổi bật như: \"Nhà bảo hiểm số của năm\" và \"Sáng kiến ứng dụng AI của năm\" tại Insurance Asia Awards 2025, Top 10 Công ty Bảo hiểm Phi nhân thọ uy tín, Top 500 Doanh nghiệp lợi nhuận tốt nhất Việt Nam (PROFIT500) \u0026 Top 500 Doanh nghiệp tăng trưởng tốt nhất Việt Nam (FAST500), thể hiện sự lớn mạnh cả về quy mô và uy tín trên thị trường bảo hiểm tại Việt Nam.\r\n\r\nTại OPES, văn hóa doanh nghiệp luôn được đặt ở vị trí trung tâm. Doanh nghiệp duy trì mô hình Đại sứ Văn hóa, lan tỏa giá trị nhân văn thông qua nhiều hoạt động mang tính gắn kết và hỗ trợ cộng đồng nội bộ. Bên cạnh đó, OPES đặc biệt chú trọng đến công nghệ, số hóa và tối ưu vận hành, những yếu tố tạo nên khác biệt của một doanh nghiệp bảo hiểm thế hệ mới. Mỗi nhân sự được trang bị đầy đủ công cụ hiện đại, được đào tạo chuyên sâu để khai thác hiệu quả hệ thống công nghệ và được khuyến khích chủ động đề xuất sáng kiến nhằm tăng năng suất và cải tiến quy trình. Sự kết hợp giữa văn hóa doanh nghiệp nhân văn và nền tảng công nghệ vững chắc đã giúp OPES xây dựng được môi trường làm việc chuyên nghiệp, sáng tạo, đồng thời tạo ra lợi thế cạnh tranh rõ rệt trên thị trường và mang lại giá trị ngày càng lớn cho khách hàng.\r\n\r\nĐể chuẩn bị cho sự phát triển mạnh mẽ của OPES trong giai đoạn tới, chúng tôi chào đón những nhân sự có năng lực, phẩm chất, hệ giá trị phù hợp để đồng hành, phát triển và tận hưởng nhiều niềm vui tại OPES.\r\nVới hệ giá trị cốt lõi: Khát vọng - Sáng tạo - Hiệu quả - Kỷ cương - Chính Trực, hãy cùng OPES tỏa sáng tài năng của bạn.\r\n\r\nTìm hiểu thêm về OPES tại đây: \r\nhttps://www.youtube.com/@baohiemso_opes \r\nWebsite: www.opes.com.vn \r\n\r\nOPES TỰ n sự tại OPES nhanh chóng nắm bắt xu thế ứng dụng công nghệ, số hóa và bước đầu hiện thực sứ mệnh, khẳng định thương hiệu bảo hiểm số - OPES trên thị trường bảo hiểm Việt Nam. \r\nTốc độ tăng trưởng 2 đến 3 con số của OPES trong giai đoạn đầu gia nhập thị trường bảo hiểm Việt Nam khá ấn tượng. Sau 08 năm thành lập, OPES đã vươn lên vị trí 06/32 doanh nghiệp Bảo hiểm tại Việt Nam.\r\n\r\nNăm 2022, đánh dấu sự kiện OPES trở thành công ty con của Ngân hàng TMCP Việt Nam Thịnh Vượng (VP Bank), sau khi VPBank nâng tỷ lệ sở hữu vốn tại OPES trên 90%. \r\nNăm 2025, OPES đạt danh hiệu Top 50 khối Doanh nghiệp vừa và Top 5 nhóm ngành Bảo hiểm trong Bảng xếp hạng 100 Nơi làm việc tốt nhất Việt Nam 2025. Cũng trong năm này, OPES đã liên tục gặt hái các thành tựu nổi bật như: \"Nhà bảo hiểm số của năm\" và \"Sáng kiến ứng dụng AI của năm\" tại Insurance Asia Awards 2025, Top 10 Công ty Bảo hiểm Phi nhân thọ uy tín, Top 500 Doanh nghiệp lợi nhuận tốt nhất Việt Nam (PROFIT500) \u0026 Top 500 Doanh nghiệp tăng trưởng tốt nhất Việt Nam (FAST500), thể hiện sự lớn mạnh cả về quy mô và uy tín trên thị trường bảo hiểm tại Việt Nam.\r\n\r\nTại OPES, văn hóa doanh nghiệp luôn được đặt ở vị trí trung tâm. Doanh nghiệp duy trì mô hình Đại sứ Văn hóa, lan tỏa giá trị nhân văn thông qua nhiều hoạt động mang tính gắn kết và hỗ trợ cộng đồng nội bộ. Bên cạnh đó, OPES đặc biệt chú trọng đến công nghệ, số hóa và tối ưu vận hành, những yếu tố tạo nên khác biệt của một doanh nghiệp bảo hiểm thế hệ mới. Mỗi nhân sự được trang bị đầy đủ công cụ hiện đại, được đào tạo chuyên sâu để khai thác hiệu quả hệ thống công nghệ và được khuyến khích chủ động đề xuất sáng kiến nhằm tăng năng suất và cải tiến quy trình. Sự kết hợp giữa văn hóa doanh nghiệp nhân văn và nền tảng công nghệ vững chắc đã giúp OPES xây dựng được môi trường làm việc chuyên nghiệp, sáng tạo, đồng thời tạo ra lợi thế cạnh tranh rõ rệt trên thị trường và mang lại giá trị ngày càng lớn cho khách hàng.\r\n\r\nĐể chuẩn bị cho sự phát triển m
