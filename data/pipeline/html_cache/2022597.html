,"p tham gia các dự án quốc tế, hợp tác cùng những tập đoàn công nghệ hàng đầu thế giới như Schneider Electric, Siemens, Hitachi, Opswat, Eaton…. Khách hàng của FRA trải rộng từ EVN, PVN, các nhà máy điện, tập đoàn dầu khí, khu công nghiệp, hạ tầng hiện đại, đến các đối tác quốc tế quy mô toàn cầu.\r\nVới đội ngũ kỹ sư được đào tạo chuyên sâu từ Schneider Electric và nhiều tập đoàn lớn, FRA cam kết mang đến giải pháp tối ưu nhất cho khách hàng, từ quản lý năng lượng đến đảm bảo an ninh thông tin và chuyển đổi số. Định hướng của chúng tôi là trở thành đối tác công nghệ chiến lược của các tập đoàn lớn tại Việt Nam và mở rộng ra thị trường quốc tế, mang lại nhiều cơ hội hợp tác trong các dự án toàn cầu.24:T143d,"])</script><script>self.__next_f.push([1,"\u003cp\u003eBạn đam mê kỹ thuật, mong muốn thử sức trong lĩnh vực \u003cstrong\u003eđiện tự động hóa và triển khai các hệ thống công nghệ cao\u003c/strong\u003e? Bạn muốn làm việc trong một môi trường \u003cstrong\u003enăng động, chuyên nghiệp\u003c/strong\u003e, nơi có cơ hội tiếp cận công nghệ tiên tiến và hợp tác cùng các tập đoàn hàng đầu thế giới? Hãy đến với \u003cstrong\u003eFRA\u003c/strong\u003e!\u003c/p\u003e\u003cp\u003eChúng tôi đang tìm kiếm những ứng viên tài năng cho vị trí:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ sư điện – tự động hóa / Phòng Kỹ thuật – Thiết kế \u0026 Triển khai / Văn phòng ĐDMN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTại FRA, bạn sẽ được:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc trong \u003cstrong\u003emôi trường công nghệ cao và quốc tế hóa\u003c/strong\u003e, tham gia các dự án quy mô lớn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHợp tác cùng các chuyên gia hàng đầu\u003c/strong\u003e, được đào tạo từ các tập đoàn công nghệ quốc tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐược đào tạo và phát triển kỹ năng chuyên môn toàn diện\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCó lộ trình thăng tiến rõ ràng\u003c/strong\u003e, phát triển sự nghiệp bền vững.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHãy gia nhập FRA để cùng chúng tôi kiến tạo những giải pháp năng lượng đột phá và phát triển sự nghiệp trong một môi trường hiện đại – chuyên nghiệp – toàn cầu. FRA không chỉ là nơi làm việc, mà còn là nơi bạn khẳng định bản thân, chinh phục công nghệ mới và đồng hành kiến tạo một tương lai xanh hơn, thông minh hơn và bền vững hơn\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMô tả công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTriển khai thi công các dự án của công ty tại TP.HCM và các tỉnh miền Nam.\u003c/p\u003e\u003cp\u003e•\tThực hiện lắp đặt, đấu nối tủ bảng điện, hệ thống điện tại công trường: nhà máy điện, trạm biến áp EVN,…\u003c/p\u003e\u003cp\u003e•\tHỗ trợ khách hàng xử lý các vấn đề liên quan đến sản phẩm do công ty cung cấp (tủ bảng điện, Rơ le bảo vệ, thiết bị điện,…).\u003c/p\u003e\u003cp\u003e•\tGiám sát, kiểm tra và điều phối công việc của thầu phụ.\u003c/p\u003e\u003cp\u003e•\tPhối hợp và hỗ trợ các công việc tại Văn phòng HCM.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThi công \u0026 triển khai:\u003c/strong\u003e Thực hiện lắp đặt, đấu nối tủ bảng điện, hệ thống điện tại công trình; giám sát tiến độ và chất lượng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHỗ trợ kỹ thuật:\u003c/strong\u003e Hỗ trợ khách hàng trong quá trình sử dụng sản phẩm; xử lý các sự cố kỹ thuật phát sinh.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản lý thầu phụ:\u003c/strong\u003e Giám sát công việc của thầu phụ, đảm bảo tuân thủ tiêu chuẩn kỹ thuật và tiến độ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHồ sơ \u0026 báo cáo:\u003c/strong\u003e Chuẩn bị hồ sơ liên quan đến triển khai, nghiệm thu; thực hiện báo cáo công việc định kỳ/đột xuất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHỗ trợ nội bộ:\u003c/strong\u003e Phối hợp với các phòng ban và hỗ trợ công việc tại Văn phòng HCM khi được phân công.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI \u0026 ĐÃI NGỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThu nhập cạnh tranh:\u003c/strong\u003e Lương thưởng hấp dẫn, tương xứng với năng lực và hiệu quả công việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng lễ, Tết:\u003c/strong\u003e Các dịp 30/4, 1/5, 2/9, Tết Nguyên đán và các ngày đặc biệt khác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhúc lợi đa dạng:\u003c/strong\u003e Du lịch trong/ngoài nước, teambuilding, văn hóa – thể thao.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐào tạo \u0026 phát triển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tĐào tạo chuyên môn và kỹ năng làm việc chuyên nghiệp.\u003c/p\u003e\u003cp\u003eo\tCập nhật công nghệ mới trong lĩnh vực điện, năng lượng, chuyển đổi số.\u003c/p\u003e\u003cp\u003eo\tĐược đào tạo chuyên sâu về hệ thống điện, tủ bảng điện, tự động hóa, đồng thời tiếp cận thiết bị và công nghệ từ các hãng lớn (Schneider, Siemens, Hitachi, ABB, GE, LS-VINA…).\u003c/p\u003e\u003cp\u003eo\tBồi dưỡng kỹ năng mềm, nâng cao năng lực cá nhân.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCơ hội toàn cầu:\u003c/strong\u003e Tham gia dự án lớn, hợp tác cùng các tập đoàn quốc tế, mở rộng mạng lưới quan hệ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tMôi trường làm việc hiện đại:\u003c/strong\u003e Đồng nghiệp thân thiện, hỗ trợ lẫn nhau; khuyến khích sáng tạo, đổi mới.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tChế độ bảo hiểm:\u003c/strong\u003e BHXH, BHYT, BHTN đầy đủ theo quy định pháp luật.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tLộ trình thăng tiến rõ ràng:\u003c/strong\u003e Chính sách phát triển nghề nghiệp, cơ hội đảm nhiệm nhiều vị trí quan trọng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐỊA ĐIỂM VÀ THỜI GIAN LÀM VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐịa điểm làm việc: \tSố 9A, Đường Phạm Cự Lượng, P. Tân Sơn Hòa, TP. Hồ Chí Minh.\u003c/p\u003e\u003cp\u003e•\tThời gian làm việc: \tTừ thứ 2 đến thứ 6.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T822,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYêu cầu bắt buộc (Must-have)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eTrình độ học vấn:\u003c/strong\u003e Tốt nghiệp Đại học chuyên ngành Điện, Điện tử, Hệ thống điện hoặc các ngành kỹ thuật liên quan (ưu tiên: ĐH Điện lực, ĐH Sư phạm Kỹ thuật, ĐH Công nghiệp, ĐH GTVT, DH Bách Khoa…).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKinh nghiệm:\u003c/strong\u003e Ưu tiên ứng viên có kinh nghiệm thi công điện, lắp đặt đấu nối tủ bảng điện, đọc hiểu bản vẽ thiết kế, các ứng viên có kinh nghiệm làm việc tại các đơn vị thí nghiệm, trạm biến áp, hệ thống tự động hóa trạm.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTin học:\u003c/strong\u003e Thành thạo MS Word, Excel.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKỹ năng cá nhân:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tKỹ năng quản lý, xử lý và giám sát công việc kỹ thuật tại công trường.\u003c/p\u003e\u003cp\u003eo\tCó sức khỏe tốt, sẵn sàng làm việc ngoài giờ theo yêu cầu.\u003c/p\u003e\u003cp\u003eo\tKhả năng làm việc độc lập, chịu được áp lực công việc.\u003c/p\u003e\u003cp\u003eo\tSẵn sàng đi công tác xa khi có yêu cầu.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhẩm chất cá nhân:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tHam học hỏi, có tinh thần trách nhiệm cao.\u003c/p\u003e\u003cp\u003eo\tChăm chỉ, cẩn thận, tỉ mỉ.\u003c/p\u003e\u003cp\u003eo\tTrung thực, cần cù, có đam mê trong công việc.\u003c/p\u003e\u003cp\u003eo\tTác phong chuyên nghiệp, phối hợp và làm việc nhóm tố rong một môi trường \u003cstrong\u003enăng động, chuyên nghiệp\u003c/strong\u003e, nơi có cơ hội tiếp cận công nghệ tiên tiến và hợp tác cùng các tập đoàn hàng đầu thế giới? Hãy đến với \u003cstrong\u003eFRA\u003c/strong\u003e!\u003c/p\u003e\u003cp\u003eChúng tôi đang tìm kiếm những ứng viên tài năng cho vị trí:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ sư điện – tự động hóa / Phòng Kỹ thuật – Thiết kế \u0026 Triển khai / Văn phòng ĐDMN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTại FRA, bạn sẽ được:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc trong \u003cstrong\u003emôi trường công nghệ cao và quốc tế hóa\u003c/strong\u003e, tham gia các dự án quy mô lớn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHợp tác cùng các chuyên gia hàng đầu\u003c/strong\u003e, được đào tạo từ các tập đoàn công nghệ quốc tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐược đào tạo và phát triển kỹ năng chuyên môn toàn diện\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCó lộ trình thăng tiến rõ ràng\u003c/strong\u003e, phát triển sự nghiệp bền vững.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHãy gia nhập FRA để cùng chúng tôi kiến tạo những giải pháp năng lượng đột phá và phát triển sự nghiệp trong một môi trường hiện đại – chuyên nghiệp – toàn cầu. FRA không chỉ là nơi làm việc, mà còn là nơi bạn khẳng định bản thân, chinh phục công nghệ mới và đồng hành kiến tạo một tương lai xanh hơn, thông minh hơn và bền vững hơn\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMô tả công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTriển khai thi công các dự án của công ty tại TP.HCM và các tỉnh miền Nam.\u003c/p\u003e\u003cp\u003e•\tThực hiện lắp đặt, đấu nối tủ bảng điện, hệ thống điện tại công trường: nhà máy điện, trạm biến áp EVN,…\u003c/p\u003e\u003cp\u003e•\tHỗ trợ khách hàng xử lý các vấn đề liên quan đến sản phẩm do công ty cung cấp (tủ bảng điện, Rơ le bảo vệ, thiết bị điện,…).\u003c/p\u003e\u003cp\u003e•\tGiám sát, kiểm tra và điều phối công việc của thầu phụ.\u003c/p\u003e\u003cp\u003e•\tPhối hợp và hỗ trợ các công việc tại Văn phòng HCM.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThi công \u0026 triển khai:\u003c/strong\u003e Thực hiện lắp đặt, đấu nối tủ bảng điện, hệ thống điện tại công trình; giám sát tiến độ và chất lượng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHỗ trợ kỹ thuật:\u003c/strong\u003e Hỗ trợ khách hàng trong quá trình sử dụng sản phẩm; xử lý các sự cố kỹ thuật phát sinh.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản lý thầu phụ:\u003c/strong\u003e Giám sát công việc của thầu phụ, đảm bảo tuân thủ tiêu chuẩn kỹ thuật và tiến độ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHồ sơ \u0026 báo cáo:\u003c/strong\u003e Chuẩn bị hồ sơ liên quan đến triển khai, nghiệm thu; thực hiện báo cáo công việc định kỳ/đột xuất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHỗ trợ nội bộ:\u003c/strong\u003e Phối hợp với các phòng ban và hỗ trợ công việc tại Văn phòng HCM khi được phân công.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI \u0026 ĐÃI NGỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThu nhập cạnh tranh:\u003c/strong\u003e Lương thưởng hấp dẫn, tương xứng với năng lực và hiệu quả công việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng lễ, Tết:\u003c/strong\u003e Các dịp 30/4, 1/5, 2/9, Tết Nguyên đán và các ngày đặc biệt khác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhúc lợi đa dạng:\u003c/strong\u003e Du lịch trong/ngoài nước, teambuilding, văn hóa – thể thao.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐào tạo \u0026 phát triển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tĐào tạo chuyên môn và kỹ năng
