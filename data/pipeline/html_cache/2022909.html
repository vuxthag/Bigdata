àng đầu. Đặc biệt khách hàng được quyến rũ bởi phong cách hiện đại, sang trọng của Elise ngang tầm với các thương hiệu nổi tiếng thế giới.\r\nSức mạnh và tiềm năng của công ty không nằm ở con số, máy móc hay nhà xưởng mà nằm ở chính Con Người Elise. Đó là Ban lãnh đạo tận tâm, uy tín, là đội ngũ nhân viên tràn đầy nhiệt huyết, sáng tạo. Tất cả mọi người đều khát khao cống hiến vì sứ mệnh của Công ty –Nơi ý tưởng thăng hoa, tài năng được khích lệ, tính trung thực và hy sinh được tôn trọng. Đó là tài sản quý báu và lớn nhất của Công ty được mỗi thành viên công ty xây đắp hàng ngày, hàng giờ qua từng công việc, từng sản phẩm bởi đó chính là niềm tự hào và ý nghĩa công việc của mỗi thành viên trong đội ngũ Elise.\r\nCho đến nay Elise không chỉ được khách hàng yêu mến bởi các mẫu thời trang sang trọng, quyến rũ mà còn bởi chúng tôi dẫn đầu trong việc liên tục tung ra các Bộ sưu tập thời trang. Trong nhiều năm liền, Elise luôn được đánh giá là thương hiệu thời trang có tốc độ phát triển nhanh nhất hiện nay vói hệ thống showroom phủ khắp các tỉnh thành trên khắp 3 miền, hiện diện tại nhiều thành phố lớn nhất Việt Nam như Hà Nội, TP. Hồ Chí Minh, Đà Nẵng, Huế, Nha Trang, Hải Phỏng …\r\nCon đường phía trước chắc chắn còn nhiều chông gai. Mặc dù luôn cố gắng hết mình, nhưng chúng tôi có thể có những lúc vấp váp không thể tránh khỏi. Nhưng những thử thách này sẽ giúp chúng tôi cứng cỏi hơn, mạnh mẽ hơn và trưởng thành hơn. Elise không có chỗ cho những người sợ hãi.\r\nTẦM NHÌN\r\nTrở thành Công ty thời trang dẫn đầu Việt Nam về xu hướng, thương hiệu và doanh thu. Đến năm 2020 có mặt trên thị trường thế giới.\r\nSỨ MỆNH\r\nLà lựa chọn đầu tiên của người mua sắm thời trang, niềm tự hào và khẳng định sức mạnh dân tộc Việt Nam.\r\nTRIẾT LÝ\r\nNhững gì người khác làm được, Elise sẽ làm được tốt hơn."])</script><script>self.__next_f.push([1,"24:Ta8c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eWhy You’ll Love This Job\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis role offers the opportunity to work directly with major corporate clients, including banks, large enterprises, and government organizations, engaging in high-value deals within a professional B2B sales cycle such as tenders and bidding projects. You will benefit from an attractive income package of 30–50M plus unlimited performance-based incentives. With available data and strong support from production and technical teams, you can focus on driving results effectively. At the same time, you will have full ownership in developing clients and shaping your own sales strategy to accelerate business growth.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThis position is ideal for candidates with prior experience in roles such as B2B Sales Manager, Corporate Sales, Key Account Manager (KAM), Business Development Manager, or those with a background in Project Sales, Tendering, and the Uniform, Garment, or Apparel industry.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Main Duties and Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.1 Professional Responsibilities:\u003c/p\u003e\u003cp\u003e• Communicate with customers to understand their needs and seek potential new clients in the premium corporate uniform sector.\u003c/p\u003e\u003cp\u003e• Maintain existing business relationships while establishing new connections with potential corporate clients. (prefer proven experience in the B2B market with an existing customer database)\u003c/p\u003e\u003cp\u003e• Prepare quotations and bidding online/offline as proposals based on approved pricing according to customer requests.\u003c/p\u003e\u003cp\u003e• Develop and implement strategic planning, preparation, and execution of uniform bidding processes for tenders organized by banks and government agencies.\u003c/p\u003e\u003cp\u003e• Draft contracts after reaching a basic agreement with clients and facilitate the necessary procedures between the client and the company for signing.\u003c/p\u003e\u003cp\u003e• Directly execute, monitor contract performance, and handle any arising issues.\u003c/p\u003e\u003cp\u003e• Receive and address customer complaints related to orders.\u003c/p\u003e\u003cp\u003e• Coordinate with the Production/Technical department to ensure from sample making to order quality.\u003c/p\u003e\u003cp\u003e• Have in-depth knowledge of the company’s products and stay informed about competitors’ offerings.\u003c/p\u003e\u003cp\u003e• Propose new strategies and plans to enhance work efficiency and drive business growth.\u003c/p\u003e\u003cp\u003e• Carry out assigned tasks as per the department head’s plan.\u003c/p\u003e\u003cp\u003e1.2 Reporting Responsibilities:\u003c/p\u003e\u003cp\u003e• Report to the Chief Executive Officer and the Board of Directors on work progress and plans on a monthly basis.\u003c/p\u003e\u003cp\u003e1.3 Other Activities:\u003c/p\u003e\u003cp\u003e• Perform additional tasks assigned by the Chief Executive Officer and the Board of Directors.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T52c,\u003cp\u003e\u003cstrong\u003e2. Required Experience, Knowledge, and Skills:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.1 Experience:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• At least 2 years of experience in a similar position within the apparel, uniform manufacturing, or fashion sales industry.\u003c/p\u003e\u003cp\u003e• Preference for candidates with experience working in large-scale companies specializing in high end apparel and uniforms.\u003c/p\u003e\u003cp\u003e• Experience in managing the team\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.2 Knowledge:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Bachelor's degree or higher, preferably in fields such as Apparel, Fashion, Business, or Trade.\u003c/p\u003e\u003cp\u003e• Proficiency in Microsoft Office (Word, Excel, etc.).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.3 Skills:\u ng chúng tôi có thể có những lúc vấp váp không thể tránh khỏi. Nhưng những thử thách này sẽ giúp chúng tôi cứng cỏi hơn, mạnh mẽ hơn và trưởng thành hơn. Elise không có chỗ cho những người sợ hãi.\r\nTẦM NHÌN\r\nTrở thành Công ty thời trang dẫn đầu Việt Nam về xu hướng, thương hiệu và doanh thu. Đến năm 2020 có mặt trên thị trường thế giới.\r\nSỨ MỆNH\r\nLà lựa chọn đầu tiên của người mua sắm thời trang, niềm tự hào và khẳng định sức mạnh dân tộc Việt Nam.\r\nTRIẾT LÝ\r\nNhững gì người khác làm được, Elise sẽ làm được tốt hơn."])</script><script>self.__next_f.push([1,"41:{\"companyId\":257137,\"jobImageURLs\":null,\"jobVideoURLs\":null,\"companyName\":\"Công Ty TNHH Thời Trang Elise\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/ab/10331916.png\",\"companySizeId\":\"\",\"companyProfile\":\"$42\",\"contactName\":\"Phòng Tuyển dụng Elise\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Số 2 Tôn Thất Tùng - Đống Đa - Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n44:{\"serviceCode\":\"TPM\",\"startOn\":\"2026-03-13T09:26:09+07:00\",\"expiredOn\":\"2026-04-12T23:59:59+07:00\"}\n45:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-03-13T09:26:09+07:00\",\"expiredOn\":\"2026-04-12T23:59:59+07:00\"}\n43:[\"$44\",\"$45\"]\n46:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"28:{\"jobId\":2022909,\"jobTitle\":\"Uniform Sales Manager (B2B) – Salary 30–50M + Commission (Existing Premium Clients)\",\"userId\":4604425,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/ab/10331916.png\",\"alias\":\"uniform-sales-manager-b2b-salary-30-50m-commission-existing-premium-clients\",\"createdOn\":\"202
