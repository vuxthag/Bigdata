ate programs, and team leadership.\u003c/p\u003e\u003cp\u003eAs the Affiliate Team Leader, you will be responsible for driving OnPoint's affiliate marketing strategy, leading a team, and delivering impactful campaigns that meet our clients' goals. You will work closely with internal teams and external partners to recruit top affiliates, manage campaigns, and foster long-term client partnerships.\u003c/p\u003e\u003cp\u003eIn the Brand Affiliate Leader role, the candidate will be responsible for: \u003c/p\u003e\u003cp\u003eAffiliate Program Management: \u003c/p\u003e\u003cp\u003e• Strategy Development: Develope and execute comprehensive affiliate marketing strategies to drive growth for brand clients.  \u003c/p\u003e\u003cp\u003e• Affiliate \u0026 Influencer Recruitment: Identify and recruit high-performing affiliates and influencers to expand our program’s reach and effectiveness.  \u003c/p\u003e\u003cp\u003e• Campaign Management: Oversee the end-to-end process of campaigns, including briefing, proposals, contracts, production, and execution.  \u003c/p\u003e\u003cp\u003e• Continuous Improvement: Propose innovative initiatives to enhance OnPoint’s competitive advantage in the market.\u003c/p\u003e\u003cp\u003eCampaign Planning: \u003c/p\u003e\u003cp\u003e• Target Achievement: Drive monthly, quarterly, and annual GMV/Revenue targets, ensuring campaigns deliver tangible results.  \u003c/p\u003e\u003cp\u003e• Campaign Planning \u0026 Execution: Lead the planning, launch, and optimization of affiliate campaigns aligned with client objectives.  \u003c/p\u003e\u003cp\u003e• Performance Analysis: Monitor and analyze campaign performance, adjusting strategies to improve ROI and maximize budget efficiency.\u003c/p\u003e\u003cp\u003eContent and Creative Strategy: \u003c/p\u003e\u003cp\u003e• Collaboration: Work with content and creative teams to develop engaging marketing materials that resonate with TikTok users and adhere to brand guidelines.\u003c/p\u003e\u003cp\u003eAnalytics and Reporting: \u003c/p\u003e\u003cp\u003e• KPI Tracking: Track key performance metrics for affiliate marketing efforts, providing actionable insights.  \u003c/p\u003e\u003cp\u003e• Client Reporting: Regularly update clients on campaign performance, identifying successes and areas for improvement.  \u003c/p\u003e\u003cp\u003e• Data analysis: able to handle \u0026 analysis massive data to make decision  \u003c/p\u003e\u003cp\u003eTeam management\u003c/p\u003e\u003cp\u003e• Training \u0026 Development: Lead internal training efforts to enhance team members’ skills in affiliate marketing and brand promotion.  \u003c/p\u003e\u003cp\u003e• Performance Management: Evaluate team performance and allocate resources effectively to optimize productivity.  \u003c/p\u003e\u003cp\u003e• Team Culture: Foster a collaborative, goal-oriented culture to support long-term team growth and success.\u003c/p\u003e\u003cp\u003eClient Relationship \u0026 Retention: \u003c/p\u003e\u003cp\u003e• Client Management: Negotiate and manage commercial terms with clients and supply chain partners to ensure favorable terms for OnPoint.  \u003c/p\u003e\u003cp\u003e• Client Engagement: Build and maintain strong relationships with brands and sellers, implementing strategies to retain and grow these partnerships.  \u003c/p\u003e\u003cp\u003e• Partnerships \u0026 Operations: Collaborate with the Partnership and Operations teams to establish a clear roadmap for efficient workflows and successful campaign execution.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T97e,"])</script><script>self.__next_f.push([1,"\u003cp\u003eEducation background requirements:  \u003c/p\u003e\u003cp\u003eBachelor at relevant experience  \u003c/p\u003e\u003cp\u003eExperience/Industry requirements:  \u003c/p\u003e\u003cp\u003e• 3-5 years of experience in affiliate marketing, ideally with a focus on eCommerce platforms (Shopee, TikTokShop, Lazada, etc.) and social media platforms (TikTok, YouTube, Facebook) with agency or platform background.  \u003c/p\u003e\u003cp\u003e• Proven track record of successful affiliate marketing campaigns, influencer collaborations, and achieving commercial targets.  \u003c/p\u003e\u003cp\u003e• A strong plus if you are used to or have been managing a monthly target of 20 billions VND or operation a mega livestream session.  \u003c/p\u003e\u003cp\u003e• Proactive problem-solving approach, anticipating potential challenges and devising effective solutions.  \u003c/p\u003e\u003cp\u003e• Be highly organized and accountable for deadlines, status reports and internal reviews - Predict problems that may arise and prepare solutions. Innovative and adaptive, with a keen eye for emerging trends in social commerce and digital marketing.  \u003c/p\u003e\u003cp\u003eCompetency requirements:  \u003c/p\u003e\u003cp\u003e• Analysis \u0026 Problem Solving: Identifies and analyses a range of problems by isolating key issues, evaluating relevant data and reaching logical conclusions  \u003c/p\u003e\u003cp\u003e• Analytical Skills: Ability to analyze data, track performance metrics, and derive actionable insights to improve campaigns.  \u003c/p\u003e\u003cp\u003e• Client-Centric: Strong focus on building lasting client relationships and delivering results that meet client needs.  \u003c/p\u003e\u003cp\u003e• Communication: Exceptional communication and negotiation skills, with the ability to engage stakeholders at all levels.  \u003c/p\u003e\u003cp\u003e• Project Management: Highly organized, with the ability to manage multiple projects simultaneously while meeting deadlines.  \u003c/p\u003e\u003cp\u003e• Adaptability: Strong ability to adapt in a fast-paced environment and quickly address challenges and opportunities as they arise.  \u003c/p\u003e\u003cp\u003e• Accountability \u0026 Ownership: Plans and balances a range of tasks, assignments, projects and resources. Is able to cope with conflicting demands without undue disruption in order to get things done.  \u003 r role, the candidate will be responsible for: \u003c/p\u003e\u003cp\u003eAffiliate Program Management: \u003c/p\u003e\u003cp\u003e• Strategy Development: Develope and execute comprehensive affiliate marketing strategies to drive growth for brand clients.  \u003c/p\u003e\u003cp\u003e• Affiliate \u0026 Influencer Recruitment: Identify and recruit high-performing affiliates and influencers to expand our program’s reach and effectiveness.  \u003c/p\u003e\u003cp\u003e• Campaign Management: Oversee the end-to-end process of campaigns, including briefing, proposals, contracts, production, and execution.  \u003c/p\u003e\u003cp\u003e• Continuous Improvement: Propose innovative initiatives to enhance OnPoint’s competitive advantage in the market.\u003c/p\u003e\u003cp\u003eCampaign Planning: \u003c/p\u003e\u003cp\u003e• Target Achievement: Drive monthly, quarterly, and annual GMV/Revenue targets, ensuring campaigns deliver tangible results.  \u003c/p\u003e\u003cp\u003e• Campaign Planning \u0026 Execution: Lead the planning, launch, and optimization of affiliate campaigns aligned with client objectives.  \u003c/p\u003e\u003cp\u003e• Performance Analysis: Monitor and analyze campaign performance, adjusting strategies to improve ROI and maximize budget efficiency.\u003c/p\u003e\u003cp\u003eContent and Creative Strategy: \u003c/p\u003e\u003cp\u003e• Collaboration: Work with content and creative teams to develop engaging marketing materials that resonate with TikTok users and adhere to brand guidelines.\u003c/p\u003e\u003cp\u003eAnalytics and Reporting: \u003c/p\u003e\u003cp\u003e• KPI Tracking: Track key performance metrics for affiliate marketing efforts, providing actionable insights.  \u003c/p\u003e\u003cp\u003e• Client Reporting: Regularly update clients on campaign performance, identifying successes and areas for improvement.  \u003c/p\u003e\u003cp\u003e• Data analysis: able to handle \u0026 analysis massive data to make decision  \u003c/p\u003e\u003cp\u003eTeam management\u003c/p\u003e\u003cp\u003e• Training \u0026 Development: Lead internal training efforts to enhance team members’ skills in affiliate marketing and brand promotion.  \u003c/p\u003e\u003cp\u003e• Performance Management: Evaluate team performance and allocate resources effectively to optimize productivity.  \u003c/p\u003e\u003cp\u003e• Team Culture: Foster a collaborative, goal-oriented culture to support long-term team growth and success.\u003c/p\u003e\u003cp\u003eClient Relationship \u0026 Retention: \u003c/p\u003e\u003cp\u003e• Client Management: Negotiate and manage commercial terms with clients and supply chain partners to ensure favorable terms for OnPoint.  \u003c/p\u003e\u003cp\u003e• Client Engagement: Build and maintain strong relationships with brands and sellers, implementing strategies to retain and grow these partnerships.  \u003c/p\u003e\u003cp\u003e• Partnerships \u0026 Operations: Collaborate with the Partnership and Operations teams to establish a clear roadmap for efficient workflows and successful campaign execution.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T97e,"])</script><script>self.__next_f.push([1,"\u003cp\u003eEducation background requirements:  \u003c/p\u003e\u003cp\u003eBachelor at relevant experience  \u003c/p\u003e\u003cp\u003eExperience/Industry requirements:  \u003c/p\u003e\u003cp\u003e• 3-5 years of experience in affiliate marketing, ideally with a focus on eCommerce platforms (Shopee, TikTokShop, Lazada, etc.) and social media platforms (TikTok, YouTube, Facebook) with agency or platform background.  \u003c/p\u003e\u003cp\u003e• Proven track record of successful affiliate marketing campaigns, influencer collaborations, and achieving commercial targets.  \u003c/p\u003e\u003cp\u003e• A strong plus if you are used to or have been managing a monthly target of 20 billions VND or operation a mega livestream session.  \u003c/p\u003e\u003cp\u003e• Proactive problem-solving approach, anticipating potential challenges and devising effective solutions.  \u003c/p\u003e\u003cp\u003e• Be highly organized and accountable for deadlines, status reports and internal reviews - Predict problems that may arise and prepare solutions. Innovative and adaptive, with a keen eye for emerging trends in social commerce and digital marketing.  \u003c/p\u003e\u003cp\u003eCompetency requirements:  \u003c/p\u003e\u003cp\u003e• Analysis \u0026 Problem Solving: Identifies and analyses a range of problems by isolating key issues, evaluating relevant data and reaching logical conclusions  \u003c/p\u003e\u003cp\u003e• Analytical Skills: Ability to analyze data, track performance metrics, and derive actionable insights to improve campaigns.  \u003c/p\u003e\u003cp\u003e• Client-Centric: Strong focus on building lasting client relationships and delivering results that meet client needs.  \u003c/p\u003e\u003cp\u003e• Communication: Exceptional communication and negotiation skills, with the ability to engage stakeholders at all levels.  \u003c/p\u003e\u003cp\u003e• Project Management: Highly organized, with the ability to manage multiple projects simultaneously while meeting deadlines.  \u003c/p\u003e\u003cp\u003e• Adaptability: Strong ability to adapt in a fast-paced environment and quickly address challenges and opportunities as they arise.  \u003c/p\u003e\u003cp\u003e• Accountability \u0026 Ownership: Plans and balances a range of tasks, assignments, projects and resources. Is able to cope with conflicting demands without undue disruption in order to get things done.  \u003c/p\u003e\u003cp\u003eTeamwork and Collaboration:  \u003c/p\u003e\u003cp\u003e• Building partnerships and working collaboratively with others to meet shared objectives.  \u003c/p\u003e\u003cp\u003e• Building strong-identity teams that apply their diverse skills and perspectives to achieve common goals.  \u003c/p\u003e\u003cp\u003e• Ability to lead and inspire a team, driving performance and innovation.\u003c/p\u003e"])</script><style data-styled=""
