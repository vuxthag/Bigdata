da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1077,"])</script><script>self.__next_f.push([1,"-----------------------------------------------------------------------------------------------------------\r\nGIỚI THIỆU CHUNG\r\n\r\nVới hơn 40 năm hình thành và phát triển, PECC2 đã khẳng định vị thế của mình trong lĩnh vực Năng lượng khi là Đơn vị hàng đầu tại Việt Nam có năng lực “Cung cấp giải pháp tư vấn toàn diện” – Từ Khảo sát, Thiết kế, Quản lý Dự án đến Đầu tư và Vận hành các Nhà máy điện, chúng tôi tự hào góp phần vào tiến trình chuyển dịch Năng lượng xanh, hiện đại hóa Hạ tầng và đảm bảo An ninh Năng lượng Quốc gia.\r\n\r\nHoạt động của PECC2 hiện nay gồm ba lĩnh vực chính:\r\n\r\n·       Tư vấn xây dựng điện\r\n·       Kinh doanh\r\n·       Đầu tư các dự án nguồn điện\r\n\r\nTrong đó, dựa trên thế mạnh cốt lõi về tư vấn, lĩnh vực Kinh doanh (tổng thầu EPC, gia công cơ khí và sản xuất thiết bị, quản lý vận hành nhà máy điện) là nhân tố quan trọng thúc đẩy doanh thu phát triển mạnh mẽ. Từ nền tảng đó, PECC2 đã bước sang lĩnh vực kinh doanh điện năng, làm chủ đầu tư các dự án năng lượng tái tạo, hoàn thành phát điện thương mại nhiều nhà máy điện mặt trời và sẽ tiếp tục phát triển hơn nữa trong tương lai.\r\n\r\n·       Hơn 200 Dự án Nguồn điện (\u003e 62.000 MW)\r\n·       Hơn 160 Trạm biến áp (\u003e 30.000 MVA)\r\n·       Hơn 460 Dự án Đường dây (\u003e 6.600 KM)\r\n·       Quản lý và Vận hành Nhà máy điện (\u003e 5.000 MW)\r\n\r\nVới thế mạnh về kinh nghiệm, công nghệ và nhân lực, PECC2 luôn chủ động nắm bắt các vận hội, đầu tư chiều sâu, ứng dụng kỹ thuật mới, nâng cao năng lực quản trị, cải tổ cấu trúc, nhằm không ngừng nâng cao chất lượng sản phẩm, dịch vụ, đảm bảo lợi thế cạnh tranh và sự phát triển bền vững của Công ty. \r\n\r\nBắt nhịp cùng cuộc cách mạng công nghệ 4.0, PECC2 đang nỗ lực thực hiện chuyển đổi số toàn diện, phát triển năng lực số và xây dựng môi trường văn hóa số, phát triển nhanh và bền vững trong thời đại mới.\r\n\r\nHiện nay, PECC2 còn chú trọng việc hợp tác nghiên cứu phát triển điện hạt nhân với các đối tác trong và ngoài nước, nhằm không ngừng củng cố và nâng cao năng lực điện hạt nhân, để sẵn sàng tham gia đóng góp vào chương trình phát triển điện hạt nhân thế hệ mới của Việt Nam trong tương lai.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nTẦM NHÌN\r\n\r\n1.     PECC2 là doanh nghiệp công nghệ số trong lĩnh vực năng lượng, hoạt động dựa trên nền tảng số tích hợp.\r\n2.     PECC2 củng cố vị thế cạnh tranh dựa trên năng lực số, mang đến sự khác biệt cho các đối tác, khách hàng thông qua các trải nghiệm số và các sản phẩm, dịch vụ chất lượng cao.\r\n3.     PECC2 đứng trong 100 doanh nghiệp tiêu biểu hàng đầu Việt Nam.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nSỨ MỆNH\r\n\r\n1.     Đảm bảo môi trường làm việc tin cậy, cộng tác và thấu cảm, vì hạnh phúc của mọi nhân sự PECC2.\r\n2.     Đồng hành cùng sự phát triển năng lượng Việt Nam, vì một hệ thống điện quốc gia thông minh và bền vững.\r\n3.     Hợp tác thực thi các dự án năng lượng trên nền tản công nghệ số, vì một mạng lưới năng lượng ASEAN kết nối.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nGIÁ TRỊ CỐT LÕI\r\n\r\nĐam mê nghề nghiệp - Đổi mới sáng tạo - Tinh thần phụng sự\r\n-----------------------------------------------------------------------------------------------------------"])</script><script>self.__next_f.push([1,"24:T12f5,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e***THÔNG TIN CÔNG VIỆC***\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Địa điểm làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Tòa nhà PECC2 Innovation Hub - Số 45, Đường số 2, Phường Thủ Đức, Thành phố Hồ Chí Minh;\u003c/p\u003e\u003cp\u003e+ Công trường các Dự án theo yêu cầu công việc (Chi tiết trao đổi khi Phỏng vấn).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thời gian làm việc: \u003c/strong\u003eTừ Thứ 2 đến Thứ 6 và Ngoài giờ (Nếu có) theo yêu cầu của Lãnh đạo Phòng và Lãnh đạo Công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Sáng: 07h30 - 12h00;\u003c/p\u003e\u003cp\u003e+ Chiều: 13h30 - 17h00.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Đơn vị làm việc: \u003c/strong\u003eĐơn vị Thành viên của Công ty Cổ phần Tư vấn Xây dựng Điện 2 (PECC2)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Chi nhánh Quản lý Nhà máy Điện mặt trời (SPMB)\u003c/p\u003e\u003cp\u003e+ Công ty Cổ phần Vận hành và Bảo trì Cảng PECC2 (PPOM)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***MÔ TẢ CÔNG VIỆC***\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Mục đích công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Đảm bảo tuân thủ Quy định Pháp luật và hỗ trợ ra quyết định Tài chính – Chiến lược;\u003c/p\u003e\u003cp\u003e+ Đảm bảo tính minh bạch, kịp thời và chính xác của Hệ thống Kế toán, đặc biệt trong lĩnh vực Vận hành và Bảo trì – Cảng, Nhà máy điện; Dịch vụ Logistics; Kinh doanh – Sản xuất Điện và các Hợp đồng Dịch vụ Kỹ thuật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Trách nhiệm và Nhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea) Quản lý Báo cáo Tài chính – Thuế:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Tập hợp, kiểm tra Hoá đơn (Đầu vào - Đầu ra) và nhập lên trên Phần mềm Kế toán;\u003c/p\u003e\u003cp\u003e+ Tổng hợp Số liệu và lập Báo cáo Thuế GTGT hàng Tháng/Quý;\u003c/p\u003e\u003cp\u003e+ Tính và trích khấu hao Tài sản Cố định;\u003c/p\u003e\u003cp\u003e+ Theo dõi và trích các khoản Chi phí trước 2421, 2422, 335, ...;\u003c/p\u003e\u003cp\u003e+ Kiểm tra, nhập liệu Sổ phụ của các Ngân hàng, đồng thời rà soát Giấy nhận Nợ - Có, Chứng từ Đối - Nhập, Công nợ Khách hàng - Đối tác, Hồ sơ Vay - Nợ,… và các khoản thanh toán trên Phần mềm;\u003c/p\u003e\u003cp\u003e+ Giám sát tình trạng Nhập - Xuất - Tồn;\u003c/p\u003e\u003cp\u003e+ Lập và kê khai Thuế GTGT, TNDN, TNCN cùng các Nghĩa vụ Tài chính khác;\u003c/p\u003e\u003cp\u003e+ Làm việc với Cơ quan Thuế, Kiểm toán, Thanh tra khi có yêu cầu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb) Kiểm soát Dòng tiền – Chi phí – Giá thành:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Giám sát Thu – Chi, quản lý Công nợ phải Thu - Trả;\u003c/p\u003e\u003cp\u003e+ Xuất Hóa đơn, theo dõi và tổng hợp, đối chiếu Công nợ với Khách hàng và toàn bộ Công ty;\u003c/p\u003e\u003cp\u003e+ Theo dõi Dòng tiền đối với các hoạt động Bảo trì - Vận hành Cảng, Chi phí Nhân công, Vật tư, Thuê ngoài, Khoán gọn.,…;\u003c/p\u003e\u003cp\u003e+ Tính Giá thành theo từng Hạng mục Dự án, Hợp đồng;\u003c/p\u003e\u003cp\u003e+ Tính Lương hàng tháng làm cơ sở quyết toán Thuế TNCN cuối năm;\u003c/p\u003e\u003cp\u003e+ Rà soát các nghiệp vụ Hạch toán, kiểm tra Lương - Thanh toán Lương, trích thanh toán BHXH, BHYT, BHTN và đối chiếu Báo cáo BHXH, TNCN.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Nhiệm vụ khác: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Tham mưu Chiến lược Tài chính – Ngân sách;\u003c/p\u003e\u003cp\u003e+ Phân tích hiệu quả Hoạt động và đề xuất các Giải pháp Tài chính tối ưu;\u003c/p\u003e\u003cp\u003e+ Lập Kế hoạch Ngân sách Năm/Quý và theo dõi thực hiện;\u003c/p\u003e\u003cp\u003e+ Các công tác khác theo phân công của Ban Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kết quả cần đạt được:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Hồ sơ Chứng từ được kiểm tra và xử lý kịp thời hàng ngày, phù hợp Quy định về Thuế, Kế toán và Quy chế Quản trị Công ty;\u003c/p\u003e\u003cp\u003e+ Hạch toán đầy đủ, chính xác theo Phần hành Kế toán được giao, đảm bảo thời hạn kê khai và nộp Thuế hàng tháng cũng như yêu cầu khóa sổ lập Báo cáo Tài chính riêng và Báo cáo Tài chính hợp nhất PECC2 hàng Quý;\u003c/p\u003e\u003cp\u003e+ Nhập liệu, cung cấp Thông tin kịp thời và đầy đủ phục vụ Báo cáo Định kỳ và Báo cáo Phân tích Kế toán Quản trị;\u003c/p\u003e\u003cp\u003e+ Hồ sơ Chứng từ Kế toán được lưu trữ đầy đủ, hệ thống tại Nơi làm việc và Kho của Công ty theo Quy định của Luật Kế toán;\u003c/p\u003e\u003cp\u003e+ Giải trình, làm việc với Kiểm toán Độc lập, Kiểm tra Thanh tra Thuế, và các Cơ quan Quản lý Nhà nước Phần hành phụ trách;\u003c/p\u003e\u003cp\u003e+ Thực hiện Báo cáo tuần chi tiết hàng tuần và phân tích Số liệu rõ ràng theo yêu cầu.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:Tca0,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e***HỒ SƠ ỨNG TUYỂN***\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eĐể Bộ phận Tuyển dụng có thể đánh giá đầy đủ về kinh nghiệm và chuyên môn của bạn, đề nghị bạn bổ sung các Hồ sơ sau:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e1. Đơn đăng ký dự tuyển có kèm hình ảnh\u003cstrong\u003e (Bắt buộc - Đánh máy)\u003c/strong\u003e;\u003c/p\u003e\u003cp\u003e2. 01 Bản CV xin việc, Bằng tốt nghiệp, Bảng điểm;\u003c/p\u003e\u003cp\u003e3. Các Bằng cấp, Chứng chỉ liên quan khác \u003cstrong\u003e(Nếu có)\u003c/strong\u003e;\u003c/p\u003e\u003cp\u003e4. Sơ yếu lý lịch, CCCD \u003cstrong\u003e(Có thể bổ sung sau)\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGHI CHÚ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+\u003cstrong\u003e Hồ sơ ghi rõ Vị trí ứng tuyển;\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e+ \u003cstrong\u003eBản gốc hoặc Bản sao có xác nhận của địa phương lưu theo thứ tự vào một (01) File gửi về Bộ phận Tuyển dụng;\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e+ Truy cập “Mục Tuyển dụng” tại Website Công ty (https://pecc2.com/) để liên hệ Bộ phận Tuyển dụng.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eGia nhập PECC2 - Bạn không chỉ có một công việc mà còn có một hành trình để khẳng định bản thân, nơi mỗi đóng góp đều mang ý nghĩa cho Cộng đồng và Ngành năng lượng Việt Nam.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChúng tôi tin rằng, sức mạnh của PECC2 nằm ở Con người - Những người dám nghĩ, dám làm và luôn hướng tới sự khác biệt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eCùng chúng tôi viết tiếp câu chuyện phát triển bền vững bằng Tri thức, Công nghệ và Khát vọng Đổi mới!\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e--------------------------------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Giới tính: \u003c/strong\u003eNam hoặc Nữ;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Độ tuổi: \u003c/strong\u003eTừ 22 tuổi đến 35 tuổi;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Học vấn: \u003c/strong\u003eTốt nghiệp Đại học chính quy chuyên ngành Kế toán/Kiểm toán/Tài chính/Ngân hàng/Logistics;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kiến thức:\u003c/strong\u003e Biết sử dụng Phần mềm Kế toán MISA/AMIS;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Kinh nghiệm: \u003c/strong\u003eTối thiếu 01 (một) năm kinh nghiệm trong cùng Lĩnh vực;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Ngoại ngữ: \u003c/strong\u003eCó khả năng giao tiếp, đọc hiểu Tài liệu Chuyên ngành và Hợp đồng Kinh tế bằng Tiếng Anh;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Vi tính: \u003c/strong\u003eSử dụng thành thạo các phần mềm Văn phòng;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Năng lực yêu cầu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Chịu được áp lực công việc;\u003c/p\u003e\u003cp\u003e+ Kỹ năng giao tiếp và thương thảo;\u003c/p\u003e\u003cp\u003e+ Kỹ năng tổ chức và sắp xếp xử lý công việc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e9. Phẩm chất cá nhân:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Trung thực;\u003c/p\u003e\u003cp\u003e+ Chăm chỉ;\u003c/p\u003e\u003cp\u003e+ Kỷ luật;\u003c/p\u003e\u003cp\u003e+ Trách nhiệm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e10. Khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Tuân thủ các Quy định do Công ty đề ra;\u003c/p\u003e\u003cp\u003e+ Có nguyện vọng gắn bó và làm việc dài hạn;\u003c/p\u003e\u003cp\u003e+ Có thể làm việc ngoài giờ theo yêu cầu công việc;\u003c/p\u003e\u003cp\u003e+ Tiếp nhận công việc trong Tháng 03/2026\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T1077,"])</script><script>self.__next_f.push([1,"-----------------------------------------------------------------------------------------------------------\r\nGIỚI THIỆU CHUNG\r\n\r\nVới hơn 40 năm hình thành và phát triển, PECC2 đã khẳng định vị thế của mình trong lĩnh vực Năng lượng khi là Đơn vị hàng đầu tại Việt Nam có năng lực “Cung cấp giải pháp tư vấn toàn diện” – Từ Khảo sát, Thiết kế, Quản lý Dự án đến Đầu tư và Vận hành các Nhà máy điện, chúng tôi tự hào góp phần vào tiến trình chuyển dịch Năng lượng xanh, hiện đại hóa Hạ tầng và đảm bảo An ninh Năng lượng Quốc gia.\r\n\r\nHoạt động của PECC2 hiện nay gồm ba lĩnh vực chính:\r\n\r\n·       Tư vấn xây dựng điện\r\n·       Kinh doanh\r\n·       Đầu tư các dự án nguồn điện\r\n\r\nTrong đó, dựa trên thế mạnh cốt lõi về tư vấn, lĩnh vực Kinh doanh (tổng thầu EPC, gia công cơ khí và sản xuất thiết bị, quản lý vận hành nhà máy điện) là nhân tố quan trọng thúc đẩy doanh thu phát triển mạnh mẽ. Từ nền tảng đó, PECC2 đã bước sang lĩnh vực kinh doanh điện năng, làm chủ đầu tư các dự án năng lượng tái tạo, hoàn thành phát điện thương mại nhiều nhà máy điện mặt trời và sẽ tiếp tục phát triển hơn nữa trong tương lai.\r\n\r\n·       Hơn 200 Dự án Nguồn điện (\u003e 62.000 MW)\r\n·       Hơn 160 Trạm biến áp (\u003e 30.000 MVA)\r\n·       Hơn 460 Dự án Đường dây (\u003e 6.600 KM)\r\n·       Quản lý và Vận hành Nhà máy điện (\u003e 5.000 MW)\r\n\r\nVới thế mạnh về kinh nghiệm, công nghệ và nhân lực, PECC2 luôn chủ động nắm bắt các vận hội, đầu tư chiều sâu, ứng dụng kỹ thuật mới, nâng cao năng lực quản trị, cải tổ cấu trúc, nhằm không ngừng nâng cao chất lượng sản phẩm, dịch vụ, đảm bảo lợi thế cạnh tranh và sự phát triển bền vững của Công ty. \r\n\r\nBắt nhịp cùng cuộc cách mạng công nghệ 4.0, PECC2 đang nỗ lực thực hiện chuyển đổi số toàn diện, phát triển năng lực số và xây dựng môi trường văn hóa số, phát triển nhanh và bền vững trong thời đại mới.\r\n\r\nHiện nay, PECC2 còn chú trọng việc hợp tác nghiên cứu phát triển điện hạt nhân với các đối tác trong và ngoài nước, nhằm không ngừng củng cố và nâng cao năng lực điện hạt nhân, để sẵn sàng tham gia đóng góp vào chương trình phát triển điện hạt nhân thế hệ mới của Việt Nam trong tương lai.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nTẦM NHÌN\r\n\r\n1.     PECC2 là doanh nghiệp công nghệ số trong lĩnh vực năng lượng, hoạt động dựa trên nền tảng số tích hợp.\r\n2.     PECC2 củng cố vị thế cạnh tranh dựa trên năng lực số, mang đến sự khác biệt cho các đối tác, khách hàng thông qua các trải nghiệm số và các sản phẩm, dịch vụ chất lượng cao.\r\n3.     PECC2 đứng trong 100 doanh nghiệp tiêu biểu hàng đầu Việt Nam.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nSỨ MỆNH\r\n\r\n1.     Đảm bảo môi trường làm việc tin cậy, cộng tác và thấu cảm, vì hạnh phúc của mọi nhân sự PECC2.\r\n2.     Đồng hành cùng sự phát triển năng lượng Việt Nam, vì một hệ thống điện quốc gia thông minh và bền vững.\r\n3.     Hợp tác thực thi các dự án năng lượng trên nền tản công nghệ số, vì một mạng lưới năng lượng ASEAN kết nối.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nGIÁ TRỊ CỐT LÕI\r\n\r\nĐam mê nghề nghiệp - Đổi mới sáng tạo - Tinh thần phụng sự\r\n-----------------------------------------------------------------------------------------------------------"])</script><script>self.__next_f.push([1,"29:T1077,"])</script><script>self.__next_f.push([1,"-----------------------------------------------------------------------------------------------------------\r\nGIỚI THIỆU CHUNG\r\n\r\nVới hơn 40 năm hình thành và phát triển, PECC2 đã khẳng định vị thế của mình trong lĩnh vực Năng lượng khi là Đơn vị hàng đầu tại Việt Nam có năng lực “Cung cấp giải pháp tư vấn toàn diện” – Từ Khảo sát, Thiết kế, Quản lý Dự án đến Đầu tư và Vận hành các Nhà máy điện, chúng tôi tự hào góp phần vào tiến trình chuyển dịch Năng lượng xanh, hiện đại hóa Hạ tầng và đảm bảo An ninh Năng lượng Quốc gia.\r\n\r\nHoạt động của PECC2 hiện nay gồm ba lĩnh vực chính:\r\n\r\n·       Tư vấn xây dựng điện\r\n·       Kinh doanh\r\n·       Đầu tư các dự án nguồn điện\r\n\r\nTrong đó, dựa trên thế mạnh cốt lõi về tư vấn, lĩnh vực Kinh doanh (tổng thầu EPC, gia công cơ khí và sản xuất thiết bị, quản lý vận hành nhà máy điện) là nhân tố quan trọng thúc đẩy doanh thu phát triển mạnh mẽ. Từ nền tảng đó, PECC2 đã bước sang lĩnh vực kinh doanh điện năng, làm chủ đầu tư các dự án năng lượng tái tạo, hoàn thành phát điện thương mại nhiều nhà máy điện mặt trời và sẽ tiếp tục phát triển hơn nữa trong tương lai.\r\n\r\n·       Hơn 200 Dự án Nguồn điện (\u003e 62.000 MW)\r\n·       Hơn 160 Trạm biến áp (\u003e 30.000 MVA)\r\n·       Hơn 460 Dự án Đường dây (\u003e 6.600 KM)\r\n·       Quản lý và Vận hành Nhà máy điện (\u003e 5.000 MW)\r\n\r\nVới thế mạnh về kinh nghiệm, công nghệ và nhân lực, PECC2 luôn chủ động nắm bắt các vận hội, đầu tư chiều sâu, ứng dụng kỹ thuật mới, nâng cao năng lực quản trị, cải tổ cấu trúc, nhằm không ngừng nâng cao chất lượng sản phẩm, dịch vụ, đảm bảo lợi thế cạnh tranh và sự phát triển bền vững của Công ty. \r\n\r\nBắt nhịp cùng cuộc cách mạng công nghệ 4.0, PECC2 đang nỗ lực thực hiện chuyển đổi số toàn diện, phát triển năng lực số và xây dựng môi trường văn hóa số, phát triển nhanh và bền vững trong thời đại mới.\r\n\r\nHiện nay, PECC2 còn chú trọng việc hợp tác nghiên cứu phát triển điện hạt nhân với các đối tác trong và ngoài nước, nhằm không ngừng củng cố và nâng cao năng lực điện hạt nhân, để sẵn sàng tham gia đóng góp vào chương trình phát triển điện hạt nhân thế hệ mới của Việt Nam trong tương lai.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nTẦM NHÌN\r\n\r\n1.     PECC2 là doanh nghiệp công nghệ số trong lĩnh vực năng lượng, hoạt động dựa trên nền tảng số tích hợp.\r\n2.     PECC2 củng cố vị thế cạnh tranh dựa trên năng lực số, mang đến sự khác biệt cho các đối tác, khách hàng thông qua các trải nghiệm số và các sản phẩm, dịch vụ chất lượng cao.\r\n3.     PECC2 đứng trong 100 doanh nghiệp tiêu biểu hàng đầu Việt Nam.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nSỨ MỆNH\r\n\r\n1.     Đảm bảo môi trường làm việc tin cậy, cộng tác và thấu cảm, vì hạnh phúc của mọi nhân sự PECC2.\r\n2.     Đồng hành cùng sự phát triển năng lượng Việt Nam, vì một hệ thống điện quốc gia thông minh và bền vững.\r\n3.     Hợp tác thực thi các dự án năng lượng trên nền tản công nghệ số, vì một mạng lưới năng lượng ASEAN kết nối.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nGIÁ TRỊ CỐT LÕI\r\n\r\nĐam mê nghề nghiệp - Đổi mới sáng tạo - Tinh thần phụng sự\r\n-----------------------------------------------------------------------------------------------------------"])</script><script>self.__next_f.push([1,"2a:T12f5,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e***THÔNG TIN CÔNG VIỆC***\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Địa điểm làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Tòa nhà PECC2 Innovation Hub - Số 45, Đường số 2, Phường Thủ Đức, Thành phố Hồ Chí Minh;\u003c/p\u003e\u003cp\u003e+ Công trường các Dự án theo yêu cầu công việc (Chi tiết trao đổi khi Phỏng vấn).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thời gian làm việc: \u003c/strong\u003eTừ Thứ 2 đến Thứ 6 và Ngoài giờ (Nếu có) theo yêu cầu của Lãnh đạo Phòng và Lãnh đạo Công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Sáng: 07h30 - 12h00;\u003c/p\u003e\u003cp\u003e+ Chiều: 13h30 - 17h00.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Đơn vị làm việc: \u003c/strong\u003eĐơn vị Thành viên của Công ty Cổ phần Tư vấn Xây dựng Điện 2 (PECC2)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Chi nhánh Quản lý Nhà máy Điện mặt trời (SPMB)\u003c/p\u003e\u003cp\u003e+ Công ty Cổ phần Vận hành và Bảo trì Cảng PECC2 (PPOM)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***MÔ TẢ CÔNG VIỆC***\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Mục đích công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Đảm bảo tuân thủ Quy định Pháp luật và hỗ trợ ra quyết định Tài chính – Chiến lược;\u003c/p\u003e\u003cp\u003e+ Đảm bảo tính minh bạch, kịp thời và chính xác của Hệ thống Kế toán, đặc biệt trong lĩnh vực Vận hành và Bảo trì – Cảng, Nhà máy điện; Dịch vụ Logistics; Kinh doanh – Sản xuất Điện và các Hợp đồng Dịch vụ Kỹ thuật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Trách nhiệm và Nhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea) Quản lý Báo cáo Tài chính – Thuế:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Tập hợp, kiểm tra Hoá đơn (Đầu vào - Đầu ra) và nhập lên trên Phần mềm Kế toán;\u003c/p\u003e\u003cp\u003e+ Tổng hợp Số liệu và lập Báo cáo Thuế GTGT hàng Tháng/Quý;\u003c/p\u003e\u003cp\u003e+ Tính và trích khấu hao Tài sản Cố định;\u003c/p\u003e\u003cp\u003e+ Theo dõi và trích các khoản Chi phí trước 2421, 2422, 335, ...;\u003c/p\u003e\u003cp\u003e+ Kiểm tra, nhập liệu Sổ phụ của các Ngân hàng, đồng thời rà soát Giấy nhận Nợ - Có, Chứng từ Đối - Nhập, Công nợ Khách hàng - Đối tác, Hồ sơ Vay - Nợ,… và các khoản thanh toán trên Phần mềm;\u003c/p\u003e\u003cp\u003e+ Giám sát tình trạng Nhập - Xuất - Tồn;\u003c/p\u003e\u003cp\u003e+ Lập và kê khai Thuế GTGT, TNDN, TNCN cùng các Nghĩa vụ Tài chính khác;\u003c/p\u003e\u003cp\u003e+ Làm việc với Cơ quan Thuế, Kiểm toán, Thanh tra khi có yêu cầu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb) Kiểm soát Dòng tiền – Chi phí – Giá thành:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Giám sát Thu – Chi, quản lý Công nợ phải Thu - Trả;\u003c/p\u003e\u003cp\u003e+ Xuất Hóa đơn, theo dõi và tổng hợp, đối chiếu Công nợ với Khách hàng và toàn bộ Công ty;\u003c/p\u003e\u003cp\u003e+ Theo dõi Dòng tiền đối với các hoạt động Bảo trì - Vận hành Cảng, Chi phí Nhân công, Vật tư, Thuê ngoài, Khoán gọn.,…;\u003c/p\u003e\u003cp\u003e+ Tính Giá thành theo từng Hạng mục Dự án, Hợp đồng;\u003c/p\u003e\u003cp\u003e+ Tính Lương hàng tháng làm cơ sở quyết toán Thuế TNCN cuối năm;\u003c/p\u003e\u003cp\u003e+ Rà soát các nghiệp vụ Hạch toán, kiểm tra Lương - Thanh toán Lương, trích thanh toán BHXH, BHYT, BHTN và đối chiếu Báo cáo BHXH, TNCN.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Nhiệm vụ khác: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Tham mưu Chiến lược Tài chính – Ngân sách;\u003c/p\u003e\u003cp\u003e+ Phân tích hiệu quả Hoạt động và đề xuất các Giải pháp Tài chính tối ưu;\u003c/p\u003e\u003cp\u003e+ Lập Kế hoạch Ngân sách Năm/Quý và theo dõi thực hiện;\u003c/p\u003e\u003cp\u003e+ Các công tác khác theo phân công của Ban Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kết quả cần đạt được:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+ Hồ sơ Chứng từ được kiểm tra và xử lý kịp thời hàng ngày, phù hợp Quy định về Thuế, Kế toán và Quy chế Quản trị Công ty;\u003c/p\u003e\u003cp\u003e+ Hạch toán đầy đủ, chính xác theo Phần hành Kế toán được giao, đảm bảo thời hạn kê khai và nộp Thuế hàng tháng cũng như yêu cầu khóa sổ lập Báo cáo Tài chính riêng và Báo cáo Tài chính hợp nhất PECC2 hàng Quý;\u003c/p\u003e\u003cp\u003e+ Nhập liệu, cung cấp Thông tin kịp thời và đầy đủ phục vụ Báo cáo Định kỳ và Báo cáo Phân tích Kế toán Quản trị;\u003c/p\u003e\u003cp\u003e+ Hồ sơ Chứng từ Kế toán được lưu trữ đầy đủ, hệ thống tại Nơi làm việc và Kho của Công ty theo Quy định của Luật Kế toán;\u003c/p\u003e\u003cp\u003e+ Giải trình, làm việc với Kiểm toán Độc lập, Kiểm tra Thanh tra Thuế, và các Cơ quan Quản lý Nhà nước Phần hành phụ trách;\u003c/p\u003e\u003cp\u003e+ Thực hiện Báo cáo tuần chi tiết hàng tuần và phân tích Số liệu rõ ràng theo yêu cầu.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:Tca0,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e***HỒ SƠ ỨNG TUYỂN***\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eĐể Bộ phận Tuyển dụng có thể đánh giá đầy đủ về kinh nghiệm và chuyên môn của bạn, đề nghị bạn bổ sung các Hồ sơ sau:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e1. Đơn đăng ký dự tuyển có kèm hình ảnh\u003cstrong\u003e (Bắt buộc - Đánh máy)\u003c/strong\u003e;\u003c/p\u003e\u003cp\u003e2. 01 Bản CV xin việc, Bằng tốt nghiệp, Bảng điểm;\u003c/p\u003e\u003cp\u003e3. Các Bằng cấp, Chứng chỉ liên quan khác \u003cstrong\u003e(Nếu có)\u003c/strong\u003e;\u003c/p\u003e\u003cp\u003e4. Sơ yếu lý lịch, CCCD \u003cstrong\u003e(Có thể bổ sung sau)\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGHI CHÚ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e+\u003cstrong\u003e Hồ sơ ghi rõ Vị trí ứng tuyển;\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e+ \u003cstrong\u003eBản gốc hoặc Bản sao có xác nhận của địa phương lưu theo thứ tự vào một (01) File gửi về Bộ phận Tuyển dụng;\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e+ Truy cập “Mục Tuyển dụng” tại Website Công ty (https://pecc2.com/) để liên hệ Bộ phận Tuyển dụng.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eGia nhập PECC2 - Bạn không chỉ có một công việc mà còn có một hành trình để khẳng định bản thân, nơi mỗi đóng góp đều mang ý nghĩa cho Cộng đồng và Ngành năng lượng Việt Nam.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChúng tôi tin rằng, sức mạnh của PECC2 nằm ở Con người - Những người dám nghĩ, dám làm và luôn hướng tới sự khác biệt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eCùng chúng tôi viết tiếp câu chuyện phát triển bền vững bằng Tri thức, Công nghệ và Khát vọng Đổi mới!\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e--------------------------------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Giới tính: \u003c/strong\u003eNam hoặc Nữ;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Độ tuổi: \u003c/strong\u003eTừ 22 tuổi đến 35 tuổi;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Học vấn: \u003c/strong\u003eTốt nghiệp Đại học chính quy chuyên ngành Kế toán/Kiểm toán/Tài chính/Ngân hàng/Logistics;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kiến thức:\u003c/strong\u điện mặt trời và sẽ tiếp tục phát triển hơn nữa trong tương lai.\r\n\r\n·       Hơn 200 Dự án Nguồn điện (\u003e 62.000 MW)\r\n·       Hơn 160 Trạm biến áp (\u003e 30.000 MVA)\r\n·       Hơn 460 Dự án Đường dây (\u003e 6.600 KM)\r\n·       Quản lý và Vận hành Nhà máy điện (\u003e 5.000 MW)\r\n\r\nVới thế mạnh về kinh nghiệm, công nghệ và nhân lực, PECC2 luôn chủ động nắm bắt các vận hội, đầu tư chiều sâu, ứng dụng kỹ thuật mới, nâng cao năng lực quản trị, cải tổ cấu trúc, nhằm không ngừng nâng cao chất lượng sản phẩm, dịch vụ, đảm bảo lợi thế cạnh tranh và sự phát triển bền vững của Công ty. \r\n\r\nBắt nhịp cùng cuộc cách mạng công nghệ 4.0, PECC2 đang nỗ lực thực hiện chuyển đổi số toàn diện, phát triển năng lực số và xây dựng môi trường văn hóa số, phát triển nhanh và bền vững trong thời đại mới.\r\n\r\nHiện nay, PECC2 còn chú trọng việc hợp tác nghiên cứu phát triển điện hạt nhân với các đối tác trong và ngoài nước, nhằm không ngừng củng cố và nâng cao năng lực điện hạt nhân, để sẵn sàng tham gia đóng góp vào chương trình phát triển điện hạt nhân thế hệ mới của Việt Nam trong tương lai.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nTẦM NHÌN\r\n\r\n1.     PECC2 là doanh nghiệp công nghệ số trong lĩnh vực năng lượng, hoạt động dựa trên nền tảng số tích hợp.\r\n2.     PECC2 củng cố vị thế cạnh tranh dựa trên năng lực số, mang đến sự khác biệt cho các đối tác, khách hàng thông qua các trải nghiệm số và các sản phẩm, dịch vụ chất lượng cao.\r\n3.     PECC2 đứng trong 100 doanh nghiệp tiêu biểu hàng đầu Việt Nam.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nSỨ MỆNH\r\n\r\n1.     Đảm bảo môi trường làm việc tin cậy, cộng tác và thấu cảm, vì hạnh phúc của mọi nhân sự PECC2.\r\n2.     Đồng hành cùng sự phát triển năng lượng Việt Nam, vì một hệ thống điện quốc gia thông minh và bền vững.\r\n3.     Hợp tác thực thi các dự án năng lượng trên nền tản công nghệ số, vì một mạng lưới năng lượng ASEAN kết nối.\r\n\r\n-----------------------------------------------------------------------------------------------------------\r\nGIÁ TRỊ CỐT LÕI\r\n\r\nĐam mê nghề nghiệp - Đổi mới sáng tạo - Tinh thần phụng sự\r\n-----------------------------------------------------------------------------------------------------------"])</script><script>self.__next_f.push([1,"43:{\"companyId\":405678,\"jobImageURLs\":\"$44\",\"jobVideoURLs\":\"$45\",\"companyName\":\"Công Ty Cổ Phần Tư Vấn Xây Dựng Điện 2 (PECC2)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/d4/11414406.png\",\"companySizeId\":\"\",\"companyProfile\":\"$46\",\"contactName\":\"Cao Ngọc Duyên (Bộ phận Tuyển dụng - 0938.828.060)\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Tòa nhà PECC2 Innovation Hub - Số 45, Đường số 2, Phường Thủ Đức, Thành phố Hồ Chí Minh\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images.vietnamworks.com/pictureofcompany/b2/company-info-cover-picture-url-405678-1762858228.png\"}\n48:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-03-13T09:52:01+07:00\",\"expiredOn\":\"2026-04-12T23:59:59+07:00\"}\n47:[\"$48\"]\n49:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"28:{\"jobId\":2022946,\"jobTitle\":\"Kế Toán Tổng Hợp | General Accountant\",\"userId\":7936283,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/d4/11414406.png\",\"alias\":\"ke-toan-tong-hop-general-accountant-\",\"createdOn\":\"2026-03-13T09:51:34+07:00\",\"approvedOn\":\"2026-03-13T09:52:01+07:00\",\"expiredOn\":\"2026-04-12T23:59:59+07:00\",\"lastUpdatedOn\":\"2026-03-13T11:54:00+07:00\",\"lastSyncedOn\":\"2026-04-12T12:05:04+07:00\",\"companyName\":
