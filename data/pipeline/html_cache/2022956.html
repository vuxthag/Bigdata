iệu số 1 hiện nay cho ngành hàng đồ dùng mẹ và bé (máy hâm sữa, máy tiệt trùng, máy hút sữa, máy đun nước pha sữa, ...), chiếm khoảng 65% tổng thị phần ngành hàng đồ dùng mẹ và bé trên các sàn thương mại điện tử tại Việt Nam. Trong năm 2023, Nhãn hiệu Fatz baby nằm trong Top 10 Nhãn hiệu bán chạy nhất trên các sàn thương mại điện tử. Công ty luôn liên tục mở rộng thị trường và phát triển những dòng sản phẩm mới, thương hiệu mới.\r\n\r\nMô hình quản trị, văn hóa và phương thức làm việc của công ty theo phương Tây/Mỹ. Công ty chỉ có 1 cổ đông và được xây dựng dựa trên sự minh bạch, công bằng, rõ ràng. Không phát triển dựa trên quan hệ thân hữu/họ hàng. Chúng tôi dựa vào Tinh thần làm chủ, Kỹ năng lãnh đạo và Tài năng để thăng tiến nhân viên từ nội bộ của mình. Chúng tôi coi con người là 1 trong những tài sản quý giá nhất của Công ty.\r\n\r\n\r\nTại Công ty, mọi người đều bình đẳng, tôn trọng lẫn nhau và tôn trọng sự khác biệt. Ý chí, Nghị lực, Tố chất lãnh đạo và Tinh thần làm chủ là những giá trị cốt lõi của Công ty và là yếu tố giúp Công ty vượt qua những giai đoạn khó khăn nhất. Chúng tôi làm việc với niềm tin “Không gì là không thể”, luôn hướng tới mục đích thành công lâu dài. Chúng tôi tin rằng mỗi cá nhân, không phân biệt giới tính, tuổi tác, sắc tộc, tôn giáo hay học vấn, đều có thể vươn tới thành công với lòng kiên trì, sáng tạo và nỗ lực không ngừng nghỉ. (Xin xem mục “Chúng tôi là ai” trên website http://genex.com.vn)."])</script><script>self.__next_f.push([1,"24:Tc0a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Quản lý Kho:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Lập chiến lược triển khai, kiểm soát và cải tiến các hoạt động kho (quản lý kho, nhập kho, xuất kho, lưu kho) nhằm đảm bảo hiệu quả, chính xác và an toàn, tiết kiệm.\u003c/p\u003e\u003cp\u003e- Giám sát việc bảo quản, sắp xếp hàng hóa khoa học, tránh hư hỏng và xử lý kịp thời các phát sinh.\u003c/p\u003e\u003cp\u003e- Quản lý trực tiếp Thủ kho Miền Bắc, Thủ kho kiêm QLGH Miền Nam bao gồm cả đánh giá, đào tạo và phân bổ tối ưu nguồn nhân lực.\u003c/p\u003e\u003cp\u003e- Phân công công việc và theo dõi tiến độ hoạt động kho, đảm bảo tuân thủ quy trình, chính sách nội bộ và tiêu chuẩn vận hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Theo dõi và kiểm soát chất lượng, chi phí vận hành kho nội bộ và kho hàng outsource\u003c/strong\u003e (rất quan trọng), nhằm tối ưu hóa ngân sách và nâng cao hiệu quả công việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Luôn luôn tìm kiếm, đánh giá, lựa chọn các đối tác kho hàng outsource để có dịch vụ tốt, chi phí tối ưu, đảm bảo vận hành trơn tru, thông suốt.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tiếp nhận, trao đổi và xử lý thông tin với các bộ phận liên quan như Kế toán để bảo đảm hoạt động quản lý, kiểm kê kho đồng bộ với các phòng ban khác.\u003c/p\u003e\u003cp\u003e- Thực hiện chế độ báo cáo định kỳ theo quy định của Công ty; chịu trách nhiệm về tính chính xác, trung thực của dữ liệu báo cáo kho.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Quản lý Giao hàng \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kiểm tra và phê duyệt chi phí vận chuyển, nhà xe giao hàng đi Tỉnh, đảm bảo chính xác, hợp lý và tiết kiệm và có đầy đủ hóa đơn, chứng từ hợp lý, hợp lệ.\u003c/p\u003e\u003cp\u003e- Luôn luôn tìm kiếm, đánh giá, lựa chọn các nhà xe, đối tác vận chuyển để có dịch vụ tốt, chi phí tối ưu và đầy đủ hóa đơn, chứng từ hợp lý , hợp lệ.\u003c/p\u003e\u003cp\u003e- Quản lý nhân sự giao hàng Miền Bắc và giao hàng Miền Nam (thông qua Thủ kho kiêm QLGH Miền Nam), bao gồm phân công công việc hợp lý, tối ưu và công bằng cho các nhân viên, quản lý tiến độ giao hàng đúng hạn và chất lượng dịch vụ giao hàng luôn luôn tốt, đồng thời giải quyết các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e- Quản lý dịch vụ giao hàng do bên thứ 3 cung cấp, đảm bảo tuân thủ hợp đồng, chất lượng dịch vụ luôn luôn tốt và với chi phí hợp lý.\u003c/p\u003e\u003cp\u
