ân tích nhu cầu, xây dựng và triển khai đào tạo sát thực tế vận hành.\u003c/p\u003e\u003cp\u003e- Kiểm soát hiệu quả đào tạo, phát triển đội ngũ kế thừa và giảng viên nội bộ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản lý quan hệ lao động \u0026 tuân thủ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trực tiếp xử lý các vấn đề quan hệ lao động, tranh chấp, kỷ luật, khiếu nại.\u003c/p\u003e\u003cp\u003e- Đảm bảo tuân thủ pháp luật lao động, BHXH, nội quy – quy chế trong thực tế vận hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Văn hóa doanh nghiệp \u0026 truyền thông nội bộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng và triển khai thực tế các chương trình văn hóa, truyền thông nội bộ.\u003c/p\u003e\u003cp\u003e- Đảm bảo thông điệp, chính sách được hiểu và áp dụng nhất quán trong toàn hệ thống.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Quản trị mục tiêu, kế hoạch và kiểm soát thực thi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trực tiếp làm việc với Ban Tổng Giám đốc về mục tiêu, BSC/KPI, kế hoạch hành động.\u003c/p\u003e\u003cp\u003e- Theo dõi sát tiến độ, kiểm soát kết quả, yêu cầu điều chỉnh ngay khi không đạt.\u003c/p\u003e\u003cp\u003e- Chủ trì hệ thống báo cáo quản trị nhân sự và điều hành liên phòng ban.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Ta81,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e- Kinh nghiệm quản lý Nhân sự – Hành chính ở cấp Giám đốc\u003c/strong\u003e, ưu tiên ứng viên từng làm việc tại \u003cstrong\u003edoanh nghiệp tư nhân quy mô từ 500 nhân sự trở lên\u003c/strong\u003e và \u003cstrong\u003ecó kinh nghiệm dẫn dắt, đồng hành cùng doanh nghiệp trong giai đoạn tái cấu trúc\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e- Có \u003cstrong\u003ekinh nghiệm thực chiến\u003c/strong\u003e trong việc \u003cstrong\u003etriển khai các dự án nhân sự trọng điểm\u003c/strong\u003e, bao gồm nhưng không giới hạn: xây dựng khung năng lực, phát triển đội ngũ nhân sự kế cận, tối ưu mô hình tổ chức và vận hành, thiết kế và triển khai hệ thống phân quyền, triển khai BSC KPI.\u003c/p\u003e\u003cp\u003e- Có \u003cstrong\u003etư duy chiến lược gắn chặt với thực tiễn vận hành\u003c/strong\u003e; phong cách làm việc chủ động, sẵn sàng \u003cstrong\u003etham gia trực tiếp cùng đội ngũ\u003c/strong\u003e, theo sát quá trình triển khai và \u003cstrong\u003ekịp thời xử lý các vấn đề phát sinh trong hoạt động vận hành\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi ứng viên:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Mức thu nhập cạnh tranh\u003c/strong\u003e, được trao đổi và thỏa thuận thẳng thắn dựa trên năng lực, kinh nghiệm và mức độ cam kết với vai trò.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Cơ chế đãi ngộ rõ ràng, minh bạch\u003c/strong\u003e, tuân thủ đầy đủ các quy định của Pháp luật, tạo nền tảng để anh/chị yên tâm tập trung vào công tác điều hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Chính sách thưởng đa dạng\u003c/strong\u003e: thưởng các dịp lễ, thưởng cuối năm, thưởng đột xuất theo kết quả và các sáng kiến cải tiến mang lại giá trị thực tế cho tổ chức.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Xét điều chỉnh thu nhập định kỳ hằng năm\u003c/strong\u003e, dựa trên kết quả thực thi và mức độ đóng góp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Cơ hội xây dựng, hoàn thiện và phát triển đội ngũ nhân sự kế cận\u003c/strong\u003e, thông qua các chương trình đào tạo nội bộ và phát triển cán bộ nguồn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Môi trường làm việc tôn trọng tính chuyên nghiệp\u003c/strong\u003e, có các hoạt động gắn kết nội bộ, teambuilding, du lịch hằng năm và \u003cstrong\u003echăm sóc sức khỏe định kỳ\u003c/strong\u003e cho cán bộ nhân viên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Đây là vị trí dành cho những anh/chị mong muốn gắn bó dài hạn\u003c/strong\u003e, tạo
