u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eComplete assigned market research deliverables as the primary person in charge by conducting analysis, coordinating required inputs, and preparing market reports, periodic reports, and related analytical outputs to support investment decisions and strategic planning.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eII. Trách nhiệm và nghĩa vụ / Responsibilities and Duties:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1. Thông tin thị trường \u0026 Phân tích | Market Intelligence \u0026 Analysis\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Thu thập, kiểm tra, duy trì và phân tích dữ liệu thị trường cho các lĩnh vực kinh doanh liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCollect, verify, maintain, and analyze market data across relevant business areas.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Thực hiện nghiên cứu sơ cấp và thứ cấp, bao gồm phỏng vấn, khảo sát và khảo sát thực địa khi cần thiết.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eConduct primary and secondary research, including interviews, surveys, and site visits when required.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Phân tích cung – cầu, giá, tỷ lệ hấp thụ, lợi suất, xu hướng đầu tư và các thay đổi pháp lý liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eAnalyze supply-demand dynamics, pricing, absorption, yield, investment trends, and relevant regulatory changes\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Sản phẩm \u0026 Báo cáo | Deliverables \u0026 Reporting\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm hoàn thành các báo cáo nghiên cứu thị trường, báo cáo định kỳ và các sản phẩm phân tích được giao với vai trò người phụ trách chính.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eComplete final market research reports, periodic reports, and other assigned analytical deliverables as the primary person in charge.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Chuẩn bị các phân tích thị trường có cấu trúc rõ ràng, insight dựa trên dữ liệu và tài liệu trình bày phục vụ nội bộ và bên ngoài, bao gồm tài liệu cho khách hàng khi cần thiết.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePrepare well-structured market analysis, data-driven insights, and presentation materials for internal and external use, including client-facing materials where required.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Đảm bảo tất cả các sản phẩm được giao có độ chính xác, đầy đủ và được hoàn thành đúng thời hạn theo phạm vi và tiêu chuẩn chất lượng đã thống nhất.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure all assigned deliverables are accurate, complete, and submitted on time in accordance with agreed scope and quality standards.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Triển khai dự án \u0026 Điều phối | Project Execution \u0026 Coordination\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Dẫn dắt các hạng mục nghiên cứu được giao thông qua việc phối hợp với các bộ phận nội bộ và các bên liên quan bên ngoài về phạm vi công việc, yêu cầu dữ liệu, tiến độ và sản phẩm đầu ra.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eLead assigned research
