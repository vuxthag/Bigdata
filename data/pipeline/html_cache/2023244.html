"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n24:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T18c8,"])</script><script>self.__next_f.push([1,"I. GIA NHẬP ĐỘI NGŨ DƯƠNG NHẬT - TỔNG THẦU SỐ 1 VIỆT NAM VỀ CÔNG NGHỆ MÔI TRƯỜNG XỬ LÝ NƯỚC THẢI, XỬ LÝ NƯỚC CẤP\r\nThành lập từ năm 2004, sau hơn 20 năm xây dựng và phát triển, Công ty TNHH Đầu Tư Xây Dựng và Công Nghệ Môi Trường Dương Nhật đã trở thành thương hiệu uy tín và là Nhà thầu Tổng thầu số 1 Việt Nam về Công nghệ Môi trường xử lý nước thải, xử lý nước cấp với các lĩnh vực hoạt động:\r\n•\tTổng thầu EPC/chìa khóa trao tay các dự án xử lý nước thải, xử lý nước cấp.\r\n•\tĐầu tư BT, BOT các công trình môi trường.\r\n•\tDịch vụ Vận hành và Bảo trì (O\u0026M).\r\n•\tĐầu tư cho thuê và vận hành các công trình môi trường.\r\nDƯƠNG NHẬT đã thực hiện trên 300 dự án xử lý nước thải, xử lý nước cấp cho hơn 20 ngành nghề khác nhau tại các Nhà máy, Khu công nghiệp, Khu dân cư, Khu đô thị; Xử lý nước siêu tinh khiết dành cho sản xuất. Trong đó, có nhiều Tập đoàn đa quốc gia hàng đầu thế giới, với các yêu cầu khắt khe về tiêu chuẩn kỹ thuật như: Heineken, Carlsberg, AB InBev, Sabeco, ThaiBev, Coca Cola, Suntory Pepsico, Nestlé, VRG, Trung Nguyên, Becamex, VSIP, Amata, IDICO, Minh Phú, C.P.Group, Thai Union Group, Betrimex, Vifon, DOHACO, SCG, … Cùng hơn 70 nhà máy xử lý nước thải tập trung tại các khu công nghiệp lớn trên khắp Việt Nam: Becamex, VSIP, Amata, Viglacera, IDICO, Protrade, Saigon VRG, Tân Tạo, Tín Nghĩa, Đông Nam Á, Nam Tân Uyên, Tân Bình, Tân Phú, Minh Hưng III, Mỹ Xuân B1 – Đại Dương, Tân Đô, Hiệp Phước, Chơn Thành, … Đồng thời DƯƠNG NHẬT không ngừng mở rộng hoạt động ra khu vực với nhiều dự án được thực hiện tại các nước như Lào, Cambodia, Myanmar, Papua New Guinea, Nigeria.\r\nChúng tôi tự hào là Công ty Môi trường Tư nhân đầu tiên đạt THƯƠNG HIỆU QUỐC GIA VIỆT NAM và 4 LẦN LIÊN TIẾP SAO VÀNG ĐẤT VIỆT đã khẳng định vị thế Dương Nhật là Tổng thầu số 1 Việt Nam về Công nghệ Môi trường xử lý nước thải, xử lý nước cấp.\r\nDương Nhật tự hào khi sở hữu hệ thống nhân sự chuyên nghiệp và luôn tận tâm với công việc, bao gồm đội ngũ kỹ sư giỏi và nhân viên trẻ, làm việc tích cực, có nhiều kinh nghiệm trong lĩnh vực xây dựng và công nghệ môi trường. Hiện Công ty đang có gần 400 thạc sỹ, kỹ sư chuyên ngành, cán bộ kỹ thuật và hơn 500 công nhân lành nghề được tập huấn, đào tạo chuyên môn từ cơ bản đến chuyên sâu nhằm đảm bảo phục vụ tốt cho mọi công trình cũng như yêu cầu khắt khe nhất từ đối tác. \r\nỞ Dương Nhật, Chúng tôi hiểu rõ “Con người là giá trị cốt lõi, nền tảng cho mọi thành công”, mỗi vị trí tuyển dụng không chỉ đơn thuần là cơ hội việc làm mà còn là bước đệm quan trọng để bạn phát triển vượt bậc trong sự nghiệp. Dù bạn hướng đến vị trí quản lý hay phát triển chuyên môn, Chúng tôi luôn trân trọng, ghi nhận và tạo điều kiện tốt nhất để năng lực của bạn được tỏa sáng.\r\n\r\n Ứng viên có thể tìm hiểu thêm về Dương Nhật qua hồ sơ năng lực và các kênh truyền thông:\r\n•\tWebsite: duongnhat.com.vn\r\n•\tFanpage: facebook.com/duongnhatsince2004\r\n•\tYoutube: youtube.com/c/duongnhatvn\r\n\r\nII. CHÍNH SÁCH ĐÃI NGỘ VÀ PHÚC LỢI:\r\nDƯƠNG NHẬT xây dựng chính sách lương, thưởng gắn liền với kết quả hoạt động kinh doanh và phù hợp với từng vị trí công việc, kỹ năng và trình độ chuyên môn của nhân viên nhằm ghi nhận đúng mức năng lực và kết quả công việc của từng cá nhân, đồng thời tạo động lực khuyến khích nhân viên phát huy năng lực, trách nhiệm để nâng cao năng suất, chất lượng và hiệu quả công việc.\r\n- Chính Sách Lương:\r\n•\tLương Chức danh; Lương hiệu quả công việc; Lương tháng 13;\r\n•\tTăng lương định kỳ (2 đợt/năm): được thực hiện định kỳ vào tháng 1 và tháng 7 hàng năm.\r\n•\tTăng lương đột xuất: vào bất kỳ thời điểm, căn cứ vào hiệu quả làm việc vượt trội và thành tích của cá nhân cũng như sự đóng góp vào sự phát triển của Công ty.\r\n- Chính Sách Thưởng:\r\n•\tThưởng lương tháng thứ 13\r\n•\tThưởng lương năng suất làm việc vào cuối năm\r\n•\tThưởng cổ tức (thâm niên và trách nhiệm)\r\n•\tThưởng nhân các ngày lễ Tết;\r\n•\tThưởng thành tích định kỳ và đột xuất cho cá nhân hoặc tập thể;\r\n•\tThưởng năng suất dự án.\r\n- Bảo hiểm:\r\n•\tThực hiện trích nộp bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp cho người lao động đầy đủ theo quy định hiện hành. Giải quyết các chế độ về thai sản, ốm đau, trợ cấp thôi việc theo đúng quy định của pháp luật.\r\n- Phúc lợi khác:\r\n•\tTham quan, nghỉ mát hàng năm: hàng năm Công ty sẽ tổ chức cho toàn thể nhân viên đi tham quan, nghỉ mát ít nhất 1 lần/năm.\r\n•\tBảo hiểm chăm sóc sức khỏe toàn diện (Bảo Việt/PVI)\r\n- Chính sách Đào tạo và Phát triển:\r\n•\tĐào tạo và phát triển nguồn nhân lực là công tác được ưu tiên hàng đầu của DƯƠNG NHẬT nhằm xây dựng và phát triển đội ngũ nhân viên thành thạo về nghiệp vụ, chuẩn mực trong đạo đức kinh doanh, chuyên nghiệp trong phong cách làm việc.\r\n•\tCác khoá đào tạo kỹ năng công tác, kiến thức chuyên môn, đào tạo quản lý … được tổ chức liên tục với chương trình phù hợp với yêu cầu thực tế.\r\n\r\nDƯƠNG NHẬT – “LUÔN ĐÁP ỨNG TỐT HƠN MỌI SỰ CAM KẾT”"])</script><script>self.__next_f.push([1," o hiểm thất nghiệp cho người lao động đầy đủ theo quy định hiện hành. Giải quyết các chế độ về thai sản, ốm đau, trợ cấp thôi việc theo đúng quy định của pháp luật.\r\n- Phúc lợi khác:\r\n•\tTham quan, nghỉ mát hàng năm: hàng năm Công ty sẽ tổ chức cho toàn thể nhân viên đi tham quan, nghỉ mát ít nhất 1 lần/năm.\r\n•\tBảo hiểm chăm sóc sức khỏe toàn diện (Bảo Việt/PVI)\r\n- Chính sách Đào tạo và Phát triển:\r\n•\tĐào tạo và phát triển nguồn nhân lực là công tác được ưu tiên hàng đầu của DƯƠNG NHẬT nhằm xây dựng và phát triển đội ngũ nhân viên thành thạo về nghiệp vụ, chuẩn mực trong đạo đức kinh doanh, chuyên nghiệp trong phong cách làm việc.\r\n•\tCác khoá đào tạo kỹ năng công tác, kiến thức chuyên môn, đào tạo quản lý … được tổ chức liên tục với chương trình phù hợp với yêu cầu thực tế.\r\n\r\nDƯƠNG NHẬT – “LUÔN ĐÁP ỨNG TỐT HƠN MỌI SỰ CAM KẾT”"])</script><script>self.__next_f.push([1,"3b:{\"companyId\":134813,\"jobImageURLs\":null,\"jobVideoURLs\":\"$3c\",\"companyName\":\"Công Ty TNHH Đầu Tư Xây Dựng Và Công Nghệ Môi Trường Dương Nhật\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/7c/11374269.png\",\"companySizeId\":\"\",\"companyProfile\":\"$3d\",\"contactName\":\"Bộ Phận Tuyển Dụng\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"599-601-603 Hoàng Văn Thụ, Phường Tân Sơn Nhất,TP Hồ Chí Minh, Việt Nam\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n3f:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-03-13T14:23:53+07:00\",\"expiredOn\":\"2026-04-12T23:59:59+07:00\"}\n3e:[\"$3f\"]\n40:{\"jobInvitationId\":0,\"status\":0}\n"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:{\"job
