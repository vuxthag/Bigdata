nh đạo các giải pháp đẩy nhanh tiến độ thi công và nâng cao chất lượng công trình đảm bảo hiệu quả kinh tế.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Duyệt Phiếu yêu cầu cấp vật tư cho nhà thầu (nếu chủ đầu tư cấp vật tư), Phiếu yêu cầu cung cấp thiết bị phục vụ hoạt động của Ban quản lý dự án;\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Tổ chức kiểm soát, giám sát các vật tư, vật liệu đầu vào, thiết bị do nhà thầu đưa vào công trình đảm bảo đủ về số lượng và đúng về chất lượng, chủng loại, mẫu mã theo quy định của hợp đồng kinh tế và thiết kế được duyệt.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Chủ trì nghiệm thu hoàn thành bộ phận công trình.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Tham gia nghiệm thu hoàn thành hạng mục công trình/ hoàn thành công trình bàn giao đưa vào sử dụng.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Ký nghiệm thu khối lượng hoàn thành cho các đợt thanh toán/ ký nghiệm thu khối lượng quyết toán hạng mục công trình.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eQUẢN LÝ CÔNG TRƯỜNG\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Duy trì mối quan hệ với cơ quan quản lý địa phương, nắm bắt tình hình để triển khai thi công an toàn, hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Tổ chức quản lý lưu trữ hồ sơ dự án và báo cáo các đoàn Thanh kiểm tra nội bộ, cơ quan ban ngành.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eQUẢN LÝ HÀNH CHÍNH NHÂN SỰ TẠI CÔNG TRƯỜNG\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Lập kế hoạch nhân sự, chi phí vận hành định kỳ/phát sinh và triển khai trong ngân sách được duyệt.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Phối hợp với Ban nhân sự thực hiện tuyển dụng nhân sự dưới quyền. Tham gia phỏng vấn và có báo cáo đánh giá theo yêu cầu\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng, đánh giá, rà soát Quy trình làm việc, mô tả công việc và đề xuất điều chỉnh phù hợp với thực tế tiến độ công trường.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Quản lý nhân sự trong Ban và đề xuất các điều chỉnh nhân sự (bổ nhiệm, miễn nhiệm, thuyên chuyển, khen thưởng, kỷ luật …) phù hợp với thực tế hoạt động. Có đánh giá, thẩm định định kỳ và đột xuất đối với các nhân viên hoặc từng nhân viên.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Cung cấp đào tạo và phát triển chuyên môn cho các nhân viên liên quan đến bộ môn chuyên ngành đối với công việc của từng nhân viên.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Quản lý đảm bảo tuân thủ các quy định Nhà nước, địa phương và công ty.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eQUẢN LÝ AN NINH/AN TOÀN\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm chính về an ninh, an toàn, môi trường và PCCC tại công trường và các công trình phụ trợ.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng các quy định về ATLĐ, nội quy thi công … và nghiêm khắc yêu cầu các nhà thầu tuân thủ để đảm bảo an toàn.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Là đầu mối liên lạc với cơ quan quản lý địa phương trong các vấn đề phát sinh tại công trường.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Báo cáo ngay cho Ban Tổng giám đốc Tập đoàn khi xảy ra các phát sinh tại công trường.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eCÔNG TÁC BÁO CÁO\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e-  Báo cáo tuần/tháng/quý về lũy kế thực hiện của dự án.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e-  Weekly/monthly/quarterly report on the cumulative performance of the project.\u003c/p\u003e\u0
