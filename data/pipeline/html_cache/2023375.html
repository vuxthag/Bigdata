iệp trong dịch vụ chăm sóc đại lý.\r\n• Hợp tác: Xây dựng các mối quan hệ hợp tác dựa trên tinh thần tôn trọng, hai bên cùng có lợi.\r\n• Tiết kiệm: Luôn tiết kiệm và sử dụng hợp lý tài nguyên để góp phần xây dựng xã hội văn minh, hiện đại.\r\nVĂN HÓA CÔNG TY\r\nTại Nhà An Toàn chúng tôi đề cao tinh thần đồng đội, sự sáng tạo và không ngừng học hỏi. Chúng tôi tin rằng, mỗi thành viên đều là một mảnh ghép quan trọng, góp phần tạo nên thành công chung của công ty. Chúng tôi luôn khuyến khích sự chủ động, tinh thần trách nhiệm và sẵn sàng hỗ trợ lẫn nhau để cùng nhau phát triển.\r\nChúng tôi tìm kiếm\r\nChúng tôi đang tìm kiếm những ứng viên tài năng, nhiệt huyết và có cùng chí hướng, quan điểm với công ty. Nếu bạn là người:\r\n• Có đam mê với lĩnh vực thiết bị an ninh, IT và nhà thông minh.\r\n• Mong muốn làm việc trong môi trường chuyên nghiệp, năng động và thân thiện.\r\n• Có tinh thần trách nhiệm cao, chủ động và sáng tạo trong công việc.\r\n• Luôn hướng đến sự hoàn thiện và phát triển bản thân.\r\nHãy gia nhập Nhà An Toàn để cùng chúng tôi xây dựng tương lai thành công!\r\n\r\n\r\nChúng tôi sẽ trả lời mọi câu hỏi và thắc mắc liên quan.\r\nTham khảo thông tin tại : www.nhaantoan.com / www.hikvision.vn\r\n\r\nLiên hệ :\r\n+ Trụ sở chính : Tầng 5, Tòa 97-99 Láng Hạ – Q.Đống Đa – TP.Hà Nội\r\n+ Chi nhánh : Số 299/3 Lý Thường Kiệt– P15 – Q.11 – Tp.HCM\r\n+ Chi nhánh: 703 Điện Biên Phủ, An Khê, Thanh Khê, TP Đà Nẵng\r\n\r\nCompany Size: 100-499"])</script><script>self.__next_f.push([1,"24:T5b8,\u003cp\u003e\u003cem\u003eKhi gia nhập Nhà An Toàn, bạn sẽ trở thành một phần của đội ngũ chuyên gia trong lĩnh vực phân phối thiết bị an ninh, thiết bị IT và thiết bị nhà thông minh tại Việt Nam.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eChúng tôi mang đến cho bạn cơ hội sáng tạo tương lai thông qua các công việc có ý nghĩa và văn hoá không ngừng đổi mới.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u
