ofrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T718,September 19, 2019 - One Mount was established with the ambition of building Vietnam's most trusted ecosystem, empowering all people and businesses to realize their full potential at the intersection of technology and humanity. Our main products include:\r\n\r\n1. VinShop (operated under One Mount Distribution), a dedicated retail app enabling independent shop owners to grow their business via tech enabled supply chain and inventory management\r\n2. VinID (operated under One Mount Consumer), a super app and Vietnam's largest consumer loyalty program integrating many functions such as payment, housing management, goods purchase, and financial services\r\n3. OneHousing (operated under One Mount Real Estate), a one-stop destination for all needs in housing, supporting buying, selling, investing and other real-estate-related services.\r\n\r\n\r\nOUR WORK: All employees are empowered to grow their most meaningful careers at One Mount. "])</script><script>self.__next_f.push([1,"With every single new feature launched, every innovation implemented, and every market challenge solved, One Mount Staff are proud to be making positive changes on Vietnamese people's daily lives by leveraging the advantages of technological sophistication. \r\nTo us, the value of work creates strong motivation for continuous learning, remarkable innovation and outcomes-driven spirit.\r\n\r\nOUR LIFE: The inspiring purpose and fast-pace of work quickly makes One Mount become a second home for talents across the globe. The variance in age, gender, regions and perspectives shaped  the cultural diversity, fosters team creativity, and increases employee engagement. \r\nOne Mount chooses to promote the \"Success Culture\" with 5 core values probably stated as Result-driven, Breakthrough perspectives, Business mindset, Collaboration and Efficiency in the journey of creating values for all.24:T1121,"])</script><script>self.__next_f.push([1,"\u003cp\u003eMÔ TẢ CÔNG VIỆC \u003c/p\u003e\u003cp\u003eChuyên viên SecOps chịu trách nhiệm vận hành các chương trình giám sát, săn lùng mối đe dọa và ứng cứu sự cố an ninh bảo mật nhằm đảm bảo an toàn cho hệ thống CNTT của One Mount. Vị trí này đóng vai trò quan trọng trong việc phát hiện sớm, phân tích và xử lý các mối đe dọa an ninh mạng, giảm thiểu rủi ro và đảm bảo sự liên tục trong hoạt động kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tGiám sát \u0026 Xử lý Cảnh báo:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tVận hành hệ thống SIEM: Giám sát liên tục các sự kiện an ninh trên toàn bộ hệ thống.\u003c/p\u003e\u003cp\u003e•\tPhân tích và điều tra cảnh báo: Tiếp nhận, phân loại và phân tích sâu các cảnh báo bảo mật từ SIEM, EDR, IDS/IPS, WAF để xác định các mối đe dọa thực sự.\u003c/p\u003e\u003cp\u003e•\tỨng phó sự cố: Thực hiện các bước ứng phó ban đầu theo quy trình, bao gồm việc cô lập hệ thống bị ảnh hưởng, ngăn chặn các hành vi tấn công và thu thập bằng chứng số.\u003c/p\u003e\u003cp\u003e•\tTối ưu hóa quy tắc phát hiện: Tinh chỉnh và phát triển các quy tắc mới để tăng độ chính xác của hệ thống giám sát, giảm thiểu cảnh báo sai.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tQuản lý Lỗ hổng Bảo mật:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuét và nhận diện lỗ hổng: Sử dụng các công cụ chuyên dụng để thường xuyên rà quét lỗ hổng trên các hệ thống máy chủ, ứng dụng và thiết bị mạng.\u003c/p\u003e\u003cp\u003e•\tPhân tích và xếp hạng rủi ro: Đánh giá mức độ nghiêm trọng của các lỗ hổng được phát hiện, kết hợp với bối cảnh kinh doanh để ưu tiên các hoạt động khắc phục.\u003c/p\u003e\u003cp\u003e•\tPhối hợp khắc phục: Làm việc chặt chẽ với các đội ngũ vận hành hệ thống để theo dõi, đôn đốc và hỗ trợ quá trình vá lỗi, đảm bảo các lỗ hổng được xử lý trong thời gian quy định.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tTình báo An ninh mạng\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003e•\tThu thập và phân tích thông tin: Chủ động theo dõi, thu thập thông tin về các mối đe dọa mới, các chiến thuật, kỹ thuật và quy trình của hacker từ các nguồn tin cậy.\u003c/p\u003e\u003cp\u003e•\tTích hợp TI vào vận hành: Áp dụng thông tin tình báo để cải thiện khả năng phòng thủ, ví dụ như cập nhật danh sách các IP độc hại vào Firewall/SIEM, hay triển khai các quy tắc phát hiện mới dựa trên TTPs của các nhóm tấn công đang hoạt động.\u003c/p\u003e\u003cp\u003e•\tSăn lùng mối đe dọa: Dựa trên giả thuyết và dữ liệu tình báo, chủ động tìm kiếm các dấu hiệu bất thường, các hành vi đáng ngờ chưa bị hệ thống tự động phát hiện.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tTuân thủ \u0026 Báo cáo:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp kiểm toán: Hỗ trợ các hoạt động đánh giá, kiểm toán an ninh nội bộ và bên ngoài\u003c/p\u003e\u003cp\u003e•\tĐảm bảo tuân thủ chính sách: Giám sát và thực thi việc tuân thủ các chính sách, quy trình bảo mật đã được ban hành trong toàn tổ chức.\u003c/p\u003e\u003cp\u003e•\tXây dựng báo cáo: Định kỳ tạo các báo cáo về tình hình an ninh, số lượng sự cố, trạng thái lỗ hổng và các chỉ số hiệu suất quan trọng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tEndpoint Security:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản trị và tối ưu hóa các nền tảng EDR/XDR\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThiết lập các chính sách ngăn chặn, loại trừ và giám sát liên tục.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThực hiện Threat Hunting\u003c/strong\u003e chủ động trên các thiết bị đầu cuối để phát hiện các hành vi bất thường chưa có chữ ký.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\tDigital Forensics \u0026 Incident Response:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhản ứng nhanh với các cảnh báo bảo mật mức độ cao.\u003c/p\u003e\u003cp\u003e•\tThực hiện thu thập dữ liệu bộ nhớ, ổ đĩa và log hệ thống để phân tích pháp chứng.\u003c/p\u003e\u003cp\u003e•\tPhân tích mã độc cơ bản để hiểu hành vi và tác động của chúng.\u003c/p\u003e\u003cp\u003e•\tXây dựng báo cáo điều tra sau sự cố và đề xuất biện pháp khắc phục triệt để.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tc07,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU CÔNG VIỆC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm làm việc trong lĩnh vực An ninh mạng, đặc biệt là các mảng SecOps, SOC, DFIR, Threat Intelligence, Threat Hunting hoặc Vulnerability Management.\u003c/p\u003e\u003cp\u003e•\tKiến thức chuyên sâu về các giao thức mạng, hệ điều hành (Windows, Linux), ứng dụng web và cơ sở dữ liệu.\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm sử dụng các công cụ và nền tảng bảo mật như SIEM, SOAR, EDR, Vulnerability Scanners, Threat Intelligence Platforms (MISP, OpenCTI).\u003c/p\u003e\u003cp\u003e•\tKhả năng phân tích log, phát hiện và phân loại các cảnh báo bảo mật.\u003c/p\u003e\u003cp\u003e•\tHiểu biết về các chuẩn và quy trình an ninh mạng quốc tế.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giải quyết vấn đề, tư duy logic và khả năng làm việc dưới áp lực.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp tốt, có khả năng trình bày thông tin kỹ thuật một cách rõ ràng và hiệu quả.\u003c/p\u003e\u003cp\u003e•\tCó các chứng chỉ bảo mật là một lợi thế (ví dụ: CompTIA Security+, CEH, SANS GIAC).\u003c/p\u003e\u003cp\u003e•\tQuen thuộc với các nền tảng điện toán đám mây (AWS, GCP, Azure) là một lợi thế lớn.\u003c/p\u003e\u003cp\u003e•\tCó khả năng viết script cơ bản (Python, Bash) để tự động hóa các tác vụ lặp lại.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI \u0026 CHẾ ĐỘ ĐÃI NGỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLương tháng 13 với thưởng hiệu suất hàng năm, thưởng dự án, thưởng doanh số (tùy theo vị trí)\u003c/p\u003e\u003cp\u003e•\tPhụ cấp ăn trưa: 730.000 VND/tháng\u003c/p\u003e\u003cp\u003e•\tThưởng các dịp đặc biệt: 3tr5 - 5tr VND/năm\u003c/p\u003e\u003cp\u003e•\tPhép năm: Lên đến 20 ngày/năm (tùy theo cấp bậc)\u003c/p\u003e\u003cp\u003e•\tY tế: Bảo hiểm xã hội, bảo hiểm cao cấp\u003c/p\u003e\u003cp\u003e•\tĐược cấp laptop, màn hình và các thiết bị/tài khoản/công cụ cần thiết khác cho công việc\u003c/p\u003e\u003cp\u003e•\tĐánh giá tăng lương và thăng tiến hàng năm\u003c/p\u003e\u003cp\u003e•\tLộ trình sự nghiệp đa dạng: Cơ hội quản lý hoặc chuyên gia và luân chuyển chức năng\u003c/p\u003e\u003cp\u003e•\tNguồn học e-learning miễn phí trên các nền tảng Udemy, Coursera, O'relly, workshop nội bộ, tài trợ chứng nhận và Cố vấn độc quyền (C-level)\u003c/p\u003e\u003cp\u003e•\tĐược công nhận và khen thưởng ở cấp độ đội nhóm và tổ chức\u003c/p\u003e\u003cp\u003e•\tCơ hội phát triển sự nghiệp rộng mở trong Hệ sinh thái Techcombank \u0026 Masterise Group\u003c/p\u003e\u003cp\u003e•\tChương trình vay ưu đãi với lãi suất cạnh tranh và chính sách ân hạn gốc phù hợp với từng Sản phẩm vay.\u003c/p\u003e\u003cp\u003e•\tKhông gian làm việc mở và hợp tác thúc đẩy cả sự tập trung cá nhân và các hoạt động làm việc nhóm\u003c/p\u003e\u003cp\u003e•\tMôi trường, văn hóa làm việc sáng tạo, hiệu suất cao\u003c/p\u003e\u003cp\u003e•\tKhu vực thư giãn: chơi game, bóng bàn, yoga, phòng tập thể dục, phòng tắm.\u003c/p\u003e\u003cp\u003e•\tTeambuilding hàng quý/hàng năm và các sự kiện nội bộ hấp dẫn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T718,September 19, 2019 - One Mount was established with the ambition of building Vietnam's most trusted ecosystem, empowering all people and busin uy tắc phát hiện mới dựa trên TTPs của các nhóm tấn công đang hoạt động.\u003c/p\u003e\u003cp\u003e•\tSăn lùng mối đe dọa: Dựa trên giả thuyết và dữ liệu tình báo, chủ động tìm kiếm các dấu hiệu bất thường, các hành vi đáng ngờ chưa bị hệ thống tự động phát hiện.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tTuân thủ \u0026 Báo cáo:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp kiểm toán: Hỗ trợ các hoạt động đánh giá, kiểm toán an ninh nội bộ và bên ngoài\u003c/p\u003e\u003cp\u003e•\tĐảm bảo tuân thủ chính sách: Giám sát và thực thi việc tuân thủ các chính sách, quy trình bảo mật đã được ban hành trong toàn tổ chức.\u003c/p\u003e\u003cp\u003e•\tXây dựng báo cáo: Định kỳ tạo các báo cáo về tình hình an ninh, số lượng sự cố, trạng thái lỗ hổng và các chỉ số hiệu suất quan trọng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tEndpoint Security:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản trị và tối ưu hóa các nền tảng EDR/XDR\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThiết lập các chính sách ngăn chặn, loại trừ và giám sát liên tục.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThực hiện Threat Hunting\u003c/strong\u003e chủ động trên các thiết bị đầu cuối để phát hiện các hành vi bất thường chưa có chữ ký.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\tDigital Forensics \u0026 Incident Response:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhản ứng nhanh với các cảnh báo bảo mật mức độ cao.\u003c/p\u003e\u003cp\u003e•\tThực hiện thu thập dữ liệu bộ nhớ, ổ đĩa và log hệ thống để phân tích pháp chứng.\u003c/p\u003e\u003cp\u003e•\tPhân tích mã độc cơ bản để hiểu hành vi và tác động của chúng.\u003c/p\u003e\u003cp\u003e•\tXây dựng báo cáo điều tra sau sự cố và đề xuất biện pháp khắc phục triệt để.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:Tc07,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU CÔNG VIỆC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm làm việc trong lĩnh vực An ninh mạng, đặc biệt là các mảng SecOps, SOC, DFIR, Threat Intelligence, Threat Hunting hoặc Vulnerability Management.\u003c/p\u003e\u003cp\u003e•\tKiến thức chuyên sâu về các giao thức mạng, hệ điều hành (Windows, Linux), ứng dụng web và cơ sở dữ liệu.\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm sử dụng các công cụ và nền tảng bảo mật như SIEM, SOAR, EDR, Vulnerability Scanners, Threat Intelligence Platforms (MISP, OpenCTI).\u003c/p\u003e\u003cp\u003e•\tKhả năng phân tích log, phát hiện và phân loại các cảnh báo bảo mật.\u003c/p\u003e\u003cp\u003e•\tHiểu biết về các chuẩn và quy trình an ninh mạng quốc tế.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giải quyết vấn đề, tư duy logic và khả năng làm việc dưới áp lực.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp tốt, có khả năng trình bày thông tin kỹ thuật một cách rõ ràng và hiệu quả.\u003c/p\u003e\u003cp\u003e•\tCó các chứng chỉ bảo mật là một lợi thế (ví dụ: CompTIA Security+, CEH, SANS GIAC).\u003c/p\u003e\u003cp\u003e•\tQuen thuộc với các nền tảng điện toán đám mây (AWS, GCP, Azure) là một lợi thế lớn.\u003c/p\u003e\u003cp\u003e•\tCó khả năng viết script cơ bản (Python, Bash) để tự động hóa các tác vụ lặp lại.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI \u0026 CHẾ ĐỘ ĐÃI NGỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLương tháng 13 với thưởng hiệu suất hàng năm, thưởng dự án, thưởng doanh số (tùy theo vị trí)\u003c/p\u003e\u003cp\u003e•\tPhụ cấp ăn trưa: 730.000 VND/tháng\u003c/p\u003e\u003cp\u003e•\tThưởng các dịp đặc biệt: 3tr5 - 5tr VND/năm\u003c/p\u003e\u003cp\u003e•\tPhép năm: Lên đến 20 ngày/năm (tùy theo cấp bậc)\u003c/p\u003e\u003cp\u003e•\tY tế: Bảo hiểm xã hội, bảo hiểm cao cấp\u003c/p\u003e\u003cp\u003e•\tĐược cấp laptop, màn hình và các thiết bị/tài khoản/công cụ cần thiết khác cho công việc\u003c/p\u003e\u003cp\u003e•\tĐánh giá tăng lương và thăng tiến hàng năm\u003c/p\u003e\u003cp\u003e•\tLộ trình sự nghiệp đa dạng: Cơ hội quản lý hoặc chuyên gia và luân chuyển chức năng\u003c/p\u003e\u003cp\u003e•\tNguồn học e-learning miễn phí trên các nền tảng Udemy, Coursera, O'relly, workshop nội bộ, tài trợ chứng nhận và Cố vấn độc quyền (C-level)\u003c/p\u003e\u003cp\u003e•\tĐược công nhận và khen thưởng ở cấp độ đội nhóm và tổ chức\u003c/p\u003e\u003cp\u003e•\tCơ hội phát triển sự nghiệp rộng mở trong Hệ sinh thái Techcombank \u0026 Masterise Group\u003c/p\u003e\u003cp\u003e•\tChương trình vay ưu đãi với lãi suất cạnh tranh và chính sách ân hạn gốc phù hợp với từng Sản phẩm vay.\u003c/p\u003e\u003cp\u003e•\tKhông gian làm việc mở và hợp tác thúc đẩy cả sự tập trung cá nhân và các hoạt động làm việc nhóm\u003c/p\u003e\u003cp\u003e•\tMôi trường, văn hóa làm việc sáng tạo, hiệu suất cao\u003c/p\u003e\u003cp\u003e•\tKhu vực thư giãn: chơi game, bóng bàn, yoga, phòng tập thể dục, phòng tắm.\u003c/p\u003e\u003cp\u003e•\tTeambuilding hàng quý/hàng năm và các sự kiện nội bộ hấp dẫn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2d:{\"skillName\":\"An Ninh Mạng\",\"skillId\":28039,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"AWS\",\"skillId\":987881,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"DevSecOps\",\"skillId\":1009632,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"Securities\",\"skillId\":1025713,\"skillWeight\":100,\"isExisted\":false}\n31:{\"skillName\":\"engineer\",\"skillId\":1014015,\"skillWeight\":100,\"isExisted\":false}\n2c:[\"$2d\",\"$2e\",\"$2f\",\"$30\",\"$31\"]\n33:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"13-month salary with annual performance bonus, project incentives, sales incentives (based o
