nd meeting established deadlines.\u003c/p\u003e\u003cp\u003e    •   Support the preparation of materials for the BOD and BOM, ensuring all reports, presentations, and meeting logistics are handled with precision and discretion.\u003c/p\u003e\u003cp\u003e    •   Monitor, track, and report on the status of key company initiatives, highlighting potential bottlenecks and risks for immediate Executive review.\u003c/p\u003e\u003cp\u003e2. Executive Support \u0026 Time Management:\u003c/p\u003e\u003cp\u003e    •   Manage a dynamic and complex calendar, prioritizing meetings, appointments, and travel logistics with precision.\u003c/p\u003e\u003cp\u003e    •   Handle sensitive and confidential information with the utmost discretion and professionalism.\u003c/p\u003e\u003cp\u003e    •   Prepare the Executive for meetings by compiling all necessary materials, agendas, and pre-reading documentation, ensuring the Executive is fully briefed.\u003c/p\u003e\u003cp\u003e    •   Screen and prioritize incoming correspondence (emails, calls), drafting professional responses on behalf of the Executive when appropriate.\u003c/p\u003e\u003cp\u003e3. Professional Representation \u0026 Communication:\u003c/p\u003e\u003cp\u003e    •   Serve as a professional and personable gatekeeper, managing communication flow between the Executive and internal/external stakeholders, including key members of the BOD/BOM.\u003c/p\u003e\u003cp\u003e    •   Maintain a consistently pleasant and approachable demeanor (easy-on-the-eye/presentable, gentle speaking), while possessing the underlying confidence and authority necessary to effectively liaise with senior management.\u003c/p\u003e\u003cp\u003e4. Personal Assistance (As Needed/In Case):\u003c/p\u003e\u003cp\u003e    •   Provide support for reasonable personal administrative tasks that intersect with the Executive's professional schedule, on a case-by-case basis (in case).\u003c/p\u003e\u003cp\u003e    •   Assist with managing personal appointments, reservations, and errands as required to optimize the Executive's overall schedule and focus.\u003c/p\u003e\u003cp\u003e    •   Coordinate private travel arrangements (booking flights, accommodation, transportation) as an extension of professional duties.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Tb76,"])</script><script>self.__next_f.push([1,"\u003cp\u003ePOSITION OVERVIEW\u003c/p\u003e\u003cp\u003eThe Executive Assistant will serve as the strategic partner and primary point of leverage for a C-Level Executive. This is a high-impact, demanding role that requires a unique blend of sharp intellect, organizational mastery, and the assertive professional strength necessary to drive execution and interface effectively with the BOD/BOM. The ideal candidate will be a proactive problem-solver, highly articulate, and possess the finesse to represent the Executive while maintaining rigorous standards of productivity.\u003c/p\u003e\u003cp\u003eKEY RESPONSIBILITIES\u003c/p\u003e\u003cp\u003e1. Strategic Execution \u0026 Project Oversight (The \"Push\"):\u003c/p\u003e\u003cp\u003e    •   Act as the Executive's central point of contact for internal project coordination and execution tracking.\u003c/p\u003e\u003cp\u003e    •   Proactively \"Push\" and follow up with department heads and cross-functional teams to ensure all assigned tasks, initiatives, and strategic goals are progressing on schedule and meeting established deadlines.\u003c/p\u003e\u003cp\u003e    •   Support the preparation of materials for the BOD and BOM, ensuring all reports, presentations, and meeting logistics are handled with precision and discretion.\u003c/p\u003e\u003cp\u003e    •   Monitor, track, and report on the status of key company initiatives, highlighting potential bottlenecks and risks for immediate Executive review.\u003c/p\u003e\u003cp\u003e2. Executive Support \u0026 Time Management:\u003c/p\u003e\u003cp\u003e    •   Manage a dynamic and complex calendar, prioritizing meetings, appo
