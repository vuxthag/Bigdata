nds-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tc59,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.\t Giai đoạn Thiết kế ý tưởng, concept cho dự án: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tKiểm tra thông tin quy hoạch (các thông số, chỉ tiêu, tiến độ,...). Thực hiện và lập báo cáo ý tưởng thiết kế sơ bộ tổng mặt bằng, định hướng sản phẩm quy hoạch và đánh giá tính hiệu quả sơ bộ ban đầu của dự án \u003c/p\u003e\u003cp\u003e-\tCung cấp dữ liệu đầu vào cùng định hướng phát triển của dự án cho tư vấn. Đảm bảo tư vấn nắm và hiểu rõ các thông tin cần thiết và yêu cầu của CĐT trước khi bắt đầu nghiên cứu dự án \u003c/p\u003e\u003cp\u003e-\tLập tiến độ thực hiện phần việc thiết kế ý tưởng quy hoạch của dự án. Kiểm soát hồ sơ thiết kế concept quy hoạch và tiến độ thực hiện của đơn vị tư vấn. Quản lý chất lượng, phản hồi, góp ý, lấy ý kiến các phòng ban liên quan và định hướng cho tư vấn về những mong muốn của chủ đầu tư. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\t Giai đoạn Lập đồ án Quy hoạch: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tKiểm tra, rà soát hồ sơ thiết kế đồ án quy hoạch chung, quy hoạch phân khu, quy hoạch chi tiết, đảm bảo tuân theo quy định của Nhà nước và phù hợp với định hướng của công ty. \u003c/p\u003e\u003cp\u003e-\tPhối hợp làm việc với cơ quan quản lý nhà nước về đồ án quy hoạch liên quan đến các công tác chuẩn bị đầu tư của dự án. \u003c/p\u003e\u003cp\u003e-\tBáo cáo tình hình và tiến độ của các đồ án đang thự
