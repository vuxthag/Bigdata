ông tuân thủ chuẩn mực pháp lý – chuyên môn của VIAC/VMC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.3. Quan hệ báo chí \u0026 đối ngoại\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDuy trì quan hệ với các cơ quan báo chí, truyền thông; phối hợp triển khai các chiến dịch truyền thông theo kế hoạch.\u003c/p\u003e\u003cp\u003e•\tChuẩn bị nội dung, tài liệu, thông điệp truyền thông phục vụ lãnh đạo khi phát biểu tại sự kiện.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.4. Chăm sóc Hòa giải viên và chuyên gia VMC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ xây dựng, cập nhật dữ liệu thông tin chuyên môn của Hòa giải viên.\u003c/p\u003e\u003cp\u003e•\tĐiều phối, chăm sóc và duy trì kết nối giữa Hòa giải viên với VMC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.5. Các nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCác nhiệm vụ khác phù hợp với chuyên môn theo sự phân công của VIAC.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e24:T1219,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e2.1. Trình độ học vấn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp đại học chính quy loại khá trở lên các ngành: Kinh tế, Marketing, Truyền thông, Quan hệ công chúng hoặc Luật kinh tế. Ưu tiên ứng viên đã tham gia các khóa đào tạo về Digital Marketing, Content Marketing, Data Analysis hoặc PR – Truyền thông.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.2. Kinh nghiệm làm việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTối thiểu 03 năm kinh nghiệm trong lĩnh vực Marketing, Truyền thông, Business Development hoặc quan hệ đối ngoại.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên từng làm trong môi trường pháp lý, tư vấn, hiệp hội doanh nghiệp, đoàn luật sư, trung tâm trọng tài, công ty luật. Ứng viên có kinh nghiệm làm việc với báo chí, tổ chức sự kiện, hoặc quản lý kênh digital là lợi thế lớn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.3. Kỹ năng chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKhả năng viết và biên tập nội dung tốt (kể cả nội dung mang tính chuyên môn/câu chuyện thương hiệu).\u003c/p\u003e\u003cp\u003e•\tThành thạo tiếng Anh, đặc biệt trong giao tiếp công việc và viết email đối ngoại.\u003c/p\u003e\u003cp\u003e•\tSử dụng thành thạo các công cụ tin học văn phòng.\u003c/p\u003e\u003cp\u003e•\tƯu tiên biết sử dụng các công cụ thiết kế cơ bản (Canva, Photoshop) hoặc dựng video cơ bản.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.4. Năng lực cá nhân\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp và thuyết phục tốt, tác phong chuyên nghiệp.\u003c/p\u003e\u003cp\u003e•\tNăng động, sáng tạo, cẩn thận, trung thực, chủ động, có tinh thần trách nhiệm cao.\u003c/p\u003e\u003cp\u003e•\tTư duy dịch vụ khách hàng tốt; sẵn sàng làm việc ngoài giờ khi tổ chức sự kiện.\u003c/p\u003e\u003cp\u003e•\tCó nguyện vọng làm việc lâu dài và gắn bó với môi trường ADR.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. QUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.1. Cơ hội đào tạo \u0026 phát triển chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐược đào tạo bài bản về hòa giải thương mại, ADR và các kiến thức pháp luật liên quan trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa tập huấn nội bộ, các chương trình đào tạo do VIAC/VMC tổ chức hoặc phối hợp cùng đối tác trong và ngoài nước.\u003c/p\u003e\u003cp\u003e•\tCó cơ hội phát triển nghề nghiệp trong lĩnh vực truyền thông – pháp lý – phát triển thị trường ở một tổ chức hàng đầu Việt Nam về giải quyết tranh chấp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.2. Môi trường làm việc chuyên nghiệp, năng động\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc cùng đội ngũ trẻ trung, tích cực, thân thiện và tôn trọng sự khác biệt.\u003c/p\u003e\u003cp\u003e•\tCơ hội tiếp xúc, học hỏi từ các Hòa giải viên và chuyên gia hàng đầu trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e•\tMở rộng quan hệ với các đối tác như hiệp hội doanh nghiệp, luật sư, cơ quan nhà nước, tổ chức quốc tế…\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.3. Thu nhập – đãi ngộ – cơ hội thăng tiến\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThu nhập và chế độ đãi ngộ cạnh tranh theo quy định của VIAC (trao đổi trực tiếp tại vòng phỏng vấn).\u003c/p\u003e\u003cp\u003e•\tLộ trình thăng tiến minh bạch, dựa trên năng lực, kết quả công việc và mức độ đóng góp.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ khi tham gia các khóa tập huấn, sự kiện, công tác theo quy định của VIAC/VMC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.4. Chế độ phúc lợi đầy đủ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐược tham gia bảo hiểm xã hội, bảo hiểm y tế và các chế độ phúc lợi khác theo quy định của pháp luật và của VIAC.\u003c/p\u003e\u003cp\u003e•\tChế độ nghỉ phép, nghỉ lễ theo đúng quy định; được tham gia các hoạt động nội bộ, team building và chương trình văn hóa của VIAC/VMC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. HỒ SƠ DỰ TUYỂN GỒM:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐơn xin việc (ưu tiên viết tay); \u003c/p\u003e\u003cp\u003e-\tSơ yếu lý lịch, nêu rõ kinh nghiệm làm việc và các thành tích đã đạt được;\u003c/p\u003e\u003cp\u003e-\t01 ảnh 04 x 06 cm;\u003c/p\u003e\u003cp\u003e-\tBản photocopy bằng tốt nghiệp đại học và các chứng chỉ có liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChỉ những hồ sơ qua vòng hồ sơ mới được mời vào vòng tiếp theo. Thí sinh trúng tuyển phải nộp bản sơ yếu lý lịch có xác nhận của cơ quan có thẩm quyền, bằng đại học và chứng chỉ được chứng thực.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHẠN NỘP HỒ SƠ: Trước ngày 28 tháng 02 năm 2026\u003c/strong\u003e./…\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T7e6,\u003cp\u003eĐể đáp ứng nhu cầu phát triển, Trung tâm Hòa giải Việt Nam - VMC trực thuộc VIAC đang có nhu cầu tuyển dụng 01 nhân sự phát triển thị trường làm việc tại Trụ sở VMC tại Hà Nội.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.1. Phát triển thị trường \u0026 chăm sóc khách hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTriển khai các hoạt động quảng bá dịch vụ hòa giải của VMC tới doanh nghiệp, luật sư, hiệp hội ngành hàng, tổ chức quốc tế và các đối tác chiến lược.\u003c/p\u003e\u003cp\u003e•\tTìm kiếm và mở rộng tệp khách hàng mới; duy trì, chăm sóc và gia tăng mức độ gắn kết với khách hàng hiện hữu.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2. Truyền thông \u0026 Nội dung (Digital \u0026 Offline)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng và vận hành kế hoạch truyền thông cho VMC trên các kênh: Website, Fanpage, YouTube, LinkedIn…\u003c/p\u003e\u003cp\u003e•\tTổ chức, viết bài PR, tin tức, thông cáo báo chí; biên tập nội dung video, bản tin, tài liệu truyền thông.\u003c/p\u003e\u003cp\u003e•\tQuản lý hình ảnh thương hiệu và đảm bảo nội dung truyền thông tuân thủ chuẩn mực pháp lý – chuyên môn của VIAC/VMC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.3. Quan hệ báo chí \u0026 đối ngoại\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDuy trì quan hệ với các cơ quan báo chí, truyền thông; phối hợp triển khai các chiến dịch truyền thông theo kế hoạch.\u003c/p\u003e\u003cp\u003e•\tChuẩn bị nội dung, tài liệu, thông điệp truyền thông phục vụ lãnh đạo khi phát biểu tại sự kiện.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.4. Chăm sóc Hòa giải viên và chuyên gia VMC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ xây dựng, cập nhật dữ liệu thông tin chuyên môn của Hòa giải viên.\u003c/p\u003e\u003cp\u003e•\tĐiều phối, chăm sóc và duy trì kết nối giữa Hòa giải viên với VMC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.5. Các nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCác nhiệm vụ khác phù hợp với chuyên môn theo sự phân công của VIAC.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e28:T1219,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e2.1. . Cơ hội đào tạo \u0026 phát triển chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐược đào tạo bài bản về hòa giải thương mại, ADR và các kiến thức pháp luật liên quan trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa tập huấn nội bộ, các chương trình đào tạo do VIAC/VMC tổ chức hoặc phối hợp cùng đối tác trong và ngoài nước.\u003c/p\u003e\u003cp\u003e•\tCó cơ hội phát triển nghề nghiệp trong lĩnh vực truyền thông – pháp lý – phát triển thị trường ở một tổ chức hàng đầu Việt Nam về giải quyết tranh chấp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.2. Môi trường làm việc chuyên nghiệp, năng động\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc cùng đội ngũ trẻ trung, tích cực, thân thiện và tôn trọng sự khác biệt.\u003c/p\u003e\u003cp\u003e•\tCơ hội tiếp xúc, học hỏi từ các Hòa giải viên và chuyên gia hàng đầu trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e•\tMở rộng quan hệ với các đối tác như hiệp hội doanh nghiệp, luật sư, cơ quan nhà nước, tổ chức quốc tế…\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.3. Thu nhập – đãi ngộ – cơ hội thăng tiến\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThu nhập và chế độ đãi ngộ cạnh tranh theo quy định của VIAC (trao đổi trực tiếp tại vòng phỏng vấn).\u003c/p\u003e\u003cp\u003e•\tLộ trình thăng tiến minh bạch, dựa trên năng lực, kết quả công việc và mức độ đóng góp.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ khi tham gia các khóa tập huấn, sự kiện, công tác theo quy định của VIAC/VMC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.4. Chế độ phúc lợi đầy đủ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐược tham gia bảo hiểm xã hội, bảo hiểm y tế và các chế độ phúc lợi khác theo quy định của pháp luật và của VIAC.\u003c/p\u003e\u003cp\u003e•\tChế độ nghỉ phép, nghỉ lễ theo đúng quy định; được tham gia các hoạt động nội bộ, team building và chương trình văn hóa của VIAC/VMC.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. HỒ SƠ DỰ TUYỂN GỒM:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐơn xin việc (ưu tiên viết tay); \u003c/p\u003e\u003cp\u003e-\tSơ yếu lý lịch, nêu rõ kinh nghiệm làm việc và các thành tích đã đạt được;\u003c/p\u003e\u003cp\u003e-\t01 ảnh 04 x 06 cm;\u003c/p\u003e\u003cp\u003e-\tBản photocopy bằng tốt nghiệp đại học và các chứng chỉ có liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChỉ những hồ sơ qua vòng hồ sơ mới được mời vào vòng tiếp theo. Thí sinh trúng tuyển phải nộp bản sơ yếu lý lịch có xác nhận của cơ quan có thẩm quyền, bằng đại học và chứng chỉ được chứng thực.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHẠN NỘP HỒ SƠ: Trước ngày 28 tháng 02 năm 2026\u003c/strong\u003e./…\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2a:{\"skillName\":\"Phát Triển Thị Trường\",\"skillId\":1165,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Customer Support\",\"skillId\":30409,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Chăm Sóc Khách Hàng\",\"skillId\":354,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Business Development\",\"skillId\":680,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Bán Hàng\",\"skillId\":58,\"skillWeight\":100,\"isExisted\":false}\n29:[\"$2a\",\"$2b\",\"$2c\",\"$2d\",\"$2e\"]\n30:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"Được hưởng thu nhập và chế độ đãi ngộ theo quy định của VIAC (sẽ đàm phán tại vòng phỏng vấn).\"}\n31:{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"Được đảm bảo các quyền lợi về phúc lợi, ý tế, bảo hiểm theo quy định của pháp luật và của VIAC.\"}\n32:{\"benefitId\":10,\"benefitIconName\":\"fa-glass\",\"benefitName\":\"Team Activities\",\"benefitNameVI\":\"Hoạt động nhóm\",\"benefitValue\":\"Làm việc trong môi trường làm việc chuyên nghiệp với các ch
