ww.vietnamworks.com/\"}}],\"langCode\":\"vi\",\"user\":null,\"jobDetail\":{\"jobId\":2023531,\"jobTitle\":\"Kỹ Sư Cao Cấp Thủy Nhiệt Hạt Nhân\",\"userId\":5571460,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/7a/11117945.png\",\"alias\":\"ky-su-cao-cap-thuy-nhiet-hat-nhan\",\"createdOn\":\"2026-03-13T17:19:51+07:00\",\"approvedOn\":\"2026-03-13T17:20:25+07:00\",\"expiredOn\":\"2026-04-12T23:59:59+07:00\",\"lastUpdatedOn\":\"2026-03-13T17:20:25+07:00\",\"lastSyncedOn\":\"2026-04-12T12:05:04+07:00\",\"companyName\":\"Tập Đoàn Công Nghiệp - Viễn Thông Quân Đội (Viettel Group)\",\"companyId\":299588,\"companyProfile\":\"$23\",\"companySizeId\":0,\"contactName\":\"Nguyễn Anh Tuấn\",\"createdBy\":5571460,\"isOnline\":true,\"isActive\":true,\"isApproved\":true,\"isUnpaidDisable\":0,\"isCompleted\":true,\"isAnonymous\":false,\"isSalaryVisible\":false,\"isShowLogo\":true,\"isShowLogoInSearch\":false,\"jobDescription\":\"\u003cp\u003e•\\tThiết kế hệ thống test loop thủy nhiệt, hệ thống trao đổi nhiệt tiên tiến của nhà máy SMR\u003c/p\u003e\u003cp\u003e•\\tThực hiện các mô phỏng truyền nhiệt để hỗ trợ thiết kế, kiểm chứng hiệu suất hệ thống và đảm bảo độ bền kết cấu; sử dụng cả tính toán lý thuyết và các phần mềm chuyên dụng.\u003c/p\u003e\u003cp\u003e•\\tTối ưu hệ thống trao đổi nhiệt, dòng chảy, phân bố nhiệt độ của hệ thống trao đổi nhiệt của lò SMR.\u003c/p\u003e\u003cp\u003e•\\tĐánh giá an toàn lò phản ứng trong các sự cố Design Basic Accident và Beyond Design Basic Accident sử dụng phần mềm chuyên dụng như RELAP5, MARS-KS…\u003c/p\u003e\u003cp\u003e•\\tViết báo cáo kỹ thuật, tài liệu thiết kế lõi và các bài báo khoa học, hội nghị.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\",\"jobRequirement\":\"\u003cp\u003e•\\tTốt nghiệp đại học trở lên nghành Kỹ thuật hạt nhân, Kỹ thuật nhiệt, Cơ khí tự động hóa, hoặc các nghành liên quan\u003c/p\u003e\u003cp\u003e•\\t5+ năm kinh nghiệm thiết kế, xây dựng và thử nghiệm các hệ thống thủy nhiệt\u003c/p\u003e\u003cp\u003e•\\tThành thạo kiến thức về động lực học chất lỏng (fluid dynamics) và nhiệt động lực học (thermodynamics).\u003c/p\u003e\u003cp\u003e•\\tCó khả năng xây dựng mô hình 2D, 3D sử dụng các phần mềm như AutoCAD, SolidWork, SpaceClaim…\u003c/p\u003e\u003cp\u003e•\\tThành thạo một trong các phần mềm CFD như: ANSYS Fluent, COMSOL Multiphysics…\u003c/p\u003e\u003cp\u003e•\\tCó kinh nghiệm, kiến thức thiết kế và phương pháp phân tích bộ trao đổi nhiệt.\u003c/p\u003e\u003cp\u003e•\\tKỹ năng phân tích dữ liệu, xử lý kết quả mô phỏng, viết báo cáo kỹ thuật.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\\tƯu tiên các cá nhân:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\\tCó kinh nghiệm nghiên cứu, thiết kế thanh truyền nhiệt dạng heat-pipe\u003c/p\u003e\u003cp\u003eo\\tCó kinh nghiệm sử dụng code phân tích an toàn thủy nhiệt hạt nhân như RELAP5, TRACE, MARS-KS…  \u003c/p\u003e\u003cp\u003eo\\tXuất bản các bài báo khoa học uy tín liên quan đến thủy nhiệt\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\",\"jobLevelId\":7,\"languageSelectedId\":3,\"redirectTo\":\"\",\"requiredCoverLetter\":0,\"salary\":0,\"salaryMax\":0,\"salaryMin\":0,\"typeWorkingId\":1,\"skills\":[{\"skillName\":\"Kỹ Thuật Hạt Nhân\",\"skillId\":703310,\"skillWeight\":100,\"isExisted\":false},{\"skillName\":\"Cơ Khí Tự Động Hóa\",\"skillId\":36430,\"skillWeight\":100,\"isExisted\":false},{\"skillName\":\"Computational Fluid Dynamics\",\"skillId\":348480,\"skillWeight\":100,\"isExisted\":false},{\"skillName\":\"ANSYS\",\"skillId\":1015059,\"skillWeight\":100,\"isExisted\":false}],\"benefits\":[{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"Bảo hiểm sức khỏe với hạn mức chi trả lên đến 300 triệu đồng và cơ sở vật chất hiện đại tại văn phòng quân y Tập đoàn.\"},{\"benefitId\":3,\"benefitIconName\":\"fa-file-image-o\",\"benefitName\":\"Paid Leave\",\"benefitNameVI\":\"Nghỉ phép có lương\",
