ân theo các nguyên tắc đạo đức cả trong công việc lẫn trong cuộc sống riêng. Chúng tôi cam kết duy trì sự tín nhiệm của khách hàng, đối tác và các cổ đông dựa trên việc tuân thủ đúng các nguyên tắc đã đặt ra. Đó là:\r\nĐầu tư bền vững, lấy khách hàng làm trung tâm\r\nCoi trọng đẳng cấp, chất lượng.\r\nĐề cao sự khác biệt và năng lực sáng tạo.\r\n\r\nThông tin liên hệ\r\nWebsite: datxanhmienbac.com.vn"])</script><script>self.__next_f.push([1,"24:Tb8e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Yêu thích lĩnh vực kinh doanh, chủ động trong giao tiếp, tác phong chuyên nghiệp và có tinh thần cầu tiến.\u003c/p\u003e\u003cp\u003e• Có kỹ năng thuyết phục, đàm phán và khả năng làm việc nhóm hiệu quả.\u003c/p\u003e\u003cp\u003e• Sẵn sàng học hỏi, thích nghi nhanh và có tinh thần trách nhiệm cao trong công việc.\u003c/p\u003e\u003cp\u003e• Không yêu cầu kinh nghiệm – Ứng viên sẽ được đào tạo bài bản theo lộ trình chuyên sâu từ cơ bản đến nâng cao.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm trong lĩnh vực bất động sản là một lợi thế – Được tuyển thẳng lên vị trí chính thức\u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHẾ ĐỘ ĐÃI NGỘ ĐẶC BIỆT\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eLương cứng từ 8 – 25 triệu/tháng, cam kết không áp doanh số trong 02 tháng thử việc\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t Hoa hồng hấp dẫn từ 50 – 500 triệu/giao dịch, thưởng nóng từ 10 – 100 triệu/giao dịch\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t Hoa hồng và thưởng được chi trả ngay sau giao dịch, KHÔNG nợ lương – thưởng – hoa hồng\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t Hỗ trợ 100% chi phí marketing đa kênh\u003c/strong\u003e: Facebook, Google, Zalo, Web...\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t Tặng khóa học quảng cáo Facebook/Google/Web...\u003c/strong\u003e từ đội ngũ Marketing chuyên nghiệp.\u003c/
