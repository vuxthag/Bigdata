>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003ePOSITION PURPOSE \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• The role –Insights \u0026 Analytics Manager for Vietnam, is designed to partner with the local and regional teams, delivering insights that inspire growth and top-tier financial business results.  \u003c/p\u003e\u003cp\u003e• This role leads the use of syndicated data, panel data as well as qualitative and quantitative market research methods to develop plans and activities required to provide timely and insightful consumer and marketplace information and understanding which can be used as the basis for decisions for the category. \u003c/p\u003e\u003cp\u003e• The role will also be responsible for converting in-depth shopping and retail insights into growth-driving customer strategies and recommendations for VN .\u003c/p\u003e\u003cp\u003e• Importantly, the manager is expected to have the capability required to integrate and synthesize knowledge across insights and analytics and be able to communicate this in a manner that drives action.  \u003c/p\u003e\u003cp\u003e• The role also ensures that Mondelez’s best practices and world class analytic research programs are put to practice consistently.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMAIN RESPONSIBILITIES\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBusiness Impact \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Demonstrate candor and courage, with supervision and support of Manager, in influencing key stakeholders in driving insights into action and enabling market dynamics and consumer/shopper-centric decisions that deliver superior business results\u003c/p\u003e\u003cp\u003e• Proactively participate, with the manager’s support, in key decision-making forums to achieve greatest level of influence across the organization including consensus team meetings.\u003c/p\u003e\u003cp\u003e• Drive brand equity through strong collaboration with Marketing team to ensure strong consumers value equation\u003c/p\u003e\u003cp\u003e• Lead delivery and application of consumer segmentation and shopper insights leading to strong \u0026 sustainable retail-level strategies\u003c/p\u003e\u003cp\u003e• Collaborate with regional Insights team to leverage broad consumer knowledge, brand dynamics across markets and analytical tools to effectively drive regional and local business agenda \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGenerating behavior changing Insights  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Proactively identify strategic issues and knowledge gaps within the category, country / region and generate hypotheses for validation\u003c/p\u003e\u003cp\u003e• Ensure that optimal and creative research solutions (including qualitative, quantitative, syndicated and advanced analytics tool), are developed and utilised and that Best Practices methodologies are applied\u003c/p\u003e\u003cp\u003e• Guide business decisions by generating powerful insights for category, brand, shopper utilising qualitative and quantitative research tools \u0026 techniques:\u003c/p\u003e\u003cp\u003e+ Retail market measurments\u003c/p\u003e\u003cp\u003e+ Brand tracking\u003c/p\u003e\u003cp\u003e+ Purchase dynamics through panel analysis\u003c/p\u003e\u003cp\u003e+ Communication development and evaluation \u003c/p\u003e\u003cp\u003e+ Product tests\u003c/p\u003e\u003cp\u003e+ Building Innovation ideas and identifying effective launch bundles\u003c/p\u003e\u003cp\u003e+ Category growth forecasting \u003c/p\u003e\u003cp\u003e+ Shopper Insights (Path to purchase shopper journey, shopper profiling, drivers/barriers, trip missions, etc.)\u003c/p\u003e\u003cp\u003e+ Consumer Segmentation\u003c/p\u003e\u003cp\u003e+ Social Listening\u003c/p\u003e\u003cp\u003e• Accountable for delivering a solid Category \u0026 Shopper Insights plan working with Manager and broader I\u0026A team within the budget, time and resource constraints, aligned with business priorities  \u003c/p\u003e\u003cp\u003eRecommend best practices to regional team to facilitate the integration of country and regional Insights plans\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResource management \u0026 Supplier selection \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Identify strong suppliers and develop agency partner relationships: Proactively build and maintain effective agency relationships. Demonstrate negotiation skills and ensure quality deliverables and high ROI from research partners.\u003c/p\u003e\u003cp\u003e• Maximize value and efficiency of research expenditures and ensure compliance with Mondelēz procurement and accounting policies and procedures \u003c/p\u003e\u003cp\u003e• On going, manage the regional supplier relationship in alignment with Manager, for retail data purchases, ensuring service and added value is delivered consistently\u003c/p\u003e\u003cp\u003e• Facilitate continuous improvement in the level of service and quality outputs provided by key suppliers by ensuring consistency in approach and deliverables\u003c/p\u003e\u003cp\u003e• Responsible for ensuring appropriate knowledge management, leveraging Mondelez tools\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T4b7,About Mondelēz International:      \r\n\r\nMondelez International is one of the largest snack companies whose headquarter based in Chicago, United States. At the moment, we have 79,000 diverse employees and our snacks are enjoyed in over 150 countries over the world. Mondelez’s famous snack categories include biscuit, chocolate, gum \u0026 candy. Our mission is “Snacking made right”. At Mondelez International, we understand the way you live is changing the way you eat and we want you to make a well decision between snacking and eating right.\r\n\r\nIn 2015, Mondelez International completed the acquisition of Kinh Do an
