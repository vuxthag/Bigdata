g tốt về C\u0026B và L\u0026D để có thể tư vấn chéo và cung cấp giải pháp nhân sự toàn diện cho Khối Vận hành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Kỹ năng\u003c/p\u003e\u003cp\u003e• Kỹ năng Chuyên môn: Thành thạo trong việc tạo nguồn đa kênh (sourcing) và phỏng vấn hành vi/đánh giá năng lực. Có khả năng lập kế hoạch và triển khai thực tế các chiến dịch xây dựng Thương hiệu Nhà tuyển dụng (EB).\u003c/p\u003e\u003cp\u003e• Tư duy Kinh doanh (Business Acumen): Khả năng thấu hiểu ngôn ngữ và áp lực của Khối Vận hành, từ đó thiết kế các giải pháp nhân sự gắn liền với mục tiêu doanh thu, chất lượng dịch vụ và tối ưu chi phí lao động (Labor cost).\u003c/p\u003e\u003cp\u003e• Kỹ năng Phân tích dữ liệu (Data-driven): Thành thạo việc theo dõi, đo lường và phân tích các chỉ số nhân sự (như tỷ lệ nghỉ việc, thời gian lấp đầy vị trí, chi phí tuyển dụng) để tối ưu hóa chiến lược giữ chân nhân tài.\u003c/p\u003e\u003cp\u003e• Kỹ năng Đối tác \u0026 Cố vấn: Kỹ năng giao tiếp thuyết phục, đàm phán sắc bén, khả năng giải quyết mâu thuẫn nội bộ và xử lý khủng hoảng nhân sự khéo léo với các cấp quản lý nhà hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Phẩm chất\u003c/p\u003e\u003cp\u003e• Tinh thần Thực chiến (Hands-on) \u0026 Thích ứng nhanh (Agility): Không ngại khó, sẵn sàng xông pha bám sát hiện trường (xuống trực tiếp cửa hàng, nhà hàng), linh hoạt ứng biến với nhịp độ làm việc tốc độ cao của ngành bán lẻ hải sản.\u003c/p\u003e\u003cp\u003e• Trí tuệ Cảm xúc (EQ) cao \u0026 Dịch vụ khách hàng nội bộ: Thấu cảm, biết lắng nghe, luôn giữ thái độ tích cực để làm chỗ dựa tinh thần và truyền cảm hứng cho đội ngũ tuyến đầu.\u003c/p\u003e\u003cp\u003e• Chính trực \u0026 Bản lĩnh: Độc lập, công tâm trong đánh giá, bảo mật thông tin tuyệt đối và là người đại sứ lan tỏa mạnh mẽ hệ giá trị \"Tâm - Tín - Tầm\" của Hải Sản Hoàng Gia.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T74d,VỀ HẢI SẢN HOÀNG GIA (HSHG):\r\nHSH
