-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tb43,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Chế biến Nông sản Sao Mai, được thành lập năm 2020, là một doanh nghiệp nông nghiệp năng động và định hướng tương lai tại Việt Nam. Với nhà máy hiện đại rộng 5 ha đặt tại tỉnh Quảng Ngãi, được trang bị các dây chuyền chế biến tiên tiến nhập khẩu từ Ý và công suất sản xuất hàng năm đạt 10.000 tấn sản phẩm, chúng tôi cam kết cung cấp các giải pháp thực phẩm chất lượng cao và bền vững cho các đối tác toàn cầu.\r\n\r\nDanh mục sản phẩm đa dạng của chúng tôi trải dài từ các loại puree trái cây nhiệt đới, nước trái cây cô đặc và trái cây đông lạnh – những nguyên liệu thiết yếu cho ngành công nghiệp thực phẩm và đồ uống toàn cầu – đến các sản phẩm tiêu dùng giá trị gia tăng làm nổi bật sự phong phú của tài nguyên thiên nhiên Việt Nam. Trong đó có rượu trái cây Đaka được chế tác từ trái cây nhiệt đới lên men tự nhiên; rượu đông trùng hạ thảo nhân sâm kết hợp tinh hoa dược liệu truyền thống với kỹ thuật hiện đại; cùng dòng trà thảo mộc và chiết xuất thảo dược được tuyển chọn kỹ lưỡng. Chúng tôi tự hào sở hữu các chứng nhận quốc tế uy tín như FSSC 22000, HACCP, FDA, HALAL và KOSHER, bảo đảm mọi sản phẩm đều đáp ứng những tiêu chuẩn cao nhất về an toàn thực phẩm, truy xuất nguồn gốc và tính nhất quán. Những chứng nhận này không chỉ thể hiện cam kết của chúng tôi đối với chất lượng mà còn khẳng định năng lực phục vụ các thị trường khắt khe hàng đầu thế giới như châu Âu, Hoa Kỳ, Nhật Bản và Trung Quốc.\r\n\r\nTại Sao Mai, phát triển bền vững không chỉ là mục tiêu – mà còn là kim chỉ nam trong mọi hoạt động. Bằng cách tích áp ứng những tiêu chuẩn cao nhất về an toàn thực phẩm, truy xuất nguồn gốc và tính nhất quán. Những chứng nhận này không chỉ thể hiện cam kết của chúng tôi đối với chất lượng mà còn khẳng định năng lực phục vụ các thị trường khắt khe hàng đầu thế giới như châu Âu, Hoa Kỳ, Nhật Bản và Trung Quốc.\r\n\r\nTại Sao Mai, phát triển bền vững không chỉ là mục tiêu – mà còn là kim chỉ nam trong mọi hoạt động. Bằng cách tích hợp các thực hành ESG vào chiến lược kinh doanh, chúng tôi hợp tác với nông dân địa phương để xây dựng các mô hình canh tác xanh, an toàn và minh bạch. Điều này giúp tăng cường sức mạnh cho cộng đồng nông thôn, bảo vệ môi trường và tạo ra giá trị bền vững lâu dài cho các bên liên quan trên toàn cầu.\r\n\r\nVới tầm nhìn “Made in Vietnam, Meant for the World”, chúng tôi hướng tới trở thành đối tác tin cậy trong chuỗi cung ứng nông sản toàn cầu. Thông qua đổi mới sáng tạo, chính trực và hợp tác, chúng tôi mong muốn khẳng định chất lượng vượt trội của nông nghiệp Việt Nam và mang hương vị đích thực của Việt Nam đến bàn ăn trên khắp thế giới."])</script><script>self.__next_f.push([1,"28:Tb43,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Chế biến Nông sản Sao Mai, được thành lập năm 2020, là một doanh nghiệp nông nghiệp năng động và định hướng tương lai tại Việt Nam. Với nhà máy hiện đại rộng 5 ha đặt tại tỉnh Quảng Ngãi, được trang bị các dây chuyền chế biến tiên tiến nhập khẩu từ Ý và công suất sản xuất hàng năm đạt 10.000 tấn sản phẩm, chúng tôi cam kết cung cấp các giải pháp thực phẩm chất lượng cao và bền vững cho các đối tác toàn cầu.\r\n\r\nDanh mục sản phẩm đa dạng của chúng tôi trải dài từ các loại puree trái cây nhiệt đới, nước trái cây cô đặc và trái cây đông lạnh – những nguyên liệu thiết yếu cho ngành công nghiệp thực phẩm và đồ uống toàn cầu – đến các sản phẩm tiêu dùng giá trị gia tăng làm nổi bật sự phong phú của tài nguyên thiên nhiên Việt Nam. Trong đó có rượu trái cây Đaka được chế tác từ trái cây nhiệt đới lên men tự nhiên; rượu
