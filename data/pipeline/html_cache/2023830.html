",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n26:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1362,"])</script><script>self.__next_f.push([1,"•\tVề công ty Vinamilk\r\nVới lịch sử 45 năm hình thành và phát triển, Công ty Cổ phần Sữa Việt Nam (Vinamilk) cam kết mang đến cho cộng đồng nguồn dinh dưỡng và chất lượng cao cấp hàng đầu bằng chính sự trân trọng, tình yêu và trách nhiệm cao của mình với cuộc sống con người và xã hội.  \r\nTrở thành biểu tượng niềm tin hàng đầu Việt Nam về sản phẩm dinh dưỡng và sức khỏe phục vụ cuộc sống con người, Vinamilk không ngừng phát triển, đổi mới và sáng tạo nhằm mang đến cho cộng đồng những giải pháp dinh dưỡng chất lượng quốc tế. Hiện Vinamilk có 250 loại sản phẩm đáp ứng nhu cầu của mọi đối tượng tiêu dùng. Những sản phẩm tiêu biểu của Vinamilk như Sữa tươi 100%; Sữa tươi Organic; Sữa tươi chứa tổ yến; Sữa chua Vinamilk; Sữa chua uống Probi, Yomilk; Sữa bột Dielac, Optimum, Yoko; Sữa đặc Ông Thọ, Ngôi Sao Phương Nam, Bột ăn dặm RiDielac; Sữa đậu nành hạt; Nước trái cây Fruit Love, Vfresh; Kem và Phô mai...\r\nKhông chỉ khẳng định vị thế thương hiệu sữa số 1 tại Việt Nam, Vinamilk đã đưa sản phẩm và thương hiệu vươn ra nhiều thị trường trên thế giới. Tính đến nay, các sản phẩm của Vinamilk đã có mặt tại 56 quốc gia và vùng lãnh thổ, với tổng kim ngạch đạt hơn 2,4 tỷ USD. Doanh thu đến từ hoạt động xuất khẩu liên tục ghi nhận sự tăng trưởng tích cực song song việc mở rộng thêm các thị trường xuất khẩu mới.\r\nNgoài kết quả kinh doanh ấn tượng, Vinamilk luôn quan tâm đến các hoạt động xã hội vì cộng đồng và sự phát triển của trẻ em Việt Nam, thông qua các chương trình như “Sữa học đường” nhằm nâng cao tình trạng dinh dưỡng cho học sinh mầm non, tiểu học, giúp trẻ phát triển cả thể chất lẫn trí tuệ; Quỹ sữa \"Vươn cao Việt Nam” với mong muốn “mọi trẻ em đều có quyền được uống sữa mỗi ngày”; Quỹ “Một triệu cây xanh cho Việt Nam” vì một Việt Nam xanh tươi, cùng nhiều hoạt động hỗ trợ cộng đồng khác.\r\nTrách nhiệm xã hội và đổi mới sáng tạo là những yếu tố giúp Vinamilk nhận được sự ủng hộ từ người tiêu dùng, góp phần đưa Vinamilk 6 lần đạt Giải thưởng Thương hiệu Quốc gia, dẫn đầu Top 10 thương hiệu mạnh nhất của Việt Nam và thuộc Bảng xếp hạng 1000 thương hiệu hàng đầu châu Á. \r\n•\tGiải thưởng:\r\nVới sự phát triển không ngừng, Vinamilk đã trở thành điểm sáng kinh tế không chỉ Việt Nam mà thuộc top 50 công ty sữa lớn nhất thế giới. Vinamilk đã trở thành một trong những Doanh nghiệp hàng đầu của Việt Nam trên mọi phương diện, đóng góp lớn vào sự phát triển của đất nước và con người Việt Nam. \r\nVới những thành tựu ấn tượng đạt được trong 45 năm, Vinamilk liên tiếp được các tổ chức danh giá trong và ngoài nước vinh danh với các giải thưởng tiêu biểu như:\r\n- 6 lần liên tiếp được vinh danh là “Thương hiệu Quốc gia” (từ 2010 đến 2022) \r\n- Top 5 nhà tuyển dụng được yêu thích nhất năm 2019 (Career Builder)\r\n- Top 50 thương hiệu nhà tuyển dụng hấp dẫn nhất với Sinh viên Việt Nam (Anphabe)\r\n- Nơi làm việc tốt nhất Việt Nam 3 năm liền từ 2017 đến 2019 (Anphabe)\r\n- Thương hiệu được Người tiêu dùng Việt Nam chọn mua nhiều nhất 8 năm liền (2012 đến 2020) (Báo cáo Dấu chân thương hiệu, Kantar Worldpanel)\r\n- Top 50 công ty niêm yết tốt nhất Việt Nam và Top 50 thương hiệu giá trị nhất Việt Nam năm 2020 (Forbes Việt Nam)\r\n- Dẫn đầu bảng xếp hạng Top 10 Thương hiệu mạnh nhất Châu Á thuộc Top 1000 Thương hiệu hàng đầu Châu Á (Campaign Asia \u0026 Nielsen)\r\n- Tài sản đầu tư có giá trị của ASEAN và Top 3 Doanh nghiệp niêm yết của Việt Nam theo Thẻ điểm Quản trị Công ty ASEAN 2019 (Viện thành viên Hội đồng quản trị Việt Nam (VIOD) và Ủy ban chứng khoán Việt Nam)\r\n- Dẫn đầu Top 100 các doanh nghiệp bền vững Việt Nam (CSI100) (Hội đồng doanh nghiệp vì sự Phát triển Bền vững Việt Nam – VCCI)\r\n- Giải thưởng CSR toàn cầu năm 2020 ở 2 hạng mục: Giải thưởng về hoạt động môi trường xuất sắc (Giải đồng) và Doanh nghiệp hoạt động vì cộng đồng xuất sắc nhất Việt Nam \r\n- Cùng nhiều giải thưởng khác…"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T58a,\u003cp\u003eHỌC VẤN \u0026 CHUYÊN NGÀNH:\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Cao đẳng/Đại học, ưu tiên ngành Quản Trị Kinh Doanh, Kinh Tế, Marketing...\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eKINH NGHIỆM:\u003c/p\u003e\u003cp\u003e- Tối thiểu 02 - 03 năm kinh nghiệm làm công tác bán hàng, trong đó ít nhất 1 năm kinh nghiệm làm việc ở vị trí giám sát bán hàng tại các công ty đa quốc gia/công ty có qui mô lớn về ngành hàng tiêu dùng nhanh/ngành hàng sữa, thực phẩm\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eKIẾN THỨC CHUYÊN MÔN \u0026 CÁC KỸ NĂNG:\u003c/p\u003e\u003cp\u003e1. Kiến thức chuyên môn :\u003c/p\u003e\u003cp\u003e- Quản lý, điều hành và kiểm tra các hoạt động của đội ngũ nhân viên.\u003c/p\u003e\u003cp\u003e- Phân tích tài chánh căn bản (doanh số, sản lượng, Lãi lỗ (P\u0026L), Tỷ lệ hoàn vốn (ROI))\u003c/p\u003e\u003cp\u003e- Có kiến thức về kênh phân phối/ ngành hàng (thiết lập kế hoạch, theo dõi triển khai)\u003c/p\u003e\u003cp\u003e2. Kỹ năng tổng quát:\u003c/p\u003e\u003cp\u003e- Kỹ năng giao tiếp\u003c/p\u003e\u003cp\u003e- Kỹ năng đàm phán\u003c/p\u003e\u003cp\u003e- Kỹ năng trình bày thuyết phục\u003c/p\u003e\u003cp\u003e- Kỹ năng chăm sóc khách hàng\u003c/p\u003e\u003cp\u003e- Kỹ năng dẫn dắt đội ngũ\u003c/p\u003e\u003cp\u003e- Kỹ năng giải quyết vấn đề\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eCÁC YÊU CẦU KHÁC:\u003c/p\u003e\u003cp\u003e- Tiếng Anh giao tiếp\u003c/p\u003e\u003cp\u003e- Vi tính thành thạo\u003c/p\u003e\u003cp\u003e- Nhiệt tình, Có ý chí\u003c/p\u003e\u003cp\u003e- Chịu được áp lực công việc cao\u003c/p\u003e\u003cp\u003e- Có tính chính trực\u003c/p\u003e25:Td9f,"])</script><script>self.__next_f.push([1,"VINAMILK – NƠI NHỮNG GIẤC MƠ LỚN ĐƯỢC NUÔI DƯỠNG\r\n \r\nNăm 1976, Vinamilk bắt đầu cuộc hành trình với rất nhiều khó khăn, nhưng đích đến vô cùng xứng đáng: để dinh dưỡng là quyền lợi của tất cả trẻ em Việt Nam. Không có chuyên gia tư vấn, không có nguồn vốn, điều chúng tôi có nhiều nhất lúc đó là quyết tâm thực hiện bằng được mục tiêu của mình. Chúng tôi vượt qua bao sự hoài nghi để chứng minh rằng chúng ta hoàn toàn có thể tạo ra những sản phẩm dinh dưỡng cao cho mọi người, mọi nhà. Hơn ai hết, chúng tôi tin cái khó mới là cái đáng để làm, và sẽ không ai thay mình làm.\r\n \r\nTừ nhà máy sữa bột trẻ em Dielac được khôi phục bằng năng lực kỹ thuật thuần Việt năm 1989, đến trang trại và nhà máy sữa tiên phong đạt chứng nhận trung hòa carbon tại Đông Nam Á.\r\n \r\nTừ công thức sữa bột Dielac đầu tiên được nghiên cứu để phù hợp với thể trạng trẻ em Việt Nam, đến danh mục hơn 350 sản phẩm cho mọi lứa tuổi, hiện diện tại 65+ quốc gia.\r\n \r\n⸻\r\nTẠI VINAMILK – BẠN KHÔNG CHỈ ĐI LÀM\r\nMà còn trở thành một phần của hành trình mang tầm vóc quốc gia.\r\nỞ đây, mỗi con người đều góp một dấu ấn để viết tiếp câu chuyện gần nửa thế kỷ:\r\n- Dám nghĩ lớn\r\n- Dám quyết tâm\r\n- Không ngừng tốt hơn mỗi ngày\r\nChúng tôi gọi đó là “Chất Vinamilk” – 10 ADN làm nên những con người luôn phát triển.\r\nBạn sẽ không đứng yên trong một vị trí.\r\nBạn sẽ:\r\n- Học từ những người giỏi nhất\r\n- Được trao quyền để sáng tạo\r\n- Được tin tưởng để dẫn dắt\r\n- Và trưởng thành cùng những dự án có thật – tác động thật\r\n \r\nMỘT NƠI LÀM VIỆC – NHIỀU PHIÊN BẢN CỦA BẠN\r\nCó thể hôm nay bạn:\r\n- Nhiệt huyết\r\n- Điềm tĩnh\r\n- Quyết liệt\r\n- Âm thầm bứt phá\r\nNhưng khi bước vào Vinamilk, bạn sẽ nhận ra: phiên bản bạn từng nghĩ là giới hạn – chỉ là điểm khởi đầu.\r\nVì mỗi ngày ở đây đều là một “đề bài mới” để bạn khám phá những khả năng mà chính bạn cũng chưa từng gọi tên.\r\n \r\nCHÚNG TÔI CHĂM CHÚT CHO BẠN\r\n- Lộ trình phát triển rõ ràng\r\n- Chính sách đãi ngộ cạnh tranh\r\n- Chương trình đào tạo toàn diện\r\n- Văn hóa nhân văn – gắn kết – truyền cảm hứng\r\n- Cơ hội thăng tiến cùng tốc độ tăng trưởng của một thương hiệu dẫn đầu\r\n⸻\r\nCÙNG NHAU MANG NIỀM TỰ HÀO VINAMILK\r\nKhông chỉ là:\r\n- Thương hiệu quốc gia\r\n- Top 50 công ty sữa lớn nhất thế giới\r\n- Top 1 thương hiệu sữa tiềm năng nhất thế giới\r\nMà còn là:\r\n- Top nơi làm việc mà người lao động Việt Nam khao khát được thuộc về.\r\n⸻\r\nVÀ CHÚNG TÔI ĐANG TÌM BẠN\r\nNếu bạn muốn:\r\n- Không chỉ có một công việc\r\nMà có một hành trình\r\n- Không chỉ phát triển sự nghiệp\r\nMà cùng phụng sự con người\r\n- Không chỉ tốt hơn mỗi ngày\r\nMà tạo ra giá trị cho hàng triệu gia đình Việt Nam và thế giới\r\nVinamilk là nơi dành cho bạn.\r\n⸻\r\nCÙNG NHAU - LÀM NÊN LỊCH SỬ"])</script><script>self.__next_f.push([1,"28:T1362,"])</script><script>self.__next_f.push([1,"•\tVề công ty Vinamilk\r\nVới lịch sử 45 năm hình thành và phát triển, Công ty Cổ phần Sữa Việt Nam (Vinamilk) cam kết mang đến cho cộng đồng nguồn dinh dưỡng và chất lượng cao cấp hàng đầu bằng chính sự trân trọng, tình yêu và trách nhiệm cao của mình với cuộc sống con người và xã hội.  \r\nTrở thành biểu tượng niềm tin hàng đầu Việt Nam về sản phẩm dinh dưỡng và sức khỏe phục vụ cuộc sống con người, Vinamilk không ngừng phát triển, đổi mới và sáng tạo nhằm mang đến cho cộng đồng những giải pháp dinh dưỡng chất lượng quốc tế. Hiện Vinamilk có 250 loại sản phẩm đáp ứng nhu cầu của mọi đối tượng tiêu dùng. Những sản phẩm tiêu biểu của Vinamilk như Sữa tươi 100%; Sữa tươi Organic; Sữa tươi chứa tổ yến; Sữa chua Vinamilk; Sữa chua uống Probi, Yomilk; Sữa bột Dielac, Optimum, Yoko; Sữa đặc Ông Thọ, Ngôi Sao Phương Nam, Bột ăn dặm RiDielac; Sữa đậu nành hạt; Nước trái cây Fruit Love, Vfresh; Kem và Phô mai...\r\nKhông chỉ khẳng định vị thế thương hiệu sữa số 1 tại Việt Nam, Vinamilk đã đưa sản phẩm và thương hiệu vươn ra nhiều thị trường trên thế giới. Tính đến nay, các sản phẩm của Vinamilk đã có mặt tại 56 quốc gia và vùng lãnh thổ, với tổng kim ngạch đạt hơn 2,4 tỷ USD. Doanh thu đến từ hoạt động xuất khẩu liên tục ghi nhận sự tăng trưởng tích cực song song việc mở rộng thêm các thị trường xuất khẩu mới.\r\nNgoài kết quả kinh doanh ấn tượng, Vinamilk luôn quan tâm đến các hoạt động xã hội vì cộng đồng và sự phát triển của trẻ em Việt Nam, thông qua các chương trình như “Sữa học đường” nhằm nâng cao tình trạng dinh dưỡng cho học sinh mầm non, tiểu học, giúp trẻ phát triển cả thể chất lẫn trí tuệ; Quỹ sữa \"Vươn cao Việt Nam” với mong muốn “mọi trẻ em đều có quyền được uống sữa mỗi ngày”; Quỹ “Một triệu cây xanh cho Việt Nam” vì một Việt Nam xanh tươi, cùng nhiều hoạt động hỗ trợ cộng đồng khác.\r\nTrách nhiệm xã hội và đổi mới sáng tạo là những yếu tố giúp Vinamilk nhận được sự ủng hộ từ người tiêu dùng, góp phần đưa Vinamilk 6 lần đạt Giải thưởng Thương hiệu Quốc gia, dẫn đầu Top 10 thương hiệu mạnh nhất của Việt Nam và thuộc Bảng xếp hạng 1000 thương hiệu hàng đầu châu Á. \r\n•\tGiải thưởng:\r\nVới sự phát triển không ngừng, Vinamilk đã trở thành điểm sáng kinh tế không chỉ Việt Nam mà thuộc top 50 công ty sữa lớn nhất thế giới. Vinamilk đã trở thành một trong những Doanh nghiệp hàng đầu của Việt Nam trên mọi phương diện, đóng góp lớn vào sự phát triển của đất nước và con người Việt Nam. \r\nVới những thành tựu ấn tượng đạt được trong 45 năm, Vinamilk liên tiếp đượ
