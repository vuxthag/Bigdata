 của Phòng Pháp chế liên quan đến hoạt động chứng khoán và quản trị doanh nghiệp.\u003c/p\u003e\u003cp\u003e•   Đánh giá tính hiệu quả, đề xuất sửa đổi, bổ sung chính sách nội bộ phù hợp với thực tiễn và yêu cầu pháp luật.\u003c/p\u003e\u003cp\u003e•   Triển khai, kiểm soát và đánh giá việc thực hiện các quy trình nội bộ về phòng, chống rửa tiền (PCRT), bảo đảm tuân thủ đúng quy định của pháp luật và cơ quan quản lý.\u003c/p\u003e\u003cp\u003e4. Đào tạo \u0026 phổ biến pháp luật\u003c/p\u003e\u003cp\u003e•   Tham gia xây dựng và triển khai kế hoạch đào tạo nội bộ về pháp luật chứng khoán, quản trị rủi ro pháp lý.\u003c/p\u003e\u003cp\u003e•   Tham gia tổ chức tập huấn, phổ biến văn bản pháp luật mới liên quan đến hoạt động chứng khoán và các quy định có ảnh hưởng trực tiếp đến hoạt động của Công ty.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T523,\u003cp\u003e1. Trình độ học vấn\u003c/p\u003e\u003cp\u003e•   Tốt nghiệp Cử nhân Luật chính quy (ưu tiên chuyên ngành Luật Tài chính – Ngân hàng).\u003c/p\u003e\u003cp\u003e•   Ưu tiên có chứng chỉ hành nghề luật sư.\u003c/p\u003e\u003cp\u003e•   Ưu tiên có chứng chỉ cơ bản/chứng chỉ pháp luật về chứng khoán do SRTC cấp.\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm: tối thiểu 3 năm kinh nghiệm pháp lý tại công ty chứng khoán hoặc công ty quản lý quỹ.\u003c/p\u003e\u003cp\u003e3. Kiến thức chuyên môn\u003c/p\u003e\u003cp\u003e•   Am hiểu Luật Doanh nghiệp, Luật Ngân hàng, Luật Chứng khoán và các quy định liên quan.\u003c/p\u003e\u003cp\u003e•   Kiến thức tốt về công cụ tài chính, thị trường tài chính và định chế tài chính.\u003c/p\u003e\u003cp\u003e•   Kinh nghiệm xây dựng khung tuân thủ (compliance framework), quy định nội bộ, và phân tích tác động của quy định pháp luật mới tới hoạt động kinh doanh.\u003c/p\u003e\u003cp\u003e4. Kỹ năng\u003c/p\u003e\u003cp\u003e•   Phân tích, đánh giá dữ liệu pháp lý để hỗ trợ quyết định kinh doanh.\u003c/p\u003e\u003cp\u003e•   Xử lý, phân tích vấn đề pháp lý phức tạp; đề xuấ
