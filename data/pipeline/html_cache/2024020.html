js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tc74,"])</script><script>self.__next_f.push([1,"Thông tin về Chubb Life Việt Nam\r\n\r\nCông ty TNHH Bảo hiểm Nhân thọ Chubb Việt Nam (“Chubb Life Việt Nam”) là công ty thành viên thuộc khối kinh doanh Bảo hiểm Nhân thọ toàn cầu của Tập đoàn Chubb (tiền thân là Tập đoàn ACE).\r\nNgày 14/1/2016, tập đoàn ACE hoàn tất thương vụ mua lại Chubb và đưa vào sử dụng tên Chubb trên phạm vi toàn cầu. Tập đoàn sau sáp nhập là tập đoàn bảo hiểm tài sản và trách nhiệm lớn nhất thế giới được niêm yết trên thị trường chứng khoán, hoạt động tại 54 quốc gia trên toàn cầu. Tại Việt Nam, ACE Life chính thức trở thành Công ty TNHH Bảo hiểm Nhân thọ Chubb Việt Nam (‘Chubb Life Việt Nam’) vào ngày 04/04/2016.\r\n\r\nChubb Life Việt Nam cung cấp các sản phẩm Bảo hiểm Nhân thọ ưu việt đáp ứng toàn diện các nhu cầu bảo vệ và an toàn tài chính đa dạng cho các khách hàng khác nhau. Tháng 3 năm 2006, Chubb Life Việt Nam tiên phong giới thiệu dòng sản phẩm Bảo hiểm Liên kết chung - Kế hoạch Tài chính Trọn đời ra thị trường. Đến nay, Chubb Life Việt Nam đã phát triển và cung cấp một danh mục đa dạng các sản phẩm Kế hoạch Tài chính Trọn đời, tạo điều kiện cho các khách hàng cá nhân và tổ chức, với độ tuổi tham gia lên đến 80 tuổi, chủ động lựa chọn những kế hoạch bảo vệ phù hợp với điều kiện tài chính của mình. Hiện nay, Chubb Life Việt Nam cung cấp các sản phẩm bảo hiểm của mình chủ yếu thông qua một đội ngũ hơn 16.000 Đại diện Kinh doanh tận tâm và chuyên nghiệp trên khắp cả nước, cũng như thông qua một số ngân hàng được chọn lọc.\r\nĐể biết thêm thông tin về Chubb Life Việt Nam, xin vui lòng truy cập: www.chubb.com/vn.\r\n\r\n\r\nAbout Chubb Life Vietnam\r\n\r\nChubb Life is the global life insurance division of Chubb (f.k.a ACE).\r\nOn January 14th 2016, ACE announced its acquisition of Chubb, adopting the Chubb name globally. Chubb is the world’s largest publicly traded property and casualty insurance company and operates in 54 countries. In Vietnam, Chubb announced the official name change of its life insurance subsidiary in Vietnam from ACE Life to Chubb Life (Chubb Life Vietnam Insurance Co., Ltd.) on April 4, 2016.\r\n\r\nChubb Life in Vietnam offers a comprehensive array of quality life-insurance products to meet the financial-protection and security needs of a broad range of customers.\r\nThe company pioneered the introduction of the Universal Life plan in the Vietnamese market in March 2006. Since then, it has developed a full range of Universal Life products. This diverse range of Universal Life products enables individuals and groups up to the age of 80 years to select plans to suit their financial needs. Chubb Life distributes its products mainly through its professional and ever-growing 16,000 strong agency force, as well as through select banks. More information can be found at www.chubb.com/vn."])</script><script>self.__next_f.push([1,"24:T854,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eProject Management Support\u003c/strong\u003e: Assist in executing, monitoring projects and tracking project progress, milestones, and deliverables. Coordinate project-related activities and ensure timely completion.\u003c/p\u003e\u003cp\u003eIn-organic Recruitment Support: Communicate with external candidates when needed to support with recruitment process and ensure documents to be submitted properly. Conduct interviews of agency leader candidates and managing recruitment pipeline following standardized recruitment process\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCross-Functional Collaboration\u003c/strong\u003e: Collaborate with cross-functional teams to ensure recruitment progress to be completed and updated. Follow up and track candidates’ progress and recruitment outcome, as well as sales performance after 6 months. Report these progresses weekly/ monthly and monitor any issues/ estimation of late deadline for in-time actions\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOverall Administration\u003c/strong\u003e: Provide administrative support for recruitment initiatives, including scheduling meetings, preparing agendas, and documenting minutes. Assist in the development and implementation of tools and resources.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePrepare Periodic Reports\u003c/strong\u003e: Gather periodic reports/dashboards (monthly, weekly, daily) from Reporting/ Planning team and fulfill ad-hoc requests to support business stakeholders. Ensure data accuracy and on-time delivery. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActivities Organizing:\u003c/strong\u003e Assist in organizing recruitment events, trainings/workshops, and other relevant activities. Coordinate logistics, invitations, and follow-up tasks. Prepare, communicate and deliver promotional items to promote recruitment initiatives/ events etc.. Take care of documentation for agency recruitment support activities.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePresentation Support\u003c/strong\u003e: design slides with contents being provided or proactively collect data/ content for slide preparation and design\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOther Responsibilities\u003c/strong\u003e: Perform other duties as required to support the department and company objectives.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tc74,"])</script><script>self.__next_f.push([1,"Thông tin về Chubb Life Việt Nam\r\n\r\nCông ty TNHH Bảo hiểm Nhân thọ Chubb Việt Nam (“Chubb Life Việt Nam”) là công ty thành viên thuộc khối kinh doanh Bảo hiểm Nhân thọ toàn cầu của Tập đoàn Chubb (tiền thân là Tập đoàn ACE).\r\nNgày 14/1/2016, tập đoàn ACE hoàn tất thương vụ mua lại Chubb và đưa vào sử dụng tên Chubb trên phạm vi toàn cầu. Tập đoàn sau sáp nhập là tập đoàn bảo hiểm tài sản và trách nhiệm lớn nhất thế giới được niêm yết trên thị trường chứng khoán, hoạt động tại 54 quốc gia trên toàn cầu. Tại Việt Nam, ACE Life chính thức trở thành Công ty TNHH Bảo hiểm Nhân thọ Chubb Việt Nam (‘Chubb Life Việt Nam’) vào ngày 04/04/2016.\r\n\r\nChubb Life Việt Nam cung cấp các sản phẩm Bảo hiểm Nhân thọ ưu việt đáp ứng toàn diện các nhu cầu bảo vệ và an toàn tài chính đa dạng cho các khách hàng khác nhau. Tháng 3 năm 2006, Chubb Life Việt Nam tiên phong giới thiệu dòng sản phẩm Bảo hiểm Liên kết chung - Kế hoạch Tài chính Trọn đời ra thị trường. Đến nay, Chubb Life Việt Nam đã phát triển và cung cấp một danh mục đa dạng các sản phẩm Kế hoạch Tài chính Trọn đời, tạo điều kiện cho các khách hàng cá nhân và tổ chức, với độ tuổi tham gia lên đến 80 tuổi, chủ động lựa chọn những kế hoạch bảo vệ phù hợp với điều kiện tài chính của mình. Hiện nay, Chubb Life Việt Nam cung cấp các sản phẩm bảo hiểm của mình chủ yếu thông qua một đội ngũ hơn 16.000 Đại diện Kinh do rkets and communities and takes full advantage of the wide range of experiences and backgrounds provided. \r\nThere will be plenty of opportunity for employees to enhance their ability and build their career with us. At Chubb Life, we periodically organize training programs by internal mentors and also cooperate with reputable domestic and overseas training organizations to provide employees with the industry’s fundamental and profound knowledge and skills. We constantly support our employees to improve their learning and achieve highest results by granting study leave, sponsoring their training costs or examination fees. In addition. Chubb Life always rewards to those who win international professional certificates, i.e LIMRA, ACCA, LOMA, CPA or SOA, etc. Chubb Life is promoting Online Learning Center with hundreds of courses and launching monthly projects at work to create an environment where people can learn conveniently. In addition, Chubb Life also focuses on developing the management team to ensure best use of the available manpower. To enhance employee engagement, we also invest in internal activities to make our workplace friendly and enjoyable as well as offer practical benefits to provide our employees with comprehensive care.29:Tc74,"])</script><script>self.__next_f.push([1,"Thông tin về Chubb Life Việt Nam\r\n\r\nCông ty TNHH Bảo hiểm Nhân thọ Chubb Việt Nam (“Chubb Life Việt Nam”) là công ty thành viên thuộc khối kinh doanh Bảo hiểm Nhân thọ toàn cầu của Tập đoàn Chubb (tiền thân là Tập đoàn ACE).\r\nNgày 14/1/2016, tập đoàn ACE hoàn tất thương vụ mua lại Chubb và đưa vào sử dụng tên Chubb trên phạm vi toàn cầu. Tập đoàn sau sáp nhập là tập đoàn bảo hiểm tài sản và trách nhiệm lớn nhất thế giới được niêm yết trên thị trường chứng khoán, hoạt động tại 54 quốc gia trên toàn cầu. Tại Việt Nam, ACE Life chính thức trở thành Công ty TNHH Bảo hiểm Nhân thọ Chubb Việt Nam (‘Chubb Life Việt Nam’) vào ngày 04/04/2016.\r\n\r\nChubb Life Việt Nam cung cấp các sản
