strict, Ha Noi, Vietnam.\r\n\r\nHai Phong Office: \r\nLot H\u0026F, Nomura Industrial Park, An Duong, Hai Phong. \r\n384 Lach Tray, Dang Giang Ward, Ngo Quyen District, Hai Phong City.\r\n\r\nBac Ninh Warehouse:\r\nPhytophaco Warehouse, Mot 5, Tan Hong Industrial, Tu Son Province, Bac Ninh/Vietnam24:T7e5,\u003cp\u003eGEODIS is a Supply Chain Operator ranking among the top companies in its field in Europe and the World. GEODIS, which is part of SNCF Logistics, which in turn is a business line of the SNCF Group, is the number one Transport and Logistics operator in France and ranked number four in Europe. The international reach includes a direct presence in 67 countries and a global network spanning over 120 countries.\u003c/p\u003e\u003cp\u003eWith its five lines of business (Supply Chain Optimization, Freight Forwarding, Contract Logistics, Distribution \u0026 Express and Road Transport), GEODIS manages its customers Supply Chain by providing end-to-end solutions enabled by our people, our infrastructure, processes and systems.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eWe are looking for candidates for the position of Airfreight Export Executive to join our team in Ho Chi Minh.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRESPONSIBLES:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tWork according to the process:\u003c/p\u003e\u003cp\u003e\t- Handle shipment as per SOP, Handling Instructions.\u003c/p\u003e\u003cp\u003e\t- Receive booking from customer.\u003c/p\u003e\u003cp\u003e\t- Book with Airlines.\u003c/p\u003e\u003cp\u003e\t- Send confirmed booking to customer.\u003c/p\u003e\u003cp\u003e\t- Issue HBL/HAWB.\u003c/p\u003e\u003cp\u003e\t- Have Airline issued MBL/MAWB.\u003c/p\u003e\u003cp\u003e\t- Send pre-advice to Overseas Agent.\u003c/p\u003e\u003cp"])</script><script>self.__next_f.push([1,"\u003e\t- Arrange trucking and warehouse requirements (if request).\u003c/p\u003e\u003cp\u003e\t- Monitor and confirm Departure/ Arrival of freight.\u003c/p\u003e\u003cp\u003e\t- Enter all charges and profit shares into the system.\u003c/p\u003e\u003cp\u003e\t- Close file, pass invoices and credit memos.\u003c/p\u003e\u003cp\u003e\t- Post information on system.\u003c/p\u003e\u003cp\u003e•\tRegular work with House Airway bill, Freight Cargo Receipt, Delivery Order, Manifest, Amend manifest.\u003c/p\u003e\u003cp\u003e•\tAccurately complete all activities relating to the document processing, system input \u0026 update of Export Air within set KPIs.\u003c/p\u003e\u003cp\u003e•\tAssist supplier and customer queries.\u003c/p\u003e\u003cp\u003e•\tArrange collections. \u003c/p\u003e\u003cp\u003e•\tContribute to development of team.\u003c/p\u003e\u003cp\u003e•\tAssure timely \u0026 accurately billing and costing as per company policy.\u003c/p\u003e\u003cp\u003e•\tPerform other ad-hoc tasks assigned by the National Airfreight Manager.\u003c/p\u003e25:T92b,"])</script><script>self.__next_f.push([1,"\u003cp\u003eREQUIREMENT:\u003c/p\u003e\u003cp\u003e• University educational background\u003c/p\u003e\u003cp\u003e• Functional 3-years' experience in relevant working experience, knowledge of customs, preferably knowledge of airfreight industry and processes.\u003c/p\u003e\u003cp\u003e• Familiar with and well able to work within the import/export process.\u003c/p\u003e\u003cp\u003e• Know supplier conditions, delivery terms, Inco terms and purchasing conditions.\u003c/p\u003e\u003cp\u003e• Know risks and insurance terms.\u003c/p\u003e\u003cp\u003e• Familiar with and able to work with the company’s quality and environmental policies.\u003c/p\u003e\u003cp\u003e• Good knowledge of computer system, both import/export and invoicing.\u003c/p\u003e\u003cp\u003e• Knowledge of Customs tariff.\u003c/p\u003e\u003cp\u003e• Good communication skills.\u003c/p\u003e\u003cp\u003e• Financial awareness.\u003c/p\u003e\u003cp\u003e• Able to manage own working time effectively.\u003c/p\u003e\u003cp\u003e• K
