 manufacturing operations, aiding in the resolution of complex issues through comprehensive analysis of variable factors.\u003c/p\u003e\u003cp\u003e•\tTaking proactive measures to resolve critical issues impacting the Technical Equipment Group-Test (TEGT) operations.\u003c/p\u003e\u003cp\u003e•\tLeading the charge in the adoption and integration of new technologies, ensuring seamless transitions.\u003c/p\u003e\u003cp\u003e•\tCollaborating closely with peers and manufacturing teams to uphold equipment maintenance standards, focusing on metrics such as Equipment Mean Time Between Alarm (MTBA), Mean Time to Repair (MTTR), Overall Equipment Efficiency (OEE), as well as driving productivity and automation enhancements.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePosition 2: Equipment Engineer within Technical Equipment Group Assembly Finish Department (TEG AF) \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical Equipment Group Assembly Finish Department (TEG AF) focus to develop Equipment Tool Master with systematic Problem Solving and Lean mindset, take responsibility for High Precision Maintenance – a world class manufacturing floor culture to achieve effective \u0026 efficient way of equipment maintenance to enable sustaining excellent. \u003c/strong\u003eWe are looking welcome an Equipment Engineer into our team to deliver excellent operation with sustainability, flexibility, and efficiency. Join us in our journey to be world-class workforce to accelerate technology revolution.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResponsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tWorking with Module Engineer, Technical Supervisor, Equipment Specialist to build the standard for conversion, troubleshooting.\u003c/p\u003e\u003cp\u003e•\tReviewing the equipment performance indicator in routine work \u0026 perform investigation, stop bleeding, Work on Corrective Actions and report out to hit Process Control System metrics.\u003c/p\u003e\u003cp\u003e•\tSustain the equipment standard model. Own 24/7 operational escalation.  Work with on shift Equipment Specialist toward equipment performance indicators.\u003c/p\u003e\u003cp\u003e•\tCoordinating, implementing, and developing equipment and process improvements in regard to safety, quality and efficiency. Will use lean rules, principle, and methods to determine improvement opportunities and develop solutions. Will resolve process problems by applying structured problem methodologies (Model Based Problem Solving, Lean and Statistics).\u003c/p\u003e\u003cp\u003e•\tCollaborating with other engineering functions in Mfg. process and systems improvements. Owns processing or handling equipment specification.\u003c/p\u003e\u003cp\u003e•\tFollowing cannibalized process. Provide the inputs, info for Module Engineer, Preventive Maintenance Lead to back order, setup new part.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInside this Business Group\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eAs the world's largest chip manufacturer, Intel strives to make every facet of semiconductor manufacturing state-of-the-art -- from semiconductor process development and manufacturing, through yield improvement to packaging, final test and optimization, and world class Supply Chain and facilities support. Employees in the Intel Foundry Manufacturing and Supply Chain (FMSC) are part of a worldwide network from design to assembly/test facilities, all focused on utilizing the power of Moore’s Law to bring smart, connected devices to every person on Earth.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eWe’d love to have you apply, even if you feel that you may not meet some qualifications in this posting. At Intel, we are always looking for outstanding individuals with diverse backgrounds and perspectives energized by our mission. \u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T4e2,\u003cp\u003e•\tPossess a Bachelor or a Master of Science degree in Electrical, Electronics, Mechanical, Mechatronics, Automation or other relevant technical or engineering discipline.\u003c/p\u003e\u003cp\u003e•\tFresh graduates from relevant fields as stated above are welcomed to apply. Candidate with relevant working experience is advantageous. \u003c/p\u003e\u003cp\u003e•\tKnowledge of schematic/electronic circuitry interpretation.\u003c/p\u003e\u003cp\u003e•\tProficient in both spoken and written English communication.\u003c/p\u003e\u003cp\u003e•\tSkilled in using MS Office applications, including Outlook, Excel, Word, and PowerPoint.\u003c/p\u003e\u003cp\u003e•\tExhibits a self-motivated and team-oriented approach, with a data-driven mindset, a sense of ownership, and a positive attitude towards learning.\u003c/p\u003e\u003cp\u003e•\tResourceful and innovative, with a knack for creatively solving problems.\u003c/p\u003e\u003cp\u003e•\tExperience with data analysis through programming languages such as SQL, Python, R, etc., is preferred.\u003c/p\u003e\u003cp\u003e•\tWillingness to work onsite in a 12-hour rotational shift pattern, 4 days per week, as required by business needs, with additional allowances provided.\u003c/p\u003e\u003cp\u003e•\tPrior experience in the semiconductor industry and a manufacturing environment will be considered an advantage.\u003c/p\u003e\u003cp\u003e•\tThis is a contract role \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e27:T1343,"])</script><script>self.__next_f.push([1,"\u003cp\u003eIntel Products Vietnam is the mega Assembly and Test plant within Intel’s global Assembly and Test network. The clean room facility is located at Saigon High Tech Park in Thu Duc city, Ho Chi Minh city. The site is proud of prod solutions. Will resolve process problems by applying structured problem methodologies (Model Based Problem Solving, Lean and Statistics).\u003c/p\u003e\u003cp\u003e•\tCollaborating with other engineering functions in Mfg. process and systems improvements. Owns processing or handling equipment specification.\u003c/p\u003e\u003cp\u003e•\tFollowing cannibalized process. Provide the inputs, info for Module Engineer, Preventive Maintenance Lead to back order, setup new part.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInside this Business Group\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eAs the world's largest chip manufacturer, Intel strives to make every facet of semiconductor manufacturing state-of-the-art -- from semiconductor process development and manufacturing, through yield improvement to packaging, final test and optimization, and world class Supply Chain and facilities support. Employees in the Intel Foundry Manufacturing and Supply Chain (FMSC) are part of a worldwide network from design to assembly/test facilities, all focused on utilizing the power of Moore’s Law to bring smart, connected devices to every person on Earth.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eWe’d love to have you apply, even if you feel that you may not meet some qualifications in this posting. At Intel, we are always looking for outstanding individuals with diverse backgrounds and perspectives energized by our mission. \u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:T4e2,\u003cp\u003e•\tPossess a Bachelor or a Master of Science degree in Electrical, Electronics, Mechanical, Mechatronics, Automation or other relevant technical or engineering discipline.\u003c/p\u003e\u003cp\u003e•\tFresh graduates from relevant fields as stated above are welcomed to apply. Candidate with relevant wo
