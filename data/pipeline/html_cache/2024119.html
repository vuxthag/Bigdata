c (như công nghệ đúc chân không, in 3D, khắc laser) để áp dụng vào thực tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Tối ưu hóa nguồn lực và quản lý hao hụt nguyên liệu.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản lý hao hụt:\u003c/strong\u003e Thiết lập định mức hao hụt cho từng công đoạn. Đây là KPI quan trọng nhất vì giá trị nguyên liệu rất lớn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tQuản lý máy móc:\u003c/strong\u003e Lập kế hoạch bảo trì, bảo dưỡng định kỳ hệ thống máy móc thiết bị nhà máy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTối ưu nguyên vật liệu:\u003c/strong\u003e Quản lý kho vật tư sản xuất, đảm bảo cung ứng kịp thời nhưng không gây tồn kho lãng phí.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản trị Nhân sự và an toàn lao động\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐào tạo:\u003c/strong\u003e Xây dựng lộ trình đào tạo nâng cao tay nghề cho 300 công nhân (đặc biệt là thợ bậc cao).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐánh giá:\u003c/strong\u003e Thiết lập KPI và bảng lương khoán/thưởng năng suất để thúc đẩy động lực làm việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAn toàn và bảo mật:\u003c/strong\u003e Đảm bảo nghiêm ngặt quy trình an toàn lao động và đặc biệt là quy trình \u003cstrong\u003ean ninh/kiểm soát thất thoát\u003c/strong\u003e tài sản (vàng bạc) trong nhà máy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Cải tiến quy trình và báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCải tiến (Lean/5S):\u003c/strong\u003e Áp dụng các công cụ quản lý sản xuất hiện đại để tinh gọn quy trình, giảm thời gian chờ đợi.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHệ thống báo cáo:\u003c/strong\u003e Báo cáo định kỳ về: Sản lượng, tỷ lệ hao hụt, giá thành sản xuất và hiệu suất nhân sự lên Ban Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Ta3a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Tốt nghiệp Cao đẳng, Đại học trở lên chuyên ngành \u003cstrong\u003eKỹ thuật, Quản trị sản xuất \u003c/strong\u003evà các ngành khác có liên quan\u003cstrong\u003e.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Ít nhất 05 năm kinh nghiệm quản lý sản xuất, trong đó có tối thiểu 02 năm ở vị trí tương đương tại các Xưởng sản xuất/Nhà máy có quy mô tối thiểu 50 CBNV. Ưu tiên:\u003c/p\u003e\u003cp\u003e+ Có kinh nghiệm quản lý sản xuất trong ngành chế tác vàng miếng, bạc đúc, trang sức, hàng xa xỉ hoặc gia công cơ khí chính xác;\u003c/p\u003e\u003cp\u003e+ Ngành sản xuất kỹ thuật hoặc công ty vừa sản xuất tự động vừa sản xuất thủ công.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCác yêu cầu khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kinh nghiệm quản lý đội ngũ từ 20 người trở lên.\u003c/p\u003e\u003cp\u003e- Hiểu biết sâu rộng về quy trình, công nghệ sản xuất, các thiết bị sản xuất.\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm triển khai thành công các dự án cải tiến theo LEAN (5s, Kaizen, VSM,…)\u003c/p\u003e\u003cp\u003e- Hiểu biết về các hệ thống quản lý ISO 9001, ISO 14001, ISO 45001\u003c/p\u003e\u003cp\u003e- Có khả năng lập kế hoạch, tổ chức, điều hành và kiểm soát sản xuất hiệu quả.\u003c/p\u003e\u003cp\u003e- Kỹ năng lãnh đạo, quản lý đội ngũ, giải quyết vấn dựa trên dữ liệu đề tốt.\u003c/p\u003e\u003cp\u003e- Tư duy đổi mới, cải tiến liên tục trong sản xuất.\u003c/p\u003e\u003cp\u003e- Hướng mục tiêu đến cùng, chịu áp lực cao trong công việc.\u003c/p\u003e\u003cp\u003e- Thành thạo tin học văn phòng và các phần mềm quản lý sản xuất.\u003c/p\u003e\u003cp\u003e- Có khả năng truyền lửa, tạo động lực cho CBNV\u003c/p\u003e\u003cp\u003e- Chính trực, Tận tâm, Nói như đóng dấu\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhúc lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Thu nhập cạnh tranh – Lương thỏa thuận theo năng lực\u003c
