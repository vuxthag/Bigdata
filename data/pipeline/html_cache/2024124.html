cision based on circuit specifications\u003c/p\u003e\u003cp\u003eo\tThermal Management: Understand power dissipation patterns for effective thermal test strategies\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePosition#2: Module Engineer Within Test Engineering Department (ATE)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tResponsible for developing and improving test process on industry-standard Tester and Handler Equipment (ATE) (Teradyne Flex, Advantest V93K, HonPrec Handlers, etc.)\u003c/p\u003e\u003cp\u003e•\tOwns execution of maintenance and repair activities for equipment and relevant module of components.\u003c/p\u003e\u003cp\u003e•\tOwns critical high volume manufacturing equipment and processes that enable rapid device miniaturization and the mass production of integrated circuits.\u003c/p\u003e\u003cp\u003e•\tInitiates and owns the continuous improvement of equipment and process for key performance indicators (e.g., safety, quality, cost, productivity, defects, and yield) and works with equipment suppliers as required.\u003c/p\u003e\u003cp\u003e•\tOwns process development line items aligned to high volume process nodes.\u003c/p\u003e\u003cp\u003e•\tParticipates in the transfer of technology to other sites through training and audit of installation and qualification outcomes to ensure matched processing across sites.\u003c/p\u003e\u003cp\u003e•\tOwns development and optimization of excursion prevention systems for the equipment and process.\u003c/p\u003e\u003cp\u003e•\tOwns detection of discrepant material or activities of the equipment and process to achieve high level of quality.\u003c/p\u003e\u003cp\u003e•\tDuring factory ramps, owns equipment install/conversion and qualification to ensure tools are installed safely and on schedule, while meeting all quality/matching criteria (from design through Safety Level 1 and Safety Level Supplier milestones, Intel qual and manufacturing readiness processes).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tc35,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003ePosition#1: Module Engineer Within Test Engineering Department (Test Program Development \u0026 VLSI Design)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPossess a Bachelor or Master degree in Electronics, Electrical, Automation Control or other relevant technical or engineering discipline.\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eDevelop Test Program with deep understanding of its interaction with Hardware and different Applications in use.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKnowledge of schematic/electronic circuitry interpretation.\u003c/p\u003e\u003cp\u003e•\tHave more than 3-year working experience in the same field of Semiconductor Testing.\u003c/p\u003e\u003cp\u003e•\tExperience with data analysis through programming languages such as SQL, Python, R, etc., is preferred.\u003c/p\u003e\u003cp\u003e•\tSkilled in using MS Office applications, including Outlook, Excel, Word, and PowerPoint.\u003c/p\u003e\u003cp\u003e•\tProficient in both spoken and written English communication.\u003c/p\u003e\u003cp\u003e•\tBe able to work in a team.\u003c/p\u003e\u003cp\u003e•\tExhibits a self-motivated and team-oriented approach, with a data-driven mindset, a sense of ownership, and a positive attitude towards learning.\u003c/p\u003e\u003cp\u003e•\tDemonstrate discipline, attentiveness to detail and self-independence.\u003c/p\u003e\u003cp\u003e•\tCapable to timely manage multiple assignments and meet the deliverable timeline.\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eWillingness to work onsite in a 12-hour rotational shift pattern,\u003c/strong\u003e 4 days per week, as required by business needs, with additional allowances provided.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePosition#2: Module Engineer W
