03c/p\u003e\u003cp\u003e\u003cstrong\u003e- Cloud \u0026 Infrastructure (IaC):\u003c/strong\u003e Design and manage multi-cloud environments using modern tools (Terraform, Pulumi, or CloudFormation).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Containers \u0026 Orchestration:\u003c/strong\u003e Optimize services on Kubernetes (K8s) and Docker for high availability.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- CI/CD Automation:\u003c/strong\u003e Build seamless pipelines (GitHub Actions, GitLab CI) to automate testing and deployments.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- System Health (Observability):\u003c/strong\u003e Implement monitoring and logging (Prometheus, Grafana, ELK) to keep everything running smoothly.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Security (DevSecOps):\u003c/strong\u003e Integrate security best practices (IAM, vulnerability scanning) into the development lifecycle.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Cost Optimization (FinOps):\u003c/strong\u003e Provide analysis of cloud spending to ensure we are using resources effectively.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Strategic Leadership (For Senior):\u003c/strong\u003e Collaborate with Product teams and mentor junior/middle members.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWho can apply\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBe dreaming! If you have not yet matched all of our requirements but found those would be your capacities in the future, don’t hesitate to apply.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Junior Level:\u003c/strong\u003e We welcome \"Dreamers\" who have the ability to build themselves up into DevOps experts. If you have the logic and the hunger to learn, don't hesitate to apply.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Middle Level:\u003c/strong\u003e You should be a \"Problem Solver\" capable of taking ownership of specific modules and executing CI/CD or infrastructure tasks independently.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Senior Level:\u003c/strong\u003e We expect a \"Visionary\" mindset with proven success in leading technical research, strategy, and architecture design.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T638,\u003cp\u003e\u003cstrong\u003eMust have:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Communication:\u003c/strong\u003e English proficiency (Strong reading and writing skills for technical documentation; verbal communication is a significant advantage).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Cloud Foundation:\u003c/strong\u003e Hands-on experience with \u003cstrong\u003eat least one\u003c/strong\u003e major provider: AWS or Azure (GCP is a great plus).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Automation Mindset:\u003c/strong\u003e Experience with Infrastructure as Code (IaC) and automated deployments.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Programming Skills: \u003c/strong\u003eProficiency in at least one language: Python, NodeJS, Go, Java, Ruby, or .NET.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Agile spirit:\u003c/strong\u003e Familiarity with Scrum or Kanban workflows.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAdvanced to have:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Education:\u003c/strong\u003e Bachelor’s degree in Computer Science or a related field.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Frontend Awareness:\u003c/strong\u003e Familiarity with ReactJS or VueJS to better support cross-functional teams.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- SRE Principles:\u003c/strong\u003e Knowledge of SLO/SLI and error budgets.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Mobile DevOps:\u003c/strong\u003e Experience in CI/CD for native mobile applications.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWorking Shifts (From Mon to Fri)\u003c/stron
