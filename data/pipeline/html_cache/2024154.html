%5D/page-fe95cd3767062684.js\"],\"default\"]\n26:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Te4f,"])</script><script>self.__next_f.push([1,"\u003cp\u003eMÔ TẢ CÔNG VIỆC – BỘ PHẬN NHÂN SỰ\u003c/p\u003e\u003cp\u003e1. CHUYÊN VIÊN TUYỂN DỤNG (Recruitment Specialist)\u003c/p\u003e\u003cp\u003eNhiệm vụ chính\u003c/p\u003e\u003cp\u003e1. Lập kế hoạch tuyển dụng\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch tuyển dụng theo tháng, quý, năm dựa trên nhu cầu nhân sự của các phòng ban.\u003c/p\u003e\u003cp\u003e•\tXác định số lượng, thời gian tuyển dụng, ngân sách tuyển dụng và phương án thực hiện.\u003c/p\u003e\u003cp\u003e2. Phát triển và quản lý kênh tuyển dụng\u003c/p\u003e\u003cp\u003e•\tKhai thác hiệu quả các kênh tuyển dụng hiện có (website tuyển dụng, mạng xã hội, headhunter, trường đại học…).\u003c/p\u003e\u003cp\u003e•\tTìm kiếm, đánh giá và phát triển các nguồn tuyển dụng mới nhằm mở rộng nguồn ứng viên chất lượng.\u003c/p\u003e\u003cp\u003e3. Thực hiện quy trình tuyển dụng\u003c/p\u003e\u003cp\u003e•\tTiếp nhận yêu cầu tuyển dụng từ các phòng ban.\u003c/p\u003e\u003cp\u003e•\tThực hiện đăng tuyển, sàng lọc hồ sơ, phỏng vấn sơ bộ và phối hợp phỏng vấn chuyên môn.\u003c/p\u003e\u003cp\u003e•\tSắp xếp lịch phỏng vấn và hỗ trợ các bộ phận trong quá trình tuyển chọn ứng viên.\u003c/p\u003e\u003cp\u003e4. Xây dựng thương hiệu tuyển dụng\u003c/p\u003e\u003cp\u003e•\tQuản lý và phát triển fanpage tuyển dụng, các kênh truyền thông nhân sự.\u003c/p\u003e\u003cp\u003e•\tXây dựng hình ảnh Employer Branding nhằm thu hút nhân tài.\u003c/p\u003e\u003cp\u003e5. Quản lý dữ liệu ứng viên\u003c/p\u003e\u003cp\u003e•\tXây dựng và quản lý data ứng viên (Talent Pool).\u003c/p\u003e\u003cp\u003e•\tLưu trữ, cập nhật và khai thác dữ liệu ứng viên phục vụ nhu cầu tuyển dụng lâu dài.\u003c/p\u003e\u003cp\u003e6. Truyền thông và quảng bá tuyển dụng\u003c/p\u003e\u003cp\u003e•\tTham gia tổ chức các hoạt động truyền thông tuyển dụng nội bộ và bên ngoài.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các bộ phận để quảng bá hình ảnh doanh nghiệp và môi trường làm việc.\u003c/p\u003e\u003cp\u003e7. Báo cáo tuyển dụng\u003c/p\u003e\u003cp\u003e•\tThực hiện báo cáo tuyển dụng định kỳ hàng tháng/quý.\u003c/p\u003e\u003cp\u003e•\tĐánh giá hiệu quả các kênh tuyển dụng và đề xuất cải tiến.\u003c/p\u003e\u003cp\u003e2. CHUYÊN VIÊN TIỀN LƯƠNG \u0026 CHẾ ĐỘ CHÍNH SÁCH\u003c/p\u003e\u003cp\u003eNhiệm vụ chính\u003c/p\u003e\u003cp\u003e1. Xây dựng chính sách nhân sự\u003c/p\u003e\u003cp\u003e•\tTham gia xây dựng và hoàn thiện các chính sách, quy chế, quy định và quy trình quản lý nhân sự.\u003c/p\u003e\u003cp\u003e•\tPhát triển hệ thống quản lý lao động và tiền lương đồng bộ, đảm bảo hiệu quả sử dụng nhân lực.\u003c/p\u003e\u003cp\u003e2. Kế hoạch lao động\u003c/p\u003e\u003cp\u003e•\tTham gia xây dựng kế hoạch lao động hàng năm cho toàn hệ thống.\u003c/p\u003e\u003cp\u003e•\tĐề xuất nhu cầu nhân sự cho các đơn vị theo kế hoạch phát triển của doanh nghiệp.\u003c/p\u003e\u003cp\u003e3. Cơ cấu tổ chức\u003c/p\u003e\u003cp\u003e•\tTham gia nghiên cứu và đề xuất cập nhật mô hình tổ chức, chức năng nhiệm vụ của các đơn vị.\u003c/p\u003e\u003cp\u003e•\tHoàn thiện quy chế hoạt động và phân công nhiệm vụ phù hợp với từng giai đoạn phát triển.\u003c/p\u003e\u003cp\u003e4. Chính sách tiền lương\u003c/p\u003e\u003cp\u003e•\tNghiên cứu và đề xuất cơ chế tiền lương, thưởng và phúc lợi phù hợp với chiến lược phát triển của doanh nghiệp.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo hệ thống lương cạnh tranh, minh bạch và hiệu quả.\u003c/p\u003e\u003cp\u003e5. Hệ thống đánh giá hiệu quả công việc\u003c/p\u003e\u003cp\u003e•\tNghiên cứu và xây dựng hệ thống đánh giá hiệu quả công việc (KPIs).\u003c/p\u003e\u003cp\u003e•\tĐề xuất phương pháp đánh giá phù hợp với từng giai đoạn phát triển của doanh nghiệp\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tff7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. CHUYÊN VIÊN TUYỂN DỤNG (Recruitment Specialist)\u003c/p\u003e\u003cp\u003e1. Trình độ học vấn\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học các ngành:\u003c/p\u003e\u003cp\u003eo\tQuản trị nhân lực\u003c/p\u003e\u003cp\u003eo\tQuản trị kinh doanh\u003c/p\u003e\u003cp\u003eo\tKinh tế\u003c/p\u003e\u003cp\u003eo\tLuật\u003c/p\u003e\u003cp\u003eo\tHoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 02 năm kinh nghiệm trong lĩnh vực tuyển dụng nhân sự.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có kinh nghiệm tuyển dụng cho:\u003c/p\u003e\u003cp\u003eo\tDoanh nghiệp dược phẩm, sản xuất, hoặc phân phối\u003c/p\u003e\u003cp\u003eo\tDoanh nghiệp có quy mô trên 100 nhân sự.\u003c/p\u003e\u003cp\u003e3. Kiến thức chuyên môn\u003c/p\u003e\u003cp\u003e•\tHiểu biết về:\u003c/p\u003e\u003cp\u003eo\tQuy trình tuyển dụng và quản trị nguồn nhân lực.\u003c/p\u003e\u003cp\u003eo\tCác kênh tuyển dụng hiện đại (LinkedIn, Facebook, Vietnamworks, TopCV…).\u003c/p\u003e\u003cp\u003eo\tXây dựng thương hiệu tuyển dụng (Employer Branding).\u003c/p\u003e\u003cp\u003e•\tAm hiểu Luật Lao động và các quy định liên quan đến tuyển dụng là một lợi thế.\u003c/p\u003e\u003cp\u003e4. Kỹ năng\u003c/p\u003e\u003cp\u003e•\tKỹ năng tìm kiếm và đánh giá ứng viên.\u003c/p\u003e\u003cp\u003e•\tKỹ năng phỏng vấn và sàng lọc hồ sơ.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp và thuyết phục ứng viên.\u003c/p\u003e\u003cp\u003e•\tKỹ năng viết nội dung tuyển dụng và truyền thông nhân sự.\u003c/p\u003e\u003cp\u003e•\tKỹ năng quản lý dữ liệu ứng viên và báo cáo tuyển dụng.\u003c/p\u003e\u003cp\u003e5. Năng lực cá nhân\u003c/p\u003e\u003cp\u003e•\tChủ động và có tinh thần trách nhiệm cao.\u003c/p\u003e\u003cp\u003e•\tKhả năng làm việc độc lập và làm việc nhóm.\u003c/p\u003e\u003cp\u003e•\tTư duy tổ chức và quản lý công việc tốt.\u003c/p\u003e\u003cp\u003e•\tTác phong chuyên nghiệp, thái độ tích cực.\u003c/p\u003e\u003cp\u003e6. Yêu cầu khác\u003c/p\u003e\u003cp\u003e•\tThành thạo Microsoft Office (Word, Excel, PowerPoint).\u003c/p\u003e\u003cp\u003e•\tCó khả năng sử dụng các nền tảng tuyển dụng trực tuyến và mạng xã hội.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có khả năng giao tiếp tiếng Anh.\u003c/p\u003e\u003cp\u003e2. CHUYÊN VIÊN TIỀN LƯƠNG \u0026 CHẾ ĐỘ CHÍNH SÁCH (Compensation \u0026 Benefits Specialist)\u003c/p\u003e\u003cp\u003e1. Trình độ học vấn\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học các ngành:\u003c/p\u003e\u003cp\u003eo\tQuản trị nhân lực\u003c/p\u003e\u003cp\u003eo\tKế toán – Tài chính\u003c/p\u003e\u003cp\u003eo\tLuật\u003c/p\u003e\u003cp\u003eo\tQuản trị kinh doanh\u003c/p\u003e\u003cp\u003eo\tHoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 02–03 năm kinh nghiệm trong lĩnh vực:\u003c/p\u003e\u003cp\u003eo\tTiền lương và phúc lợi (C\u0026B)\u003c/p\u003e\u003cp\u003eo\tQuản lý lao động và chính sách nhân sự.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên từng làm việc tại:\u003c/p\u003e\u003cp\u003eo\tDoanh nghiệp sản xuất, dược phẩm hoặc doanh nghiệp quy mô lớn.\u003c/p\u003e\u003cp\u003e3. Kiến thức chuyên môn\u003c/p\u003e\u003cp\u003e•\tAm hiểu các quy định pháp luật liên quan đến:\u003c/p\u003e\u003cp\u003eo\tLuật Lao động\u003c/p\u003e\u003cp\u003eo\tBảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp\u003c/p\u003e\u003cp\u003eo\tChính sách tiền lương và thuế thu nhập cá nhân.\u003c/p\u003e\u003cp\u003e•\tCó kiến thức về:\u003c/p\u003e\u003cp\u003eo\tHệ thống quản trị tiền lương (Salary Structure)\u003c/p\u003e\u003cp\u003eo\tHệ thống KPIs và đánh giá hiệu quả công việc.\u003c/p\u003e\u003cp\u003e4. Kỹ năng\u003c/p\u003e\u003cp\u003e•\tKỹ năng phân tích dữ liệu nhân sự và tiền lương.\u003c/p\u003e\u003cp\u003e•\tKỹ năng xây dựng và quản lý hệ thống lương thưởng.\u003c/p\u003e\u003cp\u003e•\tKỹ năng xây dựng KPIs và đánh giá hiệu quả công việc.\u003c/p\u003e\u003cp\u003e•\tKỹ năng soạn thảo chính sách và quy chế nhân sự.\u003c/p\u003e\u003cp\u003e•\tKỹ năng lập báo cáo và phân tích nhân sự.\u003c/p\u003e\u003cp\u003e5. Năng lực cá nhân\u003c/p\u003e\u003cp\u003e•\tTư duy logic và khả năng phân tích tốt.\u003c/p\u003e\u003cp\u003e•\tCẩn thận, chính xác và bảo mật thông tin.\u003c/p\u003e\u003cp\u003e•\tCó tinh thần trách nhiệm cao.\u003c/p\u003e\u003cp\u003e•\tKhả năng phối hợp với các phòng ban trong doanh nghiệp.\u003c/p\u003e\u003cp\u003e6. Yêu cầu khác\u003c/p\u003e\u003cp\u003e•\tThành thạo Excel nâng cao và các công cụ quản lý dữ liệu.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm sử dụng phần mềm quản lý nhân sự (HRM) là một lợi thế.\u003c/p\u003e\u003cp\u003e•\tCó khả năng đọc hiểu tài liệu tiếng Anh là lợi thế.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Te5a,"])</script><script>self.__next_f.push([1,"Giới thiệu về công ty Vipharco Pháp\r\nĐịa chỉ công ty tại Pháp: 3 Rue Louise de Vilmorin Zac de Montvrain II 91540 Mennecy France.\r\nVPĐD tại Hà Nội: 159 An Trạch, Ô Chợ Dừa, Đống Đa, Hà Nội\r\nVPĐD tại HCM: Tầng 12 Tòa nhà Viettel Tower, số 258 đường Cách Mạng Tháng 8, Phường 12, Quận 10, TP Hồ Chí Minh\r\nQuy mô: 50 - 150 nhân viên\r\nNgành nghề: Dược phẩm, Mỹ phẩm, Thực phẩm chức năng, dinh dưỡng cho trẻ em, thiết bị y tế, đồ tiêu hao y tế\r\n\r\nVipharco được thành lập năm 1982 tại Pháp, là một công ty đa năng hoạt động trong lĩnh vực dược phẩm, trang thiết bị y tế, mỹ phẩm, thực phẩm dinh dưỡng và chuyên nghiên cứu, đưa ra thị trường, điều tiết, phân phối các sản phẩm chất lượng cao nhất theo tiêu chuẩn châu Âu cho khách hàng ở Việt Nam. Với nhiều năm kinh nghiệm hoạt động, định hướng và kiến thức về thị trường dược phẩm trong nước, công ty đã chiếm được vị thế là một đối tác mạnh và có trách nhiệm của Việt Nam.\r\n\r\nVipharco đang liên tục tìm kiếm các đột phá sẽ thay đổi bộ mặt của ngành dược, trang thiết bị y tế Việt Nam. Chúng tôi cố gắng tìm cách cung cấp các dịch vụ chăm sóc sức khỏe bằng các giải pháp sáng tạo đặt ra mục tiêu phục vụ khoa học y tế để phòng ngừa và điều trị bệnh để đảm bảo chất lượng cuộc sống cao. Tầm nhìn của chúng tôi tại Vipharco là trở thành công ty hàng đầu trong ngành dược phẩm và trang thiết bị y tế luôn thay đổi bằng cách cung cấp các sản phẩm chất lượng cao, dịch vụ chu đáo, tận tình cho lợi ích của khách hàng. Chúng tôi cam kết thu hút, phát triển và đào tạo những người có trình độ cao nhất trong ngành dược phẩm. Chúng tôi cùng nhau nỗ lực để chủ động và duy trì một môi trường sáng tạo góp phần vào sự thành công và phát triển công ty . Bằng cách đầu tư một cách khôn ngoan và bằng cách công nhận lợi ích chung với các đối tác kinh doanh của chúng tôi, Chúng tôi cố gắng để đạt được sự tăng trưởng dài hạn và mang lại lợi ích có ý nghĩa cho các đối tác của chúng tôi. Chúng tôi cũng tiếp tục tìm kiếm mối quan hệ đối tác với các Viện nghiên cứu, nhà sản xuất (Pharmaceutical industry) cũng như với các bệnh viện, nhà thuốc .. nhằm tăng cường sự hiện diện của chúng tôi trong các lĩnh vực điều trị mới và tham gia vào các thị trường tăng trưởng cao\r\n\r\nHơn 30 năm qua Vipharco, nhân sự của chúng tôi là tài sản lớn nhất, hiện đang làm việc trong công ty hơn 100 người trong đó có các dược sỹ, kỹ sư, kế toán, bán hàng, trung thành và cam kết với các giá trị và tầm nhìn của công ty chúng tôi với những trụ cột của sự nỗ lực vượt thời gian để thành công và phát triển. Với sự toàn vẹn, trách nhiệm và công việc khó khăn của mình đã đóng góp rất lớn cho việc thành lập và phát triển công ty như một doanh nghiệp hàng đầu trong thị trường dược phẩm, trang thiết bị y tế, mỹ phẩm và thực phẩm bổ sung\r\n\r\nThông tin chi tiết về các công ty vui lòng tham khảo trên website: www.vipharco.com"])</script><script>self.__next_f.push([1,"28:Te4f,"])</script><script>self.__next_f.push([1,"\u003cp\u003eMÔ TẢ CÔNG VIỆC – BỘ PHẬN NHÂN SỰ\u003c/p\u003e\u003cp\u003e1. CHUYÊN VIÊN TUYỂN DỤNG (Recruitment Specialist)\u003c/p\u003e\u003cp\u003eNhiệm vụ chính\u003c/p\u003e\u003cp\u003e1. Lập kế hoạch tuyển dụng\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch tuyển dụng theo tháng, quý, năm dựa trên nhu cầu nhân sự của các phòng ban.\u003c/p\u003e\u003cp\u003e•\tXác định số lượng, thời gian tuyển dụng, ngân sách tuyển dụng và phương án thực hiện.\u003c/p\u003e\u003cp\u003e2. Phát triển và quản lý kênh tuyển dụng\u003c/p\u003e\u003cp\u003e•\tKhai thác hiệu quả các kênh tuyển dụng hiện có (website tuyển dụng, mạng xã hội, headhunter, trường đại học…).\u003c/p\u003e\u003cp\u003e•\tTìm kiếm, đánh giá và phát triển các nguồn tuyển dụng mới nhằm mở rộng nguồn ứng viên chất lượng.\u003c/p\u003e\u003cp\u003e3. Thực hiện quy trình tuyển dụng\u003c/p\u003e\u003cp\u003e•\tTiếp nhận yêu cầu tuyển dụng từ các phòng ban.\u003c/p\u003e\u003cp\u003e•\tThực hiện đăng tuyển, sàng lọc hồ sơ, phỏng vấn sơ bộ và phối hợp phỏng vấn chuyên môn.\u003c/p\u003e\u003cp\u003e•\tSắp xếp lịch phỏng vấn và hỗ trợ các bộ phận trong quá trình tuyển chọn ứng viên.\u003c/p\u003e\u003cp\u003e4. Xây dựng thương hiệu tuyển dụng\u003c/p\u003e\u003cp\u003e•\tQuản lý và phát triển fanpage tuyển dụng, các kênh truyền thông nhân sự.\u003c/p\u003e\u003cp\u003e•\tXây dựng hình ảnh Employer Branding nhằm thu hút nhân tài.\u003c/p\u003e\u003cp\u003e5. Quản lý dữ liệu ứng viên\u003c/p\u003e\u003cp\u003e•\tXây dựng và quản lý data ứng viên (Talent Pool).\u003c/p\u003e\u003cp\u003e•\tLưu trữ, cập nhật và khai thác dữ liệu ứng viên phục vụ nhu cầu tuyển dụng lâu dài.\u003c/p\u003e\u003cp\u003e6. Truyền thông và quảng bá tuyển dụng\u003c/p\u003e\u003cp\u003e•\tTham gia tổ chức các hoạt động truyền thông tuyển dụng nội bộ và bên ngoài.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các bộ phận để quảng bá hình ảnh doanh nghiệp và môi trường làm việc.\u003c/p\u003e\u003cp\u003e7. Báo cáo tuyển dụng\u003c/p\u003e\u003cp\u003e•\tThực hiện báo cáo tuyển dụng định kỳ hàng tháng/quý.\u003c/p\u003e\u003cp\u003e•\tĐánh giá hiệu quả các kênh tuyển dụng và đề xuất cải tiến.\u003c/p\u003e\u003cp\u003e2. CHUYÊN VIÊN TIỀN LƯƠNG \u0026 CHẾ ĐỘ CHÍNH SÁCH\u003c/p\u003e\u003cp\u003eNhiệm vụ chính\u003c/p\u003e\u003cp\u003e1. Xây dựng chính sách nhân sự\u003c/p\u003e\u003cp\u003e•\tTham gia xây dựng và hoàn thiện các chính sách, quy chế, quy định và quy trình quản lý nhân sự.\u003c/p\u003e\u003cp\u003e•\tPhát triển hệ thống quản lý lao động và tiền lương đồng bộ, đảm bảo hiệu quả sử dụng nhân lực.\u003c/p\u003e\u003cp\u003e2. Kế hoạch lao động\u003c/p\u003e\u003cp\u003e•\tTham gia xây dựng kế hoạch lao động hàng năm cho toàn hệ thống.\u003c/p\u003e\u003cp\u003e•\tĐề xuất nhu cầu nhân sự cho các đơn vị theo kế hoạch phát triển của doanh nghiệp.\u003c/p\u003e\u003cp\u003e3. Cơ cấu tổ chức\u003c/p\u003e\u003cp\u003e•\tTham gia nghiên cứu và đề xuất cập nhật mô hình tổ chức, chức năng nhiệm vụ của các đơn vị.\u003c/p\u003e\u003cp\u003e•\tHoàn thiện quy chế hoạt động và phân công nhiệm vụ phù hợp với từng giai đoạn phát triển.\u003c/p\u003e\u003cp\u003e4. Chính sách tiền lương\u003c/p\u003e\u003cp\u003e•\tNghiên cứu và đề xuất cơ chế tiền lương, thưởng và phúc lợi phù hợp với chiến lược phát triển của doanh nghiệp.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo hệ thống lương cạnh tranh, minh bạch và hiệu quả.\u003c/p\u003e\u003cp\u003e5. Hệ thống đánh giá hiệu quả công việc\u003c/p\u003e\u003cp\u003e•\tNghiên cứu và xây dựng hệ thống đánh giá hiệu quả công việc (KPIs).\u003c/p\u003e\u003cp\u003e•\tĐề xuất phương pháp đánh giá phù hợp với từng giai đoạn phát triển của doanh nghiệp\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:Tff7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. CHUYÊN VIÊN TUYỂN DỤNG (Recruitment Specialist)\u003c/p\u003e\u003cp\u003e1. Trình độ học vấn\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học các ngành:\u003c/p\u003e\u003cp\u003eo\tQuản trị nhân lực\u003c/p\u003e\u003cp\u003eo\tQuản trị kinh doanh\u003c/p\u003e\u003cp\u003eo\tKinh tế\u003c/p\u003e\u003cp\u003eo\tLuật\u003c/p\u003e\u003cp\u003eo\tHoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 02 năm kinh nghiệm trong lĩnh vực tuyển dụng nhân sự.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có kinh nghiệm tuyển dụng cho:\u003c/p\u003e\u003cp\u003eo\tDoanh nghiệp dược phẩm, sản xuất, hoặc phân phối\u003c/p\u003e\u003cp\u003eo\tDoanh nghiệp có quy mô trên 100 nhân sự.\u003c/p\u003e\u003cp\u003e3. Kiến thức chuyên môn\u003c/p\u003e\u003cp\u003e•\tHiểu biết về:\u003c/p\u003e\u003cp\u003eo\tQuy trình tuyển dụng và quản trị nguồn nhân lực.\u003c/p\u003e\u003cp\u003eo\tCác kênh tuyển dụng hiện đại (LinkedIn, Facebook, Vietnamworks, TopCV…).\u003c/p\u003e\u003cp\u003eo\tXây dựng thương hiệu tuyển dụng (Employer Branding).\u003c/p\u003e\u003cp\u003e•\tAm hiểu Luật Lao động và các quy định liên quan đến tuyển dụng là một lợi thế.\u003c/p\u003e\u003cp\u003e4. Kỹ năng\u003c/p\u003e\u003cp\u003e•\tKỹ năng tìm kiếm và đánh giá ứng viên.\u003c/p\u003e\u003cp\u003e•\tKỹ năng phỏng vấn và sàng lọc hồ sơ.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp và thuyết phục ứng viên.\u003c/p\u003e\u003cp\u003e•\tKỹ năng viết nội dung tuyển dụng và truyền thông nhân sự.\u003c/p\u003e\u003cp\u003e•\tKỹ năng quản lý dữ liệu ứng viên và báo cáo tuyển dụng.\u003c/p\u003e\u003cp\u003e5. Năng lực cá nhân\u003c/p\u003e\u003cp\u003e•\tChủ động và có tinh thần trách nhiệm cao.\u003c/p\u003e\u003cp\u003e•\tKhả năng làm việc độc lập và làm việc nhóm.\u003c/p\u003e\u003cp\u003e•\tTư duy tổ chức và quản lý công việc tốt.\u003c/p\u003e\u003cp\u003e•\tTác phong chuyên nghiệp, thái độ tích cực.\u003c/p\u003e\u003cp\u003e6. Yêu cầu khác\u003c/p\u003e\u003cp\u003e•\tThành thạo Microsoft Office (Word, Excel, PowerPoint).\u003c/p\u003e\u003cp\u003e•\tCó khả năng sử dụng các nền tảng tuyển dụng trực tuyến và mạng xã hội.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có khả năng giao tiếp tiếng Anh.\u003c/p\u003e\u003cp\u003e2. CHUYÊN VIÊN TIỀN LƯƠNG \u0026 CHẾ ĐỘ CHÍNH SÁCH (Compensation \u0026 Benefits Specialist)\u003c/p\u003e\u003cp\u003e1. Trình độ học vấn\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học các ngành:\u003c/p\u003e\u003cp\u003eo\tQuản trị nhân lực\u003c/p\u003e\u003cp\u003eo\tKế toán – Tài chính\u003c/p\u003e\u003cp\u003eo\tLuật\u003c/p\u003e\u003cp\u003eo\tQuản trị kinh doanh\u003c/p\u003e\u003cp\u003eo\tHoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 02–03 năm kinh nghiệm trong lĩnh vực:\u003c/p\u003e\u003cp\u003eo\tTiền lương và phúc lợi (C\u0026B)\u003c/p\u003e\u003cp\u003eo\tQuản lý lao động và chính sách nhân sự.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên từng làm việc tại:\u003c/p\u003e\u003cp\u003eo\tDoanh nghiệp sản xuất, dược phẩm hoặc doanh nghiệp quy mô lớn.\u003c/p\u003e\u003cp\u003e3. Kiến thức chuyên môn\u003c/p\u003e\u003cp\u003e•\tAm hiểu các quy định pháp luật liên quan đến:\u003c/p\u003e\u003cp\u003eo\tLuật Lao động\u003c/p\u003e\u003cp\u003eo\tBảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp\u003c/p\u003e\u003cp\u003eo\tChính sách tiền lương và thuế thu nhập cá nhân.\u003c/p\u003e\u003cp\u003e•\tCó kiến thức về:\u003c/p\u003e\u003cp\u003eo\tHệ thống quản trị tiền lương (Salary Structure)\u003c/p\u003e\u003cp\u003eo\tHệ thống KPIs và đánh giá hiệu quả công việc.\u003c/p\u003e\u003cp\u003e4. Kỹ năng\u003c/p\u003e\u003cp\u003e•\tKỹ năng phân tích dữ liệu nhân sự và tiền lương.\u003c/p\u003e\u003cp\u003e•\tKỹ năng xây dựng và quản lý hệ thống l
