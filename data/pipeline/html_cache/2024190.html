ault\"]\n23:Tbda,"])</script><script>self.__next_f.push([1,"\u003cp\u003eMô tả công việc:\u003c/p\u003e\u003cp\u003e1. Phụ trách kinh doanh các hệ thống bàn thử nghiệm cụm truyền động điện ô tô tại thị trường Việt Nam (bao gồm bàn thử nghiệm động cơ đơn, hai động cơ, ba động cơ, hệ thống NVH bán tiêu âm, hệ thống thử nghiệm EMC trục đơn và trục kép), cũng như các thiết bị thử nghiệm và thiết bị tự động hóa sản xuất được thiết kế theo yêu cầu cho xe hoàn chỉnh và linh kiện ô tô, hướng tới các nhà sản xuất ô tô trong nước như VinFast.\u003c/p\u003e\u003cp\u003e2. Kinh doanh các dịch vụ thử nghiệm cho xe năng lượng mới, xe hoàn chỉnh, hệ thống truyền động và các linh kiện ô tô.\u003c/p\u003e\u003cp\u003e3. Chịu trách nhiệm về doanh số sản phẩm và dịch vụ đối với khách hàng địa phương tại Việt Nam.\u003c/p\u003e\u003cp\u003e4. Lập kế hoạch và triển khai các hoạt động kinh doanh trong khu vực phụ trách nhằm đạt được mục tiêu doanh số.\u003c/p\u003e\u003cp\u003e5. Phát triển thị trường mới, tìm kiếm khách hàng mới và mở rộng phạm vi kinh doanh sản phẩm.\u003c/p\u003e\u003cp\u003e6. Duy trì và tăng cường mối quan hệ với các khách hàng hiện tại.\u003c/p\u003e\u003cp\u003e7. Thu thập thông tin thị trường và xu hướng ngành.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e岗位职责：\u003c/p\u003e\u003cp\u003e1.针对越南当地整车厂（例如VINFAST），销售电驱动总成测试台架（单电机/两电机/三电机/NVH半消音/EMC单轴及双轴测试台等）和汽车整车和零部件产品的定制的测试设备，自动化生产设备等\u003c/p\u003e\u003cp\u003e2.销售新能源汽车整车及动力传动系统及零部件等测试服务；\u003c/p\u003e\u003cp\u003e3.负责越南当地客户产品的销售任务；\u003c/p\u003e\u003cp\u003e4.负责销售区域内销售活动的策划和执行，完成销售目标；\u003c/p\u003e\u003cp\u003e5.开拓新市场，发展新客户，增加产品销售范围；\u003c/p\u003e\u003cp\u003e6.维护及增进已有客户关系；\u003c/p\u003e\u003cp\u003e7.负责收集市场及行业信息。\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eJob Responsibilities:\u003c/p\u003e\u003cp\u003e1.Responsible for sales of automotive electric drive system test benches in the Vietnam market (including single-motor, dual-motor, triple-motor test benches, NVH semi-
