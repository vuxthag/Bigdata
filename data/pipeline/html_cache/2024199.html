44174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1c0b,"])</script><script>self.__next_f.push([1,"\u003cp\u003eCông ty Cổ phần Đầu tư và Xây dựng SGC - tổng thầu nhiều công trình đường sắt tốc độ cao, hạ tầng, thuộc Vingroup, tuyển dụng: kỹ sư trưởng TBM - Thu nhập cạnh tranh- thỏa thuận trực tiếp\u003c/p\u003e\u003cp\u003eKỹ sư trưởng Hầm TBM chịu trách nhiệm lập kế hoạch kỹ thuật, giám sát và điều phối các công tác thi công hầm nhằm đảm bảo an toàn, chất lượng và hiệu quả thi công theo đúng yêu cầu của dự án, hồ sơ thiết kế, biện pháp thi công đã được phê duyệt và các quy định pháp lý hiện hành. Vị trí này đóng vai trò lãnh đạo kỹ thuật, hỗ trợ Ban Chỉ huy công trường đạt được các mục tiêu về tiến độ và chất lượng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ và Trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch và giám sát các hoạt động thi công hầm từ góc độ kỹ thuật, an toàn, chất lượng và năng suất, bao gồm toàn bộ các công tác kỹ thuật hầm.\u003c/p\u003e\u003cp\u003e•\tThực hiện giám sát kỹ thuật cấp cao đối với công tác đào hầm bằng TBM, bao gồm lựa chọn loại vỏ hầm, lựa chọn vị trí key, và kiểm soát tim – cao độ – hướng tuyến và lắp vỏ hầm.\u003c/p\u003e\u003cp\u003e•\tXem xét, thiết lập và tối ưu các thông số vận hành TBM phù hợp với điều kiện địa chất và hiệu suất đào thực tế.\u003c/p\u003e\u003cp\u003e•\tPhân tích và đánh giá dữ liệu địa chất – địa kỹ thuật nhằm dự báo rủi ro và lập kế hoạch thi công trước, đảm bảo tiến độ đào hầm ổn định.\u003c/p\u003e\u003cp\u003e•\tTổ chức, lập kế hoạch và điều phối công tác can thiệp đầu cắt TBM (cutterhead intervention), đảm bảo an toàn, tuân thủ quy trình và giảm thiểu ảnh hưởng đến tiến độ.\u003c/p\u003e\u003cp\u003e•\tĐánh giá và lựa chọn cấu hình đầu cắt phù hợp dựa trên điều kiện địa chất, địa kỹ thuật và dữ liệu vận hành TBM.\u003c/p\u003e\u003cp\u003e•\tGiám sát chất lượng thi công hầm, bao gồm lắp đặt vỏ hầm, chất lượng segment, dung sai hình học, đảm bảo tuân thủ thiết kế và tiêu chuẩn kỹ thuật.\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm chính trong việc chuẩn bị, rà soát và trình nộp biện pháp thi công cho các hạng mục hầm trong giai đoạn thi công.\u003c/p\u003e\u003cp\u003e•\tPhối hợp và làm việc trực tiếp với Tư vấn thiết kế trong việc lập, rà soát và hoàn thiện bản vẽ thi công, đảm bảo phù hợp với điều kiện thi công thực tế và yêu cầu dự án.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo toàn bộ công tác thi công hầm tuân thủ quy trình dự án, quy chuẩn – tiêu chuẩn kỹ thuật, hệ thống quản lý chất lượng, an toàn và môi trường.\u003c/p\u003e\u003cp\u003e•\tNhận diện các rủi ro kỹ thuật, thi công và môi trường; đề xuất và triển khai các biện pháp giảm thiểu phù hợp.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ lập tiến độ, theo dõi và kiểm soát thi công nhằm đáp ứng các mốc tiến độ đã được phê duyệt.\u003c/p\u003e\u003cp\u003e•\tXem xét yêu cầu các nguồn lực cần thiết và hỗ trợ kế hoạch mua sắm phục vụ công tác thi công hầm\u003c/p\u003e\u003cp\u003e•\tChuẩn bị và xem xét các báo cáo hàng ngày, hàng tuần, nêu rõ các vấn đề kỹ thuật, các mối nguy cũng như đề ra các biện pháp khắc phục cần thiết \u003c/p\u003e\u003cp\u003e•\tLập và rà soát báo cáo tiến độ ngày/tuần, báo cáo các vấn đề kỹ thuật cho Giám đốc hầm.\u003c/p\u003e\u003cp\u003e•\tPhối hợp làm việc với Chủ đầu tư, Tư vấn, Cơ quan chức năng và Nhà thầu phụ về các vấn đề kỹ thuật, phê duyệt và điều phối thi công.\u003c/p\u003e\u003cp\u003e•\tTham gia lập Phân tích An toàn Công việc (JSA) và thúc đẩy văn hóa an toàn – chất lượng trong toàn bộ đội ngũ thi công hầm.\u003c/p\u003e\u003cp\u003e-------------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Description: Chief TBM Engineer\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRole Overview\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Chief TBM Engineer is responsible for providing technical leadership, planning, and engineering supervision for tunnelling works to ensure safe, efficient, and high quality construction in compliance with project specifications, approved methodologies, and regulatory requirements. The role supports project management and site teams throughout the construction phase.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPlan and oversee tunnelling operations from engineering, safety, quality, and productivity perspectives, covering all tunnel engineering works.\u003c/p\u003e\u003cp\u003e•\tProvide senior engineering supervision for bored tunnelling and TBM operations, including final ring selection, key selection, alignment control, and segment installation quality.\u003c/p\u003e\u003cp\u003e•\tReview, set, and optimize TBM operating parameters based on ground conditions, geotechnical data, and machine performance.\u003c/p\u003e\u003cp\u003e•\tReview and interpret geological and geotechnical data to anticipate risks and plan tunnelling works ahead to ensure smooth and continuous progress.\u003c/p\u003e\u003cp\u003e•\tOrganize, plan, and supervise cutterhead interventions, ensuring all activities are carried out safely, in accordance with approved procedures, and with minimal impact on programme.\u003c/p\u003e\u003cp\u003e•\tEvaluate and select suitable cutterhead configurations in response to ground conditions and operational requirements.\u003c/p\u003e\u003cp\u003e•\tMonitor tunnel construction quality, including segment installation, lining geometry, tolerances, and workmanship, ensuring compliance with design and specifications.\u003c/p\u003e\u003cp\u003e•\tTake overall responsibility for the preparation, review, and submission of Method Statements for tunnelling and associated works.\u003c/p\u003e\u003cp\u003e•\tLiaise closely with the Designer during the construction phase to prepare, review, and finalize shop drawings, ensuring constructability and compliance with site conditions and design intent.\u003c/p\u003e\u003cp\u003e•\tEnsure all tunnelling works are executed in full compliance with project protocols, safety regulations, quality management systems, and environmental requirements.\u003c/p\u003e\u003cp\u003e•\tIdentify technical, construction, and environmental risks and implement appropriate mitigation measures.\u003c/p\u003e\u003cp\u003e•\tAssist in planning, scheduling, and monitoring construction progress against approved programmes.\u003c/p\u003e\u003cp\u003e•\tReview resource requirements and support procurement planning for tunnelling activities.\u003c/p\u003e\u003cp\u003e•\tPrepare and review daily and weekly progress reports, highlighting technical issues, risks, and corrective actions.\u003c/p\u003e\u003cp\u003e•\tReport engineering progress and site issues to the Tunnel Manager and participate in technical, coordination, and client meetings.\u003c/p\u003e\u003cp\u003e•\tLiaise with clients, consultants, authorities, and subcontractors on technical matters, approvals, and site coordination.\u003c/p\u003e\u003cp\u003e•\tPromote a strong safety and quality culture, including participation in Job Safety Analysis (JSA) and continuous improvement initiatives.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T63c,\u003cp\u003e\u003cstrong\u003eYêu cầu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học chuyên ngành Xây dựng Dân dụng, Công trình ngầm hoặc tương đương\u003c/p\u003e\u003cp\u003e•\tTối thiểu 7–10 năm kinh nghiệm trong lĩnh vực thi công hầm hoặc công trình ngầm\u003c/p\u003e\u003cp\u003e•\tAm hiểu sâu về vận hành TBM và các phương pháp thi công hầm\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm quản lý đội ngũ hiện trường và điều phối hoạt động thi công\u003c/p\u003e\u003cp\u003e•\tKỹ năng lãnh đạo, giao tiếp và giải quyết vấn đề tốt trong môi trường xây dựng\u003c/p\u003e\u003cp\u003e•\tNắm vững quy định an toàn lao động và hệ thống quản lý thi công\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm với TBM đường kính lớn là một lợi thế\u003c/p\u003e\u003cp\u003e•\tChủ động, độc lập và có tinh thần trách nhiệm cao\u003c/p\u003e\u003cp\u003e•\tTiếng Anh thành thạo (ưu tiên)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRequirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBachelor’s degree in Civil Engineering or a related discipline\u003c/p\u003e\u003cp\u003e•\t7–10+ years of experience in tunnelling or underground construction works\u003c/p\u003e\u003cp\u003e•\tStrong technical knowledge of TBM operations and tunnel construction methods\u003c/p\u003e\u003cp\u003e•\tProven experience in managing site teams and construction activities\u003c/p\u003e\u003cp\u003e•\tExcellent leadership, communication, and problem solving skills in construction environments\u003c/p\u003e\u003cp\u003e•\tGood understanding of safety regulations and construction management systems\u003c/p\u003e\u003cp\u003e•\tExperience in large diameter TBM projects is an advantage\u003c/p\u003e\u003cp\u003e•\tIndependent, self motivated, and able to work with minimal supervision\u003c/p\u003e27:T1c0b,"])</script><script>self.__next_f.push([1,"\u003cp\u003eCông ty Cổ phần Đầu tư và Xây dựng SGC - tổng thầu nhiều công trình đường sắt tốc độ cao, hạ tầng, thuộc Vingroup, tuyển dụng: kỹ sư trưởng TBM - Thu nhập cạnh tranh- thỏa thuận trực tiếp\u003c/p\u003e\u003cp\u003eKỹ sư trưởng Hầm TBM chịu trách nhiệm lập kế hoạch kỹ thuật, giám sát và điều phối các công tác thi công hầm nhằm đảm bảo an toàn, chất lượng và hiệu quả thi công theo đúng yêu cầu của dự án, hồ sơ thiết kế, biện pháp thi công đã được phê duyệt và các quy định pháp lý hiện hành. Vị trí này đóng vai trò lãnh đạo kỹ thuật, hỗ trợ Ban Chỉ huy công trường đạt được các mục tiêu về tiến độ và chất lượng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ và Trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch và giám sát các hoạt động thi công hầm từ góc độ kỹ thuật, an toàn, chất lượng và năng suất, bao gồm toàn bộ các công tác kỹ thuật hầm.\u003c/p\u003e\u003cp\u003e•\tThực hiện giám sát kỹ thuật cấp cao đối với công tác đào hầm bằng TBM, bao gồm lựa chọn loại vỏ hầm, lựa chọn vị trí key, và kiểm soát tim – cao độ – hướng tuyến và lắp vỏ hầm.\u003c/p\u003e\u003cp\u003e•\tXem xét, thiết lập và tối ưu các thông số vận hành TBM phù hợp với điều kiện địa chất và hiệu suất đào thực tế.\u003c/p\u003e\u003cp\u003e•\tPhân tích và đánh giá dữ liệu địa chất – địa kỹ thuật nhằm dự báo rủi ro và lập kế hoạch thi công trước, đảm bảo tiến độ đào hầm ổn định.\u003c/p\u003e\u003cp\u003e•\tTổ chức, lập kế hoạch và điều phối công tác can thiệp đầu cắt TBM (cutterhead intervention), đảm bảo an toàn, tuân thủ quy trình và giảm thiểu ảnh hưởng đến tiến độ.\u003c/p\u003e\u003cp\u003e•\tĐánh giá và lựa chọn cấu hình đầu cắt phù hợp dựa trên điều kiện địa chất, địa kỹ thuật và dữ liệu vận hành TBM.\u003c/p\u003e\u003cp\u003e•\tGiám sát chất lượng thi công hầm, bao gồm lắp đặt vỏ hầm, chất lượng segment, dung sai hình học, đảm bảo tuân thủ thiết kế và tiêu chuẩn kỹ thuật.\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm chính trong việc chuẩn bị, rà soát và trình nộp biện pháp thi công cho các hạng mục hầm trong giai đoạn thi công.\u003c/p\u003e\u003cp\u003e•\tPhối hợp và làm việc trực tiếp với Tư vấn thiết kế trong việc lập, rà soát và hoàn thiện bản vẽ thi công, đảm bảo phù hợp với điều kiện thi công thực tế và yêu cầu dự án.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo toàn bộ công tác thi công hầm tuân thủ quy trình dự án, quy chuẩn – tiêu chuẩn kỹ thuật, hệ thống quản lý chất lượng, an toàn và môi trường.\u003c/p\u003e\u003cp\u003e•\tNhận diện các rủi ro kỹ thuật, thi công và môi trường; đề xuất và triển khai các biện pháp giảm thiểu phù hợp.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ lập tiến độ, theo dõi và kiểm soát thi công nhằm đáp ứng các mốc tiến độ đã được phê duyệt.\u003c/p\u003e\u003cp\u003e•\tXem xét yêu cầu các nguồn lực cần thiết và hỗ trợ kế hoạch mua sắm phục vụ công tác thi công hầm\u003c/p\u003e\u003cp\u003e•\tChuẩn bị và xem xét các báo cáo hàng ngày, hàng tuần, nêu rõ các vấn đề kỹ thuật, các mối nguy cũng như đề ra các biện pháp khắc phục cần thiết \u003c/p\u003e\u003cp\u003e•\tLập và rà soát báo cáo tiến độ ngày/tuần, báo cáo các vấn đề kỹ thuật cho Giám đốc hầm.\u003c/p\u003e\u003cp\u003e•\tPhối hợp làm việc với Chủ đầu tư, Tư vấn, Cơ quan chức năng và Nhà thầu phụ về các vấn đề kỹ thuật, phê duyệt và điều phối thi công.\u003c/p\u003e\u003cp\u003e•\tTham gia lập Phân tích An toàn Công việc (JSA) và thúc đẩy văn hóa an toàn – chất lượng trong toàn bộ đội ngũ thi công hầm.\u003c/p\u003e\u003cp\u003e-------------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Description: Chief TBM Engineer\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRole Overview\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Chief TBM Engineer is responsible for providing technical leadership, planning, and engineering supervision for tunnelling works to ensure safe, efficient, and high quality construction in compliance with project specifi
