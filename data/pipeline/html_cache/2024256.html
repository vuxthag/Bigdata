d)\",\"companyId\":211593,\"companyProfile\":\"Công ty TNHH Thịnh Điền ( PROSLAND CO., LTD) chuyển đổi từ Công ty TNHH Bất động sản Việt Nam Thịnh Vượng. Là Công ty hoạt động trong lĩnh vực: Kinh doanh, tư vấn, quảng cáo dịch vụ bất động sản. Thiết kế và xây dựng công trình dân dụng, công trình khác như: nhà các loại, công trình đường sắt đường bộ, công trình công ích, phá dỡ, hoàn thiện công trình xây dựng,…. Buôn bán, cho thuê, lắp đặt, sửa chữa các hệ thống điện, nước, điều hòa không khí, ô tô. Hoạt động hỗ trợ dịch vụ tài chính….Công ty cung cấp 5 loại hình dịch vụ bao gồm: Quản lý ô tô, Quản lý tài sản bảo đảm, Quản lý tài sản và dịch vụ, Định giá tài sản bảo đảm, Xây dựng cơ bản\",\"companySizeId\":0,\"contactName\":\"Ms Quỳnh\",\"createdBy\":3867433,\"isOnline\":true,\"isActive\":true,\"isApproved\":true,\"isUnpaidDisable\":0,\"isCompleted\":true,\"isAnonymous\":false,\"isSalaryVisible\":false,\"isShowLogo\":true,\"isShowLogoInSearch\":false,\"jobDescription\":\"\u003cp\u003e\u003cstrong\u003eMô tả công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tiếp nhận, lập kế hoạch và thực hiện các yêu cầu khảo sát, thiết kế từ cấp quản lý trực tiếp\u003c/p\u003e\u003cp\u003e• Khảo sát thiết kế, Lập hồ sơ thiết kế thi công theo nhu cầu cải tạo của Chủ đầu tư (các công trình Chi nhánh, Phòng giao dịch của Ngân hàng, văn phòng làm việc khác của các bộ phận Ngân hàng)\u003c/p\u003e\u003cp\u003e• Khảo sát hiện trạng, tư vấn, định hướng cho khách hàng\u003c/p\u003e\u003cp\u003e• Thiết kế nội thất (2D, 3D) văn phòng, sửa chữa cải tạo các địa điểm CN/PGD VPBank;\u003c/p\u003e\u003cp\u003e• Dựng phối cảnh 3D nội ngoại thất công trình;\u003c/p\u003e\u003cp\u003e• Triển khai bản vẽ kĩ thuật các công trình;\u003c/p\u003e\u003cp\u003e• Trình duyệt chủ đầu tư phê duyệt hồ sơ thiết kế\u003c/p\u003e\u003cp\u003e• Chủ trì bảo vệ, giải trình với chủ đầu tư trong quá trình trình duyệt.\u003c/p\u003e\u003cp\u003e• Tư vấn cho chủ đầu tư quy định về các bộ tiêu chuẩn vật liệu, nhận diện hình ảnh và danh mục trang thiết bị tiêu chuẩn\u003c/p\u003e\",\"jobRequirement\":\"\u003cp\u003e• Trình độ chuyên môn: Tốt nghiệp ĐH chuyên ngành Kiến trúc, quy hoạch (Ưu tiên sinh viên trường Đại học kiến trúc, Đại học xây dựng; Ưu tiên ứng viên có chứng chỉ hành nghề thiết kế kiến trúc).\u003c/p\u003e\u003cp\u003e• Kinh nghiệm:\u003c/p\u003e\u003cp\u003e  + Có tối thiểu 2-3 năm kinh nghiệm trong lĩnh vực thiết kế kiến trúc công trình dân dụng hoặc thiết kế nội thất.\u003c/p\u003e\u003cp\u003e  + Ưu tiên ứng viên đã làm cho các Ngân hàng, các môi trường có tính chất tương tự: hệ thống, chuỗi văn phòng làm việc, core working space,...\u003c/p\u003e\u003cp\u003e• Kỹ năng:\u003c/p\u003e\u003cp\u003e  + Sử dụng thành thạo các Phần mềm phục vụ cho công việc như: AutoCAD, 3D max, Photoshop, Sketchup.\u003c/p\u003e\u003cp\u003e  + Có khả năng tư duy độc lập, tích cực, làm việc độc lập, quản lý tốt tiến độ công việc.\u003c/p\u003e\u003cp\u003e  + Kỹ năng giao tiếp, làm việc nhóm và phối hợp với nhiều bộ phận, nhà thầu.\u003c/p\u003e\u003cp\u003e  + Kỹ năng xử lý sự cố kỹ thuật và hỗ trợ thi công.\u003c/p\u003e\u003cp\u003e• Yêu cầu khác: Chịu được áp lực cao. Sẵn sàng đi công tác hoặc hỗ trợ kỹ thuật tại công trình khi cần.\u003c/p\u003e\",\"jobLevelId\":5,\"languageSelectedId\":3,\"redirectTo\":\"\",\"requiredCoverLetter\":0,\"salary\":0,\"salaryMax\":0,\"salaryMin\":0,\"typeWorkingId\":1,\"skills\":[{\"skillName\":\"AutoCAD\",\"skillId\":75389,\"skillWeight\":100,\"isExisted\":false},{\"skillName\":\"3D Max\",\"skillId\":704749,\"skillWeight\":100,\"isExisted\":false},{\"skillName\":\"Thiết Kế Kiến Trúc\",\"skillId\":1938,\"skillWeight\":100,\"isExisted\":false},{\"skillName\":\"Tư Vấn Thiết Kế\",\"skillId\":2871,\"skillWeight\":100,\"isExisted\":false},{\"skillName\":\"Xử Lý Sự Cố\",\"skillId\":1407,\"skillWeight\":100,\"isExisted\":false}],\"benefits\":[{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"bene
