p exporters of green coffee in Vietnam. We work closely with a vast network of farmers, reinforcing our commitment to sustainable sourcing and long-term partnerships.\r\n\r\nWith over 4,500 employees, ofi Vietnam focuses on performance through employee engagement, a diverse and inclusive culture,"])</script><script>self.__next_f.push([1," and talent development. Our new strategy - 'Choices for Change' - aims for long-term impact by 2030 across four pillars: Prosperous Farmers, Thriving Communities, Climate Action, and Regenerating the Living World. Through these initiatives, ofi Vietnam is dedicated to driving positive change in Vietnam's agricultural landscape by investing in people and sustainability.24:T1f88,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eofi\u003c/strong\u003e (olam food ingredients), part of the Olam Group, offers sustainable, natural food products and ingredients, including cocoa, coffee, dairy, nuts, and spices. Operating in Vietnam since 1997, \u003cstrong\u003eofi \u003c/strong\u003ehas built a strong presence with its head office in Ho Chi Minh City, along with regional offices and seven major factories across various provinces. As the largest exporter of cashews, pepper, and instant coffee, and among the top exporters of green coffee, ofi Vietnam works closely with a vast network of farmers. With over 4,500 employees, the company is committed to performance, diversity, and talent development. Its \u003cem\u003e‘Choices for Change’\u003c/em\u003e strategy targets long-term impact by 2030, focusing on prosperous farmers, thriving communities, climate action, and sustainability.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOVERVIEW\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAt \u003cstrong\u003eofi \u003c/strong\u003eVietnam, we believe that diverse minds spark innovation and inclusive teams drive success. This is your chance to learn, grow, and make an impact in a global organization that values your voice.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eAre you a passionate, driven student looking to kickstart your career and make a real difference? Our Internship Program offers dynamic, hands-on experience designed to challenge you, inspire you, and help you grow both personally and professionally. You'll work alongside industry experts, contribute to real-impact projects, and gain insights that will shape your future.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAVAILABLE SLOTS \u0026 DETAILED DESCRIPTIONS\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eI. Finance \u0026 Accounting Functions:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1) Finance Data Automation Intern\u003c/em\u003e\u003c/strong\u003e\u003cem\u003e – Bien Hoa 2, Dong Nai\u003c/em\u003e\u003c/p\u003e\u003cp\u003e- Automatically collect, clean, and standardize financial data from multiple sources to create consistent datasets for analysis and reporting.\u003c/p\u003e\u003cp\u003e- Build structured financial data models and automate recurring reports and dashboards to enhance accuracy, efficiency, and decision‑making\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e- Requirements\u003c/em\u003e\u003c/strong\u003e: Background in Finance, Banking or related fields; Good English; good data-related skillset\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2) Finance Intern (Sales Support)\u003c/em\u003e\u003c/strong\u003e\u003cem\u003e – Long Thanh, Dong Nai\u003c/em\u003e\u003c/p\u003e\u003cp\u003e- Collaborate with the sales team to verify sales orders, reconcile SO/PO data with SAP, and support weekly/monthly business reviews by validating shipment and sales performance.\u003c/p\u003e\u003cp\u003e- Maintain accurate stock and inventory reports with high attention to detail, while gaining exposure to c
