 với hãng tàu, công ty logistics và các bên liên quan;\u003c/p\u003e\u003cp\u003e与船公司、货运代理及相关方进行沟通协调\u003c/p\u003e\u003cp\u003e- Theo dõi tiến độ đơn hàng, lịch tàu và kế hoạch giao hàng;\u003c/p\u003e\u003cp\u003e跟进订单进度、船期及货物交付安排\u003c/p\u003e\u003cp\u003e- Phối hợp với các bộ phận (mua hàng, tài chính, kho…) để đảm bảo tiến độ công việc\u003c/p\u003e\u003cp\u003e与各部门（采购、财务、仓库等）协调配合，确保工作进度\u003c/p\u003e\u003cp\u003e- Thực hiện gửi chứng từ cho bên giao nhận\u003c/p\u003e\u003cp\u003e将文件发送给货运代理\u003c/p\u003e\u003cp\u003e- Xử lý các vấn đề phát sinh đến chứng từ\u003c/p\u003e\u003cp\u003e处理文档中出现的问题\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Hoàn thành chứng từ thanh toán cho khách hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e为客户提供完整的付款文件\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Nhận lịch xuất hàng từ BP Sản xuất.\u003c/p\u003e\u003cp\u003e接收生产部的交货表\u003c/p\u003e\u003cp\u003e- Làm đề xuất, bố trí xe để giao hàng.\u003c/p\u003e\u003cp\u003e提出建议、安排车辆交货\u003c/p\u003e\u003cp\u003e- Chuẩn bị chứng từ: Inv+PL, Biên bản giao hàng\u003c/p\u003e\u003cp\u003e准备文件：Ivn+PL, 交货记录\u003c/p\u003e\u003cp\u003e- Gửi chứng từ cho FW để lên tờ khai Hải quan\u003c/p\u003e\u003cp\u003e发送文件至FW进行报关\u003c/p\u003e\u003cp\u003e- Nếu tờ khai rơi vào luồng đỏ: Chuẩn bị hàng và chứng từ đem đi kiểm hóa\u003c/p\u003e\u003cp\u003e如果报关属于红流：准备货物和文件以供查验\u003c/p\u003e\u003cp\u003e- Sau khi nhận được Tờ khai thông quan của FW, Gửi chứng từ cho khách hàng. Một bộ chứng từ đầy đủ bao gồm: PO xác nhận, Inv+Pl, Hóa đơn VAT, BB giao hàng.\u003c/p\u003e\u003cp\u003e收到FW的清关申报后，将文件发送给客户。 全套单据包括：PO确认书、Inv+PL、增值税发票、交货BB。\u003c/p\u003e\u003cp\u003e- Hỗ trợ kiểm tra tiến độ thanh toán công nợ khi được yêu cầu\u003c/p\u003e\u003cp\u003e根据要求援助检查支付进度。\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eLưu hồ sơ\u003c/p\u003e\u003cp\u003e保管档案\u003c/p\u003e\u003cp\u003eTheo quy định của công t
