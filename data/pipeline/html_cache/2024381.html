nks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tf70,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eABOUT US\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eInavate Group is a leading Audio Visual system integrator in Vietnam, delivering advanced technology solutions including display systems, digital signage, smart meeting rooms, video conferencing, audio systems, and integrated control systems.\u003c/p\u003e\u003cp\u003eWe have successfully delivered projects for multinational corporations across finance, technology, hospitality, education, and global enterprises.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJoining us, you will:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tWork in an international environment with foreign leadership \u003c/p\u003e\u003cp\u003e•\tParticipate in high-tech projects with major clients \u003c/p\u003e\u003cp\u003e•\tDevelop expertise in finance and business management within the tech industry \u003c/p\u003e\u003cp\u003e•\tEnhance financial leadership and management skills \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJOB DESCRIPTION\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tManage and oversee all accounting and financial operations \u003c/p\u003e\u003cp\u003e•\tReview and control accounting documents and invoices \u003c/p\u003e\u003cp\u003e•\tRecord accounting transactions using MISA software \u003c/p\u003e\u003cp\u003e•\tMonitor accounts receivable and payable \u003c/p\u003e\u003cp\u003e•\tControl costs and ensure compliance with financial regulations \u003c/p\u003e\u003cp\u003e•\tPrepare and submit periodic tax reports (VAT, CIT, PIT) \u003c/p\u003e\u003cp\u003e•\tPrepare financial statements and management reports \u003c/p\u003e\u003cp\u003e•\tEnsure timely tax decla
