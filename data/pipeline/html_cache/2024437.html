     Turnover\t~49 M USD (2022 forecast)24:T10f3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMỤC ĐÍCH CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm quản lý phòng y tế tại nhà máy, cung cấp dịch vụ chăm sóc sức khỏe chuyên nghiệp, quản lý các chương trình sức khỏe nghề nghiệp và đảm bảo tuân thủ đầy đủ các quy định pháp luật cũng như tiêu chuẩn trách nhiệm xã hội.\u003c/p\u003e\u003cp\u003eVị trí này tập trung vào việc đưa ra quyết định chuyên môn y khoa, giám sát đội ngũ y tá và quản lý chiến lược sức khỏe nhằm giảm thiểu rủi ro sức khỏe tại nơi làm việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Lãnh đạo chuyên môn y tế \u0026 xử lý tình huống khẩn cấp\u003c/p\u003e\u003cp\u003e- Thực hiện chẩn đoán và điều trị y tế cho các trường hợp chấn thương hoặc bệnh nghề nghiệp.\u003c/p\u003e\u003cp\u003e- Điều phối và hướng dẫn đội ngũ y tá trong việc xử lý các tình huống khẩn cấp và vận hành phòng y tế hàng ngày.\u003c/p\u003e\u003cp\u003e- Quyết định việc chuyển bệnh nhân khẩn cấp đến bệnh viện và quản lý mối quan hệ với các cơ sở y tế bên ngoài.\u003c/p\u003e\u003cp\u003e2. Quản lý sức khỏe nghề nghiệp\u003c/p\u003e\u003cp\u003e- Chủ trì tổ chức khám sức khỏe định kỳ hàng năm và các chương trình tầm soát bệnh nghề nghiệp theo quy định pháp luật.\u003c/p\u003e\u003cp\u003e- Phân tích dữ liệu sức khỏe để xác định xu hướng bệnh nghề nghiệp và đề xuất các biện pháp phòng ngừa.\u003c/p\u003e\u003cp\u003e- Xây dựng và cập nhật các quy trình xử lý y tế và tai nạn lao động.\u003c/p\u003e\u003cp\u003e3. Quản lý thuốc và vật tư y tế\u003c/p\u003e\u003cp\u003e- Giám sát việc quản lý thuốc tại phòng y tế, đảm bảo cấp phát thuốc đúng quy định và tuân thủ quy định pháp luật.\u003c/p\u003e\u003cp\u003e- Theo dõi hạn sử dụng và lập dự báo hàng tháng hoặc đề xuất mua sắm vật tư y tế.\u003c/p\u003e\u003cp\u003e- Đảm bảo các thiết bị y tế và tủ thuốc sơ cứu luôn trong tình trạng hoạt động tốt và đáp ứng yêu cầu pháp lý.\u003c/p\u003e\u003cp\u003e4. Hồ sơ \u0026 chuẩn bị đánh giá (Audit)\u003c/p\u003e\u003cp\u003e- Đảm bảo hồ sơ y tế đáp ứng yêu cầu pháp luật, khắc hàng và các đợt đánh giá của bên thứ ba (ISO, Social Compliance).\u003c/p\u003e\u003cp\u003e- Duy trì và cập nhật các báo cáo y tế nội bộ.\u003c/p\u003e\u003cp\u003e- Hỗ trợ tài liệu HSE liên quan đến đánh giá rủi ro sức khỏe và báo cáo vệ sinh.\u003c/p\u003e\u003cp\u003e- Chuẩn bị và nộp các báo cáo y tế theo quy định cho cơ quan nhà nước (ví dụ: sức khỏe nghề nghiệp, tai nạn lao động).\u003c/p\u003e\u003cp\u003e5. Truyền thông \u0026 đào tạo sức khỏe\u003c/p\u003e\u003cp\u003e- Triển khai các chương trình nâng cao nhận thức về sức khỏe tại nơi làm việc và phòng ngừa dịch bệnh.\u003c/p\u003e\u003cp\u003e- Đào tạo chuyên môn cho đội sơ cứu và cán bộ an toàn.\u003c/p\u003e\u003cp\u003e6. Giám sát an toàn thực phẩm \u0026 vệ sinh\u003c/p\u003e\u003cp\u003e- Giám sát việc lưu mẫu thực phẩm hàng ngày để đảm bảo tuân thủ các quy định về an toàn vệ sinh thực phẩm.\u003c/p\u003e\u003cp\u003e- Thực hiện kiểm tra định kỳ khu vực nhà ăn và phối hợp với nhà cung cấp dịch vụ để đảm bảo tiêu chuẩn an toàn thực phẩm.\u003c/p\u003e\u003cp\u003e7. Hỗ trợ hành chính HSE\u003c/p\u003e\u003cp\u003e- Chuẩn bị đề nghị mua thuốc và thiết bị y tế theo đúng quy định của phòng Tài chính và Mua sắm.\u003c/p\u003e\u003cp\u003e- Theo dõi và quản lý ngân sách y tế; đảm bảo chi phí phù hợp với kế hoạch đã được phê duyệt và tối ưu hiệu quả chi phí.\u003c/p\u003e\u003cp\u003e8. Cải tiến liên tục\u003c/p\u003e\u003cp\u003e- Chủ động đề xuất các giải pháp cải thiện chất lượng chăm sóc y tế tại nhà máy, khả năng sẵn sàng sơ cứu và hỗ trợ sức khỏe nhân viên.\u003c/p\u003e\u003cp\u003e- Tham gia các chiến dịch nâng cao sức khỏe, kiểm tra vệ sinh hoặc chương trình phúc lợi nhằm nâng cao nhận thức và cải thiện môi trường làm việc.\u003c/p\u003e\u003cp\u003e- Phân tích dữ liệu sức khỏe để đề xuất giải pháp d
