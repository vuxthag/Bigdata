cript>self.__next_f.push([1,"Chào mừng đến với Davipharm - nơi bạn đặt niềm tin \r\n\r\nNhà sản xuất trong nước với các tiêu chuẩn châu Âu\r\nChúng tôi là một trong những nhà sản xuất thuốc Generic chất lượng cao hàng đầu trong nước. Davipharm thành lập vào năm 2004, được cấp giấy chứng nhận WHO-GMP vào năm 2006. Trong năm 2014, Davipharm có 100 sản phẩm đăng ký đầu tiên và bắt đầu xuất khẩu thuốc sang Philippines và Campuchia. Vào năm 2016, Davipharm nằm trong top 5 các công ty dược phẩm trong nước. Năm 2017, Adamed Pharma S.A. trở thành cổ đông chính của Davipharm và tiến hành nâng cấp tiêu chuẩn sản xuất, thực hiện chuyển giao công nghệ và phát triển xuất khẩu. Năm 2021, chúng tôi sở hữu dây chuyền sản xuất thuốc hoạt tính cao (HP Zone) đầu tiên tại Việt Nam. Cũng trong cùng năm này, Davipharm đã được chứng nhận tiêu chuẩn EU-GMP. Chứng nhận này dành cho các hoạt động vận hành nhà máy (sản xuất và đóng gói) của các sản phẩm không vô trùng dưới dạng viên nén, viên nang cứng, viên nén bao phim. Và hiện tại từ năm 2022, chúng tôi tập trung vào việc chuyển giao công nghệ sản phẩm với mục tiêu chính là đạt được chứng nhận Tiêu chuẩn Châu Âu (EU-GMP) cho khu sản xuất thuốc hoạt tính cao HP Zone trước năm 2025 cũng như cho dây chuyền sản xuất khác: viên nang mềm, gói uống hỗn dịch và dạng kem bôi. Mục tiêu chiến lược của chúng tôi là củng cố vị thế của mình trên thị trường nội địa, tập trung về Nghiên cứu \u0026 Phát triển, ra mắt sản phẩm mới, sản xuất gia công và hình thành trung tâm xuất khẩu Đông Nam Á.\r\n\r\nBiểu tượng của đầu tư quốc tế\r\nVào năm 2017, tập đoàn dược phẩm Adamed đã thực hiện thương vụ đầu tư trực tiếp có giá trị lớn nhất của Ba Lan vào Việt Nam với 70% cổ phần tại Davipharm, và đó cũng là những mục tiêu tham vọng. Với 60 triệu USD đầu tư, trong đó hơn 10 triệu USD đã được dành cho việc cải tiến nhà máy sản xuất tại Bình Dương và cải thiện chất lượng quy trình sản xuất. Chúng tôi dành sự cam kết đóng góp cho nền kinh tế địa phương không chỉ qua việc nộp thuế và tạo việc làm, hơn thế nữa là cung cấp những sản phẩm chất lượng với giá cả hợp lý cho bệnh nhân, và xa hơn là hỗ trợ Bộ Y tế Việt Nam tối ưu hóa việc chi trả cho thuốc.\r\n\r\nKhu sản xuất thuốc hoạt tính cao (HP Zone) và tiêu chuẩn EU-GMP\r\nVào ngày 16 tháng 4 năm 2021, Davipharm đã công bố chứng nhận Dây chuyền sản xuất thuốc hoạt tính cao dạng rắn đầu tiên tại Việt Nam để sản xuất thuốc có tác dụng gây độc tế bào/ kìm tế bào. Đây là những loại thuốc điều trị ung thư ở dạng viên nang cứng, viên nén và viên nén bao phim. Danh mục của Davipharm bao gồm 28 loại thuốc hoạt tính cao (HP), bao gồm các thuốc điều trị ung thư vú, bệnh bạch cầu, tuyến tụy, đại trực tràng, dạ dày, cổ tử cung, tuyến tiền liệt, ung thư phổi và u nguyên bào thần kinh đệm.\r\nChúng tôi có năng lực sản xuất nhiều cỡ lô từ 15kg đến 100kg với sản lượng hàng năm là 500 triệu đơn vị thuốc hoạt tính cao (HP), trong tổng công suất của nhà máy là 1,2 tỷ đơn vị một năm. Vào tháng 8/2021, dù phải đối mặt với dịch bệnh, Davipharm đã cố gắng quản lý sản xuất, xuất sắc thông qua quy trình kiểm duyệt EU-GMP và trở thành một trong số ít những công ty dược tại Việt Nam có chứng nhận EU-GMP."])</script><script>self.__next_f.push([1,"24:T6f0,\u003cp\u003eWe are looking for an experienced manager to oversee production operations at a pharmaceutical manufacturing site operating in compliance with EU GMP standards.\u003c/p\u003e\u003cp\u003eIf you have strong operational competencies, know how to build high-performing teams, and want to genuinely influence production efficiency — this role is for you.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eScope of Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Production Management:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPlanning and supervising the execution of the production schedule\u003c/p\u003e\u003cp\u003e•\tEnsuring operations comply with EU GMP, WHO GMP, and MOH Vie d exporting its medicines to the Philippines and Cambodia. In 2017 Adamed Pharma S.A. acquired the controlling stake in Davipharm to upgrade the production standards, execute technology transfers, and develop export. In 2021 we opened the first certified HP Zone in Vietnam. Later that same year Davipharm had been certified with its first EU-GMP for the manufacturing operations (production and packing) of non-sterile products in capsules, hard shells and tablets. Since 2022 we have been focusing on the technology transfers. In 2023, Adamed acquired the remaining shares in Davipharm, becoming its sole shareholder. This acquisition infused Davipharm with a new vision centered on producing high-quality products adhering to EU-GMP standards and allowing the international expansion.\r\n\r\nThe integration with the Adamed Group plays a pivotal role in the company transformation. The harmonization of operational processes, sharing resources, learning from the best practices and following the corporate values, supports our efforts on the way to business excellence.\r\n\r\nOur strategic goals include reaching a top position in the domestic market and becoming number 1 pharmaceutical exporting company in Vietnam, focusing on R\u0026D excellence and new products launches, contract manufacturing, and close cooperation with academia to support products development and expand talent pools. Implementing ESG standards will ensure Davipharm’s position as a reliable and desired partner in the global supply chain.\r\n\r\nEmblematic of the foreign investment\r\nWhen in 2017 Adamed Pharma S.A. acquired 70% of shares in Davipharm, becoming the biggest direct Polish investor in Vietnam, it set very ambitious goals. With US$60 million investment to date, out of which over US$10 million has been spent on the upgrade of manufacturing processes and products quality, the company committed to contribute to the local economy not only by paying taxes and creating jobs, but also by providing high-quality medicines at affordable prices to local patients, thus supporting the Ministry of Health of Vietnam to optimize the spending on drugs.\r\n\r\nHP Zone and EU-GMP\r\nDavipharm’s High Potency Drugs (HP) Zone for production of cytotoxic/cytostatic oral solids was the first certified by DAV area in Vietnam for manufacturing, among other, oncology drugs in hard shell capsules, tablets, and coated tablets.\r\n\r\nDavipharm’s portfolio includes 28 HP drugs, including medicines to treat breast cancer, leukemia, pancreas, colorectal, stomach, cervix, prostate and lung cancer and glioblastoma.\r\n\r\nIn 2024, Davipharm got certified with EU-GMP for its HP Zone. This is the first HP Zone EU-GMP certification in Vietnam and in the region. This milestone highlights Davipharm’s pioneering role in the Vietnamese pharmaceutical industry and its unwavering commitment to maintaining the highest production standards.\r\n\r\nAdditionally, the company was re-certified with EU-GMP for non-sterile products such as hard capsules and tablets."])</script><script>self.__next_f.push([1,"29:Tfc2,"])</script><script>self.__next_f.push([1,"Chào mừng đến với Davipharm - nơi bạn đặt niềm tin \r\n\r\nNhà sản xuất trong nước với các tiêu chuẩn châu Âu\r\nChúng tôi là một trong những nhà sản xuất thuốc Generic chất lượng cao hàng đầu trong nước. Davipharm thành lập vào năm 2004, được cấp giấy chứng nhận WHO-GMP vào năm 2006. Trong năm 2014, Davipharm có 100 sản phẩm đăng ký đầu tiên và bắt đầu xuất khẩu thuốc sang Philippines và Campuchia. Vào năm 2016, Davipharm nằm trong top 5 các công ty dược phẩm trong nước. Năm 2017, Adamed Pharma S.A. trở thành cổ đông chính của Davipharm và tiến hành nâng cấp tiêu chuẩn sản xuất, thực hiện chuyển giao công nghệ và phát triển xuất khẩu. Năm 2021, chúng tôi sở hữu dây chuyền sản xuất thuốc hoạt tính cao (HP Zone) đầu tiên tại Việt Nam. Cũng trong cùng năm này, Davipharm đã được chứng nhận tiêu chuẩn EU-GMP. Chứng nhận này dành cho các hoạt động vận hành nhà oducts adhering to EU-GMP standards and allowing the international expansion.\r\n\r\nThe integration with the Adamed Group plays a pivotal role in the company transformation. The harmonization of operational processes, sharing resources, learning from the best practices and following the corporate values, supports our efforts on the way to business excellence.\r\n\r\nOur strategic goals include reaching a top position in the domestic market and becoming number 1 pharmaceutical exporting company in Vietnam, focusing on R\u0026D excellence and new products launches, contract manufacturing, and close cooperation with academia to support products development and expand talent pools. Implementing ESG standards will ensure Davipharm’s position as a reliable and desired partner in the global supply chain.\r\n\r\nEmblematic of the foreign investment\r\nWhen in 2017 Adamed Pharma S.A. acquired 70% of shares in Davipharm, becoming the biggest direct Polish investor in Vietnam, it set very ambitious goals. With US$60 million investment to date, out of which over US$10 million has been spent on the upgrade of manufacturing processes and products quality, the company committed to contribute to the local economy not only by paying taxes and creating jobs, but also by providing high-quality medicines at affordable prices to local patients, thus supporting the Ministry of Health of Vietnam to optimize the spending on drugs.\r\n\r\nHP Zone and EU-GMP\r\nDavipharm’s High Potency Drugs (HP) Zone for production of cytotoxic/cytostatic oral solids was the first certified by DAV area in Vietnam for manufacturing, among other, oncology drugs in hard shell capsules, tablets, and coated tablets.\r\n\r\nDavipharm’s portfolio includes 28 HP drugs, including medicines to treat breast cancer, leukemia, pancreas, colorectal, stomach, cervix, prostate and lung cancer and glioblastoma.\r\n\r\nIn 2024, Davipharm got certified with EU-GMP for its HP Zone. This is the first HP Zone EU-GMP certification in Vietnam and in the region. This milestone highlights Davipharm’s pioneering role in the Vietnamese pharmaceutical industry and its unwavering commitment to maintaining the highest production standards.\r\n\r\nAdditionally, the company was re-certified with EU-GMP for non-sterile products such as hard capsules and tablets."])</script><script>self.__next_f.push([1,"41:{\"companyId\":173428,\"jobImageURLs\":\"$42\",\"jobVideoURLs\":\"$43\",\"companyName\":\"CÔNG TY CỔ PHẦN DƯỢC PHẨM ĐẠT VI PHÚ (DAVIPHARM)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/d0/11210915.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"D17, My Phuoc I Industrial Park, Thoi Hoa Ward, Ho Chi Minh City\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"https://images02.vietnamworks.com/companyprofile/cong-ty-co-phan-duoc-pham-dat-vi-phu/en/Anh_bia_1920_x_510_2_1_.jpg?v=1762937427\",\"companyProfileUrl\":\"https://www.vietnamworks.com/company/cong-ty-co-phan-duoc-pham-dat-vi-phu\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":1,\"bannerDesktopUri\":\"https://images.vietnamworks.com/pictureofcompany/be/company-info-cover-picture-url-173428-1762938899.png\"}\n46:{\"serviceCode\":\"TPM\",\"startOn\":\"2026-03-17T13:36:02+07:00\",\"expiredOn\":\"2026-04-16T23:59:59+07:00\"}\n47:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-03-17T13:36:02+07:00\",\"expiredOn\":\"2026-04-16T23:59:59+07:00\"}\n45:[\"$46\",\"$47\"]\n48:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"28:{\"jobId\":2024821,\"jobTitle\":\"Quản Lý Sản Xuất (Nhà Máy Dược Phẩm) / Production Manager (Pharmaceutical Manufacturing)\",\"userId\":3304952,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/d0/11210915.png\",\"alias\":\"quan-ly-san-xuat-nha-may-duoc-pham
