d costs to know where opportunities exist that need to be addressed. Regularly conduct price benchmarking and competitive analysis.\u003c/p\u003e\u003cp\u003e• On a basis of the in-depth understanding of the specifications proposed by internal users upon RfQ, identify opportunities for standardization and VAVE in the specifications, estimate the potential savings of such standardization and VAVE with suppliers and lead the decision making of multiple specification options, taking into consideration both costs and benefits of these options.\u003c/p\u003e\u003cp\u003e• Negotiate agreements with suppliers that address the global needs of the Division including but not limited to price, delivery, quality and service requirements. Justify the agreements to all functional budget holders on a basis of benchmarking and should-costing.\u003c/p\u003e\u003cp\u003eSupply Base Development \u0026 Management:\u003c/p\u003e\u003cp\u003e• Establish long-term, competitive supplier relationships at high performance standards.\u003c/p\u003e\u003cp\u003e• Assess, rate and minimize risk regularly and lead mitigation efforts. Indemnify Molex from the risks through implementation of contracts including but not limited to Terms \u0026 Conditions, Quality and Supply Agreements.\u003c/p\u003e\u003cp\u003e• Monitor and manage suppliers in terms of technology roadmaps, lead-time reduction, inventory turns, cost improvement and supply assurance.\u003c/p\u003e\u003cp\u003eCoaching:\u003c/p\u003e\u003cp\u003e• Support local sourcing engineers’ growth by coaching them on the aforesaid sourcing activities and leading them by example.\u003c/p\u003e\u003cp\u003e• Help local Indirect Sourcing Manager build a world’s best-class Indirect Sourcing team in Vietnam.\u003c/p\u003e\u003cp\u003eCompliance:\u003c/p\u003e\u003cp\u003e• Ensure at all times Molex procurement and requesters operate as per regulatory and legal requirements. This includes but is not limited to compliance with safety, environmental, tax, customs and ethical requirements and spend guidelines.\u003c/p\u003e\u003cp\u003eBest Practices:\u003c/p\u003e\u003cp\u003e• Promotes the implementation of “best practices” as it relates to supply chain management.\u003c/p\u003e\u003cp\u003e• Share best practices, supplier information, etc with other Procurement staff across Divisions.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T4e3,\u003cp\u003eEDUCATION:\u003c/p\u003e\u003cp\u003eREQUIRED:       •    Bachelor’s Degree in Engineering\u003c/p\u003e\u003cp\u003ePREFERRED:\u003c/p\u003e\u003cp\u003eWORK EXPERIENCE:\u003c/p\u003e\u003cp\u003eREQUIRED:   • 5 - 10 year procurement, sales or engineering experiences in high-tech component industry\u003c/p\u003e\u003cp\u003e             • 3 - 5 year procurement, sales or engineering experiences in optical fiber or cable industry\u003c/p\u003e\u003cp\u003e             • More than 3-year leadership experience of teams or cross-functional projects\u003c/p\u003e\u003cp\u003ePREFERRED:  • CPM/CPSM, CIRM, CPIM\u003c/p\u003e\u003cp\u003eSKILLS \u0026 ABILITIES:\u003c/p\u003e\u003cp\u003eREQUIRED:       •    Good command of, and/or adaptability to, Office 365, Coupa and other IT applications\u003c/p\u003e\u003cp\u003e                 •    Business-level communication skills in Vietnamese and English\u003c/p\u003e\u003cp\u003e                 •    understanding of optical fiber or cable technology and their market trends\u003c/p\u003e\u003cp\u003e                 •    understanding of drawings and/or specifications of facilities\u003c/p\u003e\u003cp\u003e                 •    Ability to lead and/or actively participate in cross-functional teams\u003c/p\u003e\u003cp\u003e                 •    Strong problem solving \u0026 analytical skills\u003c/p\u003e\u003cp\u003e                 •    Understanding \u0026 analysis of Total Cost of Ownership\u003c/p\u003e\u003cp\u003ePREFERRED:      •    Business-level communication skills in Chinese\u003c/p\u003e27:Tc9b,"])</scr
