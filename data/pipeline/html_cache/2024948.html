fit our customers, which ultimately, is mirrored in the company value of SBO.24:Tfac,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI.\tKey responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tLead, manage, and develop the Technical Department to ensure high performance, efficiency, and alignment with the company’s strategy, production requirements, and operational objectives.\u003c/p\u003e\u003cp\u003e-\tPlan, organize, and control departmental activities while mentoring and supporting team members to enhance technical capability and professional growth.\u003c/p\u003e\u003cp\u003e-\tManage departmental workforce planning including recruitment, training, performance appraisal, discipline, and motivation to ensure sufficient technical capacity to meet business demands.\u003c/p\u003e\u003cp\u003e-\tDevelop and implement technical strategies to support the company’s long-term manufacturing capability and continuous growth.\u003c/p\u003e\u003cp\u003e-\tEvaluate, plan, and manage the acquisition of new machinery, tooling, and equipment to meet production demand and technological advancement.\u003c/p\u003e\u003cp\u003e-\tOversee installation, commissioning, and tooling setup of new machinery and ensure optimal performance of existing equipment.\u003c/p\u003e\u003cp\u003e-\tEnsure all equipment, systems, and software remain up to date, efficient, and compliant with current industry standards.\u003c/p\u003e\u003cp\u003e-\tPrepare and manage the department’s annual operational and capital expenditure budgets.\u003c/p\u003e\u003cp\u003e-\tMonitor departmental financial performance and control expenses to achieve budget targets.\u003c/p\u003e\u003cp\u003e-\tSupport manufacturing operations to meet budgeted financial performance and productivity objectives.\u003c/p\u003e\u003cp\u003e-\tProvide engineering and technical support to the Production Department to ensure efficient manufacturing processes and achievement of weekly and monthly production targets.\u003c/p\u003e\u003cp\u003e-\tEnsure timely preparation of job instruction sheets, job cards, tooling specifications, and CAD/CAM programs required for production to meet weekly and monthly production targets and provide engineer/technical support to production department.\u003c/p\u003e\u003cp\u003e-\tCoordinate tool room activities and oversee the design and specification of tooling and fixtures.\u003c/p\u003e\u003cp\u003e-\tWork closely with quality and production teams to improve machining processes, productivity, and product quality.\u003c/p\u003e\u003cp\u003e-\tReview and evaluate new RFQs (Request for Quotation) to assess machining feasibility and compliance with customer specifications.\u003c/p\u003e\u003cp\u003e-\tPrepare accurate and competitive product cost estimations in coordination with Sales and Finance Departments.\u003c/p\u003e\u003cp\u003e-\tLead new product development initiatives and manage related projects to ensure timely introduction of new products into production.\u003c/p\u003e\u003cp\u003e-\tCoordinate cross-functional activities to ensure project milestones, technical requirements, and delivery timelines are achieved.\u003c/p\u003e\u003cp\u003e-\tLead continuous improvement initiatives to optimize manufacturing processes, enhance productivity, operational effectiveness, and reduce costs.\u003c/p\u003e\u003cp\u003e-\tAnalyze closed production order variances and identify root causes for positive or negative manufacturing variances.\u003c/p\u003e\u003cp\u003e-\tWork closely with the Supply Chain Department to establish technical and quality requirements for external suppliers.\u003c/p\u003e\u003cp\u003e-\tCollaborate with Production, Quality, Sales, and other departments to ensure smooth operations and achievement of company objectives.\u003c/p\u003e\u003cp\u003e-\tDevelop and implement technical training programs through external providers, vendors, and internal experts.\u003c/p\u003e\u003cp\u003e-\tEnhance workforce capabilities in CNC machining processes, cutting technologies, CAD/CAM programming, and product knowledge.\u003c/p\u003e\u003cp\u003e-\tEnsure strict compliance with company policies, ethical standards, and confidentiality requirements.\u003c/p\u003e\u003cp\u003e-\tProvide monthly reporting and commentary for insertion into monthly reporting on technical department activities.\u003c/p\u003e\u003cp\u003e-\tManage, involve in recruitment process, train, develop, appraise, discipline, and motivate personnel to ensure technical department maintains and grows throughput capacity consistent with business objectives (budget), strategy and mission.\u003c/p\u003e\u003cp\u003e-\tPerform other duties and responsibilities as assigned by the General Director.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T746,\u003cp\u003e\u003cstrong\u003eII.\tCompetence Requirement:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea.\tBackground /qualification: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tUniversity degree of Mechanical Engineering/ Manufacturing \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb.\tExperience: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tMinimum 10-year experience in high precision engineering or manufacturing company (Oil \u0026 Gas Industry) Preferably\u003c/p\u003e\u003cp\u003e-\t5-year experience as a Technical Manager (Preferably Hands On)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ec.\tSpecial skill:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tExperience in machine tools design and operation\u003c/p\u003e\u003cp\u003e-\tGood knowledge of CNC Programming (Tooling)\u003c/p\u003e\u003cp\u003e-\tGood knowledge of metal cutting technology.\u003c/p\u003e\u003cp\u003e-\tGood knowledge of Budgeting and Financial Awareness \u003c/p\u003e\u003cp\u003e-\tExcellent understanding of CNC machining, preferably of large High precision / High Value parts, both Turning and Milling (Welding)\u003c/p\u003e\u003cp\u003e-\tVast Experience Productio
