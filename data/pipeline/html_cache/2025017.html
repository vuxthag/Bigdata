 đưa đến khách hàng các sản phẩm chất lương, dẫn đầu xu thế góp phần kiến tạo cuộc sống tiện nghi hơn, trọn vẹn hơn cho mọi gia đình Việt.\r\n\r\nSứ mệnh\r\nKiến tạo cuộc sống tiện nghi, nâng cao chất lượng sống và gắn yêu thương cho các gia đình.\r\n\r\nTầm nhìn\r\nUKG trờ thành đơn vị dẫn đầu trong việc phát triển và cung cấp giải pháp cùng thiết bị gia dụng tiên tiến, mang đến ngôi nhà thông minh, cuộc sống tiện ích và an toàn cho mọi gia đình\r\n\r\nGiá trị mà UKG mang lại\r\nSản phẩm tiên phong: UKG không chỉ cung cấp thiết bị nhà bếp, chăm sóc sức khỏe và gia dụng cao cấp mà còn nghiên cứu giải pháp mới giúp người dùng nâng cao trải nghiệm sống.\r\n\r\nĐồng hành cùng khách hàng: Hệ thống dịch vụ hậu mãi tận tâm giúp bạn luôn an tâm trong suốt quá trình sử dụng sản phẩm.\r\nCam kết bền vững: UKG luôn hướng đến việc bảo vệ môi trường và phát triển bền vững thông qua việc sử dụng công nghệ thân thiện và quy trình sản xuất tiên tiến.\r\n\r\nUKG Group sở hữu 5 thương hiệu gia dụng và chăm sóc sức khỏe.\r\n\r\nKALITE – Gia dụng thông minh: Kalite được đầu tư bài bản bởi Tập đoàn UKG, định hướng phát triển thành thương hiệu thiết bị gia dụng toàn cầu và đáp ứng nhu cầu của nhiều phân khúc khách hàng, ngay cả ở những quốc gia khó tính nhất.\r\n\r\nUNIE – Nhà Đẹp Bếp Xinh: UNIE là dòng sản phẩm thiết bị gia dụng đầu tiên của Tập đoàn UKG, được định vị hướng tới các sản phẩm gia dụng thời thượng trên thị trường, bắt kịp với sự thay đổi nhanh chóng thị hiếu khách hàng trẻ.\r\n\r\nHASUTA – MÓN QUÀ SỨC KHOẺ: Hasuta thuộc chuỗi cơ sở chăm sóc sức khỏe của Tập đoàn UKG, nhằm cung cấp các thiết bị chăm sóc sức khỏe tiên tiến, chất lượng cao cho người tiêu dùng, với phương châm “Giá trị thực – Chất lượng Nhật Bản\r\n\r\nUHOME – MÓN QUÀ TỪ THIÊN NHIÊN: Câu chuyện của chúng tôi bắt nguồn từ tự nhiên, những người yêu thiên nhiên và mong muốn kiến tạo những sản phẩm của hệ sinh thái bền vững. UHOME luôn nỗ lực đem đến cho khách hàng các sản phẩm lành tính, bảo vệ môi trường và mang lại hiệu quả cao vì sức khoẻ cộng đồng.\r\n\r\nFAGOR: Thương hiệu thiết bị nhà bếp hàng đầu Châu Âu với lịch sử phát triển hơn 100 năm. Các sản phẩm thiết bị nhà bếp của FAGOR được yêu thích trên toàn thế giới và là sự lựa chọn hàng đầu của các đầu bếp chuyên nghiệp.UKG Group đang là nhà phân phối độc quyền của thương hiệu gia dụng hàng đầu Châu Âu FAGOR tại thị trường Việt Nam."])</script><script>self.__next_f.push([1,"24:T6a4,\u003cp\u003e- Tốt nghiệp Trung cấp/Cao đẳng chuyên ngành Điện – Điện tử – Điện lạnh hoặc liên quan.\u003c/p\u003e\u003cp\u003e- Ưu tiên có kinh nghiệm sửa chữa điện tử, gia dụng\u003c/p\u003e\u003cp\u003e- Cẩn thận, trung thực, có trách nhiệm trong công việc.\u003c/p\u003e\u003cp\u003e- Có thể đi công tác (nếu cần).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*** QUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThu nhập cạnh tranh trên thị trường từ 12tr - 15tr (gross)\u003c/p\u003e\u003cp\u003e•\tHưởng đầy đủ các chế độ phúc lợi theo quy định Nhà nước và chính sách riêng của công ty. Đóng BHXH sau 2 tháng thử việc.\u003c/p\u003e\u003cp\u003e•\tChế độ Nghỉ và Thưởng vào các ngày Lễ lớn trong năm (Tết dương lịch, Giải phóng miền Nam, Quốc tế lao động, Quốc Khánh, Tết âm lịch ), thưởng lương tháng 13 .\u003c/p\u003e\u003cp\u003e•\tChế độ nghỉ phép năm theo quy định. \u003c/p\u003e\u003cp\u003e•\tQuà mừng Sinh nhật, trung thu,Quốc tế thiếu nhi, Quốc tế Phụ nữ… được tham gia miễn phí các buổi sinh hoạt kết nối như Zumba, Yoga, Trà chiều kết nối… do Tập đoàn tổ chức.\u003c/p\u003e\u003cp\u003e•\tPhúc lợi: Nghỉ mát, trợ cấp Kết hôn, Ốm đau, Thai sản… \u003c/p\u003e\u003cp\u003e•\tChế độ Bảo hiểm Xã hội theo Luật định, chế độ công đoàn cho CBNV. \u003c/p\u003e\u003cp\u003e•\tĐược nghỉ 02 thứ 7/ tháng (theo quy chế của công ty) \u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc chuyên nghiệp, năng động, khuyến khích phát triển và sáng tạo;\u003c/p\u003e\u003cp\u
