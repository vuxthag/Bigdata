o quá trình vận chuyển đường biển và đường hàng không diễn ra suôn sẻ và hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e主要职责：\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e根据客户要求及公司计划安排货物运输。\u003c/p\u003e\u003cp\u003eLên kế hoạch vận chuyển hàng hóa theo yêu cầu của khách hàng và kế hoạch của công ty.\u003c/p\u003e\u003cp\u003e更新航运公司及航空公司的船期和航班信息。\u003c/p\u003e\u003cp\u003eCập nhật thông tin lịch tàu và lịch bay từ các hãng tàu và hãng hàng không.\u003c/p\u003e\u003cp\u003e办理订舱，跟进提交 SI、VGM、Manifest (MNF)，制作提单（B/L）到货通知（AN）、D/O及相关单证。\u003c/p\u003e\u003cp\u003eThực hiện booking, theo dõi việc gửi SI, VGM, Manifest (MNF), làm vận đơn (B/L), làm AN, D/O và các chứng từ liên quan.\u003c/p\u003e\u003cp\u003e与航运公司及航空公司沟通，更新运费信息给销售团队。\u003c/p\u003e\u003cp\u003eLàm việc với hãng tàu và hãng hàng không để cập nhật giá cước cho bộ phận kinh doanh.\u003c/p\u003e\u003cp\u003e制作借记单（DN），协助财务部门催收客户货款。\u003c/p\u003e\u003cp\u003eLập Debit Note (DN) và hỗ trợ bộ phận kế toán thu hồi công nợ khách hàng.\u003c/p\u003e\u003cp\u003e与客户保持沟通，跟进货物状态，确保运输顺畅。\u003c/p\u003e\u003cp\u003eLàm việc trực tiếp với khách hàng để theo dõi tình trạng hàng hóa và đảm bảo quá trình vận chuyển thông suốt.\u003c/p\u003e\u003cp\u003e协助客户处理空箱问题，确保订舱执行到位。\u003c/p\u003e\u003cp\u003eHỗ trợ khách hàng xử lý container rỗng và đảm bảo booking được thực hiện đúng kế hoạch.\u003c/p\u003e\u003cp\u003e监督货物运输进度，确保按订舱计划准时装船/装机。\u003c/p\u003e\u003cp\u003eTheo dõi tiến độ vận chuyển để đảm bảo hàng được xếp tàu/máy bay đúng theo booking.\u003c/p\u003e\u003cp\u003e协调并及时处理运输过程中出现的任何问题。\u003c/p\u003e\u003cp\u003ePhối hợp và xử lý kịp thời các vấn đề phát sinh trong quá trình vận chuyển.\u003c/p\u003e\u003cp\u003e及时向客户及内部团队更新货物状态。\u003c/p\u003e\u003cp\u003eCập nhật tình trạng đơn hàng cho khách hàng và các bộ phận nội bộ một cách kịp thời.\u003c/p\u003e\u003cp\u003e与海外代理沟通，处理货物状态及单证相关事务。\u003c/p\u003e\u003cp\u003eLàm việc với đại lý nước ngoài về tình trạng lô hàng và các vấn đề chứng từ.\u003c/p\u003e\u003cp\u003e处理进出口货物相关的其他工作。\u003c/p\u003e\u003cp\u003eThực hiện các công việc khác liên quan đến hàng hóa xuất nhập khẩu.\u003c/p\u003e\u003cp\u003e跟进货物运输全过程，从发货到交付客户。\u003c/p\u003e\u003cp\u003eTheo dõi toàn bộ quá trình vận chuyển từ khi xuất hàng đến khi giao cho khách.\u003c/p\u003e\u003cp\u003e为客户提供专业物流、运输、进出口及相关服务咨询。\u003c/p\u003e\u003cp\u003eTư vấn cho khách hàng về logistics, vận chuyển, xuất nhập khẩu và các dịch vụ liên quan.\u003c/p\u003e\u003cp\u003e定期与航运公司、航空公司及其他运输服务供应商沟通，确保操作顺利。\u003c/p\u003e\u003cp\u003eThường xuyên làm việc với các hãng tàu, hãng hàng không và các đơn vị vận tải khác để đảm bảo công việc vận hành suôn sẻ.\u003c/p\u003e\u003cp\u003e优先考虑有美国/加拿大货物操作经验，熟悉 AMS、ISF、E-Manifest。\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên có kinh nghiệm xử lý hàng đi Mỹ/Canada, biết khai AMS, ISF, E-Manifest.\u003c/p\u003e\u003cp\u003e其他由上级分配的任务。\u003c/p\u003e\u003cp\u003eThực hiện các nhiệm vụ khác theo phân công của cấp trên.\u003c/p\u003e\u003cp\u003e具体工作内容将在面试中详细说明。\u003c/p\u003e\u003cp\u003eChi tiết công việc sẽ được trao đổi thêm trong buổi phỏng vấn.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:Ta54,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e职位要求：\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYêu cầu công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e国际商务、物流、供应链、经济学或相关专业本科以上学历。\u003c/p\u003e\u003cp\u003eTốt nghiệp đại học các ngành Kinh doanh quốc tế, Logistics, Chuỗi cung ứng, Kinh tế hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e至少1–2年出口入境操作或单证工作经验（优先物流/货代公司）。\u003c/p\u003e\u003cp\u003eCó ít nhất 1–2 năm kinh nghiệm trong lĩnh vực chứng từ hoặc vận hành xuất nhập khẩu (ưu tiên công ty logistics/forwarder).\u003c/p\u003e\u003cp\u003e熟悉国际贸易术语（Incoterms）、海关流程及运输单证。\u003c/p\u003e\u003cp\u003eHiểu biết về Incoterms, quy trình hải quan và chứng từ vận chuyển.\u003c/p\u003e\u003cp\u003e有美国/加拿大货物操作经验，熟悉 AMS、ISF、E-Manifest 优先。\u003c/p\u003e\u003cp\u003eCó kinh nghiệm xử lý hàng đi Mỹ/Canada và biết khai AMS, ISF, E-Manifest là lợi thế.\u003c/p\u003e\u003cp\u003e良好的英语能力（读、写、沟通）。\u003c/p\u003e\u003cp\u003eCó khả năng sử dụng tiếng Anh tốt (đọc, viết, giao tiếp).\u003c/p\u003e\u003cp\u003e熟练使用 Microsoft Office（Excel, Word, Outlook）。\u003c/p\u003e\u003cp\u003eThành thạo Microsoft Office (Excel, Word, Outlook).\u003c/p\u003e\u003cp\u003e细心、有责任心、主动性强，能在压力下独立工作。\u003c/p\u003e\u003cp\u003eCẩn thận, có trách nhiệm, chủ động và có khả năng làm việc độc lập dưới áp lực.\u003c/p\u003e\u003cp\u003e良好的沟通、协调及解决问题能力。\u003c/p\u003e\u003cp\u003eCó kỹ năng giao tiếp, phối hợp và giải quyết vấn đề tốt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e薪资及福利：\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e工资：1500万–2000万越南盾/月（根据能力面议）。\u003c/p\u003e\u003cp\u003eMức lương: 15–20 triệu VND/tháng (thỏa thuận theo năng lực).\u003c/p\u003e\u003cp\u003e节日奖金：包括 30/04–01/05、02/09、01/01 等。\u003c/p\u003e\u003cp\u003eThưởng các dịp lễ: 30/04–01/05, 02/09, 01/01,…\u003c/p\u003e\u003cp\u003e完整福利：年度公司旅游、13薪。\u003c/p\u003e\u003cp\u003ePhúc lợi đầy đủ: du lịch công ty hàng năm, lương tháng 13.\u003c/p\u003e\u003cp\u003e培训与发展：提供专业培训，提升职业能力。\u003c/p\u003e\u003cp\u003eĐược đào tạo chuyên môn và phát triển năng lực nghề nghiệp.\u003c/p\u003e\u003cp\u003e劳动保障：按越南劳动法规定缴纳社会保险、医疗保险、失业保险。\u003c/p\u003e\u003cp\u003eĐược tham gia đầy đủ BHXH, BHYT, BHTN theo quy định pháp luật Việt Nam.\u003c/p\u003e\u003cp\u003e工作时间：\u003c/p\u003e\u003cp\u003eThời gian làm việc:\u003c/p\u003e\u003cp\u003e周一至周五：08:30 – 17:30。\u003c/p\u003e\u003cp\u003eThứ Hai – Thứ Sáu: 08:30 – 17:30.\u003c/p\u003e\u003cp\u003e周六：根据上级要求工作。\u003c/p\u003e\u003cp\u003eThứ Bảy: làm việc theo yêu cầu của cấp trên.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T
