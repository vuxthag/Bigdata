/strong\u003e\u003c/p\u003e\u003cp\u003e•\tWork closely with GORE-TEX representatives to ensure that products meet rigorous performance standards and can be legally branded with the GORE-TEX trademark. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Description\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003e•\tProduct Development: Collaborating with customers to develop products that integrate GORE-TEX technologies effectively from concept to launch.\u003c/p\u003e\u003cp\u003e•\tTechnical Training \u0026 Support: Providing expertise and training to internal SPECTRE teams regarding GORE-TEX materials, specific machinery, and required manufacturing processes.\u003c/p\u003e\u003cp\u003e•\tSupplier Communication: Serving as the primary technical contact with GORE representatives and internal sourcing/manufacturing teams to manage changes, troubleshoot issues, and ensure compliance.\u003c/p\u003e\u003cp\u003e•\tProcess Optimization: Assisting in optimizing production processes and systems to meet GORE's strict environmental and procedural controls. \u003c/p\u003e\u003cp\u003e•\tQuality Assurance \u0026 Testing: Work closely with Quality \u0026 Lab teams to test from prototypes and pre-production samples to ensure they meet the specific GORE performance standards for waterproofness, breathability, durability, etc..\u003c/p\u003e\u003cp\u003e•\tCertification Process Management: Managing the necessary documentation and timelines for product samples to be submitted for GORE testing and approval before mass production begins.\u003c/p\u003e\u003cp\u003e****************************\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhát triển sản phẩm đạt chứng nhận của GoreTex\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc chặt chẽ với GORE-TEX để đảm bảo rằng các sản phẩm đáp ứng các tiêu chuẩn nghiêm ngặt và có thể được gắn nhãn hiệu GORE-TEX một cách
