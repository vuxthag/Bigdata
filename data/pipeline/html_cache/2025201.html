a mình sau hơn hai năm có mặt trên thị trường với thiết kế hiện đại, thân thiện môi trường và nhiều chủng loại phù hợp với mọi nhu cầu chiếu sáng của người tiêu dùng.v..v. đặc biệt là 2 dòng sản phẩm bóng đèn Compact và bóng đèn Halogen VNLITE chống ẩm ánh sáng vàng với thiết kế đẹp mắt, hiện đại, chất lượng và đem lại hiệu quả cao cho bà con nông nhân sử dụng cho cây thanh long mùa trái vụ .\r\nCông Ty Ánh Sáng Tuấn Khương chúng tôi cam kết sẽ luôn nỗ lực hết mình để đáp lại lòng tin của quý khách hàng dành cho thương hiệu VNLITE.\r\nII. Lịch sử hình thành:\r\nCông ty đã thành lập và đi vào hoạt động được hơn 5 năm, Cty đã  trải qua nhiều thử thách để có được niềm tin của khách hàng và người tiêu dùng như ngày hôm nay. Có thể tóm gọn hoạt động của công ty qua các năm:\r\nNgày 26 – 08 – 2009: Đăng ký thành lập công ty lấy tên  “CÔNG TY TNHH MTV TM ÁNH SÁNG TUẤN KHƯƠNG”\r\nNăm 2009: Là nhà phân phối độc quyền tại VN của thương hiệu bóng đèn compact tiết kiệm điện Midea Lighting một thương hiệu quốc tế có mặt ở rất nhiều quốc gia trên thế giới.\r\nNăm 2012: Là năm bước ngoặt khi cho ra đời đứa con tinh thần của công ty. Cũng là sản phẩm chủ lực hiện nay Bóng Đèn Compact Tiết Kiệm Điện VNLITE. Với nhiều chủng loại sản phẩm bóng đèn compact khác nhau như 2U, 3U, 4U, 5U tới bóng xoắn, Lotus( hoa sen ). Đặc biệt còn có loại bóng đèn compact chống ẩm 3U phục vụ cho việc trồng cây thanh long.\r\nNăm 2013: Mở thêm chi nhánh là nơi đặt dây chuyền sản xuất hiện đại giúp công ty sản xuất đủ số lượng sản phẩm để cung ứng kịp thời cho nhu cầu của thị trường. Tiếp tục phát triển thêm sản phẩm mới như bóng đèn tròn Halogen VNLITE.\r\nNăm 2014: Có những cải tiến, thay đổi về kiểu dáng sản phẩm, mẫu mã bao bì đáp ứng yêu cầu của khách hàng đặt ra cho công ty. Đạt chứng nhận “Ngôi sao năng lượng Việt” của Bộ Công Thương.\r\nNăm 2015: Cho ra đời các dòng sản phẩm đèn LED cao cấp, mở rộng kênh phân phối và Đại Diện Thương Mại có mặt khắp các tỉnh thành nhằm đáp ứng nhanh cho nhu cầu thị trường hiện nay.\r\n\r\nIV. Môi trường làm việc:\r\nTuyển dụng: Ưu tiên phát triển nguồn nhân lực của Cty, Công ty luôn tuyển những người lao động có tinh thần làm việc cao, nhiệt tình năng nổ trong công việc, có chí cầu tiến. Người lao động được Ban Lãnh Đạo phỏng vấn kỹ càng trước khi cho thử việc. Nếu sau thử việc người lao động được giữ lại làm thì công ty sẽ ký hợp đồng lao động và có bảo hiểm đầy đủ, giúp người lao động an tâm làm việc.\r\nCơ sở vật chất: Điều kiện làm việc tiện nghi có từng phòng riêng với đầy đủ trang thiết bị cho mỗi bộ phận. Xưởng sản xuất được trang bị máy móc hiện đại. Hệ thống phòng chống cháy nổ được lắp đặt và được kiểm tra thường xuyên. Nhân viên văn phòng, thị trường và công nhân sản xuất được cấp đồng phục và vật dụng phù hợp cho công việc.\r\nĐào tạo: Công ty luôn mong muốn nâng cao trình độ chuyên môn, nghiệp vụ của độ ngũ công nhân viên. Nên hàng năm dựa trên kế hoạch phát triển của công ty mà sẽ có các đợt tổ chức huấn luyện hoặc chính sách đào tạo cử nhân viên đi học nâng cao trình độ.\r\nThi đua – Lương thưởng: Mỗi bộ phận có một chính sách đánh giá hiệu quả công việc với tiêu chí cụ thể, rõ ràng. Giúp đánh giá khen thưởng cho nhân viên, tập thể hoàn thành công việc xuất sắc. Công ty luôn trân trọng những ai đóng góp nhiều công sức và gắn bó lâu dài cùng với công ty bằng những ưu đãi thích hợp."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T563,\u003cp\u003e\u003cstrong\u003e3. Yêu cầu công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trình độ học vấn: Đại học\u003c/p\u003e\u003cp\u003e- Kinh nghiệm: \u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm Marketing.\u003c/p\u003e\u003cp\u003e•\tCó ít nhất 2 năm kinh nghiệm quản lý.\u003c/p\u003e\u003cp\u003e•\tCó tư duy chiến lược và khả năng triển khai thực tế.\u003c/p\u003e\u003cp\u003e•\tHiểu về digital marketing, content, branding và lead generation.\u003c/p\u003e\u003cp\u003e•\tKỹ năng quản lý, đào t  trên thế giới.\r\nNăm 2012: Là năm bước ngoặt khi cho ra đời đứa con tinh thần của công ty. Cũng là sản phẩm chủ lực hiện nay Bóng Đèn Compact Tiết Kiệm Điện VNLITE. Với nhiều chủng loại sản phẩm bóng đèn compact khác nhau như 2U, 3U, 4U, 5U tới bóng xoắn, Lotus( hoa sen ). Đặc biệt còn có loại bóng đèn compact chống ẩm 3U phục vụ cho việc trồng cây thanh long.\r\nNăm 2013: Mở thêm chi nhánh là nơi đặt dây chuyền sản xuất hiện đại giúp công ty sản xuất đủ số lượng sản phẩm để cung ứng kịp thời cho nhu cầu của thị trường. Tiếp tục phát triển thêm sản phẩm mới như bóng đèn tròn Halogen VNLITE.\r\nNăm 2014: Có những cải tiến, thay đổi về kiểu dáng sản phẩm, mẫu mã bao bì đáp ứng yêu cầu của khách hàng đặt ra cho công ty. Đạt chứng nhận “Ngôi sao năng lượng Việt” của Bộ Công Thương.\r\nNăm 2015: Cho ra đời các dòng sản phẩm đèn LED cao cấp, mở rộng kênh phân phối và Đại Diện Thương Mại có mặt khắp các tỉnh thành nhằm đáp ứng nhanh cho nhu cầu thị trường hiện nay.\r\n\r\nIV. Môi trường làm việc:\r\nTuyển dụng: Ưu tiên phát triển nguồn nhân lực của Cty, Công ty luôn tuyển những người lao động có tinh thần làm việc cao, nhiệt tình năng nổ trong công việc, có chí cầu tiến. Người lao động được Ban Lãnh Đạo phỏng vấn kỹ càng trước khi cho thử việc. Nếu sau thử việc người lao động được giữ lại làm thì công ty sẽ ký hợp đồng lao động và có bảo hiểm đầy đủ, giúp người lao động an tâm làm việc.\r\nCơ sở vật chất: Điều kiện làm việc tiện nghi có từng phòng riêng với đầy đủ trang thiết bị cho mỗi bộ phận. Xưởng sản xuất được trang bị máy móc hiện đại. Hệ thống phòng chống cháy nổ được lắp đặt và được kiểm tra thường xuyên. Nhân viên văn phòng, thị trường và công nhân sản xuất được cấp đồng phục và vật dụng phù hợp cho công việc.\r\nĐào tạo: Công ty luôn mong muốn nâng cao trình độ chuyên môn, nghiệp vụ của độ ngũ công nhân viên. Nên hàng năm dựa trên kế hoạch phát triển của công ty mà sẽ có các đợt tổ chức huấn luyện hoặc chính sách đào tạo cử nhân viên đi học nâng cao trình độ.\r  đại, chất lượng và đem lại hiệu quả cao cho bà con nông nhân sử dụng cho cây thanh long mùa trái vụ .\r\nCông Ty Ánh Sáng Tuấn Khương chúng tôi cam kết sẽ luôn nỗ lực hết mình để đáp lại lòng tin của quý khách hàng dành cho thương hiệu VNLITE.\r\nII. Lịch sử hình thành:\r\nCông ty đã thành lập và đi vào hoạt động được hơn 5 năm, Cty đã  trải qua nhiều thử thách để có được niềm tin của khách hàng và người tiêu dùng như ngày hôm nay. Có thể tóm gọn hoạt động của công ty qua các năm:\r\nNgày 26 – 08 – 2009: Đăng ký thành lập công ty lấy tên  “CÔNG TY TNHH MTV TM ÁNH SÁNG TUẤN KHƯƠNG”\r\nNăm 2009: Là nhà phân phối độc quyền tại VN của thương hiệu bóng đèn compact tiết kiệm điện Midea Lighting một thương hiệu quốc tế có mặt ở rất nhiều quốc gia trên thế giới.\r\nNăm 2012: Là năm bước ngoặt khi cho ra đời đứa con tinh thần của công ty. Cũng là sản phẩm chủ lực hiện nay Bóng Đèn Compact Tiết Kiệm Điện VNLITE. Với nhiều chủng loại sản phẩm bóng đèn compact khác nhau như 2U, 3U, 4U, 5U tới bóng xoắn, Lotus( hoa sen ). Đặc biệt còn có loại bóng đèn compact chống ẩm 3U phục vụ cho việc trồng cây thanh long.\r\nNăm 2013: Mở thêm chi nhánh là nơi đặt dây chuyền sản xuất hiện đại giúp công ty sản xuất đủ số lượng sản phẩm để cung ứng kịp thời cho nhu cầu của thị trường. Tiếp tục phát triển thêm sản phẩm mới như bóng đèn tròn Halogen VNLITE.\r\nNăm 2014: Có những cải tiến, thay đổi về kiểu dáng sản phẩm, mẫu mã bao bì đáp ứng yêu cầu của khách hàng đặt ra cho công ty. Đạt chứng nhận “Ngôi sao năng lượng Việt” của Bộ Công Thương.\r\nNăm 2015: Cho ra đời các dòng sản phẩm đèn LED cao cấp, mở rộng kênh phân phối và Đại Diện Thương Mại có mặt khắp các tỉnh thành nhằm đáp ứng nhanh cho nhu cầu thị trường hiện nay.\r\n\r\nIV. Môi trường làm việc:\r\nTuyển dụng: Ưu tiên phát triển nguồn nhân lực của Cty, Công ty luôn tuyển những người lao động có tinh thần làm việc cao, nhiệt tình năng nổ trong công việc, có chí cầu tiến. Người lao động được Ban Lãnh Đạo phỏng vấn kỹ càng trước khi cho thử việc. Nếu sau thử việc người lao động được giữ lại làm thì công ty sẽ ký hợp đồng lao động và có bảo hiểm đầy đủ, giúp người lao động an tâm làm việc.\r\nCơ sở vật chất: Điều kiện làm việc tiện nghi có từng phòng riêng với đầy đủ trang thiết bị cho mỗi bộ phận. Xưởng sản xuất được trang bị máy móc hiện đại. Hệ thống phòng chống cháy nổ được lắp đặt và được kiểm tra thường xuyên. Nhân viên văn phòng, thị trường và công nhân sản xuất được cấp đồng phục và vật dụng phù hợp cho công việc.\r\nĐào tạo: Công ty luôn mong muốn nâng cao trình độ chuyên môn, nghiệp vụ của độ ngũ công nhân viên. Nên hàng năm dựa trên kế hoạch phát triển của công ty mà sẽ có các đợt tổ chức huấn luyện hoặc chính sách đào tạo cử nhân viên đi học nâng cao trình độ.\r\nThi đua – Lương thưởng: Mỗi bộ phận có một chính sách đánh giá hiệu quả công việc với tiêu chí cụ thể, rõ ràng. Giúp đánh giá khen thưởng cho nhân viên, tập thể hoàn thành công việc xuất sắc. Công ty luôn trân trọng những ai đóng góp nhiều công sức và gắn bó lâu dài cùng với công ty bằng những ưu đãi thích hợp."])</script><script>self.__next_f.push([1,"42:{\"companyId\":246284,\"jobImageURLs\":\"$43\",\"jobVideoURLs\":null,\"companyName\":\"Công Ty TNHH Một Thành Viên Thương Mại Ánh Sáng Tuấn Khương\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/f8/10303421.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"30-32 Lê Khôi, Phường Phú Thạnh, Quận Tân phú, TP. HCM\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n46:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-03-18T10:00:41+07:00\",\"expiredOn\":\"2026-04-17T23:59:59+07:00\"}
