\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T116e,"])</script><script>self.__next_f.push([1,"\u003cp\u003eThe Head of Product Development is responsible for translating creative concepts into technically feasible, production-ready garments while ensuring product quality, cost control, and margin alignment.\u003c/p\u003e\u003cp\u003eThis role oversees the entire product development process, including technical development, pattern making, sampling, material sourcing validation, and pre-production approval.\u003c/p\u003e\u003cp\u003eThe Head of Product Development works closely with the Creative Director to maintain the aesthetic vision of the brand, while collaborating with Production to ensure manufacturability and operational efficiency.\u003c/p\u003e\u003cp\u003eThis role is critical to ensuring that all products — including RTW collections, Made-to-Order pieces, ODM, and OEM projects — meet the company’s quality standards, cost targets, and production timelines.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eI. CORE RESPONSIBILITIES\u003c/p\u003e\u003cp\u003e1. Product Development Strategy\u003c/p\u003e\u003cp\u003e• Oversee the entire product development process from design concept to production readiness.\u003c/p\u003e\u003cp\u003e• Establish product development standards and workflow.\u003c/p\u003e\u003cp\u003e• Ensure consistency of product quality across collections and production runs.\u003c/p\u003e\u003cp\u003e• Align product development with company margin targets and commercial objectives.\u003c/p\u003e\u003cp\u003e• Support the brand’s premium positioning through strong technical standards.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Technical Development \u0026 Engineering\u003c/p\u003e\u003cp\u003e• Translate creative design concepts into production-ready garments.\u003c/p\u003e\u003cp\u003e• Review and finalize technical documentation including:\u003c/p\u003e\u003cp\u003e• Techpacks\u003c/p\u003e\u003cp\u003e• Bill of Materials (BOM)\u003c/p\u003e\u003cp\u003e• Construction specifications\u003c/p\u003e\u003cp\u003e• Measurement charts\u003c/p\u003e\u003cp\u003e• Define technical construction standards and garment finishing benchmarks.\u003c/p\u003e\u003cp\u003e• Ensure garments are structurally sound, manufacturable, and scalable.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Pattern Development \u0026 Fit Management\u003c/p\u003e\u003cp\u003e• Supervise pattern development and grading processes.\u003c/p\u003e\u003cp\u003e• Ensure consistent sizing standards across collections.\u003c/p\u003e\u003cp\u003e• Conduct sample fitting sessions and approve fit adjustments.\u003c/p\u003e\u003cp\u003e• Ensure product measurements align with brand size standards and customer expectations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4. Sample Development\u003c/p\u003e\u003cp\u003e• Manage the sample development process for RTW collections and special projects.\u003c/p\u003e\u003cp\u003e• Ensure sample development timelines align with collection launch schedules.\u003c/p\u003e\u003cp\u003e• Review prototype samples and provide technical feedback.\u003c/p\u003e\u003cp\u003e• Approve final pre-production samples before bulk production.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5. Fabric \u0026 Trim Validation\u003c/p\u003e\u003cp\u003e• Work with the Procurement \u0026 Sourcing Executive to validate fabrics, trims, and accessories.\u003c/p\u003e\u003cp\u003e• Ensure materials meet quality standards, technical specifications, and brand positioning.\u003c/p\u003e\u003cp\u003e• Approve alternative materials when necessary to maintain margin or supply stability.\u003c/p\u003e\u003cp\u003e• Evaluate supplier samples and material test results (colorfastness, shrinkage, durability).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6. Cost Alignment \u0026 Margin Protection\u003c/p\u003e\u003cp\u003e• Ensure product development aligns with target costing and margin objectives.\u003c/p\u003e\u003cp\u003e• Review BOM and material consumption to optimize cost efficiency.\u003c/p\u003e\u003cp\u003e• Work with CFO and Production to monitor cost implications during development.\u003c/p\u003e\u003cp\u003e• Propose technical alternatives to maintain margin without compromising quality.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7. Cross-Department Collaboration\u003c/p\u003e\u003cp\u003eWith Creative Director\u003c/p\u003e\u003cp\u003e• Ensure creative concepts are technically feasible.\u003c/p\u003e\u003cp\u003e• Maintain the design intent while optimizing product construction.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eWith Production Manager\u003c/p\u003e\u003cp\u003e• Ensure product specifications are production-ready.\u003c/p\u003e\u003cp\u003e• Resolve technical issues before bulk manufacturing begins.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eWith Commercial Team\u003c/p\u003e\u003cp\u003e• Support product adaptation for specific markets.\u003c/p\u003e\u003cp\u003e• Assist in product customization for wholesale or international clients.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e8. Support for ODM / OEM Projects\u003c/p\u003e\u003cp\u003e• Validate technical feasibility of external client designs.\u003c/p\u003e\u003cp\u003e• Ensure ODM / OEM projects meet export-grade quality standards.\u003c/p\u003e\u003cp\u003e• Adapt technical specifications when required for production capabilities.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e9. Quality Benchmark Development\u003c/p\u003e\u003cp\u003e• Establish technical quality benchmarks for garments.\u003c/p\u003e\u003cp\u003e• Define acceptable tolerance levels for construction and finishing.\u003c/p\u003e\u003cp\u003e• Support QC standards development with Production.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T68c,\u003cp\u003e1. Education\u003c/p\u003e\u003cp\u003e• Preferred degrees include:\u003c/p\u003e\u003cp\u003e• Bachelor’s degree in Fashion Technology\u003c/p\u003e\u003cp\u003e• Garment Engineering\u003c/p\u003e\u003cp\u003e• Apparel Production\u003c/p\u003e\u003cp\u003e• Textile Technology\u003c/p\u003e\u003cp\u003e• Or related technical field\u003c/p\u003e\u003cp\u003e• Formal training in pattern making or garment construction is highly preferred.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Experience\u003c/p\u003e\u003cp\u003e• 7–10 years of experience in garment product development or technical design.\u003c/p\u003e\u003cp\u003e• Experience working with fashion brands or garment manufacturers.\u003c/p\u003e\u003cp\u003e• Experience managing product development teams.\u003c/p\u003e\u003cp\u003e• Experience working with both woven and knit garments.\u003c/p\u003e\u003cp\u003e• Experience supporting international production or export projects is an advantage.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Technical Knowledge\u003c/p\u003e\u003cp\u003e• Strong understanding of:\u003c/p\u003e\u003cp\u003e• Garment construction and pattern making\u003c/p\u003e\u003cp\u003e• Fabric types and textile properties\u003c/p\u003e\u003cp\u003e• BOM and consumption calculations\u003c/p\u003e\u003cp\u003e• Sampling and fitting processes\u003c/p\u003e\u003cp\u003e• Production feasibility and factory capabilities\u003c/p\u003e\u003cp\u003e• Quality control standards in garment production\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4. Skills\u003c/p\u003e\u003cp\u003e• Strong technical problem-solving ability\u003c/p\u003e\u003cp\u003e• Excellent attention to detail\u003c/p\u003e\u003cp\u003e• Strong organizational and project management skills\u003c/p\u003e\u003cp\u003e• Ability to coordinate across creative, production, and commercial teams\u003c/p\u003e\u003cp\u003e• Ability to manage multiple development timelines simultaneously\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5. Language\u003c/p\u003e\u003cp\u003e• English reading and communication required.\u003c/p\u003e\u003cp\u003e• This role may require interaction with:\u003c/p\u003e\u003cp\u003e• International suppliers\u003c/p\u003e\u003cp\u003e• Export clients\u003c/p\u003e\u003cp\u003e• Technical documentation in English.\u003c/p\u003e27:T116e,"])</script><script>self.__next_f.push([1,"\u003cp\u003eThe Head of Product Development is responsible for translating creative concepts into technically feasible, production-ready garments while ensuring product quality, cost control, and margin alignment.\u003c/p\u003e\u003cp\u003eThis role oversees the entire product development process, including technical development, pattern making, sampling, material sourcing validation, and pre-production approval.\u003c/p\u003e\u003cp\u003eThe Head of Product Development works closely with the Creative Director to maintain the aesthetic vision of the brand, while collaborating with Production to ensure manufacturability and operational efficiency.\u003c/p\u003e\u003cp\u003eThis role is critical to ensuring that all products — including RTW collections, Made-to-Order pieces, ODM, and OEM projects — meet the company’s quality standards, cost targets, and production timelines.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eI. CORE RESPONSIBILITIES\u003c/p\u003e\u003cp\u003e1. Product Development Strategy\u003c/p\u003e\u003cp\u003e• Oversee the entire product development process from design concept to production readiness.\u003c/p\u003e\u003cp\u003e• Establish product development standards and workflow.\u003c/p\u003e\u003cp\u003e• Ensure consistency of product quality across collections and production runs.\u003c/p\u003e\u003cp\u003e• Align product development with company margin targets and commercial objectives.\u003c/p\u003e\u003cp\u003e• Support the brand’s premium positioning through strong technical standards.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Technical Development \u0026 Engineering\u003c/p\u003e\u003cp\u003e• Translate creative design concepts into production-ready garments.\u003c/p\u003e\u003cp\u003e• Review and finalize technical documentation including:\u003c/p\u003e\u003cp\u003e• Techpacks\u003c/p\u003e\u003cp\u003e• Bill of Materials (BOM)\u003c/p\u003e\u003cp\u003e• Construction specifications\u003c/p\u003e\u003cp\u003e• Measurement charts\u003c/p\u003e\u003cp\u003e• Define technical construction standards and garment finishing benchmarks.\u003c/p\u003e\u003cp\u003e• Ensure garments are structurally sound, manufacturable, and scalable.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Pattern Development \u0026 Fit Management\u003c/p\u003e\u003cp\u003e• Supervise pattern development and grading processes.\u003c/p\u003e\u003cp\u003e• Ensure consistent sizing standards across collections.\u003c/p\u003e\u003cp\u003e• Conduct sample fitting sessions and approve fit adjustments.\u003c/p\u003e\u003cp\u003e• Ensure product measurements align with brand size standards and customer expectations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4. Sample Development\u003c/p\u003e\u003cp\u003e• Manage the sample development process for RTW collections and special projects.\u003c/p\u003e\u003cp\u003e• Ensure sample development timelines align with collection launch schedules.\u003c/p\u003e\u003cp\u003e• Review prototype samples and provide technical feedback.\u003c/p\u003e\u003cp\u003e• Approve final pre-production samples before bulk production.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5. Fabric \u0026 Trim Validation\u003c/p\u003e\u003cp\u003e• Work with the Procurement \u0026 Sourcing Executive to validate fabrics, trims, and accessories.\u003c/p\u003e\u003cp\u003e• Ensure materials meet quality standards, technical specifications, and brand positioning.\u003c/p\u003e\u003cp\u003e• Approve alternative materials when necessary to maintain margin or supply stability.\u003c/p\u003e\u003cp\u003e• Evaluate supplier samples and material test results (colorfastness, shrinkage, durability).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6. Cost Alignment \u0026 Margin Protection\u003c/p\u003e\u003cp\u003e• Ensure product development aligns with target costing and margin objectives.\u003c/p\u003e\u003cp\u003e• Review BOM and material consumption to optimize cost efficiency.\u003c/p\u003e\u003cp\u003e• Work with CFO and Production to monitor cost implications during development.\u003c/p\u003e\u003cp\u003e• Propose technical alternatives to maintain margin without compromising quality.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7. Cross-Department Collaboration\u003c/p\u003e\u003cp\u003eWith Creative Director\u003c/p\u003e\u003cp\u003e• Ensure creative concepts are technically feasible.\u003c/p\u003e\u003cp\u003e• Maintain the design intent while optimizing product construction.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eWith Production Manager\u003c/p\u003e\u003cp\u003e• Ensure product specifications are production-ready.\u003c/p\u003e\u003cp\u003e• Resolve technical issues before bulk manufacturing begins.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eWith Commercial Team\u003c/p\u003e\u003cp\u003e• Support product adaptation for specific markets.\u003c/
