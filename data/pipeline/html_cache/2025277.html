003e\u003cp\u003e•\tTracking of schedule realization by production and support for counter measures in case of delays\u003c/p\u003e\u003cp\u003e•\tDetermination of delivery options for customer project requests including effects on current supply plan in case of prioritization\u003c/p\u003e\u003cp\u003e•\tRevise and execute maintenance of essential planning parameters in the ERP / other planning system\u003c/p\u003e\u003cp\u003e•\tConfirmation of new orders towards sales / distribution center interfaces\u003c/p\u003e\u003cp\u003e•\tPrepare and report planning relevant KPI’s – SFM participation incl. escalation (handling of escalation cases, etc.)\u003c/p\u003e\u003cp\u003e•\tPlan, control, scrap and replenish subassembly and finished goods inventory\u003c/p\u003e\u003cp\u003e•\tPro-actively manage risks and breakdowns (focus on managing impact on availability…) in the supply chain and propose action plans to avoid delivery problems\u003c/p\u003e\u003cp\u003e•\tConduct and drive the capacity request meeting with respective total production unit (TPU) and responsible for capacity request and joint review of its adherence, aligned with the overall S\u0026OP process\u003c/p\u003e\u003cp\u003e•\tMaintain proactive communications with Supply Chain interfaces to ensure minimal impact to our stakeholders and customers\u003c/p\u003e\u003cp\u003e•\tParticipate and contribute actively in the S\u0026OP and S\u0026OE process for their respective portfolio\u003c/p\u003e\u003cp\u003e•\tUnderstand production concept and product knowledge to make the right decision for planning.\u003c/p\u003e\u003cp\u003e•\tExecute engineering changes with support from TPU, R\u0026D and material operations\u003c/p\u003e\u003cp\u003e•\tResponsible to plan and ensure availability of P+F internal sub-assembly for pilot run, prototype, evaluation, first order quantity.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eAdditional Accountabilities (for Senior role)\u003c/p\u003e\u003cp\u
