g/quý) cho kênh Website, bao gồm dự báo doanh thu và ngân sách khuyến mãi.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Am hiểu về các công cụ phân tích dữ liệu như Google Analytics (GA4)\u003c/strong\u003e, Power BI, hoặc các nền tảng phân tích E-commerce khác để theo dõi hiệu suất và đưa ra Insights.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4. Kỹ năng mềm\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng Phân tích Dữ liệu (Data Analysis):\u003c/strong\u003e Khả năng đọc, hiểu, phân tích dữ liệu kinh doanh phức tạp và chuyển đổi thành hành động cụ thể.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng Quản lý Dự án và Tổ chức:\u003c/strong\u003e Khả năng quản lý nhiều chiến dịch và dự án cùng lúc, đảm bảo đúng tiến độ và chất lượng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng Giao tiếp \u0026 Phối hợp liên phòng ban:\u003c/strong\u003e Khả năng làm việc hiệu quả với các đội nhóm khác (Marketing, Data, Tech/Product, Vận hành, CSKH) để đạt mục tiêu chung.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Tư duy Tối ưu hóa:\u003c/strong\u003e Luôn tìm kiếm cơ hội để cải thiện hiệu suất bán hàng và trải nghiệm người dùng (UX/UI).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e5. Kỹ năng lãnh đạo\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kỹ năng tổ chức \u0026 sắp xếp công việc khoa học\u003c/p\u003e\u003cp\u003e- Quản lý thời gian và hiệu quả công việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e6. Phẩm chất tính cách\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tinh thần làm việc chủ động, dám nhận trách nhiệm và tìm kiếm giải pháp cho các vấn đề kinh doanh.\u003c/p\u003e\u003cp\u003e- Chịu được áp lực về mục tiêu doanh số và tốc độ thay đổi nhanh chóng của môi trường E-commerce.\u003c/p\u003e\u003cp\u003e- Đam mê tìm hiểu các xu hướng mới trong E-commerce, công nghệ và hành vi mua sắm trực tuyến.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e7. Yêu cầu khác\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có máy tính cá nhân\u003c/p\u003e\u003cp\u003e- Sẵn sàng thay đổi và thích nghi\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e-------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI ĐƯỢC HƯỞNG:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1. Chế độ lương thưởng:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Thu nhập: 15,000,000 - 25,000,000vnđ\u003c/strong\u003e (lương cứng + phụ cấp + thưởng hoa hồng)\u003c/p\u003e\u003cp\u003e- Phụ cấp (Ăn trưa, đi lại, điện thoại, laptop, nhà ở)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Thử việc 02 tháng nhận 90% lương + 100% phụ cấp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thưởng kinh doanh theo Quý, thưởng lương tháng 13,... và các khoản khác theo chính sách Công ty\u003c/p\u003e\u003cp\u003e- Nghỉ phép năm từ 12 - 15 ngày/năm, tham gia BHXH ngay khi ký HĐLĐ, khám sức khỏe định kỳ và các chế độ khác theo quy định của Pháp luật.\u003c/p\u003e\u003cp\u003e- Hoạt động, sự kiện nội bộ được tổ chức thường xuyên, team building hằng năm (CLB Thể thao, Happy Friday, Sharing Book,...)\u003c/p\u003e\u003cp\u003e- Ưu đãi mua sản phẩm hấp dẫn khi trở thành nhân viên Coolmate\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Sự phát triển nghề nghiệp:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Luôn có cơ hội cho bạn tiếp nhận những thử thách trong công việc để học hỏi cái mới và phát triển bản thân.\u003c/p\u003e\u003cp\u003e- Các buổi chia sẻ kiến thức ngoại tuyến và trực tuyến rất đa dạng được cung cấp bởi thành viên trong/ngoài Công ty.\u003c/p\u003e\u003cp\u003e- Cơ hội thăng tiến rõ ràng cho tất cả các vị trí.\u003c/p\u003e\u003cp\u003e- Được đào tạo hoặc được tài trợ các khóa đào tạo để nâng cao năng lực chuyên môn/quản lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3. Môi trường làm việc:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Văn phòng Coolmate linh hoạt hướng đến không gian mở được trang bị đầy đủ tiện nghi gồm: Khu vực ăn trưa, kệ đồ ăn vặt, khu vực thư giãn, giải trí (chơi game, xem phim, đọc sách…).\u003c/p\u003e\u003cp\u003e- Thúc đẩy văn hóa đọc sách bằng việc tài trợ sách và tổ chức các chương trình liên quan đến sách.\u003c/p\u003e\u003cp\u003e- Các hoạt động nội bộ được tổ chức phong phú, đa dạng theo tuần/tháng/quý dù bạn làm việc tại nhà hay trực tiếp tại văn phòng.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T869,"])</script><script>self.__next_f.push([1,"Coolmate là thương hiệu thời trang được thành lập tại Việt Nam với sứ mệnh mang đến những sản phẩm chất lượng, trải nghiệm mua sắm tiện lợi và giá trị bền vững cho khách hàng. Từ một startup công nghệ trong lĩnh vực thời trang, Coolmate đã nhanh chóng phát triển thành một trong những D2C (Direct-to-Consumer) fashion brands tiêu biểu tại Việt Nam, phục vụ hàng trăm nghìn khách hàng trong và ngoài nước.\r\n\r\nCoolmate tập trung phát triển các dòng sản phẩm thời trang thiết yếu với thiết kế tối giản, chất lượng cao và giá cả hợp lý. Bên cạnh đó, công ty không ngừng đổi mới mô hình kinh doanh để xây dựng hệ sinh thái đa kênh, bao gồm: \r\n   - E-commerce \u0026 Marketplace \r\n   - Retail Offline, Franchise \r\n   - B2B \u0026 Corporate Solutions  \r\n   - Global eCommerce \u0026 International Markets \r\n\r\nCoolmate hiện đang mở rộng hoạt động kinh doanh ra thị trường quốc tế như Mỹ và các nước Đông Nam Á, đồng thời phát triển các giải pháp B2B cho doanh nghiệp như đồng phục và sản phẩm may mặc theo yêu cầu. Mục tiêu của chúng tôi là xây dựng một thương hiệu thời trang Việt Nam có năng lực cạnh i nghiệm mua sắm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đề xuất cải tiến UI/UX trang web để cải thiện trải nghiệm khách hàng và tăng hiệu suất bán hàng.\u003c/p\u003e\u003cp\u003e- Thu thập feedback từ người dùng và phối hợp với bộ phận tech để cải thiện website.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Phân tích thị trường và hành vi người dùng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Theo dõi xu hướng mua sắm, sản phẩm bán chạy, và phân khúc khách hàng tiềm năng.\u003c/p\u003e\u003cp\u003e- Đưa ra các insight nhằm định hướng phát triển sản phẩm, nội dung và hoạt động kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Phối hợp liên phòng ban\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Làm việc chặt chẽ với Marketing để lên kế hoạch truyền thông hỗ trợ bán hàng.\u003c/p\u003e\u003cp\u003e- Phối hợp với bộ phận Data để theo dõi, phân tích hành vi người dùng và hiệu quả chiến dịch.\u003c/p\u003e\u003cp\u003e- Làm việc với Team Vận hành \u0026 CSKH để đảm bảo trải nghiệm mua hàng suôn sẻ.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T1394,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1. Kinh nghiệm:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Từ 03 năm kinh nghiệm ở vị trí Phát triển Kinh doanh Online (Website, Thương mại điện tử) lĩnh vực thời trang, mỹ phẩm, FMCG,...\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Học vấn:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp đại học các ngành liên quan như Quản trị kinh doanh, Kinh doanh quốc tế, Thương mại điện tử,...\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3. Kỹ năng chuyên môn\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Có nền tảng tốt về Website E-commerce và các chỉ số kinh doanh quan trọng như: Conversion Rate (CR), AOV, Retention Rate, Traffic, Revenue/Session, ROI\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Khả năng lập và triển khai Kế hoạch Kinh doanh\u003c/strong\u003e định kỳ (tháng/quý) cho kênh Website, bao gồm dự báo doanh thu và ngân sách khuyến mãi.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Am hiểu về các công cụ phân tích dữ liệu như Google Analytics (GA4)\u003c/strong\u003e, Power BI, hoặc các nền tảng phân tích E-commerce khác để theo dõi hiệu suất và đưa ra Insights.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4. Kỹ năng mềm\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng Phân tích Dữ liệu (Data Analysis):\u003c/strong\u003e Khả năng đọc, hiểu, phân tích dữ liệu kinh doanh phức tạp và chuyển đổi thành hành động cụ thể.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng Quản lý Dự án và Tổ chức:\u003c/strong\u003e Khả năng quản lý nhiều chiến dịch và dự án cùng lúc, đảm bảo đúng tiến độ và chất lượng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng Giao tiếp \u0026 Phối hợp liên phòng ban:\u003c/strong\u003e Khả năng làm việc hiệu quả với các đội nhóm khác (Marketing, Data, Tech/Product, Vận hành, CSKH) để đạt mục tiêu chung.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Tư duy Tối ưu hóa:\u003c/strong\u003e Luôn tìm kiếm cơ hội để cải thiện hiệu suất bán hàng và trải nghiệm người dùng (UX/UI).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e5. Kỹ năng lãnh đạo\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kỹ năng tổ chức \u0026 sắp xếp công việc khoa học\u003c/p\u003e\u003cp\u003e- Quản lý thời gian và hiệu quả công việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e6. Phẩm chất tính cách\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tinh thần làm
