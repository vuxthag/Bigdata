42\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tb63,"])</script><script>self.__next_f.push([1,"•Giới thiệu sơ lược về công ty:\r\n\r\nĐược thành lập vào năm 1992, TTT Corporation là một trong những công ty hàng đầu Việt Nam  trong lĩnh vực thiết kế, trang trí và thi công nội thất; sản xuất và cung cấp sản phẩm nội thất trên nhiều hạng mục công trình như khách sạn, khu nghỉ mát (resorts), căn hộ cao cấp và văn phòng.\r\n\r\nTính đến nay, TTT đã thực hiện được hơn 5000 dự án cho hơn 2000 khách hàng trong đó: Sheraton, Pullman, Vinpearl, Novotel, Somerset, Unilever, Adidas, Deloitte, Erns \u0026 Young, HSBC, Pepsi, Vietnam Airline, California Fitness \u0026 Yoga, Citibank, Intel, P\u0026G …\r\n\r\n24 năm qua, với đội ngũ 400 nhân viên và 800 công nhân chuyên nghiệp, TTT đã xây dựng nên một gia đình giàu truyền thống và đậm nét văn hóa từ những con người TTT đầy sáng tạo, uy tín, có tinh thần đồng đội, khả năng chịu áp lực công việc cao và luôn luôn cầu tiến. \r\n\r\n•Tại sao bạn nên gia nhập vào gia đình TTT của chúng tôi:\r\n\r\nTrở thành thành viên của TTT Corporation bạn có quyền tự hào vì: \r\n\r\nĐược gia nhập vào đội ngũ 400 nhân viên và 800 công nhân chuyên nghiệp ở một công ty hàng đầu Việt Nam trong lĩnh vực thiết kế, thi công, trang trí nội thất cao cấp.\r\n\r\nHòa mình vào văn hóa đặc trưng của công ty với mô hình “công ty vui vẻ: làm tới nơi chơi tới bến”. Những hoạt động đầy ắp tiếng cười (team building, lễ hội, họp mặt, sinh hoạt nội bộ, văn hóa văn nghệ,…) gắn kết đồng nghiệp, gắn kết công việc.\r\n\r\nCùng TTT đi đầu thực hiện những hoạt động cộng đồng mang tính nhân văn với quy mô lớn và chuyên nghiệp (tổ chức xây dựng các công trình cho cộng đồng, các chương trình cho trẻ em nghèo, người khuyết tật, gây quỹ ủng hộ chi phí điều trị trẻ em ung bướu,…)\r\n\r\nTrải nghiệm các ứng dụng công nghệ ERP, CRM, và đặc biệt là Project Central … tiên tiến mà công ty đã triển khai vào các hoạt động sản xuất kinh doanh của doanh nghiệp.\r\n\r\nĐược tạo điều kiện phát triển sự sáng tạo, tài năng, thăng tiến và hưởng chế độ đãi ngộ tương xứng trong môi trường chuyên nghiệp, nơi mà TTT Corporation luôn chú trọng việc nghiên cứu và ứng dụng hệ thống chính sách nhân sự mới.\r\n\r\nRất vui mừng chào đón bạn gia nhập đại gia đình TTT. Hãy làm việc và cùng trải nghiệm với chúng tôi.\r\n\r\n* Để biết thêm thông tin chi tiết về công ty, vui lòng tham khảo tại website: www.ttt.vn và tại fanpage: https://www.facebook.com/TTTCorporation/"])</script><script>self.__next_f.push([1,"24:Tb63,"])</script><script>self.__next_f.push([1,"•Giới thiệu sơ lược về công ty:\r\n\r\nĐược thành lập vào năm 1992, TTT Corporation là một trong những công ty hàng đầu Việt Nam  trong lĩnh vực thiết kế, trang trí và thi công nội thất; sản xuất và cung cấp sản phẩm nội thất trên nhiều hạng mục công trình như khách sạn, khu nghỉ mát (resorts), căn hộ cao cấp và văn phòng.\r\n\r\nTính đến nay, TTT đã thực hiện được hơn 5000 dự án cho hơn 2000 khách hàng trong đó: Sheraton, Pullman, Vinpearl, Novotel, Somerset, Unilever, Adidas, Deloitte, Erns \u0026 Young, HSBC, Pepsi, Vietnam Airline, California Fitness \u0026 Yoga, Citibank, Intel, P\u0026G …\r\n\r\n24 năm qua, với đội ngũ 400 nhân viên và 800 công nhân chuyên nghiệp, TTT đã xây dựng nên một gia đình giàu truyền thống và đậm nét văn hóa từ những con người TTT đầy sáng tạo, uy tín, có tinh thần đồng đội, khả năng chịu áp lực công việc cao và luôn luôn cầu tiến. \r\n\r\n•Tại sao bạn nên gia nhập vào gia đình TTT của chúng tôi:\r\n\r\nTrở thành thành viên của TTT Corporation bạn có quyền tự hào vì: \r\n\r\nĐược gia nhập vào đội ngũ 400 nhân viên và 800 công nhân chuyên nghiệp ở một công ty hàng đầu Việt Nam trong lĩnh vực thiết kế, thi công, trang trí nội thất cao cấp.\r\n\r\nHòa mình vào văn hóa đặc trưng của công ty với mô hình “công ty vui vẻ: làm tới nơi chơi tới bến”. Những hoạt động đầy ắp tiếng cười (team building, lễ hội, họp mặt, sinh hoạt nội bộ, văn hóa văn nghệ,…) gắn kế
