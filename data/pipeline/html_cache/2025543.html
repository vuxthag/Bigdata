"])</script><script>self.__next_f.push([1,"Công ty CP Xuất nhập khẩu Tổng hợp Hà Nội (Tập đoàn GELEXIMCO) thành lập ngày 09 tháng 01 năm 1993 dưới hình thức Công ty TNHH, chuyển đổi thành công ty cổ phần ngày 13 tháng 04 năm 2007. Hiện nay, GELEXIMCO đang nhanh chóng phát triển thành một tập đoàn kinh tế như một xu thế phát triển tất yếu trong thời đại toàn cầu hóa, đánh dấu bước ngoặt lớn trên chặng đường xây dựng, trưởng thành và phát triển.\r\n\r\nVới đội ngũ hơn 6.000 cán bộ, công nhân viên; 06 chi nhánh tại Hà Tây, Hòa Bình, Lạng Sơn, Cần Thơ, Quảng Ninh, Thái Bình; 20 công ty thành viên, hàng chục công ty liên doanh, liên kết hoạt động trên địa bàn cả nước, Tập đoàn đã liên kết với hàng chục công ty hàng đầu của nước ngoài trong lĩnh vực sản xuất công nghiệp nhằm đầu tư công nghệ hiện đại, đa dạng hóa sản phẩm, luôn đáp ứng yêu cầu khắt khe của khách hàng và trở thành thương hiệu quen thuộc trên thị trường. Hiện nay, Tập đoàn đang đầu tư xây dựng một số dự án lớn trong lĩnh vực sản xuất công nghiệp: Nhà máy Xi măng Thăng Long (Quảng Ninh), Nhà máy Bột giấy và Giấy An Hòa (Tuyên Quang), Nhà máy Nhiệt điện Thăng Long (Quảng Ninh)… Hạ tầng, bất động sản cũng là một thế mạnh của GELEXIMCO với nhiều dự án nhóm A, tiêu biểu có các khu đô thị: Cái Dăm (37,04 ha) tại Quảng Ninh, Lê Trọng Tấn (135 ha) tại Hà Nội, Đồng Trúc - Ngọc Liệp (250 ha) tại Quốc Oai – Hà Nội, Phú Mãn (461,2 ha) tại Hà Nội; Láng - Hòa Lạc kéo dài tại Hà Nội; 02 khách sạn tiêu chuẩn quốc tế 4 sao và 5 sao; các trung tâm thương mại…\r\n\r\nGELEXIMCO phấn đấu để trở thành tập đoàn hàng đầu về đầu tư trong các lĩnh vực: tài chính ngân hàng, sản xuất công nghiệp, bất động sản, công nghệ thông tin/đào tạo và dịch vụ thương mại mang tính chuyên nghiệp cao và liên tục hoàn thiện trong đó sản xuất công nghiệp là lĩnh vực trọng tâm ưu tiên phát triển; được mở rộng có chọn lọc với mục tiêu xây dựng và chia sẻ các giá trị bền vững cho doanh nghiệp, đối tác và cộng đồng."])</script><script>self.__next_f.push([1,"24:T14c4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.\tTiếp đón khách:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.1\tĐón tiếp khách, hướng dẫn, chỉ dẫn cho khách:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐón tiếp, chào đón khách đến làm việc, giao dịch với Tập đoàn, Tòa nhà theo chính sách và quy trình của Tập đoàn và Ban quản lý tòa nhà, với sự chuyên nghiệp, vui vẻ, thân thiện.\u003c/p\u003e\u003cp\u003e-\tKhéo léo, tinh tế để tạo cho khách hàng thoải mái, vui vẻ khi vào Tòa nhà, văn phòng làm việc của Tập đoàn.\u003c/p\u003e\u003cp\u003e-\tThu thập, tiếp nhận thông tin và nhu cầu của khách.\u003c/p\u003e\u003cp\u003e-\tLàm thủ tục đăng ký vào ra tòa nhà cho khách.\u003c/p\u003e\u003cp\u003e-\tHướng dẫn và giúp đỡ khách đến khu vực họ cần (vị trí thang máy, số tầng, số phòng họp, phòng làm việc, văn phòng, nhà hàng…) theo yêu cầu công việc của khách.\u003c/p\u003e\u003cp\u003e-\tThông báo cho các đơn vị/ cá nhân liên quan để phối hợp đón tiếp và hỗ trợ khách theo yêu cầu công việc của khách.\u003c/p\u003e\u003cp\u003e-\tXử lý các tình huống khẩn cấp tại quầy lễ tân một cách bình tĩnh, khéo léo, linh hoạt và hiệu quả theo quy định, hướng dẫn của Tập đoàn và Ban quản lý tòa nhà.\u003c/p\u003e\u003cp\u003e-\tKiểm tra thẻ ra vào Tòa nhà của khách.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2 Tiếp nhận và xử lý các cuộc gọi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTiếp nhận thông tin, ghi nhận đầy đủ thông tin từ các cuộc gọi đến Tập đoàn, Ban Quản lý Tòa nhà.\u003c/p\u003e\u003cp\u003e-\tChuyển tiếp thông tin đến đơn vị/cá nhân liên quan để xử lý thông tin.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.3 Quản lý thư tín đến/đi, bưu phẩm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tNhận, phân loại, ghi nhận thông tin và chuyển tiếp thư tín/bưu phẩm đến cho các bộ phận liên quan.\u003c/p\u003e\u003cp\u003e-\tNhận, phân loại, ghi nhận thông tin và chuyển tiếp thu tín đi cho nhân viên đại diện đơn vị bưu chính.\u003c/p\u003e\u003cp\u003e-\tLưu trữ thông tin thư tín đến và đi theo quy định của Tập đoàn và Ban Quản lý tòa nhà.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.4 Quản lý tài sản:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tQuản lý các thiết bị, vật dụng tại khu vực quầy lễ tân.\u003c/p\u003e\u003cp\u003e-\tCấp phát, thu hồi thẻ khách.\u003c/p\u003e\u003cp\u003e-\tKiểm soát việc ra vào của người và phương tiện.\u003c/p\u003e\u003cp\u003e-\tTiếp nhận, quản lý và giao trả giấy tờ tùy thân của khách hàng khi khách hàng thực hiện thủ tục đăng ký vào ra tòa nhà.\u003c/p\u003e\u003cp\u003e-\tĐảm bảo khu vực lễ tân luôn sạch sẽ, gọn gàng, chuẩn mực.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.5 Cập nhật thông tin khách và thông tin từ các cuộc gọi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tCập nhật thông tin khách vào và ra Tòa nhà, Văn phòng Tập đoàn vào hệ thống quản lý.\u003c/p\u003e\u003cp\u003e-\tCập nhật thông tin từ các cuộc gọi đến Tập đoàn, Ban Quản lý tòa nhà và quá trình chuyển tiếp thông tin đến các đơn vị liên quan.\u003c/p\u003e\u003cp\u003e-\tCập nhật các thông tin từ các đối tượng khác giao tiếp trực tiếp tại quầy lễ tân khi họ muốn được giải đáp thắc mắc, tìm hiểu thông tin liên quan đến Tập đoàn, Ban quản lý tòa nhà\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tLễ tân - Khánh Tiết các sự kiện đối ngoại của Tập đoàn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.1\tTiếp đón khách tham dự sự kiện:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tPhụ trách nhiệm vụ đứng tại các sảnh chính, cầu thang, lối đi của tòa nhà, sự kiện để tiếp đón khách đến tham dự.\u003c/p\u003e\u003cp\u003e-\tChào hỏi theo đúng yêu cầu của chương trình, tiếp nhận thông tin khách mời, hướng dẫn check in và dẫn khách vào đúng vị trí ngồi, cung cấp các thông tin cần thiết về sự kiện cho khách mời theo yêu cầu của Ban tổ chức.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.2 Hỗ trợ các hoạt động sự kiện:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tChuẩn bị các vật phẩm cần thiết cho sự kiện theo yêu cầu của Ban tổ chức.\u003c/p\u003e\u003cp\u003e-\tGiải đáp/hoặc hỗ trợ/hoặc kết nối với đơn vị liên quan để giải đáp những thắc mắc/yêu cầu của khách trước và trong khi sự kiện đối ngoại diễn ra.\u003c/p\u003e\u003cp\u003e-\tChuyển mic cho khách mời, diễn giả, … trong quá trình trao đổi, đối thoại của buổi hội nghị, hội thảo.\u003c/p\u003e\u003cp\u003e-\tThực hiện một số nhiệm vụ để hỗ trợ các bộ phận khác trong hội nghị như chuẩn bị nước, đồ ăn nhẹ, tài liệu, trao quà tặng… theo phân công của Người chủ tổ chức sự kiện.\u003c/p\u003e\u003cp\u003e-\tPhối hợp cùng các bộ phận khác để giải quyết, xử lý các sự cố phát sinh có thể gây ảnh hưởng đến tiến độ diễn ra sự kiện cũng như trải nghiệm của khách tại sự kiện.\u003c/p\u003e\u003cp\u003e-\tBáo cáo tình hình sự kiện cho phụ trách nhóm hoặc ban tổ chức theo phân công.\u003c/p\u003e\u003cp\u003e-\tHỗ trợ các hoạt động trong suốt sự kiện theo yêu cầu của Ban tổ chức/Người chủ trì.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Thực hiện theo chỉ đạo của cấp quản lý trực tiếp và cấp có thẩm quyền\u003c/strong\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T5d3,\u003cp\u003e\u003cstrong\u003eYêu cầu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tTrình độ: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e-\tTốt nghiệp Đại học, ưu tiên các trường Ngoại thương, Báo chí, Quốc gia, Kinh tế quốc dân;\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tKiến thức và kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u  Nội, Phú Mãn (461,2 ha) tại Hà Nội; Láng - Hòa Lạc kéo dài tại Hà Nội; 02 khách sạn tiêu chuẩn quốc tế 4 sao và 5 sao; các trung tâm thương mại…\r\n\r\nGELEXIMCO phấn đấu để trở thành tập đoàn hàng đầu về đầu tư trong các lĩnh vực: tài chính ngân hàng, sản xuất công nghiệp, bất động sản, công nghệ thông tin/đào tạo và dịch vụ thương mại mang tính chuyên nghiệp cao và liên tục hoàn thiện trong đó sản xuất công nghiệp là lĩnh vực trọng tâm ưu tiên phát triển; được mở rộng có chọn lọc với mục tiêu xây dựng và chia sẻ các giá trị bền vững cho doanh nghiệp, đối tác và cộng đồng."])</script><script>self.__next_f.push([1,"2a:T14c4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.\tTiếp đón khách:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.1\tĐón tiếp khách, hướng dẫn, chỉ dẫn cho khách:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐón tiếp, chào đón khách đến làm việc, giao dịch với Tập đoàn, Tòa nhà theo chính sách và quy trình của Tập đoàn và Ban quản lý tòa nhà, với sự chuyên nghiệp, vui vẻ, thân thiện.\u003c/p\u003e\u003cp\u003e-\tKhéo léo, tinh tế để tạo cho khách hàng thoải mái, vui vẻ khi vào Tòa nhà, văn phòng làm việc của Tập đoàn.\u003c/p\u003e\u003cp\u003e-\tThu thập, tiếp nhận thông tin và nhu cầu của khách.\u003c/p\u003e\u003cp\u003e-\tLàm thủ tục đăng ký vào ra tòa nhà cho khách.\u003c/p\u003e\u003cp\u003e-\tHướng dẫn và giúp đỡ khách đến khu vực họ cần (vị trí thang máy, số tầng, số phòng họp, phòng làm việc, văn phòng, nhà hàng…) theo yêu cầu công việc của khách.\u003c/p\u003e\u003cp\u003e-\tThông báo cho các đơn vị/ cá nhân liên quan để phối hợp đón tiếp và hỗ trợ khách theo yêu cầu công việc của khách.\u003c/p\u003e\u003cp\u003e-\tXử lý các tình huống khẩn cấp tại quầy lễ tân một cách bình tĩnh, khéo léo, linh hoạt và hiệu quả theo quy định, hướng dẫn của Tập đoàn và Ban quản lý tòa nhà.\u003c/p\u003e\u003cp\u003e-\tKiểm tra thẻ ra vào Tòa nhà của khách.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2 Tiếp nhận và xử lý các cuộc gọi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTiếp nhận thông tin, ghi nhận đầy đủ thông tin từ các cuộc gọi đến Tập đoàn, Ban Quản lý Tòa nhà.\u003c/p\u003e\u003cp\u003e-\tChuyển tiếp thông tin đến đơn vị/cá nhân liên quan để xử lý thông tin.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.3 Quản lý thư tín đến/đi, bưu phẩm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tNhận, phân loại, ghi nhận thông tin và chuyển tiếp thư tín/bưu phẩm đến cho các bộ phận liên quan.\u003c/p\u003e\u003cp\u003e-\tNhận, phân loại, ghi nhận thông tin và chuyển tiếp thu tín đi cho nhân viên đại diện đơn vị bưu chính.\u003c/p\u003e\u003cp\u003e-\tLưu trữ thông tin thư tín đến và đi theo quy định của Tập đoàn và Ban Quản lý tòa nhà.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.4 Quản lý tài sản:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tQuản lý các thiết bị, vật dụng tại khu vực quầy lễ tân.\u003c/p\u003e\u003cp\u003e-\tCấp phát, thu hồi thẻ khách.\u003c/p\u003e\u003cp\u003e-\tKiểm soát việc ra vào của người và phương tiện.\u003c/p\u003e\u003cp\u003e-\tTiếp nhận, quản lý và giao trả giấy tờ tùy thân của khách hàng khi khách hàng thực hiện thủ tục đăng ký vào ra tòa nhà.\u003c/p\u003e\u003cp\u003e-\tĐảm bảo khu vực lễ tân luôn sạch sẽ, gọn gàng, chuẩn mực.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.5 Cập nhật thông tin khách và thông tin từ các cuộc gọi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tCập nhật thông tin khách vào và ra Tòa nhà, Văn phòng Tập đoàn vào hệ thống quản lý.\u003c/p\u003e\u003cp\u003e-\tCập nhật thông tin từ các cuộc gọi đến Tập đoàn, Ban Quản lý tòa nhà và quá trình chuyển tiếp thông tin đến các đơn vị liên quan.\u003c/p\u003e\u003cp\u003e-\tCập nhật các thông tin từ các đối tượng khác giao tiếp trực tiếp tại quầy lễ tân khi họ muốn được giải đáp thắc mắc,
