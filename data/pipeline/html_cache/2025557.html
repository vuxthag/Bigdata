e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Key Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• What are the 5 - 7 Responsibilities for this position?\u003c/p\u003e\u003cp\u003e• What are the most frequent and most important essential work activities, teams, and outcomes they are responsible for?\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Inventory Strategy \u0026 Management:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Lead inventory planning and allocation strategy across all e-commerce channels.\u003c/p\u003e\u003cp\u003e• Coordinate with Supply Chain and Warehouse teams to ensure optimal stock levels.\u003c/p\u003e\u003cp\u003e• Forecast inventory demand for major campaigns (Mega Campaigns, Flash Sales, Livestream events).\u003c/p\u003e\u003cp\u003e• Monitor inventory performance including: Sell-through rate, Stock coverage, Days of inventory, Slow-moving SKUs.\u003c/p\u003e\u003cp\u003e• Develop strategies to prevent stock-outs or overstock situations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Campaign Strategy \u0026 Execution:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Develop and oversee the annual and monthly campaign calendar across e-commerce platforms.\u003c/p\u003e\u003cp\u003e• Lead execution of major platform campaigns such as: Mega Campaigns, Flash Sales, Brand Day campaigns.\u003c/p\u003e\u003cp\u003e• Work closely with Marketing, Design, and Content teams to ensure campaign readiness, including: Promotional strategy, Landing pages, Campaign creatives.\u003c/p\u003e\u003cp\u003e• Evaluate campaign performance and continuously optimize sales strategies.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. P\u0026L Ownership \u0026 Commercial Strategy:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Own the P\u0026L performance of the e-commerce business.\u003c/p\u003e\u003cp\u003e• Monitor and manage
