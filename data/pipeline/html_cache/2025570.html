ic/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Taf6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. GIỚI THIỆU VỀ VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGreen i-Park Định An – chủ đầu tư Khu công nghiệp Ngũ Lạc (Green iP-2) tại tỉnh Vĩnh Long – đang triển khai dự án đầu tư hạ tầng khu công nghiệp. Để đẩy nhanh tiến độ công tác giải phóng mặt bằng (GPMB) và hoàn thiện thủ tục pháp lý đất đai, chúng tôi cần tuyển dụng nhân sự có năng lực, hiểu rõ thực địa và pháp luật đất đai tại địa bàn tỉnh Vĩnh Long (bao gồm địa bàn Trà Vinh trước khi sáp nhập).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. MÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.1. Công tác giải phóng mặt bằng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các cơ quan Nhà nước (UBND cấp xã, Sở NN\u0026MT, Hội đồng bồi thường hỗ trợ và tái định cư xã) triển khai kế hoạch GPMB theo đúng quy trình pháp luật.\u003c/p\u003e\u003cp\u003e•\tTrực tiếp tiếp xúc, vận động, thuyết phục người dân trong vùng quy hoạch dự án chấp hành chủ trương thu hồi đất, nhận bồi thường và bàn giao mặt bằng đúng tiến độ.\u003c/p\u003e\u003cp\u003e•\tLập, kiểm tra, đối chiếu hồ sơ đất đai từng hộ (diện tích, loại đất, nguồn gốc, hiện trạng sử dụng, tài sản gắn liền với đất).\u003c/p\u003e\u003cp\u003e•\tHỗ trợ kiểm kê tài sản, lên phương án bồi thường, hỗ trợ, tái định cư theo quy định.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, đôn đốc và báo cáo tiến độ GPMB định kỳ cho cấp trên.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.2. Thủ tục pháp lý đất đai\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tSoạn thảo, hoàn thiện và theo dõi các hồ sơ pháp lý: quyết định thu hồi đất, phương án bồi thường, thông báo, biên bản kiểm kê, biên bản bàn giao mặt bằng.\u003c/p\u003e\u003cp\u003e•\tThực hiện thủ tục đăng ký đất đai, cấp Giấy chứng nhận quyền sử dụng đất liên quan đến dự án (nếu được giao).\u003c/p\u003e\u003cp\u003e•\tTra cứu, tổng hợp và cập nhật các văn bản pháp luật về đất đai, bồi thường, hỗ trợ GPMB có liên quan.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ xử lý các khiếu nại, tranh chấp phát sinh trong quá trình GPMB; phối hợp với bộ phận pháp lý để giải quyết.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.3. Hành chính – Báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLập báo cáo tiến độ GPMB hàng tuần / tháng gửi Ban Quản lý dự án và cơ quan Nhà nước có thẩm quyền.\u003c/p\u003e\u003cp\u003e•\tLưu trữ, quản lý hồ sơ GPMB đầy đủ, khoa học theo yêu cầu của pháp luật và quy trình nội bộ.\u003c/p\u003e\u003cp\u003e•\tThực hiện các nhiệm vụ khác theo phân công của Trưởng bộ phận / Ban Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tbef,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn \u0026 chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học (hoặc Cao đẳng có kinh nghiệm thực tế) các ngành:\u003c/p\u003e\u003cp\u003e–\tQuản lý đất đai, Tài nguyên môi trường, Bất động sản\u003c/p\u003e\u003cp\u003e–\tLuật (ưu tiên Luật đất đai, Luật dân sự, Luật hành chính)\u003c/p\u003e\u003cp\u003e–\tQuản trị kinh doanh, Kinh tế, Tài chính – Kế toán\u003c/p\u003e\u003cp\u003e–\tHoặc ngành khác có kinh nghiệm thực tế liên quan đến GPMB / pháp lý đất đai\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó từ 1 – 3 năm kinh nghiệm trong lĩnh vực giải phóng mặt bằng, bồi thường hỗ trợ tái định cư hoặc thủ tục pháp lý đất đai.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có kinh nghiệm làm việc tại các dự án khu công nghiệp, hạ tầng, đô thị tại khu vực đồng bằng sông Cửu Long.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên đã từng làm việc tại cơ quan Nhà nước liên quan (UBND xã/huyện, Văn phòng đăng ký đất đai, Sở NN\u0026MT).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kỹ năng \u0026 tố chất\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAm hiểu Luật Đất đai 2024 và các Nghị định, Thông tư hướng dẫn hiện hành về bồi thường, hỗ trợ, tái định cư.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp, thuyết phục tốt – kiên nhẫn, khéo léo trong tiếp xúc với người dân, đặc biệt người dân có đất trong vùng dự án.\u003c/p\u003e\u003cp\u003e•\tThành thạo vi tính văn phòng (Word, Excel); có khả năng soạn thảo văn bản hành chính, pháp lý.\u003c/p\u003e\u003cp\u003e•\tTrung thực, có trách nhiệm; chịu được áp lực công việc và đi công tác thực địa thường xuyên.\u003c/p\u003e\u003cp\u003e•\tCó phương tiện đi lại cá nhân (xe máy); có bằng lái xe (ưu tiên).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Ưu tiên đặc biệt\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\t  Người địa phương tỉnh Vĩnh Long (bao gồm địa bàn Trà Vinh cũ) – hiểu phong tục, ngôn ngữ, địa hình địa bàn.\u003c/p\u003e\u003cp\u003e•\t  Nam giới – phù hợp yêu cầu công tác thực địa, đi lại nhiều.\u003c/p\u003e\u003cp\u003e•\t  Có mối quan hệ tốt với các cơ quan hành chính địa phương (UBND, Sở, Phòng ban) tại Vĩnh Long.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI \u0026 CHẾ ĐỘ ĐÃI NGỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương cạnh tranh, thỏa thuận theo năng lực thực tế (trao đổi trực tiếp khi phỏng vấn).\u003c/p\u003e\u003cp\u003e•\tThưởng tiến độ GPMB theo từng giai đoạn bàn giao mặt bằng của dự án.\u003c/p\u003e\u003cp\u003e•\tĐược đóng đầy đủ BHXH, BHYT, BHTN theo quy định của pháp luật.\u003c/p\u003e\u003cp\u003e•\tPhụ cấp xăng xe, điện thoại; hỗ trợ chi phí đi lại thực địa.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc chuyên nghiệp, được đào tạo nghiệp vụ và cập nhật pháp luật thường xuyên.\u003c/p\u003e\u003cp\u003e•\tCơ hội thăng tiến lên vị trí Chuyên viên GPMB / Trưởng nhóm GPMB khi dự án mở rộng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Taf6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. GIỚI THIỆU VỀ VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGreen i-Park Định An – chủ đầu tư Khu công nghiệp Ngũ Lạc (Green iP-2) tại tỉnh Vĩnh Long – đang triển khai dự án đầu tư hạ tầng khu công nghiệp. Để đẩy nhanh tiến độ công tác giải phóng mặt bằng (GPMB) và hoàn thiện thủ tục pháp lý đất đai, chúng tôi cần tuyển dụng nhân sự có năng lực, hiểu rõ thực địa và pháp luật đất đai tại địa bàn tỉnh Vĩnh Long (bao gồm địa bàn Trà Vinh trước khi sáp nhập).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. MÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.1. Công tác giải phóng mặt bằng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các cơ quan Nhà nước (UBND cấp xã, Sở NN\u0026MT, Hội đồng bồi thường hỗ trợ và tái định cư xã) triển khai kế hoạch GPMB theo đúng quy trình pháp luật.\u003c/p\u003e\u003cp\u003e•\tTrực tiếp tiếp xúc, vận động, thuyết phục người dân trong vùng quy hoạch dự án chấp hành chủ trương thu hồi đất, nhận bồi thường và bàn giao mặt bằng đúng tiến độ.\u003c/p\u003e\u003cp\u003e•\tLập, kiểm tra, đối chiếu hồ sơ đất đai từng hộ (diện tích, loại đất, nguồn gốc, hiện trạng sử dụng, tài sản gắn liền với đất).\u003c/p\u003e\u003cp\u003e•\tHỗ trợ kiểm kê tài sản, lên phương án bồi thường, hỗ trợ, tái định cư theo quy định.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, đôn đốc và báo ổi trực tiếp khi phỏng vấn).\u003c/p\u003e\u003cp\u003e•\tThưởng tiến độ GPMB theo từng giai đoạn bàn giao mặt bằng của dự án.\u003c/p\u003e\u003cp\u003e•\tĐược đóng đầy đủ BHXH, BHYT, BHTN theo quy định của pháp luật.\u003c/p\u003e\u003cp\u003e•\tPhụ cấp xăng xe, điện thoại; hỗ trợ chi phí đi lại thực địa.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc chuyên nghiệp, được đào tạo nghiệp vụ và cập nhật pháp luật thường xuyên.\u003c/p\u003e\u003cp\u003e•\tCơ hội thăng tiến lên vị trí Chuyên viên GPMB / Trưởng nhóm GPMB khi dự án mở rộng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2a:{\"skillName\":\"Bồi Thường\",\"skillId\":13836,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Giải Phóng Mặt Bằng\",\"skillId\":123259,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Quản Lý Hồ Sơ\",\"skillId\":4483,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Quản Lý Đất Đai\",\"skillId\":119580,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Tư Vấn Luật Đất Đai\",\"skillId\":381955,\"skillWeight\":100,\"isExisted\":false}\n29:[\"$2a\",\"$2b\",\"$2c\",\"$2d\",\"$2e\"]\n30:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"Thưởng các ngày lễ, tết, quà tặng các ngày như sinh nhật, 8/3\"}\n31:{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"Được tham gia đầy đủ các loại bảo hiểm theo quy định của nhà nước\"}\n32:{\"benefitId\":3,\"benefitIconName\":\"fa-file-image-o\",\"benefitName\":\"Paid Leave\",\"benefitNameVI\":\"Nghỉ phép có lương\",\"benefitValue\":\"Nghỉ thứ 7, chủ nhật và các ngày Lễ, Tết theo quy định của nhà nước\"}\n33:{\"benefitId\":4,\"benefitIconName\":\"fa-graduation-cap\",\"benefitName\":\"Training\",\"benefitNameVI\":\"Đào tạo\",\"benefitValue\":\"Đ
