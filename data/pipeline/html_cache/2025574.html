i học chuyên ngành kỹ thuật liên quan.\u003c/p\u003e\u003cp\u003e•\tCó 1-2 năm kinh nghiệm quản lý công trường.\u003c/p\u003e\u003cp\u003e•\tỨng viên có kinh nghiệm trong ngành cửa thép/cửa cuốn, hoặc đã làm việc trong các công ty liên quan của Nhật Bản là một lợi thế, cho thấy khả năng hòa nhập và phát triển cùng\u003cstrong\u003e tầm nhìn toàn cầu hóa \u003c/strong\u003ecủa Vina-Sanwa.\u003c/p\u003e\u003cp\u003e•\tCó khả năng giao tiếp tiếng Anh là một điểm cộng\u003c/p\u003e\u003cp\u003e•\tCẩn thận, tỉ mỉ và có tinh thần trách nhiệm cao trong công việc, cam kết mang lại sản phẩm và dịch vụ chất lượng nhất cho khách hàng.\u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi hấp dẫn: Nơi nỗ lực được ghi nhận và phát triển không ngừng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eTại Vina-Sanwa, chúng tôi cam kết mang đến cho bạn một môi trường làm việc chuyên nghiệp, thân thiện và những phúc lợi xứng đáng, thể hiện sự trân trọng đối với giá trị mà từng cá nhân mang lại:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tMức lương cạnh tranh\u003c/strong\u003e khởi điểm lên tới 25 triệu/tháng, tương xứng với năng lực của bạn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng 2 lần/năm\u003c/strong\u003e cùng các khoản thưởng ngày lễ, Tết, đảm bảo mọi nỗ lực của bạn đều được ghi nhận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t\u003c/strong\u003eChế độ BHXH, BHYT, BHTN đầy đủ và các chế độ khác theo quy định của Luật Lao động.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\u003c/strong\u003e\tNgoài ngày nghỉ lễ và phép năm, bạn còn có thêm\u003cstrong\u003e 3 ngày nghỉ đặc biệt\u003c/strong\u003e theo quy định riêng của công ty.\u003c/p\u003e\u003cp\u003e•\tĐược cấp phát đồng phục, nghỉ mát và tham gia du lịch hàng năm để tái tạo năng lượng.\u003c/p\u003e\u003cp\u003e•\tCơ hội\u003cstrong\u003e tăng lương định kỳ\u003c/strong\u003e hoặc theo năng lực vượt tr
