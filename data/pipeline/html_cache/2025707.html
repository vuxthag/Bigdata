hững sản phẩm, dịch vụ và giải pháp tài chính tối ưu, đáp ứng nhu cầu đa dạng của khách hàng. Tại Vietbank, đội ngũ nhân sự luôn được xem là tài sản quý giá, đóng vai trò then chốt trong sự phát triển bền vững của ngân hàng\r\nVăn hóa và hoạt động doanh nghiệp của Vietbank thể hiện qua môi trường làm việc hòa nhập và cởi mở, ra quyết định lấy khách hàng làm trung tâm, môi trường làm việc công bằng và bình đẳng, các chương trình truyền thông nội bộ mạnh mẽ và hỗ trợ nhân viên trong các hoạt động phát triển xã hội và sự tham gia của cộng đồng. Vietbank khuyến khích và tạo điều kiện cho toàn thể cán bộ nhân viên phát triển một cách toàn diện, cả về trình độ chuyên môn lẫn kỹ năng mềm phù hợp với từng vị trí công việc, cấp bậc thông qua các chương trình đào tạo mang tính ứng dụng cao\r\nNăm 2024, trước tình hình kinh tế còn nhiều biến động và nhiều thách thức đối với ngành tài chính – ngân hàng, Vietbank đã luôn duy trì và triển khai các chính sách đối với người lao động nhằm ổn định và không ngừng phát triển chất lượng đội ngũ nhân sự để đáp ứng hoạt động kinh doanh, phục vụ tốt cho khách hàng. Cụ thể:\r\n\r\nChế độ phúc lợi: Nhân viên chính thức của Vietbank được hưởng các chương trình khám sức khỏe định kỳ hàng năm, chế độ bảo hiểm sức khỏe và tai nạn, chế độ nghỉ mát, các khoản thưởng dịp lễ, Tết…\r\nChế độ phụ cấp, bảo hiểm xã hội: Tất cả CBNV chính thức của Vietbank đều được hưởng các chế độ phụ cấp, bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp theo quy định của Luật Lao động.\r\nChính sách thưởng hiệu quả công việc hằng năm căn cứ theo kết quả hoạt động kinh doanh tại đơn vị và kết quả xếp loại cá nhân.\r\nChính sách nâng lương định kỳ: xem xét điều chỉnh tiền lương cho CBNV theo kết quả đánh giá hiệu quả làm việc định kỳ hàng năm theo quy định.\r\nChính sách thưởng hoàn thành vượt chỉ tiêu KPI đối với các vị trí cán bộ bán hàng tại Trung tâm kinh doanh.\r\nChính sách thăng tiến nghề nghiệp: Ngân hàng đã xây dựng lộ trình thăng tiến nghề nghiệp cho từng chức danh tại các đơn vị, qua đó, mỗi CBNV có thể tự định hướng và xây dựng lộ trình phát triển sự nghiệp cho bản thân.\r\nCBNV Vietbank được cung cấp gói tín dụng với lãi suất ưu đãi. Lãi suất cho vay CBNV được điều chỉnh theo kết quả hoàn thành công việc. CBNV hoàn thành công việc càng xuất sắc, lãi suất cho vay càng được điều chỉnh ưu đãi hơn.\r\nVietbank luôn khuyến khích và tạo điều kiện tốt nhất cho toàn thể cán bộ nhân viên phát triển một cách toàn diện, cả về trình độ chuyên môn lẫn kỹ năng mềm phù hợp với từng vị trí công việc, cấp bậc thông qua các chương trình đào tạo mang tính ứng dụng cao.\r\n\r\nSố hóa hoạt động đào tạo được đẩy mạnh với những cải tiến quan trọng nhằm nâng cao trải nghiệm của các cán bộ nhân viên từ đó thúc đẩy tinh thần tự học. Các chương trình đào tạo được triển khai thông qua đa dạng các hình thức, bao gồm: lớp học tập trung trực tiếp, lớp học thông qua các nền tảng trực tuyến và E-learning nhằm tạo sự thuận tiện, linh hoạt về thời gian và địa điểm học tập cho CBNV."])</script><script>self.__next_f.push([1,"24:T1328,"])</script><script>self.__next_f.push([1,"Được thành lập năm 2007, Ngân hàng TMCP Việt Nam Thương Tín (Vietbank) hiện là một ngân hàng quy mô vừa, tận tâm cung cấp các sản phẩm và dịch vụ tài chính toàn diện cho khách hàng.\r\n\r\nVietbank hướng đến tầm nhìn trở thành một trong những ngân hàng bán lẻ hàng đầu tại Việt Nam, hoạt động dựa trên nền tảng Tăng trưởng - An toàn - Hiệu quả - Bền vững. Sứ mệnh của Vietbank là tối ưu hóa mọi mặt hoạt động, mang đến những giá trị thiết thực nhất cho khách hàng, đối tác, nhà đầu tư, đội ngũ cán bộ nhân viên và tích cực đồng hành cùng sự phát triển chung của cộng đồng và xã hội.\r\n\r\nGiá trị cốt lõi Vietbank hướng đến là cam kết giữ trọn uy tín trong mọi hành động. Ngân hàng không ngừng đổi mới, sáng tạo để mang đến những sản phẩm, dịch vụ và giải pháp tài chính tối ưu, đáp ứng nhu cầu đa dạng của khách hàng. Tại Vietbank, đội ngũ nhân sự luôn được xem là tài sản quý giá, đóng vai
