tatic/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tdd4,"])</script><script>self.__next_f.push([1,"1. De Heus Global\r\n\r\nTập đoàn De Heus là một tập đoàn gia đình hoạt động trên quy mô toàn cầu và dẫn đầu trong ngành thức ăn chăn nuôi. Tập đoàn được thành lập vào năm 1911, trụ sở chính đặt tại Ede – Wageningen, Hà Lan. Với hơn 80 nhà máy sản xuất ở trên 20 quốc gia, các sản phẩm của De Hueus được phân phối hơn 75 quốc gia, và mỗi ngày có hơn 8,000 nhân lực có chuyên môn đang đóng góp sức mình vào việc thực hiện các mục tiêu và hoài bão. \r\n\r\n2. De Heus Việt Nam\r\n\r\nDe Heus Việt Nam trực thuộc tập đoàn Hoàng Gia De Heus. Có mặt tại Việt Nam từ năm 2008, đến nay, sau hơn  Hơn 17 năm có mặt tại Châu Á, hiện tại chúng tôi có nhiều nhà máy sản xuất thức ăn tại Việt Nam, Myanmar, Indonesia, Ấn Độ… Việt Nam là thị trường số 1 của De Heus tại Châu Á với 18 nhà máy sản xuất thức ăn chăn nuôi, 19 trang trại di truyền giống và vật nuôi, 2 nhà máy mổ gia cầm, đứng thứ 1 về thị phần thức ăn chăn nuôi tại thị trường Việt Nam. Đặc biệt, với bước đi chiến lược, tháng 12/2021 De Heus Việt Nam đã mua lại 100% mảng sản xuất thức ăn chăn nuôi của Masan, đã vươn lên trở thành công ty sản xuất thức ăn chăn nuôi lớn nhất trong thị trường chăn nuôi độc lập.\r\n\r\nDe Heus Việt Nam cũng là đơn vị đi tiên phong và thành công trong việc kết hợp cùng nhiều đối tác phát triển các liên kết chuỗi trong sản xuất nông nghiệp về con giống chất lượng cao, sản xuất thịt sạch có truy xuất nguồn gốc và đủ tiêu chuẩn xuất khẩu, mang lại nhiều lợi ích cho người chăn nuôi và người tiêu dùng Việt. Thêm vào đó, công ty còn vinh dự đạt 4 năm liên tiếp, và De Heus được bình chọn TOP 100 nơi làm việc tốt nhất Việt Nam và Châu Á.\r\n\r\n3. Tầm nhìn chiến lược\r\n\r\nDe Heus chú trọng đầu tư vào sự phát triển bền vững của thực phẩm an toàn và lành mạnh trên toàn thế giới. Đồng thời, chúng tôi quan tâm tối đa đến việc bảo vệ khí hậu, môi trường và phúc lợi động vật.\r\n\r\nThông qua những sản phẩm của mình cùng sự am hiểu sâu sắc và kinh nghiệm tích lũy về dinh dưỡng động vật, chúng tôi đóng góp vào sự phát triển của ngành nông nghiệp, cải thiện điều kiện sống và phát triển kinh tế trong cộng đồng địa phương nơi De Heus hoạt động.\r\n\r\nChúng tôi đạt được điều này nhờ những nhân viên năng động và sáng tạo, luôn không ngừng phát triển bản thân. Cùng nhau, chúng tôi nhận trách nhiệm để hiện thực hóa tầm nhìn của mình qua từng ngày\r\n\r\n4. Sứ mệnh\r\n\r\nLà một doanh nghiệp gia đình trong lĩnh vực dinh dưỡng động vật, chúng tôi nỗ lực không ngừng đóng góp vào quá trình sản xuất bền vững thực phẩm an toàn và lành mạnh.\r\n\r\nChúng tôi thực hiện thông qua các hỗ trợ dành cho những khách hàng của mình – những nhà sản xuất thịt, cá, sữa và trứng – đồng thời liên tục cải thiện chất lượng, tính minh bạch và đồng hành xuyên suốt trong chuỗi sản xuất thực phẩm."])</script><script>self.__next_f.push([1,"24:T153a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Mục tiêu Công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm phát triển và củng cố vị thế của các sản phẩm và thương hiệu Green Chicken trên thị trường để thúc đẩy tăng trưởng thương mại. Điều này được thực hiện thông qua việc tiến hành nghiên cứu thị trường kỹ lưỡng, phát triển kế hoạch tiếp thị, tổ chức và đánh giá tác động của các sáng kiến tiếp cận thị trường. \u003c/p\u003e\u003cp\u003e- Hỗ trợ các hoạt động truyền thông nội bộ để tạo điều kiện cho sự tham gia của nhân viên trong Green Chicken liên quan đến De Heus.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Trách nhiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động chính Kết quả\u003c/p\u003e\u003cp\u003e• Thu thập và phân tích dữ liệu về thị trường thịt gà tươi/đông lạnh (mức tiêu thụ, xu hướng, kênh phân phối, hành nghiên cứu đối thủ cạnh tranh). Từ đó xây dựng kế hoạch/hoạt động tiếp thị chiến lược và khả thi.\u003c/p\u003e\u003cp\u003e• Tiến hành các nghiên cứu thị trường và đối thủ cạnh tranh khác, cũng như phân tích thị phần và thương mại. Tóm tắt dữ liệu và cập nhật cho Ban Quản lý kèm theo đề xuất nhằm tìm kiếm cơ hội thị trường và giải quyết các vấn đề kinh doanh.\u003c/p\u003e\u003cp\u003e• Xây dựng thương hiệu bằng các chiến lược tiếp thị như một phần của chiến lược tiếp cận thị trường lớn hơn. Phối hợp và thực hiện các hoạt động tiếp thị phối hợp với bộ phận kinh doanh để củng cố định vị sản phẩm và thương hiệu của Green Chicken trên thị trường để thúc đẩy tăng trưởng thương mại.\u003c/p\u003e\u003cp\u003e• Phối hợp với phòng Kinh doanh và phòng Marketing của tập đoàn:\u003c/p\u003e\u003cp\u003e- Ưu tiên và hỗ trợ Phòng Kinh doanh trong các hoạt động tiếp thị đa kênh;\u003c/p\u003e\u003cp\u003e- Đảm bảo hoàn thành công việc đúng thời hạn và chất lượng thực hiện cao.\u003c/p\u003e\u003cp\u003e- Phối hợp với Phòng Marketing của tập đoàn trong các hoạt động tiếp thị trực tuyến.\u003c/p\u003e\u003cp\u003e- Phát triển và quản lý POSM: Tạo và triển khai các vật liệu quảng cáo tại điểm bán (áp phích, wobblers, nhãn kệ quảng cáo, băng rôn, bảng treo, kệ trưng bày, v.v.), đảm bảo tính phù hợp cho từng kênh và sự hiện diện thương hiệu Green Chicken chất lượng cao tại cửa hàng.\u003c/p\u003e\u003cp\u003e• Phối hợp và thực hiện các hoạt động truyền thông nội bộ để tạo ra văn hóa công ty mạnh mẽ hơn, tăng cường liên kết sứ mệnh trên tất cả các cấp của tổ chức và cuối cùng là cải thiện sự hài lòng của nhân viên và khách hàng.\u003c/p\u003e\u003cp\u003e• Giải quyết các công việc khác được giao bởi quản lý trực tiếp.\u003c/p\u003e\u003cp\u003e--------------------------------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Job Objective\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Responsible for developing and strengthening the market position of Green Chicken products and brand to drive commercial growth. This is achieved through conducting thorough market research, developing marketing plans, organizing and evaluating the impact of market outreach initiatives.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Support internal communication activities to enhance employee engagement within Green Chicken in relation to De Heus.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eMain Activities – Expected Outcomes\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Collect and analyze data on the fresh/frozen chicken market (consumption levels, trends, distribution channels, and competitor research). Based on this analysis, develop strategic and feasible marketing plans and activities.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Conduct additional market and competitor research, as well as market share and commercial analysis. Summarize insights and report updates to Management with recommendations to identify market opportunities and address business challenges.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Build the Green Chicken brand through marketing strategies as part of a broader market outreach strategy. Coordinate and implement marketing activities in collaboration with the Sales Department to strengthen product and brand positioning in the market and support commercial growth.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Coordinate with the Sales Department and the Group Marketing Department:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003ePrioritize and support the Sales Department in multi-channel marketing activities;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eEnsure tasks are completed on time with high-quality execution;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eCollaborate with the Group Marketing Department on online marketing activities;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eDevelop and manage POSM materials: design and deploy point-of-sale advertising materials (posters, wobblers, shelf talkers, banners, hanging boards, display stands, etc.), ensuring suitability for each channel and maintaining high-quality Green Chicken brand presence at stores.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Coordinate and implement internal communication activities to build a stronger corporate culture, strengthen mission alignment across all organizational levels, and ultimately improve employee and customer satisfaction.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Perform other tasks assigned by the direct manager.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T72d,\u003cp\u003e• Tốt nghiệp đại học chuyên ngành Quản trị Kinh doanh quốc tế / Quản trị Chiến lược hoặc các ngành liên quan.• Có tối thiểu 3 năm kinh nghiệm ở vị trí tương đương. Ưu tiên ứng viên có kinh nghiệm trong ngành FMCG (hàng tiêu dùng nhanh)\u003c/p\u003e\u003cp\u003e• Đã từng tham gia chương trình đào tạo quản lý tập sự / lãnh đạo (Trainee / Leadership Program) tại các công ty đa quốc gia (MNC) trong lĩnh vực FMCG tại Việt Nam.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm quản lý dự án hoặc triển khai các hoạt động marketing BTL (Below The Line).\u003c/p\u003e\u003cp\u003e• Có hứ 1 về thị phần thức ăn chăn nuôi tại thị trường Việt Nam. Đặc biệt, với bước đi chiến lược, tháng 12/2021 De Heus Việt Nam đã mua lại 100% mảng sản xuất thức ăn chăn nuôi của Masan, đã vươn lên trở thành công ty sản xuất thức ăn chăn nuôi lớn nhất trong thị trường chăn nuôi độc lập.\r\n\r\nDe Heus Việt Nam cũng là đơn vị đi tiên phong và thành công trong việc kết hợp cùng nhiều đối tác phát triển các liên kết chuỗi trong sản xuất nông nghiệp về con giống chất lượng cao, sản xuất thịt sạch có truy xuất nguồn gốc và đủ tiêu chuẩn xuất khẩu, mang lại nhiều lợi ích cho người chăn nuôi và người tiêu dùng Việt. Thêm vào đó, công ty còn vinh dự đạt 4 năm liên tiếp, và De Heus được bình chọn TOP 100 nơi làm việc tốt nhất Việt Nam và Châu Á.\r\n\r\n3. Tầm nhìn chiến lược\r\n\r\nDe Heus chú trọng đầu tư vào sự phát triển bền vững của thực phẩm an toàn và lành mạnh trên toàn thế giới. Đồng thời, chúng tôi quan tâm tối đa đến việc bảo vệ khí hậu, môi trường và phúc lợi động vật.\r\n\r\nThông qua những sản phẩm của mình cùng sự am hiểu sâu sắc và kinh nghiệm tích lũy về dinh dưỡng động vật, chúng tôi đóng góp vào sự phát triển của ngành nông nghiệp, cải thiện điều kiện sống và phát triển kinh tế trong cộng đồng địa phương nơi De Heus hoạt động.\r\n\r\nChúng tôi đạt được điều này nhờ những nhân viên năng động và sáng tạo, luôn không ngừng phát triển bản thân. Cùng nhau, chúng tôi nhận trách nhiệm để hiện thực hóa tầm nhìn của mình qua từng ngày\r\n\r\n4. Sứ mệnh\r\n\r\nLà một doanh nghiệp gia đình trong lĩnh vực dinh dưỡng động vật, chúng tôi nỗ lực không ngừng đóng góp vào quá trình sản xuất bền vững thực phẩm an toàn và lành mạnh.\r\n\r\nChúng tôi thực hiện thông qua các hỗ trợ dành cho những khách hàng của mình – những nhà sản xuất thịt, cá, sữa và trứng – đồng thời liên tục cải thiện chất lượng, tính minh bạch và đồng hành xuyên suốt trong chuỗi sản xuất thực phẩm."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"41:{\"com
