N.\u003c/p\u003e\u003cp\u003e* Môi trường chuyên nghiệp: Năng động, hiện đại, tạo điều kiện phát triển tối đa năng lực.\u003c/p\u003e\u003cp\u003e* Phát triển bản thân: Đào tạo chuyên sâu, nâng cao kỹ năng mềm, mở rộng kiến thức ngành.\u003c/p\u003e\u003cp\u003e* Thời gian linh hoạt: Giờ hành chính, thứ 2 - sáng thứ 7.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNếu bạn là sinh viên mới tốt nghiệp có nền tảng kiến thức cơ khí vững chắc và đam mê kinh doanh, TTCTECH sẵn sàng đào tạo và phát triển bạn.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMô tả công việc vị trí Kỹ sư kinh doanh kỹ thuật:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm kinh doanh các sản phẩm dụng cụ cắt kim loại, dụng cụ đo lường chính xác, dầu tưới nguội và các sản phẩm phụ trợ công nghiệp từ các thương hiệu uy tín hàng đầu thế giới mà TTCTECH là nhà phân phối chính hãng.\u003c/p\u003e\u003cp\u003e- Tư vấn chuyên sâu về các giải pháp dụng cụ cắt, lựa chọn sản phẩm phù hợp với quy trình sản xuất và yêu cầu kỹ thuật của khách hàng trong ngành gia công cơ khí và các ngành công nghiệp liên quan.\u003c/p\u003e\u003cp\u003e- Chủ động tìm kiếm, phát triển khách hàng mới và duy trì mối quan hệ tốt đẹp với khách hàng hiện có, khai thác tối đa tiềm năng hợp tác.\u003c/p\u003e\u003cp\u003e- Nắm vững kiến thức chuyên môn sâu rộng về danh mục sản phẩm, cập nhật liên tục thông tin về sản phẩm mới và các giải pháp công nghệ tiên tiến trong ngành.\u003c/p\u003e\u003cp\u003e- Xây dựng kế hoạch kinh doanh cá nhân hiệu quả, bao gồm các hoạt động tiếp thị và phát triển khách hàng mục tiêu.\u003c/p\u003e\u003cp\u003e- Theo dõi và quản lý toàn bộ quá trình bán hàng: từ khi nhận yêu cầu, báo giá, đề xuất đặt hàng, theo dõi tiến độ giao hàng đến khi hoàn tất thanh toán và chăm sóc sau bán hàng.\u003c/p\u003e\u003cp\u003e- Báo cáo định kỳ về kết quả hoạt động kin
