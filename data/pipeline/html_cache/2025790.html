hich ensures human and material resources to serve all different requirements from our valued Customers.\r\n\r\nVisit our website at: yoosungkn.com; or our official page at: facebook.com/yoosungkn\r\n\r\n*****************\r\n\r\nĐược thành lập từ năm 2002, YOOSUNG chuyên sản xuất và kinh doanh các mặt hàng thiết bị điện và hệ thống điện công nghiệp với dải sản phẩm phong phú, đa dạng, từ đơn chiếc cho đến trọn gói dự án; bao gồm các sản phẩm tủ điện trung thế, tủ bảng điện hạ thế, trạm biến áp, máy biến áp khô, máy biến áp dầu, hệ thống bảo vệ chất lượng nguồn điện, bộ lọc sóng hài, động cơ, biến tần, vv.v.\r\n\r\nTận dụng ưu thế là nhà phân phối chính thức của ABB và Schneider trong nhiều sản phẩm, chúng tôi đã và đang là nhà cung cấp dẫn đầu các dòng sản phẩm như máy biến áp, tủ điện tại thị trường trong nước và quốc tế. Dựa vào kinh nghiệm hơn 20 năm trong ngành và mạng lưới nghề nghiệp, chúng tôi hiện có 5 văn phòng tại Hàn Quốc và Việt Nam, bao gồm 01 nhà máy sản xuất đặt tại Bắc Ninh (Việt Nam), đảm bảo nhân lực và vật lực để phục vụ mọi yêu cầu khác nhau của khách hàng.\r\n\r\nVui lòng ghé thăm website của chúng tôi tại: yoosungkn.com; hoặc trang thông tin fanpage chính thức: facebook.com/yoosungkn để biết thêm thông tin chi tiết."])</script><script>self.__next_f.push([1,"45:{\"companyId\":113223,\"jobImageURLs\":\"$46\",\"jobVideoURLs\":null,\"companyName\":\"Yoosung KN Viet Nam Co., Ltd\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/7b/11163937.png\",\"companySizeId\":\"\",\"companyProfile\":\"$47\",\"contactName\":\"Ms Chi\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"9th Floor, Charmvit Tower, 117 Tran Duy Hung, Trung Hoa Ward, Cau Giay District, Hanoi, Vietnam\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":2,\"banner
