 their production documentation to ensure compliance with the customer requirements.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2) Quality \u0026 Food Safety Monitoring\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMonitor vendor factories to ensure compliance with required quality and food safety standards.\u003c/p\u003e\u003cp\u003e•\tProactively identify and recommend improvements for any non-conformities by conducting weekly/monthly walk-through audits, verification and validation activities at the factories and issuing or reviewing CARs.\u003c/p\u003e\u003cp\u003e•\tLead external annual quality audits and follow-up of corrective and preventive actions.\u003c/p\u003e\u003cp\u003e•\tEvaluate delegation requests by factories to prevent any potential negative impacts on the products.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3) Unqualified Product Handling\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHandle customer complaints/CARs, evaluate issues and provide suitable solutions for out-of-spec products and other quality concerns.\u003c/p\u003e\u003cp\u003e•\tAnalyze root causes, coordinate with all vendor factories, and ensure the timely implementation of corrective and preventive actions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII/Operations-related tasks\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1) Production operations management \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDevelop and deliver clear, effective communication to all suppliers to ensure awareness of QA standards, program updates, and process changes.\u003c/p\u003e\u003cp\u003e•\tBuild internal control SOPs for the company to plan, schedule, monitor, and coordinate all production activities at vendor factories, ensuring efficiency, quality, and timely delivery.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2) Product Development \u0026 Sample Evaluation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCoordinate with the vendor factories on R\u0026D to develop new products.\u003c/p\u003e\u003cp\u003e•\tEvaluate the new products for the company’s upcoming projects.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3/ QA \u0026 QC Leading roles\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tOverview all the work and daily activities of the QA \u0026 QC teams.\u003c/p\u003e\u003cp\u003e•\tSupervise and resolve operational issues within the team to ensure smooth operation.\u003c/p\u003e\u003cp\u003e•\tProvide instructions and guidance on new projects, quality initiatives, or process changes.\u003c/p\u003e\u003cp\u003e•\tFinalize the QC working schedule and approve staff leave requests and overtime requests.\u003c/p\u003e\u003cp\u003e•\tReceive, review, and provide suitable solutions regarding QC-related concerns and challenges.\u003c/p\u003e\u003cp\u003e•\tLead/participate in the recruitment, onboarding, coaching, and continuous training for QA and QC staff.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T756,\u003cp\u003e\u003cstrong\u003e1. Must-have Requirements (Screening Criteria – Mandatory)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCandidates must meet all three of the following core criteria. Applications that do not satisfy any one of these will not be considered:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Fluent English communication (both spoken and written) \u003c/strong\u003e– This is the top priority requirement.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Minimum 5 years of relevant experience in the food processing / food manufacturing industry.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Proven managerial experience,\u003c/strong\u003e with demonstrated ability to lead and supervise QA/QC or Quality Management teams.\u003c/p\u003e\u003cp\u003e- Willingness and ability to travel frequently for audits, supplier inspections, and business meetings.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Preferred\ ns for out-of-spec products and other quality concerns.\u003c/p\u003e\u003cp\u003e•\tAnalyze root causes, coordinate with all vendor factories, and ensure the timely implementation of corrective and preventive actions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII/Operations-related tasks\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1) Production operations management \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDevelop and deliver clear, effective communication to all suppliers to ensure awareness of QA standards, program updates, and process changes.\u003c/p\u003e\u003cp\u003e•\tBuild internal control SOPs for the company to plan, schedule, monitor, and coordinate all production activities at vendor factories, ensuring efficiency, quality, and timely delivery.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2) Product Development \u0026 Sample Evaluation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCoordinate with the vendor factories on R\u0026D to develop new products.\u003c/p\u003e\u003cp\u003e•\tEvaluate the new products for the company’s upcoming projects.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3/ QA \u0026 QC Leading roles\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tOverview all the work and daily activities of the QA \u0026 QC teams.\u003c/p\u003e\u003cp\u003e•\tSupervise and resolve operational issues within the team to ensure smooth operation.\u003c/p\u003e\u003cp\u003e•\tProvide instructions and guidance on new projects, quality initiatives, or process changes.\u003c/p\u003e\u003cp\u003e•\tFinalize the QC working schedule and approve staff leave requests and overtime requests.\u003c/p\u003e\u003cp\u003e•\tReceive, review, and provide suitable solutions regarding QC-related concerns and challenges.\u003c/p\u003e\u003cp\u003e•\tLead/participate in the recruitment, onboarding, coaching, and continuous training for QA and QC staff.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"
