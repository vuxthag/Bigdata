me Tax) calculations, PIT finalization, and coordinate with authorities - when needed/required by client.\u003c/p\u003e\u003cp\u003e- Prepare statutory labor reports as required by relevant authorities and in accordance with applicable regulations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eData Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Maintain and update client employee information in payroll systems.\u003c/p\u003e\u003cp\u003e- Ensure accurate record-keeping and proper documentation for payroll audits.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePerform other duties as assigned by the Line Manager.\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T5cb,Rödl \u0026 Partner is one of the leading German professional service firms specialized in Accounting/Auditing, Tax and Legal Advice. We are present with 110 own offices in around 50 countries, covering all major business centers in Europe, Asia and America.\r\n\r\nSince 1994, Rödl \u0026 Partner has built a branch network across the Asia-Pacific region, including offices and cooperation partners in China, India, Japan, Indonesia, Malaysia, Singapore, South Korea, Thailand and Vietnam.\r\n\r\nIn Vietnam, Rödl \u0026 Partner operates through its offices in Ho Chi Minh City and Hanoi City. As the first German Law firm in Vietnam, our offices serves our clients with legal advice on investment related issues including corporate and tax law as well as accounting services. Rödl \u0026 Partner offers its advice in German, English and Vietnamese. We are permanently extending our business as a one stop shop for our clients.\r\n\r\nRödl \u0026 Partner provides an attractive salary, a welcoming international work environment, and benefits that surpass those offered by other firms.\r\n\r\nComprehensive Employee Benefits:\r\n• Probation: 60 days\r\n• Work Hours: 9:00 AM - 6:00 PM\r\n• Bonus: Tết bonus \
