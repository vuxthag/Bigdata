lớn thứ 3 tại Hàn Quốc và là một trong những định chế tài chính hàng đầu Châu Á. Tổng tài sản KIS quản lý trên toàn cầu là 32 tỷ USD, trong đó tài sản ở Việt Nam vào khoảng 1,1 tỷ USD. KIS Việt Nam được hỗ trợ mạnh mẽ từ Tập đoàn KIS tại Hàn Quốc với kinh nghiệm quản lý hơn 30 năm qua trong lĩnh vực tài chính và sự kết hợp của các chuyên gia từ nước ngoài với đội ngũ nhân viên xuất sắc, nhiều kinh nghiệm trong lĩnh vực ngân hàng, kiểm toán và thị trường vốn trong nước. KIS Việt Nam chú trọng phát triển kỹ thuật quản trị điều hành và quản trị rủi ro để đưa công ty đứng vào vị trí hàng đầu ở mọi lĩnh vực tài chính tại Việt Nam. Bên cạnh đó, chúng tôi tin rằng nguồn nhân lực chính là yếu tố đang và sẽ tạo nên uy tín và thành công của KIS Việt Nam trên thị trường chứng khoán. Tầm nhìn: KIS Việt Nam đặt mục tiêu phát triển thành một tập đoàn chứng khoán hàng đầu tại Việt Nam vào năm 2020 Sứ mệnh: Với mục tiêu tạo ra những giá trị gia tăng trong dịch vụ tài chính cho khách hàng, các thành viên KIS Việt Nam luôn hướng đến: - Nghiên cứu và phát triển các sản phẩm và dịch vụ tài chính tiện ích để cung cấp cho khách hàng. - Tận dụng thế mạnh kinh doanh cốt lõi để đạt được sự phát triển bền vững và gia tăng lợi nhuận ổn định. - Xây dựng KIS Việt Nam thành thương hiệu hàng đầu trong lĩnh vực dịch vụ tài chính tại Việt Nam\r\n\r\nhttps://kisvn.vn/"])</script><script>self.__next_f.push([1,"24:Tca1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eResponsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Contact and introduce KIS’s products, services, and promotional programs to potential clients generated from available data sources through Digital Marketing channels (Facebook, Google, landing pages, etc.).\u003c/p\u003e\u003cp\u003e• Conduct telesales to activate client accounts, encourage trading activities, and increase service utilization.\u003c/p\u003e\u003cp\u003e• Guide clients on account opening procedures, trading platform usage, and participation in the company’s investment communities.\u003c/p\u003e\u003cp\u003e• Manage and engage with clients through online communities (Facebook groups, Zalo groups, etc.); update market information based on research reports and recommendations from the Research Department.\u003c/p\u003e\u003cp\u003e• Build and maintain strong relationships with clients through online channels to enhance trading experience and increase trading frequency.\u003c/p\u003e\u003cp\u003e• Collaborate with internal teams such as Research, Marketing, Digital Marketing, and Product Development to update market information, new campaigns, and investment ideas for clients.\u003c/p\u003e\u003cp\u003e• Monitor and analyze client trading behavior to identify opportunities for more effective client engagement and service strategies.\u003c/p\u003e\u003cp\u003e• Introduce and cross-sell other financial products and services that suit clients’ investment needs.\u003c/p\u003e\u003cp\u003e• Perform other tasks as assigned by the manager.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTrách nhiệm công việc:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Liên hệ và giới thiệu các sản phẩm, dịch vụ và chương trình khuyến mãi của KIS đến khách hàng tiềm năng từ nguồn dữ liệu sẵn có được tạo ra thông qua các kênh Digital Marketing (Facebook, Google, landing page, v.v.).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Thực hiện telesales nhằm kích hoạt tài khoản khách hàng, thúc đẩy hoạt động giao dịch và gia tăng mức độ sử dụng dịch vụ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Hướng dẫn khách hàng mở tài khoản, sử dụng nền tảng giao dịch và tham gia các cộng đồng đầu tư của công ty.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Quản lý và tương tác với khách hàng thông qua các cộng đồng trực tuyến (nhóm Facebook, Zalo,…); cập nhật thông tin thị trường dựa trên các báo cáo và khuyến nghị từ bộ phận Phân tích (Research).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Xây dựng và duy trì mối quan hệ với khách hàng thông qua các kênh online nhằm nâng cao trải nghiệm giao dịch và gia tăng tần suất giao dịch.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Phối hợp với các phòng ban như Research, Marketing, Digital Marketing và Phát triển sản phẩm để cập nhật thông tin thị trường, chiến dịch mới và ý tưởng đầu tư cho khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Theo dõi và phân tích hành vi giao dịch của khách hàng nhằm đề xuất các phương án chăm sóc và tiếp cận hiệu quả hơn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Giới thiệu và tư vấn thêm các sản phẩm và dịch vụ tài chính khác của công ty phù hợp với nhu cầu đầu tư của khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Thực hiện các công việc khác theo phân công của quản lý.\u003c/em\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T1814,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eRequirements:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Bachelor’s degree in Finance, Economics, Securities, Business Administration, Banking, or related fields.\u003c/p\u003e\u003cp\u003e• At least 2 years of experience in sales or customer service in financial services or related industries (securities, insurance, banking, investment funds, fintech, consumer finance, etc.).\u003c/p\u003e\u003cp\u003e• Strong communication and persuasion skills, with the ability to build and maintain client relationships.\u003c/p\u003e\u003cp\u003e• Ability to explain financial products clearly and confidently to clients.\u003c/p\u003e\u003cp\u003e• Proactive, results-oriented, and comfortable working in a performance-driven environment.\u003c/p\u003e\u003cp\u003e• Passionate about learning stock market knowledge, investment concepts, and financial products.\u003c/p\u003e\u003cp\u003e• Good teamwork and collaboration skills to work effectively with internal departments.\u003c/p\u003e\u003cp\u003e• Experience in telesales or online client consulting is a plus.\u003c/p\u003e\u003cp\u003e• Basic knowledge of the stock market, fundamental or technical analysis, or familiarity with Digital Marketing / online community management is an advantage.\u003c/p\u003e\u003cp\u003e• Securities Brokerage License is a plus.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBenefits:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCompetitive salary based on experience and capabilities.\u003c/p\u003e\u003cp\u003e•\t13th monthly salary and attractive annual performance bonus.\u003c/p\u003e\u003cp\u003e•\tMonthly awards for outstanding employees.\u003c/p\u003e\u003cp\u003e•\tSocial insurance contributions based on full salary.\u003c/p\u003e\u003cp\u003e•\tIndividual health insurance card (if eligible).\u003c/p\u003e\u003cp\u003e•\tFree parking for all employees and phone allowance (if eligible).\u003c/p\u003e\u003cp\u003e•\tQuarterly team-building allowances per department\u003c/p\u003e\u003cp\u003e•\tTop performers have the opportunity to visit the company’s headquarters in South Korea, with annual organized trips (02 times/year).\u003c/p\u003e\u003cp\u003e•\t100% tuition support for professional certifications (brokerage, analysis, fund management), language courses, and specialized training programs annually.\u003c/p\u003e\u003cp\u003e•\tDirect training and mentorship from experienced industry professionals.\u003c/p\u003e\u003cp\u003e•\tOpportunities to participate in workshops and professional events to enhance knowledge and stay updated on market trends.\u003c/p\u003e\u003cp\u003e•\tExpand your professional network and develop a long-term career in the securities industry.\u003c/p\u003e\u003cp\u003e•\tAnnual health check-ups, company trips, and other engagement activities.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eWorking time and location:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tTime: Mon to Fri, 8AM-5PM \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tLocation: Level 3, TNR building, 180-192 Nguyen Cong Tru, Ben Thanh Ward, HCMC\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYêu cầu:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tTốt nghiệp Đại học các ngành Tài chính, Kinh tế, Chứng khoán, Quản trị kinh doanh, Ngân hàng hoặc các ngành liên quan.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó ít nhất 2 năm kinh nghiệm trong lĩnh vực sales hoặc chăm sóc khách hàng trong các ngành tài chính hoặc lĩnh vực liên quan (chứng khoán, bảo hiểm, ngân hàng, quỹ đầu tư, fintech, consumer finance,…).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tKỹ năng giao tiếp và thuyết phục tốt, có khả năng xây dựng và duy trì mối quan hệ với khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó khả năng tư vấn và giải thích các sản phẩm tài chính một cách rõ ràng, tự tin.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tChủ động, định hướng kết quả và thoải mái làm việc trong môi trường kinh doanh có chỉ tiêu.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó đam mê và sẵn sàng học hỏi về thị trường chứng khoán, đầu tư tài chính và các sản phẩm tài chính.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tKỹ năng làm việc nhóm và phối hợp với các phòng ban nội bộ để hỗ trợ khách hàng hiệu quả.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó kinh nghiệm telesales hoặc tư vấn khách hàng qua kênh online là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó kiến thức cơ bản về thị trường chứng khoán, phân tích cơ bản hoặc phân tích kỹ thuật, hoặc hiểu biết về Digital Marketing / quản lý cộng đồng online là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó Chứng chỉ hành nghề Môi giới Chứng khoán là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eQuyền lợi:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tMức lương cạnh tranh, tương xứng với kinh nghiệm và năng lực.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tLương tháng 13 và thưởng hiệu quả công việc hàng năm hấp dẫn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tGiải thưởng nhân viên xuất sắc hàng tháng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tĐóng bảo hiểm xã hội theo mức lương đầy đủ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCấp thẻ bảo hiểm sức khỏe cá nhân (nếu đủ điều kiện).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tMiễn phí gửi xe cho toàn bộ nhân viên và phụ cấp điện thoại (nếu đủ điều kiện).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tNgân sách team building hàng quý cho từng phòng ban.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tNhân viên xuất sắc có cơ hội tham quan trụ sở chính tại Hàn Quốc, với các chuyến đi được tổ chức hàng năm (02 lần/năm).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tHỗ trợ 100% học phí cho các chứng chỉ chuyên môn (môi giới, phân tích, quản lý quỹ), khóa học ngoại ngữ và các chương trình đào tạo chuyên sâu hàng năm.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tĐược đào tạo và hướng dẫn trực tiếp bởi các chuyên gia giàu kinh nghiệm trong ngành.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCơ hội tham gia các hội thảo và sự kiện chuyên môn để cập nhật kiến thức và xu hướng thị trường.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tMở rộng mạng lưới quan hệ chuyên nghiệp và phát triển sự nghiệp lâu dài trong ngành chứng khoán.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tKhám sức khỏe định kỳ hàng năm, du lịch công ty và nhiều hoạt động gắn kết nội bộ khác.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eThời gian và địa điểm làm việc: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tThời gian: Thứ Hai – Thứ Sáu, 8:00 – 17:00\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tĐịa điểm: Tầng 3, Tòa nhà TNR, 180–192 Nguyễn Công Trứ, Phường Bến Thành, TP. Hồ Chí Minh\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T99a,"])</script><script>self.__next_f.push([1,"Công ty CP Chứng khoán KIS Việt Nam (KIS) được thành lập vào 12/2010 bởi Công ty đầu tư chứng khoán Hàn Quốc (Korea Investment \u0026 Securities, Hàn Quốc) đầu tư cùng Tập đoàn dệt may Việt Nam và các cổ đông khác. KIS hiện nay có vốn điều lệ là 1.113 tỷ đồng. Công ty đầu tư chứng khoán KIS Hàn Quốc (Korea Investment \u0026 Securities, Hàn Quốc) được thành lập vào năm 1974, có trụ sở chính tại Seoul, Hàn Quốc. Với mạng lưới 98 chi nhánh rộng khắp Hàn Quốc, 6 công ty con ở nước ngoài và hơn 2.400 nhân viên, KIS là công ty chứng khoán có thị phần môi giới lớn thứ 3 tại Hàn Quốc và là một trong những định chế tài chính hàng đầu Châu Á. Tổng tài sản KIS quản lý trên toàn cầu là 32 tỷ USD, trong đó tài sản ở Việt Nam vào khoảng 1,1 tỷ USD. KIS Việt Nam được hỗ trợ mạnh mẽ từ Tập đoàn KIS tại Hàn Quốc với kinh nghiệm quản lý hơn 30 năm qua trong lĩnh vực tài chính và sự kết hợp của các chuyên gia từ nước ngoài với đội ngũ nhân viên xuất sắc, nhiều kinh nghiệm trong lĩnh vực ngân hàng, kiểm toán và thị trường vốn trong nước. KIS Việt Nam chú trọng phát triển kỹ thuật quản trị điều hành và quản trị rủi ro để đưa công ty đứng vào vị trí hàng đầu ở mọi lĩnh vực tài chính tại Việt Nam. Bên cạnh đó, chúng tôi tin rằng nguồn nhân lực chính là yếu tố đang và sẽ tạo nên uy tín và thành công của KIS Việt Nam trên thị trường chứng khoán. Tầm nhìn: KIS Việt Nam đặt mục tiêu phát triển thành một tập đoàn chứng khoán hàng đầu tại Việt Nam vào năm 2020 Sứ  and services that suit clients’ investment needs.\u003c/p\u003e\u003cp\u003e• Perform other tasks as assigned by the manager.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTrách nhiệm công việc:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Liên hệ và giới thiệu các sản phẩm, dịch vụ và chương trình khuyến mãi của KIS đến khách hàng tiềm năng từ nguồn dữ liệu sẵn có được tạo ra thông qua các kênh Digital Marketing (Facebook, Google, landing page, v.v.).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Thực hiện telesales nhằm kích hoạt tài khoản khách hàng, thúc đẩy hoạt động giao dịch và gia tăng mức độ sử dụng dịch vụ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Hướng dẫn khách hàng mở tài khoản, sử dụng nền tảng giao dịch và tham gia các cộng đồng đầu tư của công ty.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Quản lý và tương tác với khách hàng thông qua các cộng đồng trực tuyến (nhóm Facebook, Zalo,…); cập nhật thông tin thị trường dựa trên các báo cáo và khuyến nghị từ bộ phận Phân tích (Research).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Xây dựng và duy trì mối quan hệ với khách hàng thông qua các kênh online nhằm nâng cao trải nghiệm giao dịch và gia tăng tần suất giao dịch.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Phối hợp với các phòng ban như Research, Marketing, Digital Marketing và Phát triển sản phẩm để cập nhật thông tin thị trường, chiến dịch mới và ý tưởng đầu tư cho khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Theo dõi và phân tích hành vi giao dịch của khách hàng nhằm đề xuất các phương án chăm sóc và tiếp cận hiệu quả hơn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Giới thiệu và tư vấn thêm các sản phẩm và dịch vụ tài chính khác của công ty phù hợp với nhu cầu đầu tư của khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e• Thực hiện các công việc ech, consumer finance,…).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tKỹ năng giao tiếp và thuyết phục tốt, có khả năng xây dựng và duy trì mối quan hệ với khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó khả năng tư vấn và giải thích các sản phẩm tài chính một cách rõ ràng, tự tin.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tChủ động, định hướng kết quả và thoải mái làm việc trong môi trường kinh doanh có chỉ tiêu.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó đam mê và sẵn sàng học hỏi về thị trường chứng khoán, đầu tư tài chính và các sản phẩm tài chính.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tKỹ năng làm việc nhóm và phối hợp với các phòng ban nội bộ để hỗ trợ khách hàng hiệu quả.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó kinh nghiệm telesales hoặc tư vấn khách hàng qua kênh online là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó kiến thức cơ bản về thị trường chứng khoán, phân tích cơ bản hoặc phân tích kỹ thuật, hoặc hiểu biết về Digital Marketing / quản lý cộng đồng online là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCó Chứng chỉ hành nghề Môi giới Chứng khoán là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eQuyền lợi:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tMức lương cạnh tranh, tương xứng với kinh nghiệm và năng lực.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tLương tháng 13 và thưởng hiệu quả công việc hàng năm hấp dẫn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tGiải thưởng nhân viên xuất sắc hàng tháng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tĐóng bảo hiểm xã hội theo mức lương đầy đủ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCấp thẻ bảo hiểm sức khỏe cá nhân (nếu đủ điều kiện).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tMiễn phí gửi xe cho toàn bộ nhân viên và phụ cấp điện thoại (nếu đủ điều kiện).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tNgân sách team building hàng quý cho từng phòng ban.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tNhân viên xuất sắc có cơ hội tham quan trụ sở chính tại Hàn Quốc, với các chuyến đi được tổ chức hàng năm (02 lần/năm).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tHỗ trợ 100% học phí cho các chứng chỉ chuyên môn (môi giới, phân tích, quản lý quỹ), khóa học ngoại ngữ và các chương trình đào tạo chuyên sâu hàng năm.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tĐược đào tạo và hướng dẫn trực tiếp bởi các chuyên gia giàu kinh nghiệm trong ngành.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCơ hội tham gia các hội thảo và sự kiện chuyên môn để cập nhật kiến thức và xu hướng thị trường.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tMở rộng mạng lưới quan hệ chuyên nghiệp và phát triển sự nghiệp lâu dài trong ngành chứng khoán.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tKhám sức khỏe định kỳ hàng năm, du lịch công ty và nhiều hoạt động gắn kết nội bộ khác.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eThời gian và địa điểm làm việc: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tThời gian: Thứ Hai – Thứ Sáu, 8:00 – 17:00\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tĐịa điểm: Tầng 3, Tòa nhà TNR, 180–192 Nguyễn Công Trứ, Phường Bến Thành, TP. Hồ Chí Minh\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2d:{\"skillName\":\"Customer Service\",\"skillId\":174,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Communication Skills\",\"skillId\":988842,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Financial Product\",\"skillId\":697992,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"Sales Planning\",\"skillId\":3719,\"skillWeight\":100,\"isExisted\":false}\n3
