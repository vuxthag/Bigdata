atic/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tdcd,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Thương mại, Tư vấn và Xây dựng Vĩnh Hưng (gọi tắt là Vĩnh Hưng) được thành lập năm 2006, là doanh nghiệp hàng đầu Việt Nam trong lĩnh vực cung cấp sản phẩm, giải pháp công nghệ phục vụ xây dựng công trình giao thông và dân dụng công nghiệp.\r\nMạng lưới kinh doanh của Vĩnh Hưng trải dài khắp cả nước với trụ sở chính đặt tại Hà Nội, chi nhánh tại Hồ Chí Minh và văn phòng đại diện tại Đà Nẵng. Đặc biệt là sự ra đời của Công ty TNHH Đầu tư và Sản xuất Vĩnh Hưng (Vĩnh Hưng IP) đã đóng vai trò quan trọng trong việc tạo dựng lợi thế cạnh tranh của thương hiệu Vĩnh Hưng, góp phần đảm bảo sự phát triển bền vững của Công ty trên cả ba lĩnh vực “Thương mại – Sản xuất – Thi công\".\r\nLĩnh vực thương mại: Bên cạnh việc phân phối các sản phẩm nhập khẩu từ các nước có nền công nghiệp phát triển như: Nhật Bản, Hàn Quốc, Trung Quốc, Malaysia, Thái Lan, Thụy Sĩ…Vĩnh Hưng còn phân phối các sản phẩm\r\ndo nhà máy Vĩnh Hưng IP sản xuất với chất lượng tương đương hàng nhập ngoại nhưng giá thành cạnh tranh và thời gian giao hàng được rút ngắn.\r\nLĩnh vực sản xuất: Thành lập năm 2016, Vĩnh Hưng IP là nhà máy đầu tiên tại Việt Nam có năng lực sản xuất đồng bộ sản phẩm gối cầu, khe co giãn, neo dự ứng lực, lan can cầu, vách chống ồn và các kết cấu kim loại khác phục vụ công trình giao thông và dân dụng công nghiệp. Nhà máy được đầu tư trang thiết bị hiện đại với hệ thống quản lý đáp ứng yêu cầu tiêu chuẩn chuẩn ISO 9001:2015, ISO 14001:2015, ISO 3834 – 2, tiêu chuẩn Châu Âu cho kết cấu thép EN 1090 (Execution class: EXC3).\r\nVĩnh Hưng IP là đơn vị tiên phong tại Việt Nam xuất khẩu ra thị trường thế giới các sản phẩm công nghệ cao phục vụ xây dựng các công trình giao thông. Sản phẩm của Vĩnh Hưng được khách hàng quốc tế đón nhận và đánh giá cao.\r\nVề lĩnh vực thi công: Thế mạnh của Vĩnh Hưng là thi công mới, sửa chữa các công trình giao thông; Thi công chống thấm công trình hầm và đặc biệt là thi công các giải pháp, sản phẩm ứng dụng công nghệ cao. Với thông điệp “Kết nối những con đường”, chúng tôi tự hào khi được ghi lại dấu ấn trên các công trình giao thông khắp mọi miền tổ quốc.\r\nVới mục tiêu xây dựng hệ thống kinh doanh phát triển ổn định - bền vững, mang lại giá trị đích thực cho khách hàng, cổ đông, nhân viên và xã hội, chúng tôi luôn xây dựng và duy trì văn hóa doanh nghiệp dựa trên các tiêu chí “Chất lượng - Đoàn kết - Kỷ luật - Tôn trọng cá nhân - Trách nhiệm”. Chúng tôi mong muốn tiếp tục nhận được sự tin tưởng hợp tác từ các đối tác là cơ quan quản lý, khách hàng, nhà cung cấp …để cùng chung sức xây dựng đất nước Việt Nam với cơ sở hạ tầng giao thông; công trình dân dụng; công trình công nghiệp hiện đại, góp phần mang đến cuộc sống tốt đẹp hơn cho cộng đồng."])</script><script>self.__next_f.push([1,"24:T780,\u003cp\u003e\u003cstrong\u003e1. Triển khai các dự án công ty:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Triển khai mô hình 3D, bản vẽ kỹ thuật cho sản phẩm ngành cầu đường.\u003c/p\u003e\u003cp\u003e- Lên phương án giải pháp kỹ thuật c
