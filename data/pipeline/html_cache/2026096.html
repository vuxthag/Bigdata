U, Mỹ, Anh, Canada, Đức, Tây Ban Nha, Hà Lan,..và đã đạt được các chứng chỉ tiêu chuẩn quốc tế như JSC, FDA, BRC, ISO 9001:2015, BSCI, OK Compost Home, OK Compost Industrial. Chúng tôi cũng là cầu nối hỗ trợ cho hơn 200 nhà máy xuất khẩu bao bì trên toàn thế giới.\r\nNăm 2024, Haplast Group đã đề ra mục tiêu chiến lược với mô hình hoạt động gồm 5 công ty thành viên và 6 nhà máy sản xuất, nhằm mở rộng sản xuất và đáp ứng nhu cầu ngày càng cao của thị trường đối với các sản phẩm thân thiện với môi trường.\r\nThông qua những nỗ lực không ngừng, Haplast Group cam kết tiếp tục đóng góp tích cực vào sự phát triển bền vững của ngành công nghiệp bao bì, khẳng định thương hiệu “Made in Vietnam” trên trường quốc tế.\r\nCHIẾN LƯỢC CON NGƯỜI\r\nHaplast Group luôn coi nhân tài là tài sản quan trọng và cốt lõi. Chúng tôi đã xây dựng một đội ngũ nhân sự tinh hoa, với sự đa dạng về năng lực và chuyên môn. Chúng tôi cam kết thu hút và chào đón mọi ứng viên mong muốn làm việc trong môi trường năng động, sáng tạo và hiệu quả, nơi mà từng cá nhân có thể phát huy tối đa khả năng và kiến thức chuyên môn của mình.\r\nChúng tôi luôn hài hòa lợi ích của doanh nghiệp với lợi ích của nhân viên, đảm bảo mối quan hệ hợp tác, đồng hành cùng phát triển. \r\nHaplast Group đặc biệt quan tâm đến việc phát triển nguồn nhân lực thông qua việc triển khai các chính sách đào tạo hiệu quả, nâng cao kiến thức, năng lực nghề nghiệp cho nhân viên và tay nghề cho công nhân. Chúng tôi không chỉ đào tạo để nâng cao trình độ mà còn để mỗi thành viên trở thành đại diện xuất sắc của Haplast Group trong mọi hoàn cảnh. Qua việc đào tạo này, Haplast Group đóng góp tích cực vào việc nâng cao chất lượng nguồn nhân lực cho cả cộng đồng doanh nghiệp Việt Nam.\r\n\r\n\r\nTIÊU CHÍ XÂY DỰNG THƯƠNG HIỆU TUYỂN DỤNG\r\nHaplast định hướng đến 8 tiêu chí cốt lõi của thương hiệu tuyển dụng mạnh mẽ:\r\n1.\tĐặc biệt về Lương thưởng và Phúc lợi: Cam kết cung cấp một gói thưởng lương và phúc lợi hấp dẫn, giúp đảm bảo sự hài lòng và động lực cao cho nhân viên.\r\n\r\n2.\tKinh nghiệm làm việc quốc tế: Cơ hội để nhân viên trải nghiệm và phát triển trong một môi trường làm việc quốc tế, từ đó nâng cao năng lực chuyên môn và giao tiếp quốc tế.\r\n\r\n3.\tSự Đổi mới và Phát triển nhanh, Bền vững: Tập trung vào việc khuyến khích sáng tạo và phát triển nhanh chóng, đồng thời đảm bảo tính bền vững của các hoạt động.\r\n\r\n4.\tCông việc thú vị và Trải nghiệm đa dạng: Đảm bảo mỗi công việc mang lại sự thú vị và cơ hội trải nghiệm đa dạng, từ đó khám phá và phát triển tối đa năng lực của từng cá nhân.\r\n\r\n5.\tHuấn luyện và Đào tạo chuyên nghiệp: Đầu tư mạnh mẽ vào các chương trình huấn luyện và đào tạo chuyên sâu, nhằm nâng cao năng lực và hiệu quả làm việc.\r\n\r\n6.\tGhi nhận và Thưởng cho thành tích: Tôn trọng và ghi nhận công sức, đóng góp của từng cá nhân thông qua các hình thức thưởng phù hợp và công bằng.\r\n\r\n7.\tNăng động, Sáng tạo và Linh hoạt: Khuyến khích môi trường làm việc năng động, sáng tạo và linh hoạt, giúp nhân viên tự do thể hiện và phát triển ý tưởng.\r\n\r\n8.\tPhát triển và Trao quyền cho nhân viên: Đặt nặng mục tiêu phát triển cá nhân và đảm bảo mỗi thành viên được trao quyền và trách nhiệm phù hợp, từ đó thúc đẩy sự nghiệp và thành công cá nhân.\r\n\r\nNhững tiêu chí này là nền tảng để Haplast không chỉ thu hút mà còn giữ chân nhân tài, đồng thời đảm bảo môi trường làm việc năng động và tiến bộ.\r\n\r\nVĂN PHÒNG ĐẠI DIỆN – TIẾP NHẬN HỒ SƠ ỨNG TUYỂN\r\n\r\nVăn phòng đại diện: Tầng 8 tòa Trico 548 Nguyễn Văn Cừ, Long Biên, Hà Nội, Việt Nam\r\nNhà máy: Thôn Đỗ Hạ, Xã Quang Vinh, Huyện Ân Thi, Tỉnh Hưng Yên, Việt Nam\r\nWebsite: https://haplastgroup.com/"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:Tee8,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTẬP ĐOÀN HAPLAST:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHAPLAST GROUP là Top doanh nghiệp dẫn đầu trong lĩnh vực bao bì tại Việt Nam, với gần 001:2015, BSCI, OK Compost Home, OK Compost Industrial. Chúng tôi cũng là cầu nối hỗ trợ cho hơn 200 nhà máy xuất khẩu bao bì trên toàn thế giới.\r\nNăm 2024, Haplast Group đã đề ra mục tiêu chiến lược với mô hình hoạt động gồm 5 công ty thành viên và 6 nhà máy sản xuất, nhằm mở rộng sản xuất và đáp ứng nhu cầu ngày càng cao của thị trường đối với các sản phẩm thân thiện với môi trường.\r\nThông qua những nỗ lực không ngừng, Haplast Group cam kết tiếp tục đóng góp tích cực vào sự phát triển bền vững của ngành công nghiệp bao bì, khẳng định thương hiệu “Made in Vietnam” trên trường quốc tế.\r\nCHIẾN LƯỢC CON NGƯỜI\r\nHaplast Group luôn coi nhân tài là tài sản quan trọng và cốt lõi. Chúng tôi đã xây dựng một đội ngũ nhân sự tinh hoa, với sự đa dạng về năng lực và chuyên môn. Chúng tôi cam kết thu hút và chào đón mọi ứng viên mong muốn làm việc trong môi trường năng động, sáng tạo và hiệu quả, nơi mà từng cá nhân có thể phát huy tối đa khả năng và kiến thức chuyên môn của mình.\r\nChúng tôi luôn hài hòa lợi ích của doanh nghiệp với lợi ích của nhân viên, đảm bảo mối quan hệ hợp tác, đồng hành cùng phát triển. \r\nHaplast Group đặc biệt quan tâm đến việc phát triển nguồn nhân lực thông qua việc triển khai các chính sách đào tạo hiệu quả, nâng cao kiến thức, năng lực nghề nghiệp cho nhân viên và tay nghề cho công nhân. Chúng tôi không chỉ đào tạo để nâng cao trình độ mà còn để mỗi thành viên trở thành đại diện xuất sắc của Haplast Group trong mọi hoàn cảnh. Qua việc đào tạo này, Haplast Group đóng góp tích cực vào việc nâng cao chất lượng nguồn nhân lực cho cả cộng đồng doanh nghiệp Việt Nam.\r\n\r\n\r\nTIÊU CHÍ XÂY DỰNG THƯƠNG HIỆU TUYỂN DỤNG\r\nHaplast định hướng đến 8 tiêu chí cốt lõi của thương hiệu tuyển dụng mạnh mẽ:\r\n1.\tĐặc biệt về Lương thưởng và Phúc lợi: Cam kết cung cấp một gói thưởng lương và phúc lợi hấp dẫn, giúp đảm bảo sự hài lòng và động lực cao cho nhân viên.\r\n\r\n2.\tKinh nghiệm làm việc quốc tế: Cơ hội để nhân viên trải nghiệm và phát triển trong O TƯƠNG LAI XANH góp phần tạo ra môi trường thân thiện, tăng cường chất lượng sống, bảo vệ sức khỏe con người \u0026 môi trường sống trên hành tinh xanh tươi đẹp. \r\nĐược thành lập từ năm 2006 Công ty cổ phần Haplast chúng tôi hoạt động trong lĩnh vực sản xuất, kinh doanh các loại bao bì nhựa \u0026 sản phẩm sinh học tự hủy. Kể từ khi thành lập đến nay, Haplast đã có những bước phát triển mạnh mẽ và khẳng định được vị thế của mình tại Việt Nam và đã vươn tầm quốc tế nhờ những chiến lược định hướng đúng đắn từ phía Ban lãnh đạo. \r\nCho đến nay, Haplast đã có đội ngũ gần 500 nhân sự tài năng và nhiệt huyết, thường xuyên được bồi dưỡng khả năng chuyên môn cũng như các kỹ năng khác để đáp ứng tốt nhất mọi công việc. Hệ thống sản xuất được kết hợp tự động, máy móc hiện đại. Lực lượng quản lý, công nhân viên chuyên nghiệp, có kiến thức chuyên sâu về sản phẩm và được đào tạo nâng cao về chuyên môn nhằm đáp ứng mọi yêu cầu sản xuất cho dù là khắt khe nhất. Chính nhờ vào chất lượng tốt và sự uy tín cao, các sản phẩm của HAPLAST đã xuất khẩu tới hơn 80 quốc gia, trong đó có các thị trường đặc biệt khó tính như Châu Âu, Mỹ, Canada, Úc, Nhật Bản… Đồng thời, HAPLAST đang là cầu nối hỗ trợ hơn 200 nhà máy xuất khẩu bao bì ra thị trường quốc tế.\r\nQuá trình phát triển đó Haplast đã đạt được nhiều chứng chỉ như: JSC, FDA, BRC, ISO 9001:2015, BSCi, OK Compost Home, OK Compost Industrial…chứng minh cho mục tiêu Hướng tới khách hàng để Phục vụ bằng cả trái tim từ những sản phẩm thân thiện với môi trường.\r\nHiện tại, chúng tôi đã đề ra mục tiêu chiến lược sẽ trở thành Tập đoàn với mô hình hoạt động là Haplast Group cùng 5 công ty thành viên và 6 Nhà máy để sản xuất đáp ứng nhiều dòng sản phẩm thân thiện với môi trường khác nhau trong thời gian sắp tới.\r\nTừ chiến lược mở rộng mô hình hoạt động trở thành một Tập đoàn hàng đầu về sản xuất, cung cấp các sản phẩm và nguyên liệu bao bì nhựa, bao bì tự hủy, bao bì thân thiện môi trường …, hiện chúng tôi đang có kế hoạch xây dựng Nhà máy số 3. Chúng tôi đã và đang xây dựng môi trường làm việc lý tưởng, với nhiều chế độ đãi ngộ hấp dẫn để thu hút nhân tài trong và ngoài nước.\r\nNếu như bạn đang có nhu cầu hoặc đang phân vân với định hướng nghề nghiệp, đặc biệt là môi trường để cống hiến và phát triển sự nghiệp, mà vẫn chưa tìm được công ty nào thích hợp thì bạn hoàn toàn có thể tìm đến với HAPLAST – NGÔI NHÀ THỨ HAI CỦA BẠN. Chúng tôi đang thực hiện chính sách HỘI TỤ NHÂN TÀI tại nhiều vị trí. \r\n\r\nVới triết lý Con người là tài sản lớn nhất, Haplast luôn đặt ưu tiên hàng đầu về hệ thống đãi ngộ và đào tạo phát triển. Từ các vị trí đang cần Hội tụ nhân tài trên Bạn hãy gửi Thư ứng tuyển đến chúng tôi qua các hình thức dưới đây, để chúng ta có cơ hội hợp tác, đồng hành và phát triển.\r\n\r\nVPHN: Tầng 8 tòa Trico 548 Nguyễn Văn Cừ, Long Biên, Hà Nội\r\nNhà máy 1: Thôn Đỗ Hạ, Xã Quang Vinh, Huyện Ân Thi, Tỉnh Hưng Yên   \r\nNhà máy 2: Thôn Đỗ Mỹ, Xã Bãi Sậy, Huyện Ân Thi, Tỉnh Hưng Yên   \r\n\r\nTrân trọng!"])</script><script>self.__next_f.push([1,"41:{\"companyId\":315196,\"jobImageURLs\":\"$42\",\"jobVideoURLs\":\"$43\",\"companyName\":\"CÔNG TY CỔ PHẦN HAPLAST\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/2b/11150419.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"Ms Phương\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Tầng 8, Tòa nhà Trico, 548 Nguyễn Văn Cừ, Quận Long Biên, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"https://images02.vietnamworks.com/companyprofile/haplast/en/ảnh_Bìa_1_.jpg\",\"companyProfileUrl\":\"https://www.vietnamworks.com/company/haplast\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":3,\"bannerDesktopUri\":\"https://images.vietnamworks.com/pictureofcompany/d4/company-info-cover-picture-url-315196-1721728414.png\"}\n46:{\"serviceCode\":\"TPM\",\"startOn\":\"2026-03-19T15:
