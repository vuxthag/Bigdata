frontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T9f8,"])</script><script>self.__next_f.push([1,"\u003cp\u003eWe are looking for a Center Manager who thrives on real ownership: someone who can lead people, keep operations smooth, and drive strong business results—especially when the pressure is high.This role is not for someone who wants a comfortable routine. It is for a leader who enjoys meaningful challenges, stays calm in tough moments, and takes pride in turning goals into measurable outcomes.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYour core ownership - \u003c/strong\u003eYou will be the overall owner of the center’s performance, including:\u003c/p\u003e\u003cp\u003e1. Business results (monthly/quarterly targets and consistent improvement)\u003c/p\u003e\u003cp\u003e2. Team performance (hiring, coaching, discipline, and retention)\u003c/p\u003e\u003cp\u003e3. Service quality \u0026 customer experience\u003c/p\u003e\u003cp\u003e4. Daily operations (clear processes, strong coordination, reduced errors)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat you will do:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1) Drive growth with strong planning and disciplined execution\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBuild weekly/monthly action plans and break targets into practical daily steps.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eTrack progress closely, spot bottlenecks early, and adjust quickly to stay on track.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2) Lead and develop your Sales \u0026 Customer Care team\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eHire the right people and set clear expectations for performance and service mindset.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eCoach hands-on through real cases: feedback, skill-building, and execution standards.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eCreate a strong working rhythm: short check-ins, clear commitments, measurable follow-up.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3) Run a tight, efficient operation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eEnsure the center runs smoothly every day—service delivery, customer handling, team coordination.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eImprove efficiency and reduce waste while maintaining a high-quality customer experience.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4) Solve tough problems and take full ownership\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eWhen issues happen (customers, people, operations, results), you stay steady, take charge, and close the loop.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eYou focus on root causes and fix the system—so the same problems don’t repeat.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy join us\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eReal autonomy and trust: you will have room to run the center and implement what works.\u003c/p\u003e\u003cp\u003eClear goals, clear recognition: strong performance is rewarded fairly and transparently.\u003c/p\u003e\u003cp\u003eA meaningful challenge: this role allows you to build a real leadership “success case” in your career—growth, team, and operations.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T4ba,\u003cp\u003e\u003cstrong\u003eWho will succeed in this role\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYou will do well here if you like taking real responsibility: leading a team, keeping the center running smoothly, and delivering clear results—especially when things get tough.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMust-have\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3+ years in a management role (education or fast-growing companies are a plus).\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBachelor’s degree or equivalent experience.\u003c/p\u003e\u003cp\u003eStrong experience in sales and customer service.\u003c/p\u003e\u003cp\u003eGood at leading and managing a team (clear direction, coaching, follow-up).\u003c/p\u003e\u003cp\u003eStrong English and Vietnamese, both speaking and writing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYou live by these values: Passion – Accountability – Integrity – Improvement – Collaboration.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNice-to-have\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eManaged a team of 10+ people (sales and/or operations).\u003c/p\u003e\u003cp\u003eStrong at negotiation, influencing others, and solving problems.\u
