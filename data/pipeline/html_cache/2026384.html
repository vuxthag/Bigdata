4\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tf56,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eABOUT US:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eVietnam Children’s Fund Social Enterprise (VCF SE) is dedicated to addressing the social challenges faced by underprivileged children, women, and marginalized communities in Vietnam. The VCF SE enterprise model is designed to market and sell products that are environmentally safe, produced under ‘fair trade’ conditions, and ultimately improve medical, health, and education challenges. Donations are accepted and added to 100% of all profits to invest in the implementation of healthcare and education initiatives. The goal is to bring significant value to the community, creating opportunities for everyone to participate in supporting underprivileged individuals across Vietnam, contributing to a more developed and resilient country. VCF SE intends to become a leading social enterprise in Vietnam, offering diverse investment opportunities in sustainable solutions for individual healthcare, community health, the environment, and education.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eAbout the Program: Scar Of Life\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eVietnam Children's Fund Social Enterprise established the “Scar Of Life” program with the mission of connecting compassionate hearts across Vietnam to jointly support the surgical costs for under-privileged children with congenital heart defects. We desire to protect and bring a brighter future to all of them.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePOSITION OVERVIEW: \u003c/strong\u003eThe Coordinator supports the Scar of Life program in bringing life-saving opportunities to children with congenital heart defects by helping connect patients, hospitals, and compassionate donors through thoughtful coordination and care.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKEY RESPONSIBILITIES:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eNHIỆM VỤ CHÍNH:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Record application data and issue official approval letters in accordance with approval decisions of the program manager/director.\u003c/p\u003e\u003cp\u003e- Collaborate with partner hospital representatives to assess patient cases, including diagnosis, treatment plans, prognosis, and estimated costs, to determine eligibility for assistance\u003c/p\u003e\u003cp\u003e- Work closely with the program manager/director to prepare reports for donors and provide timely updates on the progress of supported children.\u003c/p\u003e\u003cp\u003e- Organize and participate in hospital or home visits when required.\u003c/p\u003e\u003cp\u003e- Assist in preparing required documentation to obtain local approvals and submit reports to relevant local authorities when necessary.\u003c/p\u003e\u003cp\u003e- Undertake additional duties as assigned, including support for events and finance teams.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eREQUIREMENTS:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Bachelor’s degree\u003c/p\u003e\u003cp\u003e- Language proficiency: Good speaking, reading, and writing skills in both English and Vietnamese are required.\u003c/p\u003e\u003cp\u003e- Proficiency in Windows, including MS Word, Excel, and PowerPoint; knowledge of fundraising data management systems is helpful.\u003c/p\u003e\u003cp\u003e- Experience working in international organizations and familiarity with Vietnam's non-governmental and non-profit sectors as a coordinator is a plus.\u003c/p\u003e\u003cp\u003e- Compassionate and empathetic, with a genuine interest in helping disadvantaged children and communities.\u003c/p\u003e\u003cp\u003e- Strong teamwork skills, with flexibility and willingness to contribute additional effort during events and special projects.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBENEFITS:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Compensation \u0026 statutory benefits: In compliance with Vietnam’s laws, including full statutory insurance and entitled leave.\u003c/p\u003e\u003cp\u003e- Additional health coverage: Extra health insurance for staff and eligible dependents (spouse and legal children).\u003c/p\u003e\u003cp\u003e- Professional development: Hands-on experience in social impact initiatives and access to training opportunities.\u003c/p\u003e\u003cp\u003e- Work environment: Inclusive and supportive, with opportunities to contribute to meaningful community impact.\u003c/p\u003e\u003cp\u003e- Work support: Company-provided laptop.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T188c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003eVỀ CHÚNG TÔI:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDoanh nghiệp Xã hội Vietnam Children’s Fund (VCF SE) nỗ lực mang đến giải pháp cho những khó khăn mà trẻ em kém may mắn, phụ nữ và các cộng đồng yếu thế tại Việt Nam đang phải đối mặt. VCF SE phát triển mô hình doanh nghiệp nhằm đạt được các mục tiêu xã hội thông qua thông qua việc vận hành như một doanh nghiệp chuyên nghiệp, bao gồm hoạt động kinh doanh, tiếp thị, bán hàng và quản lý tài chính. Chúng tôi tập trung vào các sản phẩm thân thiện với môi trường, sản xuất theo nguyên tắc “thương mại công bằng”, với mục đích cuối cùng là cải thiện các vấn đề về y tế, sức khỏe và giáo dục cho cộng đồng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCác sáng kiến về chăm sóc sức khỏe và giáo dục của VCF SE được thực hiện dựa trên hai nguồn ngân sách chính: 1 là, lợi nhuận từ hoạt động kinh doanh: 100% lợi nhuận thu được được tái đầu tư vào các hoạt động xã hội hoặc mở rộng các sáng kiến có ý nghĩa, nhằm giải quyết các vấn đề liên quan đến sức khỏe, giáo dục và môi trường; bên cạnh việc tiếp nhận các khoản đóng góp và tài trợ: các khoản quyên góp này có thể đến từ cá nhân, tổ chức và các nhà hảo tâm được tiếp nhận và kết hợp với nguồn lợi nhuận tái đầu tư để gia tăng hiệu quả của các sáng kiến vì cộng đồng. Với mục tiêu mang lại giá trị bền vững cho cộng đồng, VCF SE tạo cơ hội để mọi người tham gia hỗ trợ các cá nhân khó khăn trên khắp Việt Nam, đóng góp vào sự phát triển ngày càng vững mạnh hơn của đất nước.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCF SE hướng tới trở thành doanh nghiệp xã hội hàng đầu tại Việt Nam, cung cấp các cơ hội đầu tư đa dạng vào các giải pháp bền vững trong lĩnh vực chăm sóc sức khỏe cá nhân, sức khỏe cộng đồng, bảo vệ môi trường và nâng cao chất lượng giáo dục.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eVề chương trình: Vết Sẹo Cuộc Đời\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDoanh nghiệp Xã hội Vietnam Children’s Fund đã triển khai chương trình “Vết Sẹo Cuộc Đời” với sứ mệnh kết nối những tấm lòng nhân ái trên khắp Việt Nam nhằm chung tay hỗ trợ chi phí phẫu thuật cho trẻ em có hoàn cảnh khó khăn mắc bệnh tim bẩm sinh. Chúng tôi mong muốn bảo vệ các em và mang đến cho các em một tương lai tươi sáng hơn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTỔNG QUAN VỊ TRÍ: \u003c/em\u003e\u003c/strong\u003e\u003cem\u003eĐiều phối viên hỗ trợ chương trình Vết Sẹo Cuộc Đời trong việc mang đến cơ hội cứu sống cho trẻ em mắc bệnh tim bẩm sinh bằng cách kết nối bệnh nhi, bệnh viện và các nhà hảo tâm thông qua sự điều phối chu đáo và tận tâm\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKEY RESPONSIBILITIES:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eNHIỆM VỤ CHÍNH:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Ghi nhận dữ liệu hồ sơ đăng ký và phát hành thư phê duyệt chính thức theo quyết định của Quản lý/Giám đốc chương trình.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Phối hợp với đại diện các bệnh viện đối tác để đánh giá hồ sơ bệnh nhi, bao gồm chẩn đoán, phác đồ điều trị, tiên lượng và chi phí dự kiến, nhằm xác định điều kiện được hỗ trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Làm việc chặt chẽ với Quản lý/Giám đốc chương trình để chuẩn bị báo cáo cho nhà tài trợ và cập nhật kịp thời tiến độ của các bệnh nhi được hỗ trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Tổ chức và tham gia các chuyến thăm bệnh viện hoặc thăm gia đình khi cần thiết.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Hỗ trợ chuẩn bị các hồ sơ cần thiết để xin phê duyệt từ địa phương và thực hiện báo cáo tới các cơ quan chức năng liên quan khi cần.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Thực hiện các nhiệm vụ khác theo phân công, bao gồm hỗ trợ các sự kiện và bộ phận tài chính.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYÊU CẦU:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Tốt nghiệp đại học.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Khả năng ngôn ngữ: Thành thạo nghe, nói, đọc, viết cả tiếng Anh và tiếng Việt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Thành thạo tin học văn phòng (Windows), bao gồm MS Word, Excel và PowerPoint; có hiểu biết về các hệ thống quản lý dữ liệu gây quỹ là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Có kinh nghiệm làm việc tại các tổ chức quốc tế và hiểu biết về lĩnh vực phi chính phủ, phi lợi nhuận tại Việt Nam ở vị trí điều phối là một điểm cộng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Có lòng trắc ẩn, sự đồng cảm và mong muốn thực sự trong việc hỗ trợ trẻ em và cộng đồng có hoàn cảnh khó khăn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Kỹ năng làm việc nhóm tốt, linh hoạt và sẵn sàng hỗ trợ thêm trong các sự kiện và dự án đặc biệt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eQUYỀN LỢI:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Lương \u0026 phúc lợi theo quy định: Tuân thủ pháp luật Việt Nam, bao gồm đầy đủ chế độ bảo hiểm bắt buộc và nghỉ phép theo quy định.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Bảo hiểm sức khỏe bổ sung: Cung cấp bảo hiểm sức khỏe cho nhân viên và người phụ thuộc đủ điều kiện (vợ/chồng và con cái hợp pháp).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Phát triển nghề nghiệp: Cơ hội tham gia trực tiếp vào các hoạt động công tác xã hội và được tiếp cận các chương trình đào tạo.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Môi trường làm việc: hòa nhập và hỗ trợ, với cơ hội đóng góp những giá trị ý nghĩa cho cộng đồng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Trang thiết bị làm việc: Được cung cấp máy tính xách tay phục vụ công việc.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Tf56,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eABOUT US:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eVietnam Children’s Fund Social Enterprise (VCF SE) is dedicated to addressing the social challenges faced by underprivileged children, women, and marginalized communities in Vietnam. The VCF SE enterprise model is designed to market and sell products that are environmentally safe, produced under ‘fair trade’ conditions, and ultimately improve medical, health, and education challenges. Donations are accepted and added to 100% of all profits to invest in the implementation of healthcare and education initiatives. The goal is to bring significant value to the community, creating opportunities for everyone to participate in supporting underprivileged individuals across Vietnam, contributing to a more developed and resilient country. VCF SE intends to become a leading social enterprise in Vietnam, offering diverse investment opportunities in sustainable solutions for individual healthcare, community health, the environment, and education.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eAbout the Program: Scar Of Life\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eVietnam Children's Fund Social Enterprise established the “Scar Of Life” program with the mission of connecting compassionate hearts across Vietnam to jointly support the surgical costs for under-privileged children with congenital heart defects. We desire to protect and bring a brighter future to all of them.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePOSITION OVERVIEW: \u003c/strong\u003eThe Coordinator supports the Scar of Life program in bringing life-saving opportunities to children with congenital heart defects by helping connect patients, hospitals, and compassionate donors through thoughtful coordination and care.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKEY RESPONSIBILITIES:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eNHIỆM VỤ CHÍNH:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Record application data and issue official approval letters in accordance with approval decisions of the program manager/director.\u003c/p\u003e\u003cp\u003e- Collaborate with partner hospital representatives to assess patient cases, including diagnosis, treatment plans, prognosis, and estimated costs, to determine eligibility for assistance\u003c/p\u003e\u003cp\u003e- Work closely with the program manager/director to prepare reports for donors and provide timely updates on the progress of supported children.\u003c/p\u003e\u003cp\u003e- Organize and participate in hospital or home visits when required.\u003c/p\u003e\u003cp\u003e- Assist in preparing required documentation to obtain local approvals and submit reports to relevant local authorities when necessary.\u003c/p\u003e\u003cp\u003e- Undertake additional duties as assigned, including support for events and finance teams.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eREQUIREMENTS:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Bachelor’s degree\u003c/p\u003e\u003cp\u003e- Language proficiency: Good speaking, reading, and writing skills in both English and Vietnamese are required.\u003c/p\u003e\u003cp\u003e- Proficiency in Windows, including MS Word, Excel, and PowerPoint; knowledge of fundraising data management systems is helpful.\u003c/p\u003e\u003cp\u003e- Experience working in international organizations and familiarity with Vietnam's non-governmental and non-profit sectors as a coordinator is a plus.\u003c/p\u003e\u003cp\u003e- Compassionate and empathetic, with a genuine interest in helping disadvantaged children and communities.\u003c/p\u003e\u003cp\u003e- Strong teamwork skills, with flexibility and willingness to contribute additional effort during events and special projects.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBENEFITS:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Compensation \u0026 statutory benefits: In compliance with Vietnam’s laws, including full statutory insurance and entitled leave.\u003c/p\u003e\u003cp\u003e- Additional health coverage: Extra health insurance for staff and eligible dependents (spouse and legal children).\u003c/p\u003e\u003cp\u003e- Professional development: Hands-on experience in social impact initiatives and access to training opportunities.\u003c/p\u003e\u003cp\u003e- Work environment: Inclusive and supportive, with opportunities to contribute to meaningful community impact.\u003c/p\u003e\u003cp\u003e- Work support: Company-provided laptop.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:T188c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003eVỀ CHÚNG TÔI:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDoanh nghiệp Xã hội Vietnam Children’s Fund (VCF SE) nỗ lực mang đến giải pháp cho những khó khăn mà trẻ em kém may mắn, phụ nữ và các cộng đồng yếu thế tại Việt Nam đang phải đối mặt. VCF SE phát triển mô hình doanh nghiệp nhằm đạt được các mục tiêu xã hội thông qua thông qua việc vận hành như một doanh nghiệp chuyên nghiệp, bao gồm hoạt động kinh doanh, tiếp thị, bán hàng và quản lý tài chính. Chúng tôi tập trung vào các sản phẩm thân thiện với môi trường, sản xuất theo nguyên tắc “thương mại công bằng”, với mục đích cuối cùng là cải thiện các vấn đề về y tế, sức khỏe và giáo dục cho cộng đồng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCác sáng kiến về chăm sóc sức khỏe và giáo dục của VCF SE được thực hiện dựa trên hai nguồn ngân sách chính: 1 là, lợi nhuận từ hoạt động kinh doanh: 100% lợi nhuận thu được được tái đầu tư vào các hoạt động xã hội hoặc mở rộng các sáng kiến có ý nghĩa, nhằm giải quyết các vấn đề liên quan đến sức khỏe, giáo dục và môi trường; bên cạnh việc tiếp nhận các khoản đóng góp và tài trợ: các khoản quyên góp này có thể đến từ cá nhân, tổ chức và các nhà hảo tâm được tiếp nhận và kết hợp với nguồn lợi nhuận tái đầu tư để gia tăng hiệu quả của các sáng kiến vì cộng đồng. Với mục tiêu mang lại giá trị bền vững cho cộng đồng, VCF SE tạo cơ hội để mọi người tham gia hỗ trợ các cá nhân khó khăn trên khắp Việt Nam, đóng góp vào sự phát triển ngày càng vững mạnh hơn của đất nước.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCF SE hướng tới trở thành doanh nghiệp xã hội hàng đầu tại Việt Nam, cung cấp các cơ hội đầu tư đa dạng vào các giải pháp bền vững trong lĩnh vực chăm sóc sức khỏe cá nhân, sức khỏe cộng đồng, bảo vệ môi trường và nâng cao chất lượng giáo dục.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eVề chương trình: Vết Sẹo Cuộc Đời\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDoanh nghiệp Xã hội Vietnam Children’s Fund đã triển khai chương trình “Vết Sẹo Cuộc Đời” với sứ mệnh kết nối những tấm lòng nhân ái trên khắp Việt Nam nhằm chung tay hỗ trợ chi phí phẫu thuật cho trẻ em có hoàn cảnh khó khăn mắc bệnh tim bẩm sinh. Chúng tôi mong muốn bảo vệ các em và mang đến cho các em một tương lai tươi sáng hơn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTỔNG QUAN VỊ TRÍ: \u003c/em\u003e\u003c/strong\u003e\u003cem\u003eĐiều phối viên hỗ trợ chương trình Vết Sẹo Cuộc Đời trong việc mang đến cơ hội cứu sống cho trẻ em mắc bệnh tim bẩm sinh bằng cách kết nối bệnh nhi, bệnh viện và các nhà hảo tâm thông qua sự điều phối chu đáo và tận tâm\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKEY RESPONSIBILITIES:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eNHIỆM VỤ CHÍNH:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Ghi nhận dữ liệu hồ sơ đăng ký và phát hành thư phê duyệt chính thức theo quyết định của Quản lý/Giám đốc chương trình.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Phối hợp với đại diện các bệnh viện đối tác để đánh giá hồ sơ bệnh nhi, bao gồm chẩn đoán, phác đồ điều trị, tiên lượng và chi phí dự kiến, nhằm xác định điều kiện được hỗ trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Làm việc chặt chẽ với Quản lý/Giám đốc chương trình để chuẩn bị báo cáo cho nhà tài trợ và cập nhật kịp thời tiến độ của các bệnh nhi được hỗ trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Tổ chức và tham gia các chuyến thăm bệnh viện hoặc thăm gia đình khi cần thiết.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Hỗ trợ chuẩn bị các hồ sơ cần thiết để xin phê duyệt từ địa phương và thực hiện báo cáo tới các cơ quan chức năng liên quan khi cần.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Thực hiện các nhiệm vụ khác theo phân công, bao gồm hỗ trợ các sự kiện và bộ phận tài chính.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYÊU CẦU:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Tốt nghiệp đại học.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Khả năng ngôn ngữ: Thành thạo nghe, nói, đọc, viết cả tiếng Anh và tiếng Việt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Thành thạo tin học văn phòng (Windows), bao gồm MS Word, Excel và PowerPoint; có hiểu biết về các hệ thống quản lý dữ liệu gây quỹ là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Có kinh nghiệm làm việc tại các tổ chức quốc tế và hiểu biết về lĩnh vực phi chính phủ, phi lợi nhuận tại Việt Nam ở vị trí điều phối là một điểm cộng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Có lòng trắc ẩn, sự đồng cảm và mong muốn thực sự trong việc hỗ trợ trẻ em và cộng đồng có hoàn cảnh khó khăn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Kỹ năng làm việc nhóm tốt, linh hoạt và sẵn sàng hỗ trợ thêm trong các sự kiện và dự án đặc biệt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eQUYỀN LỢI:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Lương \u0026 phúc lợi theo quy định: Tuân thủ pháp luật Việt Nam, bao gồm đầy đủ chế độ bảo hiểm bắt buộc và nghỉ phép theo quy định.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Bảo hiểm sức khỏe bổ sung: Cung cấp bảo hiểm sức khỏe cho nhân viên và người phụ thuộc đủ điều kiện (vợ/chồng và con cái hợp pháp).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Phát triển nghề nghiệp: Cơ hội tham gia trực tiếp vào các hoạt động công tác xã hội và được tiếp cận các chương trình đào tạo.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Môi trường làm việc: hòa nhập và hỗ trợ, với cơ hội đóng góp những giá trị ý nghĩa cho cộng đồng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Trang thiết bị làm việc: Được cung cấp máy tính xách tay phục vụ công việc.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2a:{\"skillName\":\"Financial Management\",\"skillId\":20228,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Project Management\",\"skillId\":8,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Strategic Thinking\",\"skillId\":18045,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Communications\",\"skillId\":991365,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Communications\",\"skillId\":1014215,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Communications\",\"skillId\":1016350,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"Communications\",\"skillId\":1030600,\"skillWeight\":100,\"isExisted\":false}\n31:{\"skillName\":\"English\",\"skillId\":100,\"skillWeight\":100,\"isExisted\":false}\n29:[\"$2a\",\"$2b\",\"$2c\",\"$2d\",\"$2e\",\"$2f\",\"$30\",\"$31\"]\n33:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"Competitive salary, benefits and\"}\n34:{\"benefitId\":4,\"benefitIconName\":\"fa-graduation-ca
