yncedOn\":\"2026-04-12T12:05:28+07:00\",\"companyName\":\"Công Ty Cổ Phần Xây Dựng Vijako Việt Nam\",\"companyId\":220644,\"companyProfile\":\"Công ty cổ phần xây dựng Vijako Việt Nam thành lập năm 2008, chuyên nhận tư vấn thiết kế và thi công các công trình dân dụng bằng thái độ tận tụy và phong cách chuyên nghiệp. Là sự lựa chọn chính xác và đầy uy tín với khách hàng.\\r\\nQuy mô công ty: 100 người\\r\\nSản lượng: 200 - 300 tỉ/năm\\r\\nMột số ngành nghề kinh doanh khác của công ty:\\r\\n• Sản xuất thiết bị điện khác: Sản xuất bảng tủ điện trung và hạ thế\\r\\n• Sản xuất các cấu kiện kim loại\\r\\n• Rèn, dập, ép và cán kim loại; luyện bột kim loại\\r\\n• Gia công cơ khí; xử lý và tráng phủ kim loại\\r\\n• Khai khoáng khác chưa được phân vào đâu: Khai thác khoáng sản\\r\\n• Sản xuất đồ gỗ xây dựng\\r\\n• Kho bãi và lưu giữ hàng hóa\\r\\n• Hoạt động dịch vụ hỗ trợ trực tiếp cho vận tải đường sắt và đường bộ: Trông giữ xe ô tô và các loại phương tiện giao thông cơ giới khác\\r\\n• Bốc xếp hàng hóa\\r\\n• Hoạt động dịch vụ hỗ trợ khác liên quan đến vận tải: Đại lý bán vé máy bay, tàu hỏa, tàu thủy\",\"companySizeId\":0,\"contactName\":\"Ms Linh\",\"createdBy\":4016261,\"isOnline\":true,\"isActive\":true,\"isApproved\":true,\"isUnpaidDisable\":0,\"isCompleted\":true,\"isAnonymous\":false,\"isSalaryVisible\":true,\"isShowLogo\":true,\"isShowLogoInSearch\":false,\"jobDescription\":\"\u003cp\u003e• \u003cstrong\u003ePhân công, giao việc và kiểm soát tiến độ\u003c/strong\u003e các bộ phận: Hồ sơ, Shopdrawing, QS, QA/QC.\u003c/p\u003e\u003cp\u003e• \u003cstrong\u003eTiếp nhận và kiểm soát hồ sơ thiết kế \u003c/strong\u003etừ Chủ đầu tư; phối hợp xử lý các vấn đề về biện pháp thi công, bản vẽ Shop, khối lượng thanh quyết toán.\u003c/p\u003e\u003cp\u003e•\u003cstrong\u003e Lập và theo dõi tiến độ \u003c/strong\u003evới Chủ đầu tư, nội bộ và thầu phụ.\u003c/p\u003e\u003cp\u003e• \u003cstrong\u003eĐầu mối làm việc\u003c/strong\u003e với các phòng ban, thực hiện các báo cáo: Kế h
