\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII. QUYỀN HẠN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chỉ đạo trực tiếp, điều hành công việc tại các dự án và các Phòng/ban liên quan của Công ty.\u003c/p\u003e\u003cp\u003e- Đề xuất tuyển dụng, thay thế, điều chuyển, nâng cấp bậc, khen thưởng, kỷ luật đối với nhân sự tại các dự án của Công ty theo nội quy/ quy chế về lao động và quy chế lương, chế độ phúc lợi và khen thưởng kỷ luật của Công ty.\u003c/p\u003e\u003cp\u003e- Có quyền yêu cầu các Phòng/ Bộ phận trong công ty phối hợp, xử lý các công việc liên quan để bảo đảm tiến độ, chất lượng, thẩm mỹ sản phẩm xây dựng tại các dự án của Công ty.\u003c/p\u003e\u003cp\u003e- Được quyền ký văn bản liên quan \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIV. QUAN HỆ TÁC NGHIỆP TRONG CÔNG VIỆC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Cấp trên trực tiếp :Chủ tịch \u0026 Giám đốc.\u003c/p\u003e\u003cp\u003e- Bên trong: \u003c/p\u003e\u003cp\u003e+ Chỉ đạo điều hành trực tiếp Ban chỉ huy của các dự án; \u003c/p\u003e\u003cp\u003e+ Phối hợp với các Phòng/ban trong Công ty để thực hiện công việc.\t\t\t\t\t\t\t\t\t\t\t\t\u003c/p\u003e\u003cp\u003e- Bên ngoài: Các Sở, Ban, Ngành và chính quyền địa phương.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T8e3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e• Trình độ học vấn: \u003c/strong\u003eTốt nghiệp Đại học chuyên ngành xây dựng, kiến trúc, kinh tế xây dựng hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Yêu cầu về kỹ năng/ Nghiệp vụ chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Sử dụng thành thạo tin học văn phòng.\u003c/p\u003e\u003cp\u003e- Có khả năng làm việc theo nhóm cũng như làm việc độc lập, trong môi trường áp lực cao, nhiều thách thức.\u003c/p\u003e\u003cp\u003e- Có kỹ năng và nghiệp vụ trong điều hành doanh nghiệp và quản trị
