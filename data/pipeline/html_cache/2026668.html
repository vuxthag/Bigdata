n pháp lý, thư luật sư, thực hiện thẩm định pháp lý và viết báo cáo thẩm định pháp lý;\u003c/p\u003e\u003cp\u003e• Phối hợp thực hiện các thủ tục pháp lý liên quan đến thành lập doanh nghiệp, dự án đầu tư, hoạt động sản xuất kinh doanh, xử lý các vấn đề liên quan đến mua bán và sáp nhập (M\u0026A);\u003c/p\u003e\u003cp\u003e• Quản lý, hướng dẫn và giám sát các trợ lý luật sư (paralegal);\u003c/p\u003e\u003cp\u003e• Soạn thảo các bản tin pháp lý (newsletter) hoặc hỗ trợ rà soát bản tin pháp lý được các trợ lý luật sư chuẩn bị;\u003c/p\u003e\u003cp\u003e• Quản lý hồ sơ và thực hiện các công việc hỗ trợ khác theo phân công.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T748,\u003cp\u003e\u003cstrong\u003eYÊU CẦU ỨNG VIÊN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tTốt nghiệp đại học hoặc thạc sĩ ngành luật;\u003c/p\u003e\u003cp\u003e2.\tCó chứng chỉ hành nghề luật sư tại Việt Nam, tối thiểu 1-2 năm kinh nghiệm làm việc với tư cách luật sư (đã có chứng chỉ hành nghề) tại một công ty luật quốc tế hoặc công ty luật địa phương uy tín;\u003c/p\u003e\u003cp\u003e3.\tCó nền tảng pháp lý tốt, tư duy logic và khả năng viết lách tốt;\u003c/p\u003e\u003cp\u003e4.\tThành thạo Word, Excel, PowerPoint, sơ đồ tư duy…;\u003c/p\u003e\u003cp\u003e5.\tCó kỹ năng nghiên cứu pháp lý và tổng hợp thông tin tốt;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\tKhả năng giao tiếp bằng lời nói và văn bản xuất sắc bằng tiếng Anh pháp lý; \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e7.\tCó trách nhiệm, khả năng nghiên cứu pháp lý độc lập và phối hợp hiệu quả trong môi trường làm việc nhóm;\u003c/p\u003e\u003cp\u003e8.\tCẩn trọng, chú ý đến chi tiết, có tiêu chuẩn cao về tính liêm chính và tính chuyên nghiệp;\u003c/p\u003e\u003cp\u003e9.\tChịu được áp lực công việc trong môi trường năng động;\u003c/p\u003e\u003cp\u003e10. Có thể đi làm ngay.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003
