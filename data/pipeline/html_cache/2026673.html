hính tại Việt Nam. Bên cạnh đó, chúng tôi tin rằng nguồn nhân lực chính là yếu tố đang và sẽ tạo nên uy tín và thành công của KIS Việt Nam trên thị trường chứng khoán. Tầm nhìn: KIS Việt Nam đặt mục tiêu phát triển thành một tập đoàn chứng khoán hàng đầu tại Việt Nam vào năm 2020 Sứ mệnh: Với mục tiêu tạo ra những giá trị gia tăng trong dịch vụ tài chính cho khách hàng, các thành viên KIS Việt Nam luôn hướng đến: - Nghiên cứu và phát triển các sản phẩm và dịch vụ tài chính tiện ích để cung cấp cho khách hàng. - Tận dụng thế mạnh kinh doanh cốt lõi để đạt được sự phát triển bền vững và gia tăng lợi nhuận ổn định. - Xây dựng KIS Việt Nam thành thương hiệu hàng đầu trong lĩnh vực dịch vụ tài chính tại Việt Nam\r\n\r\nhttps://kisvn.vn/"])</script><script>self.__next_f.push([1,"24:T73c,\u003cp\u003e\u003cstrong\u003eTrách nhiệm công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•   Chủ động tìm kiếm, phát triển khách hàng mới và mở rộng tệp khách hàng giao dịch chứng khoán, tập trung gia tăng giá trị giao dịch, phí ròng và doanh thu cá nhân.\u003c/p\u003e\u003cp\u003e•   Tư vấn sản phẩm và chiến lược đầu tư phù hợp, thúc đẩy hoạt động giao dịch và tối ưu hiệu quả danh mục cho khách hàng.\u003c/p\u003e\u003cp\u003e•   Xây dựng, duy trì và phát triển quan hệ khách hàng, đảm bảo gia tăng tần suất giao dịch và mức độ gắn kết lâu dài.\u003c/p\u003e\u003cp\u003e•   Theo dõi sát diễn biến thị trường, chủ động cập nhật cơ hội đầu tư và khuyến nghị giao dịch nhằm thúc đẩy doanh số.\u003c/p\u003e\u003cp\u003e•   Hỗ trợ khách hàng trong quá trình giao dịch, quản lý danh mục và kiểm soát rủi ro đầu tư.\u003c/p\u003e\u003cp\u003e•   Chủ động khai thác khách hàng tiềm năng thông qua các kênh trực tuyến, mạng xã hội, sự kiện và hoạt động cá nhân nhằm mở rộng nguồn khách hàng.\u003c/p\u003e\u003cp\u003e•   Phát triển và quản lý mạng lưới cộng tác viên; đào tạo và thúc đẩy hoạt động nhằm mở rộng nguồn khách hàng và gia tăng doanh số giao dịch.\u003c/p\u003e\u003cp\u003e•   Nhạy bén với xu hướng thị trường, chủ động triển khai các ý tưởng kinh doanh sáng tạo trên nền tảng mạng xã hội (TikTok, Facebook, livestream…) để thu hút, nuôi dưỡng và chuyển đổi khách hàng thành doanh thu.\u003c/p\u003e\u003cp\u003e•   Phối hợp với các bộ phận liên quan nhằm nâng cao trải nghiệm khách hàng và hiệu quả kinh doanh.\u003c/p\u003e\u003cp\u003e•   Tham gia các chương trình đào tạo, thi đua kinh doanh và các hoạt động thúc đẩy doanh số của Công ty.\u003c/p\u003e25:T1091,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYêu cầu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp đại học trở lên chuyên ngành Tài chính, Ngân hàng, Kinh tế hoặc các lĩnh vực liên quan.\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 01 năm kinh nghiệm trong lĩnh vực kinh doanh/sales, ưu tiên các mảng tài chính (chứng khoán, ngân hàng, bảo hiểm, quỹ đầu tư, công nghệ tài chính, tài chính tiêu dùng) hoặc các ngành dịch vụ cao cấp (du lịch, ô tô, bất động sản, hàng xa xỉ…).\u003c/p\u003e\u003cp\u003e•\tCó sẵn tệp khách hàng tiềm năng (đặc biệt phân khúc khách hàng giá trị cao) là lợi thế; có khả năng chuyển đổi khách hàng sang kênh đầu tư chứng khoán.\u003c/p\u003e\u003cp\u003e•\tĐịnh hướng kinh doanh rõ ràng, đam mê lĩnh vực chứng khoán và mong muốn gắn bó lâu dài.\u003c/p\u003e\u003cp\u003e•\tTư duy kinh doanh dựa trên kết quả; có khả năng làm việc với chỉ tiêu doanh số và chịu áp lực cao để đạt mục tiêu.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp, đàm phán và xây dựng quan hệ khách hàng tốt; chủ động trong việc tìm kiếm và phát triển khách hàng.\u003c/p\u003e\u003cp\u003e•\tCó tư duy phát triển khách hàng trên nền tảng số; biết khai thác các kênh mạng xã hội (TikTok, Facebook, livestream…) để tìm kiếm và chuyển đổi khách hàng là lợi thế lớn.\u003c/p\u003e\u003cp\u003e•\tNhạy bén với xu hướng thị trường, có khả năng đề xuất và triển khai các ý tưởng kinh doanh nhằm gia tăng doanh thu.\u003c/p\u003e\u003cp\u003e•\tTiếng Anh là lợi thế.\u003c/p\u003e\u003cp\u003e•\tTrung thực, có trách nhiệm, tuân thủ quy định và cam kết bảo mật thông tin.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThu nhập không giới hạn, bao gồm lương cứng và hoa hồng cạnh tranh, hấp dẫn.\u003c/p\u003e\u003cp\u003e•\tLương tháng 13 và thưởng hiệu quả công việc hàng năm. \u003c/p\u003e\u003cp\u003e•\tGiải thưởng hàng tháng, quý, năm dành cho môi giới có kết quả kinh doanh nổi bật.\u003c/p\u003e\u003cp\u003e•\tĐóng bảo hiểm xã hội theo mức lương đầy đủ, cấp thẻ bảo hiểm sức khỏe cá nhân (nếu đủ điều kiện).\u003c/p\u003e\u003cp\u003e•\tMiễn phí gửi xe cho toàn bộ nhân viên và phụ cấp điện thoại (nếu đủ điều kiện).\u003c/p\u003e\u003cp\u003e•\tNgân sách team building hàng quý cho từng phòng ban.\u003c/p\u003e\u003cp\u003e•\tNhân viên xuất sắc có cơ hội tham quan trụ sở chính tại Hàn Quốc, với các chuyến đi được tổ chức hàng năm (02 lần/năm).\u003c/p\u003e\u003cp\u003e•\tHỗ trợ 100% học phí cho các chứng chỉ chuyên môn (môi giới, phân tích, quản lý quỹ), khóa học ngoại ngữ và các chương trình đào tạo chuyên sâu hàng năm.\u003c/p\u003e\u003cp\u003e•\tĐược đào tạo và hướng dẫn trực tiếp bởi các chuyên gia giàu kinh nghiệm trong ngành.\u003c/p\u003e\u003cp\u003e•\tCơ hội tham gia các hội thảo và sự kiện chuyên môn để cập nhật kiến thức và xu hướng thị trường.\u003c/p\u003e\u003cp\u003e•\tMở rộng mạng lưới quan hệ chuyên nghiệp và phát triển sự nghiệp lâu dài trong ngành chứng khoán.\u003c/p\u003e\u003cp\u003e•\tKhám sức khỏe định kỳ hàng năm, du lịch công ty và nhiều hoạt động gắn kết nội bộ khác (CEO Dinner, Pizza time, team building,…). \u003c/p\u003e\u003cp\u003e•\tTham gia các chương trình thúc đẩy doanh số với cơ chế thưởng cạnh tranh, ghi nhận xứng đáng theo kết quả kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian và địa điểm làm việc: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThời gian: Thứ Hai – Thứ Sáu, 8:00 – 17:00\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐịa điểm: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tTầng 3 – Tầng 13, Tòa nhà TNR, 180–192 Nguyễn Công Trứ, Phường Bến Thành, TP. Hồ Chí Minh\u003c/p\u003e\u003cp\u003eo\tLầu 03, 62A Phạm Ngọc Thạch, Quận 3, Tp. Hồ Chí Minh\u003c/p\u003e\u003cp\u003eo\tTầng 2, Tháp 1 toà nhà Capital Place, số 29 Liễu Giai, phường Ngọc Khánh, quận Ba Đình, Hà Nội\u003c/p\u003e\u003cp\u003eo\tTầng 8 tòa nhà Vietbank Office, 70-72 Bà Triệu, phường Hàng Bài, Quận Hoàn Kiếm, Thành phố Hà Nội\u003c/p\u003e\u003cp\u003eo\tTầng 8, toà nhà Vinaconex, số 34 Láng Hạ, phường Láng Hạ, quận Đống Đa, Hà Nội\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T99a,"])</script><script>self.__next_f.push([1,"Công ty CP Chứng khoán KIS Việt Nam (KIS) được thành lập vào 12/2010 bởi Công ty đầu tư chứng khoán Hàn Quốc (Korea Investment \u0026 Securities, Hàn Quốc) đầu tư cùng Tập đoàn dệt may Việt Nam và các cổ đông khác. KIS hiện nay có vốn điều lệ là 1.113 tỷ đồng. Công ty đầu tư chứng khoán KIS Hàn Quốc (Korea Investment \u0026 Securities, Hàn Quốc) được thành lập vào năm 1974, có trụ sở chính tại Seoul, Hàn Quốc. Với mạng lưới 98 chi nhánh rộng khắp Hàn Quốc, 6 công ty con ở nước ngoài và hơn 2.400 nhân viên, KIS là công ty chứng khoán có thị phần môi giới lớn thứ 3 tại Hàn Quốc và là một trong những định chế tài chính hàng đầu Châu Á. Tổng tài sản KIS quản lý trên toàn cầu là 32 tỷ USD, trong đó tài sản ở Việt Nam vào khoảng 1,1 tỷ USD. KIS Việt Nam được hỗ trợ mạnh mẽ từ Tập đoàn KIS tại Hàn Quốc với kinh nghiệm quản lý hơn 30 năm qua trong lĩnh vực tài chính và sự kết hợp của các chuyên gia từ nước ngoài với đội ngũ nhân viên xuất sắc, nhiều kinh nghiệm trong lĩnh vực ngân hàng, kiểm toán và thị trường vốn trong nước. KIS Việt Nam chú trọng phát triển kỹ thuật quản trị điều hành và quản trị rủi ro để đưa công ty đứng vào vị trí hàng đầu ở mọi lĩnh vực tài chính tại Việt Nam. Bên cạnh đó, chúng tôi tin rằ n khai các ý tưởng kinh doanh sáng tạo trên nền tảng mạng xã hội (TikTok, Facebook, livestream…) để thu hút, nuôi dưỡng và chuyển đổi khách hàng thành doanh thu.\u003c/p\u003e\u003cp\u003e•   Phối hợp với các bộ phận liên quan nhằm nâng cao trải nghiệm khách hàng và hiệu quả kinh doanh.\u003c/p\u003e\u003cp\u003e•   Tham gia các chương trình đào tạo, thi đua kinh doanh và các hoạt động thúc đẩy doanh số của Công ty.\u003c/p\u003e2b:T1091,"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYêu cầu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp đại học trở lên chuyên ngành Tài chính, Ngân hàng, Kinh tế hoặc các lĩnh vực liên quan.\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 01 năm kinh nghiệm trong lĩnh vực kinh doanh/sales, ưu tiên các mảng tài chính (chứng khoán, ngân hàng, bảo hiểm, quỹ đầu tư, công nghệ tài chính, tài chính tiêu dùng) hoặc các ngành dịch vụ cao cấp (du lịch, ô tô, bất động sản, hàng xa xỉ…).\u003c/p\u003e\u003cp\u003e•\tCó sẵn tệp khách hàng tiềm năng (đặc biệt phân khúc khách hàng giá trị cao) là lợi thế; có khả năng chuyển đổi khách hàng sang kênh đầu tư chứng khoán.\u003c/p\u003e\u003cp\u003e•\tĐịnh hướng kinh doanh rõ ràng, đam mê lĩnh vực chứng khoán và mong muốn gắn bó lâu dài.\u003c/p\u003e\u003cp\u003e•\tTư duy kinh doanh dựa trên kết quả; có khả năng làm việc với chỉ tiêu doanh số và chịu áp lực cao để đạt mục tiêu.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp, đàm phán và xây dựng quan hệ khách hàng tốt; chủ động trong việc tìm kiếm và phát triển khách hàng.\u003c/p\u003e\u003cp\u003e•\tCó tư duy phát triển khách hàng trên nền tảng số; biết khai thác các kênh mạng xã hội (TikTok, Facebook, livestream…) để tìm kiếm và chuyển đổi khách hàng là lợi thế lớn.\u003c/p\u003e\u003cp\u003e•\tNhạy bén với xu hướng thị trường, có khả năng đề xuất và triển khai các ý tưởng kinh doanh nhằm gia tăng doanh thu.\u003c/p\u003e\u003cp\u003e•\tTiếng Anh là lợi thế.\u003c/p\u003e\u003cp\u003e•\tTrung thực, có trách nhiệm, tuân thủ quy định và cam kết bảo mật thông tin.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThu nhập không giới hạn, bao gồm lương cứng và hoa hồng cạnh tranh, hấp dẫn.\u003c/p\u003e\u003cp\u003e•\tLương tháng 13 và thưởng hiệu quả công việc hàng năm. \u003c/p\u003e\u003cp\u003e•\tGiải thưởng hàng tháng, quý, năm dành cho môi giới có kết quả kinh doanh nổi bật.\u003c/p\u003e\u003cp\u003e•\tĐóng bảo hiểm xã hội theo mức lương đầy đủ, cấp thẻ bảo hiểm sức khỏe cá nhân (nếu đủ điều kiện).\u003c/p\u003e\u003cp\u003e•\tMiễn phí gửi xe cho toàn bộ nhân viên và phụ cấp điện thoại (nếu đủ điều kiện).\u003c/p\u003e\u003cp\u003e•\tNgân sách team building hàng quý cho từng phòng ban.\u003c/p\u003e\u003cp\u003e•\tNhân viên xuất sắc có cơ hội tham quan trụ sở chính tại Hàn Quốc, với các chuyến đi được tổ chức hàng năm (02 lần/năm).\u003c/p\u003e\u003cp\u003e•\tHỗ trợ 100% học phí cho các chứng chỉ chuyên môn (môi giới, phân tích, quản lý quỹ), khóa học ngoại ngữ và các chương trình đào tạo chuyên sâu hàng năm.\u003c/p\u003e\u003cp\u003e•\tĐược đào tạo và hướng dẫn trực tiếp bởi các chuyên gia giàu kinh nghiệm trong ngành.\u003c/p\u003e\u003cp\u003e•\tCơ hội tham gia các hội thảo và sự kiện chuyên môn để cập nhật kiến thức và xu hướng thị trường.\u003c/p\u003e\u003cp\u003e•\tMở rộng mạng lưới quan hệ chuyên nghiệp và phát triển sự nghiệp lâu dài trong ngành chứng khoán.\u003c/p\u003e\u003cp\u003e•\tKhám sức khỏe định kỳ hàng năm, du lịch công ty và nhiều hoạt động gắn kết nội bộ khác (CEO Dinner, Pizza time, team building,…). \u003c/p\u003e\u003cp\u003e•\tTham gia các chương trình thúc đẩy doanh số với cơ chế thưởng cạnh tranh, ghi nhận xứng đáng theo kết quả kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian và địa điểm làm việc: \u003c/strong\u003e\u003c/p\u003e\u003 ủa các chuyên gia từ nước ngoài với đội ngũ nhân viên xuất sắc, nhiều kinh nghiệm trong lĩnh vực ngân hàng, kiểm toán và thị trường vốn trong nước. KIS Việt Nam chú trọng phát triển kỹ thuật quản trị điều hành và quản trị rủi ro để đưa công ty đứng vào vị trí hàng đầu ở mọi lĩnh vực tài chính tại Việt Nam. Bên cạnh đó, chúng tôi tin rằng nguồn nhân lực chính là yếu tố đang và sẽ tạo nên uy tín và thành công của KIS Việt Nam trên thị trường chứng khoán. Tầm nhìn: KIS Việt Nam đặt mục tiêu phát triển thành một tập đoàn chứng khoán hàng đầu tại Việt Nam vào năm 2020 Sứ mệnh: Với mục tiêu tạo ra những giá trị gia tăng trong dịch vụ tài chính cho khách hàng, các thành viên KIS Việt Nam luôn hướng đến: - Nghiên cứu và phát triển các sản phẩm và dịch vụ tài chính tiện ích để cung cấp cho khách hàng. - Tận dụng thế mạnh kinh doanh cốt lõi để đạt được sự phát triển bền vững và gia tăng lợi nhuận ổn định. - Xây dựng KIS Việt Nam thành thương hiệu hàng đầu trong lĩnh vực dịch vụ tài chính tại Việt Nam\r\n\r\nhttps://kisvn.vn/"])</script><script>self.__next_f.push([1,"49:{\"companyId\":161689,\"jobImageURLs\":\"$4a\",\"jobVideoURLs\":\"$4b\",\"companyName\":\"Công Ty Cổ Phần Chứng Khoán KIS Việt Nam\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/85/11337021.png\",\"companySizeId\":\"\",\"companyProfile\":\"$4c\",\"contactName\":\"Ms. Mai\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Lầu 3, 180-192 Nguyễn Công Trứ, P. Nguyễn Thái Bình, Quận 1, TP.HCM\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n4d:[\"isPremium\",\"isUrgentJobM\"]\n4f:{\"serviceCode\":\"BPM\",\"startOn\":\"2026-03-20T10:56:57+07:00\",\"expiredOn\":\"2026-04-19T23:59:59+0
