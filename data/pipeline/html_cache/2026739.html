,\"default\"]\n23:Tb82,"])</script><script>self.__next_f.push([1,"HYUNDAI KEFICO VIỆT NAM – NƠI KHỞI ĐẦU SỰ NGHIỆP CỦA BẠN!\r\nHyundai Kefico Việt Nam – thành viên của Tập đoàn Hyundai Hàn Quốc, là nhà máy công nghệ cao chuyên sản xuất linh kiện điện tử thông minh cho ô tô. Trụ sở đặt tại KCN Đại An, Phường Tứ Minh, TP Hải Phòng (Hải Dương cũ), chúng tôi tự hào là doanh nghiệp số 1 tại Hải Dương với hơn 15 năm phát triển bền vững.\r\n________________________________________\r\nThành tựu nổi bật:\r\nTrong những năm qua, Công ty Hyundai Kefico Việt Nam đã đạt được rất nhiều các giải thưởng bởi các cơ quan ban ngành và chính phủ trao tặng như:\r\n•\tTop 10 Doanh nghiệp tiêu biểu vì người lao động 4 năm liên tiếp\r\n•\tTop 5 Doanh nghiệp đạt chuẩn văn hóa kinh doanh Việt Nam\r\n•\tDoanh nghiệp FDI tiêu biểu\r\n•\tDoanh nghiệp có thành tích xuất sắc về an toàn vệ sinh lao động\r\n•\tDoanh nghiệp có thành tích thực hiện tốt chính sách pháp luật, chính sách thuế, BHXH…\r\n•\tDoanh nghiệp có nhiều đóng góp cho các hoạt động cộng đồng\r\n•\t…..\r\nKhông ngừng mở rộng, Hyundai Kefico có chi nhánh Trung tâm Phát triển Phần mềm tại Hà Nội, mở ra cơ hội việc làm hấp dẫn cho các bạn trẻ.\r\n________________________________________\r\nVì sao bạn nên chọn Hyundai Kefico Việt Nam?\r\n•\tMôi trường làm việc hiện đại, năng động\r\n•\tCơ hội đào tạo tại nước ngoài (Đức, Hàn Quốc, Mỹ, Nhật Bản, Ấn Độ…)\r\nChế độ phúc lợi hấp dẫn:\r\n•\tNghỉ thứ 7 \u0026 Chủ nhật, áp dụng ca làm việc linh hoạt đối với nhân viên\r\n•\tThưởng lễ, thưởng Tết, tháng lương 13 theo tổng lương trên hợp đồng, thưởng đặc biệt theo doanh thu\r\n•\t12 ngày phép + 6 ngày nghỉ công ty (trả nguyên lương)\r\n•\tXe đưa đón nhân viên\r\n•\tDu lịch hàng năm, tiệc cuối năm, teambuilding, ngày hội công ty, sự kiện thể thao và cơ hội tham gia các hoạt động tình nguyện cùng công ty\r\n•\tTiện ích miễn phí: Sân bóng, phòng GYM, phòng bóng bàn, phòng YOGA, phòng bà bầu, nhà tắm cho CNV\r\nVới hơn 15 năm hình thành và phát triển ults, and anomalies in detail.\t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \u003c/p\u003e\u003cp\u003e \t8)     Ensure compliance with industry standards such as A-SPICE, ISO26262 (Functional Safety), and ISO21434 (Cyber Security).\t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \u003c/p\u003e\u003cp\u003e \t9)   Participate in continuous improvement activities related to testing methodologies, scenarios and tools for transmission/shift-by-wire control systems.\t \u003c/p\u003e\u003cp\u003e   10)   Ready for overseas business trips as required.\t \t \t \t \t \t \t\u003c/p\u003e25:T797,\u003cp\u003e\u003cstrong\u003e2.\tJob Requirement\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFresh graduates with relevant knowledge and skills are also encouraged to apply\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCompetence:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBSc or MSc degree in computer science, electrical engineering, or an equivalent education.\t\u003c/p\u003e\u003cp\u003e•\t"])</script><script>self.__next_f.push([1,"Prefer to have experience in HIL testing, preferably within the automotive industry. \u003c/p\u003e\u003cp\u003e•\tUnderstanding of static/dynamic test of embedded SW.\t\u003c/p\u003e\u003cp\u003e•\tExcellent analytical and problem-solving skills.\t\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNice to have:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tProficiency in programming languages such as C, Matlab and Python.\t\t \t \t \t \t \t \t \t \t \t \t \t \t \t \u003c/p\u003e\u003cp\u003e•\t Hands-on experience with HIL tools and platforms like dSPACE, NI, or Vector.\t \t \t \t \t \t \t \t \t \t \t \t \t \t \t \u003c/p\u003e\u003cp\u003e•\tStrong knowledge of automotive communication protocols (CAN, K-line, Ethernet).\t \t \t \t \t \t \t \t \t \t \t \t \t \t \u003c/p\u003e\u003cp\u003e•\tExperience with diagnostic protocols such as UDS.\t \t \t \t \t \t
