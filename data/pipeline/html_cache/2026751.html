h we were founded have stayed the same: creativity, delivering results, doing what’s right and always thinking of our customers first.\r\n\r\nOur past is full of iconic moments — but our future is going to spark many more. Our brands — Gap, Banana Republic, Old Navy, Athleta, INTERMIX, Hill City and Janie and Jack have dressed people from all walks of life and all kinds of families, all over the world, for every occasion for more than 50 years. \r\n\r\nBut we’re more than the clothes that we make. We know that business can and should be a force for good, and it’s why we work hard to make products that makes people feel good, inside and out. It’s why we’re committed to giving back to the communities where we live and work. If you're one of the super-talented individuals who are full of ideas, aren't afraid to take risks and love to make a difference, come grow with us!\r\n\r\nGap Inc. is an equal-opportunity employer and is committed to providing a workplace free from harassment and discrimination. We are committed to recruiting, hiring, training and promoting qualified people of all backgrounds, and make all employment decisions without regard to any protected status. We have received numerous awards for our long-held commitment to equality and will continue to foster a diverse and inclusive environment of belonging. In 2022, we were recognized by Forbes as one of the World's Best Employers and one of the Best Employers for Diversity."])</script><script>self.__next_f.push([1,"24:Td59,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eAbout the Role:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis is a pivotal leadership role that combines strategic oversight of corporate services with financial governance. The position demands a logical thinker with exceptional leadership skills, a passion for excellence, and a strong desire to make a difference. The successful candidate will create significant impact by driving operational efficiency, ensuring compliance, and fostering a culture of continuous improvement for the South East Asia Region ( Vietnam, Cambodia \u0026 Indonesia)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat You’ll Do:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStatutory \u0026 Financial Reporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tEnsure timely and accurate statutory and management reporting, including full set of accounts and consolidation.\u003c/p\u003e\u003cp\u003e•\tReview and validate reconciliations for Balance Sheet and Profit \u0026 Loss items with precision.\u003c/p\u003e\u003cp\u003e•\tGuarantee compliance with tax regulations, statutory filings, audits, and internal control requirements (e.g., banking and chop usage policy, code of business conduct).\u003c/p\u003e\u003cp\u003e•\tManage cash flow effectively: liaise with Regional/Corporate teams on funding requirements, prepare consolidated cash flow projections, and oversee banking matters.\u003c/p\u003e\u003cp\u003e•\tPartner with Corporate Treasury, Legal, and Tax departments to drive strategic initiatives.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePlanning, Analysis \u0026 Operations\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLead monthly forecasting and annual budgeting for operating expenses and Capex requirements.\u003c/p\u003e\u003cp\u003e•\tDeliver insightful variance analysis and commentary to support decision-making.\u003c/p\u003e\u003cp\u003e•\tAlign financial planning with business strategies, developing good business case, incorporating initiative impacts into budgets and forecasts.\u003c/p\u003e\u003cp\u003e•\tIdentify cost drivers and trends to establish realistic P\u0026L targets and performance measurements.\u003c/p\u003e\u003cp\u003e•\tCollaborate with business partners to analyze deviations and implement corrective actions.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCost \u0026 Process Re-engineering\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDrive continuous process improvement and cost efficiency initiatives to simplify operations and enhance productivity.\u003c/p\u003e\u003cp\u003e•\tImplement control changes aligned with Supply Chain strategy to strengthen governance.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOffice Facilities \u0026 Administration\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLead and inspire administrative teams to deliver a comprehensive range of office services, including reception, mailroom operations, office supplies, event management, and facilities support.\u003c/p\u003e\u003cp\u003e•\tManage outsourced service providers \u0026travel agents, ensuring strict adherence to service level agreements and performance standards supporting what is required for the business\u003c/p\u003e\u003cp\u003e•\tOversee procurement budgets and negotiate service contracts to achieve cost optimization and superior service delivery.\u003c/p\u003e\u003cp\u003e•\tDrive high-impact projects such as office renovations, relocations, lease negotiations, and corporate security initiatives.\u003c/p\u003e\u003cp\u003e•\tAct as custodian for office fixed assets and equipment inventory, ensuring accountability and efficiency.\u003c/p\u003e\u003cp\u003e•\tReview and implement robust policies and procedures, including procurement, office lease, and corporate security to establish regional best practices.\u003c/p\u003e\u003cp\u003e•\tLead and execute the local Business Continuity Plan (BCP) to safeguard operations.\u003c/p\u003e\u003cp\u003e•\tChampion talent development, succession planning, and organizational effectiveness.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T81d,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eWho You Are:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLogical and Strategic Thinking with strong fina
