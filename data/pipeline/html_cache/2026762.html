ng nhân tài trong lĩnh vực công nghệ thông tin trong nước và quốc tế.\r\nVinSmart Future bao gồm các thành phần trọng tâm:\r\n-\tHạ tầng công nghệ: trung tâm dữ liệu, máy chủ, đường truyền, bảo mật...\r\n-\tDịch vụ dùng chung cho quản trị sản xuất kinh doanh: AI, dữ liệu, định danh người dùng, quản lý nhân sự, tài chính - kế toán, mua sắm doanh nghiệp...\r\n-\tỨng dụng đầu cuối: Siêu ứng dụng tích hợp toàn bộ dịch vụ, các ứng dụng chuyên biệt (ví dụ: Xanh SM), ứng dụng nội bộ (ví dụ: ILoveVingroup)...\r\nVới bản lĩnh tiên phong và nội lực công nghệ vững mạnh, VinSmart Future cam kết bứt phá để tạo nên những đột phá công nghệ cho Vingroup, đồng thời đóng góp giá trị thiết thực cho xã hội. Đây cũng là bước tiến quan trọng trong việc hiện thực hóa siêu ứng dụng quốc dân, định hình phong cách sống số hiện đại, thông minh và đẳng cấp tại Việt Nam.\r\n\r\nQUYỀN LỢI CHUNG KHI GIA NHẬP VINSMART FUTURE\r\n•\tThời gian làm việc, chấm công linh hoạt (Work from home vào thứ 7 làm việc).\r\n•\tMức thu nhập, các gói thưởng hấp dẫn, cạnh tranh mạnh mẽ so với thị trường.\r\n•\tĐược hưởng chế độ ưu đãi khi sử dụng các dịch vụ thuộc hệ sinh thái Tập đoàn: Ưu đãi học phí (Vinschool), khám chữa bệnh (Vinmec), nghỉ dưỡng (Vinpearl), mua xe (VinFast), thuê hoặc/và mua nhà (Vinhomes) … theo chế độ của Tập đoàn.\r\n•\tCơ hội tiếp cận dự án chiến lược công nghệ trọng điểm, quy mô lớn.\r\n•\tCơ hội làm việc trong môi trường công nghệ chuyên nghiệp, quy tụ các nhà khoa học, chuyên gia, kỹ sư đến từ các Công ty công nghệ hàng đầu Việt Nam và thế giới.\r\n•\tCung cấp các nguồn học tập miễn phí trên các nền tảng Udemy, Coursera, O’Reilly; hội thảo nội bộ; tài trợ chứng chỉ và chương trình cố vấn đặc biệt từ Ban lãnh đạo Tập đoàn và Công ty.\r\n•\tCơ hội tham gia các Câu lạc bộ công nghệ của Tập đoàn, các sự kiện công nghệ nội bộ để học hỏi, phát triển những dự án, ý tưởng cá nhân vào thực tế.\r\n•\tCung cấp các chương trình đào tạo để trở thành \"Giảng viên nội bộ\" tham gia chia sẻ chuyên môn với những quyền lợi đặc biệt.\r\n•\tĐược hưởng đầy đủ các chế độ bảo hiểm theo quy định của Luật Lao động (BHXH, BHYT, BHTN) và được Công ty mua Bảo hiểm sức khỏe cá nhân theo cấp bậc vị trí, khám sức khỏe định kỳ tại Bệnh viện và Trung tâm khám sức khỏe uy tín trên toàn quốc.\r\n•\t12 ngày nghỉ phép năm, nghỉ các ngày lễ, Tết theo quy định của pháp luật.\r\n•\tPhụ cấp ăn trưa.\r\n•\tTham gia các hoạt động nội bộ, hoạt động teambuilding, sự kiện hàng năm của Công ty.\r\n\r\nVINGROUP INTRODUCTION \r\nVingroup is one of the largest private conglomerates in Vietnam, operating across multiple industries with key sectors including: Industrials - Technology, Real Estate \u0026 Services, Infrastructure, Green Energy, and Social Enterprises. Guided by its mission “Create a better life for all people” , Vingroup has created impactful products that enhance the quality of life for all people and elevate the nation’s position on the global stage.\r\n\r\nVINSMART FUTURE COMPANY INTRODUCTION\r\nOn September 11, 2025, VinSmart Future was officially established as Vingroup’s dedicated technology Company, with the mission “Create a better life for all people through advanced technology and superior digital experiences.” VinSmart Future aims to build Vingroup’s unified technology platform, connecting intelligent operations management with a super app for customers to deliver seamless and exceptional digital experiences. The Company serves as a hub for top domestic and international information technology talents.\r\nVinSmart Future focuses on the following core components:\r\n-\tTechnology Infrastructure: Data centers, servers, network systems, and cybersecurity.\r\n-\tShared Services for Business Operations Management: Artificial intelligence, data, user identity management, human resources, finance and accounting, enterprise procurement, and more.\r\n-\tEnd-User Applications: A super app integrating all services, specialized applications (e.g: Xanh SM), and internal apps (e.g: ILoveVingroup)...\r\nWith its pioneering spirit and robust technological capabilities, VinSmart Future is committed to breakthroughs that will drive innovation for Vingroup and deliver meaningful value to society. This marks a crucial step toward realizing a national super app and shaping a modern, intelligent, and premium digital lifestyle in Vietnam.\r\n\r\nGENERAL BENEFITS OF JOINING VINSMART FUTURE\r\n•\tFlexible working hours and attendance policy (Work from home on designated working Saturdays).\r\n•\tCompetitive salary and attractive bonus packages, highly competitive compared to the market.\r\n•\tPreferential benefits when using services within the Vingroup: discounted tuition fees (Vinschool), medical services (Vinmec), resort stays (Vinpearl), vehicle purchases (VinFast), and house rentals and/or purchases (Vinhomes) under the Vingroup’s policies.\r\n•\tOpportunities to participate in key strategic, large-scale technology projects.\r\n•\tThe chance to work in a professional technology environment, bringing together scientists, experts, and engineers from leading technology Companies in Vietnam and worldwide.\r\n•\tAccess to free learning resources on platforms such as Udemy, Coursera, and O’Reilly; internal workshops; sponsored certifications; and special mentorship programs from the Vingroup’s and Company’s leaders.\r\n•\tOpportunities to join the Vingroup’s technology clubs and internal technology events to learn, grow, and transform personal projects and ideas into reality.\r\n•\tTraining programs to become an “Internal Trainer,” enabling you to share expertise internally with specialprivileges.\r\n•\tFull insurance coverage in accordance with Labor Law (social insurance, health insurance, unemployment insurance), plus personal health insurance purchased by the Company based on position level, and periodic health check-ups at reputable hospitals and health centers nationwide.\r\n•\t12 days of annual leave, plus public holidays and Tet leave as prescribed by
