 chính, tờ khai thuế;\u003c/p\u003e\u003cp\u003eThực hiện các công việc khác theo sự phân công của Quản lý trực tiếp.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. CHUYÊN VIÊN KẾ LOGISTICS\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Theo dõi và hạch toán các nghiệp vụ kinh tế phát sinh của ngành logistics.\u003c/p\u003e\u003cp\u003e-  Thực hiện kê khai và nộp các loại thuế định kỳ (GTGT/VAT, TNCN/PIT, Nhà thầu/FCT, TNDN/CIT...), đảm bảo tính chính xác và tuân thủ thời gian quy định.\u003c/p\u003e\u003cp\u003e- - Quản lý và theo dõi công nợ: phải thu/ phải trả của khách hàng/ nhà cung cấp, đôn đốc thu hồi công nợ. Lập báo cáo, phân tích và Đối chiếu công nợ.\u003c/p\u003e\u003cp\u003e- Quản lý và theo dõi hàng tồn kho\u003c/p\u003e\u003cp\u003e- Thực hiện các nghiệp vụ liên quan đến thuế: Thu thập, kiểm tra và lưu trữ hóa đơn, chứng từ thuế. Lập tờ khai thuế giá trị gia tăng (GTGT), thuế thu nhập doanh nghiệp (TNDN), thuế thu nhập cá nhân (TNCN) và các loại thuế khác theo quy định.\u003c/p\u003e\u003cp\u003e- Tham gia vào quá trình kiểm kê tài sản cố định, công cụ dụng cụ.\u003c/p\u003e\u003cp\u003e- Lập các báo cáo kế toán theo yêu cầu quản lý. Lập các báo cáo tài chính theo chuẩn mực kế toán Việt Nam (Bảng cân đối kế toán, Báo cáo kết quả hoạt động kinh doanh, Báo cáo lưu chuyển tiền tệ, Thuyết minh báo cáo tài chính).\u003c/p\u003e\u003cp\u003e- Cập nhật thường xuyên, tìm hiểu và giải thích các luật thuế, nghị định mới nhất của Việt Nam (đặc biệt liên quan đến lĩnh vực logistics/vận tải), đánh giá tác động và đề xuất phương án thích ứng cho doanh nghiệp.\u003c/p\u003e\u003cp\u003e- Thực hiện các các công việc khác theo yêu cầu của Ban Lãnh đạo Công ty.\u003c/p\u003e\u003cp\u003eYêu cầu: ít nhất 03 năm kinh nghiệm làm kế toán trong lĩnh vực Logistics.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T8de,"])</script><script>self.__next_f.push([1,"Bằng khát vọng cống hiến giá trị đích thực, hơn 20 năm qua, Xuân
