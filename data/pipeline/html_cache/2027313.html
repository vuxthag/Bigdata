 đội ngũ pháp lý của THƯ VIỆN PHÁP LUẬT, doanh nghiệp, chuyên gia pháp lý và người sử dụng pháp luật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChúng tôi đang tuyển: 1/ Data Platform Lead, 2/ Legal Data Engineer, 3/ Data Engineer / Analytics Engineer, tham gia xây dựng Data Platform cho TVPL AI và Customer Data Platform (CDP).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Vai trò nhóm Data\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm Data chịu trách nhiệm xây dựng và vận hành nền tảng dữ liệu phục vụ cho hai bài toán lớn:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1) TVPL AI / Legal AI Platform\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eXử lý dữ liệu pháp luật, tài liệu pháp lý, tài liệu khách hàng; tổ chức dữ liệu theo cấu trúc phù hợp cho RAG, LLM, reasoning và evaluation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2) CDP / Customer Data Platform\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eXây nền dữ liệu cho hồ sơ khách hàng, hành vi sử dụng, event tracking, segmentation, analytics, và các mô hình chấm điểm phục vụ kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBạn tham gia vào hệ thống đang được xây dựng thật, có sản phẩm thật, có 2 triệu người dùng thật, có Team AI, Team Phần mềm, Team Hạ tầng và Team Pháp lý cực mạnh.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Trách nhiệm chính \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBạn sẽ tham gia \u003cstrong\u003e\u003cem\u003e1 hoặc nhiều mảng công việc sau\u003c/em\u003e\u003c/strong\u003e, tùy theo vị trí phù hợp:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1) Data Platform Architecture\u003c/em\u003e\u003c/strong\u003e\u003cem\u003e (Kiến trúc nền tảng dữ liệu)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e• Thiết kế và kiến trúc dữ liệu tổng thể, bao gồm data lake, data warehouse và data marts .\u003c/p\u003e\u003cp\u003e• Thiết kế dữ liệu có khả năng mở rộng, phục vụ cả AI reasoning lẫn business analytics.\u003c/p\u003e\u003cp\u003e• Định nghĩa data standards, governance policies và best practices dùng chung giữa các Team.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2) Legal Data Pipeline \u003c/em\u003e\u003c/strong\u003e\u003cem\u003e(Luồng xử lý dữ liệu pháp lý)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng pipeline ingest, parse, structure và enrich dữ liệu pháp lý như luật, nghị định, thông tư, hợp đồng, hồ sơ, tài liệu khách hàng.\u003c/p\u003e\u003cp\u003e•  Tổ chức dữ liệu theo logic pháp lý, hỗ trợ retrieval , citation và reasoning pipeline.\u003c/p\u003e\u003cp\u003e•  Thiết kế metadata để AI có thể hiểu nguồn, cấu trúc và ngữ cảnh của tài liệu.\u003c/p\u003e\u003cp\u003e•  Phối hợp với Team Pháp lý để kiểm tra và cải thiện chất lượng dữ liệu pháp luật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3) ETL / ELT / Batch / Streaming\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Triển khai các pipeline ETL/ELT theo cả mô hình batch và streaming .\u003c/p\u003e\u003cp\u003e•  Hỗ trợ cả xử lý dữ liệu real-time và offline .\u003c/p\u003e\u003cp\u003e•  Xây dựng pipeline có khả năng mở rộng, ổn định và dễ vận hành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4) Data Quality / Lineage / Schema\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Đảm bảo chất lượng dữ liệu thông qua validation rules, schema management và data lineage .\u003c/p\u003e\u003cp\u003e•  Theo dõi độ mới của dữ liệu, độ trễ xử lý, tính nhất quán và độ tin cậy của dataset.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e5) AI Dataset Readiness (Mức sẵn sàng dữ liệu cho AI)\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phối hợp với Team AI Platform để tối ưu dataset cho LLM, RAG, retrieval và evaluation.\u003c/p\u003e\u003cp\u003e• Chuẩn hóa dữ liệu cho vectorization, search systems , benchmark dataset và guardrails .\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e6) CDP Data Capability\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Xây dựng dữ liệu cho customer profile, event tracking, segmentation, analytics datasets, scoring data flow và các bài toán phân tích kinh doanh.\u003c/p\u003e\u003cp\u003e•  Làm việc với Product, Business Analyst, Team Phần mềm và Team Vận hành để dữ liệu phục vụ đúng nhu cầu sản phẩm và thương mại hóa.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e7) Teamwork / Leadership\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Với vị trí Data Platform Lead:  Dẫn dắt, hướng dẫn Team Data Engineering, bảo đảm chất lượng bàn giao và khả năng mở rộng của hệ thống.\u003c/p\u003e\u003cp\u003e•  Với các vị trí Engineer: Chịu trách nhiệm mạnh ở mảng chuyên môn của mình, phối hợp chặt với AI Team, software Team, infrastructure Team và Legal expert team.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T1031,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eA. Kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Có kinh nghiệm thực tế đến Data Engineering, Data Platform, Data Pipeline, Analytics Engineering, hoặc các hệ thống dữ liệu phục vụ AI / product / analytics.\u003c/p\u003e\u003cp\u003e2. \u003cstrong\u003e\u003cem\u003eData Platform Lead\u003c/em\u003e\u003c/strong\u003e, ưu tiên ứng viên có 2 năm kinh nghiệm ở vai trò Lead hoặc tương đương trong xây dựng data platform, warehouse, data pipeline hoặc hệ thống dữ liệu phục vụ AI / analytics / product.\u003c/p\u003e\u003cp\u003e3. \u003cstrong\u003e\u003cem\u003eLegal Data Engineer\u003c/em\u003e\u003c/strong\u003e hoặc \u003cstrong\u003e\u003cem\u003eData Engineer / Analytics Engineer\u003c/em\u003e\u003c/strong\u003e, chấp nhận ứng viên có nền tảng tốt và có khả năng phát triển lên vai trò lớn hơn.\u003c/p\u003e\u003cp\u003e4. Đã từng làm các hệ thống chạy thật với dữ liệu thật, người dùng thật là lợi thế lớn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Năng lực kỹ thuật\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eỨng viên nên có kinh nghiệm với một hoặc nhiều công nghệ sau:\u003c/p\u003e\u003cp\u003e1. SQL, Python\u003c/p\u003e\u003cp\u003e2. Công cụ ETL/ELT như Airflow, Spark, Flink\u003c/p\u003e\u003cp\u003e3. Data warehouse như BigQuery, Snowflake, Redshift hoặc tương đương\u003c/p\u003e\u003cp\u003e4. Streaming như Kafka hoặc tương đương\u003c/p\u003e\u003cp\u003e5. Xử lý tài liệu, document parsing, metadata modeling\u003c/p\u003e\u003cp\u003e6. Data pipeline cho các hệ thống AI hoặc analytics\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Kỹ năng hệ thống\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eỨng viên nên hiểu một hoặc nhiều nội dung sau:\u003c/p\u003e\u003cp\u003e1. Distributed data systems\u003c/p\u003e\u003cp\u003e2. Data architecture\u003c/p\u003e\u003cp\u003e3. Data quality, lineage, governance\u003c/p\u003e\u003cp\u003e4. Search systems, vector databases, hoặc semantic data modeling\u003c/p\u003e\u003cp\u003e5. Cách dữ liệu phục vụ cho AI reasoning và business analytics\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. Điểm cộng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eỨng viên có lợi thế nếu:\u003c/p\u003e\u003cp\u003e1. Có kinh nghiệm với RAG pipelines, vector databases hoặc search systems;\u003c/p\u003e\u003cp\u003e2. Có hiểu biết về knowledge graph hoặc semantic data modeling;\u003c/p\u003e\u003cp\u003e3. Đã từng làm việc với legal data hoặc các hệ thống dữ liệu chuyên biệt theo domain;\u003c/p\u003e\u003cp\u003e4. Có kinh nghiệm với customer event systems, customer profile, segmentation, hoặc analytics pipelines;\u003c/p\u003e\u003cp\u003e5. Từng tham gia xây dựng hệ thống dữ liệu quy mô lớn, có yêu cầu cao về độ ổn định và khả năng mở rộng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Tư duy chúng tôi tìm kiếm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tHiểu rằng dữ liệu không chỉ để lưu trữ, mà phải phục vụ được AI và sản phẩm thật;\u003c/p\u003e\u003cp\u003e2.\tHiểu rằng dữ liệu sai, dữ liệu thiếu cấu trúc, dữ liệu không kiểm soát được chất lượng thì AI và analytics đều sẽ sai;\u003c/p\u003e\u003cp\u003e3.\tCó tư duy xây hệ thống bền vững, có khả năng mở rộng và dùng được lâu dài;\u003c/p\u003e\u003cp\u003e4.\tCó trách nhiệm với chất lượng bàn giao;\u003c/p\u003e\u003cp\u003e5.\tCó khả năng làm việc liên chức năng với AI Engineer, Software Engineer, DevOps, Product Manager và Chuyên viên pháp lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Môi trường làm việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tLàm việc trực tiếp với đội ngũ xây dựng TVPL AI và CDP của THƯ VIỆN PHÁP LUẬT;\u003c/p\u003e\u003cp\u003e2.\tCó đội AI Research / AI Platform / Software / DevOps / Product / Legal Expert cùng làm;\u003c/p\u003e\u003cp\u003e3.\tCó dữ liệu pháp luật lớn, dữ liệu sản phẩm thật, dữ liệu khách hàng thật;\u003c/p\u003e\u003cp\u003e4.\tCó cơ hội xây nền tảng dữ liệu cho một hệ thống Legal AI và Customer Data Platform quy mô lớn tại Việt Nam;\u003c/p\u003e\u003cp\u003e5.\tCó cơ hội phát triển lên các vai trò lớn hơn theo năng lực thực tế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Quy trình tuyển dụng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tTrao đổi online về kinh nghiệm data platform, data pipeline, warehouse, document processing, analytics hoặc AI data;\u003c/p\u003e\u003cp\u003e2.\tGặp trực tiếp để chia sẻ hiện trạng hệ thống, thảo luận bài toán dữ liệu thực tế và hướng giải quyết;\u003c/p\u003e\u003cp\u003e3.\tThảo luận vai trò phù hợp nhất với bạn trong 03 vị trí đang tuyển.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T11dd,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Giới thiệu dự án\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTHƯ VIỆN PHÁP LUẬT AI – WORKSPACE là Bàn làm việc AI pháp luật dành cho đội ngũ pháp lý của THƯ VIỆN PHÁP LUẬT, doanh nghiệp, chuyên gia pháp lý và người sử dụng pháp luật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChúng tôi đang tuyển: 1/ Data Platform Lead, 2/ Legal Data Engineer, 3/ Data Engineer / Analytics Engineer, tham gia xây dựng Data Platform cho TVPL AI và Customer Data Platform (CDP).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Vai trò nhóm Data\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm Data chịu trách nhiệm xây dựng và vận hành nền tảng dữ liệu phục vụ cho hai bài toán lớn:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1) TVPL AI / Legal AI Platform\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eXử lý dữ liệu pháp luật, tài liệu pháp lý, tài liệu khách hàng; tổ chức dữ liệu theo cấu trúc phù hợp cho RAG, LLM, reasoning và evaluation.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2) CDP / Customer Data Platform\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eXây nền dữ liệu cho hồ sơ khách hàng, hành vi sử dụng, event tracking, segmentation, analytics, và các mô hình chấm điểm phục vụ kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBạn tham gia vào hệ thống đang được xây dựng thật, có sản ph ử lý dữ liệu real-time và offline .\u003c/p\u003e\u003cp\u003e•  Xây dựng pipeline có khả năng mở rộng, ổn định và dễ vận hành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4) Data Quality / Lineage / Schema\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Đảm bảo chất lượng dữ liệu thông qua validation rules, schema management và data lineage .\u003c/p\u003e\u003cp\u003e•  Theo dõi độ mới của dữ liệu, độ trễ xử lý, tính nhất quán và độ tin cậy của dataset.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e5) AI Dataset Readiness (Mức sẵn sàng dữ liệu cho AI)\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phối hợp với Team AI Platform để tối ưu dataset cho LLM, RAG, retrieval và evaluation.\u003c/p\u003e\u003cp\u003e• Chuẩn hóa dữ liệu cho vectorization, search systems , benchmark dataset và guardrails .\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e6) CDP Data Capability\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Xây dựng dữ liệu cho customer profile, event tracking, segmentation, analytics datasets, scoring data flow và các bài toán phân tích kinh doanh.\u003c/p\u003e\u003cp\u003e•  Làm việc với Product, Business Analyst, Team Phần mềm và Team Vận hành để dữ liệu phục vụ đúng nhu cầu sản phẩm và thương mại hóa.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e7) Teamwork / Leadership\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•  Với vị trí Data Platform Lead:  Dẫn dắt, hướng dẫn Team Data Engineering, bảo đảm chất lượng bàn giao và khả năng mở rộng của hệ thống.\u003c/p\u003e\u003cp\u003e•  Với các vị trí Engineer: Chịu trách nhiệm mạnh ở mảng chuyên môn của mình, phối hợp chặt với AI Team, software Team, infrastructure Team và Legal expert team.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:T1031,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eA. Kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Có kinh nghiệm thực tế đến Data Engineering, Data Platform, Data Pipeline, Analytics Engineering, hoặc các hệ thống dữ liệu phục vụ AI / product / analytics.\u003c/p\u003e\u003cp\u003e2. \u003cstrong\u003e\u003cem\u003eData Platform Lead\u003c/em\u003e\u003c/strong\u003e, ưu tiên ứng viên có 2 năm kinh nghiệm ở vai trò Lead hoặc tương đương trong xây dựng data platform, warehouse, data pipeline hoặc hệ thống dữ liệu phục vụ AI / analytics / product.\u003c/p\u003e\u003cp\u003e3. \u003cstrong\u003e\u003cem\u003eLegal Data Engineer\u003c/em\u003e\u003c/strong\u003e hoặc \u003cstrong\u003e\u003cem\u003eData Engineer / Analytics Engineer\u003c/em\u003e\u003c/strong\u003e, chấp nhận ứng viên có nền tảng tốt và có khả năng phát triển lên vai trò lớn hơn.\u003c/p\u003e\u003cp\u003e4. Đã từng làm các hệ thống chạy thật với dữ liệu thật, người dùng thật là lợi thế lớn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Năng lực kỹ thuật\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eỨng viên nên có kinh nghiệm với một hoặc nhiều công nghệ sau:\u003c/p\u003e\u003cp\u003e1. SQL, Python\u003c/p\u003e\u003cp\u003e2. Công cụ ETL/ELT như Airflow, Spark, Flink\u003c/p\u003e\u003cp\u003e3. Data warehouse như BigQuery, Snowflake, Redshift hoặc tương đương\u003c/p\u003e\u003cp\u003e4. Streaming như Kafka hoặc tương đương\u003c/p\u003e\u003cp\u003e5. Xử lý tài liệu, document parsing, metadata modeling\u003c/p\u003e\u003cp\u003e6. Data pipeline cho các hệ thống AI hoặc analytics\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Kỹ năng hệ thống\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eỨng viên nên hiểu một hoặc nhiều nội dung sau:\u003c/p\u003e\u003cp\u003e1. Distributed data systems\u003c/p\u003e\u003cp\u003e2. Data architecture\u003c/p\u003e\u003cp\u003e3. Data quality, lineage, governance\u003c/p\u003e\u003cp\u003e4. Search systems, vector databases, hoặc semantic data modeling\u003c/p\u003e\u003cp\u003e5. Cách dữ liệu phục vụ cho AI reasoning và business analytics\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. Điểm cộng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eỨng viên có lợi thế nếu:\u003c/p\u003e\u003cp\u003e1. Có kinh nghiệm với RAG pipelines, vector databases hoặc search systems;\u003c/p\u003e\u003cp\u003e2. Có hiểu biết về knowledge graph hoặc semantic data modeling;\u003c/p\u003e\u003cp\u003e3. Đã từng làm việc với legal data hoặc các hệ thống dữ liệu chuyên biệt theo domain;\u003c/p\u003e\u003cp\u003e4. Có kinh nghiệm với customer event systems, customer profile, segmentation, hoặc analytics pipelines;\u003c/p\u003e\u003cp\u003e5. Từng tham gia xây dựng hệ thống dữ liệu quy mô lớn, có yêu cầu cao về độ ổn định và khả năng mở rộng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Tư duy chúng tôi tìm kiếm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tHiểu rằng dữ liệu không chỉ để lưu trữ, mà phải phục vụ được AI và sản phẩm thật;\u003c/p\u003e\u003cp\u003e2.\tHiểu rằng dữ liệu sai, dữ liệu thiếu cấu trúc, dữ liệu không kiểm soát được chất lượng thì AI và analytics đều sẽ sai;\u003c/p\u003e\u003cp\u003e3.\tCó tư duy xây hệ thống bền vững, có khả năng mở rộng và dùng được lâu dài;\u003c/p\u003e\u003cp\u003e4.\tCó trách nhiệm với chất lượng bàn giao;\u003c/p\u003e\u003cp\u003e5.\tCó khả năng làm việc liên chức năng với AI Engineer, Software Engineer, DevOps, Product Manager và Chuyên viên pháp lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Môi trường làm việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tLàm việc trực tiếp với đội ngũ xây dựng TVPL AI và CDP của THƯ VIỆN PHÁP LUẬT;\u003c/p\u003e\u003cp\u003e2.\tCó đội AI Research / AI Platform / Software / DevOps / Product / Legal Exp
