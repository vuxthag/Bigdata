aration, cross-departmental/cross-country financial collaboration, and special financial work (such as transfer pricing, statutory financial statements, etc.). Ensure the accuracy, completeness of the group's financial data and the timeliness of reports and provide core financial support for management decision-making and external compliance requirements.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e**Responsibilities**\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Group Entity Accounting and Month-end Closing: Be responsible for monthly accounting and month-end closing work for designated group entities. Collect and verify vouchers such as expenses, payroll entries and bank statements, enter journal entries and adjust accruals, complete bank reconciliation, resolve data discrepancies, and finally complete closing and submitting to the group consolidation team.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Intercompany Reconciliation and Settlement: Liaise with global country finance teams and group Treasury team monthly, collect intercompany transaction records, extract balance data from the system, verify discrepancies and resolve timing errors, coordinate to confirm final balances, execute netting settlements, and prepare reconciliation reports and settlement summaries.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Group and Country-level Month-end Reporting: Receive financial data from entities in countries monthly. Complete the preparation and consolidation elimination of group and country-level MR and CBP reports, collect trial balances and schedules from various countries, and output consolidated monthly management reports.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Basic financial data collection and sorting: Collect financial data from designated country finance teams according to templates, conduct preliminary check of data completeness (e.g., whether required fields are filled), and submit the sorted data to the Sr. Analyst for accurate verification.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Payment Processing and Expense Reimbursement: Process vendor payments as needed, handle expense reimbursements weekly, and process payroll monthly. Upload vouchers to the system, verify the authenticity of invoices/reimbursement claims, initiate payments through bank after completing the approval process, and retain payment confirmations, bank transfer records and other vouchers.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Cost Allocation Invoicing and Collection Tracking: Continuously track costs, complete cost allocation invoicing to various countries on a quarterly basis, and track collection progress. Allocate professional fees, payroll costs, etc. in accordance with transfer pricing policies, issue cost allocation invoices and organize allocation reports.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T654,\u003cp\u003e\u003cstrong\u003eQualifications:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Bachelor’s degree in finance, Accounting, Economics, or a related field.\u003c/p\u003e\u003cp\u003e• 5-8 years of experience in basic financial operations, accounting clerical work, or finance support within a company with cross-regional business.\u003c/p\u003e\u003cp\u003e• Basic understanding of IFRS/GAAP standards; familiar with common financial document types and basic financial work processes.\u003c/p\u003e\u003cp\u003e• Master basic operation of ERP systems and proficiency in Excel (pivot tables, VLOOKUP, basic formulas). Experience with Zoho or SharePoint is a plus.\u003c/p\u003e\u003cp\u003e• Good data sorting ability, able to complete basic data collation and preliminary check according to requirements.\u003c/p\u003e\u003cp\u003e• Clear communication skills: Fluent i l work processes.\u003c/p\u003e\u003cp\u003e• Master basic operation of ERP systems and proficiency in Excel (pivot tables, VLOOKUP, basic formulas). Experience with Zoho or SharePoint is a plus.\u003c/p\u003e\u003cp\u003e• Good data sorting ability, able to complete basic data collation and preliminary check according to requirements.\u003c/p\u003e\u003cp\u003e• Clear communication skills: Fluent in English (written and spoken) for daily work communication.\u003c/p\u003e\u003cp\u003e• Careful and responsible work attitude, with the ability to complete assigned tasks on time and ensure basic data accuracy.\u003c/p\u003e\u003cp\u003e• Strong learning ability, able to quickly master new work processes and cooperate with the team to achieve work goals.\u003c/p\u003e\u003cp\u003ePreferred Skills\u003c/p\u003e\u003cp\u003e• Experience in basic at R2R and support to monthly closing auxiliary work is an advantage.\u003c/p\u003e\u003cp\u003e• Familiar with electronic office tools and able to complete standardized document sorting and filing.\u003c/p\u003e\u003cp\u003e• Experience with international shipping operations and cross-border financial transactions is a plus.\u003c/p\u003e\u003cp\u003e• Experience in communicating with offshore teams or cross-regional support teams is a plus.\u003c/p\u003e\u003cp\u003e• In the process of obtaining professional certifications (CPA, CMA, ACCA) is a plus.\u003c/p\u003e2d:{\"skillName\":\"Communication Skills\",\"skillId\":988842,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"ACCA\",\"skillId\":899151,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Finance Analyst\",\"skillId\":1021982,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"Finance Analyst\",\"skillId\":1426490,\"skillWeight\":100,\"isExisted\":false}\n31:{\"skillName\":\"Finance Management\",\"skillId\":991432,\"skillWeight\":100,"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"\"i
