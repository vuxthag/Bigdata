ại giá trị thặng dư cho khách hàng.\r\n\r\nTầm nhìn\r\nATAD sẽ trở thành công ty hàng đầu Việt Nam trong lĩnh vực thiết kế, sản xuất và lắp dựng các sản phẩm thép công nghiệp chất lượng cao phục vụ ngành xây dựng.\r\n\r\nSứ mệnh\r\nATAD đem lại giá trị thặng dư, sự thành công cho khách hàng và các đối tác24:Tbd2,"])</script><script>self.__next_f.push([1,"ATAD is a leading EPC contractor for steel structures and sheeting in Vietnam and the region, delivering integrated solutions for industrial, commercial, and infrastructure projects worldwide. With more than two decades of experience, ATAD has established a strong reputation for engineering precision, manufacturing excellence, and reliable project execution across over 60 countries.\r\n\r\nWith an annual capacity of 216,000 tons of steel structures, ATAD provides a comprehensive scope of services: from design, fabrication, logistics, installation to maintenance. The company operates 13 offices worldwide and has delivered projects in over 60 countries for major clients such as Samsung, Heineken, Hyundai, Toyota, P\u0026G, Sanofi, VinFast, and Hoa Phat.\r\n\r\nThe company specializes in pre-engineered steel buildings and complex steel structures for factories, warehouses, high-rise buildings, heavy industrial facilities, shopping malls, exhibition centers, and large-scale infrastructure works such as airports, railway stations, and metro systems.  \r\n\r\nATAD operates advanced manufacturing facilities and complies with a comprehensive set of international certifications, including ISO:9001, ISO:14001, ISO:14064-1, ISO:14067, ISO:45001, ISO:3834, EN:1090, LEED, CWB, IAS AC472, H-Grade, and AISC. Driven by innovation, standardized execution, and sustainability, ATAD continues to strengthen its position as a trusted EPC partner for complex rail and infrastructure projects across the region and globally.\r\n\r\nATAD has also contributed to notable projects  including the Long Thanh International Airport project, Metro Rail Transit Line 7 in the Philippines, Jackson Generation Power Plant in the United States, Kampala Flyover Project in Uganda, Matarbari Power Plant in Bangladesh, H2 Green Steel Plant in Sweden, the Vietnam Exhibition Center (VEC), the Hoa Phat Dung Quat Steel Complex, as well as major airport developments such as Tan Son Nhat Terminal T3, Cam Ranh International Airport, Da Nang International Airport, and Wattay International Airport in Laos. \r\n\r\nVission\r\n\r\nBy 2035, ATAD aims to become the leading EPC steel structure group in the Asia - Pacific region, pioneering innovation, creativity, and sustainable development. By 2045, ATAD will emerge as a global corporation from Vietnam, creating a world-class steel structure ecosystem.\r\n\r\nMission\r\n\r\nATAD pioneers the development and delivery of optimal and sustainable steel structure ecosystem solutions, transforming challenges into value and contributing to the advancement of the global heavy industry and construction sectors.\r\n\r\nThe core values of ATAD\r\n\r\nATAD has built a strong company culture, a sense of solidarity and teamwork spirit. It is the glue that connects members, motivates each individual to deliver continuous efforts, contribute to the sustainable development of the company. ATAD’s culture was established, based on 7 core values: Positivity - Responsibility – Teamwork – Prestige – Integrity – Mindset – Discipline."])</script><script>self.__next_f.push([1,"25:T25ce,"])</script><script>self.__next_f.push([1,"I.\tMÔI TRƯỜNG LÀM VIỆC TẠI ATAD\r\n\tTrải qua quá trình hình thành và phát triển, trở thành một trong những thương hiệu đi đầu về kết cấu thép tại Việt Nam và đang vươn tầm quốc tế, chúng tôi luôn hiểu rằng con người là yếu tố quyết định đối với sự thành công và phát triển của Công ty. Tại ATAD, chúng tôi luôn không ngừng hoàn thiện môi trường làm việc, nhằm mang lại cho các Bạn sự tin tưởng, yên tâm cũng như những phương tiện tốt nhất giúp các Bạn hoàn thành công việc của mình.\r\n\r\n1.\tCông bằng\r\nTại ATAD, mọi nhân viên đều được đối xử công bằng và đánh giá dựa trên hiệu quả và thái độ làm việc. Công nhận những đóng góp của Bạn cũng là điều chúng tôi đặc biệt quan tâm. Chương trình đánh giá hiệu quả làm việc của nhân viên và mức thưởng hàng năm hấp dẫn thể hiện sự trân trọng của chúng tôi đối với thành công của Bạn và phản ánh tính công bằng giữa các nhân viên.  Chúng tôi tin rằng  một môi trường làm việc hiệu quả được xây dựng trên sự công bằng và minh bạch từ việc áp dụng các chính sách của công ty đến công tác đánh giá hiệu quả nhân lực sẽ giúp mọi thành viên trong tổ chức phát huy toàn diện năng lực bản thân và tận tâm trong công việc. \r\n2.\tTeam work:\r\nPhương châm của ATAD là “Teamwork makes the dreamwork”. Hơn ai hết, ATAD hiểu rằng trong một tập thể, sự đoàn kết và thống nhất là điều không thể thiếu. Mỗi nhân viên cũng tương tự như từng bộ phận của một kết cấu thép, tất cả phải hỗ trợ và nâng đỡ nhau thì kết cấu đó mới có thể tồn tại và trụ vững. Vì vậy, làm việc nhóm là yếu tố quan trọng quyết định thành bại của ATAD.\r\n3.\tNăng động – hội nhập: \r\nATAD sở hữu một đội ngũ công nhân viên trẻ và đầy nhiệt huyết, luôn sẵn sàng cháy hết mình trong công việc. Không những thế, với đội ngũ nhân viên đa quốc gia, ATAD sẽ dễ dàng hội nhập với các nước trong khu vực và trên thế giới. ATAD đã và đang xây dựng một môi trường hợp tác, cởi mở để cùng phát triển trong xu thế hội nhập hiện nay. \r\n4.\tChuyên nghiệp:\r\nMôi trường làm việc chuyên nghiệp tại ATAD được xây dựng từ thái độ tích cực của nhân viên trong công ty. Không chỉ chuyên nghiệp trong tác phong làm việc,  văn phòng cũng như nhà máy ATAD luôn được trang bị những thiết bị, công cụ chuyên dụng cùng cơ sở vật chất khang trang, hiện đại, tạo nên một môi trường làm việc hiệu quả và an toàn cho nhân viên. Chúng tôi luôn nỗ lực tạo nên một môi trường làm việc chuyên nghiệp nhưng cũng không kém phần cởi mở và thân thiện, thúc đẩy sự hợp tác và học hỏi giữa các nhân viên, từ đó giúp mỗi cá nhân phát huy được tiềm năng của bản thân.\r\n5.\tQuan tâm – chia sẻ:\r\nATAD luôn đặt nhân tố con người lên đầu và lấy sự hài lòng của nhân viên làm trọng tâm để tạo nên một môi trường làm việc tốt nhất. Vì thế, lãnh đạo công ty luôn dành sự quan tâm, chăm sóc và động viên cấp dưới, nhân viên luôn được tôn trọng, lắng nghe và chia sẻ; mỗi nhân viên đều cảm nhận được mình là một mắc xích quan trọng trong một tập thể đoàn kết và vững mạnh. Từ đó gây dựng lòng tin và sự trung thành của nhân viên đối với công ty. ATAD tin rằng nhân viên chính là chìa khoá cho sự thành công và phát triển bền vững trong tương lai.\r\n\r\nII.\tVĂN HOÁ CÔNG TY – 7 GIÁ TRỊ CỐT LÕI CỦA ATAD\r\nGiá trị và sự thành công của chúng tôi phụ thuộc rất nhiều vào tính sáng tạo và sự hứng thú trong công việc của Bạn. Chính vì thế chúng tôi luôn nỗ lực tạo ra một môi trường làm việc chuyên nghiệp nhưng không kém phần thân thiện và cởi mở để mỗi cá nhân có thể tự do phát huy tính sáng tạo, giải phóng được tiềm năng của bản thân từ đó tạo ra sự khác biệt.\r\n\r\nTại ATAD, nhân viên luôn được tôn trọng, lắng nghe và chia sẻ; mỗi nhân viên đều cảm nhận được mình là một mắc xích quan trọng trong một tập thể đoàn kết và vững mạnh. Mọi nỗ lực và thành quả của các Bạn đều được chúng tôi công nhận và khen thưởng kịp thời - đó là động lực rất lớn giúp Bạn tìm thấy sự hứng khởi và sẵn sàng đón nhận những thách thức mới trong công việc.\r\n\r\nBạn dành hơn một phần ba thời gian của một ngày làm việc ở công ty, vì thế không có lý do gì chúng tôi lại không mang đến cho Bạn sự thoải mái về tinh thần để bạn yên tâm làm việc. \r\n\r\n7 giá trị cốt lõi này giúp định hình nên thói quen trong hành vi ứng xử, từ đó định hình văn hóa của toàn công ty. Trong 7 giá trị này có những giá trị cùng chung một nhóm với nhau và có mối quan hệ tương hỗ nhau.\r\n\r\nTrong đó, 3 giá trị Tích cực – Trách nhiệm – Teamwork là 3 giá trị có tầm ảnh hướng nhiều nhất trong việc hình thành văn hóa và tinh thần làm việc của nhân viên ATAD. Hai nhóm còn lại những yếu tố sẽ được hình thành khi 3 yếu tố của bước 1 được xây dựng và áp dụng tốt.. \r\n\r\nDo vậy để thực thi 7 giá trị cốt lõi này thì gần như chỉ cần tập trung vào 3 yếu tố đầu tiên:\r\nBước 1: Tích cực - Trách nhiệm - Teamwork\r\nBước 2: Uy tín - Chính trực\r\nBước 3: Tư duy - Kỷ luật\r\n \r\n\r\nIII.\tCHẾ ĐỘ ĐÃI NGỘ\r\nTại ATAD, quyền lợi của nhân viên và các chính sách phúc lợi, đãi ngộ luôn được cam kết thực hiện, không chỉ về mặt vật chất mà công ty còn luôn sát cánh và chia sẻ những khó khăn với nhân viên của mình. ATAD tin rằng, con người là tài sản quý già nhất của công ty và với sự quan tâm, chăm sóc chu đáo, người lao động sẽ  gắn bó lâu dài và cống hiến hết vào sự phát triển của công ty.\r\nCông nhận những đóng góp của Bạn cũng là điều chúng tôi đặc biệt quan tâm. Chương trình đánh giá hiệu quả làm việc của nhân viên và mức thưởng hàng năm hấp dẫn thể hiện sự trân trọng của chúng tôi đối với thành công của Bạn và phản ánh tính công bằng giữa các nhân viên.\r\n\r\nIV.\tCƠ HỘI THĂNG TIẾN VÀ CƠ HỘI ĐÀO TẠO\r\n\r\n1. Cơ hội đào tạo\r\nChúng tôi quan niệm đào tạo và phát triển nguồn nhân lực là chiến lược đầu tư hiệu quả cho sự thành công trong tương lai của công ty. Khi trở thành nhân viên của ATAD, Bạn sẽ có cơ hội được đào tạo nhằm hoàn thiện các kỹ năng, kiến thức nhằm đáp ứng được yêu cầu và thách thức trong công việc. Các khóa đào tạo về chuyên môn và kỹ năng cũng như các buổi huấn luyện thực tế được chúng tôi tổ chức thường xuyên trong và ngoài nước.\r\n-\tHọc anh văn\r\n-\tKỹ năng mềm\r\n-\tChương trình vươn ra biển lớn\r\n-\tCác chương trình thực tập, tham quan nhà máy dành, kỹ sư tập sự dành cho sinh viên\r\n-\t3h đào tạo một tháng\r\n\r\n2.\tCơ hội thăng tiến\r\nTại ATAD, chúng tôi vạch ra con đường phát triển nghề nghiệp cụ thể cho Bạn cũng như mang đến các chương trình đào tạo phù hợp nhất với Bạn. Một khi hiệu quả làm việc được nâng cao, Bạn sẽ được giao phó những công việc thử thách hơn. Cùng với sự hỗ trợ tích cực từ đồng nghiệp và cấp trên, mục tiêu nghề nghiệp của Bạn chắn chắn sẽ thành hiện thực. Tại ATAD, sự nghiệp của các Bạn sẽ được phát triển cùng với sự lớn mạnh không ngừng của chúng tôi.\r\n\r\nV.\tQUY TRÌNH TUYỂN DỤNG\r\nNhiều cơ hội công việc mới cùng với sự phát triển không ngừng của công ty\r\nATAD đang dẫn đầu trong ngành kết cấu thép tại Việt Nam và định vị quốc tế nhưng chúng tôi luôn có tham vọng phát triển hơn nữa. Trong quá trình phát triển và mở rộng đó sẽ có nhiều công việc mới được tạo ra, Bạn sẽ có cơ hội được thử sức với những vai trò, thách thức mới. Điều này cũng giúp khơi dậy năng lực tiềm ẩn và khả năng sáng tạo của Bạn.\r\n\r\nCách thức ứng tuyển:\r\n\r\n-\tGửi hồ sơ ứng viên qua email: tuyendung@atad.vn\r\n-\tNộp hồ sơ trực tiếp tại: \r\n+ Văn phòng chính: 283, Hùng Vương, P.9, Q.5, HCM, Việt Nam\r\n+ Nhà máy Đồng Nai: Lô F, KCN Long Khánh, Xã Bình Lộc, Thị Xã Long Khánh, Tỉnh Đồng Nai, Việt Nam\r\n+ Nhà máy Long An: 595 ấp Bình Hữu II, Đức Hoà Thượng, Đức Hoà, Long An, Việt Nam"])</script><script>self.__next_f.push([1,"28:T638,ATAD là công ty CP kết cấu thép hàng đầu tại Việt Nam và Đông Nam Á. ATAD cung cấp cho khách hàng một giải pháp trọn gói bao gồm các công đoạn thiết kế, sản xuất, lắp dựng các sản phẩm kết cấu thép chất lượng cao. Với đội ngũ nhân lực gồm hơn 1000 nhân viên được đào tạo chuyên nghiệp, hệ thống quản lý chất lượng ISO 9001:2008, ISO 14001:2004, OHSAS 18001:2007 cùng hệ thống nhà máy sản xuất có diện tích 176,000 m2 được trang bị dây chuyền sản xuất tự động công nghệ cao, ATAD tin tưởng sẽ cung cấp những giải pháp tối ưu, sản phẩm chất lượng cao và dịch vụ hoàn hảo nhất cho dự án của quý khách.\r\n \r\nTriết lý kinh doanh: UY TÍN, TƯ DUY, TRÁCH NHIỆM\r\nMọi hoạt động sản xuất kinh doanh trên tinh thần làm việc uy tín và trách nhiệm với công việc, với đồng nghiệp, với đối tác với khách hàng và cộng đồng. Luôn tư duy, cải tiến liên tục để tạo ra môi trường làm việc tốt, gắn bó lâu dài cho CB CNV, tạo ra các giải pháp tốt nhất ma ame\":\"Hai Phong\",\"cityNameVI\":\"Hải Phòng\"}\n37:{\"lat\":0,\"lon\":0}\n36:{\"workingLocationId\":242144,\"addressId\":148811,\"cityId\":24,\"districtId\":0,\"address\":\"Phường Hoàn Kiếm, Hà Nội, Việt Nam\",\"geoLoc\":\"$37\",\"cityName\":\"Ha Noi\",\"cityNameVI\":\"Hà Nội\"}\n33:[\"$34\",\"$36\"]\n39:{\"industryId\":0,\"industryName\":\"\",\"industryNameVI\":\"\"}\n38:[\"$39\"]\n3b:{\"industryV3Id\":13,\"industryV3Name\":\"Construction Engineering/Infrastructure\",\"industryV3NameVI\":\"Kỹ thuật xây dựng/Cơ sở hạ tầng\"}\n3a:[\"$3b\"]\n3e:{\"id\":19,\"name\":\"Civil Engineering\",\"nameVI\":\"Xây Dựng\"}\n3d:[\"$3e\"]\n3c:{\"parentId\":4,\"parentName\":\"Architecture/Construction\",\"parentNameVI\":\"Kiến Trúc/Xây Dựng\",\"children\":\"$3d\"}\n3f:[28,24]\n41:[\"https://images.vietnamworks.com/company_profile/103155.jpg\",\"https://images.vietnamworks.com/company_profile/103156.jpg\",\"https://images.vietnamworks.com/company_profile/103157.jpg\"]\n42:[\"https://www.youtube.c"])</script><script>self.__next_f.push([1,"om/watch?v=tzI9llUHREM\"]\n43:Tbd2,"])</script><script>self.__next_f.push([1,"ATAD is a leading EPC contractor for steel structures and sheeting in Vietnam and the region, delivering integrated solutions for industrial, commercial, and infrastructure projects worldwide. With more than two decades of experience, ATAD has established a strong reputation for engineering precision, manufacturing excellence, and reliable project execution across over 60 countries.\r\n\r\nWith an annual capacity of 216,000 tons of steel structures, ATAD provides a comprehensive scope of services: from design, fabrication, logistics, installation to maintenance. The company operates 13 offices worldwide and has delivered projects in over 60 countries for major clients such as Samsung, Heineken, Hyundai, Toyota, P\u0026G, Sanofi, VinFast, and Hoa Phat.\r\n\r\nThe company specializes in pre-engineered steel buildings and complex steel structures for factories, warehouses, high-rise buildings, heavy industrial facilities, shopping malls, exhibition centers, and large-scale infrastructure works such as airports, railway stations, and metro systems.  \r\n\r\nATAD operates advanced manufacturing facilities and complies with a comprehensive set of international certifications, including ISO:9001, ISO:14001, ISO:14064-1, ISO:14067, ISO:45001, ISO:3834, EN:1090, LEED, CWB, IAS AC472, H-Grade, and AISC. Driven by innovation, standardized execution, and sustainability, ATAD continues to strengthen its position as a trusted EPC partner for complex rail and infrastructure projects across the region and globally.\r\n\r\nATAD has also contributed to notable projects  including the Long Thanh International Airport project, Metro Rail Transit Line 7 in the Philippines, Jackson Generation Power Plant in the United States, Kampala Flyover Project in Uganda, Matarbari Power Plant in Bangladesh, H2 Green Steel Plant in Sweden, the Vietnam Exhibition Center (VEC), the Hoa Phat Dung Quat Steel Complex, as well as major airport developments such as Tan Son Nhat Terminal T3, Cam Ranh International Airport, Da Nang International Airport, and Wattay International Airport in Laos. \r\n\r\nVission\r\n\r\nBy 2035, ATAD aims to become the leading EPC steel structure group in the Asia - Pacific region, pioneering innovation, creativity, and sustainable development. By 2045, ATAD will emerge as a global corporation from Vietnam, creating a world-class steel structure ecosystem.\r\n\r\nMission\r\n\r\nATAD pioneers the development and delivery of optimal and sustainable steel structure ecosystem solutions, transforming challenges into value and contributing to the advancement of the global heavy industry and construction sectors.\r\n\r\nThe core values of ATAD\r\n\r\nATAD has built a strong company culture, a sense of solidarity and teamwork spirit. It is the glue that connects members, motivates each individual to deliver continuous efforts, contribute to the sustainable development of the company. ATAD’s culture was established, based on 7 core values: Positivity - Responsibility – Teamwork – Prestige – Integrity – Mindset – Discipline."])</script><script>self.__next_f.push([1,"44:T25ce,"])</script><script>self.__next_f.push([1,"I.\tMÔI TRƯỜNG LÀM VIỆC TẠI ATAD\r\n\tTrải qua quá trình hình thành và phát triển, trở thành một trong những thương hiệu đi đầu về kết cấu thép tại Việt Nam và đang vươn tầm quốc tế, chúng tôi luôn hiểu rằng con người là yếu tố quyết định đối với sự thành công và phát triển của Công ty. Tại ATAD, chúng tôi luôn không ngừng hoàn thiện môi trường làm việc, nhằm mang lại cho các Bạn sự tin tưởng, yên tâm cũng như những phương tiện tốt nhất giúp các Bạn hoàn thành công việc của mình.\r\n\r\n1.\tCông bằng\r\nTại ATAD, mọi nhân viên đều được đối xử công bằng và đánh giá dựa trên hiệu quả và thái độ làm việc. Công nhận những đóng góp của Bạn cũng là điều chúng tôi đặc biệt quan tâm. Chương trình đánh giá hiệu quả làm việc của nhân viên và mức thưởng hàng năm hấp dẫn thể hiện sự trân trọng của chúng tôi đối với thành công của Bạn và phản ánh tính công bằng giữa các nhân viên.  Chúng tôi tin rằng  một môi trường làm việc hiệu quả được xây dựng trên sự công bằng và minh bạch từ việc áp dụng các chính sách của công ty đến công tác đánh giá hiệu quả nhân lực sẽ giúp mọi thành viên trong tổ chức phát huy toàn diện năng lực bản thân và tận tâm trong công việc. \r\n2.\tTeam work:\r\nPhương châm của ATAD là “Teamwork makes the dreamwork”. Hơn ai hết, ATAD hiểu rằng trong một tập thể, sự đoàn kết và thống nhất là điều không thể thiếu. Mỗi nhân viên cũng tương tự như từng bộ phận của một kết cấu thép, tất cả phải hỗ trợ và nâng đỡ nhau thì kết cấu đó mới có thể tồn tại và trụ vững. Vì vậy, làm việc nhóm là yếu tố quan trọng quyết định thành bại của ATAD.\r\n3.\tNăng động – hội nhập: \r\nATAD sở hữu một đội ngũ công nhân viên trẻ và đầy nhiệt huyết, luôn sẵn sàng cháy hết mình trong công việc. Không những thế, với đội ngũ nhân viên đa quốc gia, ATAD sẽ dễ dàng hội nhập với các nước trong khu vực và trên thế giới. ATAD đã và đang xây dựng một môi trường hợp tác, cởi mở để cùng phát triển trong xu thế hội nhập hiện nay. \r\n4.\tChuyên nghiệp:\r\nMôi trường làm việc chuyên nghiệp tại ATAD được xây dựng từ thái độ tích cực của nhân viên trong công ty. Không chỉ chuyên nghiệp trong tác phong làm việc,  văn phòng cũng như nhà máy ATAD luôn được trang bị những thiết bị, công cụ chuyên dụng cùng cơ sở vật chất khang trang, hiện đại, tạo nên một môi trường làm việc hiệu quả và an toàn cho nhân viên. Chúng tôi luôn nỗ lực tạo nên một môi trường làm việc chuyên nghiệp nhưng cũng không kém phần cởi mở và thân thiện, thúc đẩy sự hợp tác và học hỏi giữa các nhân viên, từ đó giúp mỗi cá nhân phát huy được tiềm năng của bản thân.\r\n5.\tQuan tâm – chia sẻ:\r\nATAD luôn đặt nhân tố con người lên đầu và lấy sự hài lòng của nhân viên làm trọng tâm để tạo nên một môi trường làm việc tốt nhất. Vì thế, lãnh đạo công ty luôn dành sự quan tâm, chăm sóc và động viên cấp dưới, nhân viên luôn được tôn trọng, lắng nghe và chia sẻ; mỗi nhân viên đều cảm nhận được mình là một mắc xích quan trọng trong một tập thể đoàn kết và vững mạnh. Từ đó gây dựng lòng tin và sự trung thành của nhân viên đối với công ty. ATAD tin rằng nhân viên chính là chìa khoá cho sự thành công và phát triển bền vững trong tương lai.\r\n\r\nII.\tVĂN HOÁ CÔNG TY – 7 GIÁ TRỊ CỐT LÕI CỦA ATAD\r\nGiá trị và sự thành công của chúng tôi phụ thuộc rất nhiều vào tính sáng tạo và sự hứng thú trong công việc của Bạn. Chính vì thế chúng tôi luôn nỗ lực tạo ra một môi trường làm việc chuyên nghiệp nhưng không kém phần thân thiện và cởi mở để mỗi cá nhân có thể tự do phát huy tính sáng tạo, giải phóng được tiềm năng của bản thân từ đó tạo ra sự khác biệt.\r\n\r\nTại ATAD, nhân viên luôn được tôn trọng, lắng nghe và chia sẻ; mỗi nhân viên đều cảm nhận được mình là một mắc xích quan trọng trong một tập thể đoàn kết và vững mạnh. Mọi nỗ lực và thành quả của các Bạn đều được chúng tôi công nhận và khen thưởng kịp thời - đó là động lực rất lớn giúp Bạn tìm thấy sự hứng khởi và sẵn sàng đón nhận những thách thức mới trong công việc.\r\n\r\nBạn dành hơn một phần ba thời gian của một ngày làm việc ở công ty, vì thế không có lý do gì chúng tôi lại không mang đến cho Bạn sự thoải mái về tinh thần để bạn yên tâm làm việc. \r\n\r\n7 giá trị cốt lõi này giúp định hình nên thói quen trong hành vi ứng xử, từ đó định hình văn hóa của toàn công ty. Trong 7 giá trị này có những giá trị cùng chung một nhóm với nhau và có mối quan hệ tương hỗ nhau.\r\n\r\nTrong đó, 3 giá trị Tích cực – Trách nhiệm – Teamwork là 3 giá trị có tầm ảnh hướng nhiều nhất trong việc hình thành văn hóa và tinh thần làm việc của nhân viên ATAD. Hai nhóm còn lại những yếu tố sẽ được hình thành khi 3 yếu tố của bước 1 được xây dựng và áp dụng tốt.. \r\n\r\nDo vậy để thực thi 7 giá trị cốt lõi này thì gần như chỉ cần tập trung vào 3 yếu tố đầu tiên:\r\nBước 1: Tích cực - Trách nhiệm - Teamwork\r\nBước 2: Uy tín - Chính trực\r\nBước 3: Tư duy - Kỷ luật\r\n \r\n\r\nIII.\tCHẾ ĐỘ ĐÃI NGỘ\r\nTại ATAD, quyền lợi của nhân viên và các chính sách phúc lợi, đãi ngộ luôn được cam kết thực hiện, không chỉ về mặt vật chất mà công ty còn luôn sát cánh và chia sẻ những khó khăn với nhân viên của mình. ATAD tin rằng, con người là tài sản quý già nhất của công ty và với sự quan tâm, chăm sóc chu đáo, người lao động sẽ  gắn bó lâu dài và cống hiến hết vào sự phát triển của công ty.\r\nCông nhận những đóng góp của Bạn cũng là điều chúng tôi đặc biệt quan tâm. Chương trình đánh giá hiệu quả làm việc của nhân viên và mức thưởng hàng năm hấp dẫn thể hiện sự trân trọng của chúng tôi đối với thành công của Bạn và phản ánh tính công bằng giữa các nhân viên.\r\n\r\nIV.\tCƠ HỘI THĂNG TIẾN VÀ CƠ HỘI ĐÀO TẠO\r\n\r\n1. Cơ hội đào tạo\r\nChúng tôi quan niệm đào tạo và phát triển nguồn nhân lực là chiến lược đầu tư hiệu quả cho sự thành công trong tương lai của công ty. Khi trở thành nhân viên của ATAD, Bạn sẽ có cơ hội được đào tạo nhằm hoàn thiện các kỹ năng, kiến thức nhằm đáp ứng được yêu cầu và thách thức trong công việc. Các khóa đào tạo về chuyên môn và kỹ năng cũng như các buổi huấn luyện thực tế được chúng tôi tổ chức thường xuyên trong và ngoài nước.\r\n-\tHọc anh văn\r\n-\tKỹ năng mềm\r\n-\tChương trình vươn ra biển lớn\r\n-\tCác chương trình thực tập, tham quan nhà máy dành, kỹ sư tập sự dành cho sinh viên\r\n-\t3h đào tạo một tháng\r\n\r\n2.\tCơ hội thăng tiến\r\nTại ATAD, chúng tôi vạch ra con đường phát triển nghề nghiệp cụ thể cho Bạn cũng như mang đến các chương trình đào tạo phù hợp nhất với Bạn. Một khi hiệu quả làm việc được nâng cao, Bạn sẽ được giao phó những công việc thử thách hơn. Cùng với sự hỗ trợ tích cực từ đồng nghiệp và cấp trên, mục tiêu nghề nghiệp của Bạn chắn chắn sẽ thành hiện thực. Tại ATAD, sự nghiệp của các Bạn sẽ được phát triển cùng với sự lớn mạnh không ngừng của chúng tôi.\r\n\r\nV.\tQUY TRÌNH TUYỂN DỤNG\r\nNhiều cơ hội công việc mới cùng với sự phát triển không ngừng của công ty\r\nATAD đang dẫn đầu trong ngành kết cấu thép tại Việt Nam và định vị quốc tế nhưng chúng tôi luôn có tham vọng phát triển hơn nữa. Trong quá trình phát triển và mở rộng đó sẽ có nhiều công việc mới được tạo ra, Bạn sẽ có cơ hội được thử sức với những vai trò, thách thức mới. Điều này cũng giúp khơi dậy năng lực tiềm ẩn và khả năng sáng tạo của Bạn.\r\n\r\nCách thức ứng tuyển:\r\n\r\n-\tGửi hồ sơ ứng viên qua email: tuyendung@atad.vn\r\n-\tNộp hồ sơ trực tiếp tại: \r\n+ Văn phòng chính: 283, Hùng Vương, P.9, Q.5, HCM, Việt Nam\r\n+ Nhà máy Đồng Nai: Lô F, KCN Long Khánh, Xã Bình Lộc, Thị Xã Long Khánh, Tỉnh Đồng Nai, Việt Nam\r\n+ Nhà máy Long An: 595 ấp Bình Hữu II, Đức Hoà Thượng, Đức Hoà, Long An, Việt Nam"])</script><script>self.__next_f.push([1,"40:{\"companyId\":86165,\"jobImageURLs\":\"$41\",\"jobVideoURLs\":\"$42\",\"companyName\":\"Công Ty Cổ Phần Kết Cấu Thép ATAD\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictu
