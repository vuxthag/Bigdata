bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tb28,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Tổng quan vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMaketing Branding Manager chịu trách nhiệm xây dựng, quản lý và định hướng hình ảnh thương hiệu cho doanh nghiệp chủ đầu tư\u003cstrong\u003e lĩnh vực bất động sản và nhà máy thép\u003c/strong\u003e. Vị trí này đảm bảo sự nhất quán về thông điệp, hình ảnh trên tất cả các kênh truyền thông, đồng thời giám sát và điều phối hoạt động của team Marketing nhằm hỗ trợ mục tiêu kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Mô tả công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea. Xây dựng \u0026 định hướng thương hiệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng chiến lược thương hiệu tổng thể cho chủ đầu tư \u003c/p\u003e\u003cp\u003e•\tĐịnh vị thương hiệu (Brand Positioning), xác định thông điệp cốt lõi (Key Message) phù hợp từng ngành:\u003c/p\u003e\u003cp\u003eo\tBất động sản: uy tín chủ đầu tư, phong cách sống, giá trị công ty\u003c/p\u003e\u003cp\u003eo\tNgành thép: chất lượng sản phẩm, năng lực sản xuất, độ tin cậy.\u003c/p\u003e\u003cp\u003e•\tĐịnh hướng hình ảnh, concept truyền thông cho công ty BĐS \u003c/p\u003e\u003cp\u003e•\tXây dựng và quản lý hệ thống nhận diện thương hiệu (CI/Brand Guidelines).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb. Quản lý \u0026 theo dõi hoạt động Marketing\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTheo dõi, quản lý tiến độ và chất lượng công việc của bộ phận Marketing (Content, Digital, Design, Media…).\u003c/p\u003e\u003cp\u003e•\tĐảm bảo tất cả hoạt động Marketing bám sát định hướng thương hiệu.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các phòng ban: Kinh doanh, Sản xuất, và đối tác Agency.\u003c/p\u003e\u003cp\u003e•\tKiểm duyệt nội dung, hình ảnh, tài liệu truyền thông trước khi phát hành.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ec. Xây dựng \u0026 quản lý hình ảnh thương hiệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLên ý tưởng và triển khai các chiến dịch Branding (online \u0026 offline).\u003c/p\u003e\u003cp\u003e•\tQuản lý hình ảnh thương hiệu trên các kênh:\u003c/p\u003e\u003cp\u003eo\tBĐS: Website, Social Media, PR, Event, Sales \u003c/p\u003e\u003cp\u003eo\tThép: Website, Company Profile, Catalogue, hội chợ triển lãm.\u003c/p\u003e\u003cp\u003e•\tGiám sát sản xuất các ấn phẩm: brochure, video, TVC, hình ảnh công ty/nhà máy.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo sự đồng bộ hình ảnh giữa thương hiệu công ty và các sản phẩm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ed. Nghiên cứu \u0026 phát triển thương hiệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tNghiên cứu thị trường, khách hàng mục tiêu và đối thủ cạnh tranh trong ngành bất động sản và sắt thép\u003c/p\u003e\u003cp\u003e•\tĐánh giá hiệu quả hoạt động branding (Brand Awareness, Brand Perception, mức độ tin cậy).\u003c/p\u003e\u003cp\u003e•\tĐề xuất cải tiến chiến lược dựa trên dữ liệu và insight thị trường.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T5f5,\u003cp\u003e\u003cstrong\u003e3. Yêu cầu công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học trở lên chuyên ngành Marketing, Truyền thông, Quản trị Kinh doanh hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm trong lĩnh vực Marketing/Branding, trong đó ít nhất 2–3 năm ở vị trí quản lý.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có kinh nghiệm trong bất động sản, xây dựng, vật liệu (đặc biệt ngành thép) hoặc các doanh nghiệp sản xuất – chủ đầu tư.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm xây dựng và triển khai chiến lược thương hiệu tổng thể.\u003c/p\u003e\u003cp\u003e•\tAm hiểu sâu về Branding, Brand Positioning, Brand Identity System.\u003c/p\u003e\u003cp\u003e•\tCó kiến thức tốt về Marketing tổng thể: Digital, Content, PR, Event, Media.\u003c/p\u003e\u003cp\u003e•\tCó khả năng phân tích thị trường, đối thủ và xây dựng chiến lược dựa trên dữ liệu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhúc lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương: Gross 1,000 - 2,000 USD\u003c/p\u003e\u003cp\u003e•\tĐóng bảo hiểm xã hội bảo hiểm y tế, thưởng lương tháng 13, thưởng theo hiệu quả công việc\u003c/p\u003e\u003cp\u003e•\tThời gian làm việc từ thứ 2- thứ 6 tại Diamond Plaza, 34 Lê Duẩn, phường Sài Gòn, Thành phố Hồ Chí Minh\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eLưu ý:\u003c/strong\u003e sẽ làm việc cho 2 công ty là CÔNG TY CỔ PHẦN SẢN XUẤT THÉP VINA ONE và CÔNG TY TNHH MERAKI LAND – Dạng quản lý branding cho 2 cty trong tập đoàn.\u003c/p\u003e27:Tb28,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Tổng quan vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMaketing Branding Manager chịu trách nhiệm xây dựng, quản lý và định hướng hình ảnh thương hiệu cho doanh nghiệp chủ đầu tư\u003cstrong\u003e lĩnh vực bất động sản và nhà máy thép\u003c/strong\u003e. Vị trí này đảm bảo sự nhất quán về thông điệp, hình ảnh trên tất cả các kênh truyền thông, đồng thời giám sát và điều phối hoạt động của team Marketing nhằm hỗ trợ mục tiêu kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Mô tả công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea. Xây dựng \u0026 định hướng thương hiệu\u003c/strong\u003e\u003c/p\u00
