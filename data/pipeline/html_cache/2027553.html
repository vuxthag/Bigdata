2301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tc5a,"])</script><script>self.__next_f.push([1,"Về Chúng tôi Thanh An Food\r\nĐối với Thanh An Food, sức khỏe của người tiêu dùng là mục tiêu hàng đầu.\r\n\r\nĐáp ứng điều đó, Công ty TNHH Thanh An đã nghiên cứu và áp dụng khoa học để sản xuất ra các sản phẩm dinh dưỡng từ ngũ cốc. Là chuyên gia về ngũ cốc, Thanh An sử dụng nguyên liệu hoàn toàn tự nhiên, không phẩm màu, không chất bảo quản, đem đến bữa ăn bổ dưỡng, đủ chất, phù hợp với túi tiền, mang đến trải nghiệm tốt nhất cho khách hàng.\r\n\r\nTầm nhìn\r\nTrở thành chuyên gia hàng đầu trong lĩnh vực sản xuất, kinh doanh ngũ cốc tại thị trường Việt Nam và hướng đến thị trường thế giới.\r\n\r\nSứ mệnh\r\nTrở thành chuyên gia sức khỏe cộng đồng, nâng cao tầm vóc và giá trị Việt.\r\n\r\nGiá trị cốt lõi\r\nMang lại giá trị cộng đồng, lợi ích cho các cổ đông, người lao động và mang lại cơ hội cho đối tác.\r\n\r\nLịch sử hình thành Chuyên gia về ngũ cốc\r\n*Năm 1998\r\nCông ty TNHH Thanh An được thành lập vào ngày 23/11/1998. Lĩnh vực hoạt động chính là nhập khẩu, mua bán sữa và các nguyên liệu chế biến từ sữa.\r\n*Năm 1999\r\nThanh An nghiên cứu thành công và cho ra đời sản phẩm Bột ngũ cốc kết hợp các thảo dược quý thương hiệu Việt Đài ngay tại xưởng sản xuất của gia đình.\r\n*Năm 2011\r\nNhà máy đầu tiên rộng 5,000m2 được xây dựng tại KCN Ninh Hiệp, Gia Lâm, Hà Nội. Đây là nhà máy sản xuất các sản phẩm bột ngũ cốc đầu tiên với quy mô công nghiệp.\r\n*Năm 2014\r\nThanh An Food đã nghiên cứu và tiên phong sản xuất thành công ngũ cốc uống liền thương hiệu Việt Ngũ Cốc tại Việt Nam, đáp ứng nhu cầu thị trường về dòng sản phẩm sữa ngũ cốc dinh dưỡng tiện lợi.\r\n*Năm 2019\r\nNhà máy thứ 2 được đưa vào vận hành sản xuất sản phẩm Ngũ cốc hạt OATTA – Bữa ăn 1 phút – dinh dưỡng đủ đầy, nâng tổng diện tích nhà máy lên 10,000m2 tại KCN Ninh Hiệp, Gia Lâm, Hà Nội.\r\n*Năm 2023\r\nNhà máy thứ 3 – chuyên sản xuất các sản phẩm uống liền, ăn liền theo công nghệ hiện đại nhất với diện tích hơn 30,000 m2 sẽ được khởi công xây dựng tại KCN Hà Nam.\r\n\r\nQuy mô doanh nghiệp ngày càng được mở rộng, Hệ thống phân phối hàng hoá được phân phối trực tiếp đến tay người tiêu dùng. Sau nhiều năm hoạt động Công ty xây dựng kiện toàn hệ thống phân phối trên toàn quốc. \r\n\r\nTHÔNG TIN VỀ CÔNG TY:\r\nCÔNG TY TNHH THANH AN\r\nWebsite: Thanhanfood.com.vn\r\n\r\nVP Công ty tại Hà Nội: Tầng 8, 562 Nguyễn Văn Cừ, quận Long Biên, Hà Nội.\r\nChi nhánh Công ty tại HCM:  38/6L1 Nguyễn Văn Trỗi P15 Q.Phú Nhuận, HCM\r\nĐịa chỉ Nhà máy 1,2: Lô 01-06 CCN Ninh Hiệp - Gia Lâm - Hà Nội\r\nĐịa chỉ Nhà máy 3: KCN Hà Nam."])</script><script>self.__next_f.push([1,"24:Tc17,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Chịu trách nhiệm lập kế hoạch, triển khai và giám sát các hoạt động Brand Marketing theo định hướng năm nhằm xây dựng hình ảnh thương hiệu, gia tăng sự yêu thích của người tiêu dùng và đạt được các mục tiêu kinh doanh của nhãn hiệu/ Responsible for planning, implementing, and monitoring annual Brand Marketing activities to build brand image, increase consumer preference, and achieve brand business objectives.\t\t\t\u003c/p\u003e\u003cp\u003e- Phối hợp cùng Trưởng ngành hàng trong việc xây dựng và triển khai chiến lược Marketing ngắn hạn và dài hạn, đảm bảo sự phù hợp với chiến lược phát triển chung của công ty/ Collaborate with the Category Manager in developing and implementing short-term and long-term marketing strategies, ensuring alignment with the company's overall development strategy.\t\t\t\u003c/p\u003e\u003cp\u003e- Theo dõi, tổng hợp và phân tích dữ liệu thị trường, xu hướng ngành hàng, hành vi người tiêu dùng và hoạt động của đối thủ cạnh tranh để đưa ra các đề xuất Marketing hiệu quả và kịp thời/ Monitor, compile, and analyze market data, industry trends, consumer behavior, and competitor activities to provide effective and timely marketing recommendations.\t\t\t\u003c/p\u003e\u003cp\u003e- Xây dựng kế hoạch Marketing tổng thể cho nhãn hiệu phụ trách; tổ chức triển khai các chương trình truyền thông, quảng bá và đánh giá hiệu quả thực hiện nhằm đảm bảo đạt các chỉ tiêu đã đề ra/ Develop a comprehensive marketing plan for the assigned brand; organize and implement communication and promotional programs, and evaluate their effectiveness to ensure that the set targets are met.\t\t\t\u003c/p\u003e\u003cp\u003e- Triển khai các dự án phát triển sản phẩm mới hoặc cải tiến bao bì, phối hợp với các phòng ban liên quan nhằm đáp ứng nhu cầu thị trường và mục tiêu kinh doanh /Implement new product development or packaging improvement projects, coordinating with relevant departments to meet market needs and business objectives.\t\t\t\u003c/p\u003e\u003cp\u003e- Theo dõi sát tình hình bán hàng và dự báo nhu cầu của ngành hàng để đề xuất các hoạt động hỗ trợ kinh doanh phù hợp./ Closely monitor sales performance and forecast industry demand to propose appropriate business support activities.\t\t\t\u003c/p\u003e\u003cp\u003e- Quản lý và kiểm soát ngân sách Marketing hiệu quả, đảm bảo sử dụng đúng mục đích và tối ưu chi phí./ Effectively manage and control the marketing budget, ensuring it is used for its intended purpose and costs are optimized.\t\t\t\u003c/p\u003e\u003cp\u003e- Làm việc và quản lý các đối tác bên ngoài như agency quảng cáo, nhà cung cấp dịch vụ truyền thông, đảm bảo chất lượng triển khai và hiệu quả đầu tư./ Working with and managing external partners such as advertising agencies and media service providers, ensuring quality implementation and return on investment.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T11d6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKiến thức \u0026 trình độ chuyên môn/ Knowledge  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e trị cốt lõi\r\nMang lại giá trị cộng đồng, lợi ích cho các cổ đông, người lao động và mang lại cơ hội cho đối tác.\r\n\r\nLịch sử hình thành Chuyên gia về ngũ cốc\r\n*Năm 1998\r\nCông ty TNHH Thanh An được thành lập vào ngày 23/11/1998. Lĩnh vực hoạt động chính là nhập khẩu, mua bán sữa và các nguyên liệu chế biến từ sữa.\r\n*Năm 1999\r\nThanh An nghiên cứu thành công và cho ra đời sản phẩm Bột ngũ cốc kết hợp các thảo dược quý thương hiệu Việt Đài ngay tại xưởng sản xuất của gia đình.\r\n*Năm 2011\r\nNhà máy đầu tiên rộng 5,000m2 được xây dựng tại KCN Ninh Hiệp, Gia Lâm, Hà Nội. Đây là nhà máy sản xuất các sản phẩm bột ngũ cốc đầu tiên với quy mô công nghiệp.\r\n*Năm 2014\r\nThanh An Food đã nghiên cứu và tiên phong sản xuất thành công ngũ cốc uống liền thương hiệu Việt Ngũ Cốc tại Việt Nam, đáp ứng nhu cầu thị trường về dòng sản phẩm sữa ngũ cốc dinh dưỡng tiện lợi.\r\n*Năm 2019\r\nNhà máy thứ 2 được đưa vào vận hành sản xuất sản phẩm Ngũ cốc hạt OATTA – Bữa ăn 1 phút – dinh dưỡng đủ đầy, nâng tổng diện tích nhà máy lên 10,000m2 tại KCN Ninh Hiệp, Gia Lâm, Hà Nội.\r\n*Năm 2023\r\nNhà máy thứ 3 – chuyên sản xuất các sản phẩm uống liền, ăn liền theo công nghệ hiện đại nhất với diện tích hơn 30,000 m2 sẽ được khởi công xây dựng tại KCN Hà Nam.\r\n\r\nQuy mô doanh nghiệp ngày càng được mở rộng, Hệ thống phân phối hàng hoá được phân phối trực tiếp đến tay người tiêu dùng. Sau nhiều năm hoạt động Công ty xây dựng kiện toàn hệ thống phân phối trên toàn quốc. \r\n\r\nTHÔNG TIN VỀ CÔNG TY:\r\nCÔNG TY TNHH THANH AN\r\nWebsite: Thanhanfood.com.vn\r\n\r\nVP Công ty tại Hà Nội: Tầng 8, 562 Nguyễn Văn Cừ, quận Long Biên, Hà Nội.\r\nChi nhánh Công ty tại HCM:  38/6L1 Nguyễn Văn Trỗi P15 Q.Phú Nhuận, HCM\r\nĐịa chỉ Nhà máy 1,2: Lô 01-06 CCN Ninh Hiệp - Gia Lâm - Hà Nội\r\nĐịa chỉ Nhà máy 3: KCN Hà Nam."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:Tc5a,"])</script><script>self.__next_f.push([1,"Về Chúng tôi Thanh An Food\r iệt Nam và hướng đến thị trường thế giới.\r\n\r\nSứ mệnh\r\nTrở thành chuyên gia sức khỏe cộng đồng, nâng cao tầm vóc và giá trị Việt.\r\n\r\nGiá trị cốt lõi\r\nMang lại giá trị cộng đồng, lợi ích cho các cổ đông, người lao động và mang lại cơ hội cho đối tác.\r\n\r\nLịch sử hình thành Chuyên gia về ngũ cốc\r\n*Năm 1998\r\nCông ty TNHH Thanh An được thành lập vào ngày 23/11/1998. Lĩnh vực hoạt động chính là nhập khẩu, mua bán sữa và các nguyên liệu chế biến từ sữa.\r\n*Năm 1999\r\nThanh An nghiên cứu thành công và cho ra đời sản phẩm Bột ngũ cốc kết hợp các thảo dược quý thương hiệu Việt Đài ngay tại xưởng sản xuất của gia đình.\r\n*Năm 2011\r\nNhà máy đầu tiên rộng 5,000m2 được xây dựng tại KCN Ninh Hiệp, Gia Lâm, Hà Nội. Đây là nhà máy sản xuất các sản phẩm bột ngũ cốc đầu tiên với quy mô công nghiệp.\r\n*Năm 2014\r\nThanh An Food đã nghiên cứu và tiên phong sản xuất thành công ngũ cốc uống liền thương hiệu Việt Ngũ Cốc tại Việt Nam, đáp ứng nhu cầu thị trường về dòng sản phẩm sữa ngũ cốc dinh dưỡng tiện lợi.\r\n*Năm 2019\r\nNhà máy thứ 2 được đưa vào vận hành sản xuất sản phẩm Ngũ cốc hạt OATTA – Bữa ăn 1 phút – dinh dưỡng đủ đầy, nâng tổng diện tích nhà máy lên 10,000m2 tại KCN Ninh Hiệp, Gia Lâm, Hà Nội.\r\n*Năm 2023\r\nNhà máy thứ 3 – chuyên sản xuất các sản phẩm uống liền, ăn liền theo công nghệ hiện đại nhất với diện tích hơn 30,000 m2 sẽ được khởi công xây dựng tại KCN Hà Nam.\r\n\r\nQuy mô doanh nghiệp ngày càng được mở rộng, Hệ thống phân phối hàng hoá được phân phối trực tiếp đến tay người tiêu dùng. Sau nhiều năm hoạt động Công ty xây dựng kiện toàn hệ thống phân phối trên toàn quốc. \r\n\r\nTHÔNG TIN VỀ CÔNG TY:\r\nCÔNG TY TNHH THANH AN\r\nWebsite: Thanhanfood.com.vn\r\n\r\nVP Công ty tại Hà Nội: Tầng 8, 562 Nguyễn Văn Cừ, quận Long Biên, Hà Nội.\r\nChi nhánh Công ty tại HCM:  38/6L1 Nguyễn Văn Trỗi P15 Q.Phú Nhuận, HCM\r\nĐịa chỉ Nhà máy 1,2: Lô 01-06 CCN Ninh Hiệp - Gia Lâm - Hà Nội\r\nĐịa chỉ Nhà máy 3: KCN Hà Nam."])</script><style data-styled="" d
