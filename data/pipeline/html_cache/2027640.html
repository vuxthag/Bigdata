f35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Te34,"])</script><script>self.__next_f.push([1,"VỀ LIUGONG\r\nThành lập vào năm 1958, trải qua hơn 65 năm nỗ lực và đổi mới không ngừng, LiuGong đã trở thành tập đoàn sản xuất thiết bị, máy xây dựng hàng đầu Trung Quốc. Kể từ khi cho ra đời chiếc máy xúc lật đầu tiên của Trung Quốc vào năm 1966, LiuGong đã phát triển thành một doanh nghiệp với hơn 30 dòng sản phẩm khác nhau. Trong những năm qua, chúng tôi luôn coi mọi thử thách, khó khăn là cơ hội tốt để trau dồi và phát triển. Bằng những thiết bị mạnh mẽ của mình, chúng tôi có thể chinh phục được mọi điều kiện làm việc từ cái nóng gay gắt của sa mạc Sahara đến cái lạnh thấu xương của Nam Cực. Bên cạnh đó, chúng tôi cũng hiểu rằng Thiết bị chỉ có giá trị khi đáp ứng được nhu cầu của khách hàng. Do vậy, cùng với việc đảm bảo tính năng tuyệt vời, các sản phẩm chúng tôi luôn tuân thủ khái niệm thiết kế công thái học và dễ sử dụng, để các dự án công trình của quý khách hàng có thể thực hiện nhanh chóng và đạt hiệu quả cao.\r\n\r\nKhông ngừng theo đuổi sự tin cậy về chất lượng là nền tảng tạo nên uy tín và cũng là chìa khóa cho sự phát triển lớn mạnh của LiuGong. Tính đến nay, LiuGong đã có hơn 17.000 nhân viên, hơn 20 cơ sở sản xuất, 5 cơ sở R\u0026D và 17 trung tâm phụ tùng khu vực trên toàn thế giới. LiuGong luôn đi đầu trong lĩnh vực công nghệ, sản xuất và cung ứng hậu cần.\r\n\r\nĐể có được sự hài lòng của khách hàng, dịch vụ tin cậy và sản phẩm tuyệt vời là những yếu tố không thể thiếu. Là một trong những công ty có mạng lưới phân phối toàn cầu hoàn chỉnh nhất trong ngành, hiện LiuGong có hơn 300 nhà phân phối tại hơn 130 quốc gia, cung cấp dịch vụ hỗ trợ nhanh chóng, tiện lợi và chuyên nghiệp cho khách hàng trên toàn thế giới bất cứ lúc nào.\r\n\r\nTrong tương lai, LiuGong sẽ tiếp tục phấn đấu để xây dựng mối quan hệ đối tác hợp tác lâu dài với khách hàng. Bất kể quý khách hàng ở đâu, gặp phải vấn đề gì, các sản phẩm và dịch vụ máy móc ưu việt của chúng tôi sẽ giúp quý khách giải quyết vấn đề một cách dễ dàng và tạo ra giá trị hơn cả sự mong đợi.\r\n\r\nVỀ LIUGONG VIỆT NAM\r\nLiuGong chính thức gia nhập thị trường Việt Nam vào năm 2003. LiuGong cùng với các đối tác tại Việt Nam trong hơn 20 năm đã bán ra thị trường hơn 6,000 máy xây dựng và thiết bị khác nhau. Các sản phẩm, dịch vụ và thương hiệu của LiuGong được đông đảo khách hàng địa phương ghi nhận và tin tưởng. Máy xúc lật và xe lu cơ khí của chúng tôi cũng nhận được sự yêu thích của khách hàng, đây là 2 dòng sản phẩm giành được thị phần số 1 tại Việt Nam trong nhiều năm liền. Việt Nam là điểm dừng chân đầu tiên của chúng tôi trong chiến lược phát triển thị trường quốc tế, và cũng là thị trường trọng điểm của LiuGong tại nước ngoài. Việt Nam đã mang lại rất nhiều trải nghiệm và tạo nền tảng vững chắc cho LiuGong cũng như tạo điều kiện cho chúng tôi học hỏi mô hình bán hàng tại nước ngoài."])</script><script>self.__next_f.push([1,"24:T82b,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJob Purpose / Summary: \u003c/p\u003e\u003cp\u003eResponsible for the Overall accounting and Finance work\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eKey Responsibilities:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Full-scope accounting \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.1 Responsible for the daily accounting of subsidiaries: expense review and payment, purchase/sales invoice review, asset ledger maintenance, etc.\u003c/p\u003e\u003cp\u003e1.2 Independently complete monthly and annual closing tasks to ensure accounting accuracy and timeliness.\u003c/p\u003e\u003cp\u003e1.3   Maintain the general ledger and clearing accounts receivable/payable modules to ensure accounting vouchers are complete and compliant.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Financial Reporting and Operational Management.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e2.1 Prepare financial statements for the legal entity (income statement/balance sheet/cash flow statement);\u003c/p\u003e\u003cp\u003e2.2 Execute accounts receivable tracking, overdue accounts collection, and customer reconciliation;\u003c/p\u003e\u003cp\u003e2.3 Monitor accounts payable cycles and manage supplier payment processes.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.Financial Management and Support \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e3.1 Assist in preparing annual budgets, monitor budget execution, and analyze variances;\u003c/p\u003e\u003cp\u003e3.2 Manage weekly cash flow plans to ensure safe and efficient operational funding;\u003c/p\u003e\u003cp\u003e3.3 Participate in financial operations analysis and provide cost control and process optimisation recommendations.\u003c/p\u003e\u003cp\u003e3.4 Coordinate with LGHQ finance department to submit finance data of LiuGong Vietnam.\u003c/p\u003e\u003cp\u003e3.5 Coordinate with LiuGong Vietnam risk control department for finance statement review of dealers/Customers.\u003c/p\u003e\u003cp\u003e3.6 Other works relevent to the LiuGong Vietnam finance.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.Tax Compliance and Internal Controls \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e4.1 Ensure the company complies with Vietnamese tax regulations, accurately calculate and report all taxes (VAT,CIT, etc.) excepting PIT.\u003c/p\u003e\u003cp\u003e4.2 Assist in completing internal and external audits and enforce group internal control compliance requirements\u003c/p\u003e\u003cp\u003e4.3 Timely track changes in Vietnamese tax policies and assess their impact on the company's business.\u003c/p\u003e\u003cp\u003e\u00 ó thể thực hiện nhanh chóng và đạt hiệu quả cao.\r\n\r\nKhông ngừng theo đuổi sự tin cậy về chất lượng là nền tảng tạo nên uy tín và cũng là chìa khóa cho sự phát triển lớn mạnh của LiuGong. Tính đến nay, LiuGong đã có hơn 17.000 nhân viên, hơn 20 cơ sở sản xuất, 5 cơ sở R\u0026D và 17 trung tâm phụ tùng khu vực trên toàn thế giới. LiuGong luôn đi đầu trong lĩnh vực công nghệ, sản xuất và cung ứng hậu cần.\r\n\r\nĐể có được sự hài lòng của khách hàng, dịch vụ tin cậy và sản phẩm tuyệt vời là những yếu tố không thể thiếu. Là một trong những công ty có mạng lưới phân phối toàn cầu hoàn chỉnh nhất trong ngành, hiện LiuGong có hơn 300 nhà phân phối tại hơn 130 quốc gia, cung cấp dịch vụ hỗ trợ nhanh chóng, tiện lợi và chuyên nghiệp cho khách hàng trên toàn thế giới bất cứ lúc nào.\r\n\r\nTrong tương lai, LiuGong sẽ tiếp tục phấn đấu để xây dựng mối quan hệ đối tác hợp tác lâu dài với khách hàng. Bất kể quý khách hàng ở đâu, gặp phải vấn đề gì, các sản phẩm và dịch vụ máy móc ưu việt của chúng tôi sẽ giúp quý khách giải quyết vấn đề một cách dễ dàng và tạo ra giá trị hơn cả sự mong đợi.\r\n\r\nVỀ LIUGONG VIỆT NAM\r\nLiuGong chính thức gia nhập thị trường Việt Nam vào năm 2003. LiuGong cùng với các đối tác tại Việt Nam trong hơn 20 năm đã bán ra thị trường hơn 6,000 máy xây dựng và thiết bị khác nhau. Các sản phẩm, dịch vụ và thương hiệu của LiuGong được đông đảo khách hàng địa phương ghi nhận và tin tưởng. Máy xúc lật và xe lu cơ khí của chúng tôi cũng nhận được sự yêu thích của khách hàng, đây là 2 dòng sản phẩm giành được thị phần số 1 tại Việt Nam trong nhiều năm liền. Việt Nam là điểm dừng chân đầu tiên của chúng tôi trong chiến lược phát triển thị trường quốc tế, và cũng là thị trường trọng điểm của LiuGong tại nước ngoài. Việt Nam đã mang lại rất nhiều trải nghiệm và tạo nền tảng vững chắc cho LiuGong cũng như tạo điều kiện cho chúng tôi học hỏi mô hình bán hàng tại nước ngoài."])</script><script>self.__next_f.push([1,"3f:{\"companyId\":376983,\"jobImageURLs\":\"$4
