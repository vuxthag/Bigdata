i phí nhân sự.\u003c/p\u003e\u003cp\u003e• Thẩm định, đề xuất điều chỉnh thu nhập định kỳ hoặc đột xuất.\u003c/p\u003e\u003cp\u003e• Thực hiện các báo cáo nhân sự theo định kỳ và theo yêu cầu của Nhà nước, Công ty và Tập đoàn trong phạm vi phụ trách.\u003c/p\u003e\u003cp\u003e• Đại diện của Công ty làm việc với các cơ quan quản lý lao động trong các vấn đề liên quan đến Quản trị Nhân sự (\"QTNS\") (theo phân công), đảm bảo duy trì mối quan hệ hợp tác, hiệu quả với các cơ quan chức năng và các đối tác trong lĩnh vực QTNS.\u003c/p\u003e\u003cp\u003e• Tư vấn cho các cấp quản lý và nhân viên trong quá trình triển khai các chính sách về quản lý quan hệ lao động và tuân thủ.\u003c/p\u003e\u003cp\u003e• Nhận diện các rủi ro có thể phát sinh trong hoạt động QTNS.\u003c/p\u003e\u003cp\u003e• Theo dõi, lưu trữ thông tin, tài liệu, hồ sơ liên quan đến công tác quan hệ lao động. Cải tiến, đổi mới quy trình vận hành hàng ngày theo hướng tinh gọn, ứng dụng công nghệ.\u003c/p\u003e\u003cp\u003e• Đề xuất các giải pháp xây dựng môi trường làm việc văn minh, văn hóa cao theo bộ tiêu chí MTLV của Tập đoàn.\u003c/p\u003e\u003cp\u003e• Thực hiện các công việc khác theo yêu cầu của lãnh đạo.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Td5c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Cập nhật và kiểm soát Sơ đồ Tổ chức, HR Map chi tiết của các Chuỗi/ Cơ sở phụ trách.\u003c/p\u003e\u003cp\u003e• Phối hợp \u0026 thực hiện xây dựng, điều chỉnh tiêu chuẩn định biên.\u003c/p\u003e\u003cp\u003e• Kiểm soát việc thực hiện xây dựng, rà soát và kiểm soát định biên cũng như các phương án tối ưu nhân sự.\u003c/p\u003e\u003cp\u003e• Bám sát tình hình hoạt động kinh doanh thực tế để thiết kế và thực hiện các giải pháp nhân sự phù hợp với định hướng phát triển của Công ty.\u003c/p\u003e\u003cp\u003e• Phối hợp xây dựng, rà soát điều chỉnh và hướng dẫn triển khai hệ thống chính sách, quy chế/ quy định/ quy trình nhân sự chung của Công ty (Quy định/Hướng dẫn/Biểu mẫu nhân sự \u
