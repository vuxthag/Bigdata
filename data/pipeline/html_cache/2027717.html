ng lõi và đa dạng hóa tăng trưởng xoay quanh ngành bất động sản. Và để chuẩn bị nền tảng cho tương lai, tập đoàn tập trung vào củng cố nguồn nhân lực, hệ thống bộ máy vận hành và quản trị dựa trên 3 giá trị cốt lõi: Professionalism, Integrity, Ownership. Cả hệ thống Nam Long cùng có trách nhiệm với lời hứa của mình, làm việc chuyên nghiệp và đồng lòng xem tổ chức như gia đình, xem việc công ty như là việc của bản thân để tạo ra sức mạnh tổng lực vươn đến thành công.\r\nNhững ứng cử viên sáng giá, nếu bạn có động lực, tự tin và sẵn sàng làm việc hết mình, hãy gia nhập cùng chúng tôi. Chúng tôi mang đến cho bạn cơ hội hiện thực hóa các khả năng của bạn trong một môi trường làm việc thân thiện nhưng cũng đầy thách thức, nơi bạn được tưởng thưởng xứng đáng với năng lực, cơ hội phát triển nghề nghiệp rộng mở!\r\nWebsite: www.namlongvn.com"])</script><script>self.__next_f.push([1,"24:Tc52,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• The Senior Manager – Business Transformation PMO drives Nam Long Group’s strategic transformation and organizational readiness toward Vision 2030\u003c/p\u003e\u003cp\u003e• Ensures transformation initiatives are prioritized, coordinated, and executed effectively across all functions\u003c/p\u003e\u003cp\u003e• Supported by a robust change management and capability-building framework\u003c/p\u003e\u003cp\u003e• Acts as the transformation orchestrator, partnering with leaders, COEs, and subsidiaries\u003c/p\u003e\u003cp\u003e• Monitors progress, builds change capabilities, and strengthens organizational health and leadership readiness for sustainable growth\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Responsibility:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Performance:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Transformation Delivery \u0026 Insights (40%):\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Execute Group Transformation initiativ
