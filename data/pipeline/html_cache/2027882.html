ú trọng vào việc phát triển tài năng của nhân viên nên việc đào tạo kỹ năng và chuyên môn sẽ được thực hiện theo định kỳ, giúp nâng cao kỹ năng, chuyên môn cho CBNV kịp thời đáp ứng nhu cầu công việc\r\n- Chính sách lương thưởng, phúc lợi hấp dẫn: Ngoài lương, CBNV của Phương Linh còn được hưởng lương tháng 13, hưởng lương kinh doanh. Bên cạnh đó, CBNV của Phương Linh còn có các chế độ phụ cấp như: BHXH, BHYT, BHTN, phụ cấp ăn trưa… Các chế độ khác như: trợ cấp đồng phục, chế độ nghỉ mát, chế độ nghỉ phép nghỉ lễ, chế độ khen thưởng kịp thời, cơ hội thăng tiến cao cho từng đối tượng CBNV\r\n- Quyền lợi tương xứng năng lực: Với phương châm \"Đội ngũ CBNV là nhân tố chủ yếu quyết định tới sự thành công\", Phương Linh luôn quan tâm đến sự phát triển, củng cố, chăm lo đời sống tinh thần vật chất cho nhân viên, tuân thủ quy định của Bộ Lao động , chế độ chính sách của Nhà nước, tạo điều kiện cho nhân viên học tập, thăng tiến\r\n- Phát huy tối đa sáng tạo cá nhân: Phương Linh là nơi mang đến cho bạn nhiều cơ hội sáng tạo và cải tiến. Công ty luôn khuyến khích nhân viên đưa ra ý kiến, tranh luận và những ý tưởng mới. Chính vì vậy, Phương Linh sẽ giúp bạn phát huy hết tính sáng tạo và khả năng của bản thân\r\n- Môi trường làm việc năng động: Được thành lập từ năm 2000, với hơn 20 năm kinh nghiệm trong lĩnh vực sản xuất quạt công nghiệp, Phương Linh không ngừng tăng trưởng và phát triển lớn mạnh. Với phương châm \"tăng giá trị - vững niềm tin\", hiện Phương Linh đã có chi nhánh trên khắp 3 miền tổ quốc"])</script><script>self.__next_f.push([1,"24:Tb8d,"])</script><script>self.__next_f.push([1,"Công ty TNHH Sản xuất Cơ điện và TM Phương Linh được thành lập theo giấy phép kinh doanh ngày 1/6/2000 đến nay Công ty TNHH Sản xuất cơ điện và TM Phương Linh tự hào là một trong những đơn vị hàng đầu tại Việt Nam chuyên sản xuất và cung cấp các loại Quạt công nghiệp và hệ thống hút lọc bụi - xử lý môi trường.\r\n\r\nPhương Linh Co.,Ltd hiện đang xây dựng đội ngũ nhân sự đạt tiêu chuẩn )</script><script>self.__next_f.push([1,"1.\tNhững con người thông minh, năng động và sáng tạo. Bạn sẽ thấy hứng thú và hạnh phúc khi làm việc trong một môi trường được tạo nên bởi những người đồng nghiệp thông minh. Môi trường giúp bạn không ngừng sáng tạo, không ngừng học hỏi để nâng cao giá trị của bản thân. Đến với Chúng tôi, bạn sẽ trở nên năng động, tự tin, sáng tạo hơn.\r\n\r\n2.\tGiám đốc và những người lãnh đạo tài năng với 2 chữ “Tâm và Tầm”Phương Linh được so sánh như một con tàu lớn giương cánh buồm đỏ thắm ra khơi. Con tàu đó vượt biển lớn qua sự chèo lái người thuyển trưởng tài năng, đam mê và sáng tạo không ngừng. Hai chữ “ Tâm và Tầm” bạn sẽ nhận thấy rõ khi bạn lựa chọn môi trường làm việc của chúng tôi.\r\n\r\n3.\tSự quý trọng con ngườiChúng tôi coi con người là tài sản quý báu nhất của công ty. Nguồn nhân lực là một trong những nguồn lực chúng tôi ưu tiên hàng đầu trong việc “ đầu tư để phát triển” thông qua: \r\n\r\n-\tChính sách đãi ngộ:\r\nChúng tôi thực hiện chính sách đãi ngộ thu hút nhân tài, tạo sự cạnh tranh, tạo tính hấp dẫn và đặc biệt khích lệ sự đóng góp hữu ích của từng cá nhân với sự phát triển của Phương Linh.\r\n\r\n-\tChương trình đào tạo:\r\nChúng tôi tổ chức thường xuyên các chương trình đào tạo nâng cao chuyên môn, nghiệp vụ, kỹ năng mềm và kỹ năng quản lý. Các chương trình đào tạo được tổ chức quy mô với sự giảng dạy của các chuyên gia trong nước và nước ngoài.Mục tiêu của chúng tôi là xây dựng một môi trường làm việc tốt nhất tại Việt Nam\r\n\r\n-\tVăn hóa công ty:\r\nCông ty luôn tổ chức các buổi giao lưu văn hóa, văn nghệ toàn công ty vào các dịp đặc biệt\r\nHàng năm, công ty có tổ chức đi tham quan, du lịch tại một số nước có sự phát triển lớn mạnh trong ngành sản xuất Quạt công nghiệp, máy hút lọc bụi công nghiệp và tủ điện như: Singapore, Anh, Mỹ, Trung Quốc….\r\n"])</script><script>self.__next_f.push([1,"28:Tb8d,"])</script><script>self.__next_f.push([1,"Công ty TNHH Sản xuất Cơ điện và TM Phương Linh được thành lập the  việc phát triển tài năng của nhân viên nên việc đào tạo kỹ năng và chuyên môn sẽ được thực hiện theo định kỳ, giúp nâng cao kỹ năng, chuyên môn cho CBNV kịp thời đáp ứng nhu cầu công việc\r\n- Chính sách lương thưởng, phúc lợi hấp dẫn: Ngoài lương, CBNV của Phương Linh còn được hưởng lương tháng 13, hưởng lương kinh doanh. Bên cạnh đó, CBNV của Phương Linh còn có các chế độ phụ cấp như: BHXH, BHYT, BHTN, phụ cấp ăn trưa… Các chế độ khác như: trợ cấp đồng phục, chế độ nghỉ mát, chế độ nghỉ phép nghỉ lễ, chế độ khen thưởng kịp thời, cơ hội thăng tiến cao cho từng đối tượng CBNV\r\n- Quyền lợi tương xứng năng lực: Với phương châm \"Đội ngũ CBNV là nhân tố chủ yếu quyết định tới sự thành công\", Phương Linh luôn quan tâm đến sự phát triển, củng cố, chăm lo đời sống tinh thần vật chất cho nhân viên, tuân thủ quy định của Bộ Lao động , chế độ chính sách của Nhà nước, tạo điều kiện cho nhân viên học tập, thăng tiến\r\n- Phát huy tối đa sáng tạo cá nhân: Phương Linh là nơi mang đến cho bạn nhiều cơ hội sáng tạo và cải tiến. Công ty luôn khuyến khích nhân viên đưa ra ý kiến, tranh luận và những ý tưởng mới. Chính vì vậy, Phương Linh sẽ giúp bạn phát huy hết tính sáng tạo và khả năng của bản thân\r\n- Môi trường làm việc năng động: Được thành lập từ năm 2000, với hơn 20 năm kinh nghiệm trong lĩnh vực sản xuất quạt công nghiệp, Phương Linh không ngừng tăng trưởng và phát triển lớn mạnh. Với phương châm \"tăng giá trị - vững niềm tin\", hiện Phương Linh đã có chi nhánh trên khắp 3 miền tổ quốc"])</script><script>self.__next_f.push([1,"45:T917,"])</script><script>self.__next_f.push([1,"1.\tNhững con người thông minh, năng động và sáng tạo. Bạn sẽ thấy hứng thú và hạnh phúc khi làm việc trong một môi trường được tạo nên bởi những người đồng nghiệp thông minh. Môi trường giúp bạn không ngừng sáng tạo, không ngừng học hỏi để nâng cao giá trị của bản thân. Đến với Chúng tôi, bạn sẽ trở nên năng động, tự tin, sáng tạo hơn.\r\n\r\n2.\tGiám đốc và những người lãnh đạo tài năng với 2 chữ “Tâm và Tầm”Phương Linh được so sánh như một con tàu lớn giương cánh buồm đỏ thắm ra khơi. Con tàu đó vượt biển lớn qua sự chèo lái người thuyển trưởng tài năng, đam mê và sáng tạo không ngừng. Hai chữ “ Tâm và Tầm” bạn sẽ nhận thấy rõ khi bạn lựa chọn môi trường làm việc của chúng tôi.\r\n\r\n3.\tSự quý trọng con ngườiChúng tôi coi con người là tài sản quý báu nhất của công ty. Nguồn nhân lực là một trong những nguồn lực chúng tôi ưu tiên hàng đầu trong việc “ đầu tư để phát triển” thông qua: \r\n\r\n-\tChính sách đãi ngộ:\r\nChúng tôi thực hiện chính sách đãi ngộ thu hút nhân tài, tạo sự cạnh tranh, tạo tính hấp dẫn và đặc biệt khích lệ sự đóng góp hữu ích của từng cá nhân với sự phát triển của Phương Linh.\r\n\r\n-\tChương trình đào tạo:\r\nChúng tôi tổ chức thường xuyên các chương trình đào tạo nâng cao chuyên môn, nghiệp vụ, kỹ năng mềm và kỹ năng quản lý. Các chương trình đào tạo được tổ chức quy mô với sự giảng dạy của các chuyên gia trong nước và nước ngoài.Mục tiêu của chúng tôi là xây dựng một môi trường làm việc tốt nhất tại Việt Nam\r\n\r\n-\tVăn hóa công ty:\r\nCông ty luôn tổ chức các buổi giao lưu văn hóa, văn nghệ toàn công ty vào các dịp đặc biệt\r\nHàng năm, công ty có tổ chức đi tham quan, du lịch tại một số nước có sự phát triển lớn mạnh trong ngành sản xuất Quạt công nghiệp, máy hút lọc bụi công nghiệp và tủ điện như: Singapore, Anh, Mỹ, Trung Quốc….\r\n"])</script><script>self.__next_f.push([1,"42:{\"companyId\":91663,\"jobImageURLs\":\"$43\",\"jobVideoURLs\":null,\"companyName\":\"Công Ty Cổ phần Tập đoàn cơ điện Phương Linh\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/78/11246907.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"Mrs Ngân\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"M08- Lô 14 Khu A, Khu đô thị Dương Nội, P. Dương Nội, Q. Hà Đông, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"$45\",\"profileBaseName\":\"phuong-linh\",\"isUpgradeProfile\":1,\"isDeleteProfile\":0
