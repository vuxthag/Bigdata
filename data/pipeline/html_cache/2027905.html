c/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T16e4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eABOUT US:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eVietnam Children’s Fund Social Enterprise (VCF SE) is dedicated to addressing the social challenges faced by underprivileged children, women, and marginalized communities in Vietnam. The VCF SE enterprise model is designed to market and sell products that are environmentally safe, produced under ‘fair trade’ conditions, and ultimately improve medical, health, and education challenges. Donations are accepted and added to 100% of all profits to invest in the implementation of healthcare and education initiatives. The goal is to bring significant value to the community, creating opportunities for everyone to participate in supporting underprivileged individuals across Vietnam, contributing to a more developed and resilient country. VCF SE intends to become a leading social enterprise in Vietnam, offering diverse investment opportunities in sustainable solutions for individual healthcare, community health, the environment, and education.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eROLE OVERVIEW:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis role supports the daily operations of the Preloved to Beloved store, ensuring smooth sales, responsible management of donated items, and positive experiences for customers and donors across both offline and online channels.\u003c/p\u003e\u003cp\u003eThe position is hands-on and execution-focused, covering store operations, donation intake, merchandising, online selling support, and basic content tasks, while assisting with program and administrative activities. The role requires reliability, flexibility, and strong ownership in a fast-paced social enterprise environment, where every item sold helps bring warmth, health, and education opportunities to children in need.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Store Operations, Sales \u0026 Customer Experience:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tOperate daily store activities (opening/closing, customer service, checkout, KiotViet payments, promotions, store readiness).\u003c/p\u003e\u003cp\u003e●\tRepresent the values and mission of the Hơi Ấm Trao Tay program in all customer interactions.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Donation Intake \u0026 Donor Communication:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tReceive, screen, and record donated items; explain donation guidelines and support donor communication.\u003c/p\u003e\u003cp\u003e●\tEnsure donors feel appreciated and understand the social impact of their contributions.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Inventory, Pricing, Merchandising \u0026 Reporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tHandle sorting, pricing, labeling, restocking, display maintenance, inventory accuracy, and basic sales/stock reports.\u003c/p\u003e\u003cp\u003e●\tManage donated items responsibly to support sustainability and reduce waste.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Online Selling \u0026 Livestream Support:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tSupport Facebook/online sales and livestreams: item prep, order confirmation, packing, delivery coordination, and inventory updates.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Content \u0026 Social Media Support (Basic):\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tTake basic photos/videos, post daily stories, and support content needs during campaigns or promotions.\u003c/p\u003e\u003cp\u003e●\tCapture authentic content reflecting community impact and sustainable fashion.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Program \u0026 Admin Support:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tSupport program execution, basic administration, and reporting tasks for campaigns and activities.\u003c/p\u003e\u003cp\u003e●\tAssist with simple impact tracking (e.g., sales contribution, items sold for beneficiaries)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Ethics, Collaboration \u0026 Safeguarding:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tCoordinate with internal teams for smooth operations.\u003c/p\u003e\u003cp\u003e●\tComply with VCF’s Child Protection Policy, Code of Conduct, and confidentiality standards.\u003c/p\u003e\u003cp\u003e●\tSupport the manager of the program to handle donor, customer, and beneficiary-related information with confidentiality and integrity.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eREQUIREMENTS:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Entry-level (0-1 year of experience)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Mindset/ Attitude \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tAccountability \u0026 trust (reliable, honest, able to work independently)\u003c/p\u003e\u003cp\u003e●\tResponsible for end results, not just assigned tasks\u003c/p\u003e\u003cp\u003e●\tSees problems as opportunities to learn\u003c/p\u003e\u003cp\u003e●\tFlexible schedule (including one weekend working day)\u003c/p\u003e\u003cp\u003e●\tGrowth-oriented and open to feedback\u003c/p\u003e\u003cp\u003e●\tUnderstands and respects the social mission of \u003cem\u003ePreloved to Beloved\u003c/em\u003e (sustainability, child welfare, responsible consumption).\u003c/p\u003e\u003cp\u003e●\tCareful, respectful, and ethical when handling donated items and donor-related information.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Ability\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBasic visual skills (Canva, simple design, or taking clean, aesthetic photos)\u003c/p\u003e\u003cp\u003e●\tGood communication skills (with customers, donors, and online channels)\u003c/p\u003e\u003cp\u003e●\tStrong multitasking ability (store operations, online sales, admin)\u003c/p\u003e\u003cp\u003e●\tLearns through practice, examples, and repetition\u003c/p\u003e\u003cp\u003e●\tAble to work with KiotViet (inventory, sales, check-out system)\u003c/p\u003e\u003cp\u003e●\tBasic storytelling ability - able to explain the program’s purpose and impact in a simple, genuine way to customers and donors.\u003c/p\u003e\u003cp\u003e●\tAttention to detail in sorting, pricing, packing, and inventory accuracy.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBENEFITS:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tComprehensive compensation and benefits package in compliance with Vietnam’s laws.\u003c/p\u003e\u003cp\u003e●\tHands-on experiences in developing and implementing social impact initiatives, especially in healthcare, education, and sustainable development.\u003c/p\u003e\u003cp\u003e●\tInclusive and supportive work environment fostering personal growth and continuous improvement.\u003c/p\u003e\u003cp\u003e●\tContribution to innovative solutions that enhance community well-being, promote sustainable development, and support educational access across Vietnam.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T254a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003eVỀ CHÚNG TÔI:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDoanh nghiệp Xã hội Vietnam Children’s Fund (VCF SE) nỗ lực mang đến giải pháp cho những khó khăn mà trẻ em kém may mắn, phụ nữ và các cộng đồng yếu thế tại Việt Nam đang phải đối mặt. VCF SE phát triển mô hình doanh nghiệp nhằm đạt được các mục tiêu xã hội thông qua thông qua việc vận hành như một doanh nghiệp chuyên nghiệp, bao gồm hoạt động kinh doanh, tiếp thị, bán hàng và quản lý tài chính. Chúng tôi tập trung vào các sản phẩm thân thiện với môi trường, sản xuất theo nguyên tắc “thương mại công bằng”, với mục đích cuối cùng là cải thiện các vấn đề về y tế, sức khỏe và giáo dục cho cộng đồng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCác sáng kiến về chăm sóc sức khỏe và giáo dục của VCF SE được thực hiện dựa trên hai nguồn ngân sách chính: 1 là, lợi nhuận từ hoạt động kinh doanh: 100% lợi nhuận thu được được tái đầu tư vào các hoạt động xã hội hoặc mở rộng các sáng kiến có ý nghĩa, nhằm giải quyết các vấn đề liên quan đến sức khỏe, giáo dục và môi trường; bên cạnh việc tiếp nhận các khoản đóng góp và tài trợ: các khoản quyên góp này có thể đến từ cá nhân, tổ chức và các nhà hảo tâm được tiếp nhận và kết hợp với nguồn lợi nhuận tái đầu tư để gia tăng hiệu quả của các sáng kiến vì cộng đồng. Với mục tiêu mang lại giá trị bền vững cho cộng đồng, VCF SE tạo cơ hội để mọi người tham gia hỗ trợ các cá nhân khó khăn trên khắp Việt Nam, đóng góp vào sự phát triển ngày càng vững mạnh hơn của đất nước.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCF SE hướng tới trở thành doanh nghiệp xã hội hàng đầu tại Việt Nam, cung cấp các cơ hội đầu tư đa dạng vào các giải pháp bền vững trong lĩnh vực chăm sóc sức khỏe cá nhân, sức khỏe cộng đồng, bảo vệ môi trường và nâng cao chất lượng giáo dục.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTỔNG QUAN VỊ TRÍ:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVị trí này có vai trò hỗ trợ vận hành hàng ngày của cửa hàng Preloved to Beloved, đảm bảo hoạt động bán hàng diễn ra suôn sẻ, quản lý có trách nhiệm các mặt hàng quyên góp, và mang lại trải nghiệm tích cực cho khách hàng cũng như nhà tài trợ trên cả kênh trực tiếp (offline) và trực tuyến (online).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐây là vị trí mang tính thực thi cao và trực tiếp tham gia vào công việc vận hành, bao gồm: quản lý hoạt động cửa hàng, tiếp nhận hàng quyên góp, trưng bày sản phẩm, hỗ trợ bán hàng trực tuyến và thực hiện các nhiệm vụ nội dung cơ bản, đồng thời hỗ trợ các hoạt động chương trình và công tác hành chính. Vị trí này đòi hỏi sự đáng tin cậy, linh hoạt và tinh thần trách nhiệm cao trong môi trường doanh nghiệp xã hội năng động, nơi mỗi sản phẩm được bán ra đều góp phần mang lại sự ấm áp, sức khỏe và cơ hội giáo dục cho trẻ em có hoàn cảnh khó khăn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTRÁCH NHIỆM:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. \u003c/strong\u003e Vận hành cửa hàng, Bán hàng \u0026 Trải nghiệm khách hàng:\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tThực hiện các hoạt động vận hành hàng ngày của cửa hàng (mở/đóng cửa, chăm sóc khách hàng, thanh toán, xử lý thanh toán qua KiotViet, triển khai chương trình khuyến mãi, đảm bảo cửa hàng luôn sẵn sàng phục vụ).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tĐại diện cho giá trị và sứ mệnh của chương trình Hơi Ấm Trao Tay trong mọi tương tác với khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. \u003cem\u003eTiếp nhận hàng quyên góp \u0026 Giao tiếp với nhà tài trợ:\u003c/em\u003e\u003c/strong\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tTiếp nhận, sàng lọc và ghi nhận các mặt hàng quyên góp; hướng dẫn quy định quyên góp và hỗ trợ trao đổi thông tin với nhà tài trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tĐảm bảo nhà tài trợ cảm thấy được trân trọng và hiểu rõ tác động xã hội từ sự đóng góp của mình.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. \u003cem\u003eQuản lý tồn kho, Định giá, Trưng bày \u0026 Báo cáo:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eThực hiện phân loại, định giá, dán nhãn, bổ sung hàng, duy trì trưng bày, đảm bảo độ chính xác tồn kho và lập các báo cáo bán hàng/tồn kho cơ bản.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eQuản lý hàng quyên góp một cách có trách nhiệm nhằm thúc đẩy tính bền vững và giảm thiểu lãng phí\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. \u003cem\u003eHỗ trợ bán hàng trực tuyến \u0026 Livestream:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ bán hàng qua Facebook/kênh online và livestream: chuẩn bị sản phẩm, xác nhận đơn hàng, đóng gói, phối hợp giao hàng và cập nhật tồn kho.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. \u003c/strong\u003eHỗ trợ nội dung \u0026 mạng xã hội (Cơ bản):    \u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tChụp ảnh/quay video cơ bản, đăng story hằng ngày và hỗ trợ nội dung trong các chiến dịch hoặc chương trình khuyến mãi.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tGhi lại nội dung chân thực phản ánh tác động cộng đồng và thời trang bền vững.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. \u003cem\u003eHỗ trợ Chương trình \u0026 Hành chính:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tHỗ trợ triển khai chương trình, các công việc hành chính cơ bản và báo cáo liên quan đến chiến dịch/hoạt động\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tHỗ trợ theo dõi tác động ở mức cơ bản (ví dụ: doanh thu đóng góp, số lượng sản phẩm bán ra hỗ trợ người thụ hưởng).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. \u003cem\u003eĐạo đức, Phối hợp \u0026 Bảo vệ trẻ em:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tPhối hợp với các bộ phận nội bộ để đảm bảo vận hành trôi chảy.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTuân thủ Chính sách Bảo vệ Trẻ em, Quy tắc Ứng xử và các tiêu chuẩn bảo mật của VCF.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ quản lý chương trình trong việc xử lý thông tin liên quan đến nhà tài trợ, khách hàng và người thụ hưởng một cách bảo mật và chính trực.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYÊU CẦU:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.     Cấp độ mới bắt đầu (0–1 năm kinh nghiệm)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Tư duy / Thái độ\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003eCó tinh thần trách nhiệm và đáng tin cậy (trung thực, có khả năng làm việc độc lập).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tChịu trách nhiệm về kết quả cuối cùng, không chỉ hoàn thành các nhiệm vụ được giao.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tXem vấn đề là cơ hội để học hỏi và cải thiện.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó thể làm việc theo lịch linh hoạt (bao gồm 01 ngày cuối tuần).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó tinh thần cầu tiến và sẵn sàng tiếp nhận phản hồi.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tHiểu và tôn trọng sứ mệnh xã hội của chương trình Preloved to Beloved (bền vững, phúc lợi trẻ em, tiêu dùng có trách nhiệm).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCẩn thận, tôn trọng và có đạo đức khi xử lý hàng quyên góp và thông tin liên quan đến nhà tài trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3. Kỹ năng:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kỹ năng thị giác cơ bản (sử dụng Canva, thiết kế đơn giản hoặc chụp ảnh gọn gàng, thẩm mỹ).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tKỹ năng giao tiếp tốt (với khách hàng, nhà tài trợ và trên các kênh trực tuyến).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tKhả năng làm nhiều việc cùng lúc (vận hành cửa hàng, bán hàng online, công việc hành chính).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó khả năng học hỏi thông qua thực hành, quan sát và lặp lại.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó thể sử dụng KiotViet (quản lý tồn kho, bán hàng, hệ thống thanh toán).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó khả năng kể chuyện cơ bản – có thể truyền tải mục đích và tác động của chương trình một cách đơn giản, chân thành đến khách hàng và nhà tài trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tChú ý đến chi tiết trong quá trình phân loại, định giá, đóng gói và đảm bảo độ chính xác tồn kho.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eQUYỀN LỢI:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tGói lương thưởng và phúc lợi đầy đủ, tuân thủ theo quy định của pháp luật Việt Nam.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCơ hội trải nghiệm thực tế trong việc xây dựng và triển khai các sáng kiến tạo tác động xã hội, đặc biệt trong lĩnh vực y tế, giáo dục và phát triển bền vững.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tMôi trường làm việc hòa nhập, hỗ trợ và khuyến khích sự phát triển cá nhân cũng như cải tiến liên tục\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tĐược đóng góp vào các giải pháp sáng tạo nhằm nâng cao phúc lợi cộng đồng, thúc đẩy phát triển bền vững và mở rộng cơ hội tiếp cận giáo dục trên toàn Việt Nam.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T16e4,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eABOUT US:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eVietnam Children’s Fund Social Enterprise (VCF SE) is dedicated to addressing the social challenges faced by underprivileged children, women, and marginalized communities in Vietnam. The VCF SE enterprise model is designed to market and sell products that are environmentally safe, produced under ‘fair trade’ conditions, and ultimately improve medical, health, and education challenges. Donations are accepted and added to 100% of all profits to invest in the implementation of healthcare and education initiatives. The goal is to bring significant value to the community, creating opportunities for everyone to participate in supporting underprivileged individuals across Vietnam, contributing to a more developed and resilient country. VCF SE intends to become a leading social enterprise in Vietnam, offering diverse investment opportunities in sustainable solutions for individual healthcare, community health, the environment, and education.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eROLE OVERVIEW:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis role supports the daily operations of the Preloved to Beloved store, ensuring smooth sales, responsible management of donated items, and positive experiences for customers and donors across both offline and online channels.\u003c/p\u003e\u003cp\u003eThe position is hands-on and execution-focused, covering store operations, donation intake, merchandising, online selling support, and basic content tasks, while assisting with program and administrative activities. The role requires reliability, flexibility, and strong ownership in a fast-paced social enterprise environment, where every item sold helps bring warmth, health, and education opportunities to children in need.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Store Operations, Sales \u0026 Customer Experience:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tOperate daily store activities (opening/closing, customer service, checkout, KiotViet payments, promotions, store readiness).\u003c/p\u003e\u003cp\u003e●\tRepresent the values and mission of the Hơi Ấm Trao Tay program in all customer interactions.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Donation Intake \u0026 Donor Communication:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tReceive, screen, and record donated items; explain donation guidelines and support donor communication.\u003c/p\u003e\u003cp\u003e●\tEnsure donors feel appreciated and understand the social impact of their contributions.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Inventory, Pricing, Merchandising \u0026 Reporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tHandle sorting, pricing, labeling, restocking, display maintenance, inventory accuracy, and basic sales/stock reports.\u003c/p\u003e\u003cp\u003e●\tManage donated items responsibly to support sustainability and reduce waste.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Online Selling \u0026 Livestream Support:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tSupport Facebook/online sales and livestreams: item prep, order confirmation, packing, delivery coordination, and inventory updates.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Content \u0026 Social Media Support (Basic):\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tTake basic photos/videos, post daily stories, and support content needs during campaigns or promotions.\u003c/p\u003e\u003cp\u003e●\tCapture authentic content reflecting community impact and sustainable fashion.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Program \u0026 Admin Support:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tSupport program execution, basic administration, and reporting tasks for campaigns and activities.\u003c/p\u003e\u003cp\u003e●\tAssist with simple impact tracking (e.g., sales contribution, items sold for beneficiaries)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Ethics, Collaboration \u0026 Safeguarding:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tCoordinate with internal teams for smooth operations.\u003c/p\u003e\u003cp\u003e●\tComply with VCF’s Child Protection Policy, Code of Conduct, and confidentiality standards.\u003c/p\u003e\u003cp\u003e●\tSupport the manager of the program to handle donor, customer, and beneficiary-related information with confidentiality and integrity.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eREQUIREMENTS:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Entry-level (0-1 year of experience)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Mindset/ Attitude \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tAccountability \u0026 trust (reliable, honest, able to work independently)\u003c/p\u003e\u003cp\u003e●\tResponsible for end results, not just assigned tasks\u003c/p\u003e\u003cp\u003e●\tSees problems as opportunities to learn\u003c/p\u003e\u003cp\u003e●\tFlexible schedule (including one weekend working day)\u003c/p\u003e\u003cp\u003e●\tGrowth-oriented and open to feedback\u003c/p\u003e\u003cp\u003e●\tUnderstands and respects the social mission of \u003cem\u003ePreloved to Beloved\u003c/em\u003e (sustainability, child welfare, responsible consumption).\u003c/p\u003e\u003cp\u003e●\tCareful, respectful, and ethical when handling donated items and donor-related information.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Ability\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBasic visual skills (Canva, simple design, or taking clean, aesthetic photos)\u003c/p\u003e\u003cp\u003e●\tGood communication skills (with customers, donors, and online channels)\u003c/p\u003e\u003cp\u003e●\tStrong multitasking ability (store operations, online sales, admin)\u003c/p\u003e\u003cp\u003e●\tLearns through practice, examples, and repetition\u003c/p\u003e\u003cp\u003e●\tAble to work with KiotViet (inventory, sales, check-out system)\u003c/p\u003e\u003cp\u003e●\tBasic storytelling ability - able to explain the program’s purpose and impact in a simple, genuine way to customers and donors.\u003c/p\u003e\u003cp\u003e●\tAttention to detail in sorting, pricing, packing, and inventory accuracy.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBENEFITS:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e●\tComprehensive compensation and benefits package in compliance with Vietnam’s laws.\u003c/p\u003e\u003cp\u003e●\tHands-on experiences in developing and implementing social impact initiatives, especially in healthcare, education, and sustainable development.\u003c/p\u003e\u003cp\u003e●\tInclusive and supportive work environment fostering personal growth and continuous improvement.\u003c/p\u003e\u003cp\u003e●\tContribution to innovative solutions that enhance community well-being, promote sustainable development, and support educational access across Vietnam.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:T254a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003eVỀ CHÚNG TÔI:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDoanh nghiệp Xã hội Vietnam Children’s Fund (VCF SE) nỗ lực mang đến giải pháp cho những khó khăn mà trẻ em kém may mắn, phụ nữ và các cộng đồng yếu thế tại Việt Nam đang phải đối mặt. VCF SE phát triển mô hình doanh nghiệp nhằm đạt được các mục tiêu xã hội thông qua thông qua việc vận hành như một doanh nghiệp chuyên nghiệp, bao gồm hoạt động kinh doanh, tiếp thị, bán hàng và quản lý tài chính. Chúng tôi tập trung vào các sản phẩm thân thiện với môi trường, sản xuất theo nguyên tắc “thương mại công bằng”, với mục đích cuối cùng là cải thiện các vấn đề về y tế, sức khỏe và giáo dục cho cộng đồng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCác sáng kiến về chăm sóc sức khỏe và giáo dục của VCF SE được thực hiện dựa trên hai nguồn ngân sách chính: 1 là, lợi nhuận từ hoạt động kinh doanh: 100% lợi nhuận thu được được tái đầu tư vào các hoạt động xã hội hoặc mở rộng các sáng kiến có ý nghĩa, nhằm giải quyết các vấn đề liên quan đến sức khỏe, giáo dục và môi trường; bên cạnh việc tiếp nhận các khoản đóng góp và tài trợ: các khoản quyên góp này có thể đến từ cá nhân, tổ chức và các nhà hảo tâm được tiếp nhận và kết hợp với nguồn lợi nhuận tái đầu tư để gia tăng hiệu quả của các sáng kiến vì cộng đồng. Với mục tiêu mang lại giá trị bền vững cho cộng đồng, VCF SE tạo cơ hội để mọi người tham gia hỗ trợ các cá nhân khó khăn trên khắp Việt Nam, đóng góp vào sự phát triển ngày càng vững mạnh hơn của đất nước.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCF SE hướng tới trở thành doanh nghiệp xã hội hàng đầu tại Việt Nam, cung cấp các cơ hội đầu tư đa dạng vào các giải pháp bền vững trong lĩnh vực chăm sóc sức khỏe cá nhân, sức khỏe cộng đồng, bảo vệ môi trường và nâng cao chất lượng giáo dục.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTỔNG QUAN VỊ TRÍ:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVị trí này có vai trò hỗ trợ vận hành hàng ngày của cửa hàng Preloved to Beloved, đảm bảo hoạt động bán hàng diễn ra suôn sẻ, quản lý có trách nhiệm các mặt hàng quyên góp, và mang lại trải nghiệm tích cực cho khách hàng cũng như nhà tài trợ trên cả kênh trực tiếp (offline) và trực tuyến (online).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐây là vị trí mang tính thực thi cao và trực tiếp tham gia vào công việc vận hành, bao gồm: quản lý hoạt động cửa hàng, tiếp nhận hàng quyên góp, trưng bày sản phẩm, hỗ trợ bán hàng trực tuyến và thực hiện các nhiệm vụ nội dung cơ bản, đồng thời hỗ trợ các hoạt động chương trình và công tác hành chính. Vị trí này đòi hỏi sự đáng tin cậy, linh hoạt và tinh thần trách nhiệm cao trong môi trường doanh nghiệp xã hội năng động, nơi mỗi sản phẩm được bán ra đều góp phần mang lại sự ấm áp, sức khỏe và cơ hội giáo dục cho trẻ em có hoàn cảnh khó khăn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTRÁCH NHIỆM:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. \u003c/strong\u003e Vận hành cửa hàng, Bán hàng \u0026 Trải nghiệm khách hàng:\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tThực hiện các hoạt động vận hành hàng ngày của cửa hàng (mở/đóng cửa, chăm sóc khách hàng, thanh toán, xử lý thanh toán qua KiotViet, triển khai chương trình khuyến mãi, đảm bảo cửa hàng luôn sẵn sàng phục vụ).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tĐại diện cho giá trị và sứ mệnh của chương trình Hơi Ấm Trao Tay trong mọi tương tác với khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. \u003cem\u003eTiếp nhận hàng quyên góp \u0026 Giao tiếp với nhà tài trợ:\u003c/em\u003e\u003c/strong\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tTiếp nhận, sàng lọc và ghi nhận các mặt hàng quyên góp; hướng dẫn quy định quyên góp và hỗ trợ trao đổi thông tin với nhà tài trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tĐảm bảo nhà tài trợ cảm thấy được trân trọng và hiểu rõ tác động xã hội từ sự đóng góp của mình.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. \u003cem\u003eQuản lý tồn kho, Định giá, Trưng bày \u0026 Báo cáo:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eThực hiện phân loại, định giá, dán nhãn, bổ sung hàng, duy trì trưng bày, đảm bảo độ chính xác tồn kho và lập các báo cáo bán hàng/tồn kho cơ bản.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eQuản lý hàng quyên góp một cách có trách nhiệm nhằm thúc đẩy tính bền vững và giảm thiểu lãng phí\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. \u003cem\u003eHỗ trợ bán hàng trực tuyến \u0026 Livestream:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ bán hàng qua Facebook/kênh online và livestream: chuẩn bị sản phẩm, xác nhận đơn hàng, đóng gói, phối hợp giao hàng và cập nhật tồn kho.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. \u003c/strong\u003eHỗ trợ nội dung \u0026 mạng xã hội (Cơ bản):    \u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tChụp ảnh/quay video cơ bản, đăng story hằng ngày và hỗ trợ nội dung trong các chiến dịch hoặc chương trình khuyến mãi.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tGhi lại nội dung chân thực phản ánh tác động cộng đồng và thời trang bền vững.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. \u003cem\u003eHỗ trợ Chương trình \u0026 Hành chính:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tHỗ trợ triển khai chương trình, các công việc hành chính cơ bản và báo cáo liên quan đến chiến dịch/hoạt động\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tHỗ trợ theo dõi tác động ở mức cơ bản (ví dụ: doanh thu đóng góp, số lượng sản phẩm bán ra hỗ trợ người thụ hưởng).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. \u003cem\u003eĐạo đức, Phối hợp \u0026 Bảo vệ trẻ em:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tPhối hợp với các bộ phận nội bộ để đảm bảo vận hành trôi chảy.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTuân thủ Chính sách Bảo vệ Trẻ em, Quy tắc Ứng xử và các tiêu chuẩn bảo mật của VCF.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ quản lý chương trình trong việc xử lý thông tin liên quan đến nhà tài trợ, khách hàng và người thụ hưởng một cách bảo mật và chính trực.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYÊU CẦU:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.     Cấp độ mới bắt đầu (0–1 năm kinh nghiệm)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Tư duy / Thái độ\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003eCó tinh thần trách nhiệm và đáng tin cậy (trung thực, có khả năng làm việc độc lập).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tChịu trách nhiệm về kết quả cuối cùng, không chỉ hoàn thành các nhiệm vụ được giao.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tXem vấn đề là cơ hội để học hỏi và cải thiện.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó thể làm việc theo lịch linh hoạt (bao gồm 01 ngày cuối tuần).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó tinh thần cầu tiến và sẵn sàng tiếp nhận phản hồi.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tHiểu và tôn trọng sứ mệnh xã hội của chương trình Preloved to Beloved (bền vững, phúc lợi trẻ em, tiêu dùng có trách nhiệm).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCẩn thận, tôn trọng và có đạo đức khi xử lý hàng quyên góp và thông tin liên quan đến nhà tài trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3. Kỹ năng:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    \u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kỹ năng thị giác cơ bản (sử dụng Canva, thiết kế đơn giản hoặc chụp ảnh gọn gàng, thẩm mỹ).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tKỹ năng giao tiếp tốt (với khách hàng, nhà tài trợ và trên các kênh trực tuyến).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tKhả năng làm nhiều việc cùng lúc (vận hành cửa hàng, bán hàng online, công việc hành chính).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó khả năng học hỏi thông qua thực hành, quan sát và lặp lại.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó thể sử dụng KiotViet (quản lý tồn kho, bán hàng, hệ thống thanh toán).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tCó khả năng kể chuyện cơ bản – có thể truyền tải mục đích và tác động của chương trình một cách đơn giản, chân thành đến khách hàng và nhà tài trợ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tChú ý đến chi tiết trong quá trình phân loại, định giá, đóng gói và đảm bảo độ chính xác tồn kho.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eQUYỀN LỢI:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e●\tGói lương thưởng và phúc lợi đầy đủ, tuân thủ theo quy định của pháp luật Việt Nam.\u003c/em\u003e\u003c/p\u003e\
