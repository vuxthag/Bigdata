static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n26:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1229,"])</script><script>self.__next_f.push([1,"60 năm là một chặng đường dài không ngừng củng cố và phát triển của cán bộ công nhân viên nhiều thế hệ, để xây dựng nên một thương hiệu Bánh kẹo mạnh quốc gia Tràng An.\r\n\r\nCông Ty Cổ Phần Thương Mại Tràng An - Việt Nam (Tràng An) tiền thân là Xí nghiệp Công tư hợp danh Bánh – Mứt – Kẹo Hà Nội, từ sau giải phóng thủ đô và được thành lập Xí nghiệp quốc doanh 1964, năm 1975 tách ra thành 2 xí nghiệp: Xí nghiệp Bánh - Mứt - Kẹo Hà Nội (thuộc Công ty Thương nghiệp Hà Nội) và Xí nghiệp Kẹo Hà Nội (thuộc Cục Công nghiệp Hà Nội). Tràng An chính là một phân nhánh được nối tiếp phát triển từ Xí nghiệp kẹo Hà Nội (1975) - Nhà máy kẹo Hà Nội (1989) - Công ty Bánh kẹo Tràng An (1991) và ngày 1/10/2004 (sau 40 năm phát triển), công ty đã chuyển đổi sang mô hình công ty cổ phần với 51% vốn điều lệ thuộc Thành phố Hà Nội quản lý\r\n\r\nTừ một xí nghiệp nhỏ, đến nay, bánh kẹo Tràng An đã chiếm thị phẩn đáng kể với 4 công ty thành viên (trụ sở tại các tỉnh thành: Hà Nội, Thanh Hóa, Nghệ An, Bến Tre), doanh thu năm 2014 dự kiến 620 tỷ đồng(tăng hơn 12 lần so với trước khi cổ phần hoá - 2004), tạo công ăn việc làm cho hàng nghìn lao động và đóng thuế cho nhà nước hàng chục tỷ đồng.\r\n\r\nNhiều năm qua người tiêu dùng biết tới Tràng An với sản phẩm kẹo Hương cốm, đặc trưng hương cốm làng VòngHà Nội. Sản phẩm bánh kẹo Tràng An đã được nhận giải thưởng “Hàng Việt Nam chất lượng cao” trong nhiều năm qua. Cũng từ những sản phẩm mũi nhọn truyền  thống tới nay Tràng An đã phát triển hàng chục mẫu mã sản phẩm phù hợp với khẩu vị của người Việt Nam.\r\n\r\nTràng An, một trong những thương hiệu nổi tiếng Việt Nam, đã khẳng định tên tuổi bằng chất lượng sản phẩm và sự tin yêu của người tiêu dùng.\r\nLấy người tiêu dùng làm trọng tâm cho mọi hoạt động, chúng tôi luôn tiên phong trong việc tạo ra xu hướng tiêu dùng trong ngành thực phẩm và luôn sáng tạo để phục vụ người tiêu dùng những sản phẩm an toàn, thơm ngon, dinh dưỡng. Luôn tự đòi hỏi cao hơn ở chính mình, Tràng An đã và đang không ngừng nỗ lực đa dạng hóa sản phẩm đồng thời mở rộng và khai thác những ngành hàng mới, hướng đến phục vụ nhu cầu thiết yếu hàng ngày của người tiêu dùng\r\n\r\nTrải qua hơn 60 năm phát triển, sản phẩm và thương hiệu Tràng An đã trở nên gần gũi với khách hàng đưa Tràng An trở thành một trong những công ty nổi tiếng và năng động tại Việt Nam. Chặng đường 6 thập niên qua đã đánh dấu được một thương hiệu Tràng An năng động, sáng tạo, tiên phong trên thị trường qua các các chuỗi sự kiện mang tính bước ngoặt, đánh dấu sự phát triển lớn mạnh không ngừng của Tràng An: đầu tư xây dựng các nhà máy mới, liên tục cho ra đời sản phẩm mới, thực hiện chiến lược hợp tác với các đối tác chiến lược để mở rộng kinh doanh… Mỗi sự kiện, mỗi sản phẩm mới được tung ra thị trường là cột mốc quan trọng đánh dấu thêm một nấc thang phát triển mới, đưa thương hiệu Tràng An ngày càng trở nên gần hơn với người tiêu dùng.\r\n\r\nHiện tại, quy mô của Tràng An đã phát triển với 4 công ty về thực phẩm tại Việt Nam. Công ty sở hữu hệ thống phân phối lớn mạnh với 300 nhà phân phối, 200.000 điểm bán lẻ trên toàn quốc và hệ thống phân phối hàng lạnh qua chuỗi kho lạnh lớn nhất tại Việt Nam. Ngoài ra, sản phẩm Tràng An đã thâm nhập và phân phối rộng rãi đến hơn 10 quốc gia trên thế giới.\r\n\r\nBằng nền tảng nội lực vững chắc, Tràng An đang sẵn sàng cho chặng đường phát triển mới, hướng đến vị thế Tập đoàn thực phẩm hàng đầu Việt Nam và khu vực.\r\n\r\nThay mặt công ty phòng HCNS  mong muốn sẽ hợp tác với các ứng viên nhiệt tình, năng động, có tính trách nhiệm và nhiệt huyết trong công việc."])</script><script>self.__next_f.push([1,"24:T686,\u003cp\u003e\u003cstrong\u003eYÊU CẦU CÔNG VIỆC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAm hiểu về marketing thương mại điện tử. \u003c/p\u003e\u003cp\u003e•\tCó ít nhất 1 năm kinh nghiệm ở vị trí tương đương. \u003c/p\u003e\u003cp\u003e•\tỨng viên có kinh nghiệm và hiểu biết trong lĩnh vực kinh doanh ngành FMCG; ưu tiên ứng viên đến từ sàn TMĐT Lazada, Shopee, Tik Tok,... \u003c/p\u003e\u003cp\u003e•\tCó kỹ năng vận hành gian hàng tốt. \u003c/p\u003e\u003cp\u003e•\tThành thạo công cụ và tính năng của sàn TMĐT. \u003c/p\u003e\u003cp\u003e•\tSáng tạo, nhanh nhạy nắm bắt những xu hướng mới của thị trường. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tLương dựa theo năng lực:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e$$Thu nhập = Lương cơ bản + Lương năng lực + Phụ cấp + Thưởng$$\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc trẻ trung thân thiện, minh bạch, không toxic, có cơ hội thăng tiến. \u003c/p\u003e\u003cp\u003e•\tĐược đào tạo tư duy, kiến thức, quy trình, kỹ năng (nếu bạn chưa có kinh nghiệm). \u003c/p\u003e\u003cp\u003e•\tSếp sẵn sàng trao quyền và tạo cơ hội thử nghiệm những sáng kiến mới (nếu bạn đã có kinh nghiệm). \u003c/p\u003e\u003cp\u003e•\tThưởng thêm nếu có hiệu suất và kết quả tốt, tâm huyết với công việc. \u
