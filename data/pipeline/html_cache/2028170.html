g trên toàn thế giới của chúng tôi phân phối tới tất cả các thị trường Thép không gỉ lớn như Hoa Kỳ, EU, Ấn Độ, Nhật Bản, Hàn Quốc, Nam Mỹ và Các Tiểu vương quốc Ả Rập Thống nhất.\r\nJoy Reap Metal là thành viên của tập đoàn ZXh tại Trung Quốc, hiện nằm trong Top 01 nhà phân phối Thép không gỉ lớn nhất tại Trung Quốc trong suốt 30 năm với tư cách là một tập đoàn tư nhân, đồng thời cũng nằm trong Top 03 về Thép không gỉ Nhà phân phối tại Trung Quốc (doanh số hàng năm khoảng 1,2 triệu tấn).\r\nChúng tôi hiện là nhà phân phối chiến lược của các nhà sản xuất hàng đầu thế giới (Tsingshan group, YongJin China, YongJin China, YongJin Vietnam, Tisco, Delong Group, Lisco) nhằm mang đến cho khách hàng giá cả cạnh tranh nhất và dịch vụ tốt nhất.\r\nChúng tôi cũng có liên doanh với Nhà máy cán nguội – YongJin Quảng Đông Trung Quốc và YongJin Việt Nam."])</script><script>self.__next_f.push([1,"28:T1041,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMÔ TẢ CÔNG VIỆC/ JOB DESCRIPTION\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Theo dõi tài khoản phải thu (AR) \u0026 phải trả (AP) và công nợ đối chiếu xác nhận công nợ\u003c/p\u003e\u003cp\u003e- Track debt reconciliation, accounts payable (AP), and accounts receivable (AR)\u003c/p\u003e\u003cp\u003e- Thực hiện và theo dõi các thanh toán nội địa và thanh toán quốc tế...\u003c/p\u003e\u003cp\u003e- Make and follow domestic and international payments.\u003c/p\u003e\u003cp\u003e- Lập báo cáo thuế, báo cáo tài chính, làm việc với cơ quan thuế \u0026 ngân hàng.\u003c/p\u003e\u003cp\u003e- Create financial statements, tax reports, and communicate with banks and tax authorities.\u003c/p\u003e\u003cp\u003e- Phối hợp với Phòng HR Theo dõi bảng lương và lập các hồ sơ liên quan đến BHXH, các khoản chi thu thanh toán nội bộ công ty,…\u003c/p\u003e\u003cp\u003e- Coordinate with HR Department follow up on payroll and create records for internal business payments, social insurance,...\u003c/p\u003e\u003cp\u003e- Xây dự
