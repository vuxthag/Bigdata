Hà Nội cấp lần đầu ngày 29/07/2009. Hoạt động cốt lõi của Công ty chủ yếu tập trung vào các lĩnh vực xây dựng, đầu tư, kinh doanh và phát triển bất động sản. \r\n\r\nVốn điều lệ đến ngày 28/11/2023 là 2.970 tỷ đồng cùng với hệ thống trên 10 đơn vị thành viên hoạt động chuyên sâu trong các lĩnh vực quản lý, đầu tư, kinh doanh và phát triển bất động sản, sau gần 15 năm hình thành và phát triển, đến nay TASECO Land đã đạt được nhiều thành tựu mang tính đột phá và đang từng bước tiến tới mô hình hoạt động của một Tổng Công ty đầu tư, phát triển bất động sản chuyên nghiệp tại Việt Nam. \r\n\r\nNền tảng tài chính vững mạnh và một bộ máy nhân sự chất lượng, đồng lòng, giàu sự gắn kết với hơn 200 cán bộ, kỹ sư có năng lực, trình độ, kinh nghiệm lâu năm trong lĩnh vực bất động sản, trong những năm qua, TASECO Land đã triển khai thành công hàng loạt dự án bất động sản chất lượng cao trên địa bàn các tỉnh, thành phố lớn của cả nước như Tòa nhà NO2-T1, Tòa nhà NO3-T2, Tòa nhà NO1-T4, Tòa nhà NO3-T6 tại Khu Đoàn Ngoại giao, thành phố Hà Nội; Khu nhà ở thấp tầng thuộc Khu đô thị mới Nam An Khánh tại Hoài Đức, Hà Nội; Khu đô thị Dệt may tại thành phố Nam Định; Khu đô thị kết hợp Công viên Cây xanh Green Park tại thành phố Móng Cái, tỉnh Quảng Ninh; Căn hộ - Khách sạn Alacarte Oceanview Đà Nẵng tại thành phố Đà Nẵng, Khu dân cư Hải Hà tại huyện Quảng Xương, tỉnh Thanh Hóa, Khu đô thị Lương Sơn Riverview tại thị trấn Lương Sơn, tỉnh Hòa Bình … Tháng 11/2023, TASECO Land  chính thức là nhà đầu tư  Khu công nghiệp hỗ trợ Đồng Văn III phía Đông đường cao tốc Cầu Giẽ – Ninh Bình tại Tỉnh Hà Nam với quy mô 223 ha, tổng vốn đầu tư hơn 2.320 tỷ đồng.\r\n\r\nVới triết lý kinh doanh là đồng hành, chia sẻ lợi ích cùng khách hàng, coi sự hài lòng của khách hàng là thành công của doanh nghiệp, TASECO Land đã thực sự chinh phục được niềm tin và tình cảm của khách hàng bằng những sản phẩm bất động sản chất lượng, uy tín, được thị trường đánh giá cao. Mỗi dự án được TASECO Land đầu tư thực hiện đều có vị trí đắc địa, cơ hội sinh lời cao. Với chất lượng thi công xây dựng vượt trội, dịch vụ và tiện ích đồng bộ, Taseco Land đã và đang đáp ứng tốt nhất các yêu cầu và mong đợi của khách hàng. \r\n\r\nTrên cơ sở những kết quả tích cực đã đạt được, phát huy thế và lực sẵn có, TASECO Land đang tiếp tục đẩy mạnh các hoạt động đầu tư và mở rộng các dự án bất động sản tại các tỉnh thành trong cả nước như: Dự án Tòa nhà Landmark 55 thuộc Khu đô thị Tây Hồ Tây (quy mô 2,36ha, tổng mức đầu tư khoảng 8.000 tỷ đồng); Dự án tòa nhà Thương mại dịch vụ và Căn hộ chung cư À LA CARTE Hạ Long (quy mô 5.125 m2, tổng mức đầu tư 2.400 tỷ đồng); Dự án CC5A, CC2 tại Khu Đoàn Ngoại giao, quận Bắc Từ Liêm thành phố Hà Nội; Dự án Nhóm nhà ở Đông Nam đường Tố Hữu, Nam Từ Liêm, thành phố Hà Nội, Khu đô thị mới thuộc dự án số 4 KĐT Trung tâm thành phố Thanh Hóa, Dự án Khu tái định cư xã Hải Yến thuộc xã Nguyên Bình, Thị xã Nghi Sơn, tỉnh Thanh Hóa ...\r\n\r\nVới cam kết nỗ lực không ngừng nghỉ để tạo ra những sản phẩm có chất lượng tốt hơn, thẩm mỹ hơn và tiện ích hơn cho cộng đồng và xã hội, TASECO Land trân trọng cảm ơn và mong muốn tiếp tục nhận được sự đồng hành và hỗ trợ tích cực từ Quý cổ đông, Quý khách hàng, nhà đầu tư và các đối tác trong chặng đường phát triển tiếp theo. \r\n\r\nĐịa chỉ : Tầng 1, Tòa nhà NO2 -T1, Khu Đoàn ngoại giao, đường Xuân Tảo, Phường Xuân Tảo, Quận Bắc Từ Liêm, Thành phố Hà Nội, Việt Nam\r\nWebsite : www.tasecoland.vn"])</script><script>self.__next_f.push([1,"24:T5a0,\u003cp\u003eBạn là một Kiến trúc sư tài năng có kinh nghiệm trong việc quản lý, giám sát và điều phối dự án quy hoạch, kiến trúc, nội thất, hãy gia nhập đội ngũ của chúng tôi để cùng nhau xây dựng nên những công trình mang dấu ấn riêng, kiến tạo nên không gian sống đẳng cấp và bền vững.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e•\tLập, trình duyệt và quản lý nhiệm vụ thiết kế cho từng hạng mục; tổ chức lựa chọn, thẩm định và phê duyệt phương án thiết kế.\u003c/p\u003e\u003cp\u003e•\tTham gia lựa chọn nhà thầu tư vấn thiết kế các hạng mục quy hoạch, kiến trúc, nội thất, cảnh quan, chiếu sáng và các hạng mục mỹ thuật khác (tổ chức thi tuyển khi cần).\u003c/p\u003e\u003cp\u003e•\tQuản lý và giám sát toàn bộ quá trình thiết kế từ ý tưởng, cơ sở, kỹ thuật đến bản vẽ thi công, đảm bảo tính thẩm mỹ, công năng và tuân thủ quy định.\u003c/p\u003e\u003cp\u003e•\tPhối hợp kiểm tra, giám sát công tác thi công, chất lượng vật tư – vật liệu, thiết bị đầu vào liên quan đến hoàn thiện nội ngoại thất, cảnh quan và chiếu sáng công trình.\u003c/p\u003e\u003cp\u003e•\tCập nhật xu hướng thiết kế, vật liệu và công nghệ mới, đề xuất áp dụng nhằm nâng cao chất lượng, hình ảnh và giá trị công trình.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e25:T875,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học chuyên ngành Kiến trúc hoặc tương đương.\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm ở vị trí tương đương trong lĩnh vực tư vấn hoặc quản lý thiết kế.\u003c/p\u003e\u003cp\u003e•\tNắm vững các tiêu chuẩn, quy định, quy phạm, luật quy hoạch hiện hành.\u003c/p\u003e\u003cp\u003e•\tThành thạo sử dụng phần mềm Autocad, Photoshop, Luminon. Ưu tiên biết sử dụng Revit, Sketchup.\u003c/p\u003e\u003cp\u003e•\tChủ động công việc, chịu được áp lực cao công việc\u003c/p\u003e\u003cp\u003e•\tTiếng Anh tốt là lợi thế.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có kinh nghiệm thiết kế/quản lý các dự án quy hoạch đô thị, quy hoạch vùng hoặc khu nghỉ dưỡng cao cấp.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có chứng chỉ hành nghề thiết kế hoặc quản lý dự án.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHẾ ĐỘ ĐÃI NGỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương hấp dẫn, cạnh tranh trên thị trường, được thỏa thuận trực tiếp theo kinh nghiệm và năng lực.\u003c/p\u003e\u003cp\u003e•\tChế độ phúc lợi đầy đủ, BHYT, BHXH theo đúng quy định của Luật Lao động, tổ chức khám sức khỏe định kì cho CBNV, cung cấp đầy đủ trang thiết bị hỗ trợ công việc.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc trẻ trung, chuyên nghiệp và đầy nhiệt huyết, nơi mỗi cá nhân đều được khuyến khích phát huy tối đa tiềm năng. \u003c/p\u003e\u003cp\u003e•\tCó cơ hội phát triển lên các vị trí quản lý. \u003c/p\u003e\u003cp\u003e•\tĐược khuyến khích và khen thưởng khi có các đề xuất mang lại hiệu quả cho công ty.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa đào tạo chuyên môn, cơ hội học hỏi và nâng cao trình độ, kỹ năng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tVới ứng viên có kinh nghiệm dày dặn, tư duy quản lý và năng lực lãnh đạo sẽ được xem xét bổ nhiệm ở vị trí quản lý trong phòng ban.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHãy thể hiện tài năng và sự đam mê của bạn bằng cách ứng tuyển ngay hôm nay!\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T12ce,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Đầu tư Bất động sản TASECO (TASECO Land), tiền thân là Công ty Cổ phần Đầu tư Bất động sản An Bình, được thành lập và đăng ký hoạt động theo Giấy chứng nhận đăng ký doanh nghiệp số 0104,079,036 do Sở Kế hoạch Đầu tư thành phố Hà Nội cấp lần đầu ngày 29/07/2009. Hoạt động cốt lõi của Công ty chủ yếu tập trung vào các lĩnh vực xây dựng, đầu tư, kinh doanh và phát triển bất động sản. \r\n\r\nVốn điều lệ đến ngày 28/11/2023 là 2.970 tỷ đồng cùng với hệ thống trên 10 đơn vị thành viên hoạt động chuyên sâu trong các lĩnh vực quản lý, đầu tư, kinh doanh và phát triển bất động sản, sau gần 15 năm hình thành và phát triển, đến nay TASECO Land đã đạt được nhiều thành tựu mang tính đột phá và đang từng bước tiến tới mô hình hoạt động của một Tổng Công ty đầu tư, phát triển bất động sản chuyên nghiệp tại Việt Nam. \r\n\r\nNền tảng tài chính vững mạnh và một bộ máy nhân ript>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học chuyên ngành Kiến trúc hoặc tương đương.\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm ở vị trí tương đương trong lĩnh vực tư vấn hoặc quản lý thiết kế.\u003c/p\u003e\u003cp\u003e•\tNắm vững các tiêu chuẩn, quy định, quy phạm, luật quy hoạch hiện hành.\u003c/p\u003e\u003cp\u003e•\tThành thạo sử dụng phần mềm Autocad, Photoshop, Luminon. Ưu tiên biết sử dụng Revit, Sketchup.\u003c/p\u003e\u003cp\u003e•\tChủ động công việc, chịu được áp lực cao công việc\u003c/p\u003e\u003cp\u003e•\tTiếng Anh tốt là lợi thế.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có kinh nghiệm thiết kế/quản lý các dự án quy hoạch đô thị, quy hoạch vùng hoặc khu nghỉ dưỡng cao cấp.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có chứng chỉ hành nghề thiết kế hoặc quản lý dự án.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHẾ ĐỘ ĐÃI NGỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương hấp dẫn, cạnh tranh trên thị trường, được thỏa thuận trực tiếp theo kinh nghiệm và năng lực.\u003c/p\u003e\u003cp\u003e•\tChế độ phúc lợi đầy đủ, BHYT, BHXH theo đúng quy định của Luật Lao động, tổ chức khám sức khỏe định kì cho CBNV, cung cấp đầy đủ trang thiết bị hỗ trợ công việc.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc trẻ trung, chuyên nghiệp và đầy nhiệt huyết, nơi mỗi cá nhân đều được khuyến khích phát huy tối đa tiềm năng. \u003c/p\u003e\u003cp\u003e•\tCó cơ hội phát triển lên các vị trí quản lý. \u003c/p\u003e\u003cp\u003e•\tĐược khuyến khích và khen thưởng khi có các đề xuất mang lại hiệu quả cho công ty.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa đào tạo chuyên môn, cơ hội học hỏi và nâng cao trình độ, kỹ năng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tVới ứng viên có kinh nghiệm dày dặn, tư duy quản lý và năng lực lãnh đạo sẽ được xem xét bổ nhiệm ở vị trí quản lý trong phòng ban. Sơn Riverview tại thị trấn Lương Sơn, tỉnh Hòa Bình … Tháng 11/2023, TASECO Land  chính thức là nhà đầu tư  Khu công nghiệp hỗ trợ Đồng Văn III phía Đông đường cao tốc Cầu Giẽ – Ninh Bình tại Tỉnh Hà Nam với quy mô 223 ha, tổng vốn đầu tư hơn 2.320 tỷ đồng.\r\n\r\nVới triết lý kinh doanh là đồng hành, chia sẻ lợi ích cùng khách hàng, coi sự hài lòng của khách hàng là thành công của doanh nghiệp, TASECO Land đã thực sự chinh phục được niềm tin và tình cảm của khách hàng bằng những sản phẩm bất động sản chất lượng, uy tín, được thị trường đánh giá cao. Mỗi dự án được TASECO Land đầu tư thực hiện đều có vị trí đắc địa, cơ hội sinh lời cao. Với chất lượng thi công xây dựng vượt trội, dịch vụ và tiện ích đồng bộ, Taseco Land đã và đang đáp ứng tốt nhất các yêu cầu và mong đợi của khách hàng. \r\n\r\nTrên cơ sở những kết quả tích cực đã đạt được, phát huy thế và lực sẵn có, TASECO Land đang tiếp tục đẩy mạnh các hoạt động đầu tư và mở rộng các dự án bất động sản tại các tỉnh thành trong cả nước như: Dự án Tòa nhà Landmark 55 thuộc Khu đô thị Tây Hồ Tây (quy mô 2,36ha, tổng mức đầu tư khoảng 8.000 tỷ đồng); Dự án tòa nhà Thương mại dịch vụ và Căn hộ chung cư À LA CARTE Hạ Long (quy mô 5.125 m2, tổng mức đầu tư 2.400 tỷ đồng); Dự án CC5A, CC2 tại Khu Đoàn Ngoại giao, quận Bắc Từ Liêm thành phố Hà Nội; Dự án Nhóm nhà ở Đông Nam đường Tố Hữu, Nam Từ Liêm, thành phố Hà Nội, Khu đô thị mới thuộc dự án số 4 KĐT Trung tâm thành phố Thanh Hóa, Dự án Khu tái định cư xã Hải Yến thuộc xã Nguyên Bình, Thị xã Nghi Sơn, tỉnh Thanh Hóa ...\r\n\r\nVới cam kết nỗ lực không ngừng nghỉ để tạo ra những sản phẩm có chất lượng tốt hơn, thẩm mỹ hơn và tiện ích hơn cho cộng đồng và xã hội, TASECO Land trân trọng cảm ơn và mong muốn tiếp tục nhận được sự đồng hành và hỗ trợ tích cực từ Quý cổ đông, Quý khách hàng, nhà đầu tư và các đối tác trong chặng đường phát triển tiếp theo. \r\n\r\nĐịa chỉ : Tầng 1, Tòa nhà NO2 -T1, Khu Đoàn ngoại giao, đường Xuân Tảo, Phường Xuân Tảo, Quận Bắc Từ Liêm, Thành
