\u003cp\u003e•\tPhân loại nợ \u0026 trích lập dự phòng\u003c/p\u003e\u003cp\u003e•\tCác báo cáo về danh mục tín dụng theo yêu cầu của NHNN \u0026 BLĐ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCÁC TRÁCH NHIỆM THỰC THI CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tPhân loại nợ \u0026 trích lập dự phòng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện phân loại nợ theo các tiêu chuẩn của Ngân hàng Nhà nước (NHNN).\u003c/p\u003e\u003cp\u003e•\tXây dựng, theo dõi và đề xuất điều chỉnh chính sách trích lập dự phòng rủi ro tín dụng nhằm tối ưu hóa chi phí và đảm bảo tuân thủ quy định.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các phòng ban liên quan để cập nhật dữ liệu nợ, đảm bảo tính chính xác của báo cáo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.   Báo cáo \u0026 tuân thủ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLập báo cáo định kỳ và đột xuất cho NHNN, CIC và các cơ quan quản lý khác về danh mục tín dụng.\u003c/p\u003e\u003cp\u003e•\tGiám sát danh mục tín dụng của ngân hàng để kịp thời phát hiện và đề xuất phương án xử lý các khoản vay có dấu hiệu rủi ro.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các đơn vị kiểm toán nội bộ, kiểm toán độc lập và cơ quan quản lý trong các cuộc thanh tra, kiểm tra.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.   Tổ chức, triển khai và xây dựng quy trình, chính sách tín dụng, hệ thống rủi ro\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ cải tiến và triển khai xây dựng, sửa đổi chính sách và quản lý việc thực hiện các chính sách, quy trình quản lý rủi ro tín dụng từng phân khúc, hệ thống cảnh báo sớm, hệ thống cập nhật và lưu trữ báo cáo tài chính\u003c/p\u003e\u003cp\u003e•\tRà soát chính sách tín dụng, chương trình sản phẩm tín dụng, văn bản hoạt động tín dụng phức tạp...để có những đề xuất điều chỉnh nếu cần\u003c/p\u003e\u003cp\u003e•\tĐưa ra các yêu cầu với về phân tích, rà soát, xây dựng các công cụ, mô hình\u003c/p\u003e\u003cp\u003e•\t Phân công và giám sát chất lượng cán bộ thưc hiện xây dựng, vận hành,  hướng dẫn các đơn vị vận hành quản trị các hệ thống cảnh báo, quản lý, kiểm soát rủi ro hiện hành tại GPBank\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Tư vấn rủi ro các sản phẩm, chương trình tín dụng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐưa ra các ý kiến về khía cạnh rủi ro cho các sản phẩm/ chính sách tín dụng, các vướng mắc hàng ngày đối với các sản phẩm hoặc văn bản liên quan đến hoạt động tín dụng từng phân khúc với các sản phẩm mới, phức tạp;\u003c/p\u003e\u003cp\u003e•\tTư vấn các đơn vị liên quan về hoạt động tín dụng, đảm bảo tuân thủ quy định của pháp luật và văn bản nội bộ của GPBank\u003c/p\u003e\u003cp\u003e•\tPhân công nhân sự  và kiểm soát chất lượng công tác cho ý kiến  của các cán bộ cấp dưới\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\u003c/strong\u003e \u003cstrong\u003eNghiên cứu \u0026 phát triển mô hình tín dụng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng và triển khai các mô hình đo lường rủi ro tín dụng (PD, LGD, EAD) theo chuẩn Basel.\u003c/p\u003e\u003cp\u003e•\tPhân tích dữ liệu, đề xuất các phương pháp luận mới nhằm nâng cao hiệu quả đánh giá rủi ro tín dụng.\u003c/p\u003e\u003cp\u003e•\tTham gia xây dựng và tối ưu hóa các mô hình xếp hạng tín dụng (Application Scorecard, Behavior Scorecard) cho khách hàng cá nhân và doanh nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\u003c/strong\u003e \u003cstrong\u003ePhân tích danh mục tín dụng \u0026 tối ưu danh mục:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhân tích danh mục tín dụng theo các yếu tố rủi ro, hiệu suất và xu hướng thị trường để đưa ra khuyến nghị tối ưu.\u003c/p\u003e\u003cp\u003e•\tĐề xuất các biện pháp cân đối danh mục, kiểm soát rủi ro tập trung và đa dạng hóa sản phẩm tín dụng.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ xây dựng chiến lược tín dụng nhằm nâng cao hiệu quả sử dụng vốn và tối ưu hóa lợi nhuận.\u003c/p\u003e\u003cp\u003e•\tĐào tạo các thành viên trong team các nghiệp vụ cần thiết và kỹ năng phục vụ công việc\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T5e5,\u003cp\u003e\u003cstrong\u003e1. Trình độ Học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• \tTốt nghiệp Đại học trở lên chuyên ngành Ngân hàng, Kinh tế, Tài chính, Quản trị Kinh doanh, Luật. …\u003c/p\u003e\u003cp\u003e•\tFRM là một lợi thế\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Các Kinh nghiệm liên quan\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eTối thiểu 6 năm \u003c/strong\u003etrong lĩnh vực ngân hàng trong đó tối thiểu 4 năm liên quan tới lĩnh vực tín dụng/ quản lý tín dụng/quản lý rủi ro tín dụng khách hàng doanh nghiệp của Ngân hàng.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm phân tích dữ liệu\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó kiến thức trong quản lý rủi ro \u0026 tín dụng , hiểu biết pháp luật VN \u0026 các thông lệ quốc tế về QLRR\u003c/p\u003e\u003cp\u003e•\tCó kiến thức trong phân tích ngành, biến động kinh tế\u003c/p\u003e\u003cp\u003e•\tCó hiểu biết về thị trường tài chính ngân hàng của VN\u003c/p\u003e\u003cp\u003e•\tHiểu biết về các sản phẩm tín dụng doanh nghiệp\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Các Kỹ Năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổ chức, lập kế hoạch, quản lý công việc tốt\u003c/p\u003e\u003cp\u003e•\tCó khả năng thu thập, phân tích đánh giá và tổng hợp thông tin\u003c/p\u003e\u003cp\u003e•\tKỹ năng phân tính báo cáo tài chính, đánh giá tín dụng\u003c/p\u003e\u003cp\u003e•\tCó khả năng lập luận và phản biện\u003c/p\u0 n Scorecard, Behavior Scorecard) cho khách hàng cá nhân và doanh nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\u003c/strong\u003e \u003cstrong\u003ePhân tích danh mục tín dụng \u0026 tối ưu danh mục:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhân tích danh mục tín dụng theo các yếu tố rủi ro, hiệu suất và xu hướng thị trường để đưa ra khuyến nghị tối ưu.\u003c/p\u003e\u003cp\u003e•\tĐề xuất các biện pháp cân đối danh mục, kiểm soát rủi ro tập trung và đa dạng hóa sản phẩm tín dụng.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ xây dựng chiến lược tín dụng nhằm nâng cao hiệu quả sử dụng vốn và tối ưu hóa lợi nhuận.\u003c/p\u003e\u003cp\u003e•\tĐào tạo các thành viên trong team các nghiệp vụ cần thiết và kỹ năng phục vụ công việc\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:T5e5,\u003cp\u003e\u003cstrong\u003e1. Trình độ Học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• \tTốt nghiệp Đại học trở lên chuyên ngành Ngân hàng, Kinh tế, Tài chính, Quản trị Kinh doanh, Luật. …\u003c/p\u003e\u003cp\u003e•\tFRM là một lợi thế\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Các Kinh nghiệm liên quan\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eTối thiểu 6 năm \u003c/strong\u003etrong lĩnh vực ngân hàng trong đó tối thiểu 4 năm liên quan tới lĩnh vực tín dụng/ quản lý tín dụng/quản lý rủi ro tín dụng khách hàng doanh nghiệp của Ngân hàng.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm phân tích dữ liệu\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó kiến thức trong quản lý rủi ro \u0026 tín dụng , hiểu biết pháp luật VN \u0026 các thông lệ quốc tế về QLRR\u003c/p\u003e\u003cp\u003e•\tCó kiến thức trong phân tích ngành, biến động kinh tế\u003c/p\u003e\u003cp\u003e•\tCó hiểu biết về thị trường tài chín
