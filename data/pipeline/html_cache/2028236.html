b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Te2c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI/ MỤC TIÊU CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDẫn dắt toàn bộ hoạt động Marketing với trọng tâm:\u003c/p\u003e\u003cp\u003e• Tăng trưởng doanh thu \u0026 thị phần thông qua hệ thống kênh phân phối (GT/MT/Ecom/Hospital,…)\u003c/p\u003e\u003cp\u003e• Tối ưu Sell-out tại điểm bán\u003c/p\u003e\u003cp\u003e• Kết nối chặt chẽ Marketing – Sales – Distribution\u003c/p\u003e\u003cp\u003e• Xây dựng thương hiệu gắn với hiệu quả kinh doanh thực tế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII/ MÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Xây dựng Chiến lược Marketing \u0026 Kênh phân phối:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng chiến lược tiếp cận thị trường (Go-to-Market) trên toàn quốc theo từng kênh phân phối: kênh truyền thống, kênh hiện đại, thương mại điện tử và kênh mẹ \u0026 bé/bệnh viện.\u003c/p\u003e\u003cp\u003e• Thiết kế và triển khai các hoạt động tại điểm bán bao gồm: chương trình khuyến mãi, trưng bày hàng hóa, sắp xếp quầy kệ, vật phẩm hỗ trợ bán hàng và các hoạt động kích hoạt bán hàng.\u003c/p\u003e\u003cp\u003e• Phối hợp chặt chẽ với bộ phận Kinh doanh trong việc xây dựng chính sách bán hàng, quản lý hệ thống nhà phân phối, lập kế hoạch nhu cầu và dự báo sản lượng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Brand Marketing:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng chiến lược thương hiệu.\u003c/p\u003e\u003cp\u003e• Triển khai chiến dịch truyền thông tích hợp.\u003c/p\u003e\u003cp\u003e• Đảm bảo Brand hỗ trợ trực tiếp cho Trade \u0026 bán hàng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Phát triển kênh Digital \u0026 Thương mại điện tử:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng và triển khai chiến lược Marketing số và thương mại điện tử nhằm thúc đẩy tăng trưởng doanh thu.\u003c/p\u003e\u003cp\u003e• Quản lý và tối ưu hiệu quả các kênh bán hàng online (website, sàn thương mại điện tử, mạng xã hội…).\u003c/p\u003e\u003cp\u003e• Triển khai các hoạt động quảng cáo số, quản lý dữ liệu khách hàng (CRM) và các chương trình chăm sóc, gia tăng giá trị vòng đời khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản lý dữ liệu, kế hoạch và hiệu quả hoạt động Marketing:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phân tích dữ liệu thị trường và kinh doanh, bao gồm dữ liệu nghiên cứu thị trường, hiệu quả bán vào (sell-in) và bán ra (sell-out), cũng như hiệu quả các chương trình Marketing thương mại.\u003c/p\u003e\u003cp\u003e• Xây dựng và quản lý ngân sách Marketing (A\u0026P), đảm bảo phân bổ tối ưu theo mục tiêu tăng trưởng và hiệu quả kinh doanh.\u003c/p\u003e\u003cp\u003e• Đo lường và đánh giá hiệu quả các hoạt động Marketing thông qua các chỉ số như hiệu suất đầu tư, chi phí chuyển đổi khách hàng và hiệu quả chiến dịch.\u003c/p\u003e\u003cp\u003e• Đánh giá hiệu quả các chương trình khuyến mãi và hoạt động tại kênh phân phối nhằm tối ưu doanh thu và lợi nhuận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Quản lý đối tác \u0026 truyền thông:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Lựa chọn, quản lý và đánh giá hiệu quả các đối tác (agency, media, KOL/KOC, nhà cung cấp…).\u003c/p\u003e\u003cp\u003e• Xây dựng và duy trì mối quan hệ với các đối tác chiến lược nhằm tối ưu hiệu quả truyền thông và bán hàng.\u003c/p\u003e\u003cp\u003e• Quản lý hoạt động truyền thông, xử lý khủng hoảng và bảo vệ uy tín thương hiệu.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Lãnh đạo đội ngũ:\u003c/strong\u003e Tuyển dụng, đào tạo, phát triển và quản lý đội ngũ marketing (brand, digital, PR, event…).\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tc60,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn \u0026 chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học trở lên chuyên ngành Marketing, Quản trị kinh doanh, Kinh tế hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e• Ưu tiên có bằng Thạc sĩ, MBA hoặc các chứng chỉ chuyên sâu về marketing, thương hiệu, hoặc dinh dưỡng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm làm việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có ít nhất 7–10 năm kinh nghiệm trong lĩnh vực marketing, trong đó tối thiểu 3 năm ở vị trí quản lý cấp cao (Head/Director) trong ngành hàng tiêu dùng nhanh (FMCG), đặc biệt là ngành sữa, dinh dưỡng, hoặc sản phẩm dành cho mẹ và bé.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm xây dựng, triển khai và đo lường hiệu quả các chiến dịch marketing tích hợp (IMC).\u003c/p\u003e\u003cp\u003e• Ưu tiên ứng viên từng làm việc với các thương hiệu sữa bột lớn trong/ngoài nước (như Abbott, Nestlé, Vinamilk, Nutifood, Friso, v.v.).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kỹ năng chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Khả năng xây dựng chiến lược thương hiệu toàn diện và dài hạn.\u003c/p\u003e\u003cp\u003e• Kỹ năng phân tích thị trường, người tiêu dùng và đối thủ cạnh tranh.\u003c/p\u003e\u003cp\u003e• Am hiểu các quy định pháp lý liên quan đến quảng cáo và truyền thông sản phẩm sữa bột cho trẻ nhỏ (theo Bộ Y tế, WHO Code…).\u003c/p\u003e\u003cp\u003e• Thành thạo các công cụ marketing hiện đại: Digital, CRM, Trade Marketing, PR, KOLs, nghiên cứu thị trường…\u003c/p\u003e\u003cp\u003e• Kỹ năng quản lý ngân sách, đo lường ROI và hiệu quả chiến dịch.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kỹ năng mềm \u0026 phẩm chất cá nhân\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kỹ năng lãnh đạo, truyền cảm hứng và phát triển đội ngũ.\u003c/p\u003e\u003cp\u003e• Khả năng giao tiếp, đàm phán và thuyết trình xuất sắc.\u003c/p\u003e\u003cp\u003e• Tư duy chiến lược kết hợp thực thi linh hoạt.\u003c/p\u003e\u003cp\u003e• Có trách nhiệm, trung thực, chịu áp lực công việc cao.\u003c/p\u003e\u003cp\u003e• Đam mê ngành dinh dưỡng và cam kết tạo ra giá trị tích cực cho cộng đồng, đặc biệt là trẻ em.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Yêu cầu khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tiếng Anh giao tiếp tốt (ưu tiên có thể làm việc trực tiếp với chuyên gia/đối tác nước ngoài).\u003c/p\u003e\u003cp\u003e• Sẵn sàng đi công tác trong và ngoài nước khi cần thiết.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Mức lương hấp dẫn theo năng lực (thỏa thuận) + bonus KPI theo quý/năm.\u003c/p\u003e\u003cp\u003e• Chế độ thưởng theo hiệu quả chiến dịch và đóng góp vượt trội.\u003c/p\u003e\u003cp\u003e• Gói bảo hiểm sức khỏe cao cấp.\u003c/p\u003e\u003cp\u003e• Cơ hội làm việc trực tiếp với Ban lãnh đạo và các đối tác quốc tế.\u003c/p\u003e\u003cp\u003e• Môi trường làm việc chuyên nghiệp, sáng tạo, đề cao đổi mới và đột phá.\u003c/p\u003e\u003cp\u003e• Tham gia các chương trình đào tạo trong và ngoài nước (nếu có).\u003c/p\u003e\u003cp\u003e• Các chế độ phúc lợi khác theo quy định của công ty (du lịch, team building, sinh nhật, lễ Tết…).\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Te2c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI/ MỤC TIÊU CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDẫn dắt toàn bộ hoạt động Marketing với trọng tâm:\u003c/p\u003e\u003cp\u003e• Tăng trưởng doanh thu \u0026 thị phần thông qua hệ thống kênh phân phối (GT/MT/Ecom/Hospital,…)\u003c/p\u003e\u003cp\u003e• Tối ưu Sell-out tại điểm bán\u003c/p\u003e\u003cp\u003e• Kết nối chặt chẽ Marketing – Sales – Distribution\u003c/p\u003e\u003cp\u003e• Xây dựng thương hiệu gắn với hiệu quả kinh doanh thực tế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII/ MÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Xây dựng Chiến lược Marketing \u0026 Kênh phân phối:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng chiến lược tiếp cận thị trường (Go-to-Market) trên toàn quốc theo từng kênh phân phối: kênh truyền thống, kênh hiện đại, thương mại điện tử và kênh mẹ \u0026 bé/bệnh viện.\u003c/p\u003e\u003cp\u003e• Thiết kế và triển khai các hoạt động tại điểm bán bao gồm: chương trình khuyến mãi, trưng bày hàng hóa, sắp xếp quầy kệ, vật phẩm hỗ trợ bán hàng và các hoạt động kích hoạt bán hàng.\u003c/p\u003e\u003cp\u003e• Phối hợp chặt chẽ với bộ phận Kinh doanh trong việc xây dựng chính sách bán hàng, quản lý hệ thống nhà phân phối, lập kế hoạch nhu cầu và dự báo sản lượng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Brand Marketing:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng chiến lược thương hiệu.\u003c/p\u003e\u003cp\u003e• Triển khai chiến dịch truyền thông tích hợp.\u003c/p\u003e\u003cp\u003e• Đảm bảo Brand hỗ trợ trực tiếp cho Trade \u0026 bán hàng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Phát triển kênh Digital \u0026 Thương mại điện tử:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng và triển khai chiến lược Marketing số và thương mại điện tử nhằm thúc đẩy tăng trưởng doanh thu.\u003c/p\u003e\u003cp\u003e• Quản lý và tối ưu hiệu quả các kênh bán hàng online (website, sàn thương mại điện tử, mạng xã hội…).\u003c/p\u003e\u003cp\u003e• Triển khai các hoạt động quảng cáo số, quản lý dữ liệu khách hàng (CRM) và các chương trình chăm sóc, gia tăng giá trị vòng đời khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản lý dữ liệu, kế hoạch và hiệu quả hoạt động Marketing:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phân tích dữ liệu thị trường và kinh doanh, bao
