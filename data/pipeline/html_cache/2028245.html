\"jobDescription\":\"\u003cp\u003e•   Tính toán và lập dự toán chi phí cho các dự án cải tạo, sửa chữa, thi công nội thất.\u003c/p\u003e\u003cp\u003e•   Sử dụng các phần mềm chuyên dụng để hỗ trợ việc lập dự toán\u003c/p\u003e\u003cp\u003e•   Dự toán chi phí vật liệu, nhân công, máy móc thiết bị, và các chi phí khác liên quan đến công trình.\u003c/p\u003e\u003cp\u003e•   Phân tích các bản vẽ thiết kế, yêu cầu kỹ thuật để xác định chi phí dự toán chính xác.\u003c/p\u003e\u003cp\u003e•   Lập và báo cáo các dự toán chi tiết, tổng hợp chi phí của các dự án.\u003c/p\u003e\u003cp\u003e•   Kiểm tra và rà soát lại các dự toán để đảm bảo tính hợp lý và chính xác.\u003c/p\u003e\u003cp\u003e•   Soạn thảo hợp đồng, báo giá, thanh lý hợp đồng.\u003c/p\u003e\u003cp\u003e•   Làm hồ sơ thanh quyết toán công trình.\u003c/p\u003e\u003cp\u003e•   Thực hiện các công việc khác theo sự phân công của Ban Lãnh đạo Công ty.\u003c/p\u003e\u003cp\u003e•   Công việc chi tiết trao đổi thêm khi phỏng vấn.\u003c/p\u003e\",\"jobRequirement\":\"\u003cp\u003e• Tốt nghiệp Đại học chuyên ngành Kinh tế xây dựng, Kỹ thuật xây dựng, Xây dựng dân dụng,…\u003c/p\u003e\u003cp\u003e• Có tối thiểu 01 năm kinh nghiệm trong công tác giám sát thi công đồ gỗ, nội thất, xây dựng\u003c/p\u003e\u003cp\u003e• Có khả năng đọc, hiểu và áp dụng bản vẽ kỹ thuật thi công nội thất trong thực tế.\u003c/p\u003e\u003cp\u003e• Am hiểu tiêu chuẩn, quy chuẩn kỹ thuật và chất lượng vật liệu sử dụng trong sản xuất và thi công nội thất.\u003c/p\u003e\u003cp\u003e• Trung thực, có tinh thần trách nhiệm cao, chủ động trong công việc; sẵn sàng đi công trình theo yêu cầu.\u003c/p\u003e\u003cp\u003e•   Thời gian làm việc:\u003c/p\u003e\u003cp\u003e    Từ 08h00 – 12h00 và 13h00 – 17h00, từ Thứ 2 đến Thứ 7. Có hỗ trợ ăn trưa tại Công ty hoặc tại công trình.\u003c/p\u003e\",\"jobLevelId\":5,\"languageSelectedId\":1,\"redirectTo\":\"\",\"requiredCoverLetter\":0,\"salary\":0,\"salaryMax\":0,\"salaryMin\":0,\"typeWorkingId\":1,\"skills\":[{\"s
