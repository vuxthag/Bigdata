\u003cp\u003e\u003cstrong\u003e1. Thực hiện chiến lược khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t1.1\tThực hiện chiến lược và mục tiêu công ty cho toàn thể nhân viên khai thác.\u003c/p\u003e\u003cp\u003e1.2\tDuy trì an toàn, hiệu suất và chi phí hiệu quả cho hoạt động khai thác cảng.\u003c/p\u003e\u003cp\u003e1.3\tĐảm bảo duy trì hoạt động khai thác liên tục và bền vững.\u003c/p\u003e\u003cp\u003e1.4\tDẫn dắt và chỉ đạo hoạt động khai thác hàng ngày.\u003c/p\u003e\u003cp\u003e1.5\tKiểm soát khối lượng khai thác và đảm bảo thiết bị và nhân lực đáp ứng yêu cầu khai thác.\u003c/p\u003e\u003cp\u003e1.6\tĐảm bảo kết nối giữa kế hoạch khai thác và sản xuất thực tế để đáp ứng mong đợi của khách hàng và yêu cầu an toàn.\u003c/p\u003e\u003cp\u003e1.7\tThực hiện đo lường kế hoạch chiến lược khai thác để đạt được mục tiêu công ty và tầm nhìn của tập đoàn.\u003c/p\u003e\u003cp\u003e1.8\tDuy trì liên hệ với khách hàng để tối ưu cấp độ dịch vụ cảng.\u003c/p\u003e\u003cp\u003e1.9\tÁp dụng chiến lược nội bộ hiệu quả trong việc khai thác cảng ở cấp độ cơ hội và thách thức.\u003c/p\u003e\u003cp\u003e1.10\tXem xét chất lượng dịch vụ của nhà thầu nhằm đảm bảo mức độ dịch vụ cảng với nhu cầu của khách hàng và công ty.\u003c/p\u003e\u003cp\u003e1.11\tĐịnh hướng khách hàng nhằm nâng cao chất lượng dịch vụ khai thác chuyên nghiệp.\u003c/p\u003e\u003cp\u003e1.12\tTriển khai hành động lãnh đạo cho nhân viên để đạt được mục tiêu hàng năm của công ty.\u003c/p\u003e\u003cp\u003e1.13\tĐảm bảo kế hoạch mang tính chiến lược cùng với tiêu chuẩn thế giới của tập đoàn cho cả khai thác công ten nơ và hàng tổng hợp.\u003c/p\u003e\u003cp\u003e1.14\tXử lý tồn đọng liên quan đến hoạt động khai thác quan trọng mà có ảnh hưởng đến mục tiêu công ty.\u003c/p\u003e\u003cp\u003e1.15\tÁp dụng đào tạo thực tiễn hoạt động khai thác tốt nhất để nâng tầm chiến lược và công nghệ tiên tiến cho nhân viên.\u003c/p\u003e\u003cp\u003e1.16\tĐóng góp vào mục tiêu và chiến lược chung của công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tuân thủ chính sách công ty\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t2.1\tThường xuyên rà soát chính sách và quy định khai thác nhằm đảm bảo hoạt động khai thác an toàn và hiệu quả.\u003c/p\u003e\u003cp\u003e2.2\tĐảm bảo việc tuân thủ chính sách, quy định và yêu cầu của công ty, đặc biệt là an toàn phải được nhân viên, nhà thầu và khách hàng thực hiện đúng.\u003c/p\u003e\u003cp\u003e2.3\tLãnh đạo và quản lý hoạt động khai thác cảng hàng ngày.\u003c/p\u003e\u003cp\u003e2.4\tNhấn mạnh thực hành an toàn nơi làm việc và đạt được hệ số an toàn lao động tuyệt đối\u003c/p\u003e\u003cp\u003e2.5\tĐo lường và theo dõi năng lực nhân viên, nhà thầu và khách hàng về tiêu chuẩn, chính sách và hướng dẫn tiêu biểu.\u003c/p\u003e\u003cp\u003e2.6\tThực hiện kế hoạch dự phòng để ngăn ngừa và khắc phục các vi phạm, thiệt hại khai thác liên quan đến người và tài sản.\u003c/p\u003e\u003cp\u003e2.7\tKiểm soát và phát triển qui trình khai thác được cập nhật phù hợp với quy định của nhà nước.\u003c/p\u003e\u003cp\u003e2.7\tTiến hành kiểm tra tình hình sử dụng tài sản theo định kỳ. Hàng năm phối hợp với Phòng Tài Chính – Kế Toán để kiểm kê tài sản. Lập danh mục tài sản không cần dùng, những tài sản đến hạn thanh lý để trình phó tổng giám đốc quyết định.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Đầu mối\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e3.1\tĐóng vai trò đầu mối cho tất cả hoạt động khai thác và cập nhật cho Giám đốc trung tâm vận hành khai thác và phó tổng Tổng giám đốc các sự việc liên quan đến khai thác cảng.\u003c/p\u003e\u003cp\u003e3.2\tQuản lý nhân viên để tạo kết nối chặt và trao đổi với các phòng ban khác và nội bộ.\u003c/p\u003e\u003cp\u003e3.3\tCập nhật tiến trình hoặc vấn đề mới liên quan đến ứng dụng của hệ thống, chính sách và qui trình cho khách hàng.\u003c/p\u003e\u003cp\u003e3.4\tPhối hợp với các trưởng bộ phận nhằm đảm bảo bộ phận khai thác hoạt động đúng chức năng.\u003c/p\u003e\u003cp\u003e3.5\tKết nối với cơ quan chức năng và khách hàng để đáp ứng yêu cầu và mong đợi về khai thác.\u003c/p\u003e\u003cp\u003e3.6\tLà cầu nối giữa khách hàng với các trưởng bộ phận về các vấn đề chính của khai thác.\u003c/p\u003e\u003cp\u003e3.7\tTham gia xử lý sự cố lớn về tàu, khách hàng hoặc tác động khai thác.\u003c/p\u003e\u003cp\u003e3.8\tXét duyệt bản đánh giá nhà thầu theo định kỳ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Thực hiện các nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t5.1\tXem xét và phê duyệt các yêu cầu của nhân viên phục vụ cho hoạt động khai thác.\u003c/p\u003e\u003cp\u003e5.2\tQuản lý áp dụng hệ thống và di chuyển thực tế, đảm bảo cung cấp ổn định.\u003c/p\u003e\u003cp\u003e5.3\tRà soát và phân bổ khối lượng công việc giữa các nhân viên và bộ phận.\u003c/p\u003e\u003cp\u003e5.4\tXem xét kế hoạch ngân sách và tuyển dụng hàng năm cho phòng.\u003c/p\u003e\u003cp\u003e5.5\tĐịnh hướng hành động cho nhân viên để đạt được mục tiêu cá nhân.\u003c/p\u003e\u003cp\u003e5.6\tQuản lý nhân viên về năng lực, bao gồm đào tạo, đánh giá, áp dụng kỷ luật và phát triển.\u003c/p\u003e\u003cp\u003e5.7\tĐảm bảo trang thiết bị sẵn sàng cho hoạt động khai thác tại mọi thời điểm\u003c/p\u003e\u003cp\u003e5.8\tRà soát khảo sát khách hàng và trình cho Giám đốc trung tâm khai thác.\u003c/p\u003e\u003cp\u003e5.9\tThực hiện các công việc do Giám đốc trung tâm vận hành khai thác và Phó Tổng giám đốc chỉ định.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T707,\u003cp\u003eIV. TIÊU CHUẨN CHỨC DANH\u003c/p\u003e\u003cp\u003e1. Trình độ\t:\tCử nhân, kỹ sư Hàng hải, chuyên ngành Logistics, Thuế hải quan, quản lý cảng là một lợi thế\t\t\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\t:\tTừ 10 năm trong ngành khai thác cảng, điều độ. Tối thiểu 05 năm quản lý trong lĩnh vực liên quan về khai thác cảng, logistics.\t\t\u003c/p\u003e\u003cp\u003e3. Kiến thức\t:\tChứng chỉ an toàn HSSE cấp 1, Chứng chỉ ISPS, Quản trị con người, Khai thác cảng, Năng lực hàng hải, Kiến thức về hàng hóa, thủ tục XNK, công nghệ thông tin và thiết bị khai thác cảng.\t\t\u003c/p\u003e\u003cp\u003e4. Ngoại ngữ\t:\tTối thiểu tiếng Anh trung cấp, chuyên ngành logistics hàng hải, cảng biển\t\t\u003c/p\u003e\u003cp\u003e5. Kỹ năng\t:\tKỹ năng giao tiếp, kỹ năng quản lý, kỹ năng tư duy phân tích, quản lý ngân sách\t\t\u003c/p\u003e\u003cp\u003e6. Ý thức\u0026Thái độ\t:\tTrung thực, nhiệt tình, đạo đức, phát triển tài năng, tập trung vào khách hàng, định hướng kết quả công việc\t\t\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Mức lương từ 35-45 triệu/tháng, hỗ trợ nhà ở \u003c/p\u003e\u003cp\u003e- BHXH, thẻ bảo hiểm chăm sóc sức khỏe\u003c/p\u003e\u003cp\u003e- Hỗ trợ nhà ở, xe đưa đón (nếu có)\u003c/p\u003e\u003cp\u003e- Khám sức khỏe định kỳ 1 năm/1 lần\u003c/p\u003e\u003cp\u003e- Hỗ trợ cơm trưa\u003c/p\u003e\u003cp\u003e- Teambuilding\u003c/p\u003e\u003cp\u003e- Thưởng các ngày lễ lớn, sinh nhật, lỳ xì đầu năm, .\u003c/p\u003e\u003cp\u003eNgoài ra, tặng thưởng con NLĐ có kết quả học tập tốt, trung thu, 1/6\u003c/p\u003e\u003cp\u003e- Thưởng lương tháng 13, thưởng hiệu quả công việc\u003c/p\u003e\u003cp\u003e- Chế độ thăm thân 2 tháng/ lần\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*Địa điểm làm việc:\u003c/strong\u003e Thôn Mỹ Thuỷ, xã Mỹ Thuỷ, tỉnh Quảng Trị\u003c/p\u003e27:T1b92,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eĐịa điểm làm việc: Thôn Mỹ Thủy, huyện Mỹ Thủy, Quảng Trị\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eĐơn vị\t: Trung tâm vận hành khai thác - Phòng khai thác\u003c/p\u003e\u003cp\u003eCấp dưới trực tiếp\t:\t- Phó phòng khai thác\u003c/p\u003e\u003cp\u003eBáo cáo\t:\t\u003c/p\u003e\u003cp\u003e- Cấp QL trực tiếp: Giám đốc trung tâm khai thác\u003c/p\u003e\u003cp\u003e- Cấp QL gián tiếp: Phó Tổng giám đốc\u003c/p\u003e\u003cp\u003eQuan hệ công việc (Phối hợp )\t:\t\u003c/p\u003e\u003cp\u003e- Các Phòng trong Công ty: Kỹ thuật, An ninh-an toàn, Thương mại, CNTT, Kế toán, Kho, Nhân sự\u003c/p\u003e\u003cp\u003e- Tổ chức/cá nhân bên ngoài: Các đơn vị Cung cấp, Nhà thầu thi công, Đơn vị Tư vấn…\u003c/p\u003e\u003cp\u003e- Với khách hàng của cảng.\u003c/p\u003e\u003cp\u003e- Các cơ quan chức năng nhà nước.\u003c/p\u003e\u003cp\u003eII. TÓM TẮT MỤC ĐÍCH CÔNG VIỆC\u003c/p\u003e\u003cp\u003eThực hiện chiến lược cho hoạt động của phòng nhằm đạt mục tiêu công ty và tầm nhìn của tập đoàn; Đảm bảo hoạt động khai thác và người liên quan tuân thủ chính sách và qui trình; Duy trì điều kiện làm việc an toàn, năng suất cao và khai thác với chi phí thấp; Liên hệ với cơ quan chức năng và khách hàng để đáp ứng yêu cầu và cấp độ dịch vụ cảng.\u003c/p\u003e\u003cp\u003eIII. CHỨC NĂNG, NHIỆM VỤ CỦA VỊ TRÍ CÔNG VIỆC\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thực hiện chiến lược khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t1.1\tThực hiện chiến lược và mục tiêu công ty cho toàn thể nhân viên khai thác.\u003c/p\u003e\u003cp\u003e1.2\tDuy trì an toàn, hiệu suất và chi phí hiệu quả cho hoạt động khai thác cảng.\u003c/p\u003e\u003cp\u003e1.3\tĐảm bảo duy trì hoạt động khai thác liên tục và bền vững.\u003c/p\u003e\u003cp\u003e1.4\tDẫn dắt và chỉ đạo hoạt động khai thác hàng ngày.\u003c/p\u003e\u003cp\u003e1.5\tKiểm soát khối lượng khai thác và đảm bảo thiết bị và nhân lực đáp ứng yêu cầu khai thác.\u003c/p\u003e\u003cp\u003e1.6\tĐảm bảo kết nối giữa kế hoạch khai thác và sản xuất thực tế để đáp ứng mong đợi của khách hàng và yêu cầu an toàn.\u003c/p\u003e\u003cp\u003e1.7\tThực hiện đo lường kế hoạch chiến lược khai thác để đạt được mục tiêu công ty và tầm nhìn của tập đoàn.\u003c/p\u003e\u003cp\u003e1.8\tDuy trì liên hệ với khách hàng để tối ưu cấp độ dịch vụ cảng.\u003c/p\u003e\u003cp\u003e1.9\tÁp dụng chiến lược nội bộ hiệu quả trong việc khai thác cảng ở cấp độ cơ hội và thách thức.\u003c/p\u003e\u003cp\u003e1.10\tXem xét chất lượng dịch vụ của nhà thầu nhằm đảm bảo mức độ dịch vụ cảng với nhu cầu của khách hàng và công ty.\u003c/p\u003e\u003cp\u003e1.11\tĐịnh hướng khách hàng nhằm nâng cao chất lượng dịch vụ khai thác chuyên nghiệp.\u003c/p\u003e\u003cp\u003e1.12\tTriển khai hành động lãnh đạo cho nhân viên để đạt được mục tiêu hàng năm của công ty.\u003c/p\u003e\u003cp\u003e1.13\tĐảm bảo kế hoạch mang tính chiến lược cùng với tiêu chuẩn thế giới của tập đoàn cho cả khai thác công ten nơ và hàng tổng hợp.\u003c/p\u003e\u003cp\u003e1.14\tXử lý tồn đọng liên quan đến hoạt động khai thác quan trọng mà có ảnh hưởng đến mục tiêu công ty.\u003c/p\u003e\u003cp\u003e1.15\tÁp dụng đào tạo thực tiễn hoạt động khai thác tốt nhất để nâng tầm chiến lược và công nghệ tiên tiến cho nhân viên.\u003c/p\u003e\u003cp\u003e1.16\tĐóng góp vào mục tiêu và chiến lược chung của công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tuân thủ chính sách công ty\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t2.1\tThường xuyên rà soát chính sách và quy định khai thác nhằm đảm bảo hoạt động khai thác an toàn và hiệu quả.\u003c/p\u003e\u003cp\u003e2.2\tĐảm bảo việc tuân thủ chính sách, quy định và yêu cầu của công ty, đặc biệt là an toàn phải được nhân viên, nhà thầu và khách hàng thực hiện đúng.\u003c/p\u003e\u003cp\u003e2.3\tLãnh đạo và quản lý hoạt động khai thác cảng hàng ngày.\u003c/p\u003e\u003cp\u003e2.4\tNhấn mạnh thực hành an toàn nơi làm việc và đạt được hệ số an toàn lao động tuyệt đối\u003c/p\u003e\u003cp\u003e2.5\tĐo lường và theo dõi năng lực nhân viên, nhà thầu và khách hàng về tiêu chuẩn, chính sách và hướng dẫn tiêu biểu.\u003c/p\u003e\u003cp\u003e2.6\tThực hiện kế hoạch dự phòng để ngăn ngừa và khắc phục các vi phạm, thiệt hại khai thác liên quan đến người và tài sản.\u003c/p\u003e\u003cp\u003e2.7\tKiểm soát và phát triển qui trình khai thác được cập nhật phù hợp với quy định của nhà nước.\u003c/p\u003e\u003cp\u003e2.7\tTiến hành kiểm tra tình hình sử dụng tài sản theo định kỳ. Hàng năm phối hợp với Phòng Tài Chính – Kế Toán để kiểm kê tài sản. Lập danh mục tài sản không cần dùng, những tài sản đến hạn thanh lý để trình phó tổng giám đốc quyết định.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Đầu mối\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e3.1\tĐóng vai trò đầu mối cho tất cả hoạt động khai thác và cập nhật cho Giám đốc trung tâm vận hành khai thác và phó tổng Tổng giám đốc các sự việc liên quan đến khai thác cảng.\u003c/p\u003e\u003cp\u003e3.2\tQuản lý nhân viên để tạo kết nối chặt và trao đổi với các phòng ban khác và nội bộ.\u003c/p\u003e\u003cp\u003e3.3\tCập nhật tiến trình hoặc vấn đề mới liên quan đến ứng dụng của hệ thống, chính sách và qui trình cho khách hàng.\u003c/p\u003e\u003cp\u003e3.4\tPhối hợp với các trưởng bộ phận nhằm đảm bảo bộ phận khai thác hoạt động đúng chức năng.\u003c/p\u003e\u003cp\u003e3.5\tKết nối với cơ quan chức năng và khách hàng để đáp ứng yêu cầu và mong đợi về khai thác.\u003c/p\u003e\u003cp\u003e3.6\tLà cầu nối giữa khách hàng với các trưởng bộ phận về các vấn đề chính của khai thác.\u003c/p\u003e\u003cp\u003e3.7\tTham gia xử lý sự cố lớn về tàu, khách hàng hoặc tác động khai thác.\u003c/p\u003e\u003cp\u003e3.8\tXét duyệt bản đánh giá nhà thầu theo định kỳ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Thực hiện các nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t5.1\tXem xét và phê duyệt các yêu cầu của nhân viên phục vụ cho hoạt động khai thác.\u003c/p\u003e\u003cp\u003e5.2\tQuản lý áp dụng hệ thống và di chuyển thực tế, đảm bảo cung cấp ổn định.\u003c/p\u003e\u003cp\u003e5.3\tRà soát và phân bổ khối lượng công việc giữa các nhân viên và bộ phận.\u003c/p\u003e\u003cp\u003e5.4\tXem xét kế hoạch ngân sách và tuyển dụng hàng năm cho phòng.\u003c/p\u003e\u003cp\u003e5.5\tĐịnh hướng hành động cho nhân viên để đạt được mục tiêu cá nhân.\u003c/p\u003e\u003cp\u003e5.6\tQuản lý nhân viên về năng lực, bao gồm đào tạo, đánh giá, áp dụng kỷ luật và phát triển.\u003c/p\u003e\u003cp\u003e5.7\tĐảm bảo tr
