tic/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T2166,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTÓM TẮT MỤC ĐÍCH CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Hỗ trợ KTT tổng hợp các thông tin, dữ liệu và lập báo cáo cho Ban Tổng Giám Đốc về doanh thu, chi phí, kết quả kinh doanh… theo định kỳ và khi có yêu cầu.\u003c/p\u003e\u003cp\u003e- Tham mưu cho KTT xây dựng các quy trình hoạt động, quy trình kiểm soát theo chức năng và nhiệm vụ của Phòng Tài chính – Kế toán\u003c/p\u003e\u003cp\u003e- Thiết lập hệ thống sổ sách nhằm ghi nhận kịp thời, chính xác các nghiệp vụ kinh tế phát sinh trên cơ sở không ngừng cải tiến tổ chức bộ máy và tuân thủ pháp luật hiện hành\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHỨC NĂNG, NHIỆM VỤ CỦA VỊ TRÍ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Kiểm tra và hướng dẫn xử lý hồ sơ thanh toán khi có vướng mắc\t\u003c/p\u003e\u003cp\u003e- Lập kế hoạch dự chi, cân đối dòng tiền để lập kế hoạch ưu tiên thanh toán\u003c/p\u003e\u003cp\u003e- Kiểm tra tính hợp lệ của chứng từ thanh toán\u003c/p\u003e\u003cp\u003e- Trình ký các chứng từ thanh toán\u003c/p\u003e\u003cp\u003e- Sắp xếp chứng từ, làm thủ tục giao dịch ngân hàng thực hiện thanh toán\u003c/p\u003e\u003cp\u003e- Hướng dẫn hoàn thiện HS và các vướng mắc liên quan ( nếu có)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Kiểm tra lại Nghiệp vụ kế toán ngân hàng\t\u003c/p\u003e\u003cp\u003e-  Kiểm tra lại các hồ sơ ngân hàng do KTTT lập trước khi trình ký.\u003c/p\u003e\u003cp\u003e- Kiểm tra, đối chiếu số dư cuối kỳ tại các ngân hàng:\u003c/p\u003e\u003cp\u003e+ Cuối mỗi ngày, mối tháng, quý, năm sau khi hoàn tất việc hạch toán các nghiệp vụ kinh tế phát sinh, KT cần đối chiếu số dư các TK ngân hàng tương ứng với số dư trên sổ sách kế toán. Đảm bảo các  bút toán đã được hạch toán ghi nhận đầy đủ kịp thời\u003c/p\u003e\u003cp\u003e- Chuẩn bị các hồ sơ giải ngân khi cần thiết\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Kiểm tra và theo dỏi hợp đồng kinh tế\u003c/p\u003e\u003cp\u003e- Kiểm tra các điều khoản thanh toán của Hợp đồng kinh tế\u003c/p\u003e\u003cp\u003e- Kiểm tra hồ sơ nghiệm thu của các hợp đồng xây dựng đảm bảo việc nghiệm thu đúng theo điều khoản hợp đồng\u003c/p\u003e\u003cp\u003e- Theo dõi, báo cáo tiến độ thanh toán thực hiện của hợp đồng phải trả\u003c/p\u003e\u003cp\u003e- Theo dõi hạn mức công nợ, thời hạn thanh toán phát sinh, Đôn đốc thu hồi công nợ phải thu: Dựa vào hóa đơn và các điều khoản trên HĐ, kế toán lập bảng theo dõi thời hạn thanh toán, kiểm tra tiền về và tiến hành nhắc nhở, thông báo tới các BP liên quan, hoặc KH yêu cầu đôn đốc thu hồi công nợ (nếu có)\u003c/p\u003e\u003cp\u003e- Lập/ yêu cầu lập HĐ, PLHĐ đối với các HĐ hết hạn\u003c/p\u003e\u003cp\u003e- Theo dõi, báo cáo tiến độ thu hồi công nợ của hợp đồng bán hàng\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4.Theo dỏi hợp đồng vay\t\u003c/p\u003e\u003cp\u003e- Kiểm trả điều khoản hợp đồng vay\u003c/p\u003e\u003cp\u003e- Theo dõi kế hoạch thanh toán các khoản lãi, gốc vay\u003c/p\u003e\u003cp\u003e- Lưu trữ chứng từ giải ngân\u003c/p\u003e\u003cp\u003e- Đảm bảo các khoản lãi vay và gốc vay ghi nhận đúng kỳ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5. Kiểm tra các nghiệp vụ phát sinh\u003c/p\u003e\u003cp\u003e- Kiểm tra các nghiệp vụ thanh toán hàng ngày đảm bảo ghi nhận đầy đủ\u003c/p\u003e\u003cp\u003e- Đảo bảo các khoản mục doanh thu, chi phí được ghi nhận đúng kỳ và phân bổ hợp lý\u003c/p\u003e\u003cp\u003e- Kiểm tra các khoản chi phí trích lập đầy đủ: khấu hao, phân bổ,…\u003c/p\u003e\u003cp\u003e- Đảm bảo việc ghi nhận Theo dõi danh mục tài sản, công cụ dụng cụ đầy đủ khi có phát sinh\u003c/p\u003e\u003cp\u003e- Đảm bảo việc thực hiện kiểm kê tài sản, dụng cụ thực hiện định kỳ và đề xuất hướng xử lý khi có sai sót\u003c/p\u003e\u003cp\u003e- Kiểm tra việc ghi nhận các khoản thuế đúng kỳ và đúng quy định pháp luật\u003c/p\u003e\u003cp\u003e- Thực hiện, kiểm trả kết chuyển doanh thu, chi phí đúng kỳ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6. Kiểm tra, hướng dẫn\t\u003c/p\u003e\u003cp\u003e- Đối chiếu dữ liệu chi tiết- tổng hợp:\u003c/p\u003e\u003cp\u003e+ Cuối tháng, Kế toán kết xuất số liệu kiểm tra số dư, số phát sinh giữa các sổ kế toán chi tiết so với sổ kế toán tổng hợp\u003c/p\u003e\u003cp\u003e+ Nếu có sai sót hướng dẫn KTV điều chỉnh\"\u003c/p\u003e\u003cp\u003e- Đối chiếu công nợ BHXH, TNCN liên quan:\u003c/p\u003e\u003cp\u003e+ Định kỳ kế toán thực hiện đối chiếu công nợ phải thu phải trả liên quan đến các khoản Lương, BHXH, BHYT, Thuế TNCN….\u003c/p\u003e\u003cp\u003e+ Hướng dẫn điều chỉnh nếu có sai sót\"\u003c/p\u003e\u003cp\u003e- Đối chiếu các chi tiết giao dịch NB phát sinh:\u003c/p\u003e\u003cp\u003e+ Cuối tháng, kiểm tra các dữ liệu phát sinh tại đơn vị, liệt kê các giao dịch liên quan tới các đơn vị trong tập đoàn\u003c/p\u003e\u003cp\u003e+ Lập bảng kê giao dịch bao gồm, số tiền, tài khoản hạch toán, đơn vị liên quan….\u003c/p\u003e\u003cp\u003e+ Đối chiếu với các đơn vị liên quan\u003c/p\u003e\u003cp\u003e+ Gửi bảng kê đã đối chiếu lên KTTH tập đoàn\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7. Thực hiện các báo cáo\u003c/p\u003e\u003cp\u003e- Lập bảng CĐPS tài khoản:\u003c/p\u003e\u003cp\u003e+ Sau khi hoàn tất dữ liệu, xác định thuế phải nộp, kết chuyển chi phí tính lợi nhuận, kế toán tiến hành lập và rà soát số trên bảng CĐPS tài khoản\u003c/p\u003e\u003cp\u003e- Lập báo cáo tài chính  đơn vị NB- Thuế: \u003c/p\u003e\u003cp\u003e+ Cuối tháng, quý, năm sau khi kiểm tra dữ liệu, KT tiến hành lập BCKQKD, CĐKT, LCTT, TMBCTC riêng của đơn vị \u003c/p\u003e\u003cp\u003e+ Nộp lên KTTH Tập đoàn vào ngày 5 hàng tháng\"\u003c/p\u003e\u003cp\u003e- Lập báo cáo nội bộ: báo cáo dòng tiền, báo cáo sử dụng vốn\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e8. Kiểm tra việc Lưu trữ chứng từ\u003c/p\u003e\u003cp\u003e- Lấy sổ phụ, chứng từ ngân hàng:\u003c/p\u003e\u003cp\u003e+ Cuối mỗi tháng Kế Toán liên hệ với ngân hàng yêu cầu cung cấp sao kê, sổ phụ về\u003c/p\u003e\u003cp\u003e+ Kiểm tra sao kê khớp với số dư trên sổ kế toán\u003c/p\u003e\u003cp\u003e+ Tiến hành kẹp chung với chứng từ HS thanh toán nhằm phục vụ việc lưu trữ chứng từ\"\u003c/p\u003e\u003cp\u003e- In chứng từ hạch toán, sổ kế toán chi tiết liên quan Phải thu/ phải trả , trình ký:\u003c/p\u003e\u003cp\u003e+ Sau khi hoàn tất việc hạch toán kế toán, KT thực hiện in phiếu hạch toán kế toán, trình ký kẹp chung chứng từ thanh toán nhằm phục vụ cho việc lưu trữ chứng từ sổ sách\"\u003c/p\u003e\u003cp\u003e- Lưu trữ hóa đơn mua vào,bán ra chứng từ sổ sách: \u003c/p\u003e\u003cp\u003e+ Đối với hóa đơn GTGT ngoài việc lưu chung với chứng từ thanh toán, Kế Toán cần tải bản scan hóa đơn về lưu trữ riêng theo quy định\u003c/p\u003e\u003cp\u003e+ Việc lưu trữ chứng từ cần tuân theo nguyên tắc nhất định, đảm bảo cho việc truy xuất HS được nhanh chóng và kịp thời\"\u003c/p\u003e\u003cp\u003e- In chứng từ hạch toán, sổ kế toán chi tiết , PKT, trình ký, lưu trữ:\u003c/p\u003e\u003cp\u003e+ Sau khi hoàn tất việc hạch toán kế toán, KT thực hiện in phiếu hạch toán kế toán, trình ký kẹp chung chứng từ thanh toán nhằm phục vụ cho việc lưu trữ chứng từ sổ sách\u003c/p\u003e\u003cp\u003e+ Thực hiện lưu trữ chứng từ theo quy định, việc lưu trữ phải đảm bảo thực hiện theo nguyên tắc nhằm phục vụ cho việc truy xuất dữ liệu chứng từ được chính xác và nhanh chóng\"\u003c/p\u003e\u003cp\u003e- Kiểm tra lưu trữ hồ sơ tăng, giảm TSCĐ, CCDC, CP trả trước dài hạn:\u003c/p\u003e\u003cp\u003e+ Nhận HS tăng, giảm TSCĐ từ KTV\u003c/p\u003e\u003cp\u003e+ Kiểm tra tính hợp lý, hợp lệ, đầy đủ của bộ HS\u003c/p\u003e\u003cp\u003e+ Hướng dẫn KTV bổ sung các HS cần thiết ( nếu có)\u003c/p\u003e\u003cp\u003e+ Kiếm tra hạch toán, hướng dẫn điều chỉnh nếu có sai xót \u003c/p\u003e\u003cp\u003e+ Lưu trữ chứng từ theo quy định\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e9. Thực hiện các công việc liên quan đến kiếm toán định kỳ\t\u003c/p\u003e\u003cp\u003e- Cung cấp và giải trình theo yêu cầu của kiểm toán nội bộ và bên ngoài\u003c/p\u003e\u003cp\u003e- Thực hiện đầy đủ các biên bản xác nhận công nợ theo yêu cầu kiểm toán\u003c/p\u003e\u003cp\u003e- Kiểm tra lại các đề nghị và bản báo cáo của kiểm toán trước khi phát hành\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e10. Các công việc khác\u003c/p\u003e\u003cp\u003e- Thực hiện các công việc khác khi được yêu cầu từ KTT và TGĐ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T5c2,\u003cp\u003e\u003cstrong\u003e1. Trình độ: \u003c/strong\u003eTốt nghiệp đại học các chuyên ngành về kế toán, tài chính\t\u003c/p\u003e\u003cp\u003e\t\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm:\u003c/strong\u003e Tối thiểu 03 năm kinh nghiệm làm vị trí tương đương\u003c/p\u003e\u003cp\u003e\t\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức\t:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kiến thức về chuyên môn kế toán, nghiệp vụ kế toán.\u003c/p\u003e\u003cp\u003e- Am hiểu rõ về luật thuế, luật kế toán và các quy định hiện hành.\t\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Ngoại ngữ:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e- Có ngoại ngữ là 01 lợi thế. \u003c/p\u003e\u003cp\u003e- Yêu cầu ngoại ngữ: đọc, dịch được văn bản tiếng anh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kỹ năng giao tiếp: Có khả năng thuyết trình tốt, chủ động trong việc giao tiếp.\u003c/p\u003e\u003cp\u003e- Cẩn thận, có khả năng sắp xếp công việc hợp lý.\u003c/p\u003e\u003cp\u003e- Nắm vững nghiệp vụ kế toán, chế độ kế toán, chính sách thuế hiện hành.\u003c/p\u003e\u003cp\u003e- Có kỹ năng tổng hợp và phân tích báo cáo . Thực hiện nhiệm vụ chính xác và đúng qui định.\u003c/p\u003e\u003cp\u003e- Có kiến thức cơ bản về quy trình sản xuất kinh doanh  trong công ty\u003c/p\u003e\u003cp\u003e- Kỹ năng tin học: Sử dụng thành thạo các phần mềm kế toán; các ứng dụng Word, Excel, PowerPoint.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Ý thức \u0026Thái độ:\u003c/strong\u003e Trung thực, nhiệt tình, sáng tạo, có chí cầu tiến trong công việc.\t\t\u003c/p\u003e27:T2166,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTÓM TẮT MỤC ĐÍCH CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Hỗ trợ KTT tổng hợp các thông tin, dữ liệu và lập báo cáo cho Ban Tổng Giám Đốc về doanh thu, chi phí, kết quả kinh doanh… theo định kỳ và khi có yêu cầu.\u003c/p\u003e\u003cp\u003e- Tham mưu cho KTT xây dựng các quy trình hoạt động, quy trình kiểm soát theo chức năng và nhiệm vụ của Phòng Tài chính – Kế toán\u003c/p\u003e\u003cp\u003e- Thiết lập hệ thống sổ sách nhằm ghi nhận kịp thời, chính xác các nghiệp vụ kinh tế phát sinh trên cơ sở không ngừng cải tiến tổ chức bộ máy và tuân thủ pháp luật hiện hành\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHỨC NĂNG, NHIỆM VỤ CỦA VỊ TRÍ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Kiểm tra và hướng dẫn xử lý hồ sơ thanh toán khi có vướng mắc\t\u003c/p\u003e\u003cp\u003e- Lập kế hoạch dự chi, cân đối dòng tiền để lập kế hoạch ưu tiên thanh toán\u003c/p\u003e\u003cp\u003e- Kiểm tra tính hợp lệ của chứng từ thanh toán\u003c/p\u003e\u003cp\u003e- Trình ký các chứng từ thanh toán\u003c/p\u003e\u003cp\u003e- Sắp xếp chứng từ, làm thủ tục giao dịch ngân hàng thực hiện thanh toán\u003c/p\u003e\u003cp\u003e- Hướng dẫn hoàn thiện HS và các vướng mắc liên quan ( nếu có)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Kiểm tra lại Nghiệp vụ kế toán ngân hàng\t\u003c/p\u003e\u003cp\u003e-  Kiểm tra lại các hồ sơ ngân hàng do KTTT lập trước khi trình ký.\u003c/p\u003e\u003cp\u003e- Kiểm tra, đối chiếu số dư cuối kỳ tại các ngân hàng:\u003c/p\u003e\u003cp\u003e+ Cuối mỗi ngày, mối tháng, quý, năm sau khi hoàn tất việc hạch toán các nghiệp vụ kinh tế phát sinh, KT cần đối chiếu số dư các TK ngân hàng tương ứng với số dư trên sổ sách kế toán. Đảm bảo các  bút toán đã được hạch toán ghi nhận đầy đủ kịp thời\u003c/p\u003e\u003cp\u003e- Chuẩn bị các hồ sơ giải ngân khi cần thiết\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Kiểm tra và theo dỏi hợp đồng kinh tế\u003c/p\u003e\u003cp\u003e- Kiểm tra các điều khoản thanh toán của Hợp đồng kinh tế\u003c/p\u003e\u003cp\u003e- Kiểm tra hồ sơ nghiệm thu của các hợp đồng xây dựng đảm bảo việc nghiệm thu đúng theo điều khoản hợp đồng\u003c/p\u003e\u003cp\u003e- Theo dõi, báo cáo tiến độ thanh toán thực hiện của hợp đồng phải trả\u003c/p\u003e\u003cp\u003e- Theo dõi hạn mức công nợ, thời hạn thanh toán phát sinh, Đôn đốc thu hồi công nợ phải thu: Dựa vào hóa đơn và các điều khoản trên HĐ, kế toán lập bảng theo dõi thời hạn thanh toán, kiểm tra tiền về và tiến hành nhắc nhở, thông báo tới các BP liên quan, hoặc KH yêu cầu đôn đốc thu hồi công nợ (nếu có)\u003c/p\u003e\u003cp\u003e- Lập/ yêu cầu lập HĐ, PLHĐ đối với các HĐ hết hạn\u003c/p\u003e\u003cp\u003e- Theo dõi, báo cáo tiến độ thu hồi công nợ của hợp đồng bán hàng\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4.Theo dỏi hợp đồng vay\t\u003c/p\u003e\u003cp\u003e- Kiểm trả điều khoản hợp đồng vay\u003c/p\u003e\u003cp\u003e- Theo dõi kế hoạch thanh toán các khoản lãi, gốc vay\u003c/p\u003e\u003cp\u003e- Lưu trữ chứng từ giải ngân\u003c/p\u003e\u003cp\u003e- Đảm bảo các khoản lãi vay và gốc vay ghi nhận đúng kỳ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5. Kiểm tra các nghiệp vụ phát sinh\u003c/p\u003e\u003cp\u003e- Kiểm tra các nghiệp vụ thanh toán hàng ngày đảm bảo ghi nhận đầy đủ\u003c/p\u003e\u003cp\u003e- Đảo bảo các khoản mục doanh thu, chi phí được ghi nhận đúng kỳ và phân bổ hợp lý\u003c/p\u003e\u003cp\u003e- Kiểm tra các khoản chi phí trích lập đầy đủ: khấu hao, phân bổ,…\u003c/p\u003e\u003cp\u003e- Đảm bảo việc ghi nhận Theo dõi danh mục tài sản, công cụ dụng cụ đầy đủ khi có phát sinh\u003c/p\u003e\u003cp\u003e- Đảm bảo việc thực hiện kiểm kê tài sản, dụng cụ thực hiện định kỳ và đề xuất hướng xử lý khi có sai sót\u003c/p\u003e\u003cp\u003e- Kiểm tra việc ghi nhận các khoản thuế đúng kỳ và đúng quy định pháp luật\u003c/p\u003e\u003cp\u003e- Thực hiện, kiểm trả kết chuyển doanh thu, chi phí đúng kỳ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6. Kiểm tra, hướng dẫn\t\u003c/p\u003e\u003cp\u003e- Đối chiếu dữ liệu chi tiết- tổng hợp:\u003c/p\u003e\u003cp\u003e+ Cuối tháng, Kế toán kết xuất số liệu kiểm tra số dư, số phát sinh giữa các sổ kế toán chi tiết so với sổ kế toán tổng hợp\u003c/p\u003e\u003cp\u003e+ Nếu có sai sót hướng dẫn KTV điều chỉnh\"\u003c/p\u003e\u003cp\u003e- Đối chiếu công nợ BHXH, TNCN liên quan:\u003c/p\u003e\u003cp\u003e+ Định kỳ kế toán thực hiện đối chiếu công nợ phải thu phải trả liên quan đến các khoản Lương, BHXH, BHYT, Thuế TNCN….\u003c/p\u003e\u003cp\u003e+ Hướng dẫn điều chỉnh nếu có sai sót\"\u003c/p\u003e\u003cp\u003e- Đối chiếu các chi tiết giao dịch NB phát sinh:\u003c/p\u003e\u003cp\u003e+ Cuối tháng, kiểm tra các dữ liệu phát sinh tại đơn vị, liệt kê các giao dịch liên quan tới các đơn vị trong tập đoàn\u003c/p\u003e\u003cp\u003e+ Lập bảng kê giao dịch bao gồm, số tiền, tài khoản hạch toán, đơn vị liên quan….\u003c/p\u003e\u003cp\u003e+ Đối chiếu với các đơn vị liên quan\u003c/p\u003e\u003cp\u003e+ Gửi bảng kê đã đối chiếu lên KTTH tập đoàn\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7. Thực hiện các báo cáo\u003c/p\u003e\u003cp\u003e- Lập bảng CĐPS tài khoản:\u003c/p\u003e\u003cp\u003e+ Sau khi hoàn tất dữ liệu, xác định thuế phải nộp, kết chuyển chi phí tính lợi nhuận, kế toán tiến hành lập và rà soát số trên bảng CĐPS tài khoản\u003c/p\u003e\u003cp\u003e- Lập báo cáo tài chính  đơn vị NB- Thuế: \u003c/p\u003e\u003cp\u003e+ Cuối tháng, quý, năm sau khi kiểm tra dữ liệu, KT tiến hành lập BCKQKD, CĐKT, LCTT, TMBCTC riêng của đơn vị \u003c/p\u003e\u003cp\u003e+ Nộp lên KTTH Tập đoàn vào ngày 5 hàng tháng\"\u003c/p\u003e\u003cp\u003e- Lập báo cáo nội bộ: báo cáo dòng tiền, báo cáo sử dụng vốn\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e8. Kiểm tra việc Lưu trữ chứng từ\u003c/p\u003e\u003cp\u003e- Lấy sổ phụ, chứng từ ngân hàng:\u003c/p\u003e\u003cp\u003e+ Cuối mỗi tháng Kế Toán liên hệ với ngân hàng yêu cầu cung cấp sao kê, sổ phụ về\u003c/p\u003e\u003cp\u003e+ Kiểm tra sao kê khớp với số dư trên sổ kế toán\u003c/p\u003e\u003cp\u003e+ Tiến hành kẹp chung với chứng từ HS thanh toán nhằm phục vụ việc lưu trữ chứng từ\"\u003c/p\u003e\u003cp\u003e- In chứng từ hạch toán, sổ kế toán chi tiết liên quan Phải thu/ phải trả , trình ký:\u003c/p\u003e\u003cp\u003e+ Sau khi hoàn tất việc hạch toán kế toán, KT thực hiện in phiếu hạch toán kế toán, trình ký kẹp chung chứng từ thanh toán nhằm phục vụ cho việc lưu trữ chứng từ sổ sách\"\u003c/p\u003e\u003cp\u003e- Lưu trữ hóa đơn mua vào,bán ra chứng từ sổ sách: \u003c/p\u003e\u003cp\u003e+ Đối với hóa đơn GTGT ngoài việc lưu chung với chứng từ thanh toán, Kế Toán cần tải bản scan hóa đơn về lưu trữ riêng theo quy định\u003c/p\u003e\u003cp\u003e+ Việc lưu trữ chứng từ cần tuân theo nguyên tắc nhất định, đảm bảo cho việc truy xuất HS được nhanh chóng và kịp thời\"\u003c/p\u003e\u003cp\u003e- In chứng từ hạch toán, sổ kế toán chi tiết , PKT, trình ký, lưu trữ:\u003c/p\u003e\u003cp\u003e+ Sau khi hoàn tất việc hạch toán kế toán, KT thực hiện in phiếu hạch toán kế toán, trình ký kẹp chung chứng từ thanh toán nhằm phục vụ cho việc lưu trữ chứng từ sổ sách\u003c/p\u003e\u003cp\u003e+ Thực hiện lưu trữ chứng từ theo quy định, việc lưu trữ phải đảm bảo thực hiện theo nguyên tắc nhằm phục vụ cho việc truy xuất dữ liệu chứng từ được chính xác và nhanh chóng\"\u003c/p\u003e\u003cp\u003e- Kiểm tra lưu trữ hồ sơ tăng, giảm TSCĐ, CCDC, CP trả trước dài hạn:\u003c/p\u003e\u003cp\u003e+ Nhận HS tăng, giảm TSCĐ từ KTV\u003c/p\u003e\u003cp\u003e+ Kiểm tra tính hợp lý, hợp lệ, đầy đủ của bộ HS\u003c/p\u003e\u003cp\u003e+ Hướng dẫn KTV bổ sung các HS cần thiết ( nếu có)\u003c/p\u003e\u003cp\u003e+ Kiếm tra hạch toán, hướng dẫn điều chỉnh nếu có sai xót \u003c/p\u003e\u003cp\u003e+ Lưu trữ chứng từ theo quy định\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e9. Thực hiện các công việc liên quan đến kiếm toán định kỳ\t\u003c/p\u003e\u003cp\u003e- Cung cấp và giải trình theo yêu cầu của kiểm toán nội bộ và bên ngoài\u003c/p\u003e\u003cp\u003e- Thực hiện đầy đủ các biên bản xác nhận công nợ theo yêu cầu kiểm toán\u003c/p\u003e\u003cp\u003e- Kiểm tra lại các đề nghị và bản báo cáo của kiểm toán trước khi phát hành\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e10. Các công việc khác\u003c/p\u003e\u003cp\u003e- Thực hiện các công việc khác khi được yêu cầu từ KTT và TGĐ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:T5c2,\u003cp\u003e\u003cstrong\u003e1. Trình độ: \u003c/strong\u003eTốt nghiệp đại học các chuyên ngành về kế toán, tài chính\t\u003c/p\u003e\u003cp\u003e\t\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.
