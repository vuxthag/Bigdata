g thu hút và giữ chân nhân tài của GPBank, nâng cao hiệu suất lao động, nâng cao hiệu quả của công tác quản trị nguồn nhân lực và giúp GPBank tuân thủ tốt các quy định về pháp luật lao động.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCÁC HOẠT ĐỘNG CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tTrợ giúp GĐ Khối\u003c/strong\u003e trong công tác xây dựng các chiến lược nhân sự và các chiến lực thành phần liên quan để đáp ứng yêu cầu phát triển và hoạt động của Ngân hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tXây dựng các Kế hoạch hoạt động trong năm\u003c/strong\u003e cho các mảng công việc: \u003c/p\u003e\u003cp\u003eĐãi ngộ, Quản lý ngân sách nhân sự, Quản trị HQLV, Quản trị cơ cấu tổ chức và hệ thống công việc và Quan hệ lao động.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Tổ chức triển khai các hoạt động của các mảng công việc phụ trách, \u003c/strong\u003ebao gồm:\u003c/p\u003e\u003cp\u003e•\tXây dựng và phát triển các hệ thống nền tảng, chính sách thuộc phạm vi toàn ngân hàng liên quan đến các mảng công việc phụ trách. Tổ chức truyền thông, hướng dẫn việc triển khai áp dụng các chính sách\u003c/p\u003e\u003cp\u003e•\tXây dựng và phát triển các quy trình, hướng dẫn phối hợp công việc với các bên liên quan trong và ngoài Khối QTNNL nhằm hỗ trợ tốt nhất cho các hoạt động của Ngân hàng.\u003c/p\u003e\u003cp\u003e•\tTổ chức, điều phối, phối hợp với các đơn vị, cá nhân liên quan để triển khai trên toàn ngân hàng các hoạt động thuộc các mảng công việc liên quan.\u003c/p\u003e\u003cp\u003e•\tCung cấp ý kiến tư vấn, đánh giá, cung cấp các thông tin cần thiết liên quan cho các đơn vị trong và ngoài HR.\u003c/p\u003e\u003cp\u003e•\tĐóng vai trò Project Owner trong các sáng kiến, các dự án được triển khai bởi phòng RnP.\u003c/p\u003e\u003cp\u003e•\tQuản trị vận hành hệ thống phần mềm về OM và PMS.\u003c/p\u003e\u003cp\u003e•\tQuản lý hệ thống văn bản, quy trình, quy định chung của HR. Hướng dẫn/tư vấn cho các đơn vị liên quan trong nội bộ HR về công tác xây dựng và phát triển các quy trình, quy định.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tTuyển chọn, đào tạo và huấn luyện CBNV trong phòng RnP\u003c/strong\u003e đảm bảo duy trì các nguồn nhân lực phù hợp về số lượng và chất lượng cho mỗi vị trí công việc trong phòng.\u003c/p\u003e\u003cp\u003eDẫn dắt điều phối, kiểm soát công việc của phòng đảm bảo triển khai hiệu quả các chương trình, kế hoạch làm việc của phòng và đảm bảo sự phát triển năng lực của CBNV trong phòng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tChịu trách nhiệm xây dựng và quản lý ngân sách phục vụ các hoạt động của phòng\u003c/strong\u003e bao gồm: Ngân sách hoạt động, ngân sách nhân sự. Đảm bảo việc chi tiêu của phòng trong phạm vi ngân sách được duyệt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T5cc,\u003cp\u003e\u003cstrong\u003e1. Trình độ Học vấn: \u003c/strong\u003eĐại học/ Trên Đại học chuyên ngành Quản trị nhân sự/ Quản trị kinh doanh/ Tài chính/ Ngân hàng\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm Liên quan: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eCó ít nhất 5 năm kinh nghiệm giữ các chức vụ quản lý/lãnh đạo\u003c/strong\u003e tại các tổ chức ngân hàng, tài chính, FMCG và các doanh nghiệp có quy mô lớn \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức/ Chuyên môn Có Liên Quan:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó hiểu biết về chiến lược của tổ chức và có khả năng diễn giải thành các nội dung cụ thể có liên quan đến đơn vị mình phục vụ\u003c/p\u003e\u003cp\u003e•\tCó hiểu biết và cập nhật thường xuyên về các thông lệ trên thị trường về chính sách nhân sự v
