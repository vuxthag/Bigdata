03e\u003c/p\u003e\u003cp\u003e\t1.1\tĐảm bảo duy trì việc giám sát hoạt động khai thác theo ca được liên tục. \u003c/p\u003e\u003cp\u003e\t1.2\tGiám sát hoạt động đưa và lấy khỏi tàu bất cứ tài sản nào, kể cả thiết bị làm hàng.\u003c/p\u003e\u003cp\u003e\t1.3\tPhối hợp với phòng Thương mại để lập kế hoạch tàu cập, cung cấp dịch vụ khai thác cho khách hàng và cập nhật lịch tàu cho các bên liên quan.\u003c/p\u003e\u003cp\u003e\t1.4\tTham vấn cấp trên để lập kế hoạch khai thác bãi, kho và nơi lưu trữ khác an toàn và hiệu quả.\u003c/p\u003e\u003cp\u003e\t1.5\tKiểm soát việc cập nhật thông tin, kế hoạch và yêu cầu nhân lực cho nhà thầu.\u003c/p\u003e\u003cp\u003e\t1.6\tĐảm bảo kế hoạch khai thác được cập nhật cho các bên liên quan kịp thời.\u003c/p\u003e\u003cp\u003e\t1.7\tPhối hợp với Hoa tiêu và hiện trường để phương tiện thủy neo đậu, di dời và rời theo đúng kế hoạch.\u003c/p\u003e\u003cp\u003e\t1.8\tThông tin phương thức và yêu cầu làm hàng an toàn cho hiện trường.\u003c/p\u003e\u003cp\u003e\t1.9\tYêu cầu nhà thầu đáp ứng năng suất khai thác, đảm bảo an toàn và vệ sinh khu vực làm hàng.\u003c/p\u003e\u003cp\u003e\t1.10\tGiám sát việc tuân thủ kế hoạch khai thác\u003c/p\u003e\u003cp\u003e\t1.11\tPhối hợp với bộ phận Sản xuất và phòng Kỹ thuật trong việc điều phối hoạt động của thiết bị cảng.\u003c/p\u003e\u003cp\u003e\t1.12\tPhối hợp với phòng IT để đảm bảo hoạt động khai thác qua hệ thống và giám sát bằng camera liên tục.\u003c/p\u003e\u003cp\u003e\t1.13\tĐảm bảo các hoạt động khai thác cảng tuân thủ kế hoạch hàng hóa, tàu và các chính sách của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.Thực hiện kế hoạch khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t2.1\tCập nhật toàn bộ hoạt động khai thác trong ca và sử dụng CCTV để giám sát tất cả hoạt động khai thác.\u003c/p\u003e\u003cp\u003e\t2.2\tCập nhật đăng ký ra vào cảng và theo dõi sự di chuyển, đặc biệt là người đi bộ trong khu vực khai thác.\u003c/p\u003e\u003cp\u003e\t2.3\tTheo dõi, thực hiện kế hoạch cầu bến và hàng hóa. Cập nhật hoạt động bãi, tàu và hiện trường.\u003c/p\u003e\u003cp\u003e\t2.4\tPhối hợp với nhà thầu và hiện trường để xử lý ách tắc về khai thác, kể cả hệ thống.\u003c/p\u003e\u003cp\u003e\t2.5\tTheo dõi sự di chuyển xe, hàng hóa và tàu. Cảnh báo cho bộ phận An ninh-an toàn để cùng xử lý.\u003c/p\u003e\u003cp\u003e\t2.6\tGiám sát hoạt động vận hành an toàn của các thiết bị và xe cơ giới, bao gồm của nhà thầu và khách hàng.\u003c/p\u003e\u003cp\u003e\t2.7\tLiên hệ với các bộ phận, phòng ban khác và nhà thầu để cung cấp và hoàn thành dịch vụ cho khách hàng.\u003c/p\u003e\u003cp\u003e\t2.8\tYêu cầu dich vụ nhà thầu cho hoạt động khai thác hàng hóa, tàu và các mục đích khai thác khác.\u003c/p\u003e\u003cp\u003e\t2.9\tPhối hợp và điều động phương tiện giao nhận hàng theo đúng kế hoạch.\u003c/p\u003e\u003cp\u003e\t2.10\tHỗ trợ giám sát và thu thập thông tin trực tiếp từ hiện trường.\u003c/p\u003e\u003cp\u003e\t2.11\tPhối hợp với các bên hiện trường về giám sát an toàn đối với tất cả hoạt động liên quan đến khai thác.\u003c/p\u003e\u003cp\u003e\t2.12\tCan thiệp hiện trường khi có bất cứ tác động ảnh hưởng đến năng suất và an toàn khai thác. Báo cấp Trưởng ca khai thác để xử lý khi vượt thẩm quyền.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.Cập nhật chứng từ khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t3.1\tThu thập, xử lý chứng từ tàu, hàng hóa và yêu cầu để lập kế hoạch.\u003c/p\u003e\u003cp\u003e\t3.2\tBáo cáo hàng hóa, tàu và dịch vụ cho khách hàng và nội bộ.\u003c/p\u003e\u003cp\u003e\t3.3\tCập nhật chứng từ tàu và hàng vào hệ thống.\u003c/p\u003e\u003cp\u003e\t3.4\tKiểm tra và chuyển tiếp chứng từ yêu cầu của khách hàng cho bộ phận liên quan.\u003c/p\u003e\u003cp\u003e\t3.5\tBàn giao bộ chứng từ tàu và hàng hóa cho việc thanh toán.\u003c/p\u003e\u003cp\u003e\t3.6\tHướng dẫn và cập nhật đăng ký trực tuyến từ khách hàng và truyền tải dữ liệu khai thác.\u003c/p\u003e\u003cp\u003e\t3.7\tKiểm tra tính xác thực của đăng ký ra vào cho các hoạt động liên quan đến khai thác.\u003c/p\u003e\u003cp\u003e\t3.8\tXử lý khai báo giám sát hàng hóa và đăng ký trên các phần mềm.\u003c/p\u003e\u003cp\u003e\t3.9\tTuân thủ sự phân công và kế hoạch công việc từ Giám sát.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kiểm soát di chuyển an toàn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t4.1\tCập nhật cho khách hàng về quy định lưu thông trong cảng đối với người và phương tiện.\u003c/p\u003e\u003cp\u003e\t4.2\tPhối hợp với bộ phận An ninh an toàn giám sát lưu thông, đặc biệt đối với người đi bộ trong cảng.\u003c/p\u003e\u003cp\u003e\t4.3\tĐảm bảo hoạt động giám sát an toàn khai thác bằng CCTV liên tục\u003c/p\u003e\u003cp\u003e\t4.4\tPhối hợp với các bộ phận để ngăn chặn hành vi có khả năng gây ra sự cố khai thác.\u003c/p\u003e\u003cp\u003e\t4.5\tTham gia kiểm soát các hoạt động làm việc trên cao, trong hầm hàng và nơi làm việc an toàn tại hiện trường.\u003c/p\u003e\u003cp\u003e\t4.6\tCảnh báo điểm nóng, tắc nghẽn hoặc có nguy cơ va chạm cao cho các bên để cùng xử lý.\u003c/p\u003e\u003cp\u003e\t4.7\tBáo cáo cấp trên can thiệp khi sự cố ảnh hưởng nghiêm trọng đến hoạt động khai thác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Xử lý yêu cầu\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e5.1\tQuản lý việc nhận và phản hồi yêu cầu từ khách hàng nhằm giải quyết nhanh chóng, tránh ách tắc hoặc than phiền từ các bên.\u003c/p\u003e\u003cp\u003e\t5.2\tĐảm bảo việc chuyển tiếp yêu cầu của khách hàng cho đúng bộ phận, phòng ban phụ trách\u003c/p\u003e\u003cp\u003e\t5.3\tHướng dẫn khách hàng tuân thủ đúng qui định về yêu cầu dịch vụ khai thác.\u003c/p\u003e\u003cp\u003e\t5.4\tĐảm bảo việc hỗ trợ khách hàng đăng ký thông tin trực tuyến.\u003c/p\u003e\u003cp\u003e\t5.5\tPhối hợp với các bộ phận và phòng ban để tiếp giải quyết khiếu nại, thắc mắc hoặc tranh chấp các vấn đề liên quan đến khai thác hàng, dịch vụ cảng và cung ứng cho tàu.\u003c/p\u003e\u003cp\u003e\t5.6\tCập nhật kế hoạch cầu bến và tình trạng cầu bến cho Cảng vụ theo đúng quy định.\u003c/p\u003e\u003cp\u003e\t5.7\tBáo cáo cấp trên khi xung đột với khách hàng không thể giải quyết theo thẩm quyền.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Kiểm soát chứng từ tàu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t6.1\tĐảm bảo khách hàng cập nhật chứng từ khai thác tàu kịp thời.\u003c/p\u003e\u003cp\u003e\t6.2\tKiểm soát việc cập nhật dữ liệu vào hệ thống khớp với khai báo của khách hàng.\u003c/p\u003e\u003cp\u003e\t6.3\tKiểm soát hoạt động xác thực và lưu trữ chứng từ tàu đúng quy định.\u003c/p\u003e\u003cp\u003e\t6.4\tĐảm bảo chứng từ tàu đúng với giao dịch thực tế và được xác nhận bởi các bên liên quan.\u003c/p\u003e\u003cp\u003e\t6.5\tBáo cấp trên khi có tranh chấp về số liệu khai thác tàu.\u003c/p\u003e\u003cp\u003e\t6.6\tGiải quyết các vấn đề liên quan đến chứng từ tàu.\u003c/p\u003e\u003cp\u003e\t6.7\tGiám sát việc kết toán số liệu cho nhà thầu.\u003c/p\u003e\u003cp\u003e\t6.8\tĐảm bảo các điều chỉnh hoặc thay đổi số liệu phải có chứng từ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Nhiệm vụ bổ sung\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e7.1\tTruyền tải yêu cầu và quy định về phòng chống dịch bệnh cho các bên liên quan đến hoạt động khai thác.\u003c/p\u003e\u003cp\u003e\t7.2\tSắp xếp nhân lực và báo cáo cấp trên trực tiếp khi có biến động.\u003c/p\u003e\u003cp\u003e\t7.3\tĐào tạo, huấn luyện và đánh giá năng lực nhân viên.\u003c/p\u003e\u003cp\u003e\t7.4\tHỗ trợ thử nghiệm và đánh giá phần mềm quản lý khai thác cảng.\u003c/p\u003e\u003cp\u003e\t7.5\tTuân thủ và đảm bảo nhân viên tuân theo chính sách, quy định của Công ty.\u003c/p\u003e\u003cp\u003e\t7.6\tThực hiện bất kỳ nhiệm vụ nào từ cấp quản lý trực tiếp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T683,\u003cp\u003e1. Trình độ:\tTốt nghiệp ngành Hàng hải, Vận tải, Cảng, xuất nhập khẩu hoặc các lĩnh vực liên quan. Có kiến thức về hoạt động khai thác cảng và kinh nghiệm trong mảng giám sát.\t\t\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm:\tTối thiểu 03 năm kinh nghiệm trong lĩnh vực khai thác và 01 năm kinh nghiệm ở cấp giám sát hoặc tương đương\t\t\u003c/p\u003e\u003cp\u003e3. Kiến thức\t:\tChứng chỉ an toàn HSSE level 1,Chứng chỉ ISPS\t\t\u003c/p\u003e\u003cp\u003e4. Ngoại ngữ:\tTiếng anh giao tiếp cơ bản\t\t\u003c/p\u003e\u003cp\u003e5. Kỹ năng:\tKỹ năng giao tiếp, Kỹ năng giải quyết vấn đề, Kỹ năng lập kế hoạch, kỹ năng giám sát\t\t\u003c/p\u003e\u003cp\u003e6. Ý thức \u0026Thái độ:\tTrung thực, nhiệt tình, đạo đức, ý thức tuân thủ các quy định cao\t\t\u003c/p\u003e\u003cp\u003e7. Yêu cầu khác:\tCó tư duy an toàn, tư duy phân tích, tư duy định hướng kết quả công việc, tập trung vào khách hàng\t\t\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Mức lương thỏa thuận, hỗ trợ nhà ở \u003c/p\u003e\u003cp\u003e- BHXH, thẻ bảo hiểm chăm sóc sức khỏe\u003c/p\u003e\u003cp\u003e- Hỗ trợ nhà ở, xe đưa đón (nếu có)\u003c/p\u003e\u003cp\u003e- Khám sức khỏe định kỳ 1 năm/1 lần\u003c/p\u003e\u003cp\u003e- Hỗ trợ cơm trưa\u003c/p\u003e\u003cp\u003e- Teambuilding\u003c/p\u003e\u003cp\u003e- Thưởng các ngày lễ lớn, sinh nhật, lỳ xì đầu năm, .\u003c/p\u003e\u003cp\u003eNgoài ra, tặng thưởng con NLĐ có kết quả học tập tốt, trung thu, 1/6\u003c/p\u003e\u003cp\u003e- Thưởng lương tháng 13, thưởng hiệu quả công việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*Địa điểm làm việc:\u003c/strong\u003e Thôn Mỹ Thuỷ, xã Mỹ Thuỷ, tỉnh Quảng Trị\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e27:T233d,"])</script><script>self.__next_f.push([1,"\u003cp\u003eĐơn vị\t:\tTrung tâm vận hành khai thác - Phòng khai thác cảng\t\t\u003c/p\u003e\u003cp\u003eCấp dưới trực tiếp\t:\tNhân viên kiểm đếm\t\t\u003c/p\u003e\u003cp\u003eBáo cáo\t:\t\u003c/p\u003e\u003cp\u003e- Cấp QL trực  tiếp: Trưởng ca khai thác\u003c/p\u003e\u003cp\u003e- Cấp QL gián tiếp: Trưởng/phó phòng khai thác\u003c/p\u003e\u003cp\u003eQuan hệ công việc (Phối hợp )\t:\t\u003c/p\u003e\u003cp\u003e- Với các Phòng trong Công ty: Nhân viên các phòng Quản lý thiết bị khai thác, Thương vụ và đại lý tàu, CNTT, Tài chính Kế toán, Nhân sự và tổng hợp, Logistics\u003c/p\u003e\u003cp\u003e- Với các tổ chức/cá nhân bên ngoài: Các đơn vị Cung cấp, Nhà thầu, Khách hàng, Đại lý tàu, Chủ hàng…\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eII. TÓM TẮT MỤC ĐÍCH CÔNG VIỆC\t\t\t\t\u003c/p\u003e\u003cp\u003eLập kế hoạch và giám sát hoạt động khai thác hàng hóa và tàu; Giám sát hoạt động và di chuyển an toàn của người và thiết bị cơ giới; Kiểm soát chứng từ khai thác tàu; Xử lý yêu cầu và thông tin khai thác nhận từ khách hàng và cơ quan chức năng.\t\t\t\t\u003c/p\u003e\u003cp\u003eIII. CHỨC NĂNG, NHIỆM VỤ CỦA VỊ TRÍ CÔNG VIỆC\t\t\t\t\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Lập kế hoạch khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t1.1\tĐảm bảo duy trì việc giám sát hoạt động khai thác theo ca được liên tục. \u003c/p\u003e\u003cp\u003e\t1.2\tGiám sát hoạt động đưa và lấy khỏi tàu bất cứ tài sản nào, kể cả thiết bị làm hàng.\u003c/p\u003e\u003cp\u003e\t1.3\tPhối hợp với phòng Thương mại để lập kế hoạch tàu cập, cung cấp dịch vụ khai thác cho khách hàng và cập nhật lịch tàu cho các bên liên quan.\u003c/p\u003e\u003cp\u003e\t1.4\tTham vấn cấp trên để lập kế hoạch khai thác bãi, kho và nơi lưu trữ khác an toàn và hiệu quả.\u003c/p\u003e\u003cp\u003e\t1.5\tKiểm soát việc cập nhật thông tin, kế hoạch và yêu cầu nhân lực cho nhà thầu.\u003c/p\u003e\u003cp\u003e\t1.6\tĐảm bảo kế hoạch khai thác được cập nhật cho các bên liên quan kịp thời.\u003c/p\u003e\u003cp\u003e\t1.7\tPhối hợp với Hoa tiêu và hiện trường để phương tiện thủy neo đậu, di dời và rời theo đúng kế hoạch.\u003c/p\u003e\u003cp\u003e\t1.8\tThông tin phương thức và yêu cầu làm hàng an toàn cho hiện trường.\u003c/p\u003e\u003cp\u003e\t1.9\tYêu cầu nhà thầu đáp ứng năng suất khai thác, đảm bảo an toàn và vệ sinh khu vực làm hàng.\u003c/p\u003e\u003cp\u003e\t1.10\tGiám sát việc tuân thủ kế hoạch khai thác\u003c/p\u003e\u003cp\u003e\t1.11\tPhối hợp với bộ phận Sản xuất và phòng Kỹ thuật trong việc điều phối hoạt động của thiết bị cảng.\u003c/p\u003e\u003cp\u003e\t1.12\tPhối hợp với phòng IT để đảm bảo hoạt động khai thác qua hệ thống và giám sát bằng camera liên tục.\u003c/p\u003e\u003cp\u003e\t1.13\tĐảm bảo các hoạt động khai thác cảng tuân thủ kế hoạch hàng hóa, tàu và các chính sách của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.Thực hiện kế hoạch khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t2.1\tCập nhật toàn bộ hoạt động khai thác trong ca và sử dụng CCTV để giám sát tất cả hoạt động khai thác.\u003c/p\u003e\u003cp\u003e\t2.2\tCập nhật đăng ký ra vào cảng và theo dõi sự di chuyển, đặc biệt là người đi bộ trong khu vực khai thác.\u003c/p\u003e\u003cp\u003e\t2.3\tTheo dõi, thực hiện kế hoạch cầu bến và hàng hóa. Cập nhật hoạt động bãi, tàu và hiện trường.\u003c/p\u003e\u003cp\u003e\t2.4\tPhối hợp với nhà thầu và hiện trường để xử lý ách tắc về khai thác, kể cả hệ thống.\u003c/p\u003e\u003cp\u003e\t2.5\tTheo dõi sự di chuyển xe, hàng hóa và tàu. Cảnh báo cho bộ phận An ninh-an toàn để cùng xử lý.\u003c/p\u003e\u003cp\u003e\t2.6\tGiám sát hoạt động vận hành an toàn của các thiết bị và xe cơ giới, bao gồm của nhà thầu và khách hàng.\u003c/p\u003e\u003cp\u003e\t2.7\tLiên hệ với các bộ phận, phòng ban khác và nhà thầu để cung cấp và hoàn thành dịch vụ cho khách hàng.\u003c/p\u003e\u003cp\u003e\t2.8\tYêu cầu dich vụ nhà thầu cho hoạt động khai thác hàng hóa, tàu và các mục đích khai thác khác.\u003c/p\u003e\u003cp\u003e\t2.9\tPhối hợp và điều động phương tiện giao nhận hàng theo đúng kế hoạch.\u003c/p\u003e\u003cp\u003e\t2.10\tHỗ trợ giám sát và thu thập thông tin trực tiếp từ hiện trường.\u003c/p\u003e\u003cp\u003e\t2.11\tPhối hợp với các bên hiện trường về giám sát an toàn đối với tất cả hoạt động liên quan đến khai thác.\u003c/p\u003e\u003cp\u003e\t2.12\tCan thiệp hiện trường khi có bất cứ tác động ảnh hưởng đến năng suất và an toàn khai thác. Báo cấp Trưởng ca khai thác để xử lý khi vượt thẩm quyền.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.Cập nhật chứng từ khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t3.1\tThu thập, xử lý chứng từ tàu, hàng hóa và yêu cầu để lập kế hoạch.\u003c/p\u003e\u003cp\u003e\t3.2\tBáo cáo hàng hóa, tàu và dịch vụ cho khách hàng và nội bộ.\u003c/p\u003e\u003cp\u003e\t3.3\tCập nhật chứng từ tàu và hàng vào hệ thống.\u003c/p\u003e\u003cp\u003e\t3.4\tKiểm tra và chuyển tiếp chứng từ yêu cầu của khách hàng cho bộ phận liên quan.\u003c/p\u003e\u003cp\u003e\t3.5\tBàn giao bộ chứng từ tàu và hàng hóa cho việc thanh toán.\u003c/p\u003e\u003cp\u003e\t3.6\tHướng dẫn và cập nhật đăng ký trực tuyến từ khách hàng và truyền tải dữ liệu khai thác.\u003c/p\u003e\u003cp\u003e\t3.7\tKiểm tra tính xác thực của đăng ký ra vào cho các hoạt động liên quan đến khai thác.\u003c/p\u003e\u003cp\u003e\t3.8\tXử lý khai báo giám sát hàng hóa và đăng ký trên các phần mềm.\u003c/p\u003e\u003cp\u003e\t3.9\tTuân thủ sự phân công và kế hoạch công việc từ Giám sát.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kiểm soát di chuyển an toàn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t4.1\tCập nhật cho khách hàng về quy định lưu thông trong cảng đối với người và phương tiện.\u003c/p\u003e\u003cp\u003e\t4.2\tPhối hợp với bộ phận An ninh an toàn giám sát lưu thông, đặc biệt đối với người đi bộ trong cảng.\u003c/p\u003e\u003cp\u003e\t4.3\tĐảm bảo hoạt động giám sát an toàn khai thác bằng CCTV liên tục\u003c/p\u003e\u003cp\u003e\t4.4\tPhối hợp với các bộ phận để ngăn chặn hành vi có khả năng gây ra sự cố khai thác.\u003c/p\u003e\u003cp\u003e\t4.5\tTham gia kiểm soát các hoạt động làm việc trên cao, trong hầm hàng và nơi làm việc an toàn tại hiện trường.\u003c/p\u003e\u003cp\u003e\t4.6\tCảnh báo điểm nóng, tắc nghẽn hoặc có nguy cơ va chạm cao cho các bên để cùng xử lý.\u003c/p\u003e\u003cp\u003e\t4.7\tBáo cáo cấp trên can thiệp khi sự cố ảnh hưởng nghiêm trọng đến hoạt động khai thác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Xử lý yêu cầu\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e5.1\tQuản lý việc nhận và phản hồi yêu cầu từ khách hàng nhằm giải quyết nhanh chóng, tránh ách tắc hoặc than phiền từ các bên.\u003c/p\u003e\u003cp\u003e\t5.2\tĐảm bảo việc chuyển tiếp yêu cầu của khách hàng cho đúng bộ phận, phòng ban phụ trách\u003c/p\u003e\u003cp\u003e\t5.3\tHướng dẫn khách hàng tuân thủ đúng qui định về yêu cầu dịch vụ khai thác.\u003c/p\u003e\u003cp\u003e\t5.4\tĐảm bảo việc hỗ trợ khách hàng đăng ký thông tin trực tuyến.\u003c/p\u003e\u003cp\u003e\t5.5\tPhối hợp với các bộ phận và phòng ban để tiếp giải quyết khiếu nại, thắc mắc hoặc tranh chấp các vấn đề liên quan đến khai thác hàng, dịch vụ cảng và cung ứng cho tàu.\u003c/p\u003e\u003cp\u003e\t5.6\tCập nhật kế hoạch cầu bến và tình trạng cầu bến cho Cảng vụ theo đúng quy định.\u003c/p\u003e\u003cp\u003e\t5.7\tBáo cáo cấp trên khi xung đột với khách hàng không thể giải quyết theo thẩm quyền.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Kiểm soát chứng từ tàu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\t6.1\tĐảm bảo khách hàng cập nhật chứng từ khai thác tàu kịp thời.\u003c/p\u003e\u003cp\u003e\t6.2\tKiểm soát việc cập nhật dữ liệu vào hệ thống khớp với khai báo của khách hàng.\u003c/p\u003e\u003cp\u003e\t6.3\tKiểm soát hoạt động xác thực và lưu trữ chứng từ tàu đúng quy định.\u003c/p\u003e\u003cp\u003e\t6.4\tĐảm bảo chứng từ tàu đúng với giao dịch thực tế và được xác nhận bởi các bên liên quan.\u003c/p\u003e\u003cp\u003e\t6.5\tBáo cấp trên khi có tranh chấp về số liệu khai thác tàu.\u003c/p\u003e\u003cp\u003e\t6.6\tGiải quyết các vấn đề liên quan đến chứng từ tàu.\u003c/p\u003e\u003cp\u003e\t6.7\tGiám sát việc kết toán số liệu cho nhà thầu.\u003c/p\u003e\u003cp\u003e\t6.8\tĐảm bảo các điều chỉnh hoặc thay đổi số liệu phải có chứng từ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Nhiệm vụ bổ sung\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e7.1\tTruyền tải yêu cầu và quy định về phòng chống dịch bệnh cho các bên liên quan đến hoạt động khai thác.\u003c/p\u003e\u003cp\u003e\t7.2\tSắp xếp nhân lực và báo cáo cấp trên trực tiếp khi có biến động.\u003c/p\u003e\u003cp\u003e\t7.3\tĐào tạo, huấn luyện và đánh giá năng lực nhân viên.\u003c/p\u003e\u003cp\u003e\t7.4\tHỗ trợ thử nghiệm và đánh giá phần mềm quản lý khai thác cảng.\u003c/p\u003e\u003cp\u003e\t7.5\tTuân thủ và đảm bảo nhân viên tuân theo chính sách, quy định của Công ty.\u003c/p\u003e\u003cp\u003e\t7.6\tThực hiện bất kỳ nhiệm vụ nào từ cấp quản lý trực tiếp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:T683,\u003cp\u003e1. Trình độ:\tTốt nghiệp ngành Hàng hải, Vận tải, Cảng, xuất nhập khẩu hoặc các lĩnh vực liên quan. Có kiến thức về hoạt động khai thác cảng và kinh nghiệm trong mảng giám sát.\t\t\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm:\tTối thiểu 03 năm kinh nghiệm trong lĩnh vực khai thác và 01 năm kinh nghiệm ở cấp giám sát hoặc tương đương\t\t\u003c/p\u003e\u003cp\u003e3. Kiến thức\t:\tChứng chỉ an toàn HSSE level 1,Chứng chỉ ISPS\t\t\u003c/p\u003e\u003cp\u003e4. Ngoại ngữ:\tTiếng anh giao tiếp cơ bản\t\t\u003c/p\u003e\u003cp\u003e5. Kỹ năng:\tKỹ năng giao tiếp, Kỹ năng giải quyết vấn đề, Kỹ năng lập kế hoạch, kỹ năng giám sát\t\t\u003c/p\u003e\u003cp\u003e6. Ý thức \u0026Thái độ:\tTrung thực, nhiệt tình, đạo đức, ý thức tuân thủ các quy định cao\t\t\u003c/p\u003e\u003cp\u003e7. Yêu cầu khác:\tCó tư duy an toàn, tư duy phân tích, tư duy định hướng kết quả công việc, tập trung vào khách hàng\t\t\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Mức lương thỏa thuận, hỗ trợ nhà ở \u003c/p\u003e\u003cp\u003e- B
