",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1826,"])</script><script>self.__next_f.push([1,"\u003cp\u003eĐơn vị\t:\tTrung tâm vận hành khai thác - Phòng khai thác cảng\u003c/p\u003e\u003cp\u003eCấp dưới trực tiếp\t:\tTrưởng nhóm các bộ phận (cổng, điều độ, hiện trường, kho)\u003c/p\u003e\u003cp\u003eBáo cáo\t:\u003c/p\u003e\u003cp\u003e- Cấp QL trực tiếp: Trưởng/ phó phòng khai thác\u003c/p\u003e\u003cp\u003e- Cấp QL gián tiếp: Giám đốc trung tâm khai thác\"\u003c/p\u003e\u003cp\u003eQuan hệ công việc (Phối hợp )\t:\u003c/p\u003e\u003cp\u003e- Với các Phòng trong Công ty: Kỹ thuật, Thương mại, CNTT, Kế toán, An Ninh An Toàn\u003c/p\u003e\u003cp\u003e- Với các tổ chức/cá nhân bên ngoài: Các đơn vị Cung cấp, Nhà thầu, Khách hàng, Đại lý tàu, Chủ hàng…\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eII. TÓM TẮT MỤC ĐÍCH CÔNG VIỆC\u003c/p\u003e\u003cp\u003eChịu trách nhiệm điều phối và giám sát các hoạt động khai thác của cảng, đảm bảo xử lý hàng hóa hiệu quả, duy trì các tiêu chuẩn an toàn và điều hành nguồn lực khai thác để đạt được các mục tiêu chiến thuật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eIII. CHỨC NĂNG, NHIỆM VỤ CỦA VỊ TRÍ CÔNG VIỆC\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Quản lý và điều hành hoạt động khai thác cảng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.1\tPhối hợp với phòng Thương mại để sắp xếp kế hoạch khai thác hàng hóa, kho bãi và cầu bến.\u003c/p\u003e\u003cp\u003e1.2\tTổ chức các bên liên quan để thảo luận kế hoạch hàng hóa và yêu cầu khai thác đặc biệt.\u003c/p\u003e\u003cp\u003e1.3\tĐảm bảo và gia tăng năng suất về hàng hóa, bãi và cầu bến.\u003c/p\u003e\u003cp\u003e1.4\tXử lý các ách tắc ảnh hưởng nghiêm trọng đến an toàn và hiệu quả khai thác.\u003c/p\u003e\u003cp\u003e1.6\tKiểm soát quá trình lập và triển khai kế hoạch khai thác theo mục tiêu và cam kết.\u003c/p\u003e\u003cp\u003e1.7\tĐảm bảo phương án dự phòng và hành động khắc phục sự cố liên quan đến hoạt động khai thác.\u003c/p\u003e\u003cp\u003e1.9\tKiểm soát các thay đổi về kế hoạch và triển khai nhằm đảm bảo việc hợp tác, mối quan hệ lâu dài với khách hàng, nhà thầu và mục tiêu tiết kiệm chi phí hoạt động.\u003c/p\u003e\u003cp\u003e1.10\tChịu trách nhiệm giải quyết tranh chấp hoạt động liên quan đến hàng hóa và tàu.\u003c/p\u003e\u003cp\u003e1.11\tPhối hợp với bộ phận an toàn và an ninh nhằm thực thi chính sách và quy định của công ty trong quá trình khai thác hàng hóa và tàu.\u003c/p\u003e\u003cp\u003e1.12\tQuản lý hoạt động cung ứng nguồn lực từ các nhà thầu nhằm đảm bảo mục tiêu khai thác an toàn và hiệu quả.\u003c/p\u003e\u003cp\u003e1.13\tDuy trì hoạt động khai thác liên tục theo yêu cầu, cam kết và quy định trong BCP (kế hoạch kinh doanh liên tục).\u003c/p\u003e\u003cp\u003e1.14\tTriển khai áp dụng quản lý rủi ro và hoạt động kinh doanh liên tục đã được phê duyệt vào hoạt động khai thác thực tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản lý nguồn lực\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e2.1\tĐảm bảo các bộ phận Chứng từ/Cổng, Điều độ, kế hoạch khai thác, sản xuất hoạt động khai thác liên tục.\u003c/p\u003e\u003cp\u003e2.2\tChỉ thị, hướng dẫn và kiểm soát kế hoạch, điều chỉnh và phương án dự phòng cho các bộ phận.\u003c/p\u003e\u003cp\u003e2.3\tĐảm bảo nguồn lực phục vụ khai thác trực tiếp cho các bộ phận.\u003c/p\u003e\u003cp\u003e2.4\tGắn kết các bộ phận khai thác, giữa các bộ phận và phòng ban khác để nhanh chóng xử lý các vấn đề liên quan đến khai thác.\u003c/p\u003e\u003cp\u003e2.5\tYêu cầu các bộ phận quản lý nhà thầu và thực hiện đánh giá năng lực.\u003c/p\u003e\u003cp\u003e2.6\tKiểm soát kết quả và điều chỉnh của hoạt động khai thác từ các bộ phận.\u003c/p\u003e\u003cp\u003e2.7\tĐảm bảo cơ sở dữ liệu và dịch vụ mà các bộ phận đã cung cấp cho khách hàng khớp với thực tế khai thác.\u003c/p\u003e\u003cp\u003e2.8\tGiải quyết xung đột, tồn đọng và yêu cầu từ các bộ phận.\u003c/p\u003e\u003cp\u003e2.9\tĐiều phối hoạt động cung cấp dịch vụ giữa các bộ phận nhằm hướng đến sự hài lòng của khách hàng.\u003c/p\u003e\u003cp\u003e2.10\tĐánh giá khoảng trống năng lực của từng thành viên khai thác và đưa ra các giải pháp cải thiện.\u003c/p\u003e\u003cp\u003e2.11\tTổ chức đào tạo, huấn luyện và kèm cặp nội bộ để phát triển đội ngũ của từng bộ phận.\u003c/p\u003e\u003cp\u003e2.12\tLiên kết hoạt động giữa các trưởng nhóm của bộ phận, giữa các thành viên và các bộ phận với nhau nhằm đạt mục tiêu an toàn và hiệu suất cao.\u003c/p\u003e\u003cp\u003e2.13\tKhảo sát, tổng hợp ý kiến và đề xuất từ các bộ phận nhằm đưa ra chiến lược phát triển cá nhân và đội ngũ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Điều phối khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e3.1\tTham dự cuộc họp về kế hoạch và dự án liên quan đến khai thác.\u003c/p\u003e\u003cp\u003e3.2\tTham gia cuộc họp cấp quản lý và ủy ban.\u003c/p\u003e\u003cp\u003e3.3\tTham gia thảo luận nội bộ về mục tiêu hoạt động khai thác an toàn và hiệu quả.\u003c/p\u003e\u003cp\u003e3.4\tGhi nhận và đánh giá năng lực nhà thầu.\u003c/p\u003e\u003cp\u003e3.5\tChỉ đạo triển khai hiện trường và đảm bảo kế hoạch được thực hiện theo đúng yêu cầu.\u003c/p\u003e\u003cp\u003e3.6\tĐảm bảo sự phối hợp giữa các phòng ban trong việc xử lý sự cố khai thác.\u003c/p\u003e\u003cp\u003e3.7\tDuy trì kết nối giữa Bộ phận điều độ-kế hoạch khai thác, Sản xuất và phòng Kỹ thuật cùng theo dõi và xử lý trục trặc của thiết bị.\u003c/p\u003e\u003cp\u003e3.8\tPhối hợp các phòng ban khác để đảm bảo việc cung cấp dịch vụ khai thác tốt nhất cho khách hàng.\u003c/p\u003e\u003cp\u003e3.9\tTham gia thảo luận với các phòng ban để hoàn thiện lỗ hổng liên quan đến hoạt động khai thác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e4.1\tBảo mật dữ liệu khai thác nhạy cảm.\u003c/p\u003e\u003cp\u003e4.2\tĐiều phối giải quyết tồn đọng từ cấp Trưởng nhóm trở xuống giữa các phòng ban.\u003c/p\u003e\u003cp\u003e4.3\tĐảm bảo nhân viên tuân thủ nội quy, chính sách và qui định của công ty\u003c/p\u003e\u003cp\u003e4.4\tThực hiện bất kỳ sự phân công nào từ Trưởng phòng Khai thác.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T749,\u003cp\u003eIV. TIÊU CHUẨN CHỨC DANH\u003c/p\u003e\u003cp\u003e1. Trình độ\t:\tCử nhân, chuyên ngành Hàng hải, Quản trị kinh doanh và Vận tải hoặc tương đương, có bằng thạc sĩ là lợi thế. Có kiến thức về ngành công nghiệp hàng hải và cảng biển.\t\t\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\t:\tTối thiểu 05 năm kinh nghiệm trong lĩnh vực liên quan về khai thác cảng, logistics, bao gồm 03 năm đảm nhiệm cấp bậc quản lý giám sát.\t\t\u003c/p\u003e\u003cp\u003e3. Kiến thức\t:\tChứng chỉ an toàn HSSE cấp 1, Chứng chỉ ISPS, Quản trị con người, Khai thác cảng, Năng lực hàng hải\t\t\u003c/p\u003e\u003cp\u003e4. Ngoại ngữ\t:\tThành thạo tiếng anh.\t\t\u003c/p\u003e\u003cp\u003e5. Kỹ năng\t:\tKỹ năng giao tiếp, Kỹ năng giải quyết vấn đề, Kỹ năng lập kế hoạch, kỹ năng ra quyết định, kỹ năng lãnh đạo đội nhóm\t\t\u003c/p\u003e\u003cp\u003e6. Ý thức \u0026Thái độ\t:\tTrung thực, nhiệt tình, đạo đức, ý thức tuân thủ các quy định cao\t\t\u003c/p\u003e\u003cp\u003e7. Yêu cầu khác\t:\tThành thạo các phần mềm về TOS, VNACCS, Có khả năng làm việc trong môi trường nhịp độ nhanh.\t\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Mức lương từ 25-40 triệu/tháng, hỗ trợ nhà ở \u003c/p\u003e\u003cp\u003e- BHXH, thẻ bảo hiểm chăm sóc sức khỏe\u003c/p\u003e\u003cp\u003e- Hỗ trợ nhà ở, xe đưa đón (nếu có)\u003c/p\u003e\u003cp\u003e- Khám sức khỏe định kỳ 1 năm/1 lần\u003c/p\u003e\u003cp\u003e- Hỗ trợ cơm trưa\u003c/p\u003e\u003cp\u003e- Teambuilding\u003c/p\u003e\u003cp\u003e- Thưởng các ngày lễ lớn, sinh nhật, lỳ xì đầu năm, .\u003c/p\u003e\u003cp\u003eNgoài ra, tặng thưởng con NLĐ có kết quả học tập tốt, trung thu, 1/6\u003c/p\u003e\u003cp\u003e- Thưởng lương tháng 13, thưởng hiệu quả công việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*Địa điểm làm việc: \u003c/strong\u003eThôn Mỹ Thuỷ, xã Mỹ Thuỷ, tỉnh Quảng Trị\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e27:T1826,"])</script><script>self.__next_f.push([1,"\u003cp\u003eĐơn vị\t:\tTrung tâm vận hành khai thác - Phòng khai thác cảng\u003c/p\u003e\u003cp\u003eCấp dưới trực tiếp\t:\tTrưởng nhóm các bộ phận (cổng, điều độ, hiện trường, kho)\u003c/p\u003e\u003cp\u003eBáo cáo\t:\u003c/p\u003e\u003cp\u003e- Cấp QL trực tiếp: Trưởng/ phó phòng khai thác\u003c/p\u003e\u003cp\u003e- Cấp QL gián tiếp: Giám đốc trung tâm khai thác\"\u003c/p\u003e\u003cp\u003eQuan hệ công việc (Phối hợp )\t:\u003c/p\u003e\u003cp\u003e- Với các Phòng trong Công ty: Kỹ thuật, Thương mại, CNTT, Kế toán, An Ninh An Toàn\u003c/p\u003e\u003cp\u003e- Với các tổ chức/cá nhân bên ngoài: Các đơn vị Cung cấp, Nhà thầu, Khách hàng, Đại lý tàu, Chủ hàng…\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eII. TÓM TẮT MỤC ĐÍCH CÔNG VIỆC\u003c/p\u003e\u003cp\u003eChịu trách nhiệm điều phối và giám sát các hoạt động khai thác của cảng, đảm bảo xử lý hàng hóa hiệu quả, duy trì các tiêu chuẩn an toàn và điều hành nguồn lực khai thác để đạt được các mục tiêu chiến thuật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eIII. CHỨC NĂNG, NHIỆM VỤ CỦA VỊ TRÍ CÔNG VIỆC\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Quản lý và điều hành hoạt động khai thác cảng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.1\tPhối h .4\tGắn kết các bộ phận khai thác, giữa các bộ phận và phòng ban khác để nhanh chóng xử lý các vấn đề liên quan đến khai thác.\u003c/p\u003e\u003cp\u003e2.5\tYêu cầu các bộ phận quản lý nhà thầu và thực hiện đánh giá năng lực.\u003c/p\u003e\u003cp\u003e2.6\tKiểm soát kết quả và điều chỉnh của hoạt động khai thác từ các bộ phận.\u003c/p\u003e\u003cp\u003e2.7\tĐảm bảo cơ sở dữ liệu và dịch vụ mà các bộ phận đã cung cấp cho khách hàng khớp với thực tế khai thác.\u003c/p\u003e\u003cp\u003e2.8\tGiải quyết xung đột, tồn đọng và yêu cầu từ các bộ phận.\u003c/p\u003e\u003cp\u003e2.9\tĐiều phối hoạt động cung cấp dịch vụ giữa các bộ phận nhằm hướng đến sự hài lòng của khách hàng.\u003c/p\u003e\u003cp\u003e2.10\tĐánh giá khoảng trống năng lực của từng thành viên khai thác và đưa ra các giải pháp cải thiện.\u003c/p\u003e\u003cp\u003e2.11\tTổ chức đào tạo, huấn luyện và kèm cặp nội bộ để phát triển đội ngũ của từng bộ phận.\u003c/p\u003e\u003cp\u003e2.12\tLiên kết hoạt động giữa các trưởng nhóm của bộ phận, giữa các thành viên và các bộ phận với nhau nhằm đạt mục tiêu an toàn và hiệu suất cao.\u003c/p\u003e\u003cp\u003e2.13\tKhảo sát, tổng hợp ý kiến và đề xuất từ các bộ phận nhằm đưa ra chiến lược phát triển cá nhân và đội ngũ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Điều phối khai thác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e3.1\tTham dự cuộc họp về kế hoạch và dự án liên quan đến khai thác.\u003c/p\u003e\u003cp\u003e3.2\tTham gia cuộc họp cấp quản lý và ủy ban.\u003c/p\u003e\u003cp\u003e3.3\tTham gia thảo luận nội bộ về mục tiêu hoạt động khai thác an toàn và hiệu quả.\u003c/p\u003e\u003cp\u003e3.4\tGhi nhận và đánh giá năng lực nhà thầu.\u003c/p\u003e\u003cp\u003e3.5\tChỉ đạo triển khai hiện trường và đảm bảo kế hoạch được thực hiện theo đúng yêu cầu.\u003c/p\u003e\u003cp\u003e3.6\tĐảm bảo sự phối hợp giữa các phòng ban trong việc xử lý sự cố khai thác.\u003c/p\u003e\u003cp\u003e3.7\tDuy trì kết nối giữa Bộ phận điều độ-kế hoạch khai thác, Sản xuất và phòng Kỹ thuật cùng theo dõi và xử lý trục trặc của thiết bị.\u003c/p\u003e\u003cp\u003e3.8\tPhối hợp các phòng ban khác để đảm bảo việc cung cấp dịch vụ khai thác tốt nhất cho khách hàng.\u003c/p\u003e\u003cp\u003e3.9\tTham gia thảo luận với các phòng ban để hoàn thiện lỗ hổng liên quan đến hoạt động khai thác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e4.1\tBảo mật dữ liệu khai thác nhạy cảm.\u003c/p\u003e\u003cp\u003e4.2\tĐiều phối giải quyết tồn đọng từ cấp Trưởng nhóm trở xuống giữa các phòng ban.\u003c/p\u003e\u003cp\u003e4.3\tĐảm bảo nhân viên tuân thủ nội quy, chính sách và qui định của công ty\u003c/p\u003e\u003cp\u003e4.4\tThực hiện bất kỳ sự phân công nào từ Trưởng phòng Khai thác.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:T749,\u003cp\u003eIV. TIÊU CHUẨN CHỨC DANH\u003c/p\u003e\u003cp\u003e1. Trình độ\t:\tCử nhân, chuyên ngành Hàng hải, Quản trị kinh doanh và Vận tải hoặc tương đương, có bằng thạc sĩ là lợi thế. Có kiến thức về ngành công nghiệp hàng hải và cảng biển.\t\t\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\t:\tTối thiểu 05 năm kinh nghiệm trong lĩnh vực liên quan về khai thác cảng, logistics, bao gồm 03 năm đảm nhiệm cấp bậc quản lý giám sát.\t\t\u003c/p\u003e\u003cp\u003e3. Kiến thức\t:\tChứng chỉ an toàn HSSE cấp 1, Chứng chỉ ISPS, Quản trị con người, Khai thác cảng, Năng lực hàng hải\t\t\u003c/p\u003e\u003cp\u003e4. Ngoại ngữ\t:\tThành thạo tiếng anh.\t\t\u003c/p\u003e\u003cp\u003e5. Kỹ năng\t:\tKỹ năng giao tiếp, Kỹ năng giải quyết vấn đề, Kỹ năng lập kế hoạch, kỹ năng ra quyết định, kỹ năng lãnh đạo đội nhóm\t\t\u003c/p\u003e\u003cp\u003e6. Ý thức \u0026Thái độ\t:\tTrung thực, nhiệt tình, đạo đức, ý thức tuân thủ các quy định cao\t\t\u003c/p\u003e\u003cp\u003e7. Yêu cầu khác\t:\tThành thạo các phần mềm về TOS, VNACCS, Có khả năng làm việc trong môi trường nhịp độ nhanh.\t\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u00
