and gather client information based on industry insights and the client’s financial data.\u003c/p\u003e\u003cp\u003e• Identify client needs and determine the Customer Value - Proposition (CVP) and hook product to acquire new clients. Design and provide advisory on optimal financial plans for clients.\u003c/p\u003e\u003cp\u003e• Establish ACP and actions to achieve ACP\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Accountabilities (2)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Maintain and strengthen strategic-level relationships with all clients in the team’s portfolio, including members of the Board of Directors and Executive Board.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProduct Advisory:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Credit Products:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Prepare identification reports and perform customer identification in accordance with periodic regulations.\u003c/p\u003e\u003cp\u003e• Coordinate with the Credit Appraisal team and other relevant parties (including Legal) to:\u003c/p\u003e\u003cp\u003e(1) Collect documentation, conduct detailed appraisal, and build cash flow;\u003c/p\u003e\u003cp\u003e(2) Discuss and negotiate terms with clients;\u003c/p\u003e\u003cp\u003e(3) Agree on conditions and credit limits;\u003c/p\u003e\u003cp\u003e(4) Submit for approval.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Non-Credit Products:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Collaborate with the Global Transaction Banking Advisory team to implement solutions for clients.\u003c/p\u003e\u003cp\u003eSales Performance Management:\u003c/p\u003e\u003cp\u003e• Manage, develop, and grow relationships with clients in the assigned portfolio to ensure achievement of business targets.\u003c/p\u003e\u003cp\u003e• Provide customer care to deliver the best possible sales service experience.\u003c/p\u003e\u003cp\u003e• Engage regularly to strengthen connections and maintain long-term relationships with clients.\u003c/p\u003e\u003cp\u003e• Act as the primary point of contact for information and client engagement to increase transaction volume across the entire value chain and related client groups within Techcombank.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDebt Management:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Ensure strong control over the debt quality across the entire managed client portfolio.\u003c/p\u003e\u003cp\u003e• Update the Account Coverage Plan (ACP) in case of changes in the client’s business plan that impact the annual exploitation strategy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Accountabilities (3)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCapability Development:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Participate in designing professional capability development training programs; organize knowledge-sharing sessions on industry trends and global best practices.\u003c/p\u003e\u003cp\u003e• Develop a personal growth roadmap.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCorporate Culture:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Understand and consistently apply organizational values and behavioral standards as prescribed by the Bank.\u003c/p\u003e\u003cp\u003eOther Responsibilities:\u003c/p\u003e\u003cp\u003e• Perform other tasks as assigned by the Unit Director.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T657,“Nếu bạn có động lực, tự tin và sẵn sàng làm việc hết mình, hãy GIA NHẬP CHÚNG TÔI. Chúng tôi mang đến cho bạn cơ hội hiện thực hóa các khả năng của bạn trong một môi trường làm việc đầy thách thức nhưng cũng rất thân thiện, nơi các nhân viên ưa thích chế độ lương thưởng cao tương ứng với hiệu quả làm việc, cơ hôi phát triển nghề nghiệp nhanh chóng và kinh nghiệm học hỏi ưu việt từ những nhà lãnh đạo đẳng cấp quốc tế”\r\nCông ty  hàng đầu\r\n•\tMột trong những ngân hàng hàng đầu và phát triển nhanh nhất tại Việt Nam.\r\n•\tVới đội ngũ lãnh đạo có sức thuyết phục đối với CBNV tr
