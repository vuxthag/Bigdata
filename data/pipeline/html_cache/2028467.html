wards your contributions.\r\n\r\n2. Innovate with Cutting-Edge Technology\r\n- Impactful Ownership: Take charge of large-scale projects impacting millions of users, driving real-world change.\r\n- Advanced Tech Stack: Work with the latest tools and technologies, backed by continuous investment to keep you at the forefront of innovation.\r\n\r\n3. Vibrant \u0026 Supportive Workplace\r\n- Inspiring Environment: Collaborate in a modern office featuring a fully stocked pantry, in-house café, and a comfortable, creative workspace.\r\n- Unique Experiences: Join our Annual Summer Summit, Year-end Party, Town Halls, and team-bonding events at 5-star venues.\r\n- Active Lifestyle: Stay fit with our Health Boost Clubs (Football, Badminton, and more) and access our in-house Mini Gym.\r\n\r\n4. Unlimited Growth Opportunities\r\n- Continuous Learning: Benefit from ongoing training programs to sharpen your skills and stay ahead.\r\n- Dedicated Development: Managers enjoy a tailored Training \u0026 Development budget to fuel professional growth.\r\n- Clear Career Path: Unlock your potential with transparent career progression opportunities designed to elevate your journey.\r\n\r\nJoin Crossian and be part of a dynamic, forward-thinking community where your talent is celebrated, and your growth knows no bounds."])</script><script>self.__next_f.push([1,"24:Ta61,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eABOUT THE ROLE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCrossian is a high-growth technology-driven e-commerce business. Behind our success is our people. As a start-up formed in 2020, we have created a fast-paced and dynamic environment, enabling our people to reach a cumulative average growth rate of over 1000% in the last 3 years. Our mission now is to build direct-to-consumer brands and increase customer lifetime value.\u003c/p\u003e\u003cp\u003eAs a Content Marketing Specialist at Crossian, you will employ your expertise in product research, target audience analysis, copywriting and content strategy to generate the most effective digital/ product marketing content, including social media ad content and product descriptions. Reporting to our Marketing Manager, you will collaborate with our in-house teams (Graphics, Video, Performance Marketing, etc.) to make your ideas become reality, bringing added value to the customer and our business.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThis is a challenging but exciting digital content marketing position\u003c/strong\u003e that will expand your horizons in digital/ product marketing. As a result, you will be rewarded and appreciated accordingly. Now the answer is up to you: Are you ready to join the crew?\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWHAT YOU WILL DO\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContent Strategy and Planning\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBe the market guru, identifying US customer trends, consumer preferences, and competitor move\u003c/p\u003e\u003cp\u003e•\tMastermind go-to-market digital/ product marketing strategy for selected products that keeps engagement high and conversions rolling in\u003c/p\u003e\u003cp\u003eContent Creation and Distribution \u003c/p\u003e\u003cp\u003e•\tOversee the production of top-tier content, from viral video creatives to jaw-dropping websites\u003c/p\u003e\u003cp\u003e•\tStay up-to-date with industry trends and best practices in digital/ product marketing, implementing innovative strategies to drive results\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAnalytics and Performance Optimization\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKeep a keen eye on digital content performance and metrics, optimizing for conversions\u003c/p\u003e\u003cp\u003e•\tUtilize data insights to identify areas for improvement and make data-driven decisions to optimize conversion rate\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCross-functional Collaboration\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCollaborate with Graphics and Video teams, and other creators to make visually impactful content\u003c/p\u003e\u003cp\u003e•\tCollaborate with in-house teams to make sure selected product features meet industry quality standards; marketing collaterals align with market trends and customer needs\u003c/p\u003e\u003cp\u003e•\tCollaborate with Performance Marketing team to track, analyze, and report on sales, advertising metrics and KPIs to measure marketing campaign effectiveness\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T9ed,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eWHAT WE ARE LOOKING FOR\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWork experience:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\t2-3 years of experience in digital/ product content marketing\u003c/p\u003e\u003cp\u003e•\t Proven career advancement in digital/ product content marketing or holding an equivalent title in previous role(s)\u003c/p\u003e\u003cp\u003e•\tTrack record of digital/ product content creation\u003c/p\u003e\u003cp\u003e•\tTrack record of producing viral videos or building a personal/commercial brand presence on TikTok/Facebook is a plus.\u003c/p\u003e\u003cp\u003e•\tExperience in e-commerce/ facebook ads/ email marketing or as a retail/ e-commerce shop owner is a plus\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSkills:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCopywriting in English/ graphic design briefing/ video briefing skills\u003c/p\u003e\u003cp\u003e•\tCritical thinking and problem solving skills\u003c/p\u003e\u003cp\u003e•\tResearch, task management and collaboration skills\u003c/p\u003e\u003cp\u003e•\tPresentation or training/ mentoring/ coaching skill is a plus\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOther qualifications:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCustomer-centric and proactiv
