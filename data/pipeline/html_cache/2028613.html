lý và Tư vấn hàng đầu Việt Nam về Lãnh đạo, Công nghệ và Phát triển Bền vững, VIETSTAR cam kết tiếp tục phát huy giá trị cốt lõi đã xây dựng trong gần hai thập kỷ, đồng thời đổi mới mạnh mẽ bằng việc ứng dụng các mô hình quản trị tiên tiến, kế thừa kinh nghiệm quốc tế để mang đến những giải pháp thực tiễn, giúp lãnh đạo và doanh nghiệp phát triển bền vững.\r\n\r\nHỆ SINH THÁI GIẢI PHÁP TOÀN DIỆN VIETSTAR\r\nNhằm hỗ trợ các doanh nghiệp một cách toàn diện, VIETSTAR phát triển hệ sinh thái giải pháp theo bốn trụ cột chiến lược: Đào tạo – Tư vấn – Kết nối – Chia sẻ, bao gồm:\r\n\r\n* Dẫn đầu Đào tạo Lãnh đạo và Quản lý tại nước ngoài\r\n* Tiên phong trong đào tạo Lãnh đạo tích hợp Công nghệ\r\n* Tư vấn ESG và Phát triển bền vững\r\n* Nhà sáng lập Diễn đàn Quản trị Cấp cao Việt Nam – Singapore\r\n\r\nVới gần hai thập kỷ đồng hành cùng các doanh nghiệp, VIETSTAR đã tạo dựng được niềm tin và vị thế vững chắc trong ngành. VIETSTAR cam kết tiếp tục đổi mới, sáng tạo và mang lại các giải pháp đột phá nhằm thúc đẩy sự phát triển bền vững của cộng đồng doanh nghiệp Việt Nam, nâng cao vị thế trên trường quốc tế.\r\n\r\nWebsite: www.vietstar.edu.vn"])</script><script>self.__next_f.push([1,"24:T6ce,\u003cp\u003e\u003cstrong\u003eA.\tVị trí tuyển dụng: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrưởng Nhóm Tư Vấn Khách Hàng Doanh Nghiệp (Lead, Corporate Consulting \u0026 Training) \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLương từ 30 triệu/ tháng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB.\tMô tả công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1: TƯ VẤN GIẢI PHÁP \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• \tTiếp nhận data khách hàng từ Marketing và tư vấn các Khóa đào tạo phù hợp cho mục tiêu phát triển Doanh nghiệp\u003c/p\u003e\u003cp\u003e• \tCó chuyên môn phân tích, đánh giá nỗi đau khách hàng để tư vấn chuyển đổi khách hàng tiềm năng thành học viên tham gia các chương trình đào tạo phù hợp \u003c/p\u003e\u003cp\u003e• \tCó kinh nghiệm về Phát triển sản phẩm, phát triển khách hàng để đảm bảo các chỉ số kinh doanh: tỷ lệ chuyển đổi, doanh thu và tăng trưởng theo tháng.\u003cstrong\u003e \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. PHÁT TRIỂN KHÁCH HÀNG DOANH NGHIỆP \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• \tXây dựng và triển khai kế hoạch quảng bá các chương trình đào tạo trong cộng đồng doanh nghiệp. \u003c/p\u003e\u003cp\u003e• \tXây dựng triển khai kế hoạch quảng bá các chương trình đào tạo tới Khối khách hàng Doanh nghiệp (Thiết lập cuộc găp; Trình bày giải pháp...) \u003c/p\u003e\u003cp\u003e• \tPhát triển hợp tác cùng các Doanh nghiệp/ Hiệp hội để Phát triển các Chương trình đào tạo của VIỆN. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tBÁO CÁO ĐỊNH KỲ \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• \tBáo cáo định kỳ về kết quả kinh doanh và KPI cho Ban Giám đốc. \u003c/p\u003e\u003cp\u003e• \tPhân tích dữ liệu và đề xuất cải tiến chiến lược marketing \u0026 kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e25:Tbef,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYêu cầu ứng viên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Cao đẳng/Đại học các chuyên ngành: Kinh tế, Quản trị Kinh doanh, Marketing hoặc lĩnh vực liên quan.\u003c/p\u003e\u003cp\u003e• Độ tuổi: 27 – 40 tuổi.\u003c/p\u003e\u003cp\u003e• Có \u003cstrong\u003etối thiểu 3 năm kinh nghiệm\u003c/strong\u003e ở vị trí Trưởng nhóm/Trưởng phòng kinh doanh.\u003c/p\u003e\u003cp\u003e• Ưu tiên ứng viên có kinh nghiệm trong ngành giáo dục, đào tạo hoặc B2B sales.\u003c/p\u003e\u003cp\u003e• Có network với cộng đồng doanh nghiệp hoặc lãnh đạo doanh nghiệp là lợi thế.\u003c/p\u003e\u003cp\u003e• Kỹ năng quản lý đội nhóm và xây dựng kế hoạch kinh doanh.\u003c/p\u003e\u003cp\u003e• Khả năng phân tích dữ liệu và đo lường hiệu quả hoạt động kinh doanh.\u003c/p\u003e\u003cp\u003e• Chủ động, trách nhiệm cao và sẵn sàng chinh phục mục tiêu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Thu nhập: 30 - 45tr \u003c/strong\u003e(Lương cứng+ Phụ cấp+ Hoa hồng)\u003c/p\u003e\u003cp\u003e• Lương cứng: 15 - 18 tr/Tháng (Tuỳ năng lực)\u003c/p\u003e\u003cp\u003e• Được tham gia các chương trình đào tạo nội bộ nâng cao chuyên môn, nghiệp vụ định kỳ trong và ngoài nước.\u003c/p\u003e\u003cp\u003e• Làm việc trong môi trường năng động, hòa đồng, chuyên nghiệp và hiện đại, có nhiều cơ hội tiếp xúc với các chuyên gia hàng đầu tại Việt Nam và Quốc tế.\u003c/p\u003e\u003cp\u003e• Hưởng đầy đủ BHXH, BHYT, BHTN… theo luật Lao động và các chính sách khác\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVề nhà tuyển dụng:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eViện Quản Lý và Tư Vấn VIETSTAR được sáng lập bởi các Nhà quản lý cấp cao và chuyên gia giàu kinh nghiệm trong lĩnh vực Đào tạo và Tư vấn trong nước cũng như quốc tế. \u003c/p\u003e\u003cp\u003eTrải qua gần 20 năm hình thành và phát triển, VIETSTAR đã tạo dựng được vị thế vững vàng trong Đào tạo quản trị cấp cao và Tư vấn doanh nghiệp theo thông lệ quốc tế tốt nhất tại Việt Nam cũng như các nước ASEAN. Năm 2025 đánh dấu một cột mốc chuyển mình quan trọng khi VIETSTAR chính thức chuyển đổi mô hình hoạt động thành Viện Quản lý và Tư vấn VIETSTAR (VIETSTAR Institute of Management \u0026 Consulting). \u003c/p\u003e\u003cp\u003eSự chuyển đổi này thể hiện tầm nhìn dài hạn: Trở thành Viện Quản lý hàng đầu ASEAN về Lãnh đạo và Quản trị cấp cao. Chiến lược phát triển của VIESTAR giai đoạn 2025 – 2030 sẽ tập trung vào 3 Lĩnh vực trọng tâm: \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Đào tạo tại Nước ngoài \u003c/str
