ected ocean carriers and airlines, giving you the guarantee that your shipment will reach the destin"])</script><script>self.__next_f.push([1,"ation safely and on time.\r\nWe acknowledge that your shipment is not only cargo but also your reputation to your esteemed customers. Therefore, we always keep in our mind that your reputation is our reputation. Day or night, holidays or working days, we are always ready for your calls to care your cargo.\r\nIn short, we live up to our promise “Fast, Safe, Effective and Competitive Price” – We provide you a “Your integrated logistics solution”.24:T5e1,\u003cp\u003e•\tTham gia xây dựng chiến lược bán hàng phù hợp với tình hình thị trường và định hướng của công ty nhằm tối đa hóa tăng trưởng doanh số và thị phần  \u003c/p\u003e\u003cp\u003e•\tPhát triển thị trường và tìm kiếm khách hàng tiềm năng. Xây dựng, duy trì mối quan hệ với đối tác và mở rộng thị trường mục tiêu.\u003c/p\u003e\u003cp\u003e•\tPhát triển đội ngũ kinh doanh theo định hướng phát triển của Công ty, tinh gọn và hiệu quả.\u003c/p\u003e\u003cp\u003e•\tTrực tiếp giao dịch, đàm phán với khách hàng trên nguyên tắc đảm bảo sự hài hòa về lợi ích cho Công ty và khách hàng để thiết lập các điều khoản và điều kiện của hợp đồng  \u003c/p\u003e\u003cp\u003e•\tKhảo sát, nghiên cứu và phân tích thị trường. Đề xuất các cải tiến cho dịch vụ để phù hợp với nhu cầu thị trường.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ nhân viên sales trong công tác bán hàng và duy trì mối quan hệ với khách hàng\u003c/p\u003e\u003cp\u003e•\tPhối hợp nhịp nhàng, hiệu quả với các phòng ban/chi nhánh để cung cấp dịch vụ phù hợp nhất nhằm thỏa mãn nhu cầu khách hàng\u003c/p\u003e\u003cp\u003e•\tSắp xếp nguồn lực trong team khoa học, hiệu quả; đảm bảo phát huy ưu điểm của từng thành viên và văn hoá làm việc teamwork \u003c/p\u003e\u003cp\u003e•\tHoàn thành chỉ tiêu phòng ban KPI\u003c/p\u003e\u003cp\u003e•\tCác công việc khác theo sự phân công của BGĐ\u003c/p\u003e25:T88d,"])</script><script>self.__next_f.
