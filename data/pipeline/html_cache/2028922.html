ng đầu — kết hợp hài hòa giữa chuẩn mực công nghệ Nhật Bản và sự thấu hiểu thị trường địa phương để mang đến những giải pháp sống thông minh, tiện nghi hơn cho các gia đình Việt.\r\n\r\nHiện nay, chúng tôi hoạt động trong sáu nhóm ngành hàng chủ lực với hơn 20 dòng sản phẩm, bao gồm: tủ lạnh, máy giặt, máy lạnh, thiết bị gia dụng nhỏ, giải pháp lọc nước và giải pháp nhà bếp. Với đội ngũ hơn 300 nhân sự tận tâm cùng mạng lưới hơn 100 trung tâm bảo hành ủy quyền trên toàn quốc, Toshiba Lifestyle Việt Nam không ngừng mang đến những sản phẩm đáng tin cậy và dịch vụ hậu mãi vượt trội cho hàng triệu gia đình trên khắp cả nước.\r\n\r\nKế thừa tinh hoa chất lượng Nhật Bản, chúng tôi tin rằng “Details Matter” – \"Chú trọng đến từng chi tiết\" tạo nên sự khác biệt.\r\n\r\nCác giá trị cốt lõi của chúng tôi — Aiming High (Khát vọng vươn cao), Dedication \u0026 Commitment (Tận tâm \u0026 Cam kết), Inclusion \u0026 Partnership (Hợp tác \u0026 Đồng hành), Transformation \u0026 Innovation (Chuyển hóa \u0026 Đổi mới), và Customer First (Khách hàng là trọng tâm) — là kim chỉ nam cho mọi hoạt động, chiến lược, định hướng kinh doanh. Những giá trị này truyền cảm hứng để chúng tôi không ngừng đổi mới, hoàn thiện và mang đến những điều tốt đẹp hơn cho mỗi mái ấm Việt Nam."])</script><script>self.__next_f.push([1,"24:Tbb3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eSummary :\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eSố lượng UV tuyển dụng: 1\u003cstrong\u003e \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kênh GT: làm việc tại Tp.HCM \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm quản lý và phát triển các khách hàng Key Account kênh GT; đảm bảo hoàn thành chỉ tiêu doanh số, kiểm soát công nợ, phối hợp triển khai các hoạt động bán hàng – marketing và duy trì mối quan hệ bền vững với nhà phân phối/đại lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResponsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tQuản lý doanh số \u0026 kế hoạch bán hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTheo dõi tiến độ bán hàng (sales progress) và đảm bảo hoàn thành chỉ tiêu doanh số được giao theo tháng/quý/năm.\u003c/p\u003e\u003cp\u003e-\tPhân tích kết quả Sell-in/Sell-through, tồn kho, độ phủ GT và đề xuất giải pháp thúc đẩy bán hàng.\u003c/p\u003e\u003cp\u003e-\tPhối hợp với đội ngũ Sell-out để mở rộng độ phủ kênh GT và phát triển sub-dealer.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tQuản lý công nợ \u0026 tài chính khách hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTrực tiếp theo dõi và xử lý công nợ phải thu (AR).\u003c/p\u003e\u003cp\u003e-\tLà đại diện của công ty làm việc với khách hàng trong việc đối soát công nợ.\u003c/p\u003e\u003cp\u003e-\tChịu trách nhiệm đối soát chiết khấu, hoàn thiện chứng từ và thực hiện thủ tục thanh toán sau khi chốt tháng.\u003c/p\u003e\u003cp\u003e-\tPhối hợp với phòng Tài chính/ Kế toán nhằm đảm bảo công nợ được kiểm soát đúng chính sách.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tQuản lý chương trình bán hàng \u0026 marketing\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tPhân tích tình hình kinh doanh và đề xuất các chương trình khuyến mãi, hoạt động marketing phù hợp cho từng dealer/khu vực.\u003c/p\u003e\u003cp\u003e-\tPhối hợp triển khai, theo dõi hiệu quả chương trình và báo cáo kết quả sau khi kết thúc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tChăm sóc khách hàng \u0026 dịch vụ sau bán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tXây dựng và duy trì mối quan hệ tốt với dealer, đảm bảo Toshiba là nhà cung cấp được ưu tiên.\u003c/p\u003e\u003cp\u003e-\tTiếp nhận, phối hợp xử lý các vấn đề liên quan đến dịch vụ hậu mãi (SVC) và hỗ trợ dealer trong quá trình kinh doanh.\u003c/p\u003e\u003cp\u0
