003e\u003cp\u003e• Khởi tạo dự án: Xác định mục tiêu, phạm vi công việc dự án, các nguồn lực dự kiến của dự án, các bên liên quan tương tác đến dự án.\u003c/p\u003e\u003cp\u003e• Lập dự án (bao gồm phương án và kế hoạch dự án), dựa trên phạm vi công việc, chi phí và các mốc cần hoàn thành của dự án. Chia nhỏ các công việc, thứ tự các công việc cần thực hiện và đề xuất nhân sự thực hiện dự kiến.\u003c/p\u003e\u003cp\u003e• Đề xuất tiêu chuẩn và số lượng nhân sự cần tham gia dự án theo từng giai đoạn của kế hoạch dự án.\u003c/p\u003e\u003cp\u003e• Quản lý tiến độ và chất lượng dự án\u003c/p\u003e\u003cp\u003e• Kiểm soát tiến độ các công việc của dự án, của thành viên dự án theo kế hoạch.\u003c/p\u003e\u003cp\u003e• Thực hiện các hoạt động dự án tuân thủ theo đúng quy trình yêu cầu.\u003c/p\u003e\u003cp\u003e• Quản lý các vấn đề, rủi ro có thể phát sinh trong quá trình thực hiện dự án (về tiến độ, nhân sự, chi phí, môi trường dự án, điều kiện đảm bảo, ...). Từ đó đề xuất giải pháp và kế hoạch xử lý vấn đề, phòng tránh rủi ro.\u003c/p\u003e\u003cp\u003e• Quản lý doanh thu chi phí của dự án\u003c/p\u003e\u003cp\u003e• Quản lý đối tác outsource để đảm bảo tiến độ, chất lượng và quy trình của Tập đoàn (nếu có)\u003c/p\u003e\u003cp\u003e• Phối hợp QA, QC đánh giá quy trình, chất lượng hệ thống.\u003c/p\u003e\u003cp\u003e• Nghiệm thu với khách hàng.\u003c/p\u003e\u003cp\u003e• Đóng dự án\u003c/p\u003e\u003cp\u003e• Thực hiện các thủ tục kết thúc dự án\u003c/p\u003e\u003cp\u003e• Cập nhật tài liệu, bài học kinh nghiệm của dự án.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:Tbeb,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e2. Ai là “chân ái” cho vị trí này?\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Bằng cấp: Tốt nghiệp Đại học (loại Khá trở lên) chuyên ngành CNTT, Điện tử Viễn thông, Khoa học Máy tính, Toán Tin Ứn
