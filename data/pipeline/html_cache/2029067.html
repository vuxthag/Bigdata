d being able to do so in a respons"])</script><script>self.__next_f.push([1,"ive manner to meet the demands of our clients and local market factors.\r\n\r\nMore than 10 years of company experience has seen our company deliver to a high standard and with client satisfaction on government projects, industrial ventures, infrastructure and heavy industry projects as well as a long history with major foreign entities within the Vietnam oil and gas sector.\r\n\r\nCông ty TNHH Xây Dựng Mô-Đun TLC (TLC) hoạt động trong các lĩnh vực chính: tư vấn, thầu xây dựng và sản xuất nhà ở di động:\r\n- Lĩnh vực tư vấn và thầu xây dựng công trình hạ tầng: Thiết kế và thi công nhà xưởng và các công trình hạ tầng; Thiết kế kiến trúc; Giám sát thi công và quản lý xây dựng\r\n- Lĩnh vực sản xuất và gia công: TLC chuyên sản xuất và xuất khẩu nhà ở di động (cabin) theo thiết kế và nhu cầu thực tế của khách hàng đạt tiêu chuẩn quốc tế.\r\n\r\nwww.tlcvietnam.com.vn24:T14e2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMô tả công việc/ Job description\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eỨng viên phù hợp 1 trong 3 mô tả công việc. Vui lòng apply\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBIM CORDINATOR\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e1. Hỗ trợ trong việc thiết lập, duy trì và quản lý tiêu chuẩn, giao thức, và quá trình ứng dụng BIM trong dự án.\u003c/p\u003e\u003cp\u003e\u003cem\u003eAssist in developing, maintaining, and managing BIM standards, protocols, and project BIM implementation.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e2. Quản lý, thực hiện và phối hợp các quy trình liên quan đến BIM, bao gồm phát hiện xung đột, phối hợp mô hình và trao đổi thông tin.\u003c/p\u003e\u003cp\u003e\u003cem\u003e Manage, perform and coordinate BIM-related workflows, including clash detection, model coordination, and information exchange.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e3. Phối hợp với kế hoạch viên để tạo ra mô phỏng 4D nếu cần thiết.\u003c/p\u003e\u003cp\u003e\u003cem\u003e Coordinate with planner to generate 4D simulation if required.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e4. Tiến hành cuộc họp điều phối BIM định kì giữa các bên liên quan để giải quyết các xung đột.\u003c/p\u003e\u003cp\u003e\u003cem\u003e Conduct regular BIM coordination meetings between related parties to resolve the detected clashes.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e5. Chia sẻ báo cáo xung đột và mô hình phối hợp với các bên liên quan (thiết kế, sản xuất, thi công, nhà cung cấp, QS, QA-QC, quản lý dự án, v.v.).\u003c/p\u003e\u003cp\u003e\u003cem\u003e Share the clash/issue report and federated models with related stakeholders (architect, engineer, consultant, workshop, contractor, QS, QA-QC, project manager, etc.)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e6. Tiến hành định kỳ kiểm tra và báo cáo các mô hình và dữ liệu BIM để đảm bảo tính chính xác, toàn vẹn và nhất quán của dữ liệu và mô hình BIM.\u003c/p\u003e\u003cp\u003e\u003cem\u003eConduct regular audits and reports of BIM models and data to ensure accuracy, integrity, and consistency of BIM data and models.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTECHINICAL ARCHITECT.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- 1.\tThành thạo phần mềm Revit để triển khai và tạo lập mô hình 3D, kiểm tra quản lý hồ sơ shopdrawing.\u003c/p\u003e\u003cp\u003eProficiency in Revit software for implementation and create 3D models, and management of Shop Drawings.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.\tLàm việc theo nhóm, go on business when required.\u003c/p\u003e\u003cp\u003eWork in team of designers, đi công tác khi có yêu cầu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3.\tChịu trách nhiệm và kiểm tra chất lượng bản vẽ để đảm bảo theo đúng yêu cầu trước khi phát hành.\u003c/p\u003e\u003cp\u003eTake responsibility and check the quality of drawings to ensure compliance with the requirements before release.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4.\tLàm việc theo sự hướng dẫn và sắp xếp của trưởng nhóm/ trưởng dự án.\u003c/p\u003e\u003cp\u003eCarry out duties as directed by the team leader/ project leader.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5.\tPhối hợp chặc chẽ cùng các bộ môn khác và quản lý nhiệm vụ được giao. Nhận phản hồi và thảo luận để hoàn thành phương án thiết kế tốt nhất theo yêu cầu.\u003c/p\u003e\u003cp\u003eClose collaboration with other disciplines and manage assigned task. Receive feedback and engage in discussions to achieve the best design quality requirement\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCONCEPT ARCHITECT.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e1.\tThiết kế và triển khai kiến trúc ở giai đoạn phương án cho công trình dân dụng \u003c/p\u003e\u003cp\u003eDesign the architecture in concept stage for residential project.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.\tThu thập thông tin của khách hàng và đưa ra gợi ý thiết kế\u003c/p\u003e\u003cp\u003eCollect information from customer and suggest the architecture.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3.\tLàm việc theo nhóm và phối hợp với các bộ môn phòng bán trong công ty để bảo đảm sản phẩm tốt nhất theo yêu cầu\u003c/p\u003e\u003cp\u003eCo-operate with team members and all related departments to ensure product quality requirement.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4.\tLưu giữ thông tin về bản vẽ. Triển khai bản vẽ (nếu được yêu cầu)\u003c/p\u003e\u003cp\u003eKeep record about the architectural design. Deployment process (if required)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5.\tHoàn thành mọi nhiệm vụ được giao bởi trưởng nhóm và Trưởng dự án\u003c/p\u003e\u003cp\u003eComplete all tasks due to the arrangement of the Team Leader and Project Manager.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6.\tNghiên cứu, hoạch định và phát triển thiết kế –Dựa vào yêu cầu của khách hàng và sự phân công của phòng ban.\u003c/p\u003e\u003cp\u003eResearch, plan and develop the design – Due to the customer order and the department’s assignments.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7.\tKiểm soát thiết kế -- Sử dụng phần mềm để kiểm soát sự điều chỉnh thiết kế và lưu giữ thông tin cần thiết. Theo dõi các quy trình thiết kế tiếp theo thuộc phòng ban Kết cấu và MEP.Nhận các thông tin phản hồi từ các nhóm thiết kế khác để cùng thảo luận và đưa ra sản phẩm thiết kế hoàn chỉnh sau cùng để được cấp chứng nhận thiết kế.\u003c/p\u003e\u003cp\u003eControl the design -- Follow the process of the design while the Structural Team and the MEP Team create their own specialized in the design. Receive feedback and discuss to ensure the finished design for the certifying process.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T952,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKĩ năng và bằng cấp/ Ability \u0026 Qualification\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học hoặc Cao đẳng chuyên ngành kiến trúc, xây dựng, kỹ thuật.\u003c/p\u003e\u003cp\u003e\u003cem\u003eGraduate University or Diploma in Architecture, engineering, construction.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tTối thiểu 4-5 năm kinh nghiệm với các phần mềm BIM (Revit, Navisworks, etc.) cho các dự án thiết kế/ xây dựng.\u003c/p\u003e\u003cp\u003e\u003cem\u003eMinimum of 5 years of experience with BIM software(Revit, Navisworks, etc.) on design/ construction projects.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tSử dụng được tiếng Anh trong công việc, nói và viết.\u003c/p\u003e\u003cp\u003e\u003cem\u003eGood knowledge of English, both spoken and written.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm với Dynamo, Grasshopper hoặc các phần mềm BIM khác là một lợi thế.\u003c/p\u003e\u003cp\u003e\u003cem\u003eExperience with Dynamo, Grasshopper, or other BIM software is an advantage.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\t\u003c/em\u003eKỹ năng làm việc cùng lúc với nhiều dự án, nhiệm vụ và có kỹ năng tốt về quản lý thời gian.\u003c/p\u003e\u003cp\u003e\u003cem\u003eAbility to work on multiple projects or tasks, have good time management skills.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp và hợp tác tốt, với khả năng làm việc hiệu quả trong môi trường nhóm.\u003c/p\u003e\u003cp\u003e\u003cem\u003eExcellent communication and collaboration skills, with the ability to work effectively in a team environment.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tCó khả năng đảm nhận trách nhiệm.\u003c/p\u003e\u003cp\u003e\u003cem\u003eAble to take responsibility.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tCó mong muốn phát triển hiểu biết về các chuyên ngành khác nhau để điều phối là một yêu cầu bắt buộc. Kinh nghiệm tương tự trong các dự án trước đó là một lợi thế.\u003c/p\u003e\u003cp\u003e\u003cem\u003eA will to develop an understanding of other disciplines for coordination is a requirement. Some previous experience is an advantage.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tKiến thức chuyên ngành kĩ thuật và khả năng giải quyết vấn đề tốt.\u003c/p\u003e\u003cp\u003e\u003cem\u003eStrong technical skills and problem-solving abilities.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tTư duy linh hoạt và tư duy phát triển. Chủ động trong việc tự học và trau dồi năng lực.\u003c/p\u003e\u003cp\u003e\u003cem\u003eFlexible attitude and growth mindset. An interest and self-motivation to study and learn are required.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T786,TLC Modular Construction Limited Liability Company was established in 1995 as a direct result of the founders being involved successfully in building construction within Vietnam and working in partnership with major foreign construction contractors.\r\n\r\nTo date the company founders has been involved in professional practice within Vietnam for now more than 13 years and have, in tandem with them, a wealth of highly qualified and local skilled employees.\r\n\r\nTLC has grown with Vietnam’s infrastructure and energy sectors becoming a specialized and diverse company in meeting clients expectations for services, manpower and technical resources.\r\n\r\nTLC Modular Construction Limited Liability Company is a substantial provider to a number of construction and development fields within Vietnam. The core of our company is based on providing a range of services to project developers or industry and being able to do so in a responsive manner to meet the demands of our clients and local market factors.\r\n\r\nMore than 10 years of company experience has seen our company deliver to a high standard and with client satisfaction on government projects, industrial ventures, infrastructure and heavy industry projects as well as a long history with major foreign entities within the Vietnam oil and gas sector.\r\n\r\nCông ty TNHH Xây Dựng Mô-Đun TLC (TLC) hoạt động trong các lĩnh vực chính: tư vấn, thầu xây dựng và sản xuất nhà ở di động:\r\n- Lĩnh vực tư vấn và thầu xây y dựng\r\n- Lĩnh vực sản xuất và gia công: TLC chuyên sản xuất và xuất khẩu nhà ở di động (cabin) theo thiết kế và nhu cầu thực tế của khách hàng đạt tiêu chuẩn quốc tế.\r\n\r\nwww.tlcvietnam.com.vn2a:T14e2,"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMô tả công việc/ Job description\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eỨng viên phù hợp 1 trong 3 mô tả công việc. Vui lòng apply\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBIM CORDINATOR\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e1. Hỗ trợ trong việc thiết lập, duy trì và quản lý tiêu chuẩn, giao thức, và quá trình ứng dụng BIM trong dự án.\u003c/p\u003e\u003cp\u003e\u003cem\u003eAssist in developing, maintaining, and managing BIM standards, protocols, and project BIM implementation.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e2. Quản lý, thực hiện và phối hợp các quy trình liên quan đến BIM, bao gồm phát hiện xung đột, phối hợp mô hình và trao đổi thông tin.\u003c/p\u003e\u003cp\u003e\u003cem\u003e Manage, perform and coordinate BIM-related workflows, including clash detection, model coordination, and information exchange.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e3. Phối hợp với kế hoạch viên để tạo ra mô phỏng 4D nếu cần thiết.\u003c/p\u003e\u003cp\u003e\u003cem\u003e Coordinate with planner to generate 4D simulation if required.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e4. Tiến hành cuộc họp điều phối BIM định kì giữa các bên liên quan để giải quyết các xung đột.\u003c/p\u003e\u003cp\u003e\u003cem\u003e Conduct regular BIM coordination meetings between related parties to resolve the detected clashes.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e5. Chia sẻ báo cáo xung đột và mô hình phối hợp với các bên liên quan (thiết kế, sản xuất, thi công, nhà cung cấp, QS, QA-QC, quản lý dự án, v.v.).\u003c/p\u003e\u003cp\u003e\u003cem\u003e Share the clash/issue report and federated models with related stakeholders (architect, engineer, consultant, workshop, contractor, QS, QA-QC, project manager, etc.)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e6. Tiến hành định kỳ kiểm tra và báo cáo các mô hình và dữ liệu BIM để đảm bảo tính chính xác, toàn vẹn và nhất quán của dữ liệu và mô hình BIM.\u003c/p\u003e\u003cp\u003e\u003cem\u003eConduct regular audits and reports of BIM models and data to ensure accuracy, integrity, and consistency of BIM data and models.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTECHINICAL ARCHITECT.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- 1.\tThành thạo phần mềm Revit để triển khai và tạo lập mô hình 3D, kiểm tra quản lý hồ sơ shopdrawing.\u003c/p\u003e\u003cp\u003eProficiency in Revit software for implementation and create 3D models, and management of Shop Drawings.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.\tLàm việc theo nhóm, go on business when required.\u003c/p\u003e\u003cp\u003eWork in team of designers, đi công tác khi có yêu cầu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3.\tChịu trách nhiệm và kiểm tra chất lượng bản vẽ để đảm bảo theo đúng yêu cầu trước khi phát hành.\u003c/p\u003e\u003cp\u003eTake responsibility and check the quality of drawings to ensure compliance with the requirements before release.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4.\tLàm việc theo sự hướng dẫn và sắp xếp của trưởng nhóm/ trưởng dự án.\u003c/p\u003e\u003cp\u003eCarry out duties as directed by the team leader/ project leader.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5.\tPhối hợp chặc chẽ cùng các bộ môn khác và quản lý nhiệm vụ được giao. Nhận phản hồi và thảo luận để hoàn thành phương án thiết kế tốt nhất theo yêu cầu.\u003c/p\u003e\u003cp\u003eClose collaboration with other disciplines and manage assigned task. Receive feedback and engage in discussions to achieve the best design quality requirement\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCONCEPT ARCHITECT.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e1.\tThiết kế và triển khai kiến trúc ở giai đoạn phương án cho công trình dân dụng \u003c/p\u003e\u003cp\u003eDesign the architecture in concept stage for residential project.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.\tThu thập thông tin của khách hàng và đưa ra gợi ý thiết kế\u003c/p\u003e\u003cp\u003eCollect information from customer and suggest the architecture.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3.\tLàm việc theo nhóm và phối hợp với các bộ môn phòng bán trong công ty để bảo đảm sản phẩm tốt nhất theo yêu cầu\u003c/p\u003e\u003cp\u003eCo-operate with team members and all related departments to ensure product quality requirement.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4.\tLưu giữ thông tin về bản vẽ. Triển khai bản vẽ (nếu được yêu cầu)\u003c/p\u003e\u003cp\u003eKeep record about the architectural design. Deployment process (if required)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5.\tHoàn thành mọi nhiệm vụ được giao bởi trưởng nhóm và Trưởng dự án\u003c/p\u003e\u003cp\u003eComplete all tasks due to the arrangement of the Team Leader and Project Manager.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6.\tNghiên cứu, hoạch định và phát triển thiết kế –Dựa vào yêu cầu của khách hàng và sự phân công của phòng ban.\u003c/p\u003e\u003cp\u003eResearch, plan and develop the design – Due to the customer order and the department’s assignments.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7.\tKiểm soát thiết kế -- Sử dụng phần mềm để kiểm soát sự điều chỉnh thiết kế và lưu giữ thông tin cần thiết. Theo dõi các quy trình thiết kế tiếp theo thuộc phòng ban Kết cấu và MEP.Nhận các thông tin phản hồi từ các nhóm thiết kế khác để cùng thảo luận và đưa ra sản phẩm thiết kế hoàn chỉnh sau cùng để được cấp chứng nhận thiết kế.\u003c/p\u003e\u003cp\u003eControl the design -- Follow the process of the design while the Structural Team and the MEP Team create their own specialized in the design. Receive feedback and discuss to ensure the finished design for the certifying process.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T952,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKĩ năng và bằng cấp/ Ability \u0026 Qualification\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học hoặc Cao đẳng chuyên ngành kiến trúc, xây dựng, kỹ thuật.\u003c/p\u003e\u003cp\u003e\u003cem\u003eGraduate University or Diploma in Architecture, engineering, construction.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tTối thiểu 4-5 năm kinh nghiệm với các phần mềm BIM (Revit, Navisworks, etc.) cho các dự án thiết kế/ xây dựng.\u003c/p\u003e\u003cp\u003e\u003cem\u003eMinimum of 5 years of experience with BIM software(Revit, Navisworks, etc.) on design/ construction projects.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tSử dụng được tiếng Anh trong công việc, nói và viết.\u003c/p\u003e\u003cp\u003e\u003cem\u003eGood knowledge of English, both spoken and written.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm với Dynamo, Grasshopper hoặc các phần mềm BIM khác là một lợi thế.\u003c/p\u003e\u003cp\u003e\u003cem\u003eExperience with Dynamo, Grasshopper, or other BIM software is an advantage.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\t\u003c/em\u003eKỹ năng làm việc cùng lúc với nhiều dự án, nhiệm vụ và có kỹ năng tốt về quản lý thời gian.\u003c/p\u003e\u003cp\u003e\u003cem\u003eAbility to work on multiple projects or tasks, have good time management skills.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp và hợp tác tốt, với khả năng làm việc hiệu quả trong môi trường nhóm.\u003c/p\u003e\u003cp\u003e\u003cem\u003eExcellent communication and collaboration skills, with the ability to work effectively in a team environment.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tCó khả năng đảm nhận trách nhiệm.\u003c/p\u003e\u003cp\u003e\u003cem\u003eAble to take responsibility.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tCó mong muốn phát triển hiểu biết về các chuyên ngành khác nhau để điều phối là một yêu cầu bắt buộc. Kinh nghiệm tương tự trong các dự án trước đó là một lợi thế.\u003c/p\u003e\u003cp\u003e\u003cem\u003eA will to develop an understanding of other disciplines for coordination is a requirement. Some previous experience is an advantage.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tKiến thức chuyên ngành kĩ thuật và khả năng giải quyết vấn đề tốt.\u003c/p\u003e\u003cp\u003e\u003cem\u003eStrong technical skills and problem-solving abilities.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tTư duy linh hoạt và tư duy phát triển. Chủ động trong việc tự học và trau dồi năng lực.\u003c/p\u003e\u003cp\u003e\u003cem\u003eFlexible attitude and growth mindset. An interest and self-motivation to study and learn are required.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2d:{\"skillName\":\"Dynamo\",\"skillId\":987935,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"BIM\",\"skillId\":423233,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"
