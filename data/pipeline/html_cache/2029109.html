 bán máy móc, thiết bị ngành môi trường, thiết bị ngành xây dựng, hầm mỏ, thiết bị khoa học kỹ thuật\r\n- Mua bán trang thiết bị y tế, thiết bị trường học\r\n- Mua bán dụng cụ thuỷ tinh\r\n- Mua bán hoá chất (trừ các hoá chất nhà nước cấm)\r\n- Dịch vụ bảo hành, bảo dưỡng, bảo trì máy móc, thiết bị do công ty mua bán\r\n- Dịch vụ giao nhận hàng hoá\r\n- Nghiên cứu và phát triển thực nghiệm khoa học tự nhiên và kỹ thuật: Nghiên cứu và phát triển khoa học nông nghiệp\r\n- Hoạt động chuyên môn khoa học và công nghệ\r\n\r\nTrụ sở: \r\n-\tVăn phòng Hà Nội:\r\nSố 9, ngách 1/52, ngõ 1, Đường Phạm Tuấn Tài, Quận Cầu Giấy, Hà Nội\r\n    \r\n-\tVăn phòng Tp. Hồ Chí Minh:\r\nS-16, Toà nhà Carillon, số 171A Hoàng Hoa Thám, Phường 13, Quận Tân Bình, Hồ Chí Minh"])</script><script>self.__next_f.push([1,"24:T5f1,\u003cp\u003e• Tốt nghiệp Đại học chuyên ngành Kế toán, Tài chính hoặc liên quan\u003c/p\u003e\u003cp\u003e• Có ít nhất 2–3 năm kinh nghiệm ở vị trí tương đương (ưu tiên lĩnh vực xuất nhập khẩu)\u003c/p\u003e\u003cp\u003e• Am hiểu quy định thuế, chuẩn mực kế toán Việt Nam\u003c/p\u003e\u003cp\u003e• Thành thạo Excel và phần mềm kế toán (MISA hoặc tương đương)\u003c/p\u003e\u003cp\u003e• Cẩn thận, trung thực, có trách nhiệm trong công việc\u003c/p\u003e\u003cp\u003e• Có khả năng đọc hiểu chứng từ tiếng Anh là lợi thế\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Mức lương thỏa thuận: 10 - 20 triệu (tùy theo năng lực) \u003c/p\u003e\u003cp\u003e• Đầy đủ chế độ BHXH, BHYT, BHTN theo quy định\u003c/p\u003e\u003cp\u003e• Môi trường làm việc chuyên nghiệp, thân thiện, tạo điều kiện phát triển chuyên môn \u003c/p\u003e\u003cp\u003e• Có lộ trình phát triển lên các vị trí quản lý với ứng viên có năng lực và định hướng lâu dài \u003c/p\u003e\u003cp\u003e• Thưởng hiệu quả công việc (KPI) định kỳ hàng quý dựa trên đóng góp thực tế\u003c/p\u003e\u003cp\u003e• Thưởng tháng lương thứ 13 hàng
