s\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T12ce,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Đầu tư Bất động sản TASECO (TASECO Land), tiền thân là Công ty Cổ phần Đầu tư Bất động sản An Bình, được thành lập và đăng ký hoạt động theo Giấy chứng nhận đăng ký doanh nghiệp số 0104,079,036 do Sở Kế hoạch Đầu tư thành phố Hà Nội cấp lần đầu ngày 29/07/2009. Hoạt động cốt lõi của Công ty chủ yếu tập trung vào các lĩnh vực xây dựng, đầu tư, kinh doanh và phát triển bất động sản. \r\n\r\nVốn điều lệ đến ngày 28/11/2023 là 2.970 tỷ đồng cùng với hệ thống trên 10 đơn vị thành viên hoạt động chuyên sâu trong các lĩnh vực quản lý, đầu tư, kinh doanh và phát triển bất động sản, sau gần 15 năm hình thành và phát triển, đến nay TASECO Land đã đạt được nhiều thành tựu mang tính đột phá và đang từng bước tiến tới mô hình hoạt động của một Tổng Công ty đầu tư, phát triển bất động sản chuyên nghiệp tại Việt Nam. \r\n\r\nNền tảng tài chính vững mạnh và một bộ máy nhân sự chất lượng, đồng lòng, giàu sự gắn kết với hơn 200 cán bộ, kỹ sư có năng lực, trình độ, kinh nghiệm lâu năm trong lĩnh vực bất động sản, trong những năm qua, TASECO Land đã triển khai thành công hàng loạt dự án bất động sản chất lượng cao trên địa bàn các tỉnh, thành phố lớn của cả nước như Tòa nhà NO2-T1, Tòa nhà NO3-T2, Tòa nhà NO1-T4, Tòa nhà NO3-T6 tại Khu Đoàn Ngoại giao, thành phố Hà Nội; Khu nhà ở thấp tầng thuộc Khu đô thị mới Nam An Khánh tại Hoài Đức, Hà Nội; Khu đô thị Dệt may tại thành phố Nam Định; Khu đô thị kết hợp Công viên Cây xanh Green Park tại thành phố Móng Cái, tỉnh Quảng Ninh; Căn hộ - Khách sạn Alacarte Oceanview Đà Nẵng tại thành phố Đà Nẵng, Khu dân cư Hải Hà tại huyện Quảng Xương, tỉnh Thanh Hóa, Khu đô thị Lương Sơn Riverview tại thị trấn Lương Sơn, tỉnh Hòa Bình … Tháng 11/2023, TASECO Land  chính thức là nhà đầu tư  Khu công nghiệp hỗ trợ Đồng Văn III phía Đông đường cao tốc Cầu Giẽ – Ninh Bình tại Tỉnh Hà Nam với quy mô 223 ha, tổng vốn đầu tư hơn 2.320 tỷ đồng.\r\n\r\nVới triết lý kinh doanh là đồng hành, chia sẻ lợi ích cùng khách hàng, coi sự hài lòng của khách hàng là thành công của doanh nghiệp, TASECO Land đã thực sự chinh phục được niềm tin và tình cảm của khách hàng bằng những sản phẩm bất động sản chất lượng, uy tín, được thị trường đánh giá cao. Mỗi dự án được TASECO Land đầu tư thực hiện đều có vị trí đắc địa, cơ hội sinh lời cao. Với chất lượng thi công xây dựng vượt trội, dịch vụ và tiện ích đồng bộ, Taseco Land đã và đang đáp ứng tốt nhất các yêu cầu và mong đợi của khách hàng. \r\n\r\nTrên cơ sở những kết quả tích cực đã đạt được, phát huy thế và lực sẵn có, TASECO Land đang tiếp tục đẩy mạnh các hoạt động đầu tư và mở rộng các dự án bất động sản tại các tỉnh thành trong cả nước như: Dự án Tòa nhà Landmark 55 thuộc Khu đô thị Tây Hồ Tây (quy mô 2,36ha, tổng mức đầu tư khoảng 8.000 tỷ đồng); Dự án tòa nhà Thương mại dịch vụ và Căn hộ chung cư À LA CARTE Hạ Long (quy mô 5.125 m2, tổng mức đầu tư 2.400 tỷ đồng); Dự án CC5A, CC2 tại Khu Đoàn Ngoại giao, quận Bắc Từ Liêm thành phố Hà Nội; Dự án Nhóm nhà ở Đông Nam đường Tố Hữu, Nam Từ Liêm, thành phố Hà Nội, Khu đô thị mới thuộc dự án số 4 KĐT Trung tâm thành phố Thanh Hóa, Dự án Khu tái định cư xã Hải Yến thuộc xã Nguyên Bình, Thị xã Nghi Sơn, tỉnh Thanh Hóa ...\r\n\r\nVới cam kết nỗ lực không ngừng nghỉ để tạo ra những sản phẩm có chất lượng tốt hơn, thẩm mỹ hơn và tiện ích hơn cho cộng đồng và xã hội, TASECO Land trân trọng cảm ơn và mong muốn tiếp tục nhận được sự đồng hành và hỗ trợ tích cực từ Quý cổ đông, Quý khách hàng, nhà đầu tư và các đối tác trong chặng đường phát triển tiếp theo. \r\n\r\nĐịa chỉ : Tầng 1, Tòa nhà NO2 -T1, Khu Đoàn ngoại giao, đường Xuân Tảo, Phường Xuân Tảo, Quận Bắc Từ Liêm, Thành phố Hà Nội, Việt Nam\r\nWebsite : www.tasecoland.vn"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T6de,\u003cp\u003e\u003cstrong\u003e1.1. Nghiên cứu, tìm kiếm cơ hội, phân tích đánh giá, đề xuất cơ hội đầu tư:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Triển khai duy trì mối quan hệ với CQNN và các đối tác, đơn vị địa phương để tìm kiếm cơ hội đầu tư.\u003c/p\u003e\u003cp\u003e- Thực hiện Nghiên cứu cơ hội đầu tư: Phân tích, đánh giá các yếu tố pháp lý, quy hoạch, cơ hội thị trường, hiệu quả dự án để đề xuất cơ hội đầu tư.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2. Thực hiện các thủ tục pháp lý chuẩn bị đầu tư dự án:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trực tiếp soạn thảo văn bản pháp lý, làm việc với CQNN, tổ chức, cá nhân liên quan để hoàn thành các thủ tục pháp lý chuẩn bị đầu tư các Dự án như: Đề xuất Dự án; Nghiên cứu địa điểm; Lập, thẩm định Quy hoạch xây dựng; Thủ tục về đất đai; Hiệu quả dự án;\u003c/p\u003e\u003cp\u003e- Lập, theo dõi, cập nhật tiến độ/kế hoạch triển khai thực hiện thủ tục pháp lý chuẩn bị đầu tư;\u003c/p\u003e\u003cp\u003e- Phối hợp với các Phòng/Ban Chuyên môn chủ trì thực hiện các công việc liên quan trong quá trình thực hiện Dự án.\u003c/p\u003e\u003cp\u003e- Quản lý hồ sơ pháp lý giai đoạn chuẩn bị đầu tư.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.3. Hỗ trợ công tác giải phóng mặt bằng (GPMB):\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phối hợp, cung cấp thông tin pháp lý; Rà soát kế hoạch GPMB để đảm bảo phù hợp tiến độ tổng thể của Dự án.\u003c/p\u003e\u003cp\u003e- Hỗ trợ bộ phận Giải phóng mặt bằng giải quyết các quan hệ, các thủ tục pháp lý để đảm bảo tiến độ đã được phê duyệt theo phân công.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e25:T600,\u003cp\u003e•\tTốt nghiệp Đại học trở lên các ngành xây dựng, kiến trúc, quy hoạch, đất đai, luật.....\u003c/p\u003e\u003cp\u003e•\tTừ 03-05 năm kinh nghiệm làm việc ở vị trí tương đương, hồ sơ Thủ tục Pháp lý, công tác GPMB;\u003c/p\u003e\u003cp\u003e•\tCó ki"])</script><script>self.__next_f.push([1,"ến thức về dự án đầu tư Bất động sản, nắm vững các quy chế, quy định, quy trình thủ tục đầu tư dự án.\u003c/p\u003e\u003cp\u003e•\tThành thạo tin học văn phòng, project. Tiếng Anh tốt là lợi thế.\u003c/p\u003e\u003cp\u003e•\tKhả năng phối hợp làm việc nhóm, làm việc độc lập và chịu áp lực tốt;\u003c/p\u003e\u003cp\u003e•\tCó tinh thần trách nhiệm cao, làm việc chủ động, nhiệt tình, trung thực\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*** CHẾ ĐỘ ĐÃI NGỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương hấp dẫn, thỏa thuận theo kinh nghiệm và năng lực.\u003c/p\u003e\u003cp\u003e•\tChế độ phúc lợi đầy đủ, BHYT, BHXH theo đúng quy định của Luật Lao động.\u003c/p\u003e\u003cp\u003e•\tLàm việc trong môi trường trẻ trung, năng động và chuyên nghiệp.\u003c/p\u003e\u003cp\u003e•\tCó cơ hội thăng tiến lên các vị trí quản lý.\u003c/p\u003e\u003cp\u003e•\tCung cấp đầy đủ trang thiết bị hỗ trợ công việc.\u003c/p\u003e\u003cp\u003e•\tKhám sức khỏe định kỳ cho CBNV.\u003c/p\u003e\u003cp\u003e•\tĐược khuyến khích và khen thưởng khi có các đề xuất mang lại hiệu quả cho công ty.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa đào tạo chuyên môn, cơ hội học hỏi và nâng cao trình độ, kỹ năng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e26:T12ce,"])</script><script>self.__nex 23 là 2.970 tỷ đồng cùng với hệ thống trên 10 đơn vị thành viên hoạt động chuyên sâu trong các lĩnh vực quản lý, đầu tư, kinh doanh và phát triển bất động sản, sau gần 15 năm hình thành và phát triển, đến nay TASECO Land đã đạt được nhiều thành tựu mang tính đột phá và đang từng bước tiến tới mô hình hoạt động của một Tổng Công ty đầu tư, phát triển bất động sản chuyên nghiệp tại Việt Nam. \r\n\r\nNền tảng tài chính vững mạnh và một bộ máy nhân sự chất lượng, đồng lòng, giàu sự gắn kết với hơn 200 cán bộ, kỹ sư có năng lực, trình độ, kinh nghiệm lâu năm trong lĩnh vực bất động sản, trong những năm qua, TASECO Land đã triển khai thành công hàng loạt dự án bất động sản chất lượng cao trên địa bàn các tỉnh, thành phố lớn của cả nước như Tòa nhà NO2-T1, Tòa nhà NO3-T2, Tòa nhà NO1-T4, Tòa nhà NO3-T6 tại Khu Đoàn Ngoại giao, thành phố Hà Nội; Khu nhà ở thấp tầng thuộc Khu đô thị mới Nam An Khánh tại Hoài Đức, Hà Nội; Khu đô thị Dệt may tại thành phố Nam Định; Khu đô thị kết hợp Công viên Cây xanh Green Park tại thành phố Móng Cái, tỉnh Quảng Ninh; Căn hộ - Khách sạn Alacarte Oceanview Đà Nẵng tại thành phố Đà Nẵng, Khu dân cư Hải Hà tại huyện Quảng Xương, tỉnh Thanh Hóa, Khu đô thị Lương Sơn Riverview tại thị trấn Lương Sơn, tỉnh Hòa Bình … Tháng 11/2023, TASECO Land  chính thức là nhà đầu tư  Khu công nghiệp hỗ trợ Đồng Văn III phía Đông đường cao tốc Cầu Giẽ – Ninh Bình tại Tỉnh Hà Nam với quy mô 223 ha, tổng vốn đầu tư hơn 2.320 tỷ đồng.\r\n\r\nVới triết lý kinh doanh là đồng hành, chia sẻ lợi ích cùng khách hàng, coi sự hài lòng của khách hàng là thành công của doanh nghiệp, TASECO Land đã thực sự chinh phục được niềm tin và tình cảm của khách hàng bằng những sản phẩm bất động sản chất lượng, uy tín, được thị trường đánh giá cao. Mỗi dự án được TASECO Land đầu tư thực hiện đều có vị trí đắc địa, cơ hội sinh lời cao. Với chất lượng thi công xây dựng vượt trội, dịch vụ và tiện ích đồng bộ, Taseco Land đã và đang đáp ứng tốt nhất các yêu cầu và mong đợi của khách hàng.
