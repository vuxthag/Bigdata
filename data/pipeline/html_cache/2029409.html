%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T718,September 19, 2019 - One Mount was established with the ambition of building Vietnam's most trusted ecosystem, empowering all people and businesses to realize their full potential at the intersection of technology and humanity. Our main products include:\r\n\r\n1. VinShop (operated under One Mount Distribution), a dedicated retail app enabling independent shop owners to grow their business via tech enabled supply chain and inventory management\r\n2. VinID (operated under One Mount Consumer), a super app and Vietnam's largest consumer loyalty program integrating many functions such as payment, housing management, goods purchase, and financial services\r\n3. OneHousing (operated under One Mount Real Estate), a one-stop destination for all needs in housing, supporting buying, selling, investing and other real-estate-related services.\r\n\r\n\r\nOUR WORK: All employees are empowered to grow their most meaningful careers at One Mount. "])</script><script>self.__next_f.push([1,"With every single new feature launched, every innovation implemented, and every market challenge solved, One Mount Staff are proud to be making positive changes on Vietnamese people's daily lives by leveraging the advantages of technological sophistication. \r\nTo us, the value of work creates strong motivation for continuous learning, remarkable innovation and outcomes-driven spirit.\r\n\r\nOUR LIFE: The inspiring purpose and fast-pace of work quickly makes One Mount become a second home for talents across the globe. The variance in age, gender, regions and perspectives shaped  the cultural diversity, fosters team creativity, and increases employee engagement. \r\nOne Mount chooses to promote the \"Success Culture\" with 5 core values probably stated as Result-driven, Breakthrough perspectives, Business mindset, Collaboration and Efficiency in the journey of creating values for all.24:Tdab,"])</script><script>self.__next_f.push([1,"\u003cp\u003eOneHousing (One Mount Real Estate) - Công ty thành viên thuộc hệ sinh thái One Mount, đối tác chiến lược của Ngân hàng hàng đầu Việt Nam Techcombank và chủ đầu tư sở hữu các căn hộ hàng hiệu được săn đón nhất thị trường Masterise Homes.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. MỤC TIÊU CÔNG VIỆC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm xây dựng, vận hành và liên tục cải tiến toàn bộ hệ thống quản lý chất lượng trên nền tảng công nghệ và thực địa. Ở cấp độ Senior - Expert, vị trí này không chỉ thực thi mà còn chủ động phát hiện rủi ro hệ thống, đề xuất giải pháp cải tiến chiến lược và đóng vai trò tham chiếu chuyên môn cho toàn bộ tổ chức.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. TRÁCH NHIỆM CHÍNH:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Xây dựng \u0026 Quản trị Hệ thống Tuân thủ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThiết kế khung tiêu chuẩn chất lượng toàn diện cho đội ngũ môi giới, bộ phận hỗ trợ và quy trình giao dịch.\u003c/p\u003e\u003cp\u003e•\tXây dựng lộ trình kiểm tra định kỳ và kiểm tra đột xuất (audit schedule), tự chủ triển khai và đánh giá kết quả.\u003c/p\u003e\u003cp\u003e•\tĐóng vai trò đầu mối chuyên môn trong các dự án ra mắt tính năng mới trên App/Web — rà soát rủi ro tuân thủ trước khi go-live.\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm toàn diện về tính chính xác, minh bạch của dữ liệu bất động sản niêm yết trên nền tảng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eB. Quản trị Rủi ro Hoạt động\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTự chủ xây dựng bản đồ rủi ro (Risk Register) cho toàn bộ quy trình kinh doanh — phân loại, định lượng mức độ ảnh hưởng và đề xuất biện pháp kiểm soát.\u003c/p\u003e\u003cp\u003e•\tThiết kế và sở hữu các kịch bản ứng phó rủi ro (Contingency Plans) cho các tình huống đặc thù của giao dịch bất động sản công nghệ.\u003c/p\u003e\u003cp\u003e•\tLàm việc độc lập với bộ phận Tech trong kiểm soát rủi ro bảo mật thông tin khách hàng — chủ động tổ chức các phiên review định kỳ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eC. Xử lý Tranh chấp \u0026 Sự vụ\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThẩm quyền xử lý độc lập các khiếu nại phức tạp, tranh chấp pháp lý giữa khách hàng – đối tác – môi giới mà cấp nhân viên không xử lý được.\u003c/p\u003e\u003cp\u003e•\tĐưa ra phán quyết hòa giải, phương án đền bù dựa trên căn cứ pháp lý vững chắc (Luật Dân sự, Luật Kinh doanh BĐS) — chịu trách nhiệm về quyết định của mình.\u003c/p\u003e\u003cp\u003e•\tXây dựng kho tri thức (Knowledge Base) từ các vụ tranh chấp để hỗ trợ đào tạo và phòng ngừa tái phát.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eD. Đo lường Hiệu suất \u0026 Chất lượng vận hành\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTự thiết kế và sở hữu hệ thống KPIs/SLAs cho dịch vụ môi giới — không chỉ theo dõi mà còn đề xuất điều chỉnh định kỳ.\u003c/p\u003e\u003cp\u003e•\tPhân tích xu hướng dữ liệu chất lượng và trình bày báo cáo định kỳ (monthly/quarterly) lên Trưởng phòng và Giám đốc.\u003c/p\u003e\u003cp\u003e•\tTriển khai chương trình đào tạo nội bộ về tư duy chất lượng — không chỉ thực hiện mà chịu trách nhiệm về hiệu quả đầu ra.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T843,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKinh nghiệm:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTối thiểu 5–7 năm kinh nghiệm thực chiến tại vị trí QA, Compliance, hoặc Quản trị Rủi ro trong lĩnh vực Bất động sản, Tài chính, hoặc Nền tảng công nghệ (Proptech/Fintech/E-commerce).\u003c/p\u003e\u003cp\u003e•\tĐã từng độc lập xử lý ít nhất các tranh chấp/khiếu nại phức tạp có giá trị tài chính hoặc rủi ro pháp lý cao.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm thiết kế hệ thống (quy trình, tiêu chuẩn, KPIs) — không chỉ thực thi theo quy trình có sẵn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKiến thức:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAm hiểu vững chắc Luật Kinh doanh Bất động sản, Luật Nhà ở, Luật Dân sự.\u003c/p\u003e\u003cp\u003e•\tThành thạo phương pháp Root Cause Analysis, Risk Assessment, Audit.\u003c/p\u003e\u003cp\u003e•\tHiểu biết về vận hành hệ thống CRM/ App là lợi thế cạnh tranh quan trọng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. QUYỀN LỢI \u0026 ĐÃI NGỘ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eLương và Trợ cấp:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLương tháng 13 và thưởng Hiệu quả công việc/ năm\u003c/p\u003e\u003cp\u003e•\tPhụ cấp ăn trưa: 730.000 VND/tháng.\u003c/p\u003e\u003cp\u003e•\tThưởng dịp đặc biệt: 2tr5 VND/ năm.\u003c/p\u003e\u003cp\u003e•\tNghỉ phép: 15-20 ngày/năm (dựa trên cấp bậc), nghỉ dịp sinh nhật và các ngày nghỉ lễ theo quy định nhà nước.\u003c/p\u003e\u003cp\u003e•\tSức khỏe: Bảo hiểm xã hội, Bảo hiểm sức khỏe,...\u003c/p\u003e\u003cp\u003e•\tLaptop, màn hình và các thiết bị/công cụ cần thiết khác cho công việc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p
