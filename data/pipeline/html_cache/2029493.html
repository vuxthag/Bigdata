 8:00 – 12:00\u003c/p\u003e\u003cp\u003e\t+ Chiều từ: 13:30 – 17:00 \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI ĐƯỢC HƯỞNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Mức lương cạnh tranh (18 – 25 triệu VNĐ) + Thưởng định kỳ 6 tháng theo hiệu quả kinh doanh.\u003c/p\u003e\u003cp\u003e- Lộ trình phát triển nghề nghiệp rõ ràng, cơ hội thăng tiến mở rộng.\u003c/p\u003e\u003cp\u003e- Được hưởng đầy đủ các chế độ theo quy định của pháp luật (BHYT, BHXH, BHTN) và các chế độ phúc lợi theo nội quy, quy chế của Công ty (tham quan, nghỉ mát theo tiêu chuẩn 4 sao trở lên, nghỉ Lễ, Tết,…)\u003c/p\u003e\u003cp\u003e- Được hưởng các chế độ phúc lợi nội bộ: Khám sức khỏe định kỳ, Quà sinh nhật và ngày nghỉ sinh nhật hưởng nguyên lương, thăm hỏi ốm đau dành cho bản thân và gia đình, các chương trình sinh hoạt cho bé như Ngày quốc tế thiếu nhi, trung thu, nhận thưởng từ quỹ khuyến học,....\u003c/p\u003e\u003cp\u003e- Được tham gia vào các chương trình đào tạo, phát triển tương ứng với vị trí công việc và theo từng giai đoạn.\u003c/p\u003e\u003cp\u003e- Được làm việc trong môi trường năng động, thân thiện. Thay đổi, phát triển con người bên cạnh phát triển về nghề nghiệp, chuyên môn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCÁC YÊU CẦU CẦN CÓ CHO VỊ TRÍ NÀY (yêu cầu về chuyên môn)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1\tHọc vấn:\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên chuyên ngành Kinh tế, Quản trị Kinh doanh, Thương mại.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2\tKinh nghiệm:\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tối thiểu 3-5 năm kinh nghiệm trong lĩnh vực bán hàng FMCG, trong đó có ít nhất 1-2 năm ở vị trí Giám sát Bán hàng hoặc quản lý trực tiếp đội ngũ bán hàng. \u003c/p\u003e\u003cp\u003e- Kinh nghiệm làm việc trực tiếp với Nhà phân phối là bắt buộc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3\tTrình độ Tin học/Ngoại ngữ:\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Sử dụng thành thạo Microsoft Office (đặc biệt là Excel để phân tích dữ liệu và PowerPoint để trình bày kế hoạch).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4\tNăng lực / Kỹ năng:\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng huấn luyện và kèm cặp:\u003c/strong\u003e Có đam mê và khả năng hướng dẫn, phát triển nhân viên bán hàng trực tiếp tại thị trường. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng quản lý NPP:\u003c/strong\u003e Am hiểu sâu sắc về vận hành của một NPP và có khả năng làm việc hiệu quả với chủ NPP. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng lập kế hoạch và tổ chức:\u003c/strong\u003e Có khả năng tổ chức công việc cho đội nhóm một cách khoa học, xây dựng tuyến bán hàng hiệu quả. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng lãnh đạo và tạo động lực:\u003c/strong\u003e Có khả năng dẫn dắt, truyền lửa và gắn kết đội nhóm.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5\tYêu cầu khác:\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Nhạy bén, quyết đoán, có khả năng làm việc độc lập và chịu áp lực cao. - Sẵn sàng đi công tác thường xuyên.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T630,Khởi nghiệp kinh doanh trong lĩnh vực Văn phòng phẩm từ cuối những năm 90, trải qua các quá trình chuyển đổi, xây dựng và hoàn thiện, Công ty Cổ phần Golden Pen tự hào là một trong những công ty hàng đầu cung cấp văn phòng phẩm chất lượng cao tại Việt Nam.\r\n\r\nGolden Pen phân phối độc quyền sản phẩm của các nhãn hiệu hàng đầu thế giới như: PENTEL (Nhật Bản), CANON (Nhật Bản), KOH-I-NOOR (Tiệp Khắc),... Được sản xuất tại các quốc gia dẫn đầu thế giới về khoa học và công nghệ, mỗi sản phẩm đều được nghiên cứu và sản xuất kỹ lưỡng trên những dây chuyền hiện đại, có độ chính xác cao, đảm bảo chất lượng sản phẩm tối ưu đạt tiêu chuẩn quốc tế với những tính năng ưu việt, thân thiện với môi trường và an toàn cho người sử dụng.\r\n\r\nV
