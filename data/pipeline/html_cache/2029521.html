\r\nhttps://new.abb.com/vn24:Tcc2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eAbout ABB \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBuilding on over 140 years of excellence, our more than 105,000 employees worldwide are committed to delivering on our purpose with innovations that create success for ABB and all our stakeholders. Our solutions connect engineering know-how and software to optimize how things are manufactured, moved, powered and operated. In collaboration with our customers, partners and suppliers, we address the world’s energy challenges, transform industries and embed sustainability in everything we do. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob details\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJoin ABB as you progress in your career alongside a worldwide team that is transforming society and industry for a more productive and sustainable future. \u003c/strong\u003e \u003c/p\u003e\u003cp\u003eAt ABB, we have the clear goal of advancing diversity and inclusion across all dimensions: gender, LGBTQ+, abilities, ethnicity, and generations. Together, we are embarking on a journey where each and every one of us, individually and collectively, welcomes and celebrates individual differences.  \u003c/p\u003e\u003cp\u003eAs a participant in the Global Discovery Early Talent Program - Marketing and Sales track, you will assume hands-on responsibilities from day one. The exceptional colleagues you collaborate with, the challenging projects you undertake, and the global scope of our business will provide you with the experience necessary to build a world-class career in this field. \u003c/p\u003e\u003cp\u003eYou will be part of a 24-month rotational program designed to enhance your skills in inside sales, marketing, leadership, and ABB product knowledge. Your rotations will be within the Electrification business area, encompassing divisions such as Distribution Solutions, Smart Building, Smart Power , Service  and Installation Products. You will also participate in a June orientation alongside other Discovery Program participants. This global initiative is tailored for early talent training, personal and professional growth, and networking opportunities. \u003c/p\u003e\u003cp\u003eThe program consists of three assignments in different roles: \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tFirst 6 Months\u003c/strong\u003e: An assignment in your home country to introduce you to the business, complete with relevant KPIs. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tSecond 6 Months\u003c/strong\u003e: An assignment abroad to gain insights into ABB’s operations in a different environment and role, allowing you to work on an exciting project with a new team, thereby expanding your network and learning curve. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tLast 12 Months\u003c/strong\u003e: An assignment back in your home country or business, where you will deepen your understanding of the business and your division, preparing for your final position. \u003c/p\u003e\u003cp\u003eThroughout the program, participants will engage in leadership competency development, a learning journey, and technical courses to enhance their skills. Depending on the assignment role, you may find yourself in one of the following positions subject to country/business requirements -  \u003c/p\u003e\u003cp\u003e•\tTendering/Sales Support \u003c/p\u003e\u003cp\u003e•\tProduct Marketing Specialist \u003c/p\u003e\u003cp\u003e•\tField Application Engineer (FAE) / Technical Promotion \u003c/p\u003e\u003cp\u003eWe encourage and support you to step outside your comfort zone to develop your leadership, management, and communication skills. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T70d,\u003cp\u003e\u003cstrong\u003eWhat kind of candidate are you looking for?\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eWe are looking for recent graduates with a solid academic foundation, preferably holding a Bachelor's or Master's degree in fields such as Electrical Engineering, Electrical Sciences,  Mechatronics, Mechanical Engineering, or related disciplines, specifically within the electrification sector. The ideal candidate should possess the following skills and experiences: \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducational Background:\u003c/strong\u003e Preferred degrees include: \u003c/p\u003e\u003cp\u003e•\tBachelor’s degree in Electrical Engineering or a related field \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical Skills:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tStrong analytical skills for conducting market research, analyzing trends, and identifying growth opportunities in the electrification market. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCommunication Skills:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tExcellent verbal and written communication skills, with a knack for crafting compelling value propositions tailored to various customer segments in the electrification sector. \u003c/p\u003e\u003cp\u003e•\tAbility to collaborate effectively with cross-functional teams and engage with customers. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGlobal Mindset:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tA willingness to think globally and work in diverse teams, demonstrating curiosity, resilience, and openness to new ideas. \u003c/p\u003e\u003cp\u003e•\tCandidates must be open for relocation to a different country for the second rotation. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAttention to Detail:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tA strong emphasis on accuracy and detail in all tasks, ensuring high-quality outputs in project management and reporting. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePassion for Innovation:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tA proactive approach to identifying gaps and opportunities for differentiation in the electrification market, along with a commitment to promoting sustainable practices. \u003c/p\u003e26:T4f3,ABB is a leading global engineering company that energizes the transformation of society and industry to achieve a more productive, sustainable future. By connecting software to its electrification, robotics, automation and mot"])</script><script>self.__next_f.push([1,"ion portfolio, ABB pushes the boundaries of technology to drive performance to new levels. With a history of excellence stretching back more than 130 years, ABB’s success is driven by 110,000 talented employees in over 100 countries.\r\n\r\nABB was established in Vietnam in 1993 and now boasts five facilities nationwide to serve local and regional markets. In the 27 years since, it has grown to be a reliable partner in the field of technology, providing turnkey solutions and services in the market. ABB has taken part in a string of important projects underpinning the country’s power sector development as well as powered and automated numerous important industrial plants promoting economic development across Vietnam.\r\n\r\nABB has two robotics centers in Vietnam to enable faster response nationwide and support its customers to meet manufacturing goals. ABB in Vietnam also manufactures switchgears, Compact Secondary Substations and customized solutions for special applications serving domestic usage and customers in Asia-Pacific.29:T44e,Established in Vietnam in 1993, ABB recently has around 900 employees working in three regions across the country to ensure the nationwide presence of the ABB brand. The Head Office and Transformer Factories are located in Hanoi, High Voltage and Medium Voltage Power Product factories are in Bac Ninh, other branch offices are in Da Nang and Ho Chi Minh City.\r\n\r\nABB is organized into five businesses according to the customers and industries we serve which in turn are made up of specific business lines focused on particular i y/business requirements -  \u003c/p\u003e\u003cp\u003e•\tTendering/Sales Support \u003c/p\u003e\u003cp\u003e•\tProduct Marketing Specialist \u003c/p\u003e\u003cp\u003e•\tField Application Engineer (FAE) / Technical Promotion \u003c/p\u003e\u003cp\u003eWe encourage and support you to step outside your comfort zone to develop your leadership, management, and communication skills. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T70d,\u003cp\u003e\u003cstrong\u003eWhat kind of candidate are you looking for?\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eWe are looking for recent graduates with a solid academic foundation, preferably holding a Bachelor's or Master's degree in fields such as Electrical Engineering, Electrical Sciences,  Mechatronics, Mechanical Engineering, or related disciplines, specifically within the electrification sector. The ideal candidate should possess the following skills and experiences: \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducational Background:\u003c/strong\u003e Preferred degrees include: \u003c/p\u003e\u003cp\u003e•\tBachelor’s degree in Electrical Engineering or a related field \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical Skills:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tStrong analytical skills for conducting market research, analyzing trends, and identifying growth opportunities in the electrification market. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCommunication Skills:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tExcellent verbal and written communication skills, with a knack for crafting compelling value propositions tailored to various customer segments in the electrification sector. \u003c/p\u003e\u003cp\u003e•\tAbility to collaborate effectively with cross-functional teams and engage with customers. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGlobal Mindset:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tA willingness to think globally and work in diverse teams, demonstrating curiosity, resilience, and openness to new ideas. \u003c/p\u003e\u003cp\u003e•\tCandidates must be open for relocation to a different country for the second rotation. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAttention to Detail:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tA strong emphasis on accuracy and detail in all tasks, ensuring high-quality outputs in project management and reporting. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePassion for Innovation:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e•\tA proactive approach to identifying gaps and opportunities for differentiation in the electrification market, along with a commitment to promoting sustainable practices. \u003c/p\u003e2d:{\"skillName\":\"Marketing Planning\",\"skillId\":28126,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Marketing Research\",\"skillId\":19596,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Product Marketing\",\"skillId\":11232,\"sk"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"illWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"English\",\"skillId\":100,\"skillWeight\":100,\"isExisted\":false}\n31:{\"skillName\":\"Marketing Strategy\",\"skillId\":7975,\"skillWeight\":100,\"isExisted\":false}\n2c:[\"$2d\",\"$2e\",\"$2f\",\"$30\",\"$31\"]\n33:{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"Family healthcare\"}\n34:{\"benefitId\":8,\"benefitIconName\":\"fa-mobile\",\"benefitName\":\"Mobile\",\"benefitNameVI\":\"Điện thoại\",\"benefitValue\":\"Mobile allowance\"}\n35:{\"benefitId\":11,\"benefitIconName\":\"fa-cab\",\"benefitName\":\"Transportation\",\"benefitNameVI\":\"Xe đưa đón\",\"benefitValue\":\"Taxi allowance\"}\n32:[\"$33\",\"$34\",\"$35\"]\n38:{\"lat\":10.782403,\"lon\":106.700811}\n37:{\"workingLocationId\":65982,\"addressId\":37472,\"cityId\":29
