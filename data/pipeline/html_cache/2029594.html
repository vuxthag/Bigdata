c sống vẹn toàn và tổ ấm hoàn hảo.\r\n\r\nXác định con người là nhân tố cốt lõi, hơn 1 thập kỷ qua, Capital House đã xây dựng được một đội ngũ nhân sự chuyên nghiệp, năng động, nhiều kinh nghiệm trong lĩnh vực xây dựng – bất động sản.\r\n\r\nLuôn lấy chữ “Tín” làm kim chỉ nam cho mọi hoạt động, Capital House đã tự tin cho ra đời các công trình chất lượng, bắt kịp xu hướng phát triển kinh tế - xã hội.\r\n\r\nCapital House hiểu rằng, trách nhiệm xã hội của doanh nghiệp thể hiện chính trong những sản phẩm chất lượng cao nhất, phục vụ cộng đồng tốt nhất. “Kiến tạo cuộc sống xanh”, xây dựng những khu đô thị bền vững, chính là định hướng phát triển mà Capital House muốn chia sẻ với các đối tác, khách hàng.\r\n\r\nBên cạnh đó, Capital House còn có nhiều hoạt động thiện nguyện được tổ chức thường xuyên, liên tục ở các địa phương trong cả nước như: Hành trình về Mường Khương (Lào Cai); Tặng quà cho bệnh nhi tại BV Nhi TW, hay các gia đình có hoàn cảnh khó khăn ngay tại các dự án nhà ở xã hội của công ty… Tất cả vì mục tiêu chung tay cùng xã hội giúp đỡ, chia sẻ với những người có hoàn cảnh khó khăn.\r\n\r\nSẻ chia để được thành công hơn, và thành công hơn để được sẻ chia nhiều hơn, đó chính là những giá trị nhân văn cao cả mà Capital House cảm nhận sâu sắc và hành động thiết thực.\r\n\r\nCông ty CP EFC Ecoservices là Công ty hoạt động lĩnh vực khai thác, vận hành tài sản BĐS của Tập đoàn. Các Dự án BĐS Khai thác, cho thuê là các tòa nhà Văn phòng cho thuê, căn hộ cho thuê, mặt sàn TTTM, ShopHouse... phân bổ tại Hà Nội, Quy Nhơn, Buôn Ma Thuột, Lâm Đồng..."])</script><script>self.__next_f.push([1,"24:T15ea,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eHệ sinh thái Genesis\u003c/strong\u003e là tổ chức vận hành theo triết lý Thuận tự nhiên và văn hóa lấy Đạo làm người làm nền tảng. Chúng tôi hướng tới xây dựng một tổ chức xanh – nơi con người, hệ thống và phương thức vận hành cộng sinh hài hòa, tạo giá trị bền vững cho xã hội và thiên nhiên.\u003c/p g phân khúc nhà ở xã hội và nhà ở thương mại kiến trúc xanh và thông minh.\r\n\r\nTiếp nối thành công đó, Capital House định hướng phát triển sang các lĩnh vực bất động sản cho thuê, xây dựng căn hộ thương mại phục vụ phân khúc khách hàng cao cấp. Các dự án điển hình như EcoLife Capitol và EcoLife Tây Hồ áp dụng triết lý thiết kế Xanh – Bền vững – Thân thiện môi trường. Ý tưởng xuyên suốt tại các công trình này là sự kết hợp nhịp nhàng giữa kiến trúc, thiên nhiên cùng những giá trị sống chuẩn mực giúp khách hàng cảm nhận sâu sắc ý nghĩa cuộc sống vẹn toàn và tổ ấm hoàn hảo.\r\n\r\nXác định con người là nhân tố cốt lõi, hơn 1 thập kỷ qua, Capital House đã xây dựng được một đội ngũ nhân sự chuyên nghiệp, năng động, nhiều kinh nghiệm trong lĩnh vực xây dựng – bất động sản.\r\n\r\nLuôn lấy chữ “Tín” làm kim chỉ nam cho mọi hoạt động, Capital House đã tự tin cho ra đời các công trình chất lượng, bắt kịp xu hướng phát triển kinh tế - xã hội.\r\n\r\nCapital House hiểu rằng, trách nhiệm xã hội của doanh nghiệp thể hiện chính trong những sản phẩm chất lượng cao nhất, phục vụ cộng đồng tốt nhất. “Kiến tạo cuộc sống xanh”, xây dựng những khu đô thị bền vững, chính là định hướng phát triển mà Capital House muốn chia sẻ với các đối tác, khách hàng.\r\n\r\nBên cạnh đó, Capital House còn có nhiều hoạt động thiện nguyện được tổ chức thường xuyên, liên tục ở các địa phương trong cả nước như: Hành trình về Mường Khương (Lào Cai); Tặng quà cho bệnh nhi tại BV Nhi TW, hay các gia đình có hoàn cảnh khó khăn ngay tại các dự án nhà ở xã hội của công ty… Tất cả vì mục tiêu chung tay cùng xã hội giúp đỡ, chia sẻ với những người có hoàn cảnh khó khăn.\r\n\r\nSẻ chia để được thành công hơn, và thành công hơn để được sẻ chia nhiều hơn, đó chính là những giá trị nhân văn cao cả mà Capital House cảm nhận sâu sắc và hành động thiết thực.\r\n\r\nCông ty CP EFC Ecoservices là Công ty hoạt động lĩnh vực khai thác, vận hành tài sản BĐS của Tập đoàn. Các Dự án BĐS Khai thác, cho thuê là các tòa nhà Vă
