\u003e'A. Merchandise management: Supervise subordinates to ensure:\u003c/p\u003e\u003cp\u003e- Received merchandise at loading bay is in correct quantity, quality and specifications.\u003c/p\u003e\u003cp\u003e- Merchandise on sales floor is fully replenished, in good conditions \u0026 quality.\u003c/p\u003e\u003cp\u003e- All the display merchandise is according to schematic plan and all the price between display merchandise and price card is tally.\u003c/p\u003e\u003cp\u003e- Changing price label (if necessary) is completed before store opens.\u003c/p\u003e\u003cp\u003e- Verify and approve inventory orders, merchandise return \u0026 transfer, PA zero raised by Division Leader(s) \u0026 Group Leaders.\u003c/p\u003e\u003cp\u003e- Plan, prepare and assign tasks for subordinates for bi-annual Stock Take and support Foodline with monthly Stock - Take as directed by Store Manager.\u003c/p\u003e\u003cp\u003e- Plan, assign duties for subordinates to make necessary preparation for Membership Day, Mommy Day and Public Holidays.\u003c/p\u003e\u003cp\u003eB. Non-merchandise management\u003c/p\u003e\u003cp\u003e- Supervise subordinates to ensure:\u003c/p\u003e\u003cp\u003e- Operational equipment, lighting and fixtures (gondola, wagon, shelves, etc.) are in good conditions.\u003c/p\u003e\u003cp\u003e- Sales floor/pillar/wall is kept clean \u0026 tidy.\u003c/p\u003e\u003cp\u003e- All backrooms are locked and in good conditions.\u003c/p\u003e\u003cp\u003e- Fire Safety procedure is carried out properly.\u003c/p\u003e\u003cp\u003e- Make order request for equipment and get approval from Store Manager.\u003c/p\u003e\u003cp\u003eC. Customer service\u003c/p\u003e\u003cp\u003e- Handle customer complaints raised by Division Leader(s), difficult and complicated sales.\u003c/p\u003e\u003cp\u003e- Always remind subordinate to promote \"customer first\" spirit.\u003c/p\u003e\u003cp\u003e- Follow Company's Rules on Customer Service (greeting, smiling, bowing and attitude towards customers).\u003c/p\u003e\u003cp\u003e'- Brief subordinates on yesterday sales achievement, today sales budget, up-to-date sales achievement, promotion and company updates.\u003c/p\u003e\u003cp\u003e- Share information about customer voice or any arising issues.\u003c/p\u003e\u003cp\u003e- Breakdown the sales target given by the Management to each Division Leader and take responsibilities for sales target achievement of the Department.\u003c/p\u003e\u003cp\u003e- Plan daily sales target on a monthly basis, basing on target of the month announced by Merchandise Department.\u003c/p\u003e\u003cp\u003e- Analyze sales figures and forecasting future sales volumes to maximize profits.\u003c/p\u003e\u003cp\u003e- Analyze and interpreting trends to facilitate planning.\u003c/p\u003e\u003cp\u003e- Take overall responsibility for the successful execution of all promotion schemes.\u003c/p\u003e\u003cp\u003e- Work with Merchandising Dept. for any changes/improvement in merchandise assortment, quality and quantity.\u003c/p\u003e\u003cp\u003e- Prepare for higher management review:\u003c/p\u003e\u003cp\u003e+ Weekly: sales information, sales promotion review and report of slow moving items.\u003c/p\u003e\u003cp\u003e+ Monthly: Division review, Promotion review, Sales analysis, Productivity report.\u003c/p\u003e\u003cp\u003e+ Promotion schemes to boost sales.\u003c/p\u003e\u003cp\u003e- Take leading role in identifying any arising issues affecting sales and operation and proposing corrective actions to the Management.\u003c/p\u003e\u003cp\u003e- Take leading role in seeking and working towards solutions to mitigate merchandise loss/shrinkage.\u003c/p\u003e\u003cp\u003e- Optimize people productivity by manpower planning and implementation to achieve target and maximum productivity.\u003c/p\u003e\u003cp\u003e- Ensure efficient leadership to direct the Line/Department towards Company's business strategies.\u003c/p\u003e\u003cp\u003e- Monitor Division Leader(s), Group Leader(s), General Staff' attend
