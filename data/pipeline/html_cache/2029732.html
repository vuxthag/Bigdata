r\n\r\nAt TCL, we are committed to simplifying logistics complexity and enabling businesses to grow globally — driven by a team that values collaboration, ownership, and continuous improvement.24:T1578,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Mục tiêu vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm xây dựng, vận hành và cải tiến toàn bộ hoạt động Hành chính Nhân sự của công ty; bảo đảm đủ người - đúng người - đúng cơ chế; đồng thời hỗ trợ Ban lãnh đạo trong việc xây dựng hệ thống quản trị nhân sự, nâng cao hiệu quả tổ chức, kiểm soát tuân thủ và phát triển đội ngũ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Nhiệm vụ chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.1 Hoạch định nhân sự và tuyển dụng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng kế hoạch tuyển dụng theo nhu cầu phát triển của các phòng ban và định hướng của công ty.\u003c/p\u003e\u003cp\u003e• Phối hợp với trưởng bộ phận để làm rõ nhu cầu tuyển dụng, tiêu chuẩn năng lực và chân dung ứng viên phù hợp cho từng vị trí.\u003c/p\u003e\u003cp\u003e• Tổ chức và kiểm soát toàn bộ quy trình tuyển dụng: sourcing, sàng lọc, phỏng vấn, đánh giá, đàm phán và nhận việc.\u003c/p\u003e\u003cp\u003e• Trực tiếp phỏng vấn và đánh giá các vị trí key staff, leader, manager trở lên.\u003c/p\u003e\u003cp\u003e• Phát triển nguồn ứng viên trong ngành logistics/forwarding và xây dựng thương hiệu tuyển dụng.\u003c/p\u003e\u003cp\u003e• Theo dõi hiệu quả tuyển dụng qua các chỉ số như time to fill, tỷ lệ đạt thử việc, tỷ lệ nghỉ việc sớm và chất lượng tuyển dụng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.2 Đào tạo, phát triển và kế thừa\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phối hợp xây dựng và triển khai chương trình hội nhập cho nhân sự mới.\u003c/p\u003e\u003cp\u003e• Khảo sát nhu cầu đào tạo, lập kế hoạch đào tạo năm và theo dõi việc triển khai.\u003c/p\u003e\u003cp\u003e• Xây dựng khung năng lực, tiêu chuẩn năng lực và lộ trình phát triển cho các nhóm vị trí.\u003c/p\u003e\u003cp\u003e• Phối hợp xây dựng chương trình tập sự, bổ nhiệm, thử thách và phát triển nhân sự kế cận.\u003c/p\u003e\u003cp\u003e• Đánh giá hiệu quả sau đào tạo và đề xuất cải tiến.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.3 Quản trị hiệu suất, lương thưởng và phúc lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tham mưu Ban lãnh đạo về cơ cấu lương, phúc lợi và chính sách đãi ngộ phù hợp với thị trường và khả năng chi trả của công ty.\u003c/p\u003e\u003cp\u003e• Xây dựng, rà soát và quản lý hệ thống lương theo vị trí/chức danh; phối hợp xây dựng nguyên tắc thưởng và đánh giá hiệu suất.\u003c/p\u003e\u003cp\u003e• Phối hợp với các trưởng bộ phận xây dựng, chuẩn hóa và theo dõi hệ thống KPI/đánh giá hiệu suất cho các vị trí.\u003c/p\u003e\u003cp\u003e• Kiểm soát công tác chấm công, tính lương, thưởng, BHXH và các chế độ phúc lợi khác.\u003c/p\u003e\u003cp\u003e• Báo cáo định kỳ về chi phí nhân sự và hiệu quả chính sách đãi ngộ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.4 Xây dựng hệ thống và chính sách nhân sự\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Soạn thảo, rà soát, cập nhật và quản lý các văn bản nhân sự: nội quy, quy chế, quy định, quy trình, biểu mẫu, quyết định, thư mời nhận việc, HĐLĐ.\u003c/p\u003e\u003cp\u003e• Chuẩn hóa bảng mô tả công việc, sơ đồ tổ chức, phân công trách nhiệm và phối hợp liên phòng ban.\u003c/p\u003e\u003cp\u003e• Phối hợp với các bộ phận xây dựng RACI/quy trình phối hợp khi cần.\u003c/p\u003e\u003cp\u003e• Tổ chức lưu trữ hồ sơ, tài liệu HCNS bản cứng và bản mềm một cách hệ thống, bảo mật và dễ truy xuất.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.5 Quan hệ lao động và tuân thủ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Quản lý toàn bộ nghiệp vụ liên quan đến quan hệ lao động: tiếp nhận, ký kết HĐLĐ, bổ nhiệm, điều chuyển, kỷ luật, thôi việc.\u003c/p\u003e\u003cp\u003e• Tư vấn cho Ban lãnh đạo và quản lý các phòng ban về rủi ro lao động, hồ sơ pháp lý và phương án xử lý phù hợp.\u003c/p\u003e\u003cp\u003e• Đảm bảo công ty tuân thủ quy định pháp luật lao động và các nghĩa vụ báo cáo liên quan.\u003c/p\u003e\u003cp\u003e• Xử lý hoặc tham gia xử lý các tình huống nhân sự nhạy cảm một cách khách quan, đúng quy định và giảm rủi ro tranh chấp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.6 Quản lý công tác hành chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tổ chức và kiểm soát các hoạt động hành chính văn phòng: mua sắm, cấp phát, nhà cung cấp, tài sản, văn phòng phẩm, đồng phục, môi trường làm việc.\u003c/p\u003e\u003cp\u003e• Kiểm soát chi phí hành chính, sự kiện nội bộ và các hoạt động hậu cần văn phòng.\u003c/p\u003e\u003cp\u003e• Quản lý các thủ tục liên quan đến visa, giấy phép lao động, thẻ tạm trú, APEC và hồ sơ liên quan đến nhân sự nước ngoài hoặc công tác nước ngoài.\u003c/p\u003e\u003cp\u003e• Phối hợp tổ chức các hoạt động truyền thông nội bộ, gắn kết nhân viên và sự kiện công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.7 Quản lý đội ngũ và báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phân công, hướng dẫn, kiểm tra và phát triển đội ngũ HCNS.\u003c/p\u003e\u003cp\u003e• Xây dựng kế hoạch hoạt động của phòng HCNS theo tháng, quý, năm.\u003c/p\u003e\u003cp\u003e• Báo cáo định kỳ cho Ban lãnh đạo về tình hình nhân sự, tuyển dụng, nghỉ việc, đào tạo, chi phí nhân sự, tuân thủ và các vấn đề nổi bật.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T5f1,Times Cargo Logistic (TCL) is a leading freight forwarding company in Vietnam, established in 2010 with more than a decade of continuous growth and over 200+ experienced professionals.\r\n\r\nWe
