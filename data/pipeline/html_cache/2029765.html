ting System) ServiceNow SPM implementation is responsible for leading operational support delivery for the platform, serving as the primary intake, triage, and coordination point for all incoming work. This role ensures support requests are properly prioritized, assigned, tracked, and delivered in alignment with business priorities, service level objectives, and platform governance.  \u003c/p\u003e\u003cp\u003eThis position owns downstream delivery of support outcomes, including resolution quality, timeliness, stakeholder communication, and continuous improvement. The Support Manager is also accountable for defining, producing, and presenting operational metrics and performance reporting to provide transparency into demand, throughput, trends, and overall platform health.\u003c/p\u003e\u003cp\u003e\t\u003c/p\u003e\u003cp\u003eWhat You Will Do:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Intake, Triage, and Work Assignment\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Serve as the primary intake point for all CEOS-related support requests, incidents, enhancements, and service inquiries.  \u003c/p\u003e\u003cp\u003e- Triage incoming work to determine priority, complexity, and appropriate support tier or resource.  \u003c/p\u003e\u003cp\u003e- Assign and coordinate work across Tier I, Tier II, Tier III, and development resources as appropriate.  \u003c/p\u003e\u003cp\u003e- Ensure work is aligned with delivery priorities, SLAs, and agreed-upon support models.  \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Operational Support Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Oversee day-to-day support operations for the CEOS ServiceNow SPM platform.  \u003c/p\u003e\u003cp\u003e- Monitor workload, queue health, and aging to ensure timely resolution and escalation where needed.  \u003c/p\u003e\u003cp\u003e- Act as the escalation point for high-impact or at-risk issues.  \u003c/p\u003e\u003cp\u003e- Ensure adherence to platform standards, processes, and gover
