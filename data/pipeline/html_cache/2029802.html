003e2. Thực hiện Vay Ngân hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chuẩn bị đầy đủ và hoàn thiện bộ Hồ sơ tín dụng theo yêu cầu của ngân hàng (Báo cáo tài chính, Phương án vay vốn, Kế hoạch kinh doanh, v.v.). \u003c/p\u003e\u003cp\u003e- Chủ động làm việc và \u003cstrong\u003eđàm phán\u003c/strong\u003e các điều khoản vay (lãi suất, kỳ hạn, phí, tài sản đảm bảo, cam kết tài chính - Covenants) với các Tổ chức tín dụng. \u003c/p\u003e\u003cp\u003e- Phối hợp với các bộ phận liên quan để hoàn thiện thủ tục giải ngân và thủ tục bảo đảm tiền vay (thế chấp, cầm cố).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản lý Sau vay\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Quản lý Hợp đồng tín dụng, đảm bảo Công ty tuân thủ các cam kết tài chính và phi tài chính. \u003c/p\u003e\u003cp\u003e- Thực hiện các báo cáo định kỳ theo yêu cầu của Ngân hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Thu xếp Nguồn vốn Thị trường Vốn (Equity \u0026 Capital Market)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Phát hành Trái phiếu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đề xuất cấu trúc và kế hoạch phát hành trái phiếu (riêng lẻ/ra công chúng) để huy động vốn. \u003c/p\u003e\u003cp\u003e- Phối hợp với Công ty Chứng khoán, đơn vị tư vấn để chuẩn bị các tài liệu pháp lý và tài liệu chào bán (Bản cáo bạch, Hồ sơ đăng ký niêm yết/ chào bán).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Huy động Vốn Cổ phần \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phân tích và xây dựng các phương án phát hành cổ phiếu (phát hành riêng lẻ, ESOP, chào bán ra công chúng) hoặc các giao dịch M\u0026A có yếu tố huy động vốn. \u003c/p\u003e\u003cp\u003e- Lập Báo cáo Định giá Doanh nghiệp (Valuation Report) để hỗ trợ đàm phán với nhà đầu tư.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Hoạt động Phân tích và Quản trị\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Phân tích Đầu tư\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thẩm định tài chính các dự án đầu tư mới dưới góc độ nhu cầu và hiệu quả sử dụng vốn (NPV, IRR, Payback Period).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tối ưu Cấu trúc Vốn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phân tích cơ cấu nợ/vốn chủ sở hữu hiện tại và đề xuất các giải pháp tái cấu trúc nguồn vốn để đạt được chi phí vốn (WACC) thấp nhất.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản trị Rủi ro\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Nhận diện và đánh giá rủi ro tài chính liên quan đến huy động vốn (rủi ro lãi suất, rủi ro hối đoái, rủi ro tái cấp vốn), đề xuất biện pháp phòng ngừa.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T4f1,\u003cp\u003eYÊU CẦU:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Học vấn: \u003c/strong\u003eTốt nghiệp Đại học trở lên chuyên ngành Tài chính, Ngân hàng, Đầu tư.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kinh nghiệm: \u003c/strong\u003eTối thiểu 02 - 03 năm kinh nghiệm trong lĩnh vực Tài chính Doanh nghiệp, Đầu tư, Tư vấn Tài chính hoặc Tín dụng Doanh nghiệp tại Ngân hàng/Công ty Chứng khoán.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kiến thức\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Nắm vững kiến thức chuyên môn về Tài chính Doanh nghiệp, định giá, phân tích Báo cáo tài chính. \u003c/p\u003e\u003cp\u003e- Am hiểu các quy định của pháp luật liên quan đến huy động vốn và thị trường vốn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Kỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e+ \u003cstrong\u003eMô hình hóa tài chính:\u003c/strong\u003e Thành thạo Excel để xây dựn
