strong\u003e1. Tuyển dụng trực tiếp \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng và triển khai kế hoạch tuyển dụng lực lượng Tư vấn tài chính theo chỉ tiêu tháng/quý/năm. \u003c/p\u003e\u003cp\u003e•\tChủ động khai thác nguồn ứng viên từ đa kênh: giới thiệu, sự kiện tuyển dụng, social media, digital marketing cá nhân. \u003c/p\u003e\u003cp\u003e•\tPhỏng vấn, đánh giá và ra quyết định lựa chọn tư vấn viên tiềm năng. \u003c/p\u003e\u003cp\u003e•\tTổ chức các hoạt động truyền thông tuyển dụng, hội thảo cơ hội nghề nghiệp tại khu vực được phân giao. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tuyển dụng gián tiếp \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp cùng Hội sở để triển khai chiến dịch tuyển dụng diện rộng, tối ưu bộ lọc ứng viên và dữ liệu nguồn ứng viên. \u003c/p\u003e\u003cp\u003e•\tPhản hồi định kỳ về chất lượng ứng viên, hiệu quả các kênh tuyển dụng và đề xuất cải tiến. \u003c/p\u003e\u003cp\u003e•\tPhối hợp Hội sở trong việc đánh giá, vận hành các chương trình tuyển mới. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. HUẤN LUYỆN \u0026 PHÁT TRIỂN ĐỘI NGŨ \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch đào tạo và huấn luyện định kỳ theo chuẩn Bộ Tài chính và chuẩn nghiệp vụ nội bộ. \u003c/p\u003e\u003cp\u003e•\tĐảm bảo 100% Tư vấn mới hoàn thành khóa học bắt buộc và đạt chuẩn thi cấp code Bộ Tài chính theo chỉ tiêu Miền. \u003c/p\u003e\u003cp\u003e•\tTheo dõi, quản lý và thúc đẩy kết quả học tập của Tư vấn trên hệ thống (Axonify, M-bro…). \u003c/p\u003e\u003cp\u003e•\tTrực tiếp huấn luyện kỹ năng bán hàng, kỹ năng khai thác khách hàng, tư vấn tài chính, kỹ năng digital cho đội ngũ. \u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch phát triển đội ngũ toàn diện trên con đường sự nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. TỔ CHỨC VÀ GIÁM SÁT KINH DOANH \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Tổ chức và giám sát hoạt động kinh doanh \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch kinh doanh theo Mi hoạt động và triển khai đến từng cấp tư vấn tài chính. \u003c/p\u003e\u003cp\u003e•\tGiám sát chỉ số hoạt động (KPI), doanh số, tỷ lệ duy trì hợp đồng, chất lượng tư vấn. \u003c/p\u003e\u003cp\u003e•\tĐiều phối hoạt động bán hàng tại khu vực: roadshow, hội thảo khách hàng, chiến dịch theo mùa. \u003c/p\u003e\u003cp\u003e•\tPhân tích dữ liệu kinh doanh để đưa ra cảnh báo sớm và kế hoạch hành động. / - Theo sát đội ngũ để kịp thời có các đề xuất, biện pháp cải tiến sản phẩm, dịch vụ, trải nghiệm khách hàng \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản lý danh mục khách hàng \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tNhận, phân bổ và theo dõi danh mục khách hàng. \u003c/p\u003e\u003cp\u003e•\tĐảm bảo lead được chăm sóc đúng quy trình, nâng cao tỷ lệ chuyển đổi. \u003c/p\u003e\u003cp\u003e•\tĐánh giá chất lượng danh mục, phản hồi để cải thiện mô hình phân bổ từ Hội sở. \u003c/p\u003e\u003cp\u003e•\tTriển khai các quy trình chăm sóc khách hàng đa kênh qua digital (chatbot, \u003cstrong\u003esocial, telesales, email...). \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. QUẢN LÝ CHẤT LƯỢNG BÁN HÀNG VÀ ĐỘI NGŨ \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGiám sát và đánh giá định kỳ chất lượng đội ngũ bán hàng dựa trên các chỉ tiêu: tuân thủ quy định Bộ Tài chính, chuẩn đạo đức nghề tư vấn, chất lượng tư vấn, tỷ lệ khiếu nại và tỷ lệ hủy hợp đồng. \u003c/p\u003e\u003cp\u003e•\tPhối hợp Khối Pháp chế \u0026 Tuân thủ để rà soát, nhắc nhở và nâng cao tiêu chuẩn hoạt động của đội ngũ. \u003c/p\u003e\u003cp\u003e•\tTổ chức các chương trình tái đào tạo, bổ sung kiến thức bắt buộc cho tư vấn tài chính vi phạm hoặc có chất lượng tư vấn thấp. \u003c/p\u003e\u003cp\u003e•\tQuản lý danh sách tư vấn tài chính có rủi ro cao: theo dõi, cảnh báo, hỗ trợ hướng dẫn để cải thiện. \u003c/p\u003e\u003cp\u003e•\tĐảm bảo đội ngũ tư vấn tài chính tại khu vực duy trì hình ảnh chuyên nghiệp, đúng chuẩn thương hiệu và đúng chuẩn mực hành vi nghề nghiệp theo quy định nội bộ. \u003c/p\u003e\u003cp\u003e•\tĐề xuất biện pháp loại bỏ, ngưng hợp tác hoặc khắc phục đối với các trường hợp không đáp ứng tiêu chuẩn chất lượng. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eE. TUÂN THỦ QUY CHẾ, QUY ĐỊNH DÀNH CHO NGƯỜI LAO ĐỘNG \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGiám đốc phát triển kinh doanh cần tuần thủ quy chế, quy định dành cho người lao động của Công ty theo từng thời kỳ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T583,\u003cp\u003e•\tTốt nghiệp Cao đẳng trở lên các chuyên ngành: Tài chính, Ngân hàng, Bảo hiểm, Quản trị kinh doanh, Marketing hoặc các lĩnh vực liên quan.\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 3 năm kinh nghiệm trong lĩnh vực tư vấn bảo hiểm; kinh nghiệm trong mảng bảo hiểm nhân thọ là một lợi thế .\u003c/p\u003e\u003cp\u003e•\tThành thạo các nền tảng mạng xã hội như Facebook, TikTok, Zalo, YouTube và biết cách khai thác hiệu quả cho mục tiêu kinh doanh.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm hoặc hiểu biết về Digital Marketing: quảng cáo, xây dựng nội dung, livestream… là một lợi thế.\u003c/p\u003e\u003cp\u003e•\tYêu thích việc xây dựng thương hiệu cá nhân chuyên nghiệp trên nền tảng số, đặc biệt trong lĩnh vực tư vấn bảo hiểm/tài chính.\u003c/p\u003e\u003cp\u003e•\tSẵn sàng tiên phong ứng dụng công nghệ và dẫn dắt đội nhóm tối ưu hiệu quả bán hàng, chăm sóc khách hàng.\u003c/p\u003e\u003cp\u003e•\tCó tố chất lãnh đạo, mong muốn phát triển và dẫn dắt đội nhóm.\u003c/p\u003e\u003cp\u003e•\tTruyền cảm hứng tốt, biết cách tạo động lực và gắn kết nhân sự.\u003c/p\u003e\u003cp\u003e•\tTư duy kinh doanh nhạy bén, chủ động nắm bắt cơ hội và quyết đoán trong hành động.\u003c/p\u003e\u003cp\u003e•\tGiao tiếp tự tin, khả năng thuyết phục và trình bày rõ ràng, cuốn hút.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e27:T15e1,"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. MỤC TIÊU CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eĐầu mối chịu trách nhiệm về kết quả kinh doanh của tại miền phụ trách, thông qua việc: \u003c/p\u003e\u003cp\u003e•\tĐảm bảo chất lượng tuyển dụng, bán hàng, dịch vụ khách hàng xuất sắc tại Miền kinh doanh phụ trách, góp phần nâng cao trải nghiệm khách hàng và quảng bá thương hiệu của MB Life. \u003c/p\u003e\u003cp\u003e•\tHuấn luyện đội ngũ tư vấn các kỹ năng bán hàng, các kỹ năng mềm... \u003c/p\u003e\u003cp\u003e•\tGiám sát, thúc đẩy và tổ chức các hoạt động kinh doanh tại Miền kinh doanh phụ trách nhằm đảm bảo hoàn thành kế hoạch kinh doanh. \u003c/p\u003e\u003cp\u003e•\tCác nhiệm vụ khác được Công ty phân giao theo từng thời kỳ. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. NHIỆM VỤ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. TUYỂN DỤNG ĐỘI NGŨ \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Tuyển dụng trực tiếp \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng và triển khai kế hoạch tuyển dụng lực lượng Tư vấn tài chính theo chỉ tiêu tháng/quý/năm. \u003c/p\u003e\u003cp\u003e•\tChủ động khai thác nguồn ứng viên từ đa kênh: giới thiệu, sự kiện tuyển dụng, social media, digital marketing cá nhân. \u003c/p\u003e\u003cp\u003e•\tPhỏng vấn, đánh giá và ra quyết định lựa chọn tư vấn viên tiềm năng. \u003c/p\u003e\u003cp\u003e•\tTổ chức các hoạt động truyền thông tuyển dụng, hội thảo cơ hội nghề nghiệp tại khu vực được phân giao. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tuyển dụng gián tiếp \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp cùng Hội sở để triển khai chiến dịch tuyển dụng diện rộng, tối ưu bộ lọc ứng viên và dữ liệu nguồn ứng viên. \u
