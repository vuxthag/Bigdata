tory, and customer.\u003c/p\u003e\u003cp\u003e• Liên hệ xưởng khuôn để sửa khuôn.\u003c/p\u003e\u003cp\u003eContact the mold shop to repair the mold.\u003c/p\u003e\u003cp\u003e• Cung cấp đế IP cho xưởng giày sau đó cùng xem xét quá trình dán đế, dán mặt giày.\u003c/p\u003e\u003cp\u003eProvide IP parts to the shoe factory, then review stock fitting for the bottom sole and upper.\u003c/p\u003e\u003cp\u003e• Làm việc với xưởng giày và khách hàng để xác nhận đế và lập ra tiêu chuẩn chiều dài cho đế.\u003c/p\u003e\u003cp\u003eWork with the shoe factory and customer to confirm the IMEVA sole and length tolerance.\u003c/p\u003e\u003cp\u003e• Thực hiện một số công việc khác được giao bởi Ban Giám đốc.\u003c/p\u003e\u003cp\u003eAny others job will be assigned by BOD when required.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. QUYỀN HẠN VÀ VIỆC RA QUYẾT ĐỊNH (NẾU CÓ)/ POWER AND DECISIONS (IF ANY)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có quyền điều phối và phân công công việc cho tất cả nhân viên trong bộ phận\u003c/p\u003e\u003cp\u003eHave the right to coordinate and assign work to all staffs in the department\u003c/p\u003e\u003cp\u003e- Được quyền làm việc với tất cả các bộ phận có liên quan để thu thập thông tin và xử lý những vấn đề liên quan đến kỹ thuật khuôn\u003c/p\u003e\u003cp\u003eBe allowed to work directly with other relevant departments to collect and solve issues related to mold engineering\u003c/p\u003e\u003cp\u003e- Đề xuất các vấn đề liên quan đến công việc mình phụ trách\u003c/p\u003e\u003cp\u003e Proposing issues that are related to my jobs\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T54a,\u003cp\u003e\u003cstrong\u003eIII. YÊU CẦU CÔNG VIỆC/ JOB REQUIREMENTS\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTrình độ học vấn, Chuyên ngành/ Education and majors\u003c/em\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học với các chuyên nghành có liên quan\u003c/p\u003e\u003cp\u003eGr
