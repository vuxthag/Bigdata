g \u0026 Governance\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tDevelop and maintain the overall project plan, covering scope, timeline, milestones, dependencies, resources, budget assumptions and key delivery risks.\u003c/p\u003e\u003cp\u003e•\tDefine and drive project governance structure, working model, meeting cadence, reporting mechanism and escalation path across all key stakeholders.\u003c/p\u003e\u003cp\u003e•\tEnsure project objectives, scope boundaries, priorities and success criteria are clearly aligned and consistently understood by all involved parties.\u003c/p\u003e\u003cp\u003e•\tEstablish and maintain project control artefacts such as RAID log, issue log, action log, decision log and change request tracker.\u003c/p\u003e\u003cp\u003e•\tMonitor project execution against approved baselines and proactively identify deviations, impact and corrective actions.\u003c/p\u003e\u003cp\u003e•\tDrive milestone-based planning and stage readiness for key phases such as requirement sign-off, design completion, SIT, UAT, migration, cutover and go-live.\u003c/p\u003e\u003cp\u003e•\tEnsure the project is delivered in compliance with internal governance, risk, architecture, security and release management standards of the Bank.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStakeholder \u0026 Vendor Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tAct as the central coordination point among Business, Product, IT, Operations, PMO and implementation partners/vendors.\u003c/p\u003e\u003cp\u003e•\tManage communication with senior stakeholders and provide timely project updates on status, risks, issues, dependencies and decisions required.\u003c/p\u003e\u003cp\u003e•\tDrive alignment across internal teams and vendors on project scope, delivery sequence, assumptions, responsibilities and timelines.\u003c/p\u003e\u003cp\u003e•\tManage vendor delivery commitments, key dependencies, issue escalation and follow-up to ensure external parties deliver as planned.\u003c/p\u003e\u003cp\u003e•\tFacilitate project forums, working sessions and steering meetings to support timely decision-making and issue resolution.\u003c/p\u003e\u003cp\u003e•\tManage stakeholder expectations in a complex delivery environment with evolving requirements, multiple dependencies and varying team maturity levels.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDelivery Oversight \u0026 Control\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tCoordinate end-to-end delivery activities across requirement clarification, solution alignment, build, integration, testing, migration, deployment and post go-live support.\u003c/p\u003e\u003cp\u003e•\tClosely manage dependencies between the vendor platform and the Bank’s legacy/internal systems, including interfaces, APIs, data mapping, environment readiness and operational impacts.\u003c/p\u003e\u003cp\u003e•\tTrack and control scope changes, ensuring impact on timeline, cost, quality and resources is properly assessed before approval.\u003c/p\u003e\u003cp\u003e•\tDrive risk identification, mitigation planning and escalation for critical project risks, especially those related to integration, unclear requirements, delayed dependencies and vendor performance.\u003c/p\u003e\u003cp\u003e•\tWork closely with Business and Technology teams to ensure testing strategy, business readiness, operational readiness and cutover readiness are well prepared.\u003c/p\u003e\u003cp\u003e•\tEnsure key project deliverables such as BRD/FRD, project plans, test plans, migration plans, cutover checklists and status reports are completed with appropriate quality and control.\u003c/p\u003e\u003cp\u003e•\tSupport release planning and go-live command activities to ensure a controlled and stable production launch.\u003c/p\u003e\u003cp\u003e\u003cbr\u0
