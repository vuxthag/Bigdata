/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T19d2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTỔNG QUAN/ OVERVIEW\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuản lý Kỹ thuật Công nghiệp thực hiện kỹ thuật và thiết kế các dự án kỹ thuật công nghiệp. Vai trò này bao gồm việc tối ưu hóa các quy trình và hệ thống phức tạp để giảm thiểu lãng phí, nâng cao hiệu quả và cải thiện hiệu suất các hoạt động chung.\u003c/p\u003e\u003cp\u003e\u003cem\u003eIndustrial Engineering Manager oversees and directs the engineering and technical design of industrial engineering projects. This role involves optimizing complex processes and systems to minimize waste, enhance efficiency, and improve overall operational performance.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eI.\tCÁC NHIỆM VỤ CHÍNH/ KEY RESPONSIBILITIES\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tLập kế hoạch chiến lược: Phát triển và triển khai các chiến lược kỹ thuật công nghiệp tinh gọn để tối ưu hóa quy trình sản xuất, giảm chi phí và nâng cao hiệu quả hoạt động chung.\u003c/p\u003e\u003cp\u003e\u003cem\u003eStrategic Planning: Develop and implement industrial engineering and lean strategies to optimize production processes, reduce costs, and enhance overall operational efficiency.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.\tCải tiến quy trình: Xác định các lĩnh vực cần cải tiến trong tổ chức, phân tích quy trình và triển khai các giải pháp để nâng cao năng suất và giảm lãng phí.\u003c/p\u003e\u003cp\u003e\u003cem\u003eProcess Improvement: Identify areas for improvement within the organization, analyze processes, and implement solutions to enhance productivity and reduce waste.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3.\tPhân tích dữ liệu sản xuất: Tổng hợp và phân tích các dữ liệu như hiệu quả sản xuất, quy trình, thông số chi phí sản xuất, tình trạng vận hành của con người và máy móc, thời gian chu kỳ, các vấn đề trong quy trình sản xuất của doanh nghiệp và hoạt động của công nhân.\u003c/p\u003e\u003cp\u003e\u003cem\u003eProduction data analysis: Synthesize and analyze data such as production efficiency, process, production cost parameters, human and machine operating status, cycle time, problems in the production process and worker operations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4.\tĐo lường hiệu suất: Phát triển và giám sát các chỉ số hiệu suất chính (KPI) để đo lường hiệu quả của các sáng kiến kỹ thuật công nghiệp.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePerformance Measurement: Develop and monitor key performance indicators (KPIs) to measure the effectiveness of industrial engineering initiatives.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5.\tCải tiến liên tục: Nuôi dưỡng văn hóa cải tiến liên tục bằng cách triển khai các nguyên tắc sản xuất tinh gọn và các phương pháp cải tiến quy trình khác.\u003c/p\u003e\u003cp\u003e\u003cem\u003eContinuous Improvement: Foster a culture of continuous improvement by implementing lean manufacturing principles and other process improvement methodologies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6.\tHiệu quả hoạt động: Tối đa hóa năng suất của máy móc và nguồn nhân lực. Biết cách xác định loại máy móc, công cụ, thiết bị cần sử dụng và bố trí vị trí thích hợp cho các máy móc, thiết bị được mua về. Đồng thời phải xác định được số lượng công nhân cần thiết để vận hành hệ thống sản xuất một cách hiệu quả.\u003c/p\u003e\u003cp\u003eOperational Efficiency: Maximize the productivity of machinery and human resources. Determine the type of machinery, tools, and equipment needed and arrange a good layout to the purchased machinery and equipment, At the same time, it is necessary to determine the number of workers needed to operate the production system effectively.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7.\tGiảm chi phí: Xác định và triển khai các sáng kiến tiết kiệm chi phí để cải thiện lợi nhuận.\u003c/p\u003e\u003cp\u003eCost Reduction: Identify and implement cost-saving initiatives to improve profitability.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e8.\tLàm việc với nhà cung cấp máy móc, thiết bị tự động hóa để cải thiện hiệu quả sản xuất\u003c/p\u003e\u003cp\u003eWork with machinery and automation equipment suppliers to improve production efficiency\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e9.\tHợp tác: Làm việc chặt chẽ với các nhóm chức năng chéo, bao gồm thiết kế kỹ thuật, sản xuất và đảm bảo chất lượng, để đạt được các mục tiêu của tổ chức.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCollaboration: Work closely with cross-functional teams, including design engineering, production, and quality assurance, to achieve organizational goals.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e10.\tLãnh đạo nhóm: Quản lý và phát triển một nhóm kỹ sư công nghiệp, cung cấp hướng dẫn, cố vấn và phản hồi về hiệu suất.\u003c/p\u003e\u003cp\u003eTeam Leadership: Manage and develop a team of industrial engineers, providing guidance, mentorship, and performance feedback.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e11.\tQuản lý dự án: Xác định mục tiêu dự án, phát triển kế hoạch dự án, phân bổ nguồn lực và đảm bảo hoàn thành kịp thời các mục tiêu.\u003c/p\u003e\u003cp\u003eProject Management: Define project objectives, develop project plans, allocate resources, and ensure timely completion of deliverables.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e12.\tThực hiện một số công việc khác được giao bởi Ban Giám đốc.\u003c/p\u003e\u003cp\u003eAny others job will be assigned by BODs when required.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII.\tQUYỀN HẠN VÀ VIỆC RA QUYẾT ĐỊNH (NẾU CÓ)/ POWERS AND DECISIONS (IF ANY):\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tCó quyền điều phối và phân công công việc cho tất cả nhân viên trong bộ phận\u003c/p\u003e\u003cp\u003eHave the right to coordinate and assign work to all staffs in the department\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e-\tĐược quyền làm việc với tất cả các bộ phận có liên quan để thu thập thông tin và xử lý những vấn đề liên quan đến kỹ thuật công nghiệp\u003c/p\u003e\u003cp\u003eBe allowed to work directly with other relevant departments to collect and solve issues related to industrial engineering\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e-\tTruyền tải những ý kiến, quyết định của Ban giám đốc tới nhân viên, giúp nhân viên hiểu đúng các yêu cầu và thực hiện đầy đủ.\u003c/p\u003e\u003cp\u003eTransfer the opinions, decisions of the Board of Directors to the staff, help the staff understand the requirements and implement fully.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e-\tĐề xuất các vấn đề liên quan đến công việc mình phụ trách.\u003c/p\u003e\u003cp\u003eProposing issues that are related to your work.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T8ff,"])</script><script>self.__next_f.push([1,"\u0 p\u003eAbility to analyze complex data and make informed decisions.\u003c/p\u003e\u003cp\u003e\u003cem\u003eKinh nghiệm/ Experience\u003c/em\u003e\u003c/p\u003e\u003cp\u003e- Tối thiểu 5 năm kinh nghiệm trong lĩnh vực quản lí công nghiệp thuộc ngành giày\u003c/p\u003e\u003cp\u003e\u003cem\u003eMinimum of 5 years of shoes experience in industrial engineering\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eSức khỏe/Health\u003c/em\u003e\u003c/p\u003e\u003cp\u003e- Có sức khỏe tốt\u003c/p\u003e\u003cp\u003e\u003cem\u003eHaving a good health\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTinh thần trách nhiệm/ Responsibility\u003c/em\u003e\u003c/p\u003e\u003cp\u003e- Cẩn thận và trung thực, luôn cố gắn hết mình để hoàn tất công việc\u003c/p\u003e\u003cp\u003eBe careful and honest, Always try the best to finish the job\u003c/p\u003e\u003cp\u003e- Thời gian làm việc: T2 - T7, 7h30 - 4h30\u003c/p\u003e\u003cp\u003eWork time: Monday - Saturday, 7:30 AM - 4:30 PM\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T19d2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTỔNG QUAN/ OVERVIEW\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuản lý Kỹ thuật Công nghiệp thực hiện kỹ thuật và thiết kế các dự án kỹ thuật công nghiệp. Vai trò này bao gồm việc tối ưu hóa các quy trình và hệ thống phức tạp để giảm thiểu lãng phí, nâng cao hiệu quả và cải thiện hiệu suất các hoạt động chung.\u003c/p\u003e\u003cp\u003e\u003cem\u003eIndustrial Engineering Manager oversees and directs the engineering and technical design of industrial engineering projects. This role involves optimizing complex processes and systems to minimize waste, enhance efficiency, and improve overall operational performance.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eI.\tCÁC NHIỆM VỤ CHÍNH/ KEY RESPONSIBILITIES\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tLập kế hoạch chiến lược: Phát triển và triển khai các chiến lược kỹ thuật công nghiệp tinh gọn để tối ưu hóa quy trình sản xuất, giảm chi phí và nâng cao hiệu quả hoạt động chung.\u003c/p\u003e\u003cp\u003e\u003cem\u003eStrategic Planning: Develop and implement industrial engineering and lean strategies to optimize production processes, reduce costs, and enhance overall operational efficiency.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.\tCải tiến quy trình: Xác định các lĩnh vực cần cải tiến trong tổ chức, phân tích quy trình và triển khai các giải pháp để nâng cao năng suất và giảm lãng phí.\u003c/p\u003e\u003cp\u003e\u003cem\u003eProcess Improvement: Identify areas for improvement within the organization, analyze processes, and implement solutions to enhance productivity and reduce waste.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3.\tPhân tích dữ liệu sản xuất: Tổng hợp và phân tích các dữ liệu như hiệu quả sản xuất, quy trình, thông số chi phí sản xuất, tình trạng vận hành của con người và máy móc, thời gian chu kỳ, các vấn đề trong quy trình sản xuất của doanh nghiệp và hoạt động của công nhân.\u003c/p\u003e\u003cp\u003e\u003cem\u003eProduction data analysis: Synthesize and analyze data such as production efficiency, process, production cost parameters, human and machine operating status, cycle time, problems in the production process and worker operations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4.\tĐo lường hiệu suất: Phát triển và giám sát các chỉ số hiệu suất chính (KPI) để đo lường hiệu quả của các sáng kiến kỹ thuật công nghiệp.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePerformance Measurement: Develop and monitor key performance indicators (KPIs) to measure the effectiveness of industrial engineering initiatives.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5.\tCải tiến liên tục: Nuôi dưỡng văn hóa cải tiến liên tục bằng cách triển khai các nguyên tắc sản xuất tinh gọn và các phương pháp cải tiến quy trình khác.\u003c/p\u003e\u003cp\u003e\u003cem\u003eContinuous Improvement: Foster a culture of continuous improvement by implementing lean manufacturing principles and other process improvement methodologies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6.\tHiệu quả hoạt động: Tối đa hóa năng suất của máy móc và nguồn nhân lực. Biết cách xác định loại máy móc, công cụ, thiết bị cần sử dụng và bố trí vị trí thích hợp cho các máy móc, thiết bị được mua về. Đồng thời phải xác định được số lượng công nhân cần thiết để vận hành hệ thống sản xuất một cách hiệu quả.\u003c/p\u003e\u003cp\u003eOperational Efficiency: Maximize the productivity of machinery and human resources. Determine the type of machinery, tools, and equipment needed and arrange a good layout to the purchased machinery and equipment, At the same time, it is necessary to determine the number of workers needed to operate the production system effectively.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e7.\tGiảm chi phí: Xác định và triển khai các sáng kiến tiết kiệm chi phí để cải thiện lợi nhuận.\u003c/p\u003e\u003cp\u003eCost Reduction: Identify and implement cost-saving initiatives to improve profitability.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e8.\tLàm việc với nhà cung cấp máy móc, thiết bị tự động hóa để cải thiện hiệu quả sản xuất\u003c/p\u003e\u003cp\u003eWork with machinery and automation equipment suppliers to improve production efficiency\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e9.\tHợp tác: Làm việc chặt chẽ với các nhóm chức năng chéo, bao gồm thiết kế kỹ thuật, sản xuất và đảm bảo chất lượng, để đạt được các mục tiêu của tổ chức.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCollaboration: Work closely with cross-functional teams, including design engineering, production, and quality assuranc
