e-\tReview current performance metrics, collaborate with the commercial head to identify actions, run scenarios, and provide recommendations to achieve KPIs.\u003c/p\u003e\u003cp\u003e-\tDevelop financial model and feasibility study to provide recommendations and advice for business projects\u003c/p\u003e\u003cp\u003e-\tCalculate and manage the optimal buying plan to ensure healthy stock coverage each month while achieving KPIs.\u003c/p\u003e\u003cp\u003e-\tWork closely with the sales team to define sales pricing and discount strategies, while supporting the standardization of pricing schemes.\u003c/p\u003e\u003cp\u003e-\tSupport commercial teams’ promotion scheme for special events, stimulate P\u0026L and evaluate scheme performance\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tFinancial budgeting (15%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tDevelop and manage the annual budget for the organization, ensuring accuracy and alignment with strategic goals and objectives\u003c/p\u003e\u003cp\u003e-\tIdentify and implement cost-saving measures and efficiencies to optimize the financial resources of the organization\u003c/p\u003e\u003cp\u003e-\tCollaborate with department heads to plan, review and analyze departmental budgets, providing guidance and support in financial decision-making\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tTechnical excellence and Training (15%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tAct as the go-to expert on financial modeling, Excel-based automation, and business performance tools.\u003c/p\u003e\u003cp\u003e-\tDevelop and deliver onboarding programs for junior finance analysts, including training materials, templates, and hands-on coaching\u003c/p\u003e\u003cp\u003e-\tProvide technical support and peer reviews to ensure accuracy, consistency, and continuous improvement in reporting and analysis practices\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tSpecial projects and Other tas
