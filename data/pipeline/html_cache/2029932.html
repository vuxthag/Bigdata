ư cách là một ngân hàng TMCP vào ngày 02/6/2008 sau khi thực hiện thành công kế hoạch cổ phần hóa thông qua việc phát hành cổ phiếu lần đầu ra công chúng. Ngày 30/6/2009, cổ phiếu Vietcombank (mã chứng khoán VCB) chính thức được niêm yết tại Sở Giao dịch Chứng khoán TPHCM. \r\n\r\nTrải qua hơn 50 năm xây dựng và phát triển, Vietcombank đã có những đóng góp quan trọng cho sự ổn định và phát triển của kinh tế đất nước, phát huy tốt vai trò của một ngân hàng đối ngoại chủ lực, phục vụ hiệu quả cho phát triển kinh tế trong nước, đồng thời tạo những ảnh hưởng quan trọng đối với cộng đồng tài chính khu vực và toàn cầu.\r\n\r\nTừ một ngân hàng chuyên doanh phục vụ kinh tế đối ngoại, Vietcombank ngày nay đã trở thành một ngân hàng đa năng, hoạt động đa lĩnh vực, cung cấp cho khách hàng đầy đủ các dịch vụ tài chính hàng đầu trong lĩnh vực thương mại quốc tế; trong các hoạt động truyền thống như kinh doanh vốn, huy động vốn, tín dụng, tài trợ dự án…cũng như mảng dịch vụ ngân hàng hiện đại: kinh doanh ngoại tệ và các công vụ phái sinh, dịch vụ thẻ, ngân hàng điện tử…\r\n\r\nSở hữu hạ tầng kỹ thuật ngân hàng hiện đại, Vietcombank có nhiều lợi thế trong việc ứng dụng công nghệ tiên tiến vào xử lý tự động các dịch vụ ngân hàng, phát triển các sản phẩm, dịch vụ ngân hàng điện tử dựa trên nền tảng công nghệ cao. Các dịch vụ: VCB Internet Banking, VCB Money, SMS Banking, Phone Banking,…đã, đang và sẽ tiếp tục thu hút đông đảo khách hàng bằng sự tiện lợi, nhanh chóng, an toàn, hiệu quả, tạo thói quen thanh toán không dùng tiền mặt  cho đông đảo khách hàng.\r\n\r\nSau hơn nửa thế kỷ hoạt động trên thị trường, Vietcombank hiện có gần 14.000 cán bộ nhân viên, với hơn 400 Chi nhánh/Phòng Giao dịch/Văn phòng đại diện/Đơn vị thành viên trong và ngoài nước, gồm 1 Hội sở chính tại Hà Nội, 1 Sở Giao dịch, 1 Trung tâm Đào tạo, 89 chi nhánh và hơn 350 phòng giao dịch trên toàn quốc,2 công ty con tại Việt Nam, 2 công ty con và 1 văn phòng đại diện tại nước ngoài, 6 công ty liên doanh, liên kết. Bên cạnh đó, Vietcombank còn phát triển một hệ thống Autobank với hơn 2.100 máy ATM và trên 49.500 điểm chấp nhận thanh toán thẻ (POS) trên toàn quốc. Hoạt động ngân hàng còn được hỗ trợ bởi mạng lưới hơn 1.800 ngân hàng đại lý tại trên 155 quốc gia và vùng lãnh thổ.\r\n\r\nVới bề dày hoạt động và đội ngũ cán bộ có năng lực, nhạy bén với môi trường kinh doanh hiện đại, mang tính hội nhập cao…Vietcombank luôn là sự lựa chọn hàng đầu của các tập đoàn, các doanh nghiệp lớn và của đông đảo khách hàng cá nhân.\r\n\r\nTrong hơn một thập kỷ trở lại đây, trên nhiều lĩnh vực hoạt động quan trọng, Vietcombank liên tục được các tổ chức uy tín trên thế giới bình chọn và đánh giá là “Ngân hàng tốt nhất Việt Nam”.\r\n\r\nBằng trí tuệ và tâm huyết, các thế hệ cán bộ nhân viên Vietcombank đã, đang và sẽ luôn nỗ lực để xây dựng Vietcombank phát triển ngày một bền vững, với mục tiêu sớm đưa Vietcombank trở thành ngân hàng có quy mô, năng lực quản trị, phạm vi hoạt động và tẩm ảnh hưởng trong khu vực và quốc tế trong thời gian tới."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T80b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003e***Để đảm bảo hồ sơ được tiếp nhận xử lý, ứng viên cần nộp hồ sơ ứng tuyển trên website tuyển dụng chính thức của Vietcombank tại địa chỉ: https://tuyendung.vietcombank.com.vn\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eThời hạn nộp hồ sơ: đến hết ngày 30\u003c/em\u003e/03/2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNơi làm việc: Phòng Mô hình và công cụ quản trị rủi ro (QUANT) - Trụ sở chính VCB\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eI. Mô tả công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Xây dựng, phát triển, giám sát và hỗ trợ vận  việc phụ trách.\u003c/p\u003e\u003cp\u003e• Trình độ tin học: Chứng chỉ ứng dụng CNTT cơ bản (hoặc tương đương) trở lên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Độ tuổi\u003c/strong\u003e: Không quá 35 tuổi tại thời điểm đăng ký tuyển dụng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kinh nghiệm:\u003c/strong\u003e Tối thiểu 03 năm kinh nghiệm làm việc trực tiếp về xây dựng mô hình PD (Xác suất vỡ nợ) Khách hàng cá nhân/Khách hàng doanh nghiệp\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kiến thức:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Am hiểu về hệ thống thông tin, cơ sở dữ liệu và các sản phẩm-dịch vụ ngân hàng.\u003c/p\u003e\u003cp\u003e• Am hiểu về các quy định Basel, văn bản chính sách của NHNN về quản lí rủi ro tín dụng, và kinh tế vĩ mô Việt Nam.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có kỹ năng làm việc nhóm và làm việc độc lập\u003c/p\u003e\u003cp\u003e• Có kỹ năng tổ chức thực hiện, sắp xếp công việc \u003c/p\u003e\u003cp\u003e• Có kỹ năng giao tiếp, truyền đạt trước đám đông\u003c/p\u003e\u003cp\u003e• Có kỹ năng phân tích, tổng hợp\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Khả năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có khả năng tư duy logic\u003c/p\u003e\u003cp\u003e• Có khả năng khái quát hóa\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Phẩm chất cá nhân:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Cẩn trọng, linh hoạt\u003c/p\u003e\u003cp\u003e• Chịu áp lực công việc cao\u003c/p\u003e\u003cp\u003e• Trung thực, kỷ luật, trách nhiệm\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Các tiêu chí khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Sức khỏe tốt, chịu được áp lực công việc cao.\u003c/p\u003e\u003cp\u003e• Có xác nhận lý lịch tư pháp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e9. Các tiêu chí ưu tiên:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Trình độ Thạc sỹ trở lên chuyên ngành Toán kinh tế, Toán tài chính, Kinh tế-Tài chính ứng ời gian tới."])</script><script>self.__next_f.push([1,"29:T111b,"])</script><script>self.__next_f.push([1,"Ngân hàng Ngoại thương Việt Nam trước đây, nay là Ngân hàng TMCP Ngoại thương Việt Nam (Vietcombank), được thành lập và chính thức đi vào hoạt động ngày 01/4/1963, với tổ chức tiền thân là Cục Ngoại hối (trực thuộc Ngân hàng Nhà nước Việt Nam). Là ngân hàng thương mại nhà nước đầu tiên được Chính phủ lựa chọn thực hiện thí điểm cổ phần hoá, Vietcombank chính thức hoạt động với tư cách là một ngân hàng TMCP vào ngày 02/6/2008 sau khi thực hiện thành công kế hoạch cổ phần hóa thông qua việc phát hành cổ phiếu lần đầu ra công chúng. Ngày 30/6/2009, cổ phiếu Vietcombank (mã chứng khoán VCB) chính thức được niêm yết tại Sở Giao dịch Chứng khoán TPHCM. \r\n\r\nTrải qua hơn 50 năm xây dựng và phát triển, Vietcombank đã có những đóng góp quan trọng cho sự ổn định và phát triển của kinh tế đất nước, phát huy tốt vai trò của một ngân hàng đối ngoại chủ lực, phục vụ hiệu quả cho phát triển kinh tế trong nước, đồng thời tạo những ảnh hưởng quan trọng đối với cộng đồng tài chính khu vực và toàn cầu.\r\n\r\nTừ một ngân hàng chuyên doanh phục vụ kinh tế đối ngoại, Vietcombank ngày nay đã trở thành một ngân hàng đa năng, hoạt động đa lĩnh vực, cung cấp cho khách hàng đầy đủ các dịch vụ tài chính hàng đầu trong lĩnh vực thương mại quốc tế; trong các hoạt động truyền thống như kinh doanh vốn, huy động vốn, tín dụng, tài trợ dự án…cũng như mảng dịch vụ ngân hàng hiện đại: kinh doanh ngoại tệ và các công vụ phái sinh, dịch vụ thẻ, ngân hàng điện tử…\r\n\r\nSở hữu hạ tầng kỹ thuật ngân hàng hiện đại, Vietcombank có nhiều lợi thế trong việc ứng dụng công nghệ tiên tiến vào xử lý tự động các dịch vụ ngân hàng, phát triển các sản phẩm, dịch vụ ngân hàng điện tử dựa trên nền tảng công nghệ cao. Các dịch vụ: VCB Internet Banking, VCB Money, SMS Banking, Phone Banking,…đã, đang và sẽ tiếp tục thu hút đông đảo khách hàng bằng sự tiện lợi, nhanh chóng, an toàn, hiệu quả, tạo thói quen than u003eThời hạn nộp hồ sơ: đến hết ngày 30\u003c/em\u003e/03/2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNơi làm việc: Phòng Mô hình và công cụ quản trị rủi ro (QUANT) - Trụ sở chính VCB\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eI. Mô tả công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Xây dựng, phát triển, giám sát và hỗ trợ vận hành/bảo trì các mô hình định lượng phục vụ quản lý rủi ro tín dụng, nhằm tối đa hóa lợi ích và yêu cầu quản trị của Ngân hàng. \u003c/p\u003e\u003cp\u003e2. Thiết kế xây dựng, rà soát, giám sát hoạt động và hỗ trợ vận hành các công cụ/hệ thống tin học hóa các mô hình định lượng rủi ro tín dụng.\u003c/p\u003e\u003cp\u003e3. Xây dựng năng lực và quy định, quy trình về xây dựng, phát triển, giám sát, hiệu chỉnh các mô hình định lượng rủi ro tín dụng. \u003c/p\u003e\u003cp\u003e4. Phối hợp thực hiện các giải pháp định lượng phục vụ quản lý rủi ro tín dụng:\u003c/p\u003e\u003cp\u003ea) Tham gia triển khai các sáng kiến về phân tích dữ liệu, mô hình hóa và tính toán tối ưu, quản lý và phát triển các nền tảng/công cụ phân tích nâng cao phục vụ hoạt động quản lý rủi ro tại VCB.\u003c/p\u003e\u003cp\u003eb) Phối hợp với các bộ phận liên quan trong quá trình triển khai tin học hóa và ứng dụng kết quả mô hình.\u003c/p\u003e\u003cp\u003e5. Khảo sát, quy hoạch dữ liệu và triển khai các hoạt động quản lý chất lượng dữ liệu nhằm phục vụ phân tích định lượng.\u003c/p\u003e\u003cp\u003e6. Tham gia các lớp đào tạo, tập huấn nghiệp vụ theo kế hoạch của phòng và VCB\u003c/p\u003e\u003cp\u003e7. Thực hiện các nhiệm vụ khác có liên quan do Lãnh đạo Phòng giao.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:Tb9a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học/ Thạc sỹ chuyên ngành Toán học, Toán tài chính, Toán kinh tế, Kỹ nghệ tài chính (Financial Engineering), Tài chính định lượng, Quản trị rủi ro, Phân tích kinh doanh, Khoa học dữ liệu, Kinh tế học, Kinh tế-tài chính ứng dụng, Định phí bảo hiểm, Trí tuệ nhân tạo, Khoa học máy tính hoặc các chuyên ngành có liên quan khác.\u003c/p\u003e\u003cp\u003e• Trình độ ngoại ngữ: Tiếng Anh B1 trở lên (khung tham chiếu ngôn ngữ chung châu Âu) hoặc tương đương, sử dụng tốt tiếng Anh, giao tiếp và đọc hiểu tài liệu liên quan đến công việc phụ trách.\u003c/p\u003e\u003cp\u003e• Trình độ tin học: Chứng chỉ ứng dụng CNTT cơ bản (hoặc tương đương) trở lên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Độ tuổi\u003c/strong\u003e: Không quá 35 tuổi tại thời điểm đăng ký tuyển dụng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kinh nghiệm:\u003c/strong\u003e Tối thiểu 03 năm kinh nghiệm làm việc trực tiếp về xây dựng mô hình PD (Xác suất vỡ nợ) Khách hàng cá nhân/Khách hàng doanh nghiệp\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kiến thức:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Am hiểu về hệ thống thông tin, cơ sở dữ liệu và các sản phẩm-dịch vụ ngân hàng.\u003c/p\u003e\u003cp\u003e• Am hiểu về các quy định Basel, văn bản chính sách của NHNN về quản lí rủi ro tín dụng, và kinh tế vĩ mô Việt Nam.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có kỹ năng làm việc nhóm và làm việc độc lập\u003c/p\u003e\u003cp\u003e• Có kỹ năng tổ chức thực hiện, sắp xếp công việc \u003c/p\u003e\u003cp\u003e• Có kỹ năng giao tiếp, truyền đạt trước đám đông\u003c/p\u003e\u003cp\u003e• Có kỹ năng phân tích, tổng hợp\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Khả năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có khả năng tư duy logic\u003c/p\u003e\u003cp\u003e• Có khả năng khái quát hóa\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Phẩm chất cá nhân:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Cẩn trọng, linh hoạt\u003c/p\u003e\u003cp\u003e• Chịu áp lực công việc hàng hiện đại, Vietcombank có nhiều lợi thế trong việc ứng dụng công nghệ tiên tiến vào xử lý tự động các dịch vụ ngân hàng, phát triển các sản phẩm, dịch vụ ngân hàng điện tử dựa trên nền tảng công nghệ cao. Các dịch vụ: VCB Internet Banking, VCB Money, SMS Banking, Phone Banking,…đã, đang và sẽ tiếp tục thu hút đông đảo khách hàng bằng sự tiện lợi, nhanh chóng, an toàn, hiệu quả, tạo thói quen thanh toán không dùng tiền mặt  cho đông đảo khách hàng.\r\n\r\nSau hơn nửa thế kỷ hoạt động trên thị trường, Vietcombank hiện có gần 14.000 cán bộ nhân viên, với hơn 400 Chi nhánh/Phòng Giao dịch/Văn phòng đại diện/Đơn vị thành viên trong và ngoài nước, gồm 1 Hội sở chính tại Hà Nội, 1 Sở Giao dịch, 1 Trung tâm Đào tạo, 89 chi nhánh và hơn 350 phòng giao dịch trên toàn quốc,2 công ty con tại Việt Nam, 2 công ty con và 1 văn phòng đại diện tại nước ngoài, 6 công ty liên doanh, liên kết. Bên cạnh đó, Vietcombank còn phát triển một hệ thống Autobank với hơn 2.100 máy ATM và trên 49.500 điểm chấp nhận thanh toán thẻ (POS) trên toàn quốc. Hoạt động ngân hàng còn được hỗ trợ bởi mạng lưới hơn 1.800 ngân hàng đại lý tại trên 155 quốc gia và vùng lãnh thổ.\r\n\r\nVới bề dày hoạt động và đội ngũ cán bộ có năng lực, nhạy bén với môi trường kinh doanh hiện đại, mang tính hội nhập cao…Vietcombank luôn là sự lựa chọn hàng đầu của các tập đoàn, các doanh nghiệp lớn và của đông đảo khách hàng cá nhân.\r\n\r\nTrong hơn một thập kỷ trở lại đây, trên nhiều lĩnh vực hoạt động quan trọng, Vietcombank liên tục được các tổ chức uy tín trên thế giới bình chọn và đánh giá là “Ngân hàng tốt nhất Việt Nam”.\r\n\r\nBằng trí tuệ và tâm huyết, các thế hệ cán bộ nhân viên Vietcombank đã, đang và sẽ luôn nỗ lực để xây dựng Vietcombank phát triển ngày một bền vững, với mục tiêu sớm đưa Vietcombank trở thành ngân hàng có quy mô, năng lực quản trị, phạm vi hoạt động và tẩm ảnh hưởng trong khu vực và quốc tế trong thời gian tới."])</script><script>self.__next_f.push([1,"3f:{\"companyId\":183798,\"jobImageURL
