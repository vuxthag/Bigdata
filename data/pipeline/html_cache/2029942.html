+07:00\",\"lastUpdatedOn\":\"2026-03-26T14:57:55+07:00\",\"lastSyncedOn\":\"2026-04-12T12:06:10+07:00\",\"companyName\":\"TRƯỜNG TIỂU HỌC JEAN PIAGET\",\"companyId\":278530,\"companyProfile\":\"Phương pháp giáo dục Kiến tạo Jean Piaget\\r\\n\\r\\n“Mục đích của những người làm giáo dục học đường là tạo ra những con người có khả năng làm nên những điều mới mẻ chứ không chỉ lặp lại những gì mà thế hệ khác đã làm.” – Jean Piaget – \\r\\n\\r\\nPhương pháp giáo dục là một phương pháp dạy học tích cực, coi trọng vai trò chủ động của người học trong quá trình học tập. Học sinh sẽ là những người tự xây dựng hiểu biết cho bản thân, tự kết nối và hoàn thiện những thông tin mà mình tiếp nhận được trong quá trình học tập, từ đó tạo nên những kiến thức mới. Với phương pháp học tập này, việc học không chỉ là quá trình chuyển thông tin từ giáo viên tới học sinh, giáo viên sẽ đóng vai trò dẫn dắt, truyền cảm hứng, cung cấp cho học sinh những công cụ và hiểu biết để tự xây dựng hiểu biết cho mình.\",\"companySizeId\":0,\"contactName\":\"Ms Nhung\",\"createdBy\":5071436,\"isOnline\":true,\"isActive\":true,\"isApproved\":true,\"isUnpaidDisable\":0,\"isCompleted\":true,\"isAnonymous\":false,\"isSalaryVisible\":false,\"isShowLogo\":true,\"isShowLogoInSearch\":false,\"jobDescription\":\"\u003cp\u003e\u003cstrong\u003eMÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Giảng dạy và thực hiện các công tác chuyên môn theo môn học\u003c/p\u003e\u003cp\u003e• Quản lý và đảm bảo chất lượng học tập của học sinh\u003c/p\u003e\u003cp\u003e• Tạo môi trường học tập tích cực và khuyến khích sự tương tác và tham gia của học sinh.\u003c/p\u003e\u003cp\u003e• Tham gia các hoạt động theo quy định của nhà trường\u003c/p\u003e\u003cp\u003e• (Bảng chi tiết công việc trao đổi trong buổi phỏng vấn)\u003c/p\u003e\",\"jobRequirement\":\"\u003cp\u003e• Tốt nghiệp ĐH Sư phạm Hà Nội 1,2, Các trường ĐHSP chuyên ngành Giáo dục Tiểu học, Sư phạm Ngữ Văn, Sư phạm Toán, Sư phạm Tiếng Anh.\u003c/p\u003e\u003c
