ks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T113f,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eĐịa điểm làm việc: HCM, tỉnh Ninh Bình (Nam Định cũ)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thực hiện các công việc chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.1 Quản lý, xây dựng và đào tạo đội ngũ đại sứ thương hiệu (PG)\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e- Phối hợp cùng với đối tác cung cấp PG đánh giá chất lượng đầu vào của PG theo quy định của Công ty.\u003c/p\u003e\u003cp\u003e- Đào tạo PG mới về sản phẩm của Công ty, nắm bắt thông tin về các sản phẩm của đối thủ. Hướng dẫn về công việc hàng ngày của PG, và các kỹ năng bán hàng cơ bản trước khi đưa PG ra điểm bán.\u003c/p\u003e\u003cp\u003e- Phối hợp với đội ngũ Sales tại khu vực để lên lịch điều động, sắp xếp lịch làm việc, ca làm việc cho đội ngũ PG mình quản lý trong khu vực phụ trách. Đảm bảo các hoạt động PG diễn ra đúng giờ, đúng lịch, đúng điểm bán.\u003c/p\u003e\u003cp\u003e- Triển khai công việc hàng ngày cho PG \u0026 lên lịch viếng thăm thị trường thường xuyên để kiểm tra, nhắc nhở và huấn luyện PG; đảm bảo đội ngũ PG mặc đồng phục, tác phong làm việc đầy đủ, chính xác; đảm bảo PG có đầy đủ công cụ làm việc theo quy định tại điểm bán.\u003c/p\u003e\u003cp\u003e- Phân bổ và giao chỉ tiêu sản lượng tổng cũng như sản phẩm trọng điểm hàng tháng cho đội ngũ PG cụ thể, rõ ràng nhằm hoàn thành kế hoạch Công ty giao xuống.\u003c/p\u003e\u003cp\u003e- Giám sát, đánh giá, huấn luyện nâng cao nghiệp vụ cho PG. Đề nghị thay thế bổ sung PG khi cần thiết nhằm đạt được tiêu chí đánh giá của Công ty cũng như đạt được mục tiêu công việc mà Công ty giao xuống.\u003c/p\u003e\u003cp\u003e- Xây dựng mối quan hệ với chủ điểm bán, đánh giá điểm bán do sale đề xuất đặt PG - báo cáo quản lý trực tiếp về từng điểm được đề xuất. Đảm bảo PG nắm được tính chất đặc thù và làm quen nhanh với điểm bán.\u003c/p\u003e\u003cp\u003e- Phản hồi nhanh chóng chính xác về điểm bán : lượng khách, sản lượng bán… báo cáo đầy đủ về hoạt động của đối thủ tại điểm bán trong địa bàn phụ trách cho bộ phận bán hàng (Sales) và các cấp quản lý của Bộ phận Tiếp thị thương mại (TTTM).\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm gửi báo cáo chấm công, báo cáo bán hàng cho nhà cung ứng là cơ sở đối chiếu tính lương cho PG của toàn Khu vực thị trường. Cung cấp các văn bản, tài liệu liên quan đến việc thanh toán cho team PG. Đồng thời kiểm tra, đối chiếu lại bảng lương, mức khoán và số bán của PG hàng tháng.\u003c/p\u003e\u003cp\u003e- Tổ chức họp hàng tuần cùng đội ngũ PG và các bộ phận liên quan (Bộ phận Tiếp thị thương mại, Nhân viên kinh doanh, Đại diện kinh doanh, Giám sát kinh doanh) để xem xét kết quả hoạt động và triển khai các kế hoạch hoạt động phù hợp.\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm hỗ trợ và thực hiện các events diễn ra tại điểm bán trong khu vực thị trường phụ trách về việc điều phối PG, hướng dẫn PG trong quá trình làm việc.\u003c/p\u003e\u003cp\u003e- Phối hợp với các bộ phận Sales để giải quyết nhanh các vấn đề gặp phải trên điểm bán trong thị trường được quản lý hoạt động PG.\u003c/p\u003e\u003cp\u003e- Hỗ trợ kiểm soát chương trình, POSM tại các điểm bán có PG.\u003c/p\u003e\u003cp\u003e- Thu thập khiếu nại khách hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2 Công việc khác.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đề xuất các biện pháp khắc phục, phòng ngừa, cải tiến các vấn đề không phù hợp trong quá trình thực hiện công việc chuyên môn.\u003c/p\u003e\u003cp\u003e- Thực hiện công tác lưu trữ, bảo quản hồ sơ tài liệu, tài sản, công cụ dụng cụ của Công ty thuộc mảng công việc được phân công khi được bàn giao và trong quá trình thực hiện công việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thực hiện các nhiệm vụ công việc khác phát sinh trong lĩnh vực công việc phụ trách theo phân công của cấp quản lý trực tiếp\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T4fb,\u003cp\u003e- Trình độ đào tạo: Tốt nghiệp Trung cấp trở lên, ưu tiên ngành/chuyên ngành Kinh tế, Thương mại, Quản trị kinh doanh, Marketing,…\u003c/p\u003e\u003cp\u003e- Tin học: Sử dụng tốt các phần mềm tin học văn phòng (word, excel, powerpoint...)\u003c/p\u003e\u003cp\u003e- Kinh nghiệm làm việc: Có kinh nghiệm làm việc từ 02 năm ở vị trí tương đương trong ngành hàng FMCG/F\u0026B.\u003c/p\u003e\u003cp\u003e- Sức khỏe: Tốt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***CHẾ ĐỘ ĐÃI NGỘ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Thu nhập tháng = Lương cơ bản (8,400,000 đ) + Thưởng hiệu suất cơ bản + Thưởng hiệu quả công việc (KPIs) + Các khoản hỗ trợ (Tiền
