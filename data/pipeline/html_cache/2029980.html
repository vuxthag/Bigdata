g sản nghỉ dưỡng.\r\nChúng tôi hân hoan được chào đón các bạn - những ứng viên muốn đến với STDA bằng tài năng, trí tuệ, phẩm chất đạo đức và lòng say mê công việc."])</script><script>self.__next_f.push([1,"24:T6f6,\u003cp\u003e•\tXây dựng, triển khai kế hoạch và chiến lược bán hàng kinh doanh các dự án bất động sản theo sát định hướng phát triển của công ty.\u003c/p\u003e\u003cp\u003e•\tNghiên cứu, đánh giá, tổng hợp về thị trường đối thủ, xu hướng BĐS và đề xuất giải pháp thúc đẩy kinh doanh của Công ty và điều hành hoạt động bán hàng của sàn, đảm bảo hoàn thành chỉ tiêu doanh số\u003c/p\u003e\u003cp\u003e•\tTìm kiếm và phát triển quan hệ với các khách hàng và đối tác tiềm năng.\u003c/p\u003e\u003cp\u003e•\tXây dựng, tổ chức triển khai kế hoạch marketing, sales hàng tháng, hàng năm và phối hợp với phòng Marketing trong việc xây dựng và triển khai các chiến dịch truyền thông, quảng bá dự án.\u003c/p\u003e\u003cp\u003e•\tGiám sát, đôn đốc nhân viên trong việc triển khai kinh doanh; đảm bảo hoàn thành chỉ tiêu doanh số của Công ty.\u003c/p\u003e\u003cp\u003e•\tTham mưu cho Ban Lãnh Đạo trong việc hoạch định chiến lược và báo cáo định kỳ về tình hình kinh doanh, nhân sự, thị trường cho Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e•\tTuyển dụng, đào tạo, phát triển và quản lý đội ngũ nhân sự kinh doanh (Trưởng phòng, Nhân viên kinh doanh). Quản lý, điều hành, giám sát công việc, chịu trách nhiệm về hoạt động của tất cả cán bộ, nhân viên trực thuộc bộ phận kinh doanh.\u003c/p\u003e\u003cp\u003e•\tĐề xuất chính sách bán hàng, hoa hồng, thưởng cho đội ngũ nhằm thúc đẩy doanh số.\u003c/p\u003e\u003cp\u003e•\tXây dựng và duy trì quan hệ với chủ đầu tư, đối tác, khách hàng lớn.\u003c/p\u003e\u003cp\u003e•\tQuản lý ngân sách, chi phí kinh doanh, tối ưu hiệu quả hoạt động.\u003c/p\u003e25:T83e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e•\tTốt nghiệp Đại Học ( Đại học Kinh tế/ Quản trị kinh doanh/Marketing....)\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm ít nhất 3 -5 năm ở vị trí tương đương trong lĩnh vực bất động sản \u003c/p\u003e\u003cp\u003e•\tAm hiểu thị trường Bất động sản Việt Nam, hiểu luật đất đai\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tƯu tiên ứng viên Chứng chỉ môi giới, Quản lý Sàn giao dịch, Định giá bất động sản\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKiến thức chuyên sâu về marketing\u003c/p\u003e\u003cp\u003e•\tKỹ năng quản lý đội nhóm, kỹ năng tìm kiếm và chăm sóc khách hang\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp tốt, kỹ năng xử lý tình huống\u003c/p\u003e\u003cp\u003e•\tKỹ năng làm việc độc lập\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThu nhập không giới hạn.\u003c/p\u003e\u003cp\u003e•\tThưởng cuối năm, thưởng Tết hấp dẫn theo kết quả kinh doanh của công ty.\u003c/p\u003e\u003cp\u003e•\tĐựợc xét khen thưởng/vinh danh hàng năm.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc thân thiện, năng động, chuyên nghiệp.\u003c/p\u003e\u003cp\u003e•\tĐược hòa vào văn hóa\" Ăn chơi nhảy múa\" của \"Gia đình Cen\" sau những giờ làm việc căng thẳng để kết nối mọi người gần với nhau hơn.\u003c/p\u003e\u003cp\u003e•\tThưởng dành cho các cá nhân, tập thể kinh doanh xuất sắc được xét 06 tháng 1 lần.\u003c/p\u003e\u003cp\u003e•\tThưởng cuối năm (lương tháng 13), thưởng tết hấp dẫn theo kết quả kinh doanh của Tập đoàn.\u003c/p\u003e\u003cp\u003e•\tTham gia du lịch, teambuilding, sinh nhật Tập đoàn hàng năm.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa đào tạo của Công ty.\u003c/p\u003e\u003cp\u003e•\tĐược hưởng đầy đủ chế độ bảo hiểm theo đúng Luật lao động hiện hành.\u003c/p\u003e\u003cp\u003e•\tĐược trang bị bảo hiểm sức khỏe PTI.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa đào tạo nhằm nâng cao nghiệp vụ.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐỊA ĐIỂM LÀM VIỆC: \u003c/strong\u003eTòa 137 Nguyễn Ngọc Vũ, Phường Trung Hòa, Cầu Giấy, Hà Nội.\u
