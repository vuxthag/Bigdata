ng đến cho thế giới những sản phẩm \"Đứng đầu\" và những kỹ thuật \"Duy nhất\", từ đó thực hiện ước mơ của tất cả khách hàng và cống hiến cho xã hội. Các giá trị cốt lõi mà chúng tôi theo đuổi gồm:\r\n1.\tPhát triển kỹ thuật: Chúng tôi không ngừng thử thách và phát triển những kỹ thuật và sản phẩm tiên tiến, đáp ứng nhu cầu của thời đại.\r\n2.\tKhách hàng là số 1: Cam kết mang đến những sản phẩm và dịch vụ tối ưu nhất, luôn lấy khách hàng làm trọng tâm.\r\n3.\tTạo lợi nhuận và thành công: Mục tiêu của chúng tôi là không chỉ tìm kiếm sự thịnh vượng chung mà còn mang lại niềm hạnh phúc cho mỗi thành viên trong tổ chức."])</script><script>self.__next_f.push([1,"24:T8a0,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Nam, Độ tuổi: 22- 25 tuổi\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học/ Cao đẳng chuyên ngành Hóa hữu cơ, Kỹ thuật vật liệu (ưu tiên Nhựa, Nhựa dẻo resin), hoặc các ngành kỹ thuật liên quan\u003c/p\u003e\u003cp\u003e- Ưu tiên ứng viên có kinh nghiệm nghiên cứu, phát triển sản phẩm và thiết kế công đoạn\u003c/p\u003e\u003cp\u003e- Có hiểu biết về nhựa, nhựa dẻo Resin hoặc đùn nhựa…\u003c/p\u003e\u003cp\u003e- Có kiến thức về phân tích rủi ro FMEA là một lợi thế.\u003c/p\u003e\u003cp\u003e- Ưu tiên tiếng Nhật N3 trở lên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Có thể đi công tác Nhật Bản\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có kỹ năng máy tính văn phòng, có thể sử dụng phần mềm Autocad (Autocad, solid work…)\u003c/p\u003e\u003cp\u003e- Có khả năng làm việc độc lập và làm việc nhóm\u003c/p\u003e\u003cp\u003e- Có thể chịu áp lực công việc và cam kết làm việc lâu dài\u003c/p\u003e\u003cp\u003e- Chủ động trong công việc, có kỹ năng phân tích logic\u003c/p\u003e\u003cp\u003e- Làm việc tại chi nhánh Vĩnh Phúc tại KCN Thăng Long 3 (Bình Xuyên, Phú Thọ)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*** QUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thu nhập hấp dẫn \u0026 chế độ tăng lương,
