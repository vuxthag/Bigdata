am holds that the optimal approach to personnel development is the creation of a work environment where employees can be authentic while also comprehending the organization's objectives through transparent sharing and timely guidance from leadership.\r\n\r\nAMWAY EVOLVES CULTURE THAT VALUES DIVERSITY, EQUITY, AND INCLUSION.\r\nBeing recognized as one of the Best Companies to Work for in Asia 2023, alongside prestigious Diversity, Equity, and Inclusion awards organized by HR Asia magazine, showcases our commitment to exceptional human resource practices. The assessment criteria encompass HR policies, employee benefits, work atmosphere, and training initiatives for engaging and nurturing talent at all levels.\r\n\r\nBuilt on our founders' values, Amway preserves the passion for the business. Today, as we embody the Founders' spirit with an evolved culture, we embrace the term \" FOUNDERS' GROWTH MINDSET (FGM). \" This mindset rests on three pillars:\r\nFocus on Caring: Lead with Heart , thinking “we before me”, showing the way with love and humility and working together to do the right thing.\r\nFocus on Purpose: Live to Serve , having a shared sense of urgency to support each other and help Amway Business Owners (AB0s) succeed with customer experience.\r\nFocus on Learning: Love to Learn , getting outside of our comfort zones, taking risks, learning fast. Never stop doing what we love.\r\nAs a result, Amway Vietnam has solidified its position with a consistent double-digit growth trajectory over five consecutive years, and by 2022, Vietnam proudly emerged as one of the Top 10 markets with the highest revenue within the global Amway Corporation."])</script><script>self.__next_f.push([1,"24:T754,\u003cp\u003e\u003cstrong\u003e1.\tIMC planning and campaign development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDevelop and execute annual and campaign-based IMC plans aligned with marketing strategy and business objectives \u003c/p\u003e\u003cp\u003e•\tDefine creative
