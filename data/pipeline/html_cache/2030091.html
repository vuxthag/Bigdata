liance, Regulatory Affairs, and Public Affairs functions by ensuring smooth execution of administrative and operational tasks. This includes:  \u003c/p\u003e\u003cp\u003e• Legal \u0026 Compliance Support: Assisting with documentation, notifications, registrations, and certifications required for compliance and legal operations.  \u003c/p\u003e\u003cp\u003e• Regulatory Affairs Coordination: Preparing product and claims dossiers, coordinating with internal departments and external stakeholders to facilitate regulatory analysis and approvals.  \u003c/p\u003e\u003cp\u003e• Administrative Execution: Managing sample submissions, tracking FDA licenses, distributing approved labels and regulatory documents across functions (e.g., Marketing, R\u0026D, QFS, SSD, F\u0026A).  \u003c/p\u003e\u003cp\u003e• Financial Oversight: Handling cost tracking and processing for lab analyses and regulatory activities, including purchase orders and expense reconciliation.  \u003c/p\u003e\u003cp\u003e• Documentation Management: Ensuring all registration documents are accurately filed and updated in the system.  \u003c/p\u003e\u003cp\u003e• Audit Support: Preparing and updating documentation for internal and external audits and acting as a representative during audits.  \u003c/p\u003e\u003cp\u003e• Stakeholder Engagement: Maintaining effective communication and relationships with internal teams and external agencies.  \u003c/p\u003e\u003cp\u003e  \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Main Duties and Functions  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Support Legal and Compliance function in Vietnam on various matters including corporate secretarial work, contract management, compliance activations, internal audits, and crisis management  \u003c/p\u003e\u003cp\u003e• Support Regulatory Affairs function in Vietnam on various matters including preparation of product and claims registrations (new and amended), coordination with internal and external stakeholders to support full process, and ensuring accuracy of sample codes, nutrition targets, laboratory results etc as instructed  \u003c/p\u003e\u003cp\u003e• Support Public Affairs function with preparation and participation in trade associations and external meetings  \u003c/p\u003e\u003cp\u003e• Liaise routinely across internal departments (Marketing, Finance, Sales, HR, etc) on operational tasks  \u003c/p\u003e\u003cp\u003e• Execute other administrative tasks including purchase order and payment processing, managing vendor quotations, translations, notarizations, filings, etc  \u003c/p\u003e\u003cp\u003e  \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Major Challenge of the Job (Describe the major challenge of the position, including details and difficulty of problems, which must be solved)  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e• Internal: \u003c/em\u003e\u003c/strong\u003eDanone Vietnam is a fast-paced and fast-growing company within a global matrix organization. Agility, growth mindset, and collaboration across teams are essential.  \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e• External: \u003c/em\u003e\u003c/strong\u003eAccuracy and speed of documentation / registration dossiers required for regulatory filings and inquiries. Positive relationship must be nurtured and maintained with external stakeholders including regulatory bodies, testing laboratories, and other vendors.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Background Information\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Working Relationships (Internal): Commercial team (Sales/Marketing/Healthcare Nutrition)/R\u0026I/Supply chain/QFS/IPRO/GS (CBU)\u003c/p\u003e\u003cp\u003e- Working Relationships (External): Ministry of Health/Advertising agency and product registration agencies/Embassy \u003c/p\u003e\u003cp\u003eLaboratories/Industries Associations/Law firms/Other vendors (translators, notary public, etc).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Decision Making Authority and Controls\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Respond to internal and external stakeholders’ queries with aligned team position to carry out tasks effectively and efficiently \u003c/p\u003e\u003cp\u003e• Manage and make decisions on basic / routine work\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T598,Danone is a leading global food and beverage company operating in three health-focused, fast-growing, and on-trend Categories: Essential Dairy \u0026 Plant-Based products, Waters, and Specialized Nutrition.\r\n\r\nWith a long-standing mission of bringing health through food to as many people as possible, Danone aims to inspire healthier and more sustainable eating and drinking practices while committing to achieve measurable nutritional, social, societal, and environment impact.\r\n\r\nDanone has defined its “Renew” strategy to restore growth, competitiveness, and value creation for the long-term. With almost 90,000 employees, and products sold in over 120 markets, Danone generated €27.6 billion in sales in 2023. Danone’s portfolio includes leading international brands (Actimel, Activia, Alpro, Aptamil, Danette, Danio, Danonino, evian, Nutricia, Nutrilon, and Volvic, among others) as well as strong local and regional brands (including AQUA, Blédina, Bonafont, Cow \u0026 Gate, Mizone, Oikos and Silk).\r\n\r\nListed on Euronext Paris and present on the OTCQX platform via an ADR (American Depositary Receipt) program, Danone is a component stock of leading sustainability indexes including the ones managed by Moody’s and Sustainalytics, as well as MSCI ESG Indexes, FTSE4Good Index Series, Bloomberg Gender Equality Index, and Access to Nutrition Index. Danone’s ambition is to be B CorpTM certified at a global level in 2025.28:T598,Danone is a leading global food and beverage company operating in three health-focused, fast-growing, and on-trend Categ les, HR, etc) on operational tasks  \u003c/p\u003e\u003cp\u003e• Execute other administrative tasks including purchase order and payment processing, managing vendor quotations, translations, notarizations, filings, etc  \u003c/p\u003e\u003cp\u003e  \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Major Challenge of the Job (Describe the major challenge of the position, including details and difficulty of problems, which must be solved)  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e• Internal: \u003c/em\u003e\u003c/strong\u003eDanone Vietnam is a fast-paced and fast-growing company within a global matrix organization. Agility, growth mindset, and collaboration across teams are essential.  \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e• External: \u003c/em\u003e\u003c/strong\u003eAccuracy and speed of documentation / registration dossiers required for regulatory filings and inquiries. Positive relationship must be nurtured and maintained with external stakeholders including regulatory bodies, testing laboratories, and other vendors.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Background Information\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Working Relationships (Internal): Commercial team (Sales/Marketing/Healthcare Nutrition)/R\u0026I/Supply chain/QFS/IPRO/GS (CBU)\u003c/p\u003e\u003cp\u003e- Working Relationships (External): Ministry of Health/Advertising agency and product registration agencies/Embassy \u003c/p\u003e\u003cp\u003eLaboratories/Industries Associations/Law firms/Other vendors (translators, notary public, etc).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Decision Making Authority and Controls\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Respond to internal and external stakeholders’ queries with aligned team position to carry out tasks effectively and efficiently \u003c/p\u003e\u003cp\u003e• Manage and make decision
