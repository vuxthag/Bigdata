c/p\u003e\u003cp\u003e1.1 Tổ chức thực hiện hồ sơ pháp lý dự án đang trong quá trình chuẩn bị hoặc M\u0026A, đề xuất thay đổi phương án Pháp lý để hoàn thành các mục tiêu theo MTL Pháp lý (nếu có)\u003c/p\u003e\u003cp\u003e1.2 Tổ chức thực hiện việc hoàn thiện các thủ tục Pháp lý Dự án liên quan đến kế hoạch-đầu tư, quy hoạch, xây dựng, bán hàng, vận hành dự án tùy theo loại hình sản phẩm BĐS; bao gồm nhưng không giới hạn bởi: \u003c/p\u003e\u003cp\u003e- Các thủ tục quyết định chấp thuận chủ trương đầu tư;  \u003c/p\u003e\u003cp\u003e- Phê duyệt nhiệm vụ quy hoạch, thiết kế quy hoạch (1/5000, 1/2000, 1/500,…), tổng mặt bằng \u0026 phương án kiến trúc, pháp lý đất đai điều chỉnh, (nếu có), …\u003c/p\u003e\u003cp\u003e- Hồ sơ giao đất / thuê đất / chuyển mục đích sử dụng / cấp giấy chứng nhận quyền sử dụng đất\u003c/p\u003e\u003cp\u003e- Phê duyệt Đánh giá Tác động Môi trường (ĐTM), thẩm tra, thẩm định TKCS, TKTC \u0026 PCCC cho HTKT-Nhà, xin cấp giấy phép xây dựng\u003c/p\u003e\u003cp\u003e- Nghiệm thu PCCC, nghiệm thu HTKT, xin cấp văn bản xác nhận đủ điều kiện huy động vốn mua bán NOHTTTL (HĐMB)\u003c/p\u003e\u003cp\u003e- Nghiệm thu, bàn giao đưa công trình vào sử dụng\u003c/p\u003e\u003cp\u003e- Đăng bộ và cập nhật Giấy chứng nhận quyền sử dụng đất (GCNQSDĐ), Giấy chứng nhận quyền sở hữu nhà ở (GCNQSHNO); Xóa thế chấp các GCNQSDĐ tại sở tài nguyên môi trường, xin cấp số nhà\u003c/p\u003e\u003cp\u003e- Các thủ tục liên quan với địa phương trong quá trình vận hành dự án, bất động sản nghỉ dưỡng, khu vui chơi giải trí,…\u003c/p\u003e\u003cp\u003e1.3 Kiểm soát quá trình thực hiện, trình duyệt thủ tục Pháp lý Dự án từ bước xin chủ trương đầu tư đến khi hoàn thiện, vận hành dự án. \u003c/p\u003e\u003cp\u003e1.4 Tư vấn pháp lý cho các Phòng Ban liên quan trong việc giải quyết các vấn đề liên quan trong quá trình vận hành dự án với khách hàng, BQT, cơ quan địa phương,…\u003c/p\u003e\u003cp\u003e1.5 Kiểm soát công tác quản lý các hồ sơ, văn bản, tài liệu thủ tục pháp lý dự án đầy đủ, thực hiện theo đúng quy định của pháp luật hiện hành.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản lý công tác Nghiên cứu thông tin Pháp lý ngành Bất động sản (chính sách, quy định pháp luật về đầu tư, phát triển, kinh doanh \u0026 vận hành BĐS)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e2.1 Quản lý công tác nghiên cứu, cập nhật kịp thời các thông tin, văn bản pháp lý có liên quan đến thủ tục pháp lý dự án, đặc biệt là các thủ tục pháp lý về phát triển \u0026 kinh doanh bất động sản nhà ở, nghỉ dưỡng, khu vui chơi giải trí,…\u003c/p\u003e\u003cp\u003e2.2 Cung cấp ý kiến \u0026 đánh giá các tác động của văn bản pháp lý (dự thảo hoặc sắp đưa vào sử dụng) đến việc triển khai đầu tư dự án; kiểm soát phương án xử lí, thay đổi phù hợp đến các phòng ban chuyên môn liên quan\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Tham gia xây dựng và duy trì mối quan hệ Cơ quan Chính quyền liên quan Cụm dự án, phục vụ việc hoàn thiện thủ tục pháp lý dự án\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e3.1. Tham gia xây dựng kế hoạch duy trì, phát triển mối quan hệ với lãnh đạo các cơ quan, tổ chức nhà nước phục vụ cho các dự án mà Tập đoàn đầu tư hoặc hợp tác đầu tư.\u003c/p\u003e\u003cp\u003e3.2. Tổ chức thực hiện việc duy trì, phát triển mối quan hệ tốt cùng lãnh đạo các Cơ quan Nhà nước có thẩm quyền, đơn vị tư vấn nhằm xúc tiến việc hoàn thiện các thủ tục pháp lý theo lộ trình Pháp lý Dự án\u003c/p\u003e\u003cp\u003e3.3. Đón tiếp, liên hệ với đối tác, lãnh đạo các Cơ quan Nhà nước có thẩm quyền, đơn vị tư vấn để hoàn thiện Pháp lý Dự án\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Thực hiện các nhiệm vụ khác theo phân công của Quản lý trực tiếp/ Ban lãnh đạo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Xây dựng và duy trì sự tuân thủ công tác quản trị, vận hành hệ thống  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e5.1 Chủ trì xây dựng hệ thống quản trị nội bộ Phòng Ban: Quy chế làm việc, Quy trình, Quy định, Biểu mẫu - Check list công việc, …, đề xuất điều chỉnh Ma trận phân quyền phù hợp vận hành từng thời kỳ để đảm bảo công tác vận hành nội bộ, phối hợp công việc liên Phòng/ Ban trong Tập đoàn được xuyên suốt, chính xác, nhanh chóng mang lại hiệu quả tối ưu.  \u003c/p\u003e\u003cp\u003e5.2 Xây dựng và triển khai kế hoạch đào tạo chuyên môn nội bộ cho Phòng Ban nhằm nâng cao năng lực chuyên môn, phát triển đội ngũ nhân tài, kế thừa.  \u003c/p\u003e\u003cp\u003e5.3 Tuân thủ nội quy/quy định/tài liệu nội bộ của Tập đoàn. Quản lý dữ liệu/ thông tin/ hồ sơ chuyên môn và các tài liệu liên quan đến tác nghiệp nội bộ phòng.\u003c/p\u003e\u003cp\u003e5.4 Nhận diện, đánh giá, kiểm soát và giảm thiểu các rủi ro phát sinh trong hoạt động hàng ngày tại đơn vị; báo cáo tới Phòng Quản lý Rủi ro, Quy trình và Tuân thủ các rủi ro phát sinh theo các chính sách, quy định nội bộ về Quản lý rủi ro.\u003c/p\u003e\u003cp\u003e5.5 Quản trị, chịu trách nhiệm về các vấn đề liên quan đến công cụ dụng cụ, tài sản mà Phòng Ban sử dụng, vận hành, quản lý. \u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T697,Tập đoàn Novaland - thành viên trong hệ sinh thái NovaGroup - là Thương hiệu uy tín hàng đầu trong lĩnh vực đầu tư và phát triển BĐS tại Việt Nam.\r\n\r\n\r\n\r\nTrên tổng quỹ đất khoảng 10.600 ha, Tập đoàn Novaland hiện phát triển 03 dòng sản phẩm chủ lực, gồm: BĐS Đô thị, BĐS Du lịch, và BĐS Công nghiệp.\r\n\r\nTrải qua hành trình 30 năm hình thành và phát triển, Novaland hiện sở hữu danh mục gần 50 dự án BĐS; không chỉ dừng lại ở các dự án BĐS nhà ở tại Trung tâm TP.HCM, Tập đoàn còn đầu tư mạnh mẽ loạt dự án BĐS quy mô lớn, với những công trình và sản phẩm dẫn đầu xu hướng, tác động tích cực đến quá trình phát triển đô thị và phát triển du lịch tại các tỉnh thành phía Nam.\r\n\r\nNovaland là Công ty niêm yết trong nhóm VN30, và niêm yết t
