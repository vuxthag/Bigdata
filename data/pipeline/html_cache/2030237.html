jects in partnership with local, regional, and global stakeholders.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAs the Corporate Communications Assistant Manager you will: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDeploy internal communication plan and activities as per company calendar\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Implement the internal communication plan and activities according to the company calendar.\u003c/p\u003e\u003cp\u003e- Create a comprehensive Company Townhall agenda that effectively conveys key business messages.\u003c/p\u003e\u003cp\u003e- Collaborate efficiently to organize company events related to Region/Headquarter visits or in partnership with People \u0026 Culture.\u003c/p\u003e\u003cp\u003e- Regularly monitor and coordinate Crisis Communication preparedness to ensure readiness during emergencies.\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProtect and uphold JTI's corporate reputation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Establish a clear corporate brand positioning that aligns with other departments and global/regional strategies and communication plans by proactively engaging distributors, media, and emerging communication platforms.\u003c/p\u003e\u003cp\u003e- Oversee the development and delivery of impactful communications for external stakeholders to ensure JTI consistently -addresses critical business priorities.\u003c/p\u003e\u003cp\u003e- Offer communications support to the Corporate Affairs team in its regulatory engagement initiatives.\u003c/p\u003e\u003cp\u003e- Strategically develop and execute a local media relations plan—including networking, campaigns, intelligence gathering, crisis readiness, and monitoring—while maintaining adherence to the approved budget.\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEngage our people to connect them to our JTI's Vision #1\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Develop and implement, in partnership with People \u0026 Culture, a comprehensive communication strategy centered on Employer Branding.\u003c/p\u003e\u003cp\u003e- Co-lead the Employee Engagement Team with People \u0026 Culture, managing strategy, empowerment, monitoring, and execution of initiatives.\u003c/p\u003e\u003cp\u003e- Establish diverse communication channels and coordinate activities to deliver compelling content that inspires both employees and distributor teams to adopt Our Way.\u003c/p\u003e\u003cp\u003e- Ensure leadership communications, from global campaigns to local executive committee messages, are clearly and effectively conveyed across the organization.\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDrive company sustainability agenda\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Ensure sustainable long-term success by integrating our sustainability requirements and targets into the core business strategy.\u003c/p\u003e\u003cp\u003e- Execute our corporate sustainability agenda to strengthen the company’s reputation and fulfill corporate responsibilities.\u003c/p\u003e\u003cp\u003e- Oversee the strategy and execution of local community investment programs, including both local and headquarters initiatives, to create meaningful change and promote inclusiveness within the communities where we operate.\u003c/p\u003e\u003cp\u003e- Foster employee and value chain engagement through our volunteer program.\u003c/p\u003e\u003cp\u003e- Manage the associated budget effectively.\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTeam support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Provide support and follow-up with the CA\u0026C Director on various tasks and projects as they arise or upon request (such as commercial reviews and A\u0026SP preparation).\u003c/p\u003e\u003cp\u003e- Assist the CA\u0026C Director in developing and coaching a strong team by contributing to recruitment, training, motivation, and retention of top talent to ensure the CA\u0026C mission is accomplished with the highest quality standards.\u003c/p\u003e\u003cp\u003e- Collaborate with the CA\u0026C Team to share the workload of various departmental tasks (e.g., GHE, budget management, stakeholder birthday acknowledgments, and seasonal card decorations for Christmas and New Year).\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T419,\u003cp\u003e\u003cstrong\u003eRequirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- A university degree is required. A major in communications, public relations, journalism, or a related field is preferred.\u003c/p\u003e\u003cp\u003e- Candidates should have 5-7 years of experience in internal communications and public relations, including stakeholder engagement. Experience in the tobacco industry or a similarly regulated sector is an asset.\u003c/p\u003e\u003cp\u003e- Proficiency in both written and spoken English and Vietnamese is essential.\u003c/p\u003e\u003cp\u003e- Skills in preparing and delivering presentations are necessary.\u003c/p\u003e\u003cp\u003e- Strong ability to synthesize information effectively.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFunctional Skills:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e-Excellent interpersonal and influencing skills are essential.\u003c/p\u003e\u003cp\u003e-Basic financial knowledge is beneficial.\u003c/p\u003e\u003cp\u003e-Experience in internal corporate communication is required.\u003c/p\u003e\u003cp\u003e-Background in corporate, external, or government affairs is advantageous.\u003c/p\u003e\u003cp\u003e-An entrepreneurial mindset is highly valued.\u003c/p\u003e\u003cp\u003e-Interest and knowledge in sustainability are desirable.\u003c/p\u003e27:T11ac,"])</script><script>self.__next_f.push([1,"\u003cp\u003eThis position will remain open until filled.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eLocal Applicants Welcome\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eDepartment: Corporate Affairs \u0026 Communications\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eLocation: Ho Chi Minh, Vietnam\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eReporting to: Corporate Affairs \u0026 Communications Director\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eRole: Permanent \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe Corporate Communications Assistant Manager facilitates the implementation of internal and external communication strategies to safeguard the corporate reputation and foster employee engagement. This role collaborates closely with the Corporate Affairs \u0026 Communications Director to execute employee communications, provide media support, and enhance crisis preparedness. Additionally, it contributes to sustainability and community investment efforts while supporting daily CA\u0026C projects in partnership with local, regional, and global stakeholders.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAs the Corporate Communications Assistant Manager you will: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDeploy internal communication plan and activities as per company calendar\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Implement the internal communication plan and activities according to the company calendar.\u003c/p\u003e\u003cp\u003e- Create a comprehensive Company Townhall agenda that effectively conveys key business messages.\u003c/p\u003e\u003cp\u003e- Collaborate efficiently to organize company events related to Region/Headquarter visits or in partnership with People \u0026 Culture.\u003c/p\u003e\u003cp\u003e- Regularly monitor and coordinate Crisis Communication preparedness to ensure readiness during emergencies.\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProtect and uphold JTI's corporate reputation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Establish a clear corporate brand positioning that aligns with other departments and global/regional strategies and communication plans by proactively engaging distributors, media, and emerging communication platforms.\u003c/p\u003e\u003cp\u003e- Oversee the development and delivery of impactful communications for external stakeholders to ensure JTI consistently -addresses critical business priorities.\u003c/p\u003e\u003cp\u003e- Offer communications support to the Corporate Affairs team in its regulatory engagement initiatives.\u003c/p\u003e\u003cp\u003e- Strategically develop and execute a local media relations plan—including networking, campaigns, intelligence gathering, crisis readiness, and monitoring—while maintaining adherence to the approved budget.\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEngage our people to connect them to our JTI's Vision #1\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Develop and implement, in partnership with People \u0026 Culture, a comprehensive communication strategy centered on Employer Branding.\u003c/p\u003e\u003cp\u003e- Co-lead the Employee Engagement Team with People \u0026 Culture, managing strategy, empowerment, monitoring, and execution of
