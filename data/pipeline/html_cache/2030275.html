\tTìm kiếm, duy trì và phát triển mạng lưới \u003cstrong\u003ekhách hàng và đối tác\u003c/strong\u003e (chủ đầu tư, doanh nghiệp, nhà thầu, công ty kiến trúc, công ty thiết kế, quản lý dự án, đại lý).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTư vấn giải pháp nội thất phù hợp, đàm phán và ký kết hợp đồng, thực hiện công tác quản lý dự án, hoàn thành hồ sơ thanh toán và theo dõi công nợ\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo đạt và vượt chỉ tiêu doanh số, duy trì tốc độ tăng trưởng doanh thu tối thiểu 15%/năm của phòng kinh doanh phụ trách.\u003c/p\u003e\u003cp\u003e•\tTạo nguồn tuyển dụng, đào tạo để duy trì và phát triển đội ngũ kinh doanh hiệu quả, nâng cao tỷ lệ chốt đơn, tối ưu chi phí và nâng cao hình ảnh thương hiệu Công ty.\u003c/p\u003e\u003cp\u003e•\tXây dựng và duy trì văn hoá làm việc theo đúng định hướng Công ty\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm doanh số Phòng ban phụ trách.\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch và giám sát thực hiện công việc theo tuần/tháng/quý/năm và cải tiến hiệu suất Phòng Ban.\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch kinh doanh khả thi theo tháng/quý/năm, triển khai, giám sát kế hoạch thực thi.\u003c/p\u003e\u003cp\u003e•\tDuy trì, mở rộng và phát triển bền vững hệ thống khách hàng thông qua các hoạt động kinh doanh và tiếp thị theo đúng định hướng của Công ty.\u003c/p\u003e\u003cp\u003e•\tTuyển dụng, đào tạo, dẫn dắt và và phát triển đội ngũ nhân sự; \u003c/p\u003e\u003cp\u003e•\tXây dựng môi trường làm việc hiệu suất cao, tuân thủ quy định, thực hiện duy trì văn hoá công ty.\u003c/p\u003e\u003cp\u003e•\tPhối hợp và tương tác với các bộ phận, Phòng ban hiệu quả, linh hoạt để hoàn thành chỉ tiêu và các công việc được giao từ BGĐ.\u003c/p\u003e\u003cp\u003e•\tXây dựng chương trình và giải pháp kích cầu nhằm duy trì, phát triển doanh số hủ động, năng động, chịu được áp lực doanh số, có khả năng làm việc độc lập, có khả năng quản trị dự án.\u003c/p\u003e\u003cp\u003e•\tSẵn sàng di chuyển/đi công tác khi triển khai dự án hoặc làm việc với khách hàng, đối tác.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. CÁC YÊU CẦU ĐỐI VỚI VỊ TRÍ \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC1. Yêu cầu về bằng cấp/ chứng chỉ \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTN Quản trị k\u003cstrong\u003einh doanh, Marketing, Kiến trúc xây dựng, Kỹ thuật có liên quan.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTrình độ ngoại ngữ:  Tiếng Anh, Tiếng Việt thành thạo, đọc hiểu các tài liệu có liên quan.\u003c/p\u003e\u003cp\u003e(Team nhà thầu, 2. Team Edu, 3. Team Trực tiếp)\u003c/p\u003e\u003cp\u003e•\tTrình độ vi tính: thành thạo vi tính văn phòng (TEST EXCEL, POWERPOINT)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC2. Yêu cầu về kinh nghiệm/phẩm chất\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm \u0026gt; 2 năm quản lý ở vị trí Trưởng phòng Kinh doanh.\u003c/p\u003e\u003cp\u003e•\tGiao tiếp, đàm phán tốt, có mục tiêu nghề nghiệp.\u003c/p\u003e\u003cp\u003e•\tTinh thần trách nhiệm, hòa nhã, phối hợp đội nhóm.\u003c/p\u003e\u003cp\u003e•\tTrung thực, cầu tiến, có suy nghĩ tích cực.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC3. Yêu cầu về kỹ năng/ khả năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng lập kế hoạch.\u003c/p\u003e\u003cp\u003e•\tKỹ năng quản lý, đào tạo, thuyết trình.\u003c/p\u003e\u003cp\u003e•\tKhả năng làm việc nhóm.\u003c/p\u003e\u003cp\u003e•\tXây dựng và mở rộng mối quan hệ.\u003c/p\u003e\u003cp\u003e•\tGiải quyết sự cố trong quá trình vận hành và xử lý đơn hàng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Tdc1,"])</script><script>self.__next_f.push([1,"Công ty TNHH TM Rồng Phương Bắc là công ty chuyên cung cấp các sản phẩm nội thất văn phòng tại thị trư thống khách hàng và mở rộng thị phần trong mảng \u003cstrong\u003enội thất\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo \u003cstrong\u003edoanh số theo tháng, quý, năm\u003c/strong\u003e. \u003c/p\u003e\u003cp\u003e•\tDuy trì và xây dựng hình ảnh chuyên nghiệp của RPB trên thị trường.\u003c/p\u003e\u003cp\u003e•\tTìm kiếm, duy trì và phát triển mạng lưới \u003cstrong\u003ekhách hàng và đối tác\u003c/strong\u003e (chủ đầu tư, doanh nghiệp, nhà thầu, công ty kiến trúc, công ty thiết kế, quản lý dự án, đại lý).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTư vấn giải pháp nội thất phù hợp, đàm phán và ký kết hợp đồng, thực hiện công tác quản lý dự án, hoàn thành hồ sơ thanh toán và theo dõi công nợ\u003c/strong\u003e.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo đạt và vượt chỉ tiêu doanh số, duy trì tốc độ tăng trưởng doanh thu tối thiểu 15%/năm của phòng kinh doanh phụ trách.\u003c/p\u003e\u003cp\u003e•\tTạo nguồn tuyển dụng, đào tạo để duy trì và phát triển đội ngũ kinh doanh hiệu quả, nâng cao tỷ lệ chốt đơn, tối ưu chi phí và nâng cao hình ảnh thương hiệu Công ty.\u003c/p\u003e\u003cp\u003e•\tXây dựng và duy trì văn hoá làm việc theo đúng định hướng Công ty\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm doanh số Phòng ban phụ trách.\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch và giám sát thực hiện công việc theo tuần/tháng/quý/năm và cải tiến hiệu suất Phòng Ban.\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch kinh doanh khả thi theo tháng/quý/năm, triển khai, giám sát kế hoạch thực thi.\u003c/p\u003e\u003cp\u003e•\tDuy trì, mở rộng và phát triển bền vững hệ thống khách hàng thông qua các hoạt động kinh doanh và tiếp thị theo đúng định hướng của Công ty.\u003c/p\u003e\u003cp\u003e•\tTuyển dụng, đào tạo, dẫn dắt và và phát triển đội ngũ nhân sự; \u003c/p\u003e\u003cp\u003e•\tXây dựng môi trường làm việc hiệu suất cao, tuân thủ quy định, thực hiện duy trì văn hoá công ty.\u003c/p\u003e\u003cp\u003e•\tPhối hợp và tương tác với các bộ phận, Phòng ban hiệu quả, linh hoạt để hoàn thành chỉ tiêu và các công việc được giao từ BGĐ.\u003c/p\u003e\u003cp\u003e•\tXây dựng chương trình và giải pháp kích cầu nhằm duy trì, phát triển doanh số và thị trường. Đề xuất những giải pháp hữu hiệu nhằm phát triển các hoạt động kinh doanh bền vững. \u003c/p\u003e\u003cp\u003e•\tAm hiểu thị trường nhằm duy trì nguồn khách hàng hiện có và mở rộng khách hàng mới. \u003c/p\u003e\u003cp\u003e•\tNắm vững được quy trình làm việc nội bộ, quy trình xử lý khiếu nại thông tin, quy trình nhận và giải quyết thông tin khách hàng, ghi nhận đầy đủ theo các biểu mẫu của các quy trình này. \u003c/p\u003e\u003cp\u003e•\tPhân tích thị trường, xác định nhóm khách hàng mục tiêu, đối thủ, xu hướng để đề xuất chiến lược phát triển.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tXây dựng, phát triển hệ thống khách hàng chiến lược theo định hướng Công ty.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện các công việc được giao khác theo chỉ đạo của cấp Quản lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T98b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eIII. YÊU CẦU NĂNG LỰC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học trở lên các ngành: Quản trị k\u003cstrong\u003einh doanh, Marketing, Kiến trúc xây dựng, Kỹ thuật có liên quan.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó năng lực tìm kiếm, mở rộng khách hàng và bán hàng.\u003c/p\u003e\u003cp\u003e•\tCó năng lực tuyển dụng, đào tạo, xây dựng và quản lý đội nhóm.\u003c/p\u003e\u003cp\u003e•\tKinh nghiệm \u003cstrong\u003e≥ 5 năm trong lĩnh vực kinh doanh B2B.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng thuyết trình, \u003cstrong\u003eđàm phán, giao tiếp, giả
