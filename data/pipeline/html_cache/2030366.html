on our core markets and the extensive business ecosystem we have built for years, SOA has successfully been hired to promote foreign “Territories” (can be Institutions, Countries, States, Cities …) in Asia (”local markets”). \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eSOA’s mission is to recruit business, industries and investors from our local markets. And introduce them to the opportunities and incentives of setting up in the Territory we do represent. This mission is being conducted in close collaboration with the people in charge of FDI \u0026 Invest in the Territory. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eAdditionally, the mission can also include a Trade scope of work, which aims at supporting export companies from the Territory to explore business opportunities in our local markets. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eTo match these growing incoming requests, SOA has decided to create a new (expert) position: FOREIGN KEY ACCOUNT REPRESENTATIVE. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThis position will report directly to the Company COO and manage its activity as a dedicated Business Unit (KPI, revenues, resources, budget, and P\u0026L). It will also require a deep collaboration with existing SOA BUs. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eAbout the role \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eSource of Asia is organized by Operational Business Units (Sourcing \u0026 Supply Chain / Market Expansion / Corporate Services), supported by cross-departmental Business Units (Strategy / Business Transformation / Marketing \u0026 Communication / Internal). \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eEach Business Unit is sequenced by Divisions, with the objective to sustainably grow excellence for each division across. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eReporting directly to our COO, also one of the shareholders of the company and member of the Board of Management, the Foreign Key Account Representative will be working for SoA, on behalf of one or several Countries, States, or institutions. As such, he/she will also take part in cross-departmental task forces, projects, and discussions, and collaborate to bring opportunities. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMAIN RESPONSIBILITIES\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Territory Promotion. \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe FOREIGN KEY ACCOUNT REPRESENTATIVE serves as the official Representative in the selected markets. He will acquire a reasonable knowledge of the Territory business assets, taxation, labor force, and workforce training … to professionally represent it. Additional activities in support of promotion may include, but are not limited to:\u003c/p\u003e\u003cp\u003e• Translate, edit, and distribute materials for the promotion of the Territory.\u003c/p\u003e\u003cp\u003e• Prepare a program for official visits by the Territory's people and administration.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Development of Leads.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe FOREIGN KEY ACCOUNT REPRESENTATIVE will develop leads, make contact with local prospects and provide information to the prospects about economic development opportunities in the Territory. The FOREIGN KEY ACCOUNT REPRESENTATIVE will arrange meetings and introductions of Territory parties to officials and business representatives when such parties travel to our local markets. Activities in support of lead generation may include but not limited to:\u003c/p\u003e\u003cp\u003e• Trade Shows / Conferences / Seminars\u003c/p\u003e\u003cp\u003e• Business association interactions\u003c/p\u003e\u003cp\u003e• Direct business missions to cultivate leads\u003c/p\u003e\u003cp\u003e• Cultivate relationships with site location consultants\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe FOREIGN KEY ACCOUNT REPRESENTATIVE should be comfortable communicating in the English language and, as a plus, in local language. Additionally, the FOREIGN KEY ACCOUNT REPRESENTATIVE will interact with Territory Administration of Commerce and Trade personnel to have a thorough understanding of the existing Territory’s targeted sectors, and will be able to research and identify new market sectors that appear primed to expand their market into the Territory. The FOREIGN KEY ACCOUNT REPRESENTATIVE will develop strategies and tactics to engage the business sector and will network and communicate directly with industry management with an end goal of creating business opportunities for the Territory. The respondent will be expected to build regular report of contacts and activities.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Trade (could be optional for some mission). \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe FOREIGN KEY ACCOUNT REPRESENTATIVE will maintain appropriate and necessary relations with local government authorities and promote trade between the Territory business and Korean industries as well as business groups. The FOREIGN KEY ACCOUNT REPRESENTATIVE will select appropriate promotional materials produced by the Territory and will produce promotional materials to promote Territory as a location of choice for business opportunities and trade with Territory’s companies. In coordination with the Territory’s administration, the FOREIGN KEY ACCOUNT REPRESENTATIVE will:\u003c/p\u003e\u003cp\u003e• Respond to specific information requests. Typical questions would be to address export-r Y ACCOUNT REPRESENTATIVE. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThis position will report directly to the Company COO and manage its activity as a dedicated Business Unit (KPI, revenues, resources, budget, and P\u0026L). It will also require a deep collaboration with existing SOA BUs. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eAbout the role \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eSource of Asia is organized by Operational Business Units (Sourcing \u0026 Supply Chain / Market Expansion / Corporate Services), supported by cross-departmental Business Units (Strategy / Business Transformation / Marketing \u0026 Communication / Internal). \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eEach Business Unit is sequenced by Divisions, with the objective to sustainably grow excellence for each division across. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eReporting directly to our COO, also one of the shareholders of the company and member of the Board of Management, the Foreign Key Account Representative will be working for SoA, on behalf of one or several Countries, States, or institutions. As such, he/she will also take part in cross-departmental task forces, projects, and discussions, and collaborate to bring opportunities. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMAIN RESPONSIBILITIES\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Territory Promotion. \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe FOREIGN KEY ACCOUNT REPRESENTATIVE serves as the official Representative in the selected markets. He will acquire a reasonable knowledge of the Territory business assets, taxation, labor force, and workforce training … to professionally represent it. Additional activities in support of promotion may include, but are not limited to:\u003c/p\u003e\u003cp\u003e• Translate, edit, and distribute materials for the promotion of the Territory.\u003c/p\u003e\u003cp\u003e• Prepare a program for official visits by the Territory's people and administration.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Development of Leads.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe FOREIGN KEY ACCOUNT REPRESENTATIVE will develop leads, make contact with local prospects and provide information to the prospects about economic development opportunities in the Territory. The FOREIGN KEY ACCOUNT REPRESENTATIVE will arrange meetings and introductions of Territory parties to officials and business representatives when such parties travel to our local markets. Activities in support of lead generation may include but not limited to:\u003c/p\u003e\u003cp\u003e• Trade Shows / Conferences / Seminars\u003c/p\u003e\u003cp\u003e• Business association interactions\u003c/p\u003e\u003cp\u003e• Direct business missions to cultivate leads\u003c/p\u003e\u003cp\u003e• Cultivate relationships with site location consultants\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe FOREIGN KEY ACCOUNT REPRESENTATIVE should be comfortable communicating in the English language and, as a plus, in local language. Additionally, the FOREIGN KEY ACCOUNT REPRESENTATIVE will interact with Territory Administration of Commerce and Trade personnel to have a thorough understanding of the existing Territory’s targeted sectors, and will be able to research and identify new market sectors that appear primed to expand their market into the Territory. The FOREIGN KEY ACCOUNT REPRESENTATIVE will develop strategies and tactics to engage the business sector and will network and communicate directly with industry management with an end goal of creating business opportunities for the Territory. The respondent will be e
