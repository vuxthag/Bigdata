-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Te88,"])</script><script>self.__next_f.push([1,"\u003cp\u003eGia nhập LEGO Manufacturing Vietnam với vai trò Production Shift Leader tại Bộ phận Moulding. Dẫn dắt đội ngũ đảm bảo an toàn, chất lượng và vận hành ca hiệu quả, đồng thời thúc đẩy cải tiến liên tục. Phát triển sự nghiệp lãnh đạo trong môi trường quốc tế chuyên nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eJoin LEGO Manufacturing Vietnam as a Production Shift Leader in the Moulding Department. Lead your team to ensure safety, quality, and efficient shift operations while driving continuous improvement. Grow your leadership career in a global organization\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWork Location:\u003c/strong\u003e Our factory is based in VSIP 3, Binh Co Ward, Ho Chi Minh (formerly known as Hoi Nghia Ward, Tan Uyen - Binh Duong). Shuttle buses are provided from Ho Chi Minh, Bien Hoa \u0026 Binh Duong\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWe think it’s important that you’re in control of your data and as part of the recruitment process; Your direct application at the LEGO Careers Website will be prioritized. Please copy and paste the following URL into your browser for your application:https://byvn.net/mu7Y\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCore Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Vận hành \u0026 Tuân thủ / Operations \u0026 Compliance\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tÁp dụng các phương pháp tốt nhất trong khu vực ép khuôn nhằm đảm bảo hoạt động an toàn, chất lượng và hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Apply best practices in the moulding area to ensure safe, high-quality, and efficient operations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tTriển khai và truyền đạt Văn hóa LEGO, các chỉ số hiệu suất (KPIs) và mục tiêu từ cấp quản lý đến nhân viên tại xưởng sản     xuất.\u003c/p\u003e\u003cp\u003e\u003cem\u003e   Implement and cascade LEGO Culture, KPIs, and targets from management level to shopfloor employees.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tĐại diện Trưởng bộ phận trong việc đảm bảo tuân thủ các chính sách công ty và các tiêu chuẩn về sức khỏe, an toàn và lao động.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Act on behalf of the Head of Department to ensure compliance with company policies and health, safety, and employment standards.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản lý đội nhóm / Team Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGiám sát chấm công, tình trạng đi muộn và nghỉ phép của nhân viên.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Monitor employees’ attendance, punctuality, and leave records.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tPhân công nhiệm vụ phù hợp với vai trò và năng lực của từng nhân viên.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Assign tasks based on employees’ roles and competencies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tGiám sát và hỗ trợ nhân viên trong quá trình làm việc khi cần thiết.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Supervise and support team members in daily operations as required.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện đánh giá hiệu suất làm việc và cung cấp phản hồi cho quản lý cấp trên và nhân viên.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Conduct performance evaluations and provide feedback to both upper management and team members.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý các yêu cầu và xử lý các vi phạm của nhân viên theo quy định.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Handle employees’ requests and manage disciplinary matters in accordance with company policies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tĐào tạo và hướng dẫn nhân viên mới cũng như phát triển kỹ năng cho nhân viên hiện tại.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Train new employees and provide ongoing guidance and development for existing team members.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện các nhiệm vụ khác theo phân công của cấp trên.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Perform other tasks as assigned by the People Leader.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T81e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eDo you have what it takes?\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp từ đại học trở lên chuyên ngành liên quan, Quản lý công nghiệp, Cơ khí, tự động hoá hoặc cơ điện tử là 1 lợi thế.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Bachelor’s degree in some relevants majors, Industrial Management, Mechanical Engineering, Automation, or Mechatronics will be priority.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tCó ít nhất 3 năm kinh nghiệm ở vị trí tương đương tại khu vực ép nhựa hoặc kỹ sư quy trình.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    At least 3 years' experience in similar position as moulding or process technician.\u003c/em\u003e \u003c/p\u003e\u003cp\u003e•\tThành thạo tiếng Anh (nghe, nói, đọc, viết).\u003c/p\u003e\u003cp\u003e\u003cem\u003e     Fluent in English (both written and spoken) is required.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp và xây dựng mối quan hệ tốt.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Strong communication and interpersonal skills.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng lãnh đạo: ra quyết định, tạo động lực và thiết lập mục tiêu.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Leadership skills including decision-making, motivation, and goal setting.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng giải quyết vấn đề và xử lý xung đột hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cem\u003e   Strong problem-solving and conflict resolution skills.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tKhả năng tổ chức công việc và quản lý thời gian tốt.\u003c/p\u003e\u003cp\u003e\u003cem\u003e   Excellent organizational and time management skills.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tTinh thần làm việc nhóm và hợp tác hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Ability to work collaboratively within a team environment.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tCó định hướng dịch vụ và hỗ trợ khách hàng nội bộ.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Customer-oriented mindset.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tSẵn sàng đi công tác theo nhu cầu công việc (thỉnh thoảng).\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Willingness to travel occasionally based on business needs.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tLinh hoạt về thời gian làm việc, có thể hỗ trợ ca cuối tuần khi cần.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Flexible working time, including occasional weekend shift support\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Te88,"])</script><script>self.__next_f.push  nhân viên tại xưởng sản     xuất.\u003c/p\u003e\u003cp\u003e\u003cem\u003e   Implement and cascade LEGO Culture, KPIs, and targets from management level to shopfloor employees.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tĐại diện Trưởng bộ phận trong việc đảm bảo tuân thủ các chính sách công ty và các tiêu chuẩn về sức khỏe, an toàn và lao động.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Act on behalf of the Head of Department to ensure compliance with company policies and health, safety, and employment standards.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản lý đội nhóm / Team Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGiám sát chấm công, tình trạng đi muộn và nghỉ phép của nhân viên.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Monitor employees’ attendance, punctuality, and leave records.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tPhân công nhiệm vụ phù hợp với vai trò và năng lực của từng nhân viên.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Assign tasks based on employees’ roles and competencies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tGiám sát và hỗ trợ nhân viên trong quá trình làm việc khi cần thiết.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Supervise and support team members in daily operations as required.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện đánh giá hiệu suất làm việc và cung cấp phản hồi cho quản lý cấp trên và nhân viên.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Conduct performance evaluations and provide feedback to both upper management and team members.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý các yêu cầu và xử lý các vi phạm của nhân viên theo quy định.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Handle employees’ requests and manage disciplinary matters in accordance with company policies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tĐào tạo và hướng dẫn nhân viên mới cũng như phát triển kỹ năng cho nhân viên hiện tại.\u003c/p\u003e\u003cp\u003e\u003cem\u003e    Train new e
