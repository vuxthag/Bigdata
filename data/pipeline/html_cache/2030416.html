nks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T940,"])</script><script>self.__next_f.push([1,"We were founded as Consumer Finance Division of Vietnam Prosperity Joint-Stock Commercial Bank (VPBank). In 2015, we successfully transferred to an independent company with the Brand FE CREDIT. Since then, we continuously have been enlarging and taking the leadership of consumer finance market in Vietnam. Our success is built on serving the best sake of our customers; we are keen on designing new products with add-on values to customers with our philosophy of Fast and Easy.\r\n\r\nOn October 28th, 2021, VPBank completed the agreement to sell 49% of the charter capital at FE CREDIT to SMBC Group and FE CREDIT was renamed VPBank SMBC Finance Company Limited, creating favorable conditions for our company to strengthen our financial capacity and further expand business activities in other potential segments.\r\n\r\nWe have long nourished the determination to professionalise our operations. We embrace a strong organisational culture with a shared aspiration and values which allows us to act as a united and focused company.\r\n\r\nFOCUS – UNITY – SIMPLICITY – OWNERSHIP\r\n\r\nSee yourselves in a new light\r\n\r\nIn essence of joining our company, you will be given the scope to seize every opportunity and helped to acquire specific competencies you’ll need to succeed either you wish to go wide or go deep. Our company prides ourselves on our underpinned principle of nurturing people in not only HR policies but also in our culture. We value innovations and we need people to work on initiatives and carry on our business vision of operating excellence and market leadership.\r\n\r\nAlongside with these, we believe our staff members deserve a good working condition, so that in addition to social health insurance you will be accessible to health and accident insurance and will be eligible to join in team building every year. We also value your efforts; for this reason, we give you both financial and non-financial rewards such as: KPI bonus, Best Initiatives, Best performer or Best manager of the year, etc.\r\n\r\nCOMPANY'S BENEFITS\r\nFinancial support:\r\n- Probation with full salary\r\n- Lunch allowance\r\n- Wedding support\r\n- Family funeral support\r\n- 13th month salary + KPIs bonus\r\n- Performance rewards and awards\r\nInsurance:\r\n- Accident insurance\r\n- Health insurance\r\nEvents and activities:\r\n- Christmas\r\n- Year End party\r\n- Team Building\r\n- Family Day\r\n- Sport Day"])</script><script>self.__next_f.push([1,"24:T185e,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMỤC TIÊU/ \u003cem\u003eOBJECTIVES\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTối ưu hóa các mối quan hệ hợp tác hiện tại và tạo thêm đối tác chiến lược mới, đề xuất các sáng kiến và thay đổi dựa trên chiến lược của công ty để tăng doanh số bán hàng và thị phần của mảng vay tiêu dùng (bao gồm kênh tiêu dùng điện máy, xe máy và các kênh mới)\u003c/p\u003e\u003cp\u003e\u003cem\u003eOptimizing relationship with existing strategic accounts and acquire new partners, provide initiatives and changes aligned with company’s strategies to increase the sales volume and market share of consumer loans (CD, TW, new segments) in POS channel\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGIAO TIẾP/ \u003cem\u003eCOMMUNICATION\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTriển khai và quản lý các hoạt động bán hàng và các chương trình tại cửa hàng đối tác\u003c/p\u003e\u003cp\u003e\u003cem\u003eTo implement and manage the sales activities and campaigns at Key Dealers’ outlets\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm soát lợi nhuận, tỉ lệ tổn thất và hoàn thành thiết lập sản phẩm\u003c/p\u003e\u003cp\u003e\u003cem\u003eTo monitor the NPM, loss rate and complete product set-up\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm soát COA để đảm bảo tuân theo chiến lược của công ty\u003c/p\u003e\u003cp\u003e\u003cem\u003eTo monitor the COA to ensure the alignment with company strategy\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng các hệ thống kết nối với đối tác để tăng hiệu quả làm việc\u003c/p\u003e\u003cp\u003e\u003cem\u003eTo build the system integrated with strategic partners to improve productivity\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tPhát triển các kế hoạch hợp tác kinh doanh triệt để và khả thi (trao đổi cấp hội sở) để tăng cường doanh số bán hàng.\u003c/p\u003e\u003cp\u003e\u003cem\u003eTo develop the comprehensive and affordable business plans (in head office communication level) to improve sales volume.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CHÍNH/ \u003cem\u003eKEY RESPONSIBILITIES\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhát triển các kế hoạch hợp tác triệt để và khả thi (trao đổi cấp hội sở) để triển khai dịch vụ vay tiêu dùng nhằm gia tăng doanh số bán hàng\u003c/p\u003e\u003cp\u003e\u003cem\u003eDevelop the comprehensive and affordable business plans with strategic partners (in head office communication level) to deploy the consumer loans service to achieve the sales target\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm để kết quả kinh doanh có lợi nhuận thông qua việc quản lý đối tác chiến lược để phát triển nhóm bằng cách tạo động lực, tư vấn\u003c/p\u003e\u003cp\u003e\u003cem\u003eResponsible for obtaining profitable results through manage the KAM to developing the team through motivation, counseling\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm theo dõi hiệu suất và quản lý các hoạt động hàng ngày của Phòng Đối Tác Chiến Lược, bao gồm hỗ trợ và/hoặc trực tiếp thuyết phục và xây dựng mối quan hệ với các Đại lý chính và bán các sản phẩm VPB SMBC FC.\u003c/p\u003e\u003cp\u003e\u003cem\u003eResponsible for monitoring the performance \u0026 managing daily activities of the KAM including supporting KAM to persuade \u0026 build relationship with Key Dealers \u0026 sells VPB SMBC FC’s products\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e•\tĐàm phán với đối tác chiến lược về các điều khoản thương mại, cung cấp các bản đánh giá trước và sau khi triển khai các chương trình tiếp thị và hợp tác với đối tác, phối hợp với đội thị trường để cập nhật và thống nhất các kết quả cuối cùng\u003c/p\u003e\u003cp\u003e\u003cem\u003eNegotiate with key dealers on trading terms, provide pre \u0026 post execution evaluation of marketing programs or subvention campaigns and coordinate with sales field on result updates and final alignment\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý ngân sách thương mại để đảm bảo vừa đạt doanh số bán hàng vừa đạt lợi nhuận yêu cầu\u003c/p\u003e\u003cp\u003e\u003cem\u003eManage Trade spending to ensure the achievement of sales and profitability\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các phòng ban nội nputs, handle activities in proper processes and strategies, control the ad-hoc issues, monitor the profit and loss, and prevent fraud\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tPhân tích các môi trường cạnh tranh bên ngoài công ty và phát thảo các kế hoạch hành động phù hợp để hổ trợ cải thiện doanh số bán hàng\u003c/p\u003e\u003cp\u003e\u003cem\u003eAnalyze the external competitive environment, draw the appropriate action plans to support sales improvement\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tĐịnh hướng đối tác chiến lược để tối đa kết quả kinh doanh thông qua các ví dụ thành công thực tế, cung cấp các tư vấn về sản phẩm và hệ thống, triển khai hoạt động kinh doanh cho các đối tác mới thông qua các văn bản đề xuất, tài liệu dự án và thuyết trình hợp lí.\u003c/p\u003e\u003cp\u003e\u003cem\u003eDrive key accounts to maximize sales through best sales practices, provide product consulting and system support execute sales to new accounts by preparing accurate sales proposals, project documents, and presentations\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tCung cấp các sáng kiến, định hình các cơ hội kinh doanh mới (thị trường mới, đối tác mới, tập khách hàng mới)\u003c/p\u003e\u003cp\u003e\u003cem\u003eProvide initiatives, identify new business opportunities (new segments, new partners, new client groups)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tĐóng góp và quá trình lên kế hoạch, phát triển và triển khai kế hoạch giới thiệu các sản phẩm mới, các nâng cấp về qui trình, tối ưu hóa hệ thống để mở rộng kinh doanh và giành thêm thị phần và lợi nhuận\u003c/p\u003e\u003cp\u003e\u003cem\u003eContribute to the planning, development and execution on new product launching, process development, system optimization to expand business and achieve more market share and profit.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T581,\u003cp\u003e•\tTốt nghiệp đại học, chuyên ngành: Quản trị kinh doanh, Ngoại thương, Tài chính ngân hàng\u003c/p\u003e\
