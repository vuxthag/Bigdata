hunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1dfe,"])</script><script>self.__next_f.push([1,"VNPT Technology được thành lập ngày 6/1/2011 bởi Tập đoàn Bưu chính Viễn thông Việt Nam (VNPT) và 2 cổ đông khác là VNPost và Pacifab, với vốn điều lệ 500 tỷ đồng, được tổ chức và hoạt động theo hình thức công ty cổ phần.\r\nNgay sau khi thành lập, VNPT Technology mua lại phần vốn góp của Alcatel Lucent tại công ty Liên doanh ANSV và phần vốn góp của Siemens tại công ty Liên doanh TELEQ, chuyển đổi 2 công ty này trở thành công ty thành viên của VNPT Technology.\r\nKế thừa nguồn lực và kinh nghiệm tích lũy sau gần 20 năm của các công ty liên doanh ANSV và TELEQ; sở hữu và tiếp tục phát triển đội ngũ chuyên gia trưởng thành từ những ngày đầu của thời kỳ số hóa mạng viễn thông, cùng với hạ tầng kỹ thuật được tích lũy và tiếp tục phát triển từ các liên doanh; VNPT Technology ngày càng khẳng định vị thế và vai trò của một đơn vị tiên phong trong nghiên cứu phát triển và sản xuất các thiết bị điện tử, viễn thông và công nghệ thông tin, xứng đáng là đơn vị chủ lực của VNPT trong lĩnh vực Công nghệ, Công nghiệp Bưu chính, Viễn thông, Công nghệ thông tin, Truyền thông và Công nghiệp Nội dung số.\r\nVNPT Technology là đơn vị chủ lực của Tập đoàn VNPT trong lĩnh vực Công nghệ; Công nghiệp Điện tử Viễn thông; Công nghệ thông tin; Truyền thông và Công nghiệp nội dung số.\r\nTính đến thời điểm hiện nay, VNPT Technology đã cho ra thị trường trên 20 triệu sản phẩm bao gồm các thiết bị viễn thông, thiết bị điện tử tiêu dùng. Bên cạnh đó, thị trường quốc tế cũng được đẩy mạnh với việc xuất khẩu sản phẩm sang một số thị trường tiềm năng như Lào, Campuchia, Myanmar, Indonesia, Nepal…\r\n\r\nLĩnh vực hoạt động\r\nVNPT Technology hoạt động trong các lĩnh vực: Nghiên cứu phát triển, Sản xuất Công nghệ Công nghiệp; Kinh doanh quốc tế; Thương mại \u0026 Dịch vụ kỹ thuật.\r\nNghiên cứu phát triển sản phẩm công nghệ \u0026 ODM: Là hoạt động cốt lõi của Công ty nhằm tạo ra những giá trị từ tri thức, tạo ra tài sản trí tuệ và hàng hóa dịch vụ với hàm lượng công nghệ cao. Nghiên cứu và phát triển các công nghệ lõi trong 5 lĩnh vực: Băng rộng cố định, băng rộng không dây, IoT, công nghệ 5G và Chuyển đổi số nhằm tạo ra những sản phẩm toàn diện từ Phần cứng/Thiết bị, nền tảng cho tới các ứng dụng người dùng. Mục tiêu 2025, trở thành nhà nghiên cứu phát triển thiết kế gốc.\r\nSản xuất thiết bị công nghệ công nghiệp \u0026 EMS: Các sản phẩm tạo ra từ quá trình nghiên cứu và phát triển, được sản xuất hàng loạt qua hoạt động sản xuất công nghiệp điện tử đáp ứng nhu cầu thị trường trong và ngoài nước. Bên cạnh đó dịch vụ sản xuất điện tử - EMS được mở rộng giúp Công ty tận dụng được năng lực và hạ tầng sẵn có đồng thời tham gia sâu rộng hơn vào chuỗi cung ứng toàn cầu.\r\nTích hợp hệ thống mạng viễn thông, Công nghệ thông tin: Với gần 30 năm kinh nghiệm tích hợp các hệ thống lớn như mạng Viễn thông, Công ty xác định trở thành đơn vị dẫn đầu trong lĩnh vực tích hợp hệ thống mạng Viễn thông và Công nghệ thông tin. Hoạt động tích hợp hệ thống toàn diện từ Phân tich, Xây dựng giải pháp tổng thể, Thiết kế, Triển khai và Đào tạo chuyển giao.\r\nThương mại, dịch vụ kỹ thuật ICT trong nước và quốc tế: Hoạt động kinh doanh phát triển thị trường nhằm cung cấp các sản phẩm phẩm công nghệ, các giải pháp tích hợp, dịch vụ kỹ thuật ICT trong nước và quốc tế với các mảng thị trường bao gồm: Kinh doanh phát triển thị trường truyền thống/các nhà mạng; Kinh doanh phát triển thị trường Doanh nghiệp và khách hàng cá nhân; và Kinh doanh phát triển thị trường quốc tế.\r\nChuyển đổi số doanh nghiệp SME: Đây là một lĩnh vực mới được xác định tập trung nghiên cứu và phát triển trong giai đoạn 2020 – 2025, song hành cùng chiến lược Quốc gia số tới năm 2030. Giúp các doanh nghiệp vừa và nhỏ thay đổi các phương thức hoạt động nhằm tạo ra các sản phẩm mới, giá trị mới thông qua việc ứng dụng các bộ giải pháp công nghệ và chuyển dịch vận hành trên không gian số.\r\n\r\nTầm nhìn\r\nVNPT Technology với vai trò doanh nghiệp chủ lực của Tập đoàn VNPT trong lĩnh vực công nghệ, công nghiệp điện tử viễn thông, công nghệ thông tin, truyền thông và công nghiệp nội dung số có tầm nhìn trở thành doanh nghiệp công nghệ cao hàng đầu tại Việt Nam và tiến tới trở thành một trong những công ty công nghệ hàng đầu khu vực.\r\n\r\nSứ mệnh\r\nSứ mệnh của VNPT Technology là tạo ra các sản phẩm công nghệ chất lượng cao mang thương hiệu Việt phục vụ mạng viễn thông CNTT cũng như đông đảo cộng đồng.\r\n\r\nGiá trị cốt lõi\r\nNghiên cứu phát triển và cung ứng các sản phẩm công nghệ chất lượng cao mang thương hiệu Việt trên thị trường, đưa sản phẩm công nghệ thương hiệu Việt có khả năng cạnh tranh và bắt kịp với xu hướng phát triển công nghệ thông tin trên thế giới.\r\nXây dựng văn hóa doanh nghiệp trên cơ sở nền tảng khuyến khích tinh thần làm việc nhóm (teamworking và cross-teamworking), tích cực chia sẻ thông tin, hỗ trợ nhau trong công việc, phát huy tinh thần và thế mạnh của VNPT Technology.\r\nPhát triển môi trường làm việc có giá trị nhân văn, minh bạch là cơ sở tạo động lực, tìm tòi sáng tạo, không ngừng học hỏi trong hoạt động nghiên cứu, phát triển công nghệ.\r\nLấy con người làm nòng cốt, tập trung phát triển và đào tạo nhân lực, tạo điều kiện phát triển đội ngũ CBNV nhiệt huyết, giỏi chuyên môn nghiệp vụ, có năng lực sáng tạo, tác phong làm việc chuyên nghiệp, có tình thần trách nhiệm cao trong công việc, xây dựng tập thể đoàn kết nhằm đưa VNPT Technology phát triển bền vững.\r\n\r\nTriết lý kinh doanh\r\nVNPT Technology luôn lấy khách hàng làm trung tâm trong mọi hoạt động sản xuất kinh doanh của mình, trên cơ sở đảm bảo lợi ích và chia sẻ những khó khăn cùng với đối tác nhằm mang đến cho khách hàng các sản phẩm, dịch vụ chất lượng và ngày càng phong phú đáp ứng nhu cầu ngày càng gia tăng của khách hàng.\r\nVNPT Technology luôn xác định đi tiên phong về công nghệ trên cơ sở hợp tác với các đối tác công nghệ nguồn hàng đầu thế giới nhằm đảm bảo luôn mang đến cho khách hàng các sản phẩm công nghệ tiên tiến, cập nhật kịp thời các xu hướng phát triển công nghệ toàn cầu."])</script><script>self.__next_f.push([1,"24:Tbb5,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMỤC ĐÍCH CÔNG VIỆC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhụ trách thiết kế, phát triển và cài đặt các giải pháp phần mềm, thuộc một trong các lĩnh vực sau: phần mềm nhúng, phần mềm hệ thống, ứng dụng di động. Kỹ sư phát triển phần mềm có vai trò xây dựng được phần mềm chạy tốt, chất lượng cao và sáng tạo, tuân thủ các chuẩn mực coding và kĩ thuật thiết kế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. TRÁCH NHIỆM CÔNG VIỆC CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tNghiên cứu, thiết kế, phát triển phần mềm các dự án của Trung tâm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.1.\tPhối hợp thu thập và thực hiện phân tích yêu cầu đầu vào\u003c/p\u003e\u003cp\u003e1.2.\tĐịnh nghĩa yêu cầu chức năng, phi chức năng và yêu cầu giao diện phần mềm\u003c/p\u003e\u003cp\u003e1.3.\tNghiên cứu, đánh giá và l ốn góp của Alcatel Lucent tại công ty Liên doanh ANSV và phần vốn góp của Siemens tại công ty Liên doanh TELEQ, chuyển đổi 2 công ty này trở thành công ty thành viên của VNPT Technology.\r\nKế thừa nguồn lực và kinh nghiệm tích lũy sau gần 20 năm của các công ty liên doanh ANSV và TELEQ; sở hữu và tiếp tục phát triển đội ngũ chuyên gia trưởng thành từ những ngày đầu của thời kỳ số hóa mạng viễn thông, cùng với hạ tầng kỹ thuật được tích lũy và tiếp tục phát triển từ các liên doanh; VNPT Technology ngày càng khẳng định vị thế và vai trò của một đơn vị tiên phong trong nghiên cứu phát triển và sản xuất các thiết bị điện tử, viễn thông và công nghệ thông tin, xứng đáng là đơn vị chủ lực của VNPT trong lĩnh vực Công nghệ, Công nghiệp Bưu chính, Viễn thông, Công nghệ thông tin, Truyền thông và Công nghiệp Nội dung số.\r\nVNPT Technology là đơn vị chủ lực của Tập đoàn VNPT trong lĩnh vực Công nghệ; Công nghiệp Điện tử Viễn thông; Công nghệ thông tin; Truyền thông và Công nghiệp nội dung số.\r\nTính đến thời điểm hiện nay, VNPT Technology đã cho ra thị trường trên 20 triệu sản phẩm bao gồm các thiết bị viễn thông, thiết bị điện tử tiêu dùng. Bên cạnh đó, thị trường quốc tế cũng được đẩy mạnh với việc xuất khẩu sản phẩm sang một số thị trường tiềm năng như Lào, Campuchia, Myanmar, Indonesia, Nepal…\r\n\r\nLĩnh vực hoạt động\r\nVNPT Technology hoạt động trong các lĩnh vực: Nghiên cứu phát triển, Sản xuất Công nghệ Công nghiệp; Kinh doanh quốc tế; Thương mại \u0026 Dịch vụ kỹ thuật.\r\nNghiên cứu phát triển sản phẩm công nghệ \u0026 ODM: Là hoạt động cốt lõi của Công ty nhằm tạo ra những giá trị từ tri thức, tạo ra tài sản trí tuệ và hàng hóa dịch vụ với hàm lượng công nghệ cao. Nghiên cứu và phát triển các công nghệ lõi trong 5 lĩnh vực: Băng rộng cố định, băng rộng không dây, IoT, công nghệ 5G và Chuyển đổi số nhằm tạo ra những sản phẩm toàn diện từ Phần cứng/Thiết bị, nền tảng cho tới các ứng dụng người dùng. Mục tiêu 2025, trở thành nhà nghiên cứu phát triển thiết kế gốc.\r\nSản xuất thiết bị công nghệ công nghiệp \u0026 EMS: Các sản phẩm tạo ra từ quá trình nghiên cứu và phát triển, được sản xuất hàng loạt qua hoạt động sản xuất công nghiệp điện tử đáp ứng nhu cầu thị trường trong và ngoài nước. Bên cạnh đó dịch vụ sản xuất điện tử - EMS được mở rộng giúp Công ty tận dụng được năng lực và hạ tầng sẵn có đồng thời tham gia sâu rộng hơn vào chuỗi cung ứng toàn cầu.\r\nTích hợp hệ thống mạng viễn thông, Công nghệ thông tin: Với gần 30 năm kinh nghiệm tích hợp các hệ thống lớn như mạng Viễn thông, Công ty xác định trở thành đơn vị dẫn đầu trong lĩnh vực tích hợp hệ thống mạng Viễn thông và Công nghệ thông tin. Hoạt động tích hợp hệ thống toàn diện từ Phân tich, Xây dựng giải pháp tổng thể, Thiết kế, Triển khai và Đào tạo chuyển giao.\r\nThương mại, dịch vụ kỹ thuật ICT trong nước và quốc tế: Hoạt động kinh doanh phát triển thị trường nhằm cung cấp các sản phẩm phẩm công nghệ, các giải pháp tích hợp, dịch vụ kỹ thuật ICT trong nước và quốc tế với các mảng thị trường bao gồm: Kinh doanh phát triển thị trường truyền thống/các nhà mạng; Kinh doanh phát triển thị trường Doanh nghiệp và khách hàng cá nhân; và Kinh doanh phát triển thị trường quốc tế.\r\nChuyển đổi số doanh nghiệp SME: Đây là một lĩnh vực mới được xác định tập trung nghiên cứu và phát triển trong giai đoạn 2020 – 2025, song hành cùng chiến lược Quốc gia số tới năm 2030. Giúp các doanh nghiệp vừa và nhỏ thay đổi các phương thức hoạt động nhằm tạo ra các sản phẩm mới, giá trị mới thông qua việc ứng dụng các bộ giải pháp công nghệ và chuyển dịch vận hành trên không gian số.\r\n\r\nTầm nhìn\r\nVNPT Technology với vai trò doanh nghiệp chủ lực của Tập đoàn VNPT trong lĩnh vực công nghệ, công nghiệp điện tử viễn thông, công nghệ thông tin, truyền thông và công nghiệp nội dung số có tầm nhìn trở thành doanh nghiệp công nghệ cao hàng đầu tại Việt Nam và tiến tới trở thành một trong những công ty công nghệ hàng đầu khu vực.\r\n\r\nSứ mệnh\r\nSứ mệnh của VNPT Technology là tạo ra các sản phẩm công nghệ chất lượng cao mang thương hiệu Việt phục vụ mạng viễn thông CNTT cũng như đông đảo cộng đồng.\r\n\r\nGiá trị cốt lõi\r\nNghiên cứu phát triển và cung ứng các sản phẩm công nghệ chất lượng cao mang thương hiệu Việt trên thị trường, đưa sản phẩm công nghệ thương hiệu Việt có khả năng cạnh tranh và bắt kịp với xu hướng phát triển công nghệ thông tin trên thế giới.\r\nXây dựng văn hóa doanh nghiệp trên cơ sở nền tảng khuyến khích tinh thần làm việc nhóm (teamworking và cross-teamworking), tích cực chia sẻ thông tin, hỗ trợ nhau trong công việc, phát huy tinh thần và thế mạnh của VNPT Technology.\r\nPhát triển môi trường làm việc có giá trị nhân văn, minh bạch là cơ sở tạo động lực, tìm tòi sáng tạo, không ngừng học hỏi trong hoạt động nghiên cứu, phát triển công nghệ.\r\nLấy con người làm nòng cốt, tập trung phát triển và đào tạo nhân lực, tạo điều kiện phát triển đội ngũ CBNV nhiệt huyết, giỏi chuyên môn nghiệp vụ, có năng lực sáng tạo, tác phong làm việc chuyên nghiệp, có tình thần trách nhiệm cao trong công việc, xây dựng tập thể đoàn kết nhằm đưa VNPT Technology phát triển bền vững.\r\n\r\nTriết lý kinh doanh\r\nVNPT Technology luôn lấy khách hàng làm trung tâm trong mọi hoạt động sản xuất kinh doanh của mình, trên cơ sở đảm bảo lợi ích và chia sẻ những khó khăn cùng với đối tác nhằm mang đến cho khách hàng các sản phẩm, dịch vụ chất lượng và ngày càng phong phú đáp ứng nhu cầu ngày càng gia tăng của khách hàng.\r\nVNPT Technology luôn xác định đi tiên phong về công nghệ trên cơ sở hợp tác với các đối tác công nghệ nguồn hàng đầu thế giới nhằm đảm bảo luôn mang đến cho khách hàng các sản phẩm công nghệ tiên tiến, cập nhật kịp thời các xu hướng phát triển công nghệ toàn cầu."])</script><script>self.__next_f.push([1,"29:T1dfe,"])</script><script>self.__next_f.push([1,"VNPT Technology được thành lập ngày 6/1/2011 bởi Tập đoàn Bưu chính Viễn thông Việt Nam (VNPT) và 2 cổ đông khác là VNPost và Pacifab, với vốn điều lệ 500 tỷ đồng, được tổ chức và hoạt  tới các ứng dụng người dùng. Mục tiêu 2025, trở thành nhà nghiên cứu phát triển thiết kế gốc.\r\nSản xuất thiết bị công nghệ công nghiệp \u0026 EMS: Các sản phẩm tạo ra từ quá trình nghiên cứu và phát triển, được sản xuất hàng loạt qua hoạt động sản xuất công nghiệp điện tử đáp ứng nhu cầu thị trường trong và ngoài nước. Bên cạnh đó dịch vụ sản xuất điện tử - EMS được mở rộng giúp Công ty tận dụng được năng lực và hạ tầng sẵn có đồng thời tham gia sâu rộng hơn vào chuỗi cung ứng toàn cầu.\r\nTích hợp hệ thống mạng viễn thông, Công nghệ thông tin: Với gần 30 năm kinh nghiệm tích hợp các hệ thống lớn như mạng Viễn thông, Công ty xác định trở thành đơn vị dẫn đầu trong lĩnh vực tích hợp hệ thống mạng Viễn thông và Công nghệ thông tin. Hoạt động tích hợp hệ thống toàn diện từ Phân tich, Xây dựng giải pháp tổng thể, Thiết kế, Triển khai và Đào tạo chuyển giao.\r\nThương mại, dịch vụ kỹ thuật ICT trong nước và quốc tế: Hoạt động kinh doanh phát triển thị trường nhằm cung cấp các sản phẩm phẩm công nghệ, các giải pháp tích hợp, dịch vụ kỹ thuật ICT trong nước và quốc tế với các mảng thị trường bao gồm: Kinh doanh phát triển thị trường truyền thống/các nhà mạng; Kinh doanh phát triển thị trường Doanh nghiệp và khách hàng cá nhân; và Kinh doanh phát triển thị trường quốc tế.\r\nChuyển đổi số doanh nghiệp SME: Đây là một lĩnh vực mới được xác định tập trung nghiên cứu và phát triển trong giai đoạn 2020 – 2025, song hành cùng chiến lược Quốc gia số tới năm 2030. Giúp các doanh nghiệp vừa và nhỏ thay đổi các phương thức hoạt động nhằm tạo ra các sản phẩm mới, giá trị mới thông qua việc ứng dụng các bộ giải pháp công nghệ và chuyển dịch vận hành trên không gian số.\r\n\r\nTầm nhìn\r\nVNPT Technology với vai trò doanh nghiệp chủ lực của Tập đoàn VNPT trong lĩnh vực công nghệ, công nghiệp điện tử viễn thông, công nghệ thông tin, truyền thông và công nghiệp nội dung số có tầm nhìn trở thành doanh nghiệp công nghệ cao hàng đầu tại Việt Nam và tiến tới trở thành một trong những công ty công nghệ hàng đầu khu vực.\r\n\r\nSứ mệnh\r\nSứ mệnh của VNPT Technology là tạo ra các sản phẩm công nghệ chất lượng cao mang thương hiệu Việt phục vụ mạng viễn thông CNTT cũng như đông đảo cộng đồng.\r\n\r\nGiá trị cốt lõi\r\nNghiên cứu phát triển và cung ứng các sản phẩm công nghệ chất lượng cao mang thương hiệu Việt trên thị trường, đưa sản phẩm công nghệ thương hiệu Việt có khả năng cạnh tranh và bắt kịp với xu hướng phát triển công nghệ thông tin trên thế giới.\r\nXây dựng văn hóa doanh nghiệp trên cơ sở nền tảng khuyến khích tinh thần làm việc nhóm (teamworking và cross-teamworking), tích cực chia sẻ thông tin, hỗ trợ nhau trong công việc, phát huy tinh thần và thế mạnh của VNPT Technology.\r\nPhát triển môi trường làm việc có giá trị nhân văn, minh bạch là cơ sở tạo động lực, tìm tòi sáng tạo, không ngừng học hỏi trong hoạt động nghiên cứu, phát triển công nghệ.\r\nLấy con người làm nòng cốt, tập trung phát triển và đào tạo nhân lực, tạo điều kiện phát triển đội ngũ CBNV nhiệt huyết, giỏi chuyên môn nghiệp vụ, có năng lực sáng tạo, tác phong làm việc chuyên nghiệp, có tình thần trách nhiệm cao trong công việc, xây dựng tập thể đoàn kết nhằm đưa VNPT Technology phát triển bền vững.\r\n\r\nTriết lý kinh doanh\r\nVNPT Technology luôn lấy khách hàng làm trung tâm trong mọi hoạt động sản xuất kinh doanh của mình, trên cơ sở đảm bảo lợi ích và chia sẻ những khó khăn cùng với đối tác nhằm mang đến cho khách hàng các sản phẩm, dịch vụ chất lượng và ngày càng phong phú đáp ứng nhu cầu ngày càng gia tăng của khách hàng.\r\nVNPT Technology luôn xác định đi tiên phong về công nghệ trên cơ sở hợp tác với các đối tác công nghệ nguồn hàng đầu thế giới nhằm đảm bảo luôn mang đến cho khách hàng các sản phẩm công nghệ tiên tiến, cập nhật kịp thời các xu hướng phát triển công nghệ toàn cầu."])</script><script>self.__next_f.push([1,"2a:Tbb5,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMỤC ĐÍCH CÔNG VIỆC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhụ trách thiết kế, phát triển và cài đặt các giải pháp phần mềm, thuộc một trong các lĩnh vực sau: phần mềm nhúng, phần mềm hệ thống, ứng dụng di động. Kỹ sư phát triển phần mềm có vai trò xây dựng được phần mềm chạy tốt, chất lượng cao và sáng tạo, tuân thủ các chuẩn mực coding và kĩ thuật thiết kế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. TRÁCH NHIỆM CÔNG VIỆC CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tNghiên cứu, thiết kế, phát triển phần mềm các dự án của Trung tâm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.1.\tPhối hợp thu thập và thực hiện phân tích yêu cầu đầu vào\u003c/p\u003e\u003cp\u003e1.2.\tĐịnh nghĩa yêu cầu chức năng, phi chức năng và yêu cầu giao diện phần mềm\u003c/p\u003e\u003cp\u003e1.3.\tNghiên cứu, đánh giá và lựa chọn giải pháp công nghệ\u003c/p\u003e\u003cp\u003e1.4.\tThiết kế kiến trúc hệ thống, giao diện và cơ sở dữ liệu logic cho hệ thống phần mềm\u003c/p\u003e\u003cp\u003e1.5.\tLựa chọn phương pháp và quy trình phát triển phù hợp\u003c/p\u003e\u003cp\u003e1.6.\tXây dựng môi trường phát triển đảm bảo yêu cầu \u003c/p\u003e\u003cp\u003e1.7.\tPhân rã chức năng, cấu trúc và thiết kế chi tiết phần mềm\u003c/p\u003e\u003cp\u003e1.8.\tThiết kế mức thấp \u003c/p\u003e\u003cp\u003e1.9.\tThực hiện lập trình chương trình phần mềm, dựa trên đặc tả thiết kế chi tiết và thiết kế chương trình\u003c/p\u003e\u003cp\u003e1.10.\tThực hiện unit test và đánh giá\u003c/p\u003e\u003cp\u003e1.11.\tHỗ trợ xây dựng kịch bản kiểm thử tích hợp đơn vị, tích hợp hệ thống\u003c/p\u003e\u003cp\u003e1.12.\tXây dựng các tài liệu kỹ thuật phục vụ đóng gói, chuyển giao và đào tạo vận hành phần mềm\u003c/p\u003e\u003cp\u003e1.13.\tQuản lý phiên bản phần mềm\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tDuy trì và cập nhật \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e2.1.\tThu thập và đánh giá thông tin phản hồi về phần mềm, các yêu cầu bảo trì, nâng cấp phần mềm\u003c/p\u003e\u003cp\u003e2.2.\tXây dựng đề xuất và bảo vệ phương án bảo trì, cập nhật phần mềm \u003c/p\u003e\u003cp\u003e2.3.\tThực hiện tối ưu, cập nhật phần mềm theo phương án đã được phê duyệt\u003c/p\u003e\u003cp\u003e2.4.\tCập nhật tài liệu liên quan cho phiên bản nâng cấp và chuyển giao kinh doanh, triển khai\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tNhiệm vụ khác \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e3.1.\tLập kế hoạch công việc và báo cáo hàng tuần tổng hợp các nhiệm vụ của cá nhân gửi BLĐ\u003c/p\u003e\u003cp\u003e3.2.\tThực hiện công tác đối ngoại (tiếp đón đối tác, các cơ quan chức năng theo lĩnh vực được phụ trách) khi được phân công\u003c/p\u003e\u003cp\u003e3.3.\tTham gia chuẩn bị/ đánh giá hồ sơ thầu (về mặt kỹ thuật) nếu cần\u003c/p\u003e\u003cp\u003e3.4.\tTham gia các buổi tư vấn về giải pháp cho khách hàng khi được yêu cầu\u003c/p\u003e\u003cp\u003e3.5.\tThực hiện các nhiệm vụ khác theo phân công và uỷ quyền của cấp trên\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:Tae7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTIÊU CHUẨN NĂNG LỰC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1\tTrình độ học vấn: \u003c/strong\u003eĐại học chuyên ngành Công nghệ thông tin, Điện tử viễn thông hoặc các chuyên ngành liên quan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2\tChứng chỉ:\u003c/strong\u003e Không yêu cầu\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3\tKinh nghiệm: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-   Ít nhất 2 năm kinh nghiệm ở vị trí tương đương \u003c/p\u003e\u003cp\u003e-\tCó tối thiểu 1 năm kinh nghiệm lập trình nhúng trên nền tảng Linux/ lập trình ứng dụng di đông trên Android hoặc iOS\u003c/p\u003e\u003cp\u003e-\tCó kiến thức và kinh nghiệm làm việc với Linux kernel, Drivers\u003c/p\u003e\u003cp\u003e-\tKinh nghiệm phát triển phầm mềm (firmware) của hệ thống nhúng; và hiểu biết trong lĩnh v r\nVNPT Technology là đơn vị chủ lực của Tập đoàn VNPT trong lĩnh vực Công nghệ; Công nghiệp Điện tử Viễn thông; Công nghệ thông tin; Truyền thông và Công nghiệp nội dung số.\r\nTính đến thời điểm hiện nay, VNPT Technology đã cho ra thị trường trên 20 triệu sản phẩm bao gồm các thiết bị viễn thông, thiết bị điện tử tiêu dùng. Bên cạnh đó, thị trường quốc tế cũng được đẩy mạnh với việc xuất khẩu sản phẩm sang một số thị trường tiềm năng như Lào, Campuchia, Myanmar, Indonesia, Nepal…\r\n\r\nLĩnh vực hoạt động\r\nVNPT Technology hoạt động trong các lĩnh vực: Nghiên cứu phát triển, Sản xuất Công nghệ Công nghiệp; Kinh doanh quốc tế; Thương mại \u0026 Dịch vụ kỹ thuật.\r\nNghiên cứu phát triển sản phẩm công nghệ \u0026 ODM: Là hoạt động cốt lõi của Công ty nhằm tạo ra những giá trị từ tri thức, tạo ra tài sản trí tuệ và hàng hóa dịch vụ với hàm lượng công nghệ cao. Nghiên cứu và phát triển các công nghệ lõi trong 5 lĩnh vực: Băng rộng cố định, băng rộng không dây, IoT, công nghệ 5G và Chuyển đổi số nhằm tạo ra những sản phẩm toàn diện từ Phần cứng/Thiết bị, nền tảng cho tới các ứng dụng người dùng. Mục tiêu 2025, trở thành nhà nghiên cứu phát triển thiết kế gốc.\r\nSản xuất thiết bị công nghệ công nghiệp \u0026 EMS: Các sản phẩm tạo ra từ quá trình nghiên cứu và phát triển, được sản xuất hàng loạt qua hoạt động sản xuất công nghiệp điện tử đáp ứng nhu cầu thị trường trong và ngoài nước. Bên cạnh đó dịch vụ sản xuất điện tử - EMS được mở rộng giúp Công ty tận dụng được năng lực và hạ tầng sẵn có đồng thời tham gia sâu rộng hơn vào chuỗi cung ứng toàn cầu.\r\nTích hợp hệ thống mạng viễn thông, Công nghệ thông tin: Với gần 30 năm kinh nghiệm tích hợp các hệ thống lớn như mạng Viễn thông, Công ty xác định trở thành đơn vị dẫn đầu trong lĩnh vực tích hợp hệ thống mạng Viễn thông và Công nghệ thông tin. Hoạt động tích hợp hệ thống toàn diện từ Phân tich, Xây dựng giải pháp tổng thể, Thiết kế, Triển khai và Đào tạo chuyển giao.\r\nThương mại, dịch vụ kỹ thuật ICT trong nước và quốc tế: Hoạt động kinh doanh phát triển thị trường nhằm cung cấp các sản phẩm phẩm công nghệ, các giải pháp tích hợp, dịch vụ kỹ thuật ICT trong nước và quốc tế với các mảng thị trường bao gồm: Kinh doanh phát triển thị trường truyền thống/các nhà mạng; Kinh doanh phát triển thị trường Doanh nghiệp và khách hàng cá nhân; và Kinh doanh phát triển thị trường quốc tế.\r\nChuyển đổi số doanh nghiệp SME: Đây là một lĩnh vực mới được xác định tập trung nghiên cứu và phát triển trong giai đoạn 2020 – 2025, song hành cùng chiến lược Quốc gia số tới năm 2030. Giúp các doanh nghiệp vừa và nhỏ thay đổi các phương thức hoạt động nhằm tạo ra các sản phẩm mới, giá trị mới thông qua việc ứng dụng các bộ giải pháp công nghệ và chuyển dịch vận hành trên không gian số.\r\n\r\nTầm nhìn\r\nVNPT Technology với vai trò doanh nghiệp chủ lực của Tập đoàn VNPT trong lĩnh vực công nghệ, công nghiệp điện tử viễn thông, công nghệ thông tin, truyền thông và công nghiệp nội dung số có tầm nhìn trở thành doanh nghiệp công nghệ cao hàng đầu tại Việt Nam và tiến tới trở thành một trong những công ty công nghệ hàng đầu khu vực.\r\n\r\nSứ mệnh\r\nSứ mệnh của VNPT Technology là tạo ra các sản phẩm công nghệ chất lượng cao mang thương hiệu Việt phục vụ mạng viễn thông CNTT cũng như đông đảo cộng đồng.\r\n\r\nGiá trị cốt lõi\r\nNghiên cứu phát triển và cung ứng các sản phẩm công nghệ chất lượng cao mang thương hiệu Việt trên thị trường, đưa sản phẩm công nghệ thương hiệu Việt có khả năng cạnh tranh và bắt kịp với xu hướng phát triển công nghệ thông tin trên thế giới.\r\nXây dựng văn hóa doanh nghiệp trên cơ sở nền tảng khuyến khích tinh thần làm việc nhóm (teamworking và cross-teamworking), tích cực chia sẻ thông tin, hỗ trợ nhau trong công việc, phát huy tinh thần và thế mạnh của VNPT Technology.\r\nPhát triển môi trường làm việc có giá trị nhân văn, minh bạch là cơ sở tạo động lực, tìm tòi sáng tạo, không ngừng học hỏi trong hoạt động nghiên cứu, phát triển công nghệ.\r\nLấy con người làm nòng cốt, tập trung phát triển và đào tạo nhân lực, tạo điều kiện phát triển đội ngũ CBNV nhiệt huyết, giỏi chuyên môn nghiệp vụ, có năng lực sáng tạo, tác phong làm việc chuyên nghiệp, có tình thần trách nhiệm cao trong công việc, xây dựng tập thể đoàn kết nhằm đưa VNPT Technology phát triển bền vững.\r\n\r\nTriết lý kinh doanh\r\nVNPT Technology luôn lấy khách hàng làm trung tâm trong mọi hoạt động sản xuất kinh doanh của mình, trên cơ sở đảm bảo lợi ích và chia sẻ những khó khăn cùng với đối tác nhằm mang đến cho khách hàng các sản phẩm, dịch vụ chất lượng và ngày càng phong phú đáp ứng nhu cầu ngày càng gia tăng của khách hàng.\r\nVNPT Technology luôn xác định đi tiên phong về công nghệ trên cơ sở hợp tác với các đối tác công nghệ nguồn hàng đầu thế giới nhằm đảm bảo luôn mang đến cho khách hàng các sản phẩm công nghệ tiên tiến, cập nhật kịp thời các xu hướng phát triển công nghệ toàn cầu."])</script><script>self.__next_f.push([1,"42:{\"companyId\":199353,\"jobImageURLs\":\"$43\",\"jobVideoURLs\":null,\"companyName\":\"Công Ty Cổ Phần Công Nghệ Công Nghiệp Bưu Chính Viễn Thông - VNPT Technology\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/65/10913890.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"Phòng nhân sự\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Số 124 Hoàng Quốc Việt, Cầu Giấy, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"Môi trường làm việc thân thiện, năng động, sáng tạo, khuyến khích phát triển cá nhân\\r\\nĐược làm việc và tiếp xúc với các công nghệ mới và các chuyên gia nước ngoài\\r\\nChế độ lương thưởng hấp dẫn\\r\\nCơ hội được đào tạo ngắn hạn và dài hạn trong và ngoài nước.\\r\\nCơ hội thăng tiến trong chuyên môn, nghề nghiệp\",\"profileBaseName\":\"VNPT-Technology\",\"isUpgradeProfile\":1,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"https://images02.vietnamworks.com/companyprofile/null/en/CCP_1920_x_510px.jpg\",\"companyProfileUrl\":\"https://www.vietnamwork
