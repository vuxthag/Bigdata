88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tbcc,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e***Tổng quan về công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChúng tôi đang tìm kiếm một Giám đốc Tài chính (CFO) hoặc Kế toán trưởng có tiềm năng phát triển lên CFO để quản lý và phát triển hoạt động tài chính của công ty.\u003c/p\u003e\u003cp\u003e•\tVị trí này phù hợp với các ứng viên mong muốn một công việc ổn định, lâu dài, đồng thời có cơ hội phát triển từng bước lên vai trò CFO toàn diện.\u003c/p\u003e\u003cp\u003e•\tBạn sẽ làm việc chặt chẽ với ban lãnh đạo nhằm đảm bảo kiểm soát tài chính hiệu quả và hỗ trợ phát triển kinh doanh, đặc biệt trong hệ thống bán lẻ và các thị trường quốc tế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Role Overview:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tWe are looking for a Finance Director (CFO) or a strong Chief Accountant with CFO potential to manage and develop the company’s financial operations.\u003c/p\u003e\u003cp\u003e•\tThis role is suitable for candidates seeking a stable, long-term position, with the opportunity to gradually grow into a full CFO role.\u003c/p\u003e\u003cp\u003e•\tYou will work closely with management to ensure financial control and support business development across retail stores and international sales.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Trách nhiệm chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý và chịu trách nhiệm toàn bộ hoạt động kế toán, kiểm toán; đảm bảo tuân thủ quy định pháp luật và chuẩn mực kế toán tại Việt Nam \u003c/p\u003e\u003cp\u003e•\tLập, rà soát và kiểm soát chất lượng báo cáo tài chính định kỳ (tháng / quý / năm) \u003c/p\u003e\u003cp\u003e•\tQuản lý dòng tiền, kiểm soát chi phí và theo dõi hiệu quả tài chính tổng thể \u003c/p\u003e\u003cp\u003e•\tTheo dõi và đánh giá hiệu quả vận hành hệ thống 25–30 cửa hàng \u003c/p\u003e\u003cp\u003e•\tPhân tích lợi nhuận theo từng cửa hàng và kênh bán hàng, hỗ trợ tối ưu hiệu suất kinh doanh \u003c/p\u003e\u003cp\u003e•\tTheo dõi và tổng hợp báo cáo doanh thu từ thị trường quốc tế \u003c/p\u003e\u003cp\u003e•\tLàm việc với kiểm toán, ngân hàng và các đối tác tài chính liên quan \u003c/p\u003e\u003cp\u003e•\tXây dựng, đào tạo và phát triển năng lực đội ngũ tài chính – kế toán \u003c/p\u003e\u003cp\u003e•\tChuẩn hóa và cải tiến quy trình tài chính theo từng giai đoạn phát triển của doanh nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Key Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tOversee accounting operations and ensure compliance with Vietnam regulations\u003c/p\u003e\u003cp\u003e•\tReview and prepare financial reports (monthly, quarterly, yearly)\u003c/p\u003e\u003cp\u003e•\tMonitor cash flow, costs, and overall financial performance\u003c/p\u003e\u003cp\u003e•\tTrack performance of retail stores (25–30 locations)\u003c/p\u003e\u003cp\u003e•\tSupport profitability analysis by store and sales channel\u003c/p\u003e\u003cp\u003e•\tMonitor and report on overseas sales performance\u003c/p\u003e\u003cp\u003e•\tWork with auditors, banks, and external partners\u003c/p\u003e\u003cp\u003e•\tGuide and support the accounting team\u003c/p\u003e\u003cp\u003e•\tImprove financial processes step by step.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tb66,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e***Định hướng phát triển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTùy theo năng lực và mức độ đóng góp, vị trí có thể mở rộng sang các vai trò chiến lược cao hơn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTham gia lập ngân sách tổng thể và xây dựng kế hoạch tài chính dài hạn \u003c/p\u003e\u003cp\u003e•\tPhân tích hiệu quả kinh doanh, đánh giá cơ hội đầu tư và mở rộng \u003c/p\u003e\u003cp\u003e•\tĐồng hành cùng ban lãnh đạo trong các quyết định chiến lược (mở rộng thị trường, phát triển hệ thống bán lẻ) \u003c/p\u003e\u003cp\u003e•\tPhát triển lên vai trò CFO với phạm vi quản lý toàn diện về tài chính và chiến lược doanh nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Development Opportunity:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDepending on capability and interest, the role can expand to include:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBudgeting and financial planning\u003c/p\u003e\u003cp\u003e•\tBusiness and investment analysis\u003c/p\u003e\u003cp\u003e•\tSupport expansion decisions (new stores, projects)\u003c/p\u003e\u003cp\u003e•\tTransition into a full CFO role\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Yêu cầu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm ở vị trí Kế toán trưởng, Finance Manager hoặc các vai trò tương đương \u003c/p\u003e\u003cp\u003e•\tAm hiểu sâu về chuẩn mực kế toán và quy định thuế tại Việt Nam \u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên có kinh nghiệm trong lĩnh vực bán lẻ hoặc vận hành chuỗi cửa hàng \u003c/p\u003e\u003cp\u003e•\tTư duy cẩn trọng, trách nhiệm cao và có khả năng kiểm soát chi tiết tốt \u003c/p\u003e\u003cp\u003e•\tThành thạo Excel và các công cụ phục vụ phân tí
