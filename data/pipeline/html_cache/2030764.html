 and research engagement.24:T2486,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eGiới thiệu về Viện Đại học Sydney Việt Nam/\u003cem\u003eAbout the University of Sydney Vietnam Institute (SVI):\u003c/em\u003e\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eSVI là một trung tâm nghiên cứu và hợp tác đa lĩnh vực, được thành lập dưới hình thức doanh nghiệp xã hội theo quy định của luật pháp Việt Nam. Công ty được thiết kế để tạo điều kiện thuận lợi và củng cố sự trao đổi tư duy và sáng tạo giữa các nhà nghiên cứu, học giá, và cộng đồng nói chung của Úc và Việt Nam. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eSVI is a multidisciplinary research and engagement hub established as a social enterprise under the laws of Vietnam. It is designed to facilitate and strengthen intellectual and creative exchange between Australian and Vietnamese researchers, academics and the broader community.  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eXây dựng trên nền tảng giáo dục và nghiên cứu hàng đầu thế giới của Đại học Sydney trong nhiều lĩnh vực và các sự hợp tác về học thuật quan trọng và lâu đời với Việt Nam trong suốt 50 năm qua. SVI sẽ thực hiện tầm nhìn của Đại học Sydney về sự hợp tác bền vững, cùng có lợi trong tất cả các mức độ của giáo dục đại học và hợp tác nghiên cứu.   \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBuilding on the University of Sydney’s world-class education and research across a broad range of disciplines and its significant and long-standing academic partnerships in Vietnam over the last 50 years, SVI will realise the University’s vision for sustainable, mutually beneficial cooperation across all levels of higher education and research engagement.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMô tả vị trí/ \u003cem\u003eJob Description: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eTrong vai trò Quản lý thử nghiệm lâm sàng, cá nhân chịu trách nhiệm cho việc điều phối toàn bộ quá trình triển khai của thử nghiệm lâm sàng. Người ở vị trí này sẽ có vai trò dẫn dắt các hoạt động lên kế hoạch, thực hiện, giám sát và đóng nghiên cứu, cũng như quản lý chung việc đảm bảo chất lượng và an toàn theo như các tiêu chuẩn Thực hành lâm sàng tốt (GCP) quốc tế. Quản lý thử nghiệm cũng chịu trách nhiệm cho việc xây dựng một đội ngũ nghiên cứu có năng lực và đầy nhiệt huyết. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eAs Trial Manager, the incumbent is responsible for coordinating the implementation of clinical trials. This role will take a lead role in planning, executing, monitoring and closing the trial, as well as overseeing quality assurance and safety in keeping with international standards of Good Clinical Practice (GCP). The Trial Manager is responsible for building a team of enthusiastic and capable research staff. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ và trách nhiệm/ \u003cem\u003eDuties and Responsibilities: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e1. Xây dựng và triển khai kế hoạch thực hiện nghiên cứu/\u003cem\u003eDeveloping and executing the clinical trial implementation plan\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Chuẩn bị đề cương nghiên cứu và các tài liệu của thử nghiệm cho việc đăng ký theo yêu cầu của nhà tài trợ và chính quyền. /\u003cem\u003ePrepare protocol and trial documents for registration according to requirements of sponsors and authorities. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng, rà soát đánh giá các hồ sơ liên quan đến thử nghiệm bao gồm Quy trình thực hành chuẩn, tài liệu và biểu mẫu nghiên cứu, và giấy tờ liên quan đến việc quảng bá thử nghiệm. /\u003cem\u003eDevelop, review and evaluate all trial-related materials including the Standard Operating Procedures, trial documentation and forms, and trial promotion materials. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Thu thập và duy trì cơ sở vật chất, thiết bị và giấy phép đăng ký cần thiết cho việc triển khai thử nghiệm (bao gồm cả việc mua/nhập khẩu thuốc) /\u003cem\u003eObtaining and maintaining facilities, equipment and licences as required for implementing the trial (including drug procurement/import) \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng và triển khai các hoạt động thí điểm để kiểm tra các quy trình quan trọng của thử nghiệm. /\u003cem\u003eDevelop and implement pilot activities to test key components of the trial. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Tập huấn các nhóm nghiên cứu thực địa và nhân viên y tế tại cơ sở để triển khai các quy trình nghiên cứu. /\u003cem\u003eTraining field research teams and government health staff to implement the study procedures. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng và thường xuyên cập nhật khung tiến độ nghiên cứu. /\u003cem\u003eDevelop and update the trial progress tracker regularly. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e2. Đồng điều phối và giám sát thử nghiệm lâm sàng /\u003cem\u003eCo-ordination and monitoring of the clinical trial \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Giám sát việc tiến hành thử nghiệm, bao gồm việc tuyển chọn người tham gia và triển khai tất cả các quy trình nghiên cứu. /\u003cem\u003eMonitoring of the implementation of the trial including subject recruitment and implementation of all study procedures. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Phối hợp với các nghiên cứu viên trong việc điều phối để đảm bảo rằng tất cả các hoạt động nghiên cứu được thực hiện theo như đề cương đã được phê duyệt bởi hội đồng đạo đức và các quy định của cơ quan quản lý.  /\u003cem\u003eCoordinate with investigators to ensure that all research activities are carried out in accordance with the protocol approved by ethics committees and applicable regulations. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Đảm bảo việc thu thập dữ liệu và hoàn thiện các phiếu thu thập thông tin nghiên cứu liên quan đến thử nghiệm lâm sàng diễn ra chính xác và đúng tiến độ, cũng như duy trì các tài liệu thiết yếu của nghiên cứu theo tiêu chuẩn GCP. /\u003cem\u003eEnsure timely and accurate data collection and completion of case report forms relevant to clinical trials or research projects, and maintain the trial essential documents according to GCP standards. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Quản lý các buổi giám sát và giải quyết các truy vấn. /\u003cem\u003eManaging monitoring visits and dealing with queries.\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Soạn thảo, rà soát các báo cáo liên quan đến nghiên cứu cho Nhà tài trợ, Hội đồng Đạo đức và/hoặc Cơ quan quản lý theo yêu cầu. /\u003cem\u003eDevelop, review research-related reports to Sponsors, Ethics Committees, and/or regulatory authorities as required.\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e3. Giao tiếp và các mối quan hệ/\u003cem\u003eCommunication and relationships\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng và củng cố các mối quan hệ với các đối tác chính quyền. /\u003cem\u003eDevelop and strengthen key relationships with government partners. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Chuẩn bị tài liệu và đóng vai trò là cầu nối liên lạc giữa các nghiên cứu viên và nhà tài trợ về những việc liên quan đến quy trình và yêu cầu nghiên cứu. \u003cem\u003e/Prepare documentation and serve as the key liaison between investigators and sponsors regarding study procedures and requirements. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Thông báo cho Giám đốc Đơn vị Thử nghiệm lâm sàng và Nghiên cứu viên chính về các vấn đề phát sinh trong nghiên cứu. /\u003cem\u003e Notifying Director of Clinical Trials Unit and Chief Investigators about problems arising in the study.\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e4. Trách nhiệm giải trình tài chính \u003cem\u003e/Financial accountability \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Chuẩn bị và quản lý ngân sách cho các thử nghiệm lâm sàng. /\u003cem\u003ePrepare and manage budgets for clinical trials. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Đảm bảo chi tiêu hiệu quả. /\u003cem\u003eEnsure efficient expenditure of resources. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Giám sát hoàn thiện báo cáo tài chính /\u003cem\u003eOversee completion of financial reporting. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Đảm bảo các quy trình kiểm soát tài chính phù hợp được tuân thủ. /\u003cem\u003eEnsure that appropriate financial control processes are followed. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e5. Trách nhiệm quản lý và giải trình nguồn nhân lực /\u003cem\u003eHuman resource management and accountability \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Tuyển chọn nhân viên tại địa phương để thực hiện nghiên cứu. /\u003cem\u003eRecruit local staff to conduct the research. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Giám sát hiệu quả hoạt động của tất cả nhân viên. /\u003cem\u003eSupervise performance of all staff.  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Tạo điều kiện phát triển một cộng đồng nhân viên học hỏi và làm việc cùng nhau, không ngừng cải thiện chất lượng và phát triển chuyên môn cho nhân viên. /\u003cem\u003eFoster a community of learning and teamwork, continuous quality improvement and continuous professional development for staff. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T1198,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTrình độ học vấn/ Education: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eTốt nghiệp đại học hoặc cao hơn trong các lĩnh vực liên quan như Y tế, Dược, Khoa học Sức khỏe, Sinh học hoặc các ngành tương tự. Có chứng chỉ hoặc đào tạo nâng cao về quản lý thử nghiệm lâm sàng là một lợi thế. /\u003cem\u003eBachelor's degree or higher in a relevant field such as Medicine, Pharmacy, Health Sciences, Biology, or related disciplines. Certification or advanced training in clinical trial management is an advantage. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng và kinh nghiệm làm việc/ \u003cem\u003eSkills and Work Experience: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Kỹ năng lãnh đạo nhóm và lập kế hoạch chiến lược xuất sắc/ \u003cem\u003eExcellent team leadership skills and strategic planning. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Kỹ năng quản lý tổ chức xuất sắc với khả năng ưu tiên công việc/ \u003cem\u003eStrong organisational management skills with the ability to prioritise. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Kinh nghiệm làm việc trong môi trường đa văn hóa và ở các quốc gia đang phát triển (ưu tiên Việt Nam, nhưng không bắt buộc)/ \u003cem\u003eExperience working in a cross-cultural context and in developing country setting (preferably Vietnam, but this is not essential). \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Kinh nghiệm làm việc với các đối tác chính phủ và phi chính phủ/ \u003cem\u003eExperience in engaging with government and non-government partners. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Kỹ năng trong việc phát triển năng lực của tổ chức/ \u003cem\u003eSkills in institutional capacity-building. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Khả năng truyền cảm hứng cho các thành viên trong nhóm cùng với khả năng lắng nghe tốt/ \u003cem\u003eAbility to motivate team members with good listening skills. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Tập trung nhưng có cách tiếp cận linh hoạt/\u003cem\u003e Focused, but flexible approach. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Khả năng làm việc trong môi trường áp lực cao và trong thời gian hạn chế/ \u003cem\u003eAbility to work under high pressure and within limited time frames. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Có kiến thức/kinh nghiệm về tất cả các hướng dẫn/quy định có liên quan/ \u003cem\u003eKnowledge/experience of all relevant guidance/regulations. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Có độ chính xác cao/\u003cem\u003e Ability to pay close attention to detail. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Kinh nghiệm đã được chứng minh trong đàm phán, giải quyết xung đột/ \u003cem\u003eProven experience in negotiation and managing conflict. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Thông thạo Tiếng Anh và kỹ năng giao tiếp tốt/ \u003cem\u003eFluency in English and excellent communication skills. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Khả năng giao tiếp thành thạo bằng tiếng Việt/ \u003cem\u003eAbility to communicate fluently in Vietnamese. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCác mối quan hệ chủ chốt/ \u003cem\u003eKey Relationships: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Báo cáo trực tiếp: Giám đốc Đơn vị Thử nghiệm lâm sàng /\u003cem\u003eDirect report: Director of Clinical Trials Unit \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Quản lý thứ cấp: Nghiên cứu viên chính/ \u003cem\u003eDotted line reporting: Principal Investigator\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm giám sát đối với các nhân viên chủ chốt của dự án:/\u003cem\u003eKey staff working with the project:\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e+ Chuyên viên thử nghiệm lâm sàng/ \u003cem\u003eTrial Officers \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e+ Quản lý dữ liệu/ \u003cem\u003eData Manager \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e+ Chuyên gia xét nghiệm/ \u003cem\u003eLab Specialist\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e+ Cán bộ y tế cơ sở/ \u003cem\u003eLocal Healthcare Workers \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCấp độ công việc:\u003c/strong\u003e Quản lý – Bậc 6 /\u003cstrong\u003e\u003cem\u003eJob Level: \u003c/em\u003e\u003c/strong\u003e\u003cem\u003eManager – level 6\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐịa điểm: \u003c/strong\u003eHà Nội, yêu cầu thường xuyên di chuyển đến các tỉnh thành khác /\u003cstrong\u003e\u003cem\u003eLocation\u003c/em\u003e\u003c/strong\u003e\u003cem\u003e: Based in Hanoi, with regular travel to other provinces \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời hạn hợp đồng:\u003c/strong\u003e 1 năm, có thể được gia hạn tùy thuộc vào hiệu quả hoạt động và khả năng kinh phí/ \u003cstrong\u003e\u003cem\u003eContract duration\u003c/em\u003e\u003c/strong\u003e\u003cem\u003e: 1 year appointment with possibility of extension based on performance and funding availability \u003c/em\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"26:T5fe,SVI là một trung tâm nghiên cứu và hợp tác đa lĩnh vực, được thành lập dưới hình thức doanh nghiệp xã hội theo quy định của luật pháp Việt Nam. Công ty được thiết kế để tạo điều kiện thuận lợi và củng cố sự trao đổi tư duy và sáng tạo giữa các nhà nghiên cứu, học giá, và cộng đồng nói chung của Úc và Việt Nam. \r\n\r\nSVI is a multidisciplinary research and engagement hub established as a social enterprise under the laws of Vietnam. It is designed to facilitate and strengthen intellectual and creative exchange between Australian and Vietnamese researchers, academics and the broader community.  \r\n\r\nXây dựng trên nền tảng giáo dục và nghiên cứu hàng đầu thế giới của Đại học Sydney trong nhiều lĩnh vực và các sự hợp tác về học thuật quan trọng và lâu đời với Việt Nam trong suốt 50 năm qua. SVI sẽ thực hiện tầm nhìn của Đại học Sydney về sự hợp tác bền vững, cùng có lợi trong tất cả các mức độ của giáo dục đại học và hợp tác nghiên cứu.   \r\n\r\nBuilding on the University of Sydney’s world-class education and research across a broad range of disciplines and its significant and long-standing academic partnerships in Vietnam over the last 50 years, SVI will realise the University’s vision for sustainable, mutually beneficial cooperation across all levels of higher education and research engagement.29:T5fe,SVI là một trung tâm nghiên cứu và hợp tác đa lĩnh vực, được thành lập dưới hình thức doanh nghiệp xã hội theo quy định của luật pháp Việt Nam. Công ty được thiết kế để tạo điều kiện thuận lợi và củng cố sự trao đổi tư duy và sáng tạo giữa các nhà nghiên cứu, học giá, và cộng đồng nói chung của Úc và Việt Nam. \r\n\r\nSVI is a multidisciplinary research and engagement hub established as a social"])</script><script>self.__next_f.push([1," enterprise under the laws of Vietnam. It is designed to facilitate and strengthen intellectual and creative exchange between Australian and Vietnamese researchers, academics and the broader community.  \r\n\r\nXây dựng trên nền tảng giáo dục và nghiên cứu hàng đầu thế giới của Đại học Sydney trong nhiều lĩnh vực và các sự hợp tác về học thuật quan trọng và lâu đời với Việt Nam trong suốt 50 năm qua. SVI sẽ thực hiện tầm nhìn của Đại học Sydney về sự hợp tác bền vững, cùng có lợi trong tất cả các mức độ của giáo dục đại học và hợp tác nghiên cứu.   \r\n\r\nBuilding on the University of Sydney’s world-class education and research across a broad range of disciplines and its significant and long-standing academic partnerships in Vietnam over the last 50 years, SVI will realise the University’s vision for sustainable, mutually beneficial cooperation across all levels of higher education and research engagement.2a:T2486,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eGiới thiệu về Viện Đại học Sydney Việt Nam/\u003cem\u003eAbout the University of Sydney Vietnam Institute (SVI):\u003c/em\u003e\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eSVI là một trung tâm nghiên cứu và hợp tác đa lĩnh vực, được thành lập dưới hình thức doanh nghiệp xã hội theo quy định của luật pháp Việt Nam. Công ty được thiết kế để tạo điều kiện thuận lợi và củng cố sự trao đổi tư duy và sáng tạo giữa các nhà nghiên cứu, học giá, và cộng đồng nói chung của Úc và Việt Nam. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eSVI is a multidisciplinary research and engagement hub established as a social enterprise under the laws of Vietnam. It is designed to facilitate and strengthen intellectual and creative exchange between Australian and Vietnamese researchers, academics and the broader community.  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eXây dựng trên nền tảng giáo dục và nghiên cứu hàng đầu thế giới của Đại học Sydney trong nhiều lĩnh vực và các sự hợp tác về học thuật quan trọng và lâu đời với Việt Nam trong suốt 50 năm qua. SVI sẽ thực hiện tầm nhìn của Đại học Sydney về sự hợp tác bền vững, cùng có lợi trong tất cả các mức độ của giáo dục đại học và hợp tác nghiên cứu.   \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBuilding on the University of Sydney’s world-class education and research across a broad range of disciplines and its significant and long-standing academic partnerships in Vietnam over the last 50 years, SVI will realise the University’s vision for sustainable, mutually beneficial cooperation across all levels of higher education and research engagement.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMô tả vị trí/ \u003cem\u003eJob Description: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eTrong vai trò Quản lý thử nghiệm lâm sàng, cá nhân chịu trách nhiệm cho việc điều phối toàn bộ quá trình triển khai của thử nghiệm lâm sàng. Người ở vị trí này sẽ có vai trò dẫn dắt các hoạt động lên kế hoạch, thực hiện, giám sát và đóng nghiên cứu, cũng như quản lý chung việc đảm bảo chất lượng và an toàn theo như các tiêu chuẩn Thực hành lâm sàng tốt (GCP) quốc tế. Quản lý thử nghiệm cũng chịu trách nhiệm cho việc xây dựng một đội ngũ nghiên cứu có năng lực và đầy nhiệt huyết. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eAs Trial Manager, the incumbent is responsible for coordinating the implementation of clinical trials. This role will take a lead role in planning, executing, monitoring and closing the trial, as well as overseeing quality assurance and safety in keeping with international standards of Good Clinical Practice (GCP). The Trial Manager is responsible for building a team of enthusiastic and capable research staff. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ và trách nhiệm/ \u003cem\u003eDuties and Responsibilities: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e1. Xây dựng và triển khai kế hoạch thực hiện nghiên cứu/\u003cem\u003eDeveloping and executing the clinical trial implementation plan\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Chuẩn bị đề cương nghiên cứu và các tài liệu của thử nghiệm cho việc đăng ký theo yêu cầu của nhà tài trợ và chính quyền. /\u003cem\u003ePrepare protocol and trial documents for registration according to requirements of sponsors and authorities. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng, rà soát đánh giá các hồ sơ liên quan đến thử nghiệm bao gồm Quy trình thực hành chuẩn, tài liệu và biểu mẫu nghiên cứu, và giấy tờ liên quan đến việc quảng bá thử nghiệm. /\u003cem\u003eDevelop, review and evaluate all trial-related materials including the Standard Operating Procedures, trial documentation and forms, and trial promotion materials. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Thu thập và duy trì cơ sở vật chất, thiết bị và giấy phép đăng ký cần thiết cho việc triển khai thử nghiệm (bao gồm cả việc mua/nhập khẩu thuốc) /\u003cem\u003eObtaining and maintaining facilities, equipment and licences as required for implementing the trial (including drug procurement/import) \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng và triển khai các hoạt động thí điểm để kiểm tra các quy trình quan trọng của thử nghiệm. /\u003cem\u003eDevelop and implement pilot activities to test key components of the trial. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Tập huấn các nhóm nghiên cứu thực địa và nhân viên y tế tại cơ sở để triển khai các quy trình nghiên cứu. /\u003cem\u003eTraining field research teams and government health staff to implement the study procedures. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng và thường xuyên cập nhật khung tiến độ nghiên cứu. /\u003cem\u003eDevelop and update the trial progress tracker regularly. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e2. Đồng điều phối và giám sát thử nghiệm lâm sàng /\u003cem\u003eCo-ordination and monitoring of the clinical trial \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Giám sát việc tiến hành thử nghiệm, bao gồm việc tuyển chọn người tham gia và triển khai tất cả các quy trình nghiên cứu. /\u003cem\u003eMonitoring of the implementation of the trial including subject recruitment and implementation of all study procedures. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Phối hợp với các nghiên cứu viên trong việc điều phối để đảm bảo rằng tất cả các hoạt động nghiên cứu được thực hiện theo như đề cương đã được phê duyệt bởi hội đồng đạo đức và các quy định của cơ quan quản lý.  /\u003cem\u003eCoordinate with investigators to ensure that all research activities are carried out in accordance with the protocol approved by ethics committees and applicable regulations. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Đảm bảo việc thu thập dữ liệu và hoàn thiện các phiếu thu thập thông tin nghiên cứu liên quan đến thử nghiệm lâm sàng diễn ra chính xác và đúng tiến độ, cũng như duy trì các tài liệu thiết yếu của nghiên cứu theo tiêu chuẩn GCP. /\u003cem\u003eEnsure timely and accurate data collection and completion of case report forms relevant to clinical trials or research projects, and maintain the trial essential documents according to GCP standards. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Quản lý các buổi giám sát và giải quyết các truy vấn. /\u003cem\u003eManaging monitoring visits and dealing with queries.\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Soạn thảo, rà soát các báo cáo liên quan đến nghiên cứu cho Nhà tài trợ, Hội đồng Đạo đức và/hoặc Cơ quan quản lý theo yêu cầu. /\u003cem\u003eDevelop, review research-related reports to Sponsors, Ethics Committees, and/or regulatory authorities as required.\u003c/em\u003e \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e3. Giao tiếp và các mối quan hệ/\u003cem\u003eCommunication and relationships\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng và củng cố các mối quan hệ với các đối tác chính quyền. /\u003cem\u003eDevelop and strengthen key relationships with government partners. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Chuẩn bị tài liệu và đóng vai trò là cầu nối liên lạc giữa các nghiên cứu viên và nhà tài trợ về những việc liên quan đến quy trình và yêu cầu nghiên cứu. \u003cem\u003e/Prepare documentation and serve as the key liaison between investigators and sponsors regarding study procedures and requirements. \u003c/em\u003e\u003c/p\u00
