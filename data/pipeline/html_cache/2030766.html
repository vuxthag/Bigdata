k”) is a subsidiary of Shinhan Bank Korea, an affiliate of Shinhan Financial Group (SFG).\r\nShinhan Bank Korea operates in 20 countries with 168 global network. Particularly in Southeast Asia, Shinhan Bank Korea is located in the following markets: Vietnam, Indonesia, Singapore, Philippines, Myanmar, Cambodia.\r\nIn Vietnam, Shinhan Bank’s history can be traced back to 1993 when the bank first opened the representative office in Ho Chi Minh City. Over the history of nearly 30 years, Shinhan Bank Vietnam has built a broad network up to 46 branches/ transactions office from the North, the Central and the South of Vietnam. Currently, Shinhan Bank Vi"])</script><script>self.__next_f.push([1,"etnam has been offering a diversified portfolio of tailored corporate and individual banking products and solutions\r\n\r\nIf you desire to build an extraordinary career with Shinhan Bank Viet Nam and believe that you can make a difference, we invite you to submit your application for the following post:24:T1186,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e***Job Description:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Manage sales activities targeting corporate customers in order to fulfill business objectives of yourself and your team, to increase transactions and profit for the banks.\u003c/p\u003e\u003cp\u003e• Explore, build up and maintain trust relationship with target customers as financial counseling.\u003c/p\u003e\u003cp\u003e• Maintain relationship with assigned existing customers and upsell bank products/services.\u003c/p\u003e\u003cp\u003e• Set up sales plan to originate new deal and implement the plan effectively.\u003c/p\u003e\u003cp\u003e• Identify customer needs, provide information on bank products and services and make financial solution package proposal to capitalize on the business opportunities.\u003c/p\u003e\u003cp\u003e• Communicate with clients via phone, direct meeting, site visit either to request or to provide information
