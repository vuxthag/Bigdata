.push([1,"\u003cp\u003eHARTING Technology Group is a German industrial technology corporation, founded in 1945, and today stands as one of the world’s leading providers of industrial connectivity solutions. With more than 6,200 employees working across 43 sales companies, 14 production facilities, and 6 R\u0026D sites worldwide, HARTING delivers advanced technologies that enable the reliable transmission of data, signals, and power across diverse industrial sectors.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eIn Vietnam, we have a production facility located in Hai Phong (former Hai Duong) and a R\u0026D Center in Hanoi\u003c/p\u003e\u003cp\u003e-----------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMÔ TẢ CHUNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiêm thiết kế, phát triển và cải tiến các sản phẩm connector (đầu nối) điện, điện tử cho các ứng dụng trong thiết bị điện tử, công nghiệp hoặc viễn thông. Vị trí này yêu cầu kiến thức kỹ thuật vững chắc về cơ khí chính xác, vật liệu, mạch điện và các tiêu chuẩn kỹ thuật liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phát triển ý tưởng, thiết kế 3D/2D các loại connector (công nghiệp, board-to-board, circular, modular…) bằng phần mềm CAD (NX).\u003c/p\u003e\u003cp\u003e• Lựa chọn vật liệu, cấu trúc, kiểu tiếp xúc, lớp mạ và các chi tiết kỹ thuật phù hợp với yêu cầu ứng dụng.\u003c/p\u003e\u003cp\u003e• Thực hiện phân tích cơ học, nhiệt và điện để đảm bảo độ bền và hiệu suất của thiết kế.\u003c/p\u003e\u003cp\u003e• Phối hợp với các bộ phận liên quan (Sản xuất, chất lượng, mua hàng,...) để đảm bảo sản phẩm được thiết kế phù hợp với yêu cầu.\u003c/p\u003e\u003cp\u003e• Thử nghiệm nguyên mẫu, đánh giá kết quả test (mechanical, electrical, environmental…) và phân tích lỗi thiết kế (nếu có).\u003c/p\u003e\u003cp\u003e• Soạn thảo và cập nhật tài liệu kỹ thuật,
