tends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tc9e,"])</script><script>self.__next_f.push([1,"Ngân hàng Thương mại TNHH MTV Ngoại thương Công nghệ số - VCBNeo (tên gọi cũ Ngân hàng Xây dựng - CB) được chấp thuận thay đổi tên gọi theo Quyết định số 30/QĐ-TTGSNH1 ngày 17/01/2025 của Cơ quan thanh tra, giám sát ngân hàng – Ngân hàng Nhà nước Việt Nam.\r\nTên đầy đủ bằng tiếng Việt: Ngân hàng Thương mại trách nhiệm hữu hạn một thành viên Ngoại thương Công nghệ số.\r\nTên đầy đủ bằng tiếng Anh: Vietcombank Neo Limited.\r\nTên viết tắt: VCBNeo. Xem chi tiết\r\n\r\nNgày 17/10/2024, Ngân hàng Nhà nước (NHNN) đã công bố quyết định chuyển giao bắt buộc Ngân hàng Xây dựng do Nhà nước là chủ sở hữu 100% vốn cho Ngân hàng TMCP Ngoại thương Việt Nam (Vietcombank) theo Phương án được Chính phủ phê duyệt.\r\nSau chuyển giao bắt buộc, ngân hàng tiếp tục hoạt động dưới hình thức ngân hàng trách nhiệm hữu hạn một thành viên do Vietcombank sở hữu 100% vốn điều lệ; được thực hiện đầy đủ các hoạt động kinh doanh của ngân hàng thương mại theo quy định.\r\n\r\nTổng số nhân sự của VCBNeo là hơn 1.000 cán bộ nhân viên. Đa số cán bộ nhân viên có trình độ đại học và trên đại học, thường xuyên được đào tạo chuyên môn nghiệp vụ tại các trường Đại học, Viện nghiên cứu trong và ngoài nước.\r\n\r\nDưới sự quản lý của Vietcombank, VCBNeo hướng đến mục tiêu hoạt động hiệu quả theo quy định của pháp luật và các chuẩn mực ngân hàng quốc tế. Đặc biệt, VCBNeo sẽ đề cao tính hiệu quả trên cơ sở kế thừa, phát huy những tinh hoa văn hóa doanh nghiệp, nền tảng công nghệ hiện đại đã được Vietcombank áp dụng thành công.\r\n\r\nMục tiêu – tầm nhìn: Thực hiện thành công, về đích sớm phương án chuyển giao bắt buộc. VCBNeo trở thành ngân hàng công nghệ số thuộc một mảnh ghép trong hệ sinh thái Vietcombank và có đóng góp quan trọng trong thực hiện mục tiêu, nhiệm vụ tài chính toàn diện.\r\n\r\nVề phân khúc khách hàng: Tập trung vào phân khúc Upper Mass; Mass; SME siêu nhỏ - nhỏ.\r\n\r\nSản phẩm: Tập trung vào sản phẩm bán lẻ, sản phẩm về tín dụng bán lẻ, sản phẩm về thanh toán, sản phẩm về dịch vụ đối với khách hàng cá nhân.\r\n\r\nVề thương hiệu và mạng lưới: Tập trung phát triển trên kênh số, tối ưu hóa hệ thống mạng lưới hiện có.\r\n\r\nVề cơ sở hạ tầng công nghệ thông tin: Dựa trên nền tảng công nghệ thông tin cơ bản của Vietcombank, đồng thời từng bước củng cố và phát triển năng lực công nghệ riêng.\r\n\r\nVề quản lý rủi ro và tuân thủ: Tiếp cận tiêu chuẩn quản trị rủi ro của Vietcombank.\r\n\r\nVề nguồn lực: Hướng theo tiêu chuẩn của Vietcombank, phấn đấu trở thành ngân hàng hàng đầu tại Việt Nam về chất lượng nguồn nhân lực."])</script><script>self.__next_f.push([1,"24:T1678,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Thực hiện kế hoạch kinh doanh tại CN/PGD trong phạm vi quản lý được LĐ Phòng phân công và hạn mức do TSC, BGĐ CN quy định cho CN/PGD từng thời kỳ, bao gồm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tChủ động tư vấn, chào bán mọi sản phẩm dịch vụ NHBL phù hợp trong phạm vi sản phẩm/quy trình chuẩn… do Khối NHBL quy định và phối hợp với bộ phận KHDN tìm kiếm, phát triển và chào bán các sản phẩm dịch vụ NHBL cho nhân viên của KHBB; phối hợp với các phòng/bộ phận liên quan tại ĐVKD xử lý yêu cầu của Khách hàng.\u003c/p\u003e\u003cp\u003e-\tHướng dẫn, giới thiệu, tư vấn, thuyết phục khách hàng sử dụng các sản phẩm, dịch vụ của Ngân hàng, tư vấn bán chéo các sản phẩm, dịch vụ của Ngân hàng.\u003c/p\u003e\u003cp\u003e-\tThiết lập, phát triển quan hệ khách hàng cá nhân/ doanh nghiệp: Tìm kiếm, thu thập, tổng hợp và quản lý thông tin khách hàng nhằm đánh giá tiềm năng khách hàng và cung cấp thông tin về khách hàng cho các bộ phận khác khi có yêu cầu nhằm phục vụ cho hoạt động của chi nhánh và của toàn Ngân hàng.\u003c/p\u003e\u003cp\u003e-\tPhân luồng giao dịch, tận tình hướng dẫn Khách hàng điền mẫu biểu giao dịch phù hợp và hoặc tới bộ phận phù hợp để hoàn thiện giao dịch.\u003c/p\u003e\u003cp\u003e-\tThực hiện quản lý quan hệ khách hàng và chăm sóc Khách hàng theo quy định.\u003c/p\u003e\u003cp\u003e-\tThực hiện bán các sản phẩm cấp tín dụng theo quy định của sản phẩm chuẩn và quy trình, quy định có liên quan; phối hợp với KT\u0026HTTD để thực hiện các nhiệm vụ liên quan đến quản lý khoản cấp tín dụng, phân loại nợ, trích lập và sử dụng dự phòng xử lý rủi ro tín dụng, báo cáo các loại và thực hiện bàn giao/nhận bàn giao đầy đủ hồ sơ cấp tín dụng theo quy định.\u003c/p\u003e\u003cp\u003e-\tQuản lý quan hệ, thông tin NHBL đối với ĐVKD, phối hợp với các phòng/bộ phận liên quan giải quyết các yêu cầu, vướng mắc về NHBL tại ĐVKD và tổng hợp, phản hồi tới Khối NHBL; tiếp nhận ý kiến, khiếu nại của Khách hàng, trả lời hoặc chuyển cấp có thẩm quyền giải quyết.\u003c/p\u003e\u003cp\u003e\u003cem\u003e-\tThực hiện công tác công nợ theo phân công của Khối NHBL/Công nợ (Nhắc nhở khách hàng trả vốn, lãi đúng kỳ hạn, thanh toán nợ đến hạn; đôn đốc khách hàng trả nợ, thu hồi nợ xấu).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e-\tThẩm định và đề xuất cấp tín dụng đối với KHBL.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thực hiện các công việc xử lý tác nghiệp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐánh giá điều kiện cấp tín dụng trên LOS đối với khách hàng vay.\u003c/p\u003e\u003cp\u003e-\tThực hiện công tác: lập tờ trình tín dụng, quản lý khách hàng sau giải ngân, Phối hợp định giá tài sản đảm bảo…trình cấp có thẩm quyền phê duyệt khoản vay. Kiểm tra, theo dõi việc sử dụng vốn vay của khách hàng để trình và đề xuất cấp trên các biện pháp kịp thời.\u003c/p\u003e\u003cp\u003e-\tThực hiện công việc tác nghiệp kiểm tra sau vay theo quy định trên hệ thống LOSCR.\u003c/p\u003e\u003cp\u003e-\tThực hiện các công việc trình ban lãnh đạo hỗ trợ điều chỉnh thông tin cấp tín dụng và tác nghiệp trên hệ thống ECM, Eoffice.\u003c/p\u003e\u003cp\u003e-\tTra cứu thông tin khách hàng, tạo báo cáo dư nợ, bảng kê tính lãi, Nợ đến hạn …. Trên hệ thống mfscore, rptcore. \u003c/p\u003e\u003cp\u003e-\tThu thập tiếp nhận, xử lý và phản hồi thông tin về các ý kiến đóng góp, khiếu nại, thắc mắc của Khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e(*) Thực hiện chức năng của Khách hàng doanh nghiệp\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Thực hiện các công việc được phân công đối với Khách hàng doanh nghiệp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThực hiện các chỉ tiêu kế hoạch kinh doanh NHBB, kế hoạch kinh doanh với từng KHBB được giao.\u003c/p\u003e\u003cp\u003e-\tTriển khai các chủ trương, chính sách/sản phẩm, chương trình thi đua, khuyến mại, thúc đẩy bán hàng do Khối NHBB yêu cầu.\u003c/p\u003e\u003cp\u003e-\tChủ động tư vấn, chào bán mọi sản phẩm dịch vụ NHBB phù hợp trong phạm vi sản phẩm/quy trình chuẩn… do VCBNeo quy định.\u003c/p\u003e\u003cp\u003e-\tQuản lý quan hệ khách hàng và chăm sóc khách hàng: Đầu mối thực hiện quản lý quan hệ khách hàng, quản lý rủi ro và quản lý danh mục khách hàng KHDN tại CN; Đầu mối tổ chức triển khai các chương trình, chính sách chăm sóc, phát triển quan hệ với KHDN tại CN.\u003c/p\u003e\u003cp\u003e-\tQuản lý/xử lý các khoản cấp tín dụng theo quy trình, quy định; phối hợp với HTTD để thực hiện các nhiệm vụ liên quan đến quản lý khoản cấp tín dụng, phân loại nợ, trích lập và sử dụng dự phòng xử lý rủi ro tín dụng, báo cáo các loại và thực hiện bàn giao/nhận bàn giao đầy đủ hồ sơ cấp tín dụng theo quy định.\u003c/p\u003e\u003cp\u003e-\tThực hiện công tác công nợ theo phân công của Khối NHBB/Công nợ.\u003c/p\u003e\u003cp\u003e-\tThực hiện thủ tục đăng ký biện pháp bảo đảm (KHBL và KHDN)\u003c/p\u003e\u003cp\u003e-\tThẩm định và đề xuất cấp tín dụng đối với KHBB.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Tham gia tập huấn các khóa đào tạo về các nội dung liên quan.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Thực hiện các nhiệm vụ có liên quan khác do Lãnh đạo phòng/ Ban GĐCN giao.\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T9b8,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- \u003c/strong\u003eTrình độ chuyên môn: tốt nghiệp Đại học trở lên\u003c/p\u003e\u003cp\u003e- Chuyên ngành: Kinh tế, tài chính, ngân hàng, kế toán, quản trị kinh doanh, luật ….\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Ưu tiên 1 năm kinh nghiệm làm việc trong lĩnh vực tài chính - ngân hàng, đặc biệt trong công tác khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Am hiểu ở mức thông dụng về các sản phẩm dịch vụ NH, quy trình nghiệp vụ ngân hàng.\u003c/p\u003e\u003cp\u003e- Am hiểu ở mức thông dụng về đánh giá tình hình tài chính doanh nghiệp, phân tích các chỉ số tài chính (chỉ số TC, dòng tiền, dự báo tài chính...)\u003c/p\u003e\u003cp\u003e- Am hiểu sâu về các sản phẩm và dịch vụ ngân hàng / phân tích tài chính / quy trình, chính sách, hoạt động\u003c/p\u003e\u003cp\u003e- Có kiến thức về định giá tài sản / thu hồi nợ xấu / kiến thức chuyên ngành về pháp luật liên quan / Kiến thức về quản lý rủi ro tín dụng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTiêu chí ưu tiên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Trình độ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trình độ Thạc sỹ trở lên chuyên ngành kinh tế, tài chính, ngân hàng hoặc chuyên ngành có liên quan.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm làm việc trong lĩnh vực tài chính, ngân hàng, bảo hiểm hoặc lĩnh vực chuyên môn dự kiến đảm nhiệm tại Ngân hàng/Tổ chức quốc tế.\u003c/p\u003e\u003cp\u003e- Có kiến thức sâu rộng về phân tích tài chính, định giá tài sản, quản lý rủi ro tín dụng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kỹ năng giao tiếp và truyền thông\u003c/p\u003e\u003cp\u003e- Kỹ năng sáng tạo và liên tục cải tiến\u003c/p\u003e\u003cp\u003e- Kỹ năng bán hàng/phục vụ và làm hài lòng KH\u003c/p\u003e\u003cp\u003e- Kỹ năng làm việc theo nhóm /tổ chức\u003c/p\u003e\u003cp\u003e- Kỹ năng đàm phán\u003c/p\u003e\u003cp\u003e- Xây dựng các mối quan hệ ở phạm vi rộng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Khả năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phân tích/phán đoán\u003c/p\u003e\u003cp\u003e- Tư duy logic\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Phẩm chất cá nhân\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tinh thần trách nhiệm\tcao\u003c/p\u003e\u003cp\u003e- Chủ động trong công việc, tuân thủ kỷ luật\u003c/p\u003e\u003cp\u003e- Năng động, sáng tạo, chịu áp lực công việc \u003c/p\u003e\u003cp\u003e- Có ý chí quyết tâm hoàn thành mục tiêu công việc được giao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Tc9e,"])</script><script>self.__next_f.push([1,"Ngân hàng Thương mại TNHH MTV Ngoại thương Công nghệ số - VCBNeo (tên gọi cũ Ngân hàng Xây dựng - CB) được chấp thuận thay đổi tên gọi theo Quyết định số 30/QĐ-TTGSNH1 ngày 17/01/2025 của Cơ quan thanh tra, giám sát ngân hàng – Ngân hàng Nhà nước Việt Nam.\r\nTên đầy đủ bằng tiếng Việt: Ngân hàng Thương mại trách nhiệm hữu hạn một thành viên Ngoại thương Công nghệ số.\r\nTên đầy đủ bằng tiếng Anh: Vietcombank Neo Limited.\r\nTên viết tắt: VCBNeo. Xem chi tiết\r\n\r\nNgày 17/10/2024, Ngân hàng Nhà nước (NHNN) đã công bố quyết định chuyển giao bắt buộc Ngân hàng Xây dựng do Nhà nước là chủ sở hữu 100% vốn cho Ngân hàng TMCP Ngoại thương Việt Nam (Vietcombank) theo Phương án được Chính phủ phê duyệt.\r\nSau chuyển giao bắt buộc, ngân hàng tiếp tục hoạt động dưới hình thức ngân hàng trách nhiệm hữu hạn một thành viên do Vietcombank sở hữu 100% vốn điều lệ; được thực hiện đầy đủ các hoạt động kinh doanh của ngân hàng thương mại theo quy định.\r\n\r\nTổng số nhân sự của VCBNeo là hơn 1.000 cán bộ nhân viên. Đa số cán bộ nhân viên có trình độ đại học và trên đại học, thường xuyên được đào tạo chuyên môn nghiệp vụ tại các trường Đại học, Viện nghiên cứu trong và ngoài nước.\r\n\r\nDưới sự quản lý của Vietcombank, VCBNeo hướng đến mục tiêu hoạt động hiệu quả theo quy định của pháp luật và các chuẩn mực ngân hàng quốc tế. Đặc biệt, VCBNeo sẽ đề cao tính hiệu quả trên cơ sở kế thừa, phát huy những tinh hoa văn hóa doanh nghiệp, nền tảng công nghệ hiện đại đã được Vietcombank áp dụng thành công.\r\n\r\nMục tiêu – tầm nhìn: Thực hiện thành công, về đích sớm phương án chuyển giao bắt buộc. VCBNeo trở thành ngân hàng công nghệ số thuộc một mảnh ghép trong hệ sinh thái Vietcombank và có đóng góp quan trọng trong thực hiện mục tiêu, nhiệm vụ tài chính toàn diện.\r\n\r\nVề phân khúc khách hàng: Tập trung vào phân khúc Upper Mass; Mass; SME siêu nhỏ - nhỏ.\r\n\r\nSản phẩm: Tập trung vào sản phẩm bán lẻ, sản phẩm về tín dụng bán lẻ, sản phẩm về thanh toán, sản phẩm về dịch vụ đối với khách hàng cá nhân.\r\n\r\nVề thương hiệu và mạng lưới: Tập trung phát triển trên kênh số, tối ưu hóa hệ thống mạng lưới hiện có.\r\n\r\nVề cơ sở hạ tầng công nghệ thông tin: Dựa trên nền tảng công nghệ thông tin cơ bản của Vietcombank, đồng thời từng bước củng cố và phát triển năng lực công nghệ riêng.\r\n\r\nVề quản lý rủi ro và tuân thủ: Tiếp cận tiêu chuẩn quản trị rủi ro của Vietcombank.\r\n\r\nVề nguồn lực: Hướng theo tiêu chuẩn của Vietcombank, phấn đấu trở thành ngân hàng hàng đầu tại Việt Nam về chất lượng nguồn nhân lực."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:Tc9e,"])</script><script>self.__next_f.push([1,"Ngân hàng Thương mại TNHH MTV Ngoại thương Công nghệ số - VCBNeo (tên gọi cũ Ngân hàng Xây dựng - CB) được chấp thuận thay đổi tên gọi theo Quyết định số 30/QĐ-TTGSNH1 ngày 17/01/2025 của Cơ quan thanh tra, giám sát ngân hàng – Ngân hàng Nhà nước Việt Nam.\r\nTên đầy đủ bằng tiếng Việt: Ngân hàng Thương mại trách nhiệm hữu hạn một thành viên Ngoại thương Công nghệ số.\r\nTên đầy đủ bằng tiếng Anh: Vietcombank Neo Limited.\r\nTên viết tắt: VCBNeo. Xem chi tiết\r\n\r\nNgày 17/10/2024, Ngân hàng Nhà nước (NHNN) đã công bố quyết định chuyển giao bắt buộc Ngân hàng Xây dựng do Nhà nước là chủ sở hữu 100% vốn cho Ngân hàng TMCP Ngoại thương Việt Nam (Vietcombank) theo Phương án được Chính phủ phê duyệt.\r\nSau chuyển giao bắt buộc, ngân hàng tiếp tục hoạt động dưới hình thức ngân hàng trách nhiệm hữu hạn một thành viên do Vietcombank sở hữu 100% vốn điều lệ; được thực hiện đầy đủ các hoạt động kinh doanh của ngân hàng thương mại theo quy định.\r\n\r\nTổng số nhân sự của VCBNeo là hơn 1.000 cán bộ nhân viên. Đa số cán bộ nhân viên có trình độ đại học và trên đại học, thường xuyên được đào tạo chuyên môn nghiệp vụ tại các trường Đại học, Viện nghiên cứu trong và ngoài nước.\r\n\r\nDưới sự quản lý của Vietcombank, VCBNeo hướng đến mục tiêu hoạt động hiệu ử dụng các sản phẩm, dịch vụ của Ngân hàng, tư vấn bán chéo các sản phẩm, dịch vụ của Ngân hàng.\u003c/p\u003e\u003cp\u003e-\tThiết lập, phát triển quan hệ khách hàng cá nhân/ doanh nghiệp: Tìm kiếm, thu thập, tổng hợp và quản lý thông tin khách hàng nhằm đánh giá tiềm năng khách hàng và cung cấp thông tin về khách hàng cho các bộ phận khác khi có yêu cầu nhằm phục vụ cho hoạt động của chi nhánh và của toàn Ngân hàng.\u003c/p\u003e\u003cp\u003e-\tPhân luồng giao dịch, tận tình hướng dẫn Khách hàng điền mẫu biểu giao dịch phù hợp và hoặc tới bộ phận phù hợp để hoàn thiện giao dịch.\u003c/p\u003e\u003cp\u003e-\tThực hiện quản lý quan hệ khách hàng và chăm sóc Khách hàng theo quy định.\u003c/p\u003e\u003cp\u003e-\tThực hiện bán các sản phẩm cấp tín dụng theo quy định của sản phẩm chuẩn và quy trình, quy định có liên quan; phối hợp với KT\u0026HTTD để thực hiện các nhiệm vụ liên quan đến quản lý khoản cấp tín dụng, phân loại nợ, trích lập và sử dụng dự phòng xử lý rủi ro tín dụng, báo cáo các loại và thực hiện bàn giao/nhận bàn giao đầy đủ hồ sơ cấp tín dụng theo quy định.\u003c/p\u003e\u003cp\u003e-\tQuản lý quan hệ, thông tin NHBL đối với ĐVKD, phối hợp với các phòng/bộ phận liên quan giải quyết các yêu cầu, vướng mắc về NHBL tại ĐVKD và tổng hợp, phản hồi tới Khối NHBL; tiếp nhận ý kiến, khiếu nại của Khách hàng, trả lời hoặc chuyển cấp có thẩm quyền giải quyết.\u003c/p\u003e\u003cp\u003e\u003cem\u003e-\tThực hiện công tác công nợ theo phân công của Khối NHBL/Công nợ (Nhắc nhở khách hàng trả vốn, lãi đúng kỳ hạn, thanh toán nợ đến hạn; đôn đốc khách hàng trả nợ, thu hồi nợ xấu).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e-\tThẩm định và đề xuất cấp tín dụng đối với KHBL.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thực hiện các công việc xử lý tác nghiệp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐánh giá điều kiện cấp tín dụng trên LOS đối với khách hàng vay.\u003c/p\u003e\u003cp\u003e-\tThực hiện công tác: lập tờ trình tín dụng, quản lý khách hàng sau giải ngân, Phối hợp định giá tài sản đảm bảo…trình cấp có thẩm quyền phê duyệt khoản vay. Kiểm tra, theo dõi việc sử dụng vốn vay của khách hàng để trình và đề xuất cấp trên các biện pháp kịp thời.\u003c/p\u003e\u003cp\u003e-\tThực hiện công việc tác nghiệp kiểm tra sau vay theo quy định trên hệ thống LOSCR.\u003c/p\u003e\u003cp\u003e-\tThực hiện các công việc trình ban lãnh đạo hỗ trợ điều chỉnh thông tin cấp tín dụng và tác nghiệp trên hệ thống ECM, Eoffice.\u003c/p\u003e\u003cp\u003e-\tTra cứu thông tin khách hàng, tạo báo cáo dư nợ, bảng kê tính lãi, Nợ đến hạn …. Trên hệ thống mfscore, rptcore. \u003c/p\u003e\u003cp\u003e-\tThu thập tiếp nhận, xử lý và phản hồi thông tin về các ý kiến đóng góp, khiếu nại, thắc mắc của Khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e(*) Thực hiện chức năng của Khách hàng doanh nghiệp\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Thực hiện các công việc được phân công đối với Khách hàng doanh nghiệp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThực hiện các chỉ tiêu kế hoạch kinh doanh NHBB, kế hoạch kinh doanh với từng KHBB được giao.\u003c/p\u003e\u003cp\u003e-\tTriển khai các chủ trương, chính sách/sản phẩm, chương trình thi đua, khuyến mại, thúc đẩy bán hàng do Khối NHBB yêu cầu.\u003c/p\u003e\u003cp\u003e-\tChủ động tư vấn, chào bán mọi sản phẩm dịch vụ NHBB phù hợp trong phạm vi sản phẩm/quy trình chuẩn… do VCBNeo quy định.\u003c/p\u003e\u003cp\u003e-\tQuản lý quan hệ khách hàng và chăm sóc khách hàng: Đầu mối thực hiện quản lý quan hệ khách hàng, quản lý rủi ro và quản lý danh mục khách hàng KHDN tại CN; Đầu mối tổ chức triển khai các chương trình, chính sách chăm sóc, phát triển quan hệ với KHDN tại CN.\u003c/p\u003e\u003cp\u003e-\tQuản lý/xử lý các khoản cấp tín dụng theo quy trình, quy định; phối hợp với HTTD để thực hiện các nhiệm vụ liên quan đến quản lý khoản cấp tín dụng, phân loại nợ, trích lập và sử dụng dự phòng xử lý rủi ro tín dụng, báo cáo các loại và thực hiện bàn giao/nhận bàn giao đầy đủ hồ sơ cấp tín dụng theo quy định.\u003c/p\u003e\u003cp\u003e-\tThực hiện công tác công nợ theo phân công của Khối NHBB/Công nợ.\u003c/p\u003e\u003cp\u003e-\tThực hiện thủ tục đăng ký biện pháp bảo đảm (KHBL và KHDN)\u003c/p\u003e\u003cp\u003e-\tThẩm định và đề xuất cấp tín dụng đối với KHBB.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Tham gia tập huấn các khóa đào tạo về các nội dung liên quan.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Thực hiện các nhiệm vụ có liên quan khác do Lãnh đạo phòng/ Ban GĐCN giao.\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T9b8,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- \u003c/strong\u003eTrình độ chuyên môn: tốt nghiệp Đại học trở lên\u003c/p\u003e\u003cp\u003e- Chuyên ngành: Kinh tế, tài chính, ngân hàng, kế toán, quản trị kinh doanh, luật ….\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Ưu tiên 1 năm kinh nghiệm làm việc trong lĩnh vực tài chính - ngân hàng, đặc biệt trong công tác khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Am hiểu ở mức thông dụng về các sản phẩm dịch vụ NH, quy trình nghiệp vụ ngân hàng.\u003c/p\u003e\u003cp\u003e- Am hiểu ở mức thông dụng về đánh giá tình hình tài chính doanh nghiệp, phân tích các chỉ số tài chính (chỉ số TC, dòng tiền, dự báo tài chính...)\u003c/p\u003e\u003cp\u003e- Am hiểu sâu về các sản phẩm và dịch vụ ngân hàng / phân tích tài chính / quy trình, chính sách, hoạt động\u003c/p\u003e\u003cp\u003e- Có kiến thức về định giá tài sản / thu hồi nợ xấu / kiến thức chuyên ngành về pháp luật liên quan / Kiến thức về quản lý rủi ro tín dụng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTiêu chí ưu tiên\u003c/strong\u003e\u003c/p\u cial Services\",\"parentNameVI\":\"Ngân Hàng \u0026 Dịch Vụ Tài Chính\",\"children\":\"$42\"}\n44:[24,29,11]\n46:Tc9e,"])</script><script>self.__next_f.push([1,"Ngân hàng Thương mại TNHH MTV Ngoại thương Công nghệ số - VCBNeo (tên gọi cũ Ngân hàng Xây dựng - CB) được chấp thuận thay đổi tên gọi theo Quyết định số 30/QĐ-TTGSNH1 ngày 17/01/2025 của Cơ quan thanh tra, giám sát ngân hàng – Ngân hàng Nhà nước Việt Nam.\r\nTên đầy đủ bằng tiếng Việt: Ngân hàng Thương mại trách nhiệm hữu hạn một thành viên Ngoại thương Công nghệ số.\r\nTên đầy đủ bằng tiếng Anh: Vietcombank Neo Limited.\r\nTên viết tắt: VCBNeo. Xem chi tiết\r\n\r\nNgày 17/10/2024, Ngân hàng Nhà nước (NHNN) đã công bố quyết định chuyển giao bắt buộc Ngân hàng Xây dựng do Nhà nước là chủ sở hữu 100% vốn cho Ngân hàng TMCP Ngoại thương Việt Nam (Vietcombank) theo Phương án được Chính phủ phê duyệt.\r\nSau chuyển giao bắt buộc, ngân hàng tiếp tục hoạt động dưới hình thức ngân hàng trách nhiệm hữu hạn một thành viên do Vietcombank sở hữu 100% vốn điều lệ; được thực hiện đầy đủ các hoạt động kinh doanh của ngân hàng thương mại theo quy định.\r\n\r\nTổng số nhân sự của VCBNeo là hơn 1.000 cán bộ nhân viên. Đa số cán bộ nhân viên có trình độ đại học và trên đại học, thường xuyên được đào tạo chuyên môn nghiệp vụ tại các trường Đại học, Viện nghiên cứu trong và ngoài nước.\r\n\r\nDưới sự quản lý của Vietcombank, VCBNeo hướng đến mục tiêu hoạt động hiệu quả theo quy định của pháp luật và các chuẩn mực ngân hàng quốc tế. Đặc biệt, VCBNeo sẽ đề cao tính hiệu quả trên cơ sở kế thừa, phát huy những tinh hoa văn hóa doanh nghiệp, nền tảng công nghệ hiện đại đã được Vietcombank áp dụng thành công.\r\n\r\nMục tiêu – tầm nhìn: Thực hiện thành công, về đích sớm phương án chuyển giao bắt buộc. VCBNeo trở thành ngân hàng công nghệ số thuộc một mảnh ghép trong hệ sinh thái Vietcombank và có đóng góp quan trọng trong thực hiện mục tiêu, nhiệm vụ tài chính toàn diện.\r\n\r\nVề phân khúc khách hàng: Tập trung vào phân khúc Upper Mass; Mass; SME siêu nhỏ - nhỏ.\r\n\r\nSản phẩm: Tập trung vào sản phẩm bán lẻ, sản phẩm về tín dụng bán lẻ, sản phẩm về thanh toán, sản phẩm về dịch vụ đối với khách hàng cá nhân.\r\n\r\nVề thương hiệu và mạng lưới: Tập trung phát triển trên kênh số, tối ưu hóa hệ thống mạng lưới hiện có.\r\n\r\nVề cơ sở hạ tầng công nghệ thông tin: Dựa trên nền tảng công nghệ thông tin cơ bản của Vietcombank, đồng thời từng bước củng cố và phát triển năng lực công nghệ riêng.\r\n\r\nVề quản lý rủi ro và tuân thủ: Tiếp cận tiêu chuẩn quản trị rủi ro của Vietcombank.\r\n\r\nVề nguồn lực: Hướng theo tiêu chuẩn của Vietcombank, phấn đấu trở thành ngân hàng hàng đầu tại Việt Nam về chất lượng nguồn nhân lực."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"45:{\"companyId\":290023,\"jobImageURLs\":null,\"jobVideoURLs\":null,\"companyName\":\"Ngân hàng thương mại TNHH MTV Ngoại thương Công nghệ số (VCBNeo)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/d4/11443965.jpg\",\"companySizeId\":\"\",\"companyProfile\":\"$46\",\"contactName\":\"Ban QLNS\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"số 10 Thiền Quang, Hai Bà Trưng, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n48:{\"serviceCode\":\"TPM\",\"startOn\":\"2026-03-27T17:46:30+07:00\",\"expiredOn\":\"2026-04-26T23:59:59+07:00\"}\n49:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-03-27T17:46:30+07:00\",\"expiredOn\":\"2026-04-26T23:59:59+07:00\"}\n47:[\"$48\",\"$49\"]\n4a:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"28:{\"jobId\":2030810,\"jobTitle\":\"Chuyên Viên Quan Hệ Khách Hàng\",\"userId\":5307789,\
