 sourcing through the manufacturing lifecycle; communicate and resolve supplier-related quality issues in a timely manner.\u003c/p\u003e\u003cp\u003e•\tDevelop, prioritize, and execute supplier audit plans to ensure ongoing compliance with GMP and applicable quality standards.\u003c/p\u003e\u003cp\u003e•\tAssess supplier quality systems, processes, and performance; provide clear feedback and drive corrective and preventive actions.\u003c/p\u003e\u003cp\u003e•\tParticipate in and support the Material Review Board (MRB) process, including evaluation and disposition of nonconforming materials, coordination of cross-functional MRB activities, and ensuring timely containment, root cause analysis, and corrective actions with suppliers.\u003c/p\u003e\u003cp\u003e•\tDefine and implement:\u003c/p\u003e\u003cp\u003e\t  - Product acceptance and sampling strategies\u003c/p\u003e\u003cp\u003e      - Approved Supplier List (ASL) coordination\u003c/p\u003e\u003cp\u003e      - Supplier Owned Quality deployment\u003c/p\u003e\u003cp\u003e      - Control Plans for new products\u003c/p\u003e\u003cp\u003e•\tDefine Receiving Inspection requirements as needed and support validation of internal Medtronic test methods.\u003c/p\u003e\u003cp\u003e•\tDrive continuous improvement initiatives to enhance supplier quality, performance, and reliability.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T684,\u003cp\u003e\u003cstrong\u003eRequirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBachelor’s degree in Engineering (Mechanical, Electrical/Electronics, Mechatronics, Industrial, Materials, Chemical, Quality Engineering, or related disciplines).\u003c/p\u003e\u003cp\u003e•\tMinimum 4 years of relevant experience in Supplier Quality Engineering, Quality Engineering, Manufacturing Quality, or Vendor Quality within a manufacturing environment (medical device, electronics, precision mechanics, or mu
