ndation for every employee's career.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eTại ZME, chúng tôi tin rằng \"Uy tín là hàng đầu\" và \"Con người là tài sản lớn nhất\". \u003c/p\u003e\u003cp\u003e\u003cem\u003eAt ZME, we believe that \"Reputation is Priority\" and \"People are our greatest asset.\"\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBẠN SẼ LÀM GÌ? / YOUR RESPONSIBILITIES\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tChinh phục thị trường / Market Expansion:\u003c/strong\u003e Nghiên cứu, tìm kiếm và kết nối với các nhà cung cấp tiềm năng trong và ngoài nước. \u003cem\u003e(Research, identify, and connect with potential domestic and international suppliers.)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐại diện thương hiệu / Brand Representation:\u003c/strong\u003e Trực tiếp đàm phán, giao dịch xuất nhập khẩu các thiết bị vật tư cơ khí chuyên dụng. \u003cem\u003e(Directly negotiate and manage import-export transactions for specialized mechanical equipment.)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tXây dựng mạng lưới / Networking:\u003c/strong\u003e Thiết lập và duy trì mối quan hệ chiến lược với các doanh nghiệp, tổ chức quốc tế. \u003cem\u003e(Establish and maintain strategic relationships with international businesses and organizations.)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhát triển sản phẩm / Product Development:\u003c/strong\u003e Chủ động tìm kiếm nguồn hàng tối ưu theo nhu cầu đa dạng của dự án. \u003cem\u003e(Proactively source optimal products to meet diverse project requirements.)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T9e2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eCHÂN DUNG ỨNG VIÊN / REQUIREMENTS\u003c/strong\u003e\u003c/p\u
