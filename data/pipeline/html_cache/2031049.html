nds-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T95d,"])</script><script>self.__next_f.push([1,"\"Share Knowledge, Empower The World\"\r\n\r\nArches is Asia's premier expert network, connecting leading consulting, investment firms and Fortune 500 companies with the expertise they need to make informed, high-impact decisions. With offices strategically located across Tokyo, Shanghai, Hong Kong, Singapore, Colombia, Korea, and Ho Chi Minh, we’ve built a strong presence across Asia and beyond.\r\n\r\nSince 2019, we have expanded rapidly to over 250 professionals, raised $6M in funding, and cultivated a network of 160,000+ experts who support the world’s most prestigious organizations. In 2025, our new hub in Colombia will strengthen our global reach and allow us to serve US clients even more effectively.\r\n\r\nAt Arches, we empower ambitious professionals to grow fast, work globally, and make real impact — with the flexibility to thrive in their own way. Our mission is to transform how the world makes decisions by connecting the right minds, at the right time, to create meaningful impact worldwide.\r\n\r\n----\r\nWHAT WE DO:\r\n- Expert Matching: Connect the experts with clients from all over the world.\r\n- Expert Knowledge Bank: Unlimited access to transcribed interviews between experts and investors.\r\n- Expert Solution: Conducts research and provides strategic advice to businesses.\r\n- Talent Search: Recruitment service that provides highly accurate matches in a timely manner.\r\n\r\n----\r\nOur People\r\nWelcome to the vibrant world of Arches, where we're not just building a team – we're crafting a community of innovators. Picture a dynamic culture that feels like a close-knit family, valuing creativity, collaboration, and a \"Work hard, play hard\" mindset. At Arches, it's not just about working together; it's about creating connections beyond office boundaries.  Are you ready for something extraordinary Your next adventure begins at Arches – where every day is an invitation to be part of a thriving, innovative community.\r\n\r\n----\r\nArches is more than a company—it's a movement to democratize expertise. We're building a future where knowledge is to all, and you can be a driving force in this transformation. Join our team of passionate professionals, by visionary investors backed, and make your mark on the accessible global stage!\r\n\r\n----\r\nLearn more about us: \r\nWebsite: https://arches-global.com/ \r\nLinkedIn: https://www.linkedin.com/company/arches-expert-network-service/"])</script><script>self.__next_f.push([1,"24:Tcab,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eShare Knowledge, Empower the World\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eArches is a global platform for expert knowledge, strategic solutions, and talent, with a particular strength in Asia. We connect people and insights to help organizations make better decisions and drive real impact. At Arches, titles don't drive us, purpose does. We empower ambitious professionals to grow fast and work globally with the flexibility to thrive in their own way.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eSince 2019, we’ve grown 6× to become a global knowledge platform connecting 160,000+ experts across industries. With offices in 8 cities and a team of ambitious professionals from 15+ nationalities, we help the world’s top consulting firms, investors, and Fortune 500 companies make smarter decisions.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBacked by $6M+ funding and cutting-edge technology, we’re scaling faster than ever — and there’s space for bold talent to grow with us.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eObjective\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eA rare, truly global startup with one of the strongest cross-border track records among Japanese companies—would you like to play a key role in driving the in-house build-out of our VN accounting operations?\u003c/p\u003e\u003cp\u003eThis is a perfect opportunity for someone who loves solving problems, wants to build something from scratch, and is eager to grow in a challenging environment.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWHAT YOU WILL DO\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eCross-Border Financial Reporting \u0026 Consolidation\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPrepare and analyze monthly, quarterly, and annual financial statements (journal, general ledger, etc.).\u003c/p\u003e\u003cp\u003e•\tRecord intercompany transactions and restate financials in accordance with IFRS.\u003c/p\u003e\u003cp\u003e•\tSupport the preparation of consolidated financial statements.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTax \u0026 Compliance\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPrepare and review monthly/quarterly/annual tax returns (VAT, PIT, CIT, FCT…) and other tax correspondence for the tax authority. \u003c/p\u003e\u003cp\u003e•\tEnsure timely and accurate tax filings in full compliance with local regulations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eInternal Controls\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tIdentify significant issues/risks and propose solutions.\u003c/p\u003e\u003cp\u003e•\tDevelop and implement robust internal financial controls and procedures.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eCross-functional collaboration\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPartner with internal teams to support financial needs and foster collab
