nh của ngân hàng thương mại theo quy định.\r\n\r\nTổng số nhân sự của VCBNeo là hơn 1.000 cán bộ nhân viên. Đa số cán bộ nhân viên có trình độ đại học và trên đại học, thường xuyên được đào tạo chuyên môn nghiệp vụ tại các trường Đại học, Viện nghiên cứu trong và ngoài nước.\r\n\r\nDưới sự quản lý của Vietcombank, VCBNeo hướng đến mục tiêu hoạt động hiệu quả theo quy định của pháp luật và các chuẩn mực ngân hàng quốc tế. Đặc biệt, VCBNeo sẽ đề cao tính hiệu quả trên cơ sở kế thừa, phát huy những tinh hoa văn hóa doanh nghiệp, nền tảng công nghệ hiện đại đã được Vietcombank áp dụng thành công.\r\n\r\nMục tiêu – tầm nhìn: Thực hiện thành công, về đích sớm phương án chuyển giao bắt buộc. VCBNeo trở thành ngân hàng công nghệ số thuộc một mảnh ghép trong hệ sinh thái Vietcombank và có đóng góp quan trọng trong thực hiện mục tiêu, nhiệm vụ tài chính toàn diện.\r\n\r\nVề phân khúc khách hàng: Tập trung vào phân khúc Upper Mass; Mass; SME siêu nhỏ - nhỏ.\r\n\r\nSản phẩm: Tập trung vào sản phẩm bán lẻ, sản phẩm về tín dụng bán lẻ, sản phẩm về thanh toán, sản phẩm về dịch vụ đối với khách hàng cá nhân.\r\n\r\nVề thương hiệu và mạng lưới: Tập trung phát triển trên kênh số, tối ưu hóa hệ thống mạng lưới hiện có.\r\n\r\nVề cơ sở hạ tầng công nghệ thông tin: Dựa trên nền tảng công nghệ thông tin cơ bản của Vietcombank, đồng thời từng bước củng cố và phát triển năng lực công nghệ riêng.\r\n\r\nVề quản lý rủi ro và tuân thủ: Tiếp cận tiêu chuẩn quản trị rủi ro của Vietcombank.\r\n\r\nVề nguồn lực: Hướng theo tiêu chuẩn của Vietcombank, phấn đấu trở thành ngân hàng hàng đầu tại Việt Nam về chất lượng nguồn nhân lực."])</script><script>self.__next_f.push([1,"24:T9af,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Thực hiện công việc thuộc chức năng nhiệm vụ của kiểm toán nội bộ theo phân công (Thực hiện kiểm toán hệ thống công nghệ thông tin của ngân hàng):\u003c/p\u003e\u003cp\u003e• Tham gia chấm điểm rủi ro hàng năm các đơn vị/quy trình/nghiệp vụ theo phân công. Tham gia xây dựng/cập nhật chương trình kiểm toán chi tiết.\u003c/p\u003e\u003cp\u003e• Thực hiện nhiệm vụ kiểm toán nội bộ: thu thập tài liệu, chuẩn bị kiểm toán, thực hiện kiểm toán, theo dõi thực hiện các kiến nghị kiểm toán và các công việc khác theo phân công của đoàn kiểm toán.\u003c/p\u003e\u003cp\u003e• Ghi chép/Báo cáo Lãnh đạo Kiểm toán nội bộ đối với các tồn tại, sai phạm phát hiện trong quá trình kiểm toán/yếu kém, tồn tại, rủi ro của hệ thống kiểm soát nội bộ, đề xuất các kiến nghị nhằm khắc phục hoàn thiện hệ thống kiểm soát nội bộ, nâng cao hiệu quả trong quản lý, điều hành.\u003c/p\u003e\u003cp\u003e• Thực hiện xây dựng chương trình/chỉ tiêu, các mẫu báo cáo giám sát, rà soát, tổng hợp báo cáo giám sát và kiểm tra hoạt động theo phân công, tham gia thực hiện các báo cáo theo phân công.\u003c/p\u003e\u003cp\u003e• Hỗ trợ Lãnh đạo xây dựng và cập nhật các sổ tay, cẩm nang, hướng dẫn, chương trình kiểm toán đối với nghiệp vụ/lĩnh vực được phân công.\u003c/p\u003e\u003cp\u003e• Theo dõi thực hiện các kiến nghị sau kiểm toán, hỗ trợ Lãnh đạo rà soát kết quả theo dõi thực hiện kiến nghị kiểm toán theo phân công.\u003c/p\u003e\u003cp\u003e• Sử dụng, khai thác, các phần mềm/công cụ hỗ trợ công tác kiểm toán nội bộ, giám sát do VCBNeo trang bị/cho phép/nghiên cứu, đề xuất các sáng kiến cải tiến công việc, tham gia các dự án của VCBNeo theo phân công.\u003c/p\u003e\u003cp\u003e• Tham gia các dự án của Kiểm toán Nội bộ và ngân hàng.\u003c/p\u003e\u003cp\u003e2. Tham gia góp ý kiến cập nhật chương trình kiểm toán, quy chế/quy trình kiểm toán nội bộ và quy định khác liên quan được phân công.\u003c/p\u003e\u003cp\u003e3. Tham gia/đề xuất chương trình đào tạo của nhóm nghiệp vụ, Kiểm toán nội bộ và VCBNeo theo phân công.\u003c/p\u003e\u003cp\u003e4. Thực hiện nhiệm vụ khác theo phân công của Lãnh đạo.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T13af,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Trình độ chuyên môn: Tốt nghiệp đại học chính quy loại khá trở lên thuộc các trường đại học công lập trong nước hoặc nước ngoài chuyên ngành: Công nghệ thông tin, An toàn thông tin/An ninh mạng/mạng máy tính, Quản trị hệ thống, Khoa học máy tính/toán- tin kinh tế/kinh tế lượng/dữ liệu, Hoặc tài chính – kiểm toán- kế toán có thêm kiến thức công nghệ thông tin và dữ liệu;\u003c/p\u003e\u003cp\u003e• Tối thiểu 3 năm kinh nghiệm làm việc thuộc lĩnh vực có liên quan sau: Kiểm toán công nghệ thông tin, Quản trị hệ thống mạng/an ninh thông tin, Vận hành hệ thống/đánh giá bảo mật hệ thống CNTT, Quản trị rủi ro CNTT (IT Risk), Quản trị công nghệ thông tin (IT Gorvenance), Phân tích dữ liêu/ngân hàng số/mô hình.\u003c/p\u003e\u003cp\u003e• Hiểu rõ hệ thống CNTT, hạ tầng và bảo mật\u003c/p\u003e\u003cp\u003e• Khả năng đánh giá rủi ro CNTT\u003c/p\u003e\u003cp\u003e• Hiểu biết tiêu chuẩn COBIT, ISO 27001\u003c/p\u003e\u003cp\u003e• Ưu tiên hiểu biết công cụ phân tích dữ liệu, sử dụng thành thạo một trong các công cụ sau Excel nâng cao, Power BI, SQL, Python, R...\u003c/p\u003e\u003cp\u003e• Kỹ năng phân tích và tổng hợp tốt\u003c/p\u003e\u003cp\u003e• Kỹ năng viết báo cáo kiểm toán\u003c/p\u003e\u003cp\u003e• Kỹ năng giao tiếp, phản biện và làm việc nhóm\u003c/p\u003e\u003cp\u003e• Khả năng làm việc độc lập, trung thực, cẩn trọng và có trách nhiệm trong công việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên:\u003c/p\u003e\u003cp\u003e• Có chứng chỉ CISA (kiểm toán viên hệ thống thông tin), ITIL, COBIT (quản trị hệ thống CNTT), CISSP (An ninh hệ thống thông tin), CEH (kiểm thử bảo mật)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương: thỏa thuận.\u003c/p\u003e\u003cp\u003e•\tChế độ phúc lợi khác theo quy định của pháp luật và quy định của Ngân hàng.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc năng động, chuyên nghiệp, cơ hội thăng tiến rõ ràng.\u003c/p\u003e\u003cp\u003e•\tĐược đào tạo nâng cao kỹ năng, kiến thức chuyên môn.\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCBNeo cam kết rằng mọi thông tin cá nhân mà ứng viên cung cấp (bao gồm Phiếu dự tuyển, thư xin việc, bằng cấp, bảng điểm và các thông tin liên quan khác) chỉ được sử dụng duy nhất cho mục đích tuyển dụng, đánh giá năng lực và liên hệ phỏng vấn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eThông tin của ứng viên sẽ được lưu trữ trong hệ thống dữ liệu nhân sự của VCBNeo và chỉ những nhân sự có thẩm quyền (Bộ phận Tuyển dụng, Hội đồng phỏng vấn, Ban Lãnh đạo) mới được phép tiếp cận.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCBneo cam kết không chia sẻ, bán, hoặc tiết lộ thông tin cá nhân của ứng viên cho bất kỳ bên thứ ba nào, trừ khi có sự đồng ý bằng văn bản của ứng viên hoặc theo yêu cầu của cơ quan pháp luật có thẩm quyền.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCBNeo không thu bất kỳ khoản phí nào liên quan đến công tác tuyển dụng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e HÌNH THỨC TUYỂN DỤNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eỨng viên sẽ tham gia 02 vòng thi: vòng thi kiến thức chuyên môn nghiệp vụ và vòng phỏng vấn\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTHỜI GIAN VÀ HÌNH THỨC NHẬN HỒ SƠ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Nhận hồ sơ trực tuyến: Ứng viên tải về PHIẾU DỰ TUYỂN tại mục BIỂU MẪU, điền thông tin và gửi kèm bản scan các giấy tờ sau (định dạng pdf)\u003c/p\u003e\u003cp\u003eTiêu đề email ghi rõ: [Vị trí ứng tuyển] – Họ tên – SĐT\u003c/p\u003e\u003cp\u003e•\tSơ yếu lý lịch tự thuật khai trong giai đoạn 06 tháng gần nhất có chứng nhận của cơ quan nhà nước có thẩm quyền;\u003c/p\u003e\u003cp\u003e•\tBản sao các văn bằng và bảng điểm (không cần công chứng/chứng thực);\u003c/p\u003e\u003cp\u003e•\tGiấy chứng nhận sức khoẻ trong thời gian 06 tháng gần nhất;\u003c/p\u003e\u003cp\u003e•\tĐối với vị trí yêu cầu kinh nghiệm: Hồ sơ chứng minh kinh nghiệm công tác (Hợp đồng lao động, sổ Bảo hiểm xã hội, QĐ bổ nhiệm…);\u003c/p\u003e\u003cp\u003e•\t02 ảnh 4x6 (chụp trong vòng 06 tháng tính đến thời điểm nộp hồ sơ);\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLưu ý: Ứng viên phải bổ sung đầy đủ hồ sơ bản giấy có công chứng/chứng thực khi VCBNeo yêu cầu hoặc khi có thông báo ứng viên được vào vòng Phỏng vấn. Ứng viên cần đính kèm tài liệu chứng minh, trường hợp không có căn cứ đánh giá thì VCBNeo có quyền loại hồ sơ. \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thời hạn nhận hồ sơ: Đến hết ngày 05/4/2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eĐịa điểm làm việc: Văn phòng làm việc của TSC tại Hà Nội: Tầng 19-20, Tòa nhà Century, Times City, 458 Minh Khai, TP. Hà Nội\u003c/p\u003e\u003cp\u003e(Địa chỉ đã cập nhật sau sáp nhập các đơn vị hành chính)\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Tc9e,"])</script><script>self.__next_f.push([1,"Ngân hàng Thương mại TNHH MTV Ngoại thương Công nghệ số - VCBNeo (tên gọi cũ Ngân hàng Xây dựng - CB) được chấp thuận thay đổi tên gọi theo Quyết định số 30/QĐ-TTGSNH1 ngày 17/01/2025 của Cơ quan thanh tra, giám sát ngân hàng – Ngân hàng Nhà nước Việt Nam.\r\nTên đầy đủ bằng tiếng Việt: Ngân hàng Thương mại trách nhiệm hữu hạn một thành viên Ngoại thương Công nghệ số.\r\nTên đầy đủ bằng tiếng Anh: Vietcombank Neo Limited.\r\nTên viết tắt: VCBNeo. Xem chi tiết\r\n\r\nNgày 17/10/2024, Ngân hàng Nhà nước (NHNN) đã công bố quyết định chuyển giao bắt buộc Ngân hàng Xây dựng do Nhà nước là chủ sở hữu 100% vốn cho Ngân hàng TMCP Ngoại thương Việt Nam (Vietcombank) theo Phương án được Chính phủ phê duyệt.\r\nSau chuyển giao bắt buộc, ngân hàng tiếp tục hoạt động dưới hình thức ngân hàng trách nhiệm hữu hạn một thành viên do Vietcombank sở hữu 100% vốn điều lệ; được thực hiện đầy đủ các hoạt động kinh doanh của ngân hàng thương mại theo quy định.\r\n\r\nTổng số nhân sự của VCBNeo là hơn 1.000 cán bộ nhân viên. Đa số cán bộ nhân viên có trình độ đại học và trên đại học, thường xuyên được đào tạo chuyên môn nghiệp vụ tại các trường Đại học, Viện nghiên cứu trong và ngoài nước.\r\n\r\nDưới sự quản lý của Vietcombank, VCBNeo hướng đến mục tiêu hoạt động hiệu quả theo quy định của pháp luật và các chuẩn mực ngân hàng quốc tế. Đặc biệt, VCBNeo sẽ đề cao tính hiệu quả trên cơ sở kế thừa, phát huy những tinh hoa văn hóa doanh nghiệp, nền tảng công nghệ hiện đại đã được Vietcombank áp dụng thành công.\r\n\r\nMục tiêu – tầm nhìn: Thực hiện thành công, về đích sớm phương án chuyển giao bắt buộc. VCBNeo trở thành ngân hàng công nghệ số thuộc một mảnh ghép trong hệ sinh thái Vietcombank và có đóng góp quan trọng trong thực hiện mục tiêu, nhiệm vụ tài chính toàn diện.\r\n\r\nVề phân khúc khách hàng: Tập trung vào phân khúc Upper Mass; Mass; SME siêu nhỏ - nhỏ.\r\n\r\nSản phẩm: Tập trung vào sản phẩm bán lẻ, sản phẩm về tín dụng bán lẻ, sản phẩm về thanh toán, sản phẩm về dịch vụ đối với khách hàng cá nhân.\r\n\r\nVề thương hiệu và mạng lưới: Tập trung phát triển trên kênh số, tối ưu hóa hệ thống mạng lưới hiện có.\r\n\r\nVề cơ sở hạ tầng công nghệ thông tin: Dựa trên nền tảng công nghệ thông tin cơ bản của Vietcombank, đồng thời từng bước củng cố và phát triển năng lực công nghệ riêng.\r\n\r\nVề quản lý rủi ro và tuân thủ: Tiếp cận tiêu chuẩn quản trị rủi ro của Vietcombank.\r\n\r\nVề nguồn lực: Hướng theo tiêu chuẩn của Vietcombank, phấn đấu trở thành ngân hàng hàng đầu tại Việt Nam về chất lượng nguồn nhân lực."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:Tc9e,"])</script><script>self.__next_f.push([1,"Ngân hàng Thương mại TNHH MTV Ngoại thương Công nghệ số - VCBNeo (tên gọi cũ Ngân hàng Xây dựng - CB) được chấp thuận thay đổi tên gọi theo Quyết định số 30/QĐ-TTGSNH1 ngày 17/01/2025 của Cơ quan thanh tra, giám sát ngân hàng – Ngân hàng Nhà nước Việt cho phép/nghiên cứu, đề xuất các sáng kiến cải tiến công việc, tham gia các dự án của VCBNeo theo phân công.\u003c/p\u003e\u003cp\u003e• Tham gia các dự án của Kiểm toán Nội bộ và ngân hàng.\u003c/p\u003e\u003cp\u003e2. Tham gia góp ý kiến cập nhật chương trình kiểm toán, quy chế/quy trình kiểm toán nội bộ và quy định khác liên quan được phân công.\u003c/p\u003e\u003cp\u003e3. Tham gia/đề xuất chương trình đào tạo của nhóm nghiệp vụ, Kiểm toán nội bộ và VCBNeo theo phân công.\u003c/p\u003e\u003cp\u003e4. Thực hiện nhiệm vụ khác theo phân công của Lãnh đạo.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T13af,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Trình độ chuyên môn: Tốt nghiệp đại học chính quy loại khá trở lên thuộc các trường đại học công lập trong nước hoặc nước ngoài chuyên ngành: Công nghệ thông tin, An toàn thông tin/An ninh mạng/mạng máy tính, Quản trị hệ thống, Khoa học máy tính/toán- tin kinh tế/kinh tế lượng/dữ liệu, Hoặc tài chính – kiểm toán- kế toán có thêm kiến thức công nghệ thông tin và dữ liệu;\u003c/p\u003e\u003cp\u003e• Tối thiểu 3 năm kinh nghiệm làm việc thuộc lĩnh vực có liên quan sau: Kiểm toán công nghệ thông tin, Quản trị hệ thống mạng/an ninh thông tin, Vận hành hệ thống/đánh giá bảo mật hệ thống CNTT, Quản trị rủi ro CNTT (IT Risk), Quản trị công nghệ thông tin (IT Gorvenance), Phân tích dữ liêu/ngân hàng số/mô hình.\u003c/p\u003e\u003cp\u003e• Hiểu rõ hệ thống CNTT, hạ tầng và bảo mật\u003c/p\u003e\u003cp\u003e• Khả năng đánh giá rủi ro CNTT\u003c/p\u003e\u003cp\u003e• Hiểu biết tiêu chuẩn COBIT, ISO 27001\u003c/p\u003e\u003cp\u003e• Ưu tiên hiểu biết công cụ phân tích dữ liệu, sử dụng thành thạo một trong các công cụ sau Excel nâng cao, Power BI, SQL, Python, R...\u003c/p\u003e\u003cp\u003e• Kỹ năng phân tích và tổng hợp tốt\u003c/p\u003e\u003cp\u003e• Kỹ năng viết báo cáo kiểm toán\u003c/p\u003e\u003cp\u003e• Kỹ năng giao tiếp, phản biện và làm việc nhóm\u003c/p\u003e\u003cp\u003e• Khả năng làm việc độc lập, trung thực, cẩn trọng và có trách nhiệm trong công việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên:\u003c/p\u003e\u003cp\u003e• Có chứng chỉ CISA (kiểm toán viên hệ thống thông tin), ITIL, COBIT (quản trị hệ thống CNTT), CISSP (An ninh hệ thống thông tin), CEH (kiểm thử bảo mật)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương: thỏa thuận.\u003c/p\u003e\u003cp\u003e•\tChế độ phúc lợi khác theo quy định của pháp luật và quy định của Ngân hàng.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc năng động, chuyên nghiệp, cơ hội thăng tiến rõ ràng.\u003c/p\u003e\u003cp\u003e•\tĐược đào tạo nâng cao kỹ năng, kiến thức chuyên môn.\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCBNeo cam kết rằng mọi thông tin cá nhân mà ứng viên cung cấp (bao gồm Phiếu dự tuyển, thư xin việc, bằng cấp, bảng điểm và các thông tin liên quan khác) chỉ được sử dụng duy nhất cho mục đích tuyển dụng, đánh giá năng lực và liên hệ phỏng vấn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eThông tin của ứng viên sẽ được lưu trữ trong hệ thống dữ liệu nhân sự của VCBNeo và chỉ những nhân sự có thẩm quyền (Bộ phận Tuyển dụng, Hội đồng phỏng vấn, Ban Lãnh đạo) mới được phép tiếp cận.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCBneo cam kết không chia sẻ, bán, hoặc tiết lộ thông tin cá nhân của ứng viên cho bất kỳ bên thứ ba nào, trừ khi có sự đồng ý bằng văn bản của ứng viên hoặc theo yêu cầu của cơ quan pháp luật có thẩm quyền.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eVCBNeo không thu bất kỳ khoản phí nào liên quan đến công tác tuyển dụng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e HÌNH THỨC TUYỂN DỤNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eỨng viên sẽ tham gia 02 vòng thi: vòng thi kiến thức chuyên môn nghiệp vụ và vòng phỏng vấn\u003c/p\u003e\u003cp\u003e\u003c
