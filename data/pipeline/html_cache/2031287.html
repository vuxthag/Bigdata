hu nhập bền vững và niềm tự hào đồng hành cùng Lucia\r\n- Mỗi thành viên là một đại sứ của tinh thần tận tâm – trung thực – trách nhiệm, chung khát vọng nâng tầm sản phẩm và dịch vụ Việt\"                                \r\n3. Giá trị cốt lõi    \"Tận tâm – Tin cậy – Chuyên nghiệp – Sáng tạo\r\n- Tận tâm: Luôn lắng nghe – Chu đáo trong từng chi tiết – Hỗ trợ khách hàng và đồng nghiệp đến cùng\r\n- Tin cậy: Nói đúng – Làm đúng – Giữ lời hứa – Trách nhiệm đến cùng với kết quả\r\n- Chuyên nghiệp: Làm việc có kế hoạch – Đúng thời gian – Tôn trọng khách hàng, đồng nghiệp và đối tác\r\n- Sáng tạo: Chủ động đề xuất – Dám thử nghiệm – Tìm cách làm mới để tạo giá trị cao hơn\"  \r\n                              \r\n4. Triết lý con người \r\n\r\nMỗi thành viên Lucia được đào tạo để trở thành người cố vấn tin cậy của khách hàng – am hiểu sản phẩm, thấu hiểu mô hình vận hành của khách sạn, spa, trường học và các đơn vị dịch vụ\r\n5. Sản phẩm và dịch vụ \r\n\"Sản phẩm chủ lực: Chăn Ga Gối, Khăn bông\r\nCác sản phẩm Lucia được sản xuất và lựa chọn dựa trên tiêu chuẩn khách sạn, đảm bảo tính thẩm mỹ, độ bền, và cảm xúc trải nghiệm của người sử dụng cuối cùng\"\r\n6. Bản đồ định vị \r\nGiải pháp nâng tầm trải nghiệm - Hiệu quả đầu tư bền vững\r\nfanpage: https://www.facebook.com/luciabedding/."])</script><script>self.__next_f.push([1,"40:{\"companyId\":412531,\"jobImageURLs\":\"$41\",\"jobVideoURLs\":\"$42\",\"companyName\":\"CÔNG TY TNHH SẢN XUẤT THƯƠNG MẠI XUẤT NHẬP KHẨU THANH THÚY HẠNH\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/48/11444417.png\",\"companySizeId\":\"\",\"companyProfile\":\"$43\",\"contactName\":\"Ms Hằng\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"15 đường D, Khu Phố 4, P Phước Long A, Thành Phố Thủ Đức, Hồ Chí Minh, Việt Nam\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"al
