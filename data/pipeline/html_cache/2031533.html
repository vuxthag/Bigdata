providing good quality products for children, Con Cung is strongly investing into Product Research and Development in order to manufacture and provide products that are suitable to the local market in terms of pricing and quality. We also invest into technology in order to manage the network and online channel efficiently.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCon Cung Corporation also develops in-house cutting-edge automation and intelligence technologies. We are seeking for young, smart \u0026 dynamic talents to grow your career together with us.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Description\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Senior Manager Trade Planner coordinates the development and execution of the retail trading calendar, promotional activities, and category activation plans to drive sales, margin, and customer engagement. This manager role partners closely with Merchandising, Marketing, Sales Growth, Ecommerce, Supply Chain, Store Operations, and Finance to ensure that trade activities and promotions are commercially effective, operationally feasible, and financially optimized.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Trade \u0026 Promotional Planning\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Coordinate trade calendar across all channels (Merchandise, Sales growth, Stores, E-commerce).\u003c/p\u003e\u003cp\u003e   • Plan and sequence promotions, seasonal events, and campaigns to align with category growth targets and business priorities.\u003c/p\u003e\u003cp\u003e   • Ensure all promotions are commercially sound, aligned with margin targets, and have clear objectives.\u003c/p\u003e\u003cp\u003e   • Coordinate sign-off process and manage cut-off timeline for promotional activities with relevant stakeholders.\u003c/p\u003e\u003cp\u003e   • Track and manage promotional slots to optimize frequency and avoid cannibalization between categories and channels.\u003c/p\u003e\u003cp\u003e   • Coordinate to ensure promotions and campaigns are complied with current laws and regulations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Cross-Functional Collaboration\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Merchandising: Coordinate product availability, pricing, and category strategies are in sync with planned events.\u003c/p\u003e\u003cp\u003e   • Marketing: Coordinate promotional themes and execution across customer touchpoints.\u003c/p\u003e\u003cp\u003e   • Supply Chain: Coordinate stock flow to meet campaign timing.\u003c/p\u003e\u003cp\u003e   • Non-Trade Sourcing: Coordinate gifts flow to meet campaign timing.\u003c/p\u003e\u003cp\u003e   • Store Operations \u0026 E-commerce: Communicate execution plans and ensure smooth implementation.\u003c/p\u003e\u003cp\u003e   • Finance: Liaise on promotional claim-back processes with suppliers, ensuring accurate tracking, reconciliation, and timely collection.\u003c/p\u003e\u003cp\u003e   • Legal and tax: Liaise to ensure compliance with current laws and regulations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Processes and Systems\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Coordinate to ensure accurate trading data and promotional setup in company-wise integrated systems.\u003c/p\u003e\u003cp\u003e   • Implement robust approval and compliance processes for promotions and campaigns.\u003c/p\u003e\u003cp\u003e   • Drive continuous improvement in planning, reporting, and analytical tools.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Promotion Analysis\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Perform post-promotion analysis to measure effectiveness in terms of sales uplift, margin impact, and ROI.\u003c/p\u003e\u003cp\u003e   • Identify learnings and improvement opportunities for future campaigns.\u003c/p\u003e\u003cp\u003e   • Ensure insights are communicated to Marketing, Merchandising, and Finance for decision-making.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T70b,\u003cp\u003e\u003cstrong\u003e1. Qualifications \u0026 Skills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eEssential\u003c/p\u003e\u003cp\u003e• 6+ years’ experience in retail trade planning, finance controlling, finance business partnering, merchandising, or category management, with at least 2 years in a managerial capacity.\u003c/p\u003e\u003cp\u003eStrong commercial and financial acumen.\u003c/p\u003e\u003cp\u003e• Strong commercial and financial acumen.\u003c/p\u003e\u003cp\u003e• Proven track record in delivering measurable promotional effectiveness.\u003c/p\u003e\u003cp\u003e• Proficient in Excel, BI tools (Power BI, Tableau), and ERP/POS systems.\u003c/p\u003e\u003cp\u003e• Exceptional communication, negotiation, and stakeholder management skills.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eDesirable\u003c/p\u003e\u003cp\u003e• Experience in omni-channel retail.\u003c/p\u003e\u003cp\u003e• Familiarity with retail promotional mechanics and pricing strategies.\u003c/p\u003e\u003cp\u003e• Knowledge of local retail seasonality and key trading events.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Core Competencies\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Strategic Commercial Mindset – sees the big picture and drives profitability.\u003c/p\u003e\u003cp\u003e• Analytical Leadership – turns data into actionable strategies.\u003c/p\u003e\u003cp\u003e• Cross-Functional Influence – aligns multiple teams towards common goals.\u003c/p\u003e\u003cp\u003e• Execution Excellence – delivers results on time and to standard.\u003c/p\u003e\u003cp\u0 r with us.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Description\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Senior Manager Trade Planner coordinates the development and execution of the retail trading calendar, promotional activities, and category activation plans to drive sales, margin, and customer engagement. This manager role partners closely with Merchandising, Marketing, Sales Growth, Ecommerce, Supply Chain, Store Operations, and Finance to ensure that trade activities and promotions are commercially effective, operationally feasible, and financially optimized.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Trade \u0026 Promotional Planning\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Coordinate trade calendar across all channels (Merchandise, Sales growth, Stores, E-commerce).\u003c/p\u003e\u003cp\u003e   • Plan and sequence promotions, seasonal events, and campaigns to align with category growth targets and business priorities.\u003c/p\u003e\u003cp\u003e   • Ensure all promotions are commercially sound, aligned with margin targets, and have clear objectives.\u003c/p\u003e\u003cp\u003e   • Coordinate sign-off process and manage cut-off timeline for promotional activities with relevant stakeholders.\u003c/p\u003e\u003cp\u003e   • Track and manage promotional slots to optimize frequency and avoid cannibalization between categories and channels.\u003c/p\u003e\u003cp\u003e   • Coordinate to ensure promotions and campaigns are complied with current laws and regulations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Cross-Functional Collaboration\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Merchandising: Coordinate product availability, pricing, and category strategies are in sync with planned events.\u003c/p\u003e\u003cp\u003e   • Marketing: Coordinate promotional themes and execution across customer touchpoints.\u003c/p\u003e\u003cp\u003e   • Supply Chain: Coordinate stock flow to meet campaign timing.\u003c/p\u003e\u003cp\u003e   • Non-Trade Sourcing: Coordinate gifts flow to meet campaign timing.\u003c/p\u003e\u003cp\u003e   • Store Operations \u0026 E-commerce: Communicate execution plans and ensure smooth implementation.\u003c/p\u003e\u003cp\u003e   • Finance: Liaise on promotional claim-back processes with suppliers, ensuring accurate tracking, reconciliation, and timely collection.\u003c/p\u003e\u003cp\u003e   • Legal and tax: Liaise to ensure compliance with current laws and regulations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Processes and Systems\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Coordinate to ensure accurate trading data and promotional setup in company-wise integrated systems.\u003c/p\u003e\u003cp\u003e   • Implement robust approval and compliance processes for promotions and campaigns.\u003c/p\u003e\u003cp\u003e   • Drive continuous improvement in planning, reporting, and analytical tools.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Promotion Analysis\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Perform post-promotion analysis to measure effectiveness in terms of sales uplift, margin impact, and ROI.\u003c/p\u003e\u003cp\u003e   • Identify learnings and improvement opportunities for future campaigns.\u003c/p\u003e\u003cp\u003e   • Ensure insights are communicated to Marketing, Merchandising, and Finance for decision-making.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:T70b,\u003cp\u003e\u003cstrong\u003e1. Qualifications \u0026 Skills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eEssential\u003c/p\u003e\u003cp\u003e• 6+ years’ experience in retail
