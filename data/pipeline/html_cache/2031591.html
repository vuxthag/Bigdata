p\u003e\u003cp\u003e\u003cem\u003e•\tBuild and maintain customer relationships. / Xây dựng, duy trì và phát triển mối quan hệ với khách hàng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tStay updated on industry trends, market conditions, and competitor activities to identify opportunities and threats. / Cập nhật thông tin về xu hướng ngành, thị trường và đối thủ cạnh tranh để nhận diện cơ hội và rủi ro.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tCollaborate with internal teams (admin, warehouse, accounting) to ensure smooth sales operations. / Phối hợp với các bộ phận nội bộ (Sales Admin, Kho, Kế toán…) nhằm đảm bảo quy trình bán hàng diễn ra suôn sẻ.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tRepresent the company at industry events, trade shows, and networking opportunities to promote our brand and products. / Tham gia các sự kiện ngành, hội chợ, hoạt động networking để giới thiệu thương hiệu và sản phẩm của công ty.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T877,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQualifications:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tExperienced candidates in manufacturing/ industry or a related industry is a plus (Priority will be given to candidates with experience. Candidates without experience will be trained by us). / \u003cem\u003eƯu tiên ứng viên có kinh nghiệm, chưa có kinh nghiệm sẽ được đào tạo.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tBachelor’s degree in Business, Engineering, or related fields is required. / Tốt nghiệp Cao đẳng/Đại học chuyên ngành Kinh doanh, Kỹ thuật hoặc các lĩnh vực liên quan.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tStrong communication, negotiation, and interpersonal skills. / Có kỹ năng giao tiếp, đàm phán và xây dựng mối quan hệ tốt. \u003c/p\u003e\u003cp\u003e\u003cem\u003e•\tSelf-motivated, proactive, and willing to learn technical product knowledge. / Chủ động, có
