8f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n26:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1739,"])</script><script>self.__next_f.push([1,"*** Về chúng tôi:\r\n\r\nCông ty Cổ phần Giáo dục và Đào tạo IMAP Việt Nam được thành lập vào tháng 10/2012 bởi chị Nguyễn Thị Hoa (thường được gọi là Ms Hoa) và các cộng sự. Trải qua 10 năm phát triển, IMAP Việt Nam hiện sở hữu hệ thống thương hiệu đào tạo Anh ngữ uy tín: \r\n- Ms Hoa TOEIC - Đào tạo TOEIC số 1 Việt Nam\r\n- Ms Hoa Giao Tiếp - Đào tạo tiếng Anh giao tiếp theo khung châu Âu.\r\n- Ms Hoa Junior - Đào tạo tiếng Anh toàn diện cho trẻ tiểu học\r\n- IELTS Fighter - Luyện thi chứng chỉ IELTS\r\n- IMAP Pro - Đào tạo tiếng Anh doanh nghiệp\r\n\r\nVới khát khao truyền cảm hứng ngôn ngữ, IMAP liên tục mở rộng mạng lưới điểm trường và cải tiến, phát triển bộ giá trị đào tạo nhằm tối ưu hóa trải nghiệm học viên. Bên cạnh hoạt động đào tạo, IMAP chú trọng đẩy mạnh các hoạt động/sự kiện/dự án cộng đồng với tinh thần sẵn sàng sẻ chia, trao đi giá trị, lan tỏa niềm đam mê ngôn ngữ và những giá trị học thuật tới người học tiếng Anh trên cả nước. \r\n\r\nNhững con số nổi bật: \r\n- 100+ cơ sở đào tạo trải rộng khắp các tỉnh, thành lớn trên cả nước\r\n- 2000+ nhân sự \r\n- 350+ đối tác doanh nghiệp, truyền thông, trường học\r\n- 1.000.000+ học viên\r\n\r\n*** Tầm nhìn :Trở thành Tập đoàn giáo dục hàng đầu Việt Nam về đào tạo ngôn ngữ và kỹ năng.\r\n*** Sứ mệnh: Giúp 10 triệu người Việt tự tin nói tiếng Anh\r\n\r\nIMAP hướng tới mục tiêu đào tạo toàn diện theo triết lý M-K-S: Học viên không chỉ được bồi dưỡng về năng lực ngôn ngữ tiếng Anh (Knowledge) mà còn được mài giũa tư duy, tâm thế học tập (Mindset) và rèn luyện kỹ năng mềm (Skills) để dễ dàng chạm tay tới thành công.\r\n\r\nIMAP mong muốn chắp cánh cho khát khao chinh phục tiếng Anh của người Việt, giúp họ tự tin giao tiếp tiếng Anh, đạt mục tiêu về điểm số TOEIC, IELTS, từ đó mở rộng cơ hội việc làm và tiến đến những nấc thang cao hơn trong sự nghiệp.\r\n\r\nIMAP sẽ tiếp tục nâng cao năng lực đáp ứng nhu cầu học Anh ngữ của đa dạng đối tượng học viên.\r\n\r\n*** Giá trị cốt lõi\r\nIMAP xây dựng, duy trì và phát triển bản sắc văn hóa thông qua năm giá trị cốt lõi:\r\n- Tận tâm phục vụ \r\n- Trách nhiệm kỷ luật \r\n- Chính trực thẳng thắn \r\n- Đổi mới sáng tạo \r\n- Dám nghĩ dám làm\r\n—--------------\r\n*** OUR PEOPLE\r\nChị Nguyễn Thị Hoa - Nhà sáng lập, Chủ tịch HĐQT IMAP Việt Nam\r\nChị Nguyễn Thị Hoa (thường được gọi là Ms Hoa) mang trong mình khát khao truyền cảm hứng ngôn ngữ, giúp học trò Việt nuôi dưỡng tình yêu tiếng Anh. Ms Hoa luôn nói với học viên và nhân viên rằng tiếng Anh là công cụ để khám phá kiến thức, giúp mỗi người mở rộng góc nhìn, thế giới quan, tự tin hội nhập và bước ra thế giới rộng lớn. Học tiếng Anh nói riêng và ngoại ngữ nói chung là hành trình khám phá về con người mới, miền đất mới; thông qua ngôn ngữ, chúng ta thấy được sự khác biệt về tư duy và văn hóa của người bản xứ. \r\nMs Hoa đã trao truyền cho đội ngũ giáo viên triết lý đào tạo và phương pháp giảng dạy mà chị dày công nghiên cứu trong suốt 10 năm qua. \r\nTriết lý M-K-S hướng tới mục tiêu đào tạo toàn diện: \r\nM - Mindset (Tư duy, tâm thế)\r\nK - Knowledge (Kiến thức)\r\nS - Skills (Kỹ năng)\r\nPhương pháp đào tạo RIPL: \r\nR - Refined Knowledge: Tính chắt lọc kiến thức\r\nI - Inspiration: Tính truyền cảm hứng\r\nP - Practice: Tính thực hành ngôn ngữ\r\nL - Logic: Tính logic, chặt chẽ\r\n—----------------\r\n\r\n*** OUR BENEFITS \r\nNhân viên IMAP được hưởng chế độ đãi ngộ đầy đủ và thu nhập hấp dẫn:\r\n- Thu nhập gồm: lương cơ bản, phụ cấp, thưởng KPI công việc, thưởng doanh số\r\n- Thưởng quý; thưởng ngày lễ, tết\r\n- Lương tháng 13\r\n- Bảo hiểm xã hội, Bảo hiểm y tế, Bảo hiểm thai sản\r\n- Team building/du lịch hàng năm\r\n\r\n*** Đào tạo\r\nNhân viên IMAP trải qua các kỳ đào tạo sau:\r\n- Đào tạo hội nhập: Làm quen với văn hóa doanh nghiệp\r\n- Đào tạo chuyên môn, kỹ năng: Củng cố, nâng cao năng lực làm việc\r\nThông qua các kỳ đào tạo thường xuyên, nhân viên IMAP có cơ hội phát hiện tiềm năng bản thân; phát triển tư duy, kiến thức, kỹ năng phục vụ công việc; lắng nghe lời khuyên, chia sẻ từ cấp lãnh đạo và quản lý để phát huy điểm mạnh, khắc phục điểm yếu. \r\n\r\n*** Môi trường làm việc\r\nIMAP luôn nỗ lực tạo dựng môi trường làm việc cởi mở, chuyên nghiệp. Từ cơ sở vật chất đến văn hóa ứng xử, các quy trình làm việc,… đều được chú trọng xây dựng và phát triển theo thời gian để đội ngũ CBNV vững tâm, tin tưởng, phát huy tối đa năng lực, sáng tạo không ngừng, tạo dựng sự nghiệp và đóng góp giá trị vì mục tiêu chung. \r\n\r\n*** Cơ hội phát triển\r\nNhân viên IMAP có cơ hội thử sức với các vị trí và line công việc khác nhau, phù hợp với năng lực và định hướng phát triển cá nhân. \r\nNhững nhân viên ưu tú, có năng lực tốt được đào tạo chuyên sâu và cân nhắc bổ nhiệm vào các vị trí quản lý cấp trung, cấp cao."])</script><script>self.__next_f.push([1,"24:Tb71,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Tốt nghiệp Trung cấp/Cao đẳng/Đại học tất cả các chuyên ngành.\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm Sales, Telesales, CSKH tất cả các lĩnh vực... là lợi thế. Ưu tiên ứng viên đã có kinh nghiệm trong ngành giáo dục, đào tạo.\u003c/p\u003e\u003cp\u003e- Năng động, chăm chỉ, nhanh nhẹn, đam mê lĩnh vực kinh doanh bán hàng. Chủ động, kiên trì, có khả năng làm việc dưới áp lực, mindset sales tốt. Có laptop phục vụ công việc.\u003c/p\u003e\u003cp\u003e- Có thể làm việc theo ca linh hoạt.\u003c/p\u003e\u003cp\u003e● Thời gian làm việc linh hoạt (được đăng ký ca làm việc):\u003c/p\u003e\u003cp\u003e- Làm việc xoay ca: 06 ca/tuần (nghỉ 01 ngày bất kì/tuần), nghỉ trưa 1,5h.\u003c/p\u003e\u003cp\u003eCa 1: 08h00 - 17h00 hoặc 9h00 - 18h00\u003c/p\u003e\u003cp\u003eCa 2: 13h30 - 20h30\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e*** QUYỀN LỢI ĐƯỢC HƯỞNG:\u003c/p\u003e\u003cp\u003e- Thu nhập cạnh tranh trong thị trường giáo dục: Từ 15 triệu – 35 triệu VNĐ/tháng. Trong đó: Lương cứng từ 7-8tr – 13tr/tháng theo năng lực + Lương kinh doanh/thưởng hoa hồng + Thưởng nóng. (Lương cứng nhảy bậc, nhận cao hơn theo doanh số hàng tháng. Doanh số càng cao, mức lương cứng càng nhảy bậc)\u003c/p\u003e\u003cp\u003e- Thử việc 2 tháng + nhận 100% thưởng hiệu quả công việc/hoa hồng như nhân viên chính thức. Phụ cấp đi lại cho các khu vực đặc biệt (Theo chế độ, chính sách công ty cho từng khu vực).\u003c/p\u003e\u003cp\u003e- Hưởng tất cả các chế độ BHXH, BHYT, BHTN, chế độ 12 ngày nghỉ phép năm có lương (đủ thâm niên cộng thêm 1 ngày phép, nghỉ hiếu/hỉ thêm từ 1-3 ngày),.. và các chế độ khác theo quy định pháp luật ngay khi ký HĐLĐ chính thức.\u003c/p\u003e\u003cp\u003e- Tháng lương thứ 13/thưởng cuối năm, tiệc cuối năm (YEP), du lịch hàng năm.. Thưởng lễ/tết, thưởng sinh nhật,.. Tặng quà, thăm hỏi CBNV khi hiếu/hỉ, ốm đau,..\u003c/p\u003e\u003cp\u003e- Miễn phí 100% khi đăng ký học tiếng Anh tại tất cả các trung tâm trong hệ thống (người thân đăng ký học giá ưu đãi riêng).\u003c/p\u003e\u003cp\u003e- Quỹ khuyến học IMAP dành cho các cá nhân có hoàn cảnh khó khăn, tạo điều kiện để vươn lên \u0026 phát triển trong cuộc sống.\u003c/p\u003e\u003cp\u003e- Tham gia đào tạo bài bản về Tư vấn, quy trình, sản phẩm, dịch vụ, vận hành. Chú trọng đào tạo nâng cao kỹ năng chuyên môn, kỹ năng mềm, mở rộng mối quan hệ cho CBNV. Môi trường năng động, đồng nghiệp gắn kết hỗ trợ nhau để đạt kết quả mục tiêu kinh doanh chung.\u003c/p\u003e\u003cp\u003e- Reviews lương theo năng lực (6 tháng - 1 năm định kỳ hoặc trước hạn nếu có thành tích vượt trội). Lộ trình lên vị trí quản lý cụ thể, rõ ràng hơn 100 cơ sở và đang mở rộng trên toàn quốc.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T1704,"])</script><script>self.__next_f.push([1,"OUR STORY\r\nVề chúng tôi\r\nCông ty Cổ phần Giáo dục và Đào tạo IMAP Việt Nam được thành lập vào tháng 10/2012 bởi chị Nguyễn Thị Hoa (thường được gọi là Ms Hoa) và các cộng sự. Trải qua 10 năm phát triển, IMAP Việt Nam hiện sở hữu hệ thống thương hiệu đào tạo Anh ngữ uy tín: \r\nMs Hoa TOEIC - Đào tạo TOEIC số 1 Việt Nam\r\nMs Hoa Giao Tiếp - Đào tạo tiếng Anh giao tiếp theo khung châu Âu.\r\nMs Hoa Junior - Đào tạo tiếng Anh toàn diện cho trẻ tiểu học\r\nIELTS Fighter - Luyện thi chứng chỉ IELTS\r\nIMAP Pro - Đào tạo tiếng Anh doanh nghiệp\r\nVới khát khao truyền cảm hứng ngôn ngữ, IMAP liên tục mở rộng mạng lưới điểm trường và cải tiến, phát triển bộ giá trị đào tạo nhằm tối ưu hóa trải nghiệm học viên. Bên cạnh hoạt động đào tạo, IMAP chú trọng đẩy mạnh các hoạt động/sự kiện/dự án cộng đồng với tinh thần sẵn sàng sẻ chia, trao đi giá trị, lan tỏa niềm đam mê ngôn ngữ và những giá trị học thuật tới người học tiếng Anh trên cả nước. \r\nNhững con số nổi bật: \r\n100+ cơ sở đào tạo trải rộng khắp các tỉnh, thành lớn trên cả nước\r\n2000+ nhân sự \r\n350+ đối tác doanh nghiệp, truyền thông, trường học\r\n1.000.000+ học viên\r\nTầm nhìn\r\nTrở thành Tập đoàn giáo dục hàng đầu Việt Nam về đào tạo ngôn ngữ và kỹ năng.\r\nSứ mệnh\r\nGiúp 10 triệu người Việt tự tin nói tiếng Anh\r\nIMAP hướng tới mục tiêu đào tạo toàn diện theo triết lý M-K-S: Học viên không chỉ được bồi dưỡng về năng lực ngôn ngữ tiếng Anh (Knowledge) mà còn được mài giũa tư duy, tâm thế học tập (Mindset) và rèn luyện kỹ năng mềm (Skills) để dễ dàng chạm tay tới thành công.\r\nIMAP mong muốn chắp cánh cho khát khao chinh phục tiếng Anh của ng (người thân đăng ký học giá ưu đãi riêng).\u003c/p\u003e\u003cp\u003e- Quỹ khuyến học IMAP dành cho các cá nhân có hoàn cảnh khó khăn, tạo điều kiện để vươn lên \u0026 phát triển trong cuộc sống.\u003c/p\u003e\u003cp\u003e- Tham gia đào tạo bài bản về Tư vấn, quy trình, sản phẩm, dịch vụ, vận hành. Chú trọng đào tạo nâng cao kỹ năng chuyên môn, kỹ năng mềm, mở rộng mối quan hệ cho CBNV. Môi trường năng động, đồng nghiệp gắn kết hỗ trợ nhau để đạt kết quả mục tiêu kinh doanh chung.\u003c/p\u003e\u003cp\u003e- Reviews lương theo năng lực (6 tháng - 1 năm định kỳ hoặc trước hạn nếu có thành tích vượt trội). Lộ trình lên vị trí quản lý cụ thể, rõ ràng hơn 100 cơ sở và đang mở rộng trên toàn quốc.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:{\"skillName\":\"Tư Vấn Tuyển Sinh\",\"skillId\":2210,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Giáo Dục\",\"skillId\":1682,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Chăm Sóc Khách Hàng\",\"skillId\":354,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Tuyển Sinh\",\"skillId\":1897,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Sales\",\"skillId\":987777,\"skillWeight\":100,\"isExisted\":false}\n2a:[\"$2b\",\"$2c\",\"$2d\",\"$2e\",\"$2f\"]\n31:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"Thu nhập cạnh tranh trong thị trường giáo dục: Từ 15 triệu – 35 triệu VNĐ/tháng. Trong đó: Lương cứng từ 7-8tr – 13tr/tháng theo năng lực + Lương kinh doanh/thưởng hoa hồng + Thưởng nóng\"}\n32:{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"Hưởng tất cả các chế độ BHXH, BHYT, BHTN, chế độ 12 ngày nghỉ phép năm có lương (đủ thâm niên cộng thêm 1 ngày phép, nghỉ hiếu/hỉ thêm từ 1-3 ngày),.. và các chế độ khác theo quy định pháp luật ngay khi ký HĐLĐ chính thức\"}\n33:{\"benefitId\":15,\"benef m học viên. Bên cạnh hoạt động đào tạo, IMAP chú trọng đẩy mạnh các hoạt động/sự kiện/dự án cộng đồng với tinh thần sẵn sàng sẻ chia, trao đi giá trị, lan tỏa niềm đam mê ngôn ngữ và những giá trị học thuật tới người học tiếng Anh trên cả nước. \r\nNhững con số nổi bật: \r\n100+ cơ sở đào tạo trải rộng khắp các tỉnh, thành lớn trên cả nước\r\n2000+ nhân sự \r\n350+ đối tác doanh nghiệp, truyền thông, trường học\r\n1.000.000+ học viên\r\nTầm nhìn\r\nTrở thành Tập đoàn giáo dục hàng đầu Việt Nam về đào tạo ngôn ngữ và kỹ năng.\r\nSứ mệnh\r\nGiúp 10 triệu người Việt tự tin nói tiếng Anh\r\nIMAP hướng tới mục tiêu đào tạo toàn diện theo triết lý M-K-S: Học viên không chỉ được bồi dưỡng về năng lực ngôn ngữ tiếng Anh (Knowledge) mà còn được mài giũa tư duy, tâm thế học tập (Mindset) và rèn luyện kỹ năng mềm (Skills) để dễ dàng chạm tay tới thành công.\r\nIMAP mong muốn chắp cánh cho khát khao chinh phục tiếng Anh của người Việt, giúp họ tự tin giao tiếp tiếng Anh, đạt mục tiêu về điểm số TOEIC, IELTS, từ đó mở rộng cơ hội việc làm và tiến đến những nấc thang cao hơn trong sự nghiệp.\r\nIMAP sẽ tiếp tục nâng cao năng lực đáp ứng nhu cầu học Anh ngữ của đa dạng đối tượng học viên.\r\nGiá trị cốt lõi\r\nIMAP xây dựng, duy trì và phát triển bản sắc văn hóa thông qua năm giá trị cốt lõi:\r\nTận tâm phục vụ \r\nTrách nhiệm kỷ luật \r\nChính trực thẳng thắn \r\nĐổi mới sáng tạo \r\nDám nghĩ dám làm\r\n—--------------\r\nOUR PEOPLE\r\nChị Nguyễn Thị Hoa - Nhà sáng lập, Chủ tịch HĐQT IMAP Việt Nam\r\nChị Nguyễn Thị Hoa (thường được gọi là Ms Hoa) mang trong mình khát khao truyền cảm hứng ngôn ngữ, giúp học trò Việt nuôi dưỡng tình yêu tiếng Anh. Ms Hoa luôn nói với học viên và nhân viên rằng tiếng Anh là công cụ để khám phá kiến thức, giúp mỗi người mở rộng góc nhìn, thế giới quan, tự tin hội nhập và bước ra thế giới rộng lớn. Học tiếng Anh nói riêng và ngoại ngữ nói chung là hành trình khám phá về con người mới, miền đất mới; thông qua ngôn ngữ, chúng ta thấy được sự khác biệt về tư duy và văn hóa của người bản xứ. \r\nMs Hoa đã trao truyền cho đội ngũ giáo viên triết lý đào tạo và phương pháp giảng dạy mà chị dày công nghiên cứu trong suốt 10 năm qua. \r\nTriết lý M-K-S hướng tới mục tiêu đào tạo toàn diện: \r\nM - Mindset (Tư duy, tâm thế)\r\nK - Knowledge (Kiến thức)\r\nS - Skills (Kỹ năng)\r\nPhương pháp đào tạo RIPL: \r\nR - Refined Knowledge: Tính chắt lọc kiến thức\r\nI - Inspiration: Tính truyền cảm hứng\r\nP - Practice: Tính thực hành ngôn ngữ\r\nL - Logic: Tính logic, chặt chẽ\r\n—----------------\r\nOUR BENEFITS \r\nChế độ đãi ngộ\r\nNhân viên IMAP được hưởng chế độ đãi ngộ đầy đủ và thu nhập hấp dẫn:\r\n- Thu nhập gồm: lương cơ bản, phụ cấp, thưởng KPI công việc, thưởng doanh số\r\n- Thưởng quý; thưởng ngày lễ, tết\r\n- Lương tháng 13\r\n- Bảo hiểm xã hội, Bảo hiểm y tế, Bảo hiểm thai sản\r\n- Team building/du lịch hàng năm\r\nĐào tạo\r\nNhân viên IMAP trải qua các kỳ đào tạo sau:\r\n- Đào tạo hội nhập: Làm quen với văn hóa doanh nghiệp\r\n- Đào tạo chuyên môn, kỹ năng: Củng cố, nâng cao năng lực làm việc\r\nThông qua các kỳ đào tạo thường xuyên, nhân viên IMAP có cơ hội phát hiện tiềm năng bản thân; phát triển tư duy, kiến thức, kỹ năng phục vụ công việc; lắng nghe lời khuyên, chia sẻ từ cấp lãnh đạo và quản lý để phát huy điểm mạnh, khắc phục điểm yếu. \r\nMôi trường làm việc\r\nIMAP luôn nỗ lực tạo dựng môi trường làm việc cởi mở, chuyên nghiệp. Từ cơ sở vật chất đến văn hóa ứng xử, các quy trình làm việc,… đều được chú trọng xây dựng và phát triển theo thời gian để đội ngũ CBNV vững tâm, tin tưởng, phát huy tối đa năng lực, sáng tạo không ngừng, tạo dựng sự nghiệp và đóng góp giá trị vì mục tiêu chung. \r\nCơ hội phát triển\r\nNhân viên IMAP có cơ hội thử sức với các vị trí và line công việc khác nhau, phù hợp với năng lực và định hướng phát triển cá nhân. \r\nNhững nhân viên ưu tú, có năng lực tốt được đào tạo chuyên sâu và cân nhắc bổ nhiệm vào các vị trí quản lý cấp trung, cấp cao."])</script><style data-styled="" data-s
