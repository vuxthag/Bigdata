atic/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T923,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng kế hoạch, ngân sách mua hàng và xuất nhập khẩu hàng hóa.\u003c/p\u003e\u003cp\u003e• Tư vấn tiến độ nhập hàng.\u003c/p\u003e\u003cp\u003e• Kiểm soát số lượng hàng tồn kho và đề xuất lại số lượng đặt hàng.\u003c/p\u003e\u003cp\u003e• Thường xuyên nghiên cứu thị trường về xu hướng phát triển sản phẩm/công nghệ, biến động giá cả.\u003c/p\u003e\u003cp\u003e• Tổ chức thực hiện các nhiệm vụ mua sắm của Phòng.\u003c/p\u003e\u003cp\u003e• Triển khai giao việc hợp lý và hiệu quả tới nhân viên.\u003c/p\u003e\u003cp\u003e• Tổ chức thực hiện mời chào giá, mời thầu với các đơn hàng theo quy định áp dụng của Tập đoàn.\u003c/p\u003e\u003cp\u003e• Tổ chức và thực hiện đàm phán giá và các điều kiện thương mại với các Nhà cung cấp về đơn hàng đặt mua.\u003c/p\u003e\u003cp\u003e• Đánh giá, lựa chọn phương án chào giá và Nhà cung cấp tối ưu để thực hiện ký kết hợp đồng.\u003c/p\u003e\u003cp\u003e• Chủ trì giải quyết các yêu cầu pháp lý có liên quan đến lô hàng xuất nhập khẩu, sau khi đã hoàn thành thủ tục Hải quan (Kiểm tra sau thông quan).\u003c/p\u003e\u003cp\u003e• Chịu trách nhiệm trước BLĐ về tiến độ, chất lượng toàn bộ các công việc được phân công thực hiện của Phòng.\u003c/p\u003e\u003cp\u003e• Kiểm tra, phê duyệt nội dung các hợp đồng/PO, hồ sơ thanh toán, hoàn ứng do Trưởng nhóm/CV Vật tư thực hiện và giám sát việc ký cũng như thực hiện các hợp đồng/ đơn hàng theo quy định của Tập đoàn.\u003c/p\u003e\u003cp\u003e• Kiểm soát và xây dựng ngân hàng giá dựa trên dữ liệu giá đã được duyệt và giá tham khảo trên thị trường.\u003c/p\u003e\u003cp\u003e• Xây dựng kế hoạch đào tạo, đào tạo huấn luyện nhân viên nâng cao kỹ năng trong công việc.\u003c/p\u003e\u003cp\u003e• Xây dựng tiêu chí và thực hiện việc đánh giá hiệu quả thực hiện công việc của các thành viên trong phòng.\u003c/p\u003e\u003cp\u003e• Tham mưu cho BLĐ, các đơn vị về thị trường, các NCC uy tín trong và ngoài nước, các loại vật tư, vật liệu, dịch vụ tốt đáp ứng yêu cầu của Tập doàn.\u003c/p\u003e\u003cp\u003e• Thực hiện chế độ báo cáo thường xuyên và đột xuất theo quy định.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tb63,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Học vấn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học các chuyên ngành: Kinh tế, Kế toán, Tài chính, Đầu tư, Quản trị Kinh doanh, Kinh tế đối ngoại\u003c/p\u003e\u003cp\u003e• Ưu tiên các trường: Đại học Ngoại thương, Đại học Kinh tế Quốc dân, Đại học Thương mại hoặc tương đương\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Trên 8 năm kinh nghiệm ở vị trí Trưởng phòng Mua hàng\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm trong nhiều lĩnh vực: Xây dựng, Bất động sản, Dịch vụ, Máy móc thiết bị, Nguyên vật liệu, Hóa chất\u003c/p\u003e\u003cp\u003e• Am hiểu sâu về quy trình, thủ tục xuất nhập khẩu\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có kiến thức chuyên sâu về nghiệp vụ ngoại thương và quy trình, thủ tục xuất nhập khẩu.\u003c/p\u003e\u003cp\u003e• Hiều rõ về các Luật, Nghị định, Thông tư văn bản liên quan đến lĩnh vực được giao;\u003c/p\u003e\u003cp\u003e• Có kỹ năng giao tiếp và đàm phán tốt. Có khả năng tổng hợp, phân tích sự kiện và khả năng giải quyết tình huống tốt.\u003c/p\u003e\u003cp\u003e• Có khả năng bao quát, quản lý và điều hành hoạt động của các bộ phận do mình quản lý;\u003c/p\u003e\u003cp\u003e• Có năng lực tổ chức và quản lý công việc, chủ động đưa ra các giải pháp để xử lý các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e• Chủ động báo cáo kịp thời, xin ý kiến chủ trương của Ban Lãnh đạo để giải quyết nhanh chóng các vướng mắc trong công việc.\u003c/p\u003e\u003cp\u003e• Chủ động phối hợp, thúc đẩy các Phòng Ban liên quan để công việc được giải quyết triệt để\u003c/p\u003e\u003cp\u003e• Linh hoạt trong cách thức tiếp cận và trao đổi, đồng thời vẫn quyết liệt để đảm bảo các giải pháp đã thống nhất được giải quyết triệt để;\u003c/p\u003e\u003cp\u003e• Có khả năng kết nối được các bên liên quan, kết nối được đội ngũ, đào tạo và phát triển được đội ngũ;\u003c/p\u003e\u003cp\u003e• Có kiến thức chuyên sâu về quan hệ lao động và am hiểu tâm lý con người, xử lý thông tin và tư duy logic, kỹ năng xử lý xung đột;\u003c/p\u003e\u003cp\u003e• Kỹ năng nắm bắt xu thế của thị trường và đưa ra các dự báo.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Trình độ ngoại ngữ:\u003c/strong\u003e Tiếng Anh tốt 4 kỹ năng: Nghe – Nói – Đọc – Viết (Trình độ tương đương TOEIC ≥ 650)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Trình độ tin học:\u003c/strong\u003e Thành thạo tin học văn phòng (Word, Excel, PowerPoint…)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Trung thực, thẳng thắn, trách nhiệm cao\u003c/p\u003e\u003cp\u003e• Nhanh nhẹn, tự tin, quyết đoán\u003c/p\u003e\u003cp\u003e• Nhiệt tình, tâm huyết với công việc\u003c/p\u003e\u003cp\u003e• Có tố chất lãnh đạo, khả năng làm gương\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tb53,"])</script><script>self.__next_f.push([1,"1. Chiến lược nhân sự\r\nThúc đẩy và tạo điều kiện cho mỗi cá nhân trở thành thành viên tích cực trong việc xây dựng và phát triển tập đoàn.\r\n2. Chính sách phát triển nhân lực\r\nĐặt vị trí nhân sự vào đúng vai trò để phát huy tối đa kỹ năng nghiệp vụ\r\nĐảm bảo công bằng và hợp lý trong chi trả lương cho người lao động, tạo tính cạnh tranh trong việc thu hút nguồn lực bên ngoài và nguồn lực bên trong\r\nCải tiến phương thức làm việc, đảm bảo tính chuyên nghiệp cao trong môi trường làm việc.\r\nTin học hóa các quy trình làm việc, áp dụng các phần mềm hiện đại để nâng cao hiệu quả công việc.\r\n3. Chính sách tuyển dụng\r\nTạo môi trường làm việc năng động, các chính sách đãi ngộ phúc lợi, hệ thống lương thưởng xứng đáng với cống hiến của nhân viên.\r\nThu hút nguồn nhân lực cao cấp và các chuyên gia được đào tạo ở nước ngoài.\r\n4. Chính sách đào tạo\r\nKế hoạch đào tạo bồi dưỡng nâng cao trình độ nguồn nhân lực, đón đầu các thách thức trong tương lai.\r\n5. Chính sách phát triển và quản lý nhân lực\r\nLập kế hoạch phát triển nguồn nhân lực, phân tích công việc, tuyển dụng, đào tạo, bố trí sắp xếp nhân lực, tiền lương và các chính sách phúc lợi...\r\nTiến hành phân tích tình trạng nguồn nhân lực thường xuyên để đánh giá và cơ cấu lại sơ đồ tổ chức – hoạt động trong từng giai đoạn nhằm đảm bảo hệ thống luôn trong trạng thái hoạt động hiệu quả nhất.\r\nLuôn nâng cao cơ cấu tổ chức và hoạt động, tạo tính năng động trong sự phát triển của Công ty nhằm tạo sự hứng khởi trong công việc của từng nhân viên, tạo tính cạnh tranh lành mạnh trong từng vị trí công việc để mọi nhân viên có thể phát huy tối đa năng lực của bản thân.\r\n6. Chính sách lương, thưởng, lợi nhuận\r\nThực hiện các chính sách đãi ngộ, phúc lợi, khen thưởng hợp lý để tạo điều kiện gắn bó lâu dài của nhân viên với Công ty.\r\nTạo môi trường làm việc năng động, thân thiện với một nét văn hoá BIM.\r\nXây dựng và phát triển các các chính sách đề bạt - thăng tiến cho nhân viên tạo động lực phấn đấu và phát huy hết năng lực của mỗi cá nhân.\r\nTổ chức các chuyến tham quan du lịch, các phong trào thể dục thể thao theo định kỳ tạo điều kiện cho tất cả nhân viên có cơ hội giao lưu học hỏi, cũng như vui chơi giả trí để tái tạo lại sức lao động."])</script><script>self.__next_f.push([1,"28:T923,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng kế hoạch, ngân sách mua hàng và xuất nhập khẩu hàng hóa.\u003c/p\u003e\u003cp\u003e• Tư vấn tiến độ nhập hàng.\u003c/p\u003e\u003cp\u003e• Kiểm soát số lượng hàng tồn kho và đề xuất lại số lượng đặt hàng.\u003c/p\u003e\u003cp\u003e• Thường xuyên nghiên cứu thị trường về xu hướng phát triển sản phẩ át huy tối đa kỹ năng nghiệp vụ\r\nĐảm bảo công bằng và hợp lý trong chi trả lương cho người lao động, tạo tính cạnh tranh trong việc thu hút nguồn lực bên ngoài và nguồn lực bên trong\r\nCải tiến phương thức làm việc, đảm bảo tính chuyên nghiệp cao trong môi trường làm việc.\r\nTin học hóa các quy trình làm việc, áp dụng các phần mềm hiện đại để nâng cao hiệu quả công việc.\r\n3. Chính sách tuyển dụng\r\nTạo môi trường làm việc năng động, các chính sách đãi ngộ phúc lợi, hệ thống lương thưởng xứng đáng với cống hiến của nhân viên.\r\nThu hút nguồn nhân lực cao cấp và các chuyên gia được đào tạo ở nước ngoài.\r\n4. Chính sách đào tạo\r\nKế hoạch đào tạo bồi dưỡng nâng cao trình độ nguồn nhân lực, đón đầu các thách thức trong tương lai.\r\n5. Chính sách phát triển và quản lý nhân lực\r\nLập kế hoạch phát triển nguồn nhân lực, phân tích công việc, tuyển dụng, đào tạo, bố trí sắp xếp nhân lực, tiền lương và các chính sách phúc lợi...\r\nTiến hành phân tích tình trạng nguồn nhân lực thường xuyên để đánh giá và cơ cấu lại sơ đồ tổ chức – hoạt động trong từng giai đoạn nhằm đảm bảo hệ thống luôn trong trạng thái hoạt động hiệu quả nhất.\r\nLuôn nâng cao cơ cấu tổ chức và hoạt động, tạo tính năng động trong sự phát triển của Công ty nhằm tạo sự hứng khởi trong công việc của từng nhân viên, tạo tính cạnh tranh lành mạnh trong từng vị trí công việc để mọi nhân viên có thể phát huy tối đa năng lực của bản thân.\r\n6. Chính sách lương, thưởng, lợi nhuận\r\nThực hiện các chính sách đãi ngộ, phúc lợi, khen thưởng hợp lý để tạo điều kiện gắn bó lâu dài của nhân viên với Công ty.\r\nTạo môi trường làm việc năng động, thân thiện với một nét văn hoá BIM.\r\nXây dựng và phát triển các các chính sách đề bạt - thăng tiến cho nhân viên tạo động lực phấn đấu và phát huy hết năng lực của mỗi cá nhân.\r\nTổ chức các chuyến tham quan du lịch, các phong trào thể dục thể thao theo định kỳ tạo điều kiện cho tất cả nhân viên có cơ hội giao lưu học hỏi, cũng như vui chơi giả trí để tái tạo lại s
