"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T8c4,"])</script><script>self.__next_f.push([1,"Thành lập từ năm 2003, Ecopark tiền thân là Công ty Cổ phần đầu tư và phát triển đô thị Việt Hưng (VIHAJICO). Với sứ mệnh xây dựng một khu đô thị sinh thái chức năng đầu tiên ở Việt Nam theo xu hướng phát triển đô thị xanh, hiện đại, VIHAJICO đã xây dựng dự án Khu đô thị Ecopark.\r\n\r\nSau hơn 15 năm phát triển, Khu đô thị Ecopark đã trở thành một thành phố chức năng kiểu mẫu, tiên phong xác lập xu hướng Bất động sản Xanh với giá cả hợp lý, được quốc tế tôn vinh với nhiều giải thưởng danh giá. Ban lãnh đạo công ty đã quyết định thay đổi tên thành Công ty Cổ phần Tập đoàn Ecopark, hướng tới mục tiêu phát triển bền vững, đầu tư đa ngành vào các lĩnh vực như giáo dục, y tế, nông nghiệp sạch, công nghệ cao, du lịch, vui chơi giải trí…; đồng thời vẫn giữ vững vị thế chủ chốt là Tập đoàn đầu tư và phát triển đô thị chuyên nghiệp theo xu hướng Bất động sản Xanh, mở rộng phát triển mô hình đô thị Ecopark trên địa bàn cả nước.\r\n\r\nVới 4 Giá trị cốt lõi: Tín nhiệm, Vượt trội, Cùng nhau thành công, Bền vững; Ecopark chú trọng vào việc xây dựng và hình thành một đội ngũ nhân sự hành xử chính trực, có trách nhiệm, vượt trội trong mọi lĩnh vực hoạt động, luôn đổi mới sáng tạo, khát khao chinh phục những tầm cao mới.\r\n\r\nĐể góp phần vào sự phát triển bền vững cho những năm tiếp theo, đưa Ecopark gần hơn tới tầm nhìn trở thành doanh nghiệp hàng đầu tại Việt Nam và khu vực trong lĩnh vực đầu tư bất động sản và phát triển đô thị sinh thái thông minh, Ecopark luôn tìm kiếm những đồng đội trẻ, nhiệt huyết, tràn đầy đam mê trong công việc. Hãy theo dõi Fanpage: Tuyển dụng
