ntends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T16b1,"])</script><script>self.__next_f.push([1,"Công ty TNHH Doosan Enerbility Việt Nam (Doosan Vina) là một khu phức hợp công nghiệp có vốn đầu tư 300 triệu đô trên 100 hecta đất tại KKT Dung Quất, tỉnh Quảng Ngãi. Doosan Vina chuyên sản xuất thiết bị cho các nhà máy điện, cẩu trục cho các cảng biển, thiết bị khử muối nước biển thành nước ngọt, thiết bị xử lý nhiên liệu thô, mô-đun và kết cấu thép cho các công trình công nghiệp và sắp tới là các sản phẩm điện gió ngoài khơi.\r\n\r\nTháng 11/2006 Doosan Vina được cấp chứng nhận đầu tư và chính thức khánh thành vào tháng 5/2009. Tháng 02/2009 chuyến hàng đầu tiên đã được xuất khẩu ra thế giới, mở đầu cho sự hình thành và phát triển của Doosan Vina.\r\n\r\nTính đến nay, Doosan Vina đã hoàn thành 398 dự án có tổng trọng lượng hơn 580.000 tấn với tổng giá trị đơn hàng hơn 3 tỉ đô la Mỹ và những sản phẩm này hiện đang hoạt động tại 35 quốc gia trên toàn cầu.\r\n\r\nVề lò hơi, chúng tôi đã và đang cung cấp tổng cộng 20,000MW điện cho các nhà máy nhiệt điện ở Ấn Độ, Brazil, Ả rập Xê út, Ai Cập, Nhật Bản, Indonesia và tại Việt Nam gồm Mông Dương 2 (1200MW), Vĩnh Tân 4 (1.200MW), Vĩnh Tân 4 Mở rộng (600MW), Sông Hậu 1 (1.200MW), Nghi Sơn 2 (1.330MW) và Vân Phong 1 1,320MW. Hiện tại, chúng tôi đang xây dựng nhà máy nhiệt điện Vũng Áng 2 (1.330MW).\r\n\r\nVề cẩu trục cảng biển, Doosan Vina đã và đang cung ứng 105 cẩu trục cho các cảng sầm uất thế giới như PSA Singapore, JNPT và BMCT Ấn Độ, Samarinda Indonesia, Saudi Global Port Ả-rập Xê-út và tại Việt Nam gồm có Tân cảng Sài Gòn, cảng Đà Nẵng, cảng nhà máy Lọc Dầu Nghi Sơn, cảng Gemalink, cảng Nam Đình Vũ và sắp tới là cảng Chu Lai và cảng BMCTPL giai đoạn 2.\r\n\r\nVề module, chúng tôi đã và đang sản xuất 122 mô-đun cho các khách hàng quốc tế, bao gồm 39 mô-đun để lắp đặt tại Nhà máy lọc dầu Ruwais ở UAE, 35 mô-đun cho Nhà máy Sarawak Methanol ở Malaysia cho khách hàng Samsung Engineering và 26 mô-đun cho dự án Chưng cất mủ cao su để sản xuất găng tay y tế tại Trung tâm OUE, Singapore cho khách hàng DL E\u0026C. Hiện nay, chúng tôi đang sản xuất thêm 18 mô-đun cho DL E\u0026C để lắp đặt tại dự án Golden Triangle Polymers ở Taxas, Mỹ và 04 mô-đun cho Samsung C\u0026T để lắp đặt tại dự án North Field Expansion Project EPC-2, Qatar.\r\n\r\nVề kết cấu thép, Doosan Vina đã cung ứng 155.300 tấn sản phẩm phục vụ cho việc xây dựng các nhà máy nhiệt điện như Mông Dương 2, Vĩnh Tân 4, Vĩnh Tân 4 Mở rộng, Sông Hậu 1, Nghi Sơn 2, Vân Phong 1 và Vũng Áng 2 tại Việt Nam, Cochrane FGD tại Chile và IHI KP2 Project Coal Bunker tại Nhật Bản.\r\n\r\nVề thiết bị khử mặn, chúng tôi tự hào là nhà cung cấp thiết bị khử mặn cho Các tiểu vương quốc Ả rập thống nhất; Chile, Ả rập Xê Út, Iraq, Kuwait và Bahrain. Các thiết bị nặng gần 4.500 tấn và cao gần bằng một tòa nhà 5 tầng có thể cung cấp 776 triệu lít nước sạch và đáp ứng nhu cầu sử dụng của gần 2,5 triệu người dân mỗi ngày.\r\n\r\nVề thiết bị đốt nóng nhiên liệu thô, Doosan Vina cũng đã cung cấp gần 4.600 tấn thành phần cấu thành thiết bị đốt nóng nhiên liệu thô cho Nhà máy Lọc dầu Thai Oil và 600 tấn cho nhà máy lọc dầu Sriracha tại Thái Lan.\r\n\r\nĐồng thời, chúng tôi đang tiến vào thị trường chân đế điện gió ngoài khơi, khởi đầu bằng việc ký Biên bản ghi nhớ hợp tác với Tập đoàn điện gió hàng đầu thế giới, Orsted để phát triển chuỗi cung ứng chân đế điện gió ngoài khơi tại Việt Nam cho các dự án của Orsted ở Đông Nam Á, Châu Á Thái Bình Dương và Châu Âu.\r\n\r\nSong hành cùng sản xuất, Doosan Vina luôn chú trọng thực thi trách nhiệm xã hội, tập trung vào đời sống, môi trường và giáo dục, bởi đây là những nền tảng cơ bản cho một cộng đồng phát triển vững mạnh. Chúng tôi phối hợp cùng Bệnh viện ĐH Chung Ang đã khám, phát thuốc, phẫu thuật miễn phí tim bẩm sinh, sứt môi hở hàng ếch, đục thủy tinh thể, bệnh sản phụ khoa cho gần 31.500 người dân, tặng thiết bị y tế và chuyển giao kỹ thuật cho đội ngũ y bác sĩ địa phương. Doosan Vina cũng tiến hành các chương trình từ thiện xã hội khác như trao tặng học bổng, sửa chữa trường học, nâng cấp nhà ở và đáng chú ý là việc trao tặng gói thiết bị khử mặn trị giá 20 tỉ đồng cho người dân đảo An Bình.\r\n\r\nSong hành cùng phát triển kinh doanh, Doosan Vina còn làm tốt vai trò cầu nối, đưa các doanh nghiệp FDI Hàn Quốc khác đến với Việt Nam, thúc đẩy ngành cơ khí trong nước bằng cách nội địa hóa sản phẩm, chuyển giao công nghệ và chia sẻ kinh nghiệm cho các công ty địa phương.\r\n\r\nPhương châm \"Xây dựng ngày mai của bạn hôm nay\" là một kim chỉ nam chạy xuyên suốt mọi hoạt động của chúng tôi và là cam kết của chúng tôi với khách hàng, nhân viên và đất nước Việt Nam. Năng lượng hướng tới sự bền vững, Doosan Enerbility Việt Nam!"])</script><script>self.__next_f.push([1,"24:T558,\u003cp\u003e-\tTốt nghiệp Đại học, chuyên ngành tiếng Hàn.\u003c/p\u003e\u003cp\u003e-\tCó chứng chỉ TOPIK cấp 5 hoặc cấp 6, và có khả năng giao tiếp lưu loát bằng tiếng Hàn.\u003c/p\u003e\u003cp\u003e-\tCó kỹ năng giao tiếp tốt, làm việc cẩn thận và nhanh nhẹn trong công việc.\u003c/p\u003e\u003cp\u003e-\tSử dụng thành thạo tin học văn phòng.\u003c/p\u003e\u003cp\u003e-\tƯu tiên ứng viên đã có kinh nghiệm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstron
