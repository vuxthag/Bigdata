roduct released to manufacture.\u003c/p\u003e\u003cp\u003e• Develops and administers a Plant Equipment system that includes policies, processes, design, program and procedures assuring that AUTOLIV VIETNAM products and quality will satisfy our customer expectations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Position Scope:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Supervised all implementation items in to plant operation and coordinate all activities to ensure accurate, timely and process documentation.\u003c/p\u003e\u003cp\u003e• Supervised the machine maintenance \u0026 development to improve machine down time that included provide technical training in term of machine functional \u0026 concept to maintenance supervisor, leader and technician to ensure that they are understanding exactly of machine functional.\u003c/p\u003e\u003cp\u003e• Supervised overall plant facilities to support all activities to meet the target building, electrical supply, water supply, air supply in good environment and safety.\u003c/p\u003e\u003cp\u003e• To support plant capacity base on marketing and planning forecast information and install new production line in proper plant lay-out with APS concept.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Task \u0026 Responsibility:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Supervises drafting and products engineering functions.\u003c/p\u003e\u003cp\u003e• Participates in the development and implementation of systems designed to enhance the quality of\u003c/p\u003e\u003cp\u003eengineering services.\u003c/p\u003e\u003cp\u003e• Oversees the order launch process.\u003c/p\u003e\u003cp\u003e• Ensures jobs are prepared for manufacturing within required time frame.\u003c/p\u003e\u003cp\u003e• Develops the associated engineering issues and Machine specifications.\u003c/p\u003e\u003cp\u003e• Supervises engineering support to production on all aspects of product design, development, costing, application, ETC.\u003c/p\u003e\u003cp\u003e• Initiates activities to improve engineering support to customers and other departments through the use and application of technology, education/ training, communication, and engineering\u003c/p\u003e\u003cp\u003e• Coordinates continuous improvement activities/programs with employees.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T6c4,\u003cp\u003e\u003cstrong\u003e4. Key Challenges \u0026 Problem Solving\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Understanding APS system and Implementation to VNQN within target.\u003c/p\u003e\u003cp\u003e• MDP implementation and maintain.\u003c/p\u003e\u003cp\u003e• Process control base on Autoliv Standard requirement.\u003c/p\u003e\u003cp\u003e• Achieve APDS target within product’s transfer time plan.\u003c/p\u003e\u003cp\u003e• Improvement Internal \u0026 Customer PPM and maintaining.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.Key Relationships (Internal \u0026 External)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Technical requirement daily\u003c/p\u003e\u003cp\u003e• APDS project follow up Weekly\u003c/p\u003e\u003cp\u003e• AMC Machine down time reduction Weekly\u003c/p\u003e\u003cp\u003e• Finance Tooling Payment, M/C depreciation Monthly\u003c/p\u003e\u003cp\u003e• Finance Budget Plan and control.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Key Selection Criteria / Education and Experience Requirements:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Bachelor's degree or master’s degree in Mechanical Engineering / Electrical Engineering, Industrial Engineering with a strong background in Equipment Engineering.\u003c/p\u003e\u003cp\u003e• Experience must be in the five to ten-years category with diversified work experience in the abovereferenced categories.\u003c/p\u003e\u003cp\u003e• With a strong background in IATF TS16949/ ISO14001 management.
