 mẫu VPBanker lý tưởng với 04 phương diện phát triển toàn diện gồm: Thịnh vượng Thân trí, Thịnh vượng Tinh thần, Thịnh vượng Tài chính và Thịnh vượng Cộng đồng. Đây là sự cam kết từ VPBank trong chiến lược Home of Talents - đặt Con người làm trung tâm và không ngừng nỗ lực tạo những điều kiện thuận lợi để từng nhân viên có thể phát triển tốt nhất cùng ngân hàng. Đây cũng là một phần của chiến lược bền vững đưa VPBank trở thành doanh nghiệp kiểu mẫu đáng tin cậy, xây dựng một môi trường làm việc hiệu quả, nhân văn, thu hút nhân tài và phát triển mỗi VPBanker trở thành phiên bản tốt nhất của chính mình.\r\n\r\n1. Thịnh vượng Thân trí: Hai yếu tố “trí tuệ” và “thể chất” luôn song hành và bổ trợ cho nhau trong chân dung Con người Thịnh vượng. VPBank luôn chú trọng đến việc: \r\n•\tXây dựng một môi trường làm việc lành mạnh\r\n•\tChăm sóc sức khỏe, khích lệ tinh thần luyện tập thể thao của CBNV\r\n•\tĐề cao văn hóa học tập, phát triển kỹ năng, cổ vũ và hỗ trợ cho sự học trọn đời của từng nhân viên.\r\n\r\n2. Thịnh vượng Tinh thần: VPBank ý thức được tầm quan trọng của đời sống tinh thần, sức mạnh của những suy nghĩ tích cực và lợi ích của sự cân bằng về cảm xúc đối với từng nhân viên. VPBank tập trung nỗ lực để:\r\n•\tKiến tạo môi trường làm việc công bằng, cởi mở, nhân văn.\r\n•\tĐồng hành và chia sẻ với CBNV thông qua chính sách, chương trình chăm sóc CBNV và người thân.\r\n\r\n3. Thịnh vượng Tài chính: VPBank ý thức rằng một nền tảng tài chính vững chắc sẽ mang lại chất lượng cuộc sống tốt hơn cho các VPBanker. VPBank luôn đảm bảo: \r\n•\tXây dựng chính sách về lương, thưởng phúc lợi, lộ trình thăng tiến rõ ràng, hấp dẫn.\r\n•\tGhi nhận xứng đáng mọi nỗ lực và cống hiến của CBNV.\r\n\r\n4. Thịnh vượng Cộng đồng: Mỗi VPBanker là một phần của xã hội, những đóng góp, nỗ lực của chính bản thân các VPBanker sẽ góp phần thay đổi và tạo nên một xã hội tốt đẹp hơn. Từ phía tổ chức, VPBank luôn xem trọng và hành động để thực hiện:\r\n•\tTrách nhiệm của doanh nghiệp với cộng đồng và xã hội. \r\n•\tThường xuyên thực hiện những chương trình, sáng kiến nhằm góp phần giúp cho xã hội, đất nước ngày một giàu đẹp, văn minh hơn."])</script><script>self.__next_f.push([1,"24:T862,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Tốt nghiệp Đại học trở lên chuyên ngành Tài chính, Ngân hàng, Kinh tế, Ngoại thương…\u003c/p\u003e\u003cp\u003e- Tối thiểu 04 năm trong lĩnh vực thẩm định/tái thẩm định/quản trị rủi ro tại Ngân hàng, mảng KHDN lớn\u003c/p\u003e\u003cp\u003e- Am hiểu các quy định của pháp luật về ngân hàng và doanh nghiệp, các chính sách, quy định, sản phẩm của ngân hàng cho KHDN lớn;\u003c/p\u003e\u003cp\u003e- Am hiểu về phân tích tài chính, thẩm định, quản trị rủi ro tín dụng.\u003c/p\u003e\u003cp\u003e- Có hiểu biết tổng quan về kinh tế, ngành nghề sản xuất kinh doanh, thị trường, hoạt động kinh doanh của khách hàng trong danh mục quản lý\u003c/p\u003e\u003cp\u003e- Tổng hợp và phân tích thông tin/ dữ liệu (đặc biệt các dữ liệu tài chính)\u003c/p\u003e\u003cp\u003e- Đọc và phân tích báo cáo tài chính/ báo cáo quản trị\u003c/p\u003e\u003cp\u003e- Giao tiếp và truyền đạt thông tin hiệu quả\u003c/p\u003e\u003cp\u003e- Phân tích và giải quyết vấn đề\u003c/p\u003e\u003cp\u003e- Tiếng anh giao tiếp tốt là lợi thế\u003c/p\u003e\u003cp\u003e- Có khả năng sử dụng mô hình phân tích tài chính, làm việc nhóm, tự quản lý\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thu nhập hấp dẫn, lương thưởng cạnh tranh theo năng lực;\u003c/p\u003e\u003cp\u003e- Thưởng các Ngày lễ, Tết (theo chính sách ngân hàng từng thời kỳ);\u003c/p\u003e\u003cp\u003e- Được vay ưu đãi theo chính sách ngân hàng từng thời kỳ;\u003c/p\u003e\u003cp\u003e- Chế độ ngày phép hấp dẫn theo cấp bậc công việc;\u003c/p\u003e\u003cp\u003e- Bảo hiểm bắt buộc theo luật lao động + Bảo hiểm VPBank care cho CBNV tùy theo cấp bậc và thời gian công tác;\u003c/p\u003e\u003cp\u003e- Được tham gia
