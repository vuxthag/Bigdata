ự phát triển bền vững và trường tồn. Đó là lí do vì sao ở Apec luôn dành tình yêu lớn cho những công việc dù là nhỏ nhất, không bao giờ làm những việc \"tốt\", phải làm những điều \"vĩ đại\". \r\n\r\nDoanh nghiệp hạnh phúc\r\n\r\nVới mong muốn xây dựng “công ty hạnh phúc”, Apec Group tạo nên một không gian, một môi trường làm việc mà ở đó mọi người cùng chia sẻ chung triết lý vị nhân sinh sâu sắc, cùng nghĩ những điều lớn lao nhưng tập trung từng bước làm những điều cụ thể hàng ngày để phát triển cộng đồng, xã hội, xây dựng đất nước.\r\n\r\nNhững nét “văn hóa hạnh phúc” tại Apec Group:\r\n•\tVăn hóa chia sẻ “cho” và “nhận” theo triết lý Đạo Phật\r\n•\tVăn hóa tập thể dục, morning talk và hô đồng khởi mỗi buổi sáng\r\n•\tVăn hóa đọc sách \r\n•\tVăn hóa thể dục thể thao\r\n•\tVăn hóa sáng tạo\r\n•\tVăn hóa kỷ luật\r\n•\tVăn hóa khởi nghiệp\r\n\r\nhttps://apecgroup.net/"])</script><script>self.__next_f.push([1,"24:T5a9,\u003cp\u003e-\tTốt nghiệp Đại học một trong các chuyên ngành Kết cấu, xây dựng dân dụng;\u003c/p\u003e\u003cp\u003e-\tCó ít nhất 5 năm kinh nghiệm ở vị trí tương tự tại các tập đoàn BĐS - xây dựng lớn;\u003c/p\u003e\u003cp\u003e-\tCó kinh nghiệm quản lý thiết kế các công trình cao tầng - dự án cấp I trở lên;\u003c/p\u003e\u003cp\u003e-\tNắm rõ các nội dung về quy chuẩn - tiêu chuẩn trong nước và quốc tế liên quan đến bộ môn;\u003c/p\u003e\u003cp\u003e-\tAm hiểu các quy định pháp luật về xây dựng, đầu tư;\u003c/p\u003e\u003cp\u003e-\tCó khả năng phối hợp nhóm, chủ động, sáng tạo, hợp tác, kỷ luật, giải quyết vấn đề;\u003c/p\u003e\u003cp\u003e-\tTrung thực, hoạt bát, tư duy logic, tư duy phản biện.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tQuyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tLương thỏa thuận up to 35tr gross, kèm theo phụ cấp ăn trưa 25.000 VNĐ/ngày, với các kỳ xét tăng lương, thưởng lễ tết, lương tháng thứ 13+++\u003c/p\u003e\u003cp\u003e-\tĐược hưởng đầy đủ các chế độ bảo hiểm \u0026
