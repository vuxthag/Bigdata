i nhuận mà còn đầu tư vào các lĩnh vực có ý nghĩa xã hội và môi trường bền vững. Dạ Hợp phát triển với sứ mệnh nâng tầm vị thế người Việt Nam thông qua sản phẩm xanh; cung cấp sản phẩm thân thiện với môi trường với mục tiêu đóng góp bền vững cho cộng đồng và xã hội. Chúng tôi hướng đến một tương lai mà mọi người có thể sống trong một môi trường lành mạnh, được bảo vệ sức khỏe và tự hào về việc đóng góp vào sự phát triển bền vững của xã hội, tự hào là người Việt Nam.\r\n\r\nNhân tài cũng là yếu tố lòng cốt giúp chúng tôi đạt được những sứ mệnh của mình. Hãy gia nhập Dạ Hợp ngay hôm nay để cùng hiện thực hóa giấc mơ của chính mình!"])</script><script>self.__next_f.push([1,"24:T5e3,\u003cp\u003e\u003cstrong\u003e1. Mục tiêu vị trí:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eĐảm bảo cung ứng nhân sự kịp thời, đúng chất lượng cho các phòng ban (70%), đồng thời triển khai hiệu quả chương trình đào tạo hội nhập giúp nhân sự mới nhanh chóng thích nghi, hiểu văn hoá và sẵn sàng làm việc (30%).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Nhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Tuyển dụng (70%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tiếp nhận, phân tích nhu cầu tuyển dụng từ các phòng ban.\u003c/p\u003e\u003cp\u003e- Xây dựng và đăng tin tuyển dụng trên các kênh phù hợp.\u003c/p\u003e\u003cp\u003e- Tìm kiếm, sàng lọc hồ sơ, phỏng vấn sơ bộ ứng viên.\u003c/p\u003e\u003cp\u003e- Phối hợp với quản lý phòng ban tổ chức phỏng vấn chuyên môn.\u003c/p\u003e\u003cp\u003e- Thực hiện kiểm tra tham chiếu, đàm phán offer, gửi thư mời nhận việc.\u003c/p\u003e\u003cp\u003e- Theo dõi ứng viên từ lúc nhận việc đến hết thử việc.\u003c/p\u003e\u003cp\u003e- Xây dựng và phát triển nguồn ứng viên tiềm năng (talent pool).\u003c/p\u003e\u003cp\u003e- Quản lý dữ liệu tuyển dụng, báo cáo tiến độ và hiệu quả tuyển dụng.\u003c/p\u003e\u003cp\u003e- Đề xuất cải tiến quy trình tuyển dụng, nâng cao trải nghiệm
