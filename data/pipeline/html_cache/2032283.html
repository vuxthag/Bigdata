cript>self.__next_f.push([1,"UpBase là Tech-Driven eCommerce Enabler hàng đầu tại Việt Nam và khu vực – Công ty công nghệ đồng hành cùng các thương hiệu và nhà bán lẻ trong hành trình chuẩn hóa, tự động hóa và tăng trưởng trên thương mại điện tử.\r\nUpBase cung cấp bộ giải pháp toàn diện bào gồm Dịch vụ và Công nghệ:\r\n- Nền tảng quản trị bán hàng TMĐT – UpS (OMS, WMS, CRM, Tài chính, AI Automation, Omnichannel)\r\n- Dịch vụ vận hành TMĐT toàn diện theo chuẩn hệ thống\r\n- Giải pháp chuyển đổi số doanh nghiệp với hệ sinh thái đối tác công nghệ hàng đầu (Lark, AI, Data, Fulfillment)\r\nTất cả được phát triển dựa trên kinh nghiệm thực chiến, dữ liệu vận hành lớn và tư duy công nghệ làm gốc, giúp doanh nghiệp:\r\n- Chuẩn hóa quy trình,\r\n- Tự động hóa vận hành,\r\n- Đồng bộ dữ liệu đa kênh,\r\n- Và ra quyết định dựa trên insight thời gian thực.\r\n\r\nSỨ MỆNH\r\nUpBase được thành lập với sứ mệnh:\r\n- Đồng hành cùng các doanh nghiệp Việt Nam hùng cường, góp phần mang lại thu nhập, việc làm cho hàng triệu người Việt Nam, mang sản phẩm chất lượng và dịch vụ tốt nhất tới người tiêu dùng.\r\n- Mang lại niềm tin, hạnh phúc cho cho CBNV.\r\n- Trách nhiệm xây dựng cộng đồng xanh, học tập.\r\n\r\nTẦM NHÌN 2030\r\nĐến năm 2030, UpBase hướng tới trở thành Công ty Công nghệ TMĐT hàng đầu Đông Nam Á, là đối tác được tin chọn của các doanh nghiệp vừa và nhỏ trong hành trình chinh phục thị trường số.\r\nUpBase cam kết kiến tạo một hệ sinh thái giúp doanh nghiệp:\r\n- Tăng trưởng có hệ thống,\r\n- Mở rộng quy mô bền vững,\r\nmang đến cơ hội phát triển cả về vật chất và tinh thần cho cán bộ nhân viên \u0026 cổ đông.\r\n\r\nGiá trị cốt lõi:\r\n- Niềm Tin\r\n- Kiên Định\r\n- Minh Bạch\r\n- Học Hỏi\r\n- Cân Bằng\r\n\r\nTRIẾT LÝ KINH DOANH\r\n“Khách hàng thành công – UpBase thành công.”\r\nChúng tôi tin rằng thành công của UpBase được đo bằng năng lực vận hành và mức độ tăng trưởng thực tế của khách hàng – không chỉ trong ngắn hạn, mà dài hạn và bền vững của doanh nghiệp.\r\n\r\nĐịa chỉ: \r\nVP Hà Nội: Tầng 3, Tòa nhà Diamond Flower, 48 Lê Văn Lương, Phường Thanh Xuân, TP.Hà Nội\r\nVP HCM: Tầng 3, Tòa nhà VNO, 129 Điện Biên Phủ, Phường Gia Định, TP.HCM"])</script><script>self.__next_f.push([1,"24:T552,\u003cp\u003e\u003cstrong\u003e\u003cem\u003e*** Chiến lược sản phẩm và giải pháp\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đóng vai trò là \"Kiến trúc sư trưởng\" (Chief Architect) trong việc tích hợp dữ liệu và quy trình giữa UpS và Lark Suite.\u003c/p\u003e\u003cp\u003e- Đặt đề bài (Requirements) cho Khối Tech phát triển các tính năng của UpS dựa trên nhu cầu thực tế của vận hành E-commerce và phản hồi từ khách hàng.\u003c/p\u003e\u003cp\u003e- Đóng gói các quy trình rời rạc thành các gói giải pháp \"All-in-one\" để đội kinh doanh dễ dàng chào bán.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e*** Chuyển đối số khách hàng\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây mô hình \"delivery factory\": blueprint theo ngành, template, guideline triển khai\u003c/p\u003e\u003cp\u003e- Dẫn dắt team DX Khách hàng thực hiện các dự án tư vấn chuyển đổi số phức tạp (High-touch projects).\u003c/p\u003e\u003cp\u003e- Tham gia Presales đối với các khách hàng Key/Enterprise để demo giải pháp chuyên sâu.\u003c/p\u003e\u003cp\u003e- Đảm bảo outcome: rút ngắn cycle-time, giảm lỗi vận hành, tăng minh bạch dữ \u003cem\u003eliệu, tăng năng suất\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e*** Lãnh đạo đội ngũ\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tuyển, dẫn dắt, coaching Lead/PM/Solution Consultant/No-code builder\u003c/p\u003e\u003cp\u003e- Thiết lập KPI/OKR, tiêu chuẩn chất lượng, quản trị rủi ro delivery\u003c/p\u003e25:Tb6b,"])</script><script>self.__next_f.push([1,"\u003cp\u003eUpBase open với các Level Leader/Manager\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm \u0026 Chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- 5 – 10+ năm kinh nghiệm (tối thiểu 5 năm lead team) trong lĩnh vực SaaS, ERP triển khai, hoặc Quản lý vận hành E-commerce có ứng dụng công nghệ sâu.\u003c/p\u003e\u003cp\u003e- Từng làm việc trong môi trường startup hoặc SaaS có tốc độ phát triển nhanh.\u003c/p\u003e\u003cp\u003e- Hiểu sâu về kiến trúc hệ thống, API, Webhook (để làm việc với team Tech).\u003c/p\u003e\u003cp\u003e- Thành thạo hoặc triển khai thực tế\u003cstrong\u003e no-code/low-code\u003c/strong\u003e (ví dụ: workflow automation, database-style app builder, integration tools…); biết cách biến yêu cầu vận hành thành hệ thống chạy được\u003c/p\u003e\u003cp\u003e- Tư duy hệ thống + data-driven + \"delivery by outcome\"\u003c/p\u003e\u003cp\u003e- Giao tiếp tốt với cả business \u0026 tech, làm việc theo cơ chế phân quyền, chịu trách nhiệm kết quả\u003c/p\u003e\u003cp\u003e- Có khả năng làm việc trực tiếp với C-level, tư duy chiến lược, quyết đoán\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLợi thế lớn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Hiểu/triển khai \u003cstrong\u003eLark Suite\u003c/strong\u003e (Base, Approval, Automation, Dashboard, Admin console…); hoặc từng làm sâu với hệ thống tương đương\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm tham gia hoặc dẫn dắt các dự án chuyển đổi số doanh nghiệp trong ngành Retail / E-commerce / Omnichannel / SMEs\u003c/p\u003e\u003cp\u003e- Từng \"productize dịch vụ\": đóng gói gói triển khai, template, playbook để scale\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*** Quyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTổng thu nhập thỏa thuận\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eĐược triển khai thực chiến và phá vỡ giới hạn tư duy thông thương:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trực tiếp làm việc và phối hợp đa phòng ban, giúp hiểu sâu bài toán kinh doanh và nâng cao năng lực xây dựng giải pháp công nghệ thực tế.\u003c/p\u003e\u003cp\u003e- Cơ hội tiếp cận và triển khai các nền tảng, công nghệ mới, tham gia vào các dự án hợp tác với đối tác và nền tảng lớn trong lĩnh vực TMĐT \u0026 công nghệ.\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng và phát triển sản phẩm/công nghệ phục vụ các nhãn hàng Việt Nam trong quá trình mở rộng ra thị trường khu vực.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eQuyền lợi khác: \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thưởng tháng lương 13++ (theo tình hình sản xuất kinh doanh), Thưởng hiệu suất, thưởng dự án.\u003c/p\u003e\u003cp\u003e- Chính sách ESOP: Dành cho nhân sự gắn bó, key và có đóng góp nổi bật\u003c/p\u003e\u003cp\u003e- Cơ hội thăng tiến minh bạch, review định kỳ nâng lương/level sau 3-6 tháng.\u003c/p\u003e\u003cp\u003e- Chế độ phúc lợi đầy đủ: BHXH, BHYT, BHTN theo quy định, Khám sức khỏe định kì hàng năm cho CBNV\u003c/p\u003e\u003cp\u003e- Chế độ làm việc: 5 ngày/tuần, nghỉ Thứ 7 và Chủ Nhật.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Ta46,"])</script><script>self.__next_f.push([1,"UpBase là Tech-Driven eCommerce Enabler hàng đầu tại Việt Nam và khu vực – Công ty công nghệ đồng hành cùng các thương hiệu và nhà bán lẻ trong hành trình chuẩn hóa, tự động hóa và tăng trưởng trên thương mại điện tử.\r\nUpBase cung cấp bộ giải pháp toàn diện bào gồm Dịch vụ và Công nghệ:\r\n- Nền tảng quản trị bán hàng TMĐT – UpS (OMS, WMS, CRM, Tài chính, AI Automation, Omnichannel)\r\n- Dịch vụ vận hành TMĐT toàn diện theo chuẩn hệ thống\r\n- Giải pháp chuyển đổi số doanh nghiệp với hệ sinh thái đối tác công nghệ hàng đầu (Lark, AI, Data, Fulfillment)\r\nTất cả được phát triển dựa trên kinh nghiệm thực chiến, dữ liệu vận hành lớn và tư duy công nghệ làm gốc, giúp doanh nghiệp:\r\n- Chuẩn hóa quy trình,\r\n- Tự động hóa vận hành,\r\n- Đồng bộ dữ liệu đa kênh,\r\n- Và ra quyết định dựa trên insight thời gian thực.\r\n\r\nSỨ MỆNH\r\nUpBase được thành lập với sứ mệnh:\r\n- Đồng hành cùng các doanh ngh
