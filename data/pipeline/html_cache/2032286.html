 sản phẩm công nghệ kết nối IoT, AI và các sản phẩm thông minh khác… với mục tiêu sở hữu công nghệ lõi, phát triển hệ sinh thái mở, tiện ích, thông minh, phục vụ nhu cầu thiết yếu của nền kinh tế số, cuộc sống và hoạt động sản xuất – kinh doanh. \r\n•\tTrong lĩnh vực giáo dục đào tạo và nghiên cứu khoa học, Tập đoàn Phenikaa đầu tư hệ thống giáo dục từ cấp tiểu học – trung học cơ sở - trung học phổ thông tới giáo dục đại học, sau đại học, bao gồm: Trường Đại học Phenikaa theo định hướng đổi mới sáng tạo không vì lợi nhuận, Trường Phổ thông liên cấp Phenikaa và chuẩn bị kế hoạch cho dự án Trường Phổ thông quốc tế. Tập đoàn đã và đang đầu tư mạnh mẽ cho nghiên cứu cơ bản, nghiên cứu ứng dụng và chuyển giao với 5 trung tâm, viện nghiên cứu, 5 phòng ban thực hiện chức năng R\u0026D tại các công ty; hơn 20 nhóm nghiên cứu mạnh, tiềm năng tại trường Đại học Phenikaa và Quỹ Đổi mới Sáng tạo Phenikaa với mức đầu tư 1.000 tỷ đồng. \r\nThông tin tham khảo thêm tại: https://phenikaa.com"])</script><script>self.__next_f.push([1,"24:T894,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Mục tiêu vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện triển khai các hạng mục trong dự án nghiên cứu thị trường (định tính \u0026 định lượng), đảm bảo đúng tiến độ, chất lượng và yêu cầu chuyên môn theo kế hoạch được phê duyệt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Nhiệm vụ chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTriển khai dự án nghiên cứu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện các công việc trong dự án NCTT theo phân công (thiết kế bảng hỏi, thu thập dữ liệu, điều phối khảo sát, phỏng vấn, v.v.)\u003c/p\u003e\u003cp\u003e• Đảm bảo tuân thủ đúng mục tiêu, phạm vi và phương pháp nghiên cứu đã được phê duyệt\u003c/p\u003e\u003cp\u003e• Phối hợp với các bên liên quan để triển khai hoạt động khảo sát thực địa hoặc online\u003c/p\u003e\u003cp\u003e\u003cbr\u00 ông minh. \r\n•\tTrong lĩnh vực công nghiệp, Tập đoàn sở hữu VICOSTONE® - Top 3 Thương hiệu đá thạch anh cao cấp, được khách hàng và giới chuyên môn ưu tiên lựa chọn trên 50 quốc gia và vùng lãnh thổ. Chủ động thích ứng trước phát triển của khoa học công nghệ, phát triển sản xuất công nghiệp trên nền tảng chuyển đổi số toàn diện, nghiên cứu, ứng dụng công nghệ tiên tiến theo hướng thông minh là chiến lược trọng yếu để Tập đoàn nâng cao giá trị, như việc triển khai vận hành nhà máy vi mạch, robot thông minh, thiết bị chiếu sáng sạch và thông minh… với công nghệ tiên tiến chuyển giao từ Nhật Bản và Châu Âu. \r\n•\tTrong lĩnh vực công nghệ, với mong muốn góp phần kiến tạo nên một cuộc sống thông minh và hạnh phúc, PHENIKAA đầu tư nguồn lực mạnh mẽ để nghiên cứu sâu, phát triển các sản phẩm công nghệ kết nối IoT, AI và các sản phẩm thông minh khác… với mục tiêu sở hữu công nghệ lõi, phát triển hệ sinh thái mở, tiện ích, thông minh, phục vụ nhu cầu thiết yếu của nền kinh tế số, cuộc sống và hoạt động sản xuất – kinh doanh. \r\n•\tTrong lĩnh vực giáo dục đào tạo và nghiên cứu khoa học, Tập đoàn Phenikaa đầu tư hệ thống giáo dục từ cấp tiểu học – trung học cơ sở - trung học phổ thông tới giáo dục đại học, sau đại học, bao gồm: Trường Đại học Phenikaa theo định hướng đổi mới sáng tạo không vì lợi nhuận, Trường Phổ thông liên cấp Phenikaa và chuẩn bị kế hoạch cho dự án Trường Phổ thông quốc tế. Tập đoàn đã và đang đầu tư mạnh mẽ cho nghiên cứu cơ bản, nghiên cứu ứng dụng và chuyển giao với 5 trung tâm, viện nghiên cứu, 5 phòng ban thực hiện chức năng R\u0026D tại các công ty; hơn 20 nhóm nghiên cứu mạnh, tiềm năng tại trường Đại học Phenikaa và Quỹ Đổi mới Sáng tạo Phenikaa với mức đầu tư 1.000 tỷ đồng. \r\nThông tin tham khảo thêm tại: https://phenikaa.com"])</script><script>self.__next_f.push([1,"3f:{\"companyId\":273054,\"jobImageURLs\":\"$40\",\"jobVideoURLs\":null,\"companyName\":\"Phenikaa Group\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/ec
