 động.\u003c/p\u003e\u003cp\u003e- Khởi điểm: bảo dưỡng máy bay dưới sự hướng dẫn, giám sát của nhân viên được phê chuẩn, thu nhập bìn"])</script><script>self.__next_f.push([1,"h quân hàng tháng từ 14 – 17 triệu đồng.\u003c/p\u003e\u003cp\u003e- Sau 2 – 3 năm, được đào tạo, tích lũy kinh nghiệm, thi đạt chứng chỉ ủy quyền mức A (CRS A): thực hiện bảo dưỡng máy bay trong phạm vi được ủy quyền, mức lương tháng từ 19 – 26 triệu đồng; thi đạt chứng chỉ Qualified Mechanic: thực hiện bảo dưỡng máy bay trong phạm vi được ủy quyền, mức lương hàng tháng từ 22 – 32 triệu đồng.\u003c/p\u003e\u003cp\u003e- Sau 4 – 5 năm, được đào tạo, tích lũy kinh nghiệm, thi đạt chứng chỉ ủy quyền mức B1/B2 (CRS B1/B2): thực hiện bảo dưỡng máy bay trong phạm vi được ủy quyền, mức lương hàng tháng từ 30 – 38 triệu đồng.\u003c/p\u003e\u003cp\u003e- Thưởng từ tháng lương thứ 13 trở đi theo tình hình sản xuất kinh doanh của Công ty.\u003c/p\u003e24:T19d1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e2. Yêu cầu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Là công dân Việt Nam; từ đủ 18 tuổi đến 40 tuổi (sinh từ ngày 01/01/1986 về sau); có ngoại hình phù hợp; không có thông tin án tích theo xác nhận của lý lịch tư pháp (mẫu số 2), không mắc các tệ nạn xã hội, chấp hành tốt quy định pháp luật; có lý lịch bản thân và gia đình rõ ràng; có sức khoẻ loại 1 hoặc 2 theo tiêu chuẩn phân loại sức khỏe của Bộ Y tế. \u003c/p\u003e\u003cp\u003e- Trình độ chuyên môn: \u003c/p\u003e\u003cp\u003e+ Kỹ sư kỹ thuật máy bay chuyên ngành cơ giới: Tốt nghiệp đại học trở lên các ngành cơ giới máy bay, cơ khí hàng không, kỹ thuật ô tô, kỹ thuật tàu thủy, vật liệu, cơ khí, động lực, cơ điện tử, cơ kỹ thuật,...\u003c/p\u003e\u003cp\u003e+ Kỹ sư kỹ thuật máy bay chuyên ngành điện – điện tử: Tốt nghiệp đại học trở lên các ngành điện, điện tử, điện tử viễn thông, điện tử truyền thông, đo lường điều khiển, vố tuyến điện, tự động hóa, công nghệ thông tin, tin học, máy tính,...\u003c/p\u003e\u003cp\u003e- Ưu tiên thí sinh đã tốt nghiệp khóa đào tạo cơ bản bảo dưỡng máy bay tại các cơ sở đào tạo được Cục Hàng không Việt Nam (CAAV), Cục Hàng không liên bang Mỹ (FAA), Cơ quan an toàn hàng không Châu Âu (EASA) phê chuẩn hoặc công nhận. \u003c/p\u003e\u003cp\u003e- Trình độ tiếng Anh: Có chứng chỉ tiếng Anh tối thiểu TOEIC 500/ TOEFL (paper) 470/ TOEFL CBT 120/ TOEFL IBT40/ TOEFL ITP 449/ TOEFL Essentials 4.5/ IELTS 4.5/ CEFR B1/ Aptis B1 đang còn hạn (có ngày thi không quá 02 năm đến thời điểm nộp hồ sơ) và không áp dụng hình thức thi online tại nhà (Home Edition).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Cộng điểm ưu tiên:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thí sinh là vợ (hoặc chồng), con người lao động (con đẻ, coi nuôi được pháp luật công nhận) trong Công ty được cộng 1,00 điểm;\u003c/p\u003e\u003cp\u003e- Thí sinh thi tuyển vị trí Kỹ sư/Thợ kỹ thuật máy bay có chứng chỉ đào tạo cơ bản bảo dưỡng máy bay tại các cơ sở đào tạo được Cục Hàng không Việt Nam (CAAV), Cục Hàng không liên bang Mỹ (FAA), Cơ quan an toàn hàng không Châu Âu (EASA) phê chuẩn hoặc công nhận được cộng 1,00 điểm;\u003c/p\u003e\u003cp\u003e- Các trường hợp thí sinh thuộc nhiều đối tượng áp đụng diểm ưu tiên thì chỉ được áp dụng tối đa điểm ưu tiên là 1,00 điểm.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Chế độ chính sách chung:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ea) Điều kiện làm việc: Thời gian làm việc 42h/ tuần.\u003c/p\u003e\u003cp\u003eb) Ký kết hợp đồng lao động:\u003c/p\u003e\u003cp\u003e- Ký hợp đồng thử việc: 02 tháng đối với các vị trí kỹ sư; 01 tháng đối với vị trí thợ, nhân viên.\u003c/p\u003e\u003cp\u003e- Ký hợp đồng lao động xác định thời hạn 12 tháng.\u003c/p\u003e\u003cp\u003e- Ký hợp đồng lao động xác định thời hạn 36 tháng.\u003c/p\u003e\u003cp\u003e- Ký hợp đồng lao động không xác định thời hạn. \u003c/p\u003e\u003cp\u003ec) Bảo hộ lao động: Được trang bị bảo hộ lao động theo quy định của Nhà nước và của Công ty theo tiêu chuẩn trang bị của từng chức danh công việc.\u003c/p\u003e\u003cp\u003ed) Chế độ nghỉ ngơi:\u003c/p\u003e\u003cp\u003e- Nghỉ hằng tuần, phép năm, lễ tết,…: thực hiện theo pháp luật lao động hiện hành.\u003c/p\u003e\u003cp\u003e- Nghỉ việc riêng được hưởng lương: được nghỉ thêm 01 ngày so với quy định của pháp luật.\u003c/p\u003e\u003cp\u003eđ) Chế độ Bảo hiểm xã hội và bảo hiểm y tế, bảo hiểm thất nghiệp: Được Công ty đóng nộp Bảo hiểm xã hội và bảo hiểm y tế, bảo hiểm thất nghiệp theo quy định của pháp luật khi ký hợp đồng lao động dài hạn với Công ty.\u003c/p\u003e\u003cp\u003ee) Khám sức khỏe định kỳ: hàng năm được khám sức khỏe định kỳ 01-02 lần.\u003c/p\u003e\u003cp\u003ef) Chế độ phúc lợi: \u003c/p\u003e\u003cp\u003e- Được mua vé máy bay giảm cước cho bản thân và thân nhân theo quy định của Tổng Công ty Hàng không Việt Nam.\u003c/p\u003e\u003cp\u003e- Được hỗ trợ tiền nghỉ mát hàng năm tùy theo kết quả sản xuất kinh doanh của Công ty.\u003c/p\u003e\u003cp\u003e- Được Công ty mua bảo hiểm hưu trí tự nguyện, bảo hiểm sức khỏe.\u003c/p\u003e\u003cp\u003eg) Đào tạo và phát triển nghề nghiệp:\u003c/p\u003e\u003cp\u003e- Được đào tạo và phát triển các kỹ năng phù hợp với vị trí công việc.\u003c/p\u003e\u003cp\u003e- Có cơ hội phát triển và thăng tiến.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Hồ sơ dự tuyển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phiếu đăng ký dự tuyển lao động (theo mẫu đính kèm);\u003c/p\u003e\u003cp\u003e- Sơ yếu lý lịch (có dán ảnh 4x6) có xác nhận của cơ quan có thẩm quyền;\u003c/p\u003e\u003cp\u003e- Bản chứng thực chứng minh thư nhân dân/ thẻ căn cước công dân/căn cước;\u003c/p\u003e\u003cp\u003e- Bản chứng thực giấy khai sinh;\u003c/p\u003e\u003cp\u003e- Bản chứng thực: Bằng tốt nghiệp hoặc giấy chứng nhận tốt nghiệp, bảng điểm kết quả học tập; chứng chỉ tiếng Anh TOEIC/TOEFL/IELTS/CEFR/Aptis (kèm bản chính để đối chiếu) và các văn bằng, chứng chỉ khác có liên quan;\u003c/p\u003e\u003cp\u003e- Giấy khám sức khoẻ tại cơ sở y tế tuyến huyện hoặc tương đương trở lên (trong vòng 06 tháng tính đến ngày nộp hồ sơ);\u003c/p\u003e\u003cp\u003e- 01 ảnh 4x6cm/01 vị trí ứng tuyển (chụp không quá 06 tháng tính đến ngày nộp hồ sơ).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Tiếp nhận hồ sơ: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ea) Thời gian: Từ thứ hai đến thứ sáu các ngày trong tuần (Buổi sáng: Từ 8 giờ 30’ đến 11 giờ 30’; Buổi chiều: Từ 13 giờ 30’ đến  16 giờ 00’): từ ngày 06/4/2026 – 31/5/2026.\u003c/p\u003e\u003cp\u003eb) Địa điểm: Thí sinh có thể nộp hồ sơ tại một trong các địa điểm sau:\u003c/p\u003e\u003cp\u003e- Tại Hà Nội: Phòng Phát triển nhân lực, Ban Tổ chức - Nhân lực, Công ty TNHH MTV Kỹ thuật Máy bay tại Sân bay Quốc Tế Nội Bài, Tp. Hà Nội. SĐT: 0901/088/886\u003c/p\u003e\u003cp\u003e- Tại Tp Hồ Chí Minh: Ban Tổ chức - Nhân lực tại Tp. Hồ Chí Minh, Công ty TNHH MTV Kỹ thuật máy bay, Sân bay Quốc tế Tân Sơn Nhất, Tp. Hồ Chí Minh. SĐT: 0909/622/750.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Thời gian thi tuyển: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Vị trí kỹ sư máy bay, thợ kỹ thuật máy bay: dự kiến tháng 06/2026.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T715,\u003cp\u003e\u003cstrong\u003e Địa điểm làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Làm việc tại sân bay Tân Sơn Nhất và sân bay Long Thành theo sự phân công, điều động của Công ty\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Lộ trình phát triển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đối với thí sinh chưa có chứng chỉ cơ bản bảo dưỡng tàu bay: Sau khi trúng tuyển được Công ty hỗ trợ tổ chức đào tạo khóa học cơ bản bảo dưỡng máy bay, luật, quy trình bảo dưỡng máy bay, yếu tố con người, hệ thống quản lý an toàn,…miễn phí (thời gian đào tạo 6 – 7 tháng). Sau khi kết thúc chương trình đào tạo, căn cứ vào kết quả học tập, thí sinh sẽ được lựa chọn để ký kết hợp đồng lao động.\u003c/p\u003e\u003cp\u003e- Khởi điểm: bảo dưỡng máy bay dưới sự hướng dẫn, giám sát của nhân viên được phê chuẩn, thu nhập bình quân hàng tháng từ 14 – 17 triệu đồng.\u003c/p\u003e\u003cp\u003e- Sau 2 – 3 năm, được đào tạo, tích lũy kinh nghiệm, thi đạt chứng chỉ ủy quyền mức A (CRS A): thực hiện bảo dưỡng máy bay trong phạm vi được ủy quyền, mức lương tháng từ 19 – 26 triệu đồng; thi đạt chứng chỉ Qualified Mechanic: thực hiện bảo dưỡng máy bay trong phạm vi được ủy quyền, mức lương hàng tháng từ 22 – 32 triệu đồng.\u003c/p\u003e\u003cp\u003e- Sau 4 – 5 năm, được đào tạo, tích lũy kinh nghiệm, thi đạt chứng chỉ ủy quyền mức B1/B2 (CRS B1/B2): thực hiện bảo dưỡng máy bay trong phạm vi được ủy quyền, mức lương hàng tháng từ 30 – 38 triệu đồng.\u003c/p\u003e\u003cp\u003e- Thưởng từ tháng lương thứ 13 trở đi theo tình hình sản xuất kinh doanh của Công ty.\u003c/p\u003e28:T19d1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e2. Yêu cầu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Là công dân Việt Nam; từ đủ 18 tuổi đến 40 tuổi (sinh từ ngày 01/01/1986 về sau); có ngoại hình phù hợp; không có thông tin án tích theo xác nhận của lý lịch tư pháp (mẫu số 2), không mắc các tệ nạn xã hội, chấp hành tốt quy định pháp luật; có lý lịch bản thân và gia đình rõ ràng; có sức khoẻ loại 1 hoặc 2 theo tiêu chuẩn phân loại sức khỏe của Bộ Y tế. \u003c/p\u003e\u003cp\u003e- Trình độ chuyên môn: \u003c/p\u003e\u003cp\u003e+ Kỹ sư kỹ thuật máy bay chuyên ngành cơ giới: Tốt nghiệp đại học trở lên các ngành cơ giới máy bay, cơ khí hàng không, kỹ thuật ô tô, kỹ thuật tàu thủy, vật liệu, cơ khí, động lực, cơ điện tử, cơ kỹ thuật,...\u003c/p\u003e\u003cp\u003e+ Kỹ sư kỹ thuật máy bay chuyên ngành điện – điện tử: Tốt nghiệp đại học trở lên các ngành điện, điện tử, điện tử viễn thông, điện tử truyền thông, đo lường điều khiển, vố t ông xác định thời hạn. \u003c/p\u003e\u003cp\u003ec) Bảo hộ lao động: Được trang bị bảo hộ lao động theo quy định của Nhà nước và của Công ty theo tiêu chuẩn trang bị của từng chức danh công việc.\u003c/p\u003e\u003cp\u003ed) Chế độ nghỉ ngơi:\u003c/p\u003e\u003cp\u003e- Nghỉ hằng tuần, phép năm, lễ tết,…: thực hiện theo pháp luật lao động hiện hành.\u003c/p\u003e\u003cp\u003e- Nghỉ việc riêng được hưởng lương: được nghỉ thêm 01 ngày so với quy định của pháp luật.\u003c/p\u003e\u003cp\u003eđ) Chế độ Bảo hiểm xã hội và bảo hiểm y tế, bảo hiểm thất nghiệp: Được Công ty đóng nộp Bảo hiểm xã hội và bảo hiểm y tế, bảo hiểm thất nghiệp theo quy định của pháp luật khi ký hợp đồng lao động dài hạn với Công ty.\u003c/p\u003e\u003cp\u003ee) Khám sức khỏe định kỳ: hàng năm được khám sức khỏe định kỳ 01-02 lần.\u003c/p\u003e\u003cp\u003ef) Chế độ phúc lợi: \u003c/p\u003e\u003cp\u003e- Được mua vé máy bay giảm cước cho bản thân và thân nhân theo quy định của Tổng Công ty Hàng không Việt Nam.\u003c/p\u003e\u003cp\u003e- Được hỗ trợ tiền nghỉ mát hàng năm tùy theo kết quả sản xuất kinh doanh của Công ty.\u003c/p\u003e\u003cp\u003e- Được Công ty mua bảo hiểm hưu trí tự nguyện, bảo hiểm sức khỏe.\u003c/p\u003e\u003cp\u003eg) Đào tạo và phát triển nghề nghiệp:\u003c/p\u003e\u003cp\u003e- Được đào tạo và phát triển các kỹ năng phù hợp với vị trí công việc.\u003c/p\u003e\u003cp\u003e- Có cơ hội phát triển và thăng tiến.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Hồ sơ dự tuyển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phiếu đăng ký dự tuyển lao động (theo mẫu đính kèm);\u003c/p\u003e\u003cp\u003e- Sơ yếu lý lịch (có dán ảnh 4x6) có xác nhận của cơ quan có thẩm quyền;\u003c/p\u003e\u003cp\u003e- Bản chứng thực chứng minh thư nhân dân/ thẻ căn cước công dân/căn cước;\u003c/p\u003e\u003cp\u003e- Bản chứng thực giấy khai sinh;\u003c/p\u003e\u003cp\u003e- Bản chứng thực: Bằng tốt nghiệp hoặc giấy chứng nhận tốt nghiệp, bảng điểm kết quả học tập; chứng chỉ tiếng Anh TOEIC/TOEFL/IELTS/CEFR/Aptis (kèm bản chính để đối chiếu) và các văn bằng, chứng chỉ khác có liên quan;\u003c/p\u003e\u003cp\u003e- Giấy khám sức khoẻ tại cơ sở y tế tuyến huyện hoặc tương đương trở lên (trong vòng 06 tháng tính đến ngày nộp hồ sơ);\u003c/p\u003e\u003cp\u003e- 01 ảnh 4x6cm/01 vị trí ứng tuyển (chụp không quá 06 tháng tính đến ngày nộp hồ sơ).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Tiếp nhận hồ sơ: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ea) Thời gian: Từ thứ hai đến thứ sáu các ngày trong tuần (Buổi sáng: Từ 8 giờ 30’ đến 11 giờ 30’; Buổi chiều: Từ 13 giờ 30’ đến  16 giờ 00’): từ ngày 06/4/2026 – 31/5/2026.\u003c/p\u003e\u003cp\u003eb) Địa điểm: Thí sinh có thể nộp hồ sơ tại một trong các địa điểm sau:\u003c/p\u003e\u003cp\u003e- Tại Hà Nội: Phòng Phát triển nhân lực, Ban Tổ chức - Nhân lực, Công ty TNHH MTV Kỹ thuật Máy bay tại Sân bay Quốc Tế Nội Bài, Tp. Hà Nội. SĐT: 0901/088/886\u003c/p\u003e\u003cp\u003e- Tại Tp Hồ Chí Minh: Ban Tổ chức - Nhân lực tại Tp. Hồ Chí Minh, Công ty TNHH MTV Kỹ thuật máy bay, Sân bay Quốc tế Tân Sơn Nhất, Tp. Hồ Chí Minh. SĐT: 0909/622/750.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Thời gian thi tuyển: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Vị trí kỹ sư máy bay, thợ kỹ thuật máy bay: dự kiến tháng 06/2026.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2a:{\"skillName\":\"Kỹ Sư Cơ Giới\",\"skillId\":1152451,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Sửa Chữa\",\"skillId\":3734,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Kỹ Thuật Máy Bay\",\"skillId\":740948,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Bảo Trì Máy Bay\",\"skillId\":33257,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Kỹ Thuật Tàu Thủy\",\"skillId\":963979,\"skillWeight\":100,\"isExi
