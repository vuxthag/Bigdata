e-\tThỏa thuận hợp tác giữa ActionAid và Tổ chức ChildFund Hàn Quốc (CFK);\u003c/p\u003e\u003cp\u003e-\tThỏa thuận hợp tác giữa ActionAid với UBND phường Khánh Hòa, TP. Cần Thơ và VUFO Cà Mau.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII.\tMục tiêu hoạt động 2.1.4\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGóp phần giảm thiểu chất thải và tăng cường năng lực chuyển đổi năng lượng tái tạo trong lĩnh vực chăn nuôi và nuôi trồng thủy sản ở Đồng bằng sông Cửu Long. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII.\tKết quả đầu ra\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e•\t1 báo cáo nghiên cứu chuyên sâu để rà soát các luật/chính sách hiện hành liên quan đến giảm thiểu chất thải trong lĩnh vực nông nghiệp ở Đồng bằng sông Cửu Long, được thực hiện với sự tham gia của các chuyên gia chính sách quốc gia, ActionAid và các đối tác địa phương, bao gồm các khuyến nghị nhằm cải thiện quy trình quản lý chất lượng nước và chất thải rắn trong nuôi trồng thủy sản và chăn nuôi.\u003c/p\u003e\u003cp\u003e•\t2 bản tóm tắt (dạng Microsoft Word và Microsoft Powerpoint) tập trung vào các khuyến nghị chính sách để phục vụ cho hoạt động tác động chính sách của dự án.\u003c/p\u003e\u003cp\u003e•\tPhản hồi của chính quyền (nếu có) về các khuyến nghị chính sách.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIV.\tPhương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian: \u003c/strong\u003eTháng 3-6/2026\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCác bước thực hiện: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBước 1:\u003c/strong\u003e Tư vấn phân tích và đánh giá (i) các luật, chiến lược và quy định hiện hành ở cấp quốc gia và địa phương liên quan đến quản lý chất thải nông nghiệp; (ii) mức độ thực thi và hiệu quả của các chính sách này tại Đồng bằng sông Cửu Long; và (iii) phân công trách nhiệm giữa các cơ quan cấp bộ (như Bộ Nông nghiệp và Môi trường) và chính quyền địa phương \u003c/p\u003e\u003cp\u003e-\tNghị quyết 120/NQ-CP (2017) về phát triển bền vững Đồng bằng sông Cửu Long\u003c/p\u003e\u003cp\u003e-\tChiến lược phát triển nông nghiệp và nông thôn bền vững đến năm 2030, tầm nhìn đến 2050\u003c/p\u003e\u003cp\u003e-\tLuật Bảo vệ Môi trường sửa đổi (2020) và Chiến lược Quốc gia về Quản lý Chất thải rắn Tổng hợp đến năm 2025 \u003c/p\u003e\u003cp\u003e-\tKế hoạch Phát triển Kinh tế - Xã hội của Tỉnh Cà Mau và Thành phố Cần Thơ và các xã/phường dự án\u003c/p\u003e\u003cp\u003e-\tCác thỏa thuận chung đồng quản lý chất thải rắn trong nuôi trồng thủy sản và chăn nuôi của các xã/phường dự án tại Tỉnh Cà Mau và Thành phố Cần Thơ (hoạt động 2.1.1)\u003c/p\u003e\u003cp\u003e-\tCác kế hoạch bảo vệ môi trường hàng năm của các xã/phường dự án (hoạt động 2.1.2) tại Tỉnh Cà Mau và Thành phố Cần Thơ (hoạt động 2.1.2)\u003c/p\u003e\u003cp\u003e-\tMô hình đồng quản lí rừng ngập mặn tại tỉnh Cần Thơ\u003c/p\u003e\u003cp\u003e-\tCác văn bản khác có liên quan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBước 2:\u003c/strong\u003e Tư vấn hiểu rõ vai trò, lợi ích và mức độ ảnh hưởng của các bên liên quan trong quản lý chất thải nông nghiệp\u003c/p\u003e\u003cp\u003e-\tXác định các bên liên quan (chính quyền, lãnh đạo cộng đồng, hợp tác xã và doanh nghiệp nông nghiệp, các tổ chức đoàn thể,…) và nâng cao năng lực cho các bên liên quan trước khi tham vấn (nếu cần thiết)\u003c/p\u003e\u003cp\u003e-\tTổ chức tham vấn (phỏng vấn, thảo luận nhóm hoặc hội thảo) để thu thập ý kiến về thực tiễn triển khai chính sách (bao gồm các kết quả, thuận lợi và khó khăn) và các sáng kiến địa phương \u003c/p\u003e\u003cp\u003e-\tĐánh giá tác động về môi trường, kinh tế và xã hội của các nghiên cứu điển hình tại cơ sở (khí sinh học và mô hình nông nghiệp tuần hoàn, tưới luân phiên, ủ phân hữu cơ,…)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBước 3:\u003c/strong\u003e Tư vấn soạn thảo báo cáo nghiên cứu chuyên sâu để rà soát các luật/chính sách hiện hành liên quan đến giảm thiểu chất thải trong lĩnh vực nông nghiệp ở Đồng bằng sông Cửu Long, xác định\u003c/p\u003e\u003cp\u003e-\tCác công cụ chính sách và tài chính hiện hành\u003c/p\u003e\u003cp\u003e-\tCác khoảng trống, chồng chéo và thiếu nhất quán trong hệ thống chính sách hiện hành\u003c/p\u003e\u003cp\u003e-\tCơ chế phối hợp giữa các tỉnh và trung ương\u003c/p\u003e\u003cp\u003e-\tChiến lược quốc gia với thực tiễn triển khai tại địa phương\u003c/p\u003e\u003cp\u003e-\tKhả năng tài chính và năng lực kỹ thuật của địa phương để thực hiện các sáng kiến giảm chất thải\u003c/p\u003e\u003cp\u003e-\tTiềm năng và tầm quan trọng của khí sinh học và các mô hình xử lý chất thải rắn khác\u003c/p\u003e\u003cp\u003e-\tCác hạn chế trong việc tiếp cận các công cụ tài chính cho người nghèo và cận nghèo tại khu vực dự án\u003c/p\u003e\u003cp\u003e-\tCác nghiên cứu điển hình về sự tham gia của cộng đồng, đặc biệt là sự tham gia của phụ nữ và thanh niên, trong quản lý chất thải rắn trong nuôi trồng thủy sản và chăn nuôi, giám sát chất lượng nước và công tác bảo vệ môi trường ở cấp cơ sở\u003c/p\u003e\u003cp\u003e-\tCác khuyến nghị cụ thể nhằm cải thiện chính sách (đề xuất điều chỉnh chính sách để tăng cường thực thi, giám sát và cơ chế khuyến khích; gợi ý các mô hình quản lý chất thải dựa vào cộng đồng và hợp tác công tư; xây dựng lộ trình cho sự tham gia của các tổ chức phi chính phủ bao gồm dự án thí điểm, chiến lược vận động chính sách và chương trình nâng cao năng lực;…)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBước 4\u003c/strong\u003e: Tư vấn soạn thảo 2 bản tóm tắt (dạng Microsoft Word và Microsoft Powerpoint) tập trung vào các khuyến nghị chính sách để đệ trình lên các nhà hoạch định chính sách cấp tỉnh và cấp quốc gia (đặc biệt là Sở/Bộ Nông nghiệp và Môi trường) và trình bày tại thảo luận bàn tròn trong hội thảo vận động chính sách (hoạt động 2.1.5) \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eV.\tKế hoạch t à nuôi trồng thủy sản ở Đồng bằng sông Cửu Long. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII.\tKết quả đầu ra\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e•\t1 báo cáo nghiên cứu chuyên sâu để rà soát các luật/chính sách hiện hành liên quan đến giảm thiểu chất thải trong lĩnh vực nông nghiệp ở Đồng bằng sông Cửu Long, được thực hiện với sự tham gia của các chuyên gia chính sách quốc gia, ActionAid và các đối tác địa phương, bao gồm các khuyến nghị nhằm cải thiện quy trình quản lý chất lượng nước và chất thải rắn trong nuôi trồng thủy sản và chăn nuôi.\u003c/p\u003e\u003cp\u003e•\t2 bản tóm tắt (dạng Microsoft Word và Microsoft Powerpoint) tập trung vào các khuyến nghị chính sách để phục vụ cho hoạt động tác động chính sách của dự án.\u003c/p\u003e\u003cp\u003e•\tPhản hồi của chính quyền (nếu có) về các khuyến nghị chính sách.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIV.\tPhương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian: \u003c/strong\u003eTháng 3-6/2026\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCác bước thực hiện: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBước 1:\u003c/strong\u003e Tư vấn phân tích và đánh giá (i) các luật, chiến lược và quy định hiện hành ở cấp quốc gia và địa phương liên quan đến quản lý chất thải nông nghiệp; (ii) mức độ thực thi và hiệu quả của các chính sách này tại Đồng bằng sông Cửu Long; và (iii) phân công trách nhiệm giữa các cơ quan cấp bộ (như Bộ Nông nghiệp và Môi trường) và chính quyền địa phương \u003c/p\u003e\u003cp\u003e-\tNghị quyết 120/NQ-CP (2017) về phát triển bền vững Đồng bằng sông Cửu Long\u003c/p\u003e\u003cp\u003e-\tChiến lược phát triển nông nghiệp và nông thôn bền vững đến năm 2030, tầm nhìn đến 2050\u003c/p\u003e\u003cp\u003e-\tLuật Bảo vệ Môi trường sửa đổi (2020) và Chiến lược Quốc gia về Quản lý Chất thải rắn Tổng hợp đến năm 2025 \u003c/p\u003e\u003cp\u003e-\tKế hoạch Phát triển Kinh tế - Xã hội của Tỉnh Cà Mau và Thành phố Cần Thơ và các xã/phường dự án\u003c/p\u003e\u003cp\u003e-\tCác thỏa thuận chung đồng quản lý chất thải rắn trong nuôi trồng thủy sản và chăn nuôi của các xã/phường dự án tại Tỉnh Cà Mau và Thành phố Cần Thơ (hoạt động 2.1.1)\u003c/p\u003e\u003cp\u003e-\tCác kế hoạch bảo vệ môi trường hàng năm của các xã/phường dự án (hoạt động 2.1.2) tại Tỉnh Cà Mau và Thành phố Cần Thơ (hoạt động 2.1.2)\u003c/p\u003e\u003cp\u003e-\tMô hình đồng quản lí rừng ngập mặn tại tỉnh Cần Thơ\u003c/p\u003e\u003cp\u003e-\tCác văn bản khác có liên quan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBước 2:\u003c/strong\u003e Tư vấn hiểu rõ vai trò, lợi ích và mức độ ảnh hưởng của các bên liên quan trong quản lý chất thải nông nghiệp\u003c/p\u003e\u003cp\u003e-\tXác định các bên liên quan (chính quyền, lãnh đạo cộng đồng, hợp tác xã và doanh nghiệp nông nghiệp, các tổ chức đoàn thể,…) và nâng cao năng lực cho các bên liên quan trước khi tham vấn (nếu cần thiết)\u003c/p\u003e\u003cp\u003e-\tTổ chức tham vấn (phỏng vấn, thảo luận nhóm hoặc hội thảo) để thu thập ý kiến về thực tiễn triển khai chính sách (bao gồm các kết quả, thuận lợi và khó khăn) và các sáng kiến địa phương \u003c/p\u003e\u003cp\u003e-\tĐánh giá tác động về môi trường, kinh tế và xã hội của các nghiên cứu điển hình tại cơ sở (khí sinh học và mô hình nông nghiệp tuần hoàn, tưới luân phiên, ủ phân hữu cơ,…)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBước 3:\u003c/strong\u003e Tư vấn soạn thảo báo cáo nghiên cứu chuyên sâu để rà soát các luật/chính sách hiện hành liên quan đến giảm thiểu chất thải trong lĩnh vực nông nghiệp ở Đồng bằng sông Cửu Long, xác định\u003c/p\u003e\u003cp\u003e-\tCác công cụ chính sách và tài chính hiện hành\u003c/p\u003e\u003cp\u003e-\tCác khoảng trống, chồng chéo và thiếu nhất quán trong hệ thống chính sách hiện hành\u003c/p\u003e\u003cp\u003e-\tCơ chế phối hợp giữa các tỉnh và trung ương\u003c/p\u003e\u003cp\u003e-\tChiến lược quốc gia với thực tiễn triển khai tại địa phương\u003c/p\u003e\u003cp\u003e-\tKhả năng tài chính và năng lực kỹ thuật của địa phương để thực hiện các sáng kiến giảm chất thải\u003c/p\u003e\u003cp\u003e-\tTiềm năng và tầm quan trọng của khí sinh học và các mô hình xử lý chất thải rắn khác\u003c/p\u003e\u003cp\u003e-\tCác hạn chế trong việc tiếp cận các công cụ tài chính cho người nghèo và cận nghèo tại khu vực dự án\u003c/p\u003e\u003cp\u003e-\tCác nghiên cứu điển hình về sự tham gia của cộng đồng, đặc biệt là sự tham gia của phụ nữ và thanh niên, trong quản lý chất thải rắn trong nuôi trồng thủy sản và chăn nuôi, giám sát chất lượng nước và công tác bảo vệ môi trường ở cấp cơ sở\u003c/p\u003e\u003cp\u003e-\tCác khuyến nghị cụ thể nhằm cải thiện chính sách (đề xuất điều chỉnh chính sách để tăng cường thực thi, giám sát và cơ chế khuyến khích; gợi ý các mô hình quản lý chất thải dựa vào cộng đồng và hợp tác công tư; xây dựng lộ trình cho sự tham gia của các tổ chức phi chính phủ bao gồm dự án thí điểm, chiến lược vận động chính sách và chương trình nâng cao năng lực;…)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBước 4\u003c/strong\u003e: Tư vấn soạn thảo 2 bản tóm tắt (dạng Microsoft Word và Microsoft Powerpoint) tập trung vào các khuyến nghị chính sách để đệ trình lên các nhà hoạch định chính sách cấp tỉnh và cấp quốc gia (đặc biệt là Sở/Bộ Nông nghiệp và Môi trường) và trình bày tại thảo luận bàn tròn trong hội thảo vận động chính sách (hoạt động 2.1.5) \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eV.\tKế hoạch triển khai\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSTT\tHoạt động\tThời gian\tNgười phụ trách\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1\tPhê duyệt Điều khoản Tham chiếu và ngân sách\tTháng 12/2025\u003c/p\u003e\u003cp\u003e2\tLựa chọn đơn vị cung cấp dịch vụ tư vấn (chuyên gia chính sách quốc gia) \tTháng 2/2026\t\u003c/p\u003e\u003cp\u003e3\tNghiên
