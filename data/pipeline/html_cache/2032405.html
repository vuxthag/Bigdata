iver automation projects on time, within scope, and within budget. This role bridges the gap between technical and business stakeholders to ensure alignment and successful project outcomes. Experienced Automation Manager to lead strategic automation initiatives across our organization in coordination with other area managers. This role combines project management expertise with technical knowledge of process automation and AI integration to drive operational excellence, efficiency improvements, and digital transformation. Requirements include management of complex automation projects while building and leading a high-performing team.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEssential Functions \u0026 Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Project Management Leadership\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Define project scope, goals, and deliverables in collaboration with stakeholders.\u003c/p\u003e\u003cp\u003e• Lead end-to-end (turn key) automation projects from conception to implementation and ongoing optimization.\u003c/p\u003e\u003cp\u003e• Develop comprehensive project plans, timelines, budgets, and resource allocation strategies.\u003c/p\u003e\u003cp\u003e• Work with leadership teams to develop and process capital funding proposals.\u003c/p\u003e\u003cp\u003e• Coordinate cross-functional teams including IT, Operations, Engineering, and external vendors.\u003c/p\u003e\u003cp\u003e• Manage project QAQC and required documentation.\u003c/p\u003e\u003cp\u003e• Implement project management methodologies (DFX) for research, conceptualization, design, and project implementation across multi-cultural teams and vendors.\u003c/p\u003e\u003cp\u003e• Provide regular project status updates to executive leadership and stakeholders.\u003c/p\u003e\u003cp\u003e• Coordinate/Delegate multi-discipline project activities at multiple facilities with cross-functional team members.\u003c/p\u003e\u003cp\u003e• Monitor project progress and adjust plans as needed.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Process Automation Strategy\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Identify, evaluate, and prioritize automation opportunities across manufacturing and business processes.\u003c/p\u003e\u003cp\u003e• Design and implement robotic process automation (RPA) solutions.\u003c/p\u003e\u003cp\u003e• Oversee PLC programming (internal and external teams), SCADA systems, and industrial automation technologies.\u003c/p\u003e\u003cp\u003e• Coordinate the development of standard operating procedures for automated systems.\u003c/p\u003e\u003cp\u003e• Ensure seamless integration between existing systems and new automation technologies with oversight on inter system safety.\u003c/p\u003e\u003cp\u003e• Monitor and optimize automated processes for maximum efficiency and ROI.\u003c/p\u003e\u003cp\u003e• Implement DFE concepts for future technologies and safety integration.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. AI Integration \u0026 Digital Transformation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Lead implementation of AI and machine learning solutions for predictive maintenance, quality control, and process optimization in coordination with associated leadership teams.\u003c/p\u003e\u003cp\u003e• Collaborate with data science teams to develop AI-powered analytics and decision-making tools.\u003c/p\u003e\u003cp\u003e• Integrate IoT sensors and smart manufacturing technologies.\u003c/p\u003e\u003cp\u003e• Evaluate and implement emerging technologies including computer vision, natural language processing, Smart Factory integration.\u003c/p\u003e\u003cp\u003e• Evaluate AI governance frameworks and best practices in coordination with IT and leadership as applied to current projects and overall leadership strategies.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u00
