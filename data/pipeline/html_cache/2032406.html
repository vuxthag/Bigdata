 nhất của chính mình.\r\n\r\n1. Thịnh vượng Thân trí: Hai yếu tố “trí tuệ” và “thể chất” luôn song hành và bổ trợ cho nhau trong chân dung Con người Thịnh vượng. VPBank luôn chú trọng đến việc: \r\n•\tXây dựng một môi trường làm việc lành mạnh\r\n•\tChăm sóc sức khỏe, khích lệ tinh thần luyện tập thể thao của CBNV\r\n•\tĐề cao văn hóa học tập, phát triển kỹ năng, cổ vũ và hỗ trợ cho sự học trọn đời của từng nhân viên.\r\n\r\n2. Thịnh vượng Tinh thần: VPBank ý thức được tầm quan trọng của đời sống tinh thần, sức mạnh của những suy nghĩ tích cực và lợi ích của sự cân bằng về cảm xúc đối với từng nhân viên. VPBank tập trung nỗ lực để:\r\n•\tKiến tạo môi trường làm việc công bằng, cởi mở, nhân văn.\r\n•\tĐồng hành và chia sẻ với CBNV thông qua chính sách, chương trình chăm sóc CBNV và người thân.\r\n\r\n3. Thịnh vượng Tài chính: VPBank ý thức rằng một nền tảng tài chính vững chắc sẽ mang lại chất lượng cuộc sống tốt hơn cho các VPBanker. VPBank luôn đảm bảo: \r\n•\tXây dựng chính sách về lương, thưởng phúc lợi, lộ trình thăng tiến rõ ràng, hấp dẫn.\r\n•\tGhi nhận xứng đáng mọi nỗ lực và cống hiến của CBNV.\r\n\r\n4. Thịnh vượng Cộng đồng: Mỗi VPBanker là một phần của xã hội, những đóng góp, nỗ lực của chính bản thân các VPBanker sẽ góp phần thay đổi và tạo nên một xã hội tốt đẹp hơn. Từ phía tổ chức, VPBank luôn xem trọng và hành động để thực hiện:\r\n•\tTrách nhiệm của doanh nghiệp với cộng đồng và xã hội. \r\n•\tThường xuyên thực hiện những chương trình, sáng kiến nhằm góp phần giúp cho xã hội, đất nước ngày một giàu đẹp, văn minh hơn."])</script><script>self.__next_f.push([1,"24:Te52,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eCác trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLà một trong những nhân sự nòng cốt đóng vai trò đầu não sáng tạo và dẫn dắt tư duy thương hiệu, chịu trách nhiệm khởi tạo big idea, định hình narrative và kiến tạo các xu hướng mới cho thương hiệu.\u003c/p\u003e\u003cp\u003eThông qua các chiến dịch và dự án mang tính biểu tượng, vị trí này góp phần đưa VPBank trở thành thương hiệu dẫn dắt thị trường, khác biệt và có ảnh hưởng dài hạn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm chính (Key Responsibilities)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Dẫn dắt sáng tạo \u0026 tư duy thương hiệu (Creative \u0026 Brand Leadership)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Định hình tư duy sáng tạo chủ đạo cho thương hiệu: concept, big idea, narrative, brand story\u003c/p\u003e\u003cp\u003e• Chủ động khởi tạo và dẫn dắt các xu hướng truyền thông - thương hiệu, thay vì chỉ phản ứng theo thị trường\u003c/p\u003e\u003cp\u003e• Nghiên cứu sâu các xu thế văn hóa - xã hội - tiêu dùng - công nghệ, chuyển hóa thành ý tưởng thương hiệu có giá trị dài hạn\u003c/p\u003e\u003cp\u003e• Đóng vai trò brand guardian \u0026 brand visionary, đảm bảo thương hiệu luôn mới, khác biệt nhưng nhất quán\u003c/p\u003e\u003cp\u003e• Bám sát định hướng kinh doanh để đề xuất các chiến lược và chiến dịch thương hiệu theo quý/năm\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Khởi tạo \u0026 dẫn dắt các chiến dịch/ dự án thương hiệu lớn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Trực tiếp khởi xướng, phát triển và dẫn dắt các chiến dịch thương hiệu mang tính biểu tượng (iconic campaigns, cultural branding, sponsorships, large-scale brand projects)\u003c/p\u003e\u003cp\u003e• Định hướng sáng tạo tổng thể cho các dự án: từ concept, thông điệp, trải nghiệm đến cách kể câu chuyện thương hiệu\u003c/p\u003e\u003cp\u003e• Đảm bảo mỗi chiến dịch luôn mới - khác - có khả năng tạo ảnh hưởng và lan tỏa xu thế\u003c/p\u003e\u003cp\u003e• Trực tiếp đóng vai trò creative owner khi làm việc với agency, đối tác sáng tạo, production house, nghệ sĩ, KOLs…\u003c/p\u003e\u003cp\u003e• Điều phối đa bên (nội bộ - đối tác) để đảm bảo chất lượng và hiệu quả tổng thể\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Định vị thương hiệu \u0026 tạo ảnh hưởng thị trường\u003c/strong\ 3cp\u003e• Đóng vai trò brand guardian \u0026 brand visionary, đảm bảo thương hiệu luôn mới, khác biệt nhưng nhất quán\u003c/p\u003e\u003cp\u003e• Bám sát định hướng kinh doanh để đề xuất các chiến lược và chiến dịch thương hiệu theo quý/năm\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Khởi tạo \u0026 dẫn dắt các chiến dịch/ dự án thương hiệu lớn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Trực tiếp khởi xướng, phát triển và dẫn dắt các chiến dịch thương hiệu mang tính biểu tượng (iconic campaigns, cultural branding, sponsorships, large-scale brand projects)\u003c/p\u003e\u003cp\u003e• Định hướng sáng tạo tổng thể cho các dự án: từ concept, thông điệp, trải nghiệm đến cách kể câu chuyện thương hiệu\u003c/p\u003e\u003cp\u003e• Đảm bảo mỗi chiến dịch luôn mới - khác - có khả năng tạo ảnh hưởng và lan tỏa xu thế\u003c/p\u003e\u003cp\u003e• Trực tiếp đóng vai trò creative owner khi làm việc với agency, đối tác sáng tạo, production house, nghệ sĩ, KOLs…\u003c/p\u003e\u003cp\u003e• Điều phối đa bên (nội bộ - đối tác) để đảm bảo chất lượng và hiệu quả tổng thể\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Định vị thương hiệu \u0026 tạo ảnh hưởng thị trường\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng, củng cố và liên tục làm mới định vị thương hiệu theo hướng tiên phong, dẫn dắt\u003c/p\u003e\u003cp\u003e• Phát triển các brand platform dài hạn (brand platform, brand property, signature projects)\u003c/p\u003e\u003cp\u003e• Đảm bảo thương hiệu có tiếng nói riêng, cá tính rõ ràng và tạo được thảo luận, ảnh hưởng tích cực trên thị trường\u003c/p\u003e\u003cp\u003e• Theo dõi, đánh giá tác động văn hóa - xã hội - truyền thông của các hoạt động thương hiệu (beyond media metrics) của VPBank và các đối thủ\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. Đảm nhiệm vai trò tư vấn và kiểm soát chuẩn mực thương hiệu trên toàn hệ thống\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tư vấn, phản biện và tham gia phê duyệt các chiến dịch marketing - thương hiệu của các kh nh thần, sức mạnh của những suy nghĩ tích cực và lợi ích của sự cân bằng về cảm xúc đối với từng nhân viên. VPBank tập trung nỗ lực để:\r\n•\tKiến tạo môi trường làm việc công bằng, cởi mở, nhân văn.\r\n•\tĐồng hành và chia sẻ với CBNV thông qua chính sách, chương trình chăm sóc CBNV và người thân.\r\n\r\n3. Thịnh vượng Tài chính: VPBank ý thức rằng một nền tảng tài chính vững chắc sẽ mang lại chất lượng cuộc sống tốt hơn cho các VPBanker. VPBank luôn đảm bảo: \r\n•\tXây dựng chính sách về lương, thưởng phúc lợi, lộ trình thăng tiến rõ ràng, hấp dẫn.\r\n•\tGhi nhận xứng đáng mọi nỗ lực và cống hiến của CBNV.\r\n\r\n4. Thịnh vượng Cộng đồng: Mỗi VPBanker là một phần của xã hội, những đóng góp, nỗ lực của chính bản thân các VPBanker sẽ góp phần thay đổi và tạo nên một xã hội tốt đẹp hơn. Từ phía tổ chức, VPBank luôn xem trọng và hành động để thực hiện:\r\n•\tTrách nhiệm của doanh nghiệp với cộng đồng và xã hội. \r\n•\tThường xuyên thực hiện những chương trình, sáng kiến nhằm góp phần giúp cho xã hội, đất nước ngày một giàu đẹp, văn minh hơn."])</script><script>self.__next_f.push([1,"41:{\"companyId\":35815,\"jobImageURLs\":\"$42\",\"jobVideoURLs\":null,\"companyName\":\"VPBank - Https://tuyendung.vpbank.com.vn/\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/89/11125541.png\",\"companySizeId\":\"\",\"companyProfile\":\"$43\",\"contactName\":\"Khối Quản Trị Nguồn Nhân Lực\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Khối Quản Trị Nguồn Nhân Lực - 89 Láng Hạ, Quận Đống Đa, Hà Nội\",\"allowRedirect\":1,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"https://images02.vietnamworks.com/companyprofile/VPBANK/vi/noi_lam_viec_hanh_phuc_nhat_2019_-2-02_1_.jpg\",\"companyProfileUrl\":\"https://www.vietnamworks.com/company/vpbank\",\"allowRedirectJobIds\":\"1957236\",\"profilePublishedSiteMask\":3,\"bannerDesktopUri\":\"https://images02.vietnamworks.c
