ng\u003ePhòng Phát triển Dự án\u003c/strong\u003e, chịu trách nhiệm điều phối toàn bộ hoạt động thi công hàng ngày tại công trường các dự án “Spoke”. Vị trí này đóng vai trò cầu nối giữa đội ngũ phát triển nội bộ và nhà thầu, đảm bảo công việc triển khai an toàn, đúng tiến độ và đạt chuẩn chất lượng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCông việc tập trung vào 5 mảng chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e2.\tAn toàn \u0026 Tuân thủ\u003c/p\u003e\u003cp\u003e3.\tQuản lý \u0026 Phối hợp thi công\u003c/p\u003e\u003cp\u003e4.\tHỗ trợ kỹ thuật \u0026 Giải quyết vấn đề\u003c/p\u003e\u003cp\u003e5.\tQuản lý bàn giao công trình\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ VÀ TRÁCH NHIỆM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiám sát công trường và đảm bảo chất lượng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGiám sát toàn bộ hoạt động thi công hàng ngày cho các dự án “Spoke”, đảm bảo công việc thực hiện đúng bản vẽ, thông số kỹ thuật và tiến độ phê duyệt.\u003c/p\u003e\u003cp\u003e•\tThực hiện kiểm tra chất lượng định kỳ đối với vật tư, nhân công và quy trình lắp đặt, đảm bảo tuân thủ tiêu chuẩn chất lượng của Aspire.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo các phương pháp thi công luôn đúng kỹ thuật, tuân thủ quy chuẩn pháp lý xuyên suốt từ móng, cọc đến hoàn thiện.\u003c/p\u003e\u003cp\u003e•\tPhối hợp chặt chẽ với nhà thầu, tư vấn và các phòng ban liên quan để xử lý kịp thời các vấn đề tại công trường, duy trì tiêu chuẩn chất lượng đã đề ra.\u003c/p\u003e\u003cp\u003e•\tLưu trữ đầy đủ hồ sơ công trường, biên bản kiểm tra và quy trình kiểm soát chất lượng nhằm đảm bảo tính minh bạch và trách nhiệm giải trình.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAn toàn \u0026 Tuân thủ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐảm bảo toàn bộ hoạt động thi công tuân thủ tiêu chuẩn HSE của Aspire và quy trình an toàn cụ thể tại công trường; kiểm tra việc trang bị và sử dụng trang bị bảo hộ an toàn đúng quy định.\u003c/p\u003e\u003cp\u003e•\tThực hiện kiểm tra hiện trường định kỳ, ghi nhận điều kiện an toàn, theo dõi và khắc phục các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e•\tTạo dựng môi trường làm việc an toàn thông qua truyền đạt rõ ràng, phổ biến quy định và duy trì nhắc nhở để nhà thầu, công nhân luôn tuân thủ.\u003c/p\u003e\u003cp\u003e•\tChủ động phát hiện rủi ro an toàn hoặc hành vi không tuân thủ, báo cáo kịp thời để khắc phục.\u003c/p\u003e\u003cp\u003e•\tXử lý và lưu trữ hồ sơ sự cố, tình huống suýt gây sự cố (near-miss) để đảm bảo cải tiến liên tục.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiám sát và Điều phối Xây dựng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ Giám đốc Dự án và Giám đốc Thiết kế trong việc điều phối công việc thi công hàng ngày, đảm bảo sự đồng bộ giữa tất cả các bên liên quan.\u003c/p\u003e\u003cp\u003e•\tTham gia kiểm soát chất lượng và kịp thời nhận diện, giảm thiểu rủi ro thi công thông qua phối hợp chủ động.\u003c/p\u003e\u003cp\u003e•\tRà soát bản vẽ thi công, thông số kỹ thuật và hồ sơ trình duyệt để đảm bảo tính chính xác, tính khả thi và tuân thủ yêu cầu dự án.\u003c/p\u003e\u003cp\u003e•\tTheo dõi tiến độ so với kế hoạch thi công, nhận diện nguy cơ chậm trễ, hỗ trợ xử lý kịp thời cùng đội ngũ dự án.\u003c/p\u003e\u003cp\u003e•\tÁp dụng hiểu biết về quy chuẩn xây dựng Việt Nam và tiêu chuẩn quốc tế để duy trì tính tuân thủ trong suốt quá trình thi công.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHỗ trợ kỹ thuật \u0026 giải quyết vấn đề\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ phối hợp và giải quyết các vấn đề kỹ thuật phát sinh tại công trường, hạn chế ảnh hưởng đến tiến độ.\u003c/p\u003e\u003cp\u003e•\tĐiều phối hiệu quả MEP, kết cấu, kiến trúc để đảm bảo thi công đồng bộ, giữ vững ý đồ thiết kế và tính khả thi; hỗ trợ đội dự án ra quyết định kịp thời, hiệu quả.\u003c/p\u003e\u003cp\u003e•\tNhận diện, xử lý xung đột bản vẽ, phối hợp chặt chẽ với tư vấn, nhà thầu để đưa ra giải pháp thực tế.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo mọi giải pháp kỹ thuật tuân thủ tiêu chuẩn Aspire, giữ vững chất lượng và mục tiêu tổng thể của dự án.\u003c/p\u003e\u003cp\u003e•\tGhi chép, lưu trữ các vấn đề kỹ thuật và cách xử lý để chia sẻ kinh nghiệm, áp dụng cải tiến cho các dự án “Spoke” tiếp theo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý bàn giao\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm tra, nghiệm thu vật tư đưa đến công trường, đảm bảo đáp ứng tiêu chuẩn kỹ thuật và tiến độ thi công.\u003c/p\u003e\u003cp\u003e•\tGiám sát quá trình lắp đặt, chạy thử, nghiệm thu thiết bị để đảm bảo vận hành đúng thiết kế, đạt chuẩn chất lượng.\u003c/p\u003e\u003cp\u003e•\tThực hiện kiểm tra các lỗi tồn đọng phối hợp xử lý kịp thời để bàn giao đạt chất lượng tốt nhất.\u003c/p\u003e\u003cp\u003e•\tChuẩn bị và bàn giao đầy đủ hồ sơ: bản vẽ hoàn công, hướng dẫn vận hành – bảo trì, chứng từ bảo hành; lưu trữ hồ sơ vật tư, kết quả thử nghiệm phục vụ công tác vận hành – bảo trì về sau.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, xử lý lỗi phát sinh trong thời gian bảo hành công trình cùng nhà thầu, nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tPhối hợp chặt chẽ với nhà thầu và các phòng ban Aspire để quy trình bàn giao diễn ra hoàn chỉnh, đồng bộ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTạo báo cáo tiến độ hàng ngày ngắn gọn cho việc sử dụng nội bộ.\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T7b8,\u003cp\u003e\u003cstrong\u003eBằng cấp \u0026 Chứng chỉ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp ngành Xây dựng Dân dụng \u0026 Công nghiệp, Kết cấu hoặc MEP.\u003c/p\u003e\u003cp\u003e•\tChứng chỉ hành nghề kỹ sư xây dựng hợp lệ.\u003c/p\u003e\u003cp\u003e•\tChứng chỉ Chỉ huy trưởng công trường (Cấp 2).\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên sử dụng tiếng Anh thành thạo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTối thiểu 8-10 năm trong ngành xây dựng.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm thực tế trong việc quản lý các dự án xây dựng.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên từng tham gia các dự án công trình quy mô vừa (mid-rise), bao gồm công trình có hai tầng hầm; kinh nghiệm với dự án căn hộ hoặc khách sạn là lợi thế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNăng lực \u0026 Kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKhả năng lãnh đạo và phối hợp tốt để quản lý nhà thầu chính, thầu phụ, nhà cung cấp và các phòng ban nội bộ.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên thành thạo AutoCAD, Microsoft Office; biết sử dụng Microsoft Project là lợi thế.\u003c/p\u003e\u003cp\u003e•\tHiểu rõ quy trình thi công, tiêu chuẩn chất lượng và quy định an toàn lao động.\u003c/p\u003e\u003cp\u003e•\tCó khả năng tự lên kế hoạch, quản lý và triển khai hoạt động thi công một cách độc lập.\u003c/p\u003e\u003cp\u003e•\tKỹ năng xử lý các vấn đề kỹ thuật phát sinh tại công trường với cách tiếp cận thực tế.\u003c/p\u003e\u003cp\u003e•\tTrung thực, đáng tin cậy, đúng giờ, có tinh thần trách nhiệm và tính chuyên nghiệp cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thu nhập cạnh tranh + thưởng theo doanh số /hiệu quả leasing hàng năm.\u003c/p\u003e\u003cp\u003e• Phụ cấp theo chính sách công ty.\u003c/p\u003e\u003cp\u003e• Hợp đồng lao động, BHXH – BHYT – BHSK đầy đủ.\u003c/p\u003e\u003cp\u003e• Môi trường trẻ – chuyên nghiệp – nhiều cơ hội thăng tiến\u003c/p\u003e26:T4e6,About Aspire\r\nInvesting in Tomorrow’s Communities\r\nAsp"])</script><script>self.__next_f.push([1,"i với kế hoạch thi công, nhận diện nguy cơ chậm trễ, hỗ trợ xử lý kịp thời cùng đội ngũ dự án.\u003c/p\u003e\u003cp\u003e•\tÁp dụng hiểu biết về quy chuẩn xây dựng Việt Nam và tiêu chuẩn quốc tế để duy trì tính tuân thủ trong suốt quá trình thi công.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHỗ trợ kỹ thuật \u0026 giải quyết vấn đề\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ phối hợp và giải quyết các vấn đề kỹ thuật phát sinh tại công trường, hạn chế ảnh hưởng đến tiến độ.\u003c/p\u003e\u003cp\u003e•\tĐiều phối hiệu quả MEP, kết cấu, kiến trúc để đảm bảo thi công đồng bộ, giữ vững ý đồ thiết kế và tính khả thi; hỗ trợ đội dự án ra quyết định kịp thời, hiệu quả.\u003c/p\u003e\u003cp\u003e•\tNhận diện, xử lý xung đột bản vẽ, phối hợp chặt chẽ với tư vấn, nhà thầu để đưa ra giải pháp thực tế.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo mọi giải pháp kỹ thuật tuân thủ tiêu chuẩn Aspire, giữ vững chất lượng và mục tiêu tổng thể của dự án.\u003c/p\u003e\u003cp\u003e•\tGhi chép, lưu trữ các vấn đề kỹ thuật và cách xử lý để chia sẻ kinh nghiệm, áp dụng cải tiến cho các dự án “Spoke” tiếp theo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý bàn giao\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm tra, nghiệm thu vật tư đưa đến công trường, đảm bảo đáp ứng tiêu chuẩn kỹ thuật và tiến độ thi công.\u003c/p\u003e\u003cp\u003e•\tGiám sát quá trình lắp đặt, chạy thử, nghiệm thu thiết bị để đảm bảo vận hành đúng thiết kế, đạt chuẩn chất lượng.\u003c/p\u003e\u003cp\u003e•\tThực hiện kiểm tra các lỗi tồn đọng phối hợp xử lý kịp thời để bàn giao đạt chất lượng tốt nhất.\u003c/p\u003e\u003cp\u003e•\tChuẩn bị và bàn giao đầy đủ hồ sơ: bản vẽ hoàn công, hướng dẫn vận hành – bảo trì, chứng từ bảo hành; lưu trữ hồ sơ vật tư, kết quả thử nghiệm phục vụ công tác vận hành – bảo trì về sau.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, xử lý lỗi phát sinh trong thời gian bảo hành công trình cùng nhà thầu, nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tPhối hợp chặt chẽ với nhà thầu và các phòng ban Aspire để quy trình bàn giao diễn ra hoàn chỉnh, đồng bộ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTạo báo cáo tiến độ hàng ngày ngắn gọn cho việc sử dụng nội bộ.\u003c/strong\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:T7b8,\u003cp\u003e\u003cstrong\u003eBằng cấp \u0026 Chứng chỉ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp ngành Xây dựng Dân dụng \u0026 Công nghiệp, Kết cấu hoặc MEP.\u003c/p\u003e\u003cp\u003e•\tChứng chỉ hành nghề kỹ sư xây dựng hợp lệ.\u003c/p\u003e\u003cp\u003e•\tChứng chỉ Chỉ huy trưởng công trường (Cấp 2).\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên sử dụng tiếng Anh thành thạo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTối thiểu 8-10 năm trong ngành xây dựng.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm thực tế trong việc quản lý các dự án xây dựng.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên từng tham gia các dự án công trình quy mô vừa (mid-rise), bao gồm công trình có hai tầng hầm; kinh nghiệm với dự án căn hộ hoặc khách sạn là lợi thế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNăng lực \u0026 Kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKhả năng lãnh đạo và phối hợp tốt để quản lý nhà thầu chính, thầu phụ, nhà cung cấp và các phòng ban nội bộ.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên thành thạo AutoCAD, Microsoft Office; biết sử dụng Microsoft Project là lợi thế.\u003c/p\u003e\u003cp\u003e•\tHiểu rõ quy trình thi công, tiêu chuẩn chất lượng và quy định an toàn lao động.\u003c/p\u003e\u003cp\u003e•\tCó khả năng tự lên kế hoạch, quản lý và triển khai hoạt động thi công một cách độc lập.\u003c/p\u003e\u003cp\u003e•\tKỹ năng xử lý các vấn đề kỹ thuật phát sinh tại công trường với cách tiếp cận thực tế.\u003c/p\u003e\u003cp\u003e•\tTrung thực, đáng tin cậy, đúng giờ, có tinh thần trách nhiệm và tính chuyên nghiệp cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thu nhập cạnh tranh + thưởng theo doanh số /hiệu quả leasing hàng năm.\u003c/p\u003e\u003cp\u003e• Phụ cấp theo chính sách công ty.\u003c/p\u003e\u003cp\u003e• Hợp đồng lao động, BHXH – BHYT – BHSK đầy đủ.\u003c/p\u003e\u003cp\u003e• Môi trường trẻ – chuyên nghiệp – nhiều cơ hội thăng tiến\u003c/p\u003e2d:{\"skillName\":\"Quản Lý Dự Án\",\"skillId\":78,\"skillWeight\""])</script><script>self.__next_f.push([1,":100,\"isExisted\":false}\n2e:{\"skillName\":\"Xây Dựng Dân Dụng và Công Nghiệp\",\"skillId\":993112,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"MEP\",\"skillId\":77261,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"Kỹ sư Xây dựng dân dụng \u0026 công nghiệp\",\"skillId\":1062087,\"skillWeight\":100,\"isExisted\":false}\n31:{\"skillName\":\"Site Manager\",\"skillId\":1201289,\"skillWeight\":100,\"isExisted\":false}\n2c:[\"$2d\",\"$2e\",\"$2f\",\"$30\",\"$31\"]\n33:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"Hỗ trợ phụ cấp thực tập và hỗ trợ dấu thực tập (nếu cần).\"}\n34:{\"benefitId\":4,\"benefitIconName\":\"fa-graduation-cap\",\"benefitName\":\"Training\",\"benefitNameVI\":\"Đào tạo\",\"benefitValue\":\"Được đào tạo bài bản về quy trình Quản lý hồ sơ chuyên nghiệp (Document Management).\"}\n35:{\"benefitId\":15,\"benefitIconName\":\"fa-check-square-o\",\"benefitName\":\"Others\",\"benefitNameVI\":\"Khác\",\"benefitValue\":\"Làm việc trong môi trường thực tế và chuyên nghiệp, tiếp xúc với các loại hình hợp đồng kinh tế đa dạng. Cơ hội trở thành nhân viên chính thức nếu thể hiện năng lực tốt.\"}\n32:[\"$33\",\"$34\",\"$35\"]\n38:{\"lat\":10.8
