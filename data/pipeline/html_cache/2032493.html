 xây dựng được thương hiệu trong ngành bất động sản và trong lòng nhà đầu tư nên có rất nhiều đối tác muốn được hợp tác với Công ty Khang Việt. Hơn nữa, Công ty Khang Việt có lợi thế vượt trội mà các công ty khác không thể có được và lợi thế này sẽ quyết định lợi thế cạnh tranh trong tương lai giữa các công ty hoạt động trong ngành địa ốc. Công ty Khang Việt hiện đang sở hữu quỹ đất rất lớn từ các dự án sẽ khai thác trong tương lai\r\n\r\n* Website: https://www.khangan.com/index.php?module=recruitments\u0026function=intro"])</script><script>self.__next_f.push([1,"24:T8c0,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMục tiêu công việc: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm quản lý toàn bộ các dự án đầu tư bất động sản của công ty từ giai đoạn chuẩn bị, pháp lý, thiết kế, thi công đến hoàn thiện và bàn giao, đảm bảo đúng tiến độ – ngân sách – chất lượng – pháp lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Lập và thực hiện tiến độ các dự án, kế hoạch tổng thể triển khai các dự án theo chiến lược đầu tư của công ty.\u003c/p\u003e\u003cp\u003e• Tổ chức công tác chuẩn bị đầu tư: khảo sát, xin chủ trương, quy hoạch, đấu nối, đánh giá tác động môi trường, phòng cháy chữa cháy...\u003c/p\u003e\u003cp\u003e• Làm việc trực tiếp với các cơ quan nhà nước liên quan để xử lý các thủ tục pháp lý, quy hoạch, giấy phép xây dựng…\u003c/p\u003e\u003cp\u003e• Kiểm tra, kiểm soát tiến độ, chất lượng và chi phí thực hiện dự án; đề xuất phương án xử lý khi có rủi ro phát sinh.\u003c/p\u003e\u003cp\u003e• Quản lý đội ngũ ban quản lý dự án, phối hợp các phòng ban liên quan như pháp lý, tài chính, kế hoạch và kinh doanh.\u003c/p\u003e\u003cp\u003e• Tổ chức bán các Sản phẩm đất Nông nghiệp (Theo danh sách bán hàng được duyệt)\u003c/p\u003e\u003cp\u003e• Tiến hành Đổi đất các hộ khó đền bù trong dự án.\u003c/p\u003e\u003cp\u003e• Làm việc để Vay ngân hàng/tổ chức tín dụng/quỹ tài chính.\u003c/p\u003e\u003cp\u003e• Thu hồi công nợ khó đòi.\u003c/p\u003e\u003cp\u003e• Khả năng tham gia và thực hiện các hoạt động M\u0026A dự án: đánh giá cơ hội đầu tư, phân tích rủi ro, đề xuất phương án mua bán/sáp nhập hoặc tái cấu trúc dự án khi cần thiết.\u003c/p\u003e\u003cp\u003e• Quản lý dòng tiền \u0026 nguồn tiền của dự án: lập kế hoạch thu–chi, theo dõi dòng tiền thường xuyên, đảm bảo thanh khoản và sử dụng vốn hiệu quả.\u003c/p\u003e\u003cp\u003e• Lên kế hoạch tài chính cho dự án: xây dựng ngân sách, dự báo chi phí – doanh thu – lợi nhuận theo từng giai đoạn; phối hợp với bộ phận tài chính để tối ưu hiệu quả đầu tư.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T533,\u003cp\u003e• Nam/Nữ từ 35–55 tuổi.\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học trở lên chuyên ngành: Luật, Xây dựng, Kỹ thuật hạ tầng, Kiến trúc, Kinh tế xây dựng, Quản lý dự án.\u003c/p\u003e\u003cp\u003e• Có ít nhất 10 năm kinh nghiệm triển khai các dự án bất động sản với quy mô vừa và lớn; tối thiểu 5 năm ở vị trí tương đương.\u003c/p\u003e\u003cp\u003e• Am hiểu sâu sắc về pháp lý đầu tư, quy hoạch, quản lý xây dựng, đấu thầu và tổ chức thi công.\u003c/p\u003e\u003cp\u003e• Kỹ năng quản lý, điều phối nhiều dự án đồng thời; làm việc với chính quyền và cơ quan chức năng hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* PHÚC LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tMức lương:\u003c/strong\u003e từ 100 triệu VNĐ/tháng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tXe đưa đón riêng\u003c/strong\u003e từ nơi ở đến công ty và ngược lại\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBảo hiểm xã hội, y tế và thất nghiệp\u003c/strong\u003e theo quy định nhà nước\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng theo tiến độ và hiệu quả của từng dự án\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTham gia chuyến du lịch nước ngoài hàng
