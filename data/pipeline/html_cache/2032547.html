003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Quản lý và Điều phối Nhân sự\u003c/p\u003e\u003cp\u003e• Phân công công việc: Sắp xếp lịch làm việc, phân chia ca trực hợp lý để không bị gián\u003c/p\u003e\u003cp\u003eđoạn vận hành.\u003c/p\u003e\u003cp\u003e• Đào tạo tại chỗ: Trực tiếp hướng dẫn nhân viên mới và đào tạo lại (upskill) cho nhân\u003c/p\u003e\u003cp\u003eviên cũ để duy trì năng lực đồng đều.\u003c/p\u003e\u003cp\u003e• Đánh giá hiệu suất: Theo dõi thái độ, tác phong và hiệu quả công việc của nhân viên\u003c/p\u003e\u003cp\u003edưới quyền để báo cáo về trụ sở.\u003c/p\u003e\u003cp\u003e+ Đảm bảo các trải nghiệm khách hàng tại cơ sở tốt nhất\u003c/p\u003e\u003cp\u003e+ Tiếp nhận và nhanh chóng giải quyết khiếu nại mà nhân viên các bộ phận không thể giải\u003c/p\u003e\u003cp\u003equyết, đảm bảo khách hàng hài lòng\u003c/p\u003e\u003cp\u003e+ Theo dõi, thu thập phản hồi của khách hàng để hoàn thiện chất lượng dịch vụ\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Đảm bảo Tiêu chuẩn Diện mạo \u0026 Tác phong\u003c/p\u003e\u003cp\u003e• Đồng phục: Phải sạch sẽ, phẳng phiu, đúng quy định của khách sạn.\u003c/p\u003e\u003cp\u003e• Diện mạo: Tóc tai gọn gàng, bảng tên đeo đúng vị trí, thái độ niềm nở và sẵn sàng phục\u003c/p\u003e\u003cp\u003evụ.\u003c/p\u003e\u003cp\u003e4. Giải quyết Vấn đề \u0026 Khiếu nại\u003c/p\u003e\u003cp\u003e• Tiếp nhận và nhanh chóng giải quyết khiếu nại mà nhân viên các bộ phận không thể giải\u003c/p\u003e\u003cp\u003equyết, đảm bảo khách hàng hài lòng\u003c/p\u003e\u003cp\u003e• Theo dõi, thu thập phản hồi của khách hàng để hoàn thiện chất lượng dịch vụ\u003c/p\u003e\u003cp\u003e• Ghi chép và báo cáo các sự cố phát sinh trong ca làm việc vào sổ nhật ký (logbook)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5. Công việc khác:\u003c/p\u003e\u003cp\u003e• Phụ trách công việc một ca lễ tân\u003c/p\u003e\u003cp\u003e• Tổng hợp, báo cáo công việc tới trụ sở\u003c/p\u003e\u003cp\u003e• Đ
