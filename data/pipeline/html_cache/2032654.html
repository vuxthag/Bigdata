am đến thời điểm hiện tại không chỉ đối với tôi, các cộng sự mà đối với tất cả nhân viên hãng bay trẻ Vietravel Airlines đều là một nỗ lực cống hiến tuyệt vời, đầy kỷ niệm và những hành động phi thường để tạo ra sự khác biệt.\r\n\r\nKhát khao thành lập một hãng hàng không du lịch mang đậm tinh thần Việt Nam đã thành hiện thực khi được Chính Phủ đồng ý chủ trương ngày 03/04/2020 và Bộ Giao Thông Vận Tải cấp phép vận chuyển hành khách ngày 29/10/2020. Chuyến bay thương mại đầu tiên của Vietravel Airlines được khai trương vào ngày 25/01/2021, đánh dấu sự cất cánh của một thương hiệu hàng không mới trên bầu trời Việt Nam và Quốc Tế. \r\n\r\nKết hợp cùng hệ sinh thái du lịch đa dạng và chuyên nghiệp của Vietravel Corporation, chúng tôi cam kết mỗi hành trình bay đều là một trải nghiệm theo đúng tinh thần của một hãng hàng không du lịch từ trải nghiệm văn hoá, lịch sử, con người; cho đến ẩm thực của từng điểm đến thông qua dịch vụ và sản phẩm được cung cấp từ trái tim và sự sáng tạo của đội ngũ Vietravel Airlines. \r\n\r\nTầm nhìn\r\n\r\nVietravel Airlines mong muốn trở thành đơn vị vận tải hàng không hàng đầu khu vực trong phân khúc hãng hàng không hybrid kết hợp hệ sinh thái du lịch đa dạng. Với niềm đam mê bầu trời, tầm nhìn dài hạn, kết hợp những sáng kiến \u0026 kinh nghiệm trong ngành hàng không và du lịch, chúng tôi quyết tâm trở thành thương hiệu hàng không Việt Nam hàng đầu thế giới mang lại những sản phẩm hàng không độc đáo, thú vị, tin cậy và dễ dàng tiếp cận đối với mọi người.\r\n\r\nSứ mệnh\r\n\r\nVới tinh thần thúc đẩy kết nối và tạo lập các giá trị, Vietravel Airlines và đội ngũ không ngừng nỗ lực mang đến những sản phẩm hàng không chất lượng, đa dạng và dễ dàng tiếp cận dành cho mọi người thông qua việc ứng dụng các cải tiến công nghệ và tối ưu hoạt động của doanh nghiệp, song song với việc tăng cường các trải nghiệm độc đáo và thú vị trên mỗi hành trình của khách hàng.\r\n\r\nGiá trị cốt lõi\r\n\r\nSự thiện cảm: Niềm vui và sự hài lòng của khách hàng, cộng đồng là trọng tâm trong sự phát triển của Hãng.\r\nSự tin cậy: Vietravel Airlines tuân thủ nghiêm ngặt các quy tắc về an toàn và chất lượng; đảm bảo tính minh bạch, tử tế, trung thực và nhất quán.\r\nSự độc đáo và thú vị: Tạo ra những dấu ấn khác biệt cho sản phẩm hàng không Việt.\r\nTinh thần Việt Nam: Xuất thân là một thương hiệu Việt, được sáng lập và vận hành bởi một tập thể người Việt cần mẫn, sáng tạo, dũng cảm và chung sức cho những mục tiêu phi thường.\r\nTruy cập website của Vietravel tại: https://vietravelairlines.talent.vn/"])</script><script>self.__next_f.push([1,"24:T124c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTóm tắt vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eJob Summary  \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện kiểm tra, giám sát và đánh giá khai thác tàu bay, huấn luyện và nhà cung ứng theo chương trình đánh giá;  \u003c/p\u003e\u003cp\u003e\u003cem\u003ePerform Operations audit, training audit, Supplier/ Contractor audit and inspection/surveillance operations quality as required by audit plan  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Rà soát, đánh giá tài liệu, hồ sơ khai thác tàu bay, huấn luyện và hồ sơ nhà cung ứng trước khi trình phê chuẩn;  \u003c/p\u003e\u003cp\u003e\u003cem\u003eReview the manual of flight operations, ground operations, training and supplier’s prior submission for approval  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện các công việc khác mà Trưởng phòng OQA giao;  \u003c/p\u003e\u003cp\u003e\u003cem\u003ePerform other tasks assigned by General Manager of OQA.  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm và nhiệm vụ  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eResponsibilities and accountabilities  \u003c/em\u003e\u003c/strong Tế. \r\n\r\nKết hợp cùng hệ sinh thái du lịch đa dạng và chuyên nghiệp của Vietravel Corporation, chúng tôi cam kết mỗi hành trình bay đều là một trải nghiệm theo đúng tinh thần của một hãng hàng không du lịch từ trải nghiệm văn hoá, lịch sử, con người; cho đến ẩm thực của từng điểm đến thông qua dịch vụ và sản phẩm được cung cấp từ trái tim và sự sáng tạo của đội ngũ Vietravel Airlines. \r\n\r\nTầm nhìn\r\n\r\nVietravel Airlines mong muốn trở thành đơn vị vận tải hàng không hàng đầu khu vực trong phân khúc hãng hàng không hybrid kết hợp hệ sinh thái du lịch đa dạng. Với niềm đam mê bầu trời, tầm nhìn dài hạn, kết hợp những sáng kiến \u0026 kinh nghiệm trong ngành hàng không và du lịch, chúng tôi quyết tâm trở thành thương hiệu hàng không Việt Nam hàng đầu thế giới mang lại những sản phẩm hàng không độc đáo, thú vị, tin cậy và dễ dàng tiếp cận đối với mọi người.\r\n\r\nSứ mệnh\r\n\r\nVới tinh thần thúc đẩy kết nối và tạo lập các giá trị, Vietravel Airlines và đội ngũ không ngừng nỗ lực mang đến những sản phẩm hàng không chất lượng, đa dạng và dễ dàng tiếp cận dành cho mọi người thông qua việc ứng dụng các cải tiến công nghệ và tối ưu hoạt động của doanh nghiệp, song song với việc tăng cường các trải nghiệm độc đáo và thú vị trên mỗi hành trình của khách hàng.\r\n\r\nGiá trị cốt lõi\r\n\r\nSự thiện cảm: Niềm vui và sự hài lòng của khách hàng, cộng đồng là trọng tâm trong sự phát triển của Hãng.\r\nSự tin cậy: Vietravel Airlines tuân thủ nghiêm ngặt các quy tắc về an toàn và chất lượng; đảm bảo tính minh bạch, tử tế, trung thực và nhất quán.\r\nSự độc đáo và thú vị: Tạo ra những dấu ấn khác biệt cho sản phẩm hàng không Việt.\r\nTinh thần Việt Nam: Xuất thân là một thương hiệu Việt, được sáng lập và vận hành bởi một tập thể người Việt cần mẫn, sáng tạo, dũng cảm và chung sức cho những mục tiêu phi thường.\r\nTruy cập website của Vietravel tại: https://vietravelairlines.talent.vn/"])</script><script>self.__next_f.push([1,"29:Td2e,"])</script><script>self.__next_f.push([ h hàng.\r\n\r\nGiá trị cốt lõi\r\n\r\nSự thiện cảm: Niềm vui và sự hài lòng của khách hàng, cộng đồng là trọng tâm trong sự phát triển của Hãng.\r\nSự tin cậy: Vietravel Airlines tuân thủ nghiêm ngặt các quy tắc về an toàn và chất lượng; đảm bảo tính minh bạch, tử tế, trung thực và nhất quán.\r\nSự độc đáo và thú vị: Tạo ra những dấu ấn khác biệt cho sản phẩm hàng không Việt.\r\nTinh thần Việt Nam: Xuất thân là một thương hiệu Việt, được sáng lập và vận hành bởi một tập thể người Việt cần mẫn, sáng tạo, dũng cảm và chung sức cho những mục tiêu phi thường.\r\nTruy cập website của Vietravel tại: https://vietravelairlines.talent.vn/"])</script><script>self.__next_f.push([1,"2a:T124c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTóm tắt vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eJob Summary  \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện kiểm tra, giám sát và đánh giá khai thác tàu bay, huấn luyện và nhà cung ứng theo chương trình đánh giá;  \u003c/p\u003e\u003cp\u003e\u003cem\u003ePerform Operations audit, training audit, Supplier/ Contractor audit and inspection/surveillance operations quality as required by audit plan  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Rà soát, đánh giá tài liệu, hồ sơ khai thác tàu bay, huấn luyện và hồ sơ nhà cung ứng trước khi trình phê chuẩn;  \u003c/p\u003e\u003cp\u003e\u003cem\u003eReview the manual of flight operations, ground operations, training and supplier’s prior submission for approval  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện các công việc khác mà Trưởng phòng OQA giao;  \u003c/p\u003e\u003cp\u003e\u003cem\u003ePerform other tasks assigned by General Manager of OQA.  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm và nhiệm vụ  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eResponsibilities and accountabilities  \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Báo cáo trực tiếp cho Trưởng phòng OQA  \u003c/p\u003e\u003cp\u003e\u003cem\u003eDirectly report to GM of Operations Quality Assurance;  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện các đánh giá định kỳ khai thác bay, khai thác mặt đất và huấn luyện theo chương trình đánh giá, theo dõi hành động khắc phục được thực hiện đúng hạn và hiệu quả;  \u003c/p\u003e\u003cp\u003e\u003cem\u003eImplementation of the annual audit plan of flight operations, ground operations and training; following up and tracking of all corrective actions to be completed effectively within set deadline;  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThực hiện kiểm tra, đánh giá nhà cung ứng dịch vụ (khai thác và huấn luyện) Biên soạn và cập nhật các bảng liệt kê đánh giá đối với khai thác và nhà cung ứng;   \u003c/p\u003e\u003cp\u003e\u003cem\u003eCheck, verify and issue authorization to operational service providers where applicable Compose and update audit checklists for Operations organization, supplier/contractors etc.  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Báo cáo định kì cho Trưởng phòng OQA sự tuân thủ các cuộc đánh giá theo chương trình đánh giá hàng năm;  \u003c/p\u003e\u003cp\u003e\u003cem\u003eReporting to GM of OQA the implementation of Audit/Inspection according to the annual audit plan;   \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện rà soát hồ sơ đánh giá  \u003c/p\u003e\u003cp\u003e\u003cem\u003ePerform review and evaluate of audit checklist  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Báo cáo định kỳ cho Trưởng phòng đảm bảo chất lượng khai thác liên quan đến tình hình đóng findings  \u003c/p\u003e\u003cp\u003e\u003cem\u003eRegularly reporting to GM of OQA about closing findings  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Phối hợp và hỗ trợ Cục HKVN, Nhà chức trách Hàng không nước ngoài và nhà cung ứng khi thực hiện đánh giá định kỳ/ không định kỳ và phối hợp với các phòng ban liên quan để khắc phục các điểm không phù hợp (nếu có);  \u003c/p\u003e\u003cp\u003e\u003cem\u003eCoordinate and support CAAV, other regulatory authorities and other supplier/contractor’s schedule and unscheduled audits/inspections, coordinate with relevant department for the corrective action if any;  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện công tác điều tra an toàn liên quan đến khai thác tàu bay khi được Giám đốc An toàn chất lượng hoặc Trưởng phòng đảm bảo chất lượng khai thác yêu cầu;  \u003c/p\u003e\u003cp\u003e\u003cem\u003ePerform the investigation of safety issue and other events relating to aircraft Operations quality as requested by SQD Director or GM of OQA;  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Rà soát và đánh giá hồ sơ giáo viên liên quan đến năng định huấn luyện trước khi trình cho cấp thẩm quyền phê chuẩn;  \u003c/p\u003e\u003cp\u003e\u003cem\u003eReview and evaluate the application of instructor) for performing training then submission for approval.  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Rà soát, đánh giá và đưa ra ý kiến liên quan đến các tài liệu, quy trình của công ty nhằm tuân thủ theo quy định của VAR  \u003c/p\u003e\u003cp\u003e\u003cem\u003eReview, evaluate and give comment to related manual, procedure of company for ensure compliance with VAR  \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Đảm bảo các hồ sơ đánh giá được lưu trữ đúng quy định và được kiểm soát  \u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure that adequate records are kept for all works undertaken, for t  du lịch đa dạng và chuyên nghiệp của Vietravel Corporation, chúng tôi cam kết mỗi hành trình bay đều là một trải nghiệm theo đúng tinh thần của một hãng hàng không du lịch từ trải nghiệm văn hoá, lịch sử, con người; cho đến ẩm thực của từng điểm đến thông qua dịch vụ và sản phẩm được cung cấp từ trái tim và sự sáng tạo của đội ngũ Vietravel Airlines. \r\n\r\nTầm nhìn\r\n\r\nVietravel Airlines mong muốn trở thành đơn vị vận tải hàng không hàng đầu khu vực trong phân khúc hãng hàng không hybrid kết hợp hệ sinh thái du lịch đa dạng. Với niềm đam mê bầu trời, tầm nhìn dài hạn, kết hợp những sáng kiến \u0026 kinh nghiệm trong ngành hàng không và du lịch, chúng tôi quyết tâm trở thành thương hiệu hàng không Việt Nam hàng đầu thế giới mang lại những sản phẩm hàng không độc đáo, thú vị, tin cậy và dễ dàng tiếp cận đối với mọi người.\r\n\r\nSứ mệnh\r\n\r\nVới tinh thần thúc đẩy kết nối và tạo lập các giá trị, Vietravel Airlines và đội ngũ không ngừng nỗ lực mang đến những sản phẩm hàng không chất lượng, đa dạng và dễ dàng tiếp cận dành cho mọi người thông qua việc ứng dụng các cải tiến công nghệ và tối ưu hoạt động của doanh nghiệp, song song với việc tăng cường các trải nghiệm độc đáo và thú vị trên mỗi hành trình của khách hàng.\r\n\r\nGiá trị cốt lõi\r\n\r\nSự thiện cảm: Niềm vui và sự hài lòng của khách hàng, cộng đồng là trọng tâm trong sự phát triển của Hãng.\r\nSự tin cậy: Vietravel Airlines tuân thủ nghiêm ngặt các quy tắc về an toàn và chất lượng; đảm bảo tính minh bạch, tử tế, trung thực và nhất quán.\r\nSự độc đáo và thú vị: Tạo ra những dấu ấn khác biệt cho sản phẩm hàng không Việt.\r\nTinh thần Việt Nam: Xuất thân là một thương hiệu Việt, được sáng lập và vận hành bởi một tập thể người Việt cần mẫn, sáng tạo, dũng cảm và chung sức cho những mục tiêu phi thường.\r\nTruy cập website của Vietravel tại: https://vietravelairlines.talent.vn/"])</script><script>self.__next_f.push([1,"41:{\"companyId\":414127,\"jobImageURLs\":null,\"jobVideoURLs\":null,\"companyName\":
