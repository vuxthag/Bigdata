i ngộ toàn diện và các chương trình đào tạo bài bản, nhằm phát triển cơ hội cho tất cả cán bộ nhân viên.\r\n\r\nMSB hướng tới trở thành ngân hàng mà ai cũng muốn tham gia và không ai muốn rời bỏ. Chúng tôi xây dựng lợi thế cạnh tranh bằng môi trường làm việc thân thiện, chế độ đãi ngộ toàn diện và các chương trình đào tạo chuyên nghiệp, tạo điều kiện phát triển cho tất cả cán bộ nhân viên.\r\n\r\nMSB cam kết mang đến dịch vụ ngân hàng chất lượng cao, đáp ứng đa dạng nhu cầu tài chính của khách hàng. Chúng tôi luôn nỗ lực sáng tạo và số hóa quy trình và công việc, áp dụng công nghệ và kỹ thuật số để mang lại trải nghiệm tốt nhất cho khách hàng và cán bộ nhân viên.\r\n\r\nMÔI TRƯỜNG LÀM VIỆC TẠI MSB\r\n\r\nKhi làm việc tại MSB, bạn sẽ được hưởng những lợi ích sau:\r\n\r\n•\tĐãi ngộ toàn diện: MSB xây dựng thang bảng lương theo phương pháp 3P chuẩn quốc tế, không giới hạn thu nhập (đối với các vị trí bán hàng). Chúng tôi cũng có nhiều chương trình phúc lợi tài chính và chăm sóc sức khỏe cá nhân hóa phù hợp với tất cả nhân viên và người thân của họ.\r\n•\tVăn hóa doanh nghiệp: MSB tạo ra một văn hóa doanh nghiệp đặc biệt, tin tưởng trao quyền và khuyến khích cá nhân tự ra quyết định, tạo sự linh hoạt và phát triển cá nhân.\r\n•\tĐào tạo chuyên môn: MSB liên tục triển khai các chương trình đào tạo nhằm nâng cao kiến thức chuyên môn, đảm bảo nhân viên của chúng tôi luôn có sự phát triển và tiến bộ trong công việc. MSB cũng đẩy mạnh hợp tác với các đối tác đào tạo uy tín trong và ngoài nước để tổ chức nhiều chương trình nâng tầm năng lực nhân sự theo chuẩn mực quốc tế, tiêu biểu như Dale Carnegie - tổ chức hàng đầu về phát triển năng lực tổ chức. Hoạt động đào tạo \u0026 quy hoạch đội ngũ nhân sự kế cận được triển khai đa dạng các cấp độ với một số chương trình điển hình như: Talent Pool và Management Trainee.\r\n•\tĐưa số hóa vào môi trường làm việc: MSB tích cực xây dựng văn hóa “làm việc số”. Đây cũng là bước đà để MSB tập trung xây dựng nguồn nhân lực chất lượng cao, đặc biệt là về mảng công nghệ, hướng tới mục tiêu là ngân hàng số hàng đầu.\r\n•\tKhuyến khích sự sáng tạo: Những diễn đàn, cuộc thi khuyến khích sự sáng tạo được tổ chức thường niên để cán bộ nhân viên đề xuất những ý tưởng cải thiện quy trình, sản phẩm góp phần hiện thực hóa khẩu hiệu “Cùng vươn tầm” tại MSB.\r\n\r\nCÁC GIẢI THƯỞNG NHÂN SỰ CỦA MSB\r\n\r\nMSB không chỉ được khách hàng tin tưởng và đánh giá cao, mà còn được các tổ chức uy tín trong và ngoài nước công nhận là một trong những nơi làm việc tốt nhất. Dưới đây là một số giải thưởng nhân sự mà MSB đã đạt được:\r\n\r\n•\t“Doanh nghiệp có Nguồn nhân lực hạnh phúc” 2023\r\n•\tTop 20 Nơi làm việc Tốt nhất Việt Nam 2023\r\n•\t“Nơi làm việc tốt nhất châu Á” năm 2021 \u0026 2022\r\n•\tVị trí số 1 trong Top 10 Nhà tuyển dụng được yêu thích nhất ngành Tài chính – Ngân hàng năm 2020\r\n•\tVị trí thứ 1 trong Top 10 Doanh nghiệp được nhân viên yêu thích nhất năm 2020\r\n\r\nNếu bạn quan tâm đến các cơ hội làm việc tại MSB, bạn có thể tham khảo các vị trí đang tuyển dụng và gửi hồ sơ ứng tuyển qua các kênh thông tin chính thức sau:\r\n\r\n•\tWebsite Tuyển dụng MSB: https://jobs.msb.com.vn\r\n•\tFacebook Tuyển dụng MSB: https://www.facebook.com/tuyendung.msb\r\n\r\nCHỌN MSB - CHỌN VƯƠN TẦM SỰ NGHIỆP!"])</script><script>self.__next_f.push([1,"24:T5dd,\u003cp\u003eMô tả công việc\u003c/p\u003e\u003cp\u003eRM Vision Infinity - Chương trình tuyển dụng dành riêng cho Ngân hàng Bán lẻ (RB), tìm kiếm những RM \u0026 SRM tiềm năng sẵn sàng bứt phá cùng lộ trình phát triển không giới hạn và đãi ngộ xứng tầm.\u003c/p\u003e\u003cp\u003e1. Chăm sóc, phục vụ khách hàng trong danh mục quản lý nhằm đảm bảo các quy định, tiêu chuẩn chất lượng dịch vụ của MSB.\u003c/p\u003e\u003cp\u003e2. Lập kế hoạch kinh doanh, phát triển khách hàng, tiếp xúc, giới thiệu, tư vấn, bán các sản phẩm của MSB, trọng tâm là sản phẩm tín dụng tín chấp, thế chấp và các sản phẩm bán chéo khác (theo quy định từng thời kỳ) nhằm hoàn thành/ vượt chỉ tiêu
