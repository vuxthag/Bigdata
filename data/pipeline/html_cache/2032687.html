bộ chứng từ nhập khẩu từ nhà cung cấp và đơn vị khai báo hải quan (Invoice, Packing List, B/L, C/O, C/Q, tờ khai hải quan…) đảm bảo tính đầy đủ, hợp lệ trước khi hạch toán.\u003c/p\u003e\u003cp\u003e• Thực hiện hạch toán các nghiệp vụ nhập khẩu: ghi nhận hàng về kho, phân bổ chi phí vận chuyển, chi phí logistics, thuế nhập khẩu, thuế GTGT hàng nhập khẩu và các chi phí liên quan theo đúng quy định kế toán.\u003c/p\u003e\u003cp\u003e• Theo dõi và quản lý công nợ phải trả nhà cung cấp nước ngoài, đối chiếu công nợ định kỳ và phối hợp xử lý các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e• Phối hợp với bộ phận kho để đối chiếu số liệu nhập – xuất – tồn, đảm bảo dữ liệu hàng hóa trên hệ thống kế toán và thực tế kho luôn chính xác.\u003c/p\u003e\u003cp\u003e• Thực hiện kiểm kê hàng tồn kho định kỳ, lập biên bản kiểm kê, phân tích chênh lệch và báo cáo cho cấp quản lý để có phương án xử lý.\u003c/p\u003e\u003cp\u003e• Làm việc trực tiếp với đơn vị logistics, forwarder và đơn vị khai báo hải quan nhằm xử lý các vấn đề phát sinh liên quan đến chứng từ, chi phí, thuế và tiến độ thông quan.\u003c/p\u003e\u003cp\u003e• Tổ chức lưu trữ hồ sơ, chứng từ nhập khẩu khoa học và hệ thống, đảm bảo thuận tiện cho việc tra soát, quyết toán và kiểm tra sau thông quan.\u003c/p\u003e\u003cp\u003e• Tổng hợp và lập báo cáo định kỳ về tình hình nhập hàng, chi phí nhập khẩu, công nợ nhà cung cấp và các chỉ số liên quan theo yêu cầu của cấp quản lý.\u003c/p\u003e\u003cp\u003e• Thực hiện các công việc khác theo phân công của Kế toán trưởng hoặc Ban lãnh đạo.\u003c/p\u003e\u003cp\u003eQUYỀN LỢI\u003c/p\u003e\u003cp\u003e●\tLương: 15-25tr tuỳ theo năng lực\u003c/p\u003e\u003cp\u003e●\tThưởng hiệu quả công việc, thưởng lễ tết, lương tháng 13\u003c/p\u003e\u003cp\u003e●\tTham gia BHXH, BHYT khi vào Nhân viên chính thức\u003c/p\u003e\u003cp\u003e●\tLương tháng 13, thưởng Tết và các ngày nghỉ lễ trong năm: sinh nhật nhân viên, 30/4 - 1/5; 2/9; 8/3…\u003c/p\u003e\u003cp\u003e●\tCơ hội: Môi trường chuyên nghiệp, đào tạo, thăng tiến.\u003c/p\u003e\u003cp\u003e●\tCơ hội học hỏi thêm nghiệp vụ xuất nhập khẩu và nâng cao chuyên môn kế toán\u003c/p\u003e\u003cp\u003eTHỜI GIAN LÀM VIỆC\u003c/p\u003e\u003cp\u003e•\tThứ 2 – thứ 6 và 02 ngày thứ 7/ tháng, buổi sáng 08h00-12h00, buổi chiều 13h00-17h00.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Td6a,"])</script><script>self.__next_f.push([1,"\u003cp\u003eCông ty cổ phần Nisko Việt Nam là một đơn vị phân phối phụ kiện - thiết bị tủ bếp cao cấp mang thương hiệu Fulco.\u003c/p\u003e\u003cp\u003eFULCO là thương hiệu hoạt động trong lĩnh vực phụ kiện tủ bếp uy tín, chất lượng. Với sự nỗ lực và đổi mới không ngừng để thích ứng với biến động của thị trường thì đến nay chúng tôi có thể khẳng định: FULCO đã thực sự trưởng thành và phát triển vững vàng.\u003c/p\u003e\u003cp\u003eCác trụ sở của chúng tôi:\u003c/p\u003e\u003cp\u003e1.\tTrụ sở chính Hà Nội: 26 Đặng Thùy Trâm, Nghĩa Đô, Cầu Giấy, Hà Nội\u003c/p\u003e\u003cp\u003e2.\tChi nhánh miền nam: 381 Lê Văn Khương, Hiệp Thành, Q12, HCM\u003c/p\u003e\u003cp\u003e3.\tChi nhánh miền trung: 23 Chơn Tâm 5, Hòa Khánh Nam, Liên Chiểu, Đà Nẵng\u003c/p\u003e\u003cp\u003eMÔ TẢ CÔNG VIỆC\u003c/p\u003e\u003cp\u003e• Tiếp nhận, kiểm tra và rà soát bộ chứng từ nhập khẩu từ nhà cung cấp và đơn vị khai báo hải quan (Invoice, Packing List, B/L, C/O, C/Q, tờ khai hải quan…) đảm bảo tính đầy đủ, hợp lệ trước khi hạch toán.\u003c/p\u003e\u003cp\u003e• Thực hiện hạch toán các nghiệp vụ nhập khẩu: ghi nhận hàng về kho, phân bổ chi phí vận chuyển, chi phí logistics, thuế nhập khẩu, thuế GTGT hàng nhập khẩu và các chi phí liên quan theo đúng quy định kế toán.\u003c/p\u003e\u003cp\u003e• Theo dõi và quản lý công nợ phải trả nhà cung cấp nước ngoài, đối chiếu công nợ định kỳ và phối hợp xử lý các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e• Phối hợp với bộ phận kho để đối chiếu số liệu nhập – xuất – tồn, đảm bảo dữ liệu hàng hóa trên hệ thống kế toán và thực tế kho luôn chính xác.\u003c/p\u0
