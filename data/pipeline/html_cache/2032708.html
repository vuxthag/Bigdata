frontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Te82,"])</script><script>self.__next_f.push([1,"Công ty Cổ Phần Thiết Bị và Dịch Vụ TCE được thành lập từ năm 2010, là một trong những doanh nghiệp hàng đầu chuyên cung cấp các loại máy móc thiết bị phục vụ cho các dự án xây \r\ndựng dân dụng \u0026 công nghiệp; năng lượng tái tạo, nổi bật là các dự án điện gió, điện mặt trời; giao thông, thủy lợi, khai khoáng và môi trường, các dự án thủy điện, nhiệt điện, các công trình \r\ncầu đường, đường bộ, đường sắt, các dự án cảng biển, cảng sông và cảng hàng không trên toàn quốc... \r\nTCE hoạt động trên 3 lĩnh vực chính bao gồm: \r\n     + Bán các loại máy và Thiết bị xây dựng;\r\n     + Cho thuê các loại máy và thiết bị xây dựng;\r\n     + Tư vấn, cung cấp dịch vụ tổng thể: Giải pháp thi công, tư vấn đầu tư, tư vấn sử sụng thiết bị hiệu quả, bảo dưỡng - bảo trì máy móc, cung cấp linh phụ kiện chính hãng và hỗ trợ tài chính.\r\n     + Đầu tư và thi công xây lắp, xây dựng các công trình dân dụng, công nghiệp, năng lượng tái tạo...\r\n\r\nTẦM NHÌN\r\nTrở thành doanh nghiệp dẫn đầu trong lĩnh vực cung cấp thiết bị xây dựng, giải pháp và dịch vụ thi công tại Việt Nam, nằm trong top đầu khu vực châu Á và vươn tầm thế giới.\r\nSỨ MỆNH\r\nVới sứ mệnh mang đến “Công nghệ phù hợp - Giải pháp tối ưu“ cho khách hàng, TCE không ngừng nỗ lực nghiên cứu để cung cấp các sản phẩm, giải pháp, dịch vụ với chất lượng và tiêu chuẩn quốc tế nhằm thỏa mãn tối đa nhu cầu của khách hàng và góp phần vào sự phát triển bền vững của nền công nghiệp xây dựng Việt Nam.\r\n\r\nTỔNG QUAN VỀ TẬP ĐOÀN SANY \r\nTập đoàn SANY được thành lập năm 1989, hiện là nhà sản xuất thiết bị thi công công trình lớn nhất Trung Quốc và đứng thứ 2 trên thế giới với 24 công ty con, 13 trung tâm nghiên cứu trong nước và nước ngoài tại Mỹ, Đức, Brazil, Ấn Độ và Indonesia. Sản phẩm của SANY được tin dùng ở hơn 150 quốc gia và vùng lãnh thổ. Hiện nay, SANY là thương hiệu số 1 thế giới về thiết bị bơm bê tông và số 1 tại Trung Quốc về thiết bị cẩu bánh xích, máy khoan cọc nhồi và thiết bị hầm mỏ. \r\nVới phương châm hoạt động “chất lượng thay đổi thế giới”, hàng năm, SANY đều trích 5%-7% doanh thu bán hàng để đầu tư vào lĩnh vực nghiên cứu và phát triển với mục đích không ngừng cải tiến nâng cao chất lượng sản phẩm.\r\n\r\nTCE \u0026 SANY\r\nQua nhiều năm là đại lý ủy quyền của SANY tại Việt Nam, TCE luôn chứng minh được năng lực phân phối của mình và liên tục được SANY tin tưởng lựa chọn là đại lý phân phối nhiều dòng sản phẩm quan trọng. Đến nay TCE đã đưa các dòng sản phẩm SANY: Thiết bị bê tông, thiết bị làm đường, thiết bị nâng hạ, thiết bị nền móng chiếm thị phần lớn tại Việt Nam. Tập đoàn SANY đã đánh giá rất cao những nỗ lực và thành quả của TCE trong việc nghiên cứu áp dụng công nghệ tiên tiến trên thế \r\ngiới vào thực tiễn thị trường thiết bị xây dựng tại Việt Nam, đồng thời không ngừng hỗ trợ hợp tác, tạo mọi điều kiện để TCE vững bước phát triển hơn nữa."])</script><script>self.__next_f.push([1,"24:T5a0,\u003cp\u003e- Tìm kiếm khách hàng mục tiêu có nhu cầu sử dụng máy công trình như các công ty xây dựng, nhà thầu hoặc các dự án hạ tầng;\u003c/p\u003e\u003cp\u003e- Giới thiệu các loại máy công trình, thiết bị xây dựng mà công ty cung cấp: máy xúc, máy ủi, máy nâng hạ, máy trộn bê tông, đến các thiết bị chuyên dụng khác đến khách hàng;\u003c/p\u003e\u003cp\u003e- Tư vấn kỹ thuật và lựa chọn loại thiết bị/ máy công trình phù hợp với nhu cầu của khách hàng;\u003c/p\u003e\u003cp\u003e- Đàm phán, thương thảo và ký kết hợp đồng với khách hàng;\u003c/p\u003e\u003cp\u003e- Phối hợp với bộ phận kho vận và kỹ thuật để đảm bảo máy móc được bàn giao đúng tiến độ, lắp đặt và hướng dẫn khách hàng vận hành thiết bị.\u003c/p\u003e\u003cp\u003e- Phối hợp với bộ phận kỹ thuật để kịp thời cung cấp dich vụ hậu mãi: bảo hành/ bảo trì/sửa chữa thiết bị cho khách hàng;\u003c/p\u003e\u003cp\u003e- Thường xuyên theo dõi xu hướng và biến động của thị trường máy công trình, phân tích nhu cầu và tìm ra cơ hội mới;\u003c/p\u003e\u003cp\u003e- Quan sát và phân tích các chiến lược của đối thủ cạnh tranh để tư vấn điều chỉnh chiến lược bán hàng của công ty cho phù hợp;\u003c/p\u003e\u003cp\u003e- Địa điểm làm việc: Hà Nội/ TP HCM/ Đà Nẵng/ Vĩnh Phúc/ Hải Phòng/ Quảng Ninh\u003c/p\u003e25:T6b6,\u003cp\u003e- Tốt nghiệp trung cấp trở lên chuyên ngành thương mại, kinh doanh, máy xây dựng, ô tô, kỹ thuật...\u003c/p\u003e\u003cp\u003e- Ngoại ngữ: không yêu cầu, biết Tiếng Anh hoặc Tiếng Trung là một lợi thế\u003c/p\u003e\u003cp\u003e- Sử dụng thành thạo tin học văn phòng, Internet, có thể sử dụng Power Point trong thuyết trình là 1 lợi thế\u003c/p\u003e\u003cp\u003e- Có ít nhất 1 năm kinh nghiệm tại vị trí tương đương\u003c/p\u003e\u003cp\u003e- Có kỹ năng giao tiếp, trình bày hiệu quả, trọng tâm đàm phán và thương thuyết.\u003c/p\u003e\u003cp\u003e- Quản lý công việc "])</script><script>self.__next_f.push([1,"theo mục tiêu (KPI)\u003c/p\u003e\u003cp\u003e- Độ tuổi: ≥ 23 tuổi\u003c/p\u003e\u003cp\u003e- Địa điểm làm việc: Hà Nội/ TP HCM/ Đà Nẵng/ Vĩnh Phúc/ Hải Phòng/ Quảng Ninh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Quyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Thu nhập: 10tr - 20tr + thưởng doanh số (thu nhập hấp dẫn theo năng lực)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thưởng các ngày Lễ, Tết: 30/4, 01/5, 02/9, 01/01, lương tháng 13;\u003c/p\u003e\u003cp\u003e- Thưởng đột xuất khi hoàn thành xuất sắc nhiệm vụ;, nhân viên tiêu biểu; thưởng thâm niên,…\u003c/p\u003e\u003cp\u003e- Được tham gia đầy đủ các chế độ BHXH, BHYT, BHTN;\u003c/p\u003e\u003cp\u003e- Ngoài ra trong quá trình làm việc còn được tham gia các hoạt động ngoại khóa như văn nghệ, thể thao, ...\u003c/p\u003e\u003cp\u003e- Được đào tạo các kiến thức, lĩnh vực chuyên môn, văn hoá d
