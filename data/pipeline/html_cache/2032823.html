à trên thế giới như Hiệp hội Vận tải Hàng không Quốc Tế (IATA), Liên minh hàng hóa thế giới (WCA), Hiệp hội Giao nhận và Kho vận quốc tế (FIATA), Hiệp hội Logistics Việt Nam (VLA), VCCI và nhiều tổ chức uy tín khác, cho phép chúng tôi vận chuyển hàng hóa đến bất cứ nơi nào trên thế giới.\r\n* NGÀNH NGHỀ KINH DOANH:\r\n- Dịch vụ giao nhận vận chuyển quốc tế bằng đường biển, đường hàng không và vận chuyển đa phương thức.\r\n- Dịch vụ Cảng ICD: điểm thông quan nội địa; bãi container hàng nhập khẩu và hàng xuất khẩu; dịch vụ vận chuyển và trung chuyển container bằng đường thuỷ nội địa.\r\n- Dịch vụ Kho (kho CFS, kho ngoại quan, kho lạnh, kho hàng bách hoá và kho phân phối).\r\n- Dịch vụ vận tải đường bộ (LTL \u0026 FTL)\r\n- Giải pháp và vận tải giao nhận hàng siêu trường - siêu trọng cho các dự án.\r\n- Dịch vụ Logistics 3PL.\r\n- Dịch vụ Đại lý container chuyên tuyến quốc tế và nội địa.\r\n- Dịch vụ Văn phòng cho thuê - đầu tư phát triển Bất động sản.\r\n* CÁC GIẢI THƯỞNG DANH GIÁ:\r\n- Thương Hiệu Vàng TP. Hồ Chí Minh 2023.\r\n- Top 10 Nơi Làm Việc Tốt Nhất Việt Nam 2023 - Ngành Logistics: Giao Nhận, Kho Bãi.\r\n- Top 4 Công Ty Logistics Hàng Đầu Việt Nam.\r\n- Top 50 Công Ty Niêm Yết Tốt Nhất 2023."])</script><script>self.__next_f.push([1,"24:Ta1c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Trực tiếp triển khai, đảm bảo kế hoạch bán hàng của Công ty.\u003c/p\u003e\u003cp\u003e- Hoạch định chiến lược nhằm tăng trưởng doanh thu mà vẫn đảm bảo mức độ hài lòng của khách hàng, đồng thời tìm kiếm các cơ hội kinh doanh mới.\u003c/p\u003e\u003cp\u003e- Xây dựng và triển khai các kế hoạch kinh doanh tháng/quý/năm đảm bảo hoàn thành các chỉ tiêu ngân sách được giao cho Phòng Sales.\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm đánh giá kết quả kinh doanh tháng/quý/năm của Phòng Sales, của từng nhân viên so với ngân sách để có phương án điều chỉnh và thực thi một cách hợp lý, kịp thời.\u003c/p\u003e\u003cp\u003e- Xây dựng các chính sách bán hàng bao gồm: chính sách về giá, tiếp thị, các chương trình quảng bá thương hiệu của công ty.\u003c/p\u003e\u003cp\u003e- Thực hiện nhiệm vụ cập nhật bản giới thiệu về Công ty (brochure/profile), trình bày với khách hàng và đối tác tổng quan về nhóm Công ty Cổ phần Transimex (bao gồm Công ty mẹ, các Công ty con, Công ty Liên doanh liên kết) \u0026 năng lực cung cấp dịch vụ của Công ty, nhóm Công ty.\u003c/p\u003e\u003cp\u003e- Tiến hành nghiên cứu để tìm kiếm thị trường mới và phát hiện nhu cầu khách hàng. Tìm kiếm khách hàng tiềm năng mới cho Công ty, giới thiệu chuỗi cung ứng dịch vụ Logistics của Công ty và nhóm Công ty cho khách hàng.\u003c/p\u003e\u003cp\u003e- Nghiên cứu để tạo ra những sản phẩm dịch vụ Logistics mới, chuyên biệt của Công ty \u0026 nhóm Công ty căn cứ tình hình thị trường cũng như cơ sở vật chất, hạ tầng sẵn có và mới đầu tư của Công ty, nhóm Công ty, đối tác chiến lược của Công ty.\u003c/p\u003e\u003cp\u003e- Quản lý và chịu trách nhiệm toàn bộ về nhân sự của Phòng Sales: chủ động xây dựng quy trình nội bộ của Phòng, xây dựng các chỉ tiêu MBO cho Nhân viên, phân công việc; giám sát; hướng dẫn và hỗ trợ nhân viên để hoàn thành tốt công việc...\u003c/p\u003e\u003cp\u003e- Quản lý, Tham gia huấn luyện đào tạo và phát triển đội ngũ nhân viên, xây dựng quy trình hoạt động thuộc nghiệp vụ của Phòng, triển khai hướng dẫn áp dụng và có đánh giá cải tiến, hoàn thiện quy trình giúp nâng cao hiệu quả hoạt động nghiệp vụ của Nhân viên.\u003c/p\u003e\u003cp\u003e- Các công việc khác theo yêu cầu của Ban Tổng Giám đốc và Chủ tịch HĐQT.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T605,\u003cp\u003e• Giới tính: Nam/Nữ\u003c/p\u003e\u003cp\u003e• Độ tuổi: Từ 40 đến 55\u003c/p\u003e\u003cp\u003e• Trình độ chuyên môn: Tốt nghiệp Đại học trở lên chuyên ngành Quản trị kinh doanh, logistics, quản lý chuỗi cung ứng, ... hoặc các ngành có liên quan\u003c/p\u003e\u003cp\u003e• Trình độ ngoại ngữ: Tiếng anh thành thạo nghe nói đọc viết\u003c/p\u003e\u003cp\u003e• Trình độ tin
