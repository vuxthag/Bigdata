oduct development, Operations and Sales\u003c/p\u003e\u003cp\u003e•\tEnsure you have a good connection with other Country Air Freight teams in Mekong, essential to develop a strong team culture\u003c/p\u003e\u003cp\u003e•\tMaintain strong alignment with the Area \u0026 Regional Air Freight team\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2/ Carrier and Customer Relationship Management / Procurement:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDevelop strong local relationships with core carriers as crucial part of or our growth strategy\u003c/p\u003e\u003cp\u003e•\tSupport the regional function in maintaining carrier relations\u003c/p\u003e\u003cp\u003e•\tDrive cost reductions by optimal allocation with carriers and contracts\u003c/p\u003e\u003cp\u003e•\tActively build strong relationships with customers.\u003c/p\u003e\u003cp\u003e•\tEnsure second-to-none customer experience\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3/ Pricing Management:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTake responsibility for Air Freight Pricing activities in the Country, including but not limited to Price-setting Strategy and Margins\u003c/p\u003e\u003cp\u003e•\tWork with Carriers to ensure that we are fulfilling commitments and generating a better-than-market buying price\u003c/p\u003e\u003cp\u003e•\tCritically evaluate the risk appetite for committing BSA/Charter to enable our pricing strategy\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4/ Operations Execution:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tResponsible for the end-to-end execution to support our customers’ success in a lean and cost-efficient manner\u003c/p\u003e\u003cp\u003e•\tEnsuring the team adheres to the standard process and customer-specific IOPs and monitors respective KPIs\u003c/p\u003e\u003cp\u003e•\tFollow standard processes and systems and ensure documentation is in place\u003c/p\u003e\u003cp\u003e•\tImplement new systems to ensure that we are at our most effective, this will include new execut
