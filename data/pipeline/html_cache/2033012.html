m, phấn đấu phát triển thành tập đoàn đầu tư xây dựng bậc nhất với giá trị bền vững và sáng tạo nhất.\r\n\r\nĐể biết thêm thông tin về công ty, vui lòng truy cập trang web chính thức của Cục năm xây dựng Trung Quốc : https://5bur.cscec.com/\r\n\r\nCông ty TNHH Xây dựng Trung Quốc SauSam (Việt Nam) là công ty con 100% vốn nước ngoài do Tập đoàn Kỹ thuật Xây dựng năm Trung Quốc thành lập tại Việt Nam. Theo nhu cầu phát triển kinh doanh của công ty và phù hợp với các nguyên tắc công bằng, cạnh tranh và lựa chọn những người giỏi nhất, chúng tôi hiện đang công khai tuyển dụng các nhân tài quản lý dự án tham gia vào các dự án xây dựng công trình. Địa điểm làm việc tại Nam Định.\r\n\r\n母公司中建五局创立于1965年，是世界500强第13位——中国建筑股份有限公司的全资骨干企业。是集投资商、建造商、运营商“三商一体、品质一流”的现代化投资建设集团。公司拥有房建、市政、公路及其行业设计“三特三甲”资质，主营房屋建筑施工、基础设施建造、投资与地产开发等业务。总资产过1500亿元，累积投资额超3000亿元，稳居“中建三甲”。公司坚持“海外优先”，30多年拓展经营，布局30多个国别，20多个国家有项目实施。\r\n\r\n凭借雄厚的资金实力和人才优势，公司聚焦为社会、行业、市场和客户提供高附加值的一体化解决方案，大力发展“绿色建造、快速建造、智慧建造、工业建造”。\r\n\r\n中建五局秉承“信和天下、敢为人先”的鲜明品格，强化“以信为本、以和为贵”的核心理念，坚持以高质量发展为中心，致力发展成为最具持续价值创造力的一流投资建设集团。\r\n\r\n更多公司信息请访问中建五局官网：https://5bur.cscec.com/\r\n\r\n中建潇湘（越南）公司是中建五局在越南新设立的全资子公司，主营工业与民用建筑、市政基础设施等工程总承包。根据公司业务开展需要，按照公平、公正、竞争、择优的原则，现公开招聘从事房屋建筑工程的项目管理人才，工作地点为南定。"])</script><script>self.__next_f.push([1,"24:T1069,"])</script><script>self.__next_f.push([1,"Công ty mẹ là Cục Kỹ thuật Xây dựng số năm Trung Quốc, được thành lập vào năm 1965, là công ty lớn thứ 13 trong số 500 công ty hàng đầu thế giới - một doanh nghiệp “xương sống”thuộc sở hữu của Công ty TNHH cổ phần Xây Dựng Trung Quốc. Đây là một tập đoàn đầu tư và xây dựng hiện đại, tích hợp các nhà đầu tư, xây dựng và vận hành với \"kinh doanh ba trong một và chất lượng hàng đầu\". Công ty có trình độ chuyên môn \"ba đặc biệt ba hàng đầu\" về xây dựng nhà ở, quản lý thành phố, đường cao tốc và thiết kế công nghiệp, chủ yếu tham gia vào xây dựng công trình, xây dựng cơ sở hạ tầng, đầu tư và phát triển bất động sản. Với tổng tài sản hơn 150 tỷ nhân dân tệ và vốn đầu tư
