iá cả hợp lý và dịch vụ bảo hành - hậu mãi chuyên nghiệp.\r\nTầm nhìn: Trở thành thương hiệu hàng đầu Việt Nam trong ngành hàng phụ tùng, phụ kiện ô tô\r\nGiá trị cốt lõi: TÂM: MAST luôn lấy chữ TÂM để phục vụ Khách hàng, Đối tác; TÍN: MAST luôn lấy chữ TÍN để xây dựng thương hiệu và bảo vệ chữ TÍN như bảo vệ tính mạng của chính mình; NHÂN: MAST luôn lấy chữ NHÂN để tạo dựng doanh nghiệp phát triển bền vững và trường tồn\r\nVới phương châm cùng hợp tác - cùng phát triển bền vững, chúng tôi cam kết luôn mang đến cho Quý Đối tác: CHẤT LƯỢNG TỐT NHẤT - GIÁ CẢ HỢP LÝ NHẤT - DỊCH VỤ TỐT NHẤT. Chúng tôi rất tin tưởng vào sự thành công tốt đẹp và lâu dài trong quá trình hợp tác giữa chúng tôi và Quý Khách hàng - Quý Đối tác.\r\n\r\nLink tìm hiểu về Công ty:\r\n1.\tWebsite: mast.com.vn\r\n2.\tFacebook Văn hoá: https://www.facebook.com/congtymasthanoi\r\n3.\tFanpage Kinh doanh: https://www.facebook.com/phutungotomast/"])</script><script>self.__next_f.push([1,"24:T8d3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eChịu trách nhiệm quản lý hoạt động tài chính kế toán, từ vấn cho Ban Giám Đốc trong lĩnh vực tài chính, kế toán, thuế, kiểm toán.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Lập kế hoạch\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Lập kế hoạch tài chính năm, kế hoạch ngân sách định kỳ hàng tháng.\u003c/p\u003e\u003cp\u003e   • Xây dựng các tiêu chí đo lường hiệu quả hoạt động kinh doanh hỗ trợ cho việc thực hiện chiến lược kinh doanh của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản trị hoạt động kinh doanh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Thiết lập hệ thống giám sát, kiểm soát việc thực hiện kế hoạch kinh doanh, kế hoạch ngân sách được duyệt.\u003c/p\u003e\u003cp\u003e   • Thực hiện các báo cáo định kỳ và đọt xuất về kết quả và hiệu quả kinh doanh. Phân tích, đánh giá các chỉ tiêu, dữ liệu tài chính để dự báo, tư vấn cho BGĐ và các phòng ban.\u003c/p\u003e\u003cp\u003e   • Quản lý nhu cầu vốn, giám sát quản lý dòng tiền, dự báo dòng tiền.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kế toán quản trị\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Chịu trách nhiệm tổ chức, vận hành hệ thống kế toán minh bạch, tuân thủ các quy chế, quy định của Công ty và pháp luật hiện hành.\u003c/p\u003e\u003cp\u003e   • Thực hiện các công việc hạch toán kế toán, cập nhật lưu trữ chứng từ, kiểm tra, giám sát các khoản thu/chi tài chính; các nghĩa vụ thu nộp ngân sách nhà nước, thanh toán công nợ, quản lý sử dụng tài sản và nguồn hình thành tài sản.\u003c/p\u003e\u003cp\u003e   • Lập báo cáo tài chính và báo cáo khác theo quy định.\u003c/p\u003e\u003cp\u003e   • Làm việc với cơ quan thuế, thực hiện hoàn chỉnh công tác quyết toán thuế.\u003c/p\u003e\u003cp\u003e   • Cập nhật đầy đủ các quy định pháp luật và chế độ chính sách để thực hiện các công việc tài chính kế toán chuẩn mực, chính xác và đúng pháp luật.\u003c/p\u003e\u003cp\u003e   • Quản lý nhân sự phòng kế toán, hướng dẫn đào tạo chuyên môn nghiệm vụ cho các thành viên trong phòng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Các công việc khác: Theo sự phân công của BGĐ.\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T9de,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Nữ: từ 30 đến 40 tuổi.\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học chuyên ngành Kế toán tài chính…..\u003c/p\u003e\u003cp\u003e• Kinh nghiệm 05 năm trở lên ở vị trí tương đương.\u003c/p\u003e\u003cp\u003e• Sử dụng thành thạo tin học văn phòng và các phần mềm kế toán phổ biến.\u003c/p\u003e\u003cp\u003e• Có đạo đức nghề nghiệp.\u003c/p\u003e\u003cp\u003e• Cẩn thận, trung thực, nhiệt tình, chăm chỉ, có trách nhiệm trong công việc, có tinh thần đoàn kết.\u003c/p\u003e\u003cp\u003e• Có kỹ năng quản trị, điều hành nhân viên. Đồng thời, biết phân tích tổng hợp báo cáo tài chính.\u003c/p\u003e\u003cp\u003e• Khả năng giao tiếp và thương lượng, đàm phán tốt là một lợi thế.\u003c/p\u003e\u003cp\u003e• Nắm vững các chế độ kế toán, chuẩn mực kế toán hiện nay.\u003c/p\u003e\u003cp\u003e• Có khả năng tính toán chính xác, tư duy logic, nhạy bén với con số. Có khả năng tập trung cao, chịu được áp lực công việc.\u003c/p\u003e\u003cp\u003e• Có khả năng làm việc độc lập, làm việc nhóm, tâm huyết và gắn bó lâu dài với doanh nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thu nhập\u003c/strong\u003e:\u003cstrong\u003e 25 - 35 triệu\u003c/strong\u003e\u003cem\u003e (tùy năng lực, deal lương trực tiếp khi phỏng vấn)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thưởng: \u003c/strong\u003eThưởng chuyên cần; Thưởng hiệu quả hàng tháng (Lương P3); Thưởng các ngày lễ; Thưởng tháng lương 13 và thưởng doanh số kế hoạch năm; Thưởng thành tích cá nhân năm.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Hỗ trợ/Phụ cấp: \u003c/strong\u003eHỗ trợ cơm trưa, Phụ cấp thâm niên\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Phúc lợi: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐược tham gia chương trình gắn kết hàng năm vào dịp sinh nhật Công ty; Nghỉ mát; Tổng kết năm\u003c/p\u003e\u003cp\u003e-\tĐược tham gia tổ chức sinh nhật theo tháng; Được tham gia tổ chức sự kiện 8/3 và 20/10\u003c/p\u003e\u003cp\u003e-\tCon được tặng quà nhân ngày 1/6; Trung thu; Noel và ngày khai giảng, thưởng kết quả học tập năm.\u003c/p\u003e\u003cp\u003e-\tBố mẹ đẻ được hưởng quỹ báo hiếu cha mẹ hàng tháng; Được tri ân mừng thọ bố mẹ đẻ.\u003c/p\u003e\u003cp\u003e-\tTham gia khám sức khỏe định kì hàng năm.\u003c/p\u003e\u003cp\u003e-\tBảo hiểm nhân thọ chăm sóc sức khỏe của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Khác: \u003c/strong\u003eCó cơ hội được tham gia học tập; Có cơ hội phát triển nghề nghiệp; Cơ hội làm việc trong môi trường gắn kết và chuyên nghiệp.\u003c/p\u003e"])</script><script>self.__next_f.pus
