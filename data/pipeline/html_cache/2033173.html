c có năng lực chuyên môn cao, tác phong  chuyên nghiệp và hơn cả là mối gắn kết của toàn bộ nhân viên với tổ chức. Cơ sở vật chất được trang bị hiện đại bảo đảm nhân viên được làm việc trong điều kiện tốt nhất. Ngoài ra công ty còn đưa ra các kỳ nghỉ dưỡng định kỳ cùng chế độ Bảo hiểm đầy đủ giúp người lao động yên tâm và đảm bảo tinh thần làm việc một cách cao nhất.\r\nKhông chỉ vậy, Tập thể TADT đã và đang chung tay xây dựng văn hóa trách nhiệm xã hội, tinh thần sẻ chia trên nguyên tắc sống và làm việc cho cộng đồng – vì cộng đồng. Các hoạt động xã hội như hỗ trợ Quỹ vì người nghèo tỉnh Quảng Nam, ủng hộ đồng bào miền Trung, xây dựng nhà tình nghĩa Tỉnh Hưng Yên, đồng hành cùng Ngày Nước thế giới… nhằm đem đến một cuộc sống khoẻ hơn và tốt đẹp hơn cho cộng đồng.\r\nĐể tiếp tục khẳng định vị thế của TADT tại Việt Nam và vươn mình ra thế giới, chúng tôi đang mở rộng hệ thống phát triển đội ngũ nhân sự và cần bổ sung những ứng viên tài năng.\r\nTại TADT, sự nghiệp của chính bạn sẽ đồng hành, phát triển cùng với sự phồn vinh, lớn mạnh không ngừng của chúng tôi!"])</script><script>self.__next_f.push([1,"3c:{\"companyId\":173823,\"jobImageURLs\":\"$3d\",\"jobVideoURLs\":\"$3e\",\"companyName\":\"Tập Đoàn Tân Á Đại Thành\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/f4/11263012.png\",\"companySizeId\":\"\",\"companyProfile\":\"$3f\",\"contactName\":\"Ban Tuyển Dụng\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"124 Tôn Đức Thắng, Phường Quốc Tử Giám, Quận Đống Đa, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"- Thưởng tháng lương thứ 13\\r\\n- Hỗ trợ bữa ăn trưa tại Tập đoàn\\r\\n- Chính sách tăng lương 1 năm 2 lần, từ 10-20% với cấp nhân viên và tăng lương thường xuyên cho các cấp quản lý\\r\\n- Khả năng thăng tiến tốt.\",\"profileBaseName\":\"Tan-A\",\"isUpgradeProfile\":1,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":
