nks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T8c4,"])</script><script>self.__next_f.push([1,"Thành lập từ năm 2003, Ecopark tiền thân là Công ty Cổ phần đầu tư và phát triển đô thị Việt Hưng (VIHAJICO). Với sứ mệnh xây dựng một khu đô thị sinh thái chức năng đầu tiên ở Việt Nam theo xu hướng phát triển đô thị xanh, hiện đại, VIHAJICO đã xây dựng dự án Khu đô thị Ecopark.\r\n\r\nSau hơn 15 năm phát triển, Khu đô thị Ecopark đã trở thành một thành phố chức năng kiểu mẫu, tiên phong xác lập xu hướng Bất động sản Xanh với giá cả hợp lý, được quốc tế tôn vinh với nhiều giải thưởng danh giá. Ban lãnh đạo công ty đã quyết định thay đổi tên thành Công ty Cổ phần Tập đoàn Ecopark, hướng tới mục tiêu phát triển bền vững, đầu tư đa ngành vào các lĩnh vực như giáo dục, y tế, nông nghiệp sạch, công nghệ cao, du lịch, vui chơi giải trí…; đồng thời vẫn giữ vững vị thế chủ chốt là Tập đoàn đầu tư và phát triển đô thị chuyên nghiệp theo xu hướng Bất động sản Xanh, mở rộng phát triển mô hình đô thị Ecopark trên địa bàn cả nước.\r\n\r\nVới 4 Giá trị cốt lõi: Tín nhiệm, Vượt trội, Cùng nhau thành công, Bền vững; Ecopark chú trọng vào việc xây dựng và hình thành một đội ngũ nhân sự hành xử chính trực, có trách nhiệm, vượt trội trong mọi lĩnh vực hoạt động, luôn đổi mới sáng tạo, khát khao chinh phục những tầm cao mới.\r\n\r\nĐể góp phần vào sự phát triển bền vững cho những năm tiếp theo, đưa Ecopark gần hơn tới tầm nhìn trở thành doanh nghiệp hàng đầu tại Việt Nam và khu vực trong lĩnh vực đầu tư bất động sản và phát triển đô thị sinh thái thông minh, Ecopark luôn tìm kiếm những đồng đội trẻ, nhiệt huyết, tràn đầy đam mê trong công việc. Hãy theo dõi Fanpage: Tuyển dụng Ecopark (https://www.fb.com/tuyendungecopark/) hoặc địa chỉ: http://ecopark.com.vn/tuyen-dung để cập nhật các thông tin tuyển dụng mới nhất của Tập đoàn."])</script><script>self.__next_f.push([1,"24:Tf5a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Tổ chức và quản lý các sự kiện cộng đồng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLên ý tưởng, xây dựng kế hoạch và triển khai các chương trình dành cho cư dân như: lễ hội, workshop, hoạt động trẻ em, chương trình theo mùa (8/3, Trung Thu, Noel, Tết…).\u003c/p\u003e\u003cp\u003e•\tQuản lý toàn bộ quá trình tổ chức sự kiện: kế hoạch, timeline, ngân sách, nhân sự và nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tTìm kiếm, làm việc và phối hợp với các đối tác, đơn vị cung cấp dịch vụ để tổ chức sự kiện tại khu đô thị.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo các chương trình diễn ra đúng kế hoạch, đạt mục tiêu trải nghiệm cho cư dân.\u003c/p\u003e\u003cp\u003e•\tTổng hợp, đánh giá hiệu quả và đề xuất cải tiến cho các chương trình sau mỗi sự kiện.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Phát triển và quản lý truyền thông cộng đồng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý và phát triển các kênh truyền thông dành cho cư dân: Fanpage Facebook, Group cộng đồng, bảng tin, email, ứng dụng cư dân…\u003c/p\u003e\u003cp\u003e•\tLên kế hoạch và xây dựng nội dung truyền thông về hoạt động khu đô thị, tiện ích, sự kiện và các thông báo cộng đồng.\u003c/p\u003e\u003cp\u003e•\tQuản lý hoạt động Group Facebook: duyệt bài, tương tác với thành viên, duy trì môi trường trao đổi tích cực trong cộng đồng.\u003c/p\u003e\u003cp\u003e•\tTổ chức các hoạt động tương tác như minigame, cuộc thi, chương trình online nhằm tăng sự gắn kết cư dân.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các bộ phận vận hành để truyền tải thông tin kịp thời và chính xác đến cư dân.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Phát triển hoạt động và văn hóa cộng đồng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐề xuất và triển khai các chương trình nhằm gia tăng sự gắn kết cư dân và xây dựng văn hóa cộng đồng tại khu đô thị.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ xây dựng và phát triển các câu lạc bộ cư dân (thể thao, nghệ thuật, trẻ em…).\u003c/p\u003e\u003cp\u003e•\tKết nối các thương hiệu và đối tác để mang đến các hoạt động trải nghiệm, ưu đãi hoặc chương trình dành riêng cho cư dân.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Phát triển quan hệ đối tác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng và phát triển mạng lưới đối tác, thương hiệu nhằm tổ chức các sự kiện, activation và chương trình quảng bá tại khu đô thị.\u003c/p\u003e\u003cp\u003e•\tPhối hợp cùng các đối tác triển khai các chương trình hợp tác nhằm nâng cao trải nghiệm cư dân và tăng nhận diện dự án.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Hỗ trợ các hoạt động Marketing\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các bộ phận Marketing, Vận hành và Kinh doanh triển khai các chiến dịch truyền thông cho khu đô thị.\u003c/p\u003e\u003cp\u003e•\tTham gia tổ chức và hỗ trợ các sự kiện marketing của công ty khi cần thiết.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ sản xuất nội dung truyền thông như bài viết, hình ảnh, video cho các hoạt động marketing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Sáng tạo nội dung và ấn phẩm truyền thông\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLên ý tưởng nội dung và định hướng hình ảnh cho các chiến dịch truyền thông, sự kiện cộng đồng.\u003c/p\u003e\u003cp\u003e•\tĐề xuất concept thiết kế cho các ấn phẩm truyền thông của sự kiện như: poster, banner, backdrop, standee, thư mời, bài đăng mạng xã hội…\u003c/p\u003e\u003cp\u003e•\tPhối hợp với bộ phận thiết kế hoặc trực tiếp thực hiện các ấn phẩm đơn giản phục vụ truyền thông.\u003c/p\u003e\u003cp\u003e•\tChụp ảnh hoạt động, cập nhật hình ảnh lên fanpage, story hoặc group cộng đồng.\u003c/p\u003e\u003cp\u003e•\tChỉnh sửa ảnh và edit video ngắn cơ bản (reels, TikTok, clip recap sự kiện…).\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T560,\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học trở lên chuyên ngành Marketing, Truyền thông, Quản trị sự kiện, Quan hệ công chúng hoặc các ngành liên quan\u003c/p\u003e\u003cp\u003e•\tCó từ 2–3 năm kinh nghiệm trong lĩnh vực Marketing, Event, Community Management hoặc các vị trí tương đương.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm tổ chức sự kiện, hoạt động cộng đồng hoặc chương trình dành cho cư dân/khách hàng.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm quản lý và phát triển các kênh truyền thông cộng đồng như Fanpage, Group Facebook hoặc các nền tảng mạng xã hội.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm việc với đối tác, nhà cung cấp hoặc các đơn vị tổ chức sự kiện là một lợi thế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng lên ý tưởng, xây dựng kế hoạch và tổ chức sự kiện.\u003c/p\u003e\u003cp\u003e•\tKỹ năng viết và sáng tạo nội dung truyền thông tốt, phù hợp với từng kênh truyền thông.\u003c/p\u003e\u003cp\u003e•\tKỹ năng tổ chức công việc, quản lý timeline và ngân sách sự kiện.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp, kết nối và làm việc với đối tác.\u003c/p\u003e\u003cp\u003e•\tCó khả năng lên ý tưởng concept truyền thông và ấn phẩm cho sự kiện, chiến dịch marketing.\u003c/p\u003e26:T8c4,"])</script><script>self.__next_f.push([1,"Thành lập từ năm 2003, Ecopark tiền thân là Công ty Cổ phần đầu tư và phát triển đô thị Việt Hưng (VIHAJICO). Với sứ mệnh xây dựng một khu đô thị sinh thái chức năng đầu tiên ở Việt Nam theo xu hướng phát triển đô thị xanh, hiện đại, VIHAJICO đã xây dựng dự án Khu đô thị Ecopark.\r\n\r\nSau hơn 15 năm phát triển, Khu đô thị Ecopark đã trở thành một thành phố chức năng kiểu mẫu, tiên phong xác lập xu hướng Bất động sản Xanh với giá cả hợp lý, được quốc tế tôn vinh với nhiều giải thưởng danh giá. Ban lãnh đạo công ty đã quyết định thay đổi tên thành Công ty Cổ phần Tập đoàn Ecopark, hướng tới mục tiêu phát triển bền vững, đầu tư đa ngành vào các lĩnh vực như giáo dục, y tế, nông nghiệp sạch, công nghệ cao, du lịch, vui chơi giải trí…; đồng thời vẫn giữ vững vị thế chủ chốt là Tập đoàn đầu tư và phát triển đô thị chuyên nghiệp theo xu hướng Bất động sản Xanh, mở rộng phát triển mô hình đô thị Ecopark trên địa bàn cả nước.\r\n\r\nVới 4 Giá trị cốt lõi: Tín nhiệm, Vượt trội, Cùng nhau thành công, Bền vững; Ecopark chú trọng vào việc xây dựng và hình thành một đội ngũ nhân sự hành xử chính trực, có trách nhiệm, vượt trội trong mọi lĩnh vực hoạt động, luôn đổi mới sáng tạo, khát khao chinh phục những tầm cao mới.\r\n\r\nĐể góp phần vào sự phát triển bền vững cho những năm tiếp theo, đưa Ecopark gần hơn tới tầm nhìn trở thành doanh nghiệp hàng đầu tại Việt Nam và khu vực trong lĩnh vực đầu tư bất động sản và phát triển đô thị sinh thái thông minh, Ecopark luôn tìm kiếm những đồng đội trẻ, nhiệt huyết, tràn đầy đam mê trong công việc. Hãy theo dõi Fanpage: Tuyển dụng Ecopark (https://www.fb.com/tuyendungecopark/) hoặc địa chỉ: http://ecopark.com.vn/tuyen-dung để cập nhật các thông tin tuyển dụng mới nhất của Tập đoàn."])</script><script>self.__next_f.push([1,"29:T8c4,"])</script><script>self.__next_f.push([1,"Thành lập từ năm 2003, Ecopark tiền thân là Công ty Cổ phần đầu tư và phát triển đô thị Việt Hưng (VIHAJICO). Với sứ mệnh xây dựng một khu đô thị sinh thái chức năng đầu tiên ở Việt Nam theo xu hướng phát triển đô thị xanh, hiện đại, VIHAJICO đã xây dựng dự án Khu đô thị Ecopark.\r\n\r\nSau hơn 15 năm phát triển, Khu đô thị Ecopark đã trở thành một thành phố chức năng kiểu mẫu, tiên phong xác lập xu hướng Bất động sản Xanh với giá cả hợp lý, được quốc tế tôn vinh với nhiều giải thưởng danh giá. Ban lãnh đạo công ty đã quyết định thay đổi tên thành Công ty Cổ phần Tập đoàn Ecopark, hướng tới mục tiêu phát triển bền vững, đầu tư đa ngành vào các lĩnh vực như giáo dục, y tế, nông nghiệp sạch, công nghệ cao, d
