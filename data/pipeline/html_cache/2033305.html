s.\u003c/p\u003e\u003cp\u003e•\tDo other tasks assigned by line manager.\t\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm tra và đảm bảo chất lượng cho Phụ tùng và Phụ kiện trong Kho.\u003c/p\u003e\u003cp\u003e•\tQuản lý tất cả các khiếu nại từ thị trường liên quan đến chất lượng sản phẩm.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với bộ phận Sản xuất và bộ phận Chất lượng để cập nhật tình trạng chất lượng sản phẩm trong kho.\u003c/p\u003e\u003cp\u003e•\tQuản lý và cải tiến quy trình FIFO trong kho.\u003c/p\u003e\u003cp\u003e•\tKiểm tra và phản hồi các thông tin kỹ thuật cho thị trường.\u003c/p\u003e\u003cp\u003e•\tPhát triển phương pháp nhận diện sản phẩm và bao bì.\u003c/p\u003e\u003cp\u003e•\tKiểm tra và cung cấp tên tiếng Việt cho tất cả Phụ tùng và Phụ kiện kèm thông tin kỹ thuật yêu cầu cho bộ phận Thuế để xác định mã HS và thuế suất VAT.\u003c/p\u003e\u003cp\u003e•\tChuẩn bị thông tin kỹ thuật và mẫu thử nghiệm phục vụ công tác kiểm định.\u003c/p\u003e\u003cp\u003e•\tKiểm tra và quản lý CNI (Thông báo thay đổi) liên quan đến Phụ tùng và Phụ kiện để thông báo đến các bên liên quan, yêu cầu kích hoạt trên SAP và cập nhật Catalog (nếu cần).\u003c/p\u003e\u003cp\u003e•\tQuản lý thông tin phụ tùng liên quan đến các mẫu xe mới ra mắt hoặc ngừng sản xuất để phối hợp với các bộ phận liên quan, đảm bảo nguồn cung cho thị trường có phụ tùng cũ và chuẩn bị cho lô hang đầu tiên của các phụ tùng mới \u003c/p\u003e\u003cp\u003e•\tThực hiện báo cáo hoạt động hàng tháng của toàn bộ bộ phận.\u003c/p\u003e\u003cp\u003e•\tThực hiện các công việc khác theo phân công của cấp quản lý trực tiếp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Taba,"])</script><script>self.__next_f.push([1,"\u003cp\u003e•\tBachelor’s degree in Engineer (prefer mechanical, machinery manufacture engineering field).\u003c/p\u003e\u003cp\u003e•\tAt least 2-3 years of relevant experience in Warehouse Management, Quality managemen
