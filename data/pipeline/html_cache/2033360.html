onal Manager.\u003c/p\u003e\u003cp\u003e   •   Drive sales volume and revenue growth as per commercial KPIs.\u003c/p\u003e\u003cp\u003e   •   Collaborate with marketing and agronomy teams to ensure commercial excellence.\u003c/p\u003e\u003cp\u003e   •   Develop and maintain strong relationships with retailers and key farmer networks to strengthen brand presence and sales impact.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Agronomy in the Region\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Contribute to annual action plans for demand creation and solution selling.\u003c/p\u003e\u003cp\u003e   • Execute pull activities aligned with company strategies, ensuring alignment with regional needs.\u003c/p\u003e\u003cp\u003e   • Provide agronomic advice and technical support to growers and distribution partners.\u003c/p\u003e\u003cp\u003e   • Conduct market intelligence gathering to assess farmer needs, pricing trends, and competitor activity.\u003c/p\u003e\u003cp\u003e   • Address grower/retailer concerns related to product quality and application, ensuring issue resolution and sustained engagement.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Marketing in the Region\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Ensure consistent branding and visibility of Yara in the assigned region (OOH, in-store branding, digital channels, etc.).\u003c/p\u003e\u003cp\u003e   • Work closely with the Marketing team to implement localized promotional and lead generation campaigns.\u003c/p\u003e\u003cp\u003e   • Drive customer adoption of Yara’s digital.\u003c/p\u003e\u003cp\u003e   • Support omni-channel marketing initiatives to expand digital reach.\u003c/p\u003e\u003cp\u003e   • Manage and distribute marketing materials effectively to enhance product positioning.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Other responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Strictly follow Yara ethics \u0026 compliance in the region. Maintain, protect, and promote the organization's culture, values, and reputation in the eyes of customers, suppliers, partners, workers, and the public.\u003c/p\u003e\u003cp\u003e   • Proactively build DEI as part of the culture of the organization.\u003c/p\u003e\u003cp\u003e   • Ensure Yara’s strong HESQ performance is converted into an embedded culture.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T438,We're a company where knowledge, business, and people grow. \r\nSelf-motivated high achievers, who want to be the best, are invited to join Yara Vietnam with Special People Care of competitive salary scheme, annual/quarterly/monthly performance bonus, health care with life and accidental and medical insurance program, sufficient tools of working plus annual leave of 14 days per year and the excellent training opportunities to develop your full potential.\r\n\r\nFour dimensions expand on what being part of the company means: \r\nPersonal Impact - doing business with a purpose; \r\nPersonal Growth - driving one's own development by learning in an expert environment; \r\nPersonal experience with Yara - working in an inviting and multi-cultural environment; and \r\nYara's Norwegian roots.\r\n\r\nThe core strength of the Yara brand has always come from our people and their knowledge – it is the corner stone of our competitive advantage in the market place. It’s what has sustained us for over 110 years and what will allow us to grow and meet the challenges of our ever-changing world.27:T9c2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJob Summary:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e The Sales Agronomist is responsible for delivering regional sales targets through strong agronomic support and market development activities. The role works closely with distributors, retailers, and farmers to promote Yara’s crop nutrition solutions, con
