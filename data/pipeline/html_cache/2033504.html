th Product Proposition Design (PPD) and Actuarial to conduct analysis to justify product designs and formulate business case for PMC agreement.\u003c/p\u003e\u003cp\u003e3.\tDevelop product approval reports (PAR) and follow up the approval process by local PMC and Group Office.\u003c/p\u003e\u003cp\u003e4.\tDevelop product materials (T\u0026C, Sales Illustrations). \u003c/p\u003e\u003cp\u003e5.\tAssist with addressing regulator’s requests during product approval process.\u003c/p\u003e\u003cp\u003e6.\tPrepare product business specifications and participate in the process of developing product operational specifications (OP Specs) and system requirements. \u003c/p\u003e\u003cp\u003e7.\tJointly (with PPD) develop training materials and deliver product training to trainers/back-office staff; collaborate with PPD, Training and Distribution teams to organize product workshops regularly to address product related questions from sales force and enhance their product knowledge.\u003c/p\u003e\u003cp\u003e8.\tBe responsible for the monthly Product Management Committee (PMC) meetings / GO meetings preparation for product development/management decisions. \u003c/p\u003e\u003cp\u003e9.\tConduct product analysis to provide insights for PMC decision and for effective portfolio management.\u003c/p\u003e\u003cp\u003e10.\tCollaborate with PPD team to prepare product market intelligence updates regularly.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T579,About FWD Vietnam\r\n\r\nFWD Group is a pan-Asian life insurance business with more than 13 million customers across 10 markets, including some of the fastest-growing insurance markets in the world. The company was established in 2013 and is focused on changing the way people feel about insurance. FWD’s customer-led and digitally enabled approach aims to deliver innovative propositions, easy-to-understand products and a simpler insurance experience.\r\n\r\nFWD Vietnam was established in 2016 and is a member of FWD Group.
