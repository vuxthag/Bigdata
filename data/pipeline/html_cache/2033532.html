ụ/Đại lý thuế.\u003c/p\u003e\u003cp\u003e•\tChăm sóc đối tác (kế toán dịch vụ, đại lý thuế) đảm bảo đối tác tiếp tục sử dụng nền tảng và mở rộng khách hàng doanh nghiệp trên nền tảng, mục tiêu gia tăng doanh số.\u003c/p\u003e\u003cp\u003e•\tĐề xuất các chương trình, chính sách chăm sóc đối tác.\u003c/p\u003e\u003cp\u003e•\tĐào tạo, chia sẻ cho đối tác để đối tác biết cách thuyết phục khách hàng doanh nghiệp thuê dịch vụ kế toán tham gia vào nền tảng và trả phí.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSản phẩm: MISA ASP\u003c/strong\u003e là nền tảng kế toán dịch vụ giúp doanh nghiệp, hộ kinh doanh, cá nhân kinh doanh có nhu cầu thuê dịch vụ kế toán tìm kiếm các tổ chức cung ứng dịch vụ kế toán, thuế uy tín, chất lượng, chuyên nghiệp trên toàn quốc.\u003c/p\u003e24:T1057,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Độ tuổi: 22 - 32\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Cao đẳng/ Đại học, được đào tạo về các khối ngành Kinh tế: Kế toán, Quản trị kinh doanh, Kinh tế, Tài chính,...\u003c/p\u003e\u003cp\u003e•\tCó kiến thức cơ bản về Nguyên lý kế toán/ Tài chính Kế toán \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp tốt, linh hoạt, đàm phán thương lượng.\u003c/p\u003e\u003cp\u003e•\tTư duy xử lý tình huống trong kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm từ 6 tháng làm Kinh doanh, Quan hệ khách hàng, Phát triển thị trường/đối tác/mạng lưới hoặc kinh nghiệm kinh doanh lĩnh vực phần mềm\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Định hướng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhát triển trong mảng kinh doanh, phát triển đối tác, mở rộng mạng lưới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThu nhập và đãi ngộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThu nhập = Lương cứng (từ 9,500,000 - 12,500,000) + Thưởng doanh số + Thưởng chiến dịch tháng/ quý + Phụ cấp/ Hỗ trợ khác. Bình quân 20,000,000 - 30,000,000.\u003c/p\u003e\u003cp\u003e•\tThưởng cuối năm theo quy định.\u003c/p\u003e\u003cp\u003e•\tĐiều chỉnh level và lương cố định 2 lần/năm.\u003c/p\u003e\u003cp\u003e•\tChăm sóc sức khỏe định kỳ tại Medlatec.\u003c/p\u003e\u003cp\u003e•\tCác phúc lợi khác: Bảo hiểm, sinh nhật, thưởng Lễ tết, teambuilding, Du lịch hè, .... theo quy định Luật Lao động và chính sách của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLộ trình thăng tiến:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\u003c/strong\u003e\tCó cơ hội thăng tiến lên các vị trí quản lý cấp trung/cấp cao khi chứng minh được năng lực (không đợi tuổi).\u003c/p\u003e\u003cp\u003e•\tLộ trình đánh giá nhân viên rõ ràng, minh bạch, dựa trên số liệu, báo cáo chi tiết - Định kỳ 6 tháng/lần.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMôi trường và văn hóa:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMôi trường trẻ trung, năng động và đề cao sự sáng tạo.\u003c/p\u003e\u003cp\u003e•\tHoạt động trong mô hình Oneteam, kết hợp chặt chẽ với các bộ phận Phát triển phần mềm, PR Marketing và đào tạo tư vấn triển khai để chủ động điều phối nguồn lực giúp hoàn thành mục tiêu nhiệm vụ được giao.\u003c/p\u003e\u003cp\u003e•\tNhiều hoạt động gắn kết nội bộ: CLB Bóng đá, CLB Cầu lông, CLB Tennis, CLB Pickleball,...\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHọc tập và phát triển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐược tiếp cận và làm việc trực tiếp làm việc với các Chủ tịch, CEO, Giám đốc, Chuyên gia cao cấp cùng Các sở, ban ngành, hiệp hội, hội hành nghề uy tín trong lĩnh vực tài chính - kế toán, tư vấn thuế.\u003c/p\u003e\u003cp\u003e•\tĐào tạo theo từng giai đoạn phát triển với lộ trình rõ ràng, hỗ trợ học tập và phát triển cá nhân toàn diện.\u003c/p\u003e\u003cp\u003e•\tCung cấp hệ thống tài liệu đào tạo đầy đủ, học tập mọi lúc, mọi nơi trên nền tảng E-learning.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHỗ trợ công cụ làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tỨng dụng công nghệ AI trong phần mềm CRM giúp tự động hóa quản lý, theo dõi hoạt động kinh doanh, rút ngắn thời gian xử lý, nâng cao năng suất và thúc đẩy tăng trưởng trong kỷ nguyên công nghệ số.\u003c/p\u003e\u003cp\u003e•\tĐược cung cấp tài khoản Chữ ký số cá nhân, ChatGPT, công cụ AI Marketing,… giúp nâng cao tính chuyên nghiệp, tối ưu năng suất và hiệu quả làm việc.\u003c/p\u003e\u003cp\u003e•\tTrang bị đầy đủ thiết bị làm việc: máy tính, thẻ, sim điện thoại,… đảm bảo hỗ trợ tốt nhất cho công việc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTừ 1/5 đến 30/11: Thứ Hai đến Thứ Sáu, 8h00–17h30 (nghỉ trưa 12h00–13h30); sáng Thứ Bảy linh hoạt theo yêu cầu và tiến độ công việc\u003c/p\u003e\u003cp\u003e•\tTừ 1/12 đến 30/4: Thứ Hai đến Thứ Sáu, 8h00–17h30 (nghỉ trưa 12h00–13h30); Thứ Bảy làm buổi sáng 8h00–12h00\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"27:T781,\u003cp\u003e\u003cem\u003eTập đoàn MISA, thành lập năm 1994, là doanh nghiệp CNTT hàng đầu Việt Nam với hơn 350.000 khách hàng tổ chức và gần 3,5 triệu cá nhân, hiện diện tại 22 quốc gia. MISA tiên phong phát triển Agentic AI và nền tảng AIaaS, cung cấp giải pháp số hóa cho doanh nghiệp, hộ kinh doanh và chính phủ. Định vị là tập đoàn dẫn đầu về Agentic AI, MISA cam kết đổi mới sáng tạo, giúp tối ưu vận hành, nâng cao hiệu quả và giảm tải thủ công cho tổ chức. Sứ mệnh của MISA là đồng hành cùng chính phủ, doanh nghiệp và cá nhân trong hành trình chuyển đổi số, khẳng định vị thế công nghệ Việt Nam trên quốc tế.\u003c/em\u003e\u003c/p\u003e\u003
