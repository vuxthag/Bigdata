ề xuất các sáng kiến trong việc tìm kiếm, duy trì, phát triển khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tổ chức thực hiện công tác kinh doanh và quản trị bán hàng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Hoàn thành ở mức đạt/vượt mức chỉ tiêu KPI đề ra;\u003c/p\u003e\u003cp\u003e• Đàm phán, thống nhất các điều khoản với Khách hàng về cung cấp các sản phẩm, dịch vụ;\u003c/p\u003e\u003cp\u003e• Thu thập hồ sơ, tài liệu và thông tin liên quan về Khách hàng làm cơ sở cho việc đề xuất cung cấp sản phẩm, dịch vụ cho Khách hàng;\u003c/p\u003e\u003cp\u003e• Khảo sát nhu cầu của Khách hàng, phối hợp với các thành viên của Đội tiếp cận khách hàng, đề xuất các sáng kiến, ý tưởng nhằm cung cấp dịch vụ cho Khách hàng theo gói, chuỗi sản phẩm nhằm tối đa hóa việc sử dụng dịch vụ của Khách hàng tại SeABank;\u003c/p\u003e\u003cp\u003e• Định kỳ đánh giá, rà soát mức độ sinh lời của Khách hàng; xây dựng kế hoạch để gia tăng mức độ sinh lời của Khách hàng;\u003c/p\u003e\u003cp\u003e• Thẩm định Khách hàng; kiểm soát, phối hợp với các cá nhân/Bộ phận liên quan thực hiện các thủ tục về trình duyệt, định giá TSĐB, giải ngân, quản lý sau giải ngân theo quy định của SeABank;\u003c/p\u003e\u003cp\u003e• Kiểm tra, giám sát, nắm bắt và cập nhật tình hình kinh doanh của Khách hàng;\u003c/p\u003e\u003cp\u003e• Đề xuất, phối hợp, thực hiện các biện pháp trong việc xử lý nợ quá hạn đối với Khách hàng;\u003c/p\u003e\u003cp\u003e• Phối hợp với các đơn vị trong Ngân hàng để nâng cao chất lượng các sản phẩm hiện hành cũng như phát triển các sản phẩm mới phục vụ cho nhu cầu cụ thể;\u003c/p\u003e\u003cp\u003e• Thực hiện các biện pháp phòng, chống rủi ro trong hoạt động kinh doanh ngân hàng;\u003c/p\u003e\u003cp\u003e• Trực tiếp quản lý, khai thác kế hoạch và kết quả kinh doanh với một số tập khách hàng doanh nghiệp Lớn, am hiểu các đặc tính, hành vi của khách hàng lớn, hiểu rõ sâu sắc các xu hướng rủi ro ngành;\u003c/p\u003e\u003cp\u003e• Đảm bảo việc tiếp xúc thường xuyên với các Lãnh đạo cao cấp của khách hàng bằng các giải pháp tài chính được thiết kế linh hoạt theo hoạt động kinh doanh của khách hàng;\u003c/p\u003e\u003cp\u003e• Kiểm soát công tác thẩm định khách hàng được giao quản lý, chủ động xử lý hồ sơ khách hàng đúng cam kết;\u003c/p\u003e\u003cp\u003e• Quản lý việc triển khai các giải pháp cho khách hàng Doanh nghiệp lớn được giao quản lý, đảm bảo khách hàng được phục vụ tốt nhất theo mô hình dịch vụ được quy định bởi ngân hàng theo từng thời kỳ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Trách nhiệm khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện các công việc khác có liên quan theo yêu cầu của cấp quản lý trực tiếp và cấp trên giao cho.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T906,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Trình độ: Đại học, Trên đại học;\u003c/p\u003e\u003cp\u003e   • Chuyên ngành đào tạo: Kinh tế, Thương mại, Tài chính ngân hàng hoặc tương đương;\u003c/p\u003e\u003cp\u003e   • Tiếng Anh: Thông thạo 03 kỹ năng nghe, nói, viết;\u003c/p\u003e\u003cp\u003e   • Tin học: Sử dụng tốt các công cụ tin học văn phòng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm công tác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Kinh nghiệm chuyên môn: Tối thiểu 05 năm kinh nghiệm liên quan đến quản lý khai thác các khách hàng doanh nghiệp lớn;\u003c/p\u003e\u003cp\u003e   • Kinh nghiệm quản lý: Tối thiểu 01 năm kinh nghiệm tại vị trí quản lý ở quy mô tương đương.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Am hiểu sâu sắc về các sản phẩm, dịch vụ và hoạt động của ngân hàng;\u003c/p\u003e\u003cp\u003e   • Am hiểu về luật, pháp lý của doanh nghiệp, tập đoàn;\u003c/p\u003e\u003cp\u003e   • Am hiểu sâu sắc các kiến thức về nghiệp vụ tín dụng, các sản phẩm ngân hàng giao dịch, sản phẩm/dịch vụ chuyên biệt đối với phân khúc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Yêu cầu khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Cam kết và Tâm huyết, có ý thức trách nhiệm và chủ động với công việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Kỹ năng giao tiếp và truyền thông;\u003c/p\u003e\u003cp\u003e   • Kỹ năng tiếp cận và khai thác khách hàng;\u003c/p\u003e\u003cp\u003e   • Kỹ năng đàm phán, bán chéo sản phẩm;\u003c/p\u003e\u003cp\u003e   • Kỹ năng làm việc nhóm;\u003c/p\u003e\u003cp\u003e   • Kỹ năng nhận biết rủi ro tín dụng và kỹ năng xây dựng giải pháp giảm thiểu rủi ro;\u003c/p\u003e\u003cp\u003e   • Kỹ năng phân tích tài chính, bảng cân đối, báo cáo thu nhập, dòng tiền;\u003c/p\u003e\u003cp\u003e   • Quản lý nợ xấu và phương án thu hồi;\u003c/p\u003e\u003cp\u003e   • Kỹ năng quản lý thời gian, tổ chức công việc hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • Thu nhập hấp dẫn cùng gói phúc lợi toàn diện;\u003c/p\u003e\u003cp\u003e   • Hệ thống các khóa đào tạo phát triển bản thân tương ứng từng vị trí công việc;\u003c/p\u003e\u003cp\u003e   • Lộ trình thăng tiến rõ ràng;\u003c/p\u003e\u003cp\u003e   • Trải nghiệm các hoạt động văn hóa tổ chức đặc sắc.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tc41,"])</script><script>self.__next_f.push([1,"Ngân hàng Đông Nam Á (SeABank) tự hào là một trong những Ngân hàng TMCP có mặt sớm nhất trên thị trường tài chính Việt Nam, với 20 năm xây dựng và phát triển trải qua những bước thăng trầm trong quá trình cách tân và phấn đấu đầy nỗ lựcSeABank đã đạt được những thành công hết sức khả quan. \r\n\r\nChúng tôi tin tưởng rằng với sự nỗ lực, sáng tạo của đội ngũ CBNV trẻ trung, năng động và tràn đầy nhiệt huyết tập thể SeABank sẽ chung vai, sát cánh để phấn đấu trở thành một Ngân hàng đô thị hiện đại có tính cạnh tranh cao trên thị trường tài chính Việt Nam.\r\nVới một mục tiêu và lý tưởng hết sứ
