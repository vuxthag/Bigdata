ntends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tc06,"])</script><script>self.__next_f.push([1,"TIẾN THỌ – THẾ GIỚI VUI CHƠI \u0026 MUA SẮM HÀNG ĐẦU CHO GIA ĐÌNH VIỆT\r\nTại Tiến Thọ chúng tôi tự hào với sứ mệnh phát triển hệ thống chuỗi tổ hợp vui chơi và mua sắm hàng đầu dành cho trẻ em và gia đình Việt Nam. Với không gian rộng lớn lên tới 3 nghìn - 4 nghìn m², mỗi cơ sở là một thế giới đầy màu sắc, sáng tạo và bổ ích, nơi trẻ em được phát triển toàn diện và cha mẹ tìm thấy sự an tâm.\r\nHiện nay, hệ thống Tiến Thọ đã có mặt trên khắp Bắc - Trung - Nam với 13 nhà sách (và đang không ngừng mở rộng), mang đến hàng triệu sản phẩm sách, đồ chơi, quà tặng và dịch vụ vui chơi chất lượng cao. Ở đây, chúng tôi không chỉ cung cấp sản phẩm, mà còn kiến tạo trải nghiệm trọn vẹn, nơi mỗi khoảnh khắc đều tràn đầy niềm vui và giá trị.\r\nTRIẾT LÝ KINH DOANH Chúng tôi cam kết mang đến khách hàng những trải nghiệm tốt nhất thông qua sự gắn kết và hài lòng của đội ngũ nhân viên.\r\nTại Tiến Thọ, chúng tôi tin rằng “sự hài lòng của khách hàng bắt nguồn từ sự gắn kết và tận tâm của nhân viên”. Vì vậy, mỗi thành viên trong đại gia đình Tiến Thọ đều được tạo điều kiện để phát triển sự nghiệp bền vững trong một môi trường nhân văn, chuyên nghiệp và đầy cơ hội.\r\nTẦM NHÌN TIẾN THỌ 2030\r\n• Trở thành chuỗi tổ hợp vui chơi, mua sắm, ẩm thực cho trẻ em và gia đình số 1 Việt Nam.\r\n• Được khách hàng tin yêu bởi không gian vui chơi rộng lớn, hàng hóa phong phú, giá cả hợp lý và dịch vụ tận tâm.\r\n• Mang đến cho nhân viên sự tử tế, niềm tự hào và cơ hội phát triển bền vững.\r\nGIÁ TRỊ CỐT LÕI CỦA NGƯỜI TIẾN THỌ\r\n• TẬN TÂM trong từng hành động.\r\n• KIÊN ĐỊNH theo đuổi mục tiêu.\r\n• LÀM VIỆC CÓ KẾT QUẢ, tạo ra giá trị thực.\r\n• CAM KẾT giữ lời với bản thân, đồng đội, khách hàng và đối tác.\r\n• HỌC HỎI LIÊN TỤC để không ngừng phát triển.\r\n\r\nHÃY GIA NHẬP TIẾN THỌ - CÙNG KIẾN TẠO TƯƠNG LAI!\r\nTại Tiến Thọ, chúng tôi tin rằng con người chính là tài sản quý giá nhất. Mỗi thành viên trong đại gia đình Tiến Thọ không chỉ có cơ hội phát triển sự nghiệp mà còn góp phần kiến tạo một môi trường lý tưởng để phát triển thế hệ tương lai.\r\nChúng tôi không chỉ tuyển dụng nhân sự, mà chào đón những người đồng hành có chung đam mê và lý tưởng. Nếu bạn muốn làm việc trong một môi trường đầy thử thách nhưng tràn ngập cơ hội, nơi bạn có thể phát triển và cống hiến, hãy cùng chúng tôi tạo nên những giá trị bền vững cho thế hệ tương lai!"])</script><script>self.__next_f.push([1,"24:Tb7f,"])</script><script>self.__next_f.push([1,"\u003cp\u003ea. Xây dựng chiến lược và kế hoạch đào tạo toàn doanh nghiệp\u003c/p\u003e\u003cp\u003e• Xây dựng kế hoạch đào tạo năm/quý/tháng gắn với mục tiêu kinh doanh, định hướng nguồn nhân lực và năng lực cốt lõi của Hệ thống nhà sách Tiến Thọ và đảm bảo hiệu quả ngân sách đào tạo\u003c/p\u003e\u003cp\u003e• Phân tích nhu cầu đào tạo từ cấp chiến lược (Kinh doanh, nhân sự) đến triển khai (chi tiết theo phòng ban, vị trí, định hướng phát triển)\u003c/p\u003e\u003cp\u003e• Xây dựng, chuẩn hóa các chương trình, tài liệu đào tạo nội bộ cho từng nhóm đối tượng: Lộ trình phát triển năng lực theo chức danh\u003c/p\u003e\u003cp\u003eb. Thiết kế, tổ chức và quản lý chương trình đào tạo\u003c/p\u003e\u003cp\u003e• Tổ chức triển khai, vận hành các lớp đào tạo (offline, online, on-the-job, coaching) đảm bảo đúng tiến độ, đủ đối tượng, theo đúng quy chuẩn\u003c/p\u003e\u003cp\u003e• Thiết kế phương pháp, lộ trình luyện tập. Phối hợp cùng các phòng ban, học viên trong việc luyện tập và áp dụng để tạo thói quen hành vi mới sau đào tạo.\u003c/p\u003e\u003cp\u003ec. Đo lường hiệu quả và cải tiến chất lượng đào tạo\u003c/p\u003e\u003cp\u003e• Xây dựng hệ thống đánh giá trước – trong – sau đào tạo (các cấp độ: phản hồi, thay đổi hành vi, kết quả công việc)\u003c/p\u003e\u003cp\u003e• Phân tích số liệu, đo lư
