2684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tf52,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Đầu tư Văn Phú tiền thân là Chi nhánh Công ty Đầu tư Xây dựng và Kinh doanh nhà Quảng Ninh tại Hà Nội, được thành lập từ năm 2003 chỉ với 17 nhân sự. Sau thời gian ban đầu hoạt động trên lĩnh vực thi công, xây lắp, đến năm 2006 công ty đã có sự thay đổi bước ngoặt khi bước sang lĩnh vực đầu tư, kinh doanh bất động sản. \r\n\r\nVăn Phú tạo dấu ấn trong ngành bất động sản với Khu đô thị Văn Phú Hà Đông, quy mô 3000 căn biệt thự liền kề và 9 toà chung cư. Theo đó, lần lượt các dự án lớn khác đã ra đời như Tòa nhà The Van Phu Victoria, Nhà phố thương mại The Victoria, dự án The Terra - An Hưng, The Terra – Hào Nam, Grandeur Palace - Giảng Võ, Grandeur Palace - Phạm Hùng, khách sạn Oakwood Residence Ha Noi… góp phần thay đổi bộ mặt Thủ đô. \r\n\r\nSự phát triển bền vững của Văn Phú được khẳng định khi tháng 11/2017, công ty chính thức lên sàn chứng khoán Hà Nội và đến tháng 6/2018 chuyển sang Sở giao dịch chứng khoán Thành phố Hồ Chí Minh. Với mã giao dịch VPI, Văn Phú đã khẳng định vị thế cũng như giá trị tại thời điểm năm 2018 vốn chủ sở hữu đạt khoảng 2000 tỉ đồng, mức vốn hoá trên thị trường chứng khoán đã đạt gần 6.000 tỉ đồng, và nằm trong Top 10 doanh nghiệp bất động sản có mức vốn hoá lớn nhất trên sàn chứng khoán. \r\n\r\nLớn mạnh theo thời gian, dấu ấn của Văn Phú tiếp tục lan tỏa và mở rộng trên bản đồ bất động sản Việt Nam, cùng với các dự án bất động sản tại Hà Nội là các dự án trọng điểm nằm tại nhiều địa bàn lớn trên cả nước như dự án Grandeur Palace - Đinh Tiên Hoàng (Hồ Chí Minh), Khu đô thị mới Cồn Khương (Cần Thơ), dự án Lộc Bình (Thừa Thiên Huế), dự án Nam Sầm Sơn (Thanh Hóa), dự án Khu du lịch sinh thái An Biên, sân golf Hoành Bồ (Quảng Ninh), dự án Yên Phong (Bắc Ninh)… \r\n\r\nTừ một doanh nghiệp cổ phần, đến nay Văn Phú đã trở thành một doanh nghiệp đại chúng lớn, tập trung vào các lĩnh vực hoạt động chính gồm Đầu tư – phát triển bất động sản; Quản lý vận hành dịch vụ bất động sản; Dịch vụ hỗ trợ bất động sản và Nông nghiệp công nghệ cao. Để triển khai các hoạt động kinh doanh hiệu quả, Văn Phú đã mở rộng hệ thống với 10 công ty thành viên và 5 công ty liên kết, có đội ngũ nhân sự chất lượng cao, chuyên tâm với từng sản phẩm.\r\n\r\n Thành tích của Văn Phú cũng được ghi nhận thông qua nhiều giải thưởng uy tín trong nước và quốc tế, trong đó phải kể đến giải thưởng BCI ASIA TOP 10 dành cho 10 nhà phát triển bất động sản hàng đầu tại mỗi nước khu vực Châu Á, giải thưởng BCI Asia Awards, Giải thưởng dành cho 10 nhà phát triển Bất động sản hàng đầu tại Việt Nam, Top 50 thương hiệu nổi tiếng Việt Nam, cùng nhiều bằng khen từ các bộ ban ngành, thành phố… Đặc biệt, năm 2018, Văn Phú đã được nhận bằng khen của Thủ tướng Chính phủ cho những đóng góp của doanh nghiệp với cộng đồng. \r\n\r\nTrong gần 2 thập kỷ, với định hướng xuyên suốt là “Nhà phát triển bất động sản chuyên tâm”, Văn Phú đã tạo dựng nên các công trình mang tầm vóc tương lai, không ngừng kiến tạo những giá trị nhân bản, tiếp tục sứ mệnh cao cả - chăm sóc cho thế hệ tương lai."])</script><script>self.__next_f.push([1,"24:Tc5d,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. \u003cstrong\u003eTổ chức, quản lý, điều hành công việc Ban Kế hoạch\u003c/strong\u003e: Lập và quản lý kế hoạch của toàn hệ thống Tập đoàn (VPI):\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban điều hành về m 2003 chỉ với 17 nhân sự. Sau thời gian ban đầu hoạt động trên lĩnh vực thi công, xây lắp, đến năm 2006 công ty đã có sự thay đổi bước ngoặt khi bước sang lĩnh vực đầu tư, kinh doanh bất động sản. \r\n\r\nVăn Phú tạo dấu ấn trong ngành bất động sản với Khu đô thị Văn Phú Hà Đông, quy mô 3000 căn biệt thự liền kề và 9 toà chung cư. Theo đó, lần lượt các dự án lớn khác đã ra đời như Tòa nhà The Van Phu Victoria, Nhà phố thương mại The Victoria, dự án The Terra - An Hưng, The Terra – Hào Nam, Grandeur Palace - Giảng Võ, Grandeur Palace - Phạm Hùng, khách sạn Oakwood Residence Ha Noi… góp phần thay đổi bộ mặt Thủ đô. \r\n\r\nSự phát triển bền vững của Văn Phú được khẳng định khi tháng 11/2017, công ty chính thức lên sàn chứng khoán Hà Nội và đến tháng 6/2018 chuyển sang Sở giao dịch chứng khoán Thành phố Hồ Chí Minh. Với mã giao dịch VPI, Văn Phú đã khẳng định vị thế cũng như giá trị tại thời điểm năm 2018 vốn chủ sở hữu đạt khoảng 2000 tỉ đồng, mức vốn hoá trên thị trường chứng khoán đã đạt gần 6.000 tỉ đồng, và nằm trong Top 10 doanh nghiệp bất động sản có mức vốn hoá lớn nhất trên sàn chứng khoán. \r\n\r\nLớn mạnh theo thời gian, dấu ấn của Văn Phú tiếp tục lan tỏa và mở rộng trên bản đồ bất động sản Việt Nam, cùng với các dự án bất động sản tại Hà Nội là các dự án trọng điểm nằm tại nhiều địa bàn lớn trên cả nước như dự án Grandeur Palace - Đinh Tiên Hoàng (Hồ Chí Minh), Khu đô thị mới Cồn Khương (Cần Thơ), dự án Lộc Bình (Thừa Thiên Huế), dự án Nam Sầm Sơn (Thanh Hóa), dự án Khu du lịch sinh thái An Biên, sân golf Hoành Bồ (Quảng Ninh), dự án Yên Phong (Bắc Ninh)… \r\n\r\nTừ một doanh nghiệp cổ phần, đến nay Văn Phú đã trở thành một doanh nghiệp đại chúng lớn, tập trung vào các lĩnh vực hoạt động chính gồm Đầu tư – phát triển bất động sản; Quản lý vận hành dịch vụ bất động sản; Dịch vụ hỗ trợ bất động sản và Nông nghiệp công nghệ cao. Để triển khai các hoạt động kinh doanh hiệu quả, Văn Phú đã mở rộng hệ thống với 10 công ty thành viên và 5 công ty liên kết, có đội ngũ nhân sự chất lượng cao, chuyên tâm với từng sản phẩm.\r\n\r\n Thành tích của Văn Phú cũng được ghi nhận thông qua nhiều giải thưởng uy tín trong nước và quốc tế, trong đó phải kể đến giải thưởng BCI ASIA TOP 10 dành cho 10 nhà phát triển bất động sản hàng đầu tại mỗi nước khu vực Châu Á, giải thưởng BCI Asia Awards, Giải thưởng dành cho 10 nhà phát triển Bất động sản hàng đầu tại Việt Nam, Top 50 thương hiệu nổi tiếng Việt Nam, cùng nhiều bằng khen từ các bộ ban ngành, thành phố… Đặc biệt, năm 2018, Văn Phú đã được nhận bằng khen của Thủ tướng Chính phủ cho những đóng góp của doanh nghiệp với cộng đồng. \r\n\r\nTrong gần 2 thập kỷ, với định hướng xuyên suốt là “Nhà phát triển bất động sản chuyên tâm”, Văn Phú đã tạo dựng nên các công trình mang tầm vóc tương lai, không ngừng kiến tạo những giá trị nhân bản, tiếp tục sứ mệnh cao cả - chăm sóc cho thế hệ tương lai."])</script><script>self.__next_f.push([1,"41:{\"companyId\":301332,\"jobImageURLs\":\"$42\",\"jobVideoURLs\":\"$43\",\"companyName\":\"Công Ty Cổ Phần Phát Triển Bất Động Sản Văn Phú\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/2b/11404684.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Tòa nhà Văn Phú - Số 104 Thái Thịnh - Trung Liệt - Đống Đa - Hà Nộiội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n46:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-01T15:28:08+07:00\",\"expiredOn\":\"2026-05-01T23:59:59+07:00\"}\n47:{\"serviceCode\":\"TLM\",\"startOn\":\"2026-04-01T15:28:08+07:00\",\"expiredOn\":\"2026-04-16T23:59:59+07:00\"}\n45:[\"$46\",\"$47\"]\n48:{\"jobInvitationId\":0,\"status\":
