ổ nhiệm, điều chuyển, nghỉ việc.\u003c/p\u003e\u003cp\u003e•\tXây dựng và cập nhật nội quy lao động, thỏa ước lao động tập thể theo quy định mới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. MẢNG HÀNH CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý văn phòng phẩm, đồng phục, bảo hộ lao động, tài sản công ty.\u003c/p\u003e\u003cp\u003e•\tSoạn thảo và lưu trữ văn bản hành chính nội bộ, hồ sơ xuất nhập khẩu liên quan.\u003c/p\u003e\u003cp\u003e•\tTiếp đón khách, đối tác, khách hàng nước ngoài, tiếp nhận thư từ, công văn đến - đi.\u003c/p\u003e\u003cp\u003e•\tTổ chức các hoạt động nội bộ: lễ Tết, sinh nhật, nghỉ mát, team building.\u003c/p\u003e\u003cp\u003e•\tTheo dõi và thanh toán các chi phí hành chính: điện, nước, internet, nhiên liệu...\u003c/p\u003e\u003cp\u003e•\tQuản lý công tác vệ sinh môi trường, 5S trong khu vực văn phòng và nhà xưởng.\u003c/p\u003e\u003cp\u003e•\tQuản lý bếp ăn, chất lượng bữa ăn và an toàn vệ sinh thực phẩm cho công nhân viên.\u003c/p\u003e\u003cp\u003e•\tPhối hợp công tác PCCC, an toàn lao động, an ninh trật tự, bảo vệ tài sản công ty.\u003c/p\u003e\u003cp\u003e•\tQuan hệ và làm việc với các sở, ban, ngành trong công tác pháp lý, giấy phép, hồ sơ xuất nhập cảnh.\u003c/p\u003e\u003cp\u003e•\tTham gia quản lý hệ thống ISO 9001, ISO 14001, 5S và các quy trình, chính sách liên quan.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ thủ tục xuất nhập cảnh cho chuyên gia, khách hàng nước ngoài khi cần.\u003c/p\u003e\u003cp\u003e•\tThực hiện các công việc khác theo yêu cầu của Ban lãnh đạo Công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T901,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Cao đẳng/Đại học chuyên ngành Quản trị Nhân sự, Luật, Kinh tế hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e•\tÍt nhất 3 năm kinh nghiệm ở vị trí tương e•\tQuản lý công tác vệ sinh môi trường, 5S trong khu vực văn phòng và nhà xưởng.\u003c/p\u003e\u003cp\u003e•\tQuản lý bếp ăn, chất lượng bữa ăn và an toàn vệ sinh thực phẩm cho công nhân viên.\u003c/p\u003e\u003cp\u003e•\tPhối hợp công tác PCCC, an toàn lao động, an ninh trật tự, bảo vệ tài sản công ty.\u003c/p\u003e\u003cp\u003e•\tQuan hệ và làm việc với các sở, ban, ngành trong công tác pháp lý, giấy phép, hồ sơ xuất nhập cảnh.\u003c/p\u003e\u003cp\u003e•\tTham gia quản lý hệ thống ISO 9001, ISO 14001, 5S và các quy trình, chính sách liên quan.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ thủ tục xuất nhập cảnh cho chuyên gia, khách hàng nước ngoài khi cần.\u003c/p\u003e\u003cp\u003e•\tThực hiện các công việc khác theo yêu cầu của Ban lãnh đạo Công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:T901,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Cao đẳng/Đại học chuyên ngành Quản trị Nhân sự, Luật, Kinh tế hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e•\tÍt nhất 3 năm kinh nghiệm ở vị trí tương đương trong các Công ty sản xuất, ưu tiên ngành cơ khí, gia công kim loại.\u003c/p\u003e\u003cp\u003e•\tHiểu biết vững về luật Lao động, BHXH, thuế TNCN, PCCC, an toàn lao động trong môi trường sản xuất.\u003c/p\u003e\u003cp\u003e•\tThành thạo tin học văn phòng (Word, Excel, Google Sheet), ưu tiên biết sử dụng phần mềm quản lý nhân sự.\u003c/p\u003e\u003cp\u003e•\tKỹ năng giao tiếp tốt, trách nhiệm, tỉ mỉ, trung thực, chịu được áp lực công việc cao.\u003c/p\u003e\u003cp\u003e•\tKỹ năng tổ chức, sắp xếp công việc khoa học, xử lý tình huống linh hoạt.\u003c/p\u003e\u003cp\u003e•\tTiếng Anh giao tiếp cơ bản (lợi thế), ưu tiên khả năng đọc hiểu tài liệu tiếng Anh kỹ thuật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHẾ ĐỘ
