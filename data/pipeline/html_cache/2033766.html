g cao Việt Nam”, “Chứng nhận Doanh nghiệp phát triển bền vững - Sustainable Development Business”, \"Thương hiệu nổi tiếng ASEAN\", \"Top 100 Nhãn hiệu nổi tiếng Việt Nam\", “Sản phẩm, dịch vụ Việt Nam được tin dùng\", bằng khen của UBND TP. Hà Nội.\r\n“Cho cuộc sống đơn giản hơn” là mục tiêu hoạt động và là định hướng kinh doanh của VNPAY nhằm tạo ra những giá trị thiết thực hỗ trợ các hoạt động tiêu dùng của xã hội, từ đó khẳng định mục tiêu mang lại các dịch vụ tiện ích cho khách hàng.\r\n\r\n“Cho cuộc sống đơn giản hơn” còn là mục đích làm việc của Ban lãnh đạo, đội ngũ quản lý và nhân viên của VNPAY nhằm xây dựng một môi trường văn hóa doanh nghiệp chuyên nghiệp, gắn bó và cùng nhau hướng tới mục tiêu chung là xây dựng VNPAY trở thành công ty hàng đầu trong lĩnh vực cung ứng dịch vụ Thanh toán điện tử."])</script><script>self.__next_f.push([1,"24:T983,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Số lượng cần tuyển: 01\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Vị trí làm việc: Phòng Kế toán tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Địa điểm làm việc: 22 Láng Hạ, Phường Láng, Hà Nội\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Thời gian làm việc: 8h00 – 17h30 các ngày thứ 2-thứ 6, nghỉ thứ bảy Chủ nhật\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Mô tả công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tổ chức, quản lý và giám sát toàn bộ hoạt động kế toán tổng hợp của doanh nghiệp.\u003c/p\u003e\u003cp\u003e- Lập báo cáo tài chính định kỳ (tháng, quý, năm) theo đúng chuẩn mực kế toán Việt Nam (VAS) và quốc tế.\u003c/p\u003e\u003cp\u003e- Theo dõi và phân tích tình hình tài chính của doanh nghiệp; đưa ra các đề xuất cải thiện hiệu quả sử dụng nguồn lực tài chính.\u003c/p\u003e\u003cp\u003e- Kiểm tra tính hợp lệ, hợp pháp của các chứng từ kế toán trước khi trình ký duyệt.\u003c/p\u003e\u003cp\u003e- Định kỳ kiểm tra, giám sát việc hạch toán kế toán, kiểm toán nội bộ để đảm bảo tính chính xác, minh bạch và hợp pháp của số liệu\u003c/p\u003e\u003cp\u003e- Làm việc với cơ quan thuế, kiểm toán độc lập, thanh tra, ngân hàng và đối tác tài chính khi có yêu cầu.\u003c/p\u003e\u003cp\u003e- Xây dựng hệ thống kiểm soát nội bộ trong lĩnh vực tài chính - kế toán nhằm giảm thiểu rủi ro sai sót hoặc gian lận.\u003c/p\u003e\u003cp\u003e- Đảm bảo việc kê khai thuế (GTGT, TNDN, TNCN…) được thực hiện đúng hạn và đúng quy định pháp luật.\u003c/p\u003e\u003cp\u003e- Cập nhật kịp thời các thay đổi về chế độ kế toán, thuế hoặc quy định pháp luật liên quan đến lĩnh vực tài chính - kế toán.\u003c/p\u003e\u003cp\u003e- Hỗ trợ Trưởng phòng Kế toán trong việc phân công công việc cho nhân viên trong phòng ban; giám sát tiến độ hoàn thành công việc của từng cá nhân/bộ phận.\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng quy trình làm việc chuẩn hóa cho phòng kế toán nhằm nâng cao hiệu quả vận hành.\u003c/p\u003e\u003cp\u003e- Đào tạo và hướng dẫn nhân viên cấp dưới về chuyên môn nghiệp vụ\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban Lãnh đạo về chiến lược quản lý tài chính dài hạn cũng như các quyết định đầu tư lớn của doanh nghiệp.\u003c/p\u003e\u003cp\u003e- Thực hiện các công việc khác theo sự phân công của cấp trên.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Td2c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Yêu cầu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên chuyên ngành Kế toán, Kiểm toán, Tài chính hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e- Ít nhất 5 năm kinh nghiệm tại vị trí kế toán trưởng. Ưu tiên các ứng viên làm trong các công ty thương mại, tài chính, các tập đoàn đa quốc gia, công ty FDI có quy mô từ 500-1000 nhân sự.\u003c/p\u003e\u003cp\u003e- Có chứng chỉ kế toán trưởng do Bộ tài chính cấp. Có các chứng chỉ quốc tế như ACCA, CMA, CPA Aus là 1 lợi thế.\u003c/p\u003e\u003cp\u003e- Am hiểu sâu về chế độ kế toán, chuẩn mực kế toán Việt Nam (VAS), luật thuế, luật doanh nghiệp và các quy định tài chính liên quan\u003c/p\u003e\u003cp\u003e- Có khả năng sử dụng tiếng Anh trong công việc.\u003c/p\u003e\u003cp\u003e- Có tinh thần trách nhiệm cao.\u003c/p\u003e\u003cp\u003e- Khả năng lãnh đạo, quản lý và điều phối công việc hiệu quả.\u003c/p\u003e\u003cp\u003e- Kỹ năng phân tích tài chính, quản trị rủi ro.\u003c/p\u003e\u003cp\u003e- Thành thạo tin học văn phòng, Excel, phần mềm kế toán Fast.\u003c/p\u003e\u003cp\u003e- Kỹ năng giao tiếp, truyền đạt thông tin hiệu quả. Có kỹ năng đàm phán và làm việc với các đối tác.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Chế độ đãi ngộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChế độ lương \u0026 thưởng hấp dẫn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Mức lương thỏa thuận theo năng lực\u003c/p\u003e\u003cp\u003e- Chế độ thưởng phong phú và hấp dẫn vào các ngày lễ Tết, lương tháng 13, thưởng dự án, thưởng hiệu quả cá nhân, tập thể…(Theo quy định và chính sách công ty)\u003c/p\u003e\u003cp\u003e- Hỗ trợ ăn sáng miễn phí\u003c/p\u003e\u003cp\u003e- Phụ cấp ăn trưa: 50.000đ/ngày\u003c/p\u003e\u003cp\u003e- Phụ cấp gửi xe, xăng xe, điện thoại (tùy vị trí)\u003c/p\u003e\u003cp\u003e- Phụ cấp trang điểm cho CBNV nữ\u003c/p\u003e\u003cp\u003e- Quà tặng các ngày lễ trong năm\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBảo hiểm \u0026 chăm sóc sức khỏe toàn diện:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- BHXH, BHYT, BHTN theo pháp luật hiện hành\u003c/p\u003e\u003cp\u003e- Gói bảo hiểm sức khỏe cao cấp 24/7 mua cho nhân viên \u0026 người thân nhân viên\u003c/p\u003e\u003cp\u003e- Khám sức khỏe định kỳ hàng năm\u003c/p\u003e\u003cp\u003e- Môi trường làm việc hiện đại:\u003c/p\u003e\u003cp\u003e- Cung cấp máy tính \u0026 trang thiết bị hiện đại\u003c/p\u003e\u003cp\u003e- Văn phòng làm việc hiện đại, trang thiết bị làm việc Hi- tech\u003c/p\u003e\u003cp\u003e- Không gian ăn nhẹ miễn phí (nước uống, snack)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhát triển nghề nghiệp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Cơ hội tiếp cận với những công nghệ mới, những dự án quy mô lớn\u003c/p\u003e\u003cp\u003e- Làm việc cùng đội ngũ hơn 2000 nhân sự tài năng, có chuyên môn giỏi,dày dặn kinh nghiệm, tư duy chia sẻ\u003c/p\u003e\u003cp\u003e- Được tài trợ kinh phí tham gia các chương trình đào tạo nâng cao năng lực.\u003c/p\u003e\u003cp\u003e- Công ty thành lập 18 năm với sản phẩm dịch vụ đã khẳng định vị thế trên thị trường\u003c/p\u003e\u003cp\u003e- Hoạt động ngoại khóa phong phú:\u003c/p\u003e\u003cp\u003e- Văn hóa công ty đặc sắc với nhiều hoạt động đoàn thể được quan tâm đầu tư: Du xuân, 8/3, Team building, Nghỉ mát trong nước và nước ngoài, VNPAY Family, 20/10, Year End Party, hoạt động thiện nguyện…\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCác câu lạc bộ: \u003c/strong\u003eCLB Cầu lông; CLB Bóng đá; CLB Yoga; CLB Điền kinh.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T823,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Giải pháp Thanh toán Việt Nam (VNPAY) thành lập tháng 03/ 2007 là công ty hàng đầu trong lĩnh vực Thanh toán điện tử tại Việt Nam. Với các ngành nghề kinh doanh cốt lõi thuộc lĩnh vực Tài chính - Ngân hàng, Công nghệ Thông tin - Viễn thông, VNPAY cung cấp dịch vụ tới hơn 40 ngân hàng tại Việt Nam, 5 công ty viễn thông \u0026 hơn 2000 doanh nghiệp thương mại, đưa ra nhiều giải pháp thanh toán đơn giản và tiện lợi như: Mobile Banking, Nạp tiền điện thoại VnTopup, Thanh toán hóa đơn VnPayBill, Ứng dụng VNPAY, Sim đa năng, Cổng thanh toán VnPayment, Website thanh toán hóa đơn và mua hàng trực tuyến Vban.vn...\r\n\r\nVNPAY đã vinh dự nhận nhiều danh hiệu cao quý, cúp, bằng khen, giấy chứng nhận… do các tổ chức kinh tế - xã hội có uy tín trong và ngoài nước trao tặng: “Thương hiệu phát triển bền vững, Sản phẩm chất lượng cao Việt Nam”, “Chứng nhận Doanh nghiệp phát triển bền vững - Sustainable Development Business”, \"Thương hiệu nổi tiếng ASEAN\", \"Top 100 Nhãn hiệu nổi tiếng Việt Nam\", “Sản phẩm, dịch vụ Việt Nam được tin dùng\", bằng khen của UBND TP. Hà Nội.\r\n“Cho cuộc sống đơn giản hơn” là mục tiêu hoạt động và là định hướng kinh doanh của VNPAY nhằm tạo ra những giá trị thiết thực hỗ trợ các hoạt động tiêu dùng của xã hội, từ đó khẳng định mục tiêu mang lại các dịch vụ tiện ích cho khách hàng.\r\n\r\n“Cho cuộc sống đơn giản hơn” còn là mục đích làm việc của Ban lãnh đạo, đội ngũ quản lý và nhân viên của VNPAY nhằm xây dựng một môi trường văn hóa doanh nghiệp chuyên nghiệp, gắn bó và cùng nhau hướng tới mục tiêu chung là xây dựng VNPAY trở thành công ty hàng đầu trong lĩnh vực cung ứng dịch vụ Thanh toán điện tử."])</script><script>self.__next_f.push([1,"27:T85d,"])</script><script>self.__next_f.push([1,"Đội ngũ lãnh đạo và cán bộ của VNPAY đã từng làm việc và triển khai nhiều dự án lớn liên quan đến lĩnh vực tài chính – ngân hàng. Đội ngũ nhân viên kỹ thuật được đào tạo chuyên sâu về chuyên môn, nghiệp vụ và các ứng dụng công nghệ trong lĩnh vực thanh toán , tài chính – ngân hàng.\r\nSố lượng nhân sự của công ty gia tăng không ngừng cả về số lượng lẫn chất lượng để đáp ứng nhu cầu ngày càng phát triển, nâng cao chất lượng dịch vụ. Năm 2009, VNPAY có 68 cán bộ nhân viên, năm 2010 tăng lên 106 và hiện tại, số lượng cán bộ nhân viên của công ty là 300 người.\r\nVề thu nhập:\r\n•\tMức lương tương xứng với năng lực của bản thân.\r\n•\tPhụ cấp ăn trưa: 40.000 đồng/ngày.\r\n•\tChế độ thưởng vào các dịp Lễ tết, sự kiện quan trọng tương đương 1 tháng lương (tăng theo thâm niên), thưởng cho các cá nhân có thành tích xuất sắc, thưởng theo các dự án.\r\nCác phúc lợi khác:\r\n•\tĐược tham gia các khóa đào tạo nâng cɑo các kỹ năng liên quɑn trong công việc;\r\n•\tĐược làm việc trong môi trường năng động, chuyên nghiệp với bề dày thành tích hoạt động hơn 8 năm trong lĩnh vực giải pháp thanh toán;\r\n•\tĐược tham gia vào môi trường văn hóa sôi nổi, với nhiều hoạt động hấp dẫn cùng hơn 200 đồng nghiệp trẻ trung, thân thiện;\r\n•\tNhiều cơ hội thăng tiến, định hướng phát triển sự nghiệp rõ ràng;\r\n•\tĐược hưởng chế độ BHYT, BHXH, BHTN theo quy định hiện hành;\r\n•\tChính sách hỗ trợ ưu đãi cho CBNV mua nhà, thưởng cổ phiếu cho CBNV có nhiều đóng góp cho Công ty;\r\n•\tĐược tham gia các hoạt động tập thể của Công ty: Khám sức khỏe định kỳ hàng năm, Nghỉ mát, Văn nghệ, Teambuilding, CLB tennis, bóng đá, bơi lội, cầu lông, bóng bàn, hoạt động thiện nguyện... .."])</script><script>self.__next_f.push([1,"2a:T823,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Giải pháp Thanh toán Việt Nam (VNPAY) thành lập tháng 03/ 2007 là công ty hàng đầu trong lĩnh vực Thanh toán điện tử tại Việt Nam. Với các ngành nghề kinh doanh cốt lõi thuộc lĩnh vực Tài chính - Ngân hàng, Công nghệ Thông tin - Viễn thông, VNPAY cung cấp dịch vụ tới hơn 40 ngân hàng tại Việt Nam, 5 công ty viễn thông \u0026 hơn 2000 doanh nghiệp thương mại, đưa ra nhiều giải pháp thanh toán đơn giản và tiện lợi như: Mobile Banking, Nạp tiền điện thoại VnTopup, Thanh toán hóa đơn VnPayBill, Ứng dụng VNPAY, Sim đa năng, Cổng thanh toán VnPayment, Website thanh toán hóa đơn và mua hàng trực tuyến Vban.vn...\r\n\r\nVNPAY đã vinh dự nhận nhiều danh hiệu cao quý, cúp, bằng khen, giấy chứng nhận… do các tổ chức kinh tế - xã hội có uy tín trong và ngoài nước trao tặng: “Thương hiệu phát triển bền vững, Sản phẩm chất lượng cao Việt Nam”, “Chứng nhận Doanh nghiệp phát triển bền vững - Sustainable Development Business”, \"Thương hiệu nổi tiếng ASEAN\", \"Top 100 Nhãn hiệu nổi tiếng Việt Nam\", “Sản phẩm, dịch vụ Việt Nam được tin dùng\", bằng khen của UBND TP. Hà Nội.\r\n“Cho cuộc sống đơn giản hơn” là mục tiêu hoạt động và là định hướng kinh doanh của VNPAY nhằm tạo ra những giá trị thiết thực hỗ trợ các hoạt động tiêu dùng của xã hội, từ đó khẳng định mục tiêu mang lại các dịch vụ tiện ích cho khách hàng.\r\n\r\n“Cho cuộc sống đơn giản hơn” còn là mục đích làm việc của Ban lãnh đạo, đội ngũ quản lý và nhân viên của VNPAY nhằm xây dựng một môi trường văn hóa doanh nghiệp chuyên nghiệp, gắn bó và cùng nhau hướng tới mục tiêu chung là xây dựng VNPAY trở thành công ty hàng đầu trong lĩnh vực cung ứng dịch vụ Thanh toán điện tử."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:T983,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Số lượng cần tuyển: 01\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Vị trí làm việc: Phòng Kế toán tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Địa điểm làm việc: 22 Láng Hạ, Phường Láng, Hà Nội\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Thời gian làm việc: 8h00 – 17h30 các ngày thứ 2-thứ 6, nghỉ thứ bảy Chủ nhật\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Mô tả công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tổ chức, quản lý và giám sát toàn bộ hoạt động kế toán tổng hợp của doanh nghiệp.\u003c/p\u003e\u003cp\u003e- Lập báo cáo tài chính định kỳ (tháng, quý, năm) theo đúng chuẩn mực kế toán Việt Nam (VAS) và quốc tế.\u003c/p\u003e\u003cp\u003e- Theo dõi và phân tích tình hình tài chính của doanh nghiệp; đưa ra các đề xuất cải thiện hiệu quả sử dụng nguồn lực tài chính.\u003c/p\u003e\u003cp\u003e- Kiểm tra tính hợp lệ, hợp pháp của các chứng từ kế toán trước khi trình ký duyệt.\u003c/p\u003e\u003cp\u003e- Định kỳ kiểm tra, giám sát việc hạch toán kế toán, kiểm toán nội bộ để đảm bảo tính chính xác, minh bạch và hợp pháp của số liệu\u003c/p\u003e\u003cp\u003e- Làm việc với cơ quan thuế, kiểm toán độc lập, thanh tra, ngân hàng và đối tác tài chính khi có yêu cầu.\u003c/p\u003e\u003cp\u003e- Xây dựng hệ thống kiểm soát nội bộ trong lĩnh vực tài chính - kế toán nhằm giảm thiểu rủi ro sai sót hoặc gian lận.\u003c/p\u003e\u003cp\u003e- Đảm bảo việc kê khai thuế (GTGT, TNDN, TNCN…) được thực hiện đúng hạn và đúng quy định pháp luật.\u003c/p\u003e\u003cp\u003e- Cập nhật kịp thời các thay đổi về chế độ kế toán, thuế hoặc quy định pháp luật liên quan đến lĩnh vực tài chính - kế toán.\u003c/p\u003e\u003cp\u003e- Hỗ trợ Trưởng phòng Kế toán trong việc phân công công việc cho nhân viên trong phòng ban; giám sát tiến độ hoàn thành công việc của từng cá nhân/bộ phận.\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng quy trình làm việc chuẩn hóa cho phòng kế toán nhằm nâng cao hiệu quả vận hành.\u003c/p\u003e\u003cp\u003e- Đào tạo và hướng dẫn nhân viên cấp dưới về chuyên môn nghiệp vụ\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban Lãnh đạo về chiến lược quản lý tài chính dài hạn cũng như các quyết định đầu tư lớn của doanh nghiệp.\u003c/p\u003e\u003cp\u003e- Thực hiện các công việc khác theo sự phân công của cấp trên.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2c:Td2c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Yêu cầu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên chuyên ngành Kế toán, Kiểm toán, Tài chính hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e- Ít nhất 5 năm kinh nghiệm tại vị trí kế toán trưởng. Ưu tiên các ứng viên làm trong các công ty thương mại, tài chính, các tập đoàn đa quốc gia, công ty FDI có quy mô từ 500-1000 nhân sự.\u003c/p\u003e\u003cp\u003e- Có chứng chỉ kế toán trưởng do Bộ tài chính cấp. Có các chứng chỉ quốc tế như ACCA, CMA, CPA Aus là 1 lợi thế.\u003c/p\u003e\u003cp\u003e- Am hiểu sâu về chế độ kế toán, chuẩn mực kế toán Việt Nam (VAS), luật thuế, luật doanh nghiệp và các quy định tài chính liên quan\u003c/p\u003e\u003cp\u003e- Có khả năng sử dụng tiếng Anh trong công việc.\u003c/p\u003e\u003cp\u003e- Có tinh thần trách nhiệm cao.\u003c/p\u003e\u003cp\u003e- Khả năng lãnh đạo, quản lý và điều phối công việc hiệu quả.\u003c/p\u003e\u003cp\u003e- Kỹ năng phân tích tài chính, quản trị rủi ro.\u003c/p\u003e\u003cp\u003e- Thành thạo tin học văn phòng, Excel, phần mềm kế toán Fast.\u003c/p\u003e\u003cp\u003e- Kỹ năng giao )</script><script>self.__next_f.push([1,"Đội ngũ lãnh đạo và cán bộ của VNPAY đã từng làm việc và triển khai nhiều dự án lớn liên quan đến lĩnh vực tài chính – ngân hàng. Đội ngũ nhân viên kỹ thuật được đào tạo chuyên sâu về chuyên môn, nghiệp vụ và các ứng dụng công nghệ trong lĩnh vực thanh toán , tài chính – ngân hàng.\r\nSố lượng nhân sự của công ty gia tăng không ngừng cả về số lượng lẫn chất lượng để đáp ứng nhu cầu ngày càng phát triển, nâng cao chất lượng dịch vụ. Năm 2009, VNPAY có 68 cán bộ nhân viên, năm 2010 tăng lên 106 và hiện tại, số lượng cán bộ nhân viên của công ty là 300 người.\r\nVề thu nhập:\r\n•\tMức lương tương xứng với năng lực của bản thân.\r\n•\tPhụ cấp ăn trưa: 40.000 đồng/ngày.\r\n•\tChế độ thưởng vào các dịp Lễ tết, sự kiện quan trọng tương đương 1 tháng lương (tăng theo thâm niên), thưởng cho các cá nhân có thành tích xuất sắc, thưởng theo các dự án.\r\nCác phúc lợi khác:\r\n•\tĐược tham gia các khóa đào tạo nâng cɑo các kỹ năng liên quɑn trong công việc;\r\n•\tĐược làm việc trong môi trường năng động, chuyên nghiệp với bề dày thành tích hoạt động hơn 8 năm trong lĩnh vực giải pháp thanh toán;\r\n•\tĐược tham gia vào môi trường văn hóa sôi nổi, với nhiều hoạt động hấp dẫn cùng hơn 200 đồng nghiệp trẻ trung, thân thiện;\r\n•\tNhiều cơ hội thăng tiến, định hướng phát triển sự nghiệp rõ ràng;\r\n•\tĐược hưởng chế độ BHYT, BHXH, BHTN theo quy định hiện hành;\r\n•\tChính sách hỗ trợ ưu đãi cho CBNV mua nhà, thưởng cổ phiếu cho CBNV có nhiều đóng góp cho Công ty;\r\n•\tĐược tham gia các hoạt động tập thể của Công ty: Khám sức khỏe định kỳ hàng năm, Nghỉ mát, Văn nghệ, Teambuilding, CLB tennis, bóng đá, bơi lội, cầu lông, bóng bàn, hoạt động thiện nguyện... .."])</script><script>self.__next_f.push([1,"46:{\"companyId\":102274,\"jobImageURLs\":\"$47\",\"jobVideoURLs\":\"$48\",\"companyName\":\"Công Ty CP Giải Pháp Thanh Toán Việt Nam (VNPAY)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/64/11035048.png\",\"companySizeI
