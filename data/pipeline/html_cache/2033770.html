g những Công ty tiên phong hoạt động trong lĩnh vực Thi công, lắp đặt các dự án công nghiệp, giao thông đặc biệt là các dự án năng lượng tái tạo như điện gió, điện mặt trời, vận chuyển hàng hóa siêu trường, siêu trọng, các dự án cầu đường..\r\n\r\nCông ty CP Xây Dựng Nền Móng Long Giang tự hào là đơn vị tiên phong trong việc áp dụng công nghệ khoan cọc nhồi, cọc Barrette và tường vây vào công tác xử lý nền móng cho các công trình cao tầng, tạo dựng nền tảng vững chắc mang đến vị thế dẫn đầu trong lĩnh vực khoan cọc nhồi và tường vây tại Việt Nam"])</script><script>self.__next_f.push([1,"24:Tc81,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKế toán tài sản \u0026 công nợ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Hạch toán công cụ dụng cụ và mở sổ theo dõi tài sản cố định\u003c/p\u003e\u003cp\u003e-\tPhân bổ công cụ dụng cụ, trích khấu hao tài sản cố định định kỳ.\u003c/p\u003e\u003cp\u003e-\tTheo dõi, hạch toán công nợ phải thu, phải trả theo từng khách hàng, nhà cung cấp theo từng dự án\u003c/p\u003e\u003cp\u003e-\tKiểm tra hồ sơ thanh toán , hồ sơ nghiệm thu, khối lượng công trình\u003c/p\u003e\u003cp\u003e-\tLập và xuất hóa đơn cho khách hàng theo từng dự án\u003c/p\u003e\u003cp\u003e-\tĐối chiếu công nợ định kỳ với nhà cung cấp và khách hàng\u003c/p\u003e\u003cp\u003e-\tTheo dõi tình hình công nợ phải thu, đôn dốc thu hồi công nợ\u003c/p\u003e\u003cp\u003e-\tHạch toán công nợ vay vốn ngân hàng, theo dõi và quản lý tài sản thế chấp\u003c/p\u003e\u003cp\u003e-\tĐề xuất lập dự phòng, xử lý công nợ khó đòi.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHạch toán \u0026 kiểm soát số liệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tGhi nhận nghiệp vụ kế toán hàng ngày trên phần mềm Misa\u003c/p\u003e\u003cp\u003e-\tKiểm tra định khoản các nghiệp vụ phát sinh; đối chiếu số liệu chi tiết – tổng hợp.\u003c/p\u003e\u003cp\u003e-\tĐảm bảo số dư tài khoản cuối kỳ chính xác, cân đối.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKiểm kê \u0026 hỗ trợ nội bộ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tPhối hợp thực hiện kiểm kê định kỳ tại văn phòng, kho.\u003c/p\u003e\u003cp\u003e-\tHướng dẫn và hỗ trợ các bộ phận khác trong hoàn thiện hồ sơ thanh toán, quyết toán\u003c/p\u003e\u003cp\u003e-\tCung cấp kịp thời số liệu cho Ban TGĐ và các phòng ban khi được yêu cầu.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCải tiến \u0026 quản lý dữ liệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐề xuất cải tiến quy trình hạch toán, chế độ báo cáo và ứng dụng phần mềm kế toán.\u003c/p\u003e\u003cp\u003e-\tQuản lý, lưu trữ dữ liệu kế toán, hồ sơ tài chính theo quy định của pháp luật và Công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền Lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea. Chế độ tiền lương, thưởng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Mức lương: 14tr – 18tr, cam kết không nợ lương và được xét tăng lương định kỳ;\u003c/p\u003e\u003cp\u003e– Thưởng các ngày Lễ, Tết: 30/4, 01/5, 02/9, 01/01, lương tháng 13;\u003c/p\u003e\u003cp\u003e– Thưởng đột xuất khi hoàn thành xuất sắc nhiệm vụ;, nhân viên tiêu biểu; thưởng thâm niên,...\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb. Chế độ phúc lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Được tham gia đầy đủ các chế độ BHXH, BHYT, BHTN;\u003c/p\u003e\u003cp\u003e– Được thăm hỏi ốm đau, thai sản; tặng quà Sinh nhật, 8/3, 20/10, Trung Thu cho con em CBNV;\u003c/p\u003e\u003cp\u003e– Ngoài ra trong quá trình làm việc còn được tham gia các hoạt động ngoại khóa như văn nghệ, thể thao, hội thi tay nghề,...\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ec. Chính sách đào tạo và phát triển\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Được đào tạo các kiến thức, lĩnh vực chuyên môn, văn hoá doanh nghiệp để phát triển theo định hướng nghề nghiệp của Tập đoàn;\u003c/p\u003e\u003cp\u003e– Được Công ty hỗ trợ tổ chức thi các chứng chỉ liên quan đến ngành nghề nhằm phục vụ tốt công việc chuyên môn tại đơn vị Công tác.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T949,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.\tTrình độ học vấn\u003c/strong\u003e: Tốt nghiệp Đại học chuyên ngành kế toán doanh nghiệp, kiểm toán, .… và các chuyên ngành tương đương.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tTrình độ ngoại ngữ: \u003c/strong\u003eKhông yêu cầu\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tTrình độ tin học:\u003c/strong\u003e Sử dụng máy vi tính thành thạo (phần mềm MS Office, phầm mềm kế toán misa, biết về phần mềm Bravo là 1 lợi thế)..\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tKỹ năng, kiến thức: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tự tổ chức, sắp xếp và xây dựng kế hoạch để thực hiện nhiệm vụ được phân công .\u003c/p\u003e\u003cp\u003e- Biết tổng hợp và phân tích báo cáo. Thi hành nhiệm vụ chính xác và đúng qui định.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tKinh nghiệm:\u003c/strong\u003e Có năng lực nghiệp vụ kế toán, có khả năng tổng hợp, nắm vững chế độ kế toán.\u003c/p\u003e\u003cp\u003eCó ít nhất 3 năm kinh nghiệm tại vị trí tương đương, ưu tiên các ứng viên đã có kinh nghiệm làm việc trong lĩnh vực xây dựng, lắp đặt, thương mại dịch vụ xây dựng, thiết bị xây dựng, sửa chữa bảo dưỡng...\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\tGiới tính:\u003c/strong\u003e Nữ\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7.\tKhác: \u003c/strong\u003eChăm chỉ, tỉ mỉ, cẩn thận, có trách nhiệm và chịu được áp lực trong công việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian làm việc: \u003c/strong\u003etừ thứ 2 đến hết sáng thứ 7 hàng tuần.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Quyền lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Thu nhập: 14-18TR (theo năng lực)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thưởng các ngày Lễ, Tết: 30/4, 01/5, 02/9, 01/01, lương t
