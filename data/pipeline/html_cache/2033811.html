t động sản, khu công nghiệp, khu đô thị cũng là một lĩnh vực mũi nhọn của Tập đoàn.\r\nDoanh thu hàng năm của Tập đoàn Hòa Phát đạt khoảng 900 triệu USD và phấn đấu năm 2014 đạt mức 1,2 tỷ đô la Mỹ.\r\nTầm nhìn\r\nTrở thành Tập đoàn sản xuất công nghiệp hàng đầu Việt Nam hoạt động đa ngành với thế mạnh là sản xuất thép, các ngành công nghiệp truyền thống và bất động sản.\r\nSứ mệnh\r\nHòa cùng sự phát triển của xã hội, sản phẩm luôn hướng tới lợi ích khách hàng\r\nHợp tác bền vững, đối tác tin cậy, mang lại giá trị lâu dài cho các cổ đông\r\nPhát huy tài năng, trí tuệ và đem đến cuộc sống tốt đẹp cho các thành viên công ty\r\nTriển vọng mở rộng đầu tư để góp phần to lớn vào sự hưng thịnh của Việt Nam"])</script><script>self.__next_f.push([1,"24:T6a3,\u003cp\u003eChịu trách nhiệm tham mưu và tổ chức triển khai thực hiện công tác quản trị nhân sự toàn Tập đoàn theo định hướng chiến lược của Ban Lãnh đạo:\u003c/p\u003e\u003cp\u003e-\tTham mưu hoàn thiện hệ thống quản trị nhân sự phù hợp với chiến lược phát triển của Tập đoàn; rà soát, cập nhật, điều chỉnh các cơ chế, chính sách, quy định nhân sự nhằm đảm bảo tính đồng bộ, hiệu quả và phù hợp thực tiễn vận hành.\u003c/p\u003e\u003cp\u003e-\tTổ chức triển khai các dự án chuẩn hóa và nâng cao hiệu quả quản trị nhân sự theo định hướng đã được Ban Lãnh đạo phê duyệt; theo dõi tiến độ, đánh giá kết quả thực hiện và đề xuất các giải pháp điều chỉnh, cải tiến khi cần thiết.\u003c/p\u003e\u003cp\u003e-\tTriển khai công tác lập và quản trị ngân sách nhân sự hằng năm; kiểm soát quỹ lương, chi phí nhân sự và cơ cấu lao động tại các đơn vị; phân tích, đánh giá hiệu quả sử dụng lao động làm cơ sở tham mưu điều chỉnh phù hợp.\u003c/p\u003e\u003cp\u003e-\tTriển khai hoạt động đào tạo và phát triển nguồn nhân lực, đảm bảo kế hoạch đào tạo được triển khai đúng định hướng; đánh giá hiệu quả sau đào tạo và đề xuất các chương trình phát triển năng lực đáp ứng yêu cầu từng giai đoạn.\u003c/p\u003e\u003cp\u003e-\tThực hiện các nhiệm vụ khác
