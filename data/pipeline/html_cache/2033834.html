cp\u003e• Hỗ trợ xây dựng chương trình và tổ chức đào tạo để nâng cao kỹ năng phân tích và hiểu biết về dữ liệu cho nhân sự phân tích dữ liệu tại các đơn vị nghiệp vụ trong Ngân hàng.\u003c/p\u003e\u003cp\u003e• Nhận diện và giải quyết các bài toán khoa học dữ liệu (KHDL) có tiềm năng ứng dụng trong quy trình tác nghiệp để nâng cao hiệu quả ra quyết định dựa trên dữ liệu và phân tích dữ liệu.\u003c/p\u003e\u003cp\u003e• Tìm hiểu quy trình tác nghiệp của các đơn vị, trao đổi và lên ý tưởng về các bài toán có tiềm năng triển khai, đánh giá về mức độ quan trọng và tính khả thi của từng bài toán để đánh giá mức độ ưu tiên và phân bổ nguồn lực triển khai tương ứng.\u003c/p\u003e\u003cp\u003e• Tham gia trực tiếp trong việc triển khai giải quyết các bài toán được đánh giá có tác động và khả thi, bảo đảm quá trình phát triển mô hình tuân thủ đúng theo quy định và quy trình triển khai phát triển dự án khoa học dữ liệu.\u003c/p\u003e\u003cp\u003e• Phối hợp với bộ phận Vận hành mô hình trong quá trình đưa mô hình đã xây dựng lên môi trường vận hành.\u003c/p\u003e\u003cp\u003e• Phối hợp giám sát hiệu năng của các mô hình đã được vận hành trong thực tế để đưa ra quyết định về việc huấn luyện lại mô hình nếu cần thiết.\u003c/p\u003e\u003cp\u003e• Thiết lập ngưỡng cảnh báo và phối hợp giám sát thường xuyên các mô hình PTNC trong quá trình vận hành.\u003c/p\u003e\u003cp\u003e• Phối hợp với đơn vị vận hành mô hình thực hiện hiệu chỉnh, bảo dưỡng mô hình PTNC trong trường hợp hiệu năng thấp hơn ngưỡng cho phép.\u003c/p\u003e\u003cp\u003e• Đề xuất về việc huấn luyện lại mô hình trong trường hợp phát hiện các dấu hiệu data drift, model drift.\u003c/p\u003e\u003cp\u003e• Chịu trách nhiệm đánh giá, kiểm định về mặt kỹ thuật đối với kết quả của các mô hình phân tích nâng cao do các đơn vị khác phát triển. Tiếp nhận các sản phẩm mô hình PTNC, thực hiện kiểm định, đánh giá tính chính xác của các mô hình PTNC do các đơn vị khác phát triển (bao gồm cả các mô hình PTNC do đối tác bên ngoài xây
