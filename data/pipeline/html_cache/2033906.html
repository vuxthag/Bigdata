\nNăm 2019: Tòa nhà DOJI Tower - Trụ sở chính của Tập đoàn chính thức được khai trương, trở thành Trung tâm Vàng bạc Đá quý và Trang sức lớn nhất cả nước với lối kiến trúc đẳng cấp, độc đáo tại số 5 Lê Duẩn, quận Ba Đình, Hà Nội.  \r\nNăm 2020: Tập đoàn Vàng bạc Đá quý DOJI chính thức tiếp quản Công ty Thế giới Kim Cương – Top 3 doanh nghiệp Bán lẻ Trang sức lớn nhất Việt Nam-  \r\nNăm 2021: Khai trương DOJI Smart Hà Nội, DOJI Smart Đà Nẵng. Đây là Mô hình mua sắm trang sức thông minh lần đầu tiên xuất hiện tại Việt Nam.  \r\nNăm 2022: DOJI ra mắt DOJI Tower tại số 81 - 85 Hàm Nghi, Quận 1, TP HCM. \r\n\r\nTính đến nay, Tập đoàn DOJI có 15 Công ty thành viên hoạt động theo mô hình Công ty Mẹ - Con, 5 Công ty liên kết góp vốn và hơn 61 Chi nhánh, gần 200 trung tâm, cửa hàng trải dài trên toàn quốc cùng với hơn 400 đại lý, điểm bán…, tạo nên hệ thống phân phối sản phẩm phủ khắp hầu hết các vùng miền của Việt Nam. Tổng vốn điều lệ của Tập đoàn là 6.000 tỉ đồng với tổng tài sản là 15.000 tỉ đồng và tổng số lao động là gần 3.000 cán bộ nhân viên (CBNV). Sự vươn lên mạnh mẽ đã đưa DOJI trở thành Doanh nghiệp được Tổ chức đánh giá xếp hạng VNR 500 xếp hạng là Top 5 Doanh nghiệp tư nhân lớn nhất Việt Nam trong hơn một thập kỷ (2010 đến 2023). Ngoài ra, trong bảng tổng sắp các doanh nghiệp thuộc mọi thành phần kinh tế, DOJI thăng hạng liên tục và hiện nay đứng thứ 14 trong số 500 Doanh nghiệp lớn nhất Việt Nam. Cũng trong 14 năm liên tiếp (2010 đến 2023), Tập đoàn được công nhận là Thương hiệu Quốc Gia Việt Nam. Tập đoàn đã vinh dự đón nhận Huân chương Lao động Hạng Nhất của Chủ tịch nước CHXHCN Việt Nam trong dịp kỷ niệm 25 năm thành lập (2019), Huân chương Lao động Hạng Nhì trong dịp kỷ niệm 20 năm thành lập (2014) và Huân chương Lao động Hạng Ba (2011).\r\n\r\n* SỨ MỆNH của chúng tôi: Hướng tới con người và vì con người bằng những sản phẩm và dịch vụ chất lượng hàng đầu trong sản xuất kinh doanh và quản trị doanh nghiệp, vì sự phồn vinh xã hội, giá trị cá nhân và tinh hoa cuộc sống.\r\n\r\n* TẦM NHÌN, MỤC TIÊU CHIẾN LƯỢC: Không ngừng mở rộng sản xuất kinh doanh và phát triển bền vững để trở thành một Tập đoàn hàng đầu Việt Nam và khu vực trong các lĩnh vực Vàng bạc, Đá quý, Trang sức cũng như các lĩnh vực Bất động sản, Đầu tư, Thương mại và Dịch vụ.\r\n\r\n* GIÁ TRỊ VĂN HÓA CỐT LÕI: Liêm Chính - Sáng Tạo - Hợp Lực - Trí Thức - Nhân Ái\r\n\r\n* GIÁ TRỊ QUẢN LÝ CỐT LÕI: Lãnh đạo tập trung và phân quyền - Kỉ cương tổ chức - Công bằng và Nhân văn - Quản trị tiên tiến\r\n \r\nVới tầm nhìn chiến lược, quan điểm phát triển bền vững, tiềm lực hùng mạnh, Tập đoàn DOJI tiếp tục khẳng định đẳng cấp Thương hiệu quốc gia Việt Nam, sẵn sàng tâm thế hội nhập và vươn xa trong khu vực cũng như trên trường quốc tế trong tương lai."])</script><script>self.__next_f.push([1,"24:T578,\u003cp\u003e- Triển khai công tác tuyển dụng theo kế hoạch đã được phê duyệt (theo vị trí, số lượng, timeline cụ thể).\u003c/p\u003e\u003cp\u003e- Chủ động tìm kiếm và tiếp cận ứng viên qua các kênh tuyển dụng (jobsite, mạng xã hội, data nội bộ, referral…); tập trung sourcing các vị trí khó theo phân công.\u003c/p\u003e\u003cp\u003e- Soạn thảo, đăng tuyển và tối ưu nội dung tuyển dụng; quản lý hiệu quả các kênh đăng tin nhằm đảm bảo hiệu suất tuyển dụng.\u003c/p\u003e\u003cp\u003e- Sàng lọc hồ sơ, liên hệ và phỏng vấn sơ loại; đánh giá nhanh mức độ phù hợp của ứng viên với yêu cầu vị trí.\u003c/p\u003e\u003cp\u003e- Điều phối lịch phỏng vấn với các bên liên quan; theo sát kết quả và cập nhật trạng thái ứng viên kịp thời.\u003c/p\u003e\u003cp\u003e- Thực hiện trao đổi offer, theo dõi và thúc đẩy ứng viên nhận việc đúng tiến độ.\u003c/p\u003e\u003cp\u003e- Cập nhật, quản lý dữ liệu ứng viên; xây dựng nguồn ứng viên dự phòng cho các vị trí thường xuyên tuyển dụng.\u003c/p\u003e\u003cp\u003e- Báo cáo kết quả tuyển dụng hàng tuần (tiến độ, tỷ lệ đạt, khó khăn…); đề xuất giải pháp cải thiện hiệu quả tuyển dụng.\u003c/p\u003e\u003cp\u003e- Thực hiện các công việc khác liên quan đế /74969.jpg\",\"https://images.vietnamworks.com/company_profile/74970.jpg\",\"https://images.vietnamworks.com/company_profile/91705.jpg\"]\n45:T15aa,"])</script><script>self.__next_f.push([1,"TẬP ĐOÀN VÀNG BẠC ĐÁ QUÝ DOJI, với tiền thân là Công ty Phát triển Công nghệ và Thương mại TTD được thành lập năm 1994. Vào thời điểm những năm 90 của thế kỉ 20, Công ty TTD chính là doanh nghiệp tiên phong trong hoạt động chuyên sâu về khai thác đá quý, chế tác cắt mài và xuất khẩu đá quý ra thị trường quốc tế, vốn là một lĩnh vực vô cùng mới mẻ tại Việt Nam. TTD trở thành Công ty đầu tiên đã đưa ra thị trường quốc tế sản phẩm đá Ruby sao Việt Nam với thương hiệu Việt Nam Star Ruby VSR. Kể từ đó, Công ty được mệnh danh là ông hoàng Ruby sao của thế giới, làm cho Việt Nam được khắc họa như một điểm sáng trên bản đồ Đá quý quốc tế.\r\n\r\nLiên tiếp từ năm 2009 đến 2025, Tập đoàn DOJI không ngừng phát triển vượt trội trong những lĩnh vực bản lề về Vàng bạc Đá quý (trải dài từ các hoạt động Khai thác Mỏ, Chế tác cắt mài Đá quý, Sản xuất hàng Trang sức; Kinh doanh Vàng miếng; Xuất nhập khẩu và mua bán vàng trang sức, mỹ nghệ; Mở rộng hệ thống chuỗi các Trung tâm Vàng bạc Trang sức trên khắp cả nước và mở rộng đầu tư Bất động sản, các khu dự án tiềm năng, đầu tư trong lĩnh vực du lịch, lấn sân sang lĩnh vực Tài chính Ngân hàng và tái cơ cấu thành công Ngân hàng TMCP TPBank.\r\n\r\nNăm 2007: Chính thức đổi tên thành Công Ty Cổ Phần Vàng Bạc Đá Quý và Đầu Tư Thương Mại Doji.  \r\nNăm 2009: Tái cơ cấu và chính thức trở thành Công ty Cổ phần Tập Đoàn Vàng Bạc Đá Quý DOJI  \r\nNăm 2012: DOJI tái cơ cấu thành công Ngân hàng TMCP Tiên Phong.  \r\nNăm 2014: DOJI mở rộng lĩnh vực kinh doanh và thành lập Công ty TNHH Đầu tư Bất động sản DOJILAND.  \r\nNăm 2019: Tòa nhà DOJI Tower - Trụ sở chính của Tập đoàn chính thức được khai trương, trở thành Trung tâm Vàng bạc Đá quý và Trang sức lớn nhất cả nước với lối kiến trúc đẳng cấp, độc đáo tại số 5 Lê Duẩn, quận Ba Đình, Hà Nội.  \r\nNăm 2020: Tập đoàn Vàng bạc Đá quý DOJI chính thức tiếp quản Công ty Thế giới Kim Cương – Top 3 doanh nghiệp Bán lẻ Trang sức lớn nhất Việt Nam-  \r\nNăm 2021: Khai trương DOJI Smart Hà Nội, DOJI Smart Đà Nẵng. Đây là Mô hình mua sắm trang sức thông minh lần đầu tiên xuất hiện tại Việt Nam.  \r\nNăm 2022: DOJI ra mắt DOJI Tower tại số 81 - 85 Hàm Nghi, Quận 1, TP HCM. \r\n\r\nTính đến nay, Tập đoàn DOJI có 15 Công ty thành viên hoạt động theo mô hình Công ty Mẹ - Con, 5 Công ty liên kết góp vốn và hơn 61 Chi nhánh, gần 200 trung tâm, cửa hàng trải dài trên toàn quốc cùng với hơn 400 đại lý, điểm bán…, tạo nên hệ thống phân phối sản phẩm phủ khắp hầu hết các vùng miền của Việt Nam. Tổng vốn điều lệ của Tập đoàn là 6.000 tỉ đồng với tổng tài sản là 15.000 tỉ đồng và tổng số lao động là gần 3.000 cán bộ nhân viên (CBNV). Sự vươn lên mạnh mẽ đã đưa DOJI trở thành Doanh nghiệp được Tổ chức đánh giá xếp hạng VNR 500 xếp hạng là Top 5 Doanh nghiệp tư nhân lớn nhất Việt Nam trong hơn một thập kỷ (2010 đến 2023). Ngoài ra, trong bảng tổng sắp các doanh nghiệp thuộc mọi thành phần kinh tế, DOJI thăng hạng liên tục và hiện nay đứng thứ 14 trong số 500 Doanh nghiệp lớn nhất Việt Nam. Cũng trong 14 năm liên tiếp (2010 đến 2023), Tập đoàn được công nhận là Thương hiệu Quốc Gia Việt Nam. Tập đoàn đã vinh dự đón nhận Huân chương Lao động Hạng Nhất của Chủ tịch nước CHXHCN Việt Nam trong dịp kỷ niệm 25 năm thành lập (2019), Huân chương Lao động Hạng Nhì trong dịp kỷ niệm 20 năm thành lập (2014) và Huân chương Lao động Hạng Ba (2011).\r\n\r\n* SỨ MỆNH của chúng tôi: Hướng tới con người và vì con người bằng những sản phẩm và dịch vụ chất lượng hàng đầu trong sản xuất kinh doanh và quản trị doanh nghiệp, vì sự phồn vinh xã hội, giá trị cá nhân và tinh hoa cuộc sống.\r\n\r\n* TẦM NHÌN, MỤC TIÊU CHIẾN LƯỢC: Không ngừng mở rộng sản xuất kinh doanh và phát triển bền vững để trở thành một Tập đoàn hàng đầu Việt Nam và khu vực trong các lĩnh vực Vàng bạc, Đá quý, Trang sức cũng như các lĩnh vực Bất động
