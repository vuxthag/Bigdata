d programs.\u003c/p\u003e\u003cp\u003e\t* Carry out joint and solo visits to new and existing key customers providing technical proposals/assistance ( lub-chart, technical service package…) to generate sales opportunities and secures product upgrade opportunities.\u003c/p\u003e\u003cp\u003e\t* Providing on field training of product application knowledge to ASM/KAMDSRs/DLEs and reviews ASM/KAMDSRs/DLEs customer interaction regularly to ensure quality of offering.\u003c/p\u003e\u003cp\u003e- Management of technical standards and materials:\u003c/p\u003e\u003cp\u003e\t* Establishment, translation and revision of technical standards materials (Technical data sheet, raw material specification…) and provide needed technical assistance on important commercial projects.\u003c/p\u003e\u003cp\u003e\t* Documents results of technical programs/recommendations to quantify savings and/or cost avoidance for Effective Technical Services customers and/or provide success stories.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHSSE TASKS\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Participate in fire drills and be familiar with evacuation routes and assembly points.\u003c/p\u003e\u003cp\u003e- Ensure proper housekeeping by keeping walkways and emergency exits clear of obstructions.\u003c/p\u003e\u003cp\u003e- Report and document any workplace hazards, near-misses, or incidents to the appropriate personnel or HSE coordinator.\u003c/p\u003e\u003cp\u003e- Attend basic first aid training if requested by the Company.\u003c/p\u003e\u003cp\u003e- Safely store and use electrical equipment and promptly report any faulty or damaged devices.\u003c/p\u003e\u003cp\u003e- Stay informed about emergency contacts and procedures for medical or safety incidents within the office.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eFulfill other tasks and/or assignments requested by the line managers whom the employee d
