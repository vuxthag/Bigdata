c/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T8fa,"])</script><script>self.__next_f.push([1,"\u003cp\u003eII. NHIỆM VỤ CHI TIẾT\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Triển khai công tác mua hàng và cung ứng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện mua sắm vật tư, thiết bị âm thanh - hình ảnh - điện tử từ các nhà cung cấp nội địa.\u003c/p\u003e\u003cp\u003e•\tPhối hợp triển khai nghiệp vụ mua hàng nhập khẩu từ các hãng sản xuất/đại lý nước ngoài (Crestron, Samsung, LG, Yamaha, AVer...).\u003c/p\u003e\u003cp\u003e•\tTheo dõi chi tiết tình trạng đơn hàng (PO), tiến độ giao nhận và tỉ lệ đúng hạn của nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tKiểm soát chất lượng hàng hóa đầu vào, phối hợp xử lý các trường hợp hàng lỗi, hỏng hoặc không đúng quy cách.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản trị chứng từ và Hồ sơ chất lượng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm rà soát, xử lý các hợp đồng mua bán, thông báo và công văn với nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tChuẩn bị và quản lý bộ hồ sơ chất lượng hàng hóa (CO, CQ, chứng từ kỹ thuật...) phục vụ công tác nghiệm thu và thanh quyết toán dự án.\u003c/p\u003e\u003cp\u003e•\tPhân loại, lưu trữ chứng từ mua hàng khoa học, đảm bảo tính minh bạch và dễ tra cứu.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Phân tích dữ liệu và Tối ưu hóa chi phí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổng hợp báo giá, so sánh giá giữa các nhà cung cấp theo lĩnh vực và ngành hàng định kỳ.\u003c/p\u003e\u003cp\u003e•\tLập Dashboard theo dõi chi phí, lịch sử giá và phân tích xu hướng biến động giá thị trường.\u003c/p\u003e\u003cp\u003e•\tĐánh giá KPI nhà cung cấp dựa trên: Giá thành - Tiến độ - Dịch vụ hậu mãi - Rủi ro nguồn cung.\u003c/p\u003e\u003cp\u003e•\tTham mưu cho Ban Giám đốc các giải pháp tối ưu chi phí: Gom đơn hàng, đàm phán chiết khấu (Rebate), chuẩn hóa định mức và đa dạng hóa nguồn cung.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản lý nội bộ và Điều phối\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp với bộ phận Kế toán và Kho để đồng bộ dữ liệu tồn kho, công nợ nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tKiểm soát việc tuân thủ quy trình mua hàng và tiêu chuẩn hồ sơ trong team.\u003c/p\u003e\u003cp\u003e•\tTham gia đào tạo nội bộ và hướng dẫn nghiệp vụ cho các thành viên hỗ trợ.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T6c7,\u003cp\u003eIII. TIÊU CHUẨN TUYỂN DỤNG\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTrình độ: Tốt nghiệp Đại học/Cao đẳng chuyên ngành Kinh tế, Quản trị kinh doanh, Ngoại thương hoặc tương đương.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKinh nghiệm: 03 – 08 năm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKỹ năng chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐàm phán và thuyết phục nhà cung cấp chuyên nghiệp.\u003c/p\u003e\u003cp\u003e-\tKỹ năng phân tích số liệu và lập báo cáo quản trị.\u003c/p\u003e\u003cp\u003e-\tSử dụng thành thạo Microsoft Office (Đặc biệt là Excel nâng cao).\u003c/p\u003e\u003cp\u003e-\tTiếng Anh: Đọc hiểu tài liệu kỹ thuật và chứng từ xuất nhập khẩu cơ bản.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhẩm chất: Trung thực, quyết đoán, tư duy tối ưu và khả năng chịu áp lực cao.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003eIV. QUYỀN LỢI VÀ CHẾ ĐỘ ĐÃI NGỘ\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tMức thu nhập: Lương cứng cạnh tranh (theo năng lực) + Thưởng hiệu quả mua hàng + Thưởng tháng 13.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThời gian làm việc: 05 ngày/tuần (Nghỉ Thứ 7 \u0026 Chủ nhật) - Đây là chính sách ưu đãi đặc biệt tại Hoàng Minh.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCơ hội phát triển: Lộ trình thăng tiến rõ ràng lên vị trí Quản lý cung ứng; được đào tạo bởi các chuyên gia hàng đầu trong ngành AV.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhúc lợi khác: * Xét tăng lương định kỳ dựa trên hiệu quả thực tế.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tCung cấp trang thiết bị làm việc (Laptop).\u003c/p\u003e\u003cp\u003e-\tDu lịch, nghỉ dưỡng hàng năm trong và ngoài nước.\u003c/p\u003e\u003cp\u003e-\tHưởng đầy đủ chế độ BHXH, BHYT và các phúc lợi riêng của Công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e27:T8fa,"])</script><script>self.__next_f.push([1,"\u003cp\u003eII. NHIỆM VỤ CHI TIẾT\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Triển khai công tác mua hàng và cung ứng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện mua sắm vật tư, thiết bị âm thanh - hình ảnh - điện tử từ các nhà cung cấp nội địa.\u003c/p\u003e\u003cp\u003e•\tPhối hợp triển khai nghiệp vụ mua hàng nhập khẩu từ các hãng sản xuất/đại lý nước ngoài (Crestron, Samsung, LG, Yamaha, AVer...).\u003c/p\u003e\u003cp\u003e•\tTheo dõi chi tiết tình trạng đơn hàng (PO), tiến độ giao nhận và tỉ lệ đúng hạn của nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tKiểm soát chất lượng hàng hóa đầu vào, phối hợp xử lý các trường hợp hàng lỗi, hỏng hoặc không đúng quy cách.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản trị chứng
