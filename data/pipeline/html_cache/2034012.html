 lược, giúp biến nguồn nhân lực thành động lực phát triển và lợi thế cạnh tranh bền vững cho VMG.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. NHIỆM VỤ CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e2.1. Chiến lược và quản trị nguồn nhân lực\u003c/p\u003e\u003cp\u003e- Xây dựng và triển khai chiến lược nhân sự dài hạn phù hợp với chiến lược phát triển kinh doanh, nghiên cứu và phát triển, và mở rộng quốc tế của VMG.\u003c/p\u003e\u003cp\u003e- Thiết kế hệ thống đánh giá và đãi ngộ theo vị trí công việc, hiệu quả công việc, và tiềm năng phát triển của nhân viên.\u003c/p\u003e\u003cp\u003e- Thiết lập hệ thống đo lường, theo dõi và công bố các chỉ số gắn kết, tỷ lệ nghỉ việc, năng suất và mức độ hài lòng của nhân sự.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.2. Tuyển dụng và phát triển đội ngũ\u003c/p\u003e\u003cp\u003e- Lãnh đạo công tác tuyển chọn, không chỉ trong nước mà còn mở rộng ra từ các tập đoàn đa quốc gia, các công ty có vốn đầu tư nước ngoài, và các trường đại học quốc tế.\u003c/p\u003e\u003cp\u003e- Thu hút nhân sự chất lượng cao trong các lĩnh vực giáo dục, công nghệ giáo dục, dịch vụ khách hàng và nghiên cứu phát triển.\u003c/p\u003e\u003cp\u003e- Xây dựng lộ trình nghề nghiệp cho giáo viên, nhân viên và quản lý nhằm giữ chân nhân sự chủ chốt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.3. Đào tạo và phát triển năng lực\u003c/p\u003e\u003cp\u003e- Thiết kế và triển khai chương trình đào tạo dựa trên nguyên tắc 70-20-10: \u003c/p\u003e\u003cp\u003e+ 70% học từ trải nghiệm công việc, 20% từ huấn luyện và cố vấn, 10% từ các khóa đào tạo chính quy.\u003c/p\u003e\u003cp\u003e- Thành lập Học viện Lãnh đạo nội bộ nhằm chuẩn bị cho các vị trí kế nhiệm cấp trung và cấp cao.\u003c/p\u003e\u003cp\u003e- Hợp tác với các trường đại học và tổ chức quốc tế để nâng cao trình độ nhân sự.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.4. Gắn kết đội ngũ và văn hóa tổ chức\u003c/p\u003e\u003cp\u003e- Xây dựng văn hóa khai phóng - liên ngành - đổi mới - minh bạch - người học làm trung tâm.\u003c/p\u003e\u003cp\u003e- Tạo dựng môi trường làm việc an toàn, khuyến khích phản biện tích cực, sáng tạo và chia sẻ.\u003c/p\u003e\u003cp\u003e- Tổ chức các sự kiện nội bộ như Ngày Sáng tạo, diễn đàn nhân sự, khảo sát mức độ gắn kết, và chương trình tri ân nhân viên.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.5. Nhân sự cho R\u0026D và chuyển đổi số\u003c/p\u003e\u003cp\u003e- Tuyển chọn và quản lý đội ngũ nhân sự chuyên môn cho Trung tâm Nghiên cứu và Phát triển, bao gồm các chuyên gia học thuật, chuyên gia công nghệ giáo dục, và đối tác quốc tế.\u003c/p\u003e\u003cp\u003e- Ứng dụng phân tích dữ liệu nhân sự (Human Resources Analytics) để dự báo nhu cầu nhân lực và hỗ trợ ra quyết định chiến lược.\u003c/p\u003e\u003cp\u003e- Thúc đẩy triển khai nền tảng quản lý nhân sự điện tử (Human Resources Digital Platform) và bảng điều khiển dữ liệu nhân sự theo thời gian thực.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2.6. Tuân thủ và quản trị rủi ro nhân sự\u003c/p\u003e\u003cp\u003e- Đảm bảo mọi hoạt động nhân sự tuân thủ Bộ luật Lao động Việt Nam, các quy định về bảo hiểm xã hội, an toàn lao động, cũng như thông lệ quản trị nhân sự quốc tế.\u003c/p\u003e\u003cp\u003e- Xây dựng hệ thống cảnh báo và xử lý rủi ro nhân sự trong hợp tác quốc tế, du học, và hoạt động công nghệ giáo dục.\u003c/p\u003e\u003cp\u003e- Thiết lập chỉ số an toàn tâm lý và văn hóa tuân thủ để bảo vệ quyền lợi và sự gắn kết của nhân viên.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T5d7,1. Thông tin tổng quan về Công ty:\r\n\r\nĐược thành lập từ năm 2003, Tập Đoàn Giáo Dục Việt Mỹ hiện đang quản lý và sở hữu Hệ thống “Đào tạo Anh Ngữ Việt Mỹ” tại Đồng Nai, Hồ Chí Minh và Thủ Đức. Gần 20 năm hoạt động chuyên về đào tạo tiếng Anh tại thị trường
