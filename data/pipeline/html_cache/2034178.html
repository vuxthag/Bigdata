ontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tfa6,"])</script><script>self.__next_f.push([1,"GIỚI THIỆU VỀ CHÚNG TÔI\r\n- Quá Trình Hình Thành \u0026 Phát Triển\r\n- Năm 2008, Công ty TNHH Đông Dương Sài Gòn (Indochina SaiGon) chính thức khánh thành nhà máy tại Khu công nghiệp Long Hậu, xã Cần Giuộc, tỉnh Tây Ninh, Việt Nam.\r\n- Ngay từ những ngày đầu, công ty tập trung sản xuất các sản phẩm phục vụ bảo quản thực phẩm, chứa đựng thức ăn, dụng cụ nấu nướng và nhiều ứng dụng trong chế biến thực phẩm.\r\n- Với định hướng phát triển bền vững, Đông Dương Sài Gòn nhanh chóng khẳng định vị thế là đơn vị sản xuất và cung ứng uy tín trên thị trường Việt Nam.\r\n- Khách hàng có thể mua trực tiếp từ nhà máy với danh mục sản phẩm lớn, chất lượng cao, giá thành cạnh tranh và dịch vụ uy tín.\r\n- Công ty tự hào là đối tác của nhiều thương hiệu toàn cầu và đã được ghi nhận bằng các giải thưởng uy tín, trong đó có danh hiệu Best Performance.\r\n\r\n18 Năm Phát Triển\r\n- Trong giai đoạn từ năm 2008 đến 2026, công ty không ngừng đầu tư hệ thống dây chuyền máy móc hiện đại cùng công nghệ tiên tiến hàng đầu châu Á.\r\n- Nguyên liệu sử dụng được lựa chọn kỹ lưỡng từ các nhà cung cấp uy tín trên thế giới, ưu tiên vật liệu xanh, thân thiện với môi trường.\r\n- Toàn bộ quy trình sản xuất được kiểm soát nghiêm ngặt, đáp ứng các tiêu chuẩn quốc tế như FDA, tiêu chuẩn Nhật Bản và tiêu chuẩn vệ sinh an toàn thực phẩm của Việt Nam.\r\n- Năm 2019, trước xu hướng tiêu dùng xanh, công ty tiếp tục đầu tư chiều sâu, mở rộng các dòng sản phẩm sử dụng nguyên liệu từ thiên nhiên hoặc có khả năng phân huỷ sinh học, góp phần giảm thiểu tác động đến môi trường.\r\n- Đến năm 2026, hệ thống sản xuất của Đông Dương Sài Gòn bao gồm nhiều nhà máy và cơ sở gia công tại Tây Ninh và TP. Hồ Chí Minh, phục vụ cho các thương hiệu lớn trong và ngoài nước.\r\n\r\nSỨ MỆNH – TẦM NHÌN – GIÁ TRỊ\r\nSỨ MỆNH:\r\nKhông ngừng nghiên cứu, sáng tạo và phát triển các sản phẩm có tính ứng dụng cao, đáp ứng nhu cầu ngày càng đa dạng của người tiêu dùng.\r\nLiên tục cập nhật công nghệ, cải tiến quy trình sản xuất nhằm tối ưu chi phí và mang lại giá trị tốt nhất cho khách hàng.\r\nGóp phần bảo vệ môi trường, giảm thiểu tác động từ các sản phẩm hoá dầu và hướng tới phát triển bền vững.\r\n\r\nTẦM NHÌN:\r\nTrở thành doanh nghiệp hàng đầu trong lĩnh vực sản xuất sản phẩm bảo quản thực phẩm và bao bì xanh, phục vụ thị trường trong nước và quốc tế.\r\n\r\nGIÁ TRỊ CỐT LÕI:\r\n- Hợp tác – Trách nhiệm – Công bằng – Xã hội – Khách hàng\r\n- Mỗi sản phẩm được tạo ra đều hướng đến sức khỏe người tiêu dùng và một môi trường sống bền vững hơn.\r\n\r\nI.TRỤ SỞ \u0026 HỆ THỐNG HOẠT ĐỘNG\r\n1/Trụ sở chính: Lô L.05, Đường số 1, Khu công nghiệp Long Hậu, Xã Cần Giuộc, Tỉnh Tây Ninh, Việt Nam\r\n2/ Văn phòng đại diện\r\n- Số 44, Nguyễn Thị Minh Khai, Phường Sài Gòn, TP. Hồ Chí Minh, Việt Nam\r\n- Chi nhánh Hà Nội\r\nTầng 3, Stellar Garden Building, 35 Lê Văn Thiêm, Phường Thanh Xuân, Thành phố Hà Nội, Việt Nam\r\n\r\nII.Hệ thống cửa hàng\r\n1/ Moriitalia Outlet Nguyễn Thị Minh Khai:\r\nSố 44, Nguyễn Thị Minh Khai, Phường Sài Gòn, TP. Hồ Chí Minh\r\n2/ Moriitalia – Lotte Center Hanoi:\r\nGian hàng Moriitalia, Tầng 5, Tòa nhà Lotte Center Hanoi\r\n54 Liễu Giai, Phường Giảng Võ, Thành phố Hà Nội, Việt Nam."])</script><script>self.__next_f.push([1,"24:Ta34,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTrình độ và kinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Cao đẳng
