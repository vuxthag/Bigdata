àng đầu thế giới như Abbott, Immucor và là đối tác của các hãng Thermo Fisher, MP…, với vai trò phân phối vật tư, hóa chất, thiết bị y tế và giải pháp sinh học cho các phòng thí nghiệm lớn nhỏ, bệnh viện trung ương, bệnh viện tư nhân, trường đại học, viện nghiên cứu và cơ quan chính phủ.\r\n\r\nBio-med luôn luôn duy trì thái độ làm việc chuyên nghiệp, kỹ thuật chuyên môn tốt, quy trình làm việc khép kín và ưu tiên lợi ích của khách hàng - đó là cơ sở nền tảng giúp chúng tôi giành được sự tin tưởng tuyệt đối từ các đối tác lớn trong nước và quốc tế. \r\n\r\nBio-Med Joint Stock Company (Bio-Med) was established in 2011 in Hanoi-Vietnam, welcoming the 4th industrial revolution with one of the three main pillars: Biotechnology.\r\n \r\nAfter a decade of continuous development, Bio-Med has risen to become one of the leading companies in the fields of supporting Biomedical Science, Clinical Diagnostics and Biotechnology in Vietnam. We are the exclusive representative of the world's leading pharmaceutical and medical equipment corporations such as Abbott and Immucor with the role of distributing supplies, chemicals, Medical devices and biological solutions to Vietnam’s laboratories, central hospitals, private hospitals, universities, research institutes and government agencies. By 2022, we are having a total of more than 100 customers all over the country."])</script><script>self.__next_f.push([1,"41:{\"companyId\":367502,\"jobImageURLs\":\"$42\",\"jobVideoURLs\":null,\"companyName\":\"Công Ty Cổ Phần Bio-Med (Bio-Med., JSC)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/05/11408705.png\",\"companySizeId\":\"\",\"companyProfile\":\"$43\",\"contactName\":\"\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"236 Lê Thanh Nghị, P. Đồng Tâm, Q. Hai Bà Trưng, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfile
