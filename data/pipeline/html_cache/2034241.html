ds-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n24:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tcf3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eAbout Pandora\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePandora is the world's largest jewellery brand, specialising in the design, crafting and marketing of accessible luxury jewellery made from high-quality materials. Each piece is created to inspire self-expression, allowing people to share their stories and passions through meaningful jewellery. Pandora jewellery is sold in more than 100 countries through 6,800 points of sale, including more than 2,700 concept stores.\u003c/p\u003e\u003cp\u003eHeadquartered in Copenhagen, Denmark, Pandora employs 37,000 people worldwide and crafts its jewellery using only recycled silver and gold. Pandora is committed to leadership in sustainability and has set out to halve greenhouse gas emissions across its value chain by 2030. Pandora is listed on the Nasdaq Copenhagen stock exchange and generated revenue of DKK 31.7 billion (EUR 4.2 billion) in 2024.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAbout Pandora Production Vietnam\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePandora’s new jewellery crafting facility is located in the Vietnam–Singapore Industrial Park III (VSIP III), about 40 km north of Ho Chi Minh City. When fully scaled, the state-of-the-art facility will produce up to 60 million jewellery pieces annually and employ around 7,000 craftspeople. It is powered entirely by renewable energy and built to LEED Gold certification standards.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMain purpose of the role:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTo ensure New Product Introduction (NPI) readiness and smooth execution of new product launch activities by coordinating material availability, tracking development progress, and supporting cost control (material budget). The role acts as a key interface between Thailand’s product development team and manufacturing operations, providing accurate planning, reporting, and analysis to enable timely testing and pre-production phases.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey objectives:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Cycle Monitoring \u0026 Coordination\u003c/p\u003e\u003cp\u003eMonitor development cycle progress and coordinate with all relevant stakeholders to ensure timely execution handover from new product development through pre-production testing phase.\u003c/p\u003e\u003cp\u003e• NPI Readiness Collaborate as an active team member to secure on-time delivery of pre-production samples and ensure a seamless handover of a “mass-production-ready” process to the Production team.\u003c/p\u003e\u003cp\u003e• Material Management\u003c/p\u003e\u003cp\u003eSupport the pre-production team in ordering and tracking materials required for the SOVD (Start of Verification \u0026 Development) phase.\u003c/p\u003e\u003cp\u003e• Planning \u0026 Alignment\u003c/p\u003e\u003cp\u003eDevelop and maintain plans aligned with the current product development cycle and collection outlook through pre-production testing.\u003c/p\u003e\u003cp\u003e• Timeline \u0026 Change Updates\u003c/p\u003e\u003cp\u003eUpdate project timelines and communicate product changes to relevant stakeholders promptly.\u003c/p\u003e\u003cp\u003e• Cost Analysis\u003c/p\u003e\u003cp\u003eMonitor and analyze development costs, providing insights to support cost control and optimization for Vietnam.\u003c/p\u003e\u003cp\u003e• Feedback \u0026 Knowledge Sharing\u003c/p\u003e\u003cp\u003eEstablish feedback forums and platforms for pre-production activities with in-house teams and OEM partners, summarizing plant capabilities and factory profiles.\u003c/p\u003e\u003cp\u003e• Data Management\u003c/p\u003e\u003cp\u003eGather and consolidate information from Thailand teams to serve as the data center for Vietnam operations, ensuring accuracy and accessibility.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Tcf3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eAbout Pandora\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePandora is the world's largest jewellery brand, specialising in the design, crafting and marketing of accessible luxury jewellery made from high-quality materials. Each piece is created to inspire self-expression, allowing people to share their stories and passions through meaningful jewellery. Pandora jewellery is sold in more than 100 countries through 6,800 points of sale, including more than 2,700 concept stores.\u003c/p\u003e\u003cp\u003eHeadquartered in Copenhagen, Denmark, Pandora employs 37,000 people worldwide and crafts its jewellery using only recycled silver and gold. Pandora is committed to leadership in sustainability and has set out to halve greenhouse gas emissions across its value chain by 2030. Pandora is listed on the Nasdaq Copenhagen stock exchange and generated revenue of DKK 31.7 billion (EUR 4.2 billion) in 2024.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAbout Pandora Production Vietnam\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePandora’s new jewellery crafting facility is located in the Vietnam–Singapore Industrial Park III (VSIP III), about 40 km north of Ho Chi Minh City. When fully scaled, the sta
