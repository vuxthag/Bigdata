>self.__next_f.push([1,"** Tầm nhìn \u0026 Sứ mệnh\r\nTrí tuệ Việt tới đâu, lãnh thổ Việt tới đó.\r\nHàng hoá Việt tới đâu, lãnh thổ Việt tới đó.\r\nLà công ty công nghệ với sứ mệnh xây dựng hệ sinh thái thương mại điện tử xuyên biên giới cho mọi nhà bán lẻ lớn nhỏ toàn cầu, tích hợp sâu rộng, dịch vụ minh bạch bởi một đội ngũ nòng cốt 5 sao hạnh phúc đầy lòng nhiệt thành kèm mã gen linh hoạt của người Việt.\r\n\r\n** Giá trị cốt lõi\r\n- Lấy khách hàng làm trọng tâm, ám ảnh của khách hàng làm lẽ sống.\r\n- Thành thật là kim chỉ nam. Bạn có thể im lặng, nhưng khi đã phát ngôn, nó phải là sự thật.\r\n- Thà mất tiền, không để mất niềm tin từ khách hàng, đối tác, đồng nghiệp.\r\n- Đội ngũ nòng cốt quyết định động lực phát triển của tổ chức. Đội ngũ nòng cốt 5 sao sẽ tạo ra sản phẩm dịch vụ 5 sao.\r\nKiểm soát chất lượng và mang chuỗi cung ứng 5 sao tới khách hàng với sự minh bạch tối đa.\r\n- Khác biệt hoặc là chết.\r\n- Tốc độ là yếu tố sống còn.\r\n- Nghĩ lớn thì nhiều người nghĩ được, cần mẫn làm việc nhỏ một cách quyết liệt mới tạo nên thành công.\r\n- Tư duy phản biện, xem chỉ trích, tranh cãi là dinh dưỡng cho sự phát triển của cá nhân và tập thể.\r\n- Nếu ko thể tốt bụng, không xấu tính với đồng nghiệp, khách hàng và xã hội.\r\n\r\n** Các lĩnh vực đang hoạt động của công ty\r\nMerchize Platform: cung cấp nền tảng bán hàng thương mại điện tử xuyên biên giới toàn diện cho mọi nhà bán lẻ khắp toàn cầu, tập trung chuyên biệt cho các nhà bán lẻ in ấn theo yêu cầu (Print-On-Demand) trong những giai đoạn đầu. Giải pháp được cung cấp tại https://merchize.com.\r\nMerchize Fulfillment: cung cấp giải pháp POD Fulfillment (Print-On-Demand Fulfillment).\r\nMerchize Factory: hệ thống nhà máy sản xuất và in ấn, phục vụ mảng Merchize Fulfillment, xem thêm tại: https://gii.gl/MerchizeFac.\r\neCommerce Insights Solutions: cung cấp giải pháp insights cho thị trường thương mại điện tử toàn cầu.\r\n\r\n* Liên hệ\r\nĐịa chỉ: Tầng 2, sảnh thương mại, toà nhà CT1B Mon City, phố Nguyễn
