thì mọi việc trở nên dễ dàng.\r\nTrong hành trình của mình, đội ngũ An Gia nhận thức rằng chúng tôi không phải người nhiều kinh nghiệm nhất và càng không phải người giỏi nhất. Nhưng chúng tôi có được tài sản quý giá nhất, đó chính là sự chính trực trong mọi hoạt động. Chính nhờ vào giá trị này mà An Gia có được sự đồng hành lâu dài của nhiều đối tác, từ những đơn vị quốc tế như Creed Group, Hoosiers đến những cái tên hàng đầu trong nước như: Coteccons Group, Nam Hưng Land, Danh Khôi ( DKRS)…\r\nHiện nay Tập đoàn An Gia đã và đang triển khai hàng loạt dự án nổi tiếng trên thị trường như:\r\n- River Panorama;\r\n- The Garden Bay;\r\n- Angia Skyline;\r\n- Angia Riverside;\r\n- Angia Star;\r\n- The Garden.\r\n- The standard.\r\n-  Westgate.\r\n- The Address."])</script><script>self.__next_f.push([1,"43:{\"companyId\":133071,\"jobImageURLs\":\"$44\",\"jobVideoURLs\":\"$45\",\"companyName\":\"Tập Đoàn Bất Động Sản An Gia\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/b6/11145115.png\",\"companySizeId\":\"\",\"companyProfile\":\"$46\",\"contactName\":\"Phòng Hành chính Nhân sự\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"60 Nguyen Dinh Chieu Str., Da Kao Ward , Dist.1, HCMC\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n48:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-02T16:01:33+07:00\",\"expiredOn\":\"2026-05-02T23:59:59+07:00\"}\n47:[\"$48\"]\n49:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"27:{\"jobId\":2034361,\"jobTitle\":\"Kỹ Sư QS (QS Công Trình)/ Kiểm Soát Khối Lượng/ QA/ QC\",\"userId\":2799857,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/b6/11145115.png\",\"alias
