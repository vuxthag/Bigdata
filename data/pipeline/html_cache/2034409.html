mpanies to Work for in Asia - a testament to our unwavering commitment to our people and our purpose.24:T935,"])</script><script>self.__next_f.push([1,"\u003cp\u003eKEY RESPONSIBILITIES\u003c/p\u003e\u003cp\u003e• Evaluate business needs and provide scalable technology solutions with focus on performance and resiliency in terms of software/application specifications and design documents based on architectural blueprints designed by the Digital Transformation Project Director  \u003c/p\u003e\u003cp\u003e• Analyze current technologies used within the company and determine ways to improve. Presents and defends architectural, design, and technical choices to support our technology goals  \u003c/p\u003e\u003cp\u003e• Provide the development team with architectural blueprints to follow  \u003c/p\u003e\u003cp\u003e• Guide and assist the development team to resolve technical issues throughout the development process to ensure consistency with initial design, and to ensure software meets all requirements of quality, availability, performance, security, etc. via critical steps of Technical Design and Code Reviews, refactoring of application state, etc  \u003c/p\u003e\u003cp\u003e• Troubleshoot and resolve issues with coding or design  \u003c/p\u003e\u003cp\u003e• Develops high quality code that follows industry standard best practices and considers performance and resiliency  \u003c/p\u003e\u003cp\u003e• Ensure that work plan is properly assigned, major timelines are cascaded with the Digital Technology team, and the correct documentation is in place and communicated regularly  \u003c/p\u003e\u003cp\u003e• Carry out the day-to-day tasks such as stand-up calls, meetings, deployments and relevant important activities  \u003c/p\u003e\u003cp\u003e• Support leading and mentoring engineers to achieve a greater level of programming skills  \u003c/p\u003e\u003cp\u003e• Ensure corrective and preventive maintenance and service requests are prioritized and properly delivered  \u003c/p\u
