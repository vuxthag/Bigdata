road Vehicles, Concentrator Photovoltaic (CPV) System\r\n\r\n- Linh kiện công nghiệp Industrial Materials: Cemented Carbide Tools (IGETALLOY™, SUMIBORON™ and SUMIDIA™), Heatspreader Materials, Sintered Powder Metal Parts, Grinding Wheels, Special Steel Wires\r\n\r\n\r\n7. Các công con ty tại Việt Nam:\r\n\r\nHiện tại có 15 công ty, với tổng số công nhân viên hơn 40.000 người\r\n\r\n① SUMI-HANEL WIRING SYSTEMS CO.,LTD. KCN Sài Đồng B, phường Thạch Bàn, quận Long Biên, thành phố Hà Nội, Việt Nam. Thành lập năm 1996. Số lượng 9.500 người. Chuyên sản xuất bộ dân dẫn điện Wire Harness.\r\n\r\n② SUMIDENSO VIETNAM CO.,LTD. KCN Đại An, Phường Tứ Minh, T.p Hải Dương, Tỉnh Hải Dương. Thành lập năm 2004. Số lượng khoảng 13.0000 người. Chuyên sản xuất bộ dây dẫn cho xe ô tô và máy in.\r\n\r\n③ NISSIN ELECTRIC VIETNAM CO.,LTD. KCN Tiên Sơn, Bắc Ninh, Hà Nội. Thành lập năm 2005. Số lượng khoảng 500 người. Chuyên Gia công, chế tạo linh kiện kim loại, hệ thông busduct, busway, PCD coating.\r\n\r\n④ SUMIDEN VIETNAM AUTOMOTIVE WIRE CO.,LTD. KCN Đại An, Phường Tứ Minh, Thành phố Hải Dương, Tỉnh Hải Dương. Thành lập năm 2006. Số lượng 700 người. Chuyên sản xuất bộ dây dẫn điện Wire Harness.\r\n\r\n⑤ SUMITOMO ELECTRIC INTERCONNECT PRODUCTS (VIETNAM),LTD. KCN Tiên Sơn, Bắc Ninh, Hà Nội. Thành lập năm 2006. Sô lượng công nhân viên khoảng 2.450 người. Chuyên sản xuất, lắp ráp, gia công và bán các linh kiện điện dùng cho các thiết bị điện và điện tử, thiết bị văn phòng, ô tô và xe gắn máy.\r\n\r\n⑥ SUMI VIETNAM WIRING SYSTEMS CO.,LTD. KCN Đồng Văn II , Phường Duy Minh, Thị xã Duy Tiên, tỉnh Hà Nam, Việt Nam. Thành lập năm 2008. Số lượng khoảng 8.500 người. Chuyên sản xuất và bán hệ thống dây dẫn điện phục vụ cho công nghiệp ô tô, xe máy.\r\n\r\n⑦ SEI CONSULTING VIETNAM CO.,LTD. Tầng 10, tòa nhà Pacific Place, 83B Lý Thường Kiệt, Trần Hưng Đạo, Hoàn Kiếm, Hà Nội. Thành lập năm 2008. Số lượng 13 người. Chuyên hỗ trợ hành chính cho các công ty trong Tập đoàn tại Việt Nam.\r\n\r\n⑧ SEWS-COMPONENTS VIETNAM CO., LTD. KCN Thăng Long II, Xã Liêu Xá, Huyện Yên Mỹ, Tỉnh Hưng Yên. Thành lập năm 2010. Số lượng khoảng 1.100 người. Chuyên sản xuất các linh kiện điện, điện tử, trụ nối dây điện cho ô tô, mô tô, và các sản phẩm từ Plastic.\r\n\r\n⑨ SUMIDEN DEVICE INNOVATIONS VIETNAM CO.,LTD. KCN Long Bình (Amata), Phường Long Bình, Thành phố Biên Hòa, Tỉnh Đồng Nai. Thành lập năm 2011. Số lượng 750 người. Chuyên Sản xuất thiết bị điện tử và quang học.\r\n\r\n⑩ SEI ELECTRONIC COMPONENTS (VIETNAM),LTD. KCN Thăng Long, xã Võng La, huyện Đông Anh, Hà Nội. Thành lập năm 2012. Số lượng khoảng 6.000 người. Chuyên sản xuất, lắp ráp, gia công bảng vi mạch dẻo và các linh kiện điện tử liên quan để xuất khẩu.\r\n\r\n⑪ SUMIRIKO HOSE VIETNAM CO.,LTD. KCN Đồng Văn II, Phường Duy Minh, Thị xã Duy Tiên, Tỉnh Hà Nam, Việt Nam. Thành lập năm 2012. Số lượng khoảng 150 người. Chuyên sản xuất dây dẫn nhiêu liệu cho ô tô và xe máy.\r\n\r\n⑫ SD VIETNAM INDUSTRIES LTD. KCN Thăng Long, xã Võng La, Huyện Đông Anh, Hà nội. Thành lập năm 2013. Số lượng công nhân viên: 1.300 người. Chuyên sản xuất bộ dây dẫn điện Wire Harness.\r\n\r\n⑬ SUMIDEN INTERNATIONAL TRADING VIETNAM CO.,LTD., Phòng 201B, tầng 2, tòa nhà V-Tower, 649 Kim Mã, Ba Đình, Hà Nội. Thành lập năm 2013. Số lượng 5 người. Công ty hoạt động về lĩnh vực Thương mại.\r\n\r\n⑭ SEAPS VIETNAM CO.,LTD. Tầng 21, Tòa nhà TNR 54A Nguyễn Chí Thanh, Láng Thượng, Đống Đa, Hà Nội. Thành lập năm 2016. Số lượng 70 người. Chuyên kinh doanh các thiết bị dây dẫn Wire Harness.\r\n\r\n⑮ SEI OPTIFRONTIER VIETNAM, LTD. KCN Thăng Long Vĩnh Phúc, Xã Thiện Kế, Huyện Bình Xuyên, Tỉnh Vĩnh Phúc. Thành lập năm 2019. Số lượng khoảng 300 người. Chuyên sản xuất dây cáp, sợi cáp quang học, giá đỡ dây cáp quang."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"42:{\"companyId\":13141,\"jobImageURLs\":\"$43\",\"jobVideoURLs\":null,\"companyName\":\"Sumitomo Electric Interconnect Products (Vietnam), Ltd. [Sepv]\",\"com
