h tổ chức các chương trình đào tạo trình cấp trên phê duyệt và tiến hành tổ chức khoá đào tạo theo như kế hoạch đã được cấp trên phê duyệt hoặc thông qua.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e***Quản lý nhân sự, Lương Thưởng, chính sách Phúc lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Tư vấn và quản lý, xử lý các hạng mục Công việc liên quan đến Thuế Thu nhập Cá nhân cho Người Lao động.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\u003cstrong\u003e Xây dựng các Văn bản liên quan đến Chính sách Phúc lợi, Lương Thưởng phù hợp với Quy định của Công ty và Pháp luật Lao động. Phối hợp với Phòng Kế toán Công ty để thực hiện nhịp nhàng, đầy đủ các Thủ tục, Hồ sơ theo Quy định liên quan.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e - Quản lý và thực hiện ký kết hợp đồng lao động thử việc, hợp đồng lao động thời vụ, hợp đồng chính thức và tái ký hợp đồng lao động cho toàn thể cán bộ nhân viên theo chính sách của Alliance;\u003c/p\u003e\u003cp\u003e- Xây dựng/cải tiến chính sách liên quan đến lương, thưởng, phúc lợi của CBNV Công ty.\u003c/p\u003e\u003cp\u003e- Quản lý và thực hiện các chế độ BHXH, BHYT, BHTN cho cán bộ nhân viên theo chính sách của Công ty và các quy định của pháp luật;\u003c/p\u003e\u003cp\u003e- Quản lý và chăm lo các phúc lợi cho cán bộ nhân viên: sinh nhật, cưới hỏi, ốm đau,…theo chính sách của Alliance;\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng các chỉ số đo lường kết quả công việc (KPIs) của các phòng ban và tham gia đánh giá kết quả làm việc của các phòng ban;\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng KPIs, kế hoạch hành động của Phòng Hành chính nhân sự và chịu trách nhiệm về kết quả thực hiện của phòng.\u003c/p\u003e\u003cp\u003e- Tham gia thực hiện, tổ chức các Công tác đánh giá Năng lực của CBNV, đưa ra nhận định và ý kiến để đánh giá, đề bạt, luân chuyển phù hợp với năng lực của CBNV.\u003c/p\u003e\u003cp\u003e- Làm việc với các cơ quan ban ngành để xử lý các vấ
