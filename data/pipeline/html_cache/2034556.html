 (VICS) được thành lập với vốn pháp định 150 tỷ đồng; Khai trương văn phòng giao dịch tại Láng Hạ.\r\n- 2OO9-2O1O: VICS là công ty chứng khoán thứ 8 được niêm yết cổ phiếu tại Sở Giao dịch Chứng khoán Hà Nội (HNX) với mã chứng khoán VIG, nhận giải thưởng “ Thương hiệu chứng khoán uy tín năm 2009/2010”.\r\n- 2O11-2O2O: Mở rộng phát triển và thành lập chi nhánh Hà Thành; Tập đoàn Đầu tư Thăng Long thoái vốn tại VICS.\r\n- 2O21-2O22: Tập đoàn đầu tư Thăng Long đầu tư chiến lược và tái cấu trúc thành công, tham gia quản trị điều hành và đổi tên VICS thành Công ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam (VISC), tăng vốn lên 451,333,000,000 đồng.\r\n\r\n3. Giá trị cốt lõi: VISC xác định giá trị cốt lõi của doanh nghiệp là “chuyên nghiệp, tận tâm”; với năng lực “công nghệ tiên tiến”; cam kết “gia tăng giá trị” và cùng “chia sẻ thành công” với khách hàng và nhà đầu tư.\r\n- Chuyên nghiệp tận tâm: VISC luôn chú trọng từ tổng thể cho đến chi tiết nhất toàn bộ quá trình xây dựng và phát triển sản phẩm dịch vụ, khách hàng là trung tâm, tận tụy phục vụ khách hàng để mang lại cho khách hàng sự hài lòng tuyệt đối.\r\n- Công nghệ hiện đại: VISC ưu tiên đầu tư áp dụng công nghệ tiên tiến, giao dịch mọi lúc mọi nơi theo chuẩn mực quốc tế để đảm bảo an toàn bảo mật, phát triển và hội nhập.\r\n- Gia tăng giá trị: VISC luôn không ngừng nỗ lực tìm kiếm cơ hội hợp tác phát triển để củng cố và gia tăng chuỗi giá trị của doanh nghiệp.\r\n- Chia sẻ thành công: VISC luôn nắm bắt, chia sẻ cơ hội để cùng đối tác khách hàng hướng tới thành công, coi thành công của khách hàng chính là thước đo sự thành đạt của VISC.\r\n\r\n4. Sứ mệnh:\r\n- Tạo nên những giá trị đích thực bao gồm những sản phẩm dịch vụ chất lượng, giải pháp tài chính tối ưu, hỗ trợ tối đa cho doanh nghiệp và nhà đầu tư.\r\n- Tạo ra giá trị lợi ích và cơ hội gia tăng giá trị cho nhà đầu tư. \r\n\r\n5. Sản phẩm dịch vụ:\r\n- Dịch vụ môi giới chứng khoán\r\n\r\nVISC có đội ngũ chuyên viên môi giới năng động, giàu kinh nghiệm, tư vấn chuyên nghiệp. Sản phẩm dịch vụ đa dạng, cung cấp cho các nhà đầu tư cá nhân và tổ chức. Áp dụng công nghệ trong giao dịch đảm bảo các khoản đầu tư được theo dõi hiệu quả, an toàn. Các sản phẩm, dịch vụ chứng khoán bao gồm: Giao dịch cổ phiếu, Chứng chỉ quỹ, Chứng khoán phái sinh, Trái phiếu. Các dịch vụ hỗ trợ đi kèm như hỗ trợ tài chính, tư vấn đầu tư và quản lý danh mục đầu tư…\r\n\r\n- Dịch vụ Phân tích đầu tư\r\nVISC cung cấp kiến thức và thông tin và mang đến giải pháp tối ưu giúp các nhà đầu tư cá nhân, tổ chức nâng cao hiệu quả đầu tư. Hệ thống các báo cáo phân tích chuyên nghiệp, chuyên sâu và đa dạng, bao gồm báo cáo đánh giá về kinh tế vĩ mô, các báo cáo phân tích ngành, công ty, báo cáo phân tích cơ bản, kỹ thuật và định giá cổ phiếu. Với đội ngũ các chuyên gia phân tích giàu kinh nghiệm, dịch vụ phân tích của VISC hỗ trợ hiệu quả đối với quyết định đâu tư của các nhà đầu tư.\r\n\r\n- Dịch vụ Ngân hàng đầu tư\r\nVISC với đội ngũ cán bộ có nhiều năm kinh nghiệm trong lĩnh vực Định giá, Kiểm toán, Kế toán, Ngân hàng và các lĩnh vực khác, cùng với các đơn vị Liên danh – Liên kết là các Công ty thẩm định giá, Công ty kiểm toán có uy tín hàng đầu tại Việt Nam, VISC cam kết cung cấp cho khách hàng những dịch vụ tốt nhất như dịch vụ thị trường vốn, dịch vụ thị trường nợ, bảo lãnh phát hành, tư vấn tài chính doanh nghiệp, tư vấn mua bán sáp nhập doanh nghiệp  một cách hiệu quả,\r\n\r\n- Dịch vụ tài chính\r\nVới lợi thế được hỗ trợ nguồn lực tài chính từ Tập đoàn Đầu tư Thăng Long, VISC cung cấp các dịch vụ hỗ trợ tài chính linh hoạt hỗ trợ cho khách hàng, nhà đầu tư như giao dịch ký quỹ, ứng trước tiền bán chứng khoán, hợp tác đầu tư, môi giới trái phiếu, repo… và các dịch vụ về nguồn vốn và đầu tư tài chính khác.\r\n\r\n6. Ban lãnh đạo Công ty:\r\n \r\nÔNG NGUYỄN PHÚC LONG\r\nChức danh: Chủ tịch Hội đồng quản trị\r\n \r\nÔng Nguyễn Phúc Long - Cử nhân ngành Tài chính Ngân hàng - Học viện Tài chính Kế toán Hà Nội; Thạc sỹ Quản trị kinh doanh (MBA) - Đại học Preston University (Hoa Kỳ). Ông Long có thâm niên hơn 20 năm kinh nghiệm quản lý trong lĩnh vực tài chính, chứng khoán, đầu tư, bất động sản và truyền thông. Ông là người sáng lập, gây dựng và phát triển Tập đoàn đầu tư Thăng Long (ThangLong Invest Group) cũng như một số tổ chức, doanh nghiệp trong các lĩnh vực khác như Công ty Chứng khoán VICS, Tạp chí điện tử Kinh tế Chứng khoán Việt Nam, HDE Holdings, Hyundai VN CO.LTD,…\r\n\r\nÔng Nguyễn Phúc Long hiện đang đảm nhiệm một số vị trí lãnh đạo tại các tổ chức như: Ủy viên đoàn Chủ tịch Uỷ ban Trung ương Hội Doanh nghiệp Trẻ Việt Nam; Phó Chủ tịch hội Doanh nghiệp trẻ Hà Nội; Chủ tịch Câu lạc bộ Xúc tiến thương mại và Đầu tư Doanh nhân trẻ Việt Nam; Ủy viên BCH Hiệp hội kinh doanh Chứng khoán Việt Nam, Phó chủ tịch HĐBT Tạp chí Điện tử Kinh tế Chứng khoán Việt Nam; Chủ tịch HĐQT một số các doanh nghiệp khác. Chức danh nắm giữ tại các Công ty khác: Chủ tịch Hội đồng quản trị Công ty Cổ phần Đầu tư Thăng Long, Chủ tịch Hội đồng quản trị Công ty Cổ phần Đầu tư Thăng Long Phú Thọ, Chủ tịch HĐTV Công ty TNHH Điện tử và Hàng gia dụng Hyundai Việt Nam.\r\n\r\n \r\nÔNG DƯƠNG QUANG TRUNG\r\nChức danh: Tổng Giám đốc / Phó Chủ tịch Hội đồng quản trị\r\n \r\nÔng Dương Quang Trung - Cử nhân ngành Tài chính Ngân hàng, Học viện Tài chính Kế toán Hà Nội; Thạc sĩ quản trị kinh doanh Đại học Kinh tế - Đại học Quốc gia Hà Nội. Ông Trung đã có gần 25 năm kinh nghiệm trong lĩnh vực tài chính, chứng khoán, từng đảm nhiệm các vị trí quan trọng tại các công ty thuộc lĩnh vực tài chính, chứng khoán như: Trưởng Phòng Kế hoạch và Quản lý Doanh nghiệp - Khối Quản lý và Phát triển Doanh nghiệp Ngân hàng thương mại cổ phần Bưu điện Liên Việt, Tổng Giám đốc Công ty Chứng khoán FLC, Phó Tổng Giám đốc/Giám đốc Tài chính Công ty Chứng khoán Vincom - Tập đoàn VinGroup, Giám đốc tài chính, Kế toán trưởng Công ty Cổ phần Xuất nhập khẩu Hàng không - thuộc VietnamAirlines Group,…\r\n\r\n \r\nBÀ ĐÀO THỊ THANH\r\nChức danh: Thành viên Hội đồng quản trị\r\n \r\nBà Đào Thị Thanh - Thạc sỹ tài chính, Học viện Tài chính. Bà Thanh có nhiều năm kinh nghiệm trong lĩnh vực tài chính, kế toán và đã từng kinh qua nhiều vị trí quan trọng: Phó phòng kế toán tại Công ty Cổ phần đầu tư và xây dựng công trình giao thông 208, Phó Tổng Giám đốc Công ty cổ phần chứng khoán thương mại và công nghiệp Việt Nam, Kế toán trưởng Công ty CP chứng khoán Stanley Brothers, Kế toán trưởng Công ty CP Kem Tràng Tiền…\r\n\r\n\r\nÔNG NGUYỄN XUÂN BIỂU\r\nChức danh: Thành viên Hội đồng quản trị \r\nÔng Nguyễn Xuân Biểu - Cử nhân kinh tế, Đại học Thương mại Hà Nội và Cử nhân Luật, Đại học Luật TP. HCM. Ông Biểu đã có gần 30 năm kinh nghiệm và thực tiễn chuyên sâu trong lĩnh vực quản trị, tài chính và chứng khoán. Ông Biểu tham gia HĐQT Công ty kể từ khi Công ty được thành lập và hoạt động năm 2008 đến nay.\r\n\r\n\r\nÔNG NGUYỄN VIẾT VIỆT\r\nChức danh: Thành viên Hội đồng quản trị\r\n \r\nÔng Nguyễn Viết Việt - Cử nhân Báo chí, Cử nhân Chính trị, Thạc sĩ Chính trị và Cao cấp lý luận chính trị. Ông Việt có thâm niên gần 20 năm trong hoạt động báo chí với các vị trí Thư ký tòa soạn, Tổng thư ký toà soạn, Phó tổng biên tập... Ông hiện đang giữ chức vụ: Tổng Biên tập Tạp chí điện tử Kinh tế Chứng khoán Việt Nam."])</script><script>self.__next_f.push([1,"24:T8c3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTrình độ \u0026 Kiến thức chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp đại học trở lên chuyên ngành: Quản trị kinh doanh, Marketing, Tài chính, Kinh tế hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e• Có kiến thức chuyên sâu về quản lý bán hàng, xây dựng chiến lược thị trường, phát triển khách hàng và thương hiệu.\u003c/p\u003e\u003cp\u003e• Có kiến thức về việc phát triển hệ thống, mạng lưới và đội ngũ nhân sự kinh doanh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tối thiểu 3-5 năm kinh \r\nCông ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam (VISC) được thành lập ngày 15/10/2007 theo giấy phép thành lập và hoạt động số 88/UBCK-GP do UBCK Nhà Nước cấp ngày 11/1/2008 với các cổ đông sáng lập là Thăng Long Invest Group, SCB, PVFC; VCCI Invest; VINACHEM, VINAPACO, VINAFOOD1, LILAMA và CIENCO4 với tên gọi ban đầu là CTCP Chứng khoán Thương mại và Công nghiệp Việt Nam (VICS). Ngày 01/12/2009, VICS chính thức được niêm yết cổ phiếu tại sở GDCKHN với mã CK là VIG. Trải qua 15 năm hình thành và phát triển, đến nay Công ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam đã được Tập đoàn Đầu tư Thăng Long đầu tư chiến lược, tái cấu trúc thành công và ra mắt thương hiệu mới VISC, với định hướng trở thành một định chế tài chính hàng đầu tại Việt Nam, tham gia vào lĩnh vực kinh doanh dịch vụ chứng khoán, dịch vụ tài chính và ngân hàng đầu tư.\r\n\r\n2. Lịch sử hình thành phát triển:\r\n- 2OO7-2OO8: CTCP Chứng khoán Thương mại và Công nghiệp Việt Nam (VICS) được thành lập với vốn pháp định 150 tỷ đồng; Khai trương văn phòng giao dịch tại Láng Hạ.\r\n- 2OO9-2O1O: VICS là công ty chứng khoán thứ 8 được niêm yết cổ phiếu tại Sở Giao dịch Chứng khoán Hà Nội (HNX) với mã chứng khoán VIG, nhận giải thưởng “ Thương hiệu chứng khoán uy tín năm 2009/2010”.\r\n- 2O11-2O2O: Mở rộng phát triển và thành lập chi nhánh Hà Thành; Tập đoàn Đầu tư Thăng Long thoái vốn tại VICS.\r\n- 2O21-2O22: Tập đoàn đầu tư Thăng Long đầu tư chiến lược và tái cấu trúc thành công, tham gia quản trị điều hành và đổi tên VICS thành Công ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam (VISC), tăng vốn lên 451,333,000,000 đồng.\r\n\r\n3. Giá trị cốt lõi: VISC xác định giá trị cốt lõi của doanh nghiệp là “chuyên nghiệp, tận tâm”; với năng lực “công nghệ tiên tiến”; cam kết “gia tăng giá trị” và cùng “chia sẻ thành công” với khách hàng và nhà đầu tư.\r\n- Chuyên nghiệp tận tâm: VISC luôn chú trọng từ tổng thể cho đến chi tiết nhất toàn bộ quá trình xây dựng và phát triển sản phẩm dịch vụ, khách hàng là trung tâm, tận tụy phục vụ khách hàng để mang lại cho khách hàng sự hài lòng tuyệt đối.\r\n- Công nghệ hiện đại: VISC ưu tiên đầu tư áp dụng công nghệ tiên tiến, giao dịch mọi lúc mọi nơi theo chuẩn mực quốc tế để đảm bảo an toàn bảo mật, phát triển và hội nhập.\r\n- Gia tăng giá trị: VISC luôn không ngừng nỗ lực tìm kiếm cơ hội hợp tác phát triển để củng cố và gia tăng chuỗi giá trị của doanh nghiệp.\r\n- Chia sẻ thành công: VISC luôn nắm bắt, chia sẻ cơ hội để cùng đối tác khách hàng hướng tới thành công, coi thành công của khách hàng chính là thước đo sự thành đạt của VISC.\r\n\r\n4. Sứ mệnh:\r\n- Tạo nên những giá trị đích thực bao gồm những sản phẩm dịch vụ chất lượng, giải pháp tài chính tối ưu, hỗ trợ tối đa cho doanh nghiệp và nhà đầu tư.\r\n- Tạo ra giá trị lợi ích và cơ hội gia tăng giá trị cho nhà đầu tư. \r\n\r\n5. Sản phẩm dịch vụ:\r\n- Dịch vụ môi giới chứng khoán\r\n\r\nVISC có đội ngũ chuyên viên môi giới năng động, giàu kinh nghiệm, tư vấn chuyên nghiệp. Sản phẩm dịch vụ đa dạng, cung cấp cho các nhà đầu tư cá nhân và tổ chức. Áp dụng công nghệ trong giao dịch đảm bảo các khoản đầu tư được theo dõi hiệu quả, an toàn. Các sản phẩm, dịch vụ chứng khoán bao gồm: Giao dịch cổ phiếu, Chứng chỉ quỹ, Chứng khoán phái sinh, Trái phiếu. Các dịch vụ hỗ trợ đi kèm như hỗ trợ tài chính, tư vấn đầu tư và quản lý danh mục đầu tư…\r\n\r\n- Dịch vụ Phân tích đầu tư\r\nVISC cung cấp kiến thức và thông tin và mang đến giải pháp tối ưu giúp các nhà đầu tư cá nhân, tổ chức nâng cao hiệu quả đầu tư. Hệ thống các báo cáo phân tích chuyên nghiệp, chuyên sâu và đa dạng, bao gồm báo cáo đánh giá về kinh tế vĩ mô, các báo cáo phân tích ngành, công ty, báo cáo phân tích cơ bản, kỹ thuật và định giá cổ phiếu. Với đội ngũ các chuyên gia phân tích giàu kinh nghiệm, dịch vụ phân tích của VISC hỗ trợ hiệu quả đối với quyết định đâu tư của các nhà đầu tư.\r\n\r\n- Dịch vụ Ngân hàng đầu tư\r\nVISC với đội ngũ cán bộ có nhiều năm kinh nghiệm trong lĩnh vực Định giá, Kiểm toán, Kế toán, Ngân hàng và các lĩnh vực khác, cùng với các đơn vị Liên danh – Liên kết là các Công ty thẩm định giá, Công ty kiểm toán có uy tín hàng đầu tại Việt Nam, VISC cam kết cung cấp cho khách hàng những dịch vụ tốt nhất như dịch vụ thị trường vốn, dịch vụ thị trường nợ, bảo lãnh phát hành, tư vấn tài chính doanh nghiệp, tư vấn mua bán sáp nhập doanh nghiệp  một cách hiệu quả,\r\n\r\n- Dịch vụ tài chính\r\nVới lợi thế được hỗ trợ nguồn lực tài chính từ Tập đoàn Đầu tư Thăng Long, VISC cung cấp các dịch vụ hỗ trợ tài chính linh hoạt hỗ trợ cho khách hàng, nhà đầu tư như giao dịch ký quỹ, ứng trước tiền bán chứng khoán, hợp tác đầu tư, môi giới trái phiếu, repo… và các dịch vụ về nguồn vốn và đầu tư tài chính khác.\r\n\r\n6. Ban lãnh đạo Công ty:\r\n \r\nÔNG NGUYỄN PHÚC LONG\r\nChức danh: Chủ tịch Hội đồng quản trị\r\n \r\nÔng Nguyễn Phúc Long - Cử nhân ngành Tài chính Ngân hàng - Học viện Tài chính Kế toán Hà Nội; Thạc sỹ Quản trị kinh doanh (MBA) - Đại học Preston University (Hoa Kỳ). Ông Long có thâm niên hơn 20 năm kinh nghiệm quản lý trong lĩnh vực tài chính, chứng khoán, đầu tư, bất động sản và truyền thông. Ông là người sáng lập, gây dựng và phát triển Tập đoàn đầu tư Thăng Long (ThangLong Invest Group) cũng như một số tổ chức, doanh nghiệp trong các lĩnh vực khác như Công ty Chứng khoán VICS, Tạp chí điện tử Kinh tế Chứng khoán Việt Nam, HDE Holdings, Hyundai VN CO.LTD,…\r\n\r\nÔng Nguyễn Phúc Long hiện đang đảm nhiệm một số vị trí lãnh đạo tại các tổ chức như: Ủy viên đoàn Chủ tịch Uỷ ban Trung ương Hội Doanh nghiệp Trẻ Việt Nam; Phó Chủ tịch hội Doanh nghiệp trẻ Hà Nội; Chủ tịch Câu lạc bộ Xúc tiến thương mại và Đầu tư Doanh nhân trẻ Việt Nam; Ủy viên BCH Hiệp hội kinh doanh Chứng khoán Việt Nam, Phó chủ tịch HĐBT Tạp chí Điện tử Kinh tế Chứng khoán Việt Nam; Chủ tịch HĐQT một số các doanh nghiệp khác. Chức danh nắm giữ tại các Công ty khác: Chủ tịch Hội đồng quản trị Công ty Cổ phần Đầu tư Thăng Long, Chủ tịch Hội đồng quản trị Công ty Cổ phần Đầu tư Thăng Long Phú Thọ, Chủ tịch HĐTV Công ty TNHH Điện tử và Hàng gia dụng Hyundai Việt Nam.\r\n\r\n \r\nÔNG DƯƠNG QUANG TRUNG\r\nChức danh: Tổng Giám đốc / Phó Chủ tịch Hội đồng quản trị\r\n \r\nÔng Dương Quang Trung - Cử nhân ngành Tài chính Ngân hàng, Học viện Tài chính Kế toán Hà Nội; Thạc sĩ quản trị kinh doanh Đại học Kinh tế - Đại học Quốc gia Hà Nội. Ông Trung đã có gần 25 năm kinh nghiệm trong lĩnh vực tài chính, chứng khoán, từng đảm nhiệm các vị trí quan trọng tại các công ty thuộc lĩnh vực tài chính, chứng khoán như: Trưởng Phòng Kế hoạch và Quản lý Doanh nghiệp - Khối Quản lý và Phát triển Doanh nghiệp Ngân hàng thương mại cổ phần Bưu điện Liên Việt, Tổng Giám đốc Công ty Chứng khoán FLC, Phó Tổng Giám đốc/Giám đốc Tài chính Công ty Chứng khoán Vincom - Tập đoàn VinGroup, Giám đốc tài chính, Kế toán trưởng Công ty Cổ phần Xuất nhập khẩu Hàng không - thuộc VietnamAirlines Group,…\r\n\r\n \r\nBÀ ĐÀO THỊ THANH\r\nChức danh: Thành viên Hội đồng quản trị\r\n \r\nBà Đào Thị Thanh - Thạc sỹ tài chính, Học viện Tài chính. Bà Thanh có nhiều năm kinh nghiệm trong lĩnh vực tài chính, kế toán và đã từng kinh qua nhiều vị trí quan trọng: Phó phòng kế toán tại Công ty Cổ phần đầu tư và xây dựng công trình giao thông 208, Phó Tổng Giám đốc Công ty cổ phần chứng khoán thương mại và công nghiệp Việt Nam, Kế toán trưởng Công ty CP chứng khoán Stanley Brothers, Kế toán trưởng Công ty CP Kem Tràng Tiền…\r\n\r\n\r\nÔNG NGUYỄN XUÂN BIỂU\r\nChức danh: Thành viên Hội đồng quản trị \r\nÔng Nguyễn Xuân Biểu - Cử nhân kinh tế, Đại học Thương mại Hà Nội và Cử nhân Luật, Đại học Luật TP. HCM. Ông Biểu đã có gần 30 năm kinh nghiệm và thực tiễn chuyên sâu trong lĩnh vực quản trị, tài chính và chứng khoán. Ông Biểu tham gia HĐQT Công ty kể từ khi Công ty được thành lập và hoạt động năm 2008 đến nay.\r\n\r\n\r\nÔNG NGUYỄN VIẾT VIỆT\r\nChức danh: Thành viên Hội đồng quản trị\r\n \r\nÔng Nguyễn Viết Việt - Cử nhân Báo chí, Cử nhân Chính trị, Thạc sĩ Chính trị và Cao cấp lý luận chính trị. Ông Việt có thâm niên gần 20 năm trong hoạt động báo chí với các vị trí Thư ký tòa soạn, Tổng thư ký toà soạn, Phó tổng biên tập... Ông hiện đang giữ chức vụ: Tổng Biên tập Tạp chí điện tử Kinh tế Chứng khoán Việt Nam."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:T2a4f,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam (VISC) được thành lập ngày 15/10/2007 theo giấy phép thành lập và hoạt động số 88/UBCK-GP do UBCK Nhà Nước cấp ngày 11/1/2008 với các cổ đông sáng lập là Thăng Long Invest Group, SCB, PVFC; VCCI Invest; VINACHEM, VINAPACO, VINAFOOD1, LILAMA và CIENCO4\r\n\r\n1. Sơ lược về công ty:\r\nCông ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam (VISC) được thành lập ngày 15/10/2007 theo giấy phép thành lập và hoạt động số 88/UBCK-GP do UBCK Nhà Nước cấp ngày 11/1/2008 với các cổ đông sáng lập là Thăng Long Invest Group, SCB, PVFC; VCCI Invest; VINACHEM, VINAPACO, VINAFOOD1, LILAMA và CIENCO4 với tên gọi ban đầu là CTCP Chứng khoán Thương mại và Công nghiệp Việt Nam (VICS). Ngày 01/12/2009, VICS chính thức được niêm yết cổ phiếu tại sở GDCKHN với mã CK là VIG. Trải qua 15 năm hình thành và phát triển, đến nay Công ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam đã được Tập đoàn Đầu tư Thăng Long đầu tư chiến lược, tái cấu trúc thành công và ra mắt thương hiệu mới VISC, với định hướng trở thành một định chế tài chính hàng đầu tại Việt Nam, tham gia vào lĩnh vực kinh doanh dịch vụ chứng khoán, dịch vụ tài chính và ngân hàng đầu tư.\r\n\r\n2. Lịch sử hình thành phát triển:\r\n- 2OO7-2OO8: CTCP Chứng khoán Thương mại và Công nghiệp Việt Nam (VICS) được thành lập với vốn pháp định 150 tỷ đồng; Khai trương văn phòng giao dịch tại Láng Hạ.\r\n- 2OO9-2O1O: VICS là công ty chứng khoán thứ 8 được niêm yết cổ phiếu tại Sở Giao dịch Chứng khoán Hà Nội (HNX) với mã chứng khoán VIG, nhận giải thưởng “ Thương hiệu chứng khoán uy tín năm 2009/2010”.\r\n- 2O11-2O2O: Mở rộng phát triển và thành lập chi nhánh Hà Thành; Tập đoàn Đầu tư Thăng Long thoái vốn tại VICS.\r\n- 2O21-2O22: Tập đoàn đầu tư Thăng Long đầu tư chiến lược và tái cấu trúc thành công, tham gia quản trị điều hành và đổi tên VICS thành Công ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam (VISC), tăng vốn lên 451,333,000,000 đồng.\r\n\r\n3. Giá trị cốt lõi: VISC xác định giá trị cốt lõi của doanh nghiệp là “chuyên nghiệp, tận tâm”; với năng lực “công nghệ tiên tiến”; cam kết “gia tăng giá trị” và cùng “chia sẻ thành công” với khách hàng và nhà đầu tư.\r\n- Chuyên nghiệp tận tâm: VISC luôn chú trọng từ tổng thể cho đến chi tiết nhất toàn bộ quá trình xây dựng và phát triển sản phẩm dịch vụ, khách hàng là trung tâm, tận tụy phục vụ khách hàng để mang lại cho khách hàng sự hài lòng tuyệt đối.\r\n- Công nghệ hiện đại: VISC ưu tiên đầu tư áp dụng công nghệ tiên tiến, giao dịch mọi lúc mọi nơi theo chuẩn mực quốc tế để đảm bảo an toàn bảo mật, phát triển và hội nhập.\r\n- Gia tăng giá trị: VISC luôn không ngừng nỗ lực tìm kiếm cơ hội hợp tác phát triển để củng cố và gia tăng chuỗi giá trị của doanh nghiệp.\r\n- Chia sẻ thành công: VISC luôn nắm bắt, chia sẻ cơ hội để cùng đối tác khách hàng hướng tới thành công, coi thành công của khách hàng chính là thước đo sự thành đạt của VISC.\r\n\r\n4. Sứ mệnh:\r\n- Tạo nên những giá trị đích thực bao gồm những sản phẩm dịch vụ chất lượng, giải pháp tài chính tối ưu, hỗ trợ tối đa cho doanh nghiệp và nhà đầu tư.\r\n- Tạo ra giá trị lợi ích và cơ hội gia tăng giá trị cho nhà đầu tư. \r\n\r\n5. Sản phẩm dịch vụ:\r\n- Dịch vụ môi giới chứng khoán\r\n\r\nVISC có đội ngũ chuyên viên môi giới năng động, giàu kinh nghiệm, tư vấn chuyên nghiệp. Sản phẩm dịch vụ đa dạng, cung cấp cho các nhà đầu tư cá nhân và tổ chức. Áp dụng công nghệ trong giao dịch đảm bảo các khoản đầu tư được theo dõi hiệu quả, an toàn. Các sản phẩm, dịch vụ chứng khoán bao gồm: Giao dịch cổ phiếu, Chứng chỉ quỹ, Chứng khoán phái sinh, Trái phiếu. Các dịch vụ hỗ trợ đi kèm như hỗ trợ tài chính, tư vấn đầu tư và quản lý danh mục đầu tư…\r\n\r\n- Dịch vụ Phân tích đầu tư\r\nVISC cung cấp kiến thức và thông tin và mang đến giải pháp tối ưu giúp các nhà đầu tư cá nhân, tổ chức nâng cao hiệu quả đầu tư. Hệ thống các báo cáo phân tích chuyên nghiệp, chuyên sâu và đa dạng, bao gồm báo cáo đánh giá về kinh tế vĩ mô, các báo cáo phân tích ngành, công ty, báo cáo phân tích cơ bản, kỹ thuật và định giá cổ phiếu. Với đội ngũ các chuyên gia phân tích giàu kinh nghiệm, dịch vụ phân tích của VISC hỗ trợ hiệu quả đối với quyết định đâu tư của các nhà đầu tư.\r\n\r\n- Dịch vụ Ngân hàng đầu tư\r\nVISC với đội ngũ cán bộ có nhiều năm kinh nghiệm trong lĩnh vực Định giá, Kiểm toán, Kế toán, Ngân hàng và các lĩnh vực khác, cùng với các đơn vị Liên danh – Liên kết là các Công ty thẩm định giá, Công ty kiểm toán có uy tín hàng đầu tại Việt Nam, VISC cam kết cung cấp cho khách hàng những dịch vụ tốt nhất như dịch vụ thị trường vốn, dịch vụ thị trường nợ, bảo lãnh phát hành, tư vấn tài chính doanh nghiệp, tư vấn mua bán sáp nhập doanh nghiệp  một cách hiệu quả,\r\n\r\n- Dịch vụ tài chính\r\nVới lợi thế được hỗ trợ nguồn lực tài chính từ Tập đoàn Đầu tư Thăng Long, VISC cung cấp các dịch vụ hỗ trợ tài chính linh hoạt hỗ trợ cho khách hàng, nhà đầu tư như giao dịch ký quỹ, ứng trước tiền bán chứng khoán, hợp tác đầu tư, môi giới trái phiếu, repo… và các dịch vụ về nguồn vốn và đầu tư tài chính khác.\r\n\r\n6. Ban lãnh đạo Công ty:\r\n \r\nÔNG NGUYỄN PHÚC LONG\r\nChức danh: Chủ tịch Hội đồng quản trị\r\n \r\nÔng Nguyễn Phúc Long - Cử nhân ngành Tài chính Ngân hàng - Học viện Tài chính Kế toán Hà Nội; Thạc sỹ Quản trị kinh doanh (MBA) - Đại học Preston University (Hoa Kỳ). Ông Long có thâm niên hơn 20 năm kinh nghiệm quản lý trong lĩnh vực tài chính, chứng khoán, đầu tư, bất động sản và truyền thông. Ông là người sáng lập, gây dựng và phát triển Tập đoàn đầu tư Thăng Long (ThangLong Invest Group) cũng như một số tổ chức, doanh nghiệp trong các lĩnh vực khác như Công ty Chứng khoán VICS, Tạp chí điện tử Kinh tế Chứng khoán Việt Nam, HDE Holdings, Hyundai VN CO.LTD,…\r\n\r\nÔng Nguyễn Phúc Long hiện đang đảm nhiệm một số vị trí lãnh đạo tại các tổ chức như: Ủy viên đoàn Chủ tịch Uỷ ban Trung ương Hội Doanh nghiệp Trẻ Việt Nam; Phó Chủ tịch hội Doanh nghiệp trẻ Hà Nội; Chủ tịch Câu lạc bộ Xúc tiến thương mại và Đầu tư Doanh nhân trẻ Việt Nam; Ủy viên BCH Hiệp hội kinh doanh Chứng khoán Việt Nam, Phó chủ tịch HĐBT Tạp chí Điện tử Kinh tế Chứng khoán Việt Nam; Chủ tịch HĐQT một số các doanh nghiệp khác. Chức danh nắm giữ tại các Công ty khác: Chủ tịch Hội đồng quản trị Công ty Cổ phần Đầu tư Thăng Long, Chủ tịch Hội đồng quản trị Công ty Cổ phần Đầu tư Thăng Long Phú Thọ, Chủ tịch HĐTV Công ty TNHH Điện tử và Hàng gia dụng Hyundai Việt Nam.\r\n\r\n \r\nÔNG DƯƠNG QUANG TRUNG\r\nChức danh: Tổng Giám đốc / Phó Chủ tịch Hội đồng quản trị\r\n \r\nÔng Dương Quang Trung - Cử nhân ngành Tài chính Ngân hàng, Học viện Tài chính Kế toán Hà Nội; Thạc sĩ quản trị kinh doanh Đại học Kinh tế - Đại học Quốc gia Hà Nội. Ông Trung đã có gần 25 năm kinh nghiệm trong lĩnh vực tài chính, chứng khoán, từng đảm nhiệm các vị trí quan trọng tại các công ty thuộc lĩnh vực tài chính, chứng khoán như: Trưởng Phòng Kế hoạch và Quản lý Doanh nghiệp - Khối Quản lý và Phát triển Doanh nghiệp Ngân hàng thương mại cổ phần Bưu điện Liên Việt, Tổng Giám đốc Công ty Chứng khoán FLC, Phó Tổng Giám đốc/Giám đốc Tài chính Công ty Chứng khoán Vincom - Tập đoàn VinGroup, Giám đốc tài chính, Kế toán trưởng Công ty Cổ phần Xuất nhập khẩu Hàng không - thuộc VietnamAirlines Group,…\r\n\r\n \r\nBÀ ĐÀO THỊ THANH\r\nChức danh: Thành viên Hội đồng quản trị\r\n \r\nBà Đào Thị Thanh - Thạc sỹ tài chính, Học viện Tài chính. Bà Thanh có nhiều năm kinh nghiệm trong lĩnh vực tài chính, kế toán và đã từng kinh qua nhiều vị trí quan trọng: Phó phòng kế toán tại Công ty Cổ phần đầu tư và xây dựng công trình giao thông 208, Phó Tổng Giám đốc Công ty cổ phần chứng khoán thương mại và công nghiệp Việt Nam, Kế toán trưởng Công ty CP chứng khoán Stanley Brothers, Kế toán trưởng Công ty CP Kem Tràng Tiền…\r\n\r\n\r\nÔNG NGUYỄN XUÂN BIỂU\r\nChức danh: Thành viên Hội đồng quản trị \r\nÔng Nguyễn Xuân Biểu - Cử nhân kinh tế, Đại học Thương mại Hà Nội và Cử nhân Luật, Đại học Luật TP. HCM. Ông Biểu đã có gần 30 năm kinh nghiệm và thực tiễn chuyên sâu trong lĩnh vực quản trị, tài chính và chứng khoán. Ông Biểu tham gia HĐQT Công ty kể từ khi Công ty được thành lập và hoạt động năm 2008 đến nay.\r\n\r\n\r\nÔNG NGUYỄN VIẾT VIỆT\r\nChức danh: Thành viên Hội đồng quản trị\r\n \r\nÔng Nguyễn Viết Việt - Cử nhân Báo chí, Cử nhân Chính trị, Thạc sĩ Chính trị và Cao cấp lý luận chính trị. Ông Việt có thâm niên gần 20 năm trong hoạt động báo chí với các vị trí Thư ký tòa soạn, Tổng thư ký toà soạn, Phó tổng biên tập... Ông hiện đang giữ chức vụ: Tổng Biên tập Tạp chí điện tử Kinh tế Chứng khoán Việt Nam."])</script><script>self.__next_f.push([1,"29:T8c3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTrình độ \u0026 Kiến thức chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp đại học trở lên chuyên ngành: Quản trị kinh doanh, Marketing, Tài chính, Kinh tế hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e• Có kiến thức chuyên sâu về quản lý bán hàng, xây dựng chiến lược thị trường, phát triển khách hàng và thương hiệu.\u003c/p\u003e\u003cp\u003e• Có kiến thức về việc phát triển hệ thống, mạng lưới và đội ngũ nhân sự kinh doanh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tối thiểu 3-5 năm kinh nghiệm trong lĩnh vực kinh doanh, trong đó ít nhất 2 năm ở vị trí quản lý cấp cao (Giám đốc bộ phận kinh doanh, Giám đốc môi giới, Trưởng Phòng Môi giới ) tại các công ty chứng khoán, hoặc công ty kinh doanh dữ liệu tài chính….\u003c/p\u003e\u003cp\u003e• Ưu tiên các ứng viên đã làm việc tại các công ty chứng khoán, có đội ngũ nhân s  VCCI Invest; VINACHEM, VINAPACO, VINAFOOD1, LILAMA và CIENCO4 với tên gọi ban đầu là CTCP Chứng khoán Thương mại và Công nghiệp Việt Nam (VICS). Ngày 01/12/2009, VICS chính thức được niêm yết cổ phiếu tại sở GDCKHN với mã CK là VIG. Trải qua 15 năm hình thành và phát triển, đến nay Công ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam đã được Tập đoàn Đầu tư Thăng Long đầu tư chiến lược, tái cấu trúc thành công và ra mắt thương hiệu mới VISC, với định hướng trở thành một định chế tài chính hàng đầu tại Việt Nam, tham gia vào lĩnh vực kinh doanh dịch vụ chứng khoán, dịch vụ tài chính và ngân hàng đầu tư.\r\n\r\n2. Lịch sử hình thành phát triển:\r\n- 2OO7-2OO8: CTCP Chứng khoán Thương mại và Công nghiệp Việt Nam (VICS) được thành lập với vốn pháp định 150 tỷ đồng; Khai trương văn phòng giao dịch tại Láng Hạ.\r\n- 2OO9-2O1O: VICS là công ty chứng khoán thứ 8 được niêm yết cổ phiếu tại Sở Giao dịch Chứng khoán Hà Nội (HNX) với mã chứng khoán VIG, nhận giải thưởng “ Thương hiệu chứng khoán uy tín năm 2009/2010”.\r\n- 2O11-2O2O: Mở rộng phát triển và thành lập chi nhánh Hà Thành; Tập đoàn Đầu tư Thăng Long thoái vốn tại VICS.\r\n- 2O21-2O22: Tập đoàn đầu tư Thăng Long đầu tư chiến lược và tái cấu trúc thành công, tham gia quản trị điều hành và đổi tên VICS thành Công ty Cổ phần Chứng khoán Đầu tư Tài chính Việt Nam (VISC), tăng vốn lên 451,333,000,000 đồng.\r\n\r\n3. Giá trị cốt lõi: VISC xác định giá trị cốt lõi của doanh nghiệp là “chuyên nghiệp, tận tâm”; với năng lực “công nghệ tiên tiến”; cam kết “gia tăng giá trị” và cùng “chia sẻ thành công” với khách hàng và nhà đầu tư.\r\n- Chuyên nghiệp tận tâm: VISC luôn chú trọng từ tổng thể cho đến chi tiết nhất toàn bộ quá trình xây dựng và phát triển sản phẩm dịch vụ, khách hàng là trung tâm, tận tụy phục vụ khách hàng để mang lại cho khách hàng sự hài lòng tuyệt đối.\r\n- Công nghệ hiện đại: VISC ưu tiên đầu tư áp dụng công nghệ tiên tiến, giao dịch mọi lúc mọi nơi theo chuẩn mực quốc tế để đảm bảo an toàn bảo mật, phát triển và hội nhập.\r\n- Gia tăng giá trị: VISC luôn không ngừng nỗ lực tìm kiếm cơ hội hợp tác phát triển để củng cố và gia tăng chuỗi giá trị của doanh nghiệp.\r\n- Chia sẻ thành công: VISC luôn nắm bắt, chia sẻ cơ hội để cùng đối tác khách hàng hướng tới thành công, coi thành công của khách hàng chính là thước đo sự thành đạt của VISC.\r\n\r\n4. Sứ mệnh:\r\n- Tạo nên những giá trị đích thực bao gồm những sản phẩm dịch vụ chất lượng, giải pháp tài chính tối ưu, hỗ trợ tối đa cho doanh nghiệp và nhà đầu tư.\r\n- Tạo ra giá trị lợi ích và cơ hội gia tăng giá trị cho nhà đầu tư. \r\n\r\n5. Sản phẩm dịch vụ:\r\n- Dịch vụ môi giới chứng khoán\r\n\r\nVISC có đội ngũ chuyên viên môi giới năng động, giàu kinh nghiệm, tư vấn chuyên nghiệp. Sản phẩm dịch vụ đa dạng, cung cấp cho các nhà đầu tư cá nhân và tổ chức. Áp dụng công nghệ trong giao dịch đảm bảo các khoản đầu tư được theo dõi hiệu quả, an toàn. Các sản phẩm, dịch vụ chứng khoán bao gồm: Giao dịch cổ phiếu, Chứng chỉ quỹ, Chứng khoán phái sinh, Trái phiếu. Các dịch vụ hỗ trợ đi kèm như hỗ trợ tài chính, tư vấn đầu tư và quản lý danh mục đầu tư…\r\n\r\n- Dịch vụ Phân tích đầu tư\r\nVISC cung cấp kiến thức và thông tin và mang đến giải pháp tối ưu giúp các nhà đầu tư cá nhân, tổ chức nâng cao hiệu quả đầu tư. Hệ thống các báo cáo phân tích chuyên nghiệp, chuyên sâu và đa dạng, bao gồm báo cáo đánh giá về kinh tế vĩ mô, các báo cáo phân tích ngành, công ty, báo cáo phân tích cơ bản, kỹ thuật và định giá cổ phiếu. Với đội ngũ các chuyên gia phân tích giàu kinh nghiệm, dịch vụ phân tích của VISC hỗ trợ hiệu quả đối với quyết định đâu tư của các nhà đầu tư.\r\n\r\n- Dịch vụ Ngân hàng đầu tư\r\nVISC với đội ngũ cán bộ có nhiều năm kinh nghiệm trong lĩnh vực Định giá, Kiểm toán, Kế toán, Ngân hàng và các lĩnh vực khác, cùng với các đơn vị Liên danh – Liên kết là các Công ty thẩm định giá, Công ty kiểm toán có uy tín hàng đầu tại Việt Nam, VISC cam kết cung cấp cho khách hàng những dịch vụ tốt nhất như dịch vụ thị trường vốn, dịch vụ thị trường nợ, bảo lãnh phát hành, tư vấn tài chính doanh nghiệp, tư vấn mua bán sáp nhập doanh nghiệp  một cách hiệu quả,\r\n\r\n- Dịch vụ tài chính\r\nVới lợi thế được hỗ trợ nguồn lực tài chính từ Tập đoàn Đầu tư Thăng Long, VISC cung cấp các dịch vụ hỗ trợ tài chính linh hoạt hỗ trợ cho khách hàng, nhà đầu tư như giao dịch ký quỹ, ứng trước tiền bán chứng khoán, hợp tác đầu tư, môi giới trái phiếu, repo… và các dịch vụ về nguồn vốn và đầu tư tài chính khác.\r\n\r\n6. Ban lãnh đạo Công ty:\r\n \r\nÔNG NGUYỄN PHÚC LONG\r\nChức danh: Chủ tịch Hội đồng quản trị\r\n \r\nÔng Nguyễn Phúc Long - Cử nhân ngành Tài chính Ngân hàng - Học viện Tài chính Kế toán Hà Nội; Thạc sỹ Quản trị kinh doanh (MBA) - Đại học Preston University (Hoa Kỳ). Ông Long có thâm niên hơn 20 năm kinh nghiệm quản lý trong lĩnh vực tài chính, chứng khoán, đầu tư, bất động sản và truyền thông. Ông là người sáng lập, gây dựng và phát triển Tập đoàn đầu tư Thăng Long (ThangLong Invest Group) cũng như một số tổ chức, doanh nghiệp trong các lĩnh vực khác như Công ty Chứng khoán VICS, Tạp chí điện tử Kinh tế Chứng khoán Việt Nam, HDE Holdings, Hyundai VN CO.LTD,…\r\n\r\nÔng Nguyễn Phúc Long hiện đang đảm nhiệm một số vị trí lãnh đạo tại các tổ chức như: Ủy viên đoàn Chủ tịch Uỷ ban Trung ương Hội Doanh nghiệp Trẻ Việt Nam; Phó Chủ tịch hội Doanh nghiệp trẻ Hà Nội; Chủ tịch Câu lạc bộ Xúc tiến thương mại và Đầu tư Doanh nhân trẻ Việt Nam; Ủy viên BCH Hiệp hội kinh doanh Chứng khoán Việt Nam, Phó chủ tịch HĐBT Tạp chí Điện tử Kinh tế Chứng khoán Việt Nam; Chủ tịch HĐQT một số các doanh nghiệp khác. Chức danh nắm giữ tại các Công ty khác: Chủ tịch Hội đồng quản trị Công ty Cổ phần Đầu tư Thăng Long, Chủ tịch Hội đồng quản trị Công ty Cổ phần Đầu tư Thăng Long Phú Thọ, Chủ tịch HĐTV Công ty TNHH Điện tử và Hàng gia dụng Hyundai Việt Nam.\r\n\r\n \r\nÔNG DƯƠNG QUANG TRUNG\r\nChức danh: Tổng Giám đốc / Phó Chủ tịch Hội đồng quản trị\r\n \r\nÔng Dương Quang Trung - Cử nhân ngành Tài chính Ngân hàng, Học viện Tài chính Kế toán Hà Nội; Thạc sĩ quản trị kinh doanh Đại học Kinh tế - Đại học Quốc gia Hà Nội. Ông Trung đã có gần 25 năm kinh nghiệm trong lĩnh vực tài chính, chứng khoán, từng đảm nhiệm các vị trí quan trọng tại các công ty thuộc lĩnh vực tài chính, chứng khoán như: Trưởng Phòng Kế hoạch và Quản lý Doanh nghiệp - Khối Quản lý và Phát triển Doanh nghiệp Ngân hàng thương mại cổ phần Bưu điện Liên Việt, Tổng Giám đốc Công ty Chứng khoán FLC, Phó Tổng Giám đốc/Giám đốc Tài chính Công ty Chứng khoán Vincom - Tập đoàn VinGroup, Giám đốc tài chính, Kế toán trưởng Công ty Cổ phần Xuất nhập khẩu Hàng không - thuộc VietnamAirlines Group,…\r\n\r\n \r\nBÀ ĐÀO THỊ THANH\r\nChức danh: Thành viên Hội đồng quản trị\r\n \r\nBà Đào Thị Thanh - Thạc sỹ tài chính, Học viện Tài chính. Bà Thanh có nhiều năm kinh nghiệm trong lĩnh vực tài chính, kế toán và đã từng kinh qua nhiều vị trí quan trọng: Phó phòng kế toán tại Công ty Cổ phần đầu tư và xây dựng công trình giao thông 208, Phó Tổng Giám đốc Công ty cổ phần chứng khoán thương mại và công nghiệp Việt Nam, Kế toán trưởng Công ty CP chứng khoán Stanley Brothers, Kế toán trưởng Công ty CP Kem Tràng Tiền…\r\n\r\n\r\nÔNG NGUYỄN XUÂN BIỂU\r\nChức danh: Thành viên Hội đồng quản trị \r\nÔng Nguyễn Xuân Biểu - Cử nhân kinh tế, Đại học Thương mại Hà Nội và Cử nhân Luật, Đại học Luật TP. HCM. Ông Biểu đã có gần 30 năm kinh nghiệm và thực tiễn chuyên sâu trong lĩnh vực quản trị, tài chính và chứng khoán. Ông Biểu tham gia HĐQT Công ty kể từ khi Công ty được thành lập và hoạt động năm 2008 đến nay.\r\n\r\n\r\nÔNG NGUYỄN VIẾT VIỆT\r\nChức danh: Thành viên Hội đồng quản trị\r\n \r\nÔng Nguyễn Viết Việt - Cử nhân Báo chí, Cử nhân Chính trị, Thạc sĩ Chính trị và Cao cấp lý luận chính trị. Ông Việt có thâm niên gần 20 năm trong hoạt động báo chí với các vị trí Thư ký tòa soạn, Tổng thư ký toà soạn, Phó tổng biên tập... Ông hiện đang giữ chức vụ: Tổng Biên tập Tạp chí điện tử Kinh tế Chứng khoán Việt Nam."])</script><style data-styled="" data
