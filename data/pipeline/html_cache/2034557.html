 bề dày hoạt động trong lĩnh vực sản xuất và nghiên cứu các loại phụ kiện ngành cửa, mặt dựng và lan can, các hệ khóa thông minh cho những công trình cao cấp. Tính đến năm 2020 Tổng công ty với hơn 10.000 nhân viên và có hơn 40 công ty con trong và ngoài nước.\r\n\r\nTại thị trường Trung Quốc, kể từ năm 2010, Kin Long đã chín năm liên tiếp được chọn là một trong 500 doanh nghiệp hàng đầu tại tỉnh Quảng Đông. Ngoài ra, Kin Long đã giành giải: Doanh nghiệp xuất sắc của tỉnh Quảng Đông sau 40 năm cải cách mở cửa.Năm 2016, Tổng công ty đã được niêm yết trên thị trường chứng khoán với mã cổ phiếu 002791.\r\n\r\nNăm 2021, Kin Long đứng thứ 349 trong số 500 công ty được niêm yết hàng đầu Trung Quốc, và một lần nữa lọt top danh sách \"500 doanh nghiệp sản xuất hàng đầu tỉnh Quảng Đông\" vươn lên đứng thứ 87 trong bảng xếp hạng. Đồng thời được chọn là \"doanh nghiệp thân thiện\" tại thành phố Đông Quan, và trong 15 năm liên tiếp đạt \"Doanh nghiệp tuân thủ hợp đồng nhất tỉnh Quảng Đông\"; đây là sự ủng hộ và ghi nhận của chính phủ đối với công ty. Kin Long luôn chú trọng đầu tư cho công nghệ, nghiên cứu khoa học và quyền sở hữu trí tuệ, được xếp hạng là “Doanh nghiệp công nghệ cao cấp quốc gia” từ năm 2009.\r\n\r\nTại thị trường Việt Nam, sản phẩm phụ kiện Kin Long đã có mặt trên 10 năm với những công trình tiêu biểu như: Royal City, Vincom Village, Times City, Indochina Plaza, Dolphin Plaza, Tòa nhà Văn phòng Quốc hội, Sân bay Cát Bi Hải Phòng.\r\n\r\nCông ty Kin Long luôn hướng tới quốc tế hóa và phấn đấu trở thành một thương hiệu mang tầm thế giới, là môi trường xứng đáng để gắn bó và phấn đấu.\r\n\r\nVăn Phòng Trụ sở chính Hà Nội:\r\nĐịa chỉ: Tầng 3 TTTM tòa nhà CTM Complex, số 139 Cầu Giấy, Phường Cầu Giấy, TP Hà Nội\r\n\r\nVăn Phòng Chi Nhánh Thành Phố Hồ Chí Minh\r\nĐịa chỉ: Tầng 8 - Tòa nhà Nam Sông Tiền, 180 Nguyễn Văn Trỗi, Phường Phú Nhuận, TP. HCM\r\n\r\nVăn Phòng Đại diện Đà Nẵng\r\nĐịa chỉ: Tầng 4, số 112 Đường 30 Tháng 4, Phường Hòa Cường, Thành phố Đà Nẵng\r\
