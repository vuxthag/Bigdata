hout the project lifecycle and drive the adoption of ISO 19650-compliant BIM Execution Plans (BEP) tailored for high-rise delivery methodologies.\u003c/p\u003e\u003cp\u003eo Establish and govern clear Level of Development (LOD) matrices, naming conventions, and shared coordinate frameworks across all internal disciplines and external consultants.\u003c/p\u003e\u003cp\u003e• CDE Mastery \u0026 Digital Coordination:\u003c/p\u003e\u003cp\u003eo Architect and administer the Autodesk Construction Cloud (ACC) / BIM 360 ecosystem, including rigorous permission management and publishing workflows.\u003c/p\u003e\u003cp\u003eo Lead proactive digital coordination. Conduct comprehensive clash detection (Navisworks / ACC Model Coordination) unifying Architecture, Structure, MEP, and Façade disciplines.\u003c/p\u003e\u003cp\u003eo Act as the final escalation point for complex worksharing, model health, and cloud-sync troubleshooting to ensure zero operational downtime.\u003c/p\u003e\u003cp\u003e• Risk Mitigation \u0026 Code Automation:\u003c/p\u003e\u003cp\u003eo Pioneer the integration of local building codes (QCVN 04, QCVN 06) into model parameters and schedules to automate critical compliance checks (occupant loads, fire compartmentalization, travel distances).\u003c/p\u003e\u003cp\u003eo Conduct rigorous weekly model health audits. Proactively identify and rectify illogical design moves, scale discrepancies, and documentation inconsistencies.\u003c/p\u003e\u003cp\u003e• BIM Asset Delivery (Digital Handover):\u003c/p\u003e\u003cp\u003eo Define, manage, and deliver BIM digital assets in accordance with the BIM Execution Plan (BEP), project milestones, and Employer’s Information Requirements (EIR).\u003c/p\u003e\u003cp\u003eo Ensure all BIM assets (models, drawings, data, parameters, and metadata) are accurate, structured, validated, and compliant for each project stage.\u003c/p\u003e\u003cp\u003eo Coordinate the final delivery of federated, clash-resolved, and data-rich BIM models suitable for construction, as-built documentation, and facility management (FM) use.\u003c/p\u003e\u003cp\u003eo Maintain consistent data integrity across project phases, supporting seamless digital handover at project close-out.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Tc28,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eRole Summary:\u003c/strong\u003e We are seeking a highly analytical and strategic BIM Manager to serve as the \"digital guardrail\" for our complex high-rise and mixed-use projects. Acting as a core operational leader rather than just IT support, you will author the BIM Execution Plan (BEP), architect our Autodesk Construction Cloud (ACC) environment, and drive our vision of 80%+ modular standardization. Your ultimate mandate is to guarantee that our digital assets are highly optimized, clash-resolved, logically sound, and strictly compliant with local/international codes prior to construction.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCore Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• System Architecture \u0026 Standardization (The DNA):\u003c/p\u003e\u003cp\u003eo Design, implement, and govern office Revit templates maximizing modularity and high-rise efficiency (repeatable floor plates, standardized core layouts).\u003c/p\u003e\u003cp\u003eo Curate and optimize the Revit family library. Implement strict quality control to prevent bloated models; mandate the use of clean, parametric, and lightweight components.\u003c/p\u003e\u003cp\u003e• BIM Governance \u0026 BEP Authorship:\u003c/p\u003e\u003cp\u003eo Develop, negotiate, update BEP throughout the project lifecycle and drive the adoption of ISO 19650-compliant BIM Execution Plans (BEP) tailored for high-rise delivery methodologies.\u003c/p\u003e\u003cp\u003eo Establish and govern clear Level of Development (LOD) matrices, naming conventions, and shared coordinate frameworks across all internal disciplines and external consultan
