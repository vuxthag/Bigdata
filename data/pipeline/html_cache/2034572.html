2015, đặc biệt là chứng nhận quản lý chất lượng trong ngành hàng không AS 9100 – Mở ra kỉ nguyên mới cho các sản phẩm của Oristar thâm nhập vào lĩnh vực hàng không đầy tiềm năng nhưng cũng nhiều thử thách, khó khăn tại Việt Nam.\r\nĐặt trụ sở chính tại Hà Nội, hiện nay, Oristar đã có 2 nhà máy với tổng diện tích khoảng 20.000m2 tại Khu công nghiệp Tân Quang- Văn Lâm- Hưng Yên và Khu công nghệ cao Quận 9- TP Hồ Chí Minh, 1 văn phòng đại diện tại Đà Nẵng.\r\nTại Oristar, chúng tôi tin rằng con người là trung tâm của mọi hoạt động kinh doanh. Vì vậy, Oristar mang đến những cơ hội việc làm tuyệt vời nhất đi cùng các chế độ phúc lợi đa dạng nhằm phát triển tối ưu nguồn nhân lực, hướng tới tầm nhìn sâu rộng phát triển doanh nghiệp lớn mạnh hơn nữa trong tương lai."])</script><script>self.__next_f.push([1,"24:T195f,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eCHẾ ĐỘ LƯƠNG - THƯỞNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Lương:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Cấu trúc lương bao gồm:\u003c/em\u003e\u003c/p\u003e\u003cp\u003e+ Lương chức danh (lương tham gia BHXH): bằng 60% lương thoả thuận.\u003c/p\u003e\u003cp\u003e+ Phụ cấp (ăn trưa, xăng xe, điện thoại…).\u003c/p\u003e\u003cp\u003e+ Phụ cấp ca đêm: Bằng 30% tiền lương ngày làm việc bình thường.\u003c/p\u003e\u003cp\u003e+ Thưởng hiệu quả công việc.\u003c/p\u003e\u003cp\u003e\u003cem\u003e- Nguyên tắc chi trả lương:\u003c/em\u003e\u003c/p\u003e\u003cp\u003e+ Lương được trả qua tài khoản ngân hàng trước ngày 8 hàng tháng.\u003c/p\u003e\u003cp\u003e+ Mức lương được xét điều chỉnh 2 LẦN hàng năm hoặc theo kết quả đánh giá đột xuất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thưởng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thưởng thâm niên: đến 10 triệu VNĐ (tuỳ thuộc năm thâm niên).\u003c/p\u003e\u003cp\u003e- Thưởng các dịp lễ, Tết và sự kiện:\u003c/p\u003e\u003cp\u003e+ Thưởng 10/03: 1  triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng 30/04, 01/05:1 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng 02/09: 1 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng Tết dương lịch: 2 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng tháng 13 (tính trên lương thoả thuận).\u003c/p\u003e\u003cp\u003e+ Thưởng sinh nhật công ty.\u003c/p\u003e\u003cp\u003e- Thưởng hiệu quả công việc:\u003c/p\u003e\u003cp\u003e+ Thưởng hiệu quả công việc (KPI) tháng, quý, năm (Tết âm lịch): Mức rất hấp dẫn.\u003c/p\u003e\u003cp\u003e+ Thưởng nóng: đến 22 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng bán hàng khách hàng theo chuỗi cung ứng: đến 20 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng bán hàng khách hàng mới: đến 5 triệu VNĐ/ khách mới.\u003c/p\u003e\u003cp\u003e+ Thưởng bán hàng nước ngoài: đến 10 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng hiệu quả đàm phán công nợ (áp dụng cho nhân sự cung ứng): đến 8 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng hiệu quả đàm phán giảm giá (áp dụng cho nhân sự cung ứng): đến 10 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng tìm NCC mới (áp dụng cho nhân sự cung ứng): đến 10 triệu VNĐ.\u003c/p\u003e\u003cp\u003e- Thưởng sáng kiến, cải tiến:\u003c/p\u003e\u003cp\u003e+ Thưởng sáng kiến, cải tiến (thưởng nóng, thưởng sáng kiến triển vọng, thưởng sáng kiến có nghiệm thu, thưởng sáng kiến bền vững,…).\u003c/p\u003e\u003cp\u003eTổng giá trị thưởng: tối đa 70 triệu VNĐ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHÍNH SÁCH BẢO HIỂM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, thai sản: Theo quy định nhà nước.\u003c/p\u003e\u003cp\u003e2. Bảo hiểm tai nạn 24/24: Áp dụng cho toàn bộ nhân viên chính thức.\u003c/p\u003e\u003cp\u003e3. Bảo hiểm nhân thọ: Cho nhân sự đủ thâm niên (tuỳ từng giai đoạn).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePHÚC LỢI KHÁC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Chăm sóc đời sống nhân viên:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-  Khám sức khỏe, bệnh nghề nghiệp định kỳ hàng năm.\u003c/p\u003e\u003cp\u003e-  Hỗ trợ cơm trưa/cơm ca:1 triệu VNĐ/tháng\u003c/p\u003e\u003cp\u003e-  Phụ cấp đi lại: đến 1 triệu VNĐ/tháng (tuỳ loại phương).\u003c/p\u003e\u003cp\u003e-  Phụ cấp điện thoại: đến 750,000 VNĐ/tháng (tuỳ vị trí).\u003c/p\u003e\u003cp\u003e-  Công tác phí: đến 600.000 VNĐ (tuỳ vị trí).\u003c/p\u003e\u003cp\u003e-  Trợ cấp hiếu: 3 triệu VNĐ/ NLĐ. \u003c/p\u003e\u003cp\u003e-  Trợ cấp hỉ: 3 triệu VNĐ/ NLĐ.\u003c/p\u003e\u003cp\u003e-  Trợ cấp thai sản (đối với cả nam lao động): 3 triệu VNĐ/NLĐ.\u003c/p\u003e\u003cp\u003e-  Trợ cấp ốm đau: đến 5 triệu VNĐ/ lần (tuỳ số ngày nghỉ ốm).\u003c/p\u003e\u003cp\u003e-  Chi trả tiền khách sạn (đến 1.300.000 VNĐ/đêm), đi lại và công tác phí khi phải đi công tác\u003c/p\u003e\u003cp\u003e-  Cấp máy tính/laptop làm việc theo chức danh.\u003c/p\u003e\u003cp\u003e-  Xe đưa đón (tuỳ khu vực).\u003c/p\u003e\u003cp\u003e-  Quà tặng nhân dịp lễ, Tết.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Hoạt động tập thể:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Du lịch, teambuilding trong và ngoài nước hằng năm.\u003c/p\u003e\u003cp\u003e- Year End Party (tổng giải thưởng toàn công ty lên đến 200 triệu VNĐ)\u003c/p\u003e\u003cp\u003e- Các hoạt động nội bộ định kỳ.\u003c/p\u003e\u003cp\u003e- Tổ chức sinh nhật hàng quý.\u003c/p\u003e\u003cp\u003e- Các câu lạc bộ thể thao: bóng đá, gym, pickleball, golf... (được tài trợ kinh phí tham gia lên đến 10 triệu VNĐ/người).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Chính sách đào tạo - phát triển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đào tạo hội nhập cho nhân viên mới.\u003c/p\u003e\u003cp\u003e- Các khóa học nâng cao kỹ năng chuyên môn.\u003c/p\u003e\u003cp\u003e- Các khóa học nâng cao kỹ năng mềm.\u003c/p\u003e\u003cp\u003e- Cơ hội thăng tiến nội bộ rõ ràng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. CBCNV có cơ hội mua cổ phần với giá ưu đãi để trở thành cổ đông của Công ty\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTHỜI GIAN LÀM VIỆC - NGHỈ NGƠI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thời gian làm việc: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Từ thứ Hai đến thứ Bảy (08:00 - 17:00) hoặc (09:00 - 18:00)\u003c/p\u003e\u003cp\u003e+ Khối VP: Nghỉ 2 thứ 7/tháng và 2 thứ 7 làm ½ ngày.\u003c/p\u003e\u003cp\u003e+ Khối SX: 2 thứ 7 làm ½ ngày, các thứ 7 còn lại làm tới 16h00.\u003c/p\u003e\u003cp\u003e- Nghỉ trưa từ 12:00 - 13:00.\u003c/p\u003e\u003cp\u003e- Làm thêm ngày thường: 150%, có hỗ trợ tiền ăn tăng ca.\u003c/p\u003e\u003cp\u003e- Làm thêm ngày nghỉ: 200%, có hỗ trợ tiền ăn tăng ca.\u003c/p\u003e\u003cp\u003e- Làm thêm ngày lễ, tết: 300%, có hỗ trợ tiền ăn tăng ca.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Chế độ nghỉ phép:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Nghỉ phép năm: 12 ngày/năm (được thanh toán tiền phép tồn tuỳ vị trí).\u003c/p\u003e\u003cp\u003e- Nghỉ chế độ ốm: 3 ngày/năm (hưởng nguyên lương).\u003c/p\u003e\u003cp\u003e- Nghỉ khám thai: 5 ngày (BHXH) và 3 ngày Công ty chi trả.\u003c/p\u003e\u003cp\u003e- Nghỉ chế độ hành kinh đối với lao động nữ: 6 ngày/năm.\u003c/p\u003e\u003cp\u003e- Nghỉ lễ, Tết theo Luật lao động.\u003c/p\u003e\u003cp\u003e- Nghỉ kết hôn (bản thân): 3 ngày.\u003c/p\u003e\u003cp\u003e- Nghỉ cưới xin (con đẻ, con nuôi): 1 ngày.\u003c/p\u003e\u003cp\u003e- Nghỉ ma chay (cha, mẹ đẻ, cha mẹ nuôi, vợ chồng, con cái): 3 ngày.\u003c/p\u003e\u003cp\u003e- Nghỉ việc riêng, nghỉ ốm có hưởng BHXH (nếu có giấy tờ liên quan).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu vị trí\u003c/strong\u003e: Chịu trách nhiệm xây dựng và phát triển một đơn vị kinh doanh độc lập (Business Unit) nhằm mở rộng quy mô doanh thu, thị phần và hệ sinh thái kinh doanh của công ty thông qua ba trụ cột Tết âm lịch): Mức rất hấp dẫn.\u003c/p\u003e\u003cp\u003e+ Thưởng nóng: đến 22 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng bán hàng khách hàng theo chuỗi cung ứng: đến 20 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng bán hàng khách hàng mới: đến 5 triệu VNĐ/ khách mới.\u003c/p\u003e\u003cp\u003e+ Thưởng bán hàng nước ngoài: đến 10 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng hiệu quả đàm phán công nợ (áp dụng cho nhân sự cung ứng): đến 8 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng hiệu quả đàm phán giảm giá (áp dụng cho nhân sự cung ứng): đến 10 triệu VNĐ.\u003c/p\u003e\u003cp\u003e+ Thưởng tìm NCC mới (áp dụng cho nhân sự cung ứng): đến 10 triệu VNĐ.\u003c/p\u003e\u003cp\u003e- Thưởng sáng kiến, cải tiến:\u003c/p\u003e\u003cp\u003e+ Thưởng sáng kiến, cải tiến (thưởng nóng, thưởng sáng kiến triển vọng, thưởng sáng kiến có nghiệm thu, thưởng sáng kiến bền vững,…).\u003c/p\u003e\u003cp\u003eTổng giá trị thưởng: tối đa 70 triệu VNĐ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHÍNH SÁCH BẢO HIỂM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Bảo hiểm xã hội, bảo hiểm y tế, bảo hiểm thất nghiệp, thai sản: Theo quy định nhà nước.\u003c/p\u003e\u003cp\u003e2. Bảo hiểm tai nạn 24/24: Áp dụng cho toàn bộ nhân viên chính thức.\u003c/p\u003e\u003cp\u003e3. Bảo hiểm nhân thọ: Cho nhân sự đủ thâm niên (tuỳ từng giai đoạn).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePHÚC LỢI KHÁC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Chăm sóc đời sống nhân viên:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-  Khám sức khỏe, bệnh nghề nghiệp định kỳ hàng năm.\u003c/p\u003e\u003cp\u003e-  Hỗ trợ cơm trưa/cơm ca:1 triệu VNĐ/tháng\u003c/p\u003e\u003cp\u003e-  Phụ cấp đi lại: đến 1 triệu VNĐ/tháng (tuỳ loại phương).\u003c/p\u003e\u003cp\u003e-  Phụ cấp điện thoại: đến 750,000 VNĐ/tháng (tuỳ vị trí).\u003c/p\u003e\u003cp\u003e-  Công tác phí: đến 600.000 VNĐ (tuỳ vị trí).\u003c/p\u003e\u003cp\u003e-  Trợ cấp hiếu: 3 triệu VNĐ/ NLĐ. \u003c/p\u003e\u003cp\u003e-  Trợ cấp hỉ: 3 triệu VNĐ/ NLĐ.\u003c/p\u003e\u003cp\u003e-  Trợ cấp thai sản (đối với cả nam lao động): 3 triệu VNĐ/NLĐ.\u003c/p\u003e\u003cp\u003e-  Trợ cấp ốm đau: đến 5 triệu VNĐ/ lần (tuỳ số ngày nghỉ ốm).\u003c/p\u003e\u003cp\u003e-  Chi trả tiền khách sạn (đến 1.300.000 VNĐ/đêm), đi lại và công tác phí khi phải đi công tác\u003c/p\u003e\u003cp\u003e-  Cấp máy tính/laptop làm việc theo chức danh.\u003c/p\u003e\u003cp\u003e-  Xe đưa đón (tuỳ khu vực).\u003c/p\u003e\u003cp\u003e-  Quà tặng nhân dịp lễ, Tết.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Hoạt động tập thể:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Du lịch, teambuilding trong và ngoài nước hằng năm.\u003c/p\u003e\u003cp\u003e- Year End Party (tổng giải thưởng toàn công ty lên đến 200 triệu VNĐ)\u003c/p\u003e\u003cp\u003e- Các hoạt động nội bộ định kỳ.\u003c/p\u003e\u003cp\u003e- Tổ chức sinh nhật hàng quý.\u003c/p\u003e\u003cp\u003e- Các câu lạc bộ thể thao: bóng đá, gym, pickleball, golf... (được tài trợ kinh phí tham gia lên đến 10 triệu VNĐ/người).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Chính sách đào tạo - phát triển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đào tạo hội nhập cho nhân viên mới.\u003c/p\u003e\u003cp\u003e- Các khóa học nâng cao kỹ năng chuyên môn.\u003c/p\u003e\u003cp\u003e- Các khóa học nâng cao kỹ năng mềm.\u003c/p\u003e\u003cp\u003e- Cơ hội thăng tiến nội bộ rõ ràng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. CBCNV có cơ hội mua cổ phần với giá ưu đãi để trở thành cổ đông của Công ty\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTHỜI GIAN LÀM VIỆC - NGHỈ NGƠI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thời gian làm việc: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Từ thứ Hai đến thứ Bảy (08:00 - 17:00) hoặc (09:00 - 18:00)\u003c/p\u003e\u003cp\u003e+ Khối VP: Nghỉ 2 thứ 7/tháng và 2 thứ 7 làm ½ n
