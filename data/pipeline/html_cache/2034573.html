tin doanh nghiệp,…)\u003c/p\u003e\u003cp\u003e- Thực hiện việc phân tích và đánh giá hiệu quả của từng kênh tuyển dụng\u003c/p\u003e\u003cp\u003e- Tham gia sàng lọc hồ sơ (với các vị trí yêu cầu đặc thù)\u003c/p\u003e\u003cp\u003e- Tham gia phỏng vấn ứng viên đã qua vòng sàng lọc hồ sơ và vòng kiểm tra kiến thức, kỹ năng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Công tác đánh giá và xây dựng quan hệ lao động\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng, phổ biến, lưu trữ và chia sẻ hệ thống đánh giá năng lực (từ điển, khung năng lực, phiếu đánh giá năng lực…)\u003c/p\u003e\u003cp\u003e- Theo dõi, tìm hiểu và báo cáo về tâm tư nguyện vọng, ý kiến phản hồi của cán bộ nhân viên\u003c/p\u003e\u003cp\u003e- Báo cáo và đề xuất phương án giải quyết khiếu nại, thắc mắc, bất mãn liên quan đến quan hệ lao động và chế độ chính sách.\u003c/p\u003e\u003cp\u003e- Tham gia đề xuất các biện pháp cần thiết để cải thiện các mối quan hệ lao động.\u003c/p\u003e\u003cp\u003e- Thực hiện các quyết định điều chỉnh về chế độ chính sách đã được duyệt để xây dựng và duy trì các mối quan hệ lao động hài hòa.\u003c/p\u003e\u003cp\u003e- Tổ chức phỏng vấn, thu thập và tổng hợp phiếu khảo sát nhân sự nghỉ việc để phân tích và đề xuất điều chỉnh chính sách đối với CBNV\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Công tác lao động tiền lương\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tìm hiểu, thu thập và tổng hợp thông tin về tình hình tiền lương trên thị trường lao động.\u003c/p\u003e\u003cp\u003e- Thống kê và cung cấp số liệu để làm cơ sở xây dựng hoặc điều chỉnh hệ thống thang bảng lương và xác định tổng quỹ lương hàng năm.\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng hệ thống thang bảng lương và cơ cấu tiền lương phù hợp với từng vị trí.\u003c/p\u003e\u003cp\u003e- Tham mưu, đề xuất xây dựng phương án lương kinh doanh hàng tháng.\u003c/p\u003e\u003cp\u003e- Phân công xây dựng và hoàn thiện các văn bản áp dụng.\u003c/p\u003e\u003cp\u003e- Lập bảng tính và thực hiện tính toán chi trả lương kinh doanh hàng tháng (mảng dịch vụ cảng và mảng nhựa đường).\u003c/p\u003e\u003cp\u003e- Tham gia tổ chức các hoạt động truyền thông nội bộ về chính sách lương thưởng, khen thưởng và động viên nhân viên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Công tác phúc lợi và chế độ chính sách\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thăm hỏi trực tiếp động viên nhân viên (thai sản, hiếu hỉ, ốm đau, tai nạn...).\u003c/p\u003e\u003cp\u003e- Tham mưu xây dựng các chính sách, phương thức khen thưởng để tạo động lực cho người lao động.\u003c/p\u003e\u003cp\u003e- Tổ chức các sự kiện nhằm động viên người lao động (du xuân, thăm quan nghỉ mát, sinh nhật tháng, tất niên cuối năm, 8/3, 20/10…).\u003c/p\u003e\u003cp\u003e- Tìm hiểu, thu thập và báo cáo các thông tin liên quan đến cảm nhận của CBNV đối với chế độ đãi ngộ và chính sách khen thưởng động viên\u003c/p\u003e\u003cp\u003e- Giải đáp thắc mắc của cán bộ nhân viên về cơ chế, chính sách, chế độ đãi ngộ của tập đoàn và các đơn vị có liên quan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Công tác bảo hiểm CBCNV\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phổ biến và hướng dẫn cho người lao động các quy định pháp luật về chế độ BHXH, BHYT, BHTN, TNLĐ\u003c/p\u003e\u003cp\u003e- Làm việc với các đoàn thanh kiểm tra việc thực hiện chế độ BHXH, BHYT, BHTN-BNN tại Công ty.\u003c/p\u003e\u003cp\u003e- Làm việc với các đoàn thanh kiểm tra liên quan đến TNLĐ, giải quyết các chế độ TNLĐ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Công tác khen thưởng và kỷ luật\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tập hợp các hồ sơ để xử lý kỷ luật (BBHT, BTT, camera, hình ảnh,…)\u003c/p\u003e\u003cp\u003e- Tham gia các cuộc họp kỷ luật\u003c/p\u003e\u003cp\u003e- Đề xuất hình thức kỷ luật\u003c/p\u003e\u003cp\u003e- Triển khai xây dựng các phương án thưởng định kỳ, thưởng đột xuất\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Công tác lập kế hoạch và triển khai thực hiện các kế hoạch\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham gia lập kế hoạch hàng năm của công ty.\u003c/p\u003e\u003cp\u003e- Xây dựng bảng đánh giá KPI công ty và bảo vệ bảng tính trước Hội đồng đánh giá.\u003c/p\u003e\u003cp\u003e- Tiếp nhận và tổng hợp tình hình thực hiện các mục tiêu công ty, đánh giá KPI Công ty định kỳ.\u003c/p\u003e\u003cp\u003e- Xây dựng và triển khai các mục tiêu của phòng, phân bổ theo quý/tháng và phân bổ tới từng thành viên trong phòng.\u003c/p\u003e\u003cp\u003e- Theo dõi kết quả thực hiện nhiệm vụ của các cá nhân trong bộ phận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Công tác ISO, quy trình, quy định\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng, phân công xây dựng các văn bản, quy chế, quy định của phòng và của Công ty thuộc mảng công việc do phòng phụ trách (NQLĐ, TƯLĐTT, …)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e9. Công tác tổ chức cán bộ và điều hành hoạt động của phòng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban điều hành về việc bố trí lao động cho phù hợp với yêu cầu của từng giai đoạn, đảm bảo sử dụng lao động hiệu quả, tiết kiệm\u003c/p\u003e\u003cp\u003e- Triển khai sắp xếp, tổ chức lại nhân sự theo kế hoạch được duyệt, làm việc trực tiếp với người lao động, giải quyết chế độ hợp lý\u003c/p\u003e\u003cp\u003e- Giám sát, chỉ đạo, điều hành các công việc của các nhân sự trong phòng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e10. Công tác quản trị hành chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tổ chức chỉ đạo, triển khai công tác mua sắm trang thiết bị hành chính: thiết bị văn phòng, VPP, phiếu năng suất, quà tặng, ….\u003c/p\u003e\u003cp\u003e- Tham gia tổ chức các sự kiện của khách hàng khi có chỉ đạo\u003c/p\u003e\u003cp\u003e- Chỉ đạo thực hiện các công việc khác khi có phát sinh\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e11. Nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thống kê, phân tích số liệu nhân sự phục vụ báo cáo quản trị định kỳ và báo cáo gửi BNS TTG.\u003c/p\u003e\u003cp\u003e- Tham gia các dự án liên quan đến quản trị nguồn nhân lực (ví dụ xây dựng hệ thống KPI, văn hóa doanh nghiệp…).\u003c/p\u003e\u003cp\u003e- Tham gia làm việc với các đoàn thanh, kiểm tra về các lĩnh vực khác theo yêu cầu\u003c/p\u003e\u003cp\u003e- Tiếp nhận và rà soát nhu cầu về email từ các bộ phận, đề xuất cấp mới, sửa đổi, thu hồi, hủy bỏ các địa chỉ email…\u003c/p\u003e\u003cp\u003e- Các nhiệm vụ khác theo yêu cầu của Ban điều hành\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Ta02,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp đại học trở lên, thuộc các chuyên ngành quản trị doanh nghiệp, quản trị kinh doanh, quản trị nhân sự, Cử nhân Kinh tế hoặc tương đương.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kiến thức và kỹ năng cần thiết trong công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kiến thức cơ bản về các loại hình sản phẩm dịch vụ công ty đang hoặc dự kiến kinh doanh.\u003c/p\u003e\u003cp\u003e- Am hiểu về Luật Lao động và các văn bản quy phạm pháp luật trong lĩnh vực lao động, có khả năng vận dụng tốt vào các hoạt động sản xuất kinh doanh của công ty.\u003c/p\u003e\u003cp\u003e- Kiến thức cơ bản về tài chính doanh nghiệp và các phương pháp đo lường hiệu quả công việc.\u003c/p\u003e\u003cp\u003e- Nắm vững các quy trình vận hành sản xuất, kinh doanh và tác nghiệp.\u003c/p\u003e\u003cp\u003e- Khả năng làm việc một cách chuyên nghiệp và đa nhiệm.\u003c/p\u003e\u003cp\u003e- Khả năng hoạch định ngân sách và kiểm soát chi phí bộ phận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức và kỹ năng cần thiết trong công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kỹ năng tổ chức, kỹ năng lãnh đạo và khả năng động viên cán bộ nhân viên.\u003c/p\u003e\u003cp\u003e- Kỹ năng quản lý dự án và kỹ năng quản lý thời gian tốt.\u003c/p\u003e\u003cp\u003e- Khả năng phân tích, đề xuất giải pháp và xử lý các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e- Khả năng tạo dựng, duy trì và phát triển các mối quan hệ hợp tác.\u003c/p\u003e\u003cp\u003e- Kỹ năng tổng hợp, phân tích và báo cáo tốt.\u003c/p\u003e\u003cp\u003e- Kỹ năng trao đổi thông tin, giao tiếp và thuyết trình.\u003c/p\u003e\u003cp\u003e- Kỹ năng thương lượng và đàm phán.\u003c/p\u003e\u003cp\u003e- Thành thạo tin học văn phòng MS Office.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kinh nghiệm công tác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có ít nhất 05 năm liên tục đảm nhiệm\u003c/p\u003e\u003cp\u003e- Từng có kinh nghiệm triển khai các chiến lược và kế hoạch sản xuất kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Phẩm chất cá nhân:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có tư duy chiến lược, suy luận logic và nhạy bén.\u003c/p\u003e\u003cp\u003e- Chuyên nghiệp, hướng đến các mục tiêu và kết quả công việc.\u003c/p\u003e\u003cp\u003e- Chủ động, nhiệt huyết, có tinh thần trách nhiệm cao, chuẩn mực và đạo đức.\u003c/p\u003e\u003cp\u003e- Có tố chất lãnh đạo, không ngại khó khăn và kiên định.\u003c/p\u003e\u003cp\u003e- Tinh thần đổi mới, sáng tạo và cầu tiến.\u003c/p\u003e\u003cp\u003e- Đáng tin cậy, gần gũi và thân thiện với mọi người.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"27:T1f80,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Vai trò\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Là cán bộ quản lý, điều hành do TGĐ bổ nhiệm, miễn nhiệm, khen thưởng, kỷ luật; chịu trách nhiệm trước BLĐ về toàn bộ hoạt động của phòng.\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm phụ trách chung cho toàn bộ hoạt động của Phòng.\u003c/p\u003e\u003cp\u003e- Tổ chức phân công, điều hành mọi hoạt động của Phòng.\u003c/p\u003e\u003cp\u003e- Chỉ đạo và trực tiếp giải quyết các phát sinh liên quan đến các nhiệm vụ của Phòng.\u003c/p\u003e\u003cp\u003e- Thiết lập cơ chế điều hành, báo cáo, phản hồi thông tin giữa các cấp, giữa các bộ phận trong phạm vi quản lý của Phòng.\u003c/p\u003e\u003cp\u003e- Nghiên cứu, xây dựng và hoàn thiện các quy trình, thủ tục, biểu mẫu phục vụ cho việc quản nhân sự, tiền lương, hành chính.\u003c/p\u003e\u003cp\u003e- Tổ chức phổ biến và hướng dẫn, giám sát thực hiện đúng theo Quy trình đã thiết lập.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Trách nhiệm và nhiệm vụ cụ thể\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Công tác Tuyển dụng nhân sự\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tìm kiếm, liên hệ và đàm phán với các nhà cung cấp dịch vụ tuyển dụng, tư vấn nhân sự…\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng hình ảnh và thương hiệu tuyển dụng của công ty trên thị trường lao động (thực hiện các bài khảo sát, cập nhật thông tin doanh nghiệp,…)\u003c/p\u003e\u003cp\u003e- Thực hiện việc phân tích và đánh giá hiệu quả của từng kênh tuyển dụng\u003c/p\u003e\u003cp\u003e- Tham gia sàng lọc hồ sơ (với các vị trí yêu cầu đặc thù)\u003c/p\u003e\u003cp\u003e- Tham gia phỏng vấn ứng viên đã qua vòng sàng lọc hồ sơ và vòng kiểm tra kiến thức, kỹ năng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Công tác đánh giá và xây dựng quan hệ lao động\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng, phổ biến, lưu trữ và chia sẻ hệ thống đánh giá năng lực (từ điển, khung năng lực, phiếu đánh giá năng lực…)\u003c/p\u003e\u003cp\u003e- Theo dõi, tìm hiểu và báo cáo về tâm tư nguyện vọng, ý kiến phản hồi của cán bộ nhân viên\u003c/p\u003e\u003cp\u003e- Báo cáo và đề xuất phương án giải quyết khiếu nại, thắc mắc, bất mãn liên quan đến quan hệ lao động và chế độ chính sách.\u003c/p\u003e\u003cp\u003e- Tham gia đề xuất các biện pháp cần thiết để cải thiện các mối quan hệ lao động.\u003c/p\u003e\u003cp\u003e- Thực hiện các quyết định điều chỉnh về chế độ chính sách đã được duyệt để xây dựng và duy trì các mối quan hệ lao động hài hòa.\u003c/p\u003e\u003cp\u003e- Tổ chức phỏng vấn, thu thập và tổng hợp phiếu khảo sát nhân sự nghỉ việc để phân tích và đề xuất điều chỉnh chính sách đối với CBNV\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Công tác lao động tiền lương\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tìm hiểu, thu thập và tổng hợp thông tin về tình hình tiền lương trên thị trường lao động.\u003c/p\u003e\u003cp\u003e- Thống kê và cung cấp số liệu để làm cơ sở xây dựng hoặc điều chỉnh hệ thống thang bảng lương và xác định tổng quỹ lương hàng năm.\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng hệ thống thang bảng lương và cơ cấu tiền lương phù hợp với từng vị trí.\u003c/p\u003e\u003cp\u003e- Tham mưu, đề xuất xây dựng phương án lương kinh doanh hàng tháng.\u003c/p\u003e\u003cp\u003e- Phân công xây dựng và hoàn thiện các văn bản áp dụng.\u003c/p\u003e\u003cp\u003e- Lập bảng tính và thực hiện tính toán chi trả lương kinh doanh hàng tháng (mảng dịch vụ cảng và mảng nhựa đường).\u003c/p\u003e\u003cp\u003e- Tham gia tổ chức các hoạt động truyền thông nội bộ về chính sách lương thưởng, khen thưởng và động viên nhân viên.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Công tác phúc lợi và chế độ chính sách\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thăm hỏi trực tiếp động viên nhân viên (thai sản, hiếu hỉ, ốm đau, tai nạn...).\u003c/p\u003e\u003cp\u003e- Tham mưu xây dựng các chính sách, phương thức khen thưởng để tạo động lực cho người lao động.\u003c/p\u003e\u003cp\u003e- Tổ chức các sự kiện nhằm động viên người lao động (du xuân, thăm quan nghỉ mát, sinh nhật tháng, tất niên cuối năm, 8/3, 20/10…).\u003c/p\u003e\u003cp\u003e- Tìm hiểu, thu thập và báo cáo các thông tin liên quan đến cảm nhận của CBNV đối với chế độ đãi ngộ và chính sách khen thưởng động viên\u003c/p\u003e\u003cp\u003e- Giải đáp thắc mắc của cán bộ nhân viên về cơ chế, chính sách, chế độ đãi ngộ của tập đoàn và các đơn vị có liên quan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Công tác bảo hiểm CBCNV\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phổ biến và hướng dẫn cho người lao động các quy định pháp luật về chế độ BHXH, BHYT, BHTN, TNLĐ\u003c/p\u003e\u003cp\u003e- Làm việc với các đoàn thanh kiểm tra việc thực hiện chế độ BHXH, BHYT, BHTN-BNN tại Công ty.\u003c/p\u003e\u003cp\u003e- Làm việc với các đoàn thanh kiểm tra liên quan đến TNLĐ, giải quyết các chế độ TNLĐ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Công tác khen thưởng và kỷ luật\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tập hợp các hồ sơ để xử lý kỷ luật (BBHT, BTT, camera, hình ảnh,…)\u003c/p\u003e\u003cp\u003e- Tham gia các cuộc họp kỷ luật\u003c/p\u003e\u003cp\u003e- Đề xuất hình thức kỷ luật\u003c/p\u003e\u003cp\u003e- Triển khai xây dựng các phương án thưởng định kỳ, thưởng đột xuất\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Công tác lập kế hoạch và triển khai thực hiện các kế hoạch\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham gia lập kế hoạch hàng năm của công ty.\u003c/p\u003e\u003cp\u003e- Xây dựng bảng đánh giá KPI công ty và bảo vệ bảng tính trước Hội đồng đánh giá.\u003c/p\u003e\u003cp\u003e- Tiếp nhận và tổng hợp tình hình thực hiện các mục tiêu công ty, đánh giá KPI Công ty định kỳ.\u003c/p\u003e\u003cp\u003e- Xây dựng và triển khai các mục tiêu của phòng, phân bổ theo quý/tháng và phân bổ tới từng thành viên trong phòng.\u003c/p\u003e\u003cp\u003e- Theo dõi kết quả thực hiện nhiệm vụ của các cá nhân trong bộ phận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Công tác ISO, quy trình, quy định\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng, phân công xây dựng các văn bản, quy chế, quy định của phòng và của Công ty thuộc mảng công việc do phòng phụ trách (NQLĐ, TƯLĐTT, …)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e9. Công tác tổ chức cán bộ và điều hành hoạt động của phòng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban điều hành về việc bố trí lao động cho phù hợp với yêu cầu của từng giai đoạn, đảm bảo sử dụng lao động hiệu quả, tiết kiệm\u003c/p\u003e\u003cp\u003e- Triển khai sắp xếp, tổ chức lại nhân sự theo kế hoạch được duyệt, làm việc trực tiếp với người lao động, giải quyết chế độ hợp lý\u003c/p\u003e\u003cp\u003e- Giám sát, chỉ đạo, điều hành các công việc của các nhân sự trong phòng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e10. Công tác quản trị hành chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tổ chức chỉ đạo, triển khai công tác mua sắm trang thiết bị hành chính: thiết bị văn phòng, VPP, phiếu năng suất, quà tặng, ….\u003c/p\u003e\u003cp\u003e- Tham gia tổ chức các sự kiện của khách hàng khi có chỉ đạo\u003c/p\u003e\u003cp\u003e- Chỉ đạo thực hiện các công việc khác khi có phát sinh\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e11. Nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thống kê, phân tích số liệu nhân sự phục vụ báo cáo quản trị định kỳ và báo cáo gửi BNS TTG.\u003c/p\u003e\u003cp\u003e- Tham gia các dự án liên quan đến quản trị nguồn nhân lực (ví dụ xây dựng hệ thống KPI, văn hóa doanh nghiệp…).\u003c/p\u003e\u003cp\u003e- Tham gia làm việc với các đoàn thanh, kiểm tra về các lĩnh vực khác theo yêu cầu\u003c/p\u003e\u003cp\u003e- Tiếp nhận và rà soát nhu cầu về email từ các bộ phận, đề xuất cấp mới, sửa đổi, thu hồi, hủy bỏ các địa chỉ email…\u003c/p\u003e\u003cp\u003e- Các nhiệm vụ khác theo yêu cầu của Ban điều hành\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:Ta02,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp đại học trở lên, thuộc các chuyên ngành quản trị doanh nghiệp, quản trị kinh doanh, quản trị nhân sự, Cử nhân Kinh tế hoặc tương đương.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kiến thức và kỹ năng cần thiết trong công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Kiến thức cơ bản về các loại hình sản phẩm dịch vụ công ty đang hoặc dự kiến kinh doanh.\u003c/p\u003e\u003cp\u003e- Am hiểu về Luật Lao động và các văn bản quy phạm pháp luật trong lĩnh vực l
