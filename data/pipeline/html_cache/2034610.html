n5. Công nghệ cao24:Td7d,"])</script><script>self.__next_f.push([1,"\u003cp\u003eChúng tôi đang tìm các nhân tài phù hợp với vị trí \u003cstrong\u003eGiám Đốc Phòng Kinh doanh Than\u003c/strong\u003e để cùng Stavian #GOGLOBAL với tiêu chí \u0026 công việc như sau:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm xây dựng và triển khai chiến lược kinh doanh mảng than tại thị trường Việt Nam, bao gồm:\u003cstrong\u003eThan cốc, than nửa cốc, Than mỡ luyện cốc, Than nhiệt, Than sinh học\u003c/strong\u003e; phát triển khách hàng, quản trị doanh số – lợi nhuận, kiểm soát rủi ro thương mại và điều hành hoạt động kinh doanh của Ban nhằm đảm bảo hiệu quả, tăng trưởng bền vững.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm chính: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng chiến lược, kế hoạch kinh doanh ngắn hạn, trung hạn và dài hạn cho mảng \u003cstrong\u003ethan nhiệt\u003c/strong\u003e và \u003cstrong\u003ethan cốc\u003c/strong\u003e tại thị trường Việt Nam.\u003c/p\u003e\u003cp\u003e- Phát triển và mở rộng hệ thống khách hàng B2B, tập trung vào các nhóm khách hàng sử dụng than cho \u003cstrong\u003enhiệt điện, xi măng, thép, luyện kim, công nghiệp nặng\u003c/strong\u003e và các ngành liên quan.\u003c/p\u003e\u003cp\u003e- Tìm kiếm, đàm phán, thiết lập và duy trì quan hệ với khách hàng chiến lược, đối tác cung ứng, đơn vị logistics, cảng và các bên liên quan nhằm đảm bảo nguồn hàng và hiệu quả thương mại.\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm về \u003cstrong\u003edoanh số, sản lượng, lợi nhuận, công nợ \u003c/strong\u003evà hiệu quả kinh doanh của Ban Than theo chỉ tiêu được giao.\u003c/p\u003e\u003cp\u003e- Phân tích thị trường, xu hướng cung – cầu, biến động giá, chính sách ngành, đối thủ cạnh tranh và nhu cầu khách hàng để đề xuất định hướng kinh doanh phù hợp.\u003c/p\u003e\u003cp\u003e- Đề xuất chính sách giá bán, phương án thương mại, cơ chế bán hàng và chiến lược phát triển thị trường phù hợp với từng phân khúc khách hàng.\u003c/p\u003e\u003cp\u003e- Trực tiếp tham gia đàm phán các hợp đồng thương mại lớn; kiểm soát điều khoản thương mại, thanh toán, giao nhận, chất lượng hàng hóa và các rủi ro phát sinh trong quá trình thực hiện hợp đồng.\u003c/p\u003e\u003cp\u003e- Phối hợp với các bộ phận liên quan như \u003cstrong\u003eMua hàng, Logistics, Tài chính, Pháp chế, Quản lý rủi ro\u003c/strong\u003e để đảm bảo tiến độ giao hàng, chất lượng, thu hồi công nợ và hiệu quả vận hành.\u003c/p\u003e\u003cp\u003e- Quản lý, đào tạo, phát triển đội ngũ nhân sự thuộc Ban Than; xây dựng cơ chế giao việc, giám sát hiệu quả và thúc đẩy đội ngũ hoàn thành mục tiêu.\u003c/p\u003e\u003cp\u003e- Kiểm soát và tối ưu toàn bộ quy trình kinh doanh, từ phát triển khách hàng, chào giá, đàm phán, ký kết hợp đồng đến giao hàng và chăm sóc sau bán.\u003c/p\u003e\u003cp\u003e- Đại diện Ban Than làm việc với đối tác, khách hàng, hiệp hội ngành hàng và các cơ quan liên quan khi cần thiết.\u003c/p\u003e\u003cp\u003e- Thực hiện các báo cáo định kỳ/đột xuất về kết quả kinh doanh, kế hoạch triển khai và các đề xuất chiến lược cho Ban Lãnh đạo.\u003c/p\u003e\u003cp\u003e- Thực hiện các nhiệm vụ khác theo phân công của cấp có thẩm quyền.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tb21,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTrình độ học vấn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên, ưu tiên các chuyên ngành: \u003cstrong\u003eKinh tế, Thương mại, Ngoại thương, Quản trị kinh doanh, Logistics, Năng lượng, Luyện kim, Khoáng sản\u003c/strong\u003e hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e
