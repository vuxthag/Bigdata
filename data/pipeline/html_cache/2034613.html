/9, 20/10, tết dương lịch…).\u003c/p\u003e\u003cp\u003e-\tDu lịch hàng năm, khám sức khỏe định kỳ\u003c/p\u003e\u003cp\u003e-\tLàm việc 40h/ 1 tuần từ Thứ 2 – 6. Thời gian làm việc linh hoạt 1 giờ cho mỗi ngày\u003c/p\u003e\u003cp\u003e-\t12 ngày phép/ năm và tăng theo quy định của pháp luật\u003c/p\u003e\u003cp\u003e-\tĐược làm việc với đội ngũ nhân viên giàu kinh nghiệm và môi trường làm việc năng động, chuyên nghiệp, chia sẻ, đồng hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eỨng viên quan tâm xin gửi hồ sơ tuyển dụng gồm: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tCV \u003c/p\u003e\u003cp\u003e-\tĐơn xin việc \u003c/p\u003e\u003cp\u003e-\tBằng tốt nghiệp đại học (bản copy)\u003c/p\u003e\u003cp\u003e-\tBảng kết quả học tập (bản copy)\u003c/p\u003e\u003cp\u003e-\tCác hồ sơ liên quan khác sẽ được yêu cầu bổ sung sau khi trúng tuyển\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eỨng viên có thể nộp hồ sơ trực tuyến (gộp tất cả giấy tờ vào 1 file đính kèm) hoặc nộp trực tiếp đến công ty theo địa chỉ: \u003c/strong\u003ePhòng nhân sự - Công ty TNHH CTCI Việt Nam\u003c/p\u003e\u003cp\u003eTầng 6, toà nhà Charmvit, 117 Trần Duy Hưng, Phường Yên Hòa, Hà Nội\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTên người liên hệ: \u003c/strong\u003eMs. Lan Anh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T6ef,CTCI Vietnam Company Ltd., (CTCI Việt Nam) là công ty con của Tập đoàn CTCI Đài Loan, có 100% vốn đầu tư nước ngoài  (tiền thân là Công ty TNHH Tư Vấn Thiết Kế CIMAS, liên doanh giữa Tổng công ty Lắp máy Việt Nam, tập đoàn CTCI - tổng thầu EPC lớn nhất Đài Loan và Công ty Kỹ thuật Sincerity).\r\nKể từ khi thành lập năm 2001, CTCI Việt Nam đã cung cấp các dịch vụ Thiết kế, Mua sắm và Xây dựng cho một loạt các dự án trong ngoài nước trong lĩnh vực lọc hóa dầu, năng lượng, môi trường, cơ sở hạ tầng, ...\r\nVới lợi thế về
