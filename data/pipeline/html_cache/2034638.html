u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDevelop and manage two core customer segments:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tB2C (Individual Clients):\u003c/strong\u003e families, children, young professionals, senior residents, and tourists.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tB2B (Corporate Clients):\u003c/strong\u003e companies and multinational organizations, embassies and NGOs, international schools, and hospitality partners.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities include:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tIdentify and approach potential clients across residential communities and business districts in Hanoi.\u003c/p\u003e\u003cp\u003e•\tPromote FMP healthcare services through targeted outreach and networking activities.\u003c/p\u003e\u003cp\u003e•\tIntroduce customized wellness programs including:\u003c/p\u003e\u003cp\u003eo\tPediatric care and family wellness\u003c/p\u003e\u003cp\u003eo\tPreventive screenings and vaccination programs\u003c/p\u003e\u003cp\u003eo\tChronic care and senior health management\u003c/p\u003e\u003cp\u003eo\tCorporate health check-ups individual checkups, work permit and other screening initiatives\u003c/p\u003e\u003cp\u003e•\tGenerate leads through events, partnerships, presentations, and networking opportunities.\u003c/p\u003e\u003cp\u003e•\tBuild and maintain relationships with expatriate organizations and international businesses.\u003c/p\u003e\u003cp\u003e•\tEstablish referral networks with embassies, schools, relocation agencies, and hotels.\u003c/p\u003e\u003cp\u003e•\tSupport the growth of FMP’s check-up services, targeting 150+ patients per month.\u003c/p\u003e\u003cp\u003e•\tSupport the growth of FMP’s prime care services targeting 300 patients per month.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eB. Marketing \u0026 Communications\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePublic Relations \u0026 Brand Development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tSupport integrated marketing communication strategies to increase brand visibility.\u003c/p\u003e\u003cp\u003e•\tAssist with PR initiatives and media engagement across traditional and digital platforms.\u003c/p\u003e\u003cp\u003e•\tEnsure consistent brand representation across marketing materials and campaigns.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarketing Operations\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCoordinate marketing initiatives with internal departments and external vendors.\u003c/p\u003e\u003cp\u003e•\tSupport the production of marketing materials aligned with brand guidelines.\u003c/p\u003e\u003cp\u003e•\tAssist in organizing:\u003c/p\u003e\u003cp\u003eo\tHealth awareness events\u003c/p\u003e\u003cp\u003eo\tCommunity outreach programs\u003c/p\u003e\u003cp\u003eo\tCorporate seminars and health talks\u003c/p\u003e\u003cp\u003eo\tCSR activities\u003c/p\u003e\u003cp\u003e•\tCollaborate with the Digital Marketing \u0026 Content team to align messaging and campaigns.\u003c/p\u003e\u003cp\u003e•\tProvide community insights and audience targeting recommendations.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eC. Customer Relationship Management (CRM)\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMaintain strong relationships with individual and corporate clients.\u003c/p\u003e\u003cp\u003e•\tMonitor patient satisfaction and support resolution of service issues with internal teams.\u003c/p\u003e\u003cp\u003e•\tConduct follow-ups and engagement activities to improve client loyalty and retention.\u003c/p\u003e\u003cp\u003e•\tContribute to positive brand perception through professional and responsive communication.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T784,\u003cp\u003e\u003cstrong\u003e•\tExperience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e
