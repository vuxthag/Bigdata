ân lực:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp tuyển dụng, đào tạo, kèm cặp, xây dựng đội ngũ CBNV chất lượng, phù hợp văn hóa và giá trị cốt lõi của ABBANK.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Xây dựng môi trường làm việc \u0026 thúc đẩy văn hóa tổ chức\u003c/strong\u003e:\u003c/p\u003e\u003cp\u003eTạo môi trường làm việc công bằng – hiệu quả; triển khai mạnh mẽ hoạt động văn hóa tổ chức để nâng cao gắn kết và hiệu suất làm việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Quản trị kinh doanh \u0026 phối hợp liên mảng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTriển khai, giám sát và chịu trách nhiệm kết quả kinh doanh mảng KHCN tại ĐVKD; phối hợp hiệu quả với các mảng để đẩy mạnh bán mới – bán thêm – bán chéo.\u003c/p\u003e25:T883,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Bằng cấp: Tốt nghiệp Đại học trở lên các ngành/chuyên ngành: Tài chính - Ngân hàng, Kinh tế, Thương mại, Quản trị kinh doanh, Kế toán hoặc các ngành/chuyên ngành khác có liên quan\u003c/p\u003e\u003cp\u003e- 6–8 + năm kinh nghiệm trong lĩnh vực Khách hàng Cá nhân tại ngân hàng.\u003c/p\u003e\u003cp\u003e- 2–3 + năm kinh nghiệm quản lý (Trưởng/Phó phòng KHCN, Phó Giám đốc Chi nhánh…).\u003c/p\u003e\u003cp\u003e- Tư duy kinh doanh mạnh, quyết đoán, chịu áp lực cao.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLương và phúc lợi hấp dẫn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Mức lương cạnh tranh, phản ánh trực tiếp kỹ năng và kinh nghiệm của ứng viên (chi tiết sẽ được thảo luận trong buổi phỏng vấn)\u003c/p\u003e\u003cp\u003e- 13 ngày nghỉ phép linh hoạt, bao gồm ngày sinh nhật và các dịp quan trọng khác\u003c/p\u003e\u003cp\u003e- Bảo hiểm đầy đủ theo luật lao động, cùng với ABBANK CARE - chương trình phúc lợi bổ sung đặc biệt dành cho ABBankers\u003c/p\u003e\u003cp\u003e- Lãi suất vay ưu đã
