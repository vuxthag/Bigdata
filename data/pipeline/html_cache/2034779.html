slug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1a04,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Mục tiêu công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuản lý và điều phối toàn bộ hoạt động vận hành hằng ngày tại showroom, đảm bảo đội ngũ nhân sự, quy trình bán hàng và dịch vụ khách hàng được triển khai đồng bộ theo tiêu chuẩn thương hiệu. Đảm bảo showroom hoạt động hiệu quả, chuyên nghiệp, mang lại trải nghiệm khách hàng tốt và hỗ trợ đạt mục tiêu kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Nhiệm vụ và trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Điều phối vận hành hằng ngày tại showroom\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tổ chức và điều phối hoạt động vận hành hằng ngày tại showroom theo kế hoạch làm việc của công ty.\u003c/p\u003e\u003cp\u003e• Sắp xếp lịch làm việc, phân ca, bố trí nhân sự phù hợp theo lưu lượng khách, khung giờ cao điểm và nhu cầu vận hành thực tế.\u003c/p\u003e\u003cp\u003e• Đảm bảo đúng người, đúng vị trí, đúng trách nhiệm trong từng ca làm việc.\u003c/p\u003e\u003cp\u003e• Kiểm tra công tác mở ca, trong ca và đóng ca theo checklist vận hành.\u003c/p\u003e\u003cp\u003e• Theo dõi việc tuân thủ quy định về tác phong, trưng bày, vệ sinh, hình ảnh cá nhân và môi trường làm việc.\u003c/p\u003e\u003cp\u003e• Duy trì nhịp vận hành ổn định, gọn gàng, chuyên nghiệp, đúng chuẩn thương hiệu ÉNÔRA.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Quản lý trải nghiệm khách hàng tại điểm bán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Giám sát chất lượng tiếp đón, tư vấn và chăm sóc khách hàng tại showroom.\u003c/p\u003e\u003cp\u003e• Đảm bảo các điểm chạm với khách hàng phản ánh đúng tinh thần thương hiệu ÉNÔRA: tinh tế, chuyên nghiệp, chuẩn mực và có chiều sâu.\u003c/p\u003e\u003cp\u003e• Kiểm tra trải nghiệm thực tế của khách từ khâu đón tiếp, tư vấn, thử sản phẩm, thanh toán đến chăm sóc sau bán.\u003c/p\u003e\u003cp\u003e• Theo dõi phản hồi khách hàng, phối hợp xử lý nhanh các sự cố ảnh hưởng đến trải nghiệm.\u003c/p\u003e\u003cp\u003e• Trực tiếp xử lý hoặc phối hợp xử lý các case nhạy cảm tại showroom; báo cáo kịp thời cho PGĐ khi phát sinh vấn đề nghiêm trọng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Quản trị đội ngũ tuyến đầu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Quản lý nhân sự tuyến đầu bao gồm đội ngũ bán hàng, hỗ trợ kinh doanh và các vị trí liên quan tại điểm vận hành.\u003c/p\u003e\u003cp\u003e• Hướng dẫn, kèm cặp và hỗ trợ nhân sự mới trong giai đoạn onboard để nhanh đạt tiêu chuẩn của công ty.\u003c/p\u003e\u003cp\u003e• Giám sát kỷ luật, tinh thần trách nhiệm, thái độ làm việc và chất lượng phối hợp nội bộ.\u003c/p\u003e\u003cp\u003e• Theo dõi hiệu suất nhân sự hằng tháng theo KPI: kỷ luật, chất lượng công việc, thái độ dịch vụ, năng suất, khả năng phối hợp và mức độ đáp ứng chuẩn công ty.\u003c/p\u003e\u003cp\u003e• Đề xuất điều chỉnh phân ca, phân công công việc, đào tạo lại hoặc thay đổi bố trí nhân sự khi cần.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. Kiểm soát quy trình, checklist và tiêu chuẩn vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Giám sát việc tuân thủ SOP, checklist, quy trình nội bộ và tiêu chuẩn dịch vụ tại showroom.\u003c/p\u003e\u003cp\u003e• Chủ động phát hiện lỗi vận hành, điểm đứt gãy trong quy trình hoặc các rủi ro ảnh hưởng đến trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e• Thiết lập và duy trì nhịp kiểm tra định kỳ tại điểm vận hành.\u003c/p\u003e\u003cp\u003e• Ghi nhận lỗi, tổng hợp nguyên nhân và đề xuất phương án điều chỉnh; phối hợp cập nhật quy trình khi phát sinh thay đổi.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eE. Kiểm soát vật tư, tài sản và phối hợp kho vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Theo dõi tình trạng sử dụng vật tư tiêu hao, công cụ, trang thiết bị và các tài sản thuộc phạm vi vận hành tuyến đầu.\u003c/p\u003e\u003cp\u003e• Kiểm tra bàn giao, kiểm đếm, ký nhận theo ca hoặc theo định kỳ.\u003c/p\u003e\u003cp\u003e• Phối hợp với Quản lý Kho \u0026 Chuỗi cung ứng trong các nội dung liên quan đến hàng hóa, vật tư, trưng bày, bàn giao và kiểm kê.\u003c/p\u003e\u003cp\u003e• Phát hiện, báo cáo kịp thời các trường hợp thiếu hụt, hư hỏng, thất thoát hoặc sai lệch.\u003c/p\u003e\u003cp\u003e• Đề xuất định mức sử dụng và các giải pháp tối ưu chi phí vận hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eF. Báo cáo và cải tiến vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện báo cáo ngày, tuần và tháng cho PGĐ về tình hình vận hành.\u003c/p\u003e\u003cp\u003e• Theo dõi và báo cáo các nội dung chính như: tình hình nhân sự, lỗi vận hành, phản hồi khách hàng, chất lượng dịch vụ, hiệu quả phối hợp giữa các bộ phận và nhu cầu điều chỉnh nhân sự hoặc quy trình.\u003c/p\u003e\u003cp\u003e• Đề xuất giải pháp nhằm giảm lỗi, nâng hiệu suất vận hành, tăng tốc độ xử lý, nâng chất lượng trải nghiệm khách hàng và hỗ trợ tăng hiệu quả kinh doanh tại điểm bán.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eG. Phối hợp triển khai hoạt động thương hiệu tại điểm bán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phối hợp với team Media, team Bán hàng và Ban điều hành để triển khai các hoạt động tại showroom theo từng giai đoạn.\u003c/p\u003e\u003cp\u003e• Đảm bảo các hoạt động trưng bày, nội dung tại điểm bán, không gian tiếp đón và cách triển khai phù hợp với hình ảnh thương hiệu ÉNÔRA.\u003c/p\u003e\u003cp\u003e• Hỗ trợ điều phối các hoạt động ra mắt bộ sưu tập, chiến dịch bán hàng, sự kiện khách hàng hoặc các hoạt động truyền thông diễn ra tại showroom.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eH. Phối hợp xử lý phát sinh và hỗ trợ vận hành chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Ngoài các đầu việc chuyên môn chính, vị trí này có trách nhiệm phối hợp hỗ trợ xử lý các vấn đề phát sinh trong quá trình vận hành, trong phạm vi phù hợp với chức năng công việc và yêu cầu của công ty.\u003c/p\u003e\u003cp\u003e• Chủ động tham gia giải quyết các tình huống thiếu hụt nhân sự, chồng chéo công việc, thay đổi kế hoạch hoặc các nhu cầu vận hành phát sinh theo từng giai đoạn.\u003c/p\u003e\u003cp\u003e• Sẵn sàng đồng hành cùng công ty trong giai đoạn xây dựng hệ thống, với tinh thần chủ động, trách nhiệm và hỗ trợ lẫn nhau để đảm bảo hiệu quả vận hành chung.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tba7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Có tối thiểu\u003cstrong\u003e 1–3 năm kinh nghiệm\u003c/strong\u003e ở vị trí quản lý/giám sát vận hành trong lĩnh vực dịch vụ, retail, hospitality hoặc ngành hàng cao cấp.\u003c/p\u003e\u003cp\u003e• Có khả năng điều phối nhân sự, tổ chức công việc, kiểm soát thực thi và xử lý tình huống tại điểm bán.\u003c/p\u003e\u003cp\u003e• Có tư duy kỷ luật, tiêu chuẩn, quy trình và chú trọng trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e• Có kỹ năng quản lý đội ngũ tuyến đầu, đào tạo nhân sự mới và duy trì chất lượng dịch vụ ổn định.\u003c/p\u003e\u003cp\u003e• Có khả năng lập checklist, theo dõi lỗi, tổng hợp báo cáo và đề xuất cải tiến.\u003c/p\u003e\u003cp\u003e• Sử dụng được Excel hoặc Google Sheets ở mức phục vụ công việc quản lý là một lợi thế.\u003c/p\u003e\u003cp\u003e• Giao tiếp rõ ràng, trách nhiệm, chủ động, chịu áp lực tốt và có tinh thần đồ )\u003c/p\u003e\u003cp\u003eĐịa điểm hiện tại: 23 Ngõ Huế, Hai Bà Trưng, Hà Nội\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T1a04,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Mục tiêu công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuản lý và điều phối toàn bộ hoạt động vận hành hằng ngày tại showroom, đảm bảo đội ngũ nhân sự, quy trình bán hàng và dịch vụ khách hàng được triển khai đồng bộ theo tiêu chuẩn thương hiệu. Đảm bảo showroom hoạt động hiệu quả, chuyên nghiệp, mang lại trải nghiệm khách hàng tốt và hỗ trợ đạt mục tiêu kinh doanh.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Nhiệm vụ và trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Điều phối vận hành hằng ngày tại showroom\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tổ chức và điều phối hoạt động vận hành hằng ngày tại showroom theo kế hoạch làm việc của công ty.\u003c/p\u003e\u003cp\u003e• Sắp xếp lịch làm việc, phân ca, bố trí nhân sự phù hợp theo lưu lượng khách, khung giờ cao điểm và nhu cầu vận hành thực tế.\u003c/p\u003e\u003cp\u003e• Đảm bảo đúng người, đúng vị trí, đúng trách nhiệm trong từng ca làm việc.\u003c/p\u003e\u003cp\u003e• Kiểm tra công tác mở ca, trong ca và đóng ca theo checklist vận hành.\u003c/p\u003e\u003cp\u003e• Theo dõi việc tuân thủ quy định về tác phong, trưng bày, vệ sinh, hình ảnh cá nhân và môi trường làm việc.\u003c/p\u003e\u003cp\u003e• Duy trì nhịp vận hành ổn định, gọn gàng, chuyên nghiệp, đúng chuẩn thương hiệu ÉNÔRA.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Quản lý trải nghiệm khách hàng tại điểm bán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Giám sát chất lượng tiếp đón, tư vấn và chăm sóc khách hàng tại showroom.\u003c/p\u003e\u003cp\u003e• Đảm bảo các điểm chạm với khách hàng phản ánh đúng tinh thần thương hiệu ÉNÔRA: tinh tế, chuyên nghiệp, chuẩn mực và có chiều sâu.\u003c/p\u003e\u003cp\u003e• Kiểm tra trải nghiệm thực tế của khách từ khâu đón tiếp, tư vấn, thử sản phẩm, thanh toán đến chăm sóc sau bán.\u003c/p\u003e\u003cp\u003e• Theo dõi phản hồi khách hàng, phối hợp xử lý nhanh các sự cố ảnh hưởng đến trải nghiệm.\u003c/p\u003e\u003cp\u003e• Trực tiếp xử lý hoặc phối hợp xử lý các case nhạy cảm tại showroom; báo cáo kịp thời cho PGĐ khi phát sinh vấn đề nghiêm trọng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Quản trị đội ngũ tuyến đầu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Quản lý nhân sự tuyến đầu bao gồm đội ngũ bán hàng, hỗ trợ kinh doanh và các vị trí liên quan tại điểm vận hành.\u003c/p\u003e\u003cp\u003e• Hướng dẫn, kèm cặp và hỗ trợ nhân sự mới trong giai đoạn onboard để nhanh đạt tiêu chuẩn của công ty.\u003c/p\u003e\u003cp\u003e• Giám sát kỷ luật, tinh thần trách nhiệm, thái độ làm việc và chất lượng phối hợp nội bộ.\u003c/p\u003e\u003cp\u003e• Theo dõi hiệu suất nhân sự hằng tháng theo KPI: kỷ luật, chất lượng công việc, thái độ dịch vụ, năng suất, khả năng phối hợp và mức độ đáp ứng chuẩn công ty.\u003c/p\u003e\u003cp\u003e• Đề xuất điều chỉnh phân ca, phân công công việc, đào tạo lại hoặc thay đổi bố trí nhân sự khi cần.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. Kiểm soát quy trình, checklist và tiêu chuẩn vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Giám sát việc tuân thủ SOP, checklist, quy trình nội bộ và tiêu chuẩn dịch vụ tại showroom.\u003c/p\u003e\u003cp\u003e• Chủ động phát hiện lỗi vận hành, điểm đứt gãy trong quy trình hoặc các rủi ro ảnh hưởng đến trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e• Thiết lập và duy trì nhịp kiểm tra định kỳ tại điểm vận hành.\u003c/p\u003e\u003cp\u003e• Ghi nhận lỗi, tổng hợp nguyên nhân và đề xuất phương án điều chỉnh; phối hợp cập nhật quy trình khi phát sinh thay đổi.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eE. Kiểm soát vật tư, tài sản và phối hợp kho vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Theo dõi tình trạng sử dụng vật tư tiêu hao, công cụ, trang thiết bị và các tài sản thuộc phạm vi vận hành tuyến đầu.\u003c/p\u003e\u003cp\u003e• Kiểm tra bàn giao, kiểm đếm, ký nhận theo ca hoặc theo định kỳ.\u003c/p\u003e\u003cp\u003e• Phối hợp với Quản lý Kho \u0026 Chuỗi cung ứng trong các nội dung liên quan đến hàng hóa, vật tư, trưng bày, bàn giao và kiểm kê.\u003c/p\u003e\u003cp\u003e• Phát hiện, báo cáo kịp thời các trường hợp thiếu hụt, hư hỏng, thất thoát hoặc sai lệch.\u003c/p\u003e\u003cp\u003e• Đề xuất định mức sử dụng và các giải pháp tối ưu chi phí vận hành.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eF. Báo cáo và cải tiến vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thực hiện báo cáo ngày, tuần và tháng cho PGĐ về tình hình vận hành.\u003c/p\u003e\u003cp\u003e• Theo dõi và báo cáo các nội dung chính như: tình hình nhân sự, lỗi vận hành, phản hồi khách hàng, chất lượng dịch vụ, hiệu quả phối hợp giữa các bộ phận và nhu cầu điều chỉnh nhân sự hoặc quy trình.\u003c/p\u003e\u003cp\u003e• Đề xuất giải pháp nhằm giảm lỗi, nâng hiệu suất vận hành, tăng tốc độ xử lý, nâng chất lượng trải nghiệm khách hàng và hỗ trợ tăng hiệu quả kinh doanh tại điểm bán.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eG. Phối hợp triển khai hoạt động thương hiệu tại điểm bán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phối hợp với team Media, team Bán hàng và Ban điều hành để triển khai các hoạt động tại showroom theo từng giai đoạn.\u003c/p\u003e\u003cp\u003e• Đảm bảo các hoạt động trưng bày, nội dung tại điểm bán, không gian tiếp đón và cách triển khai phù hợp với hình ảnh thương hiệu ÉNÔRA.\u003c/p\u003e\u003cp\u003e• Hỗ trợ điều phối các hoạt động ra mắt bộ sưu tập, chiến dịch bán hàng, sự kiện khách hàng hoặc các hoạt động truyền thông diễn ra tại showroom.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eH. Phối hợp xử lý phát sinh và hỗ trợ vận hành chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Ngoài các đầu việc chuyên môn chính, vị trí này có trách nhiệm phối hợp hỗ trợ xử lý các vấn đề phát sinh trong quá trình vận hành, trong phạm vi phù hợp với chức năng công việc và yêu cầu của công ty.\u003c/p\u003e\u003cp\u003e• Chủ động tham gia giải quyết các tình huống thiếu hụt nhân sự, chồng chéo công việc, thay đổi kế hoạch hoặc các nhu cầu vận hành phát sinh theo từng giai đoạn.\u003c/p\u003e\u003cp\u003e• Sẵn sàng đồng hành cùng công ty trong giai đoạn xây dựng hệ thống, với tinh thần chủ động, trách nhiệm và hỗ trợ lẫn nhau để đảm bảo hiệu quả vận hành chung.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:Tba7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Có tối thiểu\u003cstrong\u003e 1–3 năm kinh nghiệm\u003c/strong\u003e ở vị trí quản lý/giám sát vận hành trong lĩnh vực dịch vụ, retail, hospitality hoặc ngành hàng cao cấp.\u003c/p\u003e\u003cp\u003e• Có khả năng điều phối nhân sự, tổ chức công việc, kiểm soát thực thi và xử lý tình huống tại điểm bán.\u003c/p\u003e\u003cp\u003e• Có tư duy kỷ luật, tiêu chuẩn, quy trình và chú trọng trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e• Có kỹ năng quản lý đội ngũ tuyến đầu, đào tạo nhân sự mới và duy trì chất lượng dịch vụ ổn định.\u003c/p\u003e\u003cp\u003e• Có khả năng lập checklist, theo dõi lỗi, tổng hợp báo cáo và đề xuất cải tiến.\u003c/p\u003e\u003cp\u003e• Sử dụng được Excel hoặc Google Sheets ở mức phục vụ công việc quản lý là một lợi thế.\u003c/p\u003e\u003cp\u003e• Giao tiếp rõ ràng, trách nhiệm, chủ động, chịu áp lực tốt và có tinh thần đồng hành cùng doanh nghiệp trong giai đoạn xây hệ thống.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• \u003cstrong\u003eTổng thu nhập: 20.000.000 – 30.000.000 đồng/tháng\u003c/strong\u003e (thỏa thuận theo năng lực, kinh nghiệm thực tế và mức độ phù hợp với yêu cầu vị trí).\u003c/p\u003e\u003cp\u003e• Tham gia BHXH đầy đủ theo luật khi trở thành nhân viên chính thức.\u003c/p\u003e\u003c
