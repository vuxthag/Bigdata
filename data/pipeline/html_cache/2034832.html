frontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T772,The 450-room, 75,000 square meter (800,000 square foot) JW Marriott Hotel Hanoi is a 'reverse skyscraper' designed by acclaimed architecture practice Carlos Zapata Studio. The impressive structure was inspired by the country’s magnificent coastline and evokes characteristics of a dragon – a modern interpretation of a symbol from Vietnam's past. \r\nWith over 3,600 sqm (38,750 sq ft) of flexible meeting space built for large corporate and association events, JW Marriott Hotel Hanoi is well placed to cater to the flourishing market for MICE (Meetings, Incentives, Conferences and Exhibitions) in Vietnam. The hotel has a total of 17 meeting rooms including two Ballrooms of 1,000 sqm (10,763 sq ft) and 480 sqm (5,166 sq ft) with extensive public foyers. JW Marriott Hanoi is set to impress with a wide array of culinary and nightlife experiences. A total of six restaurant and bar outlets will cater to travelers with a pas"])</script><script>self.__next_f.push([1,"sion for exceptional food, wine and crafted cocktails.\r\nLocated in Hanoi’s new central business district and adjacent to the National Convention Center, the JW Marriott Hotel Hanoi is poised to become a key player for leisure and business within the city’s growing and dynamic hotel industry.  \r\nAwards and accolades of JW Marriott Hotel Hanoi: \r\nTop Luxury Hotel \u0026 Top Hotel in Asia by TripAdvisor – Travellers’ Choice 2015\r\nTop Luxury Hotel \u0026 Top Hotel in Vietnam by TripAdvisor – Travellers’ Choice 2015\r\nAward of Excellence for Booking.com Guest Reviews for 2014 by Booking.com\r\nBest Hotel in Vietnam by International Hotel Awards\r\nBest Convention Hotel in Vietnam by International Hotel Awards\r\nBest New Hotel Construction \u0026 Design Vietnam by International Property Awards – Asia Pacific 2014 Winners\r\nHotel of the Year 2014 by Robb Report Vietnam – Best of the Best Award\r\nThe Best New MICE Hotel in Vietnam by The Guide Magazine – The Guide Award 201424:T1d01,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJOB SUMMARY\u003c/p\u003e\u003cp\u003eThe position serves as the primary sales associate based in Ho Chi Minh City and responsible for proactively soliciting and handling MICE, Groups and Corporate business opportunities generating revenue for the property. Leading day to day sales activities by develop, build, and maintain long-term business relationships in order to achieve personal and team-related revenue goal while driving customer loyalty by delivering service excellence.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eJOB SPECIFIC TASKS\u003c/p\u003e\u003cp\u003eUnderstanding Markets \u0026 Maximizing Revenue\u003c/p\u003e\u003cp\u003e-\tUnderstands the overall market - competitors’ strengths and weaknesses, economic trends, supply and demand etc. and knows how to sell against them.\u003c/p\u003e\u003cp\u003e-\tTargets group accounts, markets or segments with heavy emphasis on proactive solicitation and account saturation.\u003c/p\u003e\u003cp\u003e-\tIdentifies, qualifies and solicits new accounts with a focus on increasing business.\u003c/p\u003e\u003cp\u003e-\tStrives to achieve personal and each property’s revenue goals.\u003c/p\u003e\u003cp\u003e-\tCloses the best opportunities for each property based on market conditions and individual property needs.\u003c/p\u003e\u003cp\u003e-\tIdentifies and develops new markets.\u003c/p\u003e\u003cp\u003e-\tUses negotiating skills and creative selling abilities to close on business and negotiate contracts.\u003c/p\u003e\u003cp\u003eDeveloping \u0026 Executing Sales Plans\u003c/p\u003e\u003cp\u003e-\tDevelop and implement an effective sales plan.\u003c/p\u003e\u003cp\u003e-\tExecutes designated sales strategies to develop and solicit specific accounts to achieve revenue goals.\u003c/p\u003e\u003cp\u003e-\tUses negotiating skills and creative selling abilities to close on business and negotiate contracts.\u003c/p\u003e\u003cp\u003e-\tAchieves solicitation and prospecting goals.\u003c/p\u003e\u003cp\u003e-\tMaintains and grows the business of existing accounts.\u003c/p\u003e\u003cp\u003e-\tDesigns, develops, and sells creative catered events.\u003c/p\u003e\u003cp\u003e-\tExecutes and supports the operational aspects of business booked (e.g., generating proposal, writing contracts, customer correspondence).\u003c/p\u003e\u003cp\u003eBuilding Successful Relationships\u003c/p\u003e\u003cp\u003e-\tWorks collaboratively with Strategic Accounts and Market Sales, Convention Bureaus, Conventions Centers, and other property counterparts to drive revenue, ensure customer satisfaction, and increase market share.\u003c/p\u003e\u003cp\u003e-\tWorks collaboratively with off-property sales channels (e.g., Event Booking Center, Market Sales, Strategic Accounts) to ensure sales efforts are coordinated, complementary, and not duplicative.\u003c/p\u003e\u003cp\u003e-\tDevelop and manage relationships with key stakeholders, both internal and external.\u003c/p\u003e\u003cp\u003e-\tUses sales resources and administrative/support staff effectively.\u003c/p\u003e\u003cp\u003eProviding Exceptional Customer Service\u003c/p\u003e\u003cp\u003e-\tBuilds and strengthens relationships with existing and new customers, industry organizations, and brand networks to enable future bookings. Activities include sales calls, entertainment, FAM trips, trade shows, etc.\u003c/p\u003e\u003cp\u003e-\tMaintains customer, account, and opportunity data in the system.\u003c/p\u003e\u003cp\u003e-\tDrives customer loyalty by delivering service excellence throughout each customer experience.\u003c/p\u003e\u003cp\u003e-\tServices customers in order to grow the share of the account.\u003c/p\u003e\u003cp\u003e-\tExec  performance for self and/or others; assuming responsibility for work objectives; initiating, focusing, and monitoring the efforts of self and/or others toward the accomplishment goals; proactively taking action and going beyond what is required\u003c/p\u003e\u003cp\u003e-\tBuilding and Contributing to Teams - Leading and participating as a member of a team to move toward the completion of common goals while fostering cohesion and collaboration among team members.\u003c/p\u003e\u003cp\u003eBuilding Relationships\u003c/p\u003e\u003cp\u003e-\tCoworker Relationships - Interacting with others in a way that builds openness, trust, and confidence in the pursuit of organizational goals and lasting relationships.\u003c/p\u003e\u003cp\u003e-\tCustomer Relationships - Developing and sustaining relationships based on an understanding of customer needs and actions consistent with company values.\u003c/p\u003e\u003cp\u003eLearning and Applying Professional Expertise\u003c/p\u003e\u003cp\u003e-\tTechnical Acumen - Understanding and utilizing professional skills and knowledge in a specific functional area to conduct and manage everyday business operations and generate innovative solutions to approach function-specific work challenges\u003c/p\u003e\u003cp\u003e-\tSales Ability: Persuasiveness - Using appropriate interpersonal styles and communication methods to gain acceptance of a product, service, or idea from prospects and clients.\u003c/p\u003e\u003cp\u003e-\tSales Disposition - Demonstrating the traits, inclinations, and outlooks that characterize successful salespersons; exhibiting behavior styles that facilitate adaptation to the demands of the sales role.\u003c/p\u003e\u003cp\u003e-\tSales Implementations - Driving and supporting the implementation of sales strategies and systems; seeking and taking appropriate actions on feedback; taking responsibility for implementation success.\u003c/p\u003e\u003cp\u003e-\tBasic Competencies - Fundamental competencies required for accomp
