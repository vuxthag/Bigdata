thu, tăng trưởng và phát triển thị trường theo định hướng chung của Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Nhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tChiến lược \u0026 Kế hoạch kinh doanh:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tXây dựng, đề xuất và triển khai kế hoạch kinh doanh ngắn hạn, trung hạn và dài hạn.\u003c/p\u003e\u003cp\u003e-\tPhân tích thị trường, đối thủ, xu hướng tiêu dùng để định hướng sản phẩm và phân khúc khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tQuản lý hoạt động kinh doanh:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐiều hành toàn bộ hoạt động của khối kinh doanh bao gồm: bán hàng, tiếp thị, phát triển thị trường, chăm sóc khách hàng.\u003c/p\u003e\u003cp\u003e-\tThiết lập và giám sát chỉ tiêu doanh số, KPI cho từng bộ phận/phòng ban trực thuộc.\u003c/p\u003e\u003cp\u003e-\tPhối hợp với phòng sản xuất, R\u0026D, logistics để đảm bảo tiến độ và chất lượng hàng hóa ra thị trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tXây dựng \u0026 phát triển đội ngũ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTuyển chọn, đào tạo và phát triển năng lực đội ngũ nhân sự kinh doanh.\u003c/p\u003e\u003cp\u003e-\tĐề xuất chính sách lương thưởng, hoa hồng phù hợp với chiến lược công ty và thị trường.\u003c/p\u003e\u003cp\u003e-\tPhát triển đội ngũ bán hàng thương hiệu mới Bigfarm, 2 Pro.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tQuản lý quan hệ khách hàng \u0026 đối tác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThiết lập, duy trì và phát triển hệ thống phân phối, khách hàng chiến lược.\u003c/p\u003e\u003cp\u003e-\tĐàm phán và ký kết các hợp đồng lớn với khách hàng, nhà phân phối, đại lý.\u003c/p\u003e\u003cp\u003e-\tPhát triển kênh trang trại lớn trực tiếp mua hàng tại nhà máy\u003c/p\u003e\u003cp\u003e-\tQuản lý các đại lý lớn trực tiếp mau hàng tại nhà máy\u003c/p\u003e\u003cp\u003e-\tĐiều phối chuỗi liên kết trại giống, thức ăn và khách hàng Việt Tín\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tTư vấn cho Ban Giám đốc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTham mưu, đề xuất các chính sách, chiến lược tăng trưởng phù hợp với định hướng của Ban Lãnh đạo.\u003c/p\u003e\u003cp\u003e-\tBáo cáo định kỳ kết quả hoạt động kinh doanh, đưa ra phân tích và giải pháp.\u003c/p\u003e\u003cp\u003e-\tTổng hợp báo cáo, kế hoạch tuần/ tháng của phòng Kinh doanh\u003c/p\u003e\u003cp\u003e-\tTổ chức các cuộc họp giao ban theo ủy quyền của TGĐ\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\tTuân thủ \u0026 kiểm soát nội bộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐảm bảo hoạt động kinh doanh tuân thủ pháp luật và các quy định nội bộ công ty.\u003c/p\u003e\u003cp\u003e-\tKiểm soát chi phí, ngân sách và hiệu quả đầu tư trong hoạt động kinh doanh.\u003c/p\u003e\u003cp\u003e-\tĐiều phối hoạt động của kỹ thuật thị trường cho nhà máy\u003c/p\u003e\u003cp\u003e-\tHỗ trợ các giám đốc thương hiệu, các trưởng vùng khi có điều động và ủy quyền của TGĐ\u003c/p\u003e\u003cp\u003e-\tThực hiện các công việc khác theo yêu cầu của Ban giám đốc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII. Quyền hạn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1\tĐược quyền đề xuất Ban Giám đốc thay đổi các quy định chính sách nhân sự, chế độ đại lý theo hướng hoàn thiện hơn.\u003c/p\u003e\u003cp\u003e2\tQuyền được thực hiện theo phụ lục của Giám đốc thương hiệu tại chính sách lương thưởng\u003c/p\u003e\u003cp\u003e3\tĐược quyền đề xuất ban Giám đốc việc khen thưởng, kỹ luật cán bộ nhân viên kinh doanh.\u003c/p\u003e\u003cp\u003e4\tQuyền để xuất thay đổi mô hình kinh doanh hướng tới sáng tạo, hiệu quả.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tef2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eIV. Tiêu chuẩn nhân sự\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Trình độ văn hóa\u003c/strong\u003e:\t12/12\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Trình độ chuyên môn\u003c/strong\u003e:\tTốt nghiệp đại học quản trị kinh doanh, kinh tế, marketing hoặc tương đương …\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Giới tính:\u003c/strong\u003e\tNam\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Độ tuổi: \u003c/strong\u003e\t25-50\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Kinh nghiệm:\u003c/strong\u003e\tTối thiểu 5–7 năm kinh nghiệm quản lý kinh doanh\u003c/p\u003e\u003cp\u003eCó kinh nghiệm mở rộng thị trường, xây dựng hệ thống phân phối\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Sử dụng thành thạo tin học văn phòng;\u003c/p\u003e\u003cp\u003e- Có kỹ năng giao tiếp tốt (có khả năng truyền đạt, thuyết phục và đàm phán tốt ).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Các yêu cầu khác:\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tác phong làm việc chuyên nghiệp, nhanh nhẹn, linh hoạt, có ý thức trách nhiệm cao trong công việc.\u003c/p\u003e\u003cp\u003e- Thái độ làm việc nghiêm túc, giao tiếp hòa nhã, đúng mực.\u003c/p\u003e\u003cp\u003e- Biết xây dựng môi trường làm việc lành mạnh, tích cực.\u003c/p\u003e\u003cp\u003e- Đọc, Viết, nghe thành thạo tiếng Anh (Ưu tiên)\u003c/p\u003e\u003cp\u003e- Trung thành với lợi ích của Công ty.\u003c/p\u003e\u003cp\u003e- Ưu tiên đã làm việc trong ngành sản xuất thức ăn chăn nuôi.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChỉ nhận hồ sơ tiếng Việt và đã từng làm trong ngành cám thức ăn chăn nuôi.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thu nhập và thưởng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLương cứng:\u003c/strong\u003e Từ \u003cstrong\u003e70 – 100 triệu/tháng\u003c/strong\u003e (tùy theo năng lực và kinh nghiệm).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng 10% lợi nhuận kinh doanh\u003c/strong\u003e từ các dự án/khách hàng do Giám đốc Phát triển Kinh doanh trực tiếp phát triển hoặc quản lý.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng được tính theo quý hoặc năm\u003c/strong\u003e dựa trên báo cáo tài chính.\u003c/p\u003e\u003cp\u003e•\tThưởng đạt KPI phát triển thị trường.\u003c/p\u003e\u003cp\u003e•\tThưởng mở được thị trường/đối tác chiến lược mới.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng cuối năm (thường từ 1–3 tháng lương\u003c/strong\u003e).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quyền lợi quản lý\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐược xây dựng và phát triển đội ngũ kinh doanh riêng.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia hoạch định chiến lược kinh doanh cùng Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e•\tCó quyền đề xuất chính sách bán hàng, chính sách khách hàng và chiến lược thị trường.\u003c/p\u003e\u003cp\u003e•\tĐược cấp ngân sách marketing, phát triển thị trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Phúc lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐóng BHXH, BHYT, BHTN đầy đủ theo quy định.\u003c/p\u003e\u003cp\u003e•\tBảo hiểm thân thể 24h\u003c/p\u003e\u003cp\u003e•\tDu lịch nghỉ mát hàng năm.\u003c/p\u003e\u003cp\u003e•\tKhám sức khỏe định kỳ.\u003c/p\u003e\u003cp\u003e•\tThưởng các dịp lễ, tết.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Hỗ trợ công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXe công tác hoặc hỗ trợ chi phí đi lại.\u003c/p\u003e\u003cp\u003e•\tĐiện thoại + chi phí liên lạc hàng tháng.\u003c/p\u003e\u003cp\u003e•\tChi phí tiếp khách, gặp đối tác.\u003c/p\u003e\u003cp\u003e•\tThư ký / trợ lý hỗ trợ (nếu cần).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Cơ hội phát triển\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCơ hội trở thành Phó Tổng Giám đốc / Tổng Giám đốc kinh doanh nếu đạt kết quả tốt.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa đào tạo quản trị, lãnh đạo cấp cao.\u003c/p\u003e\u003cp\u003e•\tCó thể được xem xét cổ phần / ESOP nếu gắn bó lâu dài.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Môi trường làm việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc trực tiếp với Ban lãnh đạo công ty.\u003c/p\u003e\u003cp\u003e•\tĐược chủ động cao trong chiến lược và phát triển thị trường.\u003c/p\u003e\u003cp\u003e•\tMôi trường mở, hướng đến kết quả và hiệu quả kinh doanh.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T10d1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. Mục đích công việc: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-     Phát huy được tối đa khả năng làm việc nguồn nhân lực hiện có, xây dựng môi trường làm việc chuyên nghiệp, hiện đại và thân thiện;\u003c/p\u003e\u003cp\u003e-    Xây dựng và duy trì được hệ thống đánh giá hiệu quả làm việc chính xác, của nhân viên làm cơ sở để hoạch định nguồn nhân lực;\u003c/p\u003e\u003cp\u003e-    Làm cơ sở cho việc tuyển dụng, chọn lọc và đào tạo cán bộ nhân viên phòng Kinh doanh.\u003c/p\u003e\u003cp\u003e-\tGiám đốc phát triển thị trường chịu trách nhiệm xây dựng chiến lược và điều hành toàn bộ hoạt động kinh doanh của công ty, nhằm đạt được mục tiêu doanh thu, tăng trưởng và phát triển thị trường theo định hướng chung của Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Nhiệm vụ chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tChiến lược \u0026 Kế hoạch kinh doanh:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tXây dựng, đề xuất và triển khai kế hoạch kinh doanh ngắn hạn, trung hạn và dài hạn.\u003c/p\u003e\u003cp\u003e-\tPhân tích thị trường, đối thủ, xu hướng tiêu dùng để định hướng sản phẩm và phân khúc khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tQuản lý hoạt động kinh doanh:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐiều hành toàn bộ hoạt động của khối kinh doanh bao gồm: bán hàng, tiếp thị, phát triển thị trường, chăm sóc khách hàng.\u003c/p\u003e\u003cp\u003e-\tThiết lập và giám sát chỉ tiêu doanh số, KPI cho từng bộ phận/phòng ban trực thuộc.\u003c/p\u003e\u003cp\u003e-\tPhối hợp với phòng sản xuất, R\u0026D, logistics để đảm bảo tiến độ và chất lượng hàng hóa ra thị trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tXây dựng \u0026 phát triển đội ngũ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTuyển chọn, đào tạo và phát triển năng lực đội ngũ nhân sự kinh doanh.\u003c/p\u003e\u003cp\u003e-\tĐề xuất chính sách lương thưởng, hoa hồng phù hợp với chiến lược công ty và thị trường.\u003c/p\u003e\u003cp\u003e-\tPhát triển đội ngũ bán hàng thương hiệu mới Bigfarm, 2 Pro.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tQuản lý quan hệ khách hàng \u0026 đối tác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThiết lập, duy trì và phát triển hệ thống phân phối, khách hàng chiến lược.\u003c/p\u003e\u003cp\u003e-\tĐàm phán và ký kết các hợp đồng lớn với khách hàng, nhà phân phối, đại lý.\u003c/p\u003e\u003cp\u003e-\tPhát triển kênh trang trại lớn trực tiếp mua hàng tại nhà máy\u003c/p\u003e\u003cp\u003e-\tQuản lý các đại lý lớn trực tiếp mau hàng tại nhà máy\u003c/p\u003e\u003cp\u003e-\tĐiều phối chuỗi liên kết trại giống, thức ăn và khách hàng Việt Tín\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tTư vấn cho Ban Giám đốc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTham mưu, đề xuất các chính sách, chiến lược tăng trưởng phù hợp với định hướng của Ban Lãnh đạo.\u003c/p\u003e\u003cp\u003e-\tBáo cáo định kỳ kết quả hoạt động kinh doanh, đưa ra phân tích và giải pháp.\u003c/p\u003e\u003cp\u003e-\tTổng hợp báo cáo, kế hoạch tuần/ tháng của phòng Kinh doanh\u003c/p\u003e\u003cp\u003e-\tTổ chức các cuộc họp giao ban theo ủy quyền của TGĐ\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\tTuân thủ \u0026 kiểm soát nội bộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tĐảm bảo hoạt động kinh doanh tuân thủ pháp luật và các quy định nội bộ công ty.\u003c/p\u003e\u003cp\u003e-\tKiểm soát chi phí, ngân sách và hiệu quả đầu tư trong hoạt động kinh doanh.\u003c/p\u003e\u003cp\u003e-\tĐiều phối hoạt động của kỹ thuật thị trường cho nhà máy\u003c/p\u003e\u003cp\u003e-\tHỗ trợ các giám đốc thương hiệu, các trưởng vùng khi có điều động và ủy quyền của TGĐ\u003c/p\u003e\u003cp\u003e-\tThực hiện các công việc khác theo yêu cầu của Ban giám đốc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII. Quyền hạn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1\tĐược quyền đề xuất Ban Giám đốc thay đổi các quy định chính sách nhân sự, chế độ đại lý theo hướng hoàn thiện hơn.\u003c/p\u003e\u003cp\u003e2\tQuyền được thực hiện theo phụ lục của Giám đốc thương hiệu tại chính sách lương thưởng\u003c/p\u003e\u003cp\u003e3\tĐược quyền đề xuất ban Giám đốc việc khen thưởng, kỹ luật cán bộ nhân viên kinh doanh.\u003c/p\u003e\u003cp\u003e4\tQuyền để xuất thay đổi mô hình kinh doanh hướng tới sáng tạo, hiệu quả.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:Tef2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eIV. Tiêu chuẩn nhân sự\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Trình độ văn hóa\u003c/strong\u003e:\t12/12\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Trình độ chuyên môn\u003c/strong\u003e:\tTốt nghiệp đại học quản trị kinh doanh, kinh tế, marketing hoặc tương đương …\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Giới tính:\u003c/strong\u003e\tNam\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Độ tuổi: \u003c/strong\u003e\t25-50\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Kinh nghiệm:\u003c/strong\u003e\tTối thiểu 5–7 năm kinh nghiệm quản lý kinh doanh\u003c/p\u003e\u003cp\u003eCó kinh nghiệm mở rộng thị trường, xây dựng hệ thống phân phối\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Kỹ năng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Sử dụng thành thạo tin học văn phòng;\u003c/p\u003e\u003cp\u003e- Có kỹ năng giao tiếp tốt (có khả năng truyền đạt, thuyết phục và đàm phán tốt ).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Các yêu cầu khác:\t\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tác phong làm việc chuyên nghiệp, nhanh nhẹn, linh hoạt, có ý thức trách nhiệm cao trong công việc.\u003c/p\u003e\u003cp\u003e- Thái độ làm việc nghiêm túc, giao tiếp hòa nhã, đúng mực.\u003c/p\u003e\u003cp\u003e- Biết xây dựng môi trường làm việc lành mạnh, tích cực.\u003c/p\u003e\u003cp\u003e- Đọc, Viết, nghe thành thạo tiếng Anh (Ưu tiên)\u003c/p\u003e\u003cp\u003e- Trung thành với lợi ích của Công ty.\u003c/p\u003e\u003cp\u003e- Ưu tiên đã làm việc trong ngành sản xuất thức ăn chăn nuôi.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChỉ nhận hồ sơ tiếng Việt và đã từng làm trong ngành cám thức ăn chăn nuôi.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thu nhập và thưởng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLương cứng:\u003c/strong\u003e Từ \u003cstrong\u003e70 – 100 triệu/tháng\u003c/strong\u003e (tùy theo năng lực và kinh nghiệm).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng 10% lợi nhuận kinh doanh\u003c/strong\u003e từ các dự án/khách hàng do Giám đốc Phát triển Kinh doanh trực tiếp phát triển hoặc quản lý.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng được tính theo quý hoặc năm\u003c/strong\u003e dựa trên báo cáo tài chính.\u003c/p\u003e\u003cp\u003e•\tThưởng đạt KPI phát triển thị trường.\u003c/p\u003e\u003cp\u003e•\tThưởng mở được thị trường/đối tác chiến lược mới.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThưởng cuối năm (thường từ 1–3 tháng lương\u003c/strong\u003e).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quyền lợi quản lý\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐược xây dựng và phát triển đội ngũ kinh doanh riêng.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia hoạch định chiến lược kinh doanh cùng Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e•\tCó quyền đề xuất chính sách bán hàng, chính sách khách hàng và chiến lược thị trường.\u003c/p\u003e\u003cp\u003e•\tĐược cấp ngân sách marketing, phát triển thị trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Phúc lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐóng BHXH, BHYT, BHTN đầy đủ theo quy định.\u003c/p\u003e\u003cp\u003e•\tBảo hiểm thân thể 24h\u003c/p\u003e\u003cp\u003e•\tDu lịch nghỉ mát hàng năm.\u003c/p\u003e\u003cp\u003e•\tKhám sức khỏe định kỳ.\u003c/p\u003e\u003cp\u003e•\tThưởng các dịp lễ, tết.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Hỗ trợ công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXe công tác hoặc hỗ trợ chi phí đi lại.\u003c/p\u003e\u003cp\u003e•\tĐiện thoại + chi phí liên lạc hàng tháng.\u003c/p\u003e\u003cp\u003e•\tChi phí tiếp khách, gặp đối tác.\u003c/p\u003e\u003cp\u003e•\tThư ký / trợ lý hỗ trợ (nếu cần).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Cơ hội phát triển\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCơ hội trở thành Phó Tổng Giám đốc / Tổng Giám đốc kinh doanh nếu đạt kết quả tốt.\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa đào tạo quản trị, lãnh đạo cấp cao.\u003c/p\u003e\u003cp\u003e•\tCó thể được xem xét cổ phần / ESOP nếu gắn bó lâu dài.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Môi trường làm việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc trực tiếp với Ban lãnh đạo công ty.\u003c/p\u003e\u003cp\u003e•\tĐược chủ động cao trong chiến lược và phát triển thị trường.\u003c/p\u003e\u003cp\u003e•\tMôi trường mở, hướng đến kết quả và hiệu quả kinh doanh.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2a:{\"skillName\":\"Phát Triển Thị Trường\",\"skillId\":1165,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Thức Ăn Chăn Nuôi\",\"skillId\":2426,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Nông nghiệp\",\"skillId\":1024610,\"skillWeight\":100,\"isExisted\":false}\n29:[\"$2a\",\"$2b\",\"$2c
