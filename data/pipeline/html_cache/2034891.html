d financial solutions that enhance clients’ trade and deposit activities, ensuring outcomes that contribute to customer satisfaction and revenue generation.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tPlanning and Administrative Coordination\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCollaborate closely with the Financial Institution Team Lead to prepare detailed business plans, sales forecasts, and marketing strategies for trade and cash business initiatives. Coordinate with internal teams to ensure implementation of plans and timely delivery of products and services. Assist in managing schedules, organizing client events or workshops, and maintaining accurate records of client interactions and business activities including registration of call reports in relevant internal systems\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tReporting, Pipeline update/ tracking, and Performance Analysis\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMaintain pipeline tracker to ensure conversion of deals from onshore perspective, generate regular reports on sales performance, market trends, customer feedback, and competitive activities. Analyze data to identify opportunities and challenges, presenting insights and recommendations to senior management to support strategic decision-making.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.\tAccountability and Decision-Making\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eServe as the primary liaison between the bank and institutional clients, making decisions related to customer onboarding, product offerings, and issue resolution. Accountable for meeting sales targets and business KPIs while managing risk and compliance within established policies.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6.\tFinancial and Budgetary Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMonitor and manage assigned business budgets/ KPIs, including revenue targets and cost controls related to trade and cash business initiatives. Responsible for forecasting sales, preparing reports, and contributing to financial planning activities to support business growth.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7.\tCross-Functional Collaboration and Communication\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCollaborate with internal teams such as credit, risk, operations, and marketing to ensure seamless delivery of financial solutions. Maintain regular communication with Team Lead/ HOD management and key stakeholders to report progress, challenges, and market trends.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8.\tCompliance and Risk Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eEnsure adherence to regulatory requirements and internal policies in all business dealings. Proactively identify potential risks and coordinate with relevant departments to mitigate these risks effectively.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T56b,\u003cp\u003e•\tBachelor of Banking Finance, Economics or related majors.\u003c/p\u003e\u003cp\u003e•\tProven experience in trade finance, cash management, or related financial services, preferably dealing with institutional clients or financial institutions.\u003c/p\u003e\u003cp\u003e•\tStrong business development skills with a track record of meeting or exceeding sales targets.\u003c/p\u003e\u003cp\u003e•\tExcellent interpersonal and communication skills to build relationships and influence stakeholders at various levels.\u003c/p\u003e\u003cp\u003e•\tSound understanding of financial products, risk management, and regulatory compliance relevant to trade and cash business.\u003c/p\u003e\u003cp\u003e•\tAnalytical and strategic thinking abilities with problem-solving orientation.\u003c/p\u003e\u003cp\u003e•\tAbility to work independently and collaboratively as part of a team in a fast-paced environment.\u003c/p\u003e\u003cp\u003e•\tRelevant educational qualifications in finance, business, or a related field.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e
