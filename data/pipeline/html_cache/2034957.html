g toàn diện hơn nhu cầu của khách hàng. \r\n\r\nBên cạnh đó, với hoạt động cộng đồng được vận hành theo mô hình doanh nghiệp xã hội tiên tiến cùng các bước tiến đầu tiên sang bất động sản nghỉ dưỡng,  lĩnh vực y tế và giáo dục,…Tập đoàn Kim Oanh không chỉ hướng đến chinh phục các mục tiêu tăng trưởng mới để khẳng định vị thế của một tập đoàn bất động sản chuyên nghiệp, nhân văn và bền vững, mà còn chuẩn bị nguồn lực cho mục tiêu phát triển xa hơn: Trở thành một tập đoàn kinh tế đa ngành vươn tầm khu vực."])</script><script>self.__next_f.push([1,"24:Tdba,"])</script><script>self.__next_f.push([1,"\u003cp\u003eTrách nhiệm chính\u003c/p\u003e\u003cp\u003e-\tPhối hợp cùng Trưởng phòng quản lý và điều hành hoạt động tài chính liên quan đến công nợ cá nhân của khách hàng mua sản phẩm bất động sản.\u003c/p\u003e\u003cp\u003e-\tLập và triển khai kế hoạch cân đối nguồn vốn phục vụ giải ngân cho khách hàng vay ngân hàng; giám sát hiệu quả sử dụng vốn và cảnh báo rủi ro tài chính.\u003c/p\u003e\u003cp\u003e-\tPhân tích số liệu công nợ, đánh giá khả năng thu hồi và dự báo tình hình tài chính ngắn – trung hạn\u003c/p\u003e\u003cp\u003eNội dung công việc cụ thể\u003c/p\u003e\u003cp\u003ea.\tQuản lý hồ sơ vay vốn \u0026 công nợ khách hàng\u003c/p\u003e\u003cp\u003e-\tTiếp nhận, kiểm tra và hoàn thiện hồ sơ vay vốn cá nhân mua sản phẩm BĐS theo yêu cầu của ngân hàng đối tác.\u003c/p\u003e\u003cp\u003e-\tChủ động phối hợp với các phòng/ban liên quan để lập kế hoạch và lịch trình giải ngân.\u003c/p\u003e\u003cp\u003e-\tTheo dõi, giám sát quá trình giải ngân từ ngân hàng, đảm bảo đúng tiến độ thanh toán với chủ đầu tư.\u003c/p\u003e\u003cp\u003e-\tCập nhật tình trạng công nợ của khách hàng; nhắc nợ và hỗ trợ xử lý khi phát sinh chậm thanh toán.\u003c/p\u003e\u003cp\u003eb.\tKế hoạch và cân đối nguồn vốn\u003c/p\u003e\u003cp\u003e-\tLập kế hoạch huy động vốn từ các ngân hàng, đảm bảo đáp ứng nhu cầu vay vốn của khách hàng và tiến độ bán hàng của dự án.\u003c/p\u003e\u003cp\u003e-\tĐề xuất phương án và giải pháp vay vốn hiệu quả, tối ưu chi phí tài chính.\u003c/p\u003e\u003cp\u003ec.\tPhát triển \u0026 duy trì quan hệ với ngân hàng\u003c/p\u003e\u003cp\u003e-\tTìm kiếm, tiếp cận và đàm phán với các ngân hàng để ký kết thỏa thuận liên kết cho vay mua BĐS.\u003c/p\u003e\u003cp\u003e-\tDuy trì và mở rộng mối quan hệ hợp tác với các đối tác ngân hàng hiện hữu.\u003c/p\u003e\u003cp\u003e-\tTheo dõi chính sách tín dụng của từng ngân hàng để kịp thời áp dụng cho khách hàng của công ty.\u003c/p\u003e\u003cp\u003ed.\tPhân tích \u0026 báo cáo tài chính liên quan công nợ cá nhân\u003c/p\u003e\u003cp\u003e-\tPhân tích dữ liệu công nợ, tình hình giải ngân và thu hồi để hỗ trợ ra quyết định kinh doanh.\u003c/p\u003e\u003cp\u003e-\tSoát xét báo cáo công nợ cá nhân của các dự án, định kỳ báo cáo Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e-\tCảnh báo sớm các rủi ro về dòng tiền, nợ xấu và đề xuất biện pháp xử lý.\u003c/p\u003e\u003cp\u003ee.\tĐối ngoại \u0026 phối hợp nội bộ\u003c/p\u003e\u003cp\u003e-\tLàm việc trực tiếp với ngân hàng để thống nhất quy trình, hồ sơ và xử lý các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e-\tPhối hợp chặt chẽ với Phòng Kinh doanh, Pháp chế và các đơn vị dự án để đảm bảo tính đầy đủ, hợp lệ của hồ sơ.\u003c/p\u003e\u003cp\u003e-\tThường xuyên đi thực tế tại các dự án để phối hợp, xử lý hồ sơ, làm việc với các ngân hàng, khách hàng hoặc đơn vị liên quan.\u003c/p\u003e\u003cp\u003e-\tĐịa bàn công tác: TP.HCM, Bình Dương, Đồng Nai, Bà Rịa – Vũng Tàu và các khu vực khác theo phân công.\u003c/p\u003e\u003cp\u003ef.\tQuản lý nhân sự \u0026 lưu trữ dữ liệu\u003c/p\u003e\u003cp\u003e-\tHướng dẫn, đào tạo nhân viên phụ trách hồ sơ vay vốn và công nợ.\u003c/p\u003e\u003cp\u003e-\tQuản lý, lưu trữ hồ sơ, chứng từ và dữ liệu công nợ theo quy định.\u003c/p\u003e\u003cp\u003eg.\tCác nhiệm vụ khác\u003c/p\u003e\u003cp\u003eThực hiện các công việc khác theo phân công của Trưởng phòng và Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\
