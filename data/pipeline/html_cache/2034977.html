nal excellence and fosters global understanding, respect and independent learning.\r\n\r\nValues\r\n\r\nAttitudes\r\n\r\n- Self-motivated (I want to do it)\r\n- Self-challenged (I can do it)\r\n- Always striving for perfection (I’ll do it best)\r\n\r\nAptitudes\r\n\r\n- Critical thinking\r\n- Human sensible\r\n- Physically fit\r\n\r\nAttributes\r\n\r\n- Love and Compassion\r\n- Care and Service\r\n- Fair and Just\r\n\r\nSchoolwide Learner Outcomes\r\n\r\nEMASI fosters students who:\r\n\r\nPursue Academic Excellence\r\n\r\nMeet or exceed national and international academic standards\r\nRecognize and produce school work of high quality\r\nChallenge themselves academically and proactively and independently work towards their individual learning goals\r\nUnderstand the value of all subjects and appreciate them to be relevant and connected to the real world\r\nDevelop independent and self-reflective learning skills\r\n\r\nCommunicate Effectively\r\n\r\nArticulate ideas and experiences confidently and creatively in both English and Vietnamese\r\nWrite coherently for diverse purposes, audiences and contexts\r\nCooperatively interact with others and effectively collaborate to achieve a shared goal\r\nBe capable of expressing themselves through the arts\r\n\r\nThink Critically\r\n\r\nRead and listen in order to acquire, analyze, evaluate and synthesize information\r\nAsk thoughtful questions, generate hypotheses, explore multiple perspectives and pursue answers through research, experimentation and/or computation\r\nCritically evaluate the arts, media, and technology\r\nDeliver meaningful, actionable feedback to peers and self.\r\n\r\nContribute to their Community, Country and the World\r\n\r\nDemonstrate active civic involvement and social responsibility\r\nContribute time, energy and talents to their school and wider community\r\nRespect and value diverse cultures and individual differences\r\nProtect the environment through personal habits and active service\r\n\r\nPursue Personal Excellence\r\n\r\nLead a healthy, well-rounded lifestyle\r\nTake responsibility for self-organization, self-evaluation and self-control\r\nDemonstrate skills of reflection, personal integrity, and perseverance\r\nDemonstrate the ability to set, plan, and achieve college, career and personal goals\r\n\r\nAre Technologically Proficient\r\n\r\nDemonstrate ability and competency to exchange and present ideas using a wide range of technology\r\nDistinguish between reliable and accurate information and understand the validity of a source\r\nUse technology as an additional tool to demonstrate and enhance learning outcomes\r\nUse technology to support communication and delegation"])</script><script>self.__next_f.push([1,"24:T9a2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eReport to:\u003c/strong\u003e Assistant Head Teacher (Academic) reports to Head of Secondary.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob overview:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Assistant Head Teacher (Academic) supports the Head of Secondary in respect of Academic matters in the Secondary school, (comprising Middle School and High School) including all MoET and DoET related matters, but notwithstanding the Integrated Curriculum in the Secondary School including working with the Head of Secondary to oversee provision at IGCSE and A level.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eResponsibilities and Duties:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Support the Head of Secondary in developing and monitoring planning including lesson plans, schemes of work, staffing arrangements, enrolment plans, recruitment targets etc., and the school’s internal regulations and procedures.\u003c/p\u003e\u003cp\u003e• Be responsible for all MoET and DoET related activities, provision, expectations and implementation.\u003c/p\u003e\u003cp\u003e• Be aware of, and assist the Head of Secondary in respect of Integrated Curriculum provision\u003c/p\u003e\u003cp\u003e• Be familiar with provision and requirements for Cambridge IGCSE and A level courses and support the Head of Secondary and the Examinations Officer to implement requirements of Cambridge courses and Examinations.\u003c/p\u003e\u003cp\u003e• Assist the Head of Secondary in observing and monitoring the provision and quality of teaching and learning at the school, ensuring alignment with the directions and standards of the EMASI school system.\u003c/p\u003e\u003cp\u003e• Develop plans and organize the implementation of school events and festivals based on specific themes.\u003c/p\u003e\u003cp\u003e• Monitor, review and propose developments of Extra-curricular activities, including, but not limited to, Academic Extra-curricular support lessons.\u003c/p\u003e\u003cp\u003e• Organise appropriate local school trips and support staff and student participants.\u003c/p\u003e\u003cp\u003e• Take responsibility for the monitoring and participation of all activities related to teaching and training in the Secondary school.\u003c/p\u003e\u003cp\u003e• Implement solutions to maintain and improve the quality of care and education of Secondary students to ensure safety in line with all School Safeguarding and Child Protection procedures\u003c/p\u003e\u003cp\u003e• Build and maintain close relationships through the school community, including students, parents, colleagues and providers.\u003c/p\u003e\u003cp\u003e• Act of behalf of the Head of Secondary to manage and resolve assigned tasks.\u003c/p\u003e\u003cp\u003e• Perform other duties assigned by the Head of Secondary.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T527,\u003cp\u003e\u003cstrong\u003eQualifications:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Bachelor's or Master's degree in Education with a certification in Educational Management;\u003c/p\u003e\u003cp\u003e• Proficiency in English communication.\u003c/p\u003e\u0
