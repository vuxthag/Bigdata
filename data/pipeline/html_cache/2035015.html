àm chủ nền tảng Cloud của người Việt\r\nMang đến những giải pháp tối ưu, đáng tin cậy nhất cho khách hàng, tạo nền tảng cho sự sáng tạo và phát triển của đối tác và doanh nghiệp."])</script><script>self.__next_f.push([1,"42:{\"companyId\":113632,\"jobImageURLs\":\"$43\",\"jobVideoURLs\":\"$44\",\"companyName\":\"Công Ty TNHH Viettel - CHT (Viettel Idc)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/9e/11024406.png\",\"companySizeId\":\"\",\"companyProfile\":\"$45\",\"contactName\":\"HR Department\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Tầng 16 - Hapulico Center Building - Số 1 Nguyễn Huy Tưởng - Quận Thanh Xuân - TP. Hà nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n47:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-03T15:15:29+07:00\",\"expiredOn\":\"2026-05-03T23:59:59+07:00\"}\n46:[\"$47\"]\n48:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"27:{\"jobId\":2035015,\"jobTitle\":\"Account Manager\",\"userId\":2474147,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/9e/11024406.png\",\"alias\":\"account-manager\",\"createdOn\":\"2026-04-03T15:15:09+07:00\",\"approvedOn\":\"2026-04-03T15:15:29+07:00\",\"expiredOn\":\"2026-05-03T23:59:59+07:00\",\"lastUpdatedOn\":\"2026-04-03T15:15:29+07:00\",\"lastSyncedOn\":\"2026-04-12T12:06:36+07:00\",\"companyName\":\"Công Ty TNHH Viettel - CHT (Viettel Idc)\",\"companyId\":113632,\"companyProfile\":\"$28\",\"companySizeId\":0,\"contactName\":\"HR Department\",\"createdBy\":2474147,\"isOnline\":true,\"isActive\":true,\"isApproved\":true,\"isUnpaidDisable\":0,\"isCompleted\":true,\"isAnonymous\":false,\"isSalaryVisible\":false,\"isS
