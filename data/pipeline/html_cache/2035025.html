ân vân. Những kiến thức này sẽ được bổ sung trong quá trình làm việc và học tập tại TSDV. Những ứng viên có nền tảng về các lĩnh vực liên quan là một lợi thế.\r\n\r\nCác sản phẩm phần mềm được phát triển bởi TSDV rất đa dạng, trải dài từ firmware sát với phần cứng, OS, Platform /Framework tới các ứng dụng dùng trong công nghiệp trên desktop hoặc trên nền tảng web. Ngoài ra, có các lĩnh vực phát triển công nghệ chuyên sâu như Embedded OS, Database, LSI, IoT,…Do đó, kỹ sư phần mềm tại TSDV có nhiều lựa chọn về tính chất công việc. Đồng thời, kỹ sư phần mềm tại TSDV được kỳ vọng có khả năng thích ứng nhanh chóng với những yêu cầu về công nghệ có thể thay đổi ở từng dự án họ tham gia.\r\nVới tinh thần làm việc Nhật Bản: coi trong chất lượng và giá trị cho khách hàng, TSDV có hệ thống quy trình đảm bảo chất lượng toàn diện và chuyên nghiệp. Nó đòi hỏi người kỹ sư cần tuân thủ chặt chẽ với ý thức cao về đảm bảo chất lượng sản phẩm mà mình làm ra. Với những ứng viên mong muốn được phát triển trong môi trường chuyên nghiệp và trung thực, TSDV chắc chắn là một địa chỉ vô cùng thích hợp."])</script><script>self.__next_f.push([1,"24:T101c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYour Skills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBachelor degree or equivalent in Electronic \u0026 Telecommunication, Computer Science, Information Technology or related fields.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMandatory Skills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAt least 3 years of hand-on experience in projects of Java\u003c/p\u003e\u003cp\u003e•\tHave experience at Cloud environment, Database… is a plus.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tUnderstand about design patterns\u003c/strong\u003e and experienced at least 1 year.\u003c/p\u003e\u003cp\u003e•\tFirm knowledge at software engineering (from requirement de 03e\u003cstrong\u003e•\tComprehensive Social Security:\u003c/strong\u003e Social, Medical, and Unemployment Insurance are contributed based on \u003cstrong\u003e100% OF YOUR ACTUAL GROSS SALARY\u003c/strong\u003e. This is our commitment to maximizing your long-term benefits regarding maternity, sick leave, and retirement.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tUnrivaled Stability:\u003c/strong\u003e As a key member of the Toshiba Group, you will enjoy a consistent and abundant project pipeline directly from our parent corporation. This ensures a \u003cstrong\u003erecession-proof career path\u003c/strong\u003e and long-term professional growth despite market fluctuations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.  \"High-end\" Professional Development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tLearn from Top Experts:\u003c/strong\u003e Our dedicated internal training team collaborates with \u003cstrong\u003eprestigious guest speakers and lecturers from Hanoi University of Science and Technology (HUST)\u003c/strong\u003e to provide in-depth training in Software Engineering.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tJapanese Language Roadmap:\u003c/strong\u003e Free Japanese language courses from \u003cstrong\u003eN5 to N2\u003c/strong\u003e held right at the office. Furthermore, you will be equipped with \u003cstrong\u003especialized IT Japanese\u003c/strong\u003e to excel in a multinational environment.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.  Leadership Growth \u0026 Global Opportunities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tEmpowered Leadership:\u003c/strong\u003e Senior candidates are entrusted to lead teams of various scales and provide direct solution consultancy for flagship projects.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tGlobal Onsite Opportunities:\u003c/strong\u003e Participate in massive proje ọc tập tại TSDV. Những ứng viên có nền tảng về các lĩnh vực liên quan là một lợi thế.\r\n\r\nCác sản phẩm phần mềm được phát triển bởi TSDV rất đa dạng, trải dài từ firmware sát với phần cứng, OS, Platform /Framework tới các ứng dụng dùng trong công nghiệp trên desktop hoặc trên nền tảng web. Ngoài ra, có các lĩnh vực phát triển công nghệ chuyên sâu như Embedded OS, Database, LSI, IoT,…Do đó, kỹ sư phần mềm tại TSDV có nhiều lựa chọn về tính chất công việc. Đồng thời, kỹ sư phần mềm tại TSDV được kỳ vọng có khả năng thích ứng nhanh chóng với những yêu cầu về công nghệ có thể thay đổi ở từng dự án họ tham gia.\r\nVới tinh thần làm việc Nhật Bản: coi trong chất lượng và giá trị cho khách hàng, TSDV có hệ thống quy trình đảm bảo chất lượng toàn diện và chuyên nghiệp. Nó đòi hỏi người kỹ sư cần tuân thủ chặt chẽ với ý thức cao về đảm bảo chất lượng sản phẩm mà mình làm ra. Với những ứng viên mong muốn được phát triển trong môi trường chuyên nghiệp và trung thực, TSDV chắc chắn là một địa chỉ vô cùng thích hợp."])</script><script>self.__next_f.push([1,"28:Taa2,"])</script><script>self.__next_f.push([1,"Được thành lập từ năm 2007, Toshiba Software Development (Việt Nam) (TSDV) là một trong 03 trung tâm nghiên cứu phát triển phần mềm thuộc Tập đoàn Toshiba, Nhật Bản. Chúng tôi tham gia phát triển phần mềm cho các hệ thống và giải pháp công nghiệp của tập đoàn Toshiba trong các lĩnh vực: Năng lượng, Hệ thống \u0026amp; Giải pháp Cơ sở Hạ tầng, Thiết bị Điện tử và Lưu trữ, Giải pháp IoT trong Công nghiệp.\r\n\r\nKỹ sư phần mềm tại TSDV được yêu cầu tham gia đầy đủ quá trình phát triển phần mềm từ phân tích thiết kế, lập trình đến kiểm thử chất lượng phần mềm. TSDV hướng tới mục tiêu xây dựng mô hình người kỹ sư có kỹ năng toàn diện về tư duy/giải pháp phát triển phần mềm hơn là chỉ duy nhất kỹ năng lập trình. Những kỹ năng này sẽ được bổ sung và hoàn thiện dần trong quá trình làm việc và học tập tại TSDV.\r\n\r\nNgoài kỹ năng về lập trình chuyên nghiệp, kỹ sư phần mềm tại TS
