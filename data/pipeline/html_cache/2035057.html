oán công trình; Tư vấn quản lý khối lượng; Tư vấn quản lý dự án; tư vấn giám sát thi công; các nhà thầu xây dựng; nhà cung cấp cho dự án.\u003c/p\u003e\u003cp\u003eQuản lý các hợp đồng với các nhà thầu.\u003c/p\u003e\u003cp\u003eĐánh giá hiệu quả thực hiện của các đơn vị tham giá dự án.\u003c/p\u003e\u003cp\u003eLập, quản lý hồ sơ hoàn công, thanh quyết toán các hợp đồng với nhà thầu, tư vấn theo đúng quy định hợp đồng và pháp luật;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.Quản lý pháp lý và thủ tục dự án\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTổ chức soạn thảo các văn bản và tổ chức lưu trữ bảo quản hồ sơ hình thành trong quá trình thực hiện chức năng nhiệm vụ của Phòng quản lý dự án; \u003c/p\u003e\u003cp\u003eTổ chức cập nhật các văn bản pháp luật và các quy định liên quan đến công tác của bộ phận, đảm bảo dự án tuân thủ các quy định của Pháp luật; Tổ chức đóng góp cải tiến quy trình làm việc của Phòng Dự án\u003c/p\u003e\u003cp\u003eLàm việc với chính quyền địa phương và các cơ quan nhà nước có liên quan trong quá trình triển khai thực hiện dự án;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5.Quản lý rủi ro\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhận diện và đánh giá các rủi ro của dự án. Đề xuất các biện pháp kiểm soát rủi ro.Báo cáo kịp thời các vấn đề phát sinh.;\u003c/p\u003e\u003cp\u003e- Các công việc khác theo yêu cầu của Ban giám đốc.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tb76,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1\tĐỘ TUỔI: từ 30 đến 45\u003c/p\u003e\u003cp\u003e2\tGIỚI TÍNH:\tNam\t\u003c/p\u003e\u003cp\u003e3\tTRÌNH ĐỘ TỐI THIỂU:\tĐại học\t\u003c/p\u003e\u003cp\u003e4\tKHỐI NGÀNH:\tKiến trúc/Kỹ thuật Xây dựng/Kinh tế Xây dựng\t\u003c/p\u003e\u003cp\u003e5\tCHUYÊN MÔN:\tKiến trúc/Xây dựng dân dụng và công nghiệp/Kinh tế xây dựng\t\u003c/p\u003e\u003cp\u003e6\tKINH NGHIỆM TỐI THIỂU:\tCó ít nhất 3 năm kinh nghiệm quản lý dự án xây dựng dự án xây dựng khu đô thị hoặc dự án khu phức hợp nhà ở, thương
