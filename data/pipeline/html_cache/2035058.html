ping—creating a more efficient, connected global supply chain.\r\nGLOBAL OFFICES\r\nCorporate Headquarters: 4388 Shirley Ave, El Monte, CA 91731, USA\r\nSuzhou Office: Building 18, 328 Xinghu Street, Suzhou Industrial Park, Jiangsu Province, China\r\nUK Office: Unit C Swift Point, Cosford Lane, Rugby, England, CV21 1PY\r\nOur website : https://www.gigacloudtech.com/\r\n\r\nCÔNG TY TNHH GIGACLOUD TRADING VIỆT NAM tọa lạc tại Đà Nẵng, Việt Nam. Trụ sở chính của chúng tôi đặt tại Hoa Kỳ. Chúng tôi chuyên quản lý quan hệ đối tác với nhà máy, chuỗi cung ứng, logistics, phân phối và kinh doanh các sản phẩm của công ty trên toàn thế giới. Công ty chúng tôi có hơn 1000 nhân viên. Chúng tôi là một đội ngũ những cá nhân nhiệt huyết và sáng tạo, cùng làm việc nhóm để thích ứng với thị trường luôn thay đổi cũng như những thách thức đến từ sự tăng trưởng.\r\nSỨ MỆNH CỦA CHÚNG TÔI\r\nGigaCloud Technology là nhà cung cấp giải pháp B2B toàn cầu trực tuyến, đang tái định nghĩa chuỗi cung ứng cho người mua và người bán sỉ các mặt hàng cồng kềnh.\r\nSàn thương mại GigaCloud B2B Marketplace của chúng tôi kết nối liền mạch các nhà cung cấp và nhà bán lẻ trên toàn cầu theo thời gian thực.\r\nSÀN THƯƠNG MẠI GIGACLOUD\r\nSàn GigaCloud B2B Marketplace đang thay đổi cách vận hành chuỗi cung ứng bán sỉ đối với các mặt hàng lớn và cồng kềnh, bằng cách kết nối liền mạch các nhà cung cấp và nhà bán lại trên toàn thế giới. Nền tảng tích hợp toàn diện của chúng tôi bao gồm từ tìm kiếm sản phẩm, giao dịch đến thực hiện đơn hàng, được hỗ trợ bởi mạng lưới logistics toàn cầu tại Mỹ, Anh, Đức, Canada và Nhật Bản.\r\nVới hàng nghìn mã sản phẩm và công nghệ độc quyền mang lại dữ liệu thị trường theo thời gian thực, sàn Marketplace của chúng tôi giúp việc tìm nguồn, bán hàng và vận chuyển trở nên đơn giản hơn – tạo nên một chuỗi cung ứng toàn cầu hiệu quả và kết nối hơn.\r\nCÁC VĂN PHÒNG TOÀN CẦU\r\nTrụ sở chính: 4388 Shirley Ave, El Monte, CA 91731, Hoa Kỳ\r\nVP Tô Châu: Tòa nhà 18, số 328 đường Xinghu, Khu công nghiệp Tô Châu, tỉnh Giang Tô, Trung Quốc\r\nVP Vương quốc Anh: Unit C Swift Point, Cosford Lane, Rugby, Anh, CV21 1PY\r\n\r\nWebsite của chúng tôi: https://www.gigacloudtech.com/"])</script><script>self.__next_f.push([1,"24:Tbda,"])</script><script>self.__next_f.push([1,"\u003cp\u003eDuties and Responsibilities:\u003c/p\u003e\u003cp\u003e1. Factory Management/工厂管理:\u003c/p\u003e\u003cp\u003e• 检查并跟进工厂的报价，研究美国/欧洲市场的家具标准，与工厂协作处理报价事宜。/\u003c/p\u003e\u003cp\u003eKiểm tra và theo dõi các báo giá từ nhà máy, nghiên cứu các tiêu chuẩn hàng nội thất ở thị trường Mỹ/Châu Âu… để làm việc về báo giá cùng nhà máy.\u003c/p\u003e\u003cp\u003e• 制作产品详细资料，检查并确认产品图纸；跟进样品进度（如有需要，可直接到工厂验样）。/\u003c/p\u003e\u003cp\u003eLàm hồ sơ chi tiết sản phẩm, kiểm tra bản vẽ sản phẩm, xác nhận bản vẽ; theo dõi tiến độ mẫu (đến trực tiếp nhà máy để kiểm mẫu nếu được cần)\u003c/p\u003e\u003cp\u003e• 检查并跟进出货计划；索取与产品相关的证书；处理出口单证相关工作；跟进按时向工厂付款。/\u003c/p\u003e\u003cp\u003eKiểm tra và theo dõi kế hoạch vận chuyển hàng; yêu cầu những giấy chứng nhận liên quan đến sản phẩm, xử lý các công việc liên quan chứng từ xuất hàng, theo dõi việc thanh toán hàng đúng hạn cho nhà máy.\u003c/p\u003e\u003cp\u003e• 与工厂协调处理产品索赔事宜，并协商为客户提供最佳解决方案。/\u003c/p\u003e\u003cp\u003ePhối hợp với nhà máy để giải quyết các yêu cầu bồi thường sản phẩm, thương lượng để có giải pháp xử lý tốt nhất cho khách hàng.\u003c/p\u003e\u003cp\u003e• 协助寻找新工厂以开发新产品。/\u003c/p\u003e\u003cp\u003eHỗ trợ tìm kiếm các nhà máy mới để phát triển mẫu mới.\u003c/p\u003e\u003cp\u003e2. Co-operate with Product management team/与产品管理团队合作\u003c/p\u003e\u003cp\u003e• 寻找新产品并推荐给在中国的产品管理团队。/\u003c/p\u003e\u003cp\u003eTìm kiếm các sản phẩm mới để giới thiệu đến team PM ở TQ.\u003c/p\u003e\u003cp\u003e• 接收产品目录和需求来自产品管理团队，并与工厂合作以获得最优价格。/\u003c/p\u003e\u003cp\u003eNhận danh mục các sản phẩm và yêu cầu từ team PM, làm việc với NM để nhận được mức giá tối ưu nhất.\u003c/p\u003e\u003cp\u003e• 与产品管理团队沟通，了解各团队的需求和产品系列。/\u003c/p\u003e\u003cp\u003egiao tiếp với team PM
