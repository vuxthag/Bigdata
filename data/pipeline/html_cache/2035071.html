i bản và tầm nhìn dài hạn, Trungnam hướng tới trở thành một Tập đoàn lớn mạnh trong các lĩnh vực hoạt động tại Việt Nam và vươn tầm phát triển khu vực Đông Nam Á.\r\n\r\nSứ mệnh: Trungnam khẳng định khả năng vươn tới thành công trong các lĩnh vực hoạt động với sứ mệnh mang tới niềm tin bền vững cho các cổ đông dựa trên nền tảng hoạt động hiệu quả, đầu tư xây dựng công trình hiện đại, chất lượng, đóng góp vào sự thịnh vượng chung của nước nhà trên đường hội nhập kinh tế thế giới.\r\n\r\nGiá trị cốt lõi: Đặt nền tảng phát triển dựa trên văn hóa kinh doanh lành mạnh. Đào tạo và phát triển nguồn nhân lực. Đem lại lợi ích cao nhất cho cổ đông cũng như mang lại cuộc sống thịnh vượng cho mọi thành viên. Luôn xem tất cả các khách hàng là đối tác, tạo lợi ích công bằng cho cả hai bên.\r\n\r\nVăn hóa doanh nghiệp: Trungnam khẳng định các năng lực cốt lõi xây dựng văn hóa doanh nghiệp là Tâm huyết – Kiên định – Quyết liệt."])</script><script>self.__next_f.push([1,"24:T604,\u003cp\u003e\u003cstrong\u003eVỊ TRÍ 1: KỸ SƯ QLDA ĐIỆN NĂNG LƯỢNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng, thẩm định giải pháp kỹ thuật – công nghệ cho các dự án điện;\u003c/p\u003e\u003cp\u003e- Lập kế hoạch, triển khai, giám sát và quản lý tiến độ, chất lượng, chi phí, ATLĐ \u0026 môi trường công trình;\u003c/p\u003e\u003cp\u003e- Kiểm tra, thẩm định hồ sơ thiết kế, dự toán, đấu thầu, hợp đồng \u0026 quyết toán;\u003c/p\u003e\u003cp\u003e- Giám sát thi công, nghiệm thu, bàn giao, chạy thử và bảo trì – bảo dưỡng thiết bị;\u003c/p\u003e\u003cp\u003e- Thẩm định đề xuất đầu tư và đấu thầu dự án điện.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVỊ TRÍ 2: KỸ SƯ VẬN HÀNH NHÀ MÁY ĐIỆN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Giám sát và quản lý vận hành hoạt động của nhà máy Điện gió/Điện mặt trời;\u003c/p\u003e\u003cp\u003e- Lập kế hoạch vận hành, quản lý dữ liệu, báo cáo và phân tích hiệu suất từ đó đề xuất phương án giúp tối ưu sản lượng
