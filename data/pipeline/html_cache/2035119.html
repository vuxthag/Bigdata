elf.__next_f.push([1,"24:T823,"])</script><script>self.__next_f.push([1,"\u003cp\u003eMô tả công việc\u003c/p\u003e\u003cp\u003e• Quản lý \u0026 kiểm soát hồ sơ thiết kế cơ điện (MEP):\u003c/p\u003e\u003cp\u003e  o Tham gia xây dựng phương án thiết kế sơ bộ trong giai đoạn lập chủ trương đầu tư.\u003c/p\u003e\u003cp\u003e  o Kiểm soát hồ sơ thiết kế phần cơ điện: sơ đồ nguyên lý, bản vẽ chi tiết, tiêu chuẩn kỹ thuật.\u003c/p\u003e\u003cp\u003e  o Đảm bảo hồ sơ thiết kế tuân thủ quy chuẩn – tiêu chuẩn, phù hợp về kỹ thuật, tính khả thi và hiệu quả kinh tế.\u003c/p\u003e\u003cp\u003e• Phối hợp liên ngành:\u003c/p\u003e\u003cp\u003e  o Làm việc với các bộ môn (Kiến trúc, Kết cấu, Cấp thoát nước, Điện, Dự toán…) để thống nhất giải pháp thiết kế, tránh mâu thuẫn giữa các hạng mục.\u003c/p\u003e\u003cp\u003e  o Phối hợp Ban xây dựng Tập đoàn, cơ quan quản lý nhà nước và các đơn vị liên quan để hoàn thiện thủ tục pháp lý về đầu tư xây dựng.\u003c/p\u003e\u003cp\u003e• Hỗ trợ đấu thầu \u0026 lựa chọn nhà thầu:\u003c/p\u003e\u003cp\u003e  o Đề xuất vật tư, thiết bị hệ thống cơ điện làm cơ sở lập dự toán và tiêu chí mời thầu.\u003c/p\u003e\u003cp\u003e  o Rà soát hồ sơ thiết kế, đảm bảo tiêu chí kỹ thuật đầy đủ, khả thi cho quá trình đấu thầu – lựa chọn nhà thầu.\u003c/p\u003e\u003cp\u003e• Theo dõi tiến độ và xử lý phát sinh:\u003c/p\u003e\u003cp\u003e  o Theo dõi, đôn đốc tiến độ triển khai hồ sơ thiết kế trong giai đoạn chuẩn bị đầu tư.\u003c/p\u003e\u003cp\u003e  o Phối hợp xử lý vướng mắc liên quan đến giải pháp kỹ thuật, vật liệu, thủ tục pháp lý.\u003c/p\u003e\u003cp\u003e  o Đề xuất giải pháp đảm bảo tiến độ, chất lượng và tính đồng bộ của hồ sơ thiết kế.\u003c/p\u003e\u003cp\u003e• Báo cáo \u0026 quản lý tài liệu:\u003c/p\u003e\u003cp\u003e  o Soạn thảo công văn, tờ trình, biên bản, hồ sơ liên quan đến công tác quản lý thiết kế.\u003c/p\u003e\u003cp\u003e  o Báo cáo định kỳ/đột xuất về tiến độ, chất lượng hồ sơ thiết kế, phục vụ công tác quản lý dự án.\u003c/p\u003e"
