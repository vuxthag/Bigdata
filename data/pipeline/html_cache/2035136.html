4, chúng tôi đã thành lập Masan Tungsten Manufacturing LLC (NHTCM) – một công ty liên doanh với H.C. Starck Tungsten GmbH, nắm giữ 51% cổ phần, sau đó đến năm 2018 chúng tôi mua 49% cổ phần còn lại của NHTCM và đổi tên thành Công ty TNHH Vonfram Masan (MTC).Công ty được thành lập vào năm 2010 và tập trung vào các hoạt động khai thác tài nguyên khoáng sản (là một thành viên của Tập đoàn Masan), với tên gọi là Công ty Cổ phần Tài nguyên Masan (MSR). Năm 2014, chúng tôi bắt đầu sản xuất và kinh doanh các sản phẩm tinh quặng Vonfram, tinh quặng Đồng, tinh quặng Florit và tinh quặng Bismuth. Để nâng cấp các sản phẩm Hóa chất Vonfram tại Việt Nam, năm 2014, chúng tôi đã thành lập Masan Tungsten Manufacturing LLC (NHTCM) – một công ty liên doanh với H.C. Starck Tungsten GmbH, nắm giữ 51% cổ phần, sau đó đến năm 2018 chúng tôi mua 49% cổ phần còn lại của NHTCM và đổi tên thành Công ty TNHH Vonfram Masan (MTC)."])</script><script>self.__next_f.push([1,"24:T10f7,"])</script><script>self.__next_f.push([1,"\u003cp\u003eTÓM TẮT Hỗ trợ các hoạt động của Trưởng Bộ phận SCM và sẽ chịu trách nhiệm phân tích tài chính và hoạt động tìm kiếm nguồn hàng, mua hàng và quản lý Hợp đồng.\u003c/p\u003e\u003cp\u003eĐồng thời chịu trách nhiệm giám sát và báo cáo các chỉ số (KPI) mua hàng theo tháng và hỗ trợ các công việc khác của chuỗi cung ứng theo hướng dẫn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNHIỆM VỤ CHÍNH (MAIN DUTIES):\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e1. Hỗ trợ Trưởng bộ phận SCM trong việc phát triển và đưa ra các chiến lược\u003c/p\u003e\u003cp\u003eQuản lý chuỗi cung ứng nhằm tối ưu hóa chi phí phù hợp với chiến lược kinh doanh / Support the Supply Chain Manager in developing and delivering SCM strategies that optimize operations and cost in line with the overall business strategy\u003c/p\u003e\u003cp\u003e2. Duy trì mối quan hệ với nhóm chức năng chuyên môn của bộ phận SCM và nhóm tài chính MHT cũng như hỗ trợ Trưởng bộ phận quản lý hợp đồng SCM theo phạm vi công việc/ Maintain relationships with all SCM functional areas and the MHT financial function and assist the Supply Chain Manager in managing all SCM function contracts as per the scope of work\u003c/p\u003e\u003cp\u003e3. Duy trì, xem xét và báo cáo KPI cho bộ phận hàng tháng / Maintain, review and monthly report KPI’s for the SCM functional areas.\u003c/p\u003e\u003cp\u003e4. Lập báo cáo phân tích chi phí theo tháng/quý/năm về mua hàng theo các nhóm hàng hóa, dịch vụ /Make report \u0026 analyze cost by cost group by month/quarter/year.\u003c/p\u003e\u003cp\u003e5. Đảm bảo các dữ liệu phân tích và các báo cáo SCM chính xác và đúng thời hạn/ Ensure SCM analysis and reports are accurate and on time\u003c/p\u003e\u003cp\u003e6. Kịp thời hỗ trợ xác định và báo cáo các vấn đề phát sinh liên quan đến hoạt động của chuỗi cung ứng cho Trưởng bộ phận SCM hay các giám sát bộ phận/ Help to Identify and report safety concerns to the SCM Manager or SCM functional supervisors immediately.\u003c/p\u003e\u003cp\u003e7. Theo dõi và điều phối các hoạt động cải tiến kế hoạch mua hàng, theo dõi tiến độ triển khai so với kế hoạch đã phê duyệt; chủ động nhận diện rủi ro, chậm tiến độ và đề xuất các phương án đối ứng kịp thời nhằm đảm bảo tính liên tục và hiệu quả của hoạt động mua sắm. Tổ chức và điều hành họp với các nhóm để cập nhật tiến độ, thống nhất hành động, theo dõi và đôn đốc việc thực hiện.\u003c/p\u003e\u003cp\u003eMonitor and coordinate activities to improve procurement planning; track implementation progress against the approved plan; proactively identify risks and schedule delays, and propose timely mitigation measures to ensure continuity and efficiency of procurement operations. Organize and chair meetings with relevant teams to update progress, align on actions, and follow up on and drive execution.\u003c/p\u003e\u003cp\u003eQuản lý các Hợp đồng mua sắm khung (FPA – Framework Purchase Agreement), bao gồm theo dõi tiến độ ký kết
