a5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T11df,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Job Description:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis role leads product compliance and material and product testing across the Asia-Pacific region, ensuring products meet global regulatory and internal requirements. The position owns testing standards, manuals, and governance, and delivers risk-based testing programs across nominated suppliers, vendors, factories, their in-house laboratories, and third-party laboratories using the Project Norma platform. The role proactively anticipates future regulatory and customer requirements and embeds them into product design, development, and manufacturing processes. Reporting to the VP of Global Product Stewardship, the role leads a team of product stewards, product safety specialists and testing specialists, establishes factory and supplier in-house laboratory certification programs, and drives training and capability building for internal and external stakeholders. This position will collaborate with AMER and EMEA Product Stewardship leads, working together to effectively support all VF brands and the VF Supply Chain partners.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Core Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Standard Setting \u0026 Stewardship:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   Leads the development, stewardship, and global harmonization of product testing standards, manuals, and operating procedures across VF brands. Owns the multi-year standard convergence roadmap, driving alignment and simplification across brands, regions, and product categories to reduce complexity, eliminate duplication, and improve consistency. Translates legal and regulatory requirements into clear, actionable product standards and ensures they are systematically embedded into design, development, and manufacturing processes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Product Safety \u0026 Compliance:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    Ensures all products designed, sourced, produced and sold in the Asia-Pacific region meet internal and external compliance requirements. Leads product safety reviews with a focus on design safety, managing the review and approval process \"post–Tech Pack\" handover to Supply Chain to identify, assess, and mitigate product safety risks. Drives global initiatives to strengthen product stewardship and consumer safety.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Testing Program Governance:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    Establishes and governs the overall material and product testing program, including defining testing requirements, standards, manuals, and operating procedures. Ensures consistent application of risk-based testing strategies across suppliers, factory and supplier in-house laboratories, and third-party laboratories. Oversees program governance, performance monitoring, and data integrity through the testing platform (e.g., Project Norma).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Supplier \u0026 Factory In-house Laboratory Certification and Proficiency Program:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    Establishes and oversees the supplier and factory in-house laboratory certification and proficiency program, including certification requirements, audit and re-certification cadence, proficiency testing, inter-laboratory comparisons, and CAP management. Ensures transparent lab capability assessment and reliable testing data to support product safety and compliance decisions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• External Third-Party Laboratory Management \u0026 Partnerships:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    Leads governance and management of external third-party testing laboratories, including qualification, performance monitoring, and relationship management. Establishes proficiency expectations to ensure accuracy, consistency, and comparability of results, and maintains strong partnerships to support capacity and continuous improvement.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Leadership \u0026 Team Management:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    Leads and develops a high-performing team of Product Stewards and testing specialists, clarifies roles and responsibilities, and fosters a culture of rigorous, owning-the-outcome and risk-based product safety stewardship. Provides strategic and operational leadership across brands and functions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Training \u0026 Capability Building:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    Designs and delivers training and education programs for internal teams, suppliers, vendors, and testing partners, building organizational capability in testing methods, data interpretation, and risk-based decision-making.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Stakeholder Engagement:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    Maintains strong alignment with brands, product supply teams, and quality management, ensuring clear communication of requirements and effective engagement to support compliance and execution.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T51b,\u003cp\u003e\u003cstrong\u003eRequirements (Education Level, year of experience):\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • At least 5 years of experience in Material and Product testing, Textiles, Manufacturing, Quality Management, Laboratory operations.\u003c/p\u003e\u003cp\u003e   • 4-year degree or above in Textiles, Material Science, Engineering, Testing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSoftware Skills/Competencies required:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    • Experience with chemical analytical testing\u003c/p\u003e\u003cp\u003e    • Experience in supply chain collaboration/ Testing platforms\u003c/p\u003e\u003cp\u003e    • Working experience in “design hazard analysis (DHA)”\u003c/p\u003e\u003cp\u003e    • Working knowledge on testing equipment such as Tensile Tester, Martindale Tester, etc.\u003c/p\u003e\u003cp\u003e    • Experience in data analysis and development of metric-based dashboards\u003c/p\u003e\u003cp\u003e    • Coaching and Developing Others\u003c/p\u003e\u003cp\u003e    • Facilitating Change\u003c/p\u003e\u003cp\u003e    • Business Acumen\u003c/p\u003e\u003cp\u003e    • Operational Decision Making\u003c/p\u003e\u003cp\u003e    • Driving Results\u003c/p\u003e\u003cp\u003e    • Influence\u003c/p\u003e\u003cp\u003e    • Must be an excellent collaborator and communicator\u003c/p\u003e\u003cp\u003e    • Proficient PC skills (Excel, Word, PowerPoint, Outlook and Lotus Notes)\u003c/p\u003e\u003cp\u003e    • Logical thinker, take initiatives, handle and prioritize multiple projects, and work independently\u003c/p\u003e\u003cp\u003e    • Must be detail-oriented with exceptional time-management skills\u003c/p\u003e27:T11df,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Job Description:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis role leads product compliance and material and product testing across the Asia-Pacific region, ensuring products meet global regulatory and internal requirements. The position owns testing standards, manuals, and governance, and delivers risk-based testing programs across nominated suppliers, vendors, factories, their in-house laboratories, and third-party laboratories using the Project Norma platform. The role proactively anticipates future regulatory and customer requirements and embeds them into product design, development, and manufacturi    Designs and delivers training and education programs for internal teams, suppliers, vendors, and testing partners, building organizational capability in testing methods, data interpretation, and risk-based decision-making.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e• Stakeholder Engagement:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    Maintains strong alignment with brands, product supply teams, and quality management, ensuring clear communication of requirements and effective engagement to support compliance and execution.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:T51b,\u003cp\u003e\u003cstrong\u003eRequirements (Education Level, year of experience):\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e   • At least 5 years of experience in Material and Product testing, Textiles, Manufacturing, Quality Management, Laboratory operations.\u003c/p\u003e\u003cp\u003e   • 4-year degree or above in Textiles, Material Science, Engineering, Testing.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSoftware Skills/Competencies required:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e    • Experience with chemical analytical testing\u003c/p\u003e\u003cp\u003e    • Experience in supply chain collaboration/ Testing platforms\u003c/p\u003e\u003cp\u003e    • Working experience in “design hazard analysis (DHA)”\u003c/p\u003e\u003cp\u003e    • Working knowledge on testing equipment such as Tensile Tester, Martindale Tester, etc.\u003c/p\u003e\u003cp\u003e    • Experience in data analysis and development of metric-based dashboards\u003c/p\u003e\u003cp\u003e    • Coaching and Developing Others\u003c/p\u003e\u003cp\u003e    • Facilitating Change\u003c/p\u003e\u003cp\u003e    • Business Acumen\u003c/p\u003e\u003cp\u003e    • Operational Decision Making\u003c/p\u003e\u003cp\u003e    • Driving Results\u003c/p\u003e\u003cp\u003e    • Influence\u003c/p\u003e\u003cp\u003e    • Must be an excellent collaborator and communicator\u003c/p\u003e\u003cp\u003e    • Proficient PC skills
