– Travellers’ Choice 2015\r\nTop Luxury Hotel \u0026 Top Hotel in Vietnam by TripAdvisor – Travellers’ Choice 2015\r\nAward of Excellence for Booking.com Guest Reviews for 2014 by Booking.com\r\nBest Hotel in Vietnam by International Hotel Awards\r\nBest Convention Hotel in Vietnam by International Hotel Awards\r\nBest New Hotel Construction \u0026 Design Vietnam by International Property Awards – Asia Pacific 2014 Winners\r\nHotel of the Year 2014 by Robb Report Vietnam – Best of the Best Award\r\nThe Best New MICE Hotel in Vietnam by The Guide Magazine – The Guide Award 201424:T23e2,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJOB SUMMARY\u003c/p\u003e\u003cp\u003ePrint and organize various necessary documents, summarize relevant information, and distribute information to appropriate employees. Maintain up-to-date knowledge of company safety programs within assigned area of responsibility, (e.g., food, retail), as well as all local, state, and federal regulations. Adhere to food safety and handling policies and procedures across all food-related areas. Maintain clear and organized records to ensure all reports and invoices are filed and stored properly. Calculate figures for inventories, orders, and costs. Conduct inventory audits to determine inventory levels and needs. Notify manager/supervisor of low stock levels. Troubleshoot vendor delivery issues and oversee return process. Verify and track received inventory. Reconcile shipping invoices and receiving reports. Receive, unload, and process deliveries. Monitor PAR levels for all food items to ensure proper levels. Refuse acceptance of damaged, unacceptable, or incorrect items.\u003c/p\u003e\u003cp\u003eJOB SPECIFIC TASKS\u003c/p\u003e\u003cp\u003eGeneral Procurement\u003c/p\u003e\u003cp\u003e• Work with suppliers to resolve discrepancies between invoices and actual received merchandise, and report to manager/supervisor as necessary.\u003c/p\u003e\u003cp\u003e• Lock and unlock secure merchandise storage areas.\u003c/p\u003e\u003cp\u003e• Reconcile shipping invoices and receiving reports to ensure count accuracy.\u003c/p\u003e\u003cp\u003e• Order packaging, raw materials, and supplies as needed.\u003c/p\u003e\u003cp\u003e• Receive, unload, and process deliveries and account for incoming freight based on invoice and receiving reports.\u003c/p\u003e\u003cp\u003e• Verify and track received inventory and complete inventory reports and logs.\u003c/p\u003e\u003cp\u003e• Oversee return process by verifying counts, shipping addresses, labels, etc.\u003c/p\u003e\u003cp\u003e• Check in merchandise, report bad pallets, print and place slot labels, and check current inventory levels.\u003c/p\u003e\u003cp\u003e• Conduct inventory audits to determine inventory levels and needs.\u003c/p\u003e\u003cp\u003e• Notify manager/supervisor of low stock levels in a timely manner.\u003c/p\u003e\u003cp\u003e• Receive and stage merchandise by department, mark appropriately for placement in facility, and deliver merchandise to appropriate department.\u003c/p\u003e\u003cp\u003e• Troubleshoot vendor delivery issues.\u003c/p\u003e\u003cp\u003eFinance\u003c/p\u003e\u003cp\u003e• Maintain clear and organized records to ensure all reports and invoices are filed and stored properly.\u003c/p\u003e\u003cp\u003e• Calculate figures for food inventories, orders, and costs.\u003c/p\u003e\u003cp\u003eGeneral Food - Stocking/Receiving\u003c/p\u003e\u003cp\u003e• Maintain up-to-date knowledge of company safety programs within assigned area of responsibility (e.g., food, retail), as well as all local, state, and federal regulations.\u003c/p\u003e\u003cp\u003e• Monitor PAR levels for all food items to ensure proper levels.\u003c/p\u003e\u003cp\u003e• Inspect deliveries and date times to verify freshness, cleanliness, consistency, and quality throughout case lots.\u003c/p\u003e\u003cp\u003e• Refuse acceptance of damaged, unacceptable, or incorrect items, track refusal of items, and communicate to appropriate management.\u003c/p\u003e\u003cp\u003e• Check weights of all items as compared to order and billing.\u003c/p\u003e\u003cp\u003e• Complete and maintain required departmental paperwork, such as throwaway record sheets, invoices, and assignment notices.\u003c/p\u003e\u003cp\u003e• Adhere to food safety and handling policies and procedures, such as First In-First Out (FIFO) and Cold Chain compliance, across all food-related departments or areas.\u003c/p\u003e\u003cp\u003e• Identify and remove merchandise that is outdated, distressed, or unacceptable in appearance to ensure quality and freshness.\u003c/p\u003e\u003cp\u003e• Complete and maintain up-to-date logs for food products.\u003c/p\u003e\u003cp\u003e• Receive deliveries, store perishables properly, and rotate stock.\u003c/p\u003e\u003cp\u003e• Maintain the sanitation standards of the food storeroom and walk-ins.\u003c/p\u003e\u003cp\u003eOffice - Stocking/Receiving\u003c/p\u003e\u003cp\u003e• Organize and maintain filing systems.\u003c/p\u003e\u003cp\u003e• Print, organize, and separate various necessary documents, summarize relevant information, and distribute information to appropriate employees.\u003c/p\u003e\u003cp\u003eGuest Relations\u003c/p\u003e\u003cp\u003e• Assist other employees to ensure proper coverage and prompt guest service.\u003c/p\u003e\u003cp\u003eCommunication\u003c/p\u003e\u003cp\u003e• Talk with and listen to other employees to effectively exchange information.\u003c/p\u003e\u003cp\u003e• Provide assistance to coworkers, ensuring they understand their tasks.\u003c/p\u003e\u003cp\u003e• Speak to guests and co-workers using clear, appropriate and professional language.\u003c/p\u003e\u003cp\u003e• Discuss work topics, activities, or problems with coworkers, supervisors, or managers discreetly and quietly, avoiding public areas of the property.\u003c/p\u003e\u003cp\u003e• Prepare and review written documents (e.g., daily logs, business letters, memoranda, reports), including proofreading and editing written information to ensure accuracy and completeness.\u003c/p\u003e\u003cp\u003eAssists Management\u003c/p\u003e\u003cp\u003e• Coordinate tasks and work with other departments to ensure that the department runs efficiently.\u003c/p\u003e\u003cp\u003e• Ensure employee compliance with company standards and policies and external regulations (e.g., safety, OSHA, department-specific procedures such as food standards).\u003c/p\u003e\u003cp\u003e• Ensure that hourly employees are trained on company core values, job roles, responsibilities, and technical and service aspects of the job.\u003c/p\u003e\u003cp\u003e• Serve as a departmental role model or mentor by working alongside employees to perform technical or functional job duties.\u003c/p\u003e\u003cp\u003e• Assist management to ensure that hourly employees have the necessary resources to effectively perform their jobs (e.g., supplies, equipment, and inventory).\u003c/p\u003e\u003cp\u003e• Assign and ensure work tasks are completed on time and that they meet appropriate quality standards.\u003c/p\u003e\u003cp\u003e• Assist management in establishing and communicating goals, performance expectations, timetables and deadlines for shift or departmental operations to hourly employees and ensure that they are understood.\u003c/p\u003e\u003cp\u003e• Collaborate with management to develop and carry-out ideas and procedures, and set goals to continuously improve department performance around guest and employee satisfaction scores.\u003c/p\u003e\u003cp\u003e• Listen to hourly employees' suggestions for improving how work is done and how guests are served, gaining management support as needed to act upon suggestions.\u003c/p\u003e\u003cp\u003eWorking with Others\u003c/p\u003e\u003cp\u003e• Develop and maintain positive and productive working relationships with other employees and departments.\u003c/p\u003e\u003cp\u003e• Support all co-workers and treat them with dignity and respect.\u003c/p\u003e\u003cp\u003e• Handle sensitive issues with employees and/or guests with tact, respect, diplomacy, and confidentiality.\u003c/p\u003e\u003cp\u003e• Partner with and assist others to promote an environment of teamwork and achieve common goals.\u003c/p\u003e\u003cp\u003e• Actively listen to and consider the concerns of other employees, responding appropriately and effectively.\u003c/p\u003e\u003cp\u003eQuality Assurance/Quality Improvement\u003c/p\u003e\u003cp\u003e• Comply with quality assurance expectations and standards.\u003c/p\u003e\u003cp\u003e• Monitor the performance of others to ensure adherence to quality expectations and standards.\u003c/p\u003e\u003cp\u003ePhysical Tasks\u003c/p\u003e\u003cp\u003e• Read and visually verify information in a variety of formats (e.g., small print).\u003c/p\u003e\u003cp\u003e• Stand, sit, or walk for an extended period of time or for an entire work shift.\u003c/p\u003e\u003cp\u003e• Move, lift, carry, push, pull, and place objects weighing less than or equal to 50 pounds without assistance.\u003c/p\u003e\u003cp\u003e• Grasp, turn, and manipulate objects of varying size and weight, requiring fine motor skills and hand-eye coordination.\u003c/p\u003e\u003cp\u003e• Move through narrow, confined, or elevated spaces.\u003c/p\u003e\u003cp\u003e• Move over sloping, uneven, or slippery surfaces.\u003c/p\u003e\u003cp\u003e• Move up and down stairs and/or service ramps.\u003c/p\u003e\u003cp\u003eSafety and Security\u003c/p\u003e\u003cp\u003e• Follow company and department safety and security policies and procedures to ensure a clean, safe, and secure environment.\u003c/p\u003e\u003cp\u003e• Follow Hazardous Material Management Program procedures for handling and disposing of chemicals, fertilizer, pesticides, blood borne pathogens, etc., including using Material Safety Data Sheets (MSDS).\u003c/p\u003e\u003cp\u003e• Report work related accidents, or other injuries immediately upon occurrence to manager/supervisor.\u003c/p\u003e\u003cp\u003e• Follow policies and pr
