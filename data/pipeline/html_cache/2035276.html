\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\tResponsible for working with factory partners and key vendors in converting initial design renderings into successful, manufacturable, profitable also commercialized product. \u003c/p\u003e\u003cp\u003e\tReviews blue prints, 3Ds and wooden models with supporting from Product Development Manager and  LO Columbia PEM to ensure accuracy, functionality of mold details and design integrity.\u003c/p\u003e\u003cp\u003e\tManage project information, ensure its accuracy and timeline requested, leads meetings with key partners, suppliers, mold vendors and team members.\u003c/p\u003e\u003cp\u003e\tDemonstrate an awareness of and engage in all phases of the Columbia product process which ensures that projects are approved, tested, completed and on-time delivered , are manufacturable, meet design intent, performance, costing and sustainability goals. \u003c/p\u003e\u003cp\u003e\tConstantly review and evaluate the project status with your HQ Portland counterpart and keep them continually in the loop regarding issues which may take the project outside of its predetermined track and offer the solution plan;\u003c/p\u003e\u003cp\u003e\tUtilize your footwear knowledge and tools to achieve project objectives and communicate project status to your direct leadership and dotted line reported to your Portland based supervisor;\u003c/p\u003e\u003cp\u003e\tEstablish and maintain a close working relationship with your counterpart engineering and production team who has primary responsibility for last, pattern, tooling, commercialization and production functions in all key development stages;\u003c/p\u003e\u003cp\u003e\tFully support the product commercialization process through T1 to T4 also onto the initial productions, one of the key driver for the successful hand-over to CSC production team before production with the documents provided includes CCL, Key Feature \u0026 process Map, Passing reports for upper materials, bottom, finish goods, CFMed T1and PCS; \u003c/p\u003e\u003cp\u003e\tManage prototyping and sampling across designated partner bases and advise on any performance shortcoming  and timing issue by these factory partners and provide the improvement plans;\u003c/p\u003e\u003cp\u003e\tApply an advanced understanding of product and category objectives, performance, quality, fit goals, best practices, testing, costing desire and consumer requirements.\u003c/p\u003e\u003cp\u003e\tKey projects \u0026 pilot programs management and lead with best practise and key feature \u0026 map well outlined by full involvement from tech packs to commercialization and initial productions and ensure its fully implemented into mass production as well; \u003c/p\u003e\u003cp\u003e\tNotify and verify to the Portland product team and LO related teams all material, component and construction options meet the key features and product performance requirement before buy placement; And keep related teams timely updated with information which impacts their specific roles at all key stages in the process or where assistance is necessary.\u003c/p\u003e\u003cp\u003e\tMaintain current files on all assigned models. Files should include sample request forms, last specification data, specifications and notice of changes, confirmed tooling drawings, key feature \u0026 process maps and all other related information important.  \u003c/p\u003e\u003cp\u003e\tTraining and mentoring of Product Developer Assistant and Level I is a core accountability of this job and is a key function against which job performance will be measured.\u003c/p\u003e\u003cp\u003e\tBe a person of unquestionable integrity and honesty in all business relationships and establish a professional, industrious working relationship with factory partners.  Build up this relationship in a manner which ensures the name and integrity of the Columbia company is continually held in high esteem\u003c/p\u003e\u003cp\u003e\t Be prepared to take on other project or brand-related duties as may be assigned from time to time.\u003c/p\u003e\u003cp\u003e\tCarry out the details of this Job Description not only in word but spirit and reality too;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T1349,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eGeneral Summary:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eManages the development of new footwear products from the receipt of Tech Package through key development stages to commercialization, providing support during the commercialization and the transition into the initial productions. . Close cooperation and collaboration between LO PE team for the engineering on the new last, new upper and new tool during the development stages with best practice and key feature map \u0026 process set up and implement into commercialization and initial productions; Maintains connectivity between HQ and across LO multi- function teams also the factory teams through the tech pack to finished product. Responsible for the executions of the product design, lead time, performance, costing, delivery and manufacturability are all well achieved. Key project and pilot program management and full involvement and support in  commercialization  and initial production.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e___________________________________________________\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEssential Duties and Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\tResponsible for working with factory partners and key vendors in converting initial design renderings into successful, manufacturable, profitable also commercialized product. \u003c/p\u003e\u003cp\u003e\tReviews blue prints, 3Ds and wooden models with supporting from P
