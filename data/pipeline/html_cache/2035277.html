những sản phẩm thiết thực, gần gũi nhất đến người dân, nâng cao đời sống sinh hoạt và đời sống tinh thần, xây dựng một xã hội văn minh hiện đại cho toàn bộ cư dân ở mọi nơi với mọi tầng lớp thu nhập.\r\n\r\nCông ty hiện đang làm chủ đầu tư của một số dự án bất động sản tiêu biểu tại tỉnh Hoà Bình bao gồm dự án nhà ở xã hội, nhà ở công nhân, 2 dự án khu đô thị gồm An Cư Xanh và Zen Village; Dịch vụ quản lý hạ tầng với dự án khu công nghiệp bờ trái sông Đà, Tổ hợp công nghiệp Tiên Tiến.\r\n\r\nMảng Giáo dục, Công ty cũng đã thành công xây dựng và quản lý hệ thống trường liên cấp đạt chuẩn quốc tế. Từ năm 2021, Công ty mở rộng sang lĩnh vực Nông nghiệp công nghệ cao, Chăm sóc sức khỏe – du lịch,...\r\n\r\nVới quy mô nhân lực hơn 300 nhân sự là các nhà quản lý, chuyên gia tư vấn và các kỹ sư, giáo viên có bề dày kinh nghiệm, đội ngũ công nhân kỹ thuật lành nghề cùng trang thiết bị hiện đại đồng bộ, Công ty Cổ phần thương mại Dạ Hợp đang không ngừng lớn mạnh và khẳng định vị thế trên thị trường xây dựng Việt Nam.\r\n\r\nHiện nay để đáp ứng nhu cầu hoạt động của các dự án đang phát triển, Chúng tôi cần tuyển dụng bổ sung một số vị trí mới góp phần nâng cao chất lượng và quy mô nhân lực."])</script><script>self.__next_f.push([1,"24:T9e6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Thực hiện chức năng kiểm soát, hậu kiểm, và thẩm định độc lập các tài liệu, chi phí, khối lượng, và quy trình liên quan đến các dự án Đầu tư Xây dựng Cơ bản (XDCB). Mục tiêu là đảm bảo tính tuân thủ (quy định pháp luật và nội bộ), tính hợp lý về chi phí, và hiệu quả của nguồn vốn đầu tư.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Kiểm tra, xác minh, thẩm định\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thực hiện kiểm tra định kỳ và/hoặc đột xuất đối với hoạt động đầu tư\u003c/p\u003e\u003cp\u003e- Xây dựng theo chỉ đạo của lãnh đạo.\u003c/p\u003e\u003cp\u003e- Rà soát hồ sơ dự toán, bóc tách khối lượng, định mức và đơn giá để phát hiện 003cbr/\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T70d,\u003cp\u003e\u003cstrong\u003e1. Bằng cấp tối thiểu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên các chuyên ngành Kinh tế xây dựng, Kỹ thuật xây dựng, hoặc Quản lý Dự án\u003c/p\u003e\u003cp\u003e- Ưu tiên ứng viên có chứng chỉ hành nghề (kiểm toán, đấu thầu, định giá xây dựng…).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tối thiểu 03 năm kinh nghiệm làm việc trong lĩnh vực Dự toán công trình, Quản lý chi phí (QS), hoặc Kiểm soát hợp đồng tại các công ty hoạt động trong lĩnh vực Xây dựng/Đầu tư.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Kiến thức chuyên môn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Nắm vững các quy định pháp luật hiện hành về Quản lý chi phí đầu tư xây dựng, Hợp đồng XDCB, và Đấu thầu.\u003c/p\u003e\u003cp\u003e- Thành thạo việc đọc hiểu Bản vẽ kỹ thuật và bóc tách khối lượng. \u003c/p\u003e\u003cp\u003e- Sử dụng tốt các phần mềm chuyên ngành (dự toán) và Tin học văn phòng.\u003c/p\u003e\u003cp\u003e- Khả năng phân tích số liệu, tư duy phản biện và kỹ năng giao tiếp, trình bày tốt\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kỹ năng khác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Sử dụng thành thạo chuyên sâu tin học văn phòng Microsoft Office, Hệ điều hành windows, các phần mềm ứng dụng.\u003c/p\u003e\u003cp\u003e- Thành thạo tiếng anh là một lợi thế\u003c/p\u003e\u003cp\u003e- Sử dụng thành thạo chuyên sâu tin học văn phòng Microsoft Office, Hệ điều hành windows, các phần mềm ứng dụng.\u003c/p\u003e\u003cp\u003e- Kiểm tra giám sát, đánh giá, thuyết trình, làm việc nhóm hiệu quả, giải quyết vấn đề, tư duy logic và quản lý thời gian.\u003c/p\u003e\u003cp\u003e- Kỹ năng tự nghiên c
