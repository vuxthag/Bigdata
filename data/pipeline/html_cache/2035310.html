\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tdad,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Tập đoàn Đầu tư I.P.A (IPA Group) là một tập đoàn đầu tư đa ngành, hoạt động hiệu quả tại nhiều lĩnh vực kinh tế mũi nhọn, đóng góp tích cực vào sự phát triển kinh tế – xã hội ở nhiều địa phương trên cả nước.\r\n\r\nTiền thân là Công ty TNHH Đầu tư và Tài chính IPA, thành lập từ năm 1998, IPA Group đã có hơn 27 năm kinh nghiệm trên thị trường. Từ một doanh nghiệp đầu tư tài chính, IPA không ngừng mở rộng quy mô và lĩnh vực hoạt động, xây dựng hệ sinh thái doanh nghiệp đa dạng gồm 23 công ty con và công ty liên kết.\r\n\r\nTrụ sở chính của đặt tại: Số 1, phố Nguyễn Thượng Hiền, phường Nguyễn Du, quận Hai Bà Trưng, Hà Nội.\r\n\r\nNgày 01/11/2021, cổ phiếu của Công ty chính thức được niêm yết tại Sở Giao dịch Chứng khoán Hà Nội với mã chứng khoán IPA. Đến ngày 18/07/2022, IPA tăng vốn điều lệ lên 2,138,357,750,000 đồng sau khi hoàn tất chào bán cổ phiếu ra công chúng và phát hành cổ phiếu từ nguồn vốn chủ sở hữu. Đây là cột mốc quan trọng, đánh dấu bước phát triển mới trên hành trình khẳng định vị thế của IPA Group trong hệ sinh thái doanh nghiệp Việt Nam hiện đại.\r\n\r\nTại IPA, chúng tôi tin rằng giá trị bền vững được kiến tạo từ một nền tảng nội lực vững chắc và một chiến lược đầu tư có tầm nhìn. Mô hình hoạt động của chúng tôi được xây dựng dựa trên chính triết lý này.\r\n\r\n1. Nền tảng nội lực (IPAG Foundation): Tích hợp Con người – Thúc đẩy Tăng trưởng\r\n\r\nTrọng tâm của chúng tôi là xây dựng một nền tảng vận hành vững mạnh, lấy con người làm cốt lõi và công nghệ làm đòn bẩy. Chúng tôi đầu tư vào việc phát triển đội ngũ kế thừa (IPA Academy), chuẩn hóa quy trình tri thức (DIKW), và làm chủ công nghệ kết nối (Digital Connectivity), tạo ra một hệ thống vận hành thông suốt và hiệu quả.\r\n\r\n2. Biểu hiện giá trị (IPAG Values): Tích hợp Đối tác – Thúc đẩy Tăng trưởng\r\n\r\nTừ nền tảng nội lực đó, chúng tôi triển khai hai hoạt động cốt lõi, thể hiện rõ nhất giá trị và thế mạnh của IPA:\r\n\r\nĐầu tư Tác động (Impact Investment): Chúng tôi không chỉ đầu tư tài chính, mà còn đồng hành cùng các doanh nghiệp tiên phong trong các lĩnh vực kinh tế xanh và phát triển bền vững. Chúng tôi tìm kiếm và rót vốn vào những đối tác chia sẻ tầm nhìn về một tương lai có trách nhiệm.\r\n\r\nQuản lý Tài sản (Asset Management): Với vai trò là một nhà quản lý tài sản chuyên nghiệp, chúng tôi mang đến các giải pháp tài chính và đầu tư ưu việt, giúp bảo vệ và gia tăng tài sản cho các nhà đầu tư cá nhân giá trị cao (High Net Worth Investor), tổ chức và văn phòng gia đình (Family Office).\r\n\r\nSự kết hợp giữa nền tảng nội lực và giá trị đầu tư này không chỉ là chiến lược kinh doanh, mà còn là cam kết của IPA trong việc kiến tạo sự thịnh vượng bền vững cho các đối tác, khách hàng và cộng đồng."])</script><script>self.__next_f.push([1,"24:Tdad,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eCHỨC NĂNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTham mưu và giúp việc cho Tổng Giám đốc Công ty/ Chủ tịch HĐQT, Ban PTDA về công tác quản lý thiết kế, quy hoạch bao gồm:\u003c/p\u003e\u003cp\u003e- Tổ chức, xây dựng bộ phận, quản lý, điều hành Phòng Quản lý Thiết kế thực hiện các chức năng, nhiệm vụ của Phòng theo đúng quy định của Công ty.\u003c/p\u003e\u003cp\u003e- Kết hợp các bộ phận lựa chọn các nhà thầu tư vấn thiết kế, quy hoạch phù hợp với loại hình dự án (Khu đô thị, khu đô thị sinh thái, khu du lịch nghỉ dưỡng, nhà ở cao tầng, khách sạn, nhà hàng…) và phù hợp với giai đoạn thiết kế, quy hoạch (Quy hoạch chi tiết, Thiết kế Concept, thiết kế cơ sở, thiết kế kỹ thuật, thiết kế bản vẽ thi công…).\u003c/p\u003e\u003cp\u003e- Xây dựng kiểm soát công tác thi công đảm bảo đúng thiết kế được phê duyệt.\u003c/p\u003e\u003cp\u003e- Theo dõi, đôn đốc, quản lý chất lượng và tiến độ các hợp đồng tư vấn thiết kế, quy hoạch.\u003c/p\u003e\u003cp\u003e- Tổ chức nghiên cứu tối ưu hóa thiết kế để nâng cao hiệu quả đầu tư.\u003c/p\u003e\u003cp\u003e- Tham gia kiểm tra, rà soát, đánh giá về thiết kế, quy hoạch với các dự án khác theo yêu cầu của Giám đốc Công ty/ Chủ tịch HĐQT.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tiếp nhận thông tin liên quan đến công tác thiết kế, quy hoạch, tiếp nhận nhiệm vụ thiết kế từ Giám đốc Công ty/ Chủ tịch HĐQT, chủ trì xử lý các vướng mắc liên quan đến công tác thiết kế trong bước thực hiện chuẩn bị đầu tư và thực hiện đầu tư.\u003c/p\u003e\u003cp\u003e- Tổ chức kiểm tra/ kiểm định toàn bộ công tác thiết kế; Lập kế hoạch triển khai các bước thiết kế; Kiểm tra thành phần nội dung Hồ sơ phù hợp với quy định, tuân thủ các Quy chuẩn, Tiêu chuẩn thiết kế, phù hợp với công năng sử dụng và nhiệm vụ thiết kế đã được duyệt; Đánh giá sự hợp lý của các giải pháp có tính đến giải pháp tối ưu; Đảm bảo tính hợp lý của dây chuyền công năng, tính thẩm mỹ của phương án kiến trúc quy hoạch, các kết quả tính toán đảm bảo sự hợp lý và độ an toàn của kết cấu, đảm bảo sự hợp lý và công suất hoạt động hệ thống ME…\u003c/p\u003e\u003cp\u003e- Kiểm soát thay đổi thiết kế do yêu cầu thay đổi chức năng, công năng sử dụng, do điều kiện thực tế hiện trường và các yêu cầu khác.\u003c/p\u003e\u003cp\u003e- Lập nhiệm vụ thiết kế, lựa chọn vật tư, vật liệu trang thiết bị…đảm bảo yêu cầu về thẩm mỹ và hạn chế mức chi phí đầu tư.\u003c/p\u003e\u003cp\u003e- Kiểm soát nhiệm vụ thiết kế trước khi ký Hợp đồng tư vấn thiết kế, quy hoạch.\u003c/p\u003e\u003cp\u003e- Theo dõi và quản lý các hợp đồng, đánh giá định kỳ về các Hợp đồng và hồ sơ thiết kế, quy hoạch.\u003c/p\u003e\u003cp\u003e- Kết hợp các bộ phận tổ chức theo dõi và quản lý các hợp đồng, công việc liên quan như đo đạc, khảo sát…\u003c/p\u003e\u003cp\u003e- Tham gia nghiệm thu chất lượng thi công các cấu kiện, chi tiết kiến trúc, lắp đặt thiết bị, bộ phận công trình liên quan đến thẩm mỹ công trình.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tab2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1. Trình độ học vấn/Chứng chỉ \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên, chuyên ngành: Kiến trúc, Quy hoạch.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Kinh nghiệm làm việc \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- 1 - 3 năm kinh nghiệm làm việc tại vị trí tương đương.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3. Kiến thức/Năng lực chuyên môn/Kỹ năng \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có kỹ năng lập kế hoạch, tổ chức và quản lý.\u003c/p\u003e\u003cp\u003e- Tiếp thu chỉ đạo, ý tưởng của Lãnh đạo, đưa ra các phương án – ý tưởng thiết kế, quy hoạch có chất lượng, phù hợp.\u003c/p\u003e\u003cp\u003e- Nắm vững quy trình thực hiện dự án, các bước triển khai quy hoạch thiết kế từ giai đoạn chuẩn bị đầu tư đến giai đoạn thi công xây dựng.\u003c/p\u003e\u003cp\u003e- Nắm vững các quy định pháp luật về xây dựng và những quy định tại các văn bản pháp luật khác có liên quan đến hoạt động đầu tư xây dựng.\u003c/p\u003e\u003cp\u003e- Kiến thức về sử dụng vật liệu hoàn thiện công trình;\u003c/p\u003e\u003cp\u003e- Thành thạo các phần mềm chuyên ngành.\u003c/p\u003e\u003cp\u003e- Tính cách trung thực, quyết đoán, có trách nhiệm và tâm huyết với công việc.\u003c/p\u003e\u003cp\u003e- Có hiểu biết, quan hệ với các đơn vị đối tác trong lĩnh vực thiết kế, quy hoạch, thi công.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4. Yêu cầu khác:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Sẵn sàng đi công tác.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e5. Năng lực cốt lõi \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có tố chất và tư duy phù hợp với hệ giá trị cốt lõi của công ty.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLỢI ÍCH VÀ QUYỀN LỢI \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Cộng đồng những người làm nghề chính trực và dấn thân phụng sự  \u003c/p\u003e\u003cp\u003e- Môi trường làm nghề tài chính chuyên nghiệp.\u003c/p\u003e\u003cp\u003e- Làm việc với tinh thần làm chủ, sáng tạo và thách thức. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Tổng thu nhập theo năng lực \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thu nhập xứng đáng theo năng lực và giá trị đóng góp. \u003c/p\u003e\u003cp\u003e- Xem xét thay đổi thu nhập hàng năm. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3. Chế độ đãi ngộ \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham gia BHXH, BHYT, BHTN theo đúng quy định luật lao động.\u003c/p\u003e\u003cp\u003e- Được tham gia đóng bảo hiểm sức khỏe và bảo hiểm tai nạn 24/24. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4. Tổ chức học tập và văn hóa sôi nổi\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Không gian làm việc mở với trang thiết bị hiện đại.\u003c/p\u003e\u003cp\u003e- Các hoạt động văn hóa, gắn kết đội ngũ, thiện nguyện phong phú, ý nghĩa. \u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Tdad,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Tập đoàn Đầu tư I.P.A (IPA Group) là một tập đoàn đầu tư đa ngành, hoạt động hiệu quả tại nhiều lĩnh vực kinh tế mũi nhọn, đóng góp tích cực vào sự phát triển kinh tế – xã hội ở nhiều địa phương trên cả nước.\r\n\r\nTiền thân là Công ty TNHH Đầu tư và Tài chính IPA, thành lập từ năm 1998, IPA Group đã có hơn 27 năm kinh nghiệm trên thị trường. Từ một doanh nghiệp đầu tư tài chính, IPA không ngừng mở rộng quy mô và lĩnh vực hoạt động, xây dựng hệ sinh thái doanh nghiệp đa dạng gồm 23 công ty con và công ty liên kết.\r\n\r\nTrụ sở chính của đặt tại: Số 1, phố Nguyễn Thượng Hiền, phường Nguyễn Du, quận Hai Bà Trưng, Hà Nội.\r\n\r\nNgày 01/11/2021, cổ phiếu của Công ty chính thức được niêm yết tại Sở Giao dịch Chứng khoán Hà Nội với mã chứng khoán IPA. Đến ngày 18/07/2022, IPA tăng vốn điều lệ lên 2,138,357,750,000 đồng sau khi hoàn tất chào bán cổ phiếu ra công chúng và phát hành cổ phiếu từ nguồn vốn chủ sở hữu. Đây là cột mốc quan trọng, đánh dấu bước phát triển mới trên hành trình khẳng định vị thế của IPA Group trong hệ sinh thái doanh nghiệp Việt Nam hiện đại.\r\n\r\nTại IPA, chúng tôi tin rằng giá trị bền vững được kiến tạo từ một nền tảng nội lực vững chắc và một chiến lược đầu tư có tầm nhìn. Mô hình hoạt động của chúng tôi được xây dựng dựa trên chính triết lý này.\r\n\r\n1. Nền tảng nội lực (IPAG Foundation): Tích hợp Con người – Thúc đẩy Tăng trưởng\r\n\r\nTrọng tâm của chúng tôi là xây dựng một nền tảng vận hành vững mạnh, lấy con người làm cốt lõi và công nghệ làm đòn bẩy. Chúng tôi đầu tư vào việc phát triển đội ngũ kế thừa (IPA Academy), chuẩn hóa quy trình tri thức (DIKW), và làm chủ công nghệ kết nối (Digital Connectivity), tạo ra một hệ thống vận hành thông suốt và hiệu quả.\r\n\r\n2. Biểu hiện giá trị (IPAG Values): Tích hợp Đối tác – Thúc đẩy Tăng trưởng\r\n\r\nTừ nền tảng nội lực đó, chúng tôi triển khai hai hoạt động cốt lõi, thể hiện rõ nhất giá trị và thế mạnh của IPA:\r\n\r\nĐầu tư Tác động (Impact Investment): Chúng tôi không chỉ đầu tư tài chính, mà còn đồng hành cùng các doanh nghiệp tiên phong trong các lĩnh vực kinh tế xanh và phát triển bền vững. Chúng tôi tìm kiếm và rót vốn vào những đối tác chia sẻ tầm nhìn về một tương lai có trách nhiệm.\r\n\r\nQuản lý Tài sản (Asset Management): Với vai trò là một nhà quản lý tài sản chuyên nghiệp, chúng tôi mang đến các giải pháp tài chính và đầu tư ưu việt, giúp bảo vệ và gia tăng tài sản cho các nhà đầu tư cá nhân giá trị cao (High Net Worth Investor), tổ chức và văn phòng gia đình (Family Office).\r\n\r\nSự kết hợp giữa nền tảng nội lực và giá trị đầu tư này không chỉ là chiến lược kinh doanh, mà còn là cam kết của IPA trong việc kiến tạo sự thịnh vượng bền vững cho các đối tác, khách hàng và cộng đồng."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:Tdad,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Tập đoàn Đầu tư I.P.A (IPA Group) là một tập đoàn đầu tư đa ngành, hoạt động hiệu quả tại nhiều lĩnh vực kinh tế mũi nhọn, đóng góp tích cực vào sự phát triển kinh tế – xã hội ở nhiều địa phương trên cả nước.\r\n\r\nTiền thân là Công ty TNHH Đầu tư và Tài chính IPA, thành lập từ năm 1998, IPA Group đã có hơn 27 năm kinh nghiệm trên thị trường. Từ một doanh nghiệp đầu tư tài chính, IPA không ngừng mở rộng quy mô và lĩnh vực hoạt động, xây dựng hệ sinh thái doanh nghiệp đa dạng gồm 23 công ty con và công ty liên kết.\r\n\r\nTrụ sở chính của đặt tại: Số 1, phố Nguyễn Thượng Hiền, phường Nguyễn Du, quận Hai Bà Trưng, Hà Nội.\r\n\r\nNgày 01/11/2021, cổ phiếu của Công ty chính thức được niêm yết tại Sở Giao dịch Chứng khoán Hà Nội với mã chứng khoán IPA. Đến ngày 18/07/2022, IPA tăng vốn điều lệ lên 2,138,357,750,000 đồng sau khi hoàn tất chào bán cổ ph 03c/strong\u003e\u003c/p\u003e\u003cp\u003eTham mưu và giúp việc cho Tổng Giám đốc Công ty/ Chủ tịch HĐQT, Ban PTDA về công tác quản lý thiết kế, quy hoạch bao gồm:\u003c/p\u003e\u003cp\u003e- Tổ chức, xây dựng bộ phận, quản lý, điều hành Phòng Quản lý Thiết kế thực hiện các chức năng, nhiệm vụ của Phòng theo đúng quy định của Công ty.\u003c/p\u003e\u003cp\u003e- Kết hợp các bộ phận lựa chọn các nhà thầu tư vấn thiết kế, quy hoạch phù hợp với loại hình dự án (Khu đô thị, khu đô thị sinh thái, khu du lịch nghỉ dưỡng, nhà ở cao tầng, khách sạn, nhà hàng…) và phù hợp với giai đoạn thiết kế, quy hoạch (Quy hoạch chi tiết, Thiết kế Concept, thiết kế cơ sở, thiết kế kỹ thuật, thiết kế bản vẽ thi công…).\u003c/p\u003e\u003cp\u003e- Xây dựng kiểm soát công tác thi công đảm bảo đúng thiết kế được phê duyệt.\u003c/p\u003e\u003cp\u003e- Theo dõi, đôn đốc, quản lý chất lượng và tiến độ các hợp đồng tư vấn thiết kế, quy hoạch.\u003c/p\u003e\u003cp\u003e- Tổ chức nghiên cứu tối ưu hóa thiết kế để nâng cao hiệu quả đầu tư.\u003c/p\u003e\u003cp\u003e- Tham gia kiểm tra, rà soát, đánh giá về thiết kế, quy hoạch với các dự án khác theo yêu cầu của Giám đốc Công ty/ Chủ tịch HĐQT.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tiếp nhận thông tin liên quan đến công tác thiết kế, quy hoạch, tiếp nhận nhiệm vụ thiết kế từ Giám đốc Công ty/ Chủ tịch HĐQT, chủ trì xử lý các vướng mắc liên quan đến công tác thiết kế trong bước thực hiện chuẩn bị đầu tư và thực hiện đầu tư.\u003c/p\u003e\u003cp\u003e- Tổ chức kiểm tra/ kiểm định toàn bộ công tác thiết kế; Lập kế hoạch triển khai các bước thiết kế; Kiểm tra thành phần nội dung Hồ sơ phù hợp với quy định, tuân thủ các Quy chuẩn, Tiêu chuẩn thiết kế, phù hợp với công năng sử dụng và nhiệm vụ thiết kế đã được duyệt; Đánh giá sự hợp lý của các giải pháp có tính đến giải pháp tối ưu; Đảm bảo tính hợp lý của dây chuyền công năng, tính thẩm mỹ của phương án kiến trúc quy hoạch, các kết quả tính toán đảm bảo sự hợp lý và độ an toàn của kết cấu, đảm bảo sự hợp lý và công suất hoạt động hệ thống ME…\u003c/p\u003e\u003cp\u003e- Kiểm soát thay đổi thiết kế do yêu cầu thay đổi chức năng, công năng sử dụng, do điều kiện thực tế hiện trường và các yêu cầu khác.\u003c/p\u003e\u003cp\u003e- Lập nhiệm vụ thiết kế, lựa chọn vật tư, vật liệu trang thiết bị…đảm bảo yêu cầu về thẩm mỹ và hạn chế mức chi phí đầu tư.\u003c/p\u003e\u003cp\u003e- Kiểm soát nhiệm vụ thiết kế trước khi ký Hợp đồng tư vấn thiết kế, quy hoạch.\u003c/p\u003e\u003cp\u003e- Theo dõi và quản lý các hợp đồng, đánh giá định kỳ về các Hợp đồng và hồ sơ thiết kế, quy hoạch.\u003c/p\u003e\u003cp\u003e- Kết hợp các bộ phận tổ chức theo dõi và quản lý các hợp đồng, công việc liên quan như đo đạc, khảo sát…\u003c/p\u003e\u003cp\u003e- Tham gia nghiệm thu chất lượng thi công các cấu kiện, chi tiết kiến trúc, lắp đặt thiết bị, bộ phận công trình liên quan đến thẩm mỹ công trình.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:Tab2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1. Trình độ học vấn/Chứng chỉ \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học trở lên, chuyên ngành: Kiến trúc, Quy hoạch.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2. Kinh nghiệm làm việc \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- 1 - 3 năm kinh nghiệm làm việc tại vị trí tương đương.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3. Kiến thức/Năng lực chuyên môn/Kỹ năng \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có kỹ năng lập kế hoạch, tổ chức và quản lý.\u003c/p\u003e\u003cp\u003e- Tiếp thu chỉ đạo, ý tưởng của Lãnh đạo, đưa ra các phương án – ý tưởng thiết kế, quy hoạch có chất lượng, phù hợp.\u003c/p\u003e\u003cp\u003e- Nắm vững quy trình thực hiện dự án, cá nh luật lao động.\u003c/p\u003e\u003cp\u003e- Được tham gia đóng bảo hiểm sức khỏe và bảo hiểm tai nạn 24/24. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4. Tổ chức học tập và văn hóa sôi nổi\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Không gian làm việc mở với trang thiết bị hiện đại.\u003c/p\u003e\u003cp\u003e- Các hoạt động văn hóa, gắn kết đội ngũ, thiện nguyện phong phú, ý nghĩa. \u003c/p\u003e"])</script><script>self.__next_f.push([1,"2d:{\"skillName\":\"Kiến Trúc\",\"skillId\":1012198,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Quy hoạch\",\"skillId\":1062727,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Thiết Kế Xây Dựng\",\"skillId\":1198,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"công trình\",\"skillId\":1130552,\"skillWeight\":100,\"isExisted\":false}\n31:{\"skillName\":\"Tư Duy Hệ Sinh Thái\",\"skillId\":1494415,\"skillWeight\":100,\"isExisted\":false}\n2c:[\"$2d\",\"$2e\",\"$2f\",\"$30\",\"$31\"]\n33:{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"1. Cộng đồng những người làm nghề chính trực và dấn thân phụng sự  \u003cbr/\u003e- Môi trường làm nghề tài chính chuyên nghiệp. \u003cbr/\u003e- Làm việc với tinh thần làm chủ, sáng tạo và thách thức. \u003cbr/\u003e\u003cbr/\u003e2. Tổng thu nhập theo năng lực \u003cbr/\u003e- Thu nhập xứng đáng theo năng lực và giá\"}\n32:[\"$33\"]\n36:{\"lat\":21.01576,\"lon\":105.808176}\n35:{\"workingLocationId\":213776,\"addressId\":127483,\"cityId\":24,\"districtId\":0,\"address\":\"19 Phố Trúc Khê, Láng Hạ, Đống Đa, Hà Nội, Việt Nam\",\"geoLoc\":\"$36\",\"cityName\":\"Ha Noi\",\"cityNameVI\":\"Hà Nội\"}\n34:[\"$35\"]\n38:{\"industryId\":0,\"industryName\":\"\",\"industryNameVI\":\"\"}\n37:[\"$38\"]\n3a:{\"industryV3Id\":5,\"industryV3Name\":\"Architecture/Interior Design\",\"industryV3NameVI\":\"Kiến trúc/Thiết kế nội thất\"}\n39:[\"$3a\"]\n3d:{\"id\":19,\"name\":\"Civil Engineering\",\"nameVI\":\"Xây Dựng\"}\n3c:[\"$3d\"]\n3b:{\"parentId\":4,\"parentName\":\"Architecture/Construction\",\"parentNameVI\":\"Kiến Trúc/Xây Dựng\",\"children\":\"$3c\"}\n3e:[24]\n40:Tdad,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Tập đoàn Đầu tư I.P.A (IPA Group) là một tập đoàn đầu tư đa ngành, hoạt động hiệu quả tại nhiều lĩnh vực kinh tế mũi nhọn, đóng góp tích cực vào sự phát triển kinh tế – xã hội ở nhiều địa phương trên cả nước.\r\n\r\nTiền thân là Công ty TNHH Đầu tư và Tài chính IPA, thành lập từ năm 1998, IPA Group đã có hơn 27 năm kinh nghiệm trên thị trường. Từ một doanh nghiệp đầu tư tài chính, IPA không ngừng mở rộng quy mô và lĩnh vực hoạt động, xây dựng hệ sinh thái doanh nghiệp đa dạng gồm 23 công ty con và công ty liên kết.\r\n\r\nTrụ sở chính của đặt tại: Số 1, phố Nguyễn Thượng Hiền, phường Nguyễn Du, quận Hai Bà Trưng, Hà Nội.\r\n\r\nNgày 01/11/2021, cổ phiếu của Công ty chính thức được niêm yết tại Sở Giao dịch Chứng khoán Hà Nội với mã chứng khoán IPA. Đến ngày 18/07/2022, IPA tăng vốn điều lệ lên 2,138,357,750,000 đồng sau khi hoàn tất chào bán cổ phiếu ra công chúng và phát hành cổ phiếu từ nguồn vốn chủ sở hữu. Đây là cột mốc quan trọng, đánh dấu bước phát triển mới trên hành trình khẳng định vị thế của IPA Group trong hệ sinh thái doanh nghiệp Việt Nam hiện đại.\r\n\r\nTại IPA, chúng tôi tin rằng giá trị bền vững được kiến tạo từ một nền tảng nội lực vững chắc và một chiến lược đầu tư có tầm nhìn. Mô hình hoạt động của chúng tôi được xây dựng dựa trên chính triết lý này.\r\n\r\n1. Nền tảng nội lực (IPAG Foundation): Tích hợp Con người – Thúc đẩy Tăng trưởng\r\n\r\nTrọng tâm của chúng tôi là xây dựng một nền tảng vận hành vững mạnh, lấy con người làm cốt lõi và công nghệ làm đòn bẩy. Chúng tôi đầu tư vào việc phát triển đội ngũ kế thừa (IPA Academy), chuẩn hóa quy trình tri thức (DIKW), và làm chủ công nghệ kết nối (Digital Connectivity), tạo ra một hệ thống vận hành thông suốt và hiệu quả.\r\n\r\n2. Biểu hiện giá trị (IPAG Values): Tích hợp Đối tác – Thúc đẩy Tăng trưởng\r\n\r\nTừ nền tảng nội lực đó, chúng tôi triển khai hai hoạt động cốt lõi, thể hiện rõ nhất giá trị và thế mạnh của IPA:\r\n\r\nĐầu tư Tác động (Impact Investment): Chúng tôi không chỉ đầu tư tài chính, mà còn đồng hành cùng các doanh nghiệp tiên phong trong các lĩnh vực kinh tế xanh và phát triển bền vững. Chúng tôi tìm kiếm và rót vốn vào những đối tác chia sẻ tầm nhìn về một tương lai có trách nhiệm.\r\n\r\nQuản lý Tài sản (Asset Management): Với vai trò là một nhà quản lý tài sản chuyên nghiệp, chúng tôi mang đến các giải pháp tài chính và đầu tư ưu việt, giúp bảo vệ và gia tăng tài sản cho các nhà đầu tư cá nhân giá trị cao (High Net Worth Investor), tổ chức và văn phòng gia đình (Family Office).\r\n\r\nSự kết hợp giữa nền tảng nội lực và giá trị đầu tư này không chỉ là chiến lược kinh doanh, mà còn là cam kết của IPA trong việc kiến tạo sự thịnh vượng bền vững cho các đối tác, khách hàng và cộng đồng."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"3f:{\"companyId\":407288,\"jobImageURLs\":null,\"jobVideoURLs\":null,\"companyName\":\"Công Ty Cổ Phần Tập Đoàn Đầu Tư I.P.A\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/d4/11400200.jpg\",\"companySizeId\":\"\",\"companyProfile\":\"$40\",\"contactName\":\"\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Số 1, Phố Nguyễn Thượng Hiền, Phường Nguyễn Du, Quận Hai Bà Trưng, Hà Nội.\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n42:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-03T18:09:11+07:0
