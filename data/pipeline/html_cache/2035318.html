u003e\u003cp\u003e\u003cstrong\u003eB. Công việc chi tiết cần thực hiện:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. KẾ HOẠCH HOẠT ĐỘNG ĐIỀU HÀNH VẬN TẢI HÀNG THÁNG.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Lập kế hoạch hoạt động và thiết lập các chỉ tiêu KPI chính cho phòng Điều hành vận tải phân phối hàng năm để GĐ phê duyệt\u003c/p\u003e\u003cp\u003e- Đề xuất các kế hoạch phát triển khách hàng/phát triển đội xe vận tải phân phối phù hợp với chiến lược phát triển trung, dài hạn của Trang Huy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. TỔ CHỨC \u0026 TRIỂN KHAI HOẠT ĐỘNG VẬN TẢI.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng giải pháp vận tải phân phối cho từng dự án cụ thể.\u003c/p\u003e\u003cp\u003e- Tổ chức đội ngũ và triển khai thực hiện kế hoạch vận tải phân phối đã được phê duyệt.\u003c/p\u003e\u003cp\u003e- Làm việc cùng khách hàng và nhà cung ứng để xử lý các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e- Kết hợp cùng Khách hàng để phát triển nhà thầu đạt được mục tiêu chất lượng về cung cấp dịch vụ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. CHÍNH SÁCH VÀ QUY TRÌNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xem xét, đề xuất về các cơ chế, chính sách hỗ trợ vận hành lĩnh vực vận tải phân phối. Hướng dẫn giám sát thực thi các chính sách này\u003c/p\u003e\u003cp\u003e- Xây dựng \u0026 cải tiến các quy trình tác nghiệp của bộ phận. Hướng dẫn và giám sát nhân viên trong việc thực thi các quy trình được được lập ra.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. QUẢN LÝ \u0026 PHÁT TRIỂN NHÂN VIÊN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Hướng dẫn nhân sự cấp dưới triển khai sử dụng các phần mềm của công ty.\u003c/p\u003e\u003cp\u003e- Xây dựng và quản lý đội ngũ nhân viên thuộc phòng Nghiệp vụ\u003c/p\u003e\u003cp\u003e- Kiểm soát, đôn đốc tính tuân thủ của các nhân viên đối với trách nhiệm công việc được giao\u003c/p\u003e\u003cp\u003e- Đánh giá hoàn thành kế hoạch và giao KPI cho nhân viên theo quy định của công ty\u003c/p\u003e\u003cp\u003e- Tham gia quá trình tuyển dụng nhân sự điều hành vận tải phân phối cho đơn vị\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. CÁC CÔNG VIỆC KHÁC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đóng góp ý kiến về quản trị, về kinh doanh ngành vân tải.\u003c/p\u003e\u003cp\u003e- Tham gia các hoạt động ngành nghề tạo mạng lưới quan hệ , thúc đẩy thương hiệu của Trang Huy\u003c/p\u003e\u003cp\u003e- Tham gia các dự án của Công ty có liên quan đến logistic khi có yêu cầu\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNGOÀI RA KIÊM TP MUA HÀNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eI. Quản lý nhà cung cấp dịch vụ logistic\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTìm kiếm lựa chọn, đề xuất nhà cung cấp dịch vụ logistics\u003c/p\u003e\u003cp\u003e•\tTìm kiếm, quản lý đơn vị cho thuê kho bãi khi cần thiết\u003c/p\u003e\u003cp\u003e•\tXây dựng danh mục nhà cung cấp, phát triển quan hệ với nhà cung cấp\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Kiểm soát hoạt động logistics\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTiếp nhận yêu cầu booking từ bộ phận liên quan (Bộ phận kinh doanh/ bộ phận quản lý phương tiện…)\u003c/p\u003e\u003cp\u003e•\tTrực tiếp đàm phán với NCC về giá cả, phương thức vận chuyển, các loại phí và lệ phí liên quan đến lĩnh vực vận chuyển nhằm tối thiểu hóa chi phí vận chuyển.\u003c/p\u003e\u003cp\u003e•\tTheo dõi tiến độ vận chuyển hàng hoá, trực tiếp xử lý các phát sinh trong quá trình vận chuyển\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm điều hành toàn bộ hoạt động logistic, đáp ứng kịp thời, đảm bảo an toàn\u003c/p\u003e\u003cp\u003e•\tThực hiện các thủ tục liên quan đến xuất nhập khẩu hàng hóa, Triển khai thực hiện công tác giao nhận, quản lý hoạt động giao nhận\u003c/p\u003e\u003cp\u003e•\tKhai thác tốt năng lực vận chuyển, cảng bốc dỡ, kho tàng trên thị trường để đáp ứng nhu cầu vận chuyển hàng hóa một cách tối ưu nhất, đảm bảo không phát sinh lưu kho bãi hoặc chi phí ngoài khác\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch logistic dài hạn, ngắn hạn đáp ứng kế hoạch, mục tiêu sản xuất kinh doanh của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII. Kiểm soát/ Lưu trữ hồ sơ chứng từ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm soát chứng từ xuất nhập khẩu bao gồm: hợp đồng vận chuyển, vận đơn , hóa đơn, lệnh giao hàng…\u003c/p\u003e\u003cp\u003e•\tKiểm tra tính hợp lệ của hồ sơ chứng từ thông quan\u003c/p\u003e\u003cp\u003e•\tLưu trữ hồ sơ nhập khẩu theo đúng quy định của công ty\u003c/p\u003e\u003cp\u003e•\tLàm hợp đồng và lưu trữ hợp đồng nhà cung cấp\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIV. Thống kê tổng hợp số liệu logistics,\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDữ liệu hoạt động và chi phí logistic quốc tế và nội địa, Kiểm soát Chi phí logistic: vận tải, lưu container lưu tàu\u003c/p\u003e\u003cp\u003e•\tTổng hợp các chỉ số đánh giá về nhà cung cấp và lập báo cáo, đề xuất cải thiện hoạt động trình Ban lãnh đạo\u003c/p\u003e\u003cp\u003e•\tLập các báo cáo phân tích, đánh giá hiệu quả hoạt động logistic\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eV. Công tác mua hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLà đầu mối của khối cung ứng cập nhật, hỗ trợ xử lý các vấn đề phát sinh trong quá trình cung ứng.\u003c/p\u003e\u003cp\u003e•\tPhát triển các nhà cung cấp nội địa/ quốc tế đối với các mặt hàng thuộc trách nhiệm khối cung ứng\u003c/p\u003e\u003cp\u003e•\tKiểm soát các chi phí và định mức mua hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVI. Trách nhiệm quản lý\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổ chức bộ máy nhân sự và hoạt động của phòng\u003c/p\u003e\u003cp\u003e•\tTheo dõi, đánh giá hiệu quả làm việc của nhân viên; đào tạo, định hướng phát triển nhân viên.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ việc xây dựng, hoàn thiện các quy trình, quy định liên quan\u003c/p\u003e\u003cp\u003e•\tThông tin, triển khai kịp thời các chỉ đạo của cấp trên, thông báo, quy định của công ty đến nhân viên trực thuộc.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, đề xuất giải quyết các vướng mắc trong hoạt động logistic; Tham mưu cho lãnh đạo hướng khắc phục những vướng mắc, tồn tại trong hoạt động logistic (nếu có) nhằm tối ưu hóa mọi yếu tố trong hoạt động logistic\u003c/p\u003e\u003cp\u003e•\tĐảm bảo các hoạt động của bộ phận tuân thủ đúng các quy định pháp luật về xuất nhập hàng hóa và hợp tác thương mại\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch ngân sách, kế hoạch nhân sự và thực hiện các báo cáo\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. TRÁCH NHIỆM:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm trước Ban Giám Đốc Công ty về kết quả hoàn thành công việc của Phòng nghiệp vụ do mình quản lý.\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm phát triển đội ngũ nhân sự bộ phận: Tiếp nhận, Hướng đẫn đào tạo nhân viên mới hội nhập công việc,... Sau khi tiếp nhận nhân viên mới từ phòng Nhân sự.\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban Giám Đốc trong công tác quản lý của Phòng nghiệp vụ.\u003c/p\u003e\u003cp\u003e- Tham gia các buổi họp, khoá học nâng cao nghiệp vụ do công ty tổ chức.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Ta31,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học chuyên ngành Kinh tế, QTKD… hoặc các ngành có liên quan\u003c/p\u003e\u003cp\u003e- Thành thạo vi tính văn phòng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Yêu cầu về kỹ năng/ Mua hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Không ngại áp lực công việc, thích chinh phục thử thách trong mua hàng.\u003c/p\u003e\u003cp\u003e- Ưu tiên ứng viên có kinh nghiệm ở vị trí tương đương, có các quan hệ rộng trong lĩnh vực vận tải đường Container, logistics, các cơ quan ban ngành liên quan như Cục đăng kiểm, Công an giao thông, Thanh tra giao thông v.v\u003c/p\u003e\u003cp\u003e- Có kỹ năng lãnh đạo đội, nhóm, tinh thần làm việc nhóm tốt và nhạy bén xử lý các công việc được giao.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Yêu cầu công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTrưởng phòng Mua hàng cần khả năng làm việc độc lập, chịu áp lực công việc tốt, năng động sáng tạo và kỹ năng quản lý tốt.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kinh nghiệm thực tế:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm trên 02 năm vị trí Trưởng phòng mua hàng lĩnh vực: Vận tải nội địa, vận tải quốc tế, mua hàng\u003c/p\u003e\u003cp\u003e- Ưu tiên ứng viên có hiểu biết về các quy định pháp luật liên quan đến việc ra mắt sản phẩm mới với thị trường.\u003c/p\u003e\u003cp\u003e- Các kỹ năng: Giao tiếp tốt, làm việc nhóm, lập kế hoạch, tổ chức và giám sát công việc, phân tích tổng hợp, báo cáo.\u003c/p\u003e\u003cp\u003e- Các quy trình, thủ tục liên quan đến công việc được giao.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Đào tạo/ Hướng dẫn công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Định hướng phát triển nghề nghiệp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Tính cách/ Cá nhân:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trung thực, nhiệt tình, có trách nhiệm với công việc.\u003c/p\u003e\u003cp\u003e- Sức khỏe tốt.\u003c/p\u003e\u003cp\u003e- Nhanh nhẹn, giao tiếp tốt và xử lý công việc một cách linh hoạt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền Lợi Được Hưởng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thu nhập: Bao gồm Lương cứng 25 - 35 triệu + thưởng theo KPI doanh số, thoả thuận trao đổi khi phỏng vấn tuỳ theo năng lực.\u003c/p\u003e\u003cp\u003e- Được Công ty hỗ trợ xăng xe đi lại, điện thoại, thưởng lễ tết.\u003c/p\u003e\u003cp\u003e- Được tham gia BHXH, được du lịch theo chế độ của Công ty.\u003c/p\u003e\u003cp\u003e- Được làm việc trong môi trường nhiệt tình, năng động.\u003c/p\u003e\u003cp\u003e- Công ty luôn khuyến khích những nhân viên chủ động trong công việc để tạo thêm thu nhập cho bản thân.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T1f25,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMÔ TẢ CÔNG VIỆC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Công việc chính:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Quản lý điều hành công việc chung của phòng nghiệp vụ;\u003c/p\u003e\u003cp\u003e- Phối hợp với các phòng/ BP có liên quan để nâng cao hiệu quả hoạt động;\u003c/p\u003e\u003cp\u003e- Báo cáo định kỳ và phát sinh theo quy định cho Ban Giám Đốc;\u003c/p\u003e\u003cp\u003e- Nhận kế hoạch và phân công công việc cho NV và tổ chức xe giao nhận hàng hóa;\u003c/p\u003e\u003cp\u003e- Theo dõi tình trạng và thời gian giao nhận hàng hóa;\u003c/p\u003e\u003cp\u003e- Thu gom chứng từ và tính toán doanh thu chuyến cho lái xe;\u003c/p\u003e\u003cp\u003e- Giải quyết các vấn đề trong quá trình vận chuyển giao nhận hàng hóa.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Công việc chi tiết cần thực hiện:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. KẾ HOẠCH HOẠT ĐỘNG ĐIỀU HÀNH VẬN TẢI HÀNG THÁNG.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Lập kế hoạch hoạt động và thiết lập các chỉ tiêu KPI chính cho phòng Điều hành vận tải phân phối hàng năm để GĐ phê duyệt\u003c/p\u003e\u003cp\u003e- Đề xuất các kế hoạch phát triển khách hàng/phát triển đội xe vận tải phân phối phù hợp với chiến lược phát triển trung, dài hạn của Trang Huy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. TỔ CHỨC \u0026 TRIỂN KHAI HOẠT ĐỘNG VẬN TẢI.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng giải pháp vận tải phân phối cho từng dự án cụ thể.\u003c/p\u003e\u003cp\u003e- Tổ chức đội ngũ và triển khai thực hiện kế hoạch vận tải phân phối đã được phê duyệt.\u003c/p\u003e\u003cp\u003e- Làm việc cùng khách hàng và nhà cung ứng để xử lý các vấn đề phát sinh.\u003c/p\u003e\u003cp\u003e- Kết hợp cùng Khách hàng để phát triển nhà thầu đạt được mục tiêu chất lượng về cung cấp dịch vụ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. CHÍNH SÁCH VÀ QUY TRÌNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xem xét, đề xuất về các cơ chế, chính sách hỗ trợ vận hành lĩnh vực vận tải phân phối. Hướng dẫn giám sát thực thi các chính sách này\u003c/p\u003e\u003cp\u003e- Xây dựng \u0026 cải tiến các quy trình tác nghiệp của bộ phận. Hướng dẫn và giám sát nhân viên trong việc thực thi các quy trình được được lập ra.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. QUẢN LÝ \u0026 PHÁT TRIỂN NHÂN VIÊN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Hướng dẫn nhân sự cấp dưới triển khai sử dụng các phần mềm của công ty.\u003c/p\u003e\u003cp\u003e- Xây dựng và quản lý đội ngũ nhân viên thuộc phòng Nghiệp vụ\u003c/p\u003e\u003cp\u003e- Kiểm soát, đôn đốc tính tuân thủ của các nhân viên đối với trách nhiệm công việc được giao\u003c/p\u003e\u003cp\u003e- Đánh giá hoàn thành kế hoạch và giao KPI cho nhân viên theo quy định của công ty\u003c/p\u003e\u003cp\u003e- Tham gia quá trình tuyển dụng nhân sự điều hành vận tải phân phối cho đơn vị\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. CÁC CÔNG VIỆC KHÁC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đóng góp ý kiến về quản trị, về kinh doanh ngành vân tải.\u003c/p\u003e\u003cp\u003e- Tham gia các hoạt động ngành nghề tạo mạng lưới quan hệ , thúc đẩy thương hiệu của Trang Huy\u003c/p\u003e\u003cp\u003e- Tham gia các dự án của Công ty có liên quan đến logistic khi có yêu cầu\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNGOÀI RA KIÊM TP MUA HÀNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eI. Quản lý nhà cung cấp dịch vụ logistic\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTìm kiếm lựa chọn, đề xuất nhà cung cấp dịch vụ logistics\u003c/p\u003e\u003cp\u003e•\tTìm kiếm, quản lý đơn vị cho thuê kho bãi khi cần thiết\u003c/p\u003e\u003cp\u003e•\tXây dựng danh mục nhà cung cấp, phát triển quan hệ với nhà cung cấp\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Kiểm soát hoạt động logistics\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTiếp nhận yêu cầu booking từ bộ phận liên quan (Bộ phận kinh doanh/ bộ phận quản lý phương tiện…)\u003c/p\u003e\u003cp\u003e•\tTrực tiếp đàm phán với NCC về giá cả, phương thức vận chuyển, các loại phí và lệ phí liên quan đến lĩnh vực vận chuyển nhằm tối thiểu hóa chi phí vận chuyển.\u003c/p\u003e\u003cp\u003e•\tTheo dõi tiến độ vận chuyển hàng hoá, trực tiếp xử lý các phát sinh trong quá trình vận chuyển\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm điều hành toàn bộ hoạt động logistic, đáp ứng kịp thời, đảm bảo an toàn\u003c/p\u003e\u003cp\u003e•\tThực hiện các thủ tục liên quan đến xuất nhập khẩu hàng hóa, Triển khai thực hiện công tác giao nhận, quản lý hoạt động giao nhận\u003c/p\u003e\u003cp\u003e•\tKhai thác tốt năng lực vận chuyển, cảng bốc dỡ, kho tàng trên thị trường để đáp ứng nhu cầu vận chuyển hàng hóa một cách tối ưu nhất, đảm bảo không phát sinh lưu kho bãi hoặc chi phí ngoài khác\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch logistic dài hạn, ngắn hạn đáp ứng kế hoạch, mục tiêu sản xuất kinh doanh của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIII. Kiểm soát/ Lưu trữ hồ sơ chứng từ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm soát chứng từ xuất nhập khẩu bao gồm: hợp đồng vận chuyển, vận đơn , hóa đơn, lệnh giao hàng…\u003c/p\u003e\u003cp\u003e•\tKiểm tra tính hợp lệ của hồ sơ chứng từ thông quan\u003c/p\u003e\u003cp\u003e•\tLưu trữ hồ sơ nhập khẩu theo đúng quy định của công ty\u003c/p\u003e\u003cp\u003e•\tLàm hợp đồng và lưu trữ hợp đồng nhà cung cấp\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eIV. Thống kê tổng hợp số liệu logistics,\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDữ liệu hoạt động và chi phí logistic quốc tế và nội địa, Kiểm soát Chi phí logistic: vận tải, lưu container lưu tàu\u003c/p\u003e\u003cp\u003e•\tTổng hợp các chỉ số đánh giá về nhà cung cấp và lập báo cáo, đề xuất cải thiện hoạt động trình Ban lãnh đạo\u003c/p\u003e\u003cp\u003e•\tLập các báo cáo phân tích, đánh giá hiệu quả hoạt động logistic\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eV. Công tác mua hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLà đầu mối của khối cung ứng cập nhật, hỗ trợ xử lý các vấn đề phát sinh trong quá trình cung ứng.\u003c/p\u003e\u003cp\u003e•\tPhát triển các nhà cung cấp nội địa/ quốc tế đối với các mặt hàng thuộc trách nhiệm khối cung ứng\u003c/p\u003e\u003cp\u003e•\tKiểm soát các chi phí và định mức mua hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVI. Trách nhiệm quản lý\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổ chức bộ máy nhân sự và hoạt động của phòng\u003c/p\u003e\u003cp\u003e•\tTheo dõi, đánh giá hiệu quả làm việc của nhân viên; đào tạo, định hướng phát triển nhân viên.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ việc xây dựng, hoàn thiện các quy trình, quy định liên quan\u003c/p\u003e\u003cp\u003e•\tThông tin, triển khai kịp thời các chỉ đạo của cấp trên, thông báo, quy định của công ty đến nhân viên trực thuộc.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, đề xuất giải quyết các vướng mắc trong hoạt động logistic; Tham mưu cho lãnh đạo hướng khắc phục những vướng mắc, tồn tại trong hoạt động logistic (nếu có) nhằm tối ưu hóa mọi yếu tố trong hoạt động logistic\u003c/p\u003e\u003cp\u003e•\tĐảm bảo các hoạt động của bộ phận tuân thủ đúng các quy định pháp luật về xuất nhập hàng hóa và hợp tác thương mại\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch ngân sách, kế hoạch nhân sự và thực hiện các báo cáo\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. TRÁCH NHIỆM:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm trước Ban Giám Đốc Công ty về kết quả hoàn thành công việc của Phòng nghiệp vụ do mình quản lý.\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm phát triển đội ngũ nhân sự bộ phận: Tiếp nhận, Hướng đẫn đào tạo nhân viên mới hội nhập công việc,... Sau khi tiếp nhận nhân viên mới từ phòng Nhân sự.\u003c/p\u003e\u003cp\u003e- Tham mưu cho Ban Giám Đốc trong công tác quản lý của Phòng nghiệp vụ.\u003c/p\u003e\u003cp\u003e- Tham gia các buổi họp, khoá học nâng cao nghiệp vụ do công ty tổ chức.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:Ta31,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tốt nghiệp Đại học chuyên ngành Kinh tế, QTKD… hoặc các ngành có liên quan\u003c/p\u003e\u003cp\u003e- Thành thạo vi tính văn phòng\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Yêu cầu về kỹ năng/ Mua hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Không ngại áp lực công việc, thích chinh phục thử thách trong mua hàng.\u003c/p\u003e\u003cp\u003e- Ưu tiên ứng viên có kinh nghiệm ở vị trí tương đương, có các quan hệ rộng trong lĩnh vực vận tải đường Container, logistics, các cơ quan ban ngành liên quan như Cục đăng kiểm, Công an giao thông, Thanh tra giao thông v.v\u003c/p\u003e\u003cp\u003e- Có kỹ năng lãnh đạo đội, nhóm, tinh thần làm việc nhóm tốt và nhạy bén xử lý các công việc được giao.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Yêu cầu công việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTrưởng phòng Mua hàng cần khả năng làm việc độc lập, chịu áp lực công việc tốt, năng động sáng tạo và kỹ năng quản lý tốt.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kinh nghiệm thực tế:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm trên 02 năm vị trí Trưởng phòng mua hàng lĩnh vực: Vận tải nội địa, vận tải quốc tế, mua hàng\u003c/p\u003e\u003cp\u003e- Ưu tiên ứng viên có hiểu biết về các quy định pháp luật liên quan đến việc ra mắt sản phẩm mới với thị trường.\u003c/p\u003e\u003cp\u003e- Các kỹ năng: Giao tiếp tốt, làm việc nhóm,
