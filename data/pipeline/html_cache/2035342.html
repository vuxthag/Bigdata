uence Vietnam’s rapidly evolving energy market frameworks.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKey Responsibilities:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\u003cstrong\u003e Country Policy Strategy \u0026 Development\u003c/strong\u003e: Lead FESSIA’s Vietnam country strategy and policy agenda and work closely with FESSIA regional team in ensuring alignment with stakeholder priorities, member needs, and the wider regional strategy. Monitor regulatory trends, risks, and opportunities in the Vietnam energy market, develop evidence-based policy and advocacy materials, and lead the annual multi-stakeholder energy storage and system integration event.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• \u003cstrong\u003eGovernment \u0026 Regulatory Engagement\u003c/strong\u003e: Act and represent FESSIA as the lead representative with the Vietnam government and energy stakeholders (including MoIT, MoF, ERAV, and EVN) to build constructive relationships, influence energy policy, and foster regulatory harmonization.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• \u003cstrong\u003eIndustry Engagement \u0026 Support\u003c/strong\u003e: Drive industry engagement in Vietnam by growing membership of FESSIA, leading policy working groups and task forces, shaping consensus-based policy outputs and workshop terms of reference, providing regulatory and analytical support to members, and delivering capacity-building initiatives such as workshops, policy briefings, and training.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• \u003cstrong\u003eResearch \u0026 Thought Leadership\u003c/strong\u003e: Contribute to FESSIA regional policy studies, market assessments and strategic reports from Vietnam’s perspective and ensuring a strong evidence base to support advocacy positions.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e
