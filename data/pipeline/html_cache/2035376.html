ịch bảo trì phòng ngừa dựa trên khuyến nghị của nhà sản xuất (OEM) và nhu cầu sản xuất.\u003c/p\u003e\u003cp\u003e• Theo dõi hiệu quả của kế hoạch bảo trì và điều chỉnh dựa trên tình trạng thiết bị thực tế và tần suất lỗi.\u003c/p\u003e\u003cp\u003e• Đảm bảo tuân thủ các tiêu chuẩn về an toàn, môi trường và chất lượng trong mọi hoạt động bảo trì.\u003c/p\u003e\u003cp\u003e3. Quản lý Phụ tùng \u0026 Tài sản\u003c/p\u003e\u003cp\u003e• Xác định các phụ tùng thay thế thiết yếu và quản lý mức tồn kho hiệu quả.\u003c/p\u003e\u003cp\u003e• Duy trì và cập nhật danh mục tài sản, hồ sơ tài liệu thiết bị.\u003c/p\u003e\u003cp\u003e• Liên hệ với các đơn vị cung cấp và nhà thầu để thu mua linh kiện và hỗ trợ dịch vụ.\u003c/p\u003e\u003cp\u003e4. Dự án \u0026 Cải tiến\u003c/p\u003e\u003cp\u003e• Hỗ trợ lắp đặt, vận hành thử (commissioning) và thẩm định (qualification) thiết bị mới.\u003c/p\u003e\u003cp\u003e• Tham gia thay đổi sơ đồ mặt bằng nhà máy (layout), nâng cấp thiết bị và các dự án cải tiến năng suất.\u003c/p\u003e\u003cp\u003e• Dẫn dắt các sáng kiến tiết kiệm chi phí, sử dụng năng lượng hiệu quả và cải thiện độ tin cậy.\u003c/p\u003e\u003cp\u003e5. Hỗ trợ Bảo trì \u0026 Xử lý sự cố Phần cứng, Phần mềm IT\u003c/p\u003e\u003cp\u003e• Về mạng: Làm việc với nhà cung cấp dịch vụ internet (ISP) để lấy báo giá/thiết lập hệ thống.\u003c/p\u003e\u003cp\u003e• Máy tính (Laptop/Desktop)/Thiết bị ngoại vi/Máy in.\u003c/p\u003e\u003cp\u003e• Quản lý hệ thống điện thoại: Thiết lập máy nhánh/số nội bộ cho người dùng.\u003c/p\u003e\u003cp\u003e• Bảo trì máy chủ (Servers) và hệ thống cáp mạng (ethernet).\u003c/p\u003e\u003cp\u003e• Quản lý hệ thống CCTV (Camera giám sát).\u003c/p\u003e\u003cp\u003e• Kiểm kê và cập nhật danh mục tài sản IT.\u003c/p\u003e\u003cp\u003e• Hỗ trợ bộ phận IT của Trụ sở chính (HQ)/Khu vực (APAC) thực hiện các dự án.\u003c/p\u003e\u003cp\u003e• Hỗ trợ người dùng khắc phục các sự cố máy tính và phần mềm khác.\u003c/p\u003e"])</script><script>self.__next_f.push([1
