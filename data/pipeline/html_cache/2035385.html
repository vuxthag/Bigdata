]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Td2c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eTập đoàn MISA, thành lập năm 1994, là đơn vị CNTT hàng đầu Việt Nam với hơn 350.000 khách hàng tổ chức và gần 3,5 triệu cá nhân, hiện diện tại 22 quốc gia. MISA tiên phong phát triển Agentic AI và nền tảng AIaaS, cung cấp giải pháp số hóa cho doanh nghiệp, hộ kinh doanh và chính phủ. Định vị là tập đoàn dẫn đầu về Agentic AI, MISA cam kết đổi mới sáng tạo, giúp tối ưu vận hành, nâng cao hiệu quả và giảm tải thủ công cho tổ chức. Sứ mệnh của MISA là đồng hành cùng chính phủ, doanh nghiệp và cá nhân trong hành trình chuyển đổi số, khẳng định vị thế công nghệ Việt Nam trên quốc tế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eĐảm bảo chất lượng, tính nhất quán và giá trị kinh doanh của dữ liệu trong toàn bộ hệ sinh thái MISA. Vị trí này đóng vai trò cầu nối giữa các phòng ban nghiệp vụ và đội ngũ kỹ thuật, chịu trách nhiệm định nghĩa, quản lý và duy trì các tiêu chuẩn dữ liệu trên MISA Data 360.\u003c/p\u003e\u003cp\u003eCông việc thiết yếu\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Định nghĩa dữ liệu theo ngữ cảnh kinh doanh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng và duy trì Business Glossary - từ điển thuật ngữ kinh doanh chuẩn hóa cho toàn tổ chức\u003c/p\u003e\u003cp\u003e• Định nghĩa và tài liệu hóa ý nghĩa kinh doanh của các data elements, metrics và KPIs\u003c/p\u003e\u003cp\u003e• Xây dựng Data Catalog với metadata đầy đủ: mô tả, data owner, data lineage, business rules\u003c/p\u003e\u003cp\u003e• Đảm bảo tính nhất quán trong cách hiểu và sử dụng dữ liệu giữa các phòng ban\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản lý chất lượng dữ liệu (Data Quality Management)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Định nghĩa và triển khai các Data Quality Rules: completeness, accuracy, consistency, timeliness, validity\u003c/p\u003e\u003cp\u003e• Thiết lập Data Quality Metrics và KPIs để đo lường chất lượng dữ liệu\u003c/p\u003e\u003cp\u003e• Xây dựng quy trình phát hiện, báo cáo và xử lý các vấn đề chất lượng dữ liệu\u003c/p\u003e\u003cp\u003e• Xây dựng và theo dõi Data Quality Dashboards và báo cáo định kỳ cho các stakeholders\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản lý dữ liệu chủ (Master Data Management)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xác định và quản lý các Master Data domains: Customer, Product, Vendor, Employee\u003c/p\u003e\u003cp\u003e• Thiết lập Golden Records và quy trình data matching, merging, deduplication\u003c/p\u003e\u003cp\u003e• Xây dựng và duy trì Reference Data (danh mục, mã ngành, mã vùng, đơn vị tính)\u003c/p\u003e\u003cp\u003e• Thiết lập Data Governance policies cho việc tạo, cập nhật và xóa Master Data\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kết nối giữa đội ngũ Kỹ thuật và Nghiệp vụ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Làm cầu nối giữa Business Teams (Sales, Marketing, Finance, HR) và Data Teams (Data Engineers, Data Scientists, BI Developers)\u003c/p\u003e\u003cp\u003e• Chuyển đổi yêu cầu nghiệp vụ thành technical requirements và ngược lại\u003c/p\u003e\u003cp\u003e• Tổ chức các buổi Data Literacy training để nâng cao nhận thức về dữ liệu trong tổ chức\u003c/p\u003e\u003cp\u003e• Hỗ trợ giải quyết các tranh chấp về định nghĩa dữ liệu và đảm bảo sự đồng thuận giữa các bên\u003c/p\u003e"])</script> h teambuilding, du lịch định kỳ\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMôi trường thân thiện, chia sẻ, đồng hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kết nối tài năng: tập trung phát triển những con người có chung lý tưởng, mục tiêu, cùng trao giá trị và nhận thành công\u003c/p\u003e\u003cp\u003e• Tư duy đột phá: môi trường tôn trọng sự khác biệt và đề cao sáng tạo, MISA-er được tự do phát triển các ý tưởng tiến bộ, cải tiến công việc\u003c/p\u003e\u003cp\u003e• Công nghệ cao: trang bị máy tính làm việc, tối ưu hiệu suất công việc bằng ứng dụng công nghệ, • phần mềm tự động (AMIS, Jira, Power BI, AI Marketing,...)\u003c/p\u003e\u003cp\u003e• Nơi làm việc hạnh phúc: MISA mong muốn tạo một môi trường làm việc để bạn luôn cảm thấy hạnh phúc\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2a:{\"skillName\":\"Business Analysis\",\"skillId\":12799,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Communication\",\"skillId\":540,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Data Management\",\"skillId\":20439,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Data Quality Assurance\",\"skillId\":87246,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"SQL\",\"skillId\":75063,\"skillWeight\":100,\"isExisted\":false}\n29:[\"$2a\",\"$2b\",\"$2c\",\"$2d\",\"$2e\"]\n30:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"Bonus\",\"benefitNameVI\":\"Thưởng\",\"benefitValue\":\"Lương cứng cạnh tranh. Thưởng năng suất dựa trên kết quả công việc từ 2 tháng lương.\u003cbr/\u003eĐánh giá review lương 2 lần/năm, thưởng sáng kiến.\"}\n31:{\"benefitId\":4,\"benefitIconName\":\"fa-graduation-cap\",\"benefitName\":\"Training\",\"benefitNameVI\":\"Đào tạo\",\"benefitValue\":\"Huấn luyện “Hổ tướng”: chương trình đào tạo quản lý tài năng, bệ phóng trở thành Chiến tướng tinh nhuệ.\"}\n2f:[\"$30\",\"$31\"]\n34:{\"lat\":0,\"lon\":0}\n33:{\"workingLocationId\":244538,\"addressId\":150732,\"cityId\":24,\"dist
