, and workflows in line with the Australian practice \u003c/p\u003e\u003cp\u003e•\tWork within and build upon established documentation systems and workflows \u003c/p\u003e\u003cp\u003e•\tLead cross-border coordination with Australian project teams, consultants, and internal stakeholders, ensuring clarity, alignment, and timely decision-making \u003c/p\u003e\u003cp\u003e•\tBuild strong working relationships across the practice, acting as a key point of contact for documentation coordination \u003c/p\u003e\u003cp\u003e•\tReview and manage drawing outputs, detailing, and BIM models to meet project timelines and quality benchmarks \u003c/p\u003e\u003cp\u003e•\tDrive efficiency, consistency, and delivery speed of documentation, ensuring seamless coordination across multiple countries and time zones \u003c/p\u003e\u003cp\u003e•\tMentor and guide team members on best practices in documentation, detailing, and coordination \u003c/p\u003e\u003cp\u003e•\tIdentify risks, resolve technical issues, and proactively manage documentation challenges \u003c/p\u003e\u003cp\u003e•\tSupport improvement of BIM and documentation workflows to enhance delivery efficiency and coordination \u003c/p\u003e\u003cp\u003e•\tCommunicate clearly and confidently in English across all coordination meetings, reviews, and reporting \u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eRequired Skills \u0026 Experience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBachelor or Master’s degree in Architecture or equivalent \u003c/p\u003e\u003cp\u003e•\t10+ years of professional experience, with a strong focus on documentation and delivery leadership \u003c/p\u003e\u003cp\u003e•\tProven experience leading and taking responsibility for large-scale documentation packages and multidisciplinary coordination \u003c/p\u003e\u003cp\u003e•\tStrong knowledge of construction detailing, building systems, and technical coordination. Previous working experienc
