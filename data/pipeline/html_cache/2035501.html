 phòng đại diện tại Hà Nội và các chi nhánh lớn đặt tại  Đà Nẵng, Tp. Hồ Chí Minh, Cần Thơ.\r\n•\tTại Vĩnh Phúc, VINPHACO có 1 Trung tâm dược phẩm và 7 chi nhánh phân phối tại tất cả các huyện, thị.\r\n1.3 Hoạt động kinh doanh xuất khẩu:\r\nSản phẩm của Vinphaco trong những năm qua đã được xuất khẩu tại nhiều nước tại các thị trường Châu Á, Châu Âu,…\r\n2.\tĐỘI NGŨ NHÂN SỰ\r\nVINPHACO luôn xác định BCNV là tài sản lớn nhất của Công ty để làm gia giá trị cho Công ty và cho chính mỗi người lao động. Vì vậy, công ty luôn chú trọng xây dựng môi trường làm việc “Chuyên nghiệp – Trí Tuệ - Nhân văn” cùng các chế độ lương, phúc lợi cạnh tranh và thu hút dành cho người lao động. \r\nNgười Vinphaco có phẩm chất và năng lực tốt, có đức, có tài, có tầm. Có tầm nhìn và ý chí phấn đấu vươn lên, khát khao làm việc và học hỏi, bản lĩnh vượt khó, năng động, sáng tạo để đạt mục tiêu phát triển. Trung thực, trung thành, tinh nhuệ, thiện chiến. Lao động chuyên nghiệp, năng suất, chất lượng, hiệu quả cao, nâng cao năng lực, cạnh trangh trong giai đoạn mới.\r\nNgười Vinphaco có các giá trị văn hóa tiêu biểu: Chuyên nghiệp, Trí Tuệ, Nhân văn, trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và các giá trị truyền thống của Vinphaco.\r\n3.\tVĂN HÓA DOANH NGHIỆP\r\nVăn hóa Vinphaco trước hết thấm đượm truyền thống văn hóa dân tộc Việt Nam trong lịch sử hàng ngàn năm dựng nước và giữ nước. Đó là truyền thống: yêu nước, đoàn kết, chống giặc ngoại xâm; tinh thần độc lập, tự chủ; ý chí phấn đấu vươn lên, bản lĩnh vượt khó trong quá trình phát triển. đồng thời, mang bản sắc văn hóa đặc trưngcủa Vinphaco: Chuyên nghiệp, Trí Tuệ và Nhân văn trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và giá trị truyền thống trong hơn 60 năm xây dựng và phát triển, luôn luôn hướng tới các giá trị Chân, Thiện, Mỹ, mà tất cả người lao động Vinphaco đều thực hiện.\r\n4.\tTRÁCH NHIỆM XÃ HỘI\r\nLà một đơn vị sản xuất kinh doanh Dược phẩm, VINPHACO luôn \"Lấy lợi ích cộng đồng làm khởi sự cho mọi hoạt động\". Vì thế, VINPHACO cam kết đóng góp cho sự phát triển ổn định và bền vững của công ty thông qua những việc làm nâng cao chất lượng cuộc sống của người lao động và các thành viên gia đình họ, cho cộng đồng và cho toàn xã hội.\r\nVINPHACO quyết tâm xây dựng một môi trường làm việc an toàn và lành mạnh, nơi người nhân viên có được cơ hội được phát huy năng lực.\r\n5.\tTRÁCH NHIỆM VỚI MÔI TRƯỜNG\r\nLà một đơn vị có ý thức bảo vệ môi trường, Dược phẩm Vĩnh Phúc liên tục tìm cách cải thiện môi trường qua việc hiểu rõ những thách thức và cơ hội trong ngành Công nghiệp Dược để hướng tới sự phát triển bền vững. \r\nLuôn nâng cao tinh thần trách nhiệm thông qua việc sử dụng các công nghệ sạch và phù hợp trong lĩnh vực sản xuất dược phẩm\r\nBên cạnh các tiêu chuẩn nghiêm ngặt về môi trường trong sản xuất dược phẩm, thực phẩm (GMP, GLP, GSP), Vinphaco luôn chú trọng đến việc giữ gìn vệ sinh và công tác phòng chống cháy nổ, xử lý chất thải công nghiệp, nguồn nước theo đúng các tiêu chuẩn ngành và của Nhà nước Việt Nam quy định."])</script><script>self.__next_f.push([1,"24:T15e2,"])</script><script>self.__next_f.push([1,"Hơn 65 năm qua, bằng những nỗ lực không ngừng nghỉ, Công ty Cổ phần Dược phẩm Vĩnh Phúc - VINPHACO đã  khẳng định vị thế và uy tín của một Doanh nghiệp Dược phẩm hàng đầu Việt Nam, Với chiến lược phát triển bền vững và năng động để vươn lên tầm khu vực và Quốc tế.\r\n1.\tLĨNH VỰC SẢN XUẤT KINH DOANH\r\nVINPHACO là doanh nghiệp  sản xuất, kinh doanh, xuất nhập khẩu thuốc, thực phẩm bảo vệ sức khỏe, mỹ phẩm, vật tư y tế phục vụ cho công tác phòng, chữa bệnh, chăm sóc, bảo vệ và nâng cao sức khỏe cho nhân dân.\r\n1.1 Định hướng sản xuất\r\n•\tVới thế mạnh truyền thống về các sản phẩm thuốc tiêm, VINPHACO định hướng sẽ tiếp tục đẩy mạnh chiến lược:\r\n•\tTập trung vào nghiên cứu và phát triển các thuốc tiêm mới, chuyên khoa đặc trị định v  văn, trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và các giá trị truyền thống của Vinphaco.\r\n3.\tVĂN HÓA DOANH NGHIỆP\r\nVăn hóa Vinphaco trước hết thấm đượm truyền thống văn hóa dân tộc Việt Nam trong lịch sử hàng ngàn năm dựng nước và giữ nước. Đó là truyền thống: yêu nước, đoàn kết, chống giặc ngoại xâm; tinh thần độc lập, tự chủ; ý chí phấn đấu vươn lên, bản lĩnh vượt khó trong quá trình phát triển. đồng thời, mang bản sắc văn hóa đặc trưngcủa Vinphaco: Chuyên nghiệp, Trí Tuệ và Nhân văn trên nền tảng của 5 giá trị cốt lõi: Tâm, Trí, Tín, Tốc, Văn; 5 phương châm hành động: Chuyên, Trách, Năng, Sáng, Phát và giá trị truyền thống trong hơn 60 năm xây dựng và phát triển, luôn luôn hướng tới các giá trị Chân, Thiện, Mỹ, mà tất cả người lao động Vinphaco đều thực hiện.\r\n4.\tTRÁCH NHIỆM XÃ HỘI\r\nLà một đơn vị sản xuất kinh doanh Dược phẩm, VINPHACO luôn \"Lấy lợi ích cộng đồng làm khởi sự cho mọi hoạt động\". Vì thế, VINPHACO cam kết đóng góp cho sự phát triển ổn định và bền vững của công ty thông qua những việc làm nâng cao chất lượng cuộc sống của người lao động và các thành viên gia đình họ, cho cộng đồng và cho toàn xã hội.\r\nVINPHACO quyết tâm xây dựng một môi trường làm việc an toàn và lành mạnh, nơi người nhân viên có được cơ hội được phát huy năng lực.\r\n5.\tTRÁCH NHIỆM VỚI MÔI TRƯỜNG\r\nLà một đơn vị có ý thức bảo vệ môi trường, Dược phẩm Vĩnh Phúc liên tục tìm cách cải thiện môi trường qua việc hiểu rõ những thách thức và cơ hội trong ngành Công nghiệp Dược để hướng tới sự phát triển bền vững. \r\nLuôn nâng cao tinh thần trách nhiệm thông qua việc sử dụng các công nghệ sạch và phù hợp trong lĩnh vực sản xuất dược phẩm\r\nBên cạnh các tiêu chuẩn nghiêm ngặt về môi trường trong sản xuất dược phẩm, thực phẩm (GMP, GLP, GSP), Vinphaco luôn chú trọng đến việc giữ gìn vệ sinh và công tác phòng chống cháy nổ, xử lý chất thải công nghiệp, nguồn nước theo đúng các tiêu chuẩn ngành và củ g và cho toàn xã hội.\r\nVINPHACO quyết tâm xây dựng một môi trường làm việc an toàn và lành mạnh, nơi người nhân viên có được cơ hội được phát huy năng lực.\r\n5.\tTRÁCH NHIỆM VỚI MÔI TRƯỜNG\r\nLà một đơn vị có ý thức bảo vệ môi trường, Dược phẩm Vĩnh Phúc liên tục tìm cách cải thiện môi trường qua việc hiểu rõ những thách thức và cơ hội trong ngành Công nghiệp Dược để hướng tới sự phát triển bền vững. \r\nLuôn nâng cao tinh thần trách nhiệm thông qua việc sử dụng các công nghệ sạch và phù hợp trong lĩnh vực sản xuất dược phẩm\r\nBên cạnh các tiêu chuẩn nghiêm ngặt về môi trường trong sản xuất dược phẩm, thực phẩm (GMP, GLP, GSP), Vinphaco luôn chú trọng đến việc giữ gìn vệ sinh và công tác phòng chống cháy nổ, xử lý chất thải công nghiệp, nguồn nước theo đúng các tiêu chuẩn ngành và của Nhà nước Việt Nam quy định."])</script><script>self.__next_f.push([1,"41:{\"companyId\":197684,\"jobImageURLs\":null,\"jobVideoURLs\":null,\"companyName\":\"Công Ty Cổ Phần Dược Phẩm Vĩnh Phúc\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/73/10234951.png\",\"companySizeId\":\"\",\"companyProfile\":\"$42\",\"contactName\":\"Ms Trang\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Số 777 - Đường Mê Linh, Phường Khai Quang, Thành phố Vĩnh Yên, Tỉnh Vĩnh Phúc\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"https://www.vietnamworks.com/company/cong-ty-co-phan-duoc-pham-vinh-phuc\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":2,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n44:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-06T08:42:13+07:00\",\"expiredOn\":\"2026-05-06T23:59:59+07:00\"}\n43:[\"$44\"]\n45:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"26:{\"jobId\":2035501,\"jobTitle\":\"Trình Dược Viên ETC (Thầ
