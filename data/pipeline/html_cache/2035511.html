tic/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tcfe,"])</script><script>self.__next_f.push([1,"Hành trình tinh hoa chế tác\r\nKhởi nguồn từ niềm đam mê, sự kiên trì và khát vọng cống hiến với tinh hoa vàng bạc, đá quý, ông Lềnh Lập Đức đã đặt những viên gạch đầu tiên cho sự ra đời của Lập Đức Jewellery bằng tư duy làm nghề nghiêm cẩn và chuẩn mực. Ngay từ những ngày đầu, ông đã xác định rõ: kinh doanh trang sức không chỉ là tạo ra sản phẩm, mà còn là nghệ thuật xây dựng niềm tin.\r\n\r\nNăm 2016, Lập Đức Jewellery ra mắt cửa hàng đầu tiên tại Đà Lạt, mở ra hành trình kiến tạo một thương hiệu trang sức dựa trên giá trị cốt lõi là chất lượng, minh bạch và uy tín. Trong từng sản phẩm, tinh thần thủ công truyền thống được gìn giữ, kết hợp cùng tư duy thẩm mỹ hiện đại, tạo nên dấu ấn riêng cho thương hiệu.\r\n\r\nChữ Đức làm gốc, tinh hoa thành hình\r\nTrên hành trình làm nghề, chữ “Đức” là nền tảng để giữ vững giá trị chuẩn mực, còn chữ “Tín” là cam kết nuôi dưỡng niềm tin lâu dài. Khi hai giá trị ấy song hành, từng sản phẩm không chỉ đạt đến sự tinh xảo trong chế tác, mà còn vẹn toàn về giá trị và uy tín.\r\n\r\nĐối với Lập Đức, trang sức là tác phẩm mang tính gắn bó lâu dài với khách hàng, đồng hành cùng những cột mốc quan trọng của cuộc đời. Chính vì vậy, từng chi tiết, đường nét đều được hoàn thiện bằng sự tỉ mỉ, chính xác và trách nhiệm của nghệ nhân.\r\n\r\nMở rộng hệ thống, lan tỏa giá trị\r\nSau cột mốc ra mắt thành công tại cửa hàng Đà Lạt, Lập Đức Jewellery tiếp tục mở rộng hoạt động thêm 3 cửa hàng mới. Năm 2017, các cửa hàng mới được thành lập tại Đức Trọng (Lâm Đồng), Phú Lợi (Đồng Nai) và Cầu Trắng (Đồng Nai), đánh dấu bước phát triển quan trọng trong việc đưa thương hiệu đến gần hơn với khách hàng ở nhiều khu vực.\r\n\r\nĐến năm 2024, cửa hàng Tân Phú (TP. HCM) được thành lập và chính thức đi vào hoạt động, mở ra một giai đoạn phát triển mới. Cũng là nơi Lập Đức Jewellery không ngừng hoàn thiện về quy mô, hình ảnh và trải nghiệm khách hàng, nhưng vẫn giữ trọn giá trị cốt lõi đã làm nên uy tín của thương hiệu.\r\nTiếp nối nền tảng, hướng tới tương lai\r\nVới tầm nhìn dài hạn, ông Lềnh Lập Đức từng bước đưa thương hiệu chuyển mình từ một đơn vị chế tác truyền thống trở thành hệ thống kinh doanh trang sức chuyên nghiệp và hiện đại. Mô hình vận hành được chuẩn hóa, dịch vụ khách hàng ngày càng nâng cao, nhưng tinh thần làm nghề cốt lõi vẫn luôn được gìn giữ.\r\n\r\nSau một thập kỷ phát triển, Lập Đức Jewellery bước sang giai đoạn mới với định hướng bền vững, tiếp tục lan tỏa những giá trị đã tạo dựng và không ngừng hoàn thiện để mang đến trải nghiệm tốt hơn cho khách hàng."])</script><script>self.__next_f.push([1,"24:T512,\u003cp\u003e- Công việc hành chính: quản lý, mua sắm tài sản, trang thiết bị, công cụ dụng cụ văn phòng. Thanh toán chi phí văn phòng như cơm, nước… Soạn thảo công văn, hợp đồng, thông báo, quy định, quy trình. Sắp xếp, quản lý hồ sơ - thông tin nhân sự, công ty.\u003c/p\u003e\u003cp\u003e- Công việc nhân sự: theo dõi chấm công, thực hiện tính lương, thưởng, thủ tục BHXH, giải đáp các thắc mắc về chính sách, quy định cho NLĐ, chăm lo đời sống NLĐ…\u003c/p\u003e\u003cp\u003e- Công việc tuyển dụng: đăng tin tuyển dụng, sắp xếp lịch phỏng vấn, tổng hợp kết quả, báo cáo kết quả, hỗ trợ training nhân viên mới.\u003c/p\u003e\u003cp\u003e- Các công việc khác theo chỉ đạo của cấp trên.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐịa điểm và thời gian làm việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Địa chỉ công ty: 263 – 265 Tân Hương, Tân Quý, Tân Phú, Thành phố Hồ Chí Minh\u003c/p\u003e\u
