 để từng thành viên phát huy tối đa năng lực, từ đó gắn bó và phát triển sự nghiệp lâu dài cùng công ty.\r\n-    Với định hướng phát triển bền vững, JOIE sẽ tiếp tục mở rộng mạng lưới cửa hàng tại các tỉnh thành lớn trên toàn quốc. Mục tiêu này không chỉ nhằm đáp ứng nhu cầu thời trang của giới trẻ, mà còn góp phần thúc đẩy kinh tế địa phương, mang đến nhiều việc làm chất lượng và đóng góp tích cực cho cộng đồng."])</script><script>self.__next_f.push([1,"24:T5b9,\u003cp\u003e• Kiểm tra, đối chiếu và hạch toán các nghiệp vụ kế toán phát sinh;\u003c/p\u003e\u003cp\u003e• Kiểm tra tính chính xác, hợp pháp, hợp lệ của hoá đơn chứng từ, hợp đồng mua bán;\u003c/p\u003e\u003cp\u003e• Theo dõi, xử lý, đối chiếu và đôn đốc thu hồi công nợ khách hàng, thanh toán với nhà cung cấp;\u003c/p\u003e\u003cp\u003e• Theo dõi, hạch toán trích khấu hao TSCĐ, phân bổ CCDC - chi phí trả trước, hạch toán lương, thực hiện các bút toán kết chuyển cuối kỳ và tính giá thành sản phẩm;\u003c/p\u003e\u003cp\u003e• Kiểm tra, đối chiếu số liệu giữa sổ chi tiết và sổ tổng hợp;\u003c/p\u003e\u003cp\u003e• Thực hiện các giao dịch với ngân hàng;\u003c/p\u003e\u003cp\u003e• Lập báo cáo thuế hàng tháng, quý, BCTC hàng năm theo quy định;\u003c/p\u003e\u003cp\u003e• Hướng dẫn các bộ phận phần hành xử lý và hạch toán nghiệp vụ kế toán đồng thời kiểm tra, giám sát công tác kế toán của các bộ phận liên quan;\u003c/p\u003e\u003cp\u003e• Đề xuất biện pháp cải thiện quy trình kế toán tại doanh nghiệp;\u003c/p\u003e\u003cp\u003e• Lưu trữ chứng từ, sổ sách kế toán khoa học, đảm bảo dễ dàng truy xuất dữ liệu khi cần thiết;\u003c/p\u003e\u003cp\u003e• Làm việc với các cơ quan có liên quan khi cần: cơ quan thuế, ngân hàng,…;\u003c/p\u003e\u003cp\u003e• Và thực hiện các công việc khác của bộ phận kế toán theo yêu cầu của Kế toán trưởng.\u003c/p\u003e25:T8d5,"])</script><script>self.__next_f.push([1,"\u003cp\u003e• Độ tuổi: 25-40 tuổi (Nam hoặc Nữ);\u003c/p\u003e\u003cp\u003e• Có ít nhất 02 năm kinh nghiệm trở lên ở vị trí kế toán tổng hợp. Ưu tiên ứng viên đã có kinh nghiệm trong các công ty sản xuất.\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại Học chuyên ngành kế toán;\u003c/p\u003e\u003cp\u003e• Am hiểu chế độ kế toán, chuẩn mực kế toán Việt Nam (VAS). Hiểu biết về hệ thống pháp luật thuế và các quy định tài chính liên quan;\u003c/p\u003e\u003cp\u003e• Có kiến thức về hệ thống kế toán nội bộ, kiểm soát chi phí và dòng tiền;\u003c/p\u003e\u003cp\u003e• Có kỹ năng tin học văn phòng tốt (Word, Excel, PowerPoint) và thành thạo phần mềm kế toán chuyên dụng (Misa, Fast,…);\u003c/p\u003e\u003cp\u003e• Cẩn thận, tỉ mỉ, trung thực, chịu được áp lực. Có có trách nhiệm và chủ động trong công việc;\u003c/p\u003e\u003cp\u003e• Có khả năng giao tiếp và giải trình tốt;\u003c/p\u003e\u003cp\u003e• Kỹ năng giải quyết vấn đề và tư duy logic tốt, có tinh thần học hỏi nâng cao chuyên môn;\u003c/p\u003e\u003cp\u003e• Sẵn sàng giải quyết công việc ngoài giờ hành chính theo yêu cầu khi cần thiết.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI ĐƯỢC HƯỞNG\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thời gian làm việc: Thứ 2 – trưa Thứ 7 (08h00 tới 17h00, nghỉ trưa từ 12h00 đến 13h30);\u003c/p\u003e\u003cp\u003e• Mức lương: 17-20 triệu/tháng (thỏa thuận theo năng lực);\u003c/p\u003e\u003cp\u003e• Tham gia các hoạt động của công ty: sinh nhật, liên hoan, sự kiện, year end party,...\u003c/p\u003e\u003cp\u003e• Được tham gia đầy đủ BHXH, BHYT, BHYT theo đúng Quy định của Pháp luật;\u003c/p\u003e\u003cp\u003e• Thử việc 02 tháng hưởng 85% lương chính thức (Review sau 01 tháng làm việc);\u003c/p\u003e\u003cp\u003e• Nghỉ phép 12 ngày/ năm theo quy định của Công ty;\u003c/p\u003e\u003cp\u003e• Ưu đãi mua sản phẩm thương hiệu;\u003c/p\u003e\u003cp\u003e• Nghỉ và thưởng lễ theo chế độ Công ty (Tết Dương lịch, 08/03, 30/04, 01/05, 02/09, Tết Âm lịch...);\u003c/p\u003e\u003cp\u003e• Được làm việc trong môi trường trẻ trung, năng động, thân thiện.\u003c/p\u003e\u003
