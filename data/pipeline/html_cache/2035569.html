u003cstrong\u003e1. Điều hành sản xuất, kế hoạch điều vận:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm toàn diện quản lý và điều phối toàn bộ hoạt động sản xuất tại nhà máy để đảm bảo đáp ứng được số lượng, chất lượng và tiến độ sản phẩm với hiệu quả cao nhất.\u003c/p\u003e\u003cp\u003e- Phụ trách quản lý thiết lập, đào tạo, hướng dẫn, sửa đổi, cải tiến quy trình và thực hiện quy trình, biểu mẫu của nhà máy.\u003c/p\u003e\u003cp\u003e- Quản lý kế hoạch sản xuất, logistic và điều vận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Quản lý trang thiết bị, máy móc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm quản lý toàn bộ máy móc, thiết bị phục vụ sản xuất\u003c/p\u003e\u003cp\u003e- Định kỳ tổ chức kiểm tra chất lượng máy móc thiết bị. Điều phối hoạt động bảo trì, bảo dưỡng, sửa chữa.\u003c/p\u003e\u003cp\u003e- Đề xuất việc mua các thiết bị mới thay thế cho các máy móc, thiết bị không còn sử dụng được theo tình hình thực tế lên Tổng Giám Đốc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Chỉ đạo, triển khai 5S, ISO, Kaizen trong sản xuất.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chỉ đạo và thực hiện triển khai 5S, ISO, Kaizen ở lĩnh vực và khu vực quản lý\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Lập kế hoạch ngân sách năm\u003c/strong\u003e\t-\t- Căn cứ kế hoạch kinh doanh, phối hợp với GĐNM lập kế hoạch ngân sách sản xuất, định biên nhân sự năm, chi phí sản xuất năm.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Cố vấn, tham mưu, giám sát:\u003c/strong\u003e\t\u003c/p\u003e\u003cp\u003e- Giám sát, kiểm tra các bộ phận sản xuất.\u003c/p\u003e\u003cp\u003e- Tham mưu, đề xuất cải tiến nâng cao chất lượng sản phẩm, tiết kiệm chi phí, nâng cao năng suất lao động\u003c/p\u003e\u003cp\u003e- Quản lý, kiểm tra giám sát việc triển khai kế hoạch sản xuất,  tối ưu hóa nguồn lực và dây chuyền sản xuất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Tuyển dụng, đào tạo và đánh giá nhân sự:\u003c/strong\u003e\u003c/p\u003e\u0
