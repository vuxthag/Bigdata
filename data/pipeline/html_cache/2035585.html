anh mục sản phẩm có thể triển khai tại các khách hàng phụ trách.\u003c/p\u003e\u003cp\u003e- Xây dựng kế hoạch, Tổ chức các buổi Hội Nghị - Hội Thảo Onsite - Webinar tại Bệnh viện, Khoa lâm sàng để phát triển máy và hóa chất.\u003c/p\u003e\u003cp\u003e- Chủ động nghiên cứu, tìm hiểu kiến thức liên quan đến sản phẩm, bệnh học nhằm tăng thêm các kiến thức về sản phẩm phụ trách.\u003c/p\u003e\u003cp\u003e- Tham gia đào tạo kiến thức cơ bản, thông tin sản phẩm cho KD theo sự phân công của GPM/sPM/PM/PS với các chủ đề phù hợp.\u003c/p\u003e\u003cp\u003e- Nắm bắt tốt thông tin thị trường của dòng sản phẩm mình phụ trách như thông tin về khách hàng, đối thủ cạnh tranh, thị trường, thị phần của sản phẩm tại KH.\u003c/p\u003e\u003cp\u003e- Mở rộng thị trường/ KH mới theo chiến lược các sản phẩm phụ trách, với tệp KH tiềm năng có sẵn ở từng hạng KH: khảo sát lượng mẫu, đối thủ, thị phần, nhu cầu triển khai máy mới, cơ hội thay thế máy/ bổ sung máy, phân tích cơ hội, xây dựng/ đề xuất kế hoạch làm việc kinh doanh\u003c/p\u003e\u003cp\u003e- Hỗ trợ KD, thầu để bảo vệ danh mục sản phẩm khi xây dựng hồ sơ và chào sản phẩm.\u003c/p\u003e\u003cp\u003e- Chủ động, kết nối với các bộ phận phòng ban liên quan (KD/PS/App/KS) để chăm sóc, hỗ trợ và xử lý các vấn đề liên quan đến dòng sản phẩm được phân công.\u003c/p\u003e\u003cp\u003e- Tham gia các dự án khảo sát dữ liệu thị trường IVD, khảo sát mức độ hài lòng của KH, dự án xây dựng sales tool…\u003c/p\u003e\u003cp\u003e- Thực hiện các công việc khác do Quản lý cấp trên phân công.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* QUYỀN LỢI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGói lương thưởng cạnh tranh dựa trên năng lực và hiệu quả công việc;\u003c/p\u003e\u003cp\u003e•\tThưởng BSC hàng quý, thưởng tháng lương 13, thưởng Performance năm theo doanh số Công ty hấp dẫn;\u003c/p\u003e\u003cp\u003e•\tĐược tham gia các khóa đào tạo kiến thức chuyên môn và kỹ năng mềm;\u003c/p\u003e\u003cp\u003e•\tĐược hưởng đầy đủ quyền lợi của người
