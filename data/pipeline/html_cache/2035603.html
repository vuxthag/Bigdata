ons and budget development. Consistently manage the assigned engineering activities in preparing project documents in compliance with project schedule and observing the correctness and the completeness of the provided information.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe AE’s goals can be summarized as follow:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Design phase: providing technical support to the Sales Team by assessing technical information and develop conceptual/preliminary design of integrated solutions for projects using both Anaergia and third party technologies.\u003c/p\u003e\u003cp\u003e• Proposal phase: Cost and price calculation using Anaergia tools and basing design on Anaergia Design Manual recommendations, lessons learned and best practices\u003c/p\u003e\u003cp\u003e• Provide technical documentation and cost data for the Contracts, Sales, and Marketing teams and help negotiate technical issues at customer level.\u003c/p\u003e\u003cp\u003e• Permanent support to Sales during the proposal phase interfacing with client, client engineers, subconsultants, contractors and permitting agencies as required.\u003c/p\u003e\u003cp\u003e• Quickness and flexibility in responses to urgent questions from project managers, project engineers and sales managers.\u003c/p\u003e\u003cp\u003e• Provide integrated view of the project and forge strong links between all internal and external project stakeholders to ensure a consistent and coordinated technical approach for all projects.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe APE’s tasks includes:\u003c/p\u003e\u003cp\u003e• Provide technical and commercial support and product advice for existing and future product portfolio within the areas of solid waste treatment, anaerobic digestion, biogas utilization, nutrient recovery and wastewater treatment.\u003c/p\u003e\u003cp\u003e• Develop Front End Engineering Documents (FEED) including Block Flow Diagrams (BFD), Process Flow Diagrams (PFD) and Process \u0026 Instrumentation Diagrams (PID) and general arrangement drawings during bid development and project development as necessary.\u003c/p\u003e\u003cp\u003e• Liaise and develop new Asian vendor database.\u003c/p\u003e\u003cp\u003e• Review and appraise customer specifications and provide summary notes including the specification’s alignment or otherwise with Anaergia’s Products and Technologies.\u003c/p\u003e\u003cp\u003e• Design systems, including biological processes using existing tools and process blocks in coordination with the Global Process Engineering Team.\u003c/p\u003e\u003cp\u003e• Process customer inquiries and orders; Analyze customer requirements and development of offers in close consultation with the Sales Team; Obtain, compile and process information about competitors and the market.\u003c/p\u003e\u003cp\u003e• Prepare proposals and price calculation according to the company guidelines and the implemented processes; Request quotations from defined and selected subcontractors and pre-negotiate the received quotes.\u003c/p\u003e\u003cp\u003e• Actively participating in Offer Preparation during the proposal phase to note any deviations; Participate in finding solutions in coordination with internal manufacturing departments and the sales manager.\u003c/p\u003e\u003cp\u003e• Compile all relevant technical documents for the proposal and / or for the contract.\u003c/p\u003e\u003cp\u003e• Support Sales department in request phase for pre-qualifications.\u003c/p\u003e\u003cp\u003e• Record all project relevant documents and costing data on the within the database.\u003c/p\u003e\u003cp\u003e• Perform continuous maintenance of costing data base in conjunction with the Global Applications Team.\u003c/p\u003e\u003cp\u003e• Support and coordinate preliminary design activities during project development of Anaergia Build Own Operation Business including site/civil, electrical, mechanical, structural as well as permitting and grant application activities as necessary.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T728,\u003cp\u003e\u003cstrong\u003eEducation and Experience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Holds a bachelor’s degree in: Chemical Engineering / Mechanical engineering/ Environmental Engineer/ Residential water management or another high technical education or equivalent with a focus on municipal and environmental engineering.\u003c/p\u003e\u003cp\u003e• Fresh graduates are warmly welcomed. 2 to 5 years of working experience as an Applications Engineer or Process Engineer within the Industrial Plant business, preferable in solid waste treatment, wastewater treatment is considered highly advantageous.\u003c/p\u003e\u003cp\u003e• Understanding of all MS Office tools and ability to adapt to new digital tools.\u003c/p\u003e\u003cp\u003e• Basic understanding of process plants including chemical processes.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical Skills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe APE has the following technical skillsets:\u003c/p\u003e\u003cp\u003e• Good understanding of basic processes like wastewater treatment, biogas, anaerobic digestion and/or municipal solid waste (will be preferred).\u003c/p\u003e\u003cp\u003e• Understanding of mass and energy balance, equipment sizing.\u003c/p\u003e\u003cp\u003e• Ability to use MS office tools, AUTOCAD software.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe AE has the following Key Personal Attributes \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Excellent interpersonal skills and a positive attitude to get things done.\u003c/p\u003e\u003cp\u003e• Passionate, highly driven, and hard-working, portrays an Entrepreneurial spirit, a great team player and gets things done. Has the ability to self-start tasks without dropping the ball waiting for responses from others. Inquisitive, solutions oriented. “Can do” attitude.\u003c/p\u003e\u003cp\u003e• Always reading on new technologies, technically deep and detail oriented.\u003c/p\u003e\u003cp\u003e• Team player, humble. Meets promises internally and to external clients and project stakeholders and participants.\u003c/p\u003e\u003cp\u003e• Aligned and motivated by our company Mission.\u003c/p\u003e27:Tfc3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJob Overview:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe AP Engineer represents technical aspects of business development and project definition. AP Engineer is responsible for providing full technical support for Business Development/Sales of all Anaergia Projects from the origination phase through contract negotiation and hand over to Anaergia Project Execution Team with all required specifications and budget development. Consistently manage the assigned engineering activities in preparing project documents in compliance with project schedule and observing the correctness and the completeness of the provided information.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe AE’s goals can be summarized as follow:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Design phase: providing technical support to the Sales Team by assessing technical information and develop conceptual/preliminary design of integrated solutions for projects using both Anaergia and third party technologies.\u003c/p\u003e\u003cp\u003e• Proposal phase: Cost and price calculation using Anaergia tools and basing design on Anaergia Design Manual recommendations, lessons learned and best practices\u003c/p\u003e\u003cp\u003e• Provide technical documentation and cost data for the Contracts, Sales, and Marketing teams and help negotiate technical issues at customer level.\u003c/p\u003e\u003cp\u003e• Permanent support to Sales during the pr he implemented processes; Request quotations from defined and selected subcontractors and pre-negotiate the received quotes.\u003c/p\u003e\u003cp\u003e• Actively participating in Offer Preparation during the proposal phase to note any deviations; Participate in finding solutions in coordination with internal manufacturing departments and the sales manager.\u003c/p\u003e\u003cp\u003e• Compile all relevant technical documents for the proposal and / or for the contract.\u003c/p\u003e\u003cp\u003e• Support Sales department in request phase for pre-qualifications.\u003c/p\u003e\u003cp\u003e• Record all project relevant documents and costing data on the within the database.\u003c/p\u003e\u003cp\u003e• Perform continuous maintenance of costing data base in conjunction with the Global Applications Team.\u003c/p\u003e\u003cp\u003e• Support and coordinate preliminary design activities during project development of Anaergia Build Own Operation Business including site/civil, electrical, mechanical, structural as well as permitting and grant application activities as necessary.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:T728,\u003cp\u003e\u003cstrong\u003eEducation and Experience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Holds a bachelor’s degree in: Chemical Engineering / Mechanical engineering/ Environmental Engineer/ Residential water management or another high technical education or equivalent with a focus on municipal and environmental engineering.\u003c/p\u003e\u003cp\u003e• Fresh graduates are warmly welcomed. 2 to 5 years of working experience as an Applications Engineer or Process Engineer within the Industrial Plant business, preferable in solid waste treatment, wastewater treatment is considered highly advantageous.\u003c/p\u003e\u003cp\u003e• Understanding of all MS Office tools and ability to adapt to new digital tools.\u003c/p\u003e\u003cp\u003e• Basic understanding of process plants including chemical processes.\u003c/p\u003e\u003cp\u003e\u003
