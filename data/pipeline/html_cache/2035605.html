3eKỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tAm hiểu pháp luật chứng khoán, quy trình giao dịch, nghiệp vụ môi giới, nghiệp vụ trái phiếu, IB.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e-\tKỹ năng phân tích rủi ro, viết báo cáo, trình bày rõ ràng.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThành thạo Excel, Power BI; hiểu biết về công cụ phân tích dữ liệu là lợi thế.\u003c/p\u003e\u003cp\u003e-\tKinh nghiệm triển khai/ứng dụng AI/GenAI trong kiểm soát là điểm cộng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e-\tKỹ năng tổ chức, quản lý đội ngũ và xây dựng môi trường làm việc hiệu suất cao.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e-\tKỹ năng giải quyết vấn đề, ra quyết định nhanh chóng và linh hoạt.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhẩm chất cá nhân\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTrung thực, khách quan, tư duy phản biện, kiên quyết trong bảo vệ tính tuân thủ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e-\tKỹ năng lãnh đạo, phối hợp liên phòng ban, giao tiếp với cấp quản lý và cơ quan quản lý.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThu nhập tương xứng với năng lực và hiệu quả công việc (\u003cstrong\u003eMức thu nhập tùy theo năng lực và thỏa thuận khi phỏng vấn)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tLương tháng thứ 13, thưởng theo kết quả kinh doanh của Công ty và thưởng cuối năm;\u003c/p\u003e\u003cp\u003e-\tChế độ bảo hiểm đầy đủ.\u003c/p\u003e\u003cp\u003e-\tChế độ khám sức khỏe định kỳ hàng năm (1 lần/năm)\u003c/p\u003e\u003cp\u003e-\tGói bảo hiểm chăm sóc sức khỏe hàng năm.\u003c/p\u003e\u003cp\u003e-\tChế độ nghỉ phép theo quy định của Luật \u003c/p\u003e\u003cp\u003e-\tChế dộ du lịch và chế độ vào các ngày lễ lớn trong năm.\u003c/p\u003e\u003cp\u003e-\tChế độ ăn trưa, đi lại thực hiện công việc bằng t
