767062684.js\"],\"default\"]\n23:Tb88,"])</script><script>self.__next_f.push([1,"RCE là một startup của Hàn Quốc đang phát triển nhanh chóng tại Việt Nam.\r\n\r\nCác thành viên của chúng tôi bao gồm các chuyên gia trong ngành thiết bị xây dựng hạng nặng như máy xúc đào, máy xúc lật, xe bồn trộn và xe bơm bê tông, các chuyên gia kinh doanh toàn cầu và chuyên gia vận hành khởi nghiệp. Chúng tôi thành lập RCE với mục tiêu đổi mới quy trình giao dịch toàn cầu đã lỗi thời đối với thiết bị hạng nặng đã qua sử dụng.\r\n\r\nBất chấp ngành xây dựng tại Việt Nam hoàn toàn đình trệ do đại dịch COVID-19, RCE vẫn tăng trưởng hàng năm và chúng tôi đã đạt doanh thu 5 triệu Đô la Mỹ vào năm 2021 và 10 triệu Đô la Mỹ vào năm 2022, mục tiêu của chúng tôi cho năm 2023 là đạt doanh thu 20 triệu Đô la\r\n\r\n**Về chúng tôi: ****RCE là công ty Startup Hàn trong ngành máy móc xây dựng công trình nhập khẩu đang phát triển nhanh chóng tại Việt Nam. Trong năm 2022, chúng tôi vinh dự nhận được khoản đầu tư Series A trị giá 5 triệu Đô la để thúc đẩy tăng trưởng. Ngoài ra, chúng tôi được Bộ doanh nghiệp vừa và nhỏ Hàn Quốc lựa chọn vào danh sách Unicorn cỡ trung. Tháng 10/2023, RCE được trao giải thưởng \"Award for Internationalization and 2023 Torch Award for Best Nominee (South Korea)\" được tổ chức bởi ABI Summit and Awards Ceremony, AIMs Summit 2023 tại Thái Lan nhằm tuyên dương các doanh nghiệp startup trẻ tại Thái Lan và doanh nghiệp startup quốc tế. Chúng tôi cũng đang trong quá trình mở rộng, phát triển doanh nghiệp trên phạm vi quốc tế và dự kiến mở thêm chi nhánh tại các nước khác ở châu Á và Mỹ trong năm 2024.\r\n\r\nHiện nay RCE có 10 nhân sự tại Hàn Quốc, 25 nhân sự tại Việt Nam. Ngoài ra, tính đến tháng 11, 2023, Chúng tôi sở hữu hệ thống CRM với tất cả các thông tin của hơn 14,000 khách hàng trong số 100,000 nhà thầu phụ tại Việt Nam được thu thập trong quá trình tìm hiểu thị trường của RCE từ lúc thành lập. Chúng tôi đã nói chuyện và khảo sát với hơn 3.000 khách hàng hàng tháng 3cstrong\u003eJunior Sales Executive under RCE Financial Solution TFT\u003c/strong\u003e, your \u003cstrong\u003emain responsibility\u003c/strong\u003e is to \u003cstrong\u003esell used construction machines\u003c/strong\u003e (excavators, wheel loaders, etc.) to local construction companies in Vietnam. Most of your customers will need \u003cstrong\u003efinancing support, and you'll help them understand and use RCE’s financial solutions\u003c/strong\u003e to make a purchase.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThis role is part of our Financial Solution Task Force Team\u003c/strong\u003e. You'll be at the center of a growing business, combining machine sales with smart financing, supported by our sourcing team and data experts from Korea.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThis is a perfect role for someone with strong sales instincts\u003c/strong\u003e, great communication skills, and a passion for helping businesses grow\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat You’ll Do\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Sell construction equipment\u003c/strong\u003e to B2B customers (builders, contractors, dealers)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Understand customer needs and propose the right machine + financing package\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Follow up with leads, negotiate deals\u003c/strong\u003e, and close sales\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Educate customers on financial solutions, helping them access leasing or loans\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Build strong, long-term relationships with clients and partners\u003c/p\u003e\u003cp\u003e- Work with internal teams (Korea/Japan sourcing, tech, data) to deliver solutions\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push  heavy equipment is traded across borders. Based in Vietnam, we specialize in sourcing inspected machines from Korea and Japan and delivering them to construction businesses with end-to-end support.  With offices in Seoul, Tokyo, Hanoi, and Ho Chi Minh City, we are well-positioned to serve clients across Asia.\r\n\r\nOur mission is simple:\r\nTake an industry that’s fragmented, outdated, and built on mistrust—and make it work.\r\nIt’s not just about selling machines.\r\nIt’s about connecting them—\r\nto finance,\r\nto service,\r\nto data,\r\nto trust.\r\nAll in one seamless experience.\r\n---\r\n Why Choose RCE?\r\n Real Traction in a Challenging Market\r\nDespite a tough macroeconomic environment in the construction equipment industry, RCE more than doubled its gross profit in 2024** compared to the year before.\r\nIn Q1 2025, our gross profit was 5× higher than the same quarter last year —a clear signal that we’re not just growing but scaling profitably.\r\n\r\nOur momentum is fueled by:\r\n- Expanded sourcing to 2,000+ suppliers across Korea, Japan, and China \r\n-  Financial solutions allowing customers to finance up to 90% of equipment value\r\n-  In-house operations from sourcing to after-sales, driving cost and trust efficiency\r\n\r\n A Mission-Driven Team:\r\nOur leadership brings 10–20 years of industry experience.\r\nOur team brings energy, curiosity, and the hunger to grow.\r\nWe’re a global team—young, bold, and ready to lead the future.\r\nWe take on tough problems. We learn fast. We move together.\r\nWe believe challenges are a gift.\r\nWe don’t wait for someone to tell us what to do—we take ownership and figure it out.\r\nIf you want to grow into a global leader by solving real-world problems, you’ll do your best work at RCE.\r\n\r\nA Massive Market That’s Ready for Change:\r\nVietnam alone is a massive market for second-hand construction equipment—over 100,000 contractors and a total market size of $3B+.\r\nBut the problem we’re solving isn’t just a e\u003cstrong\u003e- Rapid career progression: Many of our hires grow into **top-performing sales consultants within one month\u003c/strong\u003e** and eventually lead their own teams.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAttractive Salary \u0026 Benefits\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Fixed salary: \u003c/strong\u003e12-24 million VND\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Performance-based commission\u003c/strong\u003e and long-term success sharing\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Company-provided laptop \u0026 personal phone\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- 50% coverage of driving license fees\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Full health \u0026 social insurance \u003c/strong\u003eplus paid leave per state regulations\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA High-Energy, Rewarding Work Environment\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Be part of a \u003cstrong\u003erapidly expanding company\u003c/strong\u003e with a mission to transform financial services\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Work in a dynamic team that values innovation, collaboration, and hands-on learning\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e- Gain hands-on experience in B2B sales\u003c/strong\u003e, customer engagement, and business growth strategies\u003c/p\u003e\u003cp\u003e- Experience in consulting or global companies is an advantage\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWorking Hours\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tMonday – Friday:\u003c/strong\u003e 8:00 AM – 5:30 PM\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tSaturday:\u003c/strong\u003e 8:00 AM – 12:00 PM\u003c/p\u003e\u003cp\u003e•\tLunch break: 12:00 PM – 1:30 PM\u003c/p\u003 der by solving real-world problems, you’ll do your best work at RCE.\r\n\r\nA Massive Market That’s Ready for Change:\r\nVietnam alone is a massive market for second-hand construction equipment—over 100,000 contractors and a total market size of $3B+.\r\nBut the problem we’re solving isn’t just a Vietnam problem.\r\nOnce we prove our model here, we’ll scale across Southeast Asia, where the same inefficiencies, trust issues, and financing gaps exist.\r\nVietnam is just the beginning."])</script><script>self.__next_f.push([1,"41:{\"companyId\":350749,\"jobImageURLs\":\"$42\",\"jobVideoURLs\":\"$43\",\"companyName\":\"RCE Company Limited\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/4e/11071570.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"Ms Huyền\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"The Sun, Me Tri, Nam Tu Liem, Ha Noi\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":2,\"bannerDesktopUri\":\"https://images.vietnamworks.com/pictureofcompany/7d/company-info-cover-picture-url-350749-1682587493.png\"}\n46:{\"serviceCode\":\"TPM\",\"startOn\":\"2026-04-06T10:19:42+07:00\",\"expiredOn\":\"2026-05-06T23:59:59+07:00\"}\n47:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-06T10:19:43+07:00\",\"expiredOn\":\"2026-05-06T23:59:59+07:00\"}\n45:[\"$46\",\"$47\"]\n48:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"28:{\"jobId\":2035613,\"jobTitle\":\"Chuyên Viên Kinh Doanh Máy Móc Công Trình Tại Doanh Nghiệp Hàn Quốc (Upto 25 Triệu) [ Under 28] Welcome Fresher\",\"userId\":6834782,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/4e/11071570.png\",\"alias\":\"chuyen-vien-kinh-doanh-may-moc-cong-trinh-tai-doanh-nghiep-han-quoc-upto-25-trieu-under-28-welcome-fresh
