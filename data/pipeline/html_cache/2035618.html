ne Group là chủ đầu tư xây dựng của các dự án lớn: Sunshine Marina Nha Trang Bay, Sunshine RiverSide, Sunshine Center, Sunshine Garden, Sunshine Palace, Sunshine Boulevard\r\n\r\nSỨC MẠNH của Sunshine được gói trọn vẹn trong chữ TÍN. Đó là UY TÍN với khách hàng, với các nhà đầu tư, các đối tác và bản thân đội ngũ nhân lực cấu thành nên Sunshine. Bằng tầm nhìn chiến lược đó, chúng tôi luôn nỗ lực vượt qua mọi thách thức, nhằm kiến tạo nên một Sunshine hưng thịnh và phát triển vững bền.\r\n\r\nHướng tới sự phồn vinh của xã hội, những giá trị nhân văn và tinh hoa trong cuộc sống, chúng tôi cam kết từng bước khẳng định mình và nâng cao vị thế, trở thành biểu tượng niềm tin hàng đầu trong mọi lĩnh vực hoạt động của tập đoàn.\r\n\r\nSunshine Group luôn chào đón và tìm kiếm những Nhân tài đồng hành cùng chúng tôi trong những bước đi tương lai."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2a:T732,\u003cp\u003e\u003cstrong\u003eI. Thông tin chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBộ phận: Phòng Kế toán\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCán bộ quản lý trực tiếp: Kế toán trưởng\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Nhiệm vụ cụ thể:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Quản lý đơn hàng \u0026 hóa đơn\u003c/p\u003e\u003cp\u003e• Kiểm tra tính hợp lệ của hợp đồng, đơn hàng, phiếu xuất kho.\u003c/p\u003e\u003cp\u003e• Xuất hóa đơn GTGT cho khách hàng đúng thời điểm, đúng quy định thuế.\u003c/p\u003e\u003cp\u003e• Theo dõi hóa đơn đã xuất và tình trạng giao nhận hàng hóa.\u003c/p\u003e\u003cp\u003e2. Hạch toán nghiệp vụ bán hàng\u003c/p\u003e\u003cp\u003e• Hạch toán doanh thu, thuế GTGT đầu ra.\u003c/p\u003e\u003cp\u003e• Ghi nhận các khoản chiết khấu, giảm giá, hàng bán bị trả lại.\u003c/p\u003e\u003cp\u003e• Theo dõi các khoản đặt cọc, thanh toán của khách hàng.\u003c/p\u003e\u003cp\u003e3. Quản lý công nợ phải thu\u003c/p\
