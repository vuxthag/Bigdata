,"\u003cp\u003e1. Mục tiêu của vị trí công việc:\u003c/p\u003e\u003cp\u003eChịu trách nhiệm toàn diện trong việc lập kế hoạch, điều phối, triển khai và tối ưu hóa các nguồn\u003c/p\u003e\u003cp\u003elực để đảm bảo mọi sự kiện thực hiện đạt tiêu chuẩn chuyên nghiệp cao, tối ưu chi phí, hoàn\u003c/p\u003e\u003cp\u003ethành đúng hạn và mang lại sự hài lòng vượt mong đợi cho khách hàng.\u003c/p\u003e\u003cp\u003e2. Nhiệm vụ:\u003c/p\u003e\u003cp\u003e* Quản lý \u0026 điều hành phòng:\u003c/p\u003e\u003cp\u003e- Xây dựng bộ máy nhân sự tinh gọn, có đủ năng lực, kỹ năng để thực thi công việc. Quản lý nhân sự trong phòng: tuyển dụng, đào tạo, đánh giá, khen thưởng, kỷ luật. Xây dựng quy trình vận hành của phòng khoa học, chuyên nghiệp.\u003c/p\u003e\u003cp\u003e* Lập kế hoạch \u0026 triển khai sự kiện:\u003c/p\u003e\u003cp\u003e- Chủ trì sáng tạo ý tưởng, kịch bản tổng thể, proposal, phương án, kế hoạch, checklist, dự toán tổ chức sự kiện/giải đấu, activation… mang tính đột phá, khả thi.\u003c/p\u003e\u003cp\u003e- Lập kế hoạch chi tiết: timeline, ngân sách, nhân sự, rủi ro.\u003c/p\u003e\u003cp\u003e- Điều phối toàn bộ quá trình thực hiện\u003c/p\u003e\u003cp\u003e* Quản lý vận hành sự kiện:\u003c/p\u003e\u003cp\u003e- Giám sát setup: sân khấu, đường đua, khu vực thi đấu, hậu cần, an ninh, y tế.\u003c/p\u003e\u003cp\u003e- Làm việc với các bên liên quan: nhà cung cấp, đối tác kỹ thuật, địa phương.\u003c/p\u003e\u003cp\u003e- Đảm bảo tuân thủ quy định pháp lý, giấy phép tổ chức sự kiện thể thao.\u003c/p\u003e\u003cp\u003e* Làm việc với khách hàng \u0026 tài trợ:\u003c/p\u003e\u003cp\u003e- Phối hợp với Kinh doanh/Dự án để làm việc với khách hàng và nhà tài trợ thống nhất phương án triển khai\u003c/p\u003e\u003cp\u003e* Kiểm soát ngân sách \u0026 hiệu quả:\u003c/p\u003e\u003cp\u003e- Lập và quản lý ngân sách sự kiện.\u003c/p\u003e\u003cp\u003e- Tối ưu chi phí, đảm bảo hiệu quả dự án.\u003c/p\u003e\u003cp\u003e* Báo cáo:\u003c/p\u003e\u003cp\u003e- Báo cáo tiến độ và kết quả c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chính trực, chủ động, cẩn thận trong công việc.\u003c/p\u003e\u003cp\u003e- Quyết đoán, trách nhiệm cao.\u003c/p\u003e\u003cp\u003e- Sẵn sàng đi công tác và làm việc ngoài giờ theo đặc thù ngành sự kiện.\u003c/p\u003e\u003cp\u003e- Linh hoạt, “máu lửa” với ngành sự kiện.\u003c/p\u003e\u003cp\u003e- Luôn học hỏi, sáng tạo và đổi mới trong công việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.Thu nhập:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Trao đổi thỏa thuận trong quá trình phỏng vấn\u003c/p\u003e\u003cp\u003e- Thưởng hiệu quả công việc, hoặc thưởng cuối năm.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Chế độ phúc lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thưởng các ngày Lễ, Tết, sinh nhật, ngày Nam giới., ngày Nữ giới\u003c/p\u003e\u003cp\u003e- Thưởng thâm niên cuối năm\u003c/p\u003e\u003cp\u003e- Bảo hiểm xã hội, BHYT, BHTN theo quy định của pháp luật, khám sức khỏe định kỳ hàng năm.\u003c/p\u003e\u003cp\u003e- Tham gia các chương trình Du lịch, Teambuilding, dã ngoại, Hội thao sôi động\u003c/p\u003e\u003cp\u003e- Đặc quyền: Ngày phép tăng theo thâm niên (làm việc từ năm thứ 2 trở lên mỗi năm tăng 01 ngày phép)\u003c/p\u003e\u003cp\u003ePantry đầy đủ cafe, trà, happy hour chiều thứ Sáu hàng tuần\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Môi trường:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Năng động, trẻ trung, chuyên nghiệp, khuyến khích sự sáng tạo và phát triển cá nhân.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Te1e,"])</script><script>self.__next_f.push([1,"GIỚI THIỆU VỀ UNIC GROUP\r\n1. Thông tin chung\r\nThành lập từ năm 2008, Unic Group đã khẳng định vị thế là một trong những tổ hợp truyền thông, sáng tạo, xây dựng và quản trị thương hiệu hàng đầu tại Việt Nam. Với slogan \"Key for uniqueness\", chúng tôi không ngừng nỗ lực mang đến những giải pháp khác biệt, giúp khách hàng khẳng định bản sắc riêng trên thị trường.\r\nUnic tự hào là đơn vị tiên phong trong việc xây dựng và quản trị các dự án truyền thông cộng đồng quy mô lớn, đóng góp tích cực vào sự phát triển chung của xã hội.\r\n2. Lĩnh vực hoạt động \r\nUnic Group sở hữu hệ sinh thái dịch vụ tổng thể, chuyên nghiệp hóa và đa dạng lĩnh vực hoạt động:\r\n- Thương hiệu (Ulook): Tư vấn chiến lược thương hiệu, Quản trị thương hiệu, Thiết kế sáng tạo, Tư vấn xây dựng hệ thống nhận diện - - thương hiệu, Sản xuất và ứng dụng nhận diện thương hiệu; \r\n- Truyền thông: Tư vấn chiến lược và kế hoạch truyền thông, Quan hệ truyền thông; \r\n- Tài trợ quảng cáo truyền hình, tài trợ quảng cáo thể thao;\r\n- Sản xuất (Unic Production): Sản xuất chương trình truyền hình, phim giới thiệu doanh nghiệp, TVC, video marketing; \r\n- Sự kiện (Unic Event): Sáng tạo concept, Tổ chức sự kiện, Quản trị sự kiện;\r\n- Xây dựng và Quản trị Dự án truyền thông cộng đồng (Usports, U-health,...)\r\nHơn 18 năm phát triển, Unic đã trở thành đối tác tin cậy của các cơ quan Nhà nước như Bộ Giáo dục và Đào tạo, Bộ Công Thương, Bộ Y tế, UBND các tỉnh thành phố, các bộ, ban ngành TW và địa phương; các cơ quan thông tấn báo chí như Đài Truyền hình Việt Nam (VTV), Đài Tiếng nói Việt Nam (VOV), Đài PTTH Hà Nội, Đài PTTH Hồ Chí Minh... Khách hàng của chúng tôi là những tập đoàn lớn trong và ngoài nước như: Vingroup, Petrolimex, EVNNPC, Viettel, Techcombank, BIDV, VietjetAir, Hanvico, Nam Dược, Karofi,...\r\nDự án tiêu biểu: Chương trình Thương hiệu quốc gia, Giờ Trái Đất, Giải bóng chuyền nữ quốc tế VTV Cup, Giải chạy học sinh S-Race (đạt kỷ lục thế giới), Đại hội thể thao học sinh Đông Nam Á, Hội khỏe Phù Đổng toàn quốc...\r\n3. Môi trường làm việc\r\nTại Unic Group, chúng tôi tin rằng con người là tài sản quý giá nhất. Unic cam kết xây dựng một môi trường làm việc:\r\n- Chuyên nghiệp \u0026 Năng động: Nơi mỗi cá nhân được khuyến khích phát huy tối đa năng lực chuyên môn, tư duy logic và sự sáng tạo không giới hạn.\r\n- Chính trực \u0026 Nhân văn: Đề cao sự ngay thẳng, liêm chính, tinh thần làm chủ, hài hoà lợi ích doanh nghiệp với lợi ích xã hội.\r\n- Tốc độ \u0026 Hiệu quả: Áp dụng tôn chỉ \"Quyết định nhanh - Triển khai nhanh - Thích ứng nhanh\" nhằm cung cấp cho khách hàng các sản phẩm - dịch vụ đẳng cấp và chất lượng.\r\n- Phát triển bền vững: Tạo điều kiện thu nhập xứng đáng và cơ hội phát triển công bằng, lộ trình thăng tiến rõ ràng cho mọi nhân viên.\r\nGia nhập Unic Group ngay hôm nay để cùng chúng tôi kiến tạo những giá trị khác biệt và chinh phục những đỉnh cao mới!"])</script><script>self.__next_f.push([1,"29:T683,Trải qua 15 năm hình thành và phát triển, đến nay Unic trở thành tổ hợp truyền thông, sáng tạo, tổ chức sự kiện và xây dựng thương hiệu hàng đầu Việt Nam. Nổi bật với các chiến dịch truyền thông:\r\n- Thương hiệu quốc gia\r\n- Giờ trái đất\r\n- Giải Xe đạp quốc tế VTV cúp Tôn Hoa Sen\r\n- Giải bóng chuyền quốc tế VTV cúp Tôn Hoa Sen\r\nCác chương trình truyền hình \r\n- Chống buôn lậu hàng giả, bảo vệ người tiêu dùng\r\n- Đón tết cùng VTV\r\n- Sự kiện \u0026 Bình luận\r\n- Nhịp đập 360 độ thể thao\r\n- Tạp chí kinh tế cuối tuần\r\nvà các dịch vụ quảng cáo độc đáo, hiệu quả khác...\r\n\r\nVới kinh nghiệm phục vụ đa dạng khách hàng trong và ngoài nước: Samsung, Sharp, Aosmith, Huyndai, Hoa Sen Group, Gelex, Vietjet, Karofi, Sakos, Nam Dược, Hoa Linh, OPC, Sunhouse, EVN, Sohaco, Nagakawa, Thibidi, Vinakip, Niferco, Alcorest...chúng tôi cam kết luôn mang đến cho các khách hàng, đối tác những giải pháp/dịch vụ truyền thông tối ưu nhất.\r\n\r\nBên cạnh mục tiêu cung cấp các dịch vụ: Xây dựng thương hiệu, tổ chức sự kiện, quảng cáo \u0026 truyền thông, sáng tạo, sản xuất TVC, film tự giới thiệu, viral clip... đẳng cấp và chất lượng cao, Unic hướng tới trở thành đơn vị xây dựng và thực hiện các dự án truyền thông cộng đồng hàng đầu Việt Nam. \r\n\r\nNhằm đáp ứng nhu cầu phát triển trong giai đoạn mới, chúng tôi có nhu cầu tuyển dụng nhân sự sau đây:2a:T8ea,"])</script><script>self.__next_ concept, Tổ chức sự kiện, Quản trị sự kiện;\r\n- Xây dựng và Quản trị Dự án truyền thông cộng đồng (Usports, U-health,...)\r\nHơn 18 năm phát triển, Unic đã trở thành đối tác tin cậy của các cơ quan Nhà nước như Bộ Giáo dục và Đào tạo, Bộ Công Thương, Bộ Y tế, UBND các tỉnh thành phố, các bộ, ban ngành TW và địa phương; các cơ quan thông tấn báo chí như Đài Truyền hình Việt Nam (VTV), Đài Tiếng nói Việt Nam (VOV), Đài PTTH Hà Nội, Đài PTTH Hồ Chí Minh... Khách hàng của chúng tôi là những tập đoàn lớn trong và ngoài nước như: Vingroup, Petrolimex, EVNNPC, Viettel, Techcombank, BIDV, VietjetAir, Hanvico, Nam Dược, Karofi,...\r\nDự án tiêu biểu: Chương trình Thương hiệu quốc gia, Giờ Trái Đất, Giải bóng chuyền nữ quốc tế VTV Cup, Giải chạy học sinh S-Race (đạt kỷ lục thế giới), Đại hội thể thao học sinh Đông Nam Á, Hội khỏe Phù Đổng toàn quốc...\r\n3. Môi trường làm việc\r\nTại Unic Group, chúng tôi tin rằng con người là tài sản quý giá nhất. Unic cam kết xây dựng một môi trường làm việc:\r\n- Chuyên nghiệp \u0026 Năng động: Nơi mỗi cá nhân được khuyến khích phát huy tối đa năng lực chuyên môn, tư duy logic và sự sáng tạo không giới hạn.\r\n- Chính trực \u0026 Nhân văn: Đề cao sự ngay thẳng, liêm chính, tinh thần làm chủ, hài hoà lợi ích doanh nghiệp với lợi ích xã hội.\r\n- Tốc độ \u0026 Hiệu quả: Áp dụng tôn chỉ \"Quyết định nhanh - Triển khai nhanh - Thích ứng nhanh\" nhằm cung cấp cho khách hàng các sản phẩm - dịch vụ đẳng cấp và chất lượng.\r\n- Phát triển bền vững: Tạo điều kiện thu nhập xứng đáng và cơ hội phát triển công bằng, lộ trình thăng tiến rõ ràng cho mọi nhân viên.\r\nGia nhập Unic Group ngay hôm nay để cùng chúng tôi kiến tạo những giá trị khác biệt và chinh phục những đỉnh cao mới!"])</script><script>self.__next_f.push([1,"44:{\"companyId\":240007,\"jobImageURLs\":\"$45\",\"jobVideoURLs\":null,\"companyName\":\"Công ty TNHH Truyền thông Unicomm\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/12/11447550.png\",\"companySizeId\":
