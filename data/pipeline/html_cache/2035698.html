tatic/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T16bc,"])</script><script>self.__next_f.push([1,"\u003cp\u003eI. Tổng quát\u003c/p\u003e\u003cp\u003ePhó Tổng Giám đốc Điều hành có trách nhiệm hỗ trợ Tổng Giám đốc trong việc tổ chức, điều hành và giám sát toàn bộ hoạt động triển khai các dự án của công ty, đặc biệt các dự án tổng thầu trong lĩnh vực năng lượng và môi trường. Vị trí này chịu trách nhiệm quản lý hiệu quả việc thực hiện dự án về tiến độ, chất lượng, chi phí và an toàn; điều phối các nguồn lực và các đơn vị liên quan trong quá trình triển khai; đồng thời duy trì quan hệ làm việc với chủ đầu tư, đối tác, nhà thầu và các cơ quan liên quan nhằm đảm bảo các dự án được thực hiện hiệu quả và đúng cam kết của công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eII. NHIỆM VỤ \u0026 TRÁCH NHIỆM CHÍNH\u003c/p\u003e\u003cp\u003e1. Điều hành và quản lý hoạt động dự án\u003c/p\u003e\u003cp\u003e• Tổ chức, điều phối và giám sát toàn bộ hoạt động triển khai các dự án EPC/tổng thầu của công ty.\u003c/p\u003e\u003cp\u003e• Đảm bảo các dự án được thực hiện đúng tiến độ, chất lượng, chi phí và yêu cầu kỹ thuật đã cam kết với chủ đầu tư.\u003c/p\u003e\u003cp\u003e• Điều phối các đơn vị chức năng (thiết kế, mua sắm, thi công, quản lý dự án, vận hành thử…) nhằm đảm bảo sự phối hợp hiệu quả trong quá trình thực hiện dự án.\u003c/p\u003e\u003cp\u003e• Theo dõi, đánh giá và xử lý kịp thời các vấn đề phát sinh trong quá trình triển khai dự án.\u003c/p\u003e\u003cp\u003e2. Quản lý danh mục dự án và hiệu quả thực hiện\u003c/p\u003e\u003cp\u003e• Quản lý tổng thể danh mục các dự án đang triển khai của công ty.\u003c/p\u003e\u003cp\u003e• Kiểm soát các chỉ số hiệu quả chính của dự án như chi phí, tiến độ, năng suất, rủi ro và lợi nhuận.\u003c/p\u003e\u003cp\u003e• Thiết lập và duy trì hệ thống báo cáo quản trị dự án cho Ban Tổng Giám đốc và Hội đồng quản trị.\u003c/p\u003e\u003cp\u003e• Đề xuất các giải pháp nâng cao hiệu quả quản lý dự án và tối ưu hóa chi phí triển khai.\u003c/p\u003e\u003cp\u003e3. Quản lý kỹ thuật và công nghệ dự án năng lượng\u003c/p\u003e\u003cp\u003e• Chỉ đạo các hoạt động kỹ thuật liên quan đến thiết kế, lựa chọn công nghệ và giải pháp thi công cho các dự án năng lượng.\u003c/p\u003e\u003cp\u003e• Phối hợp với các đối tác công nghệ, nhà cung cấp thiết bị và tư vấn kỹ thuật trong và ngoài nước.\u003c/p\u003e\u003cp\u003e• Đảm bảo các giải pháp kỹ thuật đáp ứng tiêu chuẩn môi trường, an toàn và hiệu suất vận hành, đặc biệt đối với các dự án nhà máy điện rác (Waste-to-Energy).\u003c/p\u003e\u003cp\u003e• Tham gia đánh giá và thẩm định các phương án kỹ thuật quan trọng của dự án.\u003c/p\u003e\u003cp\u003e4. Quản lý nhà thầu, đối tác và chuỗi cung ứng\u003c/p\u003e\u003cp\u003e• Giám sát việc lựa chọn, đánh giá và quản lý các nhà thầu phụ, nhà cung cấp thiết bị và dịch vụ.\u003c/p\u003e\u003cp\u003e• Tham gia đàm phán các hợp đồng lớn liên quan đến EPC, thiết bị công nghệ và thi công xây dựng.\u003c/p\u003e\u003cp\u003e• Đảm bảo việc thực hiện hợp đồng của các đối tác phù hợp với yêu cầu kỹ thuật và tiến độ của dự án.\u003c/p\u003e\u003cp\u003e5. Quản lý rủi ro, an toàn và tuân thủ\u003c/p\u003e\u003cp\u003e• Chỉ đạo việc xây dựng và triển khai các hệ thống quản lý an toàn lao động, môi trường và chất lượng trong các dự án.\u003c/p\u003e\u003cp\u003e• Giám sát việc tuân thủ các quy định pháp luật, tiêu chuẩn kỹ thuật và yêu cầu của cơ quan quản lý.\u003c/p\u003e\u003cp\u003e• Đánh giá và quản lý các rủi ro trong quá trình triển khai dự án.\u003c/p\u003e\u003cp\u003e6. Hỗ trợ phát triển kinh doanh và đấu thầu\u003c/p\u003e\u003cp\u003e• Tham gia đánh giá tính khả thi kỹ thuật và phương án triển khai đối với các dự án mới.\u003c/p\u003e\u003cp\u003e• Hỗ trợ bộ phận phát triển kinh doanh trong quá trình chuẩn bị hồ sơ đấu thầu, đề xuất kỹ thuật và kế hoạch triển khai dự án.\u003c/p\u003e\u003cp\u003e• Tham gia làm việc với các chủ đầu tư, đối tác chiến lược và tổ chức tài chính khi cần thiết.\u003c/p\u003e\u003cp\u003e7. Quản lý và phát triển đội ngũ\u003c/p\u003e\u003cp\u003e• Xây dựng và phát triển đội ngũ quản lý dự án, kỹ thuật và vận hành.\u003c/p\u003e\u003cp\u003e• Thiết lập hệ thống quản lý hiệu quả làm việc đối với các bộ phận trực thuộc.\u003c/p\u003e\u003cp\u003e• Phát triển năng lực chuyên môn và quản trị cho đội ngũ nhân sự dự án.\u003c/p\u003e\u003cp\u003e8. Quan hệ đối ngoại và quản lý các bên liên quan\u003c/p\u003e\u003cp\u003e• Đại diện công ty làm việc với chủ đầu tư, đối tác công nghệ, nhà thầu chính/phụ và các bên liên quan trong quá trình triển khai dự án.\u003c/p\u003e\u003cp\u003e• Thiết lập và duy trì quan hệ hợp tác với các cơ quan quản lý nhà nước, chính quyền địa phương và các tổ chức liên quan đến hoạt động triển khai dự án năng lượng.\u003c/p\u003e\u003cp\u003e• Tham gia đàm phán, trao đổi và xử lý các vấn đề quan trọng với đối tác nhằm đảm bảo tiến độ và hiệu quả của dự án.\u003c/p\u003e\u003cp\u003e• Phối hợp với Ban Tổng Giám đốc trong việc xây dựng và duy trì hình ảnh, uy tín của công ty trong các dự án và trong ngành năng lượng.\u003c/p\u003e\u003cp\u003e• Hỗ trợ xử lý các vấn đề đối ngoại phát sinh trong quá trình triển khai dự án, đặc biệt liên quan đến cộng đồng, môi trường và chính quyền địa phương đối với các dự án nhà máy điện rác.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T54d,\u003cp\u003e1. Trình độ\u003c/p\u003e\u003cp\u003e   •   Tốt nghiệp đại học trở lên các ngành xây dựng, kỹ thuật năng lượng, điện, cơ khí hoặc các ngành kỹ thuật liên quan.\u003c/p\u003e\u003cp\u003e   •   Ưu tiên ứng viên có trình độ sau đại học hoặc các chứng chỉ chuyên môn liên quan đến quản lý dự án, quản lý xây dựng hoặc EPC.\u003c/p\u003e\u003cp\u003e2. Kinh nghiệm\u003c/p\u003e\u003cp\u003e   •   Có kinh nghiệm quản lý, điều hành trong lĩnh vực xây dựng, tổng thầu EPC hoặc phát triển dự án năng lượng.\u003c/p\u003e\u003cp\u003e   •   Đã tham gia quản lý hoặc điều hành các dự án xây dựng, công nghiệp hoặc năng lượng quy mô lớn.\u003c/p\u003e\u003cp\u003e   •   Có kinh nghiệm làm việc với chủ đầu tư, nhà thầu, đối tác công nghệ và các cơ quan quản lý liên quan.\u003c/p\u003e\u003cp\u003e3. Kỹ năng\u003c/p\u003e\u003cp\u003e   •   Kỹ năng lãnh đạo, tổ chức và điều phối các hoạt động triển khai dự án.\u003c/p\u003e\u003cp\u003e   •   Kỹ năng quản lý tiến độ, chi phí, chất lượng và rủi ro trong quá trình thực hiện dự án.\u003c/p\u003e\u003cp\u003e   •   Kỹ năng đàm phán, giao tiếp và quản lý quan hệ với các bên liên quan.\u003c/p\u003e\u003cp\u003e   •   Tư duy chiến lược, khả năng ra quyết định và giải quyết vấn đề hiệu quả trong môi trường dự án.\u003c/p\u003e27:T16bc,"])</script><script>self.__next_f.push([1,"\u003cp\u003eI. Tổng quát\u003c/p\u003e\u003cp\u003ePhó Tổng Giám đốc Điều hành có trách nhiệm hỗ trợ Tổng Giám đốc trong việc tổ chức, điều hành và giám sát toàn bộ hoạt động triển khai các dự án của công ty, đặc biệt các dự án tổng thầu trong lĩnh vực năng lượng và môi trường. Vị trí này chịu trách nhiệm quản lý hiệu quả việc thực hiện dự án về tiến độ, chất lượng, chi phí và an toàn; điều phối các nguồn lực và các đơn vị liên quan trong quá trình triển khai; đồng thời du
