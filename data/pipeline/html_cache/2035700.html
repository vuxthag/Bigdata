r\n\r\n2. Năng lượng – Waste-to-Energy (WTE)\r\nNằm trong chiến lược phát triển đồng bộ chuỗi giá trị môi trường:\r\nGMC hiện đang sở hữu 02 nhà máy đốt rác phát điện, với công nghệ đốt hiện đại, tiết kiệm năng lượng và giảm thiểu khí thải. Năng lượng thu hồi từ rác thải được chuyển hóa thành điện năng, cung cấp trở lại hệ thống điện quốc gia.\r\nCác nhà máy được thiết kế theo mô hình khép kín, giúp tối ưu hoá xử lý rác, đồng thời tạo nguồn năng lượng tái tạo bền vững.24:T9cf,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Mục tiêu vị trí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm tìm kiếm, đề xuất, nghiên cứu và triển khai các cơ hội đầu tư mới trong lĩnh vực năng lượng – sản xuất; đồng thời phối hợp với cơ quan quản lý nhà nước, đối tác và các phòng ban nội bộ để thúc đẩy quá trình phê duyệt và triển khai dự án hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Nhiệm vụ \u0026 Trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Tìm kiếm \u0026 Đề xuất Dự án\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTìm kiếm và đánh giá cơ hội đầu tư trong lĩnh vực năng lượng, xử lý chất thải, sản xuất và các ngành liên quan.\u003c/p\u003e\u003cp\u003e•\tThu thập, phân tích thông tin về thị trường, xu hướng công nghệ, cơ chế – chính sách hỗ trợ đầu tư.\u003c/p\u003e\u003cp\u003e•\tLập báo cáo nghiên cứu tiền khả thi (Pre-FS) và đề xuất dự án gửi Ban Lãnh đạo phê duyệt.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Làm việc với Cơ quan Nhà nước\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTham gia làm việc, xin ý kiến, xin chủ trương với các sở ban ngành, UBND tỉnh/thành phố liên quan đến thủ tục đầu tư, đất đai, môi trường, PCCC, pháp lý dự án.\u003c/p\u003e\u003cp\u003e•\tChuẩn bị hồ sơ, tài liệu theo yêu cầu và hỗ trợ quá trình thẩm định của cơ quan quản lý.\u003c/p\u003e\u003cp\u003e•\tTheo dõi tiến độ phê duyệt, giải quyết vướng mắc và đẩy nhanh quá trình hoàn tất thủ tục pháp lý dự án.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Làm việc với Đối tác \u0026 Nhà đầu tư\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLàm việc, trao đổi thông tin dự án với các đối tác tiềm năng: nhà đầu tư, tư vấn, nhà cung cấp công nghệ.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ đàm phán các thỏa thuận hợp tác ban đầu (MOU, hợp đồng nguyên tắc…).\u003c/p\u003e\u003cp\u003e•\tPhối hợp tổ chức khảo sát thực địa, hội thảo giới thiệu dự án, đánh giá năng lực đối tác.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eD. Triển khai Dự án \u0026 Phối hợp Nội bộ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các phòng ban (Kinh tế – Kế hoạch, Pháp chế, Kỹ thuật, Tài chính…) để chuẩn bị hồ sơ và triển khai các bước của dự án.\u003c/p\u003e\u003cp\u003e•\tTheo dõi tiến độ, lập báo cáo định kỳ và đề xuất giải pháp xử lý các rủi ro phát sinh.\u003c/p\u003e\u003cp\u003e•\tQuản lý hồ sơ, tài liệu và cập nhật tình trạng dự án trên hệ thống.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T684,\u003cp\u003e\u003cstrong\u003e3. Yêu cầu công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrình độ \u0026 Kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp đại học chuyên ngành: Kinh tế đầu tư, Quản trị dự án, Kỹ thuật (Năng lượng, Môi trường, Công nghiệp), hoặc ngành liên quan.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTối thiểu 5 kinh nghiệm\u003c/strong\u003e trong lĩnh vực phát triển dự án đầu tư, ưu tiên dự án năng lượng, môi trường, sản xuất.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm việc với cơ quan nhà nước về thủ tục đầu tư, pháp lý dự án.\u003c/p\u003e\u003cp\u003e•\tƯu tiên ứng viên đã tham gia các dự án: nhà máy xử lý chất thải, điện rác, điện mặt trời, điện gió, sản xuất công nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKỹ năng giao tiếp – đàm phán tốt.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKhả năng viết báo cáo, lập đề xuất dự án rõ ràng, có chiều sâu.\u003c/p\u003e\u003cp\u003e•\tPhân tích thị trường, đánh giá tài chính – kỹ thuật ở mức cơ bản.\u003c/p\u003e\u003cp\u003e•\tChủ động, chịu được áp lực công việc và di chuyển công tác.\u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMức lương cạnh tranh theo năng lực + thưởng dự án.\u003c/p\u003e\u003cp\u003e•\tCơ hội tiếp cận và tham gia các dự án quy mô lớn trong lĩnh vực năng lượng – môi trường.\u003c/p\u003e\u003cp\u003e•\tMôi trường làm việc chuyên nghiệp, cơ hội thăng tiến lên Trưởng nhóm/Chuyên gia Phát triển dự án.\u003c/p\u003e\u003cp\u003e•\tCác chế độ phúc lợi khác theo quy định của công ty.\u003c/p\u003e26:T754,Công ty Cổ phần Cẩm Thạch Xanh (GMC) được thành lập năm 2023, hoạt động trong lĩnh vực môi trường và năng lượng – hai ngành mũi nhọn đang đóng vai trò quan trọng trong chiến lược phát triển bền vững của Việt Nam.\r\n\r\nNgay từ những ngày đầu thành lập, GMC đã xác định sứ mệnh trở t"])</script><script>self.__next_f.push([1,"hành đơn vị tiên phong trong xử lý chất thải, tái chế và chuyển đổi năng lượng từ rác, hướng tới một hệ sinh thái kinh tế tuần hoàn xanh – sạch – bền vững.\r\n\r\nLĩnh vực hoạt động chính\r\n1. Xử lý môi trường\r\nGMC sở hữu và vận hành hệ thống công nghệ xử lý chất thải hiện đại, đáp ứng đầy đủ các tiêu chuẩn môi trường quốc gia. Công ty hiện đang quản lý:\r\n08 nhà máy xử lý chất thải hoạt động trên nhiều tỉnh thành, bao gồm: xử lý rác sinh hoạt, chất thải công nghiệp không nguy hại, chất thải nguy hại, nước rỉ rác, bùn thải…\r\n\r\nỨng dụng nhiều công nghệ tiên tiến: phân loại rác, xử lý sinh học, tái chế vật liệu, xử lý khí thải và nước thải theo tiêu chuẩn quốc tế.\r\n\r\n2. Năng lượng – Waste-to-Energy (WTE)\r\nNằm trong chi
