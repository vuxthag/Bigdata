\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T11de,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTỔNG QUAN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTrưởng phòng Dịch vụ Khách hàng (DVKH) Tập Đoàn (TĐ) chịu trách nhiệm chính về chuẩn mực và chất lượng dịch vụ khách hàng và trải nghiệm khách hàng tại tất cả các Bệnh viện (BV) thuộc Hệ thống Bệnh viện Mắt Sài Gòn (MSG), thông qua việc xây dựng chuẩn mực cam kết, quy trình – quy định – chính sách liên quan, triển khai - điều phối - quản lý giám sát chất lượng dịch vụ khách hàng (customer care) và hành trình trải nghiệm khách hàng (customer experience) nhằm mục tiêu cung cấp một cách chuẩn hóa, đồng bộ và tốt nhất các dịch vụ chăm sóc cho khách hàng trước, trong và sau khi khách hàng sử dụng dịch vụ tại MSG.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1/ Xây dựng chuẩn mực và quy trình\u003c/p\u003e\u003cp\u003e• Xây dựng/ rà soát chỉnh sửa, triển khai, đào tạo, giám sát thực hiện và cải tiến bộ chuẩn mực DVKH áp dụng tại tất cả các BV trong hệ thống.\u003c/p\u003e\u003cp\u003e• Xây dựng/ rà soát chỉnh sửa, triển khai, đào tạo, giám sát thực hiện và cải tiến các quy trình/quy định/ chính sách và các quy trình/ cơ cấu phối hợp liên quan DVKH \u0026 trải nghiệm khách hàng (TNKH) áp dụng tại BV và TĐ.\u003c/p\u003e\u003cp\u003e• Xây dựng quy trình kiểm soát nội bộ, báo cáo định kỳ, thống kê - tổng kết - đánh giá chất lượng dịch vụ liên quan DVKH và TNKH.\u003c/p\u003e\u003cp\u003e• Thống kê và báo cáo các chỉ số KPI của phòng DVKH tại BV và TĐ, từ đó nghiên cứu, đề xuất giải pháp cải tiến, và xây dựng kế hoạch triển khai nhằm nâng cao hiệu quả hoạt động và chất lượng DVKH và TNKH.\u003c/p\u003e\u003cp\u003e2/ Quản trị chất lượng dịch vụ khách hàng\u003c/p\u003e\u003cp\u003e• Phối hợp, giám sát phòng DVKH tại BV nhằm đảm bảo duy trì hoạt động DVKH liên tục, đúng quy trình và đúng chuẩn mực.\u003c/p\u003e\u003cp\u003e• Là đầu mối tại TĐ đối với các trao đổi nội bộ phòng ban TĐ nhằm đảm bảo tất cả các yêu cầu, phản ánh và khiếu nại của khách hàng tại BV được giải quyết một cách kịp thời, chuyên nghiệp, và hiệu quả.\u003c/p\u003e\u003cp\u003e• Nhận báo cáo từ BV và thống kê, báo cáo liên quan đến giải quyết phàn nàn/ khiếu nại theo quy định và yêu cầu của Ban lãnh đạo TĐ. Phối hợp phòng DVKH tại BV và đưa ra phương án thích hợp nhằm hạn chế/ ngăn chặn tình trạng lặp lại/ tái diễn vấn đề dẫn đến phàn nàn/ khiếu nại.\u003c/p\u003e\u003cp\u003e• Nghiên cứu, đề xuất giải pháp cải tiến, và xây dựng kế hoạch triển khai nhằm nâng cao hiệu quả hoạt động và chất lượng DVKH.\u003c/p\u003e\u003cp\u003e3/ Quản trị chất lượng trải nghiệm khách hàng\u003c/p\u003e\u003cp\u003e• Triển khai và giám sát thực hiện công tác thu thập ý kiến khảo sát/ đánh giá đo lường chỉ số hài lòng và các chỉ số trung thành của Khách hàng (NPS, CSAT,..).\u003c/p\u003e\u003cp\u003e• Thống kê, báo cáo, nghiên cứu, đề xuất giải pháp cải tiến, và xây dựng kế hoạch triển khai nhằm nâng cao các chỉ số trung thành của Khách hàng (NPS, CSAT,..).\u003c/p\u003e\u003cp\u003e• Xây dựng các chương trình trải nghiệm khách hàng nhằm đem lại trải nghiệm xuất sắc cho khách hàng sử dụng dịch vụ tại MSG.\u003c/p\u003e\u003cp\u003e• Kiểm soát chất lượng dịch vụ tại từng điểm chạm, và trên toàn bộ hành trình trải nghiệm khách hàng, bao gồm online và offline, từ nhân viên hỗ trợ đến đội ngũ chuyên môn.\u003c/p\u003e\u003cp\u003e4/ Nhiệm vụ quản lý\u003c/p\u003e\u003cp\u003e• Phối hợp và giám sát vận hành và chất lượng dịch vụ của đội ngũ DVKH tại tất cả các BV.\u003c/p\u003e\u003cp\u003e• Phối hợp với các phòng ban tại TĐ để xây dựng, triển khai các chương trình/ ứng dụng nâng cao sự hài lòng về chất lượng DVKH và TNKH tại các BV.\u003c/p\u003e\u003cp\u003e• Phối hợp trong công tác tuyển dụng, đào tạo \u0026 đánh giá nhân viên mới ở cấp trưởng nhóm/ trưởng bộ phận DVKH tại BV.\u003c/p\u003e\u003cp\u003e• Rà soát, đánh giá, đề xuất, chuẩn hóa mô tả công việc, cơ cấu tổ chức phòng DVKH tại BV và TĐ.\u003c/p\u003e\u003cp\u003e• Xây dựng và quản lý ngân sách hoạt động, chi phí của phòng DVKH.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T92d,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Trình độ: Tốt nghiệp Đại học chuyên ngành Quản trị bệnh viện/ Quản trị kinh doanh/ Quản trị nhà hàng khách sạn/ các chuyên ngành Kinh tế, hoặc các chuyên ngành khác có liên quan.\u003c/p\u003e\u003cp\u003e- Kinh nghiệm: Tối thiểu 5 năm kinh nghiệm làm việc, trong đó có tối thiểu 3 năm kinh nghiệm vị trí quản lý (Trưởng bộ phận, Trưởng phòng trở lên) trong lĩnh vực dịch vụ khách hàng/ chăm sóc khách hàng/ trải nghiệm khách hàng. Kinh nghiệm trong ngành y tế/ chăm sóc sức khỏe là một lợi thế được ưu tiên.\u003c/p\u003e\u003cp\u003e- Kiến thức:\u003c/p\u003e\u003cp\u003e• Kiến thức về dịch vụ khách hàng, chăm sóc khách hàng, và trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e• Kiến thức về các phương thức và các chỉ số đánh giá sự hài lòng của khách hàng/ sự trung thành của khách hàng.\u003c/p\u003e\u003cp\u003e• Kiến thức về xu hướng thị trường và ngành y tế/ chăm sóc sức khỏe, dịch vụ y tế, tâm lý khách hàng\u003c/p\u003e\u003cp\u003e• Sử dụng thành thạo các ứng dụng tin học văn phòng và phần mềm quản lý dữ liệu khách hàng.\u003c/p\u003e\u003cp\u003e• Giao tiếp tốt Tiếng Anh là một lợi thế được ưu tiên.\u003c/p\u003e\u003cp\u003e- Kỹ năng:\u003c/p\u003e\u003cp\u003e• Kỹ năng giao tiếp, trình bày, đàm phán/ thuyết phục, xây dựng mối quan hệ.\u003c/p\u003e\u003cp\u003e• Kỹ năng phân tích, xử lý tình huống và giải quyết mâu thuẫn/ xung đột. Tự tin, kiên nhẫn, lịch sự, khéo léo và phản ứng nhanh.\u003c/p\u003e\u003cp\u003e• Kỹ năng xây dựng và triển khai, giám sát thực hiện kế hoạch/ chiến lược/ dự án.\u003c/p\u003e\u003cp\u003e• Kỹ năng quản lý, tạo động lực và thúc đẩy, phát triển đội nhóm.\u003c/p\u003e\u003cp\u003e• Kỹ năng đào tạo\u003c/p\u003e\u003cp\u003e- Khả năng:\u003c/p\u003e\u003cp\u003e• Tinh thần chủ động, trách nhiệm, và cầu tiến.\u003c/p\u003e\u003cp\u003e• Tư duy logic, nhạy bén, linh hoạt, sáng tạo. Có khả năng khởi xướng các sáng kiến cải tiến.\u003c/p\u003e\u003cp\u003e• Tư duy dịch vụ khách hàng - lấy khách hàng (bệnh nhân) là trung tâm\u003c/p\u003e\u003cp\u003e• Khả năng làm việc tốt dưới áp lực cao.\u003c/p\u003e\u003cp\u003e• Khả năng linh hoạt và đáp ứng lịch công tác tại các địa phương có BV thuộc hệ thống khi có yêu cầu.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T11de,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTỔNG QUAN\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTrưởng phòng Dịch vụ Khách hàng (DVKH) Tập Đoàn (TĐ) chịu trách nhiệm chính về chuẩn mực và chất lượng dịch vụ khách hàng và trải nghiệm khách hàng tại tất cả các Bệnh viện (BV) thuộc Hệ thống Bệnh viện Mắt Sài Gòn (MSG), thông qua việc xây dựng chuẩn mực cam kết, quy trình – quy định – chính sách liên quan, triển khai - điều phối - quản lý giám sát chất lượng dịch vụ khách hàng (customer care) và hành trình trải nghiệm khách hàng (customer experience) nhằm mục tiêu cung cấp một cách chuẩn hóa, đồng bộ và tốt nhất các dịch vụ chăm sóc cho khách hàng trước, trong và sau khi khách hàng sử dụng dịch vụ tại MSG.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ\
