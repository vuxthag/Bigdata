"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1bba,"])</script><script>self.__next_f.push([1,"Với lịch sử 40 năm hình thành và phát triển, Công ty Cổ phần Sữa Việt Nam (Vinamilk) cam kết mang đến cho cộng đồng nguồn dinh dưỡng và chất lượng cao cấp hàng đầu bằng chính sự trân trọng, tình yêu và trách nhiệm cao của mình với cuộc sống con người và xã hội.\r\n\r\n“Trở thành biểu tượng niềm tin hàng đầu Việt Nam về sản phẩm dinh dưỡng và sức khỏe phục vụ cuộc sống con người“, Vinamilk không ngừng phấn đấu, phát triển, đổi mới và sáng tạo nhằm mang đến cho cộng đồng những giải pháp dinh dưỡng chất lượng quốc tế, đáp ứng nhu cầu cho mọi đối tượng tiêu dùng với các sản phẩm thơm ngon, bổ dưỡng, tốt cho sức khỏe gắn liền với thương hiệu Vinamilk như: Sữa nước Vinamilk, Sữa chua Vinamilk, Sữa bột Vinamilk, Sữa đặc Ông Thọ và Ngôi Sao Phương Nam, Sữa bột Dielac, Bột ăn dặm RiDIELAC, Sữa đậu nành, Nước ép trái cây Vfresh, Kem và Phô mai...\r\n\r\nTính đến giữa tháng 08/2016, Vinamilk đạt mức vốn hóa kỷ lục là 9.2 tỷ USD (vốn hóa thị trường lớn nhất tại Việt Nam) với doanh thu là 1.8 tỷ USD và được xếp thứ 24 trong danh sách FAB 50 năm 2016. Với sự kiện này, Forbes Asia đã nói “Lần này chính Việt Nam đã tạo ra tin tức nóng hổi nhất. Chưa bao giờ có công ty Việt Nam nào được bình chọn vào FAB 50 nhưng năm nay, chính công ty Vinamilk đã làm nên sự thay đổi”.\r\n\r\nBên cạnh đó, theo một báo cáo của Euro monitor về các công ty sữa trên toàn thế giới thì Vinamilk đang đứng thứ 49 trên toàn cầu về doanh thu các sản phẩm sữa trong năm 2015 (ước tính của KPMG theo số liệu của Euro Monitor). Doanh thu này hiện cao hơn 18% so với mức doanh thu trung bình của các công ty sữa ở Châu Á. Đặc biệt, Vinamilk còn được đánh giá là công ty đứng đầu về tính thanh khoản ở các khu vực. Đây chính là minh chứng cho sự kinh doanh có hiệu quả và nền tảng tài chính vững mạnh của Vinamilk trong suốt 40 năm qua.\r\n\r\nTrong thời gian tới Vinamilk sẽ vẫn chú trọng giữ vững thị trường nội địa, song song với việc tìm kiếm các cơ hội mở rộng ở nước ngoài. Hiện nay ngoài 10 trang trại và 13 nhà máy trong nước, Vinamilk còn có 3 nhà máy tại Mỹ, New Zeland, Campuchia, 1 công ty con tại Ba Lan và đang xúc tiến đẩy mạnh xuất khẩu ở các thị trường mới như Thái Lan, Myanmar và Châu Phi.\r\n\r\nNgoài kết quả kinh doanh ấn tượng, Vinamilk luôn quan tâm đến các hoạt động xã hội vì cộng đồng và sự phát triển của trẻ em Việt Nam, thông qua các chương trình như: Quỹ sữa \"Vươn Cao Việt Nam” với mong muốn “mọi trẻ em đều có quyền được uống sữa mỗi ngày”; Quỹ “Một triệu cây xanh cho Việt Nam” vì một Việt Nam xanh tươi, cùng nhiều hoạt động hỗ trợ cộng đồng khác.\r\n\r\n \r\nVì sao làm việc với chúng tôi?\r\n\r\nHơn 40 năm hình thành và phát triển, trở thành một trong những thương hiệu hàng đầu Việt Nam và đang vươn tầm ra quốc tế, chúng tôi luôn hiểu rằng con người là yếu tố quyết định đối với sự thành công và phát triển của Công ty. Tại Vinamilk, sự nghiệp của các bạn sẽ được phát triển cùng với sự lớn mạnh không ngừng của chúng tôi.\r\n\r\nĐến với Vinamilk, bạn sẽ có được điều gì? \r\n\r\nMôi trường chuyên nghiệp, công việc đầy thách thức và cơ hội làm việc với những người giàu kinh nghiệm, là nơi tốt nhất để bạn chọn lựa cho con đường phát triển sự nghiệp của mình. Chúng tôi luôn cam kết tạo mọi điều kiện thuận lợi nhất giúp bạn đạt được mục tiêu nghề nghiệp. Vinamilk là nơi bạn có thể thỏa sức sáng tạo, đưa những kiến thức và kinh nghiệm vào thực tế nhằm góp phần xây dựng và phát triển Công ty. Ngoài ra, chúng tôi còn mang lại:\r\n\r\n•\tChương trình đào tạo giúp nhân viên phát triển và đạt được mục tiêu nghề nghiệp\r\n•\tChế độ lương bổng và đãi ngộ xứng đáng\r\n•\tNhiều cơ hội công việc mới cùng với sự phát triển không ngừng của công ty\r\n•\tNền văn hóa tạo cảm hứng làm việc và sáng tạo\r\n\r\n \r\nGiải thưởng:\r\n\r\nVới những nổ lực và phát triển không ngừng, Vinamilk đã vươn cao - Trở thành điểm sáng kinh tế không chỉ Việt Nam mà còn vươn tầm thế giới. Vinamilk đã trở thành một trong những Doanh nghiệp hàng đầu của Việt Nam trên tất cả mọi phương diện, đóng góp lớn vào sự phát triển của đất nước và con người Việt Nam. \r\n\r\nVới những thành tựu ấn tượng đạt được trong suốt 40 năm qua, Vinamilk liên tiếp được các tổ chức danh giá trong và ngoài nước vinh danh với các giải thưởng tiêu biểu như:\r\n\r\n•\tTop 50 Doanh nghiệp sữa có doanh thu lớn nhất thế giới (Đứng thứ 49) - Theo báo cáo của Euro Monitor \u0026 KPMG (2016)\r\n•\tTop 10 trong 1.000 thương hiệu hàng đầu Châu Á (Đứng hàng thứ 4) - Tạp chí Campaign Asia-Pacific (dựa theo AC Nielsen) (2016)\r\n•\tVinamilk nằm trong danh sách 300 công ty năng động nhất châu Á (Asia 200) - Tạp chí Nikkei (2016)\r\n•\tTop 100 nơi làm việc tốt nhất Việt Nam năm 2014 \u0026 2015 (Đứng hạng thứ 2) - Công ty Nghiên cứu thị trường Nielsen và mạng Anphabe.com(2015) - (2016)\r\n•\tNơi làm việc được người lao động mong muốn làm việc nhất (Đứng thứ 2) - Báo điện tử VTV.vn (2016)\r\n•\tĐứng thứ nhất trong top 40 Doanh nghiệp thương hiệu giá trị nhất - Forbes Việt Nam (2016)\r\n•\tTop Doanh nghiệp được người lao động mong muốn làm việc nhất tại Việt Nam (Đứng thứ 2 trong Top 20 công ty) - JobStreet.com (2016)\r\n•\tTop 50 Doanh nghiệp kinh doanh hiệu quả nhất Việt Nam - Báo Nhịp cầu đầu tư (2016)\r\n•\tThương hiệu mạnh VN 2015 - Thời báo kinh tế VN(2016)\r\n•\tTop 100 Asean - Top 300 Asia - Nikkei Asian Review (2015)\r\n•\tGiải thưởng Công nghiệp Thực phẩm toàn cầu IUFoST 2014 cho sản phẩm sữa nước ADM của Vinamilk (the IUFoST Global Food Industry Awards 2014) - Liên đoàn các Hiệp hội KH \u0026 Công Nghệ TPhẩm quốc tế (IUFoST). Hội nghị diễn ra tại Montreal, Canada (2014)\r\n•\tTrang trại Vinamilk tại Nghệ An và Tuyên Quang đạt chuẩn Global G.A.P - Global G.A.P(2014)"])</script><script>self.__next_f.push([1,"24:T6b0,\u003cp\u003eTóm tắt công việc: \u003c/p\u003e\u003cp\u003e-\tQuản lý các hoạt động Marketing/Brand Management của nhãn hiệu, xây dựng sự ưa thích của người tiêu dùng nhằm đạt mục tiêu kinh doanh chung của các ngành hàng phụ trách. \u003c/p\u003e\u003cp\u003e-\tHoạch định, xây dựng, phát triển và tổ chức việc triển khai thực hiện các kế hoạch marketing của nhãn hiệu theo mục tiêu kinh doanh chung của công ty dựa trên những phân tích, đánh giá liên tục về nhãn hiệu, thị trường và tâm lý người tiêu dùng.\u003c/p\u003e\u003cp\u003e-\tHỗ trợ Giám Đốc Marketing Ngành hàng trong việc xác định và triển khai chiến lược marketing ngắn hạn và dài hạn của nhãn hiệu phù hợp với chiến lược kinh doanh chung chủa Công ty.  \u003c/p\u003e\u003cp\u003e-\tĐề xuất, lập kế hoạch, triển khai thực hiện và đánh giá các chương trình \u0026 hoạt động Marketing và đánh giá kết quả của các chương trình Marketing trong năm của từng nhãn hiệu phụ trách, đảm bảo theo chiến lược phát triển chung đã đặt ra và đạt đươc các mục tiêu của ngành hàng. \u003c/p\u003e\u003cp\u003e-\tHỗ trợ Giám Đốc Marketing Ngành hàng trong việc xây dựng và phát triển những sản phẩm mới, bao bì mới\u003c/p\u003e\u003cp\u003e-\tTheo dõi sát sao tình hình bán hàng và dự báo sản lượng của ngành hàng\u003c/p\u003e\u003cp\u003e-\tQuản lý và sử dụng ngân sách marketing đúng và hiệu quả trong phạm vi ngân sách được duyệt\u003c/p\u003e\u003cp\u003e-\tQuản lý các công ty dịch vụ quảng cáo, nhà cung cấp đảm bảo các kết quả theo đúng cam kết và hiệu quả chi phí\u003c/p\u003e25:T6ff,\u003cp\u003e\u003cstrong\u003eHỌC VẤN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Tốt nghiệp đại học/ sau đại học, ưu tiên chuyên ngành Kinh tế, Quản Trị Kinh Doanh, Marketing…\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKINH NGHIỆM:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Tối thiểu \u003cstrong\u003e03 - 05 năm kinh nghiệm làm việc ở vị trí tương đươn"])</script><script>self.__next_f.push([1,"g Brand Manager \u003c/strong\u003etrong lĩnh vực Marketing ở các công ty đa quốc gia/công ty có qui mô lớn về \u003cstrong\u003engành hàng sữa, thực phẩm/ ngành hàng tiêu dùng nhanh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Có kinh nghiệm quản lý nhóm làm việc thực hiện các dự án phát triển nhãn hiệu \u0026 các hoạt động Marketing: chương trình truyền thông (ATL) và chương trình kích hoạt thương hiệu (BTL), (phát triển sản phẩm mới, nghiên cứu thị trường, quảng cáo, khuyến mãi…)\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKIẾN THỨC CHUYÊN MÔN \u0026 CÁC KỸ NĂNG:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Hiểu biết \u0026 thực hiện thành thạo các kiến thức \u0026 kỹ năng tiếp thị nhãn hiệu/Marketing\u003c/p\u003e\u003cp\u003e•    Kỹ năng phân tích và đưa ra quyết định\u003c/p\u003e\u003cp\u003e•    Khả năng hoạch định, thực hiện, giao công việc \u0026 kiểm soát tốt\u003c/p\u003e\u003cp\u003e•    Khả năng lãnh đạo, phát triển và đào tạo nhân viên cấp dưới\u003c/p\u003e\u003cp\u003e•    Kỹ năng thuyết trình, đàm phán và giao tiếp tốt trong các quan hệ bên trong và bên ngoài công ty để đạt hiệu quả công việc cao nhất\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCÁC YÊU CẦU KHÁC:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Giao tiếp tốt tiếng Anh.\u003c/p\u003e\u003cp\u003e•    Thành thạo vi tính văn phòng.\u003c/p\u003e\u003cp\u003e•    Tinh thần nhiệt tình, chủ động trong công việc\u003c/p\u003e\u003cp\u003e•    Có khả năng chịu được áp lực cao\u003c/p\u003e26:Td9f,"])</script><script>self.__next_f.push([1,"VINAMILK – NƠI NHỮNG GIẤC MƠ LỚN ĐƯỢC NUÔI DƯỠNG\r\n \r\nNăm 1976, Vinamilk bắt đầu cuộc hành trình với rất nhiều khó khăn, nhưng đích đến vô cùng xứng đáng: để dinh dưỡng là quyền lợi của tất cả trẻ em Việt Nam. Không có chuyên gia tư vấn, không có nguồn vốn, điều chúng tôi có nhiều nhất lúc đó là quyết tâm thực hiện bằng được mục tiêu của mình. Chúng tôi vượt qua bao sự hoài nghi để chứng minh rằng chúng ta hoàn toàn có thể tạo ra những sản phẩm dinh dưỡng cao cho mọi người, mọi nhà. Hơn ai hết, chúng tôi tin cái khó mới là cái đáng để làm, và sẽ không ai thay mình làm.\r\n \r\nTừ nhà máy sữa bột trẻ em Dielac được khôi phục bằng năng lực kỹ thuật thuần Việt năm 1989, đến trang trại và nhà máy sữa tiên phong đạt chứng nhận trung hòa carbon tại Đông Nam Á.\r\n \r\nTừ công thức sữa bột Dielac đầu tiên được nghiên cứu để phù hợp với thể trạng trẻ em Việt Nam, đến danh mục hơn 350 sản phẩm cho mọi lứa tuổi, hiện diện tại 65+ quốc gia.\r\n \r\n⸻\r\nTẠI VINAMILK – BẠN KHÔNG CHỈ ĐI LÀM\r\nMà còn trở thành một phần của hành trình mang tầm vóc quốc gia.\r\nỞ đây, mỗi con người đều góp một dấu ấn để viết tiếp câu chuyện gần nửa thế kỷ:\r\n- Dám nghĩ lớn\r\n- Dám quyết tâm\r\n- Không ngừng tốt hơn mỗi ngày\r\nChúng tôi gọi đó là “Chất Vinamilk” – 10 ADN làm nên những con người luôn phát triển.\r\nBạn sẽ không đứng yên trong một vị trí.\r\nBạn sẽ:\r\n- Học từ những người giỏi nhất\r\n- Được trao quyền để sáng tạo\r\n- Được tin tưởng để dẫn dắt\r\n- Và trưởng thành cùng những dự án có thật – tác động thật\r\n \r\nMỘT NƠI LÀM VIỆC – NHIỀU PHIÊN BẢN CỦA BẠN\r\nCó thể hôm nay bạn:\r\n- Nhiệt huyết\r\n- Điềm tĩnh\r\n- Quyết liệt\r\n- Âm thầm bứt phá\r\nNhưng khi bước vào Vinamilk, bạn sẽ nhận ra: phiên bản bạn từng nghĩ là giới hạn – chỉ là điểm khởi đầu.\r\nVì mỗi ngày ở đây đều là một “đề bài mới” để bạn khám phá những khả năng mà chính bạn cũng chưa từng gọi tên.\r\n \r\nCHÚNG TÔI CHĂM CHÚT CHO BẠN\r\n- Lộ trình phát triển rõ ràng\r\n- Chính sách đãi ngộ cạnh tranh\r\n- Chương trình đào tạo toàn diện\r\n- Văn hóa nhân văn – gắn kết – truyền cảm hứng\r\n- Cơ hội thăng tiến cùng tốc độ tăng trưởng của một thương hiệu dẫn đầu\r\n⸻\r\nCÙNG NHAU MANG NIỀM TỰ HÀO VINAMILK\r\nKhông chỉ là:\r\n- Thương hiệu quốc gia\r\n- Top 50 công ty sữa lớn nhất thế giới\r\n- Top 1 thương hiệu sữa tiềm năng nhất thế giới\r\nMà còn là:\r\n- Top nơi làm việc mà người lao động Việt Nam khao khát được thuộc về.\r\n⸻\r\nVÀ CHÚNG TÔI ĐANG TÌM BẠN\r\nNếu bạn muốn:\r\n- Không chỉ có một công việc\r\nMà có một hành trình\r\n- Không chỉ phát triển sự nghiệp\r\nMà cùng phụng sự con người\r\n- Không chỉ tốt hơn mỗi ngày\r\nMà tạo ra giá trị cho hàng triệu gia đình Việt Nam và thế giới\r\nVinamilk là nơi dành cho bạn.\r\n⸻\r\nCÙNG NHAU - LÀM NÊN LỊCH SỬ"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:T1bba,"])</script><script>self.__next_f.push([1,"Với lịch sử 40 năm hình thành và phát triển, Công ty Cổ phần Sữa Việt Nam (Vinamilk) cam kết mang đến cho cộng đồng nguồn dinh dưỡng và chất lượng cao cấp hàng đầu bằng chính sự trân trọng, tình yêu và trách nhiệm cao của mình với cuộc sống con người và xã hội.\r\n\r\n“Trở thành biểu tượng niềm tin hàng đầu Việt Nam về sản phẩm dinh dưỡng và sức khỏe phục vụ cuộc sống con người“, Vinamilk không ngừng phấn đấu, phát triển, đổi mới và sáng tạo nhằm mang đến cho cộng đồng những giải pháp dinh dưỡng chất lượng quốc tế, đáp ứng nhu cầu cho mọi đối tượng tiêu dùng với các sản phẩm thơm ngon, bổ dưỡng, tốt cho sức khỏe gắn liền với thương hiệu Vinamilk như: Sữa nước Vinamilk, Sữa chua Vinamilk, Sữa bột Vinamilk, Sữa đặc Ông Thọ và Ngôi Sao Phương Nam, Sữa bột Dielac, Bột ăn dặm RiDIELAC, Sữa đậu nành, Nước ép trái cây Vfresh, Kem và Phô mai...\r\n\r\nTính đến giữa tháng 08/2016, Vinamilk đạt mức vốn hóa kỷ lục là 9.2 tỷ USD (vốn hóa thị trường lớn nhất tại Việt Nam) với doanh thu là 1.8 tỷ USD và được xếp thứ 24 trong danh sách FAB 50 năm 2016. Với sự kiện này, Forbes Asia đã nói “Lần này chính Việt Nam đã tạo ra tin tức nóng hổi nhất. Chưa bao giờ có công ty Việt Nam nào được bình chọn vào FAB 50 nhưng năm nay, chính công ty Vinamilk đã làm nên sự thay đổi”.\r\n\r\nBên cạnh đó, theo một báo cáo của Euro monitor về các công ty sữa trên toàn thế giới thì Vinamilk đang đứng thứ 49 trên toàn cầu về doanh thu các sản phẩm sữa trong năm 2015 (ước tính của KPMG theo số liệu của Euro Monitor). Doanh thu này hiện cao hơn 18% so với mức doanh thu trung bình của các công ty sữa ở Châu Á. Đặc biệt, Vinamilk còn được đánh giá là công ty đứng đầu về tính thanh khoản ở các khu vực. Đây chính là minh chứng cho sự kinh doanh có hiệu quả và nền tảng tài chính vững mạnh của Vinamilk trong suốt 40 năm qua.\r\n\r\nTrong thời gian tới Vinamilk sẽ vẫn chú trọng giữ vững thị trường nội địa, song song với việc tìm kiếm các cơ hội mở rộng ở nước ngoài. Hiện nay ngoài 10 trang trại và 13 nhà máy trong nước, Vinamilk còn có 3 nhà máy tại Mỹ, New Zeland, Campuchia, 1 công ty con tại Ba Lan và đang xúc tiến đẩy mạnh xuất khẩu ở các thị trường mới như Thái Lan, Myanmar và Châu Phi.\r\n\r\nNgoài kết quả kinh doanh ấn tượng, Vinamilk luôn quan tâm đến các hoạt động xã hội vì cộng đồng và sự phát triển của trẻ em Việt Nam, thông qua các chương trình như: Quỹ sữa \"Vươn Cao Việt Nam” với mong muốn “mọi trẻ em đều có quyền được uống sữa mỗi ngày”; Quỹ “Một triệu cây xanh cho Việt Nam” vì một Việt Nam xanh tươi, cùng nhiều hoạt động hỗ trợ cộng đồng khác.\r\n\r\n \r\nVì sao làm việc với chúng tôi?\r\n\r\nHơn 40 năm hình thành và phát triển, trở thành một trong những thương hiệu hàng đầu Việt Nam và đang vươn tầm ra quốc tế, chúng tôi luôn hiểu rằng con người là yếu tố quyết định đối với sự thành công và phát triển của Công ty. Tại Vinamilk, sự nghiệp của các bạn sẽ được phát triển cùng với sự lớn mạnh không ngừng của chúng tôi.\r\n\r\nĐến với Vinamilk, bạn sẽ có được điều gì? \r\n\r\nMôi trường chuyên nghiệp, công việc đầy thách thức và cơ hội làm việc với những người giàu kinh nghiệm, là nơi tốt nhất để bạn chọn lựa cho con đường phát triển sự nghiệp của mình. Chúng tôi luôn cam kết tạo mọi điều kiện thuận lợi nhất giúp bạn đạt được mục tiêu nghề nghiệp. Vinamilk là nơi bạn có thể thỏa sức sáng tạo, đưa những kiến thức và kinh nghiệm vào thực tế nhằm góp phần xây dựng và phát triển Công ty. Ngoài ra, chúng tôi còn mang lại:\r\n\r\n•\tChương trình đào tạo giúp nhân viên phát triển và đạt được mục tiêu nghề nghiệp\r\n•\tChế độ lương bổng và đãi ngộ xứng đáng\r\n•\tNhiều cơ hội công việc mới cùng với sự phát triển không ngừng của công ty\r\n•\tNền văn hóa tạo cảm hứng làm việc và sáng tạo\r\n\r\n \r\nGiải thưởng:\r\n\r\nVới những nổ lực và phát triển không ngừng, Vinamilk đã vươn cao - Trở thành điểm sáng kinh tế không chỉ Việt Nam mà còn vươn tầm thế giới. Vinamilk đã trở thành một trong những Doanh nghiệp hàng đầu của Việt Nam trên tất cả mọi phương diện, đóng góp lớn vào sự phát triển của đất nước và con người Việt Nam. \r\n\r\nVới những thành tựu ấn tượng đạt được trong suốt 40 năm qua, Vinamilk liên tiếp được các tổ chức danh giá trong và ngoài nước vinh danh với các giải thưởng tiêu biểu như:\r\n\r\n•\tTop 50 Doanh nghiệp sữa có doanh thu lớn nhất thế giới (Đứng thứ 49) - Theo báo cáo của Euro Monitor \u0026 KPMG (2016)\r\n•\tTop 10 trong 1.000 thương hiệu hàng đầu Châu Á (Đứng hàng thứ 4) - Tạp chí Campaign Asia-Pacific (dựa theo AC Nielsen) (2016)\r\n•\tVinamilk nằm trong danh sách 300 công ty năng động nhất châu Á (Asia 200) - Tạp chí Nikkei (2016)\r\n•\tTop 100 nơi làm việc tốt nhất Việt Nam năm 2014 \u0026 2015 (Đứng hạng thứ 2) - Công ty Nghiên cứu thị trường Nielsen và mạng Anphabe.com(2015) - (2016)\r\n•\tNơi làm việc được người lao động mong muốn làm việc nhất (Đứng thứ 2) - Báo điện tử VTV.vn (2016)\r\n•\tĐứng thứ nhất trong top 40 Doanh nghiệp thương hiệu giá trị nhất - Forbes Việt Nam (2016)\r\n•\tTop Doanh nghiệp được người lao động mong muốn làm việc nhất tại Việt Nam (Đứng thứ 2 trong Top 20 công ty) - JobStreet.com (2016)\r\n•\tTop 50 Doanh nghiệp kinh doanh hiệu quả nhất Việt Nam - Báo Nhịp cầu đầu tư (2016)\r\n•\tThương hiệu mạnh VN 2015 - Thời báo kinh tế VN(2016)\r\n•\tTop 100 Asean - Top 300 Asia - Nikkei Asian Review (2015)\r\n•\tGiải thưởng Công nghiệp Thực phẩm toàn cầu IUFoST 2014 cho sản phẩm sữa nước ADM của Vinamilk (the IUFoST Global Food Industry Awards 2014) - Liên đoàn các Hiệp hội KH \u0026 Công Nghệ TPhẩm quốc tế (IUFoST). Hội nghị diễn ra tại Montreal, Canada (2014)\r\n•\tTrang trại Vinamilk tại Nghệ An và Tuyên Quang đạt chuẩn Global G.A.P - Global G.A.P(2014)"])</script><script>self.__next_f.push([1,"2a:T6b0,\u003cp\u003eTóm tắt công việc: \u003c/p\u003e\u003cp\u003e-\tQuản lý các hoạt động Marketing/Brand Management của nhãn hiệu, xây dựng sự ưa thích của người tiêu dùng nhằm đạt mục tiêu kinh doanh chung của các ngành hàng phụ trách. \u003c/p\u003e\u003cp\u003e-\tHoạch định, xây dựng, phát triển và tổ chức việc triển khai thực hiện các kế hoạch marketing của nhãn hiệu theo mục tiêu kinh doanh chung của công ty dựa trên những phân tích, đánh giá liên tục về nhãn hiệu, thị trường và tâm lý người tiêu dùng.\u003c/p\u003e\u003cp\u003e-\tHỗ trợ Giám Đốc Marketing Ngành hàng trong việc xác định và triển khai chiến lược marketing ngắn hạn và dài hạn của nhãn hiệu phù hợp với chiến lược kinh doanh chung chủa Công ty.  \u003c/p\u003e\u003cp\u003e-\tĐề xuất, lập kế hoạch, triển khai thực hiện và đánh giá các chương trình \u0026 hoạt động Marketing và đánh giá kết quả của các chương trình Marketing trong năm của từng nhãn hiệu phụ trách, đảm bảo theo chiến lược phát triển chung đã đặt ra và đạt đươc các mục tiêu của ngành hàng. \u003c/p\u003e\u003cp\u003e-\tHỗ trợ Giám Đốc Marketing Ngành hàng trong việc xây dựng và phát triển những sản phẩm mới, bao bì mới\u003c/p\u003e\u003cp\u003e-\tTheo dõi sát sao tình hình bán hàng và dự báo sản lượng của ngành hàng\u003c/p\u003e\u003cp\u003e-\tQuản lý và sử dụng ngân sách marketing đúng và hiệu quả trong phạm vi ngân sách được duyệt\u003c/p\u003e\u003cp\u003e-\tQuản lý các công ty dịch vụ quảng cáo, nhà cung cấp đảm bảo các kết quả theo đúng cam kết và hiệu quả chi phí\u003c/p\u003e2b:T6ff,\u003cp\u003e\u003cstrong\u003eHỌC VẤN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Tốt nghiệp đại học/ sau đại học, ưu tiên chuyên ngành Kinh tế, Quản Trị Kinh Doanh, Marketing…\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKINH NGHIỆM:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Tối thiểu \u003cstrong\u003e03 - 05 năm kinh nghiệm làm việc ở vị trí tương đươn"])</script><script>self.__next_f.push([1,"g Brand Manager \u003c/strong\u003etrong lĩnh vực Marketing ở các công ty đa quốc gia/công ty có qui mô lớn về \u003cstrong\u003engành hàng sữa, thực phẩm/ ngành hàng tiêu dùng nhanh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Có kinh nghiệm quản lý nhóm làm việc thực hiện các dự án phát triển nhãn hiệu \u0026 các hoạt động Marketing: chương trình truyền thông (ATL) và chương trình kích hoạt thương hiệu (BTL), (phát triển sản phẩm mới, nghiên cứu thị trường, quảng cáo, khuyến mãi…)\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKIẾN THỨC CHUYÊN MÔN \u0026 CÁC KỸ NĂNG:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•    Hiểu biết \u0026 thực hiện thành thạo các kiến thức \u0026 kỹ năng tiếp thị nhãn hiệu/Marketing\u003c/p\u003e\u003cp\u003e•    Kỹ năng phân tích và đưa ra quyết định\u003c/p\u003e\u003cp\u003e•    Khả năng hoạch định, thực hiện, giao công việc \u0026 kiểm soát tốt\u003c/p\u003e\u003cp\u00  trong một vị trí.\r\nBạn sẽ:\r\n- Học từ những người giỏi nhất\r\n- Được trao quyền để sáng tạo\r\n- Được tin tưởng để dẫn dắt\r\n- Và trưởng thành cùng những dự án có thật – tác động thật\r\n \r\nMỘT NƠI LÀM VIỆC – NHIỀU PHIÊN BẢN CỦA BẠN\r\nCó thể hôm nay bạn:\r\n- Nhiệt huyết\r\n- Điềm tĩnh\r\n- Quyết liệt\r\n- Âm thầm bứt phá\r\nNhưng khi bước vào Vinamilk, bạn sẽ nhận ra: phiên bản bạn từng nghĩ là giới hạn – chỉ là điểm khởi đầu.\r\nVì mỗi ngày ở đây đều là một “đề bài mới” để bạn khám phá những khả năng mà chính bạn cũng chưa từng gọi tên.\r\n \r\nCHÚNG TÔI CHĂM CHÚT CHO BẠN\r\n- Lộ trình phát triển rõ ràng\r\n- Chính sách đãi ngộ cạnh tranh\r\n- Chương trình đào tạo toàn diện\r\n- Văn hóa nhân văn – gắn kết – truyền cảm hứng\r\n- Cơ hội thăng tiến cùng tốc độ tăng trưởng của một thương hiệu dẫn đầu\r\n⸻\r\nCÙNG NHAU MANG NIỀM TỰ HÀO VINAMILK\r\nKhông chỉ là:\r\n- Thương hiệu quốc gia\r\n- Top 50 công ty sữa lớn nhất thế giới\r\n- Top 1 thương hiệu sữa tiềm năng nhất thế giới\r\nMà còn là:\r\n- Top nơi làm việc mà người lao động Việt Nam khao khát được thuộc về.\r\n⸻\r\nVÀ CHÚNG TÔI ĐANG TÌM BẠN\r\nNếu bạn muốn:\r\n- Không chỉ có một công việc\r\nMà có một hành trình\r\n- Không chỉ phát triển sự nghiệp\r\nMà cùng phụng sự con người\r\n- Không chỉ tốt hơn mỗi ngày\r\nMà tạo ra giá trị cho hàng triệu gia đình Việt Nam và thế giới\r\nVinamilk là nơi dành cho bạn.\r\n⸻\r\nCÙNG NHAU - LÀM NÊN LỊCH SỬ"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"41:{\"companyId\":2811,\"jobImageURLs\":\"$42\",\"jobVideoURLs\":\"$43\",\"companyName\":\"Công Ty Cổ Phần Sữa Việt Nam (Vinamilk)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/b0/11208075.png\",\"companySizeId\":\"\",\"companyProfile\":\"$44\",\"contactName\":\"Ban Tuyển Dụng\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Số 10, Tân Trào, P. Tân Mỹ, Tp. HCM\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpg
