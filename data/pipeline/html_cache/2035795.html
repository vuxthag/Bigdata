uyện đội ngũ kinh doanh về các nội dung này; \u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm lên kế hoạch, tổ chức và thực hiện các sự kiện nội bộ và bên ngoài; - Phối hợp với team thiết kế trong việc thiết kế và duy trì tiêu chuẩn hình ảnh nhận diện thương hiệu;\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản lý sự kiện \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm đưa ra ý tưởng và tổ chức cho các sự kiện truyền thông nội bộ và bên ngoài; \u003c/p\u003e\u003cp\u003e- Phát triển và quản lý các sự kiện, bao gồm các đề xuất, kế hoạch thực hiện, ngân sách và thời gian biểu… \u003c/p\u003e\u003cp\u003e- Nắm bắt các xu hướng mới nhất trong các sự kiện của ngành truyền thông quảng cáo; - Quản lý các đối tác tổ chức sự kiện thuê ngoài.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Đánh giá hiệu suất\u003c/strong\u003e marketing của các bộ phận marketing hỗ trợ trong việc tạo ra những chương trình truyền thông trên các trang mạng xã hội, cho thương hiệu Công ty được lan truyền rộng rãi, tăng nhận thức về thương hiệu trên thị trường, thu hút thêm nhiều người tiêu dùng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Xây dựng và đổi mới các chiến dịch\u003c/strong\u003e giúp tăng số lượng khách hàng chất lượng cao với mục tiêu biến họ thành khách hàng trung thành trong tương lai.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Thực hiện các công việc theo sự phân công của Ban lãnh đạo.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T9cf,"])</script><script>self.__next_f.push([1,"\u003cp\u003eA. Tiêu chuẩn tuyển dụng:\u003c/p\u003e\u003cp\u003e-\tNam/nữ . Sức khoẻ tốt, tuổi từ 27 – 40;\u003c/p\u003e\u003cp\u003e-\tTốt nghiệp Đại học chuyên ngành Marketing, quản trị marketing hoặc các chuyên ngành có liên quan;\u003c/p\u003e\u003cp\u003e-\tCó tối thiểu từ 3 năm kinh nghiệm ở vị trí tương đương trở lên;\u003c/p\u003e\u003cp\u003e-\tKỹ năng lãnh
