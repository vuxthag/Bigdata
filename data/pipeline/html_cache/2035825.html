ript><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Thông tin chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tChức danh: IT Supervisor\u003c/p\u003e\u003cp\u003e•\tBộ phận: IT\u003c/p\u003e\u003cp\u003e•\tĐịa điểm làm việc: Nhà máy SGT3\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Mục tiêu công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eĐảm bảo hệ thống CNTT tại nhà máy vận hành ổn định, an toàn và hiệu quả; hỗ trợ người dùng, quản lý hạ tầng IT và phối hợp triển khai các dự án công nghệ theo định hướng của công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.1. Vận hành \u0026 Hỗ trợ IT\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý và đảm bảo hoạt động ổn định của hệ thống IT: mạng LAN/WAN, WiFi, server, PC, printer...\u003c/p\u003e\u003cp\u003e•\tHỗ trợ người dùng (end-user support) về phần cứng, phần mềm, hệ thống.\u003c/p\u003e\u003cp\u003e•\tXử lý sự cố IT hàng ngày, đảm bảo SLA.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.2. Quản lý hệ thống \u0026 hạ tầng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuản lý hệ thống:\u003c/p\u003e\u003cp\u003e• Active Directory, Domain Controller\u003c/p\u003e\u003cp\u003e• File Server, Print Server\u003c/p\u003e\u003cp\u003e• Microsoft 365 / Azure AD\u003c/p\u003e\u003cp\u003e• Hệ thống các license phần mềm khác ( AI, Corel, Gerber…)\u003c/p\u003e\u003cp\u003e• Theo dõi, backup và đảm bảo an toàn dữ liệu.\u003c/p\u003e\u003cp\u003e• Quản lý firewall, switch, access point (Cisco, Fortigate, Meraki…).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.3. Bảo mật \u0026 tuân thủ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTriển khai và giám sát chính sách bảo mật IT theo định hướng của tập đoàn.\u003c/p\u003e\u003cp\u003e•\tQuản lý antivir
