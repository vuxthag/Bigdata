S1).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản lý thực hiện quá trình triển khai đầu tư dự án:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phối hợp với các phòng ban chuyên môn thực hiện thủ tục mua bán dự án đầu tư theo quyết định đầu tư được phê duyệt. \u003c/p\u003e\u003cp\u003e- Nhận diện, đánh giá và xử lý các rủi ro phát sinh xuyên suốt quá trình triển khai đầu tư;\u003c/p\u003e\u003cp\u003e- Triển khai đàm phán, thương thảo và theo dõi việc ký kết hợp đồng nguyên tắc, hợp đồng mua bán, các thỏa thuận và tài liệu pháp lý khác có liên quan theo kết quả đàm phán;\u003c/p\u003e\u003cp\u003e- Thực hiện nghĩa vụ thanh toán, góp vốn theo đúng thỏa thuận, phương án và tương ứng với quyền lợi tiếp nhận dự án, doanh nghiệp (“Hoàn tất tiếp nhận”);\u003c/p\u003e\u003cp\u003e- Nhận bàn giao dự án, thực hiện các công việc sau khi hoàn tất nhận bàn giao bao gồm: mặt bằng, tài sản, hồ sơ pháp lý, con dấu, hồ sơ kế toán, hồ sơ nhân sự, hệ thống quản trị, hệ thống công nghệ thông tin… và các công việc nhận bàn giao khác từ đối tác.;\u003c/p\u003e\u003cp\u003e- Tổ chức kiểm tra, kiểm soát định kỳ đối với các dự án đầu tư hợp tác với các đối tác có tham gia góp vốn; Cập nhật danh mục các dự án đầu tư phụ trách, cập nhật tình hình đầu tư, kinh doanh và hiệu quả của dự án sau đầu tư.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Triển khai đánh giá dự án đầu tư và triển khai thực hiện kế hoạch thoái đầu tư:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đánh giá dự án đầu tư và đề xuất phương án thoái dự án đầu tư (không hiệu quả hoặc chưa khả thi để triển khai dự án);\u003c/p\u003e\u003cp\u003e- Triển khai thực hiện các thủ tục bán dự án dầu tư theo phương án phê duyệt;\u003c/p\u003e\u003cp\u003e- Lập báo cáo cập nhật tình trạng, danh mục đầu tư hiện hữu và đề xuất điều chỉnh danh mục đầu tư.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Xây ối thủ cạnh tranh,… để đề xuất và nắm bắt cơ hội đầu tư, kinh doanh;\u003c/p\u003e\u003cp\u003e- Triển khai thực hiện và quản lý đánh giá sơ bộ dự án tiềm năng (hiện trạng pháp lý, ý tưởng thiết kế, khả năng huy động vốn, thị trường, đối tượng khách hàng, đối thủ cạnh trạnh, định hướng phát triển sản phẩm và giá bán, các vấn đề liên quan đến hoạt động quản lý và vận hành);\u003c/p\u003e\u003cp\u003e- Triển khai thực hiện và rà soát báo cáo nghiên cứu khả thi để xác định dự án tiềm năng phù hợp với chủ trương và chiến lược phát triển của Tập đoàn.\u003c/p\u003e\u003cp\u003e- Trình phê duyệt chủ trương đầu tư (FS0).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thực hiện thẩm định và đề xuất cơ hội đầu tư:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phối hợp với các phòng ban chuyên môn thực hiện thẩm định đầu tư (Investment Paper - FS1):\u003c/p\u003e\u003cp\u003e+ Hồ sơ trọng yếu dự án tiềm năng;\u003c/p\u003e\u003cp\u003e+ Khảo sát thực địa, ý tưởng và thông số quy hoạch, tiến độ triển khai và phương án kinh doanh;\u003c/p\u003e\u003cp\u003e+ Hiện trạng pháp lý và xây dựng lộ trình thực hiện pháp lý dự án;\u003c/p\u003e\u003cp\u003e+ Rủi ro chứng từ tài chính, kế toán – thuế;\u003c/p\u003e\u003cp\u003e+ Kế hoạch chi tiết dòng tiền triển khai, phương án huy động, nguồn vốn và dòng tiền đầu tư;\u003c/p\u003e\u003cp\u003e+ Thông tin thị trường, đối tượng khách hàng, đối thủ cạnh trạnh, đề xuất sản phẩm và giá bán;\u003c/p\u003e\u003cp\u003e+ Các vấn đề liên quan đến hoạt động quản lý và vận hành;\u003c/p\u003e\u003cp\u003e+ Lập báo cáo thẩm định đầu tư.\u003c/p\u003e\u003cp\u003e- Lập, hợp nhất và hoàn thiện cấu trúc đầu tư; Đối chiếu các tài liệu đầu tư với cấu trúc đầu tư đã được phê duyệt.\u003c/p\u003e\u003cp\u003e- Trình phê duyệt quyết định đầu tư (FS1).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản lý thực hiện quá trình triển khai đầu tư dự án:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phối hợp với các phòng ban chuyên môn thực hiện thủ tục mua bán dự án đầu tư theo quyết định đầu tư được phê duyệt. \u003c/p\u003e\u003cp\u003e- Nhận diện, đánh giá và xử lý các rủi ro phát sinh xuyên suốt quá trình triển khai đầu tư;\u003c/p\u003e\u003cp\u003e- Triển khai đàm phán, thương thảo và theo dõi việc ký kết hợp đồng nguyên tắc, hợp đồng mua bán, các thỏa thuận và tài liệu pháp lý khác có liên quan theo kết quả đàm phán;\u003c/p\u003e\u003cp\u003e- Thực hiện nghĩa vụ thanh toán, góp vốn theo đúng thỏa thuận, phương án và tương ứng với quyền lợi tiếp nhận dự án, doanh nghiệp (“Hoàn tất tiếp nhận”);\u003c/p\u003e\u003cp\u003e- Nhận bàn giao dự án, thực hiện các công việc sau khi hoàn tất nhận bàn giao bao gồm: mặt bằng, tài sản, hồ sơ pháp lý, con dấu, hồ sơ kế toán, hồ sơ nhân sự, hệ thống quản trị, hệ thống công nghệ thông tin… và các công việc nhận bàn giao khác từ đối tác.;\u003c/p\u003e\u003cp\u003e- Tổ chức kiểm tra, kiểm soát định kỳ đối với các dự án đầu tư hợp tác với các đối tác có tham gia góp vốn; Cập nhật danh mục các dự án đầu tư phụ trách, cập nhật tình hình đầu tư, kinh doanh và hiệu quả của dự án sau đầu tư.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Triển khai đánh giá dự án đầu tư và triển khai thực hiện kế hoạch thoái đầu tư:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đánh giá dự án đầu tư và đề xuất phương án thoái dự án đầu tư (không hiệu quả hoặc chưa khả thi để triển khai dự án);\u003c/p\u003e\u003cp\u003e- Triển khai thực hiện các thủ tục bán dự án dầu tư theo phương án phê duyệt;\u003c/p\u003e\u003cp\u003e- Lập báo cáo cập nhật tình trạng, danh mục đầu tư hiện hữu và đề xuất điều chỉnh danh mục đầu tư.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Xây dựng và duy trì sự tuân thủ công tác quản trị, vận hành hệ thống\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Chủ trì xây dựng hệ thống quản trị nội bộ Phòng Ban: Quy
