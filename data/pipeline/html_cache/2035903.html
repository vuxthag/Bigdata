ks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tcf2,"])</script><script>self.__next_f.push([1,"Công ty Cổ phần Thương mại và Xuất nhập khẩu Vật tư Giao thông (Tratimex), được thành lập năm 2000, chuyên về nhập khẩu, sản xuất và cung cấp sản phẩm nhựa đường, phụ gia, vật tư giao thông.\r\nTrải qua gần hai thập kỷ hình thành và phát triển, hiện nay công ty đang là một trong 06 doanh nghiệp hàng đầu và dẫn dắt thị trường cung ứng các sản phẩm nhựa đường, phụ gia và vật tư giao thông tại Việt Nam. Công ty đã khẳng định được hình ảnh, uy tín, thương hiệu và thị phần khá vững chắc đối với các dòng sản phẩm nhựa đường tại hầu khắp các tỉnh thành trên cả nước (đứng hàng thứ hai và chiếm 15% thị phần cả nước), góp phần vào việc hoàn thành các công trình giao thông trọng điểm trong chiến lược phát triển giao thông đường bộ của Việt Nam. Công ty cũng là một trong 21 đầu mối được cấp phép nhập khẩu xăng dầu của cả nước.\r\nKể từ năm 2014, công ty bước chân vào hàng ngũ các doanh nghiệp có doanh số vượt ngưỡng 1.000 tỷ đồng và liên tục duy trì doanh thu và lợi nhuận cao trong nhiều năm qua. Trong hai năm liên tiếp 2014 và 2015, công ty đã vinh dự được bình chọn, công bố và đón nhận giấy chứng nhận nằm trong số 500 doanh nghiệp tư nhân lớn nhất Việt Nam trong bảng xếp hạng VNR-500.\r\nNgoài trụ sở chính tại Hải Phòng, công ty hiện có 03 văn phòng đại diện và chi nhánh tại Hà Nội, Đà Nẵng và TP. Hồ Chí Minh, 03 tổng kho tại Hải Phòng, Quảng Nam và Đồng Nai. Ngoài ra, công ty cũng có nhiều đơn vị thành viên như Công ty Cổ phần Cảng Đoạn Xá (DXP), Công ty Cổ phần VN Asphalt (VNA), Công ty TNHH Xăng dầu Tratimex…\r\nCông ty cũng mở rộng đầu tư và phát triển khá thành công trong nhiều lĩnh vực khác như kinh doanh hạ tầng cảng biển, kho bãi, dịch vụ xếp dỡ hàng hóa, dịch vụ hàng hải và vận tải thủy bộ, nhập khẩu và kinh doanh xăng dầu, đầu tư xây dựng và khai thác hạ tầng khu công nghiệp…\r\nCùng với tiêu chí luôn mang đến cho khách hàng các sản phẩm có chất lượng tốt nhất, công ty cũng tạo dựng một môi trường làm việc hiện đại, chuyên nghiệp, trẻ trung, nhiệt huyết, năng động, sáng tạo, luôn ghi nhận khả năng và sự đóng góp của mỗi cá nhân, đồng thời mở ra nhiều cơ hội phát triển nghề nghiệp cho cán bộ công nhân viên. Định hướng chiến lược trong giai đoạn tới là xây dựng công ty trở thành tập đoàn kinh tế tư nhân đa ngành nghề, có tiềm lực, uy tín và thương hiệu mạnh. \r\nNhằm đẩy mạnh hơn nữa các hoạt động sản xuất kinh doanh theo định hướng chiến lược giai đoạn 5 năm tới, Công ty Cổ phần Thương mại và Xuất nhập khẩu Vật tư Giao thông luôn chào đón các ứng viên tiềm năng, nhiệt huyết và muốn khẳng định năng lực bản thân."])</script><script>self.__next_f.push([1,"24:T5cd,\u003cp\u003e1. Trình độ học vấn: tốt nghiệp đại trở lên (chuyên ngành Luật học, Luật kinh tế…)\u003c/p\u003e\u003cp\u003e2. Kiến thức và kỹ năng:\u003c/p\u003e\u003cp\u003e- Có kiến thức sâu về hệ thống cơ sở dữ liệu pháp luật hiện hành và có khả năng vận dụng tốt vào các hoạt động sản xuất kinh doanh \u003c/p\u003e\u003cp\u003e- có hiểu biết về pháp luật thương mại, đất đai, dân sự\u003c/p\u003e\u003cp\u003e- Nắm vững trình tự và cách thức thực hiện các thủ tục hành chính công\u003c/p\u003e\u003cp\u003e- Am hiểu về các loại hợp đồng kinh tế \u003c/p\u003e\u003cp\u003e- Hiểu biết về luật lao động, các hình thức và thủ tục xử lý kỷ luật lao động\u003c/p\u003e\u003cp\u003e- Khả năng lập kế hoạch, tổ chức, sắp xếp công việc và xử lý tình huống tốt\u003c/p\u003e\u003cp\u003e- Kh ng định được hình ảnh, uy tín, thương hiệu và thị phần khá vững chắc đối với các dòng sản phẩm nhựa đường tại hầu khắp các tỉnh thành trên cả nước (đứng hàng thứ hai và chiếm 15% thị phần cả nước), góp phần vào việc hoàn thành các công trình giao thông trọng điểm trong chiến lược phát triển giao thông đường bộ của Việt Nam. Công ty cũng là một trong 21 đầu mối được cấp phép nhập khẩu xăng dầu của cả nước.\r\nKể từ năm 2014, công ty bước chân vào hàng ngũ các doanh nghiệp có doanh số vượt ngưỡng 1.000 tỷ đồng và liên tục duy trì doanh thu và lợi nhuận cao trong nhiều năm qua. Trong hai năm liên tiếp 2014 và 2015, công ty đã vinh dự được bình chọn, công bố và đón nhận giấy chứng nhận nằm trong số 500 doanh nghiệp tư nhân lớn nhất Việt Nam trong bảng xếp hạng VNR-500.\r\nNgoài trụ sở chính tại Hải Phòng, công ty hiện có 03 văn phòng đại diện và chi nhánh tại Hà Nội, Đà Nẵng và TP. Hồ Chí Minh, 03 tổng kho tại Hải Phòng, Quảng Nam và Đồng Nai. Ngoài ra, công ty cũng có nhiều đơn vị thành viên như Công ty Cổ phần Cảng Đoạn Xá (DXP), Công ty Cổ phần VN Asphalt (VNA), Công ty TNHH Xăng dầu Tratimex, Công ty Cổ phần Trường An (lĩnh vực xuất khẩu may mặc)…\r\nCông ty cũng mở rộng đầu tư và phát triển khá thành công trong nhiều lĩnh vực khác như kinh doanh hạ tầng cảng biển, kho bãi, dịch vụ xếp dỡ hàng hóa, dịch vụ hàng hải và vận tải thủy bộ, nhập khẩu và kinh doanh xăng dầu, đầu tư xây dựng và khai thác hạ tầng khu công nghiệp…\r\nCùng với tiêu chí luôn mang đến cho khách hàng các sản phẩm có chất lượng tốt nhất, công ty cũng tạo dựng một môi trường làm việc hiện đại, chuyên nghiệp, trẻ trung, nhiệt huyết, năng động, sáng tạo, luôn ghi nhận khả năng và sự đóng góp của mỗi cá nhân, đồng thời mở ra nhiều cơ hội phát triển nghề nghiệp cho cán bộ công nhân viên. Định hướng chiến lược trong giai đoạn tới là xây dựng công ty trở thành tập đoàn kinh tế tư nhân đa ngành nghề, có tiềm lực, uy tín và thương hiệu mạnh. \r\nNhằm đẩy mạnh hơn nữa các hoạt động sản xuất kinh doanh theo
