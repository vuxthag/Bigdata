o., Ltd.) was established in July 1993 and became a member of Cathay FHC in 2002. By leveraging Group resources, we provide customers with a full range of financial products and personal financial planning services. In the begginning of establishment, the Company was renamed Cathay Insurance. We have secured our position as the second largest property insurer in Taiwan since 2007. We are also seeking to expand our business into foreign markets, as evidenced by the establishment of Cathay Insurance (China) and Cathay Insurance (Vietnam) in 2008 and 2010, respectively. In September 2016, Cathay Insurance (China) increased its capital by bringing in Ant Financial Services Group, an affiliate company of Alibaba Group, as an investor, to develop IoT financial services."])</script><script>self.__next_f.push([1,"24:T64a,\u003cp\u003e1. University degree or above.\u003c/p\u003e\u003cp\u003e2. 2+ years of experience in digital platforms (websites, apps); experience in the insurance industry is a plus.\u003c/p\u003e\u003cp\u003e3. Proficient in requirement gathering, process design, BRD/Wireframe writing, and UAT testing.\u003c/p\u003e\u003cp\u003e4. Strong cross-functional communication and coordination skills, proactive in problem-solving, and detail-oriented.\u003c/p\u003e\u003cp\u003e5. Ability to translate user needs into concrete solutions and discuss feasibility with designers and developers.\u003c/p\u003e\u003cp\u003e6. Familiar with project management and data analysis tools such as Jira, Figma, Miro, and Google Analytics.\u003c/p\u003e\u003cp\u003e7. Basic understanding of UX/UI and SEO is a plus.\u003c/p\u003e\u003cp\u003e8. Fluent in Chinese or English, with the ability to collaborate with international teams.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e***What You’ll Get:\u003c/p\u003e\u003cp\u003e+ A dynamic and friendly working environment with great opportunities for career growth.\u003c/p\u003e\u003cp\u003e+ Competitive salary based on
