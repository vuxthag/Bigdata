unks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1245,"])</script><script>self.__next_f.push([1,"Lịch sử hình thành\r\n\r\nCông ty cổ phần xây lắp Xuân Mai là đơn vị thành viên của Công ty cổ phần Đầu tư \u0026 xây dựng Xuân Mai (XMC), được thành lập ngày 21/12/2009 theo Quyết định số 850/QĐ/BTXM-TCHC ngày 21/12/2009. Tiền thân từ Văn phòng đại diện tại Hà Nội và các đội xây dựng thuộc XMC.\r\nNăm 1999, XMC đã hợp tác với hãng RONVEAUX của Vương quốc Bỉ xây dựng một dây chuyền sản xuất các cấu kiện bê tông cốt thép ứng suất trước tiền chế khẩu độ lớn bằng phương pháp kéo trước tại nhà máy Bê tông Xuân Mai để sản xuất cấu kiện bê tông dự ứng lực phục vụ cho việc lắp dựng các khu chung cư cao tầng, nhà máy công nghiệp, công trình công cộng và các công trình giao thông. Sản phẩm bê tông ứng suất trước tiền chế có những tính năng, ưu điểm vượt trội như: Chất lượng cao, tính bền, ít phải bảo dưỡng khi sử dụng, tạo ra những không gian lớn từ đó tạo ra khoảng mở cho các nhà thiết kế kiến trúc và giúp tiết kiệm các chi phí công trình.\r\nNăm 2008, Công ty XMC thực hiện chuyển đổi mô hình Công ty Mẹ – Công ty Con theo hướng chuyên môn hóa. Công ty cổ phần xây lắp Xuân Mai được thành lập từ đó và đến nay đã từng bước mở rộng và hoàn thiện mô hình quản lý hoạt động chuyên về xây lắp công trình, qua đó nâng cao hơn nữa thế và lực của Công ty trong thị trường xây dựng. Trải qua hơn 10 năm xây dựng và trưởng thành, Công ty đã phát triển và lớn mạnh toàn diện, trở thành một trong những đơn vị hàng đầu của XMC, ngày càng khẳng định được uy tín, vị thế trên thị trường xây dựng Việt Nam\r\n\r\nTẦM NHÌN\r\nBằng khát vọng tiên phong trong việc áp dụng khoa học công nghệ, cùng chiến lược đầu tư – phát triển bền vững, liên kết sức mạnh của tập thể cùng hệ thống sản phẩm, dịch vụ mang tính chuyên nghiệp, công ty cổ phần Xây lắp Xuân Mai (XML) phấn đấu trở thành công ty xây dựng hàng đầu Việt Nam\r\n\r\nSỨ MỆNH\r\nĐối với thị trường: Cung cấp các sản phẩm – Dịch vụ đẳng cấp với chất lượng Quốc tế và am hiểu bản sắc địa phương, mang tính độc đáo và sáng tạo cao. Bên cạnh giá trị chất lượng vượt trội, trong mỗi sản phẩm – dịch vụ đều chứa đựng những thông điệp văn hóa, nhằm thỏa mãn tối đa nhu cầu chính đáng của khách hàng\r\nĐối với cổ đông và đối tác: Đề cao tinh thần hợp tác cùng phát triển; Cam kết trở thành “Người đồng hành số 1” của đối tác và cổ đông; Luôn gia tăng các giá trị đầu tư hấp dẫn và bền vững\r\nĐối với nhân viên: Xây dựng môi trường làm việc chuyên nghiệp, năng động, sáng tạo và nhân văn. Tạo điều kiện thu nhập cao và cơ hội phát triển công bằng cho tất cả nhân viên\r\nĐối với xã hội: Hài hòa lợi ích doanh nghiệp và lợi ích xã hội; đóng góp tích cực vào các hoạt động hướng về cộng đồng, thể hiện tinh thần trách nhiệm công dân và niềm tự hào dân tộc.\r\n\r\nCác lĩnh vực kinh doanh chính của Công ty bao gồm:\r\n* Xây dựng và Hoàn thiện các công trình Dân dụng và Công nghiệp\r\n* Thi công xây dựng Cầu đường, Giao thông, Thủy điện, các Khu đô thị, Khu công nghiệp\r\n* Lắp đặt hệ thống điện, cấp thoát nước, lò sưởi và điều hòa không khí.\r\n* Kinh doanh phát triển nhà, trang trí nội thất\r\n* Thiết kế kiến trúc công trình, Tư vấn đầu tư, thực hiện quản lý dự án đầu tư xây dựng. Lập dự án, Tư vấn đấu thầu, Giám sát, Quản lý dự án…\r\n* Xuất nhập khẩu vật tư, máy móc thiết bị, phụ tùng, dây chuyền công nghệ, vật liệu xây dựng, kinh doanh bất động sản và các dịch vụ thương mại khác\r\n* Cho thuê máy móc, thiết bị xây dựng. Gia công chế tạo các thiết bị nâng\r\n* Sửa chữa máy móc, thiết bị xây dựng, các thiết bị điện, điện tử và quang học. Lắp đặt máy móc và thiết bị công nghiệp.\r\n* Sản xuất và Kinh doanh vật liệu xây dựng."])</script><script>self.__next_f.push([1,"24:T1245,"])</script><script>self.__next_f.push([1,"Lịch sử hình thành\r\n\r\nCông ty cổ phần xây lắp Xuân Mai là đơn vị thành viên của Công ty cổ phần Đầu tư \u0026 xây dựng Xuân Mai (XMC), được thành lập ngày 21/12/2009 theo Quyết định số 850/QĐ/BTXM-TCHC ngày 21/12/2009. Tiền thân từ Văn phòng đại diện tại Hà Nội và các đội xây dựng thuộc XMC.\r\nNăm 1999, XMC đã hợp tác với hãng RONVEAUX của Vương quốc Bỉ xây dựng một dây chuyền sản xuất các cấu kiện bê tông cốt thép ứng suất trước tiền chế khẩu độ lớn bằng phương pháp kéo trước tại nhà máy Bê tông Xuân Mai để sản xuất cấu kiện bê tông dự ứng lực phục vụ cho việc lắp dựng các khu chung cư cao tầng, nhà máy công nghiệp, công trình công cộng và các công trình giao thông. Sản phẩm bê tông ứng suất trước tiền chế có những tính năng, ưu điểm vượt trội như: Chất lượng cao, tính bền, ít phải bảo dưỡng khi sử dụng, tạo ra những không gian lớn từ đó tạo ra khoảng mở cho các nhà thiết kế kiến trúc và giúp tiết kiệm các chi phí công trình.\r\nNăm 2008, Công ty XMC thực hiện chuyển đổi mô hình Công ty Mẹ – Công ty Con theo hướng chuyên môn hóa. Công ty cổ phần xây lắp Xuân Mai được thành lập từ đó và đến nay đã từng
