hế giới.\r\n\r\nVới mục tiêu mang đến nền giáo dục chất lượng cao, WASS không ngừng hoàn thiện cơ sở vật chất và nâng cao chất lượng đào tạo với mong ước giúp các em có cơ hội học tập và hội nhập với nền giáo dục thế giới. Dưới sự hướng dẫn của đội ngũ giáo viên nước ngoài và Việt Nam có trình độ chuyên môn cao, giàu kinh nghiệm, năng động và tận tâm với từng học sinh sẽ giúp các em phát triển toàn diện về nhân cách, thể chất, trí tuệ, kiến thức, có trình độ anh ngữ cao tự tin trở thành công dân toàn cầu.\r\n\r\nTừ lòng nhiệt huyết và niềm tin “A world-class education with the world in your class”, WASS cam kết mang đến cho thế hệ trẻ một môi trường giáo dục hiện đại, năng động, có đủ năng lực ngang tầm với học sinh các nước tiên tiến trên thế giới.\r\n\r\nWASS luôn mong muốn nhận được sự hợp tác của các tổ chức giáo dục có uy tín trong nước cũng như nước ngoài, sự cống hiến và nỗ lực hết mình của toàn thể đội ngũ giáo viên, nhân viên, trên hết là sự ủng hộ và tín nhiệm của các Quý vị phụ huynh, học sinh để mở ra những cơ hội học tập mới, cũng như những chân trời tri thức mới, đóng góp cho sự phát triển bền vững của nhân loại.\r\n\r\n*** Website: http://wass.edu.vn \r\n\r\n•\tCơ sở Tiểu học, THCS \u0026 THPT\r\nĐịa chỉ: \r\n-\t43 Nguyễn Thông, P.7, Q.3, TP. Hồ Chí Minh\r\n-\t157 Lý Chính Thắng, P.7, Q.3, TP. Hồ Chí Minh\r\n\r\n•\tCơ sở Mầm non\r\nĐịa chỉ: 260 Điện Biên Phủ, P.7, Q.3, TP. Hồ Chí Minh"])</script><script>self.__next_f.push([1,"24:T4ff,\u003cp\u003e- Tham gia công tác dạy các môn KHCN: Steam/Robotics/ICT\u003c/p\u003e\u003cp\u003e- Xây dựng, thiết kế; đánh giá, góp ý chỉnh sửa giáo trình và chương trình đào tạo giảng dạy\u003c/p\u003e\u003cp\u003e- Tham gia \u0026 hỗ trợ Triển khai các môn học Steam/ Robotics/ICT\u003c/p\u003e\u003cp\u003e- Tham gia các sự kiện, hội thảo, cuộc thi có liên quan đến môn KHCN.\u003c/p\u003e\u003cp\u003e- Tham gia quản lý chất lượng đào tạo Steam/ Robotics/ICT và chịu trách nhiệm báo cáo với BGH.\u003c/p\u003e\u003cp\u003e- g cấp đa dạng các chương trình giáo dục chuẩn quốc tế từ Mầm non đến THPT và các khóa học ngắn hạn, cùng sứ mệnh mở ra những cơ hội học tập chất lượng thế giới ngay tại Việt Nam, đưa học sinh và sinh viên Việt Nam chạm tới tinh hoa của những nền giáo dục toàn cầu một cách dễ dàng và nhanh chóng; đồng thời đẩy mạnh các hoạt động đầu tư, thương mại và dịch vụ về giáo dục trên toàn cầu. Với khát vọng đào tạo nên những công dân toàn cầu ưu tú, RT Holdings tin rằng hoạt động đầu tư giáo dục cần được thực hiện một cách lâu dài, bền bỉ và kiên tâm để gặt hái được những thành công thực sự ý nghĩa và có được những đóng góp lớn lao cho cộng đồng. \r\n\r\nVới niềm tin sắt son ấy cùng tầm nhìn sâu rộng, suốt hai thập kỷ qua, RT Holdings đã từng bước phát triển và mở rộng thông qua việc xây dựng những đơn vị đào tạo nổi bật và danh tiếng như:\r\n- Hệ thống Trường Tây Úc (WASS)\r\n- Hệ thống Trường PennSchool (PennSchool)\r\n- Hệ thống Trường Sydney (SISS)\r\n- Viện Kế toán và Quản trị doanh nghiệp (IABM)\r\n- Trường Trung cấp Bách khoa Việt Mỹ (AmCollege)\r\n- Trung tâm Tư vấn Du học ISA (ISA)\r\n- Trung tâm Ngoại ngữ Penn Academy (Penn Academy)\r\n- Học viện Phát triển Tài năng (TDA)\r\n\r\nDù thuộc nhiều cấp học và cung cấp nhiều chương trình đào tạo đa dạng, tất cả các đơn vị thuộc RT Holdings đều gặp nhau ở một điểm chung: tinh thần giáo dục cởi mở, phương pháp đào tạo không ngừng đổi mới và nội dung đào tạo luôn hướng tới mục tiêu chuẩn hóa theo chất lượng quốc tế thông qua những chương trình kiểm định uy tín của thế giới. Rất nhiều thế hệ học sinh, sinh viên đã trưởng thành và trở thành sinh viên của các Đại học hàng đầu thế giới, gặt hái rất nhiều thành công trong sự nghiệp từ những bệ phóng vững chắc mà các đơn vị trực thuộc RT Holdings đang cần mẫn kiến tạo mỗi ngày.\r\n\r\nCó thể nói, hành trình hai thập kỷ kiến tạo và đổi mới của RT Holdings chính là hành trình của sự đam mê, nhiệt huyết và xuất phát từ sự tâm huyết, niềm đam mê và khát vọng mạnh mẽ của những người Thầy, người Cô luôn trăn trở cho sự nghiệp giáo dục.\r\n\r\nHãy gia nhập đội ngũ của chúng tôi để đóng góp sức mình cho hành trình kiến tạo những thế hệ trẻ tài năng và đưa Việt Nam trở thành một trong những quốc gia đi đầu trong toàn cầu hóa giáo dục!\r\n\r\nĐội ngũ RT Holdings\r\nhttps://rtholdings.edu.vn \r\n\r\n\r\n\r\n\r\nRT Holdings is one of the pioneers in Vietnam in providing international-standard programs for students from Kindergarten to High school, in addition to short-term courses. RT Holdings is dedicated to opening opportunities for students to access world-class courses in Vietnam, helping them approach global education easily and quickly; and at the same time promoting activities in investment, trading, and services in terms of education around the world. With the desire to build up excellent global citizenships, RT Holdings believes that investment in education should be undertaken in a long-term, persistent, and patient way to be more successful and contribute more to the community. \r\n\r\nFollowing that aspiration and vision in the last two decades, RT Holdings has been developing and expanding with a number of units, including:\r\n\r\n-          Western Australian International School System (WASS)\r\n\r\n-          Pennsylvania American International School System (PennSchool)\r\n\r\n-          Sydney International School System (SISS)\r\n\r\n-          Institute of Accounting and Business Management (IABM)\r\n\r\n-          American College of Vietnam (AmCollege)\r\n\r\n-          Indochina Study Abroad (ISA)\r\n\r\n-          Penn Academy\r\n\r\n-          Talents Development Academy (TDA)\r\n\r\nDespite having various educational levels and programs, all units in RT Holdings share a common point: an open-minded educational spirit, constantly innovative training methods, and a training method standardized to international quality through the world’s reputable accreditation programs. Many generations of students have grown up, become students at top Universities, and achieved a lot of success in their careers from the solid foundation that all the units in RT Holdings consistently build up every day.\r\n\r\nThe journey of nearly two decades of creation and innovation of RT Holdings have been driven by passion and enthusiasm, which comes from the passion, dedication and desires of Teachers who are always concerned about education.\r\n\r\nJoin us today to contribute your talents to the journey of raising up excellent young generations and making Vietnam one of the leading countries in the globalization of education.\r\n\r\nRT Holdings Team\r\n\r\nhttps://rtholdings.edu.vn/en/"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"3d:{\"companyId\":147367,\"jobImageURLs\":\"$3e\",\"jobVideoURLs\":\"$3f\",\"companyName\":\"RT Holdings\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/c2/11187106.png\",\"companySizeId\":\"\",\"companyProfile\":\"$40\",\"contactName\":\"HR Department\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"4 Nguyễn Thông, Phường Võ Thị Sáu, Quận 3, TP.HCM\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"https://images02.vietnamworks.com/companyprofile/RT-Holdings/vi/RT-HOLDINGS_AN-PHAM-LOGO_ANH_BIA_VNWORK_1920x510px.jpg\",\"companyProfileUrl\":\"https://www.vietnamworks.com/company/rt-holdings\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":1,\"bannerDesktopUri\":\"https://images.vietnamworks.com/pictureofcompany/40/company-info-cover-picture-url-147367-1682049106.png\"}\n42:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-06T15:25:21+07:00\",\"expiredOn\":\"2026-05-06T23:59:59+07:00\"}\n41:[\"$42\"]\n43:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"27:{\"jobId\":2035930,\"jobTitle\":\"Trưởng Bộ Môn Khoa Học Công Nghệ\",\"userId\":2987958,\"companyLog
