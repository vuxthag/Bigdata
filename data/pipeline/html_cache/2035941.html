BC Việt Nam, đánh dấu một bước chuyển mình mới trong chiến lược phát triển. Với tầm nhìn mở rộng và nâng cao giá trị dịch vụ, KBC Việt Nam cam kết mang đến những giải pháp công nghệ tiên tiến nhất, phục vụ tốt nhất cho khách hàng và đối tác. Chúng tôi luôn nỗ lực không ngừng để phát triển và cung cấp những sản phẩm, dịch vụ tốt nhất, góp phần vào sự thành công của khách hàng.\r\n\r\n1. KBC Việt Nam là đơn vị chuyên cung cấp dịch vụ:\r\nPhân phối máy bộ đàm chính hãng của các thương hiệu nổi tiếng như KBC, Motorola, Icom, KenWood,...\r\nCho thuê bộ đàm chính hãng giá rẻ.\r\nSửa chữa, bảo trì, bảo dưỡng bộ đàm.\r\nCài đặt tần số bộ đàm.\r\nCung cấp giải pháp toàn diện bao gồm các các thiết bị: máy bộ đàm, máy chấm công, máy tuần tra, máy dò kim loại, camera giám sát\r\nCung cấp các giải pháp an ninh khác.\r\nVới đội ngũ cán bộ, nhân viên giàu kinh nghiệm, nhiệt huyết với công việc. Từ khi thành lập tới nay Bộ Đàm Kinh Bắc luôn phát triển và tiếp tục cố gắng củng cố, nâng cao kiến thức cũng như kinh nghiệm cho cán bộ, nhân viên để đáp ứng nhu cầu ngày càng cao của khách hàng. Do đó đã nhân được những phản hồi tích cực và đánh giá ghi nhận."])</script><script>self.__next_f.push([1,"24:Td4c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKBC Việt Nam là đơn vị chuyên cung cấp dịch vụ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhân phối máy bộ đàm chính hãng của các thương hiệu nổi tiếng như KBC, Motorola, Icom, KenWood,...\u003c/p\u003e\u003cp\u003e•\tCho thuê bộ đàm chính hãng giá rẻ.\u003c/p\u003e\u003cp\u003e•\tSửa chữa, bảo trì, bảo dưỡng bộ đàm.\u003c/p\u003e\u003cp\u003e•\tCài đặt tần số bộ đàm.\u003c/p\u003e\u003cp\u003e•\tCung cấp giải pháp toàn diện bao gồm các các thiết bị: máy bộ đàm, máy chấm công, máy tuần tra, máy dò kim loại, camera giám sát\u003c/p\u003e\u003cp\u003e•\tCung cấp các giải pháp an ninh khác.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChúng tôi đang tuyển dụng vị trí Chuyên viên C\u0026B (Phụ trách hệ thống lương 3P) làm việc tại Số 1A chung cư Bảo Sơn, Ngõ 89 Lạc Long Quân, phường Tây Hồ, TP. Hà Nội\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTHÔNG TIN CHỨC DANH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBộ phận:\u003c/strong\u003e Phòng Nhân sự.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBáo cáo trực tiếp:\u003c/strong\u003e Trưởng phòng Nhân sự / Ban Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTính chất vị trí:\u003c/strong\u003e Là nhân sự nòng cốt chịu trách nhiệm xây dựng, vận hành và tối ưu hóa hệ thống đãi ngộ, đặc biệt là cơ chế lương 3P gắn với hiệu suất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMỤC ĐÍCH CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eVị trí này được thiết lập nhằm hiện thực hóa triết lý đãi ngộ của KBC: \u003cstrong\u003e\"Công bằng – Minh bạch – Thúc đẩy hiệu suất\"\u003c/strong\u003e. Mục tiêu cốt lõi là:\u003c/p\u003e\u003cp\u003e•\tXây dựng và triển khai hệ thống lương 3P phù hợp với thực tiễn KBC.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo công tác tính lương, thưởng và chế độ phúc lợi chính xác, kịp thời, tạo động lực cho cán bộ nhân viên.\u003c/p\u003e\u003cp\u003e•\tSố hóa dữ liệu nhân sự và chi phí lương để tham mưu cho Ban Giám đốc về chiến lược nguồn nhân lực tinh gọn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ TRỌNG TÂM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Xây dựng và Vận hành hệ thống lương 3P:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTrực tiếp rà soát, thiết lập khung năng lực và hệ thống chỉ số đánh giá hiệu suất (KPI) cho từng vị trí.\u003c/p\u003e\u003cp\u003e•\tTính toán và phân bổ quỹ lương, thưởng theo kết quả công việc, đảm bảo sự tương xứng giữa đóng góp và đãi ngộ.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, phân tích dữ liệu hiệu suất định kỳ để đề xuất điều chỉnh hệ thống lương 3P cho phù hợp với từng giai đoạn phát triển của công ty.\u iếp:\u003c/strong\u003e Trưởng phòng Nhân sự / Ban Giám đốc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTính chất vị trí:\u003c/strong\u003e Là nhân sự nòng cốt chịu trách nhiệm xây dựng, vận hành và tối ưu hóa hệ thống đãi ngộ, đặc biệt là cơ chế lương 3P gắn với hiệu suất.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMỤC ĐÍCH CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eVị trí này được thiết lập nhằm hiện thực hóa triết lý đãi ngộ của KBC: \u003cstrong\u003e\"Công bằng – Minh bạch – Thúc đẩy hiệu suất\"\u003c/strong\u003e. Mục tiêu cốt lõi là:\u003c/p\u003e\u003cp\u003e•\tXây dựng và triển khai hệ thống lương 3P phù hợp với thực tiễn KBC.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo công tác tính lương, thưởng và chế độ phúc lợi chính xác, kịp thời, tạo động lực cho cán bộ nhân viên.\u003c/p\u003e\u003cp\u003e•\tSố hóa dữ liệu nhân sự và chi phí lương để tham mưu cho Ban Giám đốc về chiến lược nguồn nhân lực tinh gọn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ TRỌNG TÂM\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Xây dựng và Vận hành hệ thống lương 3P:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTrực tiếp rà soát, thiết lập khung năng lực và hệ thống chỉ số đánh giá hiệu suất (KPI) cho từng vị trí.\u003c/p\u003e\u003cp\u003e•\tTính toán và phân bổ quỹ lương, thưởng theo kết quả công việc, đảm bảo sự tương xứng giữa đóng góp và đãi ngộ.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, phân tích dữ liệu hiệu suất định kỳ để đề xuất điều chỉnh hệ thống lương 3P cho phù hợp với từng giai đoạn phát triển của công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Nghiệp vụ C\u0026B chi tiết:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện tính lương, thưởng, phụ cấp và các khoản trích theo lương hàng tháng.\u003c/p\u003e\u003cp\u003e•\tQuản lý công tác Bảo hiểm xã hội, Thuế TNCN và các chế độ chính sách theo quy định pháp luật.\u003c/p\u003e\u003cp\u003e•\tXây dựng hệ thống thang bảng lương, nội quy lao động và các quy chế đãi n
