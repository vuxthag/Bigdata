T CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCác nhiệm vụ chính bao gồm vận hành và phát triển sản phẩm chứng chỉ Quỹ đầu tư do Lighthouse Capital quản lý.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tPhụ trách vận hành các quỹ đại chúng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThực hiện nghiệp vụ giao dịch của quỹ mở: mở tài khoản, nhận lệnh mua bán chứng chỉ quỹ của khách hàng và chuyển lệnh lên đại lý chuyển nhượng, xác nhận kết quả giao dịch;\u003c/p\u003e\u003cp\u003e-\tVận hành phần mềm giao dịch chứng chỉ quỹ mở trực tuyến của Công ty;\u003c/p\u003e\u003cp\u003e-\tChăm sóc khách hàng, giải quyết các yêu cầu hỗ trợ của khách hàng;\u003c/p\u003e\u003cp\u003e-\tPhối hợp với các đối tác và nhà cung cấp dịch vụ cho Quỹ như Ngân hàng lưu ký giám sát, Đại lý chuyển nhượng (VSDC)…, đảm bảo hoạt động vận hành của Quỹ tuân thủ theo Điều Lệ Quỹ và pháp luật liên quan;\u003c/p\u003e\u003cp\u003e-\tQuản lý và phát triển hệ thống đối tác, đại lý phân phối chứng chỉ quỹ;\u003c/p\u003e\u003cp\u003e-\tTham gia đào tạo về sản phẩm, quy trình giao dịch cho đội ngũ bán hàng của các đại lý phân phối và kênh đối tác;\u003c/p\u003e\u003cp\u003e-\tLập báo cáo định kỳ gửi cho khách hàng, cơ quan quản lý và các bên liên quan.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tPhát triển sản phẩm quỹ đầu tư\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTham gia nghiên cứu nhằm cải tiến và và phát triển sản phẩm mới (quỹ mở, quỹ hưu trí, quỹ ETF và các sản phẩm đầu tư của Công ty), đề xuất lựa chọn các tổ chức cung cấp dịch vụ, phát tiển mạng lưới phân phối, xây dựng và cải tiến quy trình phân phối sản phẩm, xây dựng các báo cáo hoạt động của quỹ …;\u003c/p\u003e\u003cp\u003e-\tTham gia xây dựng và cập nhật các tài liệu Quỹ và sản phẩm;\u003c/p\u003e\u003cp\u003e-\tTham gia xây dựng, cải tiến các quy trình, chính sách liên quan đến vận hành hệ thống và sản phẩm;\u003c/p\u003e\u003cp\u003e-\tTham gia xây dựng, cải tiến phần mềm nội bộ và hệ thống xử lý các nghiệp nhằm nâng cao chất lượng dịch vụ sản phẩm;\u003c/p\u003e\u003cp\u003e-\tXử lý các vấn đề khác phát sinh khi vận hành các quỹ, nghiên cứu và phát triển sản phẩm, cải tiến quy trình vận hành; \u003c/p\u003e\u003cp\u003e-\tThực hiện các công việc khác được giao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T7aa,\u003cp\u003e-\tTốt nghiệp Đại học chính quy trở lên chuyên ngành Tài chính, Ngân hàng, Chứng khoán, Kế toán - Kiểm toán, Kinh tế, Luật hoặc các ngành có liên quan;\u003c/p\u003e\u003cp\u003e-\tTối thiểu 01 năm kinh nghiệm làm việc tại phòng nghiệp vụ công ty quản lý quỹ, công ty chứng khoán, ngân hàng.\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên có kinh nghiệm làm việc tại Bộ phận dịch vụ khách hàng/Vận hành của Công ty quản lý quỹ, Công ty chứng khoán, Bộ phận lưu ký giám sát của Ngân hàng;\u003c/p\u003e\u003cp\u003e-\tCó chứng chỉ hành nghề chứng khoán;\u003c/p\u003e\u003cp\u003e-\tKỹ năng làm việc theo nhóm, làm việc độc lập; Kỹ năng giải quyết vấn đề, xử lý tình huống;\u003c/p\u003e\u003cp\u003e-\tCó tinh thần trách nhiệm, chính xác, tỉ mỉ.\u003c/p\u003e\u003cp\u003e-\tKỹ năng giao tiếp và trình bày tốt, Tiếng Anh giao tiếp và tin học văn phòng thành thạo;\u003c/p\u003e\u003cp\u003e-\tCó trách nhiệm với các công việc được phân công.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThời gian làm việc: 05 ngày/tuần (từ thứ Hai đến thứ Sáu).\u003c/p\u003e\u003cp\u003e-\tChế độ thu nhập tương xứng với năng lực, kinh nghiệm và hiệu suất công việc.\u003c/p\u003e\u003cp\u003e-\tĐược thưởng theo hiệu quả kinh doanh của công ty, thưởng trong các dịp lễ Tết.\u003c/p\u003e\u003cp\u003e-\tĐược hưởng các khoản phụ cấp như phụ cấp ăn trưa, phụ cấp kiêm nhiệm trách nhiệm công việc.\u003c/p\u003e\u003cp\u003e-\tĐược hưởng các chế độ BHXH, BHYT, BHTN, BH
