s that clearly reflect objectives, content, and educational methods, ensuring feasibility and suitability with student characteristics, circumstances, and real conditions to promote progress for both the class as a whole and individual students.\u003c/p\u003e\u003cp\u003e•\tCompile and design lessons, organize classes suitable for teaching objectives; manage classes and handle pedagogical situations effectively. Also develop teaching plans in accordance with the national education program and the UTS student competency framework.\u003c/p\u003e\u003cp\u003e•\tBuild a system of supplemental learning materials; improve and assess the teaching and learning process to ensure student progress; effectively carry out enrichment and learning support for students.\u003c/p\u003e\u003cp\u003e•\tPrepare exam papers and build an item bank; implement testing, supervise, and evaluate learning outcomes periodically (weekly, monthly, semester, and school year).\u003c/p\u003e\u003cp\u003e•\tEffectively perform learning support activities for students.\u003c/p\u003e\u003cp\u003e•\tReport regularly or unexpectedly on student learning progress to the School Leadership; propose solutions/action plans and coordinate implementation.\u003c/p\u003e\u003cp\u003e•\tBe an ambassador for UTS Core Values – Integrity, Respect, Courage, Contribution, Lifelong Learning, and Creativity; actively integrate these core values into teaching and student education.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2/ Homeroom Responsibilities (if assigned) and Student Education\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCarry out educational activities according to the established plan approved by the School Leadership.\u003c/p\u003e\u003cp\u003e•\tClosely coordinate with parents, teachers in the grade level, and relevant social organizations to organize educational activities and support and supervise the learning and development of homeroom students.\u003c/p\u003e\u003cp\u003e•\tBuild close relationships and exchange information between the school and parents as per regulations.\u003c/p\u003e\u003cp\u003e•\tCoordinate the implementation of extracurricular activities and clubs to build character and develop student talents.\u003c/p\u003e\u003cp\u003e•\tSupport students emotionally, mentally, and psychologically to create a happy, safe, dedicated, and creative learning environment for all students.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3/ Research and Development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPerform professional tasks as assigned by the Vice Principal or Mentor Teacher.\u003c/p\u003e\u003cp\u003e•\tParticipate in assigned class observations, provide feedback, and share experience with subject team colleagues.\u003c/p\u003e\u003cp\u003e•\tDevelop teaching plans that effectively integrate various teaching methods, including project-based learning; develop supplemental academic materials and create teaching tools.\u003c/p\u003e\u003cp\u003e•\tTake every opportunity to develop professional knowledge and skills through professional training programs, in-house training, or workshops both inside and outside the school.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4/ Administrative Work and Compliance with School Policies\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAttend team/department/school meetings to receive updates on rules, regulations, and policies.\u003c/p\u003e\u003cp\u003e•\tUnderstand and comply with departmental and school regulations, guidelines, and policies.\u003c/p\u003e\u003cp\u003e•\tParticipate in organizing school events and activities.\u003c/p\u003e\u003cp\u003e•\tActively support the school’s recruitment and admissions efforts.\u003c/p\u003e\u003cp\u003e•\tUndertake other duties as assigned by the School Leadership.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T7db,\u003cp\u003e\u003cstrong\u003e1. Education\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•
