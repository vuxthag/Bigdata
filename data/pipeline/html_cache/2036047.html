i chúng tôi, bạn sẽ có nhiều cơ hội phát triển nghề nghiệp tại nhiều vị trí trực thuộc Tập đoàn gồm chuỗi Hệ thống công ty và chế độ đãi ngộ hấp dẫn - cạnh tranh.\r\n\r\nHệ thống Trường quốc tế Sakura Montessori International School (SMIS)\r\n- Cơ sở 1: Lô TH1, KĐT mới Dịch Vọng, Cầu Giấy, Hà Nội\r\n- Cơ sở 2: Lô H3_LC Khu đô thị Tây Hồ Tây, Bắc Từ Liêm, Hà Nội\r\n- Cơ sở 3: KĐT Mễ Trì Hạ, Phạm Hùng, Nam Từ Liêm, Hà Nội\r\n- Cơ sở 4: Số 89B Thụy Khuê, Tây Hồ, Hà Nội\r\n- Cơ sở 5: Tầng 3, Roman Plaza, Tố Hữu, Nam Từ Liêm, Hà Nội\r\n- Cơ sở 6: Số 430 Cầu Am, phường Vạn Phúc, quận Hà Đông, Hà Nội\r\n- Cơ sở 7: Số 3 Lương Yên, Hai Bà Trưng, Hà Nội\r\n- Cơ sở 8:  Khu đô thị Anh Dũng 2, Dương Kinh, Hải Phòng\r\n- Cơ sở 9: Lô CC khu nhà ở, 106 Lương Khánh Thiện, Ngô Quyền\r\n- Cơ sở 10: 251A (253/12) Lương Định Của, P. An Phú, Quận 2, HCM\r\n- Cơ sở 11: 116A, Nguyễn Thượng Hiền, P. Hồng Hà, TP. Hạ Long, Quảng Ninh\r\n- Cơ sở 12: Khu đô thị Hateco, tổ 23, Trần Lãm, Thái Bình\r\n\r\nHệ thống Trường Phổ thông The Dewey Schools (TDS)\r\n- Cơ sở 1: Lô H3 - LC, KĐT Starlake, Tây Hồ Tây, Xuân Đỉnh, Bắc Từ Liêm, Hà Nội\r\n- Cơ sở 2: Lô TH1, KĐT mới Dịch Vọng, Cầu Giấy, Hà Nội\r\n- Cơ sở 3: Khu đô thị Anh Dũng 2, Dương Kinh, Hải Phòng"])</script><script>self.__next_f.push([1,"24:Tff3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Giảng dạy và đánh giá học tập\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.1 Tổ chức dạy học\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Chuẩn bị Kế hoạch dạy học chi tiết, cập nhật lịch báo giảng, chuẩn bị đồ dùng dạy học và thực hiện giờ dạy tuân thủ “Quy định thực hiện giờ dạy”.\u003c/p\u003e\u003cp\u003e– Tổ chức dạy học theo đúng đặc trưng bộ môn và theo đúng phương pháp của nhà trường.\u003c/p\u003e\u003cp\u003e– Thực hiện chấm chữa bài thường xuyên cho học sinh nhằm nắm bắt việc nắm được kiến thức, mức độ kỹ năng của mỗi học sinh để có thể kịp thời hỗ trợ học sinh trong quá trình tổ chức dạy học.\u003c/p\u003e\u003cp\u003e– Phát triển nguồn tài liệu dạy học và xây dựng môi trường học tập lôi cuốn để khuyến khích học sinh học tham gia.\u003c/p\u003e\u003cp\u003e– Đảm bảo tất cả học sinh trong lớp nắm bắt được khái niệm và tạo điều kiện cho các em có trình độ cao hơn có cơ hội được phát triển.\u003c/p\u003e\u003cp\u003e– Trợ giảng cho các giáo viên nước ngoài khi được phân công.\u003c/p\u003e\u003cp\u003e– Dạy thay khi có phân công. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.2 Theo dõi, đánh giá sự tiến bộ của học sinh\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Đưa ra các kỳ vọng \u0026 tiêu chí đánh giá học sinh.\u003c/p\u003e\u003cp\u003e– Theo dõi sự tiến bộ của học sinh qua các kỳ học và cả năm học, bao gồm việc nhận nhiệm vụ học tập, thực hiện nhiệm vụ học tập và sản phẩm của mỗi nhiệm vụ học tập. Nếu chưa đạt cần có biện pháp tiếp tục bồi dưỡng cho phù hợp, giúp học sinh phát triển cá nhân hoàn thiện.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.3 Nâng cao chuyên môn, nghiệp vụ\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Tham gia đầy đủ các buổi đào tạo theo kế hoạch đào tạo và phát triển chuyên môn của nhà trường.\u003c/p\u003e\u003cp\u003e– Dự giờ các giáo viên khác để học hỏi và rút kinh nghiệm.\u003c/p\u003e\u003cp\u003e– Tăng cường học hỏi phương pháp giảng dạy tích cực, hiện đại để nâng cao hiệu quả dạy học. Tự nghiên cứu các phương pháp dạy học tiên tiến, lấy học sinh làm trung tâm để điều chỉnh, vận dụng vào bài học.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Đời sống học đường của học sinh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Chịu trách nhiệm về an toàn của học sinh trong và thông qua các hoạt động của môn học/ phạm vi được phân công.\u003c/p\u003e\u003cp\u003e– Tổ chức hiệu quả các hoạt động rèn nền nếp kỷ luật cho học sinh. Tạo được cho học sinh nề nếp học tập, lối sống khoa học; làm gương cho học sinh về cách sống, ứng xử trong học đường và trong cuộc sống.\u003c/p\u003e\u003cp\u003e– Tạo ra các kênh kết nối để học sinh có thể đóng góp cho trường về việc học tập và hạnh phúc trong học đường của học sinh.\u003c/p\u003e\u003cp\u003e– Hướng dẫn học sinh phải biết tự giác học tập để lĩnh hội kiến thức.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Giao tiếp với Phụ huynh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Liên lạc kịp thời với Phụ huynh khi có sự việc xảy ra liên quan đến học sinh đồng thời báo cáo sự việc cho các cấp quản lý cao hơn để có cách xử lý phù hợp.\u003c/p\u003e\u003cp\u003e. Các nhiệm vụ khác\u003c/p\u003e\u003cp\u003e– Tổ chức và tham gia các sự kiện của trường, theo dõi \u0026 hỗ trợ các chuyến đi dã ngoại và các hoạt động có thể diễn ra vào cuối tuần hoặc buổi tối.\u003c/p\u003e\u003cp\u003e– Là đại sứ của Dewey, góp phần lan tỏa hình ảnh và các giá trị cốt lõi của nhà trường tới những người xung quanh.\u003c/p\u003e\u003cp\u003e– Thực hiện các công việc khác liên quan tới yêu cầu công việc cũng như các quy định của Công ty, các đơn vị thanh/ kiểm tra và Pháp Luật Việt Nam theo phân công và hướng dẫn của cấp trên.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T63f,\u003cp\u003e\u003cstrong\u003eYÊU CẦU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Yêu cầu năng lực\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Thành thạo tin học văn phòng.\u003c/p\u003e\u003cp\u003e– Có khả năng làm việc độc lập và làm việc nhóm hiệu quả.\u003c/p\u003e\u003cp\u003e– Kỹ năng lập kế hoạch và quản lý thời gian tốt.\u003c/p\u003e\u003cp\u003e– Yêu thương trẻ em.\u003c/p\u003e\u003cp\u003e– Trung thực, trách nhiệm và nhiệt huyết với công việc.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Yêu cầu bằng cấp và kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Tốt nghiệp Đại học trở lên, chuyên ngành Sư phạm Ti bắt được khái niệm và tạo điều kiện cho các em có trình độ cao hơn có cơ hội được phát triển.\u003c/p\u003e\u003cp\u003e– Trợ giảng cho các giáo viên nước ngoài khi được phân công.\u003c/p\u003e\u003cp\u003e– Dạy thay khi có phân công. \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.2 Theo dõi, đánh giá sự tiến bộ của học sinh\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Đưa ra các kỳ vọng \u0026 tiêu chí đánh giá học sinh.\u003c/p\u003e\u003cp\u003e– Theo dõi sự tiến bộ của học sinh qua các kỳ học và cả năm học, bao gồm việc nhận nhiệm vụ học tập, thực hiện nhiệm vụ học tập và sản phẩm của mỗi nhiệm vụ học tập. Nếu chưa đạt cần có biện pháp tiếp tục bồi dưỡng cho phù hợp, giúp học sinh phát triển cá nhân hoàn thiện.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.3 Nâng cao chuyên môn, nghiệp vụ\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Tham gia đầy đủ các buổi đào tạo theo kế hoạch đào tạo và phát triển chuyên môn của nhà trường.\u003c/p\u003e\u003cp\u003e– Dự giờ các giáo viên khác để học hỏi và rút kinh nghiệm.\u003c/p\u003e\u003cp\u003e– Tăng cường học hỏi phương pháp giảng dạy tích cực, hiện đại để nâng cao hiệu quả dạy học. Tự nghiên cứu các phương pháp dạy học tiên tiến, lấy học sinh làm trung tâm để điều chỉnh, vận dụng vào bài học.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Đời sống học đường của học sinh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Chịu trách nhiệm về an toàn của học sinh trong và thông qua các hoạt động của môn học/ phạm vi được phân công.\u003c/p\u003e\u003cp\u003e– Tổ chức hiệu quả các hoạt động rèn nền nếp kỷ luật cho học sinh. Tạo được cho học sinh nề nếp học tập, lối sống khoa học; làm gương cho học sinh về cách sống, ứng xử trong học đường và trong cuộc sống.\u003c/p\u003e\u003cp\u003e– Tạo ra các kênh kết nối để học sinh có thể đóng góp cho trường về việc học tập và hạnh phúc trong học đường của học sinh.\u003c/p\u003e\u003cp\u003e– Hướng dẫn học sinh phải biết tự giác học tập để lĩnh hội kiến thức.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Giao tiếp với Phụ huynh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Liên lạc kịp thời với Phụ huynh khi có sự việc xảy ra liên quan đến học sinh đồng thời báo cáo sự việc cho các cấp quản lý cao hơn để có cách xử lý phù hợp.\u003c/p\u003e\u003cp\u003e. Các nhiệm vụ khác\u003c/p\u003e\u003cp\u003e– Tổ chức và tham gia các sự kiện của trường, theo dõi \u0026 hỗ trợ các chuyến đi dã ngoại và các hoạt động có thể diễn ra vào cuối tuần hoặc buổi tối.\u003c/p\u003e\u003cp\u003e– Là đại sứ của Dewey, góp phần lan tỏa hình ảnh và các giá trị cốt lõi của nhà trường tới những người xung quanh.\u003c/p\u003e\u003cp\u003e– Thực hiện các công việc khác liên quan tới yêu cầu công việc cũng như các quy định của Công ty, các đơn vị thanh/ kiểm tra và Pháp Luật Việt Nam theo phân công và hướng dẫn của cấp trên.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T63f,\u003cp\u003e\u003cstrong\u003eYÊU CẦU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Yêu cầu năng lực\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Thành thạo tin học văn phòng.\u003c/p\u003e\u003cp\u003e– Có khả năng làm việc độc lập và làm việc nhóm hiệu quả.\u003c/p\u003e\u003cp\u003e– Kỹ năng lập kế hoạch và quản lý thời gian tốt.\u003c/p\u003e\u003cp\u003e– Yêu thương trẻ em.\u003c/p\u003e\u003cp\u003e– Trung thực, trách nhiệm và nhiệt huyết với công việc.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Yêu cầu bằng cấp và kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e– Tốt nghiệp Đại học trở lên, chuyên ngành Sư phạm Tiếng Anh hoặc Ngôn ngữ Anh kèm chứng chỉ sư phạm tương đương.\u003c/p\u003e\u003cp\u003e– Có chứng chỉ IELTS ≥ 7.0 hoặc tương đương (ưu tiên).\u003c/p\u003e\u003cp\u003e– Từ 1 năm kinh nghiệm giảng dạy tiếng Anh tại các trường quốc tế hoặc trường chuyên.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e
