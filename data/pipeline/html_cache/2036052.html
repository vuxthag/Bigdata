ôn, thăm hỏi đau ốm, chế độ chăm sóc riêng với phụ nữ; \r\nCác chính sách tri ân cho nhân viên đã có cố gắng và cống hiến theo các mốc thời gian cố định;  \r\nChính sách đào tạo khuyến khích và tài trợ cho các thành viên đăng kí tham gia khoá học. \r\n\r\n* Tiện ích phong phú:  \r\nTiện ích tòa nhà: Lựa chọn nơi toạ lạc tốt nhất, chất lượng hạng A để đảm bảo đời sống của nhân viên.   \r\nVăn phòng làm việc: Theo đúng tiêu chuẩn văn phòng quốc tế với đầy đủ trang thiết bị và các tiện ích phục vụ cho công việc. Có thể đề xuất các thiết bị riêng theo nhu cầu đề phù hợp với khối lượng công việc.  \r\nTiện ích văn phòng: Máy bán hàng tự động, máy pha cà phê, khu vực pantry, nơi đọc sách, khu tập yoga…cho nhân viên.  \r\n\r\n* Hoạt động đa dạng:  \r\nCâu lạc bộ thể thao: CLB Yoga; CLB cầu lông; CLB bóng đá.  \r\nHoạt động dành riêng cho khối IT: Programming - sân chơi dành cho các lập trình viên.   \r\nCác hoạt động văn hoá nội bộ: Lễ hội văn hóa Nhật Bản, Sinh nhật công ty, Gala tổng kết năm và chương trình khai xuân , Team-building ngoài trời, tri ân nhân viên, sinh nhật tháng, Chào mừng ngày Quốc tế Phụ nữ, ngày Phụ nữ Việt Nam, ngày tết Trung thu, ngày giáng sinh, Men’s Day...  \r\nCác hoạt động tinh thần: Happy time, Healthy time,…  \r\n\r\n3. LOCATION  \r\nTrụ sở chính: Toà nhà Ocean Park, số 1 Đào Duy Anh, phường Phương Mai, quận Đống Đa, Hà Nội \r\nChi nhánh Đà Nẵng: Toà Nhà Công ty Trực thăng Miền Trung, đường Nguyễn Văn Linh, phường Thạc Gián, quận Thanh Khê, Đà Nẵng \r\nChi nhánh Hồ Chí Minh: Hà Đô Airport Building, số 2 Hồng Hà, Phường 02, Tân Bình, Thành phố Hồ Chí Minh \r\nCông ty con: Cerulean Tower 7F, 26-1 Sakuragaoka-cho. Shibuya-ku, Tokyo, Japan"])</script><script>self.__next_f.push([1,"24:T170d,"])</script><script>self.__next_f.push([1,"1. GIỚI THIỆU CÔNG TY GMO-Z.COM RUNSYSTEM  \r\n\r\nGMO-Z.com RUNSYSTEM là công ty thuộc tập đoàn GMO Internet Nhật Bản với hơn 100 công ty thành viên có mặt tại 20 quốc gia trên toàn thế giới và có cổ phiếu niêm yết tại
