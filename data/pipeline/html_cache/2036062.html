á trị cho cổ đông."])</script><script>self.__next_f.push([1,"24:T8dd,"])</script><script>self.__next_f.push([1,"Ngân hàng TMCP Đại Chúng Việt Nam (PVcomBank) được thành lập theo Quyết định số 279/GP-NHNN ngày 16/09/2013 của Ngân hàng Nhà nước Việt Nam trên cơ sở hợp nhất giữa Tổng công ty Tài chính cổ phần Dầu khí Việt Nam (PVFC) và Ngân hàng TMCP Phương Tây (WesternBank). Ngày 01/10/2013, PVcomBank chính thức hoạt động trên cơ sở Giấy chứng nhận đăng ký doanh nghiệp công ty cổ phần do Sở Kế hoạch và Đầu tư thành phố Hà Nội cấp. \r\nNgân hàng Thương mại cổ phần Đại Chúng Việt Nam - PVcomBank có tổng tài sản đạt gần 100.000 tỷ đồng, vốn điều lệ 9.000 tỷ đồng, trong đó cổ đông lớn là Tập đoàn Dầu khí Việt Nam (chiếm 52%) và cổ đông chiến lược Morgan Stanley (6,7%). Với mạng lưới 108 điểm giao dịch tại các tỉnh thành trọng điểm trên toàn quốc; nguồn nhân lực chất lượng cao và bề dày kinh nghiệm trong cung cấp các dịch vụ cho các doanh nghiệp trong ngành Dầu khí, năng lượng, hạ tầng; PVcomBank cung cấp các sản phẩm dịch vụ đa dạng đáp ứng đầy đủ các nhu cầu của khách hàng tổ chức và cá nhân.  \r\nVới khẩu hiệu hành động “Ngân hàng không khoảng cách”, PVcomBank hướng tới việc xây dựng hình ảnh một Ngân hàng gần gũi, thân thiện, tận tụy, vì sự thành công của khách hàng. Chúng tôi cam kết sẽ phấn đấu trở thành Ngân hàng chuẩn mực trong cung cấp dịch vụ; với phong cách thân thiện, lấy lợi ích của khách hàng – đối tác làm mục tiêu hành động, xây dựng thương hiệu PVcomBank luôn gắn với phương châm hành động xuyên suốt: Ngân hàng không khoảng cách!\r\nPVcomBank đang từng bước khẳng định uy tín và thương hiệu trên thị trường tài chính tiền tệ, cung cấp các dịch vụ chất lượng cao, tạo ra sự khác biệt trong phong cách phục vụ; đồng thời thực hiện tốt trách nhiệm xã hội của doanh nghiệp, mang lại lợi ích cho cộng đồng và gia tăng giá trị cho cổ đông."])</script><script>self.__next_f.push([1,"25:Tfa2,"])</script><script>self.__next_f.push([1,"1. CHẾ ĐỘ LƯƠNG, THƯỞNG\r\nChế độ lương:\r\n•\tLương và phụ cấp của CBNV được quyết định dựa trên phạm vi trách nhiệm, vai trò, năng lực và thành tích công tác của chính bản thân CBNV cũng như kết quả kinh doanh, chính sách và chiến lược của Ngân hàng.\r\n•\tLương và phụ cấp của CBNV được đảm bảo công bằng về mặt nội bộ và cạnh tranh so với thị trường lao động nhằm thu hút, động viên và giữ những CBNV có năng lực thực sự và gắn bó lâu dài với Ngân hàng.\r\nChế độ chi lương bổ sung:\r\n•\tCăn cứ kết quả hoạt động kinh doanh của Ngân hàng và quyết định của cấp có thẩm quyền, Ngân hàng sẽ xem xét việc chi lương bổ sung cho CBNV vào các dịp lễ, tết.\r\n•\tCác CBNV có thành tích trong các phong trào thi đua được khen thưởng động viên và khuyến khích kịp thời nhằm động viên đúng lúc kịp thời và nhân rộng gương cá nhân điển hình tiên tiến toàn PVCB.\r\nCác khoản phụ cấp:\r\n•\tNgoài chế độ lương cạnh tranh, thu hút, cán bộ nhân viên PVcomBank còn được hưởng các chế độ phụ cấp nhằm góp phần bù đắp kịp thời, tương xứng sức lao động, sự đóng góp của nhân viên như phụ cấp ăn trưa, phụ cấp điện thoại, phụ cấp độc hại, phụ cấp thu hút, phụ cấp xăng xe, phụ cấp kiêm nhiệm …\r\n\r\n2. CHẾ ĐỘ BẢO HIỂM\r\n- Tại PVcomBank, tất cả cán bộ nhân viên chính thức đều được tham gia Bảo hiểm xã hội, Bảo hiểm y tế theo đúng quy định của Luật Lao động và Luật Bảo hiểm xã hội. Ngoài ra, căn cứ tình hình hoạt động kinh doanh hàng năm, PVcomBank xem xét mua bảo hiểm con người, tai nạn, bảo hiểm xe máy cho toàn thể cán bộ nhân viên với các mức khác nhau, phù hợp với từng vị trí làm việc\r\n\r\n3. CHẾ ĐỘ KHÁC\r\n- Hàng năm PVcomBank còn tổ chức khám sức khỏe định kỳ cho cán bộ nhân viên tại các bệnh viện có uy tín và chất lượng với các hạng mục khám đa dạng, phù hợp với từng vị trí làm việc. Tùy theo tình hình hoạt động kinh doanh của Ngân hàng, những cán bộ có thành tích trong các phong trào thi đua, các cán bộ đạt danh hiệu chiến sỹ thi đua cơ sở trở lên sẽ được ngân hàng mua Bảo hiểm sức khỏe toàn diện (PVI Care).\r\n - Ngoài ra, PVcomBank còn tổ chức cho cán bộ nhân viên đi tham quan, nghỉ mát, trang bị đồng phục cho cán bộ nhân viên.\r\n\r\n4. HOẠT ĐỘNG PHONG TRÀO TẠI PVCOMBANK\r\n- Tổ chức công đoàn tại PVcomBank luôn thực hiện tốt và phát huy hiệu quả vai trò của mình, đem lại những lợi ích thiết thực cho Ngân hàng cũng như người lao động, đảm bảo thực hiện đúng, đủ và tốt Thỏa ước lao động tập thể. Đồng thời tạo động lực cho Ngân hàng phát triển bền vững và xây dựng đội ngũ lao động vững mạnh, góp phần nâng cao sức cạnh tranh, uy tín, hình ảnh, thương hiệu của doanh nghiệp trên thị trường.\r\n+ Hoạt động về nguồn, tham quan dã ngoại, tổ chức phát phần thưởng cho con của CBNV có thành tích xuất sắc trong học tập - tặng quà dịp Tết thiếu nhi, Trung Thu được thực hiện tốt…\r\n+ Hàng năm, hưởng ứng và phát động tại PVCB phong trào “Giỏi việc nước – Đảm việc nhà” mà Công đoàn DKVN phát động, phong trào nữ PVCB “Giỏi chuyên môn – Tích cực phong trào…\r\n+ Tổ chức phong trào văn hóa, văn nghệ, thể thao nhằm nâng cao đời sống tinh thần và sức khỏe thể chất cho CBCNV…"])</script><script>self.__next_f.push([1,"28:T8dd,"])</script><script>self.__next_f.push([1,"Ngân hàng TMCP Đại Chúng Việt Nam (PVcomBank) được thành lập theo Quyết định số 279/GP-NHNN ngày 16/09/2013 của Ngân hàng Nhà nước Việt Nam trên cơ sở hợp nhất giữa Tổng công ty Tài chính cổ phần Dầu khí Việt Nam (PVFC) và Ngân hàng TMCP Phương Tây (WesternBank). Ngày 01/10/2013, PVcomBank chính thức hoạt động trên cơ sở Giấy chứng nhận đăng ký doanh nghiệp công ty cổ phần do Sở Kế hoạch và Đầu tư thành phố Hà Nội cấp. \r\nNgân hàng Thương mại cổ phần Đại Chúng Việt Nam - PVcomBank có tổng tài sản đạt gần 100.000 tỷ đồng, vốn điều lệ 9.000 tỷ đồng, trong đó cổ đông lớn là Tập đoàn Dầu khí Việt Nam (chiếm 52%) và cổ đông chiến lược Morgan Stanley (6,7%). Với mạng lưới 108 điểm giao dịch tại các tỉnh thành trọng điểm trên toàn quốc; nguồn nhân lực chất lượng cao và bề dày kinh nghiệm trong cung cấp các dịch vụ cho các doanh nghiệp trong ngành Dầ ết.\r\n•\tCác CBNV có thành tích trong các phong trào thi đua được khen thưởng động viên và khuyến khích kịp thời nhằm động viên đúng lúc kịp thời và nhân rộng gương cá nhân điển hình tiên tiến toàn PVCB.\r\nCác khoản phụ cấp:\r\n•\tNgoài chế độ lương cạnh tranh, thu hút, cán bộ nhân viên PVcomBank còn được hưởng các chế độ phụ cấp nhằm góp phần bù đắp kịp thời, tương xứng sức lao động, sự đóng góp của nhân viên như phụ cấp ăn trưa, phụ cấp điện thoại, phụ cấp độc hại, phụ cấp thu hút, phụ cấp xăng xe, phụ cấp kiêm nhiệm …\r\n\r\n2. CHẾ ĐỘ BẢO HIỂM\r\n- Tại PVcomBank, tất cả cán bộ nhân viên chính thức đều được tham gia Bảo hiểm xã hội, Bảo hiểm y tế theo đúng quy định của Luật Lao động và Luật Bảo hiểm xã hội. Ngoài ra, căn cứ tình hình hoạt động kinh doanh hàng năm, PVcomBank xem xét mua bảo hiểm con người, tai nạn, bảo hiểm xe máy cho toàn thể cán bộ nhân viên với các mức khác nhau, phù hợp với từng vị trí làm việc\r\n\r\n3. CHẾ ĐỘ KHÁC\r\n- Hàng năm PVcomBank còn tổ chức khám sức khỏe định kỳ cho cán bộ nhân viên tại các bệnh viện có uy tín và chất lượng với các hạng mục khám đa dạng, phù hợp với từng vị trí làm việc. Tùy theo tình hình hoạt động kinh doanh của Ngân hàng, những cán bộ có thành tích trong các phong trào thi đua, các cán bộ đạt danh hiệu chiến sỹ thi đua cơ sở trở lên sẽ được ngân hàng mua Bảo hiểm sức khỏe toàn diện (PVI Care).\r\n - Ngoài ra, PVcomBank còn tổ chức cho cán bộ nhân viên đi tham quan, nghỉ mát, trang bị đồng phục cho cán bộ nhân viên.\r\n\r\n4. HOẠT ĐỘNG PHONG TRÀO TẠI PVCOMBANK\r\n- Tổ chức công đoàn tại PVcomBank luôn thực hiện tốt và phát huy hiệu quả vai trò của mình, đem lại những lợi ích thiết thực cho Ngân hàng cũng như người lao động, đảm bảo thực hiện đúng, đủ và tốt Thỏa ước lao động tập thể. Đồng thời tạo động lực cho Ngân hàng phát triển bền vững và xây dựng đội ngũ lao động vững mạnh, góp phần nâng cao sức cạnh tranh, uy tín, hình ảnh, thương hiệu của doanh nghiệp trên thị trường.\r\n+ Hoạt động về nguồn, tham quan dã
