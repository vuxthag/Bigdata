ng, VPBank tập trung nỗ lực xây dựng một hình mẫu VPBanker lý tưởng với 04 phương diện phát triển toàn diện gồm: Thịnh vượng Thân trí, Thịnh vượng Tinh thần, Thịnh vượng Tài chính và Thịnh vượng Cộng đồng. Đây là sự cam kết từ VPBank trong chiến lược Home of Talents - đặt Con người làm trung tâm và không ngừng nỗ lực tạo những điều kiện thuận lợi để từng nhân viên có thể phát triển tốt nhất cùng ngân hàng. Đây cũng là một phần của chiến lược bền vững đưa VPBank trở thành doanh nghiệp kiểu mẫu đáng tin cậy, xây dựng một môi trường làm việc hiệu quả, nhân văn, thu hút nhân tài và phát triển mỗi VPBanker trở thành phiên bản tốt nhất của chính mình.\r\n\r\n1. Thịnh vượng Thân trí: Hai yếu tố “trí tuệ” và “thể chất” luôn song hành và bổ trợ cho nhau trong chân dung Con người Thịnh vượng. VPBank luôn chú trọng đến việc: \r\n•\tXây dựng một môi trường làm việc lành mạnh\r\n•\tChăm sóc sức khỏe, khích lệ tinh thần luyện tập thể thao của CBNV\r\n•\tĐề cao văn hóa học tập, phát triển kỹ năng, cổ vũ và hỗ trợ cho sự học trọn đời của từng nhân viên.\r\n\r\n2. Thịnh vượng Tinh thần: VPBank ý thức được tầm quan trọng của đời sống tinh thần, sức mạnh của những suy nghĩ tích cực và lợi ích của sự cân bằng về cảm xúc đối với từng nhân viên. VPBank tập trung nỗ lực để:\r\n•\tKiến tạo môi trường làm việc công bằng, cởi mở, nhân văn.\r\n•\tĐồng hành và chia sẻ với CBNV thông qua chính sách, chương trình chăm sóc CBNV và người thân.\r\n\r\n3. Thịnh vượng Tài chính: VPBank ý thức rằng một nền tảng tài chính vững chắc sẽ mang lại chất lượng cuộc sống tốt hơn cho các VPBanker. VPBank luôn đảm bảo: \r\n•\tXây dựng chính sách về lương, thưởng phúc lợi, lộ trình thăng tiến rõ ràng, hấp dẫn.\r\n•\tGhi nhận xứng đáng mọi nỗ lực và cống hiến của CBNV.\r\n\r\n4. Thịnh vượng Cộng đồng: Mỗi VPBanker là một phần của xã hội, những đóng góp, nỗ lực của chính bản thân các VPBanker sẽ góp phần thay đổi và tạo nên một xã hội tốt đẹp hơn. Từ phía tổ chức, VPBank luôn xem trọng và hành động để thực hiện:\r\n•\tTrách nhiệm của doanh nghiệp với cộng đồng và xã hội. \r\n•\tThường xuyên thực hiện những chương trình, sáng kiến nhằm góp phần giúp cho xã hội, đất nước ngày một giàu đẹp, văn minh hơn."])</script><script>self.__next_f.push([1,"24:T71e,\u003cp\u003e\u003cstrong\u003eThiết kế và Quản lý Nội dung Trình bày:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thiết kế slide trình bày cho các cuộc họp nội bộ và các sự kiện liên quan đến sản phẩm bảo hiểm nhân thọ, đảm bảo tính chuyên nghiệp và hấp dẫn.\u003c/p\u003e\u003cp\u003e- Phối hợp với các bộ phận liên quan để thu thập thông tin và yêu cầu về nội dung slide, đảm bảo thông tin chính xác và cập nhật.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhát triển và Triển khai Kế hoạch Truyền thông Nội bộ:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng và thực hiện các kế hoạch truyền thông nội bộ để cập nhật thông tin về sản phẩm bảo hiểm nhân thọ, bao gồm các chiến dịch thông tin định kỳ.\u003c/p\u003e\u003cp\u003e- Tạo và quản lý nội dung truyền thông nội bộ nhằm vinh danh cán bộ đạt kết quả tốt trong lĩnh vực bảo hiểm nhân thọ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý Sự kiện Nội bộ, thông qua việc phối hợp cùng bộ phận thúc đẩy bán:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Lên kế hoạch và tổ chức các sự kiện nội bộ nhằm vinh danh các cán bộ đạt thành tích xuất sắc trong bảo hiểm nhân thọ và các hoạt động nội bộ khác.\u003c/p\u003e\u003cp\u003e- Đảm bảo các sự kiện được tổ chức hiệu quả và đạt được mục tiêu truyền thông đề ra.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTheo dõi và Đánh giá Hiệu quả Truyền thông:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Theo dõi và đánh giá hiệu quả các hoạt động truyền thông nội bộ, thu thập phản hồi từ nhân viên và đề xuất cải tiến.\u003c/p\u003e\u003cp\u003e- Phân tích dữ liệu từ các hoạt động truyền thông để cải thiện chiến lược mạnh của những suy nghĩ tích cực và lợi ích của sự cân bằng về cảm xúc đối với từng nhân viên. VPBank tập trung nỗ lực để:\r\n•\tKiến tạo môi trường làm việc công bằng, cởi mở, nhân văn.\r\n•\tĐồng hành và chia sẻ với CBNV thông qua chính sách, chương trình chăm sóc CBNV và người thân.\r\n\r\n3. Thịnh vượng Tài chính: VPBank ý thức rằng một nền tảng tài chính vững chắc sẽ mang lại chất lượng cuộc sống tốt hơn cho các VPBanker. VPBank luôn đảm bảo: \r\n•\tXây dựng chính sách về lương, thưởng phúc lợi, lộ trình thăng tiến rõ ràng, hấp dẫn.\r\n•\tGhi nhận xứng đáng mọi nỗ lực và cống hiến của CBNV.\r\n\r\n4. Thịnh vượng Cộng đồng: Mỗi VPBanker là một phần của xã hội, những đóng góp, nỗ lực của chính bản thân các VPBanker sẽ góp phần thay đổi và tạo nên một xã hội tốt đẹp hơn. Từ phía tổ chức, VPBank luôn xem trọng và hành động để thực hiện:\r\n•\tTrách nhiệm của doanh nghiệp với cộng đồng và xã hội. \r\n•\tThường xuyên thực hiện những chương trình, sáng kiến nhằm góp phần giúp cho xã hội, đất nước ngày một giàu đẹp, văn minh hơn."])</script><script>self.__next_f.push([1,"44:{\"companyId\":35815,\"jobImageURLs\":\"$45\",\"jobVideoURLs\":null,\"companyName\":\"VPBank - Https://tuyendung.vpbank.com.vn/\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/89/11125541.png\",\"companySizeId\":\"\",\"companyProfile\":\"$46\",\"contactName\":\"Khối Quản Trị Nguồn Nhân Lực\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Khối Quản Trị Nguồn Nhân Lực - 89 Láng Hạ, Quận Đống Đa, Hà Nội\",\"allowRedirect\":1,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"https://images02.vietnamworks.com/companyprofile/VPBANK/vi/noi_lam_viec_hanh_phuc_nhat_2019_-2-02_1_.jpg\",\"companyProfileUrl\":\"https://www.vietnamworks.com/company/vpbank\",\"allowRedirectJobIds\":\"1957236\",\"profilePublishedSiteMask\":3,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companypro
