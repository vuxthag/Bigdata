nds-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T587,The Ben Line Group of companies is a leading privately owned marine agency and logistics services company in the Asia-Pacific region. The Ben Line name has been around the shipping industry for two centuries and we are celebrating our 200th anniversary in 2025. \r\n\r\nThrough a network of over 130 offices in 18 countries across the Asia Pacific region, the company provides a full range of liner agency services, marine agency services and integrated logistics services to many of the best-known names in the maritime and logistics industries. We have built a solid reputation over many years, based on integrity, consistency and competence.\r\n\r\nThe company is exclusively focused on managing and developing its activities in the Asia Pacific region. With our people being at the heart of what we offer, our managers have a wealth of experience in the business and adopt a totally hands on approach to ensure customer satisfaction a"])</script><script>self.__next_f.push([1,"t all times.\r\n\r\nWith our longstanding presence in the industry, the company has established strong relationships at all levels and across all sectors of the maritime industry. Our flat management structure, which encourages managers to adopt an entrepreneurial spirit, coupled with a traditional approach of nurturing long term business relationships, has created a unique company culture which has enabled the business to continue to grow and develop.\r\n\r\nWebsite\r\nhttps://benline.com/24:T19fb,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cem\u003eThe Vessel Operator – Marine Agency Services is responsible for the end-to-end coordination of bunker and husbandry calls for vessels calling at Singapore, while being based in our Ho Chi Minh City office. The role is functionally similar to that of a boarding agent in terms of scope and responsibility, but it is entirely shore-based and does not involve physically boarding vessels.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eYou will serve as the central point of contact for shipowners, charterers, managers, bunker traders, suppliers, and local port stakeholders, ensuring that all services are planned, executed, and closed out safely, efficiently, and in full compliance with Singapore port regulations and company standards.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Operational Planning \u0026 Coordination\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Coordinate all aspects of bunker-only and husbandry calls for vessels calling Singapore, from nomination to completion and final disbursement.\u003c/p\u003e\u003cp\u003e• Follow port call instructions, and client SOPs to ensure services are arranged as per principal expectations.\u003c/p\u003e\u003cp\u003e• Plan services in advance based on ETA, vessel schedule, terminal/anchorage allocation, and regulatory requirements.\u003c/p\u003e\u003cp\u003e• Prepare and distribute port call instructions to all relevant stakeholders (suppliers, launch/launch operators, crewing agents, etc.).\u003c/p\u003e\u003cp\u003e• Set up communication channels with PICs to ensure smooth and timely updates\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Bunker Call Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Arrange and coordinate bunkering operations at Singapore anchorage or berth in alignment with local regulations and industry best practices.\u003c/p\u003e\u003cp\u003e• Liaise with bunker suppliers, barge operators, and surveyors to confirm schedules, quantities, grades, sampling requirements, and safety procedures.\u003c/p\u003e\u003cp\u003e• Monitor bunkering progress in real time via communication with suppliers, surveyors, and the vessel’s designated contact.\u003c/p\u003e\u003cp\u003e• Record the vessel’s activities, noting times, actions and a full statement of facts.\u003c/p\u003e\u003cp\u003e• Ensure all bunker-related documentation (e.g., Bunker Delivery Notes, survey reports) is obtained, checked, and filed as per company and client requirements.\u003c/p\u003e\u003cp\u003e• Proactively identify and address potential issues affecting bunker operations (e.g., congestion, weather, supplier delays).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Husbandry Services Coordination\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Arrange all required husbandry services, including but not limited to:\u003c/p\u003e\u003cp\u003e• Crew changes, sign-on/sign-off, and repatriation arrangements\u003c/p\u003e\u003cp\u003e• Immigration, visa, and work permit documentation via trusted local partners\u003c/p\u003e\u003cp\u003e• Cash to Master (CTM), including coordination with local office (Boarding Officer), couriers, and launch services\u003c/p\u003e\u003cp\u003e• Medical assistance and hospital visits for crew, where required, through approved medical providers\u003c/p\u003e\u003cp\u003e• Delivery of provisions, bonded stores, cabin/engine stores, and spare parts\u003c/p\u003e\u003cp\u003e• Courier and logistics arrangements for documents and critical spares\u003c/p\u003e\u003cp\u003e• Coordinate with local agents and service providers in Singapore to ensure timely and compliant execution of all husbandry tasks.\u003c/p\u003e\u003cp\u003e• Confirm service completion and obtain all necessary receipts, delivery notes, and supporting documents.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Documentation \u0026 Regulatory Compliance\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Prepare and submit port call documentation through local office in line with the Maritime and Port Authority of Singapore (MPA) and other relevant regulations.\u003c/p\u003e\u003cp\u003e• Ensure that all declarations, manifests, crew lists, visas, and permits are accurate and submitted to the relevant authorities within required timeframes.\u003c/p\u003e\u003cp\u003e• Maintain up-to-date knowledge of Singapore port rules, bunkering regulations, immigration and quarantine requirements, and safety standards.\u003c/p\u003e\u003cp\u003e• Ensure full compliance with company policies, client requirements, and applicable international regulations (e.g., ISPS, MARPOL, local anti-corruption rules).\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Communication \u0026 Stakeholder Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Act as the primary 24/7 operational contact (within shift or duty arrangements) for assigned vessel calls.\u003c/p\u003e\u003cp\u003e• Maintain clear, professional, and proactive communication with:\u003c/p\u003e\u003cp\u003e• Principals (owners, charterers, managers, operators)\u003c/p\u003e\u003cp\u003e• Local office and port authorities in Singapore\u003c/p\u003e\u003cp\u003e• Bunker suppliers and surveyors\u003c/p\u003e\u003cp\u003e• Crewing agencies, medical providers, and logistics partners\u003c/p\u003e\u003cp\u003e• Provide regular status updates, ETA/ETD changes, and operational reports to clients and internal stakeholders.\u003c/p\u003e\u003cp\u003e• Escalate significant operational risks, delays, incidents, or disputes promptly to line management.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Financial Control \u0026 Disbursements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Prepare Proforma Disbursement Accounts (PDA) based on service estimates and tariffs; obtain client approval where required.\u003c/p\u003e\u003cp\u003e• Monitor and control costs for each port call, ensuring services are within agreed budgets and in line with commercial expectations.\u003c/p\u003e\u003cp\u003e• Validate supplier invoices, ensure they match agreed rates and services performed, and flag discrepancies for resolution.\u003c/p\u003e\u003cp\u003e• Prepare and finalize Final Disbursement Accounts (FDA) with full supporting documentation for client review and settlement.\u003c/p\u003e\u003cp\u003e• Support credit control and cash collection efforts by providing accurate billing information and clarifications.\u003c/p\u003e\u003cp\u003e• Support Accounting team in resolving overdue and long-aging payments.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Systems, Reporting \u0026 Data Integrity\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Record all operational details, service orders, timings, and communications in the company’s agency/operations systems (Port360)\u003c/p\u003e\u003cp\u003e• Maintain complete and accurate port call files (digital) for ISO audit and reference.\u003c/p\u003e\u003cp\u003e• Produce operational performance reports, KPIs, and incident reports as required (e.g., delays, near misses, service failures).\u003c/p\u003e\u003cp\u003e• Contribute to the continuous improvement of system performance, processes, SOPs, and documentation standards.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Duty / On-Call Support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Participate in duty or on-call rosters to support urgent or off-hours operation requirements.\u003c/p\u003e\u003cp\u003e• Respond es.\u003c/p\u003e\u003cp\u003e• High level of integrity and professionalism; strictly adheres to anti-corruption and compliance standards.\u003c/p\u003e\u003cp\u003e• Strong team player, willing to support colleagues and share knowledge across offices and functions.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Working Conditions:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Based in our Ho Chi Minh City office; no vessel boarding is required for this role.\u003c/p\u003e\u003cp\u003e• Standard office hours with the expectation of flexibility to support time-critical operations, including evenings, weekends, and public holidays when on duty or when operationally necessary. \u003c/p\u003e\u003cp\u003e• High email and phone traffic environment, requiring fast response times and strong multitasking capability.\u003c/p\u003e\u003cp\u003e• Occasional travel for training, regional meetings, or short assignments may be required.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. What We Offer\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Opportunity to work with an international portfolio of shipowners, managers, traders, and maritime service providers.\u003c/p\u003e\u003cp\u003e• Exposure to complex maritime operations and the dynamic Singapore port environment while based in Vietnam.\u003c/p\u003e\u003cp\u003e• Professional, collaborative work environment with supportive leadership and experienced colleagues.\u003c/p\u003e\u003cp\u003e• Structured training and onboarding on company systems, procedures, and Singapore port requirements.\u003c/p\u003e\u003cp\u003e• Competitive salary and benefits package commensurate with experience and qualifications.\u003c/p\u003e\u003cp\u003e• Career development opportunities within the wider Marine Agency Services organization.\u003c/p\u003e"])</script><script>self.__next_
