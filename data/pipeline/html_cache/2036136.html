strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Customer Service \u0026 Booking\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Receive and process booking requests from freight forwarders and direct customers.\u003c/p\u003e\u003cp\u003e• Coordinate with Space Control and Sales to arrange optimal capacity allocation.\u003c/p\u003e\u003cp\u003e• Provide accurate and timely information on shipment status, proactively update customers in case of irregularities.\u003c/p\u003e\u003cp\u003e• Handle invoicing accuracy, verify rates, and support in resolving rate disputes.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Operations \u0026 Documentation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Ensure smooth handling of shipments to minimize delays, damages, or service issues.\u003c/p\u003e\u003cp\u003e• Support cargo claim processes by collecting necessary documents.\u003c/p\u003e\u003cp\u003e• Manage AWB stock and maintain proper records.\u003c/p\u003e\u003cp\u003e• Work closely with ground handling agents and stations to maintain service quality.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Sales Support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Support Cargo Manager and team in developing customer relationships and promoting airline capacity.\u003c/p\u003e\u003cp\u003e• Contribute to brand visibility by providing excellent service and feedback from customers.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Teamwork \u0026 Reporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Report regularly to Cargo Sales Manager on booking performance, service issues, and market feedback.\u003c/p\u003e\u003cp\u003e• Collaborate effectively with colleagues in HAN, SGN, and international stations.\u003c/p\u003e\u003cp\u003e• Participate in ad-hoc projects assigned by management.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Ta50,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eAbout Us\
