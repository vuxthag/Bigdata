. We’ll work together to create best-in-class, high performing teams focusing on development, alignment and one-way, same-way approach. We want to create ideas, elevate talent and capabilities and grow together to create our future of work and workplace.\r\n\r\nIt’s more than just a career!\r\nWe believe in people with ideas and dreams, and we want you to achieve your aspirations. More than just a career, NAB Vietnam offers you the flexibility to balance your work – life, the opportunity to grow as professionals and people, and a complete set of wellbeing offerings. If you have an appetite to learn, grow and elevate others around you, this is the place for you!24:T943,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eABOUT THE JOB\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Associate, Social Insurance and Benefits delivery is responsible for ensuring accurate and timely execution of statutory insurance compliance (SHUI) and delivering employee benefits programs. This role plays a critical part in maintaining regulatory compliance, enhancing employee experience, and supporting sufficient HR Operations processes.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYOUR JOB RESPONSIBILITIES\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA. Social Insurance-Health Insurance-Unemployment Insurance Compliance (SHUI Insurance)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tManage end-to-end administration of SHUI (Social, Health, Unemployment Insurance) in compliance with Vietnamese regulations \u003c/p\u003e\u003cp\u003e•\tPrepare and submit monthly SHUI declarations accurately and on time \u003c/p\u003e\u003cp\u003e•\tHandle employee registration, amendments, and de-registration (new joiners, transfers, terminations) \u003c/p\u003e\u003cp\u003e•\tMonitor and reconcile SHUI contributions, ensuring alignment with payroll data \u003c/p\u003e\u003cp\u003e•\tLiaise with relevant authorities and external vendors on SHUI matters \u003c/p\u003e\u003cp\u003e•\tStay updated on regulatory changes and ensure timely implementation within the organization \u003c/p\u003e\u003cp\u003e•\tSupport internal/external audits by providing required documentation and explanations \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB. Annual Health Check-Up \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCoordinate the annual health check-up program for employees \u003c/p\u003e\u003cp\u003e•\tWork with vendors to arrange schedules, logistics, and service delivery \u003c/p\u003e\u003cp\u003e•\tEnsure employee participation tracking and proper documentation \u003c/p\u003e\u003cp\u003e•\tManage communication to employees regarding Annual Health Check- Up schedules, requirements, and results \u003c/p\u003e\u003cp\u003e•\tMonitor service quality and vendor performance \u003c/p\u003e\u003cp\u003e•\tSupport reporting and insights related to employee health trends (if required) \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. Benefits Delivery\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAdminister employee benefits programs (e.g., health insurance, team engagement budget, long services awards etc…) \u003c/p\u003e\u003cp\u003e•\tHandle employee queries related to benefits in a timely and professional manner \u003c/p\u003e\u003cp\u003e•\tCoordinate with vendors and internal stakeholders to ensure smooth benefits delivery \u003c/p\u003e\u003cp\u003e•\tMaintain accurate benefits records and documentation \u003c/p\u003e\u003cp\u003e•\tSupport benefits enrollment, renewal, and claims processes \u003c/p\u003e\u003cp\u003e•\tOther tasks as assigned by People Manager\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T836,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYOUR SKILLS \u0026 EXPERIENCE \u003c/strong\u003e\u003c/
