u003c/p\u003e\u003cp\u003e- Xác định và phát triển “gu thẩm mỹ” đặc trưng của Aristino.\u003c/p\u003e\u003cp\u003e- Xây dựng hệ thống nhận diện hình ảnh (visual guideline) đồng bộ trên mọi kênh.\u003c/p\u003e\u003cp\u003e- Đảm bảo tính nhất quán trong trải nghiệm thương hiệu tại các điểm chạm (sản phẩm, VM, truyền thông…).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4. Phối hợp triển khai Marketing \u0026 Campaign:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Phối hợp với Marketing xây dựng concept cho các chiến dịch lớn trong năm.\u003c/p\u003e\u003cp\u003e- Định hướng nội dung hình ảnh, key message cho truyền thông.\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng chiến lược hợp tác KOLs/Brand Ambassador phù hợp với định vị thương hiệu.\u003c/p\u003e\u003cp\u003e- Đảm bảo sự đồng bộ giữa sản phẩm - hình ảnh - truyền thông.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e5. Phát triển dự án \u0026 nền tảng mới:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Dẫn dắt các dự án phát triển mới.\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e- Tìm kiếm và ứng dụng xu hướng thiết kế, chất liệu, công nghệ mới vào sản phẩm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e6. Nghiên cứu \u0026 phát triển thương hiệu:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng chiến lược định vị thương hiệu rõ ràng, khác biệt.\u003c/p\u003e\u003cp\u003e- Phát triển storytelling và giá trị cốt lõi của thương hiệu.\u003c/p\u003e\u003cp\u003e- Đề xuất các chiến lược phát triển thương hiệu dài hạn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e7. Quản lý đội ngũ sáng tạo:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng, dẫn dắt và phát triển đội ngũ thiết kế.\u003c/p\u003e\u003cp\u003e- Phân công công việc, kiểm soát tiến độ và chất lượng.\u003c/p\u003e\u003cp\u003e- Đào tạo và nâng cao năng lực sáng tạo cho team.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e8. Các công việc khác theo phân công của BGĐ.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tb8d,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Trình độ học vấn từ Đại học trở lên, chuyên ngành Thiết kế/Kỹ thuật.\u003c/p\u003e\u003cp\u003e- Kinh nghiệm tối thiểu 5 năm tại vị trí tương đương.\u003c/p\u003e\u003cp\u003e- Tạo ra được các thông lệ, cách thức giải quyết vấn đề trong công việc để nhân viên noi theo.\u003c/p\u003e\u003cp\u003e- Phân tích, sử dụng nhiều thông tin, dữ liệu, số liệu để khẳng định quan điểm, cách thức của mình khi làm việc, thuyết phục với nhân viên cũng như các đối tác khác.\u003c/p\u003e\u003cp\u003e- Có khả năng làm cho nhân viên tin tưởng, tự động triển khai công việc của mình và các công việc liên quan của bộ phận.\u003c/p\u003e\u003cp\u003e- Tìm kiếm được những nhân sự phù hợp với các vị trí trong bộ phận mình quản lý.\u003c/p\u003e\u003cp\u003e- Hiểu sở thích và cá tính, và năng lực của từng nhân viên.\u003c/p\u003e\u003cp\u003e- Sử dụng người đúng chỗ, đúng năng lực, có thể làm cho cá nhân phát huy hết năng lực của mình.\u003c/p\u003e\u003cp\u003e- Gắn kết được mọi người trong bộ phận làm tốt công việc của mình.\u003c/p\u003e\u003cp\u003e- Xây dựng mục tiêu của bộ phận dựa trên mục tiêu của Công ty và tạo sự đồng lòng của nhân viên hướng tới mục tiêu của bộ phận.\u003c/p\u003e\u003cp\u003e- Lập, triển khai được các kế hoạch hoàn chỉnh. Biết cách tập trung vào những mục tiêu quan trọng. Xác định được thời gian, mức độ phức tạp và các nguồn lực để hoàn thành kế hoạch đúng cam kết.\u003c/p\u003e\u003cp\u003e- Giám sát thường xuyên và phát hiện các vấn đề phát sinh và có hành động kịp thời nhằm tránh được những kết quả không mong muốn.\u003c/p\u003e\u003cp\u003e- Hướng dẫn, đào tạo cho nhân viên cấp dưới về phương pháp học hỏi, phát triển năng lực.\u003c/p\u003e\u003cp\u003e- Đưa ra những phản hồi, chỉ dẫn kịp thời, mang tính xây dựng để nâng cao năng lực và tính chủ động của nhân viên.\u003c/p\u003e\u003cp\u003e- Tìm hiểu và nắm được mục tiêu nghề nghiệp của nhân viên. Khuyến khích nhân viên của mình tham gia những chương trình đào tạo cần thiết để phát triển năng lưc.\u003c/p\u003e\u003cp\u003e- Vận dụng được các cách thức khác nhau để khuyến khích, động viên nhân viên làm việc tốt.\u003c/p\u003e\u003cp\u003e- Nhận biết và đáp đứng được nhu cầu giao lưu, học hỏi, phát triển, được qúy mến và các nhu cầu xã hội khác.\u003c/p\u003e\u003cp\u003e- Hiểu được lợi ích và ảnh hưởng của sự thay đổi. Chủ động phát hiện và thích nghi nhanh chóng với mọi sự thay đổi.\u003c/p\u003e\u003cp\u003e- Dự đoán trước và sẵn sàng cho các thay đổi cần thiết.\u003c/p\u003e\u003cp\u003e- Chủ động thay đổi cho cá nhân, tạo cơ sở cho quá trình thay đổi diễn ra nhanh chóng và hiệu quả mà không bị giảm năng suất.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"27:Td07,"])</script><script>self.__next_f.push([1,"\u003cp\u003e- Xây dựng và dẫn dắt định hướng sáng tạo tổng thể cho thương hiệu Aristino.\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\t\u003c/p\u003e\u003cp\u003e- Đảm bảo sản phẩm phát triển đúng định vị và đạt được vị thế đã định trên thị trường.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1. Định hướng sáng tạo \u0026 chiến lược sản phẩm:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng định hướng sáng tạo tổng thể theo mùa vụ (Xuân - Hè, Thu - Đông) và các dòng sản phẩm chiến lược.\u003c/p\u003e\u003cp\u003e- Hoạch định cơ cấu hàng hóa (category, chất liệu, kiểu dáng) phù hợp với định vị thương hiệu và insight khách hàng.\u003c/p\u003e\u003cp\u003e- Định hướng conce
