c/strong\u003eđược xét duyệt đề bạt lên quản lý cụm hoặc chuỗi nếu thể hiện được năng lực\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e*** Chi tiết công việc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tKinh doanh \u0026 Phát triển cộng đồng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tLập và thực hiện kế hoạch kinh doanh tháng/quý/năm cho tổ hợp.\u003c/p\u003e\u003cp\u003e-\tTối ưu hóa tỷ lệ lấp đầy ( sân pick+ phòng golf) và điều phối hệ thống booking tránh chồng chéo, tối ưu doanh thu.\u003c/p\u003e\u003cp\u003e-\tXây dựng  và đề xuất chính sách giá và các gói thẻ tập với HLV ( Pick+ gym+ golf) gia tăng doanh thu trên một khách hàng \u003c/p\u003e\u003cp\u003e-\tXây dựng cộng đồng hội viên: \u003c/p\u003e\u003cp\u003eo\tKết nối với các cộng đồng cư dân tại khu vực Long Biên, hiệp hội doanh nghiệp, nhãn hàng, nhà tài trợ để tổ chức các giải đấu giao lưu thu hút khách hàng tới trải nghiệm và gia tăng nhận diện thương hiệu cho câu lạc bộ \u003c/p\u003e\u003cp\u003eo\tTổ chức các chương trình giao lưu nội bộ cho các hội viên câu lạc bộ để gia tăng tỷ lệ lấp đầy và gắn kết cộng đồng hội viên\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tQuản trị vận hành và dịch vụ khách hàng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThiết lập, triển khai và giám sát bộ tiêu chuẩn SOP vận hành cho cả 3 mảng: Pickleball, Fitness và Golf 3D.\u003c/p\u003e\u003cp\u003e-\tThực hiện kiểm tra hiện trường (Daily Walk-through) ít nhất 3 lần/ngày để đảm bảo cơ sở vật chất, vệ sinh và tác phong nhân sự luôn ở mức cao nhất.\u003c/p\u003e\u003cp\u003e-\tXây dựng bản đồ hành trình khách hàng, đảm bảo sự tinh tế trong từng điểm chạm từ bước tiếp đón đến quá trình sử dụng dịch vụ tại Câu lạc bộ\u003c/p\u003e\u003cp\u003e-\tTrực tiếp xử lý các khiếu nại, sự cố tại CLB với thái độ chuyên nghiệp, giữ vững hình ảnh thương hiệu.\u003c/p\u003e\u003cp\u003e-\tGhi nhận và phân tích phản hồi từ khách hàng để điều chỉnh quy trình dịch vụ hoặc nâng cấp dịch vụ (F\u0026B, khăn lạnh, khu vực tắm sạch sẽ,…) hoặc đào tạo lại kỹ năng sales/ chăm sóc khách hàng cho đội ngũ sales/ HLV/ CSKH\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tQuản trị nhận sự và tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTuyển dụng nhân sự theo định biên và đảm bảo số lượng/ chất lượng nhân sự trong quá trình hoạt động\u003c/p\u003e\u003cp\u003e-\tLên khung chương trình đào tạo. Phối hợp với các trưởng bộ phận chuyên môn trực tiếp đào tạo kỹ năng/ nghiệp vụ chuyên môn cho nhân sự\u003c/p\u003e\u003cp\u003e-\tĐánh giá KPIs hiệu suất nhân sự để kịp thời đưa ra phương án nhân sự phù hợp kịp thời ( tái đào tạo, kỷ luật, sa thải, khen thưởng, đề bạt)\u003c/p\u003e\u003cp\u003e-\tXây dựng định mức và kiểm soát chi phí vân hành\u003c/p\u003e\u003cp\u003e-\tPhân tích báo cáo quản trị để đề xuất các kế hoạch hành động, chương trình/ chính sách để tối ưu  lợi nhuận và dòng tiền đạt được mục tiêu tài chính được giao\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tQuản trị tuân thủ SOP\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tThiết lập và triển khai bộ SOP vận hành cho Câu lạc bộ\u003c/p\u003e\u003cp\u003e-\tTrực tiếp đào tạo, hướng dẫn nhân viên hiểu rõ \"Tại sao\" phải tuân thủ SOP để đảm bảo tính đồng bộ về chất lượng công việc, dịch vụ và trải nghiệm khách hàng.\u003c/p\u003e\u003cp\u003e-\tThực hiện Daily Walk-through (đi kiểm tra hiện trường) theo checklist tối thiểu 3 lần/ngày để đảm bảo mọi quy trình được tuân thủ 100%.\u003c/p\u003e\u003cp\u003e-\tRà soát và cập nhật cải tiến SOP để tối ưu hóa hiệu quả công việc. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T831,"])</script><script>self.__next_f.push([1,"\u003cp\
