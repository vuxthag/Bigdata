eo cách riêng của mình. Từ thực tập sinh đến quản lý cấp cao, mọi thành viên đều có cơ hội được lắng nghe, thử sức và tạo nên dấu ấn riêng.\r\n\r\n04 Giá trị cốt lõi - Nền tảng văn hóa doanh nghiệp tại SAPP:\r\n\r\n- Chính trực (Integrity): Công bằng, trung thực và thẳng thắn trong các mối quan hệ trong và ngoài doanh nghiệp.\r\n- Tận tâm (Dedication): Sự sẵn sàng hy sinh, dành thời gian và tâm huyết để phát triển con người.\r\n- Hòa nhập (Integrate): Ghi nhận và trân trọng giá trị của sự đa dạng và không có hành vi phân biệt đối xử.\r\n- Tạo giá trị (Value): Luôn tạo ra các sản phẩm, mối quan hệ có ý nghĩa và phù hợp với đối tượng khách hàng nhằm hỗ trợ họ giải quyết các nhu cầu và vấn đề.\r\n\r\nVới môi trường trẻ trung, năng động và đề cao sự chủ động, SAPP là điểm đến lý tưởng cho những người trẻ khát khao phát triển bản thân, đóng góp giá trị thực và đồng hành cùng tổ chức kiến tạo tương lai của ngành đào tạo tài chính – kế toán tại Việt Nam.\r\n\r\nMời bạn tìm hiểu thông tin chi tiết về SAPP Academy tại website: https://sapp.edu.vn/"])</script><script>self.__next_f.push([1,"24:T9b6,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Phân tích nhu cầu đào tạo \u0026 rào cản học tập (10%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Nghiên cứu nhu cầu học tập của nhân sự nội bộ theo khung năng lực.\u003c/p\u003e\u003cp\u003e• Phân tích chuẩn mức đầu ra để đảm bảo tính ứng dụng và hiệu quả đào tạo.\u003c/p\u003e\u003cp\u003e• Phân tích chuẩn mực hàng đầu, nhằm tuân thủ các hướng dẫn chiến lược và định hướng chi tiết về thiết kế sản phẩm.\u003c/p\u003e\u003cp\u003e• Xác định rào cản học tập trong môi trường offline để tối ưu hóa trải nghiệm người học.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Thiết kế chương trình \u0026 nội dung đào tạo trực tiếp (offline) và trực tuyến (online) (70%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Áp dụng Quy trình thiết kế giáo dục (ADDIE), Tư duy thiết kế ngược (Backward design) và Khung thiết kế giáo dục toàn cầu (UDL) nhằm nâng cao động lực, thúc đẩy quá trình tiếp thu kiến thức, và hình thành chiến lược học tập hiệu quả cho người học.\u003c/p\u003e\u003cp\u003e• Xây dựng tài liệu đào tạo, bài giảng (slides, handouts, bài tập nhóm, case study, …).\u003c/p\u003e\u003cp\u003e• Thiết kế hoạt động đào tạo offline nhằm tối ưu hóa sự tham gia của người học (workshop, simulation, coaching…).\u003c/p\u003e\u003cp\u003e• Phối hợp với giảng viên và chuyên gia nội bộ để đảm bảo nội dung bám sát thực tiễn và nhu cầu công việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Điều phối triển khai chương trình đào tạo trực tiếp (offline) và trực tuyến (online) (10%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Hỗ trợ giảng viên trong quá trình giảng dạy, đảm bảo trải nghiệm học tập mượt mà.\u003c/p\u003e\u003cp\u003e• Chuẩn bị tài liệu, không gian đào tạo, thiết bị hỗ trợ cho lớp học trực tiếp.\u003c/p\u003e\u003cp\u003e• Theo dõi quá trình học tập và thu thập phản hồi từ người học để tối ưu hóa nội dung và phương pháp giảng dạy.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Đánh giá \u0026 cải tiến chương trình đào tạo trực tiếp (offline) và trực tuyến (online) (10%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thu thập phản hồi của người học, giảng viên và các bên liên quan.\u003c/p\u003e\u003cp\u003e• Phân tích dữ liệu đào tạo, đo lường mức độ hiệu quả và đề xuất cải tiến.\u003c/p\u003e\u003cp\u003e• Cập nhật nội dung đào tạo theo xu hướng mới và nhu cầu thực tế của tổ chức.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T5f5,\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên tốt nghiệp các chuyên ngành về:\u003c/p\u003e\u003cp\u003e- Quản lý giáo dục, Sư phạm, Giáo dục học\u003c/p\u003e\u003cp\u003e- Nhân sự, Quản trị nguồn nhân lực \u003c/p\u003e\u003cp\u003e- Truyền thông, Báo chí, Ngôn ngữ học\u003c/p\u003e\u003cp\u003e- Kinh tế, Quản trị kinh doanh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Từ 2 năm kinh nghiệm trong các lĩnh vực liên quan đến:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Thiết kế chương trình đào tạo / nội dung đào tạo tại các tổ chức/doanh nghiệp.\u003c/p\u003e\u003cp\u003e- L\u0026D (Learning \u0026 Development), đào tạo nội bộ, phát triển nhân tài trong doanh nghiệp\u003c/p\u003e\u003cp\u003e- Giáo dục, đào tạo, giảng dạy hoặc làm việc trong các trung tâm đào tạo, trường học.\u003c/p\u003e\u003cp\u003e- Tổ chức sự kiện đào tạo, điều phối lớp học (nếu có liên quan đến triển khai đào tạo offline).\u003c/p\u003e\u003cp\u003e- Hiểu biết hoặc đã làm việc với LMS (Learning Management System) hoặc các công cụ hỗ trợ đào tạo trực tuyến\u003c/p\u003e\u003cp\u003e- Ưu tiên ứng viên có kinh nghiệm tham gia hoặc triển khai các dự án liên quan đến Talent Development, bao gồm xây dựng lộ trình phát triển nhân tài (career path), kế hoạch kế nhiệm (succession planning) hoặc các chương trình phát triển nhóm nhân sự tiềm năng; có khả năng liên kết hoạt động đào tạo với mục tiêu phát triển dài hạn của tổ chức. \u003c/p\u003e26:T9d0,"])</script><script>self.__next_f.push([1,"SAPP Edu là hệ thống đào tạo học thuật tiên phong tại Việt Nam trong lĩnh vực tài chính - kế toán - kiểm toán, được thành lập từ năm 2014. Trải qua hơn 10 năm phát triển, SAPP đã xây dựng mạng lưới đào tạo chuyên sâu tại Hà Nội và TP.HCM với 4 cơ sở đào tạo, quy tụ hơn 150 nhân sự chính thức cùng 100+ giảng viên là các chuyên gia đầu ngành, sở hữu những chứng chỉ quốc tế uy tín như ACCA, CFA, CMA, IFRS,CGMA.\r\n\r\nVới mô hình học viện chuyên biệt dành cho người đi làm và sinh viên ưu tú, SAPP mang đến các chương trình đào tạo chuẩn quốc tế, kết hợp công nghệ EdTech hiện đại, giúp học viên tối ưu hóa thời gian, nâng cao năng lực chuyên môn và sẵn sàng hội nhập vào thị trường lao động toàn cầu.\r\n\r\nKhông chỉ là nơi học tập, SAPP còn là môi trườn
