ạo:\nTrường ĐH Nguyễn Tất Thành với triết lý giáo dục “Thực học –Thực hành – Thực danh – Thực nghiệp”\nNhà trường theo quan điểm lấy người học làm trung tâm, từ đó nêu ra triết lý giáo dục của trường là “Thực học – Thực hành – Thực danh – Thực nghiệp”. Nhà trường tin rằng: “Người học hình thành năng lực thông qua môi trường học thuật được tạo lập và gắn kết với doanh nghiệp trong các hoạt động nghiên cứu, ứng dụng và phục vụ cộng đồng. Việc trải nghiệm trong môi trường thực tiễn giúp người học khám phá kiến thức, phát triển kỹ năng, định hướng tương lai, hình thành mong muốn đóng góp cho cộng đồng và tạo dựng uy tín cá nhân bằng sự chuyên nghiệp và đạo đức nghề nghiệp”.\n\n6. Định hướng phát triển\nĐến năm 2020 Trường ĐH Nguyễn Tất Thành trở thành trường đại học ứng dụng thực hành, đạt chuẩn quốc gia và có uy tín trong nước và quốc tế.\nTrở thành một trong số những trường đại học thuộc top 50 của Asean\nMột số ngành/lĩnh vực đạt top 500 của châu Á, từng bước sánh vai với các trường đại học tiên tiến của khu vực và thế giới.\nĐạt chuẩn quốc tế QS Stars Anh Quốc 4 sao\nVào top 300 các trường đại học Châu Á với chú trọng về các lĩnh vực chất lượng do QS quy định như sau:\n            + Chất lượng nghiên cứu (Research quality)\n            + Chất lượng giảng dạy (Teaching Quality)\n            + Mức độ quốc tế hóa (Internationalisation)"])</script><script>self.__next_f.push([1,"24:T64e,\u003cp\u003e- Quản lý lịch công tác cho Hiệu trưởng.\u003c/p\u003e\u003cp\u003e      Báo lịch công tác hàng ngày cho Hiệu trưởng\u003c/p\u003e\u003cp\u003e      Sắp xếp lịch làm việc của Hiệu trưởng với đối tác bên trong và ngoài trường.\u003c/p\u003e\u003cp\u003e- Tiếp khách.\u003c/p\u003e\u003cp\u003e      Đón tiếp khách đến làm việc;\u003c/p\u003e\u003cp\u003e      Các nội dung liên quan khác.\u003c/p\u003e\u003cp\u003e- Tạo hồ sơ, văn bản hành chính.\u003c/p\u003e\u003cp\u003e      Soạn biên bản họp cho các cuộc họp của Hiệu trưởng;\u003c/p\u003e\u003cp\u003e      Lập dự trù kinh phí
