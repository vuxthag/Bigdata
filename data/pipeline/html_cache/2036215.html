efault\"]\n23:T709,About Us:\r\n\r\nIn 2013, Article was founded in Vancouver, Canada, with a mission to create a better furniture experience — one defined by thoughtful design, dependable quality, and exceptional customer care. Today, we continue that mission globally, powered by talented people who believe great design and seamless service should be accessible to everyone.\r\n\r\nWhat started in 2019 as a project to strengthen our relationships with our Asian vendors has grown into a permanent operation in Ho Chi Minh City. Article currently has ≈70 employees in Vietnam, across our Sourcing, Technical Product Development, Quality, HR, Logistics, PMO and Accounting functions. \r\n\r\nCompensation, Benefits + Perks:\r\n\r\n- Competitive compensation packages\r\n- 13th-month salary\r\n- Top-tier health insurance\r\n- Flexible working hours to align with Vancouver time\r\n- 15 vacation days (for managers, 20 days per year)\r\n- 11 National Holidays\r\n- 2 extra"])</script><script>self.__next_f.push([1," days (Christmas \u0026 1 day of your choosing)\r\n- 6 well-being (sick) days\r\n\r\nGrowth + Training:\r\n\r\nAt Article, we believe learning and growth should be part of your everyday work.\r\n\r\nEvery role has a clear growth path that you and your manager create together. This path connects directly to your job title, so you know what development looks like for you.\r\n\r\nThroughout the year, we have several in-office training sessions covering topics such as:\r\n\r\n- Problem-Solving Skills\r\n- Ethics\r\n- CliftonStrengths Finder\r\n- Delegation\r\n- Giving Feedback\r\n\r\nYou’ll also have access to many learning and development modules through our internal online learning platform. These help you build new skills and grow in your career.\r\n\r\nOffice:\r\n\r\n- Our office is in Thao Dien\r\n- Spacious and well-designed office environment\r\n- First-come, first-served (limited) secure scooter parking24:Te2d,"])</script><script>self.__next_f.push([1,"\u003cp\u003eHi there, we’re Article. We’re a North American based furniture company creating remarkably better furniture experiences one sofa at a time. And as the\u003cstrong\u003e Technical Product Developer (Decor)\u003c/strong\u003e, you’ll manage, communicate, and educate internal partners and external vendors in all technical design and construction details to achieve the consistent execution of the original Design intent. This is a one-year contract position. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy We Need You:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eIn the Product Team, the Technical Product Developer (Decor) evaluates and approves product design concepts, construction specifications, and complete technical packages to ensure Article products can be consistently and commercially manufactured. The decoration categories encompassed indoor and outdoor home décor, as well as softline, hardline, and lighting products. This role provides value-engineering solutions to meet or exceed margin and profitability targets while relentlessly delivering value to the Article customer.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhy Article?\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eWhat started in 2019 as a project to strengthen our relationships with our Asian vendors has grown into a permanent operation in Ho Chi Minh City. Article currently has ≈70 employees in Vietnam, across our Sourcing, Technical Product Development, Quality, HR, Logistics, PMO and Accounting functions.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eAs a Particle (people of Article), you will have a high level of autonomy to solve challenging, meaningful problems the best way you can. That means you’re trusted to explore solutions you believe will work best (you’re the expert, after all). You’ll do all this while growing your skills within a company that is redefining the furniture industry. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eAt Article, we grow and have fun together through regular in-office training and team activities. These moments help us build connection, collaboration, and creativity across our teams all year long.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat You’ll Do:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eYou’ll be part of 3 Technical Product Development professionals working to provide value engineering solutions and guidance related to construction/design issues, and develop corrective action plans and options, partnering closely with Product Design, Quality \u0026 Manufacturing.\u003c/p\u003e\u003cp\u003e- Create and manage technical and engineering documentation, including PINFO packages for new and existing Decor products\u003c/p\u003e\u003cp\u003e- Provide value-engineering solutions that improve quality, construction, function, assembly, and cost\u003c/p\u003e\u003cp\u003e- Build and assess prototypes to check design integrity and readiness for production\u003c/p\u003e\u003cp\u003e- Review and approve assembly instructions to ensure they are clear and easy to follow\u003c/p\u003e\u003cp\u003e- Lead pre-production meetings with vendors and ensure smooth handoff to internal teams\u003c/p\u003e\u003cp\u003e- Apply technical knowledge of electrical systems and lighting, including LED, wiring, and controls for indoor and outdoor products\u003c/p\u003e\u003cp\u003e- Work with Engineering, Manufacturing, Quality,  and Warehouse teams to improve product packaging and handling\u003c/p\u003e\u003cp\u003e- Contribute to the development and upkeep of our Decor Construction Standards\u003c/p\u003e\u003cp\u003e- Research new materials, processes, and component suppliers for better performance and efficiency\u003c/p\u003e\u003cp\u003e- Show ownership and a growth mindset by taking initiative, solving problems, and accepting feedback\u003c/p\u003e\u003cp\u003e- This position requires extensive (60%+) travel within Vietnam (Mostly Binh Duong, Dong Nai) and occasional travel to China, India, and the Philippines. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T709,About Us:\r\n\r\nIn 2013, Article was founded in Vancouver, Canada, with a mission to create a better furniture experience — one defined by thoughtful design, dependable quality, and exceptional customer care. Today, we continue that mission globally, powered by talented people who believe great design and seamless service should be accessible to everyone.\r\n\r\nWhat started in 2019 as a project to strengthen our relationships with our Asian vendors has grown into a permanent operation in Ho Chi Minh City. Article currently has ≈70 employees in Vietnam, across our Sourcing, Technical Product Development, Quality, HR, Logistics, PMO and Accounting functions. \r\n\r\nCompensation, Benefits + Perks:\r\n\r\n- Competitive compensation packages\r\n- 13th-month salary\r\n- Top-tier health insurance\r\n- Flexible working hours to align with Vancouver time\r\n- 15 vacation days (for managers, 20 days per year)\r\n- 11 National Holidays\r\n- 2 extra days (Christmas \u0026 1 day of your choosing)\r\n- 6 well-being (sick) days\r\n\r\nGrowth + Training:\r\n\r\nAt Article, we believe learning and growth should be part of your everyday work.\r\n\r\nEvery role has a clear growth path that you and your manager create together. This path connects directly to your job title, so you know what development looks like for you.\r\n\r\nThroughout the year, we have several in-office training sessions covering topics such as:\r\n\r\n- Problem-Solving Skills\r\n- Ethics\r\n- CliftonStrengths Finder\r\n- Delegation\r\n- Giving Feedback\r\n l Product Development, Quality, HR, Logistics, PMO and Accounting functions.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eAs a Particle (people of Article), you will have a high level of autonomy to solve challenging, meaningful problems the best way you can. That means you’re trusted to explore solutions you believe will work best (you’re the expert, after all). You’ll do all this while growing your skills within a company that is redefining the furniture industry. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eAt Article, we grow and have fun together through regular in-office training and team activities. These moments help us build connection, collaboration, and creativity across our teams all year long.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat You’ll Do:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eYou’ll be part of 3 Technical Product Development professionals working to provide value engineering solutions and guidance related to construction/design issues, and develop corrective action plans and options, partnering closely with Product Design, Quality \u0026 Manufacturing.\u003c/p\u003e\u003cp\u003e- Create and manage technical and engineering documentation, including PINFO packages for new and existing Decor products\u003c/p\u003e\u003cp\u003e- Provide value-engineering solutions that improve quality, construction, function, assembly, and cost\u003c/p\u003e\u003cp\u003e- Build and assess prototypes to check design integrity and readiness for production\u003c/p\u003e\u003cp\u003e- Review and approve assembly instructions to ensure they are clear and easy to follow\u003c/p\u003e\u003cp\u003e- Lead pre-production meetings with vendors and ensure smooth handoff to internal teams\u003c/p\u003e\u003cp\u003e- Apply technical knowledge of electrical systems and lighting, including LED, wiring, and controls for indoor and outdoor products\u003c/p\u003e\u003cp\u003e- Work with Engineering, Manufacturing, Quality,  and Warehouse teams to improve product packaging and handling\u003c/p\u003e\u003cp\u003e- Contribute to the development and upkeep of our Decor Construction Standards\u003c/p\u003e\u003cp\u003e- Research new materials, processes, and component suppliers for better performance and efficiency\u003c/p\u003e\u003cp\u003e- Show ownership and a growth mindset by taking initiative, solving problems, and accepting feedback\u003c/p\u003e\u003cp\u003e- This position requires extensive (60%+) travel within Vietnam (Mostly Binh Duong, Dong Nai) and occasional travel to China, India, and the Philippines. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:{\"skillName\":\"Product Development\",\"skillId\":988,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Furniture Products\",\"skillId\":446133,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Furniture\",\"skillId\":1574,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Technical\",\"skillId\":992031,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Product Research\",\"skillId\":1021552,\"skillWeight\":100,\"isExisted\":false}\n2a:[\"$2b\",\"$2c\",\"$2d\",\"$2e\",\"$2f\"]\n31:{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"- Excellent extended health care benefits packages (dental, health check, mental health…)\"}\n32:{\"benefitId\":3,\"benefitIconName\":\"fa-file-image-o\",\"benefitName\":\"Paid Leave\",\"benefitNameVI\":\"Nghỉ phép có lương\",\"benefitValue\":\"- 13th-month salary\u003cbr/\u003e- 15 days of vacation\u003cbr/\u003e- 11 National Holidays\u003cbr/\u003e- 2 extra days (Christmas \u0026 1 day of your choosing)\u003cbr/\u003e- 6 well-being (sick) days\"}\n33:{\"benefitId\":10,\"benefitIconName\":\"fa-glass\",\"benefitName\":\"Team Activ
