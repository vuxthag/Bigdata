 Văn bản về quy trình, quy chế, quy phạm pháp luật của Nhà Nước và của SeABank đảm bảo khoa học và thuận lợi trong tác nghiệp;\u003c/p\u003e\u003cp\u003e• Hiểu rõ các nghiệp vụ, quy trình, quy chế đã được Nhà nước và SeABank ban hành liên quan đến công việc, nhiệm vụ của phòng theo từng thời kỳ;\u003c/p\u003e\u003cp\u003e• Tuân thủ các quy tắc đạo đức nghề nghiệp của kiểm soát viên từng thời kỳ;\u003c/p\u003e\u003cp\u003e• Đảm bảo tính khách quan, trung thực, độc lập trong tác nghiệp;\u003c/p\u003e\u003cp\u003e• Đảm bảo bí mật tổ chức, hoạt động và bí mật kinh doanh của SeABank; không cung cấp thông tin và tiết lộ thông tin khi chưa được phép của các cấp Lãnh đạo có thẩm quyền theo quy định SeABank từng thời kỳ;\u003c/p\u003e\u003cp\u003e• Đảm bảo thực hiện đúng tiến độ, đạt yêu cầu về chất lượng;\u003c/p\u003e\u003cp\u003e• Thống kê, báo cáo KPIs hàng tuần, tháng, năm;\u003c/p\u003e\u003cp\u003e3. Bàn giao cho Giám đốc Nghiệp vụ Kiểm soát tuân thủ khu vực, Giám đốc Kiểm soát tuân thủ khu vực/Giám đốc tuân thủ chi tiết, đầy đủ, đúng hạn và khoa học tất cả các công việc, hồ sơ, tài liệu còn tồn đọng hoặc đang được giao nhiệm vụ, trong trường hợp được cử đi đào tạo, đi công tác, xin nghỉ phép, nghỉ ốm, nghỉ không lương;\u003c/p\u003e\u003cp\u003e4. Thực hiện các công việc khác theo sự phân công của của Giám đốc Khối Pháp chế và Tuân thủ, Tổng Giám đốc, Hội đồng quản trị.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T70d,\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Trình độ: Đại học;\u003c/p\u003e\u003cp\u003e• Chuyên ngành đào tạo: Tài chính, Ngân hàng, Kiểm toán,…\u003c/p\u003e\u003cp\u003e• Bằng cấp, chứng chỉ khác (Tin học, Luật, Tiếng Anh, Chuyên môn khác,…);\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kinh nghiệm công tác:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có ít nhất 01 năm kinh nghiệm kiểm toán, kiểm soát trong lĩnh vực Ngân hàng/Tài chính đối với vị trí chuyên viên; 02 năm kinh h Việt Nam.\r\nVới một mục tiêu và lý tưởng hết sức cụ thể nhằm tạo ra những giá trị mới, những cảm nhận mới dành cho khách hàng qua phương châm hoạt động: “Hiệu quả, an toàn, năng động, thành công và bền vững”. \r\n\r\nTrong quá trình hội nhập và khẳng định vị trí là một trong những Ngân hàng TMCP năng động, nhạy bén hàng đầu tại Việt NamSeABank luôn là người tiên phong trong việc áp dụng công nghệ mới, chính sách nhân sự mới, hiện đại và tiên tiến. \r\n\r\nSeABank cam kết mang đến những sản phẩm và dịch vụ hoàn hảo nhất, xây dựng niềm tin và sự bền vững giữa khách hàng, nhân viên và cổ đông bởi phong cách làm việc tận tụy, chuyên nghiệp và sáng tạo.Với chúng tôi ! Thấu hiểu niềm tin và trách nhiệm mà khách hàng và ứng viên đã dành cho SeABank trong suốt hơn 10 năm qua là sự ghi nhận và tri ân sâu sắc nhất. \r\nVới chúng tôi!\r\nChúng tôi hiểu rằng để có được sự phát triển lâu dài và bền vững, nguồn nhân lực có chất lượng là một trong những ưu tiên hàng đầu và là nhân tố quan trọng tạo nên thành công của SeABank.\r\n\r\nChúng tôi đề cao yếu tố con người, sức mạnh tập thể thông qua chính sách đào tạo và trọng dụng nhân tài.Chúng tôi luôn ý thức về giá trị công việc của mỗi thành viên thông qua hệ thống chính sách nhân sự linh hoạt, chế độ đãi ngộ và phúc lợi thỏa đáng, công bằng đảm bảo tính cạnh tranh và cầu tiến.\r\n\r\nChúng tôi hướng tới một môi trường làm việc chuyên nghiệp tạo mọi điều kiện tốt nhất để mỗi cá nhân hoàn thiện kỹ năng chuyên môn và có một lộ trình thăng tiến phù hợp dựa trên thành tích công tác và phẩm chất cá nhân.\r\n\r\nChúng tôi mong muốn mang đến cho tất cả các bạn một nền văn hóa riêng biệt mang đậm dấu ấn và phong cách của SeABank, ở đó mỗi một thành viên sẽ có một cuộc sống phong phú về tinh thần, hưng thịnh về vật chất trên cơ sở tôn trọng những giá trị bất biến. \r\nHÃY GIA NHẬP VÀ TẠO DỰNG TƯƠNG LAI TẠI SEABANK"])</script><script>self.__next_f.push([1,"28:Tf14,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Quản lý từ 02 đế
