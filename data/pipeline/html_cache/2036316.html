tnamese-German University (VGU) is a Vietnamese state university. Founded in 2008, VGU is based on a close cooperation between the Federal Republic of Germany and the Socialist Republic of Vietnam, with the goal to become the leading research university in Vietnam and the region.\r\n\r\nVGU´s strategy is to implement excellent German study programs in the fields of engineering, natural science, economics and customize them to the needs of Vietnamese higher education. Being a joint effort of Vietnamese and German institutions, VGU follows the successful German model and standards concerning the academic and administrative structure.\r\n\r\nThe Vietnamese - German University is both, a research and a service university. Besides its curricula and teaching staff, which ensures the highest quality in research and education, the VGU Administration, including the Presidential Board, the Student Service Center, the Facility and Building Management, Human Resources, Finance and Accounting as well as the Marketing and Student Recruitment Department sustain smooth operations at VGU and therewith create an ideal learning, teaching and working environment.\r\nOur Vision\r\n\r\nVietnamese-German University (VGU) aims to become a leading research university in Asia and the first choice for students and academics in the fields of smart engineering, information technology, business and economics in Vietnam by 2030. In close collaboration with universities worldwide, VGU will contribute to the advancement of science and technology. Being responsible leaders and experts, our graduates will shape the global society sustainably. \r\n\r\nOur Values\r\n\r\nDiversity: As part of the global academic community, we respect diversity and strive for inclusion in order to foster exchange of experience and opinions as well as encourage international cooperation.\r\n\r\nSustainability: We care for our fellow students, colleagues, and their families. We are committed to the Sustainable Development Goals (SDG) and act accordingly.\r\n\r\nHonesty and transparency: We pursue individual and shared goals honestly and assure transparency regarding intentions, strategies and outcomes of our work. \r\n\r\nWhat we offer\r\n\r\n-VGU is an equal opportunity employer committed to providing employment opportunities without regard to race, color, gender, age, national origin, religion and other legally protected status\r\n- Competitive salary package with 13th-month salary\r\n- Career development and professional training opportunities\r\n- 24/7 accident insurance (DBV)\r\n- 12 days annual leave and 3 days fully paid sick leave\r\n- Holiday and Tết bonuses\r\n- University-provided laptop\r\n- Social insurance from the first month (based on contractual salary)\r\n- Performance- and seniority-based salary increases\r\n- Free daily shuttle bus from the center of HCM city to VGU campus"])</script><script>self.__next_f.push([1,"24:Tc22,"])</script><script>self.__next_f.push([1,"\u003cp\u003eAssisting in teaching, research activities and administrative affairs.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eDaily responsibilities\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tAssisting in teaching (average 4h-8h/week). Possible courses include but not limited to:\u003c/p\u003e\u003cp\u003e\tInformation Systems Research\u003c/p\u003e\u003cp\u003e\tDigital Transformation and Innovation\u003c/p\u003e\u003cp\u003e\tBusiness Data Analytics\u003c/p\u003e\u003cp\u003e\tManagement Science and Decision Making.\u003c/p\u003e\u003cp\u003e2.\tFormulating plan and contents of tutorials and carrying out tutorials and exercises\u003c/p\u003e\u003cp\u003e3.\tMaintaining and developing database of lecture slides, examinations and exercises\u003c/p\u003e\u003cp\u003e4.\tAssisting in research, prepare research proposals: working on research project(s) assigned by the supervisor, and assisting in and contributing to the overall research of the research group, present ty and Building Management, Human Resources, Finance and Accounting as well as the Marketing and Student Recruitment Department sustain smooth operations at VGU and therewith create an ideal learning, teaching and working environment.\r\nOur Vision\r\n\r\nVietnamese-German University (VGU) aims to become a leading research university in Asia and the first choice for students and academics in the fields of smart engineering, information technology, business and economics in Vietnam by 2030. In close collaboration with universities worldwide, VGU will contribute to the advancement of science and technology. Being responsible leaders and experts, our graduates will shape the global society sustainably. \r\n\r\nOur Values\r\n\r\nDiversity: As part of the global academic community, we respect diversity and strive for inclusion in order to foster exchange of experience and opinions as well as encourage international cooperation.\r\n\r\nSustainability: We care for our fellow students, colleagues, and their families. We are committed to the Sustainable Development Goals (SDG) and act accordingly.\r\n\r\nHonesty and transparency: We pursue individual and shared goals honestly and assure transparency regarding intentions, strategies and outcomes of our work. \r\n\r\nWhat we offer\r\n\r\n-VGU is an equal opportunity employer committed to providing employment opportunities without regard to race, color, gender, age, national origin, religion and other legally protected status\r\n- Competitive salary package with 13th-month salary\r\n- Career development and professional training opportunities\r\n- 24/7 accident insurance (DBV)\r\n- 12 days annual leave and 3 days fully paid sick leave\r\n- Holiday and Tết bonuses\r\n- University-provided laptop\r\n- Social insurance from the first month (based on contractual salary)\r\n- Performance- and seniority-based salary increases\r\n- Free daily shuttle bus from the center of HCM city to VGU campus"])</script><script>self.__next_f.push([
