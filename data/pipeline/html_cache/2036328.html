 nguồn nhân lực, đảm bảo tuân thủ pháp luật lao động và thực thi các chính sách nội bộ của công ty.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CÔNG VIỆC CHÍNH VÀ CÁC MỤC TIÊU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Lập kế hoạch và tuyển dụng theo nhu cầu từng phòng ban dựa trên định biên nhân sự của từng bộ phận trong năm.\u003c/p\u003e\u003cp\u003e- Chịu trách nhiệm rà soát và kiểm duyệt nội dung JD, các bài đăng tuyển trên các nền tảng đăng tin (nội bộ và out-source).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.1. Tuyển dụng\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Giám sát quy trình tuyển dụng theo đúng quy trình đã ban hành: sàng lọc – phỏng vấn – tiếp nhận. Đảm bảo nhân sự mới được onboarding đầy đủ, đúng quy trình.\u003c/p\u003e\u003cp\u003e- Báo cáo, theo dõi biến động nhân sự theo tháng/quý/năm tới quản lý và BLĐ.\u003c/p\u003e\u003cp\u003e- Phối hợp với TBP xác định nhu cầu đào tạo theo năm.\u003c/p\u003e\u003cp\u003eQuản lý, giám\u003c/p\u003e\u003cp\u003e- Xây dựng và giám sát kế hoạch đào tạo nội bộ, đào sát và điều tạo bên ngoài theo từng năm.\u003c/p\u003e\u003cp\u003e1 60%\u003c/p\u003e\u003cp\u003ehành phòng\u003c/p\u003e\u003cp\u003e- Quản lý, giám sát và thực hiện các công việc liên HCNS quan đến đào tạo theo đúng quy trình.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.2. Đào tạo\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Quản lý ngân sách đào tạo và đánh giá hiệu quả sau đào tạo.\u003c/p\u003e\u003cp\u003e- Hỗ trợ BLĐ trong việc phát triển lộ trình nghề nghiệp cho các vị trí chủ chốt.\u003c/p\u003e\u003cp\u003e- Tổ chức các chương trình chia sẻ nội bộ, đào tạo quản lý.\u003c/p\u003e\u003cp\u003e- Xây dựng và rà soát chính sách lương, thưởng, phụ cấp, phúc lợi theo chính sách của Công ty.\u003c/p\u003e\u003cp\u003e- Quản lý, rà soát tiến độ hoàn thiện hệ thống quản lý nhân sự, tính lương/thưởng … trên hệ thống\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.3. C\u0026B\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ephần mềm.\u003c/p\u003e\u003cp\u003e- Kiểm soát công tác chấm công, tính lương, thuế TNCN, BHXH, hợp đồng lao động, chính sách\u003c/p\u003e\u003cp\u003ephúc lợi, nghỉ việc, kỷ luật lao động.\u003c/p\u003e\u003cp\u003e- Đảm bảo chi trả lương, thưởng đúng hạn, chính xác.\u003c/p\u003e\u003cp\u003e- Quản lý, giám sát, đảm bảo các thắc mắc, khiếu nại của nhân viên liên quan đến chế độ/ tiền lương được giải đáp kịp thời.\u003c/p\u003e\u003cp\u003e- Đảm bảo các công tác hành chính văn phòng: văn thư lưu trữ, mua sắm tài sản, cấp phát đồng phục,… được thực hiện đầy đủ và hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.4. Hành - Kiểm soát chi phí hành chính theo ngân sách.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003echính và sự kiện\u003c/p\u003e\u003cp\u003e- Triển khai các hoạt động, chương trình gắn kết nôi bộ nhân viên thường quy của Công ty.\u003c/p\u003e\u003cp\u003e- Phát triển kênh truyền thông nội bộ.\u003c/p\u003e\u003cp\u003e- Phối hợp và tổ chức các sự kiện nội bộ: Tiệc cuối năm, sinh nhật Bệnh viện …\u003c/p\u003e\u003cp\u003e- Dựa trên chỉ đạo của ban lãnh đạo để xây dựng/ cải tiến nội quy lao động, hệ thống các quy chế, quy trình, quy định cho công ty và giám sát việc chấp hành các nội quy đó.\u003c/p\u003e\u003cp\u003e- Xây dựng và chuẩn hóa hệ thống mô tả công việc,\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.1. Nhân sự cơ chế đánh giá hiệu quả công việc rõ ràng, minh\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ebạch nhằm duy trì và nâng cao động lực làm việc cho CBCNV\u003c/p\u003e\u003cp\u003e- Hỗ trợ các bộ phận khác các vấn đề liên quan đến\u003c/p\u003e\u003cp\u003eXây dựng và quản lý nhân sự như công tác đào tạo nhân viên, cải tiến hệ cách thức tuyển dụng nhân sự, công tác hành chính.\u003c/p\u003e\u003cp\u003e2 thống quy - Xây dựng các chương trình quản lý, đánh giá cũng 20%\u003c/p\u003e\u003cp\u003etrình, chính như các đề xuất điều chỉnh về chính sách Nhân sự sách nhân sự để đáp ứng nhu cầu nhân sự của bộ phận. Theo dõi và đảm bảo các chế độ phúc lợi của Công ty được\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.2. C\u0026B\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ecập nhật với xu hướng thị trường, phù hợp với chiphí/ngân sách Công ty trong từng giai đoạn, đảm bảo tính cạnh tranh và phù hợp với quy định của pháp luật hiện hành.\u003c/p\u003e\u003cp\u003e- Xây dựng và phát triển văn hoá công ty: lên kế hoạch tổ chức các hoạt động thường niên gắn kết nội bộ, lan toả văn hoá làm việc chuyên nghiệp trong công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.3. Hành chính\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng kế hoạch và lộ trình phát triển cho từng vị trí.\u003c/p\u003e\u003cp\u003eXây dựng và phát triển đội ngũ - Định hướng và phát triển đội ngũ.\u003c/p\u003e\u003cp\u003e3 15%\u003c/p\u003e\u003cp\u003enhân sự\u003c/p\u003e\u003cp\u003e- Cử nhân sự tham gia các chương trình đào tạo, cập nhật thông tin nhằm nắm bắt kịp thời xu hướng thị trường và nâng cao hiệu suất làm việc\u003c/p\u003e\u003cp\u003e- Hỗ trợ các công tác liên phòng ban\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4 Các công việc khác \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thực hiện công việc theo sự phân công của Ban lãnh đạo 5%\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T810,"])</script><script>self.__next_f.push([1,"\u003cp\u003eBằng cấp/ bằng cấp\u003c/p\u003e\u003cp\u003e• Đại học trở lên\u003c/p\u003e\u003cp\u003eTrình độ kinh nghiệm\u003c/p\u003e\u003cp\u003e• Tối thiểu 3 năm kinh nghiệm ở cùng vị trí\u003c/p\u003e\u003cp\u003eKiến thức chuyên ngành\u003c/p\u003e\u003cp\u003e• Đã có kinh nghiệm làm việc trong ngành y là lợi thế\u003c/p\u0 g và rà soát chính sách lương, thưởng, phụ cấp, phúc lợi theo chính sách của Công ty.\u003c/p\u003e\u003cp\u003e- Quản lý, rà soát tiến độ hoàn thiện hệ thống quản lý nhân sự, tính lương/thưởng … trên hệ thống\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.3. C\u0026B\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ephần mềm.\u003c/p\u003e\u003cp\u003e- Kiểm soát công tác chấm công, tính lương, thuế TNCN, BHXH, hợp đồng lao động, chính sách\u003c/p\u003e\u003cp\u003ephúc lợi, nghỉ việc, kỷ luật lao động.\u003c/p\u003e\u003cp\u003e- Đảm bảo chi trả lương, thưởng đúng hạn, chính xác.\u003c/p\u003e\u003cp\u003e- Quản lý, giám sát, đảm bảo các thắc mắc, khiếu nại của nhân viên liên quan đến chế độ/ tiền lương được giải đáp kịp thời.\u003c/p\u003e\u003cp\u003e- Đảm bảo các công tác hành chính văn phòng: văn thư lưu trữ, mua sắm tài sản, cấp phát đồng phục,… được thực hiện đầy đủ và hiệu quả.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.4. Hành - Kiểm soát chi phí hành chính theo ngân sách.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003echính và sự kiện\u003c/p\u003e\u003cp\u003e- Triển khai các hoạt động, chương trình gắn kết nôi bộ nhân viên thường quy của Công ty.\u003c/p\u003e\u003cp\u003e- Phát triển kênh truyền thông nội bộ.\u003c/p\u003e\u003cp\u003e- Phối hợp và tổ chức các sự kiện nội bộ: Tiệc cuối năm, sinh nhật Bệnh viện …\u003c/p\u003e\u003cp\u003e- Dựa trên chỉ đạo của ban lãnh đạo để xây dựng/ cải tiến nội quy lao động, hệ thống các quy chế, quy trình, quy định cho công ty và giám sát việc chấp hành các nội quy đó.\u003c/p\u003e\u003cp\u003e- Xây dựng và chuẩn hóa hệ thống mô tả công việc,\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.1. Nhân sự cơ chế đánh giá hiệu quả công việc rõ ràng, minh\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ebạch nhằm duy trì và nâng cao động lực làm việc cho CBCNV\u003c/p\u003e\u003cp\u003e- Hỗ trợ các bộ phận khác các vấn đề liên quan đến\u003c/p\u003e\u003cp\u003eXây dựng và quản lý nhân sự như công tác đào tạo nhân viên, cải tiến hệ cách thức tuyển dụng nhân sự, công tác hành chính.\u003c/p\u003e\u003cp\u003e2 thống quy - Xây dựng các chương trình quản lý, đánh giá cũng 20%\u003c/p\u003e\u003cp\u003etrình, chính như các đề xuất điều chỉnh về chính sách Nhân sự sách nhân sự để đáp ứng nhu cầu nhân sự của bộ phận. Theo dõi và đảm bảo các chế độ phúc lợi của Công ty được\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.2. C\u0026B\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ecập nhật với xu hướng thị trường, phù hợp với chiphí/ngân sách Công ty trong từng giai đoạn, đảm bảo tính cạnh tranh và phù hợp với quy định của pháp luật hiện hành.\u003c/p\u003e\u003cp\u003e- Xây dựng và phát triển văn hoá công ty: lên kế hoạch tổ chức các hoạt động thường niên gắn kết nội bộ, lan toả văn hoá làm việc chuyên nghiệp trong công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.3. Hành chính\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Xây dựng kế hoạch và lộ trình phát triển cho từng vị trí.\u003c/p\u003e\u003cp\u003eXây dựng và phát triển đội ngũ - Định hướng và phát triển đội ngũ.\u003c/p\u003e\u003cp\u003e3 15%\u003c/p\u003e\u003cp\u003enhân sự\u003c/p\u003e\u003cp\u003e- Cử nhân sự tham gia các chương trình đào tạo, cập nhật thông tin nhằm nắm bắt kịp thời xu hướng thị trường và nâng cao hiệu suất làm việc\u003c/p\u003e\u003cp\u003e- Hỗ trợ các công tác liên phòng ban\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4 Các công việc khác \u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thực hiện công việc theo sự phân công của Ban lãnh đạo 5%\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:T810,"])</script><script>self.__next_f.push([1,"\u003cp\u003eBằng cấp/ bằng cấp\u003c/p\u003e\u003cp\u0
