ipt>self.__next_f.push([1,"24:T11ad,"])</script><script>self.__next_f.push([1,"\u003cp\u003eTại Seadent – một trong những đơn vị dẫn đầu trong lĩnh vực phân phối Vật liệu và Trang thiết bị Nha khoa, chúng tôi tin rằng sự minh bạch trong dữ liệu là nền tảng của mọi quyết định kinh doanh thành công.\u003c/p\u003e\u003cp\u003eChúng tôi đang tìm kiếm bổ sung một Nhân viên Kế toán phụ trách mảng Chi phí \u0026 Công nợ phải trả đóng vai trò then chốt trong việc kiểm soát số liệu chi phí và công nợ, đảm bảo dòng chảy vận hành thông suốt của hệ thống.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA- Bạn sẽ thực hiện các Nhiệm vụ sau:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Về Phần hành Chi phí\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.1 Kiểm tra và phân bổ:\u003c/p\u003e\u003cp\u003e- Kiểm tra: tính hợp lệ, hợp pháp của hồ sơ thanh toán theo quy định Thuế và nội bộ.\u003c/p\u003e\u003cp\u003e- Hạch toán: Ghi nhận chi phí đúng bản chất (Giá vốn, CP Bán hàng, CP Quản lý...).\u003c/p\u003e\u003cp\u003e- Phân bổ: Thực hiện phân bổ chi phí trả trước, CCDC và chi phí chung vào kết quả kinh doanh theo kỳ.\u003c/p\u003e\u003cp\u003e- Theo dõi: Các chi phí phát sinh theo từng dự án, hợp đồng hoặc hạng mục cụ thể.\u003c/p\u003e\u003cp\u003e1.2 Kiểm soát \u0026 tối ưu:\u003c/p\u003e\u003cp\u003e- Giám sát định mức: Theo dõi chi phí theo bộ phận/phòng ban; cảnh báo kịp thời các trường hợp vượt ngân sách.\u003c/p\u003e\u003cp\u003e- Tối ưu hiệu quả: Chủ trì rà soát và đề xuất các giải pháp tiết kiệm chi phí, nâng cao hiệu quả sử dụng nguồn lực tài chính.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Về Phần hành công nợ phải trả:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e2.1 Kiểm soát thanh toán:\u003c/p\u003e\u003cp\u003e- Theo dõi: Quản lý công nợ phải trả theo từng đối tượng, hợp đồng và các khoản tạm ứng/hoàn ứng nội bộ.\u003c/p\u003e\u003cp\u003e- Hạch toán: Thực hiện hạch toán kịp thời các bút toán thanh toán (chuyển khoản, tiền mặt, bù trừ công nợ…).\u003c/p\u003e\u003cp\u003e- Điều phối dòng tiền: Lập kế hoạch thanh toán tuần/tháng dựa trên các điều khoản hợp đồng và ưu tiên dòng tiền thực tế.\u003c/p\u003e\u003cp\u003e- Kiểm soát thời hạn: Giám sát chặt chẽ tiến độ thanh toán, đảm bảo tuân thủ các cam kết hợp đồng để tránh phát sinh phạt hoặc lãi chậm trả.\u003c/p\u003e\u003cp\u003e2.2 Đối soát \u0026 Quản trị hồ sơ:\u003c/p\u003e\u003cp\u003e- Đối chiếu định kỳ: Trực tiếp đối soát số liệu công nợ với nhà cung cấp, xử lý kịp thời các sai lệch.\u003c/p\u003e\u003cp\u003e- Lưu trữ: Hoàn thiện và lưu trữ khoa học bộ hồ sơ thanh toán, đảm bảo tính sẵn sàng phục vụ kiểm toán và quyết toán thuế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eB- Quyền lợi dành cho ứng viên tại Seadent:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thu nhập \u0026 Ghi nhận:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Range lương dành cho level nhân viên ở vị trí này: 12 - 15 triệu.\u003c/p\u003e\u003cp\u003e- Review định kỳ: Dựa trên kết quả đánh giá KPIs Quý/Năm - Thưởng theo hiệu quả công việc cá nhân/đội nhóm – ghi nhận trực tiếp dựa trên giá trị đóng góp thực tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Phúc lợi:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Các chế độ cơ bản: BHXH, Hiếu – Hỉ từ Công đoàn\u003c/p\u003e\u003cp\u003e- Các chế độ đãi ngộ theo chính sách riêng: Bảo hiểm Sức khỏe \u0026 Tai nạn 24/7; Du lịch hàng năm và các hoạt động gắn kết nội bộ, và các ghi nhận theo Thâm niên và đóng góp thực tế khác….\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Môi trường làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Định hướng số hóa: Làm việc trên hệ thống CRM đa nền tảng, giúp bạn chủ động quản lý quy trình ứng viên và tối ưu hiệu suất xử lý công việc.\u003c/p\u003e\u003cp\u003e- Văn hóa đồng đội: Đề cao tinh thần hỗ trợ lẫn nhau để hướng tới kết quả chung của cả tập thể.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Cơ hội phát triển:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đào tạo: Các khóa học nội bộ để nâng cao kỹ năng mềm, các khóa học nâng cao bên ngoài phục vụ cho việc nâng cấp hiệu quả làm việc.\u003c/p\u003e\u003cp\u003e- Lộ trình thăng tiến: Định hướng phát triển dài hạn từ Executive lên Senior và Team Leader.\u003c/p\u003e\u003cp\u003eTất cả là quyền lợi đang áp dụng thực tế tại Seadent, chúng tôi tìm kiếm các bạn trẻ mong muốn được đánh giá và ghi nhận dựa trên hiệu suất công việc, đóng góp tốt để được đãi ngộ tốt hơn.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T85d,"])</script><script>self.__next_f.push([1,"Chào mừng bạn đến với SEADENT - nơi chúng tôi không chỉ làm việc, mà còn theo đuổi đam mê và sự khác biệt. Từ năm 2011, với trụ sở tại Hồ Chí Minh và chi nhánh ở Hà Nội, SEADENT đã không ngừng phát triển với một tôn chỉ hành động: Lấy khách hàng làm trung tâm với Dịch vụ vượt trội.\r\n\r\nChúng tôi tự hào với sứ mệnh là “Trở thành công ty hàng đầu tại Việt Nam trong lĩnh vực nhập khẩu và phân phối thiết bị và vật liệu nha khoa cao cấp”. Điều này thôi thúc chúng tôi không ngừng nâng cao chất lượng dịch vụ và tìm kiếm những đối tác uy tín trên toàn cầu, đảm bảo mỗi sản phẩm chúng tôi cung cấp đều là những gì tốt nhất, giúp các Nha sĩ thực hành công việc của mình một cách hiệu quả nhất.\r\n\r\nQua hơn một thập kỷ hình thành và phát triển, SEADENT giờ đây là nhà phân phối độc quyền cho 17 thương hiệu danh tiếng toàn cầu. \r\n\r\nTại SEADENT, chúng tôi không chỉ cung cấp sản phẩm và dịch vụ chất lượng cao cho khách hàng. Chúng tôi còn tạo ra một môi trường làm việc lý tưởng cho những con người trẻ trung, năng động, dám nghĩ, dám làm và luôn khao khát được khẳng định bản thân. Nếu bạn là một trong số những người trẻ tuổi, đầy tham vọng và muốn thách thức bản thân mình, thì Seadent chính là nơi dành cho bạn.\r\n\r\nHãy gia nhập đội ngũ của chúng tôi để cùng nhau tạo nên những giá trị khác biệt, đóng góp vào sự phát triển của ngành nha khoa Việt Nam, không chỉ vươn tầm tro
