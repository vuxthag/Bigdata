chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1155,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eAbout the Company / Giới thiệu công ty\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAvric Aviation is a global air cargo charter specialist providing tailored solutions for freight forwarders, project cargo and time-critical shipments worldwide. We operate with precision, compliance and strong international coordination.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAvric Aviation là công ty chuyên cung cấp dịch vụ thuê chuyến vận tải hàng không toàn cầu, phục vụ các công ty giao nhận, hàng dự án và các lô hàng khẩn cấp. Chúng tôi hoạt động với tiêu chuẩn cao về độ chính xác, tuân thủ và phối hợp quốc tế.\u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Summary / Mô tả công việc chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThis role will manage accounting, administration and HR functions for the Vietnam office while coordinating with our international team. The position requires strong attention to detail and the ability to work in a fast-paced, global environment.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eVị trí này chịu trách nhiệm quản lý kế toán, hành chính và nhân sự cho văn phòng tại Việt Nam, đồng thời phối hợp với đội ngũ quốc tế. Ứng viên cần có sự cẩn thận cao và khả năng làm việc trong môi trường năng động, mang tính toàn cầu.\u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities / Trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Accounting \u0026 Finance / Kế toán \u0026 Tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEN:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMaintain accounting records in accordance with Vietnam Accounting Standards (VAS)\u003c/p\u003e\u003cp\u003e•\tIssue invoices and manage receivables/payables (including international clients)\u003c/p\u003e\u003cp\u003e•\tHandle multi-currency transactions related to air cargo charter operations\u003c/p\u003e\u003cp\u003e•\tPerform bank reconciliation and monitor cash flow\u003c/p\u003e\u003cp\u003e•\tPrepare VAT filings and support tax compliance\u003c/p\u003e\u003cp\u003e•\tCoordinate with external accountants, auditors and tax advisors\u003c/p\u003e\u003cp\u003e•\tReport financial data to Head Office\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eVI:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGhi nhận sổ sách kế toán theo chuẩn mực kế toán Việt Nam (VAS)\u003c/p\u003e\u003cp\u003e•\tXuất hóa đơn, theo dõi công nợ phải thu/phải trả (bao gồm khách hàng quốc tế)\u003c/p\u003e\u003cp\u003e•\tXử lý các giao dịch đa tiền tệ liên quan đến vận tải hàng không\u003c/p\u003e\u003cp\u003e•\tĐối chiếu ngân hàng và theo dõi dòng tiền\u003c/p\u003e\u003cp\u003e•\tLập báo cáo thuế GTGT và hỗ trợ tuân thủ thuế\u003c/p\u003e\u003cp\u003e•\tLàm việc với kế toán dịch vụ, kiểm toán và tư vấn thuế\u003c/p\u003e\u003cp\u003e•\tBáo cáo tài chính cho trụ sở chính\u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Administration / Hành chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEN:\u003c/s
