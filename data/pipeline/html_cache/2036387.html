 Noi Office:\r\nSuite 1105, 11th Floor, Ocean Park Building, 01 Dao Duy Anh Street, Dong Da District, Ha Noi, Vietnam.\r\n\r\nHai Phong Office: \r\nLot H\u0026F, Nomura Industrial Park, An Duong, Hai Phong. \r\n384 Lach Tray, Dang Giang Ward, Ngo Quyen District, Hai Phong City.\r\n\r\nBac Ninh Warehouse:\r\nPhytophaco Warehouse, Mot 5, Tan Hong Industrial, Tu Son Province, Bac Ninh/Vietnam24:T1597,"])</script><script>self.__next_f.push([1,"\u003cp\u003eGEODIS is a Lead Logistics Provider who manages our customers’ supply chain by providing end-to-end solutions enabled by our infrastructure, our people, processes and systems. Since 2008, Geodis is a subsidiary entirely owned by the SNCF Group in French. Our mission is to help its clients succeed by overcoming logistical constraints thanks to its lines of business - Road Transport, Freight Forwarding, Contract Logistics, Supply Chain Optimization, Distribution \u0026 Express. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eThe objective of the Finance Department is to ensure that finance and accounting activities support the development and achievement of the Geodis annual profit budget using value-based management principles. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eWe are looking for a \u003cstrong\u003eSenior Accounting Supervisor \u0026 Tax Analyst\u003c/strong\u003e to join our Finance team in HCMC:\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePurpose of the Job\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e- Operations and ensures compliance with accounting laws, regulations and financial standards. The main responsibilities include preparing, auditing and analysing the company's accounts, financial records and other financial commitments. This position manages AR, AP, Credit Control and relate matters to ensure that all transactions are properly recorded and accounted for.\u003c/p\u003e\u003cp\u003e- Be responsible for the for assigned entities (*)’s taxation affairs, working with tax advisors and corporate head office for optimizing the organization's taxation situation.\u003c/p\u003e\u003cp\u003e- Developing and maintaining tax plans, compliance procedures and risk assessment frameworks, to ensure effective tax management.\u003c/p\u003e\u003cp\u003e- Well adapt with and ability to coordinate and handle the important projects / transformation of the company related to legal / tax / compliance aspects.\u003c/p\u003e\u003cp\u003e(*) Assigned entities (GVN/OHL/GEO/UFVN)\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eo\tManagement of the day-to-day accounting and financial transactions \u0026 operations\u003c/p\u003e\u003cp\u003eo\tProceed, verify claims in accordance with internal processes and accounting rules and norms\u003c/p\u003e\u003cp\u003eo\tEnsure compliance with the accounting laws, regulations and financial norms\u003c/p\u003e\u003cp\u003eo\tFollow up on customer and supplier invoices\u003c/p\u003e\u003cp\u003eo\tManage accounts payable and Co work with Credit controller to manage receivable, including collecting payments and identifying potential risks of non-payment\u003c/p\u003e\u003cp\u003eo\tEnsure the reliability and accuracy of accounting operations in accordance with internal processes and accounting rules and norms\u003c/p\u003e\u003cp\u003eo\tEstablish and enforce proper accounting methods, policies and principles\u003c/p\u003e\u003cp\u003eo\tReview all financial transactions for accuracy and ensure that accounting records are up to date\u003c/p\u003e\u003cp\u003eo\tMaintain the general ledger, reconcile accounts payable and receivable\u003c/p\u003e\u003cp\u003eo\tAnalysis of financial data\u003c/p\u003e\u003cp\u003eo\tAnalyze different general ledger accounts regularly\u003c/p\u
