ecially in Planning. The individual prepares forecasts, analyzes trends related to Planning and uses the analyses to compile and prepare reports, graphs and charts of data and/or ensure efficiency.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYOUR RESPONSIBILITIES WILL INCLUDE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e    Follow up and update monthly, quarterly Sales Forecast and analyse tracking for accuracy forecast confidence.\u003c/p\u003e\u003cp\u003e    Daily/ weekly update demand planning tools such as Capacity model , data tracking system....\u003c/p\u003e\u003cp\u003e    Follow up backlog , service, actual demand and daily capacity and give head up , alert under SOP requirements\u003c/p\u003e\u003cp\u003e    Providing timely and effective analysis, data, information related to demand planning function as required\u003c/p\u003e\u003cp\u003e    Working closely with Commercial/ Material Planning team for abnormal Forecast occur to ensure maintain service , backlog and capacity balancing\u003c/p\u003e\u003cp\u003e    Maintain and follow demand planning process to ensure proper process in place\u003c/p\u003e\u003cp\u003e    Involve in all Peak preparation and evaluation section\u003c/p\u003e\u003cp\u003e    Coordinate and control inventory build requests, ensuring alignment with historical demand, forecasts and risk of write off.\u003c/p\u003e\u003cp\u003e    Conduct regular inventory analysis and identify potential risks, such as overstocking or stockouts.\u003c/p\u003e\u003cp\u003e    Proactively propose strategic action plans to address demand and capacity constraints\u003c/p\u003e\u003cp\u003e    Coordinate and provide insights for SnOP meetings\u003c/p\u003e\u003cp\u003e    Other tasks assigned by direct manager\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAdditional Information\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/
