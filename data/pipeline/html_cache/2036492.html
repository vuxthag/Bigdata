g, Nghe An, Quang Ngai, Lam Dong, and Ho Chi Minh City.\r\n\r\nVision\r\nWTO aims to become one of Vietnam’s leading multi-industry corporations, with strategic focus on Real Estate, Industrial Manufacturing, and Clean Energy.\r\n\r\nMission\r\nIn parallel with our ambition to lead in solar and wind energy, WTO is committed to developing innovative, distinctive, and high-impact real estate projects. Above all, we strive to contribute to a green, clean"])</script><script>self.__next_f.push([1,", and sustainable future for Vietnam and beyond.\r\n\r\nCore Business Sectors\r\n•\tReal Estate Development\r\n•\tIndustrial Manufacturing\r\n•\tEnergy Production\r\n•\tCommercial \u0026 Service Businesses24:Teda,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. MỤC TIÊU CHỨC DANH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChịu trách nhiệm lãnh đạo, quản lý và định hướng toàn bộ công tác thiết kế nội thất cho các dự án khách sạn, khu nghỉ dưỡng tiêu chuẩn cao, đảm bảo các phương án thiết kế đạt giá trị thẩm mỹ – công năng – hiệu quả đầu tư, đồng thời phù hợp với chiến lược phát triển thương hiệu và tiêu chuẩn chất lượng của Tổng công ty.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. PHẠM VI TRÁCH NHIỆM \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLoại hình dự án: Khách sạn, resort, khu nghỉ dưỡng cao cấp (từ 4 sao trở lên)\u003c/p\u003e\u003cp\u003e•\tGiai đoạn tham gia: Từ ý tưởng – thiết kế – triển khai – giám sát tác giả\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. NHIỆM VỤ \u0026 TRÁCH NHIỆM CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.1. Quản lý \u0026 định hướng thiết kế\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐịnh hướng phong cách, ngôn ngữ và tiêu chuẩn thiết kế nội thất cho các dự án khách sạn, khu nghỉ dưỡng.\u003c/p\u003e\u003cp\u003e•\tGiám sát toàn bộ các giai đoạn thiết kế: ý tưởng – concept – thiết kế cơ sở – thiết kế kỹ thuật – hồ sơ thi công.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo các phương án thiết kế đáp ứng yêu cầu về thẩm mỹ, công năng, ngân sách, tiến độ và tiêu chuẩn quốc tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.2. Lãnh đạo \u0026 phát triển đội ngũ thiết kế\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý, hướng dẫn và phát triển đội ngũ kiến trúc sư, nhà thiết kế nội thất.\u003c/p\u003e\u003cp\u003e•\tXây dựng môi trường làm việc sáng tạo – hợp tác – hiệu quả cao.\u003c/p\u003e\u003cp\u003e•\tĐánh giá năng lực, phân công công việc và kiểm soát chất lượng đầu ra của đội ngũ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.3. Quản lý chất lượng \u0026 tính nhất quán thiết kế\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThiết lập, duy trì và kiểm soát các tiêu chuẩn thiết kế nội thất cho toàn bộ danh mục dự án.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo sự nhất quán về chất lượng, hình ảnh và trải nghiệm không gian giữa các dự án.\u003c/p\u003e\u003cp\u003e•\tKiểm soát rủi ro thiết kế, kịp thời điều chỉnh khi có thay đổi yêu cầu hoặc điều kiện triển khai.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.4. Phối hợp \u0026 điều phối đa bên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp chặt chẽ với các bộ phận kỹ thuật và quản lý dự án để đảm bảo tính khả thi trong thi công.\u003c/p\u003e\u003cp\u003e•\tLàm việc trực tiếp với tư vấn, nhà thầu và khách hàng trong việc thống nhất giải pháp thiết kế.\u003c/p\u003e\u003cp\u003e•\tTham gia bảo vệ phương án thiết kế trước Ban Lãnh đạo, đối tác và chủ sở hữu thương hiệu.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.5. Quản lý ngân sách \u0026 hiệu quả đầu tư\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKiểm soát ngân sách thiết kế, đề xuất giải pháp tối ưu chi phí nhưng vẫn đảm bảo chất lượng và giá trị thẩm mỹ.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với bộ phận Dự toán đánh giá tác động chi phí của các phương án thiết kế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.6. Chiến lược \u0026 phát triển dài hạn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTham gia xây dựng chiến lược phát triển mảng thiết kế nội thất của Tổng công ty.\u003c/p\u003e\u003cp\u003e•\tCập nhật xu hướng thiết kế, vật liệu, công nghệ mới trong lĩnh vực khách sạn – nghỉ dưỡng.\u003c/p\u003e\u003cp\u003e•\tĐóng góp vào tầm nhìn dài hạn và năng lực cạnh tranh của Tổng công ty trong lĩnh vực thiết kế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.7. Nhiệm vụ khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện các nhiệm vụ khác theo phân công của Giám đốc Thiết kế và Ban Lãnh đạo.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T7c1,\u003cp\u003e\u003cstrong\u003e4.1. Trình độ học vấn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTốt nghiệp Đại học hoặc Thạc sĩ chuyên ngành:\u003c/p\u003e\u003cp\u003eo\tKiến trúc\u003c/p\u003e\u003cp\u003eo\tThiết kế Nội thất\u003c/p\u003e\u003cp\u003eo\tKỹ thuật Kết cấu hoặc các ngành liên quan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.2. Kinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTối thiểu 15 năm kinh nghiệm trong lĩnh vực thiết kế nội thất khách sạn, khu nghỉ dưỡng tiêu chuẩn quốc tế (từ 4 sao trở lên).\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm việc tại:\u003c/p\u003e\u003cp\u003eo\tCông ty tư vấn thiết kế nước ngoài hoặc\u003c/p\u003e\u003cp\u003eo\tChủ đầu tư, đơn vị phát triển dự án quy mô lớn.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.3. Kiến thức \u0026 kỹ năng chuyên môn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tAm hiểu sâu về thiết kế nội thất khách sạn, resort cao cấp.\u003c/p\u003e\u003cp\u003e•\tThành thạo các phần mềm: AutoCAD, Revit, SketchUp, Adobe Creative Suite.\u003c/p\u003e\u003cp\u003e•\tHiểu rõ quy trình thiết kế – thi công – vận hành công trình khách sạn\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.4. Năng lực quản lý \u0026 hành vi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKỹ năng lãnh đạo, quản lý đội ngũ xuất sắc.\u003c/p\u003e
