unks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Td9f,"])</script><script>self.__next_f.push([1,"VINAMILK – NƠI NHỮNG GIẤC MƠ LỚN ĐƯỢC NUÔI DƯỠNG\r\n \r\nNăm 1976, Vinamilk bắt đầu cuộc hành trình với rất nhiều khó khăn, nhưng đích đến vô cùng xứng đáng: để dinh dưỡng là quyền lợi của tất cả trẻ em Việt Nam. Không có chuyên gia tư vấn, không có nguồn vốn, điều chúng tôi có nhiều nhất lúc đó là quyết tâm thực hiện bằng được mục tiêu của mình. Chúng tôi vượt qua bao sự hoài nghi để chứng minh rằng chúng ta hoàn toàn có thể tạo ra những sản phẩm dinh dưỡng cao cho mọi người, mọi nhà. Hơn ai hết, chúng tôi tin cái khó mới là cái đáng để làm, và sẽ không ai thay mình làm.\r\n \r\nTừ nhà máy sữa bột trẻ em Dielac được khôi phục bằng năng lực kỹ thuật thuần Việt năm 1989, đến trang trại và nhà máy sữa tiên phong đạt chứng nhận trung hòa carbon tại Đông Nam Á.\r\n \r\nTừ công thức sữa bột Dielac đầu tiên được nghiên cứu để phù hợp với thể trạng trẻ em Việt Nam, đến danh mục hơn 350 sản phẩm cho mọi lứa tuổi, hiện diện tại 65+ quốc gia.\r\n \r\n⸻\r\nTẠI VINAMILK – BẠN KHÔNG CHỈ ĐI LÀM\r\nMà còn trở thành một phần của hành trình mang tầm vóc quốc gia.\r\nỞ đây, mỗi con người đều góp một dấu ấn để viết tiếp câu chuyện gần nửa thế kỷ:\r\n- Dám nghĩ lớn\r\n- Dám quyết tâm\r\n- Không ngừng tốt hơn mỗi ngày\r\nChúng tôi gọi đó là “Chất Vinamilk” – 10 ADN làm nên những con người luôn phát triển.\r\nBạn sẽ không đứng yên trong một vị trí.\r\nBạn sẽ:\r\n- Học từ những người giỏi nhất\r\n- Được trao quyền để sáng tạo\r\n- Được tin tưởng để dẫn dắt\r\n- Và trưởng thành cùng những dự án có thật – tác động thật\r\n \r\nMỘT NƠI LÀM VIỆC – NHIỀU PHIÊN BẢN CỦA BẠN\r\nCó thể hôm nay bạn:\r\n- Nhiệt huyết\r\n- Điềm tĩnh\r\n- Quyết liệt\r\n- Âm thầm bứt phá\r\nNhưng khi bước vào Vinamilk, bạn sẽ nhận ra: phiên bản bạn từng nghĩ là giới hạn – chỉ là điểm khởi đầu.\r\nVì mỗi ngày ở đây đều là một “đề bài mới” để bạn khám phá những khả năng mà chính bạn cũng chưa từng gọi tên.\r\n \r\nCHÚNG TÔI CHĂM CHÚT CHO BẠN\r\n- Lộ trình phát triển rõ ràng\r\n- Chính sách đãi ngộ cạnh tranh\r\n- Chương trình đào tạo toàn diện\r\n- Văn hóa nhân văn – gắn kết – truyền cảm hứng\r\n- Cơ hội thăng tiến cùng tốc độ tăng trưởng của một thương hiệu dẫn đầu\r\n⸻\r\nCÙNG NHAU MANG NIỀM TỰ HÀO VINAMILK\r\nKhông chỉ là:\r\n- Thương hiệu quốc gia\r\n- Top 50 công ty sữa lớn nhất thế giới\r\n- Top 1 thương hiệu sữa tiềm năng nhất thế giới\r\nMà còn là:\r\n- Top nơi làm việc mà người lao động Việt Nam khao khát được thuộc về.\r\n⸻\r\nVÀ CHÚNG TÔI ĐANG TÌM BẠN\r\nNếu bạn muốn:\r\n- Không chỉ có một công việc\r\nMà có một hành trình\r\n- Không chỉ phát triển sự nghiệp\r\nMà cùng phụng sự con người\r\n- Không chỉ tốt hơn mỗi ngày\r\nMà tạo ra giá trị cho hàng triệu gia đình Việt Nam và thế giới\r\nVinamilk là nơi dành cho bạn.\r\n⸻\r\nCÙNG NHAU - LÀM NÊN LỊCH SỬ"])</script><script>self.__next_f.push([1,"24:Tac2,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJob Summary\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe Chief Accountant is responsible to the Executive Director of Finance for establishing, organizing, managing, supervising, and controlling all accounting activities across the Company, ensuring compliance with Vietnamese accounting regulations and standards.\u003c/p\u003e\u003cp\u003eThe role also ensures that financial statements are prepared in accordance with VAS and IAS/IFRS, reflecting timely, truthful, and reasonable financial performance, thereby enhancing financial transparency in the market.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Annual Planning \u0026 Budget Control\u003c/p\u003e\u003cp\u003e- Develop annual departmental plans for operating budget, investments, and staffing\u003c/p\u003e\u003cp\u003e- Organize and control cost usage within the approved annual budget\u003c/p\u003e\u003cp\u003e2. Accounting System Management\u003c/p\u003e\u003cp\u003e- Establish, operate, manage, and control all accounting activities across the Company\u003c/p\u003e\u003cp\u003e+ Organize accounting books, accounting documents, accounting data systems\u003c/p\u003e\u003cp\u003e+ Manage and ensure operational efficiency of the Financial Accounting Department\u003c/p\u003e\u003cp\u003e+ Supervise accounting operations at subsidiaries\u003c/p\u003e\u003cp\u003e+ Provide accounting guidance and support to subsidiaries\u003c/p\u003e\u003cp\u003e3. Accounting Policies \u0026 Compliance\u003c/p\u003e\u003cp\u003e- Develop, guide, and monitor the application of accounting policies and regulations\u003c/p\u003e\u003cp\u003e- Propose improvements to related policies and procedures\u003c/p\u003e\u003cp\u003e- Update and implement new accounting standards, accounting regimes, and relevant tax/legal regulations\u003c/p\u003e\u003cp\u003e4. Financial Reporting\u003c/p\u003e\u003cp\u003e- Prepare and review financial statements in accordance with VAS and IAS/IFRS\u003c/p\u003e\u003cp\u003e- Work with external auditors on: Quarterly reviews, Semi-annual reviews, Annual audits\u003c/p\u003e\u003cp\u003e5. Audits, Inspections \u0026 Regulatory Reporting\u003c/p\u003e\u003cp\u003e- Coordinate with relevant departments when receiving: State audits, Tax inspections, Price-registration inspections\u003c/p\u003e\u003cp\u003e- Prepare statutory reports, including statistical reports, Product price registration with competent authorities\u003c/p\u003e\u003cp\u003e6. ERP \u0026 Accounting Systems Implementation\u003c/p\u003e\u003cp\u003e- Coordinate with relevant departments to: Establish accounting modules in ERP systems (for Vinamilk and subsidiaries)\u003c/p\u003e\u003cp\u003e- Implement ERP systems for newly established entities\u003c/p\u003e\u003cp\u003e- Provide accounting guidance and support to subsidiaries\u003c/p\u003e\u003cp\u003e7. People Management \u0026 Development\u003c/p\u003e\u003cp\u003e- Evaluate performance of subordinates\u003c/p\u003e\u003cp\u003e- Coach, train, and develop team capabilities to meet job requirements\u003c/p\u003e\u003cp\u003e8. Advisory \u0026 Other Duties\u003c/p\u003e\u003cp\u003e- Advise the Executive Director of Finance on financial matters arising from regulatory gaps or inconsistencies\u003c/p\u003e\u003cp\u003e- Perform other tasks as assigned by the Executive Director of Finance\u003c/p\u003e\u003cp\u003e- Prepare ad-hoc reports as required\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T705,\u003cp\u003e\u003cstrong\u003eEducation \u0026 Professional Qualifications\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Bachelor’s Degree or higher\u003c/p\u003e\u003cp\u003e- Major in Accounting / Finance / Auditing\u003c/p\u003e\u003cp\u003e- Chief Accountant Certificate issued by the Ministry of Finance (mandatory)\u003c/p\u003e\u003cp\u003e- Professional certifications preferred: ACCA, CFA, CMA, etc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExperience Requirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- 9–12 years of practical management experience, including at least 3 years in an equivalent position\u003c/p\u003e\u003cp\u003e- Experience gained in large-scale companies, preferably in: Food industry, FMCG (Fast-Moving Consumer Goods) or other relevant industries\u003c/p\u003e\u003cp\u003e- Proven experience in organizing and preparing financial statements in accordance with: Vietnamese Accounting Standards (VAS), International Accounting Standards (IAS) \u0026 IFRS\u003c/p\u003e\u003cp\u003eProfessional Knowledge \u0026 Skills\u003c/p\u003e\u003cp\u003e- Strong understanding of: Vietnamese laws and regulations, Accounting Law, Vietnamese Accounting Standards, International Accounting Standards, Vietnamese accounting systems and regulations\u003c/p\u003e\u003cp\u003e- In-depth knowledge of financial management in large corporations\u003c/p\u003e\u003cp\u003e- Knowledge of financial investments\u003c/p\u003e\u003cp\u003e- Leadership and people development skills\u003c/p\u003e\u003cp\u003e- Project management skills\u003c/p\u003e\u003cp\u003e- Ability to work independently and collaboratively\u003c/p\u003e\u003cp\u003e- Strong communication, analytical, and presentation skills\u003c/p\u003e\u003cp\u003e- Negotiation, influencing, and problem-solving skills\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOther Requirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- English proficiency: fluent in communication, reading, and writing\u003c/p\u003e\u003cp\u003e- IT skills: proficient in Word, Excel, PowerPoint; ERP system experience preferred\u003c/p\u003e\u003cp\u003e- High professional ethics, integrity, honesty\u003c/p\u003e\u003cp\u003e- Good legal compliance awareness\u003c/p\u003e\u003cp\u003e- Understanding of corporate environment and proactive contribution to company culture\u003c/p\u003e26:Td9f,"])</script><script>self.__next_f.push([1,"VINAMILK – NƠI NHỮNG GIẤC MƠ LỚN ĐƯỢC NUÔI DƯỠNG\r\n \r\nNăm 1976, Vinamilk bắt đầu cuộc hành trình với rất nhiều khó khăn, nhưng đích đến vô cùng xứng đáng: để dinh dưỡng là quyền lợi của tất cả trẻ em Việt Nam. Không có chuyên gia tư vấn, không có nguồn vốn, điều chúng tôi có nhiều nhất lúc đó là quyết tâm thực hiện bằng được mục tiêu của mình. Chúng tôi vượt qua bao sự hoài nghi để chứng minh rằng chúng ta hoàn toàn có thể tạo ra những sản phẩm dinh dưỡng cao cho mọi người, mọi nhà. Hơn ai hết, chúng tôi tin cái khó mới là cái đáng để làm, và sẽ không ai thay mình làm.\r\n \r\nTừ nhà máy sữa bột trẻ em Dielac được khôi phục bằng năng lực kỹ thuật thuần Việt năm 1989, đến trang trại và nhà máy sữa tiên phong đạt chứng nhận trung hòa carbon tại Đông Nam Á.\r\n \r\nTừ công thức sữa bột Dielac đầu tiên được nghiên cứu để phù hợp với thể trạng trẻ em Việt Nam, đến danh mục hơn 350 sản phẩm cho mọi lứa tuổi, hiện diện tại 65+ quốc gia.\r\n \r\n⸻\r\nTẠI VINAMILK – BẠN KHÔNG CHỈ ĐI LÀM\r\nMà còn trở thành một phần của hành trình mang tầm vóc quốc gia.\r\nỞ đây, mỗi con người đều góp một dấu ấn để viết tiếp câu chuyện gần nửa thế kỷ:\r\n- Dám nghĩ lớn\r\n- Dám quyết tâm\r\n- Không ngừng tốt hơn mỗi ngày\r\nChúng tôi gọi đó là “Chất Vinamilk” – 10 ADN làm nên những con người luôn phát triển.\r\nBạn sẽ không đứng yên trong một vị trí.\r\nBạn sẽ:\r\n- Học từ những người giỏi nhất\r\n- Được trao quyền để sáng tạo\r\n- Được tin tưởng để dẫn dắt\r\n- Và trưởng thành cùng những dự án có thật – tác động thật\r\n \r\nMỘT NƠI LÀM VIỆC – NHIỀU PHIÊN BẢN CỦA BẠN\r\nCó thể hôm nay bạn:\r\n- Nhiệt huyết\r\n- Điềm tĩnh\r\n- Quyết liệt\r\n- Âm thầm bứt phá\r\nNhưng khi bước vào Vinamilk, bạn sẽ nhận ra: phiên bản bạn từng nghĩ là giới hạn – chỉ là điểm khởi đầu.\r\nVì mỗi ngày ở đây đều là một “đề bài mới” để bạn khám phá những khả năng mà chính bạn cũng chưa từng gọi tên.\r\n \r\nCHÚNG TÔI CHĂM CHÚT CHO BẠN\r\n- Lộ trình phát triển rõ ràng\r\n- Chính sách đãi ngộ cạnh tranh\r\n- Chương trình đào tạo toàn diện\r\n- Văn hóa nhân văn – gắn kết – truyền cảm hứng\r\n- Cơ hội thăng tiến cùng tốc độ tăng trưởng của một thương hiệu dẫn đầu\r\n⸻\r\nCÙNG NHAU MANG NIỀM TỰ HÀO VINAMILK\r\nKhông chỉ là:\r\n- Thương hiệu quốc gia\r\n- Top 50 công ty sữa lớn nhất thế giới\r\n- Top 1 thương hiệu sữa tiềm năng nhất thế giới\r\nMà còn là:\r\n- Top nơi làm việc mà người lao động Việt Nam khao khát được thuộc về.\r\n⸻\r\nVÀ CHÚNG TÔI ĐANG TÌM BẠN\r\nNếu bạn muốn:\r\n- Không chỉ có một công việc\r\nMà có một hành trình\r\n- Không chỉ phát triển sự nghiệp\r\nMà cùng phụng sự con người\r\n- Không chỉ tốt hơn mỗi ngày\r\nMà tạo ra giá trị cho hàng triệu gia đình Việt Nam và thế giới\r\nVinamilk là nơi dành cho bạn.\r\n⸻\r\nCÙNG NHAU - LÀM NÊN LỊCH SỬ"])</script><script>self.__next_f.push([1,"29:Td9f,"])</script><script>self.__next_f.push([1,"VINAMILK – NƠI NHỮNG GIẤC MƠ LỚN ĐƯỢC NUÔI DƯỠNG\r\n \r\nNăm 1976, Vinamilk bắt đầu cuộc hành trình với rất nhiều khó khăn, nhưng đích đến vô cùng xứng đáng: để dinh dưỡng là quyền lợi của tất cả trẻ em Việt Nam. Không có chuyên gia tư vấn, không có nguồn vốn, điều chúng tôi có nhiều nhất lúc đó là quyết tâm thực hiện bằng được mục tiêu của mình. Chúng tôi vượt qua bao sự hoài nghi để chứng minh rằng chúng ta hoàn toàn có thể tạo ra những sản phẩm dinh dưỡng cao cho mọi người, mọi nhà. Hơn ai hết, chúng tôi tin cái khó mới là cái đáng để làm, và sẽ không ai thay mình làm.\r\n \r\nTừ nhà máy sữa bột trẻ em Dielac được khôi phục bằng năng lực kỹ thuật thuần Việt năm 1989, đến trang trại và nhà máy sữa tiên phong đạt chứng nhận trung hòa carbon tại Đông Nam Á.\r\n \r\nTừ công thức sữa bột Dielac đầu tiên được nghiên cứu để phù hợp với thể trạng trẻ em Việt Nam, đến danh mục hơn 350 sản phẩm cho mọi lứa tuổi, hiện diện tại 65+ quốc gia.\r\n \r\n⸻\r\nTẠI VINAMILK – BẠN KHÔNG CHỈ ĐI LÀM\r\nMà còn trở thành một phần của hành trình mang tầm vóc quốc gia.\r\nỞ đây, mỗi con người đều góp một dấu ấn để viết tiếp câu chuyện gần nửa thế kỷ:\r\n- Dám nghĩ lớn\r\n- Dám quyết tâm\r\n- Không ngừng tốt hơn mỗi ngày\r\nChúng tôi gọi đó là “Chất Vinamilk” – 10 ADN làm nên những con người luôn phát triển.\r\nBạn sẽ không đứng yên trong một vị trí.\r\nBạn sẽ:\r\n- Học từ những người giỏi nhất\r\n- Được trao quyền để sáng tạo\r\n- Được tin tưởng để dẫn dắt\r\n- Và trưởng thành cùng những dự án có thật – tác động thật\r\n \r\nMỘT NƠI LÀM VIỆC – NHIỀU PHIÊN BẢN CỦA BẠN\r\nCó thể hôm nay bạn:\r\n- Nhiệt huyết\r\n- Điềm tĩnh\r\n- Quyết liệt\r\n- Âm thầm bứt phá\r\nNhưng khi bước vào Vinamilk, bạn sẽ nhận ra: phiên bản bạn từng nghĩ là giới hạn – chỉ là điểm khởi đầu.\r\nVì mỗi ngày ở đây đều là một “đề bài mới” để bạn khám phá những khả năng mà chính bạn ột phần của hành trình mang tầm vóc quốc gia.\r\nỞ đây, mỗi con người đều góp một dấu ấn để viết tiếp câu chuyện gần nửa thế kỷ:\r\n- Dám nghĩ lớn\r\n- Dám quyết tâm\r\n- Không ngừng tốt hơn mỗi ngày\r\nChúng tôi gọi đó là “Chất Vinamilk” – 10 ADN làm nên những con người luôn phát triển.\r\nBạn sẽ không đứng yên trong một vị trí.\r\nBạn sẽ:\r\n- Học từ những người giỏi nhất\r\n- Được trao quyền để sáng tạo\r\n- Được tin tưởng để dẫn dắt\r\n- Và trưởng thành cùng những dự án có thật – tác động thật\r\n \r\nMỘT NƠI LÀM VIỆC – NHIỀU PHIÊN BẢN CỦA BẠN\r\nCó thể hôm nay bạn:\r\n- Nhiệt huyết\r\n- Điềm tĩnh\r\n- Quyết liệt\r\n- Âm thầm bứt phá\r\nNhưng khi bước vào Vinamilk, bạn sẽ nhận ra: phiên bản bạn từng nghĩ là giới hạn – chỉ là điểm khởi đầu.\r\nVì mỗi ngày ở đây đều là một “đề bài mới” để bạn khám phá những khả năng mà chính bạn cũng chưa từng gọi tên.\r\n \r\nCHÚNG TÔI CHĂM CHÚT CHO BẠN\r\n- Lộ trình phát triển rõ ràng\r\n- Chính sách đãi ngộ cạnh tranh\r\n- Chương trình đào tạo toàn diện\r\n- Văn hóa nhân văn – gắn kết – truyền cảm hứng\r\n- Cơ hội thăng tiến cùng tốc độ tăng trưởng của một thương hiệu dẫn đầu\r\n⸻\r\nCÙNG NHAU MANG NIỀM TỰ HÀO VINAMILK\r\nKhông chỉ là:\r\n- Thương hiệu quốc gia\r\n- Top 50 công ty sữa lớn nhất thế giới\r\n- Top 1 thương hiệu sữa tiềm năng nhất thế giới\r\nMà còn là:\r\n- Top nơi làm việc mà người lao động Việt Nam khao khát được thuộc về.\r\n⸻\r\nVÀ CHÚNG TÔI ĐANG TÌM BẠN\r\nNếu bạn muốn:\r\n- Không chỉ có một công việc\r\nMà có một hành trình\r\n- Không chỉ phát triển sự nghiệp\r\nMà cùng phụng sự con người\r\n- Không chỉ tốt hơn mỗi ngày\r\nMà tạo ra giá trị cho hàng triệu gia đình Việt Nam và thế giới\r\nVinamilk là nơi dành cho bạn.\r\n⸻\r\nCÙNG NHAU - LÀM NÊN LỊCH SỬ"])</script><script>self.__next_f.push([1,"41:{\"companyId\":2811,\"jobImageURLs\":\"$42\",\"jobVideoURLs\":\"$43\",\"companyName\":\"Công Ty Cổ Phần Sữa Việt Nam (Vinamilk)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/b0/11208075.png
