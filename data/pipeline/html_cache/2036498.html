s/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T12f7,"])</script><script>self.__next_f.push([1,"GIỚI THIỆU\r\n\r\nVOPAK VIỆT NAM\r\n\r\nCông ty TNHH Vopak Việt Nam 100% vốn nước ngoài, là 1 chi nhánh của tổng công ty Vopak và là nhà cung cấp bồn chứa độc lập hàng đầu Thế Giới, ngày nay Vopak hoạt động ở 79 cảng tại 29 quốc gia.\r\n\r\nChúng tôi có mặt ở Việt Nam từ 2005, chúng tôi cũng là nhà cung cấp bồn chứa độc lập hàng đầu cho nhiều sản phẩm hóa dầu\r\n\r\nNhân viên là chìa khóa đến thành công của chúng tôi, do đó chúng tôi cố gắng để đảm bảo rằng tất cả mọi người yêu thích môi trường làm việc của họ, và được tưởng thưởng cho công việc khó khăn của họ. Vopak Việt Nam là một công ty với cơ hội bình đẳng.\r\n\r\nNHIỆM VỤ\r\nVopak Việt Nam đặt mục tiêu trở thành nhà cung cấp dịch vụ logistic đáng tin cậy nhất, chi phí hiệu quả nhất cho sản phẩm chất lỏng. Để đạt được điều này chúng ta phải có khả năng cung cấp có hiệu quả, chất lượng cao các dịch vụ đi kèm cùng với đạo đức, an toàn và tiêu chuẩn môi trường cao nhất. \r\n\r\nCHIẾN LƯỢC\r\nBằng cách liên tục đạt được thành tích tốt về an toàn, sức khỏe, môi trường, so với các khách hàng của chúng tôi, Vopak hướng tới việc được chọn là nhà cung cấp dịch vụ logistic cho các nhà cung cấp ngành công nghiệp hóa chất.\r\nCHÍNH SÁCH AN TOÀN, SỨC KHỎE, MÔI TRƯỜNG (SHE)\r\n\r\nTại Vopak Việt Nam, chúng tôi cam kết hoạt động và quản lý cảng của chúng tôi theo cách bảo vệ che chở con người tại cảng và môi trường để đạt được sự kinh doanh xuất sắc thông qua chỉ tiêu An Toàn, Sức Khỏe và Môi Trường.\r\n\r\nĐể đạt được các mục tiêu, chúng tôi cam kết những nguyên tắc sau:\r\n\r\no\tBảo vệ môi trường, sức khỏe và an toàn của tất cả các nhân viên, nhà thầu, nhà cung cấp, khách hàng và du khách.\r\no\tHệ thống kiểm soát, ngăn ngừa và loại bỏ các mối nguy hiểm SHE.\r\no\tGiám sát liên tục và rà soát các mục tiêu SHE.\r\no\tTuân thủ áp dụng yêu cầu pháp lý SHE và các yêu cầu khác;\r\no\tCải tiến liên tục các hoạt động và thi hành các mục tiêu SHE.\r\no\tCác khái niệm mà SHE bảo vệ là trách nhiệm của nhân viên và nhà thầu ở mọi cấp độ.\r\no\tBáo cáo nhanh chóng và điều tra tất cả các sự cố SHE; và\r\no\tThường xuyên đào tạo để nâng cao kỹ năng của người lao động và nhận thức SHE của họ.\r\n\r\nINTRODUCTION\r\n\r\nVOPAK VIETNAM\r\n\r\nVopak Viet Nam Co. Ltd. is 100% foreign owned, a branch of Vopak Corporation, who as the leading independent global tank terminal group, today, Vopak operates 79 terminals in 29 countries.\r\nWe have been in Viet Nam since 2005, we are also the leading independent storage provider for many chemical products.\r\nOur people are key to our business, so we strive to ensure that everybody enjoys their working environments, and is rewarded for their hard work. Vopak Viet Nam, is an equal opportunity employer.\r\n\r\nOUR MISSION\r\nVopak Viet Nam aims to be the most reliable, cost effective and efficient logistics service provider for bulk liquid products. To achieve this we must be able to provide efficient, high quality value adding services combined with the highest ethical, safety and environmental standards.  \r\n\r\nOUR STRATEGY\r\nBy achieving consistently good safety, health and environmental performance, comparable to that of our customers, Vopak aims to be selected as the logistics service provider of choice for suppliers in the chemical industry.\r\n\r\nSAFETY, HEALTH, ENVIRONMENT (SHE) POLICY\r\nAt Vopak (Vietnam) Co., Ltd, we are committed to operate and manage our terminal in a way that safeguard and protect people in our terminal and neighbors and the environment in order to achieve business excellence through outstanding Safety, Health and Environmental performance.\r\n\r\nTo attain our objectives, we are committed to the following principles:\r\n\r\no\tProtecting the environment and safeguarding the health \u0026 safety of all   \r\no\temployees, contractors, suppliers, customers and visitors;\r\no\tSystematic control, prevention \u0026 elimination of SHE hazard; \r\no\tContinual monitoring \u0026 reviewing of SHE targets;\r\no\tCompliance with applicable SHE legal and other requirements;\r\no\tContinual improvement in our operations and our SHE performance;\r\no\tThe concept that SHE protection is a responsibility of employees \u0026 contractors at every level; \r\no\tPrompt reporting \u0026 investigation of all SHE incidents; and\r\no\tRegular training to enhance workers’ skill and their SHE awareness."])</script><script>self.__next_f.push([1,"24:Taff,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e* Reporting to: \u003c/strong\u003eOperation Team leader\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Purpose of job: \u003c/strong\u003eTo perform operational activities in accordance with operating procedures, customers’ requirements and expectations, safety, environmental and quality standards.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Job Function:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.\tLoading master:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ea.\tPrepare tank, pipeline for vessel receiving/ loading according to vessel schedule\u003c/p\u003e\u003cp\u003eb.\tMonitor and ensure safe berthing \u0026 mooring of vessel\u003c/p\u003e\u003cp\u003ec.\tOnboard pre-discharge meeting for the discharge/ loading plan with ship captain/ chief officer\u003c/p\u003e\u003cp\u003ed.\tPerform ship-shore safety checklist and all shipment document\u003c/p\u003e\u003cp\u003ee.\tControl \u0026 monitor vessel discharge / loading plan\u003c/p\u003e\u003cp\u003ef.\tCo-ordinate with surveyors for cargo quality and quantity control, tank gauging, slopping, sampling, calculation of cargo receiving, loading\u003c/p\u003e\u003cp\u003eg.\tRecord, report and documentation\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.\tCCR Operator\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ea.\tPerform the activities at CCR: to prepare paperwork for Operation activities, to be a coordinator between other Departments, Operation Team leader(s) and Operations Manager, to control equipments from CCR upon request\u003c/p\u003e\u003cp\u003eb.\tMonitoring \u0026 operations of DCS of Vopak Vietnam Terminal is effectiveness and safety\u003c/p\u003e\u003cp\u003ec.\tSupport the team leader in planning daily order\u003c/p\u003e\u003cp\u003ed.\tOverall monitoring of terminal activities via DCS, control room\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3.\tOther\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ea.\tManage and control efficiently the equipments, process and tools that are handled to operation.\u003c/p\u003e\u003cp\u003eb.\tAnalyze, assess and report the shortcoming, unsafe of equipment, process and propose the improvement plan to operation team leader.\u003c/p\u003e\u003cp\u003ec.\tManage the production area in cleaning, and suitable for operation.\u003c/p\u003e\u003cp\u003ed.\tPerform the activities at Jetty, Tank farms, Truck loading bay, Drumming area based on assigned schedule by Operation Team leader.\u003c/p\u003e\u003cp\u003ee.\tReport to Operation Team leader.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Key Performance Indicators:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- All the equipments, process are available for operation.\u003c/p\u003e\u003cp\u003e- Operation works proceeding in schedule, quality and safety.\u0 các khách hàng của chúng tôi, Vopak hướng tới việc được chọn là nhà cung cấp dịch vụ logistic cho các nhà cung cấp ngành công nghiệp hóa chất.\r\nCHÍNH SÁCH AN TOÀN, SỨC KHỎE, MÔI TRƯỜNG (SHE)\r\n\r\nTại Vopak Việt Nam, chúng tôi cam kết hoạt động và quản lý cảng của chúng tôi theo cách bảo vệ che chở con người tại cảng và môi trường để đạt được sự kinh doanh xuất sắc thông qua chỉ tiêu An Toàn, Sức Khỏe và Môi Trường.\r\n\r\nĐể đạt được các mục tiêu, chúng tôi cam kết những nguyên tắc sau:\r\n\r\no\tBảo vệ môi trường, sức khỏe và an toàn của tất cả các nhân viên, nhà thầu, nhà cung cấp, khách hàng và du khách.\r\no\tHệ thống kiểm soát, ngăn ngừa và loại bỏ các mối nguy hiểm SHE.\r\no\tGiám sát liên tục và rà soát các mục tiêu SHE.\r\no\tTuân thủ áp dụng yêu cầu pháp lý SHE và các yêu cầu khác;\r\no\tCải tiến liên tục các hoạt động và thi hành các mục tiêu SHE.\r\no\tCác khái niệm mà SHE bảo vệ là trách nhiệm của nhân viên và nhà thầu ở mọi cấp độ.\r\no\tBáo cáo nhanh chóng và điều tra tất cả các sự cố SHE; và\r\no\tThường xuyên đào tạo để nâng cao kỹ năng của người lao động và nhận thức SHE của họ.\r\n\r\nINTRODUCTION\r\n\r\nVOPAK VIETNAM\r\n\r\nVopak Viet Nam Co. Ltd. is 100% foreign owned, a branch of Vopak Corporation, who as the leading independent global tank terminal group, today, Vopak operates 79 terminals in 29 countries.\r\nWe have been in Viet Nam since 2005, we are also the leading independent storage provider for many chemical products.\r\nOur people are key to our business, so we strive to ensure that everybody enjoys their working environments, and is rewarded for their hard work. Vopak Viet Nam, is an equal opportunity employer.\r\n\r\nOUR MISSION\r\nVopak Viet Nam aims to be the most reliable, cost effective and efficient logistics service provider for bulk liquid products. To achieve this we must be able to provide efficient, high quality value adding services combined with the highest ethical, safety and environmental standards.  \r\n\r\nOUR STRATEGY\r\nBy achieving consistently good safety, health and environmental performance, comparable to that of our customers, Vopak aims to be selected as the logistics service provider of choice for suppliers in the chemical industry.\r\n\r\nSAFETY, HEALTH, ENVIRONMENT (SHE) POLICY\r\nAt Vopak (Vietnam) Co., Ltd, we are committed to operate and manage our terminal in a way that safeguard and protect people in our terminal and neighbors and the environment in order to achieve business excellence through outstanding Safety, Health and Environmental performance.\r\n\r\nTo attain our objectives, we are committed to the following principles:\r\n\r\no\tProtecting the environment and safeguarding the health \u0026 safety of all   \r\no\temployees, contractors, suppliers, customers and visitors;\r\no\tSystematic control, prevention \u0026 elimination of SHE hazard; \r\no\tContinual monitoring \u0026 reviewing of SHE targets;\r\no\tCompliance with applicable SHE legal and other requirements;\r\no\tContinual improvement in our operations and our SHE performance;\r\no\tThe concept that SHE protection is a responsibility of employees \u0026 contractors at every level; \r\no\tPrompt reporting \u0026 investigation of all SHE incidents; and\r\no\tRegular training to enhance workers’ skill and their SHE awareness."])</script><script>self.__next_f.push([1,"28:T12f7,"])</script><script>self.__next_f.push([1,"GIỚI THIỆU\r\n\r\nVOPAK VIỆT NAM\r\n\r\nCông ty TNHH Vopak Việt Nam 100% vốn nước ngoài, là 1 chi nhánh của tổng công ty Vopak và là nhà cung cấp bồn chứa độc lập hàng đầu Thế Giới, ngày nay Vopak hoạt động ở 79 cảng tại 29 quốc gia.\r\n\r\nChúng tôi có mặt ở Việt Nam từ 2005, chúng tôi cũng là nhà cung cấp bồn chứa độc lập hàng đầu cho nhiều sản phẩm hóa dầu\r\n\r\nNhân viên là chìa khóa đến thành công của chúng tôi, do đó chúng tôi cố gắng để đảm bảo rằng tất cả mọi người yêu thích môi trường làm việc của họ, và được tưởng thưởng cho công việc khó khăn của họ. Vopak Việt Nam là mộ nCông ty TNHH Vopak Việt Nam 100% vốn nước ngoài, là 1 chi nhánh của tổng công ty Vopak và là nhà cung cấp bồn chứa độc lập hàng đầu Thế Giới, ngày nay Vopak hoạt động ở 79 cảng tại 29 quốc gia.\r\n\r\nChúng tôi có mặt ở Việt Nam từ 2005, chúng tôi cũng là nhà cung cấp bồn chứa độc lập hàng đầu cho nhiều sản phẩm hóa dầu\r\n\r\nNhân viên là chìa khóa đến thành công của chúng tôi, do đó chúng tôi cố gắng để đảm bảo rằng tất cả mọi người yêu thích môi trường làm việc của họ, và được tưởng thưởng cho công việc khó khăn của họ. Vopak Việt Nam là một công ty với cơ hội bình đẳng.\r\n\r\nNHIỆM VỤ\r\nVopak Việt Nam đặt mục tiêu trở thành nhà cung cấp dịch vụ logistic đáng tin cậy nhất, chi phí hiệu quả nhất cho sản phẩm chất lỏng. Để đạt được điều này chúng ta phải có khả năng cung cấp có hiệu quả, chất lượng cao các dịch vụ đi kèm cùng với đạo đức, an toàn và tiêu chuẩn môi trường cao nhất. \r\n\r\nCHIẾN LƯỢC\r\nBằng cách liên tục đạt được thành tích tốt về an toàn, sức khỏe, môi trường, so với các khách hàng của chúng tôi, Vopak hướng tới việc được chọn là nhà cung cấp dịch vụ logistic cho các nhà cung cấp ngành công nghiệp hóa chất.\r\nCHÍNH SÁCH AN TOÀN, SỨC KHỎE, MÔI TRƯỜNG (SHE)\r\n\r\nTại Vopak Việt Nam, chúng tôi cam kết hoạt động và quản lý cảng của chúng tôi theo cách bảo vệ che chở con người tại cảng và môi trường để đạt được sự kinh doanh xuất sắc thông qua chỉ tiêu An Toàn, Sức Khỏe và Môi Trường.\r\n\r\nĐể đạt được các mục tiêu, chúng tôi cam kết những nguyên tắc sau:\r\n\r\no\tBảo vệ môi trường, sức khỏe và an toàn của tất cả các nhân viên, nhà thầu, nhà cung cấp, khách hàng và du khách.\r\no\tHệ thống kiểm soát, ngăn ngừa và loại bỏ các mối nguy hiểm SHE.\r\no\tGiám sát liên tục và rà soát các mục tiêu SHE.\r\no\tTuân thủ áp dụng yêu cầu pháp lý SHE và các yêu cầu khác;\r\no\tCải tiến liên tục các hoạt động và thi hành các mục tiêu SHE.\r\no\tCác khái niệm mà SHE bảo vệ là trách nhiệm của nhân viên và nhà thầu ở mọi cấp độ.\r\no\tBáo cáo nhanh chóng và điều tra tất cả các sự cố SHE; và\r\no\tThường xuyên đào tạo để nâng cao kỹ năng của người lao động và nhận thức SHE của họ.\r\n\r\nINTRODUCTION\r\n\r\nVOPAK VIETNAM\r\n\r\nVopak Viet Nam Co. Ltd. is 100% foreign owned, a branch of Vopak Corporation, who as the leading independent global tank terminal group, today, Vopak operates 79 terminals in 29 countries.\r\nWe have been in Viet Nam since 2005, we are also the leading independent storage provider for many chemical products.\r\nOur people are key to our business, so we strive to ensure that everybody enjoys their working environments, and is rewarded for their hard work. Vopak Viet Nam, is an equal opportunity employer.\r\n\r\nOUR MISSION\r\nVopak Viet Nam aims to be the most reliable, cost effective and efficient logistics service provider for bulk liquid products. To achieve this we must be able to provide efficient, high quality value adding services combined with the highest ethical, safety and environmental standards.  \r\n\r\nOUR STRATEGY\r\nBy achieving consistently good safety, health and environmental performance, comparable to that of our customers, Vopak aims to be selected as the logistics service provider of choice for suppliers in the chemical industry.\r\n\r\nSAFETY, HEALTH, ENVIRONMENT (SHE) POLICY\r\nAt Vopak (Vietnam) Co., Ltd, we are committed to operate and manage our terminal in a way that safeguard and protect people in our terminal and neighbors and the environment in order to achieve business excellence through outstanding Safety, Health and Environmental performance.\r\n\r\nTo attain our objectives, we are committed to the following principles:\r\n\r\no\tProtecting the environment and safeguarding the health \u0026 safety of all   \r\no\temployees, contractors, suppliers, customers and visitors;\r\no\tSystematic control, prevention \u0026 elimination of SHE hazard; \r\no\tContinual monitoring \u0026 reviewing of SHE targets;\r\no\tCompliance with applicable SHE legal and other requirements;\r\no\tContinual improvement in our operations and our SHE performance;\r\no\tThe concept that SHE protection is a responsibility of employees \u0026 contractors at every level; \r\no\tPrompt reporting \u0026 investigation of all SHE incidents; and\r\no\tRegular training to enhance workers’ skill and their SHE awareness."])</script><script>self.__next_f.push([1,"3f:{\"companyId\":336003,\"jobImageURLs\":\"$40\",\"jobVideoURLs\":null,\"companyName\":\"Công Ty TNHH Vopak Việt Nam\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/d4/11021168.PNG\",\"companySizeId\":\"\",\"companyProfile\":\"$41\",\"contactName\":\"Ms Giang\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Ong Keo Industrial Park Nhon Trach District, Dong Nai Province, Vietnam\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n42:[\"isUrgentJobM\"]\n44:{\"serviceCode\":\"TPM\",\"startOn\":\"2026-04-07T15:55:39+07:00\",\"expiredOn\":\"2026-05-07T23:59:59+07:00\"}\n45:{\"serviceCode\":\"BPM\",\"startOn\":\"2026-04-07T15:55:39+07:00\",\"expiredOn\":\"2026-05-07T23:59:59+07:00\"}\n46:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-07T15:55:39+07:00\",\"expiredOn\":\"2026-05-07T23:59:59+07:00\"}\n43:[\"$44\",\"$45\",\"$46\"]\n47:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"27:{\"jobId\":2036498,\"jobTitle\":\"CCR Operator – Loading Master\",\"userId\":6526275,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/d4/11021168.PNG\",\"alias\":\"ccr-operator-loading-master\",\"createdOn\":\"2026-04-07T14:37:33+07:00\",\"approvedOn\":\"2026-04-07T15:55:39+07:00\",\"expiredOn\":\"2026-05-07T23:59:59+07:00\",\"lastUpdatedOn\":\"2026-04-07T1
