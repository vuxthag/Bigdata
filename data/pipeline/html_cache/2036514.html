fault\"]\n25:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tec9,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eAre you passionate about driving excellence in Packing training operations?\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eYour expertise and enthusiasm will elevate our Packing training programs, leading to enhanced efficiency, quality, and overall success at LEGO Manufacturing Vietnam.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWork Location:\u003c/strong\u003e Our factory is based in VSIP 3, Binh Co Ward, Ho Chi Minh city \u003cstrong\u003e(formerly called Hoi Nghia Ward, Tan Uyen - Binh Duong province)\u003c/strong\u003e. Shuttle buses are provided from Ho Chi Minh, Bien Hoa \u0026 Binh Duong.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* We think it’s important that you’re in control of your data and as part of the recruitment process; Your direct application at the LEGO Careers Website will be prioritized\u003c/strong\u003e. Please copy and paste the following URL into your browser for your application: \u003cstrong\u003ehttp://bit.ly/4vevsgT\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCore Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. People in the Training Organization\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Deliver on our processes to build and develop the training organization in Packing. This includes:\u003c/p\u003e\u003cp\u003e• Interview and select candidates for the shop-floor trainer role.\u003c/p\u003e\u003cp\u003e• Deliver standard training to certify shop-floor trainers in our training method (Job Instruction).\u003c/p\u003e\u003cp\u003e• Deliver training to build documentation skills for shop-floor trainers.\u003c/p\u003e\u003cp\u003e• Provide ongoing coaching and support related to training delivery.\u003c/p\u003e\u003cp\u003e• Provide overall leadership and development of the people within the training organization, based on the philosophy and framework provided by Learning \u0026 Development (L\u0026D - HR) and LEGO Continuous Improvement (LCI).\u003c/p\u003e\u003cp\u003e• Ensure high quality in training delivery by acting as a training coach and training methodology expert for shop-floor trainers.\u003c/p\u003e\u003cp\u003e• Work with area leaders (e.g., Shift Leaders) and L\u0026D to ensure the effectiveness and stability of the training organization.\u003c/p\u003e\u003cp\u003e• Ensure careful coordination and tracking of all mandatory shop-floor skills and knowledge training.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Training Documentation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• In close cooperation with L\u0026D and LCI, ensure a world-class standard of process documentation in the area.\u003c/p\u003e\u003cp\u003e• Collaborate closely with the Technical Writer.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Local Deployment\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Deploy the necessary infrastructure to achieve the goals of the training organization (processes, KPIs, visual management, etc.).\u003c/p\u003e\u003cp\u003e• Support the continuous improvement of the training organization.\u003c/p\u003e\u003cp\u003e• Actively support the area in achieving the desired level of training and workforce flexibility.\u003c/p\u003e\u003cp\u003e• Act as a strong partner for L\u0026D, LCI, and area leaders – as part of the area leadership team – representing the training organization and training needs.\u003c/p\u003e\u003cp\u003e• Analyze training needs arising from strategic initiatives, the Business Plan, and MWBs, and translate them into training capacity requirements.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Global Responsibility\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Build strong global relationships with colleagues from other sites and actively promote coherence and collaboration between plants and departments.\u003c/p\u003e\u003cp\u003e• Drive the handover (Train-the-Trainer) of global strategic initiatives piloted on site, including global standards and documentation.\u003c/p\u003e\u003cp\u003e• Act as an ambassador for the global alignment of processes and training documentation.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePlay Your Part in Our Team Succeeding\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe focus of the department led by the Training Manager is to develop functional expertise within the specific area through a strong and competent training organization, supporting globalization and growth.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tcdd,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eDo You Have What It Takes?\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Bachelor’s or Master’s degree in Engineering or a related field, with basic technical knowledge or experience in a production-related environment.\u003c/p\u003e\u003cp\u003e• Approximately 5–7 years of experience in training, preferably within a technical or production environment, combined with solid experience in learning, development, and training activities.\u003c/p\u003e\u003cp\u003e• At least 3 years of leadership experience (not necessarily in training; experience in a production area is also relevant).\u003c/p\u003e\u003cp\u003e• Proficient in both written and spoken English and Vietnamese.\u003c/p\u003e\u003cp\u003e• Willingness to travel approximately 2 months per year.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eApplications are reviewed on an ongoing basis. However, please note we do amend or withdraw our jobs and reserve the right to do so at any time, including prior to any advertised closing date. So, if you're interested in this role we encourage you to apply as soon as possible.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat’s in it for you?\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHere is what you can expect:\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFamily Care Leave\u003c/strong\u003e - We offer enhanced paid leave options for those important times.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInsurances\u003c/strong\u003e – All colleagues are covered by our life and disability insurance which provides protection and peace of mind.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWellbeing\u003c/strong\u003e - We want our people to feel well and thrive. We offer resources and benefits to nurture physical and mental wellbeing along with opportunities to build community and inspire creativity.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eColleague Discount\u003c/strong\u003e – We know you'll love to build, so from day 1 you will qualify for our generous colleague discount.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBonus \u003c/strong\u003e- We do our best work to succeed together. When goals are reached and if eligible, you'll be rewarded through our bonus scheme.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWorkplace\u003c/strong\u003e - When you join the team you'll be assigned a primary workplace location i.e. one of our Offices, stores or factories. Our hybrid work policy means an average of 3 days per week in the office. The hiring team will discuss the policy and role eligibility with you during the recruitment process.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eChildren are our role models. Their curiosity, creativity and imagination inspire everything we do. We strive to create a diverse, dynamic and inclusive culture of play at the LEGO Group, where everyone feels safe, valued and they belong.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eThe LEGO Group is highly committed to equal employment opportunity and equal pay and seeks to encourage applicants from all backgrounds (eg. sex, gender identity or expression, race/ethnicity, national origin, sexual orientation, disability, age and religion) to apply for roles in our team.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe LEGO Group is fully committed to Children’s Rights and Child Wellbeing across the globe. Candidates offered positions with high engagement with children are required to take part in Child Safeguarding Background Screening, as a condition of the offer.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eThank you for sharing our global commitment to Children’s Rights.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eJust imagine building your dream career.\u003c/p\u003e\u003cp\u003eThen make it real.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJoin the LEGO® team today.\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Tec9,"])</script><script>self.__next_f.push([1,"\u003cp
