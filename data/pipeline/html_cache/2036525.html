 chính của ch"])</script><script>self.__next_f.push([1,"úng tôi trên khắp thế giới. Chúng tôi chuyên quản lý nhà máy đối tác, chuỗi cung ứng, logistic, phân phối và bán các sản phẩm của công ty chúng tôi trên toàn thế giới. Công ty chúng tôi có hơn 1000 nhân viên. Chúng tôi là một tập thể gồm những cá nhân đầy nhiệt huyết, sáng tạo, làm việc cùng nhau để thích ứng với cả thị trường luôn thay đổi và những thách thức do tăng trưởng mang lại. Con người là huyết mạch của bất kỳ tổ chức nào; Khi GigaCloud Technology đã phát triển, chúng tôi đã có một quyết định tỉnh táo là đặt Con người lên hàng đầu, mang đến cho nhân viên cơ hội phát triển và thành công trong sự nghiệp cùng chúng tôi.24:T760,\u003cp\u003e\u003cstrong\u003eDue to our company's growth and development needs, we are seeking Furniture Sourcing Manager and Furniture Development Specialists in Quy Nhon/ Binh Duong /\u003cem\u003e Do nhu cầu phát triển của Công ty, chúng tôi cần tuyển Quản lý Nguồn cung ứng nội ngoại thất và Chuyên viên phát triển nội thất làm việc tại  Quy Nhơn/ Bình Dương.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDuties and Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tSample Flow Development – \u003cem\u003ePhát triển dòng mẫu sản phẩm\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e-\t\u003c/em\u003eFactory Management \u003cem\u003e– Quản lý nhà máy\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e-\t\u003c/em\u003eNew factory sourcing\u003cem\u003e – Tìm kiếm nhà máy mới\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e-\t\u003c/em\u003eSample Completion\u003cem\u003e – Hoàn thành mẫu\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e-\t\u003c/em\u003eExperience in interior and exterior products, especially furniture exported to the US, with diverse structures and raw materials, knowledge of product quality.\u003cem\u003e – Có kinh nghiệm về các sản phẩm nội ngoại thất,
