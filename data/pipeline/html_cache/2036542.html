từng thời kỳ, cung cấp cho khách hàng các sản phẩm và Dịch vụ Ngân hàng Ưu tiên (\"DVNHƯT\").\u003c/p\u003e\u003cp\u003e•\tThực hiện các hoạt động tư vấn tài chính cá nhân trên danh mục KH để phát triển giá trị and thực hiện các chỉ tiêu kinh doanh.\u003c/p\u003e\u003cp\u003e•\tQuản lý mối quan hệ and xây dựng/ phát triển quan hệ với các khách hàng.\u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm chính\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. KHÁCH HÀNG: CUNG CẤP GIẢI PHÁP TÀI CHÍNH PHÙ HỢP VỚI NHU CẦU CỦA KHÁCH HÀNG \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKhai thác thông tin, phân tích and đánh giá nhu cầu khách hàng để hiểu mục tiêu tài chính toàn diện của khách hàng dựa trên am hiểu khách hàng cá nhân, am hiểu phân khúc and tiểu phân khúc và am hiểu danh mục.\u003c/p\u003e\u003cp\u003e•\tPhân tích các sản phẩm/ dịch vụ KH đang sử dụng, các chỉ số tài chính khách hàng để đánh giá được sức khỏe tài chính của khách hàng.\u003c/p\u003e\u003cp\u003e•\tChăm sóc giao dịch, tư vấn giải pháp, đề xuất các sản phẩm dịch vụ dành cho Khách hàng ưu tiên phù hợp với mục tiêu và nhu cầu tài chính và phong cách sống của khách hàng.\u003c/p\u003e\u003cp\u003e•\tQuản lý, chăm sóc danh mục khách hàng ưu tiên được giao định kỳ and đánh giá được hiệu quả danh mục khách hàng.\u003c/p\u003e\u003cp\u003e•\tXây dựng mạng lưới khách hàng, mở rộng các quan hệ từ tệp khách hàng sẵn có để khai thác, tìm kiếm các khách hàng tiềm năng.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. DỊCH VỤ: CUNG CẤP DỊCH VỤ NGÂN HÀNG ƯU TIÊN VỚI TRẢI NGHIỆM KHÁCH HÀNG XUẤT SẮC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTrực tiếp tiếp nhận and thực hiện các yêu cầu về giao dịch của khách hàng, hợp tác với các bộ phận liên quan, xử lý theo SLA để đưa đến trải nghiệm dịch vụ tốt nhất cho khách hàng.\u003c/p\u003e\u003cp\u003e•\tLiên tục cập nhật cho khách hàng các tính năng mới, lợi ích mới của SPDV khách hàng đang sử dụng, các chính sách, quy định có tác động đến tài sản khách hàng và thông tin thay đổi của thị trường, xu thế.\u003c/p\u003e\u003cp\u003e•\tCung cấp các giải pháp dịch vụ tổng thể cho các khách hàng đáp ứng tối đa các nhu cầu giao dịch, tiết kiệm, tín dụng, đầu tư, bảo hiểm của khách hàng.\u003c/p\u003e\u003cp\u003e•\tGhi nhận and phản hồi ý kiến của khách hàng về SPDV và đề xuất các giải pháp để nâng cao tiêu chuẩn chất lượng dịch vụ cho khách hàng ưu tiên.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. HỆ THỐNG: TUÂN THỦ VẬN HÀNH and QUẢN LÝ RỦI RO \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện nhận biết thông tin khách hàng (Amlock, KYC, SA...) cũng như các dấu hiệu cảnh báo trước, trong và sau khi giao dịch của khách hàng, đảm bảo tuân thủ đúng quy trình, quy định của Techcombank và pháp luật.\u003c/p\u003e\u003cp\u003e•\tThực hiện công việc theo đúng chính sách, quy định, quy trình, hướng dẫn nội bộ... và cam kết chất lượng dịch vụ (SLAs).\u003c/p\u003e\u003cp\u003e•\tTuân thủ đầy đủ tiêu chuẩn chất lượng dịch vụ dành cho vị trí và các nội quy quy định khác của Ngân hàng theo từng thời kỳ.\u003c/p\u003e\u003cp\u003e•\tQuản lý rủi ro tín dụng, rủi ro vận hành trên danh mục khách hàng.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các bộ phận/ đơn vị trong chi nhánh and nội bộ Techcombank đảm bảo thực hiện giao dịch và yêu cầu của khách hàng một cách nhanh chóng and triệt để.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. NHÂN SỰ: PHÁT TRIỂN CON NGƯỜI VÀ VĂN HÓA TỔ CHỨC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý việc triển khai kế hoạch cá nhân (PDP) để nâng cao hiệu quả công việc và phục vụ cho việc phát triển bản thân.\u003c/p\u003e\u003cp\u003e•\tTuân thủ các chương trình đào tạo, tập huấn theo yêu cầu của TCB.\u003c/p\u003e\u003cp\u003e•\tĐóng góp vào các hoạt động xây dựng and phát triển văn hóa tổ chức.\u003c/p\u003e\u003cp\u003e•\tLuôn có thái độ cởi mở chia sẻ thông tin với người khác and tinh thần sẵn sàng đón nhận thay đổi.\u003c/p\u003e\u003cp\u003e•\tLàm chủ, chịu trách nhiệm trong công việc thông qua định hướng rõ ràng, hướng đến kết quả vượt trội.\u003c/p\u003e\u003cp\u003e•\tXây dựng văn hóa gắn kết, khuyến khích đồng nghiệp đạt được thành công.\u003c/p\u003e\u003cp\u003e•\tNhận thức đầy đủ về văn hóa tổ chức của Techcombank và thực hiện nhiệm vụ theo tinh thần của 5 giá trị cốt lõi, chuẩn mực hành vi của TCB, thể hiện DNA của Techcomer.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. QUẢN TRỊ HIỆU QUẢ: QUẢN LÝ KẾ HOẠCH and KẾT QUẢ KINH DOANH \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch kinh doanh and phát triển khách hàng, thực hiện bán tăng/ bán chéo sản phẩm dựa trên danh mục khách hàng được giao để tối ưu hóa lợi ích của khách hàng và đạt được các chỉ tiêu kinh doanh được giao.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Thực hiện các công việc khác có liên quan theo chỉ đạo của cấp quản lý \u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T6fb,\u003cp\u003e\u003cstrong\u003e•\tBằng cấp:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eo\tTốt nghiệp Đại học chính quy loại Khá, Giỏi.\u003c/p\u003e\u003cp\u003eo\tƯu tiên chuyên ngành đào tạo: kinh tế, tài chính, ngân hàng, ngoại thương, quản trị kinh doanh.\u003c/p\u003e\u003cp\u003eo\tƯu tiên các du học sinh có chuyên ngành đào tạo tương đương tại các trường ĐH uy tín ở nước ngoài hoặc các ứng viên có chứng chỉ CFA, CPA, ACCA.\u003c/p\u003e\u003cp\u003eo\tTrình độ tiếng Anh: Có chứng chỉ Tiếng Anh Toeic (hoặc tương đương) thỏa mãn quy định của Ngân hàng từng thời kỳ.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKinh nghiệm chuyên môn:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eo\tCó ít nhất 5 năm kinh nghiệm về tín dụng, kinh doanh, bán hàng trực tiếp trong lĩnh vực tài chính ngân hàng.\u003c/p\u003e\u003cp\u003eo\tƯu tiên ứng viên ở vị trí tương đương tại các Ngân hàng khác.\u003c/p\u003e\u003cp\u003eo\tĐã có kinh nghiệm quản lý danh mục khách hàng.\u003c/p\u003e\u003cp\u003eo\tAm hiểu về hành vi và nhu cầu của đối tượng KHƯT.\u003c/p\u003e\u003cp\u003eo\tAm hiểu về nghiệp vụ tín dụng, các sản phẩm dành cho KHƯT bao gồm: giao dịch, tiết kiệm, tín dụng, đầu tư, bảo hiểm, thẻ... và có khả năng tư vấn gói giải pháp tài chính tổng thể cho khách hàng.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Lương cứng: Từ 25 triệu VNĐ/ Tháng + Incentive\u003c/p\u003e\u003cp\u003e• Được hỗ trợ nguồn khách hàng VIP có sẵn tại Techcombank\u003c/p\u003e\u003cp\u003e• Lộ trình thăng tiến lên các vị trí cấp cao rõ ràng (Giám đốc dịch vụ Ngân hàng ưu tiên; Giám đốc chi nhánh…) trong vòng 24 – 36 tháng;\u003c/p\u003e\u003cp\u003e• Làm việc trong môi trường năng động, chuyên nghiệp có nhiều cơ hội thăng tiến\u003c/p\u003e25:T657,“Nếu bạn có động lực, tự tin và sẵn sàng làm việc hết mình, hãy GIA NHẬP CHÚNG TÔI. Chúng tôi mang đến cho bạn cơ hội hiện thực hóa các khả năng của bạn trong một môi trường làm việc "])</script><script>self.__next_f.push([1,"đầy thách thức nhưng cũng rất thân thiện, nơi các nhân viên ưa thích chế độ lương thưởng cao tương ứng với hiệu quả làm việc, cơ hôi phát triển nghề nghiệp nhanh chóng và kinh nghiệm học hỏi ưu việt từ những nhà lãnh đạo đẳng cấp quốc tế”\r\nCông ty  hàng đầu\r\n•\tMột trong những ngân hàng hàng đầu và phát triển nhanh nhất tại Việt Nam.\r\n•\tVới đội ngũ lãnh đạo có sức thuyết phục đối với CBNV trong mọi hoạt động.\r\n•\tChú trọng đến yếu tố con người xoay quanh các giá trị.\r\nCông việc tốt\r\n•\tMôi trường làm việc thân thiện.\r\n•\tTự chủ và linh hoạt.\r\n•\tCơ hội tham gia vào nhiều lĩnh vực dựa trên nguyện vọng của từng cá nhân.\r\nCơ hội thăng tiến và phát triển \r\n•\tKhả năng thăng tiến nhanh chóng dựa trên kết quả làm việc.\r\n•\tCó cơ hội được huấn luyện và học hỏi từ các chuyên gia tài chính quốc tế (HSBC) và đội ngũ lãnh đạo hàng đầu trong nước.\r\n•\tChú trọng trong công tác đào tạo.\r\nChế  độ đãi ngộ\r\n•\tLương cố định cạnh tranh\r\n•\tCơ hội đạt được mức thưởng tài chính cao với kết quả làm việc tốt.\r\n•\tChế độ phúc lợi cạnh tranh.28:T1620,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMục tiêu\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eNgười đảm nhận vị trí chịu trách nhiệm: \u003c/p\u003e\u003cp\u003e•\tQuản lý trực tiếp danh mục khách hàng ưu tiên được giao theo quy định đối với phân cấp Gold PRM của Trung tâm Dịch vụ Ngân hàng Ưu tiên trong từng thời kỳ, cung cấp cho khách hàng các sản phẩm và Dịch vụ Ngân hàng Ưu tiên (\"DVNHƯT\").\u003c/p\u003e\u003cp\u003e•\tThực hiện các hoạt động tư vấn tài chính cá nhân trên danh mục KH để phát triển giá trị and thực hiện các chỉ tiêu kinh doanh.\u003c/p\u003e\u003cp\u003e•\tQuản lý mối quan hệ and xây dựng/ phát triển quan hệ với các khách hàng.\u003c/p\u003e\u003cp\u003e________________________________________\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrách nhiệm chính\u003c/strong\u003e \u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. KHÁCH HÀNG: CUNG CẤP GIẢI PHÁP TÀI CHÍNH PHÙ HỢP VỚI NHU CẦU CỦA KHÁCH HÀNG \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tKhai thác thông tin, phân tích and đánh giá nhu cầu khách hàng để hiểu mục tiêu tài chính toàn diện của khách hàng dựa trên am hiểu khách hàng cá nhân, am hiểu phân khúc and tiểu phân khúc và am hiểu danh mục.\u003c/p\u003e\u003cp\u003e•\tPhân tích các sản phẩm/ dịch vụ KH đang sử dụng, các chỉ số tài chính khách hàng để đánh giá được sức khỏe tài chính của khách hàng.\u003c/p\u003e\u003cp\u003e•\tChăm sóc giao dịch, tư vấn giải pháp, đề xuất các sản phẩm dịch vụ dành cho Khách hàng ưu tiên phù hợp với mục tiêu và nhu cầu tài chính và phong cách sống của khách hàng.\u003c/p\u003e\u003cp\u003e•\tQuản lý, chăm sóc danh mục khách hàng ưu tiên được giao định kỳ and đánh giá được hiệu quả danh mục khách hàng.\u003c/p\u003e\u003cp\u003e•\tXây dựng mạng lưới khách hàng, mở rộng các quan hệ từ tệp khách hàng sẵn có để khai thác, tìm kiếm các khách hàng tiềm năng.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. DỊCH VỤ: CUNG CẤP DỊCH VỤ NGÂN HÀNG ƯU TIÊN VỚI TRẢI NGHIỆM KHÁCH HÀNG XUẤT SẮC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTrực tiếp tiếp nhận and thực hiện các yêu cầu về giao dịch của khách hàng, hợp tác với các bộ phận liên quan, xử lý theo SLA để đưa đến trải nghiệm dịch vụ tốt nhất cho khách hàng.\u003c/p\u003e\u003cp\u003e•\tLiên tục cập nhật cho khách hàng các tính năng mới, lợi ích mới của SPDV khách hàng đang sử dụng, các chính sách, quy định có tác động đến tài sản khách hàng và thông tin thay đổi của thị trường, xu thế.\u003c/p\u003e\u003cp\u003e•\tCung cấp các giải pháp dịch vụ tổng thể cho các khách hàng đáp ứng tối đa các nhu cầu giao dịch, tiết kiệm, tín dụng, đầu tư, bảo hiểm của khách hàng.\u003c/p\u003e\u003cp\u003e•\tGhi nhận and phản hồi ý kiến của khách hàng về SPDV và đề xuất các giải pháp để nâng cao tiêu chuẩn chất lượng dịch vụ cho khách hàng ưu tiên.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. HỆ THỐNG: TUÂN THỦ VẬN HÀNH and QUẢN LÝ RỦI RO \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tThực hiện nhận biết thông tin khách hàng (Amlock, KYC, SA...) cũng như các dấu hiệu cảnh báo trước, trong và sau khi giao dịch của khách hàng, đảm bảo tuân thủ đúng quy trình, quy định của Techcombank và pháp luật.\u003c/p\u003e\u003cp\u003e•\tThực hiện công việc theo đúng chính sách, quy định, quy trình, hướng dẫn nội bộ... và cam kết chất lượng dịch vụ (SLAs).\u003c/p\u003e\u003cp\u003e•\tTuân thủ đầy đủ tiêu chuẩn chất lượng dịch vụ dành cho vị trí và các nội quy quy định khác của Ngân hàng theo từng thời kỳ.\u003c/p\u003e\u003cp\u003e•\tQuản lý rủi ro tín dụng, rủi ro vận hành trên danh mục khách hàng.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các bộ phận/ đơn vị trong chi nhánh and nội bộ Techcombank đảm bảo thực hiện giao dịch và yêu cầu của khách hàng một cách nhanh chóng and triệt để.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. NHÂN SỰ: PHÁT TRIỂN CON NGƯỜI VÀ VĂN HÓA TỔ CHỨC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý việc triển khai kế hoạch cá nhân (PDP) để nâng cao hiệu quả công việc và phục vụ cho việc phát triển bản thân.\u003c/p\u003e\u003cp\u003e•\tTuân thủ các chương trình đào tạo, tập huấn theo yêu cầu của TCB.\u003c/p\u003e\u003cp\u003e•\tĐóng góp vào các hoạt động xây dựng and phát triển văn hóa tổ chức.\u003c/p\u003e\u003cp\u003e•\tLuôn có thái độ cởi mở chia sẻ thông tin với người khác and tinh thần sẵn sàng đón nhận thay đổi.\u003c/p\u003e\u003cp\u003e•\tLàm chủ, chịu trách nhiệm trong công việc thông qua định hướng rõ ràng, hướng đến kết quả vượt trội.\u003c/p\u003e\u003cp\u003e•\tXây dựng văn hóa gắn kết, khuyến khích đồng nghiệp đạt được thành công.\u003c/p\u003e\u003cp\u003e•\tNhận thức đầy đủ về văn hóa tổ chức của Techcombank và thực hiện nhiệm vụ theo tinh thần của 5 giá trị cốt lõi, chuẩn mực hành vi của TCB, thể hiện DNA của Techcomer.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. QUẢN TRỊ HIỆU QUẢ: QUẢN LÝ KẾ HOẠCH and KẾT QUẢ KINH DOANH \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch kinh doanh and phát triển khách hàng, thực hiện bán tăng/ bán chéo sản phẩm dựa trên danh mục khách hàng được giao để tối ưu hóa lợi ích của khách hàng và đạt được các chỉ tiêu kinh doanh được giao.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Thực hiện các công việc khác có liên quan theo chỉ đạo của cấp quản lý \u003c/strong\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"29:T6fb,\u003cp\u003e\u003cstrong\u003e•\tBằng cấp:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eo\tTốt nghiệp Đại học chính quy loại Khá, Giỏi.\u003c/p\u003e\u003cp\u003eo\tƯu tiên chuyên ngành đào tạo: kinh tế, tài chính, ngân hàng, ngoại thương, quản trị kinh doanh.\u003c/p\u003e\u003cp\u003eo\tƯu tiên các du học sinh có chuyên ngành đào tạo tương đương tại các trường ĐH uy tín ở nước ngoài hoặc các ứng viên có chứng chỉ CFA, CPA, ACCA.\u003c/p\u003e\u003cp\u003eo\tTrình độ tiếng Anh: Có chứng chỉ Tiếng Anh Toeic (hoặc tương đương) thỏa mãn quy định của Ngân hàng từng thời kỳ.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKinh nghiệm chuyên môn:\u003c/strong\u003e \u003c/p\u003e\u003cp\u003eo\tCó ít nhất 5 năm kinh nghiệm về tín dụng, kinh doanh, bán hàng trực tiếp trong lĩnh vực tài chính ngân hàng.\u003c/p\u003e\u003cp\u003eo\tƯu tiên ứng viên ở vị trí tương đương tại các Ngân hàng khác.\u003c/p\u003e\u003cp\u003eo\tĐã có kinh nghiệm quản lý danh mục khách hàng.\u003c/p\u003e\u003cp\u003eo\tAm hiểu về hành vi và nhu cầu của đối tượng KHƯT.\u003c/p\u003e\u003cp\u003eo\tAm hiểu về nghiệp vụ tín dụng, các sản phẩm dành cho KHƯT bao gồm: giao dịch, tiết kiệm, tín dụng, đầu tư, bảo hiểm, thẻ... và có khả năng tư vấn gói giải pháp tài chính tổng thể cho khách hàng.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Lương cứng: Từ 25 triệu VNĐ/ Tháng + Incentive\u003c/p\u003e\u003cp\u003e• Được hỗ trợ nguồn khách hàng VIP có sẵn tại Techcombank\u003c/p\u003e\u003cp\u003e• Lộ trình thăng tiến lên các vị trí cấp cao rõ ràng (Giám đốc dịch vụ Ngân hàng ưu tiên; Giám đốc chi nhánh…) trong vòng 24 – 36 tháng;\u003c/p\u003e\u003cp\u003e• Làm việc trong môi trường năng động, chuyên nghiệp có nhiều cơ hội thăng tiến\u003c/p\u003e2b:{\"skillName\":\"Quản Lý Danh Mục Khách Hàng\",\"skillId\":201930,\"skillWeight\":100
