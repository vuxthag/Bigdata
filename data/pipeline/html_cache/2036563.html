908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T44a,Founded in 1992 by Jean François Harvey, the Montreal based Harvey Law Group (HLG) has maintained a presence throughout Asia, South America, and the Middle East since early beginnings. Today it has evolved into a leading multinational immigration and business law firm that has developed a worldwide reputation of excellence by providing sophisticated legal representation to businesses and individuals. With offices in Montreal, Hong Kong, Bangkok, Ho Chi Minh City, Phnom Penh, etc., along with a regional and international network, HLG has an extensive team that can provide exceptional support to a diverse global clientele.\r\n\r\nPresent in Vietnam since 2008, HLG has provided legal services and introduced immigration and investment programs from different countries including USA, Canada, Australia, Cyprus, Dominica, etc. to various clients in Vietnam. As part of the expansion of our operations, we are looking forward to "])</script><script>self.__next_f.push([1,"welcoming competent and dynamic candidates to join our professional and multicultural team and meet new challenges.\r\n\r\nwww.harveylawcorporation.com\r\nwww.dautudinhcu.com24:Tb1b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Job description: Case Officer – Ho Chi Minh City\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAs a member of the Processing team, you will report to your direct manager and work closely with other case officers, lawyers, as well as colleagues from other departments who are based in Vietnam and other countries. Your main duties will be:\u003c/p\u003e\u003cp\u003e• Collect and prepare documents as well as fill in forms as required by the immigration program and as instructed by lawyers in order to complete immigration applications before submitting to relevant authorities;\u003c/p\u003e\u003cp\u003e• Analyze and process each and every immigration application assigned in order to maximize client’s chance of success;\u003c/p\u003e\u003cp\u003e• Translate documents and interpret during meetings;\u003c/p\u003e\u003cp\u003e• Keep good communication with clients all along the case processing;\u003c/p\u003e\u003cp\u003e• Frequently update clients about government’s changes in immigration process and regulations;\u003c/p\u003e\u003cp\u003e• Participate in file reviewing and briefing sessions to prepare clients, notably for immigration interviews;\u003c/p\u003e\u003cp\u003e• Participate in Company’s general activities such as events, seminars, training sessions, etc. in Vietnam or other countries;\u003c/p\u003e\u003cp\u003e• Other duties as assigned.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tMô tả công việc: Nhân viên Xử lý hồ sơ – Làm việc tại TP. Hồ Chí Minh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLà thành viên của Bộ phận Xử lý hồ sơ thuộc HLG Việt Nam, nhân sự sẽ báo cáo cho người quản lý trực tiếp của mình và làm việc chặt chẽ với các chuyên viên xử lý hồ sơ khác, luật sư, đồng nghiệp từ các phòng ban khác đang làm việc tại Việt Nam và các quốc gia khác. Trách nhiệm chính bao gồm nhưng không giới hạn:\u003c/p\u003e\u003cp\u003e•\tThu thập, chuẩn bị tài liệu, điền các mẫu đơn theo yêu cầu của chương trình định cư và theo hướng dẫn của luật sư để hoàn tất hồ sơ trước khi nộp cho các cơ quan có thẩm quyền;\u003c/p\u003e\u003cp\u003e•\tPhân tích và xử lý từng hồ sơ xin nhập cư được giao để tối đa hóa cơ hội thành công cho khách hàng;\u003c/p\u003e\u003cp\u003e•\tPhiên dịch tài liệu và phiên dịch trong các cuộc họp;\u003c/p\u003e\u003cp\u003e•\tDuy trì liên lạc tốt với khách hàng trong suốt quá trình xử lý hồ sơ;\u003c/p\u003e\u003cp\u003e•\tThường xuyên cập nhật cho khách hàng về những thay đổi của chính phủ trong quy trình và quy định nhập cư;\u003c/p\u003e\u003cp\u003e•\tTham gia các buổi xem xét hồ sơ và họp chuẩn bị cho khách hàng, đặc biệt là cho các cuộc phỏng vấn nhập cư;\u003c/p\u003e\u003cp\u003e•\tTham gia các hoạt động chung của Công ty như sự kiện, hội thảo, các buổi đào tạo, v.v. tại Việt Nam hoặc các nước khác;\u003c/p\u003e\u003cp\u003e•\tCác nhiệm vụ khác theo phân công.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T1204,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e2.\tRequirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tVietnamese national;\u003c/p\u003e\u003cp\u003e•\tAdvanced English proficiency; French would be an asset;\u003c/p\u003e\u003cp\u003e•\tEducational level: Bachelor Degree with preferable majors in Foreign Languages, International Relations, Political Science, Law, Finance, etc.; \u003c/p\u003e\u003cp\u003e•\tHaving working experience in relevant fields such as: legal, processing files for overseas studies, consulates/embassies, banking, audit, price appraisal, etc will be a plus. Fresh graduates are welcomed;\u003c/p\u003e\u003cp\u003e•\tAbility to learn quickly about many different programs/projects;\u003c/p\u003e\u003cp\u003e•\tAbility to handle and balance clients’ and lawyers’ requests;\u003c/p\u003e\u003cp\u003e•\tAbility to work both independently and in a team, under high pressure and with tight deadlines;\u003c/p\u003e\u003cp\u003e•\tDetail-oriented, patient, analytical, flexible, eager to learn, hard-working, efficient, dynamic, ambitious; \u003c/p\u003e\u003cp\u003e•\tProfessional manners with communication skills\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tWorking conditions\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tContract duration: 1 year renewable;\u003c/p\u003e\u003cp\u003e•\tProbation period: 2 months;\u003c/p\u003e\u003cp\u003e•\tWorking time: from Monday to Friday, 8 hours/day;\u003c/p\u003e\u003cp\u003e•\tWorkplace: HCMC: Bitexco Financial Tower, 2 Hai Trieu Str., Sai Gon Ward;\u003c/p\u003e\u003cp\u003e•\tSalary: negotiable based on candidate’s experience;\u003c/p\u003e\u003cp\u003e•\tHigh potential income and bonuses;\u003c/p\u003e\u003cp\u003e•\tSocial insurance, health insurance, annual leave: according to Vietnam’s labor regulations;\u003c/p\u003e\u003cp\u003e•\tDynamic, professional, friendly and multicultural working environment;\u003c/p\u003e\u003cp\u003e•\tProfessional training and guidance.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4.\tApplication \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePlease send your application to Vietnamworks.com, with the following information:\u003c/p\u003e\u003cp\u003e-\tResume with your ID photo;\u003c/p\u003e\u003cp\u003e-\tCover letter mentioning:\u003c/p\u003e\u003cp\u003e•\tHow you learnt about this job vacancy;\u003c/p\u003e\u003cp\u003e•\tYour gross salary expectations in VND/month;\u003c/p\u003e\u003cp\u003e•\tYour availability to start working if you are hired;\u003c/p\u003e\u003cp\u003e-\tPlease combine your resume and cover letter in a unique file (Word or PDF) and name the file with your full name.\u003c/p\u003e\u003cp\u003eThank you for your interest in our law firm.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tYêu cầu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLà công dân Việt Nam;\u003c/p\u003e\u003cp\u003e•\tNgoại ngữ: thông thạo 4 kỹ năng (nghe, nói, đọc, viết) bằng tiếng Anh; biết thêm tiếng Pháp là lợi thế;\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm việc trong các lĩnh vực liên quan như: pháp lý, xử lý hồ sơ du học, lãnh sự quán/đại sứ quán, ngân hàng, kiểm toán, định giá, v.v. là một lợi thế. Sinh viên mới tốt nghiệp sẽ được đào tạo chuyên môn nếu được tuyển dụng;\u003c/p\u003e\u003cp\u003e•\tCó khả năng học hỏi nhanh các chương trình và chủ động trong công việc;\ ủa Bộ phận Xử lý hồ sơ thuộc HLG Việt Nam, nhân sự sẽ báo cáo cho người quản lý trực tiếp của mình và làm việc chặt chẽ với các chuyên viên xử lý hồ sơ khác, luật sư, đồng nghiệp từ các phòng ban khác đang làm việc tại Việt Nam và các quốc gia khác. Trách nhiệm chính bao gồm nhưng không giới hạn:\u003c/p\u003e\u003cp\u003e•\tThu thập, chuẩn bị tài liệu, điền các mẫu đơn theo yêu cầu của chương trình định cư và theo hướng dẫn của luật sư để hoàn tất hồ sơ trước khi nộp cho các cơ quan có thẩm quyền;\u003c/p\u003e\u003cp\u003e•\tPhân tích và xử lý từng hồ sơ xin nhập cư được giao để tối đa hóa cơ hội thành công cho khách hàng;\u003c/p\u003e\u003cp\u003e•\tPhiên dịch tài liệu và phiên dịch trong các cuộc họp;\u003c/p\u003e\u003cp\u003e•\tDuy trì liên lạc tốt với khách hàng trong suốt quá trình xử lý hồ sơ;\u003c/p\u003e\u003cp\u003e•\tThường xuyên cập nhật cho khách hàng về những thay đổi của chính phủ trong quy trình và quy định nhập cư;\u003c/p\u003e\u003cp\u003e•\tTham gia các buổi xem xét hồ sơ và họp chuẩn bị cho khách hàng, đặc biệt là cho các cuộc phỏng vấn nhập cư;\u003c/p\u003e\u003cp\u003e•\tTham gia các hoạt động chung của Công ty như sự kiện, hội thảo, các buổi đào tạo, v.v. tại Việt Nam hoặc các nước khác;\u003c/p\u003e\u003cp\u003e•\tCác nhiệm vụ khác theo phân công.\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:T1204,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e2.\tRequirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tVietnamese national;\u003c/p\u003e\u003cp\u003e•\tAdvanced English proficiency; French would be an asset;\u003c/p\u003e\u003cp\u003e•\tEducational level: Bachelor Degree with preferable majors in Foreign Languages, International Relations, Political Science, Law, Finance, etc.; \u003c/p\u003e\u003cp\u003e•\tHaving working experience in relevant fields such as: legal, processing files for overseas studies, consulates/embassies, banking
