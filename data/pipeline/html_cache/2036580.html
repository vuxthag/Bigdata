s\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1a56,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eJob Purpose\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThe person in charge of the position is responsible for:\u003c/p\u003e\u003cp\u003e- In-depth consulting, implementation and control work within the scope of expertise Collateral Policy in order tobuild and develop the management and supervision of collateral, contributing to the effective implementation of risk management tasks. At the same time, it provides solutions for business development in parallel witheffective risk management for all types of collateral.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Accountabilities \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Management Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Consult, coordinat, implement and monitor the Department's plans and activities according to the developmentorientation of the center, the Division, and the bank;\u003c/p\u003e\u003cp\u003e- Monitor and organize implementing the budget according to the annual operating plan, manage the unit'soperating budget according to the approved limit;\u003c/p\u003e\u003cp\u003e- Ensure that the activities of the Department fully comply with the policies and regulations of the law and thebank;\u003c/p\u003e\u003cp\u003e- Coordinate with other departments of the Center to build and implement cross-functions of the Center and theDivision.\u003c/p\u003e\u003cp\u003e- Consult and organize implementing the implementation of development/application of innovations, innovationsand initiatives to upgrade the quality of work to meet the transformation of the organization.\u003c/p\u003e\u003cp\u003e- Take overall responsibility for the professional work and quality of the assigned work related to the Department with the Director\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Responsibility for human resource management and development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Consult to organize and arrange work and personnel in accordance with the tasks and work nature of thedepartment;\u003c/p\u003e\u003cp\u003e- organize implementing a roadmap for training and developing capacity and skills for department membersaccording to the needs and work of the department;\u003c/p\u003e\u003cp\u003e- Responsible for building and developing talents in line with development orientations for the department andunit.\u003c/p\u003e\u003cp\u003e- Consult Building and implementing departmental culture according to the nature of departments, units andfinancial culture of the bank;\u003c/p\u003e\u003cp\u003e- Coordinate with other departments of the Center to build training activities, personnel rotation and activities toconnect and develop staff capacity at the unit;\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Professional Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eResponsible for performing all/part of the following tasks of the Department – depending on the tasks from timeto time:\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.1. Orientation for building and administering the governance framework and the framework for enforcing thesecurity assets of the whole system\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Implement, control and build the collateral management framework, including principles, pillars and indicatorson collateral risk management.\u003c/p\u003e\u003cp\u003e- Implement and control the development of an implementation framework for collateral, including Regulationsand Guidelines on Receiving and Managing Collateral, and Managing Outsourced Partners; Framework, criteriafor understanding assets, conversion cycle of assets and collateral by Industry/Sector\u003c/p\u003e\u003cp\u003e- Advise and propose solutions to the Board of Directors and Units in developing documents on collateral\u003c/p\u003e\u003cp\u003e- Conduct research, build and set up risk management indicators for collaterals (haircut, limit, ISV, RSV, LVA),LGD component\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.2. Design orientation of collateral solution (including collateral index) for offerings of Business segments\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Propose to the approval level on the issuance/amendment/addition/replacement of documents in order toperfect the internal document system of the collateral to conform to the provisions of law and TCB regulations.\u003c/p\u003e\u003cp\u003e- Applying the use of collateral risk index, list of collateral to provide a basis for agreeing, refusing toopen/tighten receipt, and management of collateral\u003c/p\u003e\u003cp\u003e- Consulting, answering, recording problems, difficulties and inadequacies in the process of implementing thePolicy on Collateral Management, building the collateral component in the offering.\u003c/p\u003e\u003cp\u003e- Coordinate with compliance departments (Internal Audit, CA,...) to monitor and fix issues related to collateralrisks (if necessary).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.3. Orientation for setting standards of price brackets and promulgating price frame\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.4. Lead the development of a set of criteria and regulations related to assessment and control of outsourcedpartners providing valuation and collateral management services.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Conduct research to develop a set of criteria and regulations related to the evaluation of partners providingvaluation and management services of collateral;\u00 ent and develop the construction and management of the information database system on collateral inorder to improve the quality of the collateral information system.\u003c/p\u003e\u003cp\u003e- Developing and deploying collateral technology solutions to manage the work of e2e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T43d,\u003cp\u003e\u003cstrong\u003eSuccess Profile - Qualification and Experiences\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExperience:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Expertise: Minimum 05 years of experience in  banking/ appraisal/ construction/ mechanical/ engineering\u003c/p\u003e\u003cp\u003e- Management: at least 03 years of management experience\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExpertise:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Understanding the TCB system: Thorough understanding of the organizational structure, organizational culture, goals/orientation of the bank\u003c/p\u003e\u003cp\u003e- Understanding of products/services of the unit: Deep understanding of professional fields (finance, valuation,law...) to design collateral policy products\u003c/p\u003e\u003cp\u003e- Understanding the rules/operating processes in the unit: Understanding the strategic direction, functions and tasks to design regulations/operating processes in BP\u003c/p\u003e\u003cp\u003e- Understanding of the legal environment in the banking sector\u003c/p\u003e\u003cp\u003eDegree/Profession:\u003c/p\u003e\u003cp\u003e- University graduate or higher, majoring ineconomics/finance/banking/appraisal/construction/mechanical/engineering\u003c/p\u003e\u003cp\u003e- English: minimum TOEIC 550 (Band 6)/650 (Band 7) or equivalent\u003c/p\u003e25:T657,“Nếu bạn có động lực, tự tin và sẵn sàng làm việc hết mình, hãy GIA NHẬP CHÚNG TÔI. Chúng tôi mang đến cho bạn cơ hội hiện thực hóa các khả năng của bạn trong một môi trường làm việc đầy thách thức nhưng cũn
