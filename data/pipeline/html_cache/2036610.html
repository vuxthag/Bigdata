tecture orientation:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Develop and maintain a group wide enterprise architecture framework (as is and to be) to ensure that the overall digital strategy and vision is maintained consistently and socialized across business verticals on a regular basis. \u003c/p\u003e\u003cp\u003e- Provide architectural guidance to multiple agile teams and across product portfolios and collaborate with relevant IT stakeholders to help drive the transition towards the target picture \u003c/p\u003e\u003cp\u003e- Assess and/or approve solution architectures to ensure the consistency with architecture standards and strategy\u003c/p\u003e\u003cp\u003e- Support teams across business verticals to execute the roadmaps in projects lifecycle while piloting key technologies (until the delivery). \u003c/p\u003e\u003cp\u003e- Review architecture in line with plan, assess level of compliance following standardized architecture\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Other duties\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Participate in assigned technology projects and communicate with stakeholders across the IT \u0026 business to ensure that technology projects and initiatives support roadmap direction for shared platforms\u003c/p\u003e\u003cp\u003e- Participates and effectively contributes to the IT portfolio management practice including framework, policies, procedures and processes. \u003c/p\u003e\u003cp\u003e- Enable transformation of technology in the Bank through introduction of new technologies or retirement of obsolete technologies and dealing with related risks\u003c/p\u003e\u003cp\u003e- Perform other tasks assigned by management\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAdditional and only relevant for Security Architecture specialist\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStandardization \u0026 Governance:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Develop and maintain the bank's security architecture framework and strategy\u003c/p\u003e\u003cp\u003e- Develop and maintain security policies, standards, and procedures for the bank.\u003c/p\u003e\u003cp\u003e- Conduct security assessments and audits to ensure compliance with security policies and standards.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInitiative / Project Delivery \u0026 Operation:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Collaborate with other IT teams to design and implement security solutions across multiple business units and locations.\u003c/p\u003e\u003cp\u003e- Being part of the delivery team and ensure compliance with relevant security regulations and standards across the bank.\u003c/p\u003e\u003cp\u003e- Develop and maintain relationships with internal and external stakeholders to promote security awareness and best practices.\u003c/p\u003e\u003cp\u003e- Participate in incident response and forensic investigations for large-scale incidents.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tb28,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQualifications \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Understand the bank's IT development strategy and roadmap in the next 5 years\u003c/p\u003e\u003cp\u003e- Able to propose solution architecture for some main business areas of the bank such as Payment, BPM, DW, Risks, Lending...\u003c/p\u003e\u003cp\u003e- Ability to coordinate with other units to carry out the work from ideation, to design and operation.\u003c/p\u003e\u003cp\u003e- Having expertise, deep understanding of analysis, design, selection of technical solutions\u003c/p\u003e\u003cp\u003e- At least 10 years of experience in practical implementation of many key solutions in end-to-end banking from business to application and deployment layer such as card, core, internet banking, data warehouse\u003c/p\u003e\u003cp\u003e- Have experience in working as an Enterprise Architect and possess strong Enterprise Architecture domain knowledge with experience in developing, implementing, and maintaining architecture across complex platforms, applications, and networks\u003c/p\u003e\u003cp\u003e- Must have strong knowledge in emerging technologies, and the ability to apply these in the service of the company's key business goals.\u003c/p\u003e\u003cp\u003e- Strong verbal and written communication, collaboration, and leadership skills with Technical teams and Business teams\u003c/p\u003e\u003cp\u003e- Experience guiding/teaching others in architecture principles, such as roadmaps, technical standards, non-functional requirements, and solution diagramming/documentation \u003c/p\u003e\u003cp\u003e- Demonstrated success working with standard software development lifecycle models, deliverables/artifacts and tools, SOA concepts and design patterns\u003c/p\u003e\u003cp\u003e- Experience designing scalable/reliable/flexible/secure solutions across heterogeneous hardware platforms , operating systems, middleware, and infrastructure technologies\u003c/p\u003e\u003cp\u003e- Technical experience with architecture, technology stacks, or overall architectural governance\u003c/p\u003e\u003cp\u003e- Experience with cloud computing and/or other virtualization technologies\u003c/p\u003e\u003cp\u003e- Experience establishing and documenting standards, guidelines, and best practices\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eFor Security Architecture:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Minimum of 8 years of experience in the information security field, with at least 5-7 years in a security architecture role.\u003c/p\u003e\u003cp\u003e- Proven experience in developing and implementing security architecture frameworks and strategies for large, complex environments.\u003c/p\u003e\u003cp\u003e- Experience with leading security architecture teams and managing security architecture projects.\u003c/p\u003e\u003cp\u003e- Experience with security technologies such as cloud security, container security, and micro-segmentation, firew \u003e- Assess and/or approve solution architectures to ensure the consistency with architecture standards and strategy\u003c/p\u003e\u003cp\u003e- Support teams across business verticals to execute the roadmaps in projects lifecycle while piloting key technologies (until the delivery). \u003c/p\u003e\u003cp\u003e- Review architecture in line with plan, assess level of compliance following standardized architecture\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Other duties\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Participate in assigned technology projects and communicate with stakeholders across the IT \u0026 business to ensure that technology projects and initiatives support roadmap direction for shared platforms\u003c/p\u003e\u003cp\u003e- Participates and effectively contributes to the IT portfolio management practice including framework, policies, procedures and processes. \u003c/p\u003e\u003cp\u003e- Enable transformation of technology in the Bank through introduction of new technologies or retirement of obsolete technologies and dealing with related risks\u003c/p\u003e\u003cp\u003e- Perform other tasks assigned by management\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAdditional and only relevant for Security Architecture specialist\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStandardization \u0026 Governance:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Develop and maintain the bank's security architecture framework and strategy\u003c/p\u003e\u003cp\u003e- Develop and maintain security policies, standards, and procedures for the bank.\u003c/p\u003e\u003cp\u003e- Conduct security assessments and audits to ensure compliance with security policies and standards.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eInitiative / Project Delivery \u0026 Operation:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Collaborate with other IT teams to design and implement security solutions across multiple business units and locations.\u003c/p\u003e\u0
