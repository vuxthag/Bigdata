elopment of new hardware solutions. Despite all of the challenges that have emerged throughout the decades, we have successfully managed to become an established multinational company throughout Australia, Asia and North America, cementing ourselves as a leading manufacturer and supplier of sliding door and window hardware.\r\nWe specialize in the design and manufacture of rollers that move large door and window panels for high-spec residential and commercial applications.\r\nMission:\r\nAnthony Innovations’ mission is to be an innovative designer, manufacturer and market leader of motion devices and systems to the global market.\r\nOur diverse range of skills allows us to partner our customers to take an idea from concept to design and ultimately an innovative product solution, for the ever-changing market.\r\nOur long standing history and reputation underline our commitment to deliver our partners value, by providing outstanding quality and uncompromising service.\r\nValues:\r\nTrustworthy: Tell the truth, Be fair, Be honest, Be open, Give feedback;\r\nEnjoy Work: Have fun, Celebrate success, Enjoy what you do, Enjoy the rewards and satisfactions, Be passionate about what we do;\r\nReliable: Do what you say you will do, Do when you say you will do it;\r\nResponsible: Care for our environment, Support our people, Treat others as you would like to be treated;\r\nInnovative: Initiate new and better ways, Encourage everyone to contribute, Change things for the better.\r\nCông ty TNHH Anthony Innovations Việt Nam, 100% vốn đầu tư từ Australia, trực thuộc tập đoàn Anthony Innovations.\r\n\r\nAnthony Innovations đã có 70 năm kinh nghiệm trong việc phát triển các giải pháp phần cứng mới. Bất chấp tất cả những thách thức đã xuất hiện trong suốt nhiều thập kỷ, chúng tôi đã thành công trở thành một công ty đa quốc gia có uy tín trên khắp nước Úc, Châu Á và Bắc Mỹ, khẳng định mình là nhà sản xuất và cung cấp phần cứng cửa trượt và cửa sổ hàng đầu.\r\nChúng tôi chuyên thiết kế và sản xuất các con lăn di chuyển các tấm cửa và cửa sổ lớn cho các ứng dụng thương mại và dân cư có thông số kỹ thuật cao.\r\nSứ mệnh:\r\nSứ mệnh của Anthony Innovations là trở thành nhà thiết kế, nhà sản xuất và dẫn đầu thị trường về các thiết bị và hệ thống chuyển động cho thị trường toàn cầu.\r\nKỹ năng đa dạng của chúng tôi cho phép chúng tôi hợp tác với khách hàng để đưa ra từ ý tưởng đến thiết kế và cuối cùng là giải pháp sản phẩm sáng tạo cho thị trường luôn thay đổi.\r\nLịch sử lâu đời và danh tiếng của chúng tôi nhấn mạnh cam kết của chúng tôi trong việc mang lại giá trị cho đối tác bằng cung cấp chất lượng vượt trội và dịch vụ kiên quyết.\r\nCác giá trị:\r\nTin tưởng: Nói sự thật, Công bằng, Trung thực, Cởi mở, Đưa ra phản hồi;\r\nTận hưởng công việc: Vui vẻ, Ăn mừng thành công, Tận hưởng những gì bạn làm, Tận hưởng những phần thưởng và sự hài lòng, Đam mê với những gì chúng ta làm;\r\nĐáng tin cậy: Làm những gì bạn nói bạn sẽ làm, Làm khi bạn nói bạn sẽ làm điều đó;\r\nCó trách nhiệm: Chăm sóc môi trường làm việc của chúng ta, Hỗ trợ mọi người, Đối xử với người khác như bạn muốn được đối xử;\r\nSáng tạo: Khởi xướng những cách thức mới và tốt hơn, Khuyến khích mọi người đóng góp, Thay đổi mọi thứ để tốt hơn.\r\n---\r\nPhúc lợi khi gia nhập Anthony Innovations ngay hôm nay!\r\n*Thu nhập hấp dẫn cùng cơ hội phát triển:\r\n- Lương cạnh tranh - Chính sách thưởng đa dạng: Thưởng tháng 13, thưởng hiệu suất,...\r\n*Gói phúc lợi toàn diện:\r\n- Phúc lợi/ thưởng các dịp lễ trong năm \r\n- Quà tặng doanh nghiệp các dịp lễ tết \r\n- Quà tặng sinh nhật nhân viên, \r\n- Ăn trưa tại Công ty\r\n*Môi trường làm việc chuyên nghiệp, hạ tầng tiện nghi:\r\n- Phương tiện phục vụ công việc \r\n- Hệ thống phần mềm đồng bộ tính năng tương tác cao hỗ trợ tương tác liên phòng ban\r\n*Các chương trình gắn kết người lao động:\r\n- Chương trình nghỉ mát, du lịch hè, team building, tiệc cuối năm,… \r\n- Chương trình cho con em người lao động: ngày hội gia đình \r\n*Văn hóa doanh nghi 003c/p\u003e\u003cp\u003e•\tPhối hợp cải thiện chất lượng dịch vụ với nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ các chương trình phúc lợi và chăm sóc người lao động.\u003c/p\u003e\u003cp\u003e\u003cem\u003eD. Hỗ trợ Hành chính Onboarding \u0026 Nghỉ việc\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tChuẩn bị công tác tiếp nhận nhân viên mới (đồng phục, tủ đồ, thẻ nhân viên, thẻ ra vào).\u003c/p\u003e\u003cp\u003e•\tTổ chức giới thiệu nhà máy và phổ biến nội quy.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ thủ tục nghỉ việc và bàn giao tài sản.\u003c/p\u003e\u003cp\u003e\u003cem\u003eE. Hành chính Lao động thời vụ \u0026 Nhà thầu\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp hồ sơ tiếp nhận lao động thời vụ.\u003c/p\u003e\u003cp\u003e•\tQuản lý hồ sơ ra vào của nhà thầu.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với EHS trong việc chuẩn bị hồ sơ an toàn khi cần.\u003c/p\u003e\u003cp\u003e\u003cem\u003eF. Quản lý Tài sản \u0026 Trang thiết bị văn phòng\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý văn phòng phẩm và tồn kho.\u003c/p\u003e\u003cp\u003e•\tPhối hợp mua sắm máy tính và thiết lập tài khoản IT.\u003c/p\u003e\u003cp\u003e•\tQuản lý danh sách tài sản hành chính (tủ đồ, đồng phục, thiết bị dùng chung).\u003c/p\u003e\u003cp\u003e•\tTheo dõi sử dụng và kế hoạch thay thế.\u003c/p\u003e\u003cp\u003e\u003cem\u003eG. Hỗ trợ Vận chuyển \u0026 Hậu cần\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tQuản lý xe công ty và xe đưa đón CBCNV.\u003c/p\u003e\u003cp\u003e•\tPhối hợp dịch vụ chuyển phát nhanh.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ sắp xếp công tác khi cần.\u003c/p\u003e\u003cp\u003e\u003cem\u003eH. Gắn kết Nhân viên \u0026 Sự kiện Công ty\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tLên kế hoạch và tổ chức các hoạt động của công ty bao gồm: Tiệc tất niên, Du lịch công ty, Ngày Quốc tế Phụ nữ, Ngày thiếu nhi, Quà Tết, Hoạt động Team building,…\u003c/p\u003e\u003cp\u003e•\tBao gồm đàm phán nhà cung cấp, lập ngân sách và theo dõi thanh toán.\u003c/p\u003e\u003cp\u003e\u003cem\u003eI. Kiểm soát Chi phí Tiện ích \u0026 Cơ sở vật chất\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tTheo dõi sử dụng điện, nước.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ phân tích chi phí và báo cáo chi phí hành chính hàng tháng.\u003c/p\u003e\u003cp\u003e•\tĐề xuất giải pháp tiết kiệm chi phí.\u003c/p\u003e\u003cp\u003e\u003cem\u003eJ. Hỗ trợ Quan hệ Cơ quan \u0026 Đối ngoại\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ chuẩn bị hồ sơ làm việc với cơ quan địa phương.\u003c/p\u003e\u003cp\u003e•\tPhối hợp quà Tết hoặc tiếp đón cơ quan chức năng.\u003c/p\u003e\u003cp\u003e•\tDuy trì mối quan hệ tốt với cộng đồng địa phương.\u003c/p\u003e\u003cp\u003e\u003cem\u003eK. Quản lý Hồ sơ \u0026 Lưu trữ\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tDuy trì hệ thống lưu trữ hồ sơ hành chính.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo hợp đồng và tài liệu dịch vụ được lưu trữ đầy đủ.\u003c/p\u003e\u003cp\u003e•\tHỗ trợ chuẩn bị hồ sơ phục vụ audit liên quan đến phạm vi hành chính.\u003c/p\u003e\u003cp\u003e\u003cem\u003eH. Hỗ trợ phát hành hóa đơn và cách nhiệm vụ khác được giao. \u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T6a2,\u003cp\u003e\u003cstrong\u003eYÊU CẦU VỀ TRÌNH ĐỘ, KINH NGHIỆM \u0026 KỸ NĂNG:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBằng cử nhân, cao đẳng chuyên ngành: Nhân sự, Quản trị văn phòng, Quản trị kinh doanh hoặc ngành liên quan.\u003c/p\u003e\u003cp\u003e•\tTối thiểu 2-3 năm kinh nghiệm trong hành chính nhà máy FDI.\u003c/p\u003e\u003cp\u003e•\tKỹ năng phối hợp và giao tiếp tốt.\u003c/p\u003e\u003cp\u003e•\tKhả năng đàm phán với nhà cung cấp.\u003c/p\u003e\u003cp\u003e•\tCẩn thận, có tổ chức và khả năng sắp xếp công việc.\u003c/p\u003e\u003cp\u003e•\tKhả năng làm việc độc lập với sự giám sát tối thiểu.\u003c/p\u003e\u003cp\u003e•\tTư duy giải quyết vấn đề.\u003c/p\u003e\u003cp\u003e•\tKhả năng giao tiếp tiếng Anh cơ bản và kinh nghiệm hỗ trợ người nước ngoài là một lợi thế.\u003c/p\u003e\u003cp\u003e\u003cbr\u0 s.vietnamworks.com/company_profile/95306.jpg\",\"https://images.vietnamworks.com/company_profile/97440.jpg\"]\n46:T14a2,"])</script><script>self.__next_f.push([1,"CÔNG TY TNHH ANTHONY INNOVATIONS VIỆT NAM\r\nLô CN5, khu công nghiệp Minh Đức, Xã Ngọc Lâm, Thị xã Mỹ Hào, Tỉnh Hưng Yên, Việt Nam\r\nWebsite: https://anthonyinnovations.com/\r\nIntroduction:\r\nAnthony Innovations Vietnam Ltd., is 100% investment capital from Australia, belong to Anthony Innovations group. \r\nAnthony Innovations has had 70 years of experience in the development of new hardware solutions. Despite all of the challenges that have emerged throughout the decades, we have successfully managed to become an established multinational company throughout Australia, Asia and North America, cementing ourselves as a leading manufacturer and supplier of sliding door and window hardware.\r\nWe specialize in the design and manufacture of rollers that move large door and window panels for high-spec residential and commercial applications.\r\nMission:\r\nAnthony Innovations’ mission is to be an innovative designer, manufacturer and market leader of motion devices and systems to the global market.\r\nOur diverse range of skills allows us to partner our customers to take an idea from concept to design and ultimately an innovative product solution, for the ever-changing market.\r\nOur long standing history and reputation underline our commitment to deliver our partners value, by providing outstanding quality and uncompromising service.\r\nValues:\r\nTrustworthy: Tell the truth, Be fair, Be honest, Be open, Give feedback;\r\nEnjoy Work: Have fun, Celebrate success, Enjoy what you do, Enjoy the rewards and satisfactions, Be passionate about what we do;\r\nReliable: Do what you say you will do, Do when you say you will do it;\r\nResponsible: Care for our environment, Support our people, Treat others as you would like to be treated;\r\nInnovative: Initiate new and better ways, Encourage everyone to contribute, Change things for the better.\r\nCông ty TNHH Anthony Innovations Việt Nam, 100% vốn đầu tư từ Australia, trực thuộc tập đoàn Anthony Innovations.\r\n\r\nAnthony Innovations đã có 70 năm kinh nghiệm trong việc phát triển các giải pháp phần cứng mới. Bất chấp tất cả những thách thức đã xuất hiện trong suốt nhiều thập kỷ, chúng tôi đã thành công trở thành một công ty đa quốc gia có uy tín trên khắp nước Úc, Châu Á và Bắc Mỹ, khẳng định mình là nhà sản xuất và cung cấp phần cứng cửa trượt và cửa sổ hàng đầu.\r\nChúng tôi chuyên thiết kế và sản xuất các con lăn di chuyển các tấm cửa và cửa sổ lớn cho các ứng dụng thương mại và dân cư có thông số kỹ thuật cao.\r\nSứ mệnh:\r\nSứ mệnh của Anthony Innovations là trở thành nhà thiết kế, nhà sản xuất và dẫn đầu thị trường về các thiết bị và hệ thống chuyển động cho thị trường toàn cầu.\r\nKỹ năng đa dạng của chúng tôi cho phép chúng tôi hợp tác với khách hàng để đưa ra từ ý tưởng đến thiết kế và cuối cùng là giải pháp sản phẩm sáng tạo cho thị trường luôn thay đổi.\r\nLịch sử lâu đời và danh tiếng của chúng tôi nhấn mạnh cam kết của chúng tôi trong việc mang lại giá trị cho đối tác bằng cung cấp chất lượng vượt trội và dịch vụ kiên quyết.\r\nCác giá trị:\r\nTin tưởng: Nói sự thật, Công bằng, Trung thực, Cởi mở, Đưa ra phản hồi;\r\nTận hưởng công việc: Vui vẻ, Ăn mừng thành công, Tận hưởng những gì bạn làm, Tận hưởng những phần thưởng và sự hài lòng, Đam mê với những gì chúng ta làm;\r\nĐáng tin cậy: Làm những gì bạn nói bạn sẽ làm, Làm khi bạn nói bạn sẽ làm điều đó;\r\nCó trách nhiệm: Chăm sóc môi trường làm việc của chúng ta, Hỗ trợ mọi người, Đối xử với người khác như bạn muốn được đối xử;\r\nSáng tạo: Khởi xướng những cách thức mới và tốt hơn, Khuyến khích mọi người đóng góp, Thay đổi mọi thứ để tốt hơn.\r\n---\r\nPhúc lợi khi gia nhập Anthony Innovations ngay hôm nay!\r\n*Thu nhập hấp dẫn cùng cơ hội phát triển:\r\n- Lương cạnh tranh - Chính sách thưởng đa dạng: Thưởng tháng 13, thưởng hiệu suất,...\r\n*Gói phúc lợi toàn diện:\r\n- Phúc lợi/ thưởng các dịp lễ trong năm \r\n- Quà tặng doanh nghiệp các dịp lễ tết \r\n- Quà tặng sinh nhật nhân viên, \r\n- Ăn trưa tại Công ty\r\n*Môi trường làm việc chuyên nghiệp, hạ tầng tiện nghi:\r\n- Phương tiện phục vụ công việc \r\n- Hệ thống phần mềm đồng bộ tính năng tương tác cao hỗ trợ tương tác liên phòng ban\r\n*Các chương trình gắn kết người lao động:\r\n- Chương trình nghỉ mát, du lịch hè, team building, tiệc cuối năm,… \r\n- Chương trình cho con em người lao động: ngày hội gia đình \r\n*Văn hóa doanh nghiệp:\r\nTin tưởng, Tận hưởng công việc, Có trách nhiệm, Sáng tạo\r\n*Đào tạo – Phát triển:\r\n- Các khóa học nâng cao chuyên môn nghiệp vụ, kỹ năng\r\n- Lộ trình thăng tiến công việc;"])</script><script>self.__next_f.push([1,"44:{\"companyId\":390158,\"jobImageURLs\":\"$45\",\"jobVideoURLs\":null,\"companyName\":\"Công Ty TNHH Anthony Innovations Việt Nam\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/68/11301507.png\",\"companySizeId\":\"\",\"companyProfile\":\"$46\",\"contactName\":\"\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Lô CN5, khu công nghiệp Minh Đức, Xã Ngọc Lâm, Thị xã Mỹ Hào, Tỉnh Hưng Yên, Việt Nam\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images.vietnamworks.com/pictureofcompany/a1/company-info-cover-picture-url-390158-1749547075.png\"}\n48:{\"serviceCode\":\"BPM\",\"startOn\":\"2026-04-07T16:38:49+07:00\",\"expiredOn\":\"2026-05-07T23:59:59+07:00\"}\n49:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-07T16:38:49+07:00\",\"expiredOn\":\"2026-05-07T23:59:59+07:00\"}\n4a:{\"serviceCode\":\"TLM\",\"startOn\":\"2026-04-07T16:38:49+07:00\",\"expiredOn\":\"2026-04-22T23:59:59+07:00\"}\n47:[\"$48\",\"$49\",\"$4a\"]\n4b:{\"jobInvitationId\":0,\"status\":0}
