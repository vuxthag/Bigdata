[1,"\u003cp\u003e\u003cstrong\u003eMAIN PURPOSE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Ensure and continuously improve product integrity by enforcing strict hygiene and safety standards, and ensuring compliance with all relevant regulations.\u003c/p\u003e\u003cp\u003e- Manage the smooth operation of all production lines, both on the production floor and within the office.\u003c/p\u003e\u003cp\u003e- Drive the development of the entire department, supporting each team member and enhancing overall facility performance.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMAIN RESPONSIBILITIES\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Production Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- With an uncompromising commitment to product quality, take all necessary actions to ensure product integrity and compliance with relevant regulations.\u003c/p\u003e\u003cp\u003e- Manage the smooth operation of all production lines, including daily\u003c/p\u003e\u003cp\u003eproduction planning, workflow organization, on-site control with each production leader, personnel direction, and material management, in close collaboration with the Chief Technical Officer and the Production Senior Manager.\u003c/p\u003e\u003cp\u003e- Liaise with other departments to coordinate tasks, resolve issues, and achieve production goals.\u003c/p\u003e\u003cp\u003e- Maintain and expand expertise in meat processing, including processing technology and meat science, and improve production lines by adopting new technologies, installing new or modifying existing equipment, and adjusting production line layouts.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Quality Control\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Monitor and enforce strict hygiene and safety standards throughout all meat processing procedures.\u003c/p\u003e\u003cp\u003e- Analyze production and quality data to identify major causes of yield losses and non-conformities, prepare reports, and recommend or initiate corrective actions and training as needed\u003c/p\u003e\u003cp\u003e- Develop and update production-related documents, procedures, processes, and operational instructions with QAQC.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Inventory \u0026 Facility Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Determine and control required resources (workforce, raw materials, tools, equipment).\u003c/p\u003e\u003cp\u003e- Oversee procurement planning and inventory control of materials, work in progress, and finished products, including stock taking work.\u003c/p\u003e\u003cp\u003e- Monitor facility conditions and plan maintenance work to ensure smooth operations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* People Management\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Supervise and train employees to ensure competence in their assigned tasks, while supporting employee development and performance management initiatives, with particular focus on production leaders, trainers, and data staff.\u003c/p\u003e\u003cp\u003e- Oversee the management of work shifts, including overtime and leave, for all departmental employees.\u003c/p\u003e\u003cp\u003e- Lead recruitment and selection processes for production staff with the Production Senior Manager, ensuring the right talent is hired and retained, and minimizing turnover rate of production staff.\u003c/p\u003e\u003cp\u003e- Organize a team building event with department employees.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e* Administrative \u0026 Other Tasks\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Report to the Production Senior Manager and the Chief Technical Officer about all department activities\u003c/p\u003e\u003cp\u003e- Handle office-based administrative duties, including paperwork, documentation,
