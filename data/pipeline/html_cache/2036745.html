ks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n24:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1416,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Accounting Operations Management\u003c/p\u003e\u003cp\u003e• Manage, control, and oversee the daily operations of the Accounting Department.\u003c/p\u003e\u003cp\u003e• Perform and supervise accounting transactions, including revenue, expenses, cash receipts and payments, bookkeeping, and maintaining accounting records in compliance with applicable regulations.\u003c/p\u003e\u003cp\u003e• Control and monitor accounts receivable and accounts payable, ensuring timely collections from customers and proper settlement of payments to suppliers.\u003c/p\u003e\u003cp\u003e• Supervise and control inventory accounting, stock movements, and fixed assets, ensuring accuracy between accounting records and physical inventory.\u003c/p\u003e\u003cp\u003e• Review and manage company bank accounts and oversee the company’s financial transactions and payment processes.\u003c/p\u003e\u003cp\u003e• Ensure all accounting documents, invoices, and payment vouchers are properly prepared, verified, and compliant with accounting and tax regulations.\u003c/p\u003e\u003cp\u003e• Establish and maintain internal control procedures to safeguard company assets and ensure financial accuracy.\u003c/p\u003e\u003cp\u003e2. Financial Reporting and Financial Planning\u003c/p\u003e\u003cp\u003e• Prepare and manage tax declarations and reports including VAT, Corporate Income Tax (CIT), Personal Income Tax (PIT), and other statutory reports in compliance with regulations.\u003c/p\u003e\u003cp\u003e• Prepare monthly, quarterly, and annual financial statements and submit reports to government authorities and relevant stakeholders.\u003c/p\u003e\u003cp\u003e• Compile and consolidate periodic internal financial reports for management review and decision-making.\u003c/p\u003e\u003cp\u003e• Monitor and manage the company’s cash flow, including planning and controlling cash inflow and outflow to ensure financial stability.\u003c/p\u003e\u003cp\u003e• Support the preparation and monitoring of the annual company budget, and analyze variances between actual results and planned financial performance.\u003c/p\u003e\u003cp\u003e• Analyze financial data and provide insights to support long-term financial planning and business strategy.\u003c/p\u003e\u003cp\u003e3. Compliance, Audit, and External Coordination\u003c/p\u003e\u003cp\u003e• Work with and provide explanations to tax authorities and government agencies when required.\u003c/p\u003e\u003cp\u003e• Ensure full compliance with Vietnamese Accounting Standards (VAS) and relevant financial regulations.\u003c/p\u003e\u003cp\u003e• Coordinate with external auditors and internal auditors during financial audits and ensure timely completion of audit requirements.\u003c/p\u003e\u003cp\u003e• Maintain proper documentation and accounting records to support audits and regulatory reviews.\u003c/p\u003e\u003cp\u003e4. Advisory Role to the Board of Directors\u003c/p\u003e\u003cp\u003e• Provide recommendations to the Board of Directors on effective financial management, cost control, and optimal utilization of company funds.\u003c/p\u003e\u003cp\u003e• Advise management on financial strategy, budgeting, and cash flow optimization to support business growth.\u003c/p\u003e\u003cp\u003e• Coordinate in drafting, issuing, and implementing financial management regulations, cost control policies, and accounting procedures within the company.\u003c/p\u003e\u003cp\u003e• Develop, review, and improve accounting and financial processes to enhance operational efficiency and internal controls.\u003c/p\u003e\u003cp\u003e5. Cross-Department Coordination\u003c/p\u003e\u003cp\u003e• Work closely with other departments including Sales, Marketing, Retail Operations, Warehouse, and Purchasing to monitor costs, track contracts, and manage payment processes.\u003c/p\u003e\u003cp\u003e• Support business operations by providing financial analysis and insights related to operational performance.\u003c/p\u003e\u003cp\u003e6. Team Management and Development\u003c/p\u003e\u003cp\u003e• Manage and lead the Accounting Department, ensuring effective delegation and supervision of accounting tasks.\u003c/p\u003e\u003cp\u003e• Provide training, professional guidance, and mentorship for accounting staff.\u003c/p\u003e\u003cp\u003e• Monitor work progress and evaluate the performance of accounting team members.\u003c/p\u003e\u003cp\u003e• Propose decisions related to personnel management, recruitment, training, and development of the accounting team.\u003c/p\u003e\u003cp\u003e7. Other Responsibilities\u003c/p\u003e\u003cp\u003e• Perform other duties as assigned by the Management or Board of Directors.\u003c/p\u003e\u003cp\u003e• Support special projects related to finance, accounting, and corporate governance when required.\u003c/p\u003e\u003cp\u003e8. FDI Compliance and Government Reporting\u003c/p\u003e\u003cp\u003e• Ensure the company complies with all FDI regulatory requirements and statutory reporting obligations in accordance with Vietnamese laws and investment regulations.\u003c/p\u003e\u003cp\u003e• Coordinate and manage the timely submission of investment reports, labor reports, foreign worker reports, and other regulatory filings required by relevant government authorities.\u003c/p\u003e\u003cp\u003e• Monitor compliance requirements related to foreign loans, capital transactions, and profit remittance abroad, ensuring proper documentation and submission procedures are followed.\u003c/p\u003e\u003cp\u003e• Maintain communication and coordination with relevant government authorities such as the Department of Planning and Investment (DPI), Tax Department, Labor Department, and State Bank of Vietnam when required.\u003c/p\u003e\u003cp\u003e• Stay updated on regulatory changes related to FDI compliance, investment regulations, and financial reporting requirements, and ensure the company remains compliant at all times.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T1416,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1. Accounting Operations Management\u003c/p\u003e\u003cp\u003e• Manage, control, and oversee the daily operations of the Accounting Department.\u003c/p\u003e\u003cp\u003e• Perform and supervise accounting transactions, including revenue, expenses, cash receipts and payments, bookkeeping, and maintaining accounting records in compliance with applicable regulations.\u003c/p\u003e\u003cp\u003e• Control and monitor accounts receivable and accounts payable, ensuring timely collections from customers and proper settlement of payments to suppliers.\u003c/p\u003e\u003cp\u003e• Supervise and control inventory accounting, stock movements, and fixed assets, ensuring accuracy between accounting records and physical inventory.\u003c/p\u003e\u003cp\u003e• Review and manage company bank accounts and oversee the company’s financial transactions and payment processes.\u003c/p\u003e\u003cp\u003e• Ensure all accounting documents, invoices, and payment vouchers are properly prepared, verified, and compliant with accounting and tax regulations.\u003c/p\u003e\u003cp\u003e• anage the timely submission of investment reports, labor reports, foreign worker reports, and other regulatory filings required by relevant government authorities.\u003c/p\u003e\u003cp\u003e• Monitor compliance requirements related to foreign loans, capital transactions, and profit remittance abroad, ensuring proper documentation and submission procedures are followed.\u003c/p\u003e\u003cp\u003e• Maintain communication and coordination with relevant government authorities such as the Department of Planning and Investment (DPI), Tax Department, Labor Department, and State Bank of Vietnam when required.\u003c/p\u003e\u003cp\u003e• Stay updated on regulatory changes related to FDI compliance, investment regulations, and financial reporting requirements, and ensure the company remains compliant at all times.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:{\"skillName\":\"Accounting Management\",\"skillId\":86469,\"skillWeight\":100,\"isExisted\":false}\n29:{\"skillName\":\"Compliance Auditing\",\"skillId\":323397,\"skillWeight\":100,\"isExisted\":false}\n2a:{\"skillName\":\"Financial Analysis\",\"skillId\":7274,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Financial Reporting\",\"skillId\":987953,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Team Management\",\"skillId\":6427,\"skillWeight\":100,\"isExisted\":false}\n27:[\"$28\",\"$29\",\"$2a\",\"$2b\",\"$2c\"]\n2e:{\"benefitId\":15,\"benefitIconName\":\"fa-check-square-o\",\"benefitName\":\"Others\",\"benefitNameVI\":\"Khác\",\"benefitValue\":\"Team building, Bonuses (depend on P\u0026L)\"}\n2d:[\"$2e\"]\n31:{\"lat\":0,\"lon\":0}\n30:{\"workingLocationId\":244965,\"addressId\":151057,\"cityId\":29,\"districtId\":0,\"address\":\"36/6A Nguyen Gia Tri, Thanh My Tay Ward, Ho Chi Minh City\",\"geoLoc\":\"$31\",\"cityName\":\"Ho Chi Minh\",\"cityNameVI\":\"Hồ Chí Minh\"}\n2f:[\"$30\"]\n33:{\"industryId\":0,\"industryName\":\"\",\"industryNameVI\":\"\"}\n32:[\"$33\"]\n35:{\"industry
