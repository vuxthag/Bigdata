plement the corrective and preventive\u003c/p\u003e\u003cp\u003e   actions.\u003c/p\u003e\u003cp\u003e • Identify the potential wastes and apply Lean manufacturing to optimize processes, eliminate\u003c/p\u003e\u003cp\u003e   wastes and costs.\u003c/p\u003e\u003cp\u003e • Manage WIP through daily cycle count to improve the inventory accuracy.\u003c/p\u003e\u003cp\u003e • Support the team to solve the problems, decide the specific solutions to close the\u003c/p\u003e\u003cp\u003e   management gaps.\u003c/p\u003e\u003cp\u003e • Report timely and accuracy, specially OTIF at ERP system.\u003c/p\u003e\u003cp\u003e • Coordinate with relative departments to improve the workflow.\u003c/p\u003e\u003cp\u003e • Communicate effectively to deliver expectation goals and KPI’s to employees.\u003c/p\u003e\u003cp\u003e • Measure and appraise the performance evaluation of employees according to KPI’s\u003c/p\u003e\u003cp\u003e   agreement.\u003c/p\u003e\u003cp\u003e • Ensure effective and correct execution of CIL / CL and DH activities as per the shift plan.\u003c/p\u003e\u003cp\u003e • Coordinate with technicians and the APS core team to continuously improve CIL / CL / DH\u003c/p\u003e\u003cp\u003e   and CO checklists.\u003c/p\u003e\u003cp\u003e • Lead IPS (Initial Problem Solving) during the shift to promptly respond to safety, quality, or\u003c/p\u003e\u003cp\u003e   other issues.\u003c/p\u003e\u003cp\u003e • Enhance education improvement and awareness through training and coaching to\u003c/p\u003e\u003cp\u003e   employees.\u003c/p\u003e\u003cp\u003e • Lead and complete at least two Lean / Continuous Improvement projects per year.\u003c/p\u003e\u003cp\u003e • Perform other duties as assigned or requested by supervisor.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Ta71,"])</script><script>self.__next_f.push([1,"\u003cp\u003eTỔNG QUAN VỀ VỊ TRÍ/ GENERAL SUMMARY OF POSITION:\u003c/p\u003e\u003cp\u003e To lead and control production activities during assigned shifts, ens
