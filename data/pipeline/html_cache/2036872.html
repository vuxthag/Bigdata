tor observations) to the Sales Manager, supporting the team’s strategic decision-making.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCross Departmental Collaboration\u003c/strong\u003e: Collaborate closely with Customer Service, Operations, and Finance teams to ensure seamless booking execution, prompt resolution of client issues, and alignment of sales activities with operational capabilities. Coordinate with sales team members in Asian countries as well as US sales team to explore and support container shipping business opportunities.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tSales Reporting \u0026 Support\u003c/strong\u003e: Track and report key sales data to the Sales Manager, including lifting volume updates, TP trade service performance, market rate dynamics, pipeline customer status, and client acquisition progress. Support weekly sales forecasting by providing front-line booking trend observations to assist the team in adjusting strategies.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBrand Promotion\u003c/strong\u003e: Participate in industry events, trade shows, and local networking activities in Vietnam to enhance brand visibility and generate new business leads, in line with the team’s brand promotion objectives.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T87a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQualifications \u0026 Requirements\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tBachelor’s degree or above in Business Administration, International Trade, Logistics, Marketing, or a related field.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExperience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMinimum 3 years of proven sales experience in the supply chain, container shipping, logistics, or freight forwarding industry in
