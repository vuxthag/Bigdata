3c/p\u003e\u003cp\u003e•\tLập hồ sơ thiết kế bản vẽ thi công và bản thuyết minh cho hệ thống Cơ-điện, PCCC, Điều hòa không khí.\u003c/p\u003e\u003cp\u003e•\tXem hồ sơ bản vẽ, chỉnh sửa, góp ý nội dung theo quy định hiện hành về Cơ-điện-PCCC, Điều hòa không khí.\u003c/p\u003e\u003cp\u003e•\tKiểm soát chất lượng bản vẽ thiết kế tuân theo quy chuẩn, tiêu chuẩn thiết kế và xây dựng.\u003c/p\u003e\u003cp\u003e•\tPhối hợp với các bộ phận khác (Kiến trúc và Kết cấu) để hoàn thiện thiết kế; tư vấn bên thứ 3 để đáp ứng yêu cầu thiết kế Cơ - điện, PCCC, Điều hòa không khí.\u003c/p\u003e\u003cp\u003e•\tTiếp nhận và triển khai thực hiện các thay đổi về thiết kế.\u003c/p\u003e\u003cp\u003e•\tPhối hợp cùng Đơn vị tư vấn, Chủ đầu tư và các nhà thầu liên quan nhằm thực hiện và xử lý các công việc phát sinh.\u003c/p\u003e\u003cp\u003e•\tTham gia Tư vấn các vấn đề liên quan tới thẩm tra/thẩm định báo cáo nghiên cứu khả thi; thẩm duyệt và nghiệm thu PCCC.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T583,\u003cp\u003e•\tTốt nghiệp Đại học chuyên ngành Cơ hoặc Điện, Điện – điện tử, Cơ kỹ thuật, Cơ khí, Cấp thoát nước, PCCC. \u003c/p\u003e\u003cp\u003e•\tĐộ tuổi: 22 – 30. Kinh nghiệm: 2 – 5 năm, nhiệt huyết với nghề là lợi thế. Sẽ được đào tạo theo tính chất công việc.\u003c/p\u003e\u003cp\u003e•\tSử dụng thành thạo các phần mềm kỹ thuật liên quan (MS. Office, Microsoft project, Auto CAD, Revit và các phần mềm chuyên ngành)\u003c/p\u003e\u003cp\u003e•\tTrình độ tiếng Anh giao tiếp.\u003c/p\u003e\u003cp\u003e•\tCó kiến thức cơ bản về các quy chuẩn,tiêu chuẩn kỹ thuật, quy định của pháp luật về quản lý xây dựng và thiết kế và thi công Cơ điện là 1 lợi thế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Mức lương: 12 - 20 triệu (tùy theo năng lực và kinh nghiệm của ứng viên).\u003c/p\u003e\u003cp\u003e- Môi trường làm việc năng động, thân thiện.\u003c/p\u003e\u003cp\u003e- Có nhiều
