 vững.\r\n-\tWebsite: https://hathanhacademy.com.vn, https://hathanh-auto.com.vn/\r\n-\tĐịa điểm văn phòng Tập đoàn: Số 8 Phạm Hùng, Nam Từ Liêm, Hà Nội\r\n-\tĐịa điểm làm việc: Nội thành Hà Nội (1 trong các công ty thành viên)\r\n-\tThời gian làm việc: 8h00-12h00, 13h00 -17h00 từ Thứ 2 đến Thứ 7."])</script><script>self.__next_f.push([1,"24:Tdfd,"])</script><script>self.__next_f.push([1,"\u003cp\u003eChịu trách nhiệm toàn diện trước HĐQT về hiệu quả hoạt động và sự phát triển bền vững của đơn vị phụ trách. Điều hành và giám sát toàn bộ các hoạt động của đơn vị phụ trách, định hướng chiến lược kinh doanh cùng BLĐ, đảm bảo tối ưu hóa hoạt động vận hành và gia tăng giá trị cho đơn vị phụ trách.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tĐịnh hướng chiến lược và kế hoạch hành động:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTham gia xây dựng và triển khai chiến lược phát triển toàn diện cho đơn vị phụ trách, bao gồm lĩnh vực kinh doanh và vận hành dịch vụ.\u003c/p\u003e\u003cp\u003e-\tĐề xuất và thực thi các mục tiêu ngắn hạn và dài hạn, phù hợp với tầm nhìn và sứ mệnh của Tập đoàn.\u003c/p\u003e\u003cp\u003e-\tĐiều hành việc thực hiện các kế hoạch nhằm tăng trưởng doanh thu, lợi nhuận và thị phần.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tQuản lý hoạt động vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tTrực tiếp quản lý bộ phận kinh doanh, chỉ đạo và giám sát triển khai trong việc phát triển kênh phân phối, mở rộng thị trường và gia tăng thị phần.\u003c/p\u003e\u003cp\u003e-\tĐề xuất các chiến lược kinh doanh và marketing hiệu quả, đảm bảo tăng trưởng doanh số và nhận diện thương hiệu.\u003c/p\u003e\u003cp\u003e-\tDuy trì và phát triển mối quan hệ hợp tác với các đối tác, đại lý và nhà phân phối quan trọng.\u003c/p\u003e\u003cp\u003e-\tXây dựng và quản trị tồn kho hiệu quả: quản lý hàng tồn kho để cân bằng giữa việc thực hiện theo quy định nhà máy và những mong đợi về thời gian giao hàng cho khách, giả
