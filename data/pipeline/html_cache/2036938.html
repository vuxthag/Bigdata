 dựng và vận hành các hoạt động Marketing phục vụ tăng trưởng khách hàng và doanh thu cho mô hình B2B2C Fulfillment, tập trung vào thị trường Việt Nam/US/EU.\u003c/p\u003e\u003cp\u003eVị trí này chịu trách nhiệm trực tiếp về tăng trưởng pipeline, số lượng khách hàng tiềm năng mới, chất lượng chuyển đổi khách hàng, doanh thu từ phễu Marketing và giá trị dài hạn của khách hàng bằng cách làm việc chặt chẽ với Sales, Account Manager, Customer Experience và Operations.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Xây dựng \u0026 vận hành Demand Generation\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng và thực thi chiến lược marketing toàn diện nhằm mục tiêu tăng trưởng số lượng khách hàng và doanh thu từ pipeline B2B2C\u003c/p\u003e\u003cp\u003e• Thiết kế và triển khai các chiến dịch Demand Generation đa kênh (Paid, Organic, Content, Partnership…) nhằm tiếp cận, tương tác, tìm kiếm Ideal Customer Profile (ICP) phù hợp với thương hiệu.\u003c/p\u003e\u003cp\u003e• Quản lý và tối ưu toàn bộ funnel: Awareness → MQL → SQL → Active → Loyalty và chăm sóc trải nghiệm thương hiệu đối với các tài khoản đang hoạt động trên hệ thống\u003c/p\u003e\u003cp\u003e• Phối hợp với Sales để đảm bảo chất lượng Lead và tỷ lệ chuyển đổi.\u003c/p\u003e\u003cp\u003e• Liên tục tối ưu Marketing ICP, thông điệp và kênh tiếp thị dựa trên dữ liệu\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tối ưu Adoption \u0026 Expansion\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Marketing hỗ trợ Adoption \u0026 Expansion thông qua các kênh truyền thông, chiến lược nội dung và dữ liệu\u003c/p\u003e\u003cp\u003e• Phối hợp cùng Sales/AM/CX triển khai các chiến dịch hỗ trợ onboarding, activation, nurture, education, upsell \u0026 cross-sell.\u003c/p\u003e\u003cp\u003e• Gia tăng mức độ sử dụng dịch vụ và giá trị vòng đời khách hàng (LTV).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Quản trị hiệu suất \u0026 dữ liệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e
