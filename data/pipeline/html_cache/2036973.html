ớn khắp cả nước.\",\"companySizeId\":4,\"contactName\":\"Ms. Hà\",\"createdBy\":4407576,\"isOnline\":true,\"isActive\":true,\"isApproved\":true,\"isUnpaidDisable\":0,\"isCompleted\":true,\"isAnonymous\":false,\"isSalaryVisible\":true,\"isShowLogo\":true,\"isShowLogoInSearch\":false,\"jobDescription\":\"\u003cp\u003e-\u003cstrong\u003e Xây dựng kế hoạch Trade Marketing\u003c/strong\u003e: Lập kế hoạch khuyến mãi, chương trình thúc đẩy bán hàng tại các đại lý, bệnh viện/ phòng khám theo mục tiêu doanh số. \u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eQuản lý và triển khai POSM\u003c/strong\u003e: Lên ý tưởng, thiết kế, sản xuất và giám sát việc lắp đặt POSM (banner, kệ, poster, standee…) tại các đại lý, bệnh viện, phòng khám, đảm bảo tính nhất quán thương hiệu. \u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eTiếp thị tại các hội nghị, hội thảo chuyên ngành\u003c/strong\u003e: Giới thiệu sản phẩm, dịch vụ, phủ thương hiệu tại các hội nghị, hội thảo chuyên ngành y tế và công nghệ sinh học. \u003c/p\u003e\u003cp\u003e- \u003cstrong\u003ePhân tích dữ liệu thị trường\u003c/strong\u003e: Theo dõi doanh số, đánh giá hiệu quả các chương trình Trade Marketing, phân tích hành vi khách hàng và đối thủ cạnh tranh. \u003c/p\u003e\u003cp\u003e- \u003cstrong\u003ePhối hợp liên phòng ban\u003c/strong\u003e: Làm việc với đội ngũ Sales để thực hiện chương trình và với Brand Marketing để đồng bộ thông điệp truyền thông.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\",\"jobRequirement\":\"\u003cp\u003e- Kinh nghiệm: từ 1-3 năm kinh nghiệm ở vị trí tương đương hoặc Sales Supervisor.\u003c/p\u003e\u003cp\u003e- Kỹ năng: Kỹ năng phân tích dữ liệu tốt, kỹ năng giao tiếp/đàm phán, kỹ năng lập kế hoạch và quản lý dự án.\u003c/p\u003e\u003cp\u003e- Kiến thức: Am hiểu về thị trường y tế, hành vi người tiêu dùng.\u003c/p\u003e\u003cp\u003e- Công cụ: Thành thạo tin học văn phòng (đặc biệt là Excel và PowerPoint).\u003c/p\u003e\u003cp\u003e- Thái độ: Nhanh nhẹn, linh hoạt, chịu được áp lực
