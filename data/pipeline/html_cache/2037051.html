-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1065,"])</script><script>self.__next_f.push([1,"Tháng 2 năm 1912, Bank Of China chính thức được thành lập, là ngân hàng có thời gian hoạt động liên tục và lâu dài nhất trong lịch sử Trung Quốc.\r\n\r\n    Bank Of China là ngân hàng có trình độ quốc tế hóa và mức độ đa dạng hóa cao nhất của Trung Quốc; là tổ chức tài chính đầu tiên ở các nền kinh tế thị trường mới nổi được chọn làm ngân hàng có tầm ảnh hưởng lớn trên hệ thống Ngân hàng toàn cầu. Bank Of China có chi nhánh hải ngoại trên 62 quốc gia và vùng lãnh thổ, trong đó hơn 20 nước nằm trên tuyến “Một vành đai – Một con đường”,  đi đầu trong việc bao phủ các dịch vụ trên 10 quốc gia ASEAN, đi sâu vào việc xây dựng huyết mạch tài chính chủ đạo “Một vành đai – Một con đường”.\r\n\r\n    Năm 1917, Bank Of China thành lập chi nhánh nước ngoài đầu tiên – chi nhánh tại Hong Kong. Trải qua 100 năm phát triển, Bank Of China (Hong Kong) nay đã trở thành công ty niêm yết lớn nhất tại Hong Kong, là 1 trong 3 ngân hàng phát hành tiền tệ và là ngân hàng thanh toán Nhân dân tệ duy nhất, có mạng lưới lớn nhất Hong Kong và nghiệp vụ đa dạng nhất Hong Kong.\r\n\r\n    Tháng 11 năm 1938, Bank Of China thành lập văn phòng đại diện tại Hà Nội, và trở thành ngân hàng của Trung Quốc đại lục đầu tiên đầu tư tại Việt Nam.\r\n\r\n    Cùng với con đường đổi mới ở Việt Nam, ngày 1 tháng 12 năm 1995, Bank Of China thành lập chi nhánh tại Thành Phố Hồ Chí Minh – 1 trung tâm kinh tế của Việt Nam, và trở thành ngân hàng có vốn Trung Quốc đại lục đầu tiên đầu tư vào Việt Nam, và là một trong những doanh nghiệp Trung Quốc đầu tiên phát triển thị trường Việt Nam.\r\n\r\n    Từ năm 2014, Bank Of China (Hong Kong) đã phối hợp với chiến lược phát triển quốc tế hóa của Bank Of China, tiến hành cơ cấu lại tổ chức và nghiệp vụ khu vực Đông Nam Á, nhằm phục vụ tốt hơn khu vực Đông Nam Á. Được sự chấp thuận của Ngân Hàng Nhà nước Việt Nam, ngày 29 tháng 01 năm 2018, Bank Of China chi nhánh Thành Phố Hồ Chí Minh đã được chính thức chuyển nhượng từ Bank Of China sang Bank Of China (Hong Kong) và đổi tên thành Ngân hàng Bank Of China (Hong Kong) Limited – chi nhánh Thành Phố Hồ Chí Minh.  \r\n\r\n    27 năm nay, với sự phát triển ổn định của của kinh tế Việt Nam, dựa vào mạng lưới trải dài trên toàn cầu và dịch vụ đa dạng, Bank Of China trụ vững trên thị trường Việt Nam, hoạt động kinh doanh luôn tuân thủ nghiệm ngặt theo pháp luật, thực thi chiến lược “ngân hàng bậc nhất toàn cầu thời đại mới”, cung cấp các dịch vụ tổng hợp dịch vụ tài chính doanh nghiệp và tài chính cá nhân, bao gồm nghiệp vụ gửi tiền, vay tiền (cho vay hợp vốn, cho vay song phương), dịch vụ thanh toán quốc tế và tài trợ thương mại, dịch vụ bảo lãnh, mua bán ngoại tệ, tư vấn tài chính v.v…, quy mô tài sản tăng rõ rệt, chất lượng tài sản tốt, làm cầu nối cho mối quan hệ hợp tác kinh tế, tài chính hai nước Việt – Trung. Ngân hàng Bank Of China (Hong Kong) Limited – chi nhánh Thành Phố Hồ Chí Minh tích cực tham gia vào hoạt động xã hội, đảm nhận trách nhiệm xã hội tại Việt Nam, nhiều lần được Bộ Tài Chính, Cục Thuế trao giải “Doanh nghiệp thực hiện tốt nghĩa vụ nộp thuế”, xây dựng thương hiệu về tuân thủ pháp luật, hợp quy, chuyên nghiệp, hiệu quả cao, kinh doanh uy tín, giúp đỡ người nghèo khó.\r\n\r\n    Bank Of China, Kết nối toàn thế giới, vì lợi ích cộng đồng, là \"ngân hàng đối tác tốt nhất của bạn tại Việt Nam”!"])</script><script>self.__next_f.push([1,"24:T6db,\u003cp\u003e\u003cstrong\u003e•\tThực hiện và mở rộng kinh doanh\u003c/strong\u003e các sản phẩm phái sinh ngoại hối (FX) và phái sinh lãi suất (Interest Rate derivatives).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhát triển và tối ưu hóa\u003c/strong\u003e các sản phẩm tài chính mới được thiết kế riêng theo yêu cầu cụ thể của khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tXác định các cơ hội kinh doanh tiềm năng\u003c/strong\u003e và hoàn thành các chỉ tiêu hiệu suất (KPI) được giao.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThúc đẩy việc ký kết các thỏa thuận phái sinh\u003c/strong\u003e (ví dụ: ISDA, GMRA) với khách hàng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhối hợp với các bộ phận Tiền sảnh (Front), Trung sảnh (Middle) và Hậu kiểm (Back office)\u003c/strong\u003e để đảm bảo triển khai kinh doanh thành công và theo dõi quá trình thực hiện.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- Execute and expand business in FX and Interest Rate derivatives Products\u003c/p\u003e\u003cp\u003e- Develop and optimize new financial products tailored to client requirements\u003c/p\u003e\u003cp\u003e- Identify potential business opportunities and achieve assigned performance targets\u003c/p\u003e\u003cp\u003e- Facilitate the execution of derivative agreements (eg.ISDA, GMAR)with clients\u003c/p\u003e\u003cp\u003e- Coordinate with Front, Middle, and Back office departments to ensure successful business implementation and track execution\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e助理经理 金融市场部 -职责：\u003c/p\u003e\u003cp\u00 át bằng tiếng Quan Thoại (Putonghua).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThành thạo các công cụ giao dịch tài chính\u003c/strong\u003e như Reuters Dealing, Bloomberg và bộ phần mềm văn phòng MS Word, Excel, PowerPoint.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e- University graduate or above preferably in STEM fields e.g. Math, Computer Science, Physics) repo or quantitative disciplines\u003c/p\u003e\u003cp\u003e- At least 2-3 years of relevant experience in treasury sales, repo, reverse repo or money market business, qualification of CFA or FRM will be preferred\u003c/p\u003e\u003cp\u003e- Innovative mindset, strong self-motivation, and ability to handle multi tasking effectively\u003c/p\u003e\u003cp\u003e- Excellent command of written and spoken English and Chinese, including fluent Putonghua\u003c/p\u003e\u003cp\u003e- Proficiency in Reuters dealing Bloomberg , MS Word, Excel and PowerPoint\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e要求:\u003c/p\u003e\u003cp\u003e-拥有大学及以上学历者优先，专业领域应为STEM学科（如数学、计算机科学、物理学）或定量学科\u003c/p\u003e\u003cp\u003e-具备至少 2 至 3 年的与资金销售、回购、逆回购或货币市场业务相关的工作经验，拥有 CFA 或 FRM 资格证书者将优先考虑\u003c/p\u003e\u003cp\u003e-具备创新思维、强烈的自我激励能力，以及能够有效处理多项任务的能力\u003c/p\u003e\u003cp\u003e具备出色的书面及口语英语和汉语运用能力，包括流利的普通话\u003c/p\u003e\u003cp\u003e-熟练操作路透社系统、彭博社、MS Word、Excel和PowerPoint\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2d:{\"skillName\":\"CFA\",\"skillId\":27907,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"FRMS\",\"skillId\":1388917,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Quản Lý Nguồn Vốn\",\"skillId\":138092,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"Tư Vấn Nguồn Vốn\",\"skillId\":763054,\"skillWeight\":100,\"isExisted\":false}\n31:{\"skillName\":\"Chinese\",\"skillId\":989033,\"skillWeight\":100,\"isExisted\":false}\n2c:[\"$2d\",\"$2e\",\"$2f\",\"$30\",\"$31\"]\n33:{\"benefitId\":1,\"benefitIconName\":\"fa-dollar\",\"benefitName\":\"
