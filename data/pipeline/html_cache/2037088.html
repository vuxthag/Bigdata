cậy cho Viện Phát triển chuyển đổi xanh, chuyển đổi số Việt Nam để cùng đất nước phát triển khoa học công nghệ trong kỷ nguyên vươn mình của dân tộc.\r\nLĩnh vực khoáng sản, cơ khí công nghệ cao, nhà máy sản xuất vật liệu xây dựng được đầu tư tại các đơn vị thành viên hoặc có vốn góp.\r\nTại Xuân Cầu Holdings, chúng tôi cam kết tạo ra tạo một môi trường làm việc chuyên nghiệp, hợp tác thân thiện, bình đẳng. “Cống hiến giá trị đích thực” trở thành biểu tượng chất lượng, biểu tượng cho tinh thần làm việc của Người Xuân Cầu kiên định, tìm tòi và tôn trọng tính nhân văn."])</script><script>self.__next_f.push([1,"24:T7d0,\u003cp\u003e1. Phụ trách công tác tuyển dụng nhân sự của công ty, xây dựng và triển khai kế hoạch tuyển dụng, đặc biệt là các vị trí kỹ thuật trong lĩnh vực CNTT (AI, dữ liệu lớn, an ninh mạng, phát triển phần mềm…).\u003c/p\u003e\u003cp\u003e负责公司整体招聘工作，制定招聘计划并推动实施，重点招聘信息化领域技术人才（研发、AI、大数据、安全等）。\u003c/p\u003e\u003cp\u003e2. Xây dựng và hoàn thiện hệ thống quản trị nhân sự của công ty bao gồm quy trình tuyển dụng, hệ thống lương thưởng, phúc lợi và đánh giá hiệu suất.\u003c/p\u003e\u003cp\u003e建立并完善公司的人力资源管理体系，包括招聘流程、薪酬福利体系、绩效管理制度等。\u003c/p\u003e\u003cp\u003e3. Quản lý hồ sơ nhân sự, hợp đồng lao động, onboarding và các công việc hành chính nhân sự hàng ngày.\u003c/p\u003e\u003cp\u003e负责员工入职、劳动合同、员工关系及日常人事管理工作。\u003c/p\u003e\u003cp\u003e4. Quản lý chính sách lương thưởng và phúc lợi cho nhân viên.\u003c/p\u003e\u003cp\u003e负责公司薪酬福利管理，包括薪资结构设计、社保福利等。\u003c/p\u003e\u003cp\u003e5.\tPhát triển văn hóa doanh nghiệp, tổ chức các hoạt động gắn kết nội bộ.\u003c/p\u003e\u003cp\u003e负责企业文化建设，组织团队活动，提升员工凝聚力。\u003c/p\u003e\u003cp\u003e6.\tHỗ trợ thực hiện các thủ tục cho nhân sự nước ngoài như Work Permit, TRC và các giấy tờ liên quan.\u003c/p\u003e\u003cp\u003e协助公司办理外籍员工的工作许可（Work Permit）、居留证（TRC）等相关手续。\u003c/p\u003e\u003cp\u003e7.\tHỗ trợ phối hợp giữa đội ngũ Việt Nam và đội ngũ quốc tế để đảm bảo sự hợp tác hiệu quả.\u003c/p\u003e\u003cp\u003e协助中越团队沟通协调，推动跨文化团队的顺利协作。\u003c/p\u003e\u003cp\u003e8. Liên tục cải tiến hệ thống quản trị nhân sự phù hợp với giai đoạn phát triển của công ty.\u003c/p\u003e\u003cp\u003e根据公司发展阶段持续优化人力资源管理体系。\u003c/p\u003e25:T897,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e任职要求\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tTốt nghiệp đại học trở lên, ưu tiên chuyên ngành Quản trị nhân sự, Quản trị kinh doanh hoặc các ngành liên quan.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e本科及以上学历，人力资源管理、工商管理或相关专业优先。\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e2.\tCó ít nhất 5 năm kinh nghiệm trong lĩnh vực nhân sự, trong đó tối thiểu 3 năm phụ trách tuyển dụng hoặc HR tổng hợp.\u003c/p\u003e\u003cp\u003e5年以上人力资源工作经验，其中至少3年负责招聘或综合HR工作。\u003c/p\u003e\u003cp\u003e3.\tƯu tiên ứng viên có kinh nghiệm làm việc trong ngành CNTT, công nghệ hoặc internet.\u003c/p\u003e\u003cp\u003e有信息化、IT、互联网或科技企业工作经验者优先。\u003c/p\u003e\u003cp\u003e4.\tƯu tiên ứng viên đã từng làm việc tại công ty liên doanh hoặc doanh nghiệp nước ngoài.\u003c/p\u003e\u003cp\u003e有合资公司或外资企业工作经验者优先。\u003c/p\u003e\u003cp\u003e5.\tAm hiểu luật lao động Việt Nam và các quy định về nhân sự.\u003c/p\u003e\u003cp\u003e熟悉越南劳动法律法规及人力资源管理实践。\u003c/p\u003e\u003cp\u003e6.\tCó khả năng tuyển dụng nhân sự kỹ thuật IT (developer, AI, data, security…).\u003c/p\u003e\u003cp\u003e有能力招聘技术人才（研发、AI、大数据等）。\u003c/p\u003e\u003cp\u003e7.\tCó kinh nghiệm xử lý Work Permit và giấy tờ cho người nước ngoài.\u003c/p\u003e\u003cp\u003e熟悉办理外籍人员工作许可及相关证件流程。\u003c/p\u003e\u003cp\u003e8.\tKỹ năng giao tiếp và phối hợp tốt.\u003c/p\u003e\u003cp\u003e具备良好的沟通协调能力与团队合作精神。\u003c/p\u003e\u003cp\u003e9.\tƯu tiên ứng viên có thể giao tiếp bằng tiếng Anh hoặc tiếng Trung.\u003c/p\u003e\u003cp\u003e英语或中文具备基本沟通能力者优先。\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eChuyên ngành: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e专业\u003c/strong\u003
