tic/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T7ba,BRITISH UNIVERSITY VIETNAM (BUV) British University Vietnam (BUV) is the first and only international university in Vietnam to directly award British degrees from the prestigious University of London, University of Staffordshire, University of Stirling and Arts University Bournemouth. BUV is rated a 5 Star university of excellence by the world recognized QS organization and maintains a QAA IQR accreditation for its programs.\r\nBUV has three main brand drivers:\r\n• Offering accredited British and international higher education and training in Vietnam;\r\n• Providing 5-star university campuses, learning spaces, and services;\r\n• Including a compulsory personal and social growth program that prepares students for the future of life and work;\r\nEstablished in 2009, BUV provides teaching for undergraduate and graduate programs. Employability rates for students are exceptionally high with 100% of graduates from BUV either "])</script><script>self.__next_f.push([1,"employed or continuing higher education within 3 months after graduation.\r\nWith a wide network of more than 300 enterprise partners in various fields, and 12-week internship programs, BUV helps students gain professional knowledge and practical skills to meet employers’ requirements as well as be ready to develop their careers immediately after graduation.\r\nStudents study at BUV’s world class and state of the art campus in the Ecopark township. With its state-of-the-art teaching and learning facilities and an iconic design, BUV is recognized as one of the best educational environments in Asia.\r\nPOSITION PURPOSE In this role, you will be responsible for brand growth by leading brand development initiatives, overseeing and building a consistent brand image \u0026 messaging across channels. Collaborates with cross-departments, line-managers, colleagues and students and other relevant stakeholders in the planning, production, and execution of branding campaigns as well as supporting other marketing efforts to deliver business objectives.24:T1364,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003ePOSITION PURPOSE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe Event Manager leads the end-to-end planning and delivery of BUV’s events portfolio, with a primary focus on student recruitment events (approx. 80%) and selected internal/university events (approx. 20%). The role ensures every event delivers an outstanding brand experience and measurable contribution to the admissions pipeline through lead quality, conversion outcomes, and ROI.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThis is a hands-on leadership role: the Event Manager will both drive strategy and actively execute events alongside a team of Event Officers, ensuring operational excellence, stakeholder alignment, compliance, and continuous improvement.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAREAS OF RESPONSIBILITY\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e1) Recruitment Event Strategy, Planning \u0026 Performance (Data-led)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Own the recruitment events strategy and annual events calendar aligned with campaign priorities and the admissions cycle.\u003c/p\u003e\u003cp\u003e• Build event concepts that strengthen brand preference and support conversion, ensuring content, speakers, and journeys are designed with audience insight.\u003c/p\u003e\u003cp\u003e• Define event success metrics and deliver regular performance reporting (dashboards/scorecards) to inform decisions to scale / improve / stop specific formats.\u003c/p\u003e\u003cp\u003eTypical KPIs may include (not limited to):\u003c/p\u003e\u003cp\u003e• Registration-to-attendance rate (show-up rate)\u003c/p\u003e\u003cp\u003e• Lead capture completeness and data quality (including consent)\u003c/p\u003e\u003cp\u003e• Cost per attendee / cost per lead (CPL), by event type\u003c/p\u003e\u003cp\u003e• Lead-to-application and application-to-deposit/enrolment contribution (where attribution applies)\u003c/p\u003e\u003cp\u003e• Event NPS / experience satisfaction scores\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2) End-to-End Event Delivery (Concept → On-site → Post-event)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Lead end-to-end delivery across all assigned events: briefing, run-of-show, production schedules, staffing, speaker management, rehearsals, onsite operations, and post-event follow-up.\u003c/p\u003e\u003cp\u003e• Ensure high standards of attendee experience and event branding consistency across touchpoints (invites, signage, onsite flow, MC scripts, photography/video, post-event comms).\u003c/p\u003e\u003cp\u003e• Standardise and continuously improve event playbooks (SOPs, checklists, templates, supplier briefs) to enable quality delivery at scale.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3) CRM \u0026 Lead Capture Operations (Admissions Pipeline Integrity)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Partner with Recruitment and CRM owners to ensure event lead capture is accurate, compliant, and actionable (tagging, segmentation, deduplication, handover SLAs).\u003c/p\u003e\u003cp\u003e• Drive operational discipline around lead capture tools and workflows (QR check-in, forms, scanning), ensuring “no data left behind”.\u003c/p\u003e\u003cp\u003e• Collabor
