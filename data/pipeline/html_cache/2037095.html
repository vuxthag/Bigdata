/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Te9c,"])</script><script>self.__next_f.push([1,"Swinburne Vietnam Alliance Program is an international alliance between Swinburne University of Technology in Australia and FPT University in Vietnam. In short, we call Swinburne Vietnam Alliance Program as Swinburne Vietnam. \r\nSwinburne University of Technology is a prestigious university ranked 285th and belongs to the top 1% of the top universities in the world (QS Ranking, 2024), with a history of more than 100 years since its establishment. In Vietnam, Swinburne University of Technology has been known for more than 20 years as a sponsor for the champions of the game show “Road to Olympia” with study opportunities in Australia.\r\nFPT University is also one of the famous universities in Vietnam that has achieved many international certifications, such as QS Stars 3 stars (2012) and ACBSP for Business (2019). FPT University currently has locations in Hanoi, Ho Chi Minh City, Da Nang, Can Tho and Quy Nhon.\r\nMission and Vision:\r\nSwinburne Vietnam was established to bring success to learners; we are “The University of Success”:\r\nSwinburne Vietnam implements the vision and strategic goals of Swinburne University of Technology.\r\n– Vision: “People and technology working together to build a better world”\r\n– Implementing the above vision, Swinburne implements big goals, also known as ‘moonshots’, to bring different values to officials, students and partners. Specifically:\r\nMoon shot 1: Every Swinburne learner gets a work experience\r\nMoon shot 2: Every Swinburne graduate gets a job\r\nMoon shot 3: Every Swinburne partner gets a tech solution\r\nMoon shot 4: Swinburne is the prototype of global best practice\r\n\r\nSwinburne Vietnam Alliance Program là Chương trình Liên kết đào tạo giữa Swinburne University of Technology (Melbourne, Australia) và Đại học FPT.\r\nSwinburne University of Technology là trường đại học danh tiếng xếp vị trí thứ 285, lọt top 1% các trường đại học hàng đầu trên thế giới (QS Ranking 2024), có bề dày lịch sử hơn 100 năm kể từ khi thành lập. Đối với Việt Nam, Swinburne University of Technology được biết đến trong hơn 20 năm với vai trò là nhà tài trợ cho những nhà vô địch cuộc thi Đường lên đỉnh Olympia với các cơ hội học tập tại Australia.\r\nĐại học FPT cũng là một trong số các đại học nổi tiếng tại Việt Nam đã đạt được với nhiều chứng nhận quốc tế như QS Stars 3 sao (2012), ACBSP cho ngành Kinh doanh (2019). Đại học FPT hiện có trụ sở chính tại Hà Nội và phân hiệu tại TP. Hồ Chí Minh, Đà Nẵng, Cần Thơ và Quy Nhơn.\r\nGiá trị đào tạo:\r\nNhững giá trị mà Swinburne Việt Nam Alliance Program mang đến cho người học:\r\nSứ mệnh “Nâng cao năng lực cạnh tranh toàn cầu cho đông đảo người học, góp phần mở mang bờ cõi trí tuệ quốc gia”\r\nGiá trị: Mang lại sự thành công cho người học (The University of Success)\r\nTầm nhìn: “Con người và công nghệ cùng xây dựng một thế giới tốt đẹp hơn”\r\nĐể thực hiện tầm nhìn trên, Swinburne thực hiện các mục tiêu lớn, còn gọi là các “moon-shots” để đem lại giá trị khác biệt cho cán bộ, sinh viên và đối tác. Cụ thể:\r\n- Tất cả người học của Swinburne sẽ có kinh nghiệm làm việc.\r\n- Tất cả những sinh viên tốt nghiệp Swinburne có việc làm.\r\n- Tất cả các đối tác của Swinburne được cùng hợp tác để kiến tạo giải pháp về công nghệ.\r\n- Swinburne là nơi ứng dụng các mô hình tốt nhất toàn cầu."])</script><script>self.__next_f.push([1,"24:Tad9,"])</script><script>self.__next_f.push([1,"\u003cp\u003e1/ Cán bộ Công tác sinh viên (phụ trách Tổ chức sự kiện)\u003c/p\u003e\u003cp\u003eSố lượng: 2\u003c/p\u003e\u003cp\u003e- Quản lí, hướng dẫn và điều phối cộng đồng câu lạc bộ sinh viên, cộng đồng cựu sinh viên\u003c/p\u003e\u003cp\u003e- Tổ chức các hoạt động định hướng, sự kiện sinh viên, câu lạc bộ và phong trào xây dựng cộng đồng sinh viên và cựu sinh viên\u003c/p\u003e\u003cp\u003e- Tham gia thiết kế và quản lý chương trình PDP phát triển kỹ năng\u003c/p\u003e\u003cp\u003e- Tham gia lên ý tưởng và sản xuất những ấn phẩm trên nền tảng mạng xã hội để quảng bá sự kiện sinh viên, cựu sinh viên\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng ý tưởng nội dung, Big Idea, Key Visual, Tagline, Slogan và đưa ra các định hướng cho sự kiện sinh viên, cựu sinh viên\u003c/p\u003e\u003cp\u003e- Tham gia cùng đội nhóm để quay, dựng, chụp, sản xuất ấn phẩm media để quảng bá sự kiện sinh viên, cựu sinh viên\u003c/p\u003e\u003cp\u003e- Các công việc khác theo phân công của Cán bộ Quản lí trực tiếp\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e2/ Cán bộ Công tác sinh viên (phụ trách Truyền thông mạng xã hội)\u003c/p\u003e\u003cp\u003eSố lượng: 1\u003c/p\u003e\u003cp\u003e- Lên ý tưởng và sản xuất các ấn phẩm truyền thông (nội dung Tiktok, Facebook, Website, Instagram…)\u003c/p\u003e\u003cp\u003e- Xây dựng và quản lí các trang mạng xã hội\u003c/p\u003e\u003cp\u003e- Lập kế hoạch sản xuất nội dung trên các kênh truyền thông\u003c/p\u003e\u003cp\u003e- Tham gia xây dựng big idea, key visual, viết slogan, tagline, đưa ra các định hướng chiến lược cho các chiến dịch marketing\u003c/p\u003e\u003cp\u003e- Viết kịch bản, thiết kế, thi công để sản xuất các hình ảnh, video…\u003c/p\u003e\u003cp\u003e- Hỗ trợ quá trình tổ chức sự kiện và tổ chức sản xuất\u003c/p\u003e\u003cp\u003e- Đánh giá và đo lường hiệu quả các chiến dịch truyền thông\u003c/p\u003e\u003cp\u003e- Các cô \n\r\nSwinburne Vietnam Alliance Program là Chương trình Liên kết đào tạo giữa Swinburne University of Technology (Melbourne, Australia) và Đại học FPT.\r\nSwinburne University of Technology là trường đại học danh tiếng xếp vị trí thứ 285, lọt top 1% các trường đại học hàng đầu trên thế giới (QS Ranking 2024), có bề dày lịch sử hơn 100 năm kể từ khi thành lập. Đối với Việt Nam, Swinburne University of Technology được biết đến trong hơn 20 năm với vai trò là nhà tài trợ cho những nhà vô địch cuộc thi Đường lên đỉnh Olympia với các cơ hội học tập tại Australia.\r\nĐại học FPT cũng là một trong số các đại học nổi tiếng tại Việt Nam đã đạt được với nhiều chứng nhận quốc tế như QS Stars 3 sao (2012), ACBSP cho ngành Kinh doanh (2019). Đại học FPT hiện có trụ sở chính tại Hà Nội và phân hiệu tại TP. Hồ Chí Minh, Đà Nẵng, Cần Thơ và Quy Nhơn.\r\nGiá trị đào tạo:\r\nNhững giá trị mà Swinburne Việt Nam Alliance Program mang đến cho người học:\r\nSứ mệnh “Nâng cao năng lực cạnh tranh toàn cầu cho đông đảo người học, góp phần mở mang bờ cõi trí tuệ quốc gia”\r\nGiá trị: Mang lại sự thành công cho người học (The University of Success)\r\nTầm nhìn: “Con người và công nghệ cùng xây dựng một thế giới tốt đẹp hơn”\r\nĐể thực hiện tầm nhìn trên, Swinburne thực hiện các mục tiêu lớn, còn gọi là các “moon-shots” để đem lại giá trị khác biệt cho cán bộ, sinh viên và đối tác. Cụ thể:\r\n- Tất cả người học của Swinburne sẽ có kinh nghiệm làm việc.\r\n- Tất cả những sinh viên tốt nghiệp Swinburne có việc làm.\r\n- Tất cả các đối tác của Swinburne được cùng hợp tác để kiến tạo giải pháp về công nghệ.\r\n- Swinburne là nơi ứng dụng các mô hình tốt nhất toàn cầu."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"40:{\"companyId\":356502,\"jobImageURLs\":\"$41\",\"jobVideoURLs\":\"$42\",\"companyName\":\"Swinburne Việt Nam\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/c6/11222407.png\",\"companySizeId\":\"\",\"compan
