\n"])</script><script>self.__next_f.push([1,"a:null\n"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"22:I[37580,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T7ba,BRITISH UNIVERSITY VIETNAM (BUV) British University Vietnam (BUV) is the first and only international university in Vietnam to directly award British degrees from the prestigious University of London, University of Staffordshire, University of Stirling and Arts University Bournemouth. BUV is rated a 5 Star university of excellence by the world recognized QS organization and maintains a QAA IQR accreditation for its programs.\r\nBUV has three main brand drivers:\r\n• Offering accredited British and international higher education and training in Vietnam;\r\n• Providing 5-star university campuses, learning spaces, and services;\r\n• Including a compulsory personal and social growth program that prepares students for the future of life and work;\r\nEstablished in 2009, BUV provides teaching for undergraduate and graduate programs. Employability rates for students are exceptionally high with 100% of graduates from BUV either "])</script><script>self.__next_f.push([1,"employed or continuing higher education within 3 months after graduation.\r\nWith a wide network of more than 300 enterprise partners in various fields, and 12-week internship programs, BUV helps students gain professional knowledge and practical skills to meet employers’ requirements as well as be ready to develop their careers immediately after graduation.\r\nStudents study at BUV’s world class and state of the art campus in the Ecopark township. With its state-of-the-art teaching and learning facilities and an iconic design, BUV is recognized as one of the best educational environments in Asia.\r\nPOSITION PURPOSE In this role, you will be responsible for brand growth by leading brand development initiatives, overseeing and building a consistent brand image \u0026 messaging across channels. Collaborates with cross-departments, line-managers, colleagues and students and other relevant stakeholders in the planning, production, and execution of branding campaigns as well as supporting other marketing efforts to deliver business objectives.24:T17e8,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003ePOSITION PURPOSE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe Student Wellbeing Counsellor plays a key role in supporting the holistic development and success of students at the University by promoting psychological wellbeing, emotional resilience, and personal growth throughout their university journey. The role provides both individual counselling and group activities, delivers preventative wellbeing programmes, and contributes to building a healthy, safe, and inclusive learning environment across the University.\u003c/p\u003e\u003cp\u003eWorking closely with the Head of Student Engagement, the teammate and and relevant departments, the position holder will help identify emerging wellbeing needs among students, provide timely support and interventions, and design initiatives that strengthen students’ capacity to manage academic, personal, and social challenges.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe Counsellor will also contribute to the development, implementation, and continuous improvement of counselling policies, procedures, and service standards, ensuring alignment with best practices from UK partner universities, international higher education standards, and Vietnamese regulatory requirements (including MOET regulations).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThrough counselling services, educational workshops, awareness campaigns, and cross-department collaboration, the role supports the University’s mission of nurturing graduates who demonstrate kindness, resilience, compassion, integrity, and respect.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eAREAS OF RESPONSIBILITY\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eMajor duties and responsibilities include, but are not limited to:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Counselling and Student Support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Provide confidential individual and group counselling to students experiencing social, emotional, psychological, or behavioural challenges.\u003c/p\u003e\u003cp\u003e• Support students in managing issues such as academic stress, anxiety, relationships, identity development, emotional regulation, and social integration.\u003c/p\u003e\u003cp\u003e• Conduct wellbeing screenings, assessments, and risk evaluations to identify potential concerns and provide appropriate support or intervention.\u003c/p\u003e\u003cp\u003e• Provide early intervention and case management for students facing wellbeing challenges, ensuring appropriate follow-up and documentation.\u003c/p\u003e\u003cp\u003e• Refer students to relevant internal services or external professional support where necessary.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Wellbeing Programmes, Workshops and Events\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Design and deliver wellbeing workshops, talks, campaigns, and awareness initiatives on topics such as mental health literacy, resilience, stress management, emotional intelligence, and healthy relationships…\u003c/p\u003e\u003cp\u003e• Plan and implement a structured annual wellbeing activities calendar aligned with the University academic cycle and student needs.\u003c/p\u003e\u003cp\u003e• Collaborate with student clubs, academic and operations departments, and university units to integrate wellbeing themes into co-curricular and student life activities.\u003c/p\u003e\u003cp\u003e• Support the delivery of wellbeing-related sessions during orientation and induction programs, Personal and Social Growth Programme and PSG Weeks, recruitment events, parents’ events, and university engagement activities where appropriate.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Service Development, Quality Assurance and Best Practice\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Contribute to the development and continuous improvement of the University’s counselling services, including policies, procedures, and operational frameworks.\u003c/p\u003e\u003cp\u003e• Ensure counselling practices align with professional ethical standards, UK partner university guidelines, and MOET regulations.\u003c/p\u003e\u003cp\u003e• Benchmark and adopt best practices from UK partner universities and international higher education wellbeing services.\u003c/p\u003e\u003cp\u003e• Support the development of new initiatives that improve student access, engagement, and awareness of wellbeing services.\u003c/p\u003e\u003cp\u003e• Maintain accurate and confidential counselling records in accordance with data protection and professional standards.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. University-wide Wellbeing Promotion\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Work collaboratively with academic staff, student services teams, and university leadership to promote a whole-institution approach to student wellbeing.\u003c/p\u003e\u003cp\u003e• Support the development and implementation of preventative wellbeing programmes that contribute to a positive campus environment.\u003c/p\u003e\u003cp\u003e• Promote policies and initiatives that enhance student safety, inclusiveness, and respect across the University community.\u003c/p\u003e\u003cp\u003e• Provide consultation to university staff regarding student wellbeing concerns where appropriate.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Monitoring, Reporting and Administration\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Collect and analyse data relating to counselling services usage, student wellbeing trends, and programme outcomes to inform service improvement.\u003c/p\u003e\u003cp\u003e• Prepare weekly case updates, semester reports, and annual wellbeing reports for the Head of Student Engagement.\u003c/p\u003e\u003cp\u003e• Develop and manage semesterly wellbeing activity plans and budgets for events and initiatives.\u003c/p\u003e\u003cp\u003e• Support departmental communication, including newsletters, student communications, and wellbeing awareness materials.\u003c/p\u003e\u003cp\u003e• Ensure timely and professional responses to enquiries from students, parents, and university stakeholders.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Safeguarding and Student Protection\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Maintain strict confidentiality and professional ethics in handling all student cases.\u003c/p\u003e\u003cp\u003e• Remain vigilant to signs that a student may be at risk due to bullying, harassment, mental health concerns, abuse, or other safety issues.\u003c/p\u003e\u003cp\u003e• Escalate safeguarding concerns appropriately and coordinate with relevant university units when necessary.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Other Duties\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Assist in supervising and supporting students during university events and activities where wellbeing oversight is required.\u003c/p\u003e\u003cp\u003e• Perform other duties as assigned by the Head of Student Engagement or University management.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tac0,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003ePOSITION SPECIFICATIONS\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEssential Qualifications and Experience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e• Vietnamese national with professional working proficiency in both Vietnamese and English.\u003c/p\u003e\u003cp\u003e• Bachelor’s degree in Psychology, Counselling Psychology, Educational Psychology, or a related field from a recognised institution. A postgraduate qualification in counselling or mental health is an advantage.\u003c/p\u003e\u003cp\u003e• Demonstrated experience in providing counselling or psychological support to young people or university-aged students (18–24).\u003c/p\u003e\u003cp\u003e• Experience working with individuals facing mental health challenges, emotional difficulties, or social disadvantages.\u003c/p\u003e\u003cp\u003e• Knowledge of psychological assessments, emotional intelligence frameworks, and student development app
