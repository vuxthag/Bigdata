03e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eINTRODUCTION\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCam Ranh International Terminal Service Company Limited is a legal entity specializing in leasing, business cooperation, and management of non-aviation services at Cam Ranh International Passenger Terminal (T2). The Company has fewer than 20 employees and operates under a lean and flexible model\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tKế toán \u0026 Kiểm soát tài chính \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTổ chức và quản lý hoạt động kế toán hàng ngày theo Chuẩn mực Kế toán Việt Nam và quy định của Công ty.\u003c/p\u003e\u003cp\u003eKiểm tra và đảm bảo tính chính xác của sổ sách kế toán, chứng từ, doanh thu, chi phí và kết quả tài chính.\u003c/p\u003e\u003cp\u003eQuản lý dòng tiền, số dư ngân hàng và kế hoạch thanh toán nhằm đảm bảo đủ nguồn vốn cho hoạt động.\u003c/p\u003e\u003cp\u003eĐảm bảo các khoản thanh toán được thực hiện chính xác, đúng hạn và tuân thủ quy định.\u003c/p\u003e\u003cp\u003eTheo dõi và đôn đốc công nợ phải thu.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Lập ngân sách \u0026 Phân tích tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp với Phòng Kế hoạch Kinh doanh và công ty mẹ để lập và cập nhật kế hoạch kinh doanh, ngân sách theo yêu cầu của Ban lãnh đạo.\u003c/p\u003e\u003cp\u003eTheo dõi kết quả thực tế so với ngân sách và giải trình các chênh lệch.\u003c/p\u003e\u003cp\u003eCung cấp phân tích tài chính và đề xuất nhằm hỗ trợ việc ra quyết định của Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Báo cáo tài chính \u0026 Tuân thủ thuế \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLập và rà soát báo cáo tài chính tháng, quý, năm và các báo cáo quản trị.\u003c/p\u003e\u003cp\u003eLập và nộp các báo cáo thuế (GTGT, TNDN, TNCN, thuế nhà thầu) theo quy định.\u003c/p\u003e\u003cp\u003eĐảm bảo thực hiện quyết toán cuối năm đúng hạn và phối hợp với kiểm toán độc lập.\u003c/p\u003e\u003cp\u003eCập nhật và triển khai các thay đổi theo quy định mới về kế toán, thuế và tài chính.\u003c/p\u003e\u003cp\u003ePhối hợp và xử lý các vấn đề phát sinh với các cơ quan như Cơ quan Thuế, Sở Nội vụ, v.v.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản lý tài sản \u0026 chi phí \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTheo dõi và kiểm soát chi phí hoạt động, đảm bảo hợp lý, hợp lệ và được ghi nhận đúng quy định.\u003c/p\u003e\u003cp\u003eQuản lý tài sản cố định bao gồm theo dõi, kiểm kê, đánh giá lại và thanh lý theo quy định.\u003c/p\u003e\u003cp\u003eĐối chiếu số liệu kế toán giữa các bộ phận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Hành chính \u0026 Giám sát liên quan nhân sự \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eRà soát hồ sơ lao động, hồ sơ bảo hiểm xã hội và các chính sách liên quan.\u003c/p\u003e\u003cp\u003eGiám sát quy trình tính lương, đảm bảo chính xác, tuân thủ pháp luật và phê duyệt chi trả đúng hạn.\u003c/p\u003e\u003cp\u003eRà soát và phê duyệt các công văn gửi cơ quan nhà nước trong phạm vi được ủy quyền.\u003c/p\u003e\u003cp\u003eTham gia và đóng góp ý kiến trong công tác tuyển dụng và các đợt thanh tra của cơ quan chức năng.\u003c/p\u003e\u003cp\u003eXử lý hồ sơ liên quan đến lao động nước ngoài: giấy phép lao động, visa, thẻ tạm trú, v.v.\u003c/p\u003e\u003cp\u003eTriển khai và đảm bảo thực hiện đúng các chính sách, quy định liên quan đến người lao động theo quy định của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Làm việc với cơ quan \u0026 các bên liên quan \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLàm việc với cơ quan thuế, kiểm toán, ngân hàng và các cơ quan nhà nước liên quan.\u003c/p\u003e\u003cp\u003eChuẩn bị hồ sơ, tài liệu và giải trình phục vụ thanh tra, kiểm toán.\u003c/p\u003e\u003cp\u003eRà soát các điều khoản liên quan đến tài chính – kế toán trong hợp đồng, thỏa thuận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Quản lý \u0026 hỗ trợ đội ngũ \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGiám sát, phân công và kiểm tra công việc của nhân viên kế toán.\u003c/p\u003e\u003cp\u003eHướng dẫn và đào tạo nhân viên về chuẩn mực kế toán, quy định thuế và quy trình kiểm soát nội bộ.\u003c/p\u003e\u003cp\u003eĐảm bảo bộ phận kế toán hoạt động hiệu quả và tuân thủ kiểm soát nội bộ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Công việc khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThực hiện các công việc khác theo phân công của Ban lãnh đạo liên quan đến tài chính – kế toán.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eMAIN RESPONSIBILITIES:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.\tAccounting \u0026 Financial Control:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eOrganize and manage daily accounting operations in accordance with Vietnamese Accounting Standards and Company regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReview and ensure accuracy of accounting records, vouchers, revenues, expenses, and financial results.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eManage cash flow, bank balances, and payment schedules to ensure sufficient funds for operations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure all payments are processed accurately, on time, and in compliance with regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eMonitor and follow up on receivables and debt collection.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.\tBudgeting \u0026 Financial Analysis\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWork with leasing team and parent company to prepare and update business plans and budgets as required by Management.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eMonitor actual performance against budget and explain variances.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eProvide financial analysis and recommendations to support management decision-making.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3.\tFinancial Reporting \u0026 Tax Compliance\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePrepare and review monthly, quarterly, and annual financial statements and management reports.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePrepare and submit tax reports (VAT, CIT, PIT, FCT) in compliance with regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure timely year-end closing and coordination with external auditors.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eUpdate and implement changes in accordance with accounting, tax, and financial regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHandle queries from authorities such as the Tax Department, Home Affairs Department, etc.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4.\tAsset \u0026 Cost Management\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eMonitor and control operating expenses to ensure they are reasonable, valid, and properly recorded.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eManage fixed assets, including tracking, inventory, revaluation, and disposal in accordance with regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReconcile accounting data across departments.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e5.\tAdministration \u0026 HR-related Oversight\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReview labor files, social insurance records, and related policies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eOversee payroll processes to ensure accuracy, legal compliance, and timely salary approval.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReview and approve official documents sent to government agencies within the scope of authorization.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eParticipate in recruitment processes and inspections by authorities.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHandle documentation related to foreign employees: work permits, visas, temporary residence cards, etc.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure proper implementation of employee-related policies and regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e6.\tWorking with Authorities \u0026 Stakeholders\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eLiaise with tax authorities, auditors, banks, and other relevant government agencies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePrepare explanations and supporting documents for inspections, audits, and reviews.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReview financial and accounting-related terms in contracts and agreements.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e7.\tTeam Management \u0026 Support\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eSupervise, assign, and review work of accounting staff.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eGuide and train staff on accounting standards, tax regulations, and internal control procedures.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure the accounting team operates efficiently and complies with internal controls.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e8.\tOther Duties\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePerform other tasks as assigned by Management relating to finance and accounting matters.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T936,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTốt nghiệp đại học chuyên ngành Kế toán/Tài chính, có chứng chỉ Kế toán trưởng.\u003c/p\u003e\u003cp\u003eTối thiểu 2 – 3 năm kinh nghiệm ở vị trí Kế toán trưởng.\u003c/p\u003e\u003cp\u003eAm hiểu chuẩn mực kế toán, luật thuế và các quy định của pháp luật tại Việt Nam.\u003c/p\u003e\u003cp\u003eThành thạo lập và phân tích báo cáo tài chính, sử dụng tốt phần mềm kế toán và Excel.\u003c/p\u003e\u003cp\u003eCó kinh nghiệm trong việc lập báo cáo tài chính, kê khai thuế và làm việc với kiểm toán cũng như các cơ quan chức năng liên quan.\u003c/p\u003e\u003cp\u003eTrung thực, cẩn thận, có trách nhiệm và chịu được áp lực công việc cao.\u003c/p\u003e\u003cp\u003eKhả năng giao tiếp hiệu quả bằng cả tiếng Anh và tiếng Việt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eREQUIREMENTS\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBachelor’s degree in Accounting/Finance with Chief Accountant certification.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eAt least 2–3 years of experience in a Chief Accountant position.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eStrong knowledge of Vietnamese accounting standards, tax regulations, and financial laws.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eProficient in preparing and analyzing financial statements; skilled in accounting software and Excel.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eExperience in financial reporting, tax filing, and working with auditors and relevant authorities.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHigh level of integrity, accuracy, responsibility, and ability to work under high pressure.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eAbility to communicate effectively in both English and Vietnamese.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHẾ ĐỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLương thỏa thuận và các chế độ về BHXH đầy đủ.\u003c/p\u003e\u003cp\u003eĐược tham gia bảo hiểm sức khỏe và khám sức khỏe định kỳ hằng năm.\u003c/p\u003e\u003cp\u003eChế độ vào các dịp sinh nhật, kết hôn, Tết Dương lịch, Tết Âm lịch,…\u003c/p\u003e\u003cp\u003eCó xe đưa đón từ Nha Trang.\u003c/p\u003e\u003cp\u003e\u003cem\u003e\u003cbr\u003e\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eBENEFITS\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eSalary is negotiable, with full social insurance benefits (SI, HI, UI) in accordance with regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eProvided with health insurance and annual health check-ups.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBenefits on occasions such as birthdays, weddings, New Year (Gregorian), and Lunar New Year.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCompany shuttle bus provided from Nha Trang.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T2098,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eGIỚI THIỆU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCông ty TNHH Dịch vụ Nhà ga Quốc tế Cam Ranh là pháp nhân chuyên cung cấp dịch vụ cho thuê, hợp tác kinh doanh và quản lý các dịch vụ phi hàng không tại Nhà ga hành khách quốc tế Cam Ranh (T2). Công ty có quy mô dưới 20 nhân sự và vận hành theo mô hình tinh gọn, linh hoạt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eINTRODUCTION\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCam Ranh International Terminal Service Company Limited is a legal entity specializing in leasing, business cooperation, and management of non-aviation services at Cam Ranh International Passenger Terminal (T2). The Company has fewer than 20 employees and operates under a lean and flexible model\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.\tKế toán \u0026 Kiểm soát tài chính \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTổ chức và quản lý hoạt động kế toán hàng ngày theo Chuẩn mực Kế toán Việt Nam và quy định của Công ty.\u003c/p\u003e\u003cp\u003eKiểm tra và đảm bảo tính chính xác của sổ sách kế toán, chứng từ, doanh thu, chi phí và kết quả tài chính.\u003c/p\u003e\u003cp\u003eQuản lý dòng tiền, số dư ngân hàng và kế hoạch thanh toán nhằm đảm bảo đủ nguồn vốn cho hoạt động.\u003c/p\u003e\u003cp\u003eĐảm bảo các khoản thanh toán được thực hiện chính xác, đúng hạn và tuân thủ quy định.\u003c/p\u003e\u003cp\u003eTheo dõi và đôn đốc công nợ phải thu.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Lập ngân sách \u0026 Phân tích tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp với Phòng Kế hoạch Kinh doanh và công ty mẹ để lập và cập nhật kế hoạch kinh doanh, ngân sách theo yêu cầu của Ban lãnh đạo.\u003c/p\u003e\u003cp\u003eTheo dõi kết quả thực tế so với ngân sách và giải trình các chênh lệch.\u003c/p\u003e\u003cp\u003eCung cấp phân tích tài chính và đề xuất nhằm hỗ trợ việc ra quyết định của Ban lãnh đạo.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Báo cáo tài chính \u0026 Tuân thủ thuế \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLập và rà soát báo cáo tài chính tháng, quý, năm và các báo cáo quản trị.\u003c/p\u003e\u003cp\u003eLập và nộp các báo cáo thuế (GTGT, TNDN, TNCN, thuế nhà thầu) theo quy định.\u003c/p\u003e\u003cp\u003eĐảm bảo thực hiện quyết toán cuối năm đúng hạn và phối hợp với kiểm toán độc lập.\u003c/p\u003e\u003cp\u003eCập nhật và triển khai các thay đổi theo quy định mới về kế toán, thuế và tài chính.\u003c/p\u003e\u003cp\u003ePhối hợp và xử lý các vấn đề phát sinh với các cơ quan như Cơ quan Thuế, Sở Nội vụ, v.v.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Quản lý tài sản \u0026 chi phí \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTheo dõi và kiểm soát chi phí hoạt động, đảm bảo hợp lý, hợp lệ và được ghi nhận đúng quy định.\u003c/p\u003e\u003cp\u003eQuản lý tài sản cố định bao gồm theo dõi, kiểm kê, đánh giá lại và thanh lý theo quy định.\u003c/p\u003e\u003cp\u003eĐối chiếu số liệu kế toán giữa các bộ phận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Hành chính \u0026 Giám sát liên quan nhân sự \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eRà soát hồ sơ lao động, hồ sơ bảo hiểm xã hội và các chính sách liên quan.\u003c/p\u003e\u003cp\u003eGiám sát quy trình tính lương, đảm bảo chính xác, tuân thủ pháp luật và phê duyệt chi trả đúng hạn.\u003c/p\u003e\u003cp\u003eRà soát và phê duyệt các công văn gửi cơ quan nhà nước trong phạm vi được ủy quyền.\u003c/p\u003e\u003cp\u003eTham gia và đóng góp ý kiến trong công tác tuyển dụng và các đợt thanh tra của cơ quan chức năng.\u003c/p\u003e\u003cp\u003eXử lý hồ sơ liên quan đến lao động nước ngoài: giấy phép lao động, visa, thẻ tạm trú, v.v.\u003c/p\u003e\u003cp\u003eTriển khai và đảm bảo thực hiện đúng các chính sách, quy định liên quan đến người lao động theo quy định của Công ty.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Làm việc với cơ quan \u0026 các bên liên quan \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLàm việc với cơ quan thuế, kiểm toán, ngân hàng và các cơ quan nhà nước liên quan.\u003c/p\u003e\u003cp\u003eChuẩn bị hồ sơ, tài liệu và giải trình phục vụ thanh tra, kiểm toán.\u003c/p\u003e\u003cp\u003eRà soát các điều khoản liên quan đến tài chính – kế toán trong hợp đồng, thỏa thuận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Quản lý \u0026 hỗ trợ đội ngũ \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGiám sát, phân công và kiểm tra công việc của nhân viên kế toán.\u003c/p\u003e\u003cp\u003eHướng dẫn và đào tạo nhân viên về chuẩn mực kế toán, quy định thuế và quy trình kiểm soát nội bộ.\u003c/p\u003e\u003cp\u003eĐảm bảo bộ phận kế toán hoạt động hiệu quả và tuân thủ kiểm soát nội bộ.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e8. Công việc khác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThực hiện các công việc khác theo phân công của Ban lãnh đạo liên quan đến tài chính – kế toán.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eMAIN RESPONSIBILITIES:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e1.\tAccounting \u0026 Financial Control:\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eOrganize and manage daily accounting operations in accordance with Vietnamese Accounting Standards and Company regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReview and ensure accuracy of accounting records, vouchers, revenues, expenses, and financial results.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eManage cash flow, bank balances, and payment schedules to ensure sufficient funds for operations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure all payments are processed accurately, on time, and in compliance with regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eMonitor and follow up on receivables and debt collection.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e2.\tBudgeting \u0026 Financial Analysis\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eWork with leasing team and parent company to prepare and update business plans and budgets as required by Management.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eMonitor actual performance against budget and explain variances.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eProvide financial analysis and recommendations to support management decision-making.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e3.\tFinancial Reporting \u0026 Tax Compliance\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePrepare and review monthly, quarterly, and annual financial statements and management reports.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePrepare and submit tax reports (VAT, CIT, PIT, FCT) in compliance with regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure timely year-end closing and coordination with external auditors.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eUpdate and implement changes in accordance with accounting, tax, and financial regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHandle queries from authorities such as the Tax Department, Home Affairs Department, etc.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e4.\tAsset \u0026 Cost Management\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eMonitor and control operating expenses to ensure they are reasonable, valid, and properly recorded.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eManage fixed assets, including tracking, inventory, revaluation, and disposal in accordance with regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReconcile accounting data across departments.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e5.\tAdministration \u0026 HR-related Oversight\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReview labor files, social insurance records, and related policies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eOversee payroll processes to ensure accuracy, legal compliance, and timely salary approval.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReview and approve official documents sent to government agencies within the scope of authorization.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eParticipate in recruitment processes and inspections by authorities.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHandle documentation related to foreign employees: work permits, visas, temporary residence cards, etc.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure proper implementation of employee-related policies and regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e6.\tWorking with Authorities \u0026 Stakeholders\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eLiaise with tax authorities, auditors, banks, and other relevant government agencies.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePrepare explanations and supporting documents for inspections, audits, and reviews.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eReview financial and accounting-related terms in contracts and agreements.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e7.\tTeam Management \u0026 Support\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eSupervise, assign, and review work of accounting staff.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eGuide and train staff on accounting standards, tax regulations, and internal control procedures.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure the accounting team operates efficiently and complies with internal controls.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e8.\tOther Duties\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePerform other tasks as assigned by Management relating to finance and accounting matters.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:T936,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTốt nghiệp đại học chuyên ngành Kế toán/Tài chính, có chứng chỉ Kế toán trưởng.\u003c/p\u003e\u003cp\u003eTối thiểu 2 – 3 năm kinh nghiệm ở vị trí Kế toán trưởng.\u003c/p\u003e\u003cp\u003eAm hiểu chuẩn mực kế toán, luật thuế và các quy định của pháp luật tại Việt Nam.\u003c/p\u003e\u003cp\u003eThành thạo lập và phân tích báo cáo tài chính, sử dụng tốt phần mềm kế toán và Excel.\u003c/p\u003e\u003cp\u003eCó kinh nghiệm trong việc lập báo cáo tài chính, kê khai thuế và làm việc với kiểm toán cũng như các cơ quan chức năng liên quan.\u003c/p\u003e\u003cp\u003eTrung thực, cẩn thận, có trách nhiệm và chịu được áp lực công việc cao.\u003c/p\u003e\u003cp\u003eKhả năng giao tiếp hiệu quả bằng cả tiếng Anh và tiếng Việt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eREQUIREMENTS\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBachelor’s degree in Accounting/Finance with Chief Accountant certification.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eAt least 2–3 years of experience in a Chief Accountant position.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eStrong knowledge of Vietnamese accounting standards, tax regulations, and financial laws.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eProficient in preparing and analyzing financial statements; skilled in accounting software and Excel.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eExperience in financial reporting, tax filing, and working with auditors and relevant authorities.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHigh level of integrity, accuracy, responsibility, and ability to work under high pressure.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eAbility to communicate effectively in both English and Vietnamese.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCHẾ ĐỘ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLương thỏa thuận và các chế độ về BHXH đầy đủ.\u003c/p\u003e\u003cp\u003eĐược tham gia bảo hiểm sức khỏe và khám sức khỏe định kỳ hằng năm.\u003c/p\u003e\u003cp\u003eChế độ vào các dịp sinh nhật, kết hôn, Tết Dương lịch, Tết Âm lịch,…\u003c/p\u003e\u003cp\u003eCó xe đưa đón từ Nha Trang.\u003c/p\u003e\u003cp\u003e\u003cem\u003e\u003cbr\u003e\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eBENEFITS\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eSalary is negotiable, with full social insurance benefits (SI, HI, UI) in accordance with regulations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eProvided with health insurance and annual health check-ups.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBenefits on occasions such as birthdays, weddings, New Year (Gregorian), and Lunar New Year.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCompany shuttle bus provided from Nha Trang.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2a:{\"skillName\":\"Accounting Standards\",\"skillId\":721233,\"skillWeight\":100,\"isExisted\":false}\n2b:{\"skillName\":\"Financial Reporting\",\"skillId\":987953,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Tax Compliance\",\"skillId\":32349,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Excel proficiency\",\"skillId\":1013348,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Effective Communication\",\"skillId\":330588,\"skillWeight\":100,\"isExisted\":false}\n29:[\"$2a\",\"$2b\",\"$2c\",\"$2d\",\"$2e\"]\n30:{\"benefitId\":2,\"benefitIconName\":\"fa-user-md\",\"benefitName\":\"Healthcare Plan\",\"benefitNameVI\":\"Chăm sóc sức khoẻ\",\"benefitValue\":\"Lương thỏa thuận và các chế độ về BHXH đầy đủ\u003cbr/\u003eĐược tham gia bảo hiểm sức khỏe và khám sức khỏe định kỳ hằng năm\"}\n31:{\"benefitId\":11,\"benefitIconName\":\"fa-cab\",\"benefitName\":\"Transportation\",\"benefitNameVI\":\"Xe đưa đón\",\"benefitValue\":\"Có xe đưa đón từ Nha Trang\"}\n32:{\"benefitId\":15,\"benefitIconName\":\"fa-ch
