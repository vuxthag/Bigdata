g PennSchool (PennSchool)\r\n- Hệ thống Trường Sydney (SISS)\r\n- Viện Kế toán và Quản trị doanh nghiệp (IABM)\r\n- Trường Trung cấp Bách khoa Việt Mỹ (AmCollege)\r\n- Trung tâm Tư vấn Du học ISA (ISA)\r\n- Trung tâm Ngoại ngữ Penn Academy (Penn Academy)\r\n- Học viện Phát triển Tài năng (TDA)\r\n\r\nDù thuộc nhiều cấp học và cung cấp nhiều chương trình đào tạo đa dạng, tất cả các đơn vị thuộc RT Holdings đều gặp nhau ở một điểm chung: tinh thần giáo dục cởi mở, phương pháp đào tạo không ngừng đổi mới và nội dung đào tạo luôn hướng tới mục tiêu chuẩn hóa theo chất lượng quốc tế thông qua những chương trình kiểm định uy tín của thế giới. Rất nhiều thế hệ học sinh, sinh viên đã trưởng thành và trở thành sinh viên của các Đại học hàng đầu thế giới, gặt hái rất nhiều thành công trong sự nghiệp từ những bệ phóng vững chắc mà các đơn vị trực thuộc RT Holdings đang cần mẫn kiến tạo mỗi ngày.\r\n\r\nCó thể nói, hành trình hai thập kỷ kiến tạo và đổi mới của RT Holdings chính là hành trình của sự đam mê, nhiệt huyết và xuất phát từ sự tâm huyết, niềm đam mê và khát vọng mạnh mẽ của những người Thầy, người Cô luôn trăn trở cho sự nghiệp giáo dục.\r\n\r\nHãy gia nhập đội ngũ của chúng tôi để đóng góp sức mình cho hành trình kiến tạo những thế hệ trẻ tài năng và đưa Việt Nam trở thành một trong những quốc gia đi đầu trong toàn cầu hóa giáo dục!\r\n\r\nĐội ngũ RT Holdings\r\nhttps://rtholdings.edu.vn \r\n\r\n\r\n\r\n\r\nRT Holdings is one of the pioneers in Vietnam in providing international-standard programs for students from Kindergarten to High school, in addition to short-term courses. RT Holdings is dedicated to opening opportunities for students to access world-class courses in Vietnam, helping them approach global education easily and quickly; and at the same time promoting activities in investment, trading, and services in terms of education around the world. With the desire to build up excellent global citizenships, RT Holdings believes that investment in education should be undertaken in a long-term, persistent, and patient way to be more successful and contribute more to the community. \r\n\r\nFollowing that aspiration and vision in the last two decades, RT Holdings has been developing and expanding with a number of units, including:\r\n\r\n-          Western Australian International School System (WASS)\r\n\r\n-          Pennsylvania American International School System (PennSchool)\r\n\r\n-          Sydney International School System (SISS)\r\n\r\n-          Institute of Accounting and Business Management (IABM)\r\n\r\n-          American College of Vietnam (AmCollege)\r\n\r\n-          Indochina Study Abroad (ISA)\r\n\r\n-          Penn Academy\r\n\r\n-          Talents Development Academy (TDA)\r\n\r\nDespite having various educational levels and programs, all units in RT Holdings share a common point: an open-minded educational spirit, constantly innovative training methods, and a training method standardized to international quality through the world’s reputable accreditation programs. Many generations of students have grown up, become students at top Universities, and achieved a lot of success in their careers from the solid foundation that all the units in RT Holdings consistently build up every day.\r\n\r\nThe journey of nearly two decades of creation and innovation of RT Holdings have been driven by passion and enthusiasm, which comes from the passion, dedication and desires of Teachers who are always concerned about education.\r\n\r\nJoin us today to contribute your talents to the journey of raising up excellent young generations and making Vietnam one of the leading countries in the globalization of education.\r\n\r\nRT Holdings Team\r\n\r\nhttps://rtholdings.edu.vn/en/"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:T7a3,\u003cp\u003eRT Holdings là một trong những Hệ thống tiên phong tại Việt Nam trong việc cung cấp đa dạng các chương trình giáo dục chuẩn quốc
