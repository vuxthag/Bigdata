ent and clearance of freight, while providing an exceptional customer service within the Customs Brokerage department \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhiệm vụ cụ thể/ Responsibilities:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tĐảm bảo quy trình hải quan diễn ra trôi chảy, đúng thời gian quy định\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure smooth and timely customs process flow\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e2.\tGửi hóa đơn cho khách hang chính xác, đúng hạn\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure accurate and timely client billing.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e3.\tAm hiểu về các quy trình làm hải quan hàng nhập, xuất thông qua DLSOP, để có thể giải thích, hướng dẫn cho khách hang chuẩn xác.\u003c/p\u003e\u003cp\u003e\u003cem\u003eUnderstand all the elements of the import and export customs DLSOP (Desk Level Standard Operating Procedure) and correctly interpret this information to fulfill our customers’ instructions and expectations.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e4.\tNhập dữ liệu vào hệ thống nhanh chóng, chính xác.\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure accurate and timely data entry into our operating system.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e5.\tNhập thông tin khai hải quan từ chứng từ, hoặc các nguồn khác để nhập vào hệ thống hải quan cho tờ khai hải quan hợp lệ \u003c/p\u003e\u003cp\u003e\u003cem\u003eTranspose customs declaration information from documents, or other sources into the customs entry system to allow for the build of a valid customs declaration\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e6.\tTrợ giúp xác minh thông tin khai hải quan và nộp cho hải quan\u003c/p\u003e\u003cp\u003e\u003cem\u003eAssist with verification of customs declaration information and the submission of such to the customs authority.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e7.\tThao dõi các chứng từ hải quan. \u003c/p\u003e\u003cp\u003e\u003cem\u003eTrack and trace Customs files.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e8.\tTương tác với cơ quan hải quan để giải quyết bất kỳ phát sinh nào trong qua trình khai báo hải quan\u003c/p\u003e\u003cp\u003eInteract with customs authorities to address any issues/questions that may arise during the clearing process.  \u003c/p\u003e\u003cp\u003e9.\tTham gia các cuộc điều tra của hải quan hoặc nộ các chứng từ cho hải quan khi được yêu cầu\u003c/p\u003e\u003cp\u003e\u003cem\u003eAttend any customs inspections or present documents to customs authorities when such are requested.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e10.\tĐóng vai trò liên lạc giữa cơ quan hải quan hoặc các cơ quan nhà nước khác và khách hàng\u003c/p\u003e\u003cp\u003e\u003cem\u003eAct as the liaison between the customs authorities (or other government agencies and customers)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e11.\tĐảm bảo khai báo hải quan kịp thời cho các lô hàng xuất nhập.\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure timely customs clearance of cargo to customer for Import and Export shipments\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e12.\tXác minh chứng từ nhận từ hải quan là chính xác\u003c/p\u003e\u003cp\u003e\u003cem\u003eVerify documents received for Import and Export customs purposes are compliant and correct.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e13.\tLiên lạc với khách hàng để sắp xếp các lô hàng quốc tế, đảm bảo thủ tục hải quan đúng quy trình\u003c/p\u003e\u003cp\u003e\u003cem\u003eInteract with our customers in arranging their international shipments, meeting customer service standards.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e14.\tGóp phần duy trì mối quan hệ chặt chẽ với các nhân viên hải quan\u003c/p\u003e\u003cp\u003e\u003cem\u003eContribute to maintain strong relationships with customs officers\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e15.\tLuôn tuân thủ các quy tắc của công ty. Bao gồm các chính sách, quy trình như  OPS và các quy định khác của nhà nước hay của khách hàng.\u003c/p\u003e\u003cp\u003e\u003cem\u003eEnsure compliance at all times to regulations. This includes internal policies and procedures such as Operational Process Standards (OPS) and external government regulations (eg. OEA) or customer policies / requirements.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e16.\tHiểu rõ quy trình làm hàng của bộ phận mình,cố gắng hết sức để nâng cao hiệu quả và năng suất công việc.\u003c/p\u003e\u003cp\u003e\u003cem\u003eUnderstand department process flow, constantly looking for areas of improved efficiency\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e17.\tLuôn cập nhật các quy định mới của chính phủ về hàng hóa xuất nhập khẩu, cũng như các quy chế hải quan khác..như về y tế, nông nghiệp,cảnh sát quân đội,các hàng hóa cấm hoặc hạn chế xuất khẩu. Đáp ứng tiêu chuẩn KPI\u003c/p\u003e\u003cp\u003eKeep up to date on all regulatory requirements governing the import and export of goods.  This includes but is not limited to customs procedures for imports and exports, other government agency requirements i.e. health, agricultural, police and military, export controls and prohibited and restricted goods. Meet KPI standards, as per the company’s procedures.\u003c/p\u003e\u003cp\u003e18.\tLiên lạc quốc tế, luôn trả lời email đúng hạn\u003c/p\u003e\u003cp\u003e\u003cem\u003eOverseas communications, timely responses to emails and requests (internal and external\u003c/em\u003e)\u003c/p\u003e\u003cp\u003e19.\tBáo cáo cấp trên ngay khi có các sự cố\u003c/p\u003e\u003cp\u003e\u003cem\u003eEscalation of problems to Management when necessary \u003c/em\u003e\u003c/p\u003e\u003cp\u003e20.\tĐáp ứng tiêu chuẩn 52h đào tạo mỗi nhân viên hàng năm.\u003c/p\u003e\u003cp\u003e\u003cem\u003eMeets company standards of 52 hours training per year per employee\u003c/em\u003e.\u003c/p\u003e\u003cp\u003e21.\tTham dự các khóa học theo yêu cầu\u003c/p\u003e\u003cp\u003e\u003cem\u003eAttend training classes when required\u003c/em\u003e.\u003
