4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tf12,"])</script><script>self.__next_f.push([1,"\u003cp\u003ePlease visit our page Viet Nam Jobs | GIZ to\u003cstrong\u003e download\u003c/strong\u003e \u003cstrong\u003ethe Application Form and further job opportunities: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ehttps://www.giz.de/sites/default/files/media/els-document/2025-10/giz-application-form-2024may-final_0.doc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eAs a federal enterprise, the Deutsche Gesellschaft für Internationale Zusammenarbeit (GIZ) GmbH supports the German Government in achieving its objectives in the field of international cooperation for sustainable development. We work in a variety of fields and support our cooperation partners in designing strategies and meeting their policy goals. GIZ Viet Nam is currently engaged in four priority areas: 1) Energy transition 2) Vocational training; 3) Economic development and private sector cooperation; 4) Environmental policy and sustainable natural resource use. Gender equality is one of the key values of our company and of the work we do. Fostering gender equality in our project operation and our internal equal opportunity provisions are two strategic pillars of our corporate identity and policy. For further information please visit our website: www.giz.de/viet-nam.\u003c/p\u003e\u003cp\u003eThe Cluster “Environment and Climate Change” currently comprises a total of four teams in the thematic areas of climate policy, climate and agriculture coast and water, biodiversity and forests. The latter includes the project “Management and Protection of Protected areas with diverse ecosystems in Viet Nam” (MEPA), and “Forest Support Programme” (FSP). The projects are implemented together with the Ministry of Agriculture and Environment (MAE). The projects are funded by BMZ and the EU and implemented by GIZ together with the Viet Nam Forestry Administration to enhance regulatory, institutional and technical capacities for implementing integrated management of forests at a landscape level. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eThe projects are looking for a qualified professional candidate to fill the following position: \u003cstrong\u003eProject Officer on capacity development, gender mainstreaming and tourism development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDuty station: Hanoi \u003c/p\u003e\u003cp\u003eDuration: 01. May 2026 – 30. June 2028\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMain responsibilities and tasks: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tConceptualise, prepare and implement of activities, studies, events and trips for capacity development in the area of sustainable forest management, forest protection and monitoring, community engagement, digital tools, sustainable financing, biodiversity conservation and related topics\u003c/p\u003e\u003cp\u003e•\tEnsure concept notes, ToR, quality assurance of deliverables, and stakeholder liaison for the above.\u003c/p\u003e\u003cp\u003e•\tOversee the work packages on sustainable, community-based tourism in and around forest areas including overall activity planning, rational, and quality assurance \u003c/p\u003e\u003cp\u003e•\tProvide technical advice and on-the-job support to partnering forest owners, DAE, VNFOREST, training institutions and other partners at provincial and central level regarding capacity development on biodiversity conservation, sustainable tourism, sustainable financing and other topics in the scope of the project \u003c/p\u003e\u003cp\u003e•\tDesign, prepare and implement workshops, seminars and other events including participant management in coordination with administrative and technical colleagues as well as service provider for logistics\u003c/p\u003e\u003cp\u003e•\tEnsure that activities are aligned with project objectives and principles as well as coherence among activities within other work packages\u003c/p\u003e\u003cp\u003e•\tConduct structured and regular monitoring activities in the working area and contribute to overall reporting and knowledge management\u003c/p\u003e\u003cp\u003e•\tEnsure gender and inclusion mainstreaming in capacity development in close coordination with gender focal points and partners \u003c/p\u003e\u003cp\u003e•\tPerform other duties and tasks at the request of management \u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Tddc,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMinimum requirements:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tUniversity degree (equivalent to Master degree) in natural resource management or related fields\u003c/p\u003e\u003cp\u003e•\t7 years of professional experience in the implementation of projects on protected area and natural forest management including conceptualisation \u003c/p\u003e\u003cp\u003e•\t5 years of professional experience in sustainable, community-based tourism in and around forest areas, including protected areas\u003c/p\u003e\u003cp\u003e•\t5 years of professional experience in developing ToR for tendering of assignment for capacity development in forest protection and management, value chain development / traceability, digital approaches for forest monitoring, sustainable financing and other topics covered by the project\u003c/p\u003e\u003cp\u003e•\t5 years of professional experience in accompanying tender processes of an international organisation and supervision of service providers with a focus on capacity development\u003c/p\u003e\u003cp\u003e•\tStrong expertise in quality assurance of deliverables by external experts\u003c/p\u003e\u003cp\u003e•\tAbility to work in a team and ensure self-organisation of work packages\u003c/p\u003e\u003cp\u003e•\tAbility to think and act strategically and analytically, diplomatic skills, as well as creative problem-solving abilities and initiative\u003c/p\u003e\u003cp\u003e•\tVery good understanding of the topics covered by the project including forest protection, forest management, forest-based value chains, biodiversity conservation and climate change\u003c/p\u003e\u003cp\u003e•\tExcellent writing skills in Vietnamese and English\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGIZ is committed to create an appreciative work environment, irrespective of age, ethnic background and nationality, gender and gender identity, physical and mental abilities, religion and worldview, sexual orientation and social background. We ensure human resource processes live up to the diverse competencies and talents of all employees, as well as satisfy our performance expectations.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWhat we can offer to the successful candidates: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tGood working environment \u003c/p\u003e\u003cp\u003e•\tCompetitive compensation and benefit packages such as contribution of all compulsory insurances, providing with the additional health care, the annual health check-up and the 24-hours accident insurance. \u003c/p\u003e\u003cp\u003e•\tCovering all travel expenses with travel allowances when traveling on business\u003c/p\u003e\u003cp\u003e•\tAnd good policy on training and development \u003c/p\u003e\u003cp\u003e•\tAnd policy on flexible working time \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eInterested qualified candidates are invited to send the \u003cstrong\u003eGIZ Application Form\u003c/strong\u003e in English, copies of relevant certificates and references, either by email or by post (to \u003cstrong\u003eGIZ Office Hanoi\u003c/strong\u003e, 6th Floor Hanoi Towers, 49 Hai Ba Trung Street, Hanoi, Vietnam) before\u003cstrong\u003e 23rd April 2026.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNote:\u003c/strong\u003e Please state “\u003cstrong\u003eApplication for the Project Officer on capacity development, gender steaming and tourism_MEPA\u003c/strong\u003e” in the subject line or on the envelope. The short-listed candidates will be contacted within 4 weeks after the deadline. Telephone contact is not encouraged.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003ePlease visit our page Viet Nam Jobs | GIZ to download the Application Form and further job opportunities. \u003c/p\u003e\u003cp\u003eTo process your application, we collect and process data from you. You may read Our Data Privacy Notice, which provides further information on the data we store, and about your rights, before you continue with your application.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGIZ – YOUR PARTNER FOR A BETTER FUTURE\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Tf12,"])</script><script>self.__next_f.push([1,"\u003cp\u003ePlease visit our page Viet Nam Jobs | GIZ to\u003cstrong\u003e download\u003c/strong\u003e \u003cstrong\u003ethe Application Form and further job opportunities: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ehttps://www.giz.de/sites/default/files/media/els-document/2025-10/giz-application-form-2024may-final_0.doc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eAs a federal enterprise, the Deutsche Gesellschaft für Internationale Zusammenarbeit (GIZ) GmbH supports the German Government in achieving its objectives in the field of international cooperation for sustainable development. We work in a variety of fields and support our cooperation partners in designing strategies and meeting their policy goals. GIZ Viet Nam is currently engaged in four priority areas: 1) Energy transition 2) Vocational training; 3) Economic development and private sector cooperation; 4) Environmental policy and sustainable natural resource use. Gender
