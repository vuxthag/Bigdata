 practices of the industry.\u003c/p\u003e\u003cp\u003e-\tSupport continuous improvement by proactively providing new ideas.\u003c/p\u003e\u003cp\u003e-\tMake suggestions for and support the organization at local fairs, seminars and conferences.\u003c/p\u003e\u003cp\u003e-\tMaking suggestions for expansion of the portfolio based on customer needs\u003c/p\u003e\u003cp\u003e-\tAttend local and international company fairs.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCustomer Relationship \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eDevelop, establish and maintain long term, positive relationships with customers and suppliers/partners. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e-\tProvide excellent service to customers by giving undivided attention and focus on meeting their needs.\u003c/p\u003e\u003cp\u003e-\tAnticipate questions, concerns and future issues and provide solutions which consistently will result in repeated business, word of mouth referrals and increased sales.\u003c/p\u003e\u003cp\u003e-\tFind solutions to customer problems and complaints to maximize satisfaction.\u003c/p\u003e\u003cp\u003e-\tClosely cooperate and coordinate with the Suppliers/Partners.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSECONDARY\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTo assist on ad hoc tasks or projects as required by the Divison Manager and the Management.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:Tbbd,"])</script><script>self.__next_f.push([1,"\u003cp\u003eThe Sales Engineer supports Rieckermann Vietnam to provide solutions and machineries for the building industry and construction field. By this activity the Sales Engineer will actively support the Company’s growth and success.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJob Duties\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e
