ntation \u0026 Rollout Coordination\u003c/p\u003e\u003cp\u003e• Coordinate ERP implementation activities across the full lifecycle: requirement gathering, functional analysis, solution design, configuration, UAT, go-live, and post go-live stabilization\u003c/p\u003e\u003cp\u003e• Support rollout for new entities and future system expansion\u003c/p\u003e\u003cp\u003e• Participate in gap analysis between business requirements and standard D365 capabilities\u003c/p\u003e\u003cp\u003e• Support data-related activities including data validation, migration preparation, and system readiness before go-live\u003c/p\u003e\u003cp\u003e• Ensure solutions align with business needs while following D365 best practices\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e2. Functional Analysis \u0026 Solution Support\u003c/p\u003e\u003cp\u003e• Collect and analyze business requirements from users and stakeholders\u003c/p\u003e\u003cp\u003e• Translate business needs into functional solution options\u003c/p\u003e\u003cp\u003e• Support proposing appropriate approaches (standard functionality, configuration, or customization)\u003c/p\u003e\u003cp\u003e• Prepare clear functional inputs and recommendations for manager / vendor review\u003c/p\u003e\u003cp\u003e• Support documentation of functional requirements and solution design\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e3. Daily System Support \u0026 Issue Resolution\u003c/p\u003e\u003cp\u003e• Provide functional support for D365 FnO in daily operations\u003c/p\u003e\u003cp\u003e• Investigate and resolve system-related issues raised by users\u003c/p\u003e\u003cp\u003e• Analyze root causes across process, data, configuration, or system limitations\u003c/p\u003e\u003cp\u003e• Coordinate with ERP vendors and technical teams to resolve issues effectively\u003c/p\u003e\u003cp\u003e• Ensure timely follow-up and communication with stakeholders\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e4. User Training \u0026 System Adoption\u003c/p\u003e\u003cp\u003e• Conduct functional training sessions for key users and end users\u003c/p\u003e\u003cp\u003e• Support users in understanding end-to-end system processes\u003c/p\u003e\u003cp\u003e• Promote standardized ways of working across departments\u003c/p\u003e\u003cp\u003e• Support improving user adoption and system usage efficiency\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e5. Stakeholder \u0026 Vendor Coordination\u003c/p\u003e\u003cp\u003e• Act as a coordination bridge between business users, ERP vendors, and internal teams\u003c/p\u003e\u003cp\u003e• Translate business requirements into clear inputs for technical teams and vendors\u003c/p\u003e\u003cp\u003e• Communicate system changes, solutions, and impacts back to users in a clear and practical way\u003c/p\u003e\u003cp\u003e• Monitor vendor delivery progress and ensure alignment with business expectations\u003c/p\u003e\u003cp\u003e• Coordinate and prioritize multiple requests across departments\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e6. System Monitoring, Reporting \u0026 Continuous Improvement\u003c/p\u003e\u003cp\u003e• Monitor system usage, data quality, and operational performance\u003c/p\u003e\u003cp\u003e• Identify recurring issues, bottlenecks, or inefficiencies in system usage\u003c/p\u003e\u003cp\u003e• Proactively propose improvements in processes and system utilization\u003c/p\u003e\u003cp\u003e• Support preparation of regular reports on system issues, implementation progress, and user adoption\u003c/p\u003e\u003cp\u003e• Contribute to continuous improvement initiatives across business processes and system usage\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T6eb,LTP Vietnam has grown strongly since it was established in 2008 and is experiencing a 60-80% growth in 2021 and 2022. LTP Vietnam is a chosen partner for premium, medium sized brands who require Asia production with fle
