",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T9f4,"])</script><script>self.__next_f.push([1,"Công ty CP INNO là một đơn vị hoạt động trong lĩnh vực tư vấn thiết kế với đầy đủ các bộ môn: Quy hoạch, Hạ tầng, Kiến trúc, Kết cấu, MEP, PCCC, Nội thất, Cảnh quan, Kinh tế xây dựng. \r\n\r\nĐược thành lập từ năm 2008, đến nay INNO đã trở thành một trong những công ty Tư vấn thiết kế lớn nhất ở Việt Nam, đồng thời là doanh nghiệp dẫn đầu trong ứng dụng BIM đối với công tác thiết kế. Công ty có trụ sở chính tại Hà Nội, chi nhánh miền nam tại TP Hồ Chí Minh cùng hệ thống các công ty thành viên và công ty liên kết với quy mô nhân sự khoảng 500 người. \r\n\r\nINNO là tập thể có sự tổng hòa giữa đội ngũ cán bộ giàu kinh nghiệm, nhiều chuyên gia đầu ngành trong các lĩnh vực về tư vấn xây dựng và các KTS, KS trẻ tràn đầy nhiệt huyết và năng lượng. Với triết lý hoạt động: “Tư vấn thiết kế là một quá trình cung cấp dịch vụ với sự cam kết song hành cùng khách hàng từ đầu đến cuối trong mọi hoàn cảnh”, INNO được sự tín nhiệm của khách hàng và trở thành đối tác chiến lược, tin cậy của các Tập đoàn lớn như: Vingroup, Sungroup, CapitaLand, Masterise, Park City, MIK, T\u0026T, Doji Land, Nova Land, BRG, FLC, Bitexco, OSI, Taseco Land, Vạn Xuân Group, Hateco,…\r\n\r\nINNO còn là đối tác của các đơn vị tư vấn thiết kế hàng đầu như 10 Design, ST13, Tilke, MDL, Bensley, Legacy, Arup, AAT, Pollin, ASA, Devarch... Các cán bộ của Công ty đã có kinh nghiệm Chủ nhiệm thiết kế và tham gia thiết kế các dự án hàng đầu Việt Nam, những dự án có quy mô lớn, có tính biểu tượng hay mức độ phức tạp cao như: Tháp Bitexco Financial, Tháp Lanmark 81, Khách sạn JW Marriott, Dự án The One Central, Vinhome Ocean Park 1,2,3,  Vinhomes Metropolis, Techno Park Tower, Diamond Crown Hải Phòng, Liên cơ Vân Hồ, Sunworld Bà Đen, ...\r\n\r\nINNO luôn nỗ lực hoàn thiện không ngừng để hướng đến Mục tiêu trở thành Công ty tư vấn thiết kế hàng đầu Việt Nam và Có quy mô nhân sự Top 10 Đông Nam Á với Sứ mệnh Đồng hành hỗ trợ các thế hệ Kiến trúc sư, Kỹ sư Việt Nam trong hành trình phát triển bản thân, nghề nghiệp và khởi nghiệp.\r\n\r\nWebsite: http://innojsc.com"])</script><script>self.__next_f.push([1,"24:Tdac,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYêu cầu bắt buộc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học chuyên ngành Kinh tế Xây dựng, Quản lý Xây dựng hoặc các ngành kỹ thuật liên quan.\u003c/p\u003e\u003cp\u003e• Có tối thiểu\u003cstrong\u003e 02 năm kinh nghiệm\u003c/strong\u003e trong công tác bóc tách khối lượng, lập dự toán kiến trúc – kết cấu cho công trình chung cư cao tầng.\u003c/p\u003e\u003cp\u003e• Thành thạo đọc bản vẽ thiết kế, tính toán và bóc tách khối lượng các hạng mục công trình.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm quản lý khối lượng phát sinh, lập dự toán phát sinh và phụ lục hợp đồng trong quá trình triển khai dự án.\u003c/p\u003e\u003cp\u003e• Am hiểu chuyên môn dự toán công trình dân dụng, đặc biệt là chung cư cao tầng.\u003c/p\u003e\u003cp\u003e• Sử dụng thành thạo Excel, AutoCAD; ưu tiên biết các phần mềm dự toán (G8, ETA, Delta…).\u003c/p\u003e\u003cp\u003e• Biết sử dụng TasC – Cubicost hoặc các phần mềm công nghệ tương đương là lợi thế.\u003c/p\u003e\u003cp\u003e• Nắm vững hệ thống văn bản quy phạm pháp luật liên quan đến quản lý chi phí đầu tư xây dựng.\u003c/p\u003e\u003cp\u003e• Có khả năng phân tích, kiểm soát chi phí; làm việc độc lập và phối hợp nhóm hiệu quả.\u003c/p\u003e\u003cp\u003e• Chủ động, có trách nhiệm, chịu được áp lực công việc; phối hợp tốt với các phòng ban liên quan.\u003c/p\u003e\u003cp\u003e• Thái độ tích cực, thân thiện, hỗ trợ đồng đội; cư xử đúng mực với cấp trên, đồng nghiệp và đối tác.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐiểm cộng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có khả năng sử dụng tiếng Anh trong công việc.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian làm việc:\u003c/strong\u003e 8:30 - 18:00 từ T2 - T6 và 2 buổi sáng T7 cách tuần/tháng\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuyền lợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Thu nhập \u0026 đãi ngộ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Thu nhập cạnh tranh: \u003cstrong\u003e15 – 30 triệu \u003c/strong\u003e(lương cứng + năng suất)\u003c/p\u003e\u003cp\u003e• Xét tăng lương định kỳ, tăng trưởng thu nhập tương xứng với vai trò, trách nhiệm và hiệu quả công việc.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e 2. Lộ trình phát triển nhanh và thăng tiến rõ ràng:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Chương trình Fast-Track dành cho nhân sự tiềm năng.\u003c/p\u003e\u003cp\u003e• Mentoring 1:1 với Chủ trì/Trưởng bộ phận.\u003c/p\u003e\u003cp\u003e• Cơ hội phát triển lên QS chính, QS Lead hoặc Cost Manager theo năng lực và định hướng cá nhân.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Dự án thực chiến:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tham gia các dự án trọng điểm, quy mô lớn trong \u0026 ngoài nước.\u003c/p\u003e\u003cp\u003e• Làm việc trực tiếp với đội ngũ chuyên gia giàu kinh nghiệm giúp tích lũy nhanh năng lực và kinh nghiệm thực tế.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e 4. Phúc lợi \u0026 môi trường làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phụ cấp ăn chiều, thưởng lễ Tết; đầy đủ BHXH, BHYT, BHTN theo quy định.\u003c/p\u003e\u003cp\u003e• 12 ngày phép/năm, thêm ngày nghỉ hưởng lương vào sinh nhật và ngày khai xuân đầu năm, cùng 5 ngày nghỉ hưởng lương khi tham gia du lịch công ty.\u003c/p\u003e\u003cp\u003e• Khám sức khỏe định kỳ tại các bệnh viện uy tín.\u003c/p\u003e\u003cp\u003e• Văn phòng hiện đại, thiết kế mở, nhiều tiện ích nội bộ\u003c/p\u003e\u003cp\u003e
