ong Bank luôn chú trọng tới việc xây dựng hệ thống lương, thưởng, phúc lợi, đãi ngộ cho người lao động phù hợp với từng thời kỳ và từng giai đoạn phát triển, bảo đảm tính linh hoạt, công bằng, tương xứng mức độ cống hiến và cạnh tranh trong thị trường lao động .\r\n         Đề bạt, bổ nhiệm\r\n         Đối với những người có năng lực quản lý, đủ khả năng để có thể đảm nhiệm công việc cao hơn, Kienlong Bank luôn có chính sách ưu tiên, xem xét tạo mọi điều kiện để bạn nắm giữ những vị trí quan trọng, cùng xây dựng phát triển đội ngũ nhân viên nòng cốt, góp phần vào kế hoạch phát triển chung của Kienlong Bank .\r\n          Môi trường làm việc\r\n      Với sứ mệnh xây dựng một thương hiệu \"XANH\" và phương châm “Sẵn lòng chia sẻ” Kienlong Bank luôn định hướng phát triển đội ngũ nhân viên ý thức rèn luyện tư cách đạo đức của mình dựa trên ba nguyên tắc chủ đạo \"TÂM, TÍN, KIÊN\" nhằm xây dựng một đội ngũ nhân viên trong sạch, sáng tạo, nhiệt huyết với nghề và bản lĩnh vững vàng trong cuộc sống .\r\n         Đến với Kienlong Bank bạn sẽ cảm nhận được nét khác biệt không nhầm lẫn với bất cứ nơi đâu từ sự trẻ trung, thân thiện, đoàn kết… Một môi trường làm việc chuyên nghiệp đó chính là ĐẠI GIA ĐÌNH KIÊN LONG."])</script><script>self.__next_f.push([1,"43:{\"companyId\":139780,\"jobImageURLs\":\"$44\",\"jobVideoURLs\":null,\"companyName\":\"Ngân hàng TMCP Kiên Long\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/c8/11056248.png\",\"companySizeId\":\"\",\"companyProfile\":\"$45\",\"contactName\":\"Vũ Ngọc Long\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"98-108A Cách Mạng Tháng Tám, Phường 7, Quận 3, Thành phố Hồ Chí Minh\",\"allowRedirect\":0,\"whyWorkWithUs\":\"$46\",\"profileBaseName\":\"kienlongbank\",\"isUpgradeProfile\":1,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks
