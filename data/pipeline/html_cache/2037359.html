nsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWorkforce Planning, Budgeting \u0026 Cost Management\u003c/p\u003e\u003cp\u003e• Manage staff budget planning and cost management activities, including workforce cost forecasting, staff cost trend analysis, and monitoring actual costs and commitments against approved budgets and forecasts.\u003c/p\u003e\u003cp\u003e• Support Strategic Workforce Planning by analyzing current and future workforce requirements in line with business strategy and the Target Operating Model (TOM).\u003c/p\u003e\u003cp\u003eHR Data Analytics \u0026 Management Information (MI)\u003c/p\u003e\u003cp\u003e• Develop, analyze, and enhance Human Capital Management data, dashboards, and analytics to support business and HR decision-making.\u003c/p\u003e\u003cp\u003e• Analyze current and forecast workforce data against external market benchmarks and internal controls across businesses and functions.\u003c/p\u003e\u003cp\u003e• Prepare and deliver HR statistical and management reports for Country and Group management, including employee demographics, turnover, hiring status, and workforce movements.\u003c/p\u003e\u003cp\u003e• Provide HR reporting and analytics for governance forums, Risk Culture Dashboards, and Finance stakeholders.\u003c/p\u003e\u003cp\u003ePosition Management, Governance, Policy Advisory \u0026 Compliance\u003c/p\u003e\u003cp\u003e• Maintain, promote and consult the consistent definitions of HR data elements across the HR spectrum.\u003c/p\u003e\u003cp\u003e• Provide advisory support on employee data governance, ensuring data accuracy, integrity, and compliance with internal and regulatory requirements.\u003c/p\u003e\u003cp\u003e• Monitor and maintain organizational hierarchy, position structures, and staffing models in line with approved Target Operating Models.\u003c/p\u003e\u003cp\u003e• Support position management and job profile governance, ensuring accuracy, consistency, and compliance with internal guidelines and controls.\u003c/p\u003e\u003cp\u003e• Contribute to the enhancement of HR governance frameworks, processes, and policies to improve operational effectiveness and control.\u003c/p\u003e\u003cp\u003e• Support compensation data analytics, rewards operations, and other HR projects as assigned.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T66c,At UOB, we are ready to help you explore your full potential at every stage of your career.\r\nYou will find a wide range of learning and development programmes to help you grow and advance your career, whether you are a new hire or an existing employee. These include programmes designed to hone your functional and technical skills, communication skills and managerial skills. There are also various schemes in place to support you in pursuing further academic and professional qualifications:\r\n\r\nEmployee Mobility\r\nWe encourage you to move between businesses or across countries to gain new experiences and competencies at different stages of your career. Exposure to the different facets of UOB will enhance your professional growth and your ability to assist us in developing integrated global solutions for our customers. We will support you in acquiring the skills you need to become a future leader with us.\r\n\r\nCore Competency Development\r\nOur SEED (Strategise, Engage, Execute and Develop) Competency Framework is designed to enable performance excellence. You will develop the skills needed to become a successful UOB leader through a series of SEED competency programmes.\r\n\r\nLeadership Development\r\nGrowing and maximising your potential is imperative to our long-term success. High-performing individuals identified to take on leadership roles will be selected for a series of comprehensive leadership programmes. These include on-the-job leadership development, as well as structured learning via the UOB Leadership Academy — a complete suite of programmes built to impart practical leadership skills and enhance strat
