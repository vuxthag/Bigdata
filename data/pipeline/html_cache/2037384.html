 khả năng tốt về bố cục, kết xuất và ánh sáng chân thực như ảnh; và hiểu biết tốt về việc tối ưu hóa mô hình cho đồ họa 3D. Khả năng làm việc nhóm là điều bắt buộc vì bạn sẽ làm việc cùng với các kỹ sư âm thanh, designer thiết kế chuyển động và giám đốc nghệ thuật của chúng tôi trong mỗi dự án để đảm bảo tính nhất quán và tiêu chuẩn chất \u003c/p\u003e\u003cp\u003elượng cao nhất. Thời gian hoàn thành dự án điển hình của chúng tôi nhanh hơn hầu hết các công ty khác, với các dự án thường chỉ kéo \u003c/p\u003e\u003cp\u003edài từ vài ngày đến vài tuần. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eLà một phần của quá trình hòa nhập, bạn sẽ được đào tạo trong các lĩnh vực khác nhau để bổ sung kỹ năng và tìm hiểu các quy trình nội bộ của công ty. Nếu tiếng Anh không phải là thế mạnh lớn nhất của bạn, chúng tôi cũng sẽ cung cấp các lớp học tiếng Anh. Sau khi thời gian thử việc kết thúc, bạn cũng sẽ có cơ hội tham dự các khóa đào tạo bổ sung về thiết kế, tiếp thị, 3D và các lĩnh vực liên quan đến thiết kế khác mà không phải trả bất kỳ chi phí nào.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:Te0a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eREQUIREMENTS \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e● Proficiency in Blender to create accurate hard surface models and render them with photo realistic materials and lighting to be used in marketing campaigns and advertisements (modeling, UV unwrapping, texturing, lighting \u0026 materials, animation, rendering, compositing, geometry nodes) \u003c/p\u003e\u003cp\u003e● Knowledge creating real time 3D graphics to use in AR and VR Spark AR, SnapLens, etc..) \u003c/p\u003e\u003cp\u003e● Strong knowledge of Adobe Photoshop and Illustrator is a must. \u003c/p\u003e\u003cp\u003e● Knowledge of Substance Painter, Unreal Engine, VFX, physics simulations and photogrammetry apps are a plus. \u003c/p\u003e\u003cp\u003e● High detailed renders suitable for use in commercial \u003c/p\u003e\u003cp\u003e● 3D motion skills: (able to produce high detail and dynamic animation) \u003c/p\u003e\u003cp\u003e● Able to work with HoudiniFX for liquid, fire, smoke, etc.. \u003c/p\u003e\u003cp\u003e● Familiarity with Adobe After Effects for compositing is a must. \u003c/p\u003e\u003cp\u003e● Degree in Graphic Design, fine arts or related experience. \u003c/p\u003e\u003cp\u003e● Ability to communicate, write and read in English. Other languages are appreciated. \u003c/p\u003e\u003cp\u003e● Good at time management and teamwork. \u003c/p\u003e\u003cp\u003e● Understanding process and how to communicate objective feedback. \u003c/p\u003e\u003cp\u003e--------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYÊU CẦU \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e● Thành thạo Blender để tạo các mô hình bề mặt cứng chính xác và kết xuất chúng với vật liệu và ánh sáng chân thực như ảnh \u003c/p\u003e\u003cp\u003eđể sử dụng trong các chiến dịch tiếp thị và quảng cáo (mô hình hóa, UV unwrapping, texturing, lighting \u0026 materials, \u003c/p\u003e\u003cp\u003eanimation, rendering, compositing, geometry nodes). \u003c/p\u003e\u003cp\u003e● Kiến thức tạo đồ họa 3D thời gian thực để sử dụng trong AR và VR (Spark AR, SnapLens, v.v.). \u003c/p\u003e\u003cp\u003e● Kiến thức vững về Adobe Photoshop và Illustrator là bắt buộc. \u003c/p\u003e\u003cp\u003e● Kiến thức về Substance Painter, Unreal Engine, VFX, physics simulations và các ứng dụng photogrammetry là một lợi thế. \u003c/p\u003e\u003cp\u003e● Kết xuất chi tiết cao, phù hợp để sử dụng trong thương mại. \u003c/p\u003e\u003cp\u003e● Kỹ năng chuyển động 3D (có khả năng tạo hoạt ảnh chi tiết cao và động). \u003c/p\u003e\u003cp\u003e● Có khả năng làm việc với HoudiniFX cho chất lỏng, lửa, khói, v.v. \u003c/p\u003e\u003cp\u003e● Quen thuộc với Adobe After Effects để tổng hợp hình ảnh là bắt buộc (compositing). \u003c/p\u003e\u003cp\u003e● Tốt nghiệp Thiết kế Đồ họa, mỹ thuật hoặc có kinh nghiệm liên quan. \u003c/p\u003e\u003cp\u003e● Khả năng giao tiếp, viết và đọc tiếng Anh.  \u003c/p\u003e\u003cp\u003e● Quản lý thời gian và làm việc nhóm tốt. \u003c/p\u003e\u003cp\u003e● Hiểu biết quy trình và cách đưa ra phản hồi mang tính xây dựng. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBENEFITS \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e● Full standard company benefits. \u003c/p\u003e\u003cp\u003e● International, friendly and motivating working environment. \u003c/p\u003e\u003cp\u003e● Attractive salary depending on your experience and qualifications. \u003c/p\u003e\u003cp\u003e● Training and English classes provided. \u003c/p\u003e\u003cp\u003e● Group activities and artistic workshops. \u003c/p\u003e\u003cp\u003e---------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQUYỀN LỢI \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e● Đầy đủ các phúc lợi tiêu chuẩn của công ty. \u003c/p\u003e\u003cp\u003e● Môi trường làm việc quốc tế, thân thiện và năng động. \u003c/p\u003e\u003cp\u003e● Mức lương hấp dẫn tùy thuộc vào kinh nghiệm và năng lực của bạn. \u003c/p\u003e\u003cp\u003e● Được đào tạo thêm và cung cấp các lớp học tiếng Anh. \u003c/p\u003e\u003cp\u003e● Các hoạt động nhóm và workshop nghệ thuật\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:Tb06,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eOVERVIEW \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAs a 3D Artist at Shuttlerock, youʼll get to showcase your ability in 3D modeling and rendering (products, environments, fluids, etc). \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eYou should have an excellent eye for composition, photo-realistic rendering and lighting; and a good understanding of model optimization for both rendered and real time 3D graphics. Ability to work as part of a team is a must since you will be working  alongside our sound engineers, Motion designers and Art directors in each project in order to ensure consistency and the highest quality standards. Our typical turnaround time is faster than most other agencies, with projects typically lasting from just a few days to a couple of weeks. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eAs part of the onboarding process you will receive training in different areas to supplement your skills and in order to learn our internal processes. If English is not your biggest strength, we will also provide regular English classes. Once your probation period is over, you will also have a chance to enroll for additional training in design, marketing, 3D and other design related areas at no cost for \u003c/p\u003e\u003cp\u003eemployees.\u003c/p\u003e\u003cp\u003e----------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTỔNG QUAN \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eVới vai trò là Họa sĩ 3D (3D Artist) tại Shuttlerock, bạn sẽ có cơ hội thể hiện khả năng của mình trong việc mô hình hóa và kết xuất 3D (sản phẩm, môi trường, chất lỏng, v.v.). Bạn cần có khả năng tốt về bố cục, kết xuất và ánh sáng chân thực như ảnh; và hiểu biết tốt về việc tối ưu hóa mô hình cho đồ họa 3D. Khả năng làm việc nhóm là điều bắt buộc vì bạn sẽ làm việc cùng với các kỹ sư âm thanh, designer thiết kế chuyển động và giám đốc nghệ thuật của chúng tôi trong mỗi dự án để đảm bảo tính nhất quán và tiêu chuẩn chất \u003c/p\u003e\u003cp\u003elượng cao nhất. Thời gian hoàn thành dự án điển hình của chúng tôi nhanh hơn hầu hết các công ty khác, với các dự án thường chỉ kéo \u003c/p\u003e\u003cp\u003edài từ vài ngày đến vài tuần. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eLà một phần của quá trình hòa nhập, bạn sẽ được đào tạo trong các lĩnh vực khác nhau để bổ sung kỹ năng và tìm hiểu các quy trình nội bộ của công ty. Nếu tiếng Anh không phải là thế mạnh lớn nhất của bạn, chúng tôi cũng sẽ cung cấp các lớp học tiếng Anh. Sau khi thời gian thử việc kết thúc, bạn cũng sẽ có cơ hội tham dự các khóa đào tạo bổ sung về thiết kế, tiếp thị, 3D và các lĩnh vực liên quan đến thiết kế khác mà không phải trả bất kỳ chi phí nào.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:Te0a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eREQUIREMENTS \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e● Proficiency in Blender to create accurate hard surface models and render them with photo realistic materials and lighting to be used in marketing campaigns and advertisements (modeling, UV unwrapping, texturing, lighting \u0026 materials, animation, rendering, compositing, geometry nodes) \u003c/p\u003e\u003cp\u003e● Knowledge creating real time 3D graphics to use in AR and VR Spark AR, SnapLens, etc..) \u003c/p\u003e\u003cp\u003e● Strong knowledge of Adobe Photoshop and Illustrator is a must. \u003c/p\u003e\u003cp\u003e● Knowledge of Substance Painter, Unreal Engine, VFX, physics simulations and photogrammetry apps are a plus. \u003c/p\u003e\u003cp\u003e● High detailed renders suitable for use in commercial \u003c/p\u003e\u003cp\u003e● 3D motion skills: (able to produce high detail and dynamic animation) \u003c/p\u003e\u003cp\u003e● Able to work with HoudiniFX for liquid, fire, smoke, etc.. \u003c/p\u003e\u003cp\u003e● Familiarity with Adobe After Effects for compositing is a must. \u003c/p\u003e\u003cp\u003e● Degree in Graphic Design, fine arts or related experience. \u003c/p\u003e\u003cp\u003e● Ability to communicate, write and read in English. Other languages are appreciated. \u003c/p\u003e\u003cp\u003e● Good at time management and teamwork. \u003c/p\u003e\u003cp\u003e● Understanding process and how to communicate objective feedback. \u003c/p\u003e\u003cp\u003e--------------------------------------------\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYÊU CẦU \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e● Thành thạo Blender để tạo các mô hình bề mặt cứng chính xác và kết xuất chúng với v
