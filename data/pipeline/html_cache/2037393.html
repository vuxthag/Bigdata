ic for Mobile, Automotive, Wearable devices, Robotics. \r\n\r\nMektec Nippon Mektron is  based 27 subsidiary sale and manufacture companies on China, Taiwan, Korea, Southeast Asia, America, Europe.\r\n\r\nMektec Vietnam is a manufacturing company with 100% investment capital from Japan, invested and constructed by Nippon Mektron Group in 2016. Its square is 102,909m2 at Thang Long II Industrial Park, Hung Yen Province with the investment capital up to 1,364 billion VND.\r\n\r\nThe main product of Mektec Vietnam is FPC ( Flexible Printed Circuit ), mainly used in electronic devices. The establishment of the factory has brought jobs to more than 4000 employees.\r\n\r\nBeing a company judged to have a good Total Reward system and friendly, people – respecting corporate culture, we are confident that we can bring the satisfaction of quality to our customers, peace of mind and happiness to our employees. \r\n\r\nJoin us !\r\n\r\nCông ty TNHH Nippon Mektron bắt đầu hoạt động vào tháng 11 năm 1969 tại Làng Kukizaki (nay là Thành phố Tsukuba), Tỉnh Ibaraki, với tư cách là công ty con sản xuất bảng mạch in linh hoạt (FPC) của Tập đoàn NOK.\r\n\r\nDưới thương hiệu toàn cầu “Mektec”, Nippon Mektron hiện cung cấp FPC cho khách hàng trên toàn thế giới từ các cơ sở sản xuất và bán hàng của chúng tôi ở mọi vùng đất: FPC, cao su chính xác, linh kiện nhựa, nhựa chính xác cho Di động, Ô tô, Thiết bị đeo được, Người máy.\r\n\r\nNippon Mektron hiện có 27 công ty con bán và sản xuất tại Trung Quốc, Đài Loan, Hàn Quốc, Đông Nam Á, Mỹ, Châu Âu.\r\nMektec Việt Nam là công ty 100% vốn đầu tư từ Nhật Bản. Được Nippon Mektron đầu tư xây dựng vào năm 2016, với diện tích 102,909m2 tại Kcn Thăng Long 2, Hưng Yên tổng vốn đầu tư 1,364 tỷ VND. Sản phẩm chính là linh kiện điện tử (FPC) chủ yếu dùng cho thiết bị điện thoại di động, tạo ra công ăn việc làm ổn định cho hơn 4000 cán bộ công nhân viên. \r\n\r\nLà một trong những công ty nhận được nhiều đánh giá tốt về lương, chế độ phúc lợi và môi trườn
