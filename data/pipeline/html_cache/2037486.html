\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em v"])</script><script>self.__next_f.push([1,"à các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai24:T2040,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.1. Mục tiêu nghiên cứu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐánh giá cam kết và năng lực của Việt Nam trong việc bảo vệ phụ nữ và trẻ em gái tại các cộng đồng chịu ảnh hưởng bởi thiên tai, thông qua việc vận dụng Khung hành động Sendai về Giảm nhẹ rủi ro thiên tai và các chỉ số giảm thiểu rủi ro thiên tai nhạy cảm giới. \u003c/p\u003e\u003cp\u003e•\tCung cấp thông tin, tạo cơ sở để các thành viên của Mạng lưới Phụ nữ GNRRTT tổ chức hội thảo chính sách, góp phần thúc đẩy lồng ghép giới trong quản lý rủi ro thiên tai quốc gia.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2. Phạm vi nghiên cứu \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐịa bàn nghiên cứu: Nghiên cứu được thực hiện tập trung tại 6 xã dự án thuộc TP Cần Thơ và Tỉnh Vĩnh Long, và một số địa bàn lân cận có nguy cơ cao về thiên tai.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐối tượng nghiên cứu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tCán bộ Hội Phụ nữ \u003c/p\u003e\u003cp\u003eo\tThành viên của các Nhóm phát triển cộng đồng, đội Xung kích PCTT, thành viên mạng lưới PN GNRRTT\u003c/p\u003e\u003cp\u003eo\tChính quyền địa phương và đại diện cộng đồng địa phương\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThời gian thực hiện: Từ tháng 1 đến tháng 6 năm 2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhạm vi nội dung:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tĐánh giá cam kết chính sách và thể chế của Việt Nam trong lồng ghép giới vào giảm nhẹ rủi ro thiên tai\u003c/p\u003e\u003cp\u003eo\tPhân tích năng lực tổ chức và cộng đồng trong thực hiện các cam kết này\u003c/p\u003e\u003cp\u003eo\tXác định rào cản, thách thức, cơ hội và khuyến nghị thúc đẩy bình đẳng giới trong công tác GNRRTT \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCông tác thu thập các thông tin và dữ liệu của hoạt động nêu trên sẽ do các chuyên gia tư vấn tư vấn thực hiện, với sự hỗ trợ kỹ thuật và giám sát của cán bộ AFV. Một nhóm tư vấn độc lập sẽ được tuyển dụng để tiến hành các công việc như thiết kế công cụ thu thập thông tin, tập huấn cho cán bộ, tình nguyện viên địa phương, tổng hơp, phân tích số liệu và viết báo cáo nghiên cứu. \u003c/p\u003e\u003cp\u003e•\tPhương pháp luận cho nghiên cứu sẽ do nhóm tư vấn lựa chọn đề xuất và thảo luận với AFV khi bắt đầu triển khai để có những điều chỉnh cần thiết. Nghiên cứu sẽ sử dụng hai nguồn thông tin chính là thông tin sơ cấp và thông tin thứ cấp. Thông tin thứ cấp được thu thập từ chính quyền địa phương và các đối tác của ActionAid-AFV. Nguồn thông tin sơ cấp được thu thập trực tiếp trong quá trình khảo sát thực địa thông qua hai phương pháp nghiên cứu định tính và nghiên cứu định lượng.  \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKhảo sát thực địa\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát thực địa được thực hiện nhằm thu thập thông tin định tính và định lượng phục vụ cho việc đánh giá cam kết và năng lực của Việt Nam trong bảo vệ phụ nữ và trẻ em gái tại các cộng đồng chịu ảnh hưởng bởi thiên tai. Các hoạt động khảo sát được triển khai tại 6 xã dự án thuộc TP Cần Thơ và tỉnh Vĩnh Long và một số địa bàn khác thuộc khu vực Đồng bằng sông Cửu Long.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTập huấn nghiên cứu viên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhằm đảm bảo chất lượng, tính thống nhất và độ tin cậy của dữ liệu thu thập tại hiện trường, trước khi tiến hành thu thập dữ liệu, nhóm nghiên cứu đã tổ chức chương trình tập huấn cho 18 nghiên cứu viên, là các thành viên của Mạng lưới Phụ nữ tiên phong Giảm nhẹ rủi ro thiên tai Khóa tập huấn tập trung vào:\u003c/p\u003e\u003cp\u003e•\tGiới thiệu mục tiêu và phương pháp nghiên cứu\u003c/p\u003e\u003cp\u003e•\tHướng dẫn sử dụng bộ công cụ khảo sát (bảng hỏi, hướng dẫn phỏng vấn, mẫu thảo luận nhóm)\u003c/p\u003e\u003cp\u003e•\tKỹ năng thu thập dữ liệu nhạy cảm giới\u003c/p\u003e\u003cp\u003e•\tNguyên tắc đạo đức trong nghiên cứu và bảo mật thông tin người tham gia\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThảo luận nhóm \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm nghiên cứu sẽ tổ chức 06 cuộc thảo luận nhóm với tổng cộng 60 người tham gia (mỗi tỉnh 3 nhóm, mỗi nhóm 10 người), bao gồm:\u003c/p\u003e\u003cp\u003e•\tĐại diện Hội Phụ nữ \u003c/p\u003e\u003cp\u003e•\tThành viên Nhóm Phát triển cộng đồng và Đội xung kích Phòng chống thiên tai\u003c/p\u003e\u003cp\u003e•\tCán bộ chính quyền địa phương và đại diện cộng đồng dân cư\u003c/p\u003e\u003cp\u003eCác cuộc thảo luận tập trung vào các chủ đề:\u003c/p\u003e\u003cp\u003e•\tNhận thức và kinh nghiệm của phụ nữ và cộng đồng về phòng chống thiên tai\u003c/p\u003e\u003cp\u003e•\tVai trò của phụ nữ trong các hoạt động GNRRTT tại địa phương\u003c/p\u003e\u003cp\u003e•\tThách thức, rào cản và cơ hội trong việc lồng ghép giới vào công tác GNRRTT\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhỏng vấn sâu \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBên cạnh thảo luận nhóm, nhóm nghiên cứu đã tiến hành 20 cuộc phỏng vấn sâu với các bên liên quan chủ chốt (mỗi tỉnh 10 cuộc), gồm:\u003c/p\u003e\u003cp\u003e•\tĐại diện các cơ quan nhà nước: Bộ NN\u0026MT, Ủy ban Quốc gia Vì sự tiến bộ của phụ nữ Việt Nam, Cục Đê điều và Phòng chống thiên tai, UBND TP Cần Thơ, Tỉnh Vĩnh Long và các tỉnh vùng Đồng bằng sông Cửu Long.\u003c/p\u003e\u003cp\u003e•\tCán bộ Hội Phụ nữ tỉnh/xã dự án\u003c/p\u003e\u003cp\u003e•\tĐại diện chính quyền địa phương tại 6 xã dự án\u003c/p\u003e\u003cp\u003e•\tLãnh đạo nhóm cộng đồng và thành viên mạng lưới Phụ nữ Giảm nhẹ rủi ro thiên tai\u003c/p\u003e\u003cp\u003eCác cuộc phỏng vấn nhằm khai thác sâu hơn quan điểm, kinh nghiệm và đánh giá thực tế về năng lực, chính sách và nguồn lực trong việc bảo vệ phụ nữ, trẻ em gái trước thiên tai và biến đổi khí hậu. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKhảo sát bằng bảng hỏi \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát định lượng được thực hiện với 370 người dân tại 6 xã, phường mục tiêu của dự án. Bảng hỏi khảo sát sẽ tập trung vào 5 nội dung chính sau:\u003c/p\u003e\u003cp\u003ea)\tĐánh giá mức độ cam kết của chính quyền và cơ quan liên quan trong việc bảo vệ phụ nữ và trẻ em gái trước tác động của thiên tai.\u003c/p\u003e\u003cp\u003eb)\tXác định mức độ lồng ghép giới trong các chính sách, chương trình và cơ chế quản lý rủi ro thiên tai tại địa phương.\u003c/p\u003e\u003cp\u003ec)\tĐánh giá năng lực của các tổ chức phụ nữ, nhóm cộng đồng và chính quyền địa phương trong triển khai các hoạt động giảm nhẹ rủi ro thiên tai nhạy cảm giới.\u003c/p\u003e\u003cp\u003ed)\tPhân tích các rào cản và thách thức đang hạn chế việc thực hiện hiệu quả các cam kết về giới trong công tác giảm nhẹ rủi ro thiên tai.\u003c/p\u003e\u003cp\u003ee)\tThu thập ý kiến, bài học và khuyến nghị từ cộng đồng nhằm thúc đẩy lồng ghép giới phù hợp với Khung hành động Sendai và mục tiêu phát triển bền vững.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTổng hợp và xử lý dữ liệu, hoàn thiện báo cáo \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDữ liệu thu được từ các công cụ (bảng hỏi, phỏng vấn, thảo luận nhóm) được mã hóa, nhập liệu và phân tích bằng phương pháp thống kê mô tả (cho phần định lượng) và phân tích nội dung chủ đề (cho phần định tính). \u003c/p\u003e\u003cp\u003e•\tKết quả từ khảo sát thực địa được đối chiếu với dữ liệu thứ cấp (mục 4.1) để đảm bảo tính nhất quán và khách quan của các kết luận.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời hạn nhận hồ sơ: trước 17h30 ngày 20/4/2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:Tcf1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eVai trò và nhiệm vụ của các bên \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuỹ AFV: AFV chịu trách nhiệm quản lý tổng thể và giám sát việc triển khai hoạt động nghiên cứu, bao gồm:\u003c/strong\u003e•\tPhê duyệt Điều khoản tham chiếu (TOR), kế hoạch thực hiện và ngân sách hoạt động\u003c/p\u003e\u003cp\u003e•\tPhê duyệt lựa chọn tư vấn/nhóm tư vấn thực hiện nghiên cứu\u003c/p\u003e\u003cp\u003e•\tPhê duyệt kế hoạch khảo sát và bộ công cụ thu thập dữ liệu trước khi triển khai thực địa;\u003c/p\u003e\u003cp\u003e•\tHỗ trợ cung cấp thông tin liên quan, tạo điều kiện cho tư vấn tiếp cận đối tượng khảo sát và dữ liệu cần thiết\u003c/p\u003e\u003cp\u003e•\tSắp xếp hậu cần và phối hợp với các đối tác địa phương để triển khai khảo sát thực địa;\u003c/p\u003e\u003cp\u003e•\tXem xét và phê duyệt báo cáo cuối cùng do nhóm tư vấn đệ trình\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhóm Tư vấn: \u003c/strong\u003ea) Trưởng nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 10 năm kinh nghiệm làm việc trong lĩnh vực phòng chống thiên tai (PCTT), giảm nhẹ rủi ro thiên tai, giới và phát triển cộng đồng\u003c/p\u003e\u003cp\u003e•\tCó kiến thức chuyên sâu và kinh nghiệm thực tế trong nghiên cứu, đánh giá các dự án phát triển, đặc biệt trong lĩnh vực lồng ghép giới trong PCTT và thích ứng biến đổi khí hậu\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm trưởng nhóm trong các nghiên cứu/đánh giá tương tự ở cấp quốc gia hoặc địa phương\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm chính trong việc thiết kế phương pháp nghiên cứu, giám sát thu thập dữ liệu, phân tích và tổng hợp báo cáo\u003c/p\u003e\u003cp\u003eb) Thành viên nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm trong lĩnh vực nghiên cứu, đánh giá hoặc khảo sát phát triển cộng đồng, GNRRTT và bình đẳng giới\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm thực hiện các cuộc khảo sát định tính và định lượng tương tự\u003c/p\u003e\u003cp\u003e•\tHỗ trợ trưởng nhóm trong việc thiết kế công cụ, thu thập dữ liệu, xử lý và phân tích thông tin\u003c/p\u003e\u003cp\u003ec) Trách nhiệm của nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tNghiên cứu kỹ TOR để xây dựng đề xuất kỹ thuật và ngân sách phù hợp với yêu cầu của dự án\u003c/p\u003e\u003cp\u003e•\tPhát triển chương trình làm việc chi tiết, kế hoạch khảo sát và công cụ nghiên cứu (bảng hỏi, hướng dẫn phỏng vấn, v.v.) để trình AFV phê duyệt trước khi thực hiện\u003c/p\u003e\u003cp\u003e•\tĐảm bảo chất lượng, tính khách quan và tính nhạy cảm giới trong quá trình thu thập và phân tích dữ liệu\u003c/p\u003e\u003cp\u003e•\tNộp báo cáo nghiên cứu và các sản phẩm đầu ra đã thống nhất. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiám sát và đánh giá\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCán bộ dự án của AFV sẽ trực tiếp tham dự và giám sát tiến độ thực hiện.\u003c/p\u003e\u003cp\u003e•\tBáo cáo kết quả được nộp trong vòng 05 ngày kể từ khi kết thúc hoạt động.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHồ sơ tư vấn gồm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tCV/hồ sơ năng lực\u003c/p\u003e\u003cp\u003e-\tĐề xuất kỹ thuật\u003c/p\u003e\u003cp\u003e-\tĐề xuất tài chính\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em và các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai29:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được "])</script><script>self.__next_f.push([1,"Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em và các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai2a:T2040,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.1. Mục tiêu nghiên cứu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐánh giá cam kết và năng lực của Việt Nam trong việc bảo vệ phụ nữ và trẻ em gái tại các cộng đồng chịu ảnh hưởng bởi thiên tai, thông qua việc vận dụng Khung hành động Sendai về Giảm nhẹ rủi ro thiên tai và các chỉ số giảm thiểu rủi ro thiên tai nhạy cảm giới. \u003c/p\u003e\u003cp\u003e•\tCung cấp thông tin, tạo cơ sở để các thành viên của Mạng lưới Phụ nữ GNRRTT tổ chức hội thảo chính sách, góp phần thúc đẩy lồng ghép giới trong quản lý rủi ro thiên tai quốc gia.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1.2. Phạm vi nghiên cứu \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐịa bàn nghiên cứu: Nghiên cứu được thực hiện tập trung tại 6 xã dự án thuộc TP Cần Thơ và Tỉnh Vĩnh Long, và một số địa bàn lân cận có nguy cơ cao về thiên tai.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tĐối tượng nghiên cứu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tCán bộ Hội Phụ nữ \u003c/p\u003e\u003cp\u003eo\tThành viên của các Nhóm phát triển cộng đồng, đội Xung kích PCTT, thành viên mạng lưới PN GNRRTT\u003c/p\u003e\u003cp\u003eo\tChính quyền địa phương và đại diện cộng đồng địa phương\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tThời gian thực hiện: Từ tháng 1 đến tháng 6 năm 2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhạm vi nội dung:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tĐánh giá cam kết chính sách và thể chế của Việt Nam trong lồng ghép giới vào giảm nhẹ rủi ro thiên tai\u003c/p\u003e\u003cp\u003eo\tPhân tích năng lực tổ chức và cộng đồng trong thực hiện các cam kết này\u003c/p\u003e\u003cp\u003eo\tXác định rào cản, thách thức, cơ hội và khuyến nghị thúc đẩy bình đẳng giới trong công tác GNRRTT \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCông tác thu thập các thông tin và dữ liệu của hoạt động nêu trên sẽ do các chuyên gia tư vấn tư vấn thực hiện, với sự hỗ trợ kỹ thuật và giám sát của cán bộ AFV. Một nhóm tư vấn độc lập sẽ được tuyển dụng để tiến hành các công việc như thiết kế công cụ thu thập thông tin, tập huấn cho cán bộ, tình nguyện viên địa phương, tổng hơp, phân tích số liệu và viết báo cáo nghiên cứu. \u003c/p\u003e\u003cp\u003e•\tPhương pháp luận cho nghiên cứu sẽ do nhóm tư vấn lựa chọn đề xuất và thảo luận với AFV khi bắt đầu triển khai để có những điều chỉnh cần thiết. Nghiên cứu sẽ sử dụng hai nguồn thông tin chính là thông tin sơ cấp và thông tin thứ cấp. Thông tin thứ cấp được thu thập từ chính quyền địa phương và các đối tác của ActionAid-AFV. Nguồn thông tin sơ cấp được thu thập trực tiếp trong quá trình khảo sát thực địa thông qua hai phương pháp nghiên cứu định tính và nghiên cứu định lượng.  \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKhảo sát thực địa\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát thực địa được thực hiện nhằm thu thập thông tin định tính và định lượng phục vụ cho việc đánh giá cam kết và năng lực của Việt Nam trong bảo vệ phụ nữ và trẻ em gái tại các cộng đồng chịu ảnh hưởng bởi thiên tai. Các hoạt động khảo sát được triển khai tại 6 xã dự án thuộc TP Cần Thơ và tỉnh Vĩnh Long và một số địa bàn khác thuộc khu vực Đồng bằng sông Cửu Long.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTập huấn nghiên cứu viên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhằm đảm bảo chất lượng, tính thống nhất và độ tin cậy của dữ liệu thu thập tại hiện trường, trước khi tiến hành thu thập dữ liệu, nhóm nghiên cứu đã tổ chức chương trình tập huấn cho 18 nghiên cứu viên, là các thành viên của Mạng lưới Phụ nữ tiên phong Giảm nhẹ rủi ro thiên tai Khóa tập huấn tập trung vào:\u003c/p\u003e\u003cp\u003e•\tGiới thiệu mục tiêu và phương pháp nghiên cứu\u003c/p\u003e\u003cp\u003e•\tHướng dẫn sử dụng bộ công cụ khảo sát (bảng hỏi, hướng dẫn phỏng vấn, mẫu thảo luận nhóm)\u003c/p\u003e\u003cp\u003e•\tKỹ năng thu thập dữ liệu nhạy cảm giới\u003c/p\u003e\u003cp\u003e•\tNguyên tắc đạo đức trong nghiên cứu và bảo mật thông tin người tham gia\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThảo luận nhóm \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm nghiên cứu sẽ tổ chức 06 cuộc thảo luận nhóm với tổng cộng 60 người tham gia (mỗi tỉnh 3 nhóm, mỗi nhóm 10 người), bao gồm:\u003c/p\u003e\u003cp\u003e•\tĐại diện Hội Phụ nữ \u003c/p\u003e\u003cp\u003e•\tThành viên Nhóm Phát triển cộng đồng và Đội xung kích Phòng chống thiên tai\u003c/p\u003e\u003cp\u003e•\tCán bộ chính quyền địa phương và đại diện cộng đồng dân cư\u003c/p\u003e\u003cp\u003eCác cuộc thảo luận tập trung vào các chủ đề:\u003c/p\u003e\u003cp\u003e•\tNhận thức và kinh nghiệm của phụ nữ và cộng đồng về phòng chống thiên tai\u003c/p\u003e\u003cp\u003e•\tVai trò của phụ nữ trong các hoạt động GNRRTT tại địa phương\u003c/p\u003e\u003cp\u003e•\tThách thức, rào cản và cơ hội trong việc lồng ghép giới vào công tác GNRRTT\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhỏng vấn sâu \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBên cạnh thảo luận nhóm, nhóm nghiên cứu đã tiến hành 20 cuộc phỏng vấn sâu với các bên liên quan chủ chốt (mỗi tỉnh 10 cuộc), gồm:\u003c/p\u003e\u003cp\u003e•\tĐại diện các cơ quan nhà nước: Bộ NN\u0026MT, Ủy ban Quốc gia Vì sự tiến bộ của phụ nữ Việt Nam, Cục Đê điều và Phòng chống thiên tai, UBND TP Cần Thơ, Tỉnh Vĩnh Long và các tỉnh vùng Đồng bằng sông Cửu Long.\u003c/p\u003e\u003cp\u003e•\tCán bộ Hội Phụ nữ tỉnh/xã dự án\u003c/p\u003e\u003cp\u003e•\tĐại diện chính quyền địa phương tại 6 xã dự án\u003c/p\u003e\u003cp\u003e•\tLãnh đạo nhóm cộng đồng và thành viên mạng lưới Phụ nữ Giảm nhẹ rủi ro thiên tai\u003c/p\u003e\u003cp\u003eCác cuộc phỏng vấn nhằm khai thác sâu hơn quan điểm, kinh nghiệm và đánh giá thực tế về năng lực, chính sách và nguồn lực trong việc bảo vệ phụ nữ, trẻ em gái trước thiên tai và biến đổi khí hậu. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKhảo sát bằng bảng hỏi \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát định lượng được thực hiện với 370 người dân tại 6 xã, phường mục tiêu của dự án. Bảng hỏi khảo sát sẽ tập trung vào 5 nội dung chính sau:\u003c/p\u003e\u003cp\u003ea)\tĐánh giá mức độ cam kết của chính quyền và cơ quan liên quan trong việc bảo vệ phụ nữ và trẻ em gái trước tác động của thiên tai.\u003c/p\u003e\u003cp\u003eb)\tXác định mức độ lồng ghép giới trong các chính sách, chương trình và cơ chế quản lý rủi ro thiên tai tại địa phương.\u003c/p\u003e\u003cp\u003ec)\tĐánh giá năng lực của các tổ chức phụ nữ, nhóm cộng đồng và chính quyền địa phương trong triển khai các hoạt động giảm nhẹ rủi ro thiên tai nhạy cảm giới.\u003c/p\u003e\u003cp\u003ed)\tPhân tích các rào cản và thách thức đang hạn chế việc thực hiện hiệu quả các cam kết về giới trong công tác giảm nhẹ rủi ro thiên tai.\u003c/p\u003e\u003cp\u003ee)\tThu thập ý kiến, bài học và khuyến nghị từ cộng đồng nhằm thúc đẩy lồng ghép giới phù hợp với Khung hành động Sendai và mục tiêu phát triển bền vững.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTổng hợp và xử lý dữ liệu, hoàn thiện báo cáo \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDữ liệu thu được từ các công cụ (bảng hỏi, phỏng vấn, thảo luận nhóm) được mã hóa, nhập liệu và phân tích bằng phương pháp thống kê mô tả (cho phần định lượng) và phân tích nội dung chủ đề (cho phần định tính). \u003c/p\u003e\u003cp\u003e•\tKết quả từ khảo sát thực địa được đối chiếu với dữ liệu thứ cấp (mục 4.1) để đảm bảo tính nhất quán và khách quan của các kết luận.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời hạn nhận hồ sơ: trước 17h30 ngày 20/4/2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:Tcf1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eVai trò và nhiệm vụ của các bên \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuỹ AFV: AFV chịu trách nhiệm quản lý tổng thể và giám sát việc triển khai hoạt động nghiên cứu, bao gồm:\u003c/strong\u003e•\tPhê duyệt Điều khoản tham chiếu (TOR), kế hoạch thực hiện và ngân sách hoạt động\u003c/p\u003e\u003cp\u003e•\tPhê duyệt lựa chọn tư vấn/nhóm tư vấn thực hiện nghiên cứu\u003c/p\u003e\u003cp\u003e•\tPhê duyệt kế hoạch khảo sát và bộ công cụ thu thập dữ liệu trước khi triển khai thực địa;\u003c/p\u003e\u003cp\u003e•\tHỗ trợ cung cấp thông tin liên quan, tạo điều kiện cho tư vấn tiếp cận đối tượng khảo sát và dữ liệu cần thiết\u003c/p\u003e\u003cp\u003e•\tSắp xếp hậu cần và phối hợp với các đối tác địa phương để triển khai khảo sát thực địa;\u003c/p\u003e\u003cp\u003e•\tXem xét và phê duyệt báo cáo cuối cùng do nhóm tư vấn đệ trình\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhóm Tư vấn: \u003c/strong\u003ea) Trưởng nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 10 năm kinh nghiệm làm việc trong lĩnh vực phòng chống thiên tai (PCTT), giảm nhẹ rủi ro thiên tai, giới và phát triển cộng đồng\u003c/p\u003e\u003cp\u003e•\tCó kiến thức chuyên sâu và kinh nghiệm thực tế trong nghiên cứu, đánh giá các dự án phát triển, đặc biệt trong lĩnh vực lồng ghép giới trong PCTT và thích ứng biến đổi khí hậu\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm trưởng nhóm trong các nghiên cứu/đánh giá tương tự ở cấp quốc gia hoặc địa phương\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm chính trong việc thiết kế phương pháp nghiên cứu, giám sát thu thập dữ liệu, phân tích và tổng hợp báo cáo\u003c/p\u003e\u003cp\u003eb) Thành viên nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm trong lĩnh vực nghiên cứu, đánh giá hoặc khảo sát phát triển cộng đồng, GNRRTT và bình đẳng giới\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm thực hiện các cuộc khảo sát định tính và định lượng tương tự\u003c/p\u003e\u003cp\u003e•\tHỗ trợ trưởng nhóm trong việc thiết kế công cụ, thu thập dữ liệu, xử lý và phân tích thông tin\u003c/p\u003e\u003cp\u003ec) Trách nhiệm của nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tNghiên cứu kỹ TOR để xây dựng đề xuất kỹ thuật và ngân sách phù hợp với yêu cầu của dự án\u003c/p\u003e\u003cp\u003e•\tPhát triển chương trình làm việc chi tiết, kế hoạch khảo sát và công cụ nghiên cứu (bảng hỏi, hướng dẫn phỏng vấn, v.v.) để trình AFV phê duyệt trước khi thực hiện\u003c/p\u003e\u003cp\u003e•\tĐảm bảo chất lượng, tính khách quan và tính nhạy cảm giới trong quá trình thu thập và phân tích dữ liệu\u003c/p\u003e\u003cp\u003e•\tNộp báo cáo nghiên cứu và các sản phẩm đầu ra đã thống nhất. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiám sát và đánh giá\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCán bộ dự án của AFV sẽ trực tiếp tham dự và giám sát tiến độ thực hiện.\u003c/p\u003e\u003cp\u003e•\tBáo cáo kết quả được nộp trong vòng 05 ngày kể từ khi kết thúc hoạt động.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHồ sơ tư vấn gồm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e-\tCV/hồ sơ năng lực\u003c/p\u003e\u003cp\u003e-\tĐề xuất kỹ thuật\u003c/p\u003e\u003cp\u003e-\tĐề xuất tài chính\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2d:{\"skillName\":\"Bình Đẳng Giới\",\"skillId\":1453331,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Disaster Management\",\"skillId\":10169,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Nghiên Cứu Học Thuật\",\"skillId\":741636,\"skillWeight\":100,\"isExisted\":false}\n30:{\"skillName\":\"Phát Triển Cộng Đồng\",\"skillId\":920544,\"skillWeight\":100,\"isExisted\":false}\n31:{\"skillName\":\"Phòng Chống Thiên Tai\",\"skillId\":471115,\"skillWeight\":100,\"isExisted\":false}\n2c:[\"$2d\",\"$2e\",\"$2f\",\"$30\",\"$31\"]\n33:{\"benefitId\":15,\"benefitIconName\":\"fa-check-square-o\",\"benefitName\":\"Others\",\"benefitNameVI\":\"Khác\",\"benefitValue\":\"Theo chính sách của Công ty.\"}\n32:[\"$33\"]\n36:{\"lat\":10.239574,\"lon\":105.957193}\n35:{\"workingLocationId\":235270,\"addressId\":82970,\"cityId\":62,\"districtId\":0,\"address\":\"Vĩnh Long, Vinh Long, Vietnam\",\"geoLoc\":\"$36\",\"cityName\":\"Vinh Long\",\"cityNameVI\":\"Vĩnh Long\"}\n38:{\"lat\":10.045162,\"lon\":105.746854}\n37:{\"workingLocationId\":229436,\"addressId\":6461,\"cityId\":15,\"districtId\":0,\"address\":\"Thành phố Cần Thơ\",\"geoLoc\":\"$38\",\"cityName\":\"Can Tho\",\"cityNam
