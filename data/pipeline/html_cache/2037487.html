tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em v"])</script><script>self.__next_f.push([1,"à các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai24:T47f1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMục tiêu chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGóp phần tăng cường vai trò nòng cốt của phụ nữ và thanh niên trong xây dựng năng lực chống chịu của cộng đồng thông qua việc thúc đẩy các giải pháp thích ứng với biến đổi khí hậu và quản lý rủi ro thiên tai theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu cụ thể\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tThúc đẩy sự tham gia thực chất và vai trò lãnh đạo của phụ nữ và thanh niên trong quản lý rủi ro thiên tai và thích ứng với biến đổi khí hậu theo hướng lồng ghép giới.\u003c/p\u003e\u003cp\u003e2.\tNâng cao năng lực chống chịu của cộng đồng trước thiên tai và biến đổi khí hậu với sự dẫn dắt của phụ nữ, thanh niên và các tổ chức xã hội tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCộng đồng, phụ nữ và thanh niên được nâng cao năng lực về thích ứng với biến đổi khí hậu, quản lý rủi ro thiên tai và phòng, chống bạo lực trên cơ sở giới theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e•\tVai trò lãnh đạo và sự tham gia của Hội Phụ nữ, Đoàn Thanh niên trong đánh giá rủi ro và xây dựng, thực hiện kế hoạch ứng phó tại địa phương được tăng cường.\u003c/p\u003e\u003cp\u003e•\tCác tài liệu hướng dẫn, mô hình thực hành tốt và kết quả dự án được trao đổi, phổ biến và chia sẻ trong nước và quốc tế về giảm nhẹ rủi ro thiên tai và thích ứng với biến đổi khí hậu lồng ghép giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCác sáng kiến phòng, chống thiên tai quy mô nhỏ được triển khai, góp phần tăng cường khả năng thích ứng với biến đổi khí hậu và bảo vệ hệ sinh thái địa phương.\u003c/p\u003e\u003cp\u003e•\tCác mô hình sinh kế đa dạng, có khả năng chống chịu với biến đổi khí hậu được phát triển cho các hộ gia đình dễ bị tổn thương, gắn với dịch vụ khuyến nông, chế biến, thị trường và phát huy kiến thức bản địa.\u003c/p\u003e\u003cp\u003e•\tChất lượng dịch vụ tư vấn, hỗ trợ ứng phó thiên tai và truyền thông về phòng, chống bạo lực gia đình, xóa bỏ định kiến giới tại các khu vực bị ảnh hưởng được nâng cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu nghiên cứu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMục tiêu tổng quát của nghiên cứu là đánh giá thực trạng rủi ro khí hậu và thiên tai tại các địa bàn dự án ở tỉnh Ninh Bình và Thành phố Hà Nội theo hướng nhạy cảm giới, đồng thời xác định các giải pháp thích ứng khả thi do phụ nữ và thanh niên dẫn dắt nhằm tăng cường khả năng chống chịu của cộng đồng trước biến đổi khí hậu và thiên tai.\u003c/p\u003e\u003cp\u003e•\tCụ thể, nghiên cứu hướng tới: (1) Phân tích mức độ dễ bị tổn thương và năng lực thích ứng của cộng đồng trước các rủi ro khí hậu, có xem xét sự khác biệt theo giới, độ tuổi và nhóm xã hội; (2) Đánh giá mức độ tham gia và vai trò của phụ nữ và thanh niên trong quá trình lập kế hoạch và thực hiện các hoạt động quản lí rủi ro thiên tai và thích ứng với biến đổi khí hậu tại địa phương; (3) Xác định các khoảng trống về chính sách, năng lực và nguồn lực trong việc lồng ghép yếu tố giới vào công tác phân tích rủi ro và xây dựng kế hoạch thích ứng.\u003c/p\u003e\u003cp\u003e•\tBên cạnh đó, nghiên cứu nhằm đề xuất khuyến nghị cụ thể để hỗ trợ phụ nữ và thanh niên dẫn dắt quá trình phân tích rủi ro khí hậu nhạy cảm giới và xây dựng kế hoạch thích ứng địa phương, bảo đảm tính bao trùm, khả thi và bền vững. Kết quả nghiên cứu sẽ là cơ sở dữ liệu quan trọng phục vụ triển khai Hoạt động 1.3 của Dự án SIDA.1, đồng thời cung cấp bằng chứng cho đối thoại chính sách và chia sẻ kinh nghiệm trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhạm vi nghiên cứu \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐịa bàn nghiên cứu: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNghiên cứu được thực hiện tại 6 xã thuộc địa bàn dự án của Thành phố Hà Nội và tỉnh Hà Nam (khu vực huyện Nho Quan, tỉnh Ninh Bình cũ), đồng thời mở rộng khảo sát tại hai địa bàn lân cận có nguy cơ cao về thiên tai nhằm so sánh, đối chiếu và làm rõ các yếu tố rủi ro đặc thù. Các địa bàn được lựa chọn đại diện cho cả khu vực nông thôn và ven đô, có mức độ phơi nhiễm cao với các hiện tượng như ngập lụt, mưa lớn, nắng nóng kéo dài và các rủi ro khí hậu khác.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐối tượng nghiên cứu: Nghiên cứu tập trung vào các nhóm có vai trò quan trọng trong công tác quản lí rủi ro thiên tai và thích ứng với biến đổi khí hậu tại địa phương, bao gồm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCán bộ Hội Phụ nữ và đoàn thanh niên các cấp;\u003c/p\u003e\u003cp\u003e•\tThành viên các Nhóm phát triển cộng đồng, đội Xung kích phòng chống thiên tai (PCTT), thành viên mạng lưới Phụ nữ Giảm nhẹ rủi ro thiên tai (PN GNRRTT);\u003c/p\u003e\u003cp\u003e•\tĐại diện chính quyền địa phương và đại diện cộng đồng (trưởng thôn, tổ trưởng dân phố, người có uy tín, đại diện các đoàn thể).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eCác nhóm đối tượng này vừa là người cung cấp thông tin chính, vừa là tác nhân tham gia trực tiếp vào quá trình phân tích rủi ro và xây dựng kế hoạch thích ứng tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian thực hiện\u003c/strong\u003e: Nghiên cứu được triển khai trong thời gian từ tháng 01 đến tháng 03 năm 2026, bao gồm các hoạt động chuẩn bị công cụ, thu thập dữ liệu thực địa, tham vấn cộng đồng và tổng hợp, phân tích kết quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNội dung\u003c/strong\u003e: Nghiên cứu tập trung phân tích (1) các loại hình rủi ro khí hậu và thiên tai chủ yếu tại địa bàn dự án; (2) mức độ dễ bị tổn thương và năng lực thích ứng của cộng đồng, có lồng ghép yếu tố giới và độ tuổi; (3) vai trò, mức độ tham gia và năng lực lãnh đạo của phụ nữ và thanh niên trong công tác PCTT và thích ứng với BĐKH; (4) mức độ lồng ghép giới trong các kế hoạch, quy trình và cơ chế quản lí rủi ro thiên tai tại địa phương; và (5) các khoảng trống, nhu cầu và khuyến nghị nhằm tăng cường sự dẫn dắt của phụ nữ và thanh niên trong xây dựng kế hoạch thích ứng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động dự kiến đạt được các kết quả đầu ra sau:\u003c/p\u003e\u003cp\u003e1.\tBáo cáo phân tích rủi ro khí hậu nhạy cảm giới tại các địa bàn dự án được hoàn thiện, trong đó xác định rõ các loại hình rủi ro chủ yếu, mức độ phơi nhiễm, tính dễ bị tổn thương và năng lực thích ứng của từng nhóm dân cư theo giới và độ tuổi. Báo cáo cung cấp dữ liệu định tính và định lượng làm cơ sở cho việc lập kế hoạch thích ứng tại địa phương.\u003c/p\u003e\u003cp\u003e2.\tÍt nhất 6 bản kế hoạch thích ứng với biến đổi khí hậu và quản lí rủi ro thiên tai cấp xã có lồng ghép giới được xây dựng với sự tham gia và dẫn dắt của phụ nữ và thanh niên. Các kế hoạch này xác định rõ ưu tiên hành động, nguồn lực thực hiện, cơ chế phối hợp và lộ trình triển khai.\u003c/p\u003e\u003cp\u003e3.\tĐội ngũ nòng cốt gồm phụ nữ và thanh niên được nâng cao năng lực trong phân tích rủi ro, thu thập và xử lí thông tin, tham vấn cộng đồng và xây dựng kế hoạch thích ứng. Nhóm này có thể tiếp tục đóng vai trò hạt nhân trong các hoạt động PCTT và thích ứng BĐKH tại địa phương sau khi kết thúc hoạt động.\u003c/p\u003e\u003cp\u003e4.\tCơ chế tham vấn và đối thoại giữa cộng đồng và chính quyền địa phương được củng cố, thông qua các cuộc họp, hội thảo và phiên đối thoại công khai về kết quả phân tích rủi ro và kế hoạch thích ứng. Điều này góp phần tăng cường tính minh bạch, trách nhiệm giải trình và sự đồng thuận trong quá trình triển khai.\u003c/p\u003e\u003cp\u003e5.\tBộ công cụ/hướng dẫn phân tích rủi ro khí hậu nhạy cảm giới ở cấp cộng đồng được hoàn thiện và chia sẻ, làm tài liệu tham khảo cho các địa phương khác trong và ngoài khu vực dự án, đồng thời phục vụ hoạt động chia sẻ học tập trong nước và quốc tế của Dự án SIDA.1.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea) Nghiên cứu tài liệu thứ cấp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNghiên cứu tài liệu thứ cấp nhằm xây dựng cơ sở lý luận, khung phân tích và bối cảnh chính sách phục vụ hoạt động thanh niên và phụ nữ dẫn dắt phân tích rủi ro khí hậu nhạy cảm giới và xây dựng kế hoạch thích ứng địa phương tại Hà Nội và Hà Nam (khu vực huyện Nho Quan – tỉnh Ninh Bình cũ).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục đích của nghiên cứu tài liệu thứ cấp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổng hợp và phân tích các chính sách, chiến lược và kế hoạch quốc gia, cấp tỉnh liên quan đến quản lý rủi ro thiên tai (PCTT), thích ứng biến đổi khí hậu (BĐKH) và bình đẳng giới.\u003c/p\u003e\u003cp\u003e•\tXác định mức độ lồng ghép giới trong các văn bản pháp lý, kế hoạch PCTT, kế hoạch phát triển kinh tế – xã hội và cơ chế phối hợp liên ngành.\u003c/p\u003e\u003cp\u003e•\tĐối chiếu cam kết của Việt Nam với các chuẩn mực và khung hành động quốc tế, đặc biệt là Khung hành động Sendai (2015–2030), Mục tiêu Phát triển Bền vững (SDGs), Thỏa thuận Paris về khí hậu và Công ước CEDAW.\u003c/p\u003e\u003cp\u003e•\tLàm rõ các khoảng trống về chính sách và thực tiễn nhằm hỗ trợ thiết kế công cụ phân tích rủi ro nhạy cảm giới và xây dựng kế hoạch thích ứng cấp xã.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNguồn tài liệu và dữ liệu thứ cấp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tVăn bản chính sách quốc gia:\u003c/p\u003e\u003cp\u003eo\tLuật Phòng chống thiên tai (2013, sửa đổi 2020)\u003c/p\u003e\u003cp\u003eo\tChiến lược quốc gia về phòng chống thiên tai đến năm 2030, tầm nhìn 2050\u003c/p\u003e\u003cp\u003eo\tChiến lược quốc gia về biến đổi khí hậu đến năm 2050\u003c/p\u003e\u003cp\u003eo\tChiến lược quốc gia về bình đẳng giới giai đoạn 2021–2030\u003c/p\u003e\u003cp\u003eo\tKế hoạch hành động quốc gia thực hiện Khung Sendai\u003c/p\u003e\u003cp\u003e•\tTài liệu cấp tỉnh và địa phương:\u003c/p\u003e\u003cp\u003eo\tKế hoạch PCTT và tìm kiếm cứu nạn của TP Hà Nội và tỉnh Hà Nam\u003c/p\u003e\u003cp\u003eo\tKế hoạch thích ứng BĐKH và kế hoạch phát triển kinh tế – xã hội cấp huyện/xã\u003c/p\u003e\u003cp\u003eo\tBáo cáo đánh giá rủi ro thiên tai tại địa phương\u003c/p\u003e\u003cp\u003e•\tBáo cáo và nghiên cứu của các tổ chức:\u003c/p\u003e\u003cp\u003eo\tUN Women, UNDP, UNDRR, World Bank, ADB, CARE, Oxfam, JICA, ActionAid và các tổ chức khác liên quan đến giới và quản lý rủi ro thiên tai tại Việt Nam.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb) Nghiên cứu thực địa  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát thực địa được thực hiện nhằm thu thập dữ liệu định tính và định lượng phục vụ phân tích rủi ro khí hậu nhạy cảm giới và xây dựng kế hoạch thích ứng tại 6 xã dự án thuộc TP Hà Nội và tỉnh Hà Nam (huyện Nho Quan – Ninh Bình cũ), cùng hai địa bàn lân cận có nguy cơ thiên tai cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eHoạt động khảo sát bảo đảm sự tham gia và vai trò dẫn dắt của phụ nữ và thanh niên trong toàn bộ quá trình thu thập và phân tích dữ liệu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhân tích dữ liệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động phân tích dữ liệu trong khuôn khổ Hoạt động “Thanh niên và phụ nữ dẫn dắt quá trình phân tích rủi ro khí hậu nhạy cảm giới và xây dựng kế hoạch thích ứng địa phương” được thực hiện theo hướng kết hợp định tính và định lượng, bảo đảm cách tiếp cận có sự tham gia và lồng ghép giới. Quá trình phân tích không chỉ nhằm xác định mức độ rủi ro mà còn làm rõ các yếu tố quyền lực, vai trò giới và khả năng tiếp cận nguồn lực của các nhóm trong cộng đồng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNội dung phân tích dữ liệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhân tích tập trung vào các nhóm nội dung chính sau:\u003c/p\u003e\u003cp\u003e1.\tXác định và xếp hạng rủi ro khí hậu chủ yếu tại địa phương\u003c/p\u003e\u003cp\u003eo\tLoại hình thiên tai thường gặp (ngập lụt, mưa lớn, nắng nóng, xâm nhập mặn…)\u003c/p\u003e\u003cp\u003eo\tTần suất, mức độ ảnh hưởng và xu hướng thay đổi\u003c/p\u003e\u003cp\u003e2.\tPhân tích tác động theo giới và độ tuổi\u003c/p\u003e\u003cp\u003eo\tẢnh hưởng đến sinh kế, sức khỏe, việc làm và an sinh xã hội\u003c/p\u003e\u003cp\u003eo\tNguy cơ gia tăng bạo lực giới hoặc bất bình đẳng sau thiên tai\u003c/p\u003e\u003cp\u003eo\tKhả năng tiếp cận dịch vụ công và hỗ trợ khẩn cấp\u003c/p\u003e\u003cp\u003e3.\tĐánh giá năng lực thích ứng của cộng đồng\u003c/p\u003e\u003cp\u003eo\tHệ thống cảnh báo sớm và mức độ tiếp cận thông tin\u003c/p\u003e\u003cp\u003eo\tVai trò của phụ nữ và thanh niên trong đội xung kích PCTT\u003c/p\u003e\u003cp\u003eo\tMạng lưới hỗ trợ xã hội và nguồn lực cộng đồng\u003c/p\u003e\u003cp\u003e4.\tĐánh giá mức độ lồng ghép giới trong kế hoạch và cơ chế địa phương\u003c/p\u003e\u003cp\u003eo\tTỷ lệ phụ nữ tham gia ban chỉ huy PCTT\u003c/p\u003e\u003cp\u003eo\tSự hiện diện của nội dung giới trong kế hoạch PCTT cấp xã\u003c/p\u003e\u003cp\u003eo\tNgân sách và hoạt động đào tạo có nhạy cảm giới hay không\u003c/p\u003e\u003cp\u003e5.\tXác định khoảng trống và đề xuất ưu tiên hành động\u003c/p\u003e\u003cp\u003eo\tKhoảng trống về chính sách, năng lực, nguồn lực\u003c/p\u003e\u003cp\u003eo\tGiải pháp thích ứng ưu tiên do phụ nữ và thanh niên đề xuất\u003c/p\u003e\u003cp\u003eo\tCơ chế tích hợp kế hoạch thích ứng vào kế hoạch phát triển địa phương\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eKết quả phân tích sẽ được hệ thống hóa thành báo cáo phân tích rủi ro khí hậu nhạy cảm giới và là cơ sở trực tiếp để xây dựng kế hoạch thích ứng địa phương do phụ nữ và thanh niên dẫn dắt, góp phần thực hiện mục tiêu của Dự án SIDA.1.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eViết báo cáo phân tích rủi ro khí hậu nhạy cảm giới\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBáo cáo phân tích rủi ro khí hậu nhạy cảm giới là sản phẩm tổng hợp quan trọng của Hoạt động 1.3, phản ánh toàn diện kết quả nghiên cứu tài liệu thứ cấp, nghiên cứu thực địa và quá trình phân tích có sự tham gia của phụ nữ và thanh niên. Báo cáo nhằm cung cấp bằng chứng khoa học và thực tiễn để làm cơ sở xây dựng kế hoạch thích ứng địa phương có lồng ghép giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuy trình xây dựng báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuá trình xây dựng báo cáo được thực hiện theo các bước sau:\u003c/p\u003e\u003cp\u003e•\tTổng hợp và làm sạch dữ liệu: Hệ thống hóa dữ liệu định tính và định lượng thu thập từ thảo luận nhóm, phỏng vấn sâu và khảo sát cộng đồng; kiểm tra tính đầy đủ và nhất quán của thông tin.\u003c/p\u003e\u003cp\u003e•\tPhân tích và diễn giải kết quả: Áp dụng khung phân tích rủi ro khí hậu nhạy cảm giới (phơi nhiễm – dễ bị tổn thương – năng lực thích ứng) để xác định các xu hướng chính, khác biệt theo giới và độ tuổi, cũng như các khoảng trống trong cơ chế hiện hành.\u003c/p\u003e\u003cp\u003e•\tTham vấn xác nhận: Tổ chức hội thảo phản hồi tại địa phương với sự tham gia của phụ nữ, thanh niên, đại diện chính quyền và các bên liên quan nhằm xác nhận, bổ sung và hoàn thiện kết quả phân tích.\u003c/p\u003e\u003cp\u003e•\tHoàn thiện và phê duyệt: Chỉnh sửa, hoàn thiện báo cáo trên cơ sở góp ý và trình cơ quan liên quan xem xét, ghi nhận để sử dụng trong quá trình lập kế hoạch thích ứng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả mong đợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBáo cáo phân tích rủi ro khí hậu nhạy cảm giới sẽ:\u003c/p\u003e\u003cp\u003e•\tCung cấp cơ sở dữ liệu đáng tin cậy cho việc xây dựng kế hoạch thích ứng cấp xã;\u003c/p\u003e\u003cp\u003e•\tLàm rõ bằng chứng về sự cần thiết tăng cường vai trò phụ nữ và thanh niên trong quản lí rủi ro thiên tai;\u003c/p\u003e\u003cp\u003e•\tHỗ trợ đối thoại chính sách giữa cộng đồng và chính quyền địa phương;\u003c/p\u003e\u003cp\u003e•\tĐóng góp tài liệu tham khảo cho hoạt động chia sẻ học tập trong nước và quốc tế của Dự án SIDA.1.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eViệc hoàn thiện báo cáo không chỉ là bước kỹ thuật mà còn là quá trình trao quyền, giúp phụ nữ và thanh niên nâng cao năng lực phân tích, lập luận và vận động chính sách trong lĩnh vực thích ứng với biến đổi khí hậu và quản lí rủi ro thiên tai.\u003c/p\u003e\u003cp\u003eThời hạn nhận hồ sơ: trước 17h30 ngày 20/4/2026\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:Tc43,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eVai trò và nhiệm vụ của các bên \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActionAid: Chịu trách nhiệm quản lý tổng thể và giám sát việc triển khai hoạt động nghiên cứu, bao gồm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhê duyệt Điều khoản tham chiếu (TOR), kế hoạch thực hiện và ngân sách hoạt động\u003c/p\u003e\u003cp\u003e•\tPhê duyệt lựa chọn tư vấn/nhóm tư vấn thực hiện nghiên cứu\u003c/p\u003e\u003cp\u003e•\tPhê duyệt kế hoạch khảo sát và bộ công cụ thu thập dữ liệu trước khi triển khai thực địa;\u003c/p\u003e\u003cp\u003e•\tHỗ trợ cung cấp thông tin liên quan, tạo điều kiện cho tư vấn tiếp cận đối tượng khảo sát và dữ liệu cần thiết\u003c/p\u003e\u003cp\u003e•\tSắp xếp hậu cần và phối hợp với các đối tác địa phương để triển khai khảo sát thực địa;\u003c/p\u003e\u003cp\u003e•\tXem xét và phê duyệt báo cáo cuối cùng do nhóm tư vấn đệ trình\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhóm Tư vấn: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ea) Trưởng nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 10 năm kinh nghiệm làm việc trong lĩnh vực phòng chống thiên tai (PCTT), giảm nhẹ rủi ro thiên tai, giới và phát triển cộng đồng\u003c/p\u003e\u003cp\u003e•\tCó kiến thức chuyên sâu và kinh nghiệm thực tế trong nghiên cứu, đánh giá các dự án phát triển, đặc biệt trong lĩnh vực lồng ghép giới trong PCTT và thích ứng biến đổi khí hậu\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm trưởng nhóm trong các nghiên cứu/đánh giá tương tự ở cấp quốc gia hoặc địa phương\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm chính trong việc thiết kế phương pháp nghiên cứu, giám sát thu thập dữ liệu, phân tích và tổng hợp báo cáo\u003c/p\u003e\u003cp\u003eb) Thành viên nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm trong lĩnh vực nghiên cứu, đánh giá hoặc khảo sát phát triển cộng đồng, GNRRTT và bình đẳng giới\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm thực hiện các cuộc khảo sát định tính và định lượng tương tự\u003c/p\u003e\u003cp\u003e•\tHỗ trợ trưởng nhóm trong việc thiết kế công cụ, thu thập dữ liệu, xử lý và phân tích thông tin\u003c/p\u003e\u003cp\u003ec) Trách nhiệm của nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tNghiên cứu kỹ TOR để xây dựng đề xuất kỹ thuật và ngân sách phù hợp với yêu cầu của dự án\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhát triển chương trình làm việc chi tiết, kế hoạch khảo sát và công cụ nghiên cứu (bảng hỏi, hướng dẫn phỏng vấn, v.v.) để trình ActionAid phê duyệt trước khi thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tĐảm bảo chất lượng, tính khách quan và tính nhạy cảm giới trong quá trình thu thập và phân tích dữ liệu\u003c/p\u003e\u003cp\u003e•\tNộp báo cáo nghiên cứu và các sản phẩm đầu ra đã thống nhất. \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiám sát và đánh giá\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCán bộ dự án của ActionAid sẽ trực tiếp tham dự và giám sát tiến độ thực hiện.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em và các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai29:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được "])</script><script>self.__next_f.push([1,"Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em và các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai2a:T47f1,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMục tiêu chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGóp phần tăng cường vai trò nòng cốt của phụ nữ và thanh niên trong xây dựng năng lực chống chịu của cộng đồng thông qua việc thúc đẩy các giải pháp thích ứng với biến đổi khí hậu và quản lý rủi ro thiên tai theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu cụ thể\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tThúc đẩy sự tham gia thực chất và vai trò lãnh đạo của phụ nữ và thanh niên trong quản lý rủi ro thiên tai và thích ứng với biến đổi khí hậu theo hướng lồng ghép giới.\u003c/p\u003e\u003cp\u003e2.\tNâng cao năng lực chống chịu của cộng đồng trước thiên tai và biến đổi khí hậu với sự dẫn dắt của phụ nữ, thanh niên và các tổ chức xã hội tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCộng đồng, phụ nữ và thanh niên được nâng cao năng lực về thích ứng với biến đổi khí hậu, quản lý rủi ro thiên tai và phòng, chống bạo lực trên cơ sở giới theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e•\tVai trò lãnh đạo và sự tham gia của Hội Phụ nữ, Đoàn Thanh niên trong đánh giá rủi ro và xây dựng, thực hiện kế hoạch ứng phó tại địa phương được tăng cường.\u003c/p\u003e\u003cp\u003e•\tCác tài liệu hướng dẫn, mô hình thực hành tốt và kết quả dự án được trao đổi, phổ biến và chia sẻ trong nước và quốc tế về giảm nhẹ rủi ro thiên tai và thích ứng với biến đổi khí hậu lồng ghép giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCác sáng kiến phòng, chống thiên tai quy mô nhỏ được triển khai, góp phần tăng cường khả năng thích ứng với biến đổi khí hậu và bảo vệ hệ sinh thái địa phương.\u003c/p\u003e\u003cp\u003e•\tCác mô hình sinh kế đa dạng, có khả năng chống chịu với biến đổi khí hậu được phát triển cho các hộ gia đình dễ bị tổn thương, gắn với dịch vụ khuyến nông, chế biến, thị trường và phát huy kiến thức bản địa.\u003c/p\u003e\u003cp\u003e•\tChất lượng dịch vụ tư vấn, hỗ trợ ứng phó thiên tai và truyền thông về phòng, chống bạo lực gia đình, xóa bỏ định kiến giới tại các khu vực bị ảnh hưởng được nâng cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu nghiên cứu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tMục tiêu tổng quát của nghiên cứu là đánh giá thực trạng rủi ro khí hậu và thiên tai tại các địa bàn dự án ở tỉnh Ninh Bình và Thành phố Hà Nội theo hướng nhạy cảm giới, đồng thời xác định các giải pháp thích ứng khả thi do phụ nữ và thanh niên dẫn dắt nhằm tăng cường khả năng chống chịu của cộng đồng trước biến đổi khí hậu và thiên tai.\u003c/p\u003e\u003cp\u003e•\tCụ thể, nghiên cứu hướng tới: (1) Phân tích mức độ dễ bị tổn thương và năng lực thích ứng của cộng đồng trước các rủi ro khí hậu, có xem xét sự khác biệt theo giới, độ tuổi và nhóm xã hội; (2) Đánh giá mức độ tham gia và vai trò của phụ nữ và thanh niên trong quá trình lập kế hoạch và thực hiện các hoạt động quản lí rủi ro thiên tai và thích ứng với biến đổi khí hậu tại địa phương; (3) Xác định các khoảng trống về chính sách, năng lực và nguồn lực trong việc lồng ghép yếu tố giới vào công tác phân tích rủi ro và xây dựng kế hoạch thích ứng.\u003c/p\u003e\u003cp\u003e•\tBên cạnh đó, nghiên cứu nhằm đề xuất khuyến nghị cụ thể để hỗ trợ phụ nữ và thanh niên dẫn dắt quá trình phân tích rủi ro khí hậu nhạy cảm giới và xây dựng kế hoạch thích ứng địa phương, bảo đảm tính bao trùm, khả thi và bền vững. Kết quả nghiên cứu sẽ là cơ sở dữ liệu quan trọng phục vụ triển khai Hoạt động 1.3 của Dự án SIDA.1, đồng thời cung cấp bằng chứng cho đối thoại chính sách và chia sẻ kinh nghiệm trong nước và quốc tế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhạm vi nghiên cứu \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐịa bàn nghiên cứu: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNghiên cứu được thực hiện tại 6 xã thuộc địa bàn dự án của Thành phố Hà Nội và tỉnh Hà Nam (khu vực huyện Nho Quan, tỉnh Ninh Bình cũ), đồng thời mở rộng khảo sát tại hai địa bàn lân cận có nguy cơ cao về thiên tai nhằm so sánh, đối chiếu và làm rõ các yếu tố rủi ro đặc thù. Các địa bàn được lựa chọn đại diện cho cả khu vực nông thôn và ven đô, có mức độ phơi nhiễm cao với các hiện tượng như ngập lụt, mưa lớn, nắng nóng kéo dài và các rủi ro khí hậu khác.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐối tượng nghiên cứu: Nghiên cứu tập trung vào các nhóm có vai trò quan trọng trong công tác quản lí rủi ro thiên tai và thích ứng với biến đổi khí hậu tại địa phương, bao gồm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCán bộ Hội Phụ nữ và đoàn thanh niên các cấp;\u003c/p\u003e\u003cp\u003e•\tThành viên các Nhóm phát triển cộng đồng, đội Xung kích phòng chống thiên tai (PCTT), thành viên mạng lưới Phụ nữ Giảm nhẹ rủi ro thiên tai (PN GNRRTT);\u003c/p\u003e\u003cp\u003e•\tĐại diện chính quyền địa phương và đại diện cộng đồng (trưởng thôn, tổ trưởng dân phố, người có uy tín, đại diện các đoàn thể).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eCác nhóm đối tượng này vừa là người cung cấp thông tin chính, vừa là tác nhân tham gia trực tiếp vào quá trình phân tích rủi ro và xây dựng kế hoạch thích ứng tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian thực hiện\u003c/strong\u003e: Nghiên cứu được triển khai trong thời gian từ tháng 01 đến tháng 03 năm 2026, bao gồm các hoạt động chuẩn bị công cụ, thu thập dữ liệu thực địa, tham vấn cộng đồng và tổng hợp, phân tích kết quả.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNội dung\u003c/strong\u003e: Nghiên cứu tập trung phân tích (1) các loại hình rủi ro khí hậu và thiên tai chủ yếu tại địa bàn dự án; (2) mức độ dễ bị tổn thương và năng lực thích ứng của cộng đồng, có lồng ghép yếu tố giới và độ tuổi; (3) vai trò, mức độ tham gia và năng lực lãnh đạo của phụ nữ và thanh niên trong công tác PCTT và thích ứng với BĐKH; (4) mức độ lồng ghép giới trong các kế hoạch, quy trình và cơ chế quản lí rủi ro thiên tai tại địa phương; và (5) các khoảng trống, nhu cầu và khuyến nghị nhằm tăng cường sự dẫn dắt của phụ nữ và thanh niên trong xây dựng kế hoạch thích ứng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động dự kiến đạt được các kết quả đầu ra sau:\u003c/p\u003e\u003cp\u003e1.\tBáo cáo phân tích rủi ro khí hậu nhạy cảm giới tại các địa bàn dự án được hoàn thiện, trong đó xác định rõ các loại hình rủi ro chủ yếu, mức độ phơi nhiễm, tính dễ bị tổn thương và năng lực thích ứng của từng nhóm dân cư theo giới và độ tuổi. Báo cáo cung cấp dữ liệu định tính và định lượng làm cơ sở cho việc lập kế hoạch thích ứng tại địa phương.\u003c/p\u003e\u003cp\u003e2.\tÍt nhất 6 bản kế hoạch thích ứng với biến đổi khí hậu và quản lí rủi ro thiên tai cấp xã có lồng ghép giới được xây dựng với sự tham gia và dẫn dắt của phụ nữ và thanh niên. Các kế hoạch này xác định rõ ưu tiên hành động, nguồn lực thực hiện, cơ chế phối hợp và lộ trình triển khai.\u003c/p\u003e\u003cp\u003e3.\tĐội ngũ nòng cốt gồm phụ nữ và thanh niên được nâng cao năng lực trong phân tích rủi ro, thu thập và xử lí thông tin, tham vấn cộng đồng và xây dựng kế hoạch thích ứng. Nhóm này có thể tiếp tục đóng vai trò hạt nhân trong các hoạt động PCTT và thích ứng BĐKH tại địa phương sau khi kết thúc hoạt động.\u003c/p\u003e\u003cp\u003e4.\tCơ chế tham vấn và đối thoại giữa cộng đồng và chính quyền địa phương được củng cố, thông qua các cuộc họp, hội thảo và phiên đối thoại công khai về kết quả phân tích rủi ro và kế hoạch thích ứng. Điều này góp phần tăng cường tính minh bạch, trách nhiệm giải trình và sự đồng thuận trong quá trình triển khai.\u003c/p\u003e\u003cp\u003e5.\tBộ công cụ/hướng dẫn phân tích rủi ro khí hậu nhạy cảm giới ở cấp cộng đồng được hoàn thiện và chia sẻ, làm tài liệu tham khảo cho các địa phương khác trong và ngoài khu vực dự án, đồng thời phục vụ hoạt động chia sẻ học tập trong nước và quốc tế của Dự án SIDA.1.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea) Nghiên cứu tài liệu thứ cấp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNghiên cứu tài liệu thứ cấp nhằm xây dựng cơ sở lý luận, khung phân tích và bối cảnh chính sách phục vụ hoạt động thanh niên và phụ nữ dẫn dắt phân tích rủi ro khí hậu nhạy cảm giới và xây dựng kế hoạch thích ứng địa phương tại Hà Nội và Hà Nam (khu vực huyện Nho Quan – tỉnh Ninh Bình cũ).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục đích của nghiên cứu tài liệu thứ cấp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổng hợp và phân tích các chính sách, chiến lược và kế hoạch quốc gia, cấp tỉnh liên quan đến quản lý rủi ro thiên tai (PCTT), thích ứng biến đổi khí hậu (BĐKH) và bình đẳng giới.\u003c/p\u003e\u003cp\u003e•\tXác định mức độ lồng ghép giới trong các văn bản pháp lý, kế hoạch PCTT, kế hoạch phát triển kinh tế – xã hội và cơ chế phối hợp liên ngành.\u003c/p\u003e\u003cp\u003e•\tĐối chiếu cam kết của Việt Nam với các chuẩn mực và khung hành động quốc tế, đặc biệt là Khung hành động Sendai (2015–2030), Mục tiêu Phát triển Bền vững (SDGs), Thỏa thuận Paris về khí hậu và Công ước CEDAW.\u003c/p\u003e\u003cp\u003e•\tLàm rõ các khoảng trống về chính sách và thực tiễn nhằm hỗ trợ thiết kế công cụ phân tích rủi ro nhạy cảm giới và xây dựng kế hoạch thích ứng cấp xã.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNguồn tài liệu và dữ liệu thứ cấp:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tVăn bản chính sách quốc gia:\u003c/p\u003e\u003cp\u003eo\tLuật Phòng chống thiên tai (2013, sửa đổi 2020)\u003c/p\u003e\u003cp\u003eo\tChiến lược quốc gia về phòng chống thiên tai đến năm 2030, tầm nhìn 2050\u003c/p\u003e\u003cp\u003eo\tChiến lược quốc gia về biến đổi khí hậu đến năm 2050\u003c/p\u003e\u003cp\u003eo\tChiến lược quốc gia về bình đẳng giới giai đoạn 2021–2030\u003c/p\u003e\u003cp\u003eo\tKế hoạch hành động quốc gia thực hiện Khung Sendai\u003c/p\u003e\u003cp\u003e•\tTài liệu cấp tỉnh và địa phương:\u003c/p\u003e\u003cp\u003eo\tKế hoạch PCTT và tìm kiếm cứu nạn của TP Hà Nội và tỉnh Hà Nam\u003c/p\u003e\u003cp\u003eo\tKế hoạch thích ứng BĐKH và kế hoạch phát triển kinh tế – xã hội cấp huyện/xã\u003c/p\u003e\u003cp\u003eo\tBáo cáo đánh giá rủi ro thiên tai tại địa phương\u003c/p\u003e\u003cp\u003e•\tBáo cáo và nghiên cứu của các tổ chức:\u003c/p\u003e\u003cp\u003eo\tUN Women, UNDP, UNDRR, World Bank, ADB, CARE, Oxfam, JICA, ActionAid và các tổ chức khác liên quan đến giới và quản lý rủi ro thiên tai tại Việt Nam.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb) Nghiên cứu thực địa  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát thực địa được thực hiện nhằm thu thập dữ liệu định tính và định lượng phục vụ phân tích rủi ro khí hậu nhạy cảm giới và xây dựng kế hoạch thích ứng tại 6 xã dự án thuộc TP Hà Nội và tỉnh Hà Nam (huyện Nho Quan – Ninh Bình cũ), cùng hai địa bàn lân cận có nguy cơ thiên tai cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eHoạt động khảo sát bảo đảm sự tham gia và vai trò dẫn dắt của phụ nữ và thanh niên trong toàn bộ quá trình thu thập và phân tích dữ liệu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhân tích dữ liệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động phân tích dữ liệu trong khuôn khổ Hoạt động “Thanh niên và phụ nữ dẫn dắt quá trình phân tích rủi ro khí hậu nhạy cảm giới và xây dựng kế hoạch thích ứng địa phương” được thực hiện theo hướng kết hợp định tính và định lượng, bảo đảm cách tiếp cận có sự tham gia và lồng ghép giới. Quá trình phân tích không chỉ nhằm xác định mức độ rủi ro mà còn làm rõ các yếu tố quyền lực, vai trò giới và khả năng tiếp cận nguồn lực của các nhóm trong cộng đồng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNội dung phân tích dữ liệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhân tích tập trung vào các nhóm nội dung chính sau:\u003c/p\u003e\u003cp\u003e1.\tXác định và xếp hạng rủi ro khí hậu chủ yếu tại địa phương\u003c/p\u003e\u003cp\u003eo\tLoại hình thiên tai thường gặp (ngập lụt, mưa lớn, nắng nóng, xâm nhập mặn…)\u003c/p\u003e\u003cp\u003eo\tTần suất, mức độ ảnh hưởng và xu hướng thay đổi\u003c/p\u003e\u003cp\u003e2.\tPhân tích tác động theo giới và độ tuổi\u003c/p\u003e\u003cp\u003eo\tẢnh hưởng đến sinh kế, sức khỏe, việc làm và an sinh xã hội\u003c/p\u003e\u003cp\u003eo\tNguy cơ gia tăng bạo lực giới hoặc bất bình đẳng sau thiên tai\u003c/p\u003e\u003cp\u003eo\tKhả năng tiếp cận dịch vụ công và hỗ trợ khẩn cấp\u003c/p\u003e\u003cp\u003e3.\tĐánh giá năng lực thích ứng của cộng đồng\u003c/p\u003e\u003cp\u003eo\tHệ thống cảnh báo sớm và mức độ tiếp cận thông tin\u003c/p\u003e\u003cp\u003eo\tVai trò của phụ nữ và thanh niên trong đội xung kích PCTT\u003c/p\u003e\u003cp\u003eo\tMạng lưới hỗ trợ xã hội và nguồn lực cộng đồng\u003c/p\u003e\u003cp\u003e4.\tĐánh giá mức độ lồng ghép giới trong kế hoạch và cơ chế địa phương\u003c/p\u003e\u003cp\u003eo\tTỷ lệ phụ nữ tham gia ban chỉ huy PCTT\u003c/p\u003e\u003cp\u003eo\tSự hiện diện của nội dung giới trong kế hoạch PCTT cấp xã\u003c/p\u003e\u003cp\u003eo\tNgân sách và hoạt động đào tạo có nhạy cảm giới hay không\u003c/p\u003e\u003cp\u003e5.\tXác định khoảng trống và đề xuất ưu tiên hành động\u003c/p\u003e\u003cp\u003eo\tKhoảng trống về chính sách, năng lực, nguồn lực\u003c/p\u003e\u003cp\u003eo\tGiải pháp thích ứng ưu tiên do phụ nữ và thanh niên đề xuất\u003c/p\u003e\u003cp\u003eo\tCơ chế tích hợp kế hoạch thích ứng vào kế hoạch phát triển địa phương\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eKết quả phân tích sẽ được hệ thống hóa thành báo cáo phân tích rủi ro khí hậu nhạy cảm giới và là cơ sở trực tiếp để xây dựng kế hoạch thích ứng địa phương do phụ nữ và thanh niên dẫn dắt, góp phần thực hiện mục tiêu của Dự án SIDA.1.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eViết báo cáo phân tích rủi ro khí hậu nhạy cảm giới\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBáo cáo phân tích rủi ro khí hậu nhạy cảm giới là sản phẩm tổng hợp quan trọng của Hoạt động 1.3, phản ánh toàn diện kết quả nghiên cứu tài liệu thứ cấp, nghiên cứu thực địa và quá trình phân tích có sự tham gia của phụ nữ và thanh niên. Báo cáo nhằm cung cấp bằng chứng khoa học và thực tiễn để làm cơ sở xây dựng kế hoạch thích ứng địa phương có lồng ghép giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuy trình xây dựng báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuá trình xây dựng báo cáo được thực hiện theo các bước sau:\u003c/p\u003e\u003cp\u003e•\tTổng hợp và làm sạch dữ liệu: Hệ thống hóa dữ liệu định tính và định lượng thu thập từ thảo luận nhóm, phỏng vấn sâu và khảo sát cộng đồng; kiểm tra tính đầy đủ và nhất quán của thông tin.\u003c/p\u003e\u003cp\u003e•\tPhân tích và diễn giải kết quả: Áp dụng khung phân tích rủi ro khí hậu nhạy cảm giới (phơi nhiễm – dễ bị tổn thương – năng lực thích ứng) để xác định các xu hướng chính, khác biệt theo giới và độ tuổi, cũng như các khoảng trống trong cơ chế hiện hành.\u003c/p\u003e\u003cp\u003e•\tTham vấn xác nhận: Tổ chức hội thảo phản hồi tại địa phương với sự tham gia của phụ nữ, thanh niên, đại diện chính quyền và các bên liên quan nhằm xác nhận, bổ sung và hoàn thiện kết quả phân tích.\u003c/p\u003e\u003cp\u003e•\tHoàn thiện và phê duyệt: Chỉnh sửa, hoàn thiện báo cáo trên cơ sở góp ý và trình cơ quan liên quan xem xét, ghi nhận để sử dụng trong quá trình lập kế hoạch thích ứng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả mong đợi\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBáo cáo phân tích rủi ro khí hậu nhạy cảm giới sẽ:\u003c/p\u003e\u003cp\u003e•\tCung cấp cơ sở dữ liệu đáng tin cậy cho việc xây dựng kế hoạch thích ứng cấp xã;\u003c/p\u003e\u003cp\u003e•\tLàm rõ bằng chứng về sự cần thiết tăng cường vai trò phụ nữ và thanh niên trong quản lí rủi ro thiên tai;\u003c/p\u003e\u003cp\u003e•\tHỗ trợ đối thoại chính sách giữa cộng đồng và chính quyền địa phương;\u003c/p\u003e\u003cp\u003e•\tĐóng góp tài liệu tham khảo cho hoạt động chia sẻ học tập trong nước và quốc tế của Dự án SIDA.1.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eViệc hoàn thiện báo cáo không chỉ là bước kỹ thuật mà còn là quá trình trao quyền, giúp phụ nữ và thanh niên nâng cao năng lực phân tích, lập luận và vận động chính sách trong lĩnh vực thích ứng với biến đổi khí hậu và quản lí rủi ro thiên tai.\u003c/p\u003e\u003cp\u003eThời hạn nhận hồ sơ: trước 17h30 ngày 20/4/2026\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:Tc43,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eVai trò và nhiệm vụ của các bên \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActionAid: Chịu trách nhiệm quản lý tổng thể và giám sát việc triển khai hoạt động nghiên cứu, bao gồm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhê duyệt Điều khoản tham chiếu (TOR), kế hoạch thực hiện và ngân sách hoạt động\u003c/p\u003e\u003cp\u003e•\tPhê duyệt lựa chọn tư vấn/nhóm tư vấn thực hiện nghiên cứu\u003c/p\u003e\u003cp\u003e•\tPhê duyệt kế hoạch khảo sát và bộ công cụ thu thập dữ liệu trước khi triển khai thực địa;\u003c/p\u003e\u003cp\u003e•\tHỗ trợ cung cấp thông tin liên quan, tạo điều kiện cho tư vấn tiếp cận đối tượng khảo sát và dữ liệu cần thiết\u003c/p\u003e\u003cp\u003e•\tSắp xếp hậu cần và phối hợp với các đối tác địa phương để triển khai khảo sát thực địa;\u003c/p\u003e\u003cp\u003e•\tXem xét và phê duyệt báo cáo cuối cùng do nhóm tư vấn đệ trình\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNhóm Tư vấn: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003ea) Trưởng nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 10 năm kinh nghiệm làm việc trong lĩnh vực phòng chống thiên tai (PCTT), giảm nhẹ rủi ro thiên tai, giới và phát triển cộng đồng\u003c/p\u003e\u003cp\u003e•\tCó kiến thức chuyên sâu và kinh nghiệm thực tế trong nghiên cứu, đánh giá các dự án phát triển, đặc biệt trong lĩnh vực lồng ghép giới trong PCTT và thích ứng biến đổi khí hậu\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm trưởng nhóm trong các nghiên cứu/đánh giá tương tự ở cấp quốc gia hoặc địa phương\u003c/p\u003e\u003cp\u003e•\tChịu trách nhiệm chính trong việc thiết kế phương pháp nghiên cứu, giám sát thu thập dữ liệu, phân tích và tổng hợp báo cáo\u003c/p\u003e\u003cp\u003eb) Thành viên nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm trong lĩnh vực nghiên cứu, đánh giá hoặc khảo sát phát triển cộng đồng, GNRRTT và bình đẳng giới\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm thực hiện các cuộc khảo sát định tính và định lượng tương tự\u003c/p\u003e\u003cp\u003e•\tHỗ trợ trưởng nhóm trong việc thiết kế công cụ, thu thập dữ liệu, xử lý và phân tích thông tin\u003c/p\u003e\u003cp\u003ec) Trách nhiệm của nhóm tư vấn\u003c/p\u003e\u003cp\u003e•\tNghiên cứu kỹ TOR để xây dựng đề xuất kỹ thuật và ngân sách phù hợp với yêu cầu của dự án\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPhát triển chương trình làm việc chi tiết, kế hoạch khảo sát và công cụ nghiên cứu (bảng hỏi, hướng dẫn phỏng vấn, v.v.) để trình ActionAid phê duyệt trước khi thực hiện\u003c/strong\u003e\u003c/p\u003
