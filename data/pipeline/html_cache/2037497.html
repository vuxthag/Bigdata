frontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em v"])</script><script>self.__next_f.push([1,"à các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai24:T260c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMục tiêu chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGóp phần tăng cường vai trò nòng cốt của phụ nữ và thanh niên trong xây dựng năng lực chống chịu của cộng đồng thông qua việc thúc đẩy các giải pháp thích ứng với biến đổi khí hậu và quản lý rủi ro thiên tai theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu cụ thể:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tThúc đẩy sự tham gia thực chất và vai trò lãnh đạo của phụ nữ và thanh niên trong quản lý rủi ro thiên tai và thích ứng với biến đổi khí hậu theo hướng lồng ghép giới.\u003c/p\u003e\u003cp\u003e2.\tNâng cao năng lực chống chịu của cộng đồng trước thiên tai và biến đổi khí hậu với sự dẫn dắt của phụ nữ, thanh niên và các tổ chức xã hội tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCộng đồng, phụ nữ và thanh niên được nâng cao năng lực về thích ứng với biến đổi khí hậu, quản lý rủi ro thiên tai và phòng, chống bạo lực trên cơ sở giới theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e•\tVai trò lãnh đạo và sự tham gia của Hội Phụ nữ, Đoàn Thanh niên trong đánh giá rủi ro và xây dựng, thực hiện kế hoạch ứng phó tại địa phương được tăng cường.\u003c/p\u003e\u003cp\u003e•\tCác tài liệu hướng dẫn, mô hình thực hành tốt và kết quả dự án được trao đổi, phổ biến và chia sẻ trong nước và quốc tế về giảm nhẹ rủi ro thiên tai và thích ứng với biến đổi khí hậu lồng ghép giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCác sáng kiến phòng, chống thiên tai quy mô nhỏ được triển khai, góp phần tăng cường khả năng thích ứng với biến đổi khí hậu và bảo vệ hệ sinh thái địa phương.\u003c/p\u003e\u003cp\u003e•\tCác mô hình sinh kế đa dạng, có khả năng chống chịu với biến đổi khí hậu được phát triển cho các hộ gia đình dễ bị tổn thương, gắn với dịch vụ khuyến nông, chế biến, thị trường và phát huy kiến thức bản địa.\u003c/p\u003e\u003cp\u003e•\tChất lượng dịch vụ tư vấn, hỗ trợ ứng phó thiên tai và truyền thông về phòng, chống bạo lực gia đình, xóa bỏ định kiến giới tại các khu vực bị ảnh hưởng được nâng cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTăng cường năng lực, sự tự tin và vai trò lãnh đạo của phụ nữ trong công tác thiết kế, triển khai và giám sát các sáng kiến giảm nhẹ rủi ro thiên tai (GNRRTT), qua đó thúc đẩy sự tham gia bình đẳng, có ý nghĩa của phụ nữ trong tiến trình ra quyết định tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động hướng tới các kết quả đầu ra chính sau đây: \u003c/p\u003e\u003cp\u003e•\tBộ tài liệu tập huấn được soạn thảo và giới thiệu cho Mô-đun 1 - Thiết kế, triển khai và giám sát sáng kiến giảm thiểu rủi ro thiên tai do phụ nữ khởi xướng\u003c/p\u003e\u003cp\u003e•\t04 khóa tập huấn đào tạo giảng viên nguồn (ToT), mỗi khóa kéo dài 02 ngày, được tổ chức cho các thành viên nòng cốt của Hội Phụ nữ cấp huyện, cấp xã với tối đa 30 học viên mỗi khóa.\u003c/p\u003e\u003cp\u003e•\t120 học viên được trang bị kiến thức và kỹ năng thực hành về:\u003c/p\u003e\u003cp\u003e-\tĐiều kiện và quy định tham gia sáng kiến giảm thiểu rủi ro thiên tai\u003c/p\u003e\u003cp\u003e-\tQuy trình nộp hồ sơ đăng ký tham gia sáng kiến\u003c/p\u003e\u003cp\u003e-\tPhương pháp xây dựng bản đề xuất (concept note) tiêu chuẩn cho sáng kiến giảm thiểu rủi ro thiên tai;\u003c/p\u003e\u003cp\u003e-\tKỹ năng theo dõi, đánh giá và báo cáo tác động của các sáng kiến\u003c/p\u003e\u003cp\u003e•\tThảo luận và thống nhất tỷ lệ đóng góp phù hợp giữa cộng đồng hưởng lợi và chính quyền địa phương trong quá trình triển khai sangsk kiến. Dự kiến, dự án hỗ trợ 70% kinh phí, phần còn lại do cộng đồng và chính quyền địa phương đóng góp.\u003c/p\u003e\u003cp\u003e•\tNgoài ra, học viên được hướng dẫn và kết nối với các công cụ, cơ chế tài chính sẵn có ở cấp tỉnh và địa phương, nhằm tiếp cận các nguồn tài chính ưu đãi hoặc bổ sung để thực hiện các sáng kiến GNRRTT.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhương pháp và quy trình thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea) Phương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTập huấn được triển khai dựa trên phương pháp đào tạo có sự tham gia, lấy người học làm trung tâm, đảm bảo sự chủ động, bình đẳng và chia sẻ kinh nghiệm giữa các học viên. Phương pháp này khuyến khích phụ nữ không chỉ tiếp nhận kiến thức mà còn thực hành, phản hồi và đóng góp ý tưởng để thiết kế các sáng kiến phù hợp với bối cảnh địa phương. Một số nguyên tắc và phương pháp chính được áp dụng:\u003c/p\u003e\u003cp\u003e•\tLấy học viên làm trung tâm: Học viên được khuyến khích tham gia thảo luận, chia sẻ kinh nghiệm và đưa ra giải pháp sáng tạo.\u003c/p\u003e\u003cp\u003e•\tKết hợp lý thuyết và thực hành: Mỗi nội dung đều có phần minh họa, ví dụ thực tế và bài tập nhóm để học viên áp dụng ngay kiến thức đã học.\u003c/p\u003e\u003cp\u003e•\tHọc qua trải nghiệm: Sử dụng các tình huống mô phỏng, bài tập thực hành và phản hồi từ chuyên gia giúp học viên củng cố kỹ năng và tự tin hơn trong vai trò khởi xướng và lãnh đạo.\u003c/p\u003e\u003cp\u003e•\tTăng cường trao đổi đa chiều: Kết nối giữa phụ nữ, cán bộ chính quyền, chuyên gia và các bên liên quan để thúc đẩy sự hiểu biết, hợp tác và đồng thuận trong thực hiện các sáng kiến WDIs.\u003c/p\u003e\u003cp\u003e•\tNhạy cảm giới và lồng ghép bình đẳng giới: Toàn bộ nội dung và phương pháp tập huấn đều được thiết kế đảm bảo không định kiến giới, khuyến khích sự tham gia bình đẳng và tiếng nói của phụ nữ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb) Quy trình thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuy trình tổ chức và triển khai các khóa tập huấn được thực hiện theo các bước sau:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 1. Soạn thảo và hoàn thiện bộ tài liệu tập huấn: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng khung nội dung Mô-đun 1 phù hợp với mục tiêu dự án và bối cảnh địa phương.\u003c/p\u003e\u003cp\u003e•\tSoạn thảo tài liệu hướng dẫn, bài trình bày, biểu mẫu concept note, công cụ giám sát và đánh giá.\u003c/p\u003e\u003cp\u003e•\tLồng ghép giới, hòa nhập xã hội và nguyên tắc bảo vệ trong toàn bộ bộ tài liệu.\u003c/p\u003e\u003cp\u003e•\tTham vấn các bên liên quan và hoàn thiện bộ tài liệu trước khi triển khai tập huấn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 2. Chuẩn bị và xây dựng kế hoạch tập huấn: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXác định địa điểm, thời gian, đối tượng tham gia, giảng viên và hình thức tổ chức tập huấn.\u003c/p\u003e\u003cp\u003e•\tHoàn thiện bộ tiêu chí xét chọn và quy định tham gia sáng kiến GNRRTT.\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch tổ chức chi tiết cho từng khóa tập huấn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 3. Lựa chọn học viên và thông báo tham dự: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp với Hội Phụ nữ, chính quyền địa phương và nhóm cộng đồng để đề cử thành viên nòng cốt tham gia.\u003c/p\u003e\u003cp\u003e•\tGửi thư mời, chương trình tập huấn và hướng dẫn chuẩn bị trước cho học viên.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 4. Tổ chức các khóa tập huấn (04 khóa): \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổ chức 04 khóa tập huấn tại các địa bàn dự án, mỗi khóa 02 ngày, theo chương trình đã thống nhất.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo giảng viên và chuyên gia phối hợp chặt chẽ với cán bộ dự án để hỗ trợ học viên trong quá trình học và thực hành.\u003c/p\u003e\u003cp\u003e•\tThu thập phản hồi học viên sau mỗi khóa để điều chỉnh nội dung và phương pháp phù hợp hơn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 5. Hỗ trợ sau tập huấn: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ kỹ thuật cho học viên trong xây dựng đề xuất sáng kiến GNRRTT tại địa phương.\u003c/p\u003e\u003cp\u003e•\tKết nối học viên với các cơ quan, tổ chức, quỹ và nguồn lực tài chính để triển khai sáng kiến.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, giám sát và đánh giá việc áp dụng kiến thức vào thực tiễn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 6. Tổng kết và rút kinh nghiệm: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổ chức họp tổng kết sau khi hoàn thành 04 khóa tập huấn để đánh giá kết quả, chia sẻ bài học kinh nghiệm và đề xuất khuyến nghị cho giai đoạn tiếp theo.\u003c/p\u003e\u003cp\u003e•\tXây dựng báo cáo tổng hợp, bao gồm kết quả đầu ra, phản hồi học viên, hình ảnh và các mô hình điển hình tốt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDự kiến: Quý 2 năm 2026\u003c/p\u003e\u003cp\u003e•\tThời gian cụ thể sẽ được thống nhất với các bên liên quan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời hạn nhận hồ sơ: trước 17h30 ngày 20/4/2026\u003c/strong\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em và các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai28:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được "])</script><script>self.__next_f.push([1,"Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em và các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai29:T260c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMục tiêu chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGóp phần tăng cường vai trò nòng cốt của phụ nữ và thanh niên trong xây dựng năng lực chống chịu của cộng đồng thông qua việc thúc đẩy các giải pháp thích ứng với biến đổi khí hậu và quản lý rủi ro thiên tai theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu cụ thể:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tThúc đẩy sự tham gia thực chất và vai trò lãnh đạo của phụ nữ và thanh niên trong quản lý rủi ro thiên tai và thích ứng với biến đổi khí hậu theo hướng lồng ghép giới.\u003c/p\u003e\u003cp\u003e2.\tNâng cao năng lực chống chịu của cộng đồng trước thiên tai và biến đổi khí hậu với sự dẫn dắt của phụ nữ, thanh niên và các tổ chức xã hội tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCộng đồng, phụ nữ và thanh niên được nâng cao năng lực về thích ứng với biến đổi khí hậu, quản lý rủi ro thiên tai và phòng, chống bạo lực trên cơ sở giới theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e•\tVai trò lãnh đạo và sự tham gia của Hội Phụ nữ, Đoàn Thanh niên trong đánh giá rủi ro và xây dựng, thực hiện kế hoạch ứng phó tại địa phương được tăng cường.\u003c/p\u003e\u003cp\u003e•\tCác tài liệu hướng dẫn, mô hình thực hành tốt và kết quả dự án được trao đổi, phổ biến và chia sẻ trong nước và quốc tế về giảm nhẹ rủi ro thiên tai và thích ứng với biến đổi khí hậu lồng ghép giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCác sáng kiến phòng, chống thiên tai quy mô nhỏ được triển khai, góp phần tăng cường khả năng thích ứng với biến đổi khí hậu và bảo vệ hệ sinh thái địa phương.\u003c/p\u003e\u003cp\u003e•\tCác mô hình sinh kế đa dạng, có khả năng chống chịu với biến đổi khí hậu được phát triển cho các hộ gia đình dễ bị tổn thương, gắn với dịch vụ khuyến nông, chế biến, thị trường và phát huy kiến thức bản địa.\u003c/p\u003e\u003cp\u003e•\tChất lượng dịch vụ tư vấn, hỗ trợ ứng phó thiên tai và truyền thông về phòng, chống bạo lực gia đình, xóa bỏ định kiến giới tại các khu vực bị ảnh hưởng được nâng cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTăng cường năng lực, sự tự tin và vai trò lãnh đạo của phụ nữ trong công tác thiết kế, triển khai và giám sát các sáng kiến giảm nhẹ rủi ro thiên tai (GNRRTT), qua đó thúc đẩy sự tham gia bình đẳng, có ý nghĩa của phụ nữ trong tiến trình ra quyết định tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động hướng tới các kết quả đầu ra chính sau đây: \u003c/p\u003e\u003cp\u003e•\tBộ tài liệu tập huấn được soạn thảo và giới thiệu cho Mô-đun 1 - Thiết kế, triển khai và giám sát sáng kiến giảm thiểu rủi ro thiên tai do phụ nữ khởi xướng\u003c/p\u003e\u003cp\u003e•\t04 khóa tập huấn đào tạo giảng viên nguồn (ToT), mỗi khóa kéo dài 02 ngày, được tổ chức cho các thành viên nòng cốt của Hội Phụ nữ cấp huyện, cấp xã với tối đa 30 học viên mỗi khóa.\u003c/p\u003e\u003cp\u003e•\t120 học viên được trang bị kiến thức và kỹ năng thực hành về:\u003c/p\u003e\u003cp\u003e-\tĐiều kiện và quy định tham gia sáng kiến giảm thiểu rủi ro thiên tai\u003c/p\u003e\u003cp\u003e-\tQuy trình nộp hồ sơ đăng ký tham gia sáng kiến\u003c/p\u003e\u003cp\u003e-\tPhương pháp xây dựng bản đề xuất (concept note) tiêu chuẩn cho sáng kiến giảm thiểu rủi ro thiên tai;\u003c/p\u003e\u003cp\u003e-\tKỹ năng theo dõi, đánh giá và báo cáo tác động của các sáng kiến\u003c/p\u003e\u003cp\u003e•\tThảo luận và thống nhất tỷ lệ đóng góp phù hợp giữa cộng đồng hưởng lợi và chính quyền địa phương trong quá trình triển khai sangsk kiến. Dự kiến, dự án hỗ trợ 70% kinh phí, phần còn lại do cộng đồng và chính quyền địa phương đóng góp.\u003c/p\u003e\u003cp\u003e•\tNgoài ra, học viên được hướng dẫn và kết nối với các công cụ, cơ chế tài chính sẵn có ở cấp tỉnh và địa phương, nhằm tiếp cận các nguồn tài chính ưu đãi hoặc bổ sung để thực hiện các sáng kiến GNRRTT.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhương pháp và quy trình thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea) Phương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTập huấn được triển khai dựa trên phương pháp đào tạo có sự tham gia, lấy người học làm trung tâm, đảm bảo sự chủ động, bình đẳng và chia sẻ kinh nghiệm giữa các học viên. Phương pháp này khuyến khích phụ nữ không chỉ tiếp nhận kiến thức mà còn thực hành, phản hồi và đóng góp ý tưởng để thiết kế các sáng kiến phù hợp với bối cảnh địa phương. Một số nguyên tắc và phương pháp chính được áp dụng:\u003c/p\u003e\u003cp\u003e•\tLấy học viên làm trung tâm: Học viên được khuyến khích tham gia thảo luận, chia sẻ kinh nghiệm và đưa ra giải pháp sáng tạo.\u003c/p\u003e\u003cp\u003e•\tKết hợp lý thuyết và thực hành: Mỗi nội dung đều có phần minh họa, ví dụ thực tế và bài tập nhóm để học viên áp dụng ngay kiến thức đã học.\u003c/p\u003e\u003cp\u003e•\tHọc qua trải nghiệm: Sử dụng các tình huống mô phỏng, bài tập thực hành và phản hồi từ chuyên gia giúp học viên củng cố kỹ năng và tự tin hơn trong vai trò khởi xướng và lãnh đạo.\u003c/p\u003e\u003cp\u003e•\tTăng cường trao đổi đa chiều: Kết nối giữa phụ nữ, cán bộ chính quyền, chuyên gia và các bên liên quan để thúc đẩy sự hiểu biết, hợp tác và đồng thuận trong thực hiện các sáng kiến WDIs.\u003c/p\u003e\u003cp\u003e•\tNhạy cảm giới và lồng ghép bình đẳng giới: Toàn bộ nội dung và phương pháp tập huấn đều được thiết kế đảm bảo không định kiến giới, khuyến khích sự tham gia bình đẳng và tiếng nói của phụ nữ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb) Quy trình thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eQuy trình tổ chức và triển khai các khóa tập huấn được thực hiện theo các bước sau:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 1. Soạn thảo và hoàn thiện bộ tài liệu tập huấn: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng khung nội dung Mô-đun 1 phù hợp với mục tiêu dự án và bối cảnh địa phương.\u003c/p\u003e\u003cp\u003e•\tSoạn thảo tài liệu hướng dẫn, bài trình bày, biểu mẫu concept note, công cụ giám sát và đánh giá.\u003c/p\u003e\u003cp\u003e•\tLồng ghép giới, hòa nhập xã hội và nguyên tắc bảo vệ trong toàn bộ bộ tài liệu.\u003c/p\u003e\u003cp\u003e•\tTham vấn các bên liên quan và hoàn thiện bộ tài liệu trước khi triển khai tập huấn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 2. Chuẩn bị và xây dựng kế hoạch tập huấn: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXác định địa điểm, thời gian, đối tượng tham gia, giảng viên và hình thức tổ chức tập huấn.\u003c/p\u003e\u003cp\u003e•\tHoàn thiện bộ tiêu chí xét chọn và quy định tham gia sáng kiến GNRRTT.\u003c/p\u003e\u003cp\u003e•\tXây dựng kế hoạch tổ chức chi tiết cho từng khóa tập huấn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 3. Lựa chọn học viên và thông báo tham dự: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tPhối hợp với Hội Phụ nữ, chính quyền địa phương và nhóm cộng đồng để đề cử thành viên nòng cốt tham gia.\u003c/p\u003e\u003cp\u003e•\tGửi thư mời, chương trình tập huấn và hướng dẫn chuẩn bị trước cho học viên.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 4. Tổ chức các khóa tập huấn (04 khóa): \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổ chức 04 khóa tập huấn tại các địa bàn dự án, mỗi khóa 02 ngày, theo chương trình đã thống nhất.\u003c/p\u003e\u003cp\u003e•\tĐảm bảo giảng viên và chuyên gia phối hợp chặt chẽ với cán bộ dự án để hỗ trợ học viên trong quá trình học và thực hành.\u003c/p\u003e\u003cp\u003e•\tThu thập phản hồi học viên sau mỗi khóa để điều chỉnh nội dung và phương pháp phù hợp hơn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 5. Hỗ trợ sau tập huấn: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tHỗ trợ kỹ thuật cho học viên trong xây dựng đề xuất sáng kiến GNRRTT tại địa phương.\u003c/p\u003e\u003cp\u003e•\tKết nối học viên với các cơ quan, tổ chức, quỹ và nguồn lực tài chính để triển khai sáng kiến.\u003c/p\u003e\u003cp\u003e•\tTheo dõi, giám sát và đánh giá việc áp dụng kiến thức vào thực tiễn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBước 6. Tổng kết và rút kinh nghiệm: \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổ chức họp tổng kết sau khi hoàn thành 04 khóa tập huấn để đánh giá kết quả, chia sẻ bài học kinh nghiệm và đề xuất khuyến nghị cho giai đoạn tiếp theo.\u003c/p\u003e\u003cp\u003e•\tXây dựng báo cáo tổng hợp, bao gồm kết quả đầu ra, phản hồi học viên, hình ảnh và các mô hình điển hình tốt.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời gian thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tDự kiến: Quý 2 năm 2026\u003c/p\u003e\u003cp\u003e•\tThời gian cụ thể sẽ được thống nhất với các bên liên quan\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời hạn nhận hồ sơ: trước 17h30 ngày 20/4/2026\u003c/strong\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:{\"skillName\":\"Nghiên Cứu Học Thuật\",\"skillId\":741636,\"skillWeight\":100,\"isExisted\":false}\n2c:{\"skillName\":\"Phát Triển Cộng Đồng\",\"skillId\":920544,\"skillWeight\":100,\"isExisted\":false}\n2d:{\"skillName\":\"Phòng Chống Thiên Tai\",\"skillId\":471115,\"skillWeight\":100,\"isExisted\":false}\n2e:{\"skillName\":\"Training\",\"skillId\":109,\"skillWeight\":100,\"isExisted\":false}\n2f:{\"skillName\":\"Điều Phối Tập Huấn\",\"skillId\":742384,\"skillWeight\":100,\"isExisted\":false}\n2a:[\"$2b\",\"$2c\",\"$2d\",\"$2e\",\"$2f\"]\n31:{\"benefitId\":15,\"benefitIconName\":\"fa-check-square-o\",\"benefitName\":\"Others\",\"benefitNameVI\":\"Khác\",\"benefitValue\":\"Theo chính sách của Công ty.\"}\n30:[\"$31\"]\n34:{\"lat\":21.027764,\"lon\":105.83416}\n33:{\"workingLocationId\":133159,\"addressId\":774,\"cityId\":24,\"districtId\":0,\"address\":\"Hà Nội, Vietnam\",\"geoLoc\":\"$34\",\"cityName\":\"Ha Noi\",\"cityNameVI\":\"Hà Nội\"}\n36:{\"lat\":0,\"lon\":0}\n35:{\"workingLocationId\":245210,\"addressId\":151229,\"cityId\":42,\"districtId\":0,\"address\":\"Ninh Bìn
