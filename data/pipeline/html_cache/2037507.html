của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em v"])</script><script>self.__next_f.push([1,"à các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai24:T3773,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMục tiêu chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGóp phần tăng cường vai trò nòng cốt của phụ nữ và thanh niên trong xây dựng năng lực chống chịu của cộng đồng thông qua việc thúc đẩy các giải pháp thích ứng với biến đổi khí hậu và quản lý rủi ro thiên tai theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu cụ thể:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tThúc đẩy sự tham gia thực chất và vai trò lãnh đạo của phụ nữ và thanh niên trong quản lý rủi ro thiên tai và thích ứng với biến đổi khí hậu theo hướng lồng ghép giới.\u003c/p\u003e\u003cp\u003e2.\tNâng cao năng lực chống chịu của cộng đồng trước thiên tai và biến đổi khí hậu với sự dẫn dắt của phụ nữ, thanh niên và các tổ chức xã hội tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCộng đồng, phụ nữ và thanh niên được nâng cao năng lực về thích ứng với biến đổi khí hậu, quản lý rủi ro thiên tai và phòng, chống bạo lực trên cơ sở giới theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e•\tVai trò lãnh đạo và sự tham gia của Hội Phụ nữ, Đoàn Thanh niên trong đánh giá rủi ro và xây dựng, thực hiện kế hoạch ứng phó tại địa phương được tăng cường.\u003c/p\u003e\u003cp\u003e•\tCác tài liệu hướng dẫn, mô hình thực hành tốt và kết quả dự án được trao đổi, phổ biến và chia sẻ trong nước và quốc tế về giảm nhẹ rủi ro thiên tai và thích ứng với biến đổi khí hậu lồng ghép giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCác sáng kiến phòng, chống thiên tai quy mô nhỏ được triển khai, góp phần tăng cường khả năng thích ứng với biến đổi khí hậu và bảo vệ hệ sinh thái địa phương.\u003c/p\u003e\u003cp\u003e•\tCác mô hình sinh kế đa dạng, có khả năng chống chịu với biến đổi khí hậu được phát triển cho các hộ gia đình dễ bị tổn thương, gắn với dịch vụ khuyến nông, chế biến, thị trường và phát huy kiến thức bản địa.\u003c/p\u003e\u003cp\u003e•\tChất lượng dịch vụ tư vấn, hỗ trợ ứng phó thiên tai và truyền thông về phòng, chống bạo lực gia đình, xóa bỏ định kiến giới tại các khu vực bị ảnh hưởng được nâng cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKhảo sát đầu kì\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát đầu kỳ là hoạt động bắt buộc trong hệ thống Theo dõi – Đánh giá – Học hỏi và Giải trình (MEAL) của ActionAid nhằm thiết lập đường cơ sở cho các chỉ số kết quả, phục vụ đo lường tiến độ, kết quả và tác động của dự án; đồng thời cung cấp bằng chứng cho việc điều chỉnh chiến lược can thiệp và thiết kế hoạt động phù hợp với bối cảnh địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát đầu kỳ nhằm thiết lập bộ số liệu cơ sở phản ánh một cách toàn diện thực trạng năng lực quản lý rủi ro thiên tai, mức độ chống chịu với biến đổi khí hậu, vai trò lãnh đạo và sự tham gia của phụ nữ và thanh niên, cũng như mức độ lồng ghép giới và phòng, chống bạo lực trên cơ sở giới trong công tác phòng chống thiên tai tại các địa bàn dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBộ số liệu này sẽ làm căn cứ so sánh để đo lường sự thay đổi trong suốt vòng đời dự án, phục vụ theo dõi tiến độ, đánh giá kết quả và tác động, đồng thời hỗ trợ ActionAid và các đối tác điều chỉnh chiến lược can thiệp nhằm bảo đảm tính hiệu quả, công bằng giới và bền vững của các hoạt động dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu cụ thể\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tĐánh giá kiến thức, thái độ và thực hành (KAP) của cộng đồng, đặc biệt là phụ nữ và thanh niên, về phòng chống thiên tai, thích ứng với biến đổi khí hậu và bình đẳng giới, nhằm xác định mức độ nhận thức hiện tại, các hành vi ứng phó phổ biến, cũng như các khoảng trống về kỹ năng và thông tin cần được ưu tiên can thiệp trong dự án.\u003c/p\u003e\u003cp\u003e2.\tXác định mức độ tham gia và vai trò lãnh đạo của phụ nữ và thanh niên trong các cơ chế ra quyết định, quá trình lập kế hoạch, tổ chức thực hiện và giám sát các hoạt động phòng chống thiên tai ở cấp cộng đồng, qua đó làm rõ những rào cản về thể chế, văn hóa – xã hội và cơ hội thúc đẩy sự tham gia thực chất của các nhóm này.\u003c/p\u003e\u003cp\u003e3.\tĐánh giá năng lực của chính quyền địa phương và các tổ chức xã hội trong việc áp dụng phương pháp quản lý rủi ro thiên tai có lồng ghép giới, dựa trên sự tham gia và tiếp cận quyền con người, bao gồm năng lực lập kế hoạch, điều phối liên ngành, huy động cộng đồng và tích hợp các vấn đề giới, thanh niên và bảo vệ trong các chính sách và chương trình địa phương.\u003c/p\u003e\u003cp\u003e4.\tThiết lập giá trị đường cơ sở cho các chỉ số kết quả trong khung logic và hệ thống MEAL của dự án, bảo đảm dữ liệu được phân tách theo giới, độ tuổi và nhóm xã hội, phục vụ đo lường tiến độ thực hiện, đánh giá hiệu quả can thiệp và báo cáo với nhà tài trợ và các bên liên quan.\u003c/p\u003e\u003cp\u003e5.\tĐề xuất các khuyến nghị thực tiễn và khả thi, dựa trên bằng chứng khảo sát, nhằm cải thiện thiết kế hoạt động, phương pháp triển khai và cơ chế phối hợp giữa ActionAid, chính quyền địa phương, tổ chức xã hội và cộng đồng, bảo đảm dự án đáp ứng đúng nhu cầu thực tế và thúc đẩy chuyển đổi bền vững, nhạy cảm giới trong quản lý rủi ro thiên tai và thích ứng với biến đổi khí hậu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNội dung khảo sát đầu kỳ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát đầu kỳ sẽ tập trung vào các nhóm nội dung chính sau:\u003c/p\u003e\u003cp\u003e•\tĐánh giá năng lực quản lý rủi ro thiên tai và khả năng chống chịu khí hậu của cộng đồng, bao gồm mức độ nhận diện rủi ro, hệ thống cảnh báo sớm, cơ chế ứng phó, kế hoạch phòng ngừa – phục hồi và mức độ tiếp cận thông tin, dịch vụ hỗ trợ tại địa phương.\u003c/p\u003e\u003cp\u003e•\tPhân tích mức độ tham gia và vai trò lãnh đạo của phụ nữ và thanh niên trong các cấu trúc quản lý rủi ro thiên tai, cơ chế ra quyết định và triển khai hoạt động ở cấp cộng đồng; đồng thời xác định các rào cản thể chế, xã hội và cơ hội thúc đẩy sự tham gia thực chất của các nhóm này.\u003c/p\u003e\u003cp\u003e•\tĐánh giá mức độ lồng ghép giới và phòng, chống bạo lực trên cơ sở giới (GBV) trong các kế hoạch, chính sách và thực hành phòng chống thiên tai – thích ứng với biến đổi khí hậu, bao gồm mức độ nhận diện nhóm dễ bị tổn thương, cơ chế bảo vệ, tiếp cận dịch vụ hỗ trợ và các khoảng trống chính sách – thực tiễn.\u003c/p\u003e\u003cp\u003e•\tĐánh giá năng lực của chính quyền địa phương và các tổ chức xã hội trong phối hợp liên ngành, sử dụng dữ liệu và triển khai phương pháp quản lý rủi ro thiên tai dựa trên bằng chứng, có sự tham gia và nhạy cảm giới; khả năng tích hợp rủi ro khí hậu vào kế hoạch phát triển kinh tế – xã hội và chương trình ngành.\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eXác định các nhu cầu ưu tiên, cơ hội can thiệp và mô hình sáng kiến cộng đồng tiềm năng\u003c/strong\u003e, đặc biệt là các sáng kiến do phụ nữ và thanh niên dẫn dắt nhằm tăng cường khả năng chống chịu, giảm rủi ro thiên tai và thúc đẩy bình đẳng giới tại các địa bàn dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát đầu kỳ của Dự án SIDA.1 sẽ áp dụng phương pháp hỗn hợp (mixed-methods), kết hợp nghiên cứu tài liệu, thu thập dữ liệu sơ cấp – thứ cấp và phân tích định tính – định lượng nhằm bảo đảm bộ dữ liệu nền đầy đủ, khách quan và có giá trị sử dụng lâu dài cho theo dõi – đánh giá và học hỏi dự án. Các bước triển khai cụ thể như sau:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea) Rà soát và phân tích tài liệu thứ cấp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTư vấn sẽ nghiên cứu các tài liệu hiện có của dự án và các nguồn thông tin liên quan ở cấp bộ/ngành, tỉnh, và xã, bao gồm nhưng không giới hạn ở:\u003c/p\u003e\u003cp\u003e•\tHồ sơ thiết kế và tài liệu nền của Dự án SIDA.1.\u003c/p\u003e\u003cp\u003e•\tBáo cáo KT–XH của các địa phương dự án giai đoạn 2023–2025.\u003c/p\u003e\u003cp\u003e•\tKế hoạch phòng chống thiên tai và tìm kiếm cứu nạn cấp tỉnh/xã.\u003c/p\u003e\u003cp\u003e•\tSố liệu và báo cáo về thiên tai, khí hậu, rủi ro và tác động tại địa phương.\u003c/p\u003e\u003cp\u003e•\tCác nghiên cứu và tài liệu về quản lý rủi ro thiên tai, thích ứng với BĐKH, bình đẳng giới và phòng chống bạo lực trên cơ sở giới.\u003c/p\u003e\u003cp\u003e•\tCác văn bản pháp luật, chính sách mới ban hành liên quan đến khí hậu, giới, phòng chống bạo lực gia đình và quản lý rủi ro thiên tai trong 3 năm gần đây.\u003c/p\u003e\u003cp\u003eKết quả rà soát sẽ giúp xác định khoảng trống thông tin và xây dựng khung khảo sát phù hợp với mục tiêu dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb) Xây dựng kế hoạch và bộ công cụ khảo sát\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTư vấn sẽ xây dựng kế hoạch tổng thể khảo sát đầu kỳ, bao gồm:\u003c/p\u003e\u003cp\u003e•\tPhương pháp tiếp cận tổng thể và logic khảo sát phù hợp với khung MEAL của ActionAid.\u003c/p\u003e\u003cp\u003e•\tKế hoạch thu thập dữ liệu sơ cấp và thứ cấp.\u003c/p\u003e\u003cp\u003e•\tPhương pháp lấy mẫu, cỡ mẫu và cơ cấu mẫu theo giới, độ tuổi, dân tộc và nhóm xã hội.\u003c/p\u003e\u003cp\u003e•\tBộ công cụ thu thập dữ liệu, bao gồm:\u003c/p\u003e\u003cp\u003eo\tBảng hỏi định lượng cho hộ gia đình và cá nhân (phụ nữ, nam giới, thanh niên).\u003c/p\u003e\u003cp\u003eo\tHướng dẫn thảo luận nhóm cho cộng đồng, nhóm phụ nữ, thanh niên, người dễ bị tổn thương.\u003c/p\u003e\u003cp\u003eo\tHướng dẫn phỏng vấn sâu cho chính quyền địa phương, tổ chức đoàn thể, cán bộ phòng chống thiên tai, tổ chức xã hội và các bên liên quan.\u003c/p\u003e\u003cp\u003eo\tBiểu mẫu quan sát và ghi nhận thực địa.\u003c/p\u003e\u003cp\u003eTư vấn sẽ họp thống nhất kế hoạch và công cụ với ActionAid và các đối tác trước khi hoàn thiện và triển khai.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ec) Thu thập dữ liệu sơ cấp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDữ liệu sơ cấp sẽ được thu thập với sự phối hợp của các đối tác địa phương và giám sát kỹ thuật bởi ActionAid, bao gồm:\u003c/p\u003e\u003cp\u003e•\tTập huấn điều tra viên và tình nguyện viên địa phương về phương pháp khảo sát, kỹ năng phỏng vấn, nguyên tắc đạo đức nghiên cứu, bình đẳng giới, hòa nhập và bảo vệ đối tượng tham gia.\u003c/p\u003e\u003cp\u003e•\tThảo luận nhóm tập trung (FGD) với các nhóm cộng đồng, phụ nữ, thanh niên và tổ chức xã hội nhằm thu thập dữ liệu định tính về rủi ro, mức độ dễ bị tổn thương, rào cản giới, ưu tiên can thiệp và kỳ vọng hỗ trợ.\u003c/p\u003e\u003cp\u003e•\tPhỏng vấn sâu (KII) với đại diện bộ/ngành, chính quyền địa phương, hội phụ nữ, đoàn thanh niên, ban chỉ huy PCTT, cán bộ xã/phường, tổ chức xã hội và chuyên gia nhằm làm rõ năng lực thể chế, cơ chế phối hợp và các thách thức chính sách – thực tiễn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ed) Quan sát thực địa và tham vấn bổ trợ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTư vấn và nhóm khảo sát sẽ:\u003c/p\u003e\u003cp\u003e•\tGhi nhận điều kiện thực tế về môi trường, hạ tầng, điểm nóng rủi ro thiên tai và các nguồn lực sẵn có tại cộng đồng.\u003c/p\u003e\u003cp\u003e•\tQuan sát hoạt động tổ chức cộng đồng, cơ chế ra quyết định và sự tham gia của phụ nữ, thanh niên trong các hoạt động liên quan đến phòng chống thiên tai.\u003c/p\u003e\u003cp\u003e•\tTham vấn bổ sung với người dân về các thay đổi khí hậu – xã hội và tác động đến đời sống, an toàn và sinh kế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ee) Phân tích dữ liệu và lập báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổng hợp kết quả theo các nhóm nội dung chính: năng lực cộng đồng, vai trò phụ nữ – thanh niên, lồng ghép giới và GBV, năng lực thể chế, nhu cầu ưu tiên và cơ hội can thiệp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tXây dựng Báo cáo khảo sát đầu kỳ (tiếng Việt và tiếng Anh), bao gồm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tCác phát hiện chính và bộ dữ liệu đường cơ sở\u003c/p\u003e\u003cp\u003eo\tPhân tích rủi ro và mức độ dễ bị tổn thương\u003c/p\u003e\u003cp\u003eo\tKhuyến nghị kỹ thuật và chính sách phục vụ thiết kế và triển khai dự án\u003c/p\u003e\u003cp\u003e•\tTrình bày kết quả và lấy ý kiến ActionAid và các bên liên quan trước khi hoàn thiện báo cáo cuối cùng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời hạn nhận hồ sơ: trước 17h30 ngày 20/4/2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T1b43,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQuản lý và phối hợp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActionAid:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAAV chịu trách nhiệm chủ trì kỹ thuật và điều phối tổng thể hoạt động khảo sát đầu kỳ, bao gồm xây dựng khung nghiên cứu, phê duyệt phương pháp và bộ công cụ khảo sát, hướng dẫn lồng ghép giới và nguyên tắc bảo vệ trong toàn bộ quá trình thu thập và phân tích dữ liệu. AAV sẽ giám sát chất lượng triển khai thông qua các cuộc họp kỹ thuật định kỳ với đơn vị tư vấn, tham gia giám sát thực địa chọn mẫu khi cần thiết, và chịu trách nhiệm nghiệm thu các sản phẩm trung gian và cuối cùng theo tiêu chuẩn MEAL của ActionAid và yêu cầu của nhà tài trợ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐối tác địa phương:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCác đối tác địa phương (chính quyền xã/phường, tổ chức đoàn thể, tổ chức cộng đồng) có vai trò hỗ trợ kết nối với cộng đồng, tạo điều kiện tiếp cận các nhóm đối tượng mục tiêu, cung cấp thông tin thứ cấp và phối hợp tổ chức khảo sát thực địa. Đồng thời, đối tác địa phương sẽ tham gia xác minh dữ liệu ban đầu, phản hồi các phát hiện sơ bộ và hỗ trợ phổ biến kết quả khảo sát tại địa bàn nhằm phục vụ cho công tác lập kế hoạch và triển khai dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐơn vị tư vấn/nhóm nghiên cứu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eĐơn vị tư vấn chịu trách nhiệm triển khai toàn bộ hoạt động khảo sát theo ToR đã được phê duyệt, bao gồm thiết kế phương pháp và công cụ, thu thập và phân tích dữ liệu định lượng – định tính, xây dựng báo cáo đầu kỳ và trình bày kết quả cho các bên liên quan. Đơn vị tư vấn đảm bảo tiến độ, chất lượng kỹ thuật, tính chính xác và tính bảo mật của dữ liệu, tuân thủ các nguyên tắc đạo đức nghiên cứu, bảo vệ người tham gia khảo sát và các tiêu chuẩn lồng ghép giới, hòa nhập xã hội và không gây tổn hại (Do No Harm).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYêu cầu đối với đơn vị tư vấn/nhóm nghiên cứu: Đơn vị tư vấn/nhóm nghiên cứu cần đáp ứng các yêu cầu sau:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm trong nghiên cứu xã hội, khảo sát MEAL, đánh giá dự án hoặc nghiên cứu chính sách trong các lĩnh vực biến đổi khí hậu, quản lý rủi ro thiên tai, phát triển cộng đồng và/hoặc bình đẳng giới, ưu tiên các nghiên cứu có phương pháp tiếp cận dựa trên quyền và sự tham gia.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm việc với chính quyền địa phương, tổ chức xã hội và cộng đồng tại Việt Nam, đặc biệt tại các khu vực dễ bị tổn thương do thiên tai và biến đổi khí hậu; hiểu biết về bối cảnh thể chế và văn hóa địa phương là một lợi thế.\u003c/p\u003e\u003cp\u003e•\tCó năng lực phân tích giới, thanh niên và bạo lực trên cơ sở giới (GBV), bao gồm thiết kế công cụ khảo sát nhạy cảm giới, phân tích dữ liệu phân tách theo giới và đề xuất khuyến nghị phù hợp với các nguyên tắc bảo vệ và không gây tổn hại.\u003c/p\u003e\u003cp\u003e•\tĐội ngũ triển khai tối thiểu bao gồm: Trưởng nhóm nghiên cứu, chuyên gia phân tích dữ liệu, và điều tra viên/điều phối viên thực địa, trong đó các thành viên chủ chốt phải được đào tạo về đạo đức nghiên cứu, bảo mật thông tin, bảo vệ người tham gia khảo sát và tiếp cận nhạy cảm giới – hòa nhập xã hội.\u003c/p\u003e\u003cp\u003e•\tCó năng lực xây dựng báo cáo phân tích chất lượng cao bằng tiếng Việt (và tiếng Anh nếu yêu cầu), trình bày rõ ràng, dựa trên bằng chứng và đưa ra khuyến nghị thực tiễn phục vụ thiết kế, điều chỉnh và theo dõi – đánh giá dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNguyên tắc đạo đức, bảo vệ và giải trình\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động khảo sát đầu kỳ phải tuân thủ nghiêm ngặt các nguyên tắc đạo đức nghiên cứu, bảo vệ và giải trình nhằm đảm bảo an toàn, tôn trọng và quyền lợi của tất cả người tham gia, đặc biệt là phụ nữ, trẻ em và các nhóm dễ bị tổn thương. Việc tham gia khảo sát phải hoàn toàn tự nguyện, dựa trên sự đồng thuận được cung cấp đầy đủ thông tin, và người tham gia có quyền từ chối hoặc rút lui khỏi khảo sát bất cứ lúc nào mà không chịu bất kỳ hậu quả bất lợi nào.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eĐơn vị tư vấn có trách nhiệm bảo đảm tính bảo mật và ẩn danh của thông tin cá nhân, dữ liệu thu thập được chỉ được sử dụng cho mục đích nghiên cứu và quản lý dự án, được lưu trữ an toàn theo quy định của ActionAid và pháp luật Việt Nam. Quá trình thu thập và xử lý dữ liệu phải tuân thủ nguyên tắc “Không gây tổn hại” (Do No Harm), tránh gây sang chấn, kỳ thị hoặc rủi ro an toàn cho người tham gia, đặc biệt khi thảo luận về các chủ đề nhạy cảm như bạo lực trên cơ sở giới hoặc thiên tai.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eHoạt động khảo sát phải tuân thủ đầy đủ Chính sách Bảo vệ Trẻ em, Chính sách Phòng chống bóc lột, lạm dụng và quấy rối tình dục (PSEAH) và Khung Safeguarding của ActionAid. Tất cả thành viên nhóm nghiên cứu và điều tra viên phải được tập huấn về safeguarding, ký cam kết tuân thủ các chính sách liên quan, và được trang bị kỹ năng tiếp cận nhạy cảm giới, hòa nhập và an toàn tâm lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eTrong trường hợp phát hiện hoặc người tham gia chia sẻ về bạo lực trên cơ sở giới, nguy cơ xâm hại, bóc lột hoặc các vấn đề bảo vệ khác, nhóm khảo sát phải kích hoạt cơ chế giới thiệu và hỗ trợ an toàn, bao gồm kết nối với các dịch vụ hỗ trợ phù hợp tại địa phương (y tế, tư vấn tâm lý, pháp lý, bảo trợ xã hội), bảo đảm tôn trọng ý chí của người bị ảnh hưởng, bảo mật thông tin và tuân thủ các quy trình báo cáo safeguarding của ActionAid.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiám sát và đánh giá\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCán bộ dự án của ActionAid sẽ trực tiếp tham dự và giám sát tiến độ thực hiện.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em và các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai29:T5b9,ActionAid Quốc tế (AAI), được thành lập năm 1972, là một liên đoàn quốc tế hoạt động chấm dứt đói nghèo và bất công trên toàn thế giới. ActionAid Quốc tế tại Việt Nam (ActionAid) là thành viên của Liên đoàn ActionAid Quốc tế, đã bắt đầu thực hiện các chương trình phát triển tại các khu vực nghèo nhất và xa xôi của Việt Nam kể từ năm 1989. Năm 1992, ActionAid là một trong những tổ chức phi chính phủ quốc tế đầu tiên được "])</script><script>self.__next_f.push([1,"Chính phủ Việt Nam trao giấy phép thành lập văn phòng đại diện tại Việt Nam và liên tục hoạt động trong nước từ đó đến nay. Trong hơn 30 năm qua, ActionAid đã hỗ trợ hơn 60 triệu lượt người trong cả nước, chủ yếu là phụ nữ nghèo, dân tộc thiểu số, người khuyết tật, trẻ em và các đối tác chủ động xây dựng sinh kế, giáo dục và tiếng nói của mình trong các chương trình, chính sách các cấp, hướng đến một tương lai tốt đẹp hơn cho mình và cộng đồng.  Đồng thời, ActionAid là một thành viên của Nhóm Đối tác về Phòng ngừa và Giảm nhẹ Rủi ro Thiên tai – một liên minh các  tổ chức quốc tế làm việc tại Viêt Nam cam kết hợp tác hỗ trợ Việt Nam phòng ngừa và giảm nhẹ rủi ro thiên tai2a:T3773,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eMục tiêu chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eGóp phần tăng cường vai trò nòng cốt của phụ nữ và thanh niên trong xây dựng năng lực chống chịu của cộng đồng thông qua việc thúc đẩy các giải pháp thích ứng với biến đổi khí hậu và quản lý rủi ro thiên tai theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu cụ thể:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tThúc đẩy sự tham gia thực chất và vai trò lãnh đạo của phụ nữ và thanh niên trong quản lý rủi ro thiên tai và thích ứng với biến đổi khí hậu theo hướng lồng ghép giới.\u003c/p\u003e\u003cp\u003e2.\tNâng cao năng lực chống chịu của cộng đồng trước thiên tai và biến đổi khí hậu với sự dẫn dắt của phụ nữ, thanh niên và các tổ chức xã hội tại địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKết quả đầu ra chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCộng đồng, phụ nữ và thanh niên được nâng cao năng lực về thích ứng với biến đổi khí hậu, quản lý rủi ro thiên tai và phòng, chống bạo lực trên cơ sở giới theo hướng nhạy cảm giới.\u003c/p\u003e\u003cp\u003e•\tVai trò lãnh đạo và sự tham gia của Hội Phụ nữ, Đoàn Thanh niên trong đánh giá rủi ro và xây dựng, thực hiện kế hoạch ứng phó tại địa phương được tăng cường.\u003c/p\u003e\u003cp\u003e•\tCác tài liệu hướng dẫn, mô hình thực hành tốt và kết quả dự án được trao đổi, phổ biến và chia sẻ trong nước và quốc tế về giảm nhẹ rủi ro thiên tai và thích ứng với biến đổi khí hậu lồng ghép giới.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eNhóm kết quả đầu ra 1:\u003c/p\u003e\u003cp\u003e•\tCác sáng kiến phòng, chống thiên tai quy mô nhỏ được triển khai, góp phần tăng cường khả năng thích ứng với biến đổi khí hậu và bảo vệ hệ sinh thái địa phương.\u003c/p\u003e\u003cp\u003e•\tCác mô hình sinh kế đa dạng, có khả năng chống chịu với biến đổi khí hậu được phát triển cho các hộ gia đình dễ bị tổn thương, gắn với dịch vụ khuyến nông, chế biến, thị trường và phát huy kiến thức bản địa.\u003c/p\u003e\u003cp\u003e•\tChất lượng dịch vụ tư vấn, hỗ trợ ứng phó thiên tai và truyền thông về phòng, chống bạo lực gia đình, xóa bỏ định kiến giới tại các khu vực bị ảnh hưởng được nâng cao.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKhảo sát đầu kì\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát đầu kỳ là hoạt động bắt buộc trong hệ thống Theo dõi – Đánh giá – Học hỏi và Giải trình (MEAL) của ActionAid nhằm thiết lập đường cơ sở cho các chỉ số kết quả, phục vụ đo lường tiến độ, kết quả và tác động của dự án; đồng thời cung cấp bằng chứng cho việc điều chỉnh chiến lược can thiệp và thiết kế hoạt động phù hợp với bối cảnh địa phương.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát đầu kỳ nhằm thiết lập bộ số liệu cơ sở phản ánh một cách toàn diện thực trạng năng lực quản lý rủi ro thiên tai, mức độ chống chịu với biến đổi khí hậu, vai trò lãnh đạo và sự tham gia của phụ nữ và thanh niên, cũng như mức độ lồng ghép giới và phòng, chống bạo lực trên cơ sở giới trong công tác phòng chống thiên tai tại các địa bàn dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eBộ số liệu này sẽ làm căn cứ so sánh để đo lường sự thay đổi trong suốt vòng đời dự án, phục vụ theo dõi tiến độ, đánh giá kết quả và tác động, đồng thời hỗ trợ ActionAid và các đối tác điều chỉnh chiến lược can thiệp nhằm bảo đảm tính hiệu quả, công bằng giới và bền vững của các hoạt động dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMục tiêu cụ thể\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1.\tĐánh giá kiến thức, thái độ và thực hành (KAP) của cộng đồng, đặc biệt là phụ nữ và thanh niên, về phòng chống thiên tai, thích ứng với biến đổi khí hậu và bình đẳng giới, nhằm xác định mức độ nhận thức hiện tại, các hành vi ứng phó phổ biến, cũng như các khoảng trống về kỹ năng và thông tin cần được ưu tiên can thiệp trong dự án.\u003c/p\u003e\u003cp\u003e2.\tXác định mức độ tham gia và vai trò lãnh đạo của phụ nữ và thanh niên trong các cơ chế ra quyết định, quá trình lập kế hoạch, tổ chức thực hiện và giám sát các hoạt động phòng chống thiên tai ở cấp cộng đồng, qua đó làm rõ những rào cản về thể chế, văn hóa – xã hội và cơ hội thúc đẩy sự tham gia thực chất của các nhóm này.\u003c/p\u003e\u003cp\u003e3.\tĐánh giá năng lực của chính quyền địa phương và các tổ chức xã hội trong việc áp dụng phương pháp quản lý rủi ro thiên tai có lồng ghép giới, dựa trên sự tham gia và tiếp cận quyền con người, bao gồm năng lực lập kế hoạch, điều phối liên ngành, huy động cộng đồng và tích hợp các vấn đề giới, thanh niên và bảo vệ trong các chính sách và chương trình địa phương.\u003c/p\u003e\u003cp\u003e4.\tThiết lập giá trị đường cơ sở cho các chỉ số kết quả trong khung logic và hệ thống MEAL của dự án, bảo đảm dữ liệu được phân tách theo giới, độ tuổi và nhóm xã hội, phục vụ đo lường tiến độ thực hiện, đánh giá hiệu quả can thiệp và báo cáo với nhà tài trợ và các bên liên quan.\u003c/p\u003e\u003cp\u003e5.\tĐề xuất các khuyến nghị thực tiễn và khả thi, dựa trên bằng chứng khảo sát, nhằm cải thiện thiết kế hoạt động, phương pháp triển khai và cơ chế phối hợp giữa ActionAid, chính quyền địa phương, tổ chức xã hội và cộng đồng, bảo đảm dự án đáp ứng đúng nhu cầu thực tế và thúc đẩy chuyển đổi bền vững, nhạy cảm giới trong quản lý rủi ro thiên tai và thích ứng với biến đổi khí hậu.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNội dung khảo sát đầu kỳ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát đầu kỳ sẽ tập trung vào các nhóm nội dung chính sau:\u003c/p\u003e\u003cp\u003e•\tĐánh giá năng lực quản lý rủi ro thiên tai và khả năng chống chịu khí hậu của cộng đồng, bao gồm mức độ nhận diện rủi ro, hệ thống cảnh báo sớm, cơ chế ứng phó, kế hoạch phòng ngừa – phục hồi và mức độ tiếp cận thông tin, dịch vụ hỗ trợ tại địa phương.\u003c/p\u003e\u003cp\u003e•\tPhân tích mức độ tham gia và vai trò lãnh đạo của phụ nữ và thanh niên trong các cấu trúc quản lý rủi ro thiên tai, cơ chế ra quyết định và triển khai hoạt động ở cấp cộng đồng; đồng thời xác định các rào cản thể chế, xã hội và cơ hội thúc đẩy sự tham gia thực chất của các nhóm này.\u003c/p\u003e\u003cp\u003e•\tĐánh giá mức độ lồng ghép giới và phòng, chống bạo lực trên cơ sở giới (GBV) trong các kế hoạch, chính sách và thực hành phòng chống thiên tai – thích ứng với biến đổi khí hậu, bao gồm mức độ nhận diện nhóm dễ bị tổn thương, cơ chế bảo vệ, tiếp cận dịch vụ hỗ trợ và các khoảng trống chính sách – thực tiễn.\u003c/p\u003e\u003cp\u003e•\tĐánh giá năng lực của chính quyền địa phương và các tổ chức xã hội trong phối hợp liên ngành, sử dụng dữ liệu và triển khai phương pháp quản lý rủi ro thiên tai dựa trên bằng chứng, có sự tham gia và nhạy cảm giới; khả năng tích hợp rủi ro khí hậu vào kế hoạch phát triển kinh tế – xã hội và chương trình ngành.\u003c/p\u003e\u003cp\u003e•\t\u003cstrong\u003eXác định các nhu cầu ưu tiên, cơ hội can thiệp và mô hình sáng kiến cộng đồng tiềm năng\u003c/strong\u003e, đặc biệt là các sáng kiến do phụ nữ và thanh niên dẫn dắt nhằm tăng cường khả năng chống chịu, giảm rủi ro thiên tai và thúc đẩy bình đẳng giới tại các địa bàn dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhương pháp thực hiện\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKhảo sát đầu kỳ của Dự án SIDA.1 sẽ áp dụng phương pháp hỗn hợp (mixed-methods), kết hợp nghiên cứu tài liệu, thu thập dữ liệu sơ cấp – thứ cấp và phân tích định tính – định lượng nhằm bảo đảm bộ dữ liệu nền đầy đủ, khách quan và có giá trị sử dụng lâu dài cho theo dõi – đánh giá và học hỏi dự án. Các bước triển khai cụ thể như sau:\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ea) Rà soát và phân tích tài liệu thứ cấp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTư vấn sẽ nghiên cứu các tài liệu hiện có của dự án và các nguồn thông tin liên quan ở cấp bộ/ngành, tỉnh, và xã, bao gồm nhưng không giới hạn ở:\u003c/p\u003e\u003cp\u003e•\tHồ sơ thiết kế và tài liệu nền của Dự án SIDA.1.\u003c/p\u003e\u003cp\u003e•\tBáo cáo KT–XH của các địa phương dự án giai đoạn 2023–2025.\u003c/p\u003e\u003cp\u003e•\tKế hoạch phòng chống thiên tai và tìm kiếm cứu nạn cấp tỉnh/xã.\u003c/p\u003e\u003cp\u003e•\tSố liệu và báo cáo về thiên tai, khí hậu, rủi ro và tác động tại địa phương.\u003c/p\u003e\u003cp\u003e•\tCác nghiên cứu và tài liệu về quản lý rủi ro thiên tai, thích ứng với BĐKH, bình đẳng giới và phòng chống bạo lực trên cơ sở giới.\u003c/p\u003e\u003cp\u003e•\tCác văn bản pháp luật, chính sách mới ban hành liên quan đến khí hậu, giới, phòng chống bạo lực gia đình và quản lý rủi ro thiên tai trong 3 năm gần đây.\u003c/p\u003e\u003cp\u003eKết quả rà soát sẽ giúp xác định khoảng trống thông tin và xây dựng khung khảo sát phù hợp với mục tiêu dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eb) Xây dựng kế hoạch và bộ công cụ khảo sát\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTư vấn sẽ xây dựng kế hoạch tổng thể khảo sát đầu kỳ, bao gồm:\u003c/p\u003e\u003cp\u003e•\tPhương pháp tiếp cận tổng thể và logic khảo sát phù hợp với khung MEAL của ActionAid.\u003c/p\u003e\u003cp\u003e•\tKế hoạch thu thập dữ liệu sơ cấp và thứ cấp.\u003c/p\u003e\u003cp\u003e•\tPhương pháp lấy mẫu, cỡ mẫu và cơ cấu mẫu theo giới, độ tuổi, dân tộc và nhóm xã hội.\u003c/p\u003e\u003cp\u003e•\tBộ công cụ thu thập dữ liệu, bao gồm:\u003c/p\u003e\u003cp\u003eo\tBảng hỏi định lượng cho hộ gia đình và cá nhân (phụ nữ, nam giới, thanh niên).\u003c/p\u003e\u003cp\u003eo\tHướng dẫn thảo luận nhóm cho cộng đồng, nhóm phụ nữ, thanh niên, người dễ bị tổn thương.\u003c/p\u003e\u003cp\u003eo\tHướng dẫn phỏng vấn sâu cho chính quyền địa phương, tổ chức đoàn thể, cán bộ phòng chống thiên tai, tổ chức xã hội và các bên liên quan.\u003c/p\u003e\u003cp\u003eo\tBiểu mẫu quan sát và ghi nhận thực địa.\u003c/p\u003e\u003cp\u003eTư vấn sẽ họp thống nhất kế hoạch và công cụ với ActionAid và các đối tác trước khi hoàn thiện và triển khai.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ec) Thu thập dữ liệu sơ cấp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eDữ liệu sơ cấp sẽ được thu thập với sự phối hợp của các đối tác địa phương và giám sát kỹ thuật bởi ActionAid, bao gồm:\u003c/p\u003e\u003cp\u003e•\tTập huấn điều tra viên và tình nguyện viên địa phương về phương pháp khảo sát, kỹ năng phỏng vấn, nguyên tắc đạo đức nghiên cứu, bình đẳng giới, hòa nhập và bảo vệ đối tượng tham gia.\u003c/p\u003e\u003cp\u003e•\tThảo luận nhóm tập trung (FGD) với các nhóm cộng đồng, phụ nữ, thanh niên và tổ chức xã hội nhằm thu thập dữ liệu định tính về rủi ro, mức độ dễ bị tổn thương, rào cản giới, ưu tiên can thiệp và kỳ vọng hỗ trợ.\u003c/p\u003e\u003cp\u003e•\tPhỏng vấn sâu (KII) với đại diện bộ/ngành, chính quyền địa phương, hội phụ nữ, đoàn thanh niên, ban chỉ huy PCTT, cán bộ xã/phường, tổ chức xã hội và chuyên gia nhằm làm rõ năng lực thể chế, cơ chế phối hợp và các thách thức chính sách – thực tiễn.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ed) Quan sát thực địa và tham vấn bổ trợ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTư vấn và nhóm khảo sát sẽ:\u003c/p\u003e\u003cp\u003e•\tGhi nhận điều kiện thực tế về môi trường, hạ tầng, điểm nóng rủi ro thiên tai và các nguồn lực sẵn có tại cộng đồng.\u003c/p\u003e\u003cp\u003e•\tQuan sát hoạt động tổ chức cộng đồng, cơ chế ra quyết định và sự tham gia của phụ nữ, thanh niên trong các hoạt động liên quan đến phòng chống thiên tai.\u003c/p\u003e\u003cp\u003e•\tTham vấn bổ sung với người dân về các thay đổi khí hậu – xã hội và tác động đến đời sống, an toàn và sinh kế.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ee) Phân tích dữ liệu và lập báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tTổng hợp kết quả theo các nhóm nội dung chính: năng lực cộng đồng, vai trò phụ nữ – thanh niên, lồng ghép giới và GBV, năng lực thể chế, nhu cầu ưu tiên và cơ hội can thiệp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tXây dựng Báo cáo khảo sát đầu kỳ (tiếng Việt và tiếng Anh), bao gồm:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eo\tCác phát hiện chính và bộ dữ liệu đường cơ sở\u003c/p\u003e\u003cp\u003eo\tPhân tích rủi ro và mức độ dễ bị tổn thương\u003c/p\u003e\u003cp\u003eo\tKhuyến nghị kỹ thuật và chính sách phục vụ thiết kế và triển khai dự án\u003c/p\u003e\u003cp\u003e•\tTrình bày kết quả và lấy ý kiến ActionAid và các bên liên quan trước khi hoàn thiện báo cáo cuối cùng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThời hạn nhận hồ sơ: trước 17h30 ngày 20/4/2026\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2b:T1b43,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQuản lý và phối hợp\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eActionAid:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAAV chịu trách nhiệm chủ trì kỹ thuật và điều phối tổng thể hoạt động khảo sát đầu kỳ, bao gồm xây dựng khung nghiên cứu, phê duyệt phương pháp và bộ công cụ khảo sát, hướng dẫn lồng ghép giới và nguyên tắc bảo vệ trong toàn bộ quá trình thu thập và phân tích dữ liệu. AAV sẽ giám sát chất lượng triển khai thông qua các cuộc họp kỹ thuật định kỳ với đơn vị tư vấn, tham gia giám sát thực địa chọn mẫu khi cần thiết, và chịu trách nhiệm nghiệm thu các sản phẩm trung gian và cuối cùng theo tiêu chuẩn MEAL của ActionAid và yêu cầu của nhà tài trợ.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐối tác địa phương:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCác đối tác địa phương (chính quyền xã/phường, tổ chức đoàn thể, tổ chức cộng đồng) có vai trò hỗ trợ kết nối với cộng đồng, tạo điều kiện tiếp cận các nhóm đối tượng mục tiêu, cung cấp thông tin thứ cấp và phối hợp tổ chức khảo sát thực địa. Đồng thời, đối tác địa phương sẽ tham gia xác minh dữ liệu ban đầu, phản hồi các phát hiện sơ bộ và hỗ trợ phổ biến kết quả khảo sát tại địa bàn nhằm phục vụ cho công tác lập kế hoạch và triển khai dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐơn vị tư vấn/nhóm nghiên cứu:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eĐơn vị tư vấn chịu trách nhiệm triển khai toàn bộ hoạt động khảo sát theo ToR đã được phê duyệt, bao gồm thiết kế phương pháp và công cụ, thu thập và phân tích dữ liệu định lượng – định tính, xây dựng báo cáo đầu kỳ và trình bày kết quả cho các bên liên quan. Đơn vị tư vấn đảm bảo tiến độ, chất lượng kỹ thuật, tính chính xác và tính bảo mật của dữ liệu, tuân thủ các nguyên tắc đạo đức nghiên cứu, bảo vệ người tham gia khảo sát và các tiêu chuẩn lồng ghép giới, hòa nhập xã hội và không gây tổn hại (Do No Harm).\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYêu cầu đối với đơn vị tư vấn/nhóm nghiên cứu: Đơn vị tư vấn/nhóm nghiên cứu cần đáp ứng các yêu cầu sau:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCó tối thiểu 5 năm kinh nghiệm trong nghiên cứu xã hội, khảo sát MEAL, đánh giá dự án hoặc nghiên cứu chính sách trong các lĩnh vực biến đổi khí hậu, quản lý rủi ro thiên tai, phát triển cộng đồng và/hoặc bình đẳng giới, ưu tiên các nghiên cứu có phương pháp tiếp cận dựa trên quyền và sự tham gia.\u003c/p\u003e\u003cp\u003e•\tCó kinh nghiệm làm việc với chính quyền địa phương, tổ chức xã hội và cộng đồng tại Việt Nam, đặc biệt tại các khu vực dễ bị tổn thương do thiên tai và biến đổi khí hậu; hiểu biết về bối cảnh thể chế và văn hóa địa phương là một lợi thế.\u003c/p\u003e\u003cp\u003e•\tCó năng lực phân tích giới, thanh niên và bạo lực trên cơ sở giới (GBV), bao gồm thiết kế công cụ khảo sát nhạy cảm giới, phân tích dữ liệu phân tách theo giới và đề xuất khuyến nghị phù hợp với các nguyên tắc bảo vệ và không gây tổn hại.\u003c/p\u003e\u003cp\u003e•\tĐội ngũ triển khai tối thiểu bao gồm: Trưởng nhóm nghiên cứu, chuyên gia phân tích dữ liệu, và điều tra viên/điều phối viên thực địa, trong đó các thành viên chủ chốt phải được đào tạo về đạo đức nghiên cứu, bảo mật thông tin, bảo vệ người tham gia khảo sát và tiếp cận nhạy cảm giới – hòa nhập xã hội.\u003c/p\u003e\u003cp\u003e•\tCó năng lực xây dựng báo cáo phân tích chất lượng cao bằng tiếng Việt (và tiếng Anh nếu yêu cầu), trình bày rõ ràng, dựa trên bằng chứng và đưa ra khuyến nghị thực tiễn phục vụ thiết kế, điều chỉnh và theo dõi – đánh giá dự án.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNguyên tắc đạo đức, bảo vệ và giải trình\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHoạt động khảo sát đầu kỳ phải tuân thủ nghiêm ngặt các nguyên tắc đạo đức nghiên cứu, bảo vệ và giải trình nhằm đảm bảo an toàn, tôn trọng và quyền lợi của tất cả người tham gia, đặc biệt là phụ nữ, trẻ em và các nhóm dễ bị tổn thương. Việc tham gia khảo sát phải hoàn toàn tự nguyện, dựa trên sự đồng thuận được cung cấp đầy đủ thông tin, và người tham gia có quyền từ chối hoặc rút lui khỏi khảo sát bất cứ lúc nào mà không chịu bất kỳ hậu quả bất lợi nào.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eĐơn vị tư vấn có trách nhiệm bảo đảm tính bảo mật và ẩn danh của thông tin cá nhân, dữ liệu thu thập được chỉ được sử dụng cho mục đích nghiên cứu và quản lý dự án, được lưu trữ an toàn theo quy định của ActionAid và pháp luật Việt Nam. Quá trình thu thập và xử lý dữ liệu phải tuân thủ nguyên tắc “Không gây tổn hại” (Do No Harm), tránh gây sang chấn, kỳ thị hoặc rủi ro an toàn cho người tham gia, đặc biệt khi thảo luận về các chủ đề nhạy cảm như bạo lực trên cơ sở giới hoặc thiên tai.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eHoạt động khảo sát phải tuân thủ đầy đủ Chính sách Bảo vệ Trẻ em, Chính sách Phòng chống bóc lột, lạm dụng và quấy rối tình dục (PSEAH) và Khung Safeguarding của ActionAid. Tất cả thành viên nhóm nghiên cứu và điều tra viên phải được tập huấn về safeguarding, ký cam kết tuân thủ các chính sách liên quan, và được trang bị kỹ năng tiếp cận nhạy cảm giới, hòa nhập và an toàn tâm lý.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eTrong trường hợp phát hiện hoặc người tham gia chia sẻ về bạo lực trên cơ sở giới, nguy cơ xâm hại, bóc lột hoặc các vấn đề bảo vệ khác, nhóm khảo sát phải kích hoạt cơ chế giới thiệu và hỗ trợ an toàn, bao gồm kết nối với các dịch vụ hỗ trợ phù hợp tại địa phương (y tế, tư vấn tâm lý, pháp lý, bảo trợ xã hội), bảo đảm tôn trọng ý chí của người bị ảnh hưởng, bảo mật thông tin và tuân thủ các quy trình báo cáo safeguarding của ActionAid.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGiám sát và đánh giá\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCán bộ dự án của ActionAid sẽ trực tiếp tham dự và giám sát tiến độ thực hiện.\u003c/p\u003e\u0
