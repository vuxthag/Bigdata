ần 30 năm xây dựng và phát triển, VIB đã khẳng định vị thế là một trong những ngân hàng bán lẻ hàng đầu Việt Nam với tỷ lệ bán lẻ và hiệu quả sinh lời cao, thị phần top đầu ở các mảng kinh doanh trọng yếu. Tính đến ngày 31/12/2025, vốn điều lệ VIB đạt 34.040 tỷ đồng, vốn chủ sở hữu đạt hơn 46.900 tỷ đồng và tổng tài sản vượt mốc 556.000 tỷ đồng – minh chứng cho chiến lược tăng trưởng bền vững và năng lực quản trị vượt trội của Ngân hàng. \r\n VIB hiện có hơn 10.000 cán bộ nhân viên tại hơn 200 chi nhánh và phòng giao dịch trên toàn quốc.\r\n\r\nTẦM NHÌN VÀ SỨ MỆNH\r\nTrở thành ngân hàng sáng tạo và hướng tới khách hàng nhất tại Việt Nam.\r\nĐối với khách hàng: Vượt trội trong việc cung cấp các giải pháp sáng tạo nhằm thỏa mãn tối đa nhu cầu khách hàng.\r\nĐối với nhân viên: Xây dựng văn hóa hiệu quả, tinh thần doanh nhân và môi trường làm việc hiệu quả.\r\nĐối với cổ đông: Mang lại các giá trị hấp dẫn và bền vững cho cổ đông.\r\nĐối với cộng đồng: Tích cực đóng góp vào sự phát triển cộng đồng…\r\n\r\nGIÁ TRỊ CỐT LỖI\r\nHướng tới khách hàng\r\nNỗ lực vượt trội\r\nTrung thực\r\nTinh thần đồng đội\r\nTuân thủ kỷ luật\r\n\r\nCHƯƠNG TRÌNH NỔI BẬT\r\nTại VIB, phát triển con người là ưu tiên chiến lược. Ngân hàng đầu tư bài bản vào hệ thống đào tạo đa tầng – từ chương trình hội nhập cho nhân viên mới, các khóa chuyên môn nghiệp vụ, đến lộ trình phát triển dành cho quản lý cấp trung và cấp cao. Nổi bật trong đó là Chương trình Phát triển Quản lý Tiềm năng (MDP – Management Development Program) – lộ trình đào tạo trọng điểm dành riêng cho những cá nhân xuất sắc, được định hướng trở thành lãnh đạo tương lai của Ngân hàng.\r\nLà chương trình thường niên và kéo dài trong 12 tháng, MDP trang bị toàn diện năng lực chuyên môn, tư duy quản trị và kỹ năng lãnh đạo thực tiễn. Điểm khác biệt của chương trình nằm ở phương pháp học đi đôi với hành: học viên không chỉ tiếp thu lý thuyết mà còn được thực hành trực tiếp thông qua các buổi Group Coaching do Giám đốc Vùng (RGM) dẫn dắt. Song song đó, mỗi học viên tự xây dựng Dự án Phát triển Năng lực Cá nhân (PCP) – một kế hoạch hành động riêng với mục tiêu cụ thể trong 6 tháng, được các quản lý cấp cao trực tiếp tư vấn và góp ý. Thông qua hoạt động Coaching, học viên chuyển hóa kiến thức thành hành động, rèn luyện tư duy chiến lược và khả năng giải quyết vấn đề trong môi trường thực tế. Đây cũng là nơi nuôi dưỡng tinh thần kiên trì, cầu tiến, dám đổi mới và tạo khác biệt – những phẩm chất cốt lõi của nhà lãnh đạo tương lai.\r\n\r\nTháng 01/2025, 71 học viên từ Khối Ngân hàng Bán lẻ và Khách hàng Doanh nghiệp đã chính thức tốt nghiệp MDP khóa …, đánh dấu sự trưởng thành sau một hành trình nỗ lực không ngừng. Trong đó, ...% học viên đã được đề bạt vào vị trí quản lý ngay sau tốt nghiệp – minh chứng rõ nét cho hiệu quả của chương trình. MDP không chỉ là khóa đào tạo, mà còn là cam kết của VIB trong việc kiến tạo thế hệ lãnh đạo kế cận, sẵn sàng dẫn dắt Ngân hàng trong giai đoạn phát triển mới."])</script><script>self.__next_f.push([1,"24:Ta7b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Xây dựng và triển khai chính sách tín dụng (50%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Quản lý xây dựng chính sách về khẩu vị rủi ro tín dụng, chính sách áp dụng các hệ thống xếp hạng nội bộ và các chính sách nhận TSBĐ cho hoạt động cấp tín dụng trong phạm vị quản lý của Khối QTRR\u0026TT cho khối KHDN \u0026 Khối NH\u0026NH phù hợp với quy định của pháp luật và khẩu vị của VIB.\u003c/p\u003e\u003cp\u003e- Tư vấn góp ý các chính sách sản phẩm, quy trình và mẫu biểu liên quan tới hoạt động tín dụng do các khối kinh doanh đầu mối soạn thảo;\u003c/p\u003e\u003cp\u003e- Quản lý các chính sách về thẩm quyền phê duyệt tín dụng của khối KHDN \u0026 Khối NH\u0026NH, tham gia tư vấn, thẩm định các chính sách thẩm quyền phê duyệt tín dụng và thẩm quyền xử lý rủi ro của các khối kinh doanh soạn thảo;\u003c/p\u003e\u003cp\u003e- Tham gia các dự án, thẩm định yêu cầu điều chỉnh hệ thống (BRD) trong phạm vi công việc phòng CL\u0026QTRRTD.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Giám sát hiệu quả các chính sách tín dụng (30%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Thực hiện rà soát đánh giá hiệu quả các các chính sách và hiệu quả hoạt động của  mô hình xếp hạng tín dụng và kiến nghị thay đổi chính sách sử dụng mô hình XHTD giảm thiểu tỷ lệ nợ xấu cho VIB/ các khối KHDN \u0026 Khối NH\u0026NH;\u003c/p\u003e\u003cp\u003e- Phân tích danh mục tín dụng, theo dõi các chỉ số rủi ro tín dụng, rủi ro tập trung theo các loại hình cấp tín dụng, phân khúc khách hàng… đánh giá các rủi ro tín dụng, và thực hiện các đề xuất điều chỉnh chính sách sản phẩm do các khối KD đầu mối và nâng cấp chính sách tín dụng phù hợp với chiến lược QTRR của VIB trong từng  thời kỳ.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Triển khai đào tạo và hỗ trợ nghiệp vụ (10%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Lên kế hoạch và phối hợp với ban HR thực hiện đào tạo nghiệp vụ về chính sách tín dụng đối với khối KHDN \u0026 Khối NH\u0026NH.\u003c/p\u003e\u003cp\u003e- Triển khai các công cụ (helpdesk, Chatbot AI… ) trong việc tư vấn, hỗ trợ chi nhánh khi vận hành các chính sách tín dụng.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Huấn luyện, hỗ trợ giám sát và quản trị hiệu quả làm việc của chuyên viên theo phân công để hoàn thành kế hoạch công việc được giao (10%)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Thực hiện các nhiệm vụ khác theo phân công của cấp quản lý.\u003c/strong\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T1085,"])</script><script>self.__next_f.push([1,"Ngân hàng Thương mại cổ phần (TMCP) Quốc Tế Việt Nam, tên viết tắt Ngân hàng Quốc Tế (VIB), là một trong những ngân hàng TMCP tư nhân m xây dựng và phát triển, VIB đã khẳng định vị thế là một trong những ngân hàng bán lẻ hàng đầu Việt Nam với tỷ lệ bán lẻ và hiệu quả sinh lời cao, thị phần top đầu ở các mảng kinh doanh trọng yếu. Tính đến ngày 31/12/2025, vốn điều lệ VIB đạt 34.040 tỷ đồng, vốn chủ sở hữu đạt hơn 46.900 tỷ đồng và tổng tài sản vượt mốc 556.000 tỷ đồng – minh chứng cho chiến lược tăng trưởng bền vững và năng lực quản trị vượt trội của Ngân hàng. \r\n VIB hiện có hơn 10.000 cán bộ nhân viên tại hơn 200 chi nhánh và phòng giao dịch trên toàn quốc.\r\n\r\nTẦM NHÌN VÀ SỨ MỆNH\r\nTrở thành ngân hàng sáng tạo và hướng tới khách hàng nhất tại Việt Nam.\r\nĐối với khách hàng: Vượt trội trong việc cung cấp các giải pháp sáng tạo nhằm thỏa mãn tối đa nhu cầu khách hàng.\r\nĐối với nhân viên: Xây dựng văn hóa hiệu quả, tinh thần doanh nhân và môi trường làm việc hiệu quả.\r\nĐối với cổ đông: Mang lại các giá trị hấp dẫn và bền vững cho cổ đông.\r\nĐối với cộng đồng: Tích cực đóng góp vào sự phát triển cộng đồng…\r\n\r\nGIÁ TRỊ CỐT LỖI\r\nHướng tới khách hàng\r\nNỗ lực vượt trội\r\nTrung thực\r\nTinh thần đồng đội\r\nTuân thủ kỷ luật\r\n\r\nCHƯƠNG TRÌNH NỔI BẬT\r\nTại VIB, phát triển con người là ưu tiên chiến lược. Ngân hàng đầu tư bài bản vào hệ thống đào tạo đa tầng – từ chương trình hội nhập cho nhân viên mới, các khóa chuyên môn nghiệp vụ, đến lộ trình phát triển dành cho quản lý cấp trung và cấp cao. Nổi bật trong đó là Chương trình Phát triển Quản lý Tiềm năng (MDP – Management Development Program) – lộ trình đào tạo trọng điểm dành riêng cho những cá nhân xuất sắc, được định hướng trở thành lãnh đạo tương lai của Ngân hàng.\r\nLà chương trình thường niên và kéo dài trong 12 tháng, MDP trang bị toàn diện năng lực chuyên môn, tư duy quản trị và kỹ năng lãnh đạo thực tiễn. Điểm khác biệt của chương trình nằm ở phương pháp học đi đôi với hành: học viên không chỉ tiếp thu lý thuyết mà còn được thực hành trực tiếp thông qua các buổi Group Coaching do Giám đốc Vùng (RGM) dẫn dắt. Song song đó, mỗi học viên tự xây dựng Dự án Phát triển Năng lực Cá nhân (PCP) – một kế hoạch hành động riêng với mục tiêu cụ thể trong 6 tháng, được các quản lý cấp cao trực tiếp tư vấn và góp ý. Thông qua hoạt động Coaching, học viên chuyển hóa kiến thức thành hành động, rèn luyện tư duy chiến lược và khả năng giải quyết vấn đề trong môi trường thực tế. Đây cũng là nơi nuôi dưỡng tinh thần kiên trì, cầu tiến, dám đổi mới và tạo khác biệt – những phẩm chất cốt lõi của nhà lãnh đạo tương lai.\r\n\r\nTháng 01/2025, 71 học viên từ Khối Ngân hàng Bán lẻ và Khách hàng Doanh nghiệp đã chính thức tốt nghiệp MDP khóa …, đánh dấu sự trưởng thành sau một hành trình nỗ lực không ngừng. Trong đó, ...% học viên đã được đề bạt vào vị trí quản lý ngay sau tốt nghiệp – minh chứng rõ nét cho hiệu quả của chương trình. MDP không chỉ là khóa đào tạo, mà còn là cam kết của VIB trong việc kiến tạo thế hệ lãnh đạo kế cận, sẵn sàng dẫn dắt Ngân hàng trong giai đoạn phát triển mới."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"3d:{\"companyId\":36138,\"jobImageURLs\":\"$3e\",\"jobVideoURLs\":null,\"companyName\":\"Ngân Hàng TMCP Quốc Tế Việt Nam (VIB)\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/9f/11125546.png\",\"companySizeId\":\"\",\"companyProfile\":\"$3f\",\"contactName\":\"Phòng Tuyển dụng - Ban Nhân sự\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Tầng 1 (Tầng trệt) và Tầng 2 Tòa nhà Sailing Tower, Số 111A Pasteur, Phường Bến Nghé, Quận 1, TP Hồ Chí Minh, Việt Nam\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"https://images02.vietnamworks.com/companyprofile/ngan-hang-tmcp-quoc-te-viet-nam-vib/en/Cover_1_1_.png?v=1770173477\",\"companyProfileUrl\":\"https://www.vietnamworks.com/company/ngan-hang-tmcp-quoc-te-viet-nam-vib\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":1,\"b
