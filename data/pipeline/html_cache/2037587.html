"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n27:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Tc5a,"])</script><script>self.__next_f.push([1,"Về Chúng tôi Thanh An Food\r\nĐối với Thanh An Food, sức khỏe của người tiêu dùng là mục tiêu hàng đầu.\r\n\r\nĐáp ứng điều đó, Công ty TNHH Thanh An đã nghiên cứu và áp dụng khoa học để sản xuất ra các sản phẩm dinh dưỡng từ ngũ cốc. Là chuyên gia về ngũ cốc, Thanh An sử dụng nguyên liệu hoàn toàn tự nhiên, không phẩm màu, không chất bảo quản, đem đến bữa ăn bổ dưỡng, đủ chất, phù hợp với túi tiền, mang đến trải nghiệm tốt nhất cho khách hàng.\r\n\r\nTầm nhìn\r\nTrở thành chuyên gia hàng đầu trong lĩnh vực sản xuất, kinh doanh ngũ cốc tại thị trường Việt Nam và hướng đến thị trường thế giới.\r\n\r\nSứ mệnh\r\nTrở thành chuyên gia sức khỏe cộng đồng, nâng cao tầm vóc và giá trị Việt.\r\n\r\nGiá trị cốt lõi\r\nMang lại giá trị cộng đồng, lợi ích cho các cổ đông, người lao động và mang lại cơ hội cho đối tác.\r\n\r\nLịch sử hình thành Chuyên gia về ngũ cốc\r\n*Năm 1998\r\nCông ty TNHH Thanh An được thành lập vào ngày 23/11/1998. Lĩnh vực hoạt động chính là nhập khẩu, mua bán sữa và các nguyên liệu chế biến từ sữa.\r\n*Năm 1999\r\nThanh An nghiên cứu thành công và cho ra đời sản phẩm Bột ngũ cốc kết hợp các thảo dược quý thương hiệu Việt Đài ngay tại xưởng sản xuất của gia đình.\r\n*Năm 2011\r\nNhà máy đầu tiên rộng 5,000m2 được xây dựng tại KCN Ninh Hiệp, Gia Lâm, Hà Nội. Đây là nhà máy sản xuất các sản phẩm bột ngũ cốc đầu tiên với quy mô công nghiệp.\r\n*Năm 2014\r\nThanh An Food đã nghiên cứu và tiên phong sản xuất thành công ngũ cốc uống liền thương hiệu Việt Ngũ Cốc tại Việt Nam, đáp ứng nhu cầu thị trường về dòng sản phẩm sữa ngũ cốc dinh dưỡng tiện lợi.\r\n*Năm 2019\r\nNhà máy thứ 2 được đưa vào vận hành sản xuất sản phẩm Ngũ cốc hạt OATTA – Bữa ăn 1 phút – dinh dưỡng đủ đầy, nâng tổng diện tích nhà máy lên 10,000m2 tại KCN Ninh Hiệp, Gia Lâm, Hà Nội.\r\n*Năm 2023\r\nNhà máy thứ 3 – chuyên sản xuất các sản phẩm uống liền, ăn liền theo công nghệ hiện đại nhất với diện tích hơn 30,000 m2 sẽ được khởi công xây dựng tại KCN Hà Nam.\r\n\r\nQuy mô doanh nghiệp ngày càng được mở rộng, Hệ thống phân phối hàng hoá được phân phối trực tiếp đến tay người tiêu dùng. Sau nhiều năm hoạt động Công ty xây dựng kiện toàn hệ thống phân phối trên toàn quốc. \r\n\r\nTHÔNG TIN VỀ CÔNG TY:\r\nCÔNG TY TNHH THANH AN\r\nWebsite: Thanhanfood.com.vn\r\n\r\nVP Công ty tại Hà Nội: Tầng 8, 562 Nguyễn Văn Cừ, quận Long Biên, Hà Nội.\r\nChi nhánh Công ty tại HCM:  38/6L1 Nguyễn Văn Trỗi P15 Q.Phú Nhuận, HCM\r\nĐịa chỉ Nhà máy 1,2: Lô 01-06 CCN Ninh Hiệp - Gia Lâm - Hà Nội\r\nĐịa chỉ Nhà máy 3: KCN Hà Nam."])</script><script>self.__next_f.push([1,"24:Tbdf,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTÓM TẮT MỤC ĐÍCH CÔNG VIỆC \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Hoạch định chiến lược tăng trưởng bền vững cho hệ thống kinh doanh toàn cầu(XK), dự báo xu hướng và tìm kiếm các cơ hội đầu tư kinh doanh mới nhằm phát triển hệ thống phân phối đa kênh và đa dạng hóa sản phẩm của công ty tại thị trường Việt Nam.(OEM-VNP...)\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eNHIỆM VỤ CHÍNH  \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e1. Xây dựng, quản lý và điều hành hoạt động xuất khẩu các sản phẩm của công ty ra thị trường tiếng Trung, gia tăng thị phần và lợi nhuận cho công ty.\u003c/p\u003e\u003cp\u003e• Nghiên cứu \u0026 khảo sát thị trường xây dựng kế hoạch xâm nhập và phát triển thị trường tiếng Trung\u003c/p\u003e\u003cp\u003e• Xây dựng chiến thuật phát triển khách hàng và mạng lưới đối tác phân phối tiềm năng cho hoạt động kinh doanh xuất khẩu các sản phẩm của công ty ra thị trường tiếng Trung, phù hợp với định hướng và chiến lược chung của công ty\u003c/p\u003e\u003cp\u003e• Triển khai kế hoạch và điều hành hoạt động xuất khẩu cho thị trường tiếng Trung để mở rộng mạng lưới bán hàng, gia tăng thị phần và doanh số cho công ty.\u003c/p\u003e\u003cp\u003e• Đánh giá hiệu quả các kênh phân phối và điều chỉnh chiến thuật một cách linh hoạt đối với từng đối tác, từng giai đoạn phát triển khác nhau của mỗi đối tác, đảm bảo chọn lọc tập trung cho những kênh phân phối hiệu quả nhất.\u003c/p\u003e\u003cp\u003e\t\t\t\u003c/p\u003e\u003cp\u003e2. Tìm kiếm và phát triển các cơ hội kinh doanh mới nhằm mang lại lợi nhuận cho công ty bao gồm nhưng không giới hạn: hợp tác các đơn vị gia công, sản xuất sản phẩm (Original Equipment Manufacturer - OEM) ở thị trường tiếng Trung\u003c/p\u003e\u003cp\u003e• Nghiên cứu \u0026 khảo sát thị trường để tìm kiếm khách hàng OEM mới tiềm năng, phát triển các cơ hội kinh doanh mới.\u003c/p\u003e\u003cp\u003e• Xây dựng kế hoạch, chính sách bán hàng cho các khách hàng OEM\u003c/p\u003e\u003cp\u003e• Triển khai thực hiện, quản lý và chịu trách nhiệm trong việc vận hành kinh doanh OEM.\u003c/p\u003e\u003cp\u003e\t\t\t\u003c/p\u003e\u003cp\u003e3. Xây dựng, quản lý các hoạt động chăm sóc, kết nối với các khách hàng, nhà cung cấp, đơn vị phân phối hiện tại và tiềm năng để phát triển mối quan hệ đối tác chiến lược lâu dài, bền vững, thúc đẩy hoạt động kinh doanh.\u003c/p\u003e\u003cp\u003e• Thực hiện các chương trình, hoạt động chăm sóc khách hàng để duy trì mối quan hệ với các khách hàng hiện tại.\u003c/p\u003e\u003cp\u003e• Xây dựng và thực hiện các chương trình kết nối với các khách hàng mới tiềm năng nhằm mở rộng mạng lưới đối tác chiến lược của công ty.\u003c/p\u003e\u003cp\u003e\t\t\t\u003c/p\u003e\u003cp\u003e4\tCác nhiệm vụ khác theo yêu cầu của quản lý.\t\t\t\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"25:T8fd,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiến thức \u0026 trình độ chuyên môn: Đại học trở lên\t\u003c/p\u003e\u003cp\u003e• Chuyên ngành: Kinh tế/ Thương mại/ Marketing/ Quản trị kinh doanh.\t\u003c/p\u003e\u003cp\u003e• Kinh nghiệm: \u003c/p\u003e\u003cp\u003e-\u003cstrong\u003e Ít nhất 3 năm kinh nghiệm ở vị trí tương tự trong các công ty/ tập đoàn về thực phẩm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- \u003cstrong\u003eĐã từng làm việc về thị trường Trung Quốc ít nhất 2 năm, hiểu biết về ngành hàng FMCG, văn hóa tiêu dùng tại Trung Quốc\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm triển khai các dự án nhỏ - trung bình.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•  Kỹ năng/ Skills\t\t\u003c/p\u003e\u003cp\u003e- Nhạy bén trong kinh doanh\u003c/p\u003e\u003cp\u003e- Kỹ năng đàm phán\u003c/p\u003e\u003cp\u003e- Kỹ năng giao tiếp\u003c/p\u003e\u003cp\u003e- Kỹ năng lập kế hoạch\u003c/p\u003e\u003cp\u003e- Kỹ năng quản lý công việc, quản lý đội nhóm\u003c/p\u003e\u003cp\u003e- Kỹ năng giải quyết xung đột; \u003c/p\u003e\u003cp\u003e- Kỹ năng xử lý tình huống\u003c/p\u003e\u003cp\u003e- Kỹ năng quản lý tiến độ, quản trị rủi ro\u003c/p\u003e\u003cp\u003e- Kỹ năng Sử dụng Internet, TMĐT, Marketing\u003c/p\u003e\u003cp\u003e- Kỹ năng phân tích thị trường, khai thác thông tin\u003c/p\u003e\u003cp\u003e\t  đến trải nghiệm tốt nhất cho khách hàng.\r\n\r\nTầm nhìn\r\nTrở thành chuyên gia hàng đầu trong lĩnh vực sản xuất, kinh doanh ngũ cốc tại thị trường Việt Nam và hướng đến thị trường thế giới.\r\n\r\nSứ mệnh\r\nTrở thành chuyên gia sức khỏe cộng đồng, nâng cao tầm vóc và giá trị Việt.\r\n\r\nGiá trị cốt lõi\r\nMang lại giá trị cộng đồng, lợi ích cho các cổ đông, người lao động và mang lại cơ hội cho đối tác.\r\n\r\nLịch sử hình thành Chuyên gia về ngũ cốc\r\n*Năm 1998\r\nCông ty TNHH Thanh An được thành lập vào ngày 23/11/1998. Lĩnh vực hoạt động chính là nhập khẩu, mua bán sữa và các nguyên liệu chế biến từ sữa.\r\n*Năm 1999\r\nThanh An nghiên cứu thành công và cho ra đời sản phẩm Bột ngũ cốc kết hợp các thảo dược quý thương hiệu Việt Đài ngay tại xưởng sản xuất của gia đình.\r\n*Năm 2011\r\nNhà máy đầu tiên rộng 5,000m2 được xây dựng tại KCN Ninh Hiệp, Gia Lâm, Hà Nội. Đây là nhà máy sản xuất các sản phẩm bột ngũ cốc đầu tiên với quy mô công nghiệp.\r\n*Năm 2014\r\nThanh An Food đã nghiên cứu và tiên phong sản xuất thành công ngũ cốc uống liền thương hiệu Việt Ngũ Cốc tại Việt Nam, đáp ứng nhu cầu thị trường về dòng sản phẩm sữa ngũ cốc dinh dưỡng tiện lợi.\r\n*Năm 2019\r\nNhà máy thứ 2 được đưa vào vận hành sản xuất sản phẩm Ngũ cốc hạt OATTA – Bữa ăn 1 phút – dinh dưỡng đủ đầy, nâng tổng diện tích nhà máy lên 10,000m2 tại KCN Ninh Hiệp, Gia Lâm, Hà Nội.\r\n*Năm 2023\r\nNhà máy thứ 3 – chuyên sản xuất các sản phẩm uống liền, ăn liền theo công nghệ hiện đại nhất với diện tích hơn 30,000 m2 sẽ được khởi công xây dựng tại KCN Hà Nam.\r\n\r\nQuy mô doanh nghiệp ngày càng được mở rộng, Hệ thống phân phối hàng hoá được phân phối trực tiếp đến tay người tiêu dùng. Sau nhiều năm hoạt động Công ty xây dựng kiện toàn hệ thống phân phối trên toàn quốc. \r\n\r\nTHÔNG TIN VỀ CÔNG TY:\r\nCÔNG TY TNHH THANH AN\r\nWebsite: Thanhanfood.com.vn\r\n\r\nVP Công ty tại Hà Nội: Tầng 8, 562 Nguyễn Văn Cừ, quận Long Biên, Hà Nội.\r\nChi nhánh Công ty tại HCM:  38/6L1 Nguyễn Văn Trỗi P15  bán hàng, gia tăng thị phần và doanh số cho công ty.\u003c/p\u003e\u003cp\u003e• Đánh giá hiệu quả các kênh phân phối và điều chỉnh chiến thuật một cách linh hoạt đối với từng đối tác, từng giai đoạn phát triển khác nhau của mỗi đối tác, đảm bảo chọn lọc tập trung cho những kênh phân phối hiệu quả nhất.\u003c/p\u003e\u003cp\u003e\t\t\t\u003c/p\u003e\u003cp\u003e2. Tìm kiếm và phát triển các cơ hội kinh doanh mới nhằm mang lại lợi nhuận cho công ty bao gồm nhưng không giới hạn: hợp tác các đơn vị gia công, sản xuất sản phẩm (Original Equipment Manufacturer - OEM) ở thị trường tiếng Trung\u003c/p\u003e\u003cp\u003e• Nghiên cứu \u0026 khảo sát thị trường để tìm kiếm khách hàng OEM mới tiềm năng, phát triển các cơ hội kinh doanh mới.\u003c/p\u003e\u003cp\u003e• Xây dựng kế hoạch, chính sách bán hàng cho các khách hàng OEM\u003c/p\u003e\u003cp\u003e• Triển khai thực hiện, quản lý và chịu trách nhiệm trong việc vận hành kinh doanh OEM.\u003c/p\u003e\u003cp\u003e\t\t\t\u003c/p\u003e\u003cp\u003e3. Xây dựng, quản lý các hoạt động chăm sóc, kết nối với các khách hàng, nhà cung cấp, đơn vị phân phối hiện tại và tiềm năng để phát triển mối quan hệ đối tác chiến lược lâu dài, bền vững, thúc đẩy hoạt động kinh doanh.\u003c/p\u003e\u003cp\u003e• Thực hiện các chương trình, hoạt động chăm sóc khách hàng để duy trì mối quan hệ với các khách hàng hiện tại.\u003c/p\u003e\u003cp\u003e• Xây dựng và thực hiện các chương trình kết nối với các khách hàng mới tiềm năng nhằm mở rộng mạng lưới đối tác chiến lược của công ty.\u003c/p\u003e\u003cp\u003e\t\t\t\u003c/p\u003e\u003cp\u003e4\tCác nhiệm vụ khác theo yêu cầu của quản lý.\t\t\t\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2b:T8fd,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eYÊU CẦU\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiến thức \u0026 trình độ chuyên môn: Đại học trở lên\t\u003c/p\u003e\u003cp\u003e• Chuyên ngành: Kinh tế/ Thương mại/ Marketing/ Quản trị kinh doanh.\t\u003c/p\u003e\u0 cho ra đời sản phẩm Bột ngũ cốc kết hợp các thảo dược quý thương hiệu Việt Đài ngay tại xưởng sản xuất của gia đình.\r\n*Năm 2011\r\nNhà máy đầu tiên rộng 5,000m2 được xây dựng tại KCN Ninh Hiệp, Gia Lâm, Hà Nội. Đây là nhà máy sản xuất các sản phẩm bột ngũ cốc đầu tiên với quy mô công nghiệp.\r\n*Năm 2014\r\nThanh An Food đã nghiên cứu và tiên phong sản xuất thành công ngũ cốc uống liền thương hiệu Việt Ngũ Cốc tại Việt Nam, đáp ứng nhu cầu thị trường về dòng sản phẩm sữa ngũ cốc dinh dưỡng tiện lợi.\r\n*Năm 2019\r\nNhà máy thứ 2 được đưa vào vận hành sản xuất sản phẩm Ngũ cốc hạt OATTA – Bữa ăn 1 phút – dinh dưỡng đủ đầy, nâng tổng diện tích nhà máy lên 10,000m2 tại KCN Ninh Hiệp, Gia Lâm, Hà Nội.\r\n*Năm 2023\r\nNhà máy thứ 3 – chuyên sản xuất các sản phẩm uống liền, ăn liền theo công nghệ hiện đại nhất với diện tích hơn 30,000 m2 sẽ được khởi công xây dựng tại KCN Hà Nam.\r\n\r\nQuy mô doanh nghiệp ngày càng được mở rộng, Hệ thống phân phối hàng hoá được phân phối trực tiếp đến tay người tiêu dùng. Sau nhiều năm hoạt động Công ty xây dựng kiện toàn hệ thống phân phối trên toàn quốc. \r\n\r\nTHÔNG TIN VỀ CÔNG TY:\r\nCÔNG TY TNHH THANH AN\r\nWebsite: Thanhanfood.com.vn\r\n\r\nVP Công ty tại Hà Nội: Tầng 8, 562 Nguyễn Văn Cừ, quận Long Biên, Hà Nội.\r\nChi nhánh Công ty tại HCM:  38/6L1 Nguyễn Văn Trỗi P15 Q.Phú Nhuận, HCM\r\nĐịa chỉ Nhà máy 1,2: Lô 01-06 CCN Ninh Hiệp - Gia Lâm - Hà Nội\r\nĐịa chỉ Nhà máy 3: KCN Hà Nam."])</script><script>self.__next_f.push([1,"40:{\"companyId\":239583,\"jobImageURLs\":null,\"jobVideoURLs\":null,\"companyName\":\"Công Ty TNHH Thanh An\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/9b/11139745.png\",\"companySizeId\":\"\",\"companyProfile\":\"$41\",\"contactName\":\"Phòng Nhân Sự\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Tầng 8, tòa nhà Plaschem, số 562 Nguyễn Văn Cừ, Long Biên, Hà Nội\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile
