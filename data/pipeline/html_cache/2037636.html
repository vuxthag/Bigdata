ation (THE).\r\n\r\nVinUni’s founding benefactor Vingroup is one of the biggest private conglomerates in Asia with the largest market capitalization value in Vietnam. As a multisector corporation, Vingroup focuses on three main areas: Technology; Industrials; and Property Services. VinUni is proud to be a part of the Vingroup ecosystem, giving its students opportunities to connect with several high quality research institutes (such as VinAI, VinBrain, and Vin BigData), pioneering industrial enterprises (such as VinSmart and VinFast), and leading Vietnamese companies (such as Vinpearl, Vincom Retail, Vinmec, and Vinhomes).\r\n\r\nVinUniversity is seeking entrepreneurial-minded intellectuals who are passionate about higher education to join our team to accelerate the formation of a truly world-class university in Vietnam.24:T5e2,\u003cp\u003e\u003cstrong\u003eGIỚI THIỆU VỀ CHƯƠNG TRÌNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChương trình Đào tạo Nhân tài AI Thực chiến là sáng kiến đặc biệt của Tập đoàn Vingroup do VinUniversity phối hợp triển khai nhằm đào tạo nguồn nhân lực AI có năng lực thực hành cao, có thể tham gia giải quyết các bài toán thực tiễn ngay sau đào tạo.\u003c/p\u003e\u003cp\u003eChương trình kết hợp giữa học phần nền tảng và giai đoạn thực chiến với dự án AI thật, dưới sự hướng dẫn của giảng viên, mentor và quản lý dự án từ VinUni, Vingroup và các đối tác. Học viên được miễn học phí, nhận phụ cấp hàng tháng và có cơ hội việc làm hấp dẫn trong hệ sinh thái Vingroup sau tốt nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGIỚI THIỆU VỀ VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChuyên viên Quản lý Tuyển sinh \u0026 Marketing chịu trách nhiệm xây dựng và triển khai các hoạt động tuyển sinh, truyền thông và marketing nhằm thu hút đúng nhóm ứng viên mục tiêu, gia t"])</script><script>self.__next_f.push([1,"ăng nhận diện chương trình và tối ưu hiệu quả chuyển đổi từ quan tâm đến nhập học.\u003c/p\u003e\u003cp\u003eVị trí này là đầu mối phối hợp giữa chương trình, bộ phận tuyển sinh, marketing, các đơn vị học thuật và các đối tác liên quan để bảo đảm toàn bộ hành trình ứng viên được triển khai bài bản, chuyên nghiệp và hiệu quả.\u003c/p\u003e25:T18bf,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTuyển sinh và phát triển nguồn ứng viên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tXây dựng và triển khai kế hoạch tuyển sinh nhằm đạt chỉ tiêu đầu vào của chương trình\u003c/p\u003e\u003cp\u003e●\tPhát triển nguồn ứng viên qua các kênh như trường đại học, cao đẳng, trung tâm đào tạo, cộng đồng công nghệ, mạng lưới nghề nghiệp và nền tảng số\u003c/p\u003e\u003cp\u003e●\tQuản lý phễu tuyển sinh từ tạo lead, tư vấn, chăm sóc ứng viên, theo dõi hồ sơ đến xác nhận nhập học\u003c/p\u003e\u003cp\u003e●\tPhối hợp tổ chức các mốc tuyển sinh như tiếp nhận hồ sơ, truyền thông quy trình, hỗ trợ bài kiểm tra đầu vào và theo dõi kết quả tuyển sinh\u003c/p\u003e\u003cp\u003e●\tTheo dõi chất lượng nguồn ứng viên và đề xuất giải pháp cải thiện hiệu quả chuyển đổi\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eMarketing và truyền thông chương trình\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tXây dựng và triển khai kế hoạch marketing tổng thể cho chương trình trên các kênh online và offline\u003c/p\u003e\u003cp\u003e●\tThiết kế các chiến dịch truyền thông làm nổi bật giá trị khác biệt của chương trình như đào tạo thực chiến, dự án thật, miễn học phí, phụ cấp hàng tháng và cơ hội việc làm sau tốt nghiệp\u003c/p\u003e\u003cp\u003e●\tPhối hợp sản xuất và quản lý nội dung truyền thông trên website, social media, email, landing page, brochure, bài PR, bài giới thiệu chương trình và các tài liệu tuyển sinh khác\u003c/p\u003e\u003cp\u003e●\tTheo dõi, đo lường và tối ưu hiệu quả chiến dịch dựa trên dữ liệu như lượt tiếp cận, số lượng lead, tỷ lệ chuyển đổi và chất lượng hồ sơ\u003c/p\u003e\u003cp\u003e●\tĐảm bảo thông điệp truyền thông nhất quán, rõ ràng và phù hợp với định vị của chương trình\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTương tác ứng viên và hoạt động outreach\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tLà đầu mối liên hệ với ứng viên trong suốt quá trình tìm hiểu, ứng tuyển và nhập học\u003c/p\u003e\u003cp\u003e●\tTổ chức các hoạt động tương tác như webinar, hội thảo giới thiệu chương trình, phiên tư vấn, Q\u0026A và sự kiện tuyển sinh\u003c/p\u003e\u003cp\u003e●\tXây dựng trải nghiệm ứng viên chuyên nghiệp thông qua phản hồi kịp thời, thông tin rõ ràng và hỗ trợ xuyên suốt hành trình ứng tuyển\u003c/p\u003e\u003cp\u003e●\tPhát triển quan hệ với các trường, khoa, câu lạc bộ, cộng đồng nghề nghiệp và các đối tác có thể hỗ trợ tạo nguồn ứng viên hoặc gia tăng độ phủ cho chương trình\u003c/p\u003e\u003cp\u003e●\tĐại diện chương trình tại các sự kiện tuyển sinh, ngày hội nghề nghiệp và hoạt động kết nối liên quan\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý dữ liệu và báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tCập nhật, quản lý và phân tích dữ liệu ứng viên, lead, hiệu quả nguồn tuyển sinh và kết quả chiến dịch\u003c/p\u003e\u003cp\u003e●\tChuẩn bị báo cáo định kỳ về hiệu quả tuyển sinh, hiệu suất kênh, tỷ lệ chuyển đổi và chất lượng ứng viên\u003c/p\u003e\u003cp\u003e●\tĐề xuất cải tiến quy trình, công cụ và cách phối hợp nhằm nâng cao hiệu quả tuyển sinh và marketing\u003c/p\u003e\u003cp\u003e●\tThực hiện các nhiệm vụ khác theo phân công của cấp quản lý\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYÊU CẦU CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tTốt nghiệp đại học trở lên các ngành Marketing, Truyền thông, Quản trị Kinh doanh, Giáo dục, Nhân sự hoặc các ngành liên quan\u003c/p\u003e\u003cp\u003e●\tBằng thạc sĩ hoặc chứng chỉ chuyên môn liên quan là một lợi thế\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tTối thiểu 3–4 năm kinh nghiệm trong lĩnh vực tuyển sinh, marketing giáo dục, truyền thông tuyển dụng, phát triển nguồn ứng viên hoặc lĩnh vực tương đương\u003c/p\u003e\u003cp\u003e●\tƯu tiên ứng viên có kinh nghiệm trong môi trường giáo dục, đào tạo, công nghệ hoặc các chương trình phát triển nhân tài\u003c/p\u003e\u003cp\u003e●\tCó kinh nghiệm xây dựng và triển khai các chiến dịch tuyển sinh hoặc marketing với kết quả đo lường cụ thể\u003c/p\u003e\u003cp\u003e●\tCó kinh nghiệm làm việc với CRM, phễu tuyển sinh và các hoạt động chăm sóc ứng viên là một lợi thế\u003c/p\u003e\u003cp\u003e●\tCó kinh nghiệm phối hợp với nhiều bên liên quan trong môi trường tốc độ nhanh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng \u0026 Năng lực\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tHiểu biết tốt về tuyển sinh, marketing, hành vi ứng viên và hành trình chuyển đổi\u003c/p\u003e\u003cp\u003e●\tCó kỹ năng lập kế hoạch, triển khai chiến dịch và quản lý nhiều đầu việc hiệu quả\u003c/p\u003e\u003cp\u003e●\tCó kỹ năng giao tiếp và viết tốt bằng tiếng Việt và tiếng Anh\u003c/p\u003e\u003cp\u003e●\tCó khả năng xây dựng thông điệp thuyết phục và điều chỉnh nội dung phù hợp với từng nhóm đối tượng\u003c/p\u003e\u003cp\u003e●\tCó tư duy dữ liệu, khả năng theo dõi hiệu quả chiến dịch, hiệu quả kênh và tỷ lệ chuyển đổi\u003c/p\u003e\u003cp\u003e●\tThành thạo các công cụ marketing số, CRM, Microsoft Office, Excel/Google Sheets và các công cụ báo cáo cơ bản\u003c/p\u003e\u003cp\u003e●\tCó khả năng làm việc độc lập và phối hợp tốt với các bộ phận liên quan\u003c/p\u003e\u003cp\u003e●\tHiểu biết về lĩnh vực AI, công nghệ hoặc thị trường nhân lực số là một lợi thế\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhẩm chất cá nhân\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tChủ động, trách nhiệm, kỷ luật và định hướng kết quả\u003c/p\u003e\u003cp\u003e●\tCó tinh thần sở hữu công việc và khả năng thực thi mạnh\u003c/p\u003e\u003cp\u003e●\tNăng động, linh hoạt, sáng tạo và có tư duy giải quyết vấn đề\u003c/p\u003e\u003cp\u003e●\tYêu thích lĩnh vực giáo dục, phát triển nhân tài và tạo cơ hội nghề nghiệp cho người học\u003c/p\u003e\u003cp\u003e●\tCó kỹ năng xây dựng quan hệ và phối hợp hiệu quả với nhiều bên liên quan\u003c/p\u003e\u003cp\u003e●\tTôn trọng và đề cao các giá trị cốt lõi của VinUni, Vingroup\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T757,VinUniversity (VinUni: https://vinuni.edu.vn/) is the first private, not-for-profit Vietnamese university established based on international standards. The university integrates the models of excellent international universities with the unique cultural and economic characteristics of Vietnam, to make a breakthrough in Vietnamese higher education and to become a world-class university.\r\n\r\nVinUni has strategic collaborations with the world’s leading universities, including Cornell University and the University of Pennsylvania. These universities have become close advisors and crucial enablers in establishing the three colleges at VinUni: College of Business and Management, College of Engineering and Computer Science, and College of Health Sciences. Every aspect of the University: its curricula, research, faculty, student body, facilities, and campus life, is being developed to meet the highest standards set by the world’s leading accrediting and ranking organizations, such as ABET, AACSB, Quacquarelli Symonds (QS) and Times Higher Education (THE).\r\n\r\nVinUni’s founding benefactor Vingroup is one of the biggest private conglomerates in Asia with the largest market capitalization value in Vietnam. As a multisector corporation, Vingroup focuses on three main ar ong\u003eTương tác ứng viên và hoạt động outreach\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tLà đầu mối liên hệ với ứng viên trong suốt quá trình tìm hiểu, ứng tuyển và nhập học\u003c/p\u003e\u003cp\u003e●\tTổ chức các hoạt động tương tác như webinar, hội thảo giới thiệu chương trình, phiên tư vấn, Q\u0026A và sự kiện tuyển sinh\u003c/p\u003e\u003cp\u003e●\tXây dựng trải nghiệm ứng viên chuyên nghiệp thông qua phản hồi kịp thời, thông tin rõ ràng và hỗ trợ xuyên suốt hành trình ứng tuyển\u003c/p\u003e\u003cp\u003e●\tPhát triển quan hệ với các trường, khoa, câu lạc bộ, cộng đồng nghề nghiệp và các đối tác có thể hỗ trợ tạo nguồn ứng viên hoặc gia tăng độ phủ cho chương trình\u003c/p\u003e\u003cp\u003e●\tĐại diện chương trình tại các sự kiện tuyển sinh, ngày hội nghề nghiệp và hoạt động kết nối liên quan\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý dữ liệu và báo cáo\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tCập nhật, quản lý và phân tích dữ liệu ứng viên, lead, hiệu quả nguồn tuyển sinh và kết quả chiến dịch\u003c/p\u003e\u003cp\u003e●\tChuẩn bị báo cáo định kỳ về hiệu quả tuyển sinh, hiệu suất kênh, tỷ lệ chuyển đổi và chất lượng ứng viên\u003c/p\u003e\u003cp\u003e●\tĐề xuất cải tiến quy trình, công cụ và cách phối hợp nhằm nâng cao hiệu quả tuyển sinh và marketing\u003c/p\u003e\u003cp\u003e●\tThực hiện các nhiệm vụ khác theo phân công của cấp quản lý\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYÊU CẦU CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e●\tTốt nghiệp đại học trở lên các ngành Marketing, Truyền thông, Quản trị Kinh doanh, Giáo dục, Nhân sự hoặc các ngành liên quan\u003c/p\u003e\u003cp\u003e●\tBằng thạc sĩ hoặc chứng chỉ chuyên môn liên quan là một lợi thế\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm\u003c/strong\u003e\u003c/p\u003e
