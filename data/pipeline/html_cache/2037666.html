tic/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T19a7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eCORPORATE SECURITY INTRODUCTION\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCorporate security plays a vital role in safeguarding the company’s people, assets, operations and brands across the globe. It involves implementing strategic measures to protect against risks such as theft, fraud or mitigate disruption from events including protests and unrest. We provide security advice and guidance to leaders of operational sites or functions working in the market, including Sales and Logistics. Corporate Security enables the company to maintain its fast pace and deliver products efficiently and securely to customers.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJOB PURPOSE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eUnilever is the place where you can bring your purpose to life with the work that you do – creating a better business and a better world. If you are motivated to drive a market security programme to keep our people, assets and brands safe then this role is just for you!\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWHAT WILL YOUR MAIN RESPONSIBILITIES BE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMarket Security Risks Assessment and Advice to Business Leaders and Functions:\u003c/p\u003e\u003cp\u003e• Identification of Risks: Analyse potential security threats in the market, including cyber threats, regulatory changes, and geopolitical factors that could impact business operations.\u003c/p\u003e\u003cp\u003e• Impact Analysis: Evaluate how identified risks could affect various business functions, including finance, operations, and reputation, to prioritize risk management efforts.\u003c/p\u003e\u003cp\u003e• Recommendations: Provide actionable advice to business leaders on mitigating risks, enhancing security protocols, and fostering a culture of risk awareness within the organization.\u003c/p\u003e\u003cp\u003eSales Team and Retail Security Support \u0026 Guidance:\u003c/p\u003e\u003cp\u003e• Comprehensive Security Assessments: Conduct detailed security evaluations and provide actionable guidelines to field staff, enhancing their ability to navigate and penetrate market coverage safely and effectively.\u003c/p\u003e\u003cp\u003e• Data-Driven Programme Development: Collect and analyse data to support the Market Security Lead in formulating targeted strategies for accessing challenging and insecure areas, ensuring informed decision-making.\u003c/p\u003e\u003cp\u003e• Dynamic Heat Mapping: Maintain and regularly update a comprehensive heat map that tracks the presence of field employees, logistics operations, and distributors, facilitating real-time insights into security dynamics across the market.\u003c/p\u003e\u003cp\u003eLogistics Security:\u003c/p\u003e\u003cp\u003e• Compliance and Risk Assessments: Conduct thorough evaluations of contracted trucking companies’ security equipment and logistics routes, providing actionable reports to the logistics team.\u003c/p\u003e\u003cp\u003e• Site Security Evaluations: Perform comprehensive site visits and security assessments of company owned and contracted warehouses to ensure robust protective measures are in place.\u003c/p\u003e\u003cp\u003e• Monthly Security Reporting: Submit regular updates and recommendations to logistics stakeholders to drive improvement in security protocols.\u003c/p\u003e\u003cp\u003eTravel Security Management and Executive Movement:\u003c/p\u003e\u003cp\u003e• Route and Accommodation Security Assessments: Conduct thorough evaluations of travel routes and approved hotels to ensure safe transit for UL Leadership Teams (LTs) and visiting executives.\u003c/p\u003e\u003cp\u003e• Training and Induction: Provide training on security protocols for drivers and escorts, along with security inductions for visiting executives, tailored to specific assessments.\u003c/p\u003e\u003cp\u003e• Ongoing Security Management: Regularly update the Travel Security Management Plan and UL Travel Security Guidelines, incorporating recent security incidents and collaborating with external security partners.\u003c/p\u003e\u003cp\u003eMarketing Events Security:\u003c/p\u003e\u003cp\u003e• Comprehensive Security Assessments: Conduct thorough security evaluations of the event location, providing detailed guidelines on access control, crowd management, and physical security perimeters to ensure a safe environment.\u003c/p\u003e\u003cp\u003e• Emergency Response Plan Review: Analyse and enhance the Security Emergency Response Plan for the event, ensuring preparedness for any potential incidents and effective crisis management.\u003c/p\u003e\u003cp\u003e• Strategic Personnel Deployment: Review and approve the deployment of security personnel, ensuring optimal coverage and readiness to address any security challenges during the event.\u003c/p\u003e\u003cp\u003eIncident Management Support and Specialist Investigation and Coordination:\u003c/p\u003e\u003cp\u003e• Proactive Crisis Management Support: Provide security guidance and resources during crisis situations, ensuring effective communication, rapid response coordination, and the implementation of safety protocols to protect personnel and assets while minimizing disruption to operations.\u003c/p\u003e\u003cp\u003e• Thorough Incident Investigations: Conduct in-depth investigations of market-level security incidents, providing stakeholders with well-researched recommendations for preventive and corrective actions to enhance overall security measures.\u003c/p\u003e\u003cp\u003e• Cross-Functional Collaboration: Work closely with cross-functional teams to ensure a comprehensive approach to investigations, leveraging diverse expertise to uncover insights and improve incident response strategies.\u003c/p\u003e\u003cp\u003eManagement of Security Technologies and National Level Contracts:\u003c/p\u003e\u003cp\u003e• Integration of Advanced Security Technologies: Implement and manage cutting-edge security technologies, such as surveillance systems and access control solutions, to enhance the effectiveness of national contracts and ensure comprehensive protection across all sites.\u003c/p\u003e\u003cp\u003e• Oversight of Contractual Compliance and Performance: Monitor and evaluate the performance of national security contracts, ensuring adherence to service level agreements and optimizing site guarding operations to meet organizational security objectives.\u003c/p\u003e\u003cp\u003eLiaison with Market Partners (e.g., Legal, BI, SC, Finance):\u003c/p\u003e\u003cp\u003e• Security Guidance and Updates: Collaborate with market partners to provide essential security guidelines and updates on the latest threats, trends, and lessons learned from security incidents.\u003c/p\u003e\u003cp\u003e• Support for Investigations: Work alongside the Legal team to assist the Market Security Lead in investigating Business Integrity violations, ensuring compliance and accountability.\u003c/p\u003e\u003cp\u003eThis role demands a strategic blend of business acumen and security risk analysis to deliver practical and effective security solutions tailored for the market. The ideal candidate will be an adept communicator, capable of collaborating seamlessly with various functional partners to ensure comprehensive security support.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T1448,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eExperiences \u0026 Qualifications\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducation:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Bachelor’s Degree: A degree in a relevant field such as Security Management, Risk Management, or a related discipline is required.\u003c/p\u003e\u003cp\u003ePreferred Professional Certifications:\u003c/p\u003e\u003cp\u003e• Certified Security Professional (CSP): Validates expertise in security management and best practices.\u003c/p\u003e\u003cp\u003e• Facility Security Auditor (FSA): Confirms proficiency in assessing and enhancing facility security protocols.\u003c/p\u003e\u003cp\u003e• Transport/Logistics Security Certification: Focuses on securing transportation and logistics operations effectively.\u003c/p\u003e\u003cp\u003e• Industrial Security Certification: Demonstrates knowledge in safeguarding industrial environments and assets.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExperience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Minimum of 2 Years: Relevant experience in corporate security or risk management roles, preferably in fast-paced sectors such as FMCG, logistics, or manufacturing.\u003c/p\u003e\u003cp\u003e• Security Risk Assessment Expertise: Proven track record in conducting security risk assessments, identifying vulnerabilities, and implementing effective risk mitigation strategies.\u003c/p\u003e\u003cp\u003e• Contribution to Security Programs: Experience in significantly contributing to national security programs, including technology deployment and logistics security.\u003c/p\u003e\u003cp\u003e• Cross-Functional Collaboration: Experience working within multinational organizations, coordinating with internal teams (IT, HR, Legal, Supply Chain) to address and resolve security challenges.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSkills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Risk Management and Assessment: Expertise in identifying, analysing, and mitigating security risks to protect organizational assets and ensure operational continuity.\u003c/p\u003e\u003cp\u003e• Corporate Security Expertise: In-depth knowledge of security protocols and best practices for both office environments and manufacturing facilities, ensuring a safe workplace.\u003c/p\u003e\u003cp\u003e• Logistics and Sales Security: Proficient in implementing security measures tailored to logistics and sales operations, safeguarding assets throughout the supply chain.\u003c/p\u003e\u003cp\u003e• Crisis Management and Business Continuity: Skilled in developing and executing crisis management plans to maintain business operations during emergencies and ensure swift recovery.\u003c/p\u003e\u003cp\u003e• Project Management: Strong project management abilities, overseeing security initiatives from conception to implementation, ensuring timely and effective execution.\u003c/p\u003e\u003cp\u003e• Effective Communication and Collaboration: Excellent interpersonal skills, fostering collaboration across teams and facilitating clear communication to address security challenges.\u003c/p\u003e\u003cp\u003eLanguage Skill\u003c/p\u003e\u003cp\u003eFull proficiency in English is essential with a high standard of writing competence and storytelling skill required.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLeadership\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• You are energized by delivering fantastic results. You are an example to others – both your results and your resilience. You are constantly on the lookout for better ways to do things, engaging and collaborating with others along the way.\u003c/p\u003e\u003cp\u003e• As an individual you are the one responsible for your own wellbeing and delivering high standards of work. You must also focus on the Consumer and what they need. You are humble and have your head up, looking around to interpret evidence and data smartly, spot issues and opportunities to make things better.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Critical SOL (Standards of Leadership) Behaviors\u003c/p\u003e\u003cp\u003eo PASSION FOR HIGH PERFORMANCE: Takes personal responsibility and accountability for execution and results. Has an owner’s mindset, using data and insight to make decisions.\u003c/p\u003e\u003cp\u003eo PERSONAL MASTERY: Sets high standards for themselves. Actively builds own wellbeing and resilience.\u003c/p\u003e\u003cp\u003eo CONSUMER LOVE: Whatever their role, always looks for better ways to serve consumers. Invests time inside and outside to understand the needs of consumers.\u003c/p\u003e\u003cp\u003eo PURPOSE \u0026 SERVICE: Has humility, understanding that leadership is service to others, inside and outside Unilever.\u003c/p\u003e\u003cp\u003eo AGILITY: Explores the world around them, continually learning and developing their skills.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eUnilever embraces diversity and encourages applicants from all walks of life! This means giving full and fair consideration to all applicants and continuing development of all employees regardless of age, disability, gender reassignment, race, religion or belief, sex, sexual orientation, marriage and civil partnership, and pregnancy and maternity.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003eUnilever is an organisation committed to equity, inclusion and diversity to drive our business results and create a better future, every day, for our diverse employees, global consumers, partners, and communities. We believe a diverse workforce allows us to match our growth ambitions and drive inclusion across the business. At Unilever we are interested in every individual bringing their ‘Whole Self’ to work and this includes you! Thus if you require any support or access requirements, we encourage you to advise us at the time of your application so that we can support you through your recruitment journey. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T19a7,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eCORPORATE SECURITY INTRODUCTION\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCorporate security plays a vital role in safeguarding the company’s people, assets, operations and brands across the globe. It involves implementing strategic measures to protect against risks such as theft, fraud or mitigate disruption from events including protests and unrest. We provide security advice and guidance to leaders of operational sites or functions working in the market, including Sales and Logistics. Corporate Security enables the company to maintain its fast pace and deliver products efficiently and securely to customers.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eJOB PURPOSE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eUnilever is the place where you can bring your purpose to life with the work that you do – creating a better business and a better world. If you are motivated to drive a market security programme to keep our people, assets and brands safe then this role is just for you!\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eWHAT WILL YOUR MAIN RESPONSIBILITIES BE\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMarket Security Risks Assessment and Advice to Business Leaders and Functions:\u003c/p\u003e\u003cp\u003e• Identification of Risks: Analyse potential security threats in the market, including cyber threats, regulatory changes, and geopolitical factors that could impact business operations.\u003c/p\u003e\u003cp\u003e• Impact Analysis: Evaluate how identified risks could affect various business functions, including finance, operations, and reputation, to prioritize risk management efforts.\u003c/p\u003e\u003cp\u003e• Recommendations: Provide actionable advice to business leaders on mitigating risks, enhancing security protocols, and fostering a culture of risk awareness within the organization.\u003c/p\u003e\u003cp\u003eSales Team and Retail Security Support \u0026 Guidance:\u003c/p\u003e\u003cp\u003e• Comprehensive Security Assessments: Conduct detailed security evaluations and provide actionable guidelines to field staff, enhancing their ability to navigate and penetrate market coverage safely and effectively.\u003c/p\u003e\u003cp\u003e• Data-Driven Programme Development: Collect and analyse data to support the Market Security Lead in formulating targeted strategies for accessing challenging and insecure areas, ensuring informed decision-making.\u003c/p\u003e\u003cp\u003e• Dynamic Heat Mapping: Maintain and regularly update a comprehensive heat map that tracks the presence of field employees, logistics operations, and distributors, facilitating real-time insights into security dynamics across the market.\u003c/p\u003e\u003cp\u003eLogistics Security:\u003c/p\u003e\u003cp\u003e• Compliance and Risk Assessments: Conduct thorough evaluations of contracted trucking companies’ security equipment and logistics routes, providing actionable reports to the logistics team.\u003c/p\u003e\u003cp\u003e• Site Security Evaluations: Perform comprehensive site visits and security assessments of company owned and contracted warehouses to ensure robust protective measures are in place.\u003c/p\u003e\u003cp\u003e• Monthly Security Reporting: Submit regular updates and recommendations to logistics stakeholders to drive improvement in security protocols.\u003c/p\u003e\u003cp\u003eTravel Security Management and Executive Movement:\u003c/p\u003e\u003cp\u003e• Route and Accommodation Security Assessments: Conduct thorough evaluations of travel routes and approved hotels to ensure safe transit for UL Leadership Teams (LTs) and visiting executives.\u003c/p\u003e\u003cp\u003e• Training and Induction: Provide training on security protocols for drivers and escorts, along with security inductions for visiting executives, tailored to specific assessments.\u003c/p\u003e\u003cp\u003e• Ongoing Security Management: Regularly update the Travel Security Management Plan and UL Travel Security Guidelines, incorporating recent security incidents and collaborating with external security partners.\u003c/p\u003e\u003cp\u003eMarketing Events Security:\u003c/p\u003e\u003cp\u003e• Comprehensive Security Assessments: Conduct thorough security evaluations of the event location, providing detailed guidelines on access control, crowd management, and physical security perimeters to ensure a safe environment.\u003c/p\u003e\u003cp\u003e• Emergency Response Plan Review: Analyse and enhance the Security Emergency Response Plan for the event, ensuring preparedness for any potential incidents and effective crisis management.\u003c/p\u003e\u003cp\u003e• Strategic Personnel Deployment: Review and approve the deployment of security personnel, ensuring optimal coverage and readiness to address any security challenges during the event.\u003c/p\u003e\u003cp\u003eIncident Management Support and Specialist Investigation and Coordination:\u003c/p\u003e\u003cp\u003e• Proactive Crisis Management Support: Provide security guidance and resources during crisis situations, ensuring effective communication, rapid response coordination, and the implementation of safety protocols to protect personnel and assets while minimizing disruption to operations.\u003c/p\u003e\u003cp\u003e• Thorough Incident Investigations: Conduct in-depth investigations of market-level security incidents, providing stakeholders with well-researched recommendations for preventive and corrective actions to enhance overall security measures.\u003c/p\u003e\u003cp\u003e• Cross-Functional Collaboration: Work closely with cross-functional teams to ensure a comprehensive approach to investigations, leveraging diverse expertise to uncover insights and improve incident response strategies.\u003c/p\u003e\u003cp\u003eManagement of Security Technologies and National Level Contracts:\u003c/p\u003e\u003cp\u003e• Integration of Advanced Security Technologies: Implement and manage cutting-edge security technologies, such as surveillance systems and access control solutions, to enhance the effectiveness of national contracts and ensure comprehensive protection across all sites.\u003c/p\u003e\u003cp\u003e• Oversight of Contractual Compliance and Performance: Monitor and evaluate the performance of national security contracts, ensuring adherence to service level agreements and optimizing site guarding operations to meet organizational security objectives.\u003c/p\u003e\u003cp\u003eLiaison with Market Partners (e.g., Legal, BI, SC, Finance):\u003c/p\u003e\u003cp\u003e• Security Guidance and Updates: Collaborate with market partners to provide essential security guidelines and updates on the latest threats, trends, and lessons learned from security incidents.\u003c/p\u003e\u003cp\u003e• Support for Investigations: Work alongside the Legal team to assist the Market Security Lead in investigating Business Integrity violations, ensuring compliance and accountability.\u003c/p\u003e\u003cp\u003eThis role demands a strategic blend of business acumen and security risk analysis to deliver practical and effective security solutions tailored for the market. The ideal candidate will be an adept communicator, capable of collaborating seamlessly with various functional partners to ensure comprehensive security support.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"28:T1448,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eExperiences \u0026 Qualifications\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eEducation:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Bachelor’s Degree: A degree in a relevant field such as Security Management, Risk Management, or a related discipline is required.\u003c/p\u003e\u003cp\u003ePreferred Professional Certifications:\u003c/p\u003e\u003cp\u003e• Certified Security Professional (CSP): Validates expertise in security management and best practices.\u003c/p\u003e\u003cp\u003e• Facility Security Auditor (FSA): Confirms proficiency in assessing and enhancing facility security protocols.\u003c/p\u003e\u003cp\u003e• Transport/Logistics Security Certification: Focuses on securing transportation and logistics operations effectively.\u003c/p\u003e\u003cp\u003e• Industrial Security Certification: Demonstrates knowledge in safeguarding industrial environments and assets.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExperience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Minimum of 2 Years: Relevant experience in corporate security or risk management roles, preferably in fast-paced sectors such as FMCG, logistics, or manufacturing.\u003c/p\u003e\u003cp\u003e• Security Risk Assessment Expertise: Proven track record in conducting security risk assessments, identifying vulnerabilities, and implementing effective risk mitigation strategies.\u003c/p\u003e\u003cp\u003e• Contribution to Security Programs: Experience in significantly contributing to national security programs, including technology deployment and logistics security.\u003c/p\u003e\u003cp\u003e• Cross-Functional Collaboration: Experience working within multinational organizations, coordinating with internal teams (IT, HR, Legal, Supply Chain) to address and resolve security challenges.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSkills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Risk Management and Assessment: Expertise in identifying, analysing, and mitigating security risks to protect organizational assets and ensure operational continuity.\u003c/p\u003e\u003cp\u003e• Corporate Security Expertise: In-depth knowledge of security protocols and best practices for both office environments and manufacturing facilities, ensuring a safe workplace.\u003c/p\u003e\u003cp\u003e• Logistics and Sales Security: Proficient in implementing security measures tailored to logistics and sales operations, safeguarding assets throughout the supply chain.\u003c/p\u003e\u003cp\u003e• Crisis Management and Business Continuity: Skilled in developing and executing crisis management plans to maintain business operations during emergencies and ensure swift recovery.\u003c/p\u003e\u003cp\u003e• Project Management: Strong project management abilities, overseeing security initiatives from conception to implementation, ensuring timely and effective execution.\u003c/p\u003e\u003cp\u003e• Effective Communication and Collaboration: Excellent interpersonal skills, fostering collaboration across teams and facilitating clear communication to address security challenges.\u003c/p\u003e\u003cp\u003eLanguage Skill\u003c/p\u003e\u003cp\u003eFull proficiency in English is essential with a high standard of writing competence and storytelling skill required.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLeadership\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• You are energized by delivering fantastic results. You are an example to others – both your results and your resilience. You are constantly on the lookout for better ways to do things, engaging and collaborating with others along the way.\u003c/p\u003e\u003cp\u003e• As an individual you are the one responsible for your own wellbeing and delivering high standards of work. You must also focus on the Consumer and what they need. You are humble and have your head up, looking around to interpret evidence and data smartly, spot issues and opportunities to make things better.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e• Critical SOL (Standards of Leadership) Behaviors\u003c/p\u003e\u003cp\u003eo PASSION FOR HIGH PERFORMANCE: Takes personal responsibility and accountability for execution and results. Has an owner’s mindset, using data and insight to make decisions.\u003c/p\u003e\u003cp\u003eo PERSONAL MASTERY: Sets high standards for themselves. Actively builds own wellbeing and resilience.\u003c/p\u003e\u
