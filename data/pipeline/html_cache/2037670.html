ofrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Td6d,"])</script><script>self.__next_f.push([1,"I. Đôi nét về công ty \r\nQS LAND  đã và đang ghi đậm dấu ấn của mình trong nhiều lĩnh vực: sản xuất và phân phối gỗ thương mại cho thị trường trong và ngoài nước; cho thuê và quản lý vận hành chuỗi nhà xưởng công nghiệp trực thuộc sở hữu đặt tại Khu công nghiệp Tân Bình, Khu công nghiệp Nam Tân Uyên, Bình Dương; hợp tác đầu tư và phát triển bất động sản.\r\n \r\nDựa trên tiềm lực tài chính vững mạnh và kinh nghiệm tích lũy từ nhiều dự án bất động sản, QS LAND được kì vọng sẽ đóng vai trò chiến lược trong hệ sinh thái bất động sản – công nghiệp – thương mại dịch vụ mà chúng tôi gầy dựng. Cụ thể, QS LAND đặt mục tiêu phát triển trở thành một trong Nhà cung cấp dịch vụ bất động sản chuyên nghiệp và uy tín hàng đầu tại khu vực, thực hiện tư vấn triển khai và phân phối hàng loạt dự án lớn của các chủ đầu tư uy tín, cũng như các dự án cho chính QS LAND phát triển.\r\n \r\nVới định hướng phát triển bền vững, thực hiện cam kết đồng hành và mang lại lợi ích tối ưu, QS LAND luôn đặt khách hàng ở vị trí trọng tâm trên hành trình phụng sự. Chúng tôi xem sự hài lòng của khách hàng là thước đo quan trọng quyết định thành công và khẳng định vị thế của doanh nghiệp, để từ đó không ngừng cải tiến chất lượng, khuyến khích tư duy sáng tạo và ứng dụng tiến bộ công nghệ, nhằm nâng cao giá trị sản phẩm – dịch vụ. “Trao chữ tín – Trọn niềm tin” là thông điệp thông điệp giản đơn, chân thành mà chúng tôi muốn chia sẻ.\r\n\r\n\r\nII. Chiến lược con người\r\n \r\nQS LAND tin rằng nguồn nhân lực là yếu tố cốt lõi, đồng thời là tài sản quý giá giúp chúng tôi tạo dựng nên giá trị dài hạn và bền vững. Chúng tôi chào đón những con người phù hợp, cùng chung giá trị cốt lõi, tràn đầy nhiệt huyết và mong muốn tạo nên sự khác biệt. Thước đo của thành công đến từ sự hài lòng của khách hàng cũng như niềm tự hào về những sản phẩm – dịch vụ mà đội ngũ cùng nhau gầy dựng và phát triển.\r\n \r\nQS LAND chủ động tập hợp những con người ưu tú, những người có tư tưởng, tài năng và bản lĩnh, biết lắng nghe và tôn trọng lẫn nhau. Chúng tôi định hướng xây dựng văn hóa chiến thắng, nơi mà mọi người được khuyến khích để phát huy hết tiềm năng của mình. Cấu trúc thu nhập và phúc lợi của nhân viên được xây dựng dựa trên năng lực và hiệu quả công việc, thành tích cá nhân được ghi nhận đúng thời điểm đi cùng với khen thưởng xứng đáng.\r\n \r\nVà trên hết, chúng tôi mong muốn tại QS LAND, mỗi thành viên đều xem nơi đây là ngôi nhà thứ 2, nơi mọi người gắn bó và dành phần lớn thời gian hàng ngày để cùng sống và làm việc. Dù ở bất cứ vai trò và vị trí nào, chúng tôi luôn mong muốn các thành viên của mình tự hào: tôi là Người QS LAND."])</script><script>self.__next_f.push([1,"24:T714,\u003cp\u003e\u003cstrong\u003e1.\tChiến lược \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tXây dựng chiến lược marketing dài hạn và ngắn hạn phù hợp với mục tiêu kinh doanh từng dự án. \u003c/p\u003e\u003cp\u003e•\tĐịnh vị thương hiệu và phát triển hình ảnh công ty trên thị trường bất động sản. \u003c/p\u003e\u003cp\u003e•\tPhân tích thị trường, khách hàng mục tiêu, đối thủ cạnh tranh để đề xuất chiến lược phù hợp.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tTriển khai Marketing\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tLập kế hoạch và quản lý các chiến dịch marketing đa kênh: Digital Marketing, PR, Event, Offline, Social Media, Branding. \u003c/p\u003e\u003cp\u003e•\tQuản lý hoạt động truyền thông cho các dự án: mở bán, ra mắt, sự kiện bán hàng. \u003c/p\u003e\u003cp\u003e•\tTối ưu hiệu quả các kênh quảng cáo (Facebook, Google, TikTok, SEO,…).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3.\tQuản lý đội ngũ\u  đó không ngừng cải tiến chất lượng, khuyến khích tư duy sáng tạo và ứng dụng tiến bộ công nghệ, nhằm nâng cao giá trị sản phẩm – dịch vụ. “Trao chữ tín – Trọn niềm tin” là thông điệp thông điệp giản đơn, chân thành mà chúng tôi muốn chia sẻ.\r\n\r\n\r\nII. Chiến lược con người\r\n \r\nQS LAND tin rằng nguồn nhân lực là yếu tố cốt lõi, đồng thời là tài sản quý giá giúp chúng tôi tạo dựng nên giá trị dài hạn và bền vững. Chúng tôi chào đón những con người phù hợp, cùng chung giá trị cốt lõi, tràn đầy nhiệt huyết và mong muốn tạo nên sự khác biệt. Thước đo của thành công đến từ sự hài lòng của khách hàng cũng như niềm tự hào về những sản phẩm – dịch vụ mà đội ngũ cùng nhau gầy dựng và phát triển.\r\n \r\nQS LAND chủ động tập hợp những con người ưu tú, những người có tư tưởng, tài năng và bản lĩnh, biết lắng nghe và tôn trọng lẫn nhau. Chúng tôi định hướng xây dựng văn hóa chiến thắng, nơi mà mọi người được khuyến khích để phát huy hết tiềm năng của mình. Cấu trúc thu nhập và phúc lợi của nhân viên được xây dựng dựa trên năng lực và hiệu quả công việc, thành tích cá nhân được ghi nhận đúng thời điểm đi cùng với khen thưởng xứng đáng.\r\n \r\nVà trên hết, chúng tôi mong muốn tại QS LAND, mỗi thành viên đều xem nơi đây là ngôi nhà thứ 2, nơi mọi người gắn bó và dành phần lớn thời gian hàng ngày để cùng sống và làm việc. Dù ở bất cứ vai trò và vị trí nào, chúng tôi luôn mong muốn các thành viên của mình tự hào: tôi là Người QS LAND."])</script><script>self.__next_f.push([1,"3f:{\"companyId\":348014,\"jobImageURLs\":\"$40\",\"jobVideoURLs\":null,\"companyName\":\"Công ty cổ phần Đầu tư QS Land\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/ee/11447461.png\",\"companySizeId\":\"\",\"companyProfile\":\"$41\",\"contactName\":\"Đào Đặng Sang ( Mr Kenny )\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"21 Lý Thái Tổ, P. Thới Hòa , Thành phố mới Bình Dương  ( Tp Thủ Dầu Một )\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"
