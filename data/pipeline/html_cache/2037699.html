 one of the biggest private conglomerates in Asia with the largest market capitalization value in Vietnam. As a multisector corporation, Vingroup focuses on three main areas: Technology; Industrials; and Property Services. VinUni is proud to be a part of the Vingroup ecosystem, giving its students opportunities to connect with several high quality research institutes (such as VinAI, VinBrain, and Vin BigData), pioneering industrial enterprises (such as VinSmart and VinFast), and leading Vietnamese companies (such as Vinpearl, Vincom Retail, Vinmec, and Vinhomes).\r\n\r\nVinUniversity is seeking entrepreneurial-minded intellectuals who are passionate about higher education to join our team to accelerate the formation of a truly world-class university in Vietnam.24:T646,\u003cp\u003e\u003cstrong\u003eGIỚI THIỆU VỀ CHƯƠNG TRÌNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChương trình Đào tạo Nhân tài AI Thực chiến là sáng kiến đặc biệt của Tập đoàn Vingroup do VinUniversity phối hợp triển khai nhằm đào tạo nguồn nhân lực AI có năng lực thực hành cao, có thể tham gia giải quyết các bài toán thực tiễn ngay sau đào tạo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChương trình kết hợp giữa học phần nền tảng và giai đoạn thực chiến với dự án AI thật, dưới sự hướng dẫn của giảng viên, mentor và quản lý dự án từ VinUni, Vingroup và các đối tác. Học viên được miễn học phí, nhận phụ cấp hàng tháng và có cơ hội việc làm hấp dẫn trong hệ sinh thái Vingroup sau tốt nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGIỚI THIỆU VỀ VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChuyên viên/Quản lý Hành chính, Kế hoạch \u0026 Vận hành Chương trình chịu trách nhiệm hỗ trợ nền tảng vận hành của chương trình, bao gồm lập kế hoạch hành đ"])</script><script>self.__next_f.push([1,"ộng, theo dõi tiến độ, quản lý ngân sách, điều phối hợp đồng, hồ sơ, thanh toán, mua sắm và các thủ tục hành chính liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eVị trí này là đầu mối kết nối giữa ban điều hành chương trình và các đơn vị như tài chính, mua sắm, pháp chế, nhân sự, học thuật, đối tác doanh nghiệp và nhà cung cấp, nhằm bảo đảm các hoạt động được triển khai đúng hạn, đúng quy trình và minh bạch.\u003c/p\u003e25:T22be,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLập kế hoạch và theo dõi triển khai\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp xây dựng kế hoạch hành động tổng thể và kế hoạch chi tiết cho từng giai đoạn của chương trình\u003c/p\u003e\u003cp\u003eTheo dõi tiến độ các đầu việc, cập nhật trạng thái thực hiện, nhắc việc và cảnh báo sớm các rủi ro ảnh hưởng đến timeline\u003c/p\u003e\u003cp\u003eĐiều phối các cuộc họp vận hành; chuẩn bị agenda, biên bản họp, danh sách đầu việc và theo dõi thực hiện sau họp\u003c/p\u003e\u003cp\u003eChuẩn bị báo cáo định kỳ hoặc đột xuất về tiến độ triển khai, các vấn đề tồn đọng và đề xuất hướng xử lý\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý ngân sách, chi phí và thanh toán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHỗ trợ xây dựng kế hoạch ngân sách theo từng hạng mục hoạt động của chương trình\u003c/p\u003e\u003cp\u003eTheo dõi việc sử dụng ngân sách, đối chiếu chi phí thực tế với kế hoạch đã được phê duyệt và cập nhật các biến động ngân sách khi cần\u003c/p\u003e\u003cp\u003ePhối hợp thực hiện các thủ tục đề xuất chi, tạm ứng, thanh toán, quyết toán và các hồ sơ tài chính liên quan\u003c/p\u003e\u003cp\u003eTheo dõi tiến độ thanh toán cho các hợp đồng, nhà cung cấp, giảng viên, chuyên gia và các đối tác liên quan; bảo đảm hồ sơ đầy đủ, chính xác và đúng hạn\u003c/p\u003e\u003cp\u003eTổng hợp, rà soát và lưu trữ chứng từ, hóa đơn, đề nghị thanh toán và tài liệu liên quan theo đúng quy định\u003c/p\u003e\u003cp\u003eHỗ trợ chuẩn bị báo cáo ngân sách, chi phí và dữ liệu phục vụ quản trị nội bộ, kiểm tra hoặc đối soát\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý hợp đồng, hồ sơ và tuân thủ hành chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp thực hiện các thủ tục liên quan đến hợp đồng với giảng viên, chuyên gia, nhà cung cấp và đối tác phục vụ chương trình\u003c/p\u003e\u003cp\u003eTheo dõi toàn bộ vòng đời hợp đồng từ chuẩn bị hồ sơ, trình phê duyệt, ký kết, gia hạn, điều chỉnh, thanh lý đến lưu trữ\u003c/p\u003e\u003cp\u003eLàm việc với các đơn vị liên quan như pháp chế, tài chính, mua sắm và nhân sự để bảo đảm quy trình hợp đồng được thực hiện đúng quy định và đúng tiến độ\u003c/p\u003e\u003cp\u003eQuản lý hồ sơ hành chính, biểu mẫu, công văn, tài liệu trình ký và hồ sơ chương trình một cách khoa học, bảo mật và dễ truy xuất\u003c/p\u003e\u003cp\u003eHỗ trợ rà soát tính tuân thủ của các thủ tục hành chính, tài chính và vận hành theo quy định nội bộ của VinUni và Vingroup\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐiều phối mua sắm, hậu cần và hỗ trợ vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHỗ trợ lập kế hoạch mua sắm, thuê dịch vụ, chuẩn bị hậu cần và các nguồn lực cần thiết cho hoạt động đào tạo và vận hành chương trình\u003c/p\u003e\u003cp\u003ePhối hợp với các đơn vị nội bộ và nhà cung cấp trong việc chuẩn bị phòng học, thiết bị, vật tư, tài liệu, dịch vụ sự kiện và các nhu cầu hành chính khác\u003c/p\u003e\u003cp\u003eTheo dõi các yêu cầu mua sắm từ khâu đề xuất, phê duyệt, đặt hàng, nghiệm thu đến thanh toán; bảo đảm tiến độ, chất lượng và hiệu quả chi phí\u003c/p\u003e\u003cp\u003eHỗ trợ tổ chức các cuộc họp, workshop, hội thảo, onboarding, hoạt động nội bộ hoặc sự kiện liên quan từ góc độ hậu cần và điều phối\u003c/p\u003e\u003cp\u003eTheo dõi chất lượng cung ứng dịch vụ và xử lý kịp thời các vấn đề phát sinh trong quá trình triển khai\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExternal Engagement và phối hợp đối tác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLà đầu mối điều phối các công việc hành chính – vận hành với đối tác doanh nghiệp, chuyên gia bên ngoài, nhà cung cấp và các bên liên quan khác của chương trình\u003c/p\u003e\u003cp\u003eHỗ trợ chuẩn bị tài liệu, lịch làm việc, thư mời, biên bản, hồ sơ thanh toán và các thủ tục liên quan cho các hoạt động làm việc với bên ngoài\u003c/p\u003e\u003cp\u003ePhối hợp với các đối tác trong việc tổ chức hoạt động thực chiến, workshop, mentoring, tham quan, tọa đàm nghề nghiệp hoặc các hoạt động hỗ trợ đầu ra cho học viên\u003c/p\u003e\u003cp\u003eDuy trì trao đổi thông tin đầy đủ, kịp thời và chuyên nghiệp với các bên liên quan bên ngoài nhằm bảo đảm trải nghiệm hợp tác tích cực và hiệu quả\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHỗ trợ đầu ra và theo dõi tình trạng đi làm của học viên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp với các bộ phận liên quan để hỗ trợ các hoạt động liên quan đến đầu ra của chương trình, bao gồm tổng hợp dữ liệu hoàn thành chương trình, danh sách học viên tốt nghiệp và thông tin bàn giao cho các đơn vị liên quan\u003c/p\u003e\u003cp\u003eHỗ trợ điều phối các hoạt động kết nối việc làm, giới thiệu cơ hội nghề nghiệp, phỏng vấn hoặc tiếp nhận học viên vào các đơn vị phù hợp trong hệ sinh thái\u003c/p\u003e\u003cp\u003eTheo dõi và cập nhật dữ liệu về tình trạng đi làm, đơn vị tiếp nhận, kết quả đầu ra và các thông tin liên quan của học viên sau tốt nghiệp\u003c/p\u003e\u003cp\u003ePhối hợp chuẩn bị các báo cáo về đầu ra, tỷ lệ đi làm và dữ liệu liên quan phục vụ quản trị chương trình và đánh giá hiệu quả triển khai\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐiều phối nội bộ và cải tiến vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLà đầu mối hỗ trợ kết nối thông tin giữa ban điều hành chương trình và các bộ phận nội bộ liên quan\u003c/p\u003e\u003cp\u003eHỗ trợ chuẩn bị tài liệu quản trị, dashboard, báo cáo vận hành và hồ sơ phục vụ phê duyệt\u003c/p\u003e\u003cp\u003eTheo dõi các đầu việc liên phòng ban để bảo đảm sự phối hợp thông suốt\u003c/p\u003e\u003cp\u003eĐề xuất cải tiến quy trình, biểu mẫu và cách thức phối hợp nhằm tăng hiệu quả vận hành và kiểm soát tuân thủ\u003c/p\u003e\u003cp\u003eThực hiện các nhiệm vụ khác theo phân công của cấp quản lý\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYÊU CẦU CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTốt nghiệp đại học trở lên các ngành Quản trị Kinh doanh, Tài chính, Kế toán, Hành chính, Quản lý dự án, Luật, Giáo dục hoặc các ngành liên quan\u003c/p\u003e\u003cp\u003eCác chứng chỉ liên quan đến quản trị vận hành, quản lý dự án, tài chính hoặc hợp đồng là một lợi thế\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTối thiểu 4–6 năm kinh nghiệm trong lĩnh vực hành chính, vận hành, quản lý dự án, ngân sách, hợp đồng, mua sắm hoặc vị trí tương đương\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên có kinh nghiệm tại môi trường giáo dục, đại học, doanh nghiệp lớn hoặc chương trình có nhiều bên liên quan\u003c/p\u003e\u003cp\u003eCó kinh nghiệm theo dõi kế hoạch hành động, tiến độ triển khai, hồ sơ thanh toán, chứng từ và quy trình hợp đồng\u003c/p\u003e\u003cp\u003eCó kinh nghiệm làm việc với nhiều phòng ban và xử lý công việc trong môi trường tốc độ nhanh\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKỹ năng \u0026 Năng lực\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCó kỹ năng lập kế hoạch, tổ chức công việc và theo dõi tiến độ tốt\u003c/p\u003e\u003cp\u003eCó tư duy hệ thống, cẩn thận, chính xác và khả năng quản lý nhiều đầu việc song song\u003c/p\u003e\u003cp\u003eCó kỹ năng giao tiếp, phối hợp liên phòng ban và xử lý công việc theo deadline\u003c/p\u003e\u003cp\u003eCó khả năng làm việc với ngân sách, chi phí, timeline, hợp đồng và hồ sơ hành chính một cách chặt chẽ\u003c/p\u003e\u003cp\u003eCó kỹ năng tổng hợp thông tin, viết biên bản, báo cáo và chuẩn bị tài liệu trình ký tốt\u003c/p\u003e\u003cp\u003eThành thạo Microsoft Office hoặc Google Workspace, đặc biệt là Excel/Google Sheets và PowerPoint/Slides\u003c/p\u003e\u003cp\u003eCó khả năng làm việc bằng tiếng Anh ở mức phục vụ công việc\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePhẩm chất cá nhân\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChủ động, trách nhiệm cao và có tinh thần sở hữu công việc\u003c/p\u003e\u003cp\u003eCẩn thận, chỉn chu, đáng tin cậy và làm việc có cấu trúc\u003c/p\u003e\u003cp\u003eLinh hoạt, bình tĩnh và xử lý tốt trong môi trường nhiều đầu việc\u003c/p\u003e\u003cp\u003eCó tinh thần hỗ trợ, hợp tác tích cực và tư duy cải tiến liên tục\u003c/p\u003e\u003cp\u003eTôn trọng và đề cao các giá trị cốt lõi của VinUni và Vingroup\u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T757,VinUniversity (VinUni: https://vinuni.edu.vn/) is the first private, not-for-profit Vietnamese university established based on international standards. The university integrates the models of excellent international universities with the unique cultural and economic characteristics of Vietnam, to make a breakthrough in Vietnamese higher education and to become a world-class university.\r\n\r\nVinUni has strategic collaborations with the world’s leading universities, including Cornell University and the University of Pennsylvania. These universities have become close advisors and crucial enablers in establishing the three colleges at VinUni: College of Business and Management, College of Engineering and Computer Science, and College of Health Sciences. Every aspect of the University: its cu la, research, faculty, student body, facilities, and campus life, is being developed to meet the highest standards set by the world’s leading accrediting and ranking organizations, such as ABET, AACSB, Quacquarelli Symonds (QS) and Times Higher Education (THE).\r\n\r\nVinUni’s founding benefactor Vingroup is one of the biggest private conglomerates in Asia with the largest market capitalization value in Vietnam. As a multisector corporation, Vingroup focuses on three main areas: Technology; Industrials; and Property Services. VinUni is proud to be a part of the Vingroup ecosystem, giving its students opportunities to connect with several high quality research institutes (such as VinAI, VinBrain, and Vin BigData), pioneering industrial enterprises (such as VinSmart and VinFast), and leading Vietnamese companies (such as Vinpearl, Vincom Retail, Vinmec, and Vinhomes).\r\n\r\nVinUniversity is seeking entrepreneurial-minded intellectuals who are passionate about higher education to join our team to accelerate the formation of a truly world-class university in Vietnam.2a:T646,\u003cp\u003e\u003cstrong\u003eGIỚI THIỆU VỀ CHƯƠNG TRÌNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChương trình Đào tạo Nhân tài AI Thực chiến là sáng kiến đặc biệt của Tập đoàn Vingroup do VinUniversity phối hợp triển khai nhằm đào tạo nguồn nhân lực AI có năng lực thực hành cao, có thể tham gi"])</script><script>self.__next_f.push([1,"a giải quyết các bài toán thực tiễn ngay sau đào tạo.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eChương trình kết hợp giữa học phần nền tảng và giai đoạn thực chiến với dự án AI thật, dưới sự hướng dẫn của giảng viên, mentor và quản lý dự án từ VinUni, Vingroup và các đối tác. Học viên được miễn học phí, nhận phụ cấp hàng tháng và có cơ hội việc làm hấp dẫn trong hệ sinh thái Vingroup sau tốt nghiệp.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eGIỚI THIỆU VỀ VỊ TRÍ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eChuyên viên/Quản lý Hành chính, Kế hoạch \u0026 Vận hành Chương trình chịu trách nhiệm hỗ trợ nền tảng vận hành của chương trình, bao gồm lập kế hoạch hành động, theo dõi tiến độ, quản lý ngân sách, điều phối hợp đồng, hồ sơ, thanh toán, mua sắm và các thủ tục hành chính liên quan.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eVị trí này là đầu mối kết nối giữa ban điều hành chương trình và các đơn vị như tài chính, mua sắm, pháp chế, nhân sự, học thuật, đối tác doanh nghiệp và nhà cung cấp, nhằm bảo đảm các hoạt động được triển khai đúng hạn, đúng quy trình và minh bạch.\u003c/p\u003e2b:T22be,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eTRÁCH NHIỆM CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLập kế hoạch và theo dõi triển khai\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp xây dựng kế hoạch hành động tổng thể và kế hoạch chi tiết cho từng giai đoạn của chương trình\u003c/p\u003e\u003cp\u003eTheo dõi tiến độ các đầu việc, cập nhật trạng thái thực hiện, nhắc việc và cảnh báo sớm các rủi ro ảnh hưởng đến timeline\u003c/p\u003e\u003cp\u003eĐiều phối các cuộc họp vận hành; chuẩn bị agenda, biên bản họp, danh sách đầu việc và theo dõi thực hiện sau họp\u003c/p\u003e\u003cp\u003eChuẩn bị báo cáo định kỳ hoặc đột xuất về tiến độ triển khai, các vấn đề tồn đọng và đề xuất hướng xử lý\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý ngân sách, chi phí và thanh toán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHỗ trợ xây dựng kế hoạch ngân sách theo từng hạng mục hoạt động của chương trình\u003c/p\u003e\u003cp\u003eTheo dõi việc sử dụng ngân sách, đối chiếu chi phí thực tế với kế hoạch đã được phê duyệt và cập nhật các biến động ngân sách khi cần\u003c/p\u003e\u003cp\u003ePhối hợp thực hiện các thủ tục đề xuất chi, tạm ứng, thanh toán, quyết toán và các hồ sơ tài chính liên quan\u003c/p\u003e\u003cp\u003eTheo dõi tiến độ thanh toán cho các hợp đồng, nhà cung cấp, giảng viên, chuyên gia và các đối tác liên quan; bảo đảm hồ sơ đầy đủ, chính xác và đúng hạn\u003c/p\u003e\u003cp\u003eTổng hợp, rà soát và lưu trữ chứng từ, hóa đơn, đề nghị thanh toán và tài liệu liên quan theo đúng quy định\u003c/p\u003e\u003cp\u003eHỗ trợ chuẩn bị báo cáo ngân sách, chi phí và dữ liệu phục vụ quản trị nội bộ, kiểm tra hoặc đối soát\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eQuản lý hợp đồng, hồ sơ và tuân thủ hành chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp thực hiện các thủ tục liên quan đến hợp đồng với giảng viên, chuyên gia, nhà cung cấp và đối tác phục vụ chương trình\u003c/p\u003e\u003cp\u003eTheo dõi toàn bộ vòng đời hợp đồng từ chuẩn bị hồ sơ, trình phê duyệt, ký kết, gia hạn, điều chỉnh, thanh lý đến lưu trữ\u003c/p\u003e\u003cp\u003eLàm việc với các đơn vị liên quan như pháp chế, tài chính, mua sắm và nhân sự để bảo đảm quy trình hợp đồng được thực hiện đúng quy định và đúng tiến độ\u003c/p\u003e\u003cp\u003eQuản lý hồ sơ hành chính, biểu mẫu, công văn, tài liệu trình ký và hồ sơ chương trình một cách khoa học, bảo mật và dễ truy xuất\u003c/p\u003e\u003cp\u003eHỗ trợ rà soát tính tuân thủ của các thủ tục hành chính, tài chính và vận hành theo quy định nội bộ của VinUni và Vingroup\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐiều phối mua sắm, hậu cần và hỗ trợ vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHỗ trợ lập kế hoạch mua sắm, thuê dịch vụ, chuẩn bị hậu cần và các nguồn lực cần thiết cho hoạt động đào tạo và vận hành chương trình\u003c/p\u003e\u003cp\u003ePhối hợp với các đơn vị nội bộ và nhà cung cấp trong việc chuẩn bị phòng học, thiết bị, vật tư, tài liệu, dịch vụ sự kiện và các nhu cầu hành chính khác\u003c/p\u003e\u003cp\u003eTheo dõi các yêu cầu mua sắm từ khâu đề xuất, phê duyệt, đặt hàng, nghiệm thu đến thanh toán; bảo đảm tiến độ, chất lượng và hiệu quả chi phí\u003c/p\u003e\u003cp\u003eHỗ trợ tổ chức các cuộc họp, workshop, hội thảo, onboarding, hoạt động nội bộ hoặc sự kiện liên quan từ góc độ hậu cần và điều phối\u003c/p\u003e\u003cp\u003eTheo dõi chất lượng cung ứng dịch vụ và xử lý kịp thời các vấn đề phát sinh trong quá trình triển khai\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExternal Engagement và phối hợp đối tác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLà đầu mối điều phối các công việc hành chính – vận hành với đối tác doanh nghiệp, chuyên gia bên ngoài, nhà cung cấp và các bên liên quan khác của chương trình\u003c/p\u003e\u003cp\u003eHỗ trợ chuẩn bị tài liệu, lịch làm việc, thư mời, biên bản, hồ sơ thanh toán và các thủ tục liên quan cho các hoạt động làm việc với bên ngoài\u003c/p\u003e\u003cp\u003ePhối hợp với các đối tác trong việc tổ chức hoạt động thực chiến, workshop, mentoring, tham quan, tọa đàm nghề nghiệp hoặc các hoạt động hỗ trợ đầu ra cho học viên\u003c/p\u003e\u003cp\u003eDuy trì trao đổi thông tin đầy đủ, kịp thời và chuyên nghiệp với các bên liên quan bên ngoài nhằm bảo đảm trải nghiệm hợp tác tích cực và hiệu quả\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eHỗ trợ đầu ra và theo dõi tình trạng đi làm của học viên\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhối hợp với các bộ phận liên quan để hỗ trợ các hoạt động liên quan đến đầu ra của chương trình, bao gồm tổng hợp dữ liệu hoàn thành chương trình, danh sách học viên tốt nghiệp và thông tin bàn giao cho các đơn vị liên quan\u003c/p\u003e\u003cp\u003eHỗ trợ điều phối các hoạt động kết nối việc làm, giới thiệu cơ hội nghề nghiệp, phỏng vấn hoặc tiếp nhận học viên vào các đơn vị phù hợp trong hệ sinh thái\u003c/p\u003e\u003cp\u003eTheo dõi và cập nhật dữ liệu về tình trạng đi làm, đơn vị tiếp nhận, kết quả đầu ra và các thông tin liên quan của học viên sau tốt nghiệp\u003c/p\u003e\u003cp\u003ePhối hợp chuẩn bị các báo cáo về đầu ra, tỷ lệ đi làm và dữ liệu liên quan phục vụ quản trị chương trình và đánh giá hiệu quả triển khai\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eĐiều phối nội bộ và cải tiến vận hành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLà đầu mối hỗ trợ kết nối thông tin giữa ban điều hành chương trình và các bộ phận nội bộ liên quan\u003c/p\u003e\u003cp\u003eHỗ trợ chuẩn bị tài liệu quản trị, dashboard, báo cáo vận hành và hồ sơ phục vụ phê duyệt\u003c/p\u003e\u003cp\u003eTheo dõi các đầu việc liên phòng ban để bảo đảm sự phối hợp thông suốt\u003c/p\u003e\u003cp\u003eĐề xuất cải tiến quy trình, biểu mẫu và cách thức phối hợp nhằm tăng hiệu quả vận hành và kiểm soát tuân thủ\u003c/p\u003e\u003cp\u003eThực hiện các nhiệm vụ khác theo phân công của cấp quản lý\u003c/p\u003e\u003cp\u003e \u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eYÊU CẦU CHÍNH\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTrình độ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTốt nghiệp đại học trở lên các ngành Quản trị Kinh doanh, Tài chính, Kế toán, Hành chính, Quản lý dự án, Luật, Giáo dục hoặc các ngành liên quan\u003c/p\u003e\u003cp\u003eCác chứng chỉ liên quan đến quản trị vận hành, quản lý dự án, tài chính hoặc hợp đồng là một lợi thế\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTối thiểu 4–6 năm kinh nghiệm trong lĩnh vực hành chính, vận hành, quản lý dự án, ngân sách, hợp đồng, mua sắm hoặc vị trí tương đương\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên có kinh nghiệm tại môi trường giáo dục, đại học, doanh nghiệp lớn hoặc chương trình có nhiều bên liên quan\u003c/p\u003e\u003cp\u003eCó kinh nghiệm theo dõi kế hoạch hành động, tiến độ triển khai, hồ sơ thanh toán, chứng từ và quy trình hợp đồng\u003c/p\u003e\u003cp\u003eCó kinh nghiệm làm việc với nhiều phòng ban và xử lý công việc trong môi trường tốc độ nhanh\u003c/p\u003e
