 dead loads, seismic loads, and thermal movement.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐánh giá khả năng chịu lực của các cấu kiện mặt dựng dưới các tác động như: tải trọng gió, tải trọng tĩnh, tải trọng động đất, chuyển vị do nhiệt. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tDevelop engineering calculations and technical reports for façade systems.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eLập các tính toán kỹ thuật và báo cáo kỹ thuật cho hệ thống façade.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tReview and verify design details, material specifications, and system configurations.\u003c/p\u003e\u003cp\u003e\u003cem\u003eRà soát và xác nhận chi tiết thiết kế, thông số vật liệu và cấu hình hệ thống.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDesign Development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003ePhát triển thiết kế\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCollaborate with architects and design teams to develop feasible façade concepts and system solutions.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhối hợp với kiến trúc sư và đội ngũ thiết kế để phát triển các ý tưởng façade khả thi và giải pháp hệ thống.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tSupport the preparation of technical drawings, façade details, and design documentation.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ chuẩn bị bản vẽ kỹ thuật, chi tiết mặt dựng và hồ sơ thiết kế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tEnsure façade systems meet performance criteria such as air infiltration, water penetration, thermal insulation, and acoustic performance.\u003c/p\u003e\u003cp\u003eĐảm bảo hệ thống façade đáp ứng các tiêu chí hiệu suất, như: độ kín khí, chống thấm nước, cách nhiệt, hiệu suất âm học.\u003c/p\u003e\u003cp\u003eCoordination\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eĐiều phối\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCoordinate façade design with architectural, structural, and MEP disciplines.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐiều phối thiết kế façade với các bộ môn: kiến trúc, kết cấu, MEP cơ điện.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tParticipate in design coordination meetings and technical reviews with project teams.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTham gia các cuộc họp phối hợp thiết kế và đánh giá kỹ thuật với đội dự án.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tProvide technical input during design development and value engineering discussions.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCung cấp ý kiến kỹ thuật trong quá trình phát triển thiết kế và tối ưu chi phí\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTechnical Review \u0026 Compliance\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKiểm tra kỹ thuật \u0026 Tuân thủ\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tReview shop drawings, fabrication drawings, and contractor submissions for technical compliance.\u003c/p\u003e\u003cp\u003e\u003cem\u003eRà soát shop drawings, bản vẽ chế tạo và hồ sơ từ nhà thầu để đảm bảo tuân thủ kỹ thuật.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tEnsure façade systems comply with relevant building codes, standards, and project specifications.\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐảm bảo hệ façade tuân thủ các quy chuẩn xây dựng, tiêu chuẩn kỹ thuật và yêu cầu của dự án.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tReview façade testing requirements, mock-ups, and performance verification.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eKiểm tra yêu cầu thử nghiệm façade, mô hình mock-up và việc xác nhận hiệu suất hệ thống.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eConstruction Support\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHỗ trợ thi công\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tRespond to Requests for Information (RFIs) related to façade engineering.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhản hồi RFI (Requests for Information – Yêu cầu cung cấp thông tin) liên quan đến kỹ thuật façade.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tProvide engineering support during fabrication and installation phases.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCung cấp hỗ trợ kỹ thuật trong quá trình chế tạo và lắp đặt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tAssist with site inspections and façade performance assessments when required\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ kiểm tra tại công trường và đánh giá hiệu suất mặt dựng khi cần.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:Td0c,"])</script><script>self.__next_f.push([1,"\u003cp\u003eQualifications\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYêu cầu\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBachelor’s degree in Civil Engineering, Structural Engineering, Mechanical Engineering, or related field.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBằng Cử nhân các ngành: Kỹ sư dân dụng, Kỹ sư kết cấu, Kỹ sư cơ khí hoặc các ngành liên quan\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tTypically 3–5 years of experience in façade engineering, structural engineering, or building envelope design.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYêu cầu 3-5 năm kinh nghiệm trong kỹ sư mặt dựng, kỹ sư kết cấu, thiết kế vỏ bao công trình.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tExperience working on commercial, high-rise, or complex building façade systems is preferred.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eƯu tiên ứng viên có kinh nghiệm làm việc với các hệ thống mặt dựng của công trình thương mại, nhà cao tầng hoặc công trình phức tạp. \u003c/p\u003e\u003cp\u003eTechnical Skills\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKỹ năng chuyên môn\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tKnowledge of façade structural behavior and material performance.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eKiến thức về đặc tính kết cấu và hiệu suất vật liệu của mặt dựng.\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e•\tFamiliarity with façade systems including:\u003c/p\u003e\u003cp\u003e\u003cem\u003eQuen thuộc với các hệ thống façade như:\u003c/em\u003e\u003c/p\u003e\u003cp\u003eo\tCurtain wall systems\u003c/p\u003e\u003cp\u003e\u003cem\u003eHệ vách kính\u003c/em\u003e\u003c/p\u003e\u003cp\u003eo\tUnitized façade systems\u003c/p\u003e\u003cp\u003e\u003cem\u003eHệ mặt tiền Unitized\u003c/em\u003e\u003c/p\u003e\u003cp\u003eo\tStick systems\u003c/p\u003e\u003cp\u003eHệ stick\u003c/p\u003e\u003cp\u003eo\tCladding panels (metal, stone, composite)\u003c/p\u003e\u003cp\u003e\u003cem\u003eTấm ốp (kim loại, đá, composite)\u003c/em\u003e\u003c/p\u003e\u003cp\u003eo\tStructural glazing systems\u003c/p\u003e\u003cp\u003e\u003cem\u003eHệ kính kết cấu\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tExperience with engineering tools such as:\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kinh nghiệm với các công cụ kỹ sư như:\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eo\tStructural analysis software (e.g., Strand7, or similar)\u003c/strong\u003e\u003c/p\u003e\u003cp\u003ePhần mềm phân tích kết cấu (ví dụ: Strand7 hoặc tương đương)\u003c/p\u003e\u003cp\u003eo\tAutoCAD for technical drawings\u003c/p\u003e\u003cp\u003e\u003cem\u003eAutoCAD cho bản vẽ kỹ thuật\u003c/em\u003e\u003c/p\u003e\u003cp\u003eo\tRevit / BIM platforms (preferred)\u003c/p\u003e\u003cp\u003e\u003cem\u003eRevit / BIM (ưu tiên)\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tUnderstanding of façade performance areas such as:\u003c/p\u003e\u003cp\u003eHiểu biết về các lĩnh vực hiệu suất façade như:\u003c/p\u003e\u003cp\u003eo\tWind load analysis\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhân tích tải trọng gió\u003c/em\u003e\u003c/p\u003e\u003cp\u003eo\tThermal movement and expansion\u003c/p\u003e\u003cp\u003eGiãn nở và chuyển vị do nhiệt\u003c/p\u003e\u003cp\u003eo\tAir and water tightness\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐộ kín khí và chống nước\u003c/em\u003e\u003c/p\u003e\u003cp\u003eo\tStructural glass design\u003c/p\u003e\u003cp\u003e\u003cem\u003eThiết kế kính kết cấu\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSoft Skills\u003c/p\u003e\u003cp\u003e\u003cem\u003eKỹ năng mềm\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tStrong analytical and problem-solving skills.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eKỹ năng phân tích và giải quyết vấn đề tốt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tGood communication and coordination skills with multidisciplinary teams.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eKỹ năng giao tiếp và phối hợp tốt với các nhóm đa ngành.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tAbility to manage technical tasks across multiple projects.\u003c/p\u003e\u003cp\u003e\u003cem\u003eKhả năng quản lý các nhiệm vụ kỹ thuật trong nhiều dự án cùng lúc.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tStrong attention to detail and engineering accuracy.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eChú ý đến chi tiết và độ chính xác trong kỹ thuật.\u003c/em\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T120c,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKey Responsibilities -\u003cem\u003eTrách nhiệm chính\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eEngineering Design \u0026 Analysis\u003c/p\u003e\u003cp\u003e\u003cem\u003eThiết kế \u0026 Phân tích Kỹ thuật\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tPerform engineering design and analysis of façade systems, including curtain walls, cladding systems, glazing, skylights, and other building envelope components.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eThực hiện thiết kế và phân tích kỹ thuật cho các hệ thống façade (mặt dựng), bao gồm: tường kính, hệ thống ốp, kính, giếng trời, và các thành phần khác của vỏ bao công trình.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tEvaluate structural performance of façade elements under wind loads, dead loads, seismic loads, and thermal movement.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐánh giá khả năng chịu lực của các cấu kiện mặt dựng dưới các tác động như: tải trọng gió, tải trọng tĩnh, tải trọng động đất, chuyển vị do nhiệt. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tDevelop engineering calculations and technical reports for façade systems.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eLập các tính toán kỹ thuật và báo cáo kỹ thuật cho hệ thống façade.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tReview and verify design details, material specifications, and system configurations.\u003c/p\u003e\u003cp\u003e\u003cem\u003eRà soát và xác nhận chi tiết thiết kế, thông số vật liệu và cấu hình hệ thống.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDesign Development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003ePhát triển thiết kế\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e•\tCollaborate with architects and design teams to develop feasible façade concepts and system solutions.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhối hợp với kiến trúc sư và đội ngũ thiết kế để phát triển các ý tưởng façade khả thi và giải pháp hệ thống.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tSupport the preparation of technical drawings, façade details, and design documentation. d project specifications.\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐảm bảo hệ façade tuân thủ các quy chuẩn xây dựng, tiêu chuẩn kỹ thuật và yêu cầu của dự án.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tReview façade testing requirements, mock-ups, and performance verification.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eKiểm tra yêu cầu thử nghiệm façade, mô hình mock-up và việc xác nhận hiệu suất hệ thống.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eConstruction Support\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHỗ trợ thi công\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tRespond to Requests for Information (RFIs) related to façade engineering.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhản hồi RFI (Requests for Information – Yêu cầu cung cấp thông tin) liên quan đến kỹ thuật façade.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tProvide engineering support during fabrication and installation phases.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCung cấp hỗ trợ kỹ thuật trong quá trình chế tạo và lắp đặt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tAssist with site inspections and façade performance assessments when required\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ kiểm tra tại công trường và đánh giá hiệu suất mặt dựng khi cần.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:Td0c,"])</script><script>self.__next_f.push([1,"\u003cp\u003eQualifications\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYêu cầu\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBachelor’s degree in Civil Engineering, Structural Engineering, Mechanical Engineering, or related field.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eBằng Cử nhân các ngành: Kỹ sư dân dụng, Kỹ sư kết cấu, Kỹ sư cơ khí hoặc các ngành liên quan\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstr
