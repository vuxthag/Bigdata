s/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T15ad,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJob Summary\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTóm tắt công việc\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe Junior Facade Designer supports the design and development of building façade systems under the guidance of senior designers and façade engineers. The role focuses on preparing drawings, 3D models, and technical documentation while assisting the project team in delivering façade design solutions that meet architectural, structural, and performance requirements.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eJunior Facade Designer hỗ trợ việc thiết kế và phát triển các hệ thống mặt dựng công trình dưới sự hướng dẫn của các nhà thiết kế cấp cao và kỹ sư façade. Vị trí này tập trung vào việc chuẩn bị bản vẽ, mô hình 3D và tài liệu kỹ thuật, đồng thời hỗ trợ nhóm dự án trong việc cung cấp các giải pháp thiết kế façade đáp ứng các yêu cầu về kiến trúc, kết cấu và hiệu suất công trình.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThis is an entry-level role designed for graduates or early-career professionals who want to build expertise in façade systems and building envelope design.\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐây là vị trí cấp độ đầu vào (entry-level) dành cho sinh viên mới tốt nghiệp hoặc những người mới bắt đầu sự nghiệp, muốn phát triển chuyên môn trong lĩnh vực hệ thống façade và thiết kế vỏ bao công trình (building envelope).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eKey Responsibilities\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTrách nhiệm chính\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eDesign Support\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHỗ trợ thiết kế\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAssist in the preparation of 2D façade drawings and technical details based on architectural and engineering requirements.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ chuẩn bị bản vẽ façade 2D và các chi tiết kỹ thuật dựa trên yêu cầu kiến trúc và kỹ thuật.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tSupport the development of façade systems such as curtain walls, window walls, cladding panels, glazing systems, and louvers.\u003c/p\u003e\u003cp\u003eHỗ trợ phát triển các hệ mặt dựng như: tường kính, cửa sổ kính, tấm ốp, hệ kính, lam chắn nắng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tProduce shop drawings, façade details, and installation drawings under supervision.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eLập bản vẽ thi công, chi tiết mặt tiền và bản vẽ lắp đặt dưới sự giám sát.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tUpdate drawings based on design revisions, engineering comments, and coordination feedback.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCập nhật bản vẽ theo các điều chỉnh thiết kế, nhận xét kỹ thuật và phản hồi từ quá trình phối hợp.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eCoordination\u003c/p\u003e\u003cp\u003eĐiều phối\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tSupport coordination with architectural, structural, and MEP disciplines.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ phối hợp với các mảng: kiến trúc, kết cấu, cơ điện\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tParticipate in internal design meetings and project discussions.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTham gia các cuộc họp thiết kế nội bộ và thảo luận dự án\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAssist senior team members in resolving design coordination issues.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ các thành viên cấp cao giải quyết các vấn đề phối hợp thiết kế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eDocumentation\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHồ sơ và tài liệu\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHelp prepare technical drawings, design packages, and submission documents.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ chuẩn bị bản vẽ kỹ thuật, bộ hồ sơ thiết kế, hồ sơ nộp duyệt\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tMaintain organized drawing records and revision history.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eQuản lý và lưu trữ hệ thống bản vẽ và lịch sử chỉnh sửa.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAssist in preparing presentation materials and design reports when required.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ chuẩn bị tài liệu thuyết trình và báo cáo thiết kế khi cần.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eBIM \u0026 Modeling\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eBIM \u0026 mô hình hóa\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCreate and maintain 3D models of façade elements using BIM software.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTạo và duy trì mô hình 3D các thành phần façade bằng phần mềm BIM.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAssist with Revit models, CAD drawings, and digital documentation.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ làm việc với: mô hình Revits, bản vẽ CAD, tài liệu kỹ thuật số.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tEnsure models and drawings comply with project standards and naming conventions.\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐảm bảo mô hình và bản vẽ tuân thủ tiêu chuẩn dự án và quy tắc đặt tên.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eLearning \u0026 Development\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHọc tập \u0026 Phát triển\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tLearn about façade engineering principles, materials, and construction methods.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTìm hiểu về nguyên lý kỹ thuật mặt dựng, vật liệu, phương pháp thi công\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tDevelop knowledge of façade performance requirements such as waterproofing, thermal performance, and structural movement.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhát triển kiến thức về các yêu cầu hiệu suất của façade như: chống thấm nước, hiệu suất nhiệt, chuyển vị kết cấu\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tFollow internal design standards and best practices.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTuân thủ các tiêu chuẩn thiết kế nội bộ và các phương pháp thực hành tốt nhất\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:Tc78,"])</script><script>self.__next_f.push([1,"\u003cp\u003eQualifications\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYêu cầu\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBachelor’s degree in Civil Engineering, Structural Engineering, Architecture, or related field.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTốt nghiệp Cử nhân ngành Kỹ thuật Xây dựng, Kỹ thuật Kết cấu, Kiến trúc hoặc các ngành liên quan\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t0–2 years of experience in façade design, architectural drafting, or building envelope design.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e0–2 năm kinh nghiệm trong thiết kế mặt dựng, triển khai bản vẽ kiến trúc hoặc thiết kế lớp vỏ công trình\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tFresh graduates with strong drafting or BIM skills are encouraged to apply.\u003c/p\u003e\u003cp\u003e\u003cem\u003eSinh viên mới tốt nghiệp có kỹ năng tốt về triển khai bản vẽ hoặc BIM được khuyến khích ứng tuyển.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTechnical Skills\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKỹ năng chuyên môn\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e•\tBasic to intermediate proficiency in AutoCAD.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eThành thạo AutoCAD ở mức cơ bản đến trung cấp.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tFamiliarity with Revit or BIM modeling tools is preferred.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eBiết sử dụng Revit hoặc các công cụ mô hình BIM là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBasic knowledge of architectural and structural drawings.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kiến thức cơ bản về bản vẽ kiến trúc và bản vẽ kết cấu.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tExposure to 3D modeling tools is an advantage.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kinh nghiệm hoặc biết sử dụng các công cụ mô hình 3D là một lợi thế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSoft Skills\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKỹ năng mềm\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tStrong attention to detail and accuracy.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCẩn thận, chú ý đến chi tiết và độ chính xác cao\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tGood communication and teamwork skills. Good at English\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eKỹ năng giao tiếp và làm việc nhóm tốt, sử dụng tiếng Anh tốt. \u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tWillingness to learn and develop technical knowledge.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eSẵn sàng học hỏi và phát triển kiến thức kỹ thuật\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAbility to manage assigned tasks and meet deadlines.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó khả năng quản lý công việc được giao và hoàn thành đúng thời hạn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003ePreferred Skills (Nice to Have)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKỹ năng ưu tiên (Không bắt buộc)\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tInternship or academic experience in façade design or building envelope projects.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kinh nghiệm thực tập hoặc học tập liên quan đến thiết kế façade hoặc các dự án lớp vỏ công trình.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBasic understanding of façade systems such as curtain walls, glazing, or cladding systems.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó hiểu biết cơ bản về các hệ mặt dựng như curtain wall, kính (glazing) hoặc hệ ốp (cladding).\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tInterest in BIM workflows and digital design tools.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eQuan tâm đến quy trình BIM và các công cụ thiết kế số.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T15ad,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJob Summary\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTóm tắt công việc\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eThe Junior Facade Designer supports the design and development of building façade systems under the guidance of senior  systems such as curtain walls, window walls, cladding panels, glazing systems, and louvers.\u003c/p\u003e\u003cp\u003eHỗ trợ phát triển các hệ mặt dựng như: tường kính, cửa sổ kính, tấm ốp, hệ kính, lam chắn nắng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tProduce shop drawings, façade details, and installation drawings under supervision.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eLập bản vẽ thi công, chi tiết mặt tiền và bản vẽ lắp đặt dưới sự giám sát.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tUpdate drawings based on design revisions, engineering comments, and coordination feedback.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCập nhật bản vẽ theo các điều chỉnh thiết kế, nhận xét kỹ thuật và phản hồi từ quá trình phối hợp.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eCoordination\u003c/p\u003e\u003cp\u003eĐiều phối\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tSupport coordination with architectural, structural, and MEP disciplines.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ phối hợp với các mảng: kiến trúc, kết cấu, cơ điện\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tParticipate in internal design meetings and project discussions.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTham gia các cuộc họp thiết kế nội bộ và thảo luận dự án\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAssist senior team members in resolving design coordination issues.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ các thành viên cấp cao giải quyết các vấn đề phối hợp thiết kế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eDocumentation\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHồ sơ và tài liệu\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tHelp prepare technical drawings, design packages, and submission documents.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ chuẩn bị bản vẽ kỹ thuật, bộ hồ sơ thiết kế, hồ sơ nộp duyệt\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tMaintain organized drawing records and revision history.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eQuản lý và lưu trữ hệ thống bản vẽ và lịch sử chỉnh sửa.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAssist in preparing presentation materials and design reports when required.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ chuẩn bị tài liệu thuyết trình và báo cáo thiết kế khi cần.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eBIM \u0026 Modeling\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eBIM \u0026 mô hình hóa\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tCreate and maintain 3D models of façade elements using BIM software.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTạo và duy trì mô hình 3D các thành phần façade bằng phần mềm BIM.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tAssist with Revit models, CAD drawings, and digital documentation.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ làm việc với: mô hình Revits, bản vẽ CAD, tài liệu kỹ thuật số.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tEnsure models and drawings comply with project standards and naming conventions.\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐảm bảo mô hình và bản vẽ tuân thủ tiêu chuẩn dự án và quy tắc đặt tên.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003eLearning \u0026 Development\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHọc tập \u0026 Phát triển\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tLearn about façade engineering principles, materials, and construction methods.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTìm hiểu về nguyên lý kỹ thuật mặt dựng, vật liệu, phương pháp thi công\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tDevelop knowledge of façade performance requirements such as waterproofing, thermal performance, and structural movement.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhát triển kiến thức về các yêu cầu hiệu suất của façade như: chống thấm nước, hiệu suất nhiệt, chuyển vị kết cấu\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tFollow internal design standards and best practices.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTuân thủ các tiêu chuẩn thiết kế nội bộ và các phương pháp thực hành tốt nhất\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"28:Tc78,"])</script><script>self.__next_f.push([1,"\u003cp\u003eQualifications\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYêu cầu\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\tBachelor’s degree in Civil Engineering, Structural Engineering, Architecture, or related field.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eTốt nghiệp Cử nhân ngành Kỹ thuật Xây dựng, Kỹ thuật Kết cấu, Kiến trúc hoặc các ngành liên quan\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e•\t0–2 years of experience in façade design, architectural drafting, or building envelope design.\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003e0–2 năm kinh nghiệm trong thiết kế mặt dựng, triển khai bản vẽ kiến trúc hoặc thiết kế lớp vỏ công trình\u003c/em\u003e\u003c/p\u003e\u003cp\u003e•\tFresh graduates with strong drafting or BIM skills are encouraged to apply.\u003c/p\u003e\u003cp\u003e\u003cem\u003eSinh viên mới tốt nghiệp có kỹ năng tốt về triển khai bản vẽ hoặc BIM được khuyến khích ứng tuyển.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTechnical Skills\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKỹ năng chuyên môn\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003e•\tBasic to intermediate proficiency in AutoCAD.\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cem\u003eThành t
