s/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:T1502,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJob Summary\u003c/p\u003e\u003cp\u003eTóm tắt công việc\u003c/p\u003e\u003cp\u003eThe Senior Facade Designer is responsible for leading the technical design and development of building façade systems from concept through detailed design and construction documentation. This role works closely with façade engineers, architects, consultants, and contractors to deliver high-quality façade solutions that meet architectural intent, structural performance, and project requirements. The Senior Facade Designer also provides technical guidance to junior designers and ensures design coordination across disciplines.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNhà thiết kế mặt dựng cấp cao chịu trách nhiệm dẫn dắt việc thiết kế kỹ thuật và phát triển các hệ thống mặt dựng công trình từ giai đoạn ý tưởng đến thiết kế chi tiết và hồ sơ thi công. Vị trí này làm việc chặt chẽ với kỹ sư mặt dựng, kiến trúc sư, tư vấn và nhà thầu nhằm cung cấp các giải pháp mặt dựng chất lượng cao đáp ứng ý đồ kiến trúc, hiệu suất kết cấu và yêu cầu dự án. Nhà thiết kế mặt dựng cấp cao cũng cung cấp hướng dẫn kỹ thuật cho các nhà thiết kế cấp dưới và đảm bảo sự phối hợp thiết kế giữa các bộ môn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTrách nhiệm chính\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDesign \u0026 Technical Development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eThiết kế \u0026 Phát triển kỹ thuật\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLead the design and detailing of façade systems including curtain wall, window wall, cladding, skylights, louvers, and glazing systems.\u003c/p\u003e\u003cp\u003e\u003cem\u003eChủ trì thiết kế và chi tiết hóa các hệ thống mặt dựng bao gồm curtain wall, window wall, tấm ốp (cladding), giếng trời, lam chắn nắng và hệ thống kính.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eDevelop concept, schematic, and detailed façade drawings based on architectural requirements and engineering criteria.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhát triển bản vẽ mặt dựng ở các giai đoạn ý tưởng, sơ bộ và chi tiết dựa trên yêu cầu kiến trúc và tiêu chí kỹ thuật.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eProduce and review shop drawings, fabrication drawings, and installation details.\u003c/p\u003e\u003cp\u003e\u003cem\u003eLập và kiểm tra bản vẽ shop drawing, bản vẽ gia công và chi tiết lắp đặt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eEnsure façade designs comply with structural, thermal, acoustic, waterproofing, and fire performance requirements.\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐảm bảo thiết kế mặt dựng đáp ứng các yêu cầu về kết cấu, nhiệt, âm học, chống thấm và chống cháy.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eCoordinate façade interfaces with structural, architectural, and MEP systems.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhối hợp các điểm giao giữa hệ mặt dựng với hệ kết cấu, kiến trúc và MEP.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eProject Coordination\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eĐiều phối dự án\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCollaborate with architects, façade engineers, contractors, and suppliers during design development.\u003c/p\u003e\u003cp\u003e\u003cem\u003eHợp tác với kiến trúc sư, kỹ sư mặt dựng, nhà thầu và nhà cung cấp trong quá trình phát triển thiết kế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eAttend and contribute to design coordination meetings and technical workshops.\u003c/p\u003e\u003cp\u003e\u003cem\u003eTham gia và đóng góp vào các cuộc họp phối hợp thiết kế và hội thảo kỹ thuật.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eReview contractor or supplier submissions and provide technical comments.\u003c/p\u003e\u003cp\u003e\u003cem\u003eXem xét hồ sơ đệ trình từ nhà thầu hoặc nhà cung cấp và đưa ra nhận xét kỹ thuật.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eResolve design conflicts and technical issues during project development.\u003c/p\u003e\u003cp\u003e\u003cem\u003eGiải quyết các xung đột thiết kế và vấn đề kỹ thuật trong quá trình phát triển dự án.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLeadership \u0026 Mentoring\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eLãnh đạo \u0026 Hướng dẫn\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eProvide technical guidance and mentorship to junior façade designers.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCung cấp hướng dẫn kỹ thuật và cố vấn cho các nhà thiết kế mặt dựng cấp dưới.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eReview drawings and models prepared by junior team members to ensure quality and accuracy.\u003c/p\u003e\u003cp\u003e\u003cem\u003eRà soát bản vẽ và mô hình do các thành viên cấp dưới thực hiện để đảm bảo chất lượng và độ chính xác.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSupport the team in improving façade detailing standards and workflows.\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ đội nhóm cải thiện tiêu chuẩn chi tiết mặt dựng và quy trình làm việc.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eConstruction Support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eHỗ trợ thi công\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAssist with technical queries (RFIs) and site issues related to façade design.\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ giải đáp các câu hỏi kỹ thuật (RFI) và các vấn đề tại công trường liên quan đến thiết kế mặt dựng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eReview mock-ups, material samples, and fabrication drawings.\u003c/p\u003e\u003cp\u003e\u003cem\u003eXem xét mock-up, mẫu vật liệu và bản vẽ gia công.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eSupport site inspections and façade installation reviews when required.\u003c/p\u003e\u003cp\u003e\u003cem\u003eHỗ trợ kiểm tra hiện trường và đánh giá việc lắp đặt mặt dựng khi cần thiết.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"24:Td13,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eQualifications\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eYêu cầu\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBachelor’s degree in Civil Engineering, Structural Engineering, Architecture, or related field.\u003c/p\u003e\u003cp\u003e\u003cem\u003eBằng Cử nhân Kỹ thuật Xây dựng, Kỹ thuật Kết cấu, Kiến trúc hoặc lĩnh vực liên quan.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eTypically 4–6 years of experience in façade design, building envelope engineering, or architectural detailing.\u003c/p\u003e\u003cp\u003e\u003cem\u003eThông thường có 4–6 năm kinh nghiệm trong thiết kế mặt dựng, kỹ thuật vỏ bao công trình hoặc chi tiết kiến trúc.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eStrong understanding of façade systems and materials, including aluminum systems, glass, stone, metal panels, and composite cladding.\u003c/p\u003e\u003cp\u003e\u003cem\u003eHiểu biết tốt về các hệ thống và vật liệu mặt dựng, bao gồm hệ nhôm, kính, đá, tấm kim loại và tấm ốp composite.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTechnical Skills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKỹ năng kỹ thuật\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eAdvanced proficiency in AutoCAD for façade detailing.\u003c/p\u003e\u003cp\u003e\u003cem\u003eSử dụng thành thạo AutoCAD cho việc triển khai chi tiết mặt dựng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eStrong experience with Revit / BIM modeling.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kinh nghiệm tốt với mô hình Revit / BIM.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eFamiliarity with façade performance criteria such as:\u003c/p\u003e\u003cp\u003e\u003cem\u003eQuen thuộc với các tiêu chí hiệu suất mặt dựng như:\u003c/em\u003e\u003c/p\u003e\u003cp\u003eStructural loading (wind, seismic)\u003c/p\u003e\u003cp\u003e\u003cem\u003eTải trọng kết cấu (gió, động đất)\u003c/em\u003e\u003c/p\u003e\u003cp\u003eThermal performance\u003c/p\u003e\u003cp\u003e\u003cem\u003eHiệu suất nhiệt\u003c/em\u003e\u003c/p\u003e\u003cp\u003eWater and air tightness\u003c/p\u003e\u003cp\u003e\u003cem\u003eĐộ kín nước và kín khí\u003c/em\u003e\u003c/p\u003e\u003cp\u003eMovement and tolerances\u003c/p\u003e\u003cp\u003e\u003cem\u003eChuyển động và sức bền\u003c/em\u003e\u003c/p\u003e\u003cp\u003eBuilding physic\u003c/p\u003e\u003cp\u003e\u003cem\u003eVật lý công trình\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSoft Skills\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKỹ năng mềm\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eStrong technical problem-solving and analytical skills.\u003c/p\u003e\u003cp\u003e\u003cem\u003eKỹ năng phân tích và giải quyết vấn đề kỹ thuật tốt.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eExcellent communication and coordination skills in English.\u003c/p\u003e\u003cp\u003e\u003cem\u003eKỹ năng giao tiếp và phối hợp tốt bằng tiếng Anh.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eAbility to manage multiple projects and deadlines.\u003c/p\u003e\u003cp\u003e\u003cem\u003eKhả năng quản lý nhiều dự án và thời hạn cùng lúc.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eStrong attention to detail and quality control.\u003c/p\u003e\u003cp\u003e\u003cem\u003eChú ý cao đến chi tiết và kiểm soát chất lượng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePreferred Experience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eKinh nghiệm ưu tiên\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eExperience working with international façade consultants or façade contractors.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kinh nghiệm làm việc với tư vấn mặt dựng quốc tế hoặc nhà thầu mặt dựng.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eExperience with high-rise or complex façade systems.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kinh nghiệm với các hệ mặt dựng nhà cao tầng hoặc phức tạp.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eFamiliarity with façade testing standards and mock-up processes.\u003c/p\u003e\u003cp\u003e\u003cem\u003eQuen thuộc với các tiêu chuẩn thử nghiệm mặt dựng và quy trình mock-up.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eExperience leading small design teams or coordinating multiple designers.\u003c/p\u003e\u003cp\u003e\u003cem\u003eCó kinh nghiệm dẫn dắt nhóm thiết kế nhỏ hoặc điều phối nhiều nhà thiết kế.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e"])</script><script>self.__next_f.push([1,"27:T1502,"])</script><script>self.__next_f.push([1,"\u003cp\u003eJob Summary\u003c/p\u003e\u003cp\u003eTóm tắt công việc\u003c/p\u003e\u003cp\u003eThe Senior Facade Designer is responsible for leading the technical design and development of building façade systems from concept through detailed design and construction documentation. This role works closely with façade engineers, architects, consultants, and contractors to deliver high-quality façade solutions that meet architectural intent, structural performance, and project requirements. The Senior Facade Designer also provides technical guidance to junior designers and ensures design coordination across disciplines.\u003c/p\u003e\u003cp\u003e\u003cem\u003eNhà thiết kế mặt dựng cấp cao chịu trách nhiệm dẫn dắt việc thiết kế kỹ thuật và phát triển các hệ thống mặt dựng công trình từ giai đoạn ý tưởng đến thiết kế chi tiết và hồ sơ thi công. Vị trí này làm việc chặt chẽ với kỹ sư mặt dựng, kiến trúc sư, tư vấn và nhà thầu nhằm cung cấp các giải pháp mặt dựng chất lượng cao đáp ứng ý đồ kiến trúc, hiệu suất kết cấu và yêu cầu dự án. Nhà thiết kế mặt dựng cấp cao cũng cung cấp hướng dẫn kỹ thuật cho các nhà thiết kế cấp dưới và đảm bảo sự phối hợp thiết kế giữa các bộ môn.\u003c/em\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKey Responsibilities\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eTrách nhiệm chính\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eDesign \u0026 Technical Development\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e\u003cem\u003eThiết kế \u0026 Phát triển kỹ thuật\u003c/em\u003e\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLead the design and detailing of façade systems including curtain wall, window wall, cladding, skylights, louvers, and glazing systems.\u003c/p\u003e\u003cp\u003e\u003cem\u003eChủ trì thiết kế và chi tiết hóa các hệ thống mặt dựng bao gồm curtain wall, window wall, tấm ốp (cladding), giếng trời, lam chắn nắng và hệ thống kính.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eDevelop concept, schematic, and detailed façade drawings based on architectural requirements and engineering criteria.\u003c/p\u003e\u003cp\u003e\u003cem\u003ePhát triển bản vẽ mặt dựng ở các giai đoạn ý tưởng, sơ bộ và chi tiết dựa trên yêu cầu kiến trúc và tiêu chí kỹ thuật.\u003c/em\u003e\u003c/p\u003e\u003cp\u003eProduce and review shop drawings, fabrication drawings, and installation details.\u003c/p\u003e\u003cp\
