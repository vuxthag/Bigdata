cao, mọi thành viên đều có cơ hội được lắng nghe, thử sức và tạo nên dấu ấn riêng.\r\n\r\n04 Giá trị cốt lõi - Nền tảng văn hóa doanh nghiệp tại SAPP:\r\n\r\n- Chính trực (Integrity): Công bằng, trung thực và thẳng thắn trong các mối quan hệ trong và ngoài doanh nghiệp.\r\n- Tận tâm (Dedication): Sự sẵn sàng hy sinh, dành thời gian và tâm huyết để phát triển con người.\r\n- Hòa nhập (Integrate): Ghi nhận và trân trọng giá trị của sự đa dạng và không có hành vi phân biệt đối xử.\r\n- Tạo giá trị (Value): Luôn tạo ra các sản phẩm, mối quan hệ có ý nghĩa và phù hợp với đối tượng khách hàng nhằm hỗ trợ họ giải quyết các nhu cầu và vấn đề.\r\n\r\nVới môi trường trẻ trung, năng động và đề cao sự chủ động, SAPP là điểm đến lý tưởng cho những người trẻ khát khao phát triển bản thân, đóng góp giá trị thực và đồng hành cùng tổ chức kiến tạo tương lai của ngành đào tạo tài chính – kế toán tại Việt Nam.\r\n\r\nMời bạn tìm hiểu thông tin chi tiết về SAPP Academy tại website: https://sapp.edu.vn/"])</script><script>self.__next_f.push([1,"24:Tdd3,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. Mô tả chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e Chúng tôi đang tìm kiếm một Marketing Team Lead năng động và có kinh nghiệm để dẫn dắt đội ngũ marketing tại Đơn vị Kinh doanh (BU). Vị trí này đóng vai trò quan trọng trong việc cụ thể hóa chiến lược marketing của sản phẩm, thúc đẩy hiệu suất marketing của đội nhóm.\u003c/p\u003e\u003cp\u003e BU ACCA tại SAPP cung cấp chương trình đào tạo chuẩn quốc tế (ACCA và IFRS), giúp học viên tối ưu tỷ lệ pass và rút ngắn hành trình chinh phục chứng chỉ. Là Đối tác đào tạo cấp độ Bạch kim của ACCA, SAPP đào tạo 5000+ học viên mỗi năm với lộ trình cá nhân hóa, phương pháp hiện đại và cam kết đầu ra rõ ràng.\u003c/p\u003e\u003cp\u003e Vị trí này phù hợp với những ứng viên mong muốn dẫn dắt tăng trưởng cho một sản phẩm giáo dục có lợi thế rõ ràng, tập trung vào việc tối ưu toàn bộ hành trình khách hàng từ thu hút lead đến chuyển đổi thành học viên, qua đó nâng cao hiệu quả marketing, tối ưu doanh thu và thúc đẩy tăng trưởng bền vững.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eII. Nhiệm vụ \u0026 Trách nhiệm chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMarketing Team Lead sẽ đảm nhiệm các nhóm nhiệm vụ quan trọng sau:\u003c/p\u003e\u003cp\u003e1. Lập Kế hoạch \u0026 Thực thi Marketing\u003c/p\u003e\u003cp\u003e• Phân tích sâu sắc nhu cầu khách hàng, thị trường và sản phẩm để xây dựng chiến lược và kế hoạch marketing chi tiết, bám sát kế hoạch tuyển sinh cho BU.\u003c/p\u003e\u003cp\u003e• Dẫn dắt việc triển khai các chiến dịch marketing tích hợp (digital, offline, content, performance, v.v.) đảm bảo đạt được KPI đề ra.\u003c/p\u003e\u003cp\u003e• Tối ưu hóa tỷ lệ chuyển đổi để có được khách hàng tiềm năng chất lượng cao hơn, tăng doanh thu và giảm chi phí chuyển đổi.\u003c/p\u003e\u003cp\u003e• Quản lý ngân sách marketing hiệu quả, tối ưu chi phí và ROI.\u003c/p\u003e\u003cp\u003e2. Phối hợp đa phòng ban\u003c/p\u003e\u003cp\u003e• Phối hợp chặt chẽ với các bộ phận Sales, Customer Service, R\u0026D để đảm bảo sự đồng bộ trong hoạt động kinh doanh và trải nghiệm khách hàng của BU.\u003c/p\u003e\u003cp\u003e• Đảm bảo việc triển khai chiến lược và các hoạt động marketing tuân thủ các guideline, best practices từ bộ phận Marketing Strategy HO và các chuẩn thương hiệu tổng thể.\u003c/p\u003e\u003cp\u003e3. Phân tích Hiệu quả \u0026 Cải tiến\u003c/p\u003e\u003cp\u003e• Thường xuyên theo dõi, đo lường và phân tích hiệu quả của các chiến dịch marketing.\u003c/p\u003e\u003cp\u003e• Phát hiện các chỉ số bất thường, điểm nghẽn trong vận hành và đề xuất các giải pháp tối ưu.\u003c/p\u003e\u003cp\u003e• Dẫn dắt các buổi After-Action Review để rút kinh nghiệm và thúc đẩy cải tiến liên tục cho các hoạt động marketing của BU.\u003c/p\u003e\u003cp\u003e4. Quản lý \u0026 Phát triển Đội ngũ\u003c/p\u003e\u003cp\u003e• Phân công công việc, giám sát tiến độ và chất lượng công việc của các thành viên trong nhóm marketing.\u003c/p\u003e\u003cp\u003e• Đánh giá hiệu suất cá nhân và xây dựng kế hoạch phát triển cho từng thành viên.\u003c/p\u003e\u003cp\u003e• Mentoring, coaching và tạo điều kiện phát triển chuyên môn cho đội ngũ, giúp họ nâng cao năng lực.\u003c/p\u003e\u003cp\u003e5. Chỉ số đánh giá (KPI)\u003c/p\u003e\u003cp\u003e• Số lượng MQL\u003c/p\u003e\u003cp\u003e• Tỉ lệ chuyển đổi SQL/MQL\u003c/p\u003e\u003cp\u003e• Costs/Lead\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:T70b,\u003cp\u003e\u003cstrong\u003eTrình độ học vấn:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp đại học chuyên ngành Marketing, Quản trị Kinh doanh, Truyền thông, Kinh tế hoặc các lĩnh vực liên quan.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eKinh nghiệm làm việc:\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tối thiểu 4-6 năm kinh nghiệm làm marketing, trong đó có ít nhất 2 năm kinh nghiệm ở vị trí leader hoặc quản lý nhóm.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm ở vai trò điều phối chiến dịch đa kênh, hoặc làm việc tại agency.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm thực chiến mạnh mẽ trong lĩnh vực Digital Marketing, Brand Management, Performance Marketing.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm làm việc với CRM là một lợi thế.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm trong lĩnh vực giáo dục là một lợi thế.\u003c/p\u003e\u003cp\u003eKiến thức chuyên môn\u003c/p\u003e\u003cp\u003e• Nắm vững các nguyên tắc marketing tổng thể và chuyên sâu (branding, digital marketing, content, CRM, event, partnership).\u003c/p\u003e\u003cp\u003e• Kiến thức về phân tích dữ liệu marketing và các công cụ liên quan.\u003c/p\u003e\u003cp\u003eKỹ năng chuyên nghiệp bắt buộc\u003c/p\u003e\u003cp\u003e• Kỹ năng lãnh đạo đội nhóm xuất sắc, truyền cảm hứng và phát triển nhân sự.\u003c/p\u003e\u003cp\u003e• Kỹ năng lập kế hoạch, tổ chức và quản lý dự án hiệu quả.\u003c/p\u003e\u003cp\u003e• Khả năng phân tích dữ liệu và ra quyết định dựa trên dữ liệu.\u003c/p\u003e\u
