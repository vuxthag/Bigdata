microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Te42,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eI. MÔ TẢ CÔNG VIỆC\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Quản lý hệ thống kế toán – tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tổ chức bộ máy kế toán, phân công nhiệm vụ và chuẩn hóa quy trình cho từng vị trí.\u003c/p\u003e\u003cp\u003e• Xây dựng, hướng dẫn, kiểm soát quy trình luân chuyển chứng từ, quy chế tài chính nội bộ, quy trình thanh toán.\u003c/p\u003e\u003cp\u003e• Thiết lập hệ thống kiểm soát nội bộ (Internal Control) để hạn chế sai sót, gian lận.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Báo cáo tài chính \u0026 kiểm soát số liệu\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Lập và chịu trách nhiệm toàn bộ Báo cáo tài chính tháng/quý/năm theo chuẩn mực.\u003c/p\u003e\u003cp\u003e• Kiểm tra tính hợp lệ, hợp pháp, hợp lý của tất cả chứng từ kế toán.\u003c/p\u003e\u003cp\u003e• Soát xét số liệu định kỳ: doanh thu, chi phí, công nợ, dòng tiền, tài sản cố định, hàng tồn kho…\u003c/p\u003e\u003cp\u003e• Lập báo cáo theo yêu cầu ban lãnh đạo:\u003c/p\u003e\u003cp\u003e     + P\u0026L (lãi lỗ theo từng mảng)\u003c/p\u003e\u003cp\u003e     + Dòng tiền thực – dự báo\u003c/p\u003e\u003cp\u003e     + Hiệu quả chi phí\u003c/p\u003e\u003cp\u003e     + Lợi nhuận biên\u003c/p\u003e\u003cp\u003e     + Phân tích chênh lệch (variance analysis)\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Thuế \u0026 làm việc với cơ quan nhà nước\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tổ chức lập và nộp đầy đủ các tờ khai thuế định kỳ: GTGT, TNDN, TNCN, thuế nhà thầu, báo cáo sử dụng hoá đơn.\u003c/p\u003e\u003cp\u003e• Giải trình, làm việc với cơ quan thuế khi:\u003c/p\u003e\u003cp\u003e- Kiểm tra đột xuất\u003c/p\u003e\u003cp\u003e- Thanh tra chuyên ngành\u003c/p\u003e\u003cp\u003e- Quyết toán thuế cuối kỳ\u003c/p\u003e\u003cp\u003e• Tư vấn chính sách thuế mới, cập nhật quy định pháp luật, cảnh báo rủi ro thuế có thể phát sinh.\u003c/p\u003e\u003cp\u003e• Xử lý các trường hợp phát sinh: lập hoá đơn sai, xuất thay thế/điều chỉnh, hợp đồng không đủ điều kiện chi phí, chứng từ ngân hàng không khớp…\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Kiểm toán – ngân hàng – đối tác tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Làm việc với đơn vị kiểm toán độc lập: cung cấp số liệu, giải trình, xử lý khuyến nghị sau kiểm toán.\u003c/p\u003e\u003cp\u003e• Chuẩn bị hồ sơ vay ngân hàng, giải ngân, bảo lãnh, hạn mức tín dụng.\u003c/p\u003e\u003cp\u003e• Quản lý quan hệ với các tổ chức tài chính, quỹ đầu tư, cổ đông.\u003c/p\u003e\u003cp\u003e• Xây dựng thuyết minh BCTC phục vụ due diligence (nếu DN có gọi vốn).\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Quản trị dòng tiền – ngân sách – kế hoạch tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Quản lý dòng tiền vào – ra, đảm bảo cân đối thanh khoản.\u003c/p\u003e\u003cp\u003e• Xây dựng ngân sách năm (Budget) và theo dõi thực thi theo từng phòng ban.\u003c/p\u003e\u003cp\u003e• Phân tích và dự báo tài chính phục vụ chiến lược kinh doanh, mở rộng thị trường, đầu tư mới.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Quản lý rủi ro \u0026 tuân thủ\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kiểm soát các rủi ro thường gặp:\u003c/p\u003e\u003cp\u003e- Sai sót thu – chi\u003c/p\u003e\u003cp\u003e- Hạch toán sai chuẩn\u003c/p\u003e\u003cp\u003e- Rủi ro pháp lý và thuế\u003c/p\u003e\u003cp\u003e- Rủi ro tại kho – tồn kho – giá vốn\u003c/p\u003e\u003cp\u003e- Rủi ro gian lận nội bộ\u003c/p\u003e\u003cp\u003e• Thiết lập cơ chế phê duyệt đa tầng (multi-approval) cho thanh toán, hợp đồng, tạm ứng.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e7. Quản lý đội ngũ kế toán\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tuyển dụng, đào tạo, đánh giá KPI nhân sự kế toán.\u003c/p\u003e\u003cp\u003e• Xây dựng chính sách phát triển chuyên môn, nâng cấp kỹ năng team.\u003c/p\u003e\u003cp\u003e• Giám sát thái độ nghề nghiệp, đạo đức nghề nghiệp.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"24:T87a,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Yêu cầu chung\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp đại học chuyên ngành kế toán, kiểm toán, tài chính.\u003c/p\u003e\u003cp\u003e• Có Chứng chỉ Kế toán trưởng theo quy định Bộ Tài chính.\u003c/p\u003e\u003cp\u003e• Tối thiểu 5–7 năm kinh nghiệm trong nghề; ít nhất 2–3 năm ở vị trí Kế toán trưởng/Kế toán tổng hợp cấp cao.\u003c/p\u003e\u003cp\u003e• Thành thạo phần mềm kế toán: MISA, Bravo, Fast, ERP (SAP/Oracle/Odoo là lợi thế).\u003c/p\u003e\u003cp\u003e• Am hiểu sâu:\u003c/p\u003e\u003cp\u003e+ Luật thuế (GTGT, TNDN, TNCN, FCT…)\u003c/p\u003e\u003cp\u003e+ Chuẩn mực kế toán\u003c/p\u003e\u003cp\u003e+ Chuẩn mực kiểm toán\u003c/p\u003e\u003cp\u003e+ Các thông tư nghị định về kế toán – tài chính\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Yêu cầu theo từng ngành\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Hạch toán doanh thu theo tiến độ, đối soát nền tảng (Meta, Google, YouTube…), chi phí nhân công dự án.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Yêu cầu trong các tình huống phát sinh\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm quyết toán thuế, tự tin giải trình.\u003c/p\u003e\u003cp\u003e• Đã từng làm việc với kiểm toán, chuẩn bị đầy đủ working files.\u003c/p\u003e\u003cp\u003e• Có khả năng xây dựng cơ cấu tài chính cho DN đang gọi vốn/IPO.\u003c/p\u003e\u003cp\u003e• Có kinh nghiệm trong giai đoạn chuyển đổi phần mềm kế toán sang ERP.\u003c/p\u003e\u003cp\u003e• Xử lý tốt trường hợp phát sinh:\u003c/p\u003e\u003cp\u003e     + Sai doanh thu nhiều kỳ\u003c/p\u003e\u003cp\
