ng ty P69 sản xuất trên dây chuyền hiện đại và hệ thống quản lý chất lượng đạt tiêu chuẩn ISO 9001:2015\r\n\r\nThang cáp, máng cáp sử dụng trong hệ thống điện, điện công nghiệp\r\nỐng gió, cửa gió, van gió sử dụng trong hệ thống điều hoà Thông gió (HVAC)\r\nCác loại thép hình, thanh giá đỡ đa năng sử dụng trong hệ thống cơ điện (M\u0026E)\r\nXà gồ chữ C sử dụng trong ngành xây dựng\r\nVà hơn thế nữa Cung ứng một số lượng sản phẩm không hạn chế khi khách hàng có nhu cầu đặt mua hàng.\r\nVà chúng tôi luôn nỗ lực hết mình để tạo ra những sản phẩm hoàn hảo nhất để hệ thống cơ điện trong công trình hoạt động ổn định, bền vững. Nhằm tạo ra môi trường tốt nhất cho các khu đô thị, nhà máy, nhà xưởng… Đóng góp một phần vào công cuộc công nghiệp hóa, hiện đại hóa của đất nước.\r\n\r\nLĨNH VỰC TỔNG THẦU CƠ ĐIỆN M\u0026E\r\nLà tổng thầu chuyên nghiệp (Cung cấp và thi công hệ thống cơ điện M\u0026E) Từ tư vấn lập dự toán đến triển khai hoàn thiện đồng bộ công trình, với các gói thầu cơ điện trọng điểm giá trị hàng trăm tỷ:\r\n\r\nHệ thống điều hòa thông gió\r\nHệ thống PCCC\r\nHệ thống điện trung, hạ thế, chiếu sáng, hệ thống điện nguồn\r\nHệ thống cấp, thoát nước\r\nHệ thống máy phát điện dự phòng\r\nHệ thống điện nhẹ: mạng LAN, camera, âm thanh…\r\nHệ thống quản lý tòa nhà thông minh BMS…\r\nHệ thống Gas trung tâm cho các dự án: cao ốc, chung cư, trung tâm thương mại, nhà máy, khách sạn, sân bay, bệnh viện…\r\nVới quan niệm nhân lực là tài sản lớn nhất của mình, chúng tôi đã đào tào được một đội ngũ cán bộ, công nhân có trình độ cao, tay nghề vững. Hàng năm chúng tôi có tổ chức các đợt tập huấn để nâng cao giá trị nhân lực của Công ty. Song song với việc đào tạo và phát triển nhân lực, việc tiếp thu khoa học kỹ thuật và dây chuyền sản xuất, công nghệ lắp dựng mới là một vấn đề đặc biệt được chú trọng."])</script><script>self.__next_f.push([1,"24:T5f2,\u003cp\u003e• Kinh nghiệm: 2-3 năm\u003c/p\u003e\u003cp\u003e• Yêu cầu bằng cấp: Đại học, cao đẳng\u003c/p\u003e\u003cp\u003e• , chúng tôi đã đào tào được một đội ngũ cán bộ, công nhân có trình độ cao, tay nghề vững. Hàng năm chúng tôi có tổ chức các đợt tập huấn để nâng cao giá trị nhân lực của Công ty. Song song với việc đào tạo và phát triển nhân lực, việc tiếp thu khoa học kỹ thuật và dây chuyền sản xuất, công nghệ lắp dựng mới là một vấn đề đặc biệt được chú trọng."])</script><script>self.__next_f.push([1,"40:{\"companyId\":341475,\"jobImageURLs\":\"$41\",\"jobVideoURLs\":null,\"companyName\":\"CÔNG TY CỔ PHẦN ĐẦU TƯ P69\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/d4/11447524.png\",\"companySizeId\":\"\",\"companyProfile\":\"$42\",\"contactName\":\"\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"\",\"allowRedirect\":0,\"whyWorkWithUs\":\"\",\"profileBaseName\":\"\",\"isUpgradeProfile\":0,\"isDeleteProfile\":0,\"isAllowUserEdit\":0,\"companyProfileBannerUrl\":\"\",\"companyProfileUrl\":\"\",\"allowRedirectJobIds\":\"\",\"profilePublishedSiteMask\":0,\"bannerDesktopUri\":\"https://images02.vietnamworks.com/companyprofile/banner-default-company.png\"}\n44:{\"serviceCode\":\"TPM\",\"startOn\":\"2026-04-09T17:34:07+07:00\",\"expiredOn\":\"2026-05-09T23:59:59+07:00\"}\n45:{\"serviceCode\":\"JPM\",\"startOn\":\"2026-04-09T17:34:07+07:00\",\"expiredOn\":\"2026-05-09T23:59:59+07:00\"}\n43:[\"$44\",\"$45\"]\n46:{\"jobInvitationId\":0,\"status\":0}\n"])</script><script>self.__next_f.push([1,"27:{\"jobId\":2037871,\"jobTitle\":\"Kỹ Sư Cơ Điện M\u0026E (Chuyên Ngành: Điện, Cấp Thoát Nước, Thanh Quyết Toán, PCCC, QS)\",\"userId\":6627205,\"companyLogo\":\"https://images.vietnamworks.com/pictureofcompany/d4/11447524.png\",\"alias\":\"ky-su-co-djien-mandampe-chuyen-nganh-djien-cap-thoat-nuoc-thanh-quyet-toan-pccc-qs\",\"createdOn\":\"2026-04-09T16:04:53+07:00\",\"approvedOn\":\"2026-04-09T17:34:07+07:00\",\"expiredOn\":\"2026-05-09T23:59:59+07:00\",\"lastUpdatedOn\":\"2026-04-10T17:06:17+07:00\",\"lastSyncedOn\":\"2026-04-12T12:07:31+07:00\",\"companyName\":\"CÔNG T
