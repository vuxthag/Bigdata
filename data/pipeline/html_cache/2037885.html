ompanyId\":178524,\"companyProfile\":\"GAMMA JSC – Kiến tạo giải pháp điện thông minh cho không gian đẳng cấp\\r\\nHơn 20 năm kinh nghiệm và 2000+ công trình trên khắp Việt Nam, GAMMA là đơn vị tiên phong trong lĩnh vực hệ thống điện thông minh \\\"may đo\\\" cho Lâu đài, Biệt thự và Penthouse tại Việt Nam.\\r\\nVới triết lý \\\"Nhất nghệ tinh – Nhất thân vinh\\\", chúng tôi không ngừng đổi mới, áp dụng công nghệ tiên tiến và tuân thủ những tiêu chuẩn kỹ thuật khắt khe nhất. Mỗi giải pháp của GAMMA không chỉ tối ưu về hiệu suất mà còn nâng tầm giá trị không gian sống, đảm bảo sự bền vững, tiện nghi và độc bản.\\r\\nTại GAMMA, con người là trọng tâm của sự phát triển. Chúng tôi đề cao tính chuyên nghiệp, chân thành và tinh thần đổi mới, đồng thời cam kết xây dựng môi trường làm việc công bằng, minh bạch và đề cao sự phát triển cá nhân, không phân biệt vùng miền, giới tính hay bất kỳ yếu tố nào khác.\\r\\nGia nhập GAMMA – đồng hành cùng những dự án đỉnh cao, nơi bạn được trao cơ hội để phát huy tối đa năng lực và tạo dấu ấn trong lĩnh vực công nghệ điện thông minh.\",\"companySizeId\":0,\"contactName\":\"Phòng nhân sự\",\"createdBy\":3367532,\"isOnline\":true,\"isActive\":true,\"isApproved\":true,\"isUnpaidDisable\":0,\"isCompleted\":true,\"isAnonymous\":false,\"isSalaryVisible\":true,\"isShowLogo\":true,\"isShowLogoInSearch\":false,\"jobDescription\":\"\u003cp\u003e• Triển khai dự án: Quản lý, giám sát và trực tiếp lắp đặt các thiết bị điều khiển nhà thông minh, thiết bị bảo vệ tủ điện tại công trình.\u003c/p\u003e\u003cp\u003e• Kỹ thuật chuyên sâu: Lập trình, cấu hình và vận hành hệ thống Smart Home (KNX, LogicMachine, Aycontrol...) theo yêu cầu dự án.\u003c/p\u003e\u003cp\u003e• Dịch vụ khách hàng: Kiểm tra, bảo trì, xử lý sự cố và hỗ trợ vận hành hệ thống sau khi bàn giao để đảm bảo sự ổn định cho khách hàng.\u003c/p\u003e\u003cp\u003e• Báo cáo: Lập kế hoạch và báo cáo tiến độ công việc định kỳ.\u003c/p\u003e\",\"jobRequirement\":\"\u003cp\u003e• Trình độ \u0026 K
