 thrive. We’ll work together to create best-in-class, high performing teams focusing on development, alignment and one-way, same-way approach. We want to create ideas, elevate talent and capabilities and grow together to create our future of work and workplace.\r\n\r\nIt’s more than just a career!\r\nWe believe in people with ideas and dreams, and we want you to achieve your aspirations. More than just a career, NAB Vietnam offers you the flexibility to balance your work – life, the opportunity to grow as professionals and people, and a complete set of wellbeing offerings. If you have an appetite to learn, grow and elevate others around you, this is the place for you!24:T946,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eKey Accountabilities \u0026 Outcomes\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Governance \u0026 Company Secretary Support\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Prepare, draft, and maintain Board and Committee agendas, papers, resolutions, minutes, and statutory filings in line with governance standards.\u003c/p\u003e\u003cp\u003e- Operate end‑to‑end governance workflows with clear tracking of actions and decisions.\u003c/p\u003e\u003cp\u003e- Maintain centralised statutory registers and governance filing systems.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOutcome: \u003c/strong\u003eConsistent, audit‑ready governance with clear accountability.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Legal Advisory \u0026 Contract Lifecycle Execution\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Draft, review, and support negotiation of contracts using standard lifecycle workflows.\u003c/p\u003e\u003cp\u003e- Maintain central contract and legal matter repositories as a single source of truth.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOutcome:\u003c/strong\u003e Faster legal turnaround and reduced document risk.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Regulatory Compliance \u0026 Reporting\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Monitor regulatory changes and support implementation of policy and compliance updates.\u003c/p\u003e\u003cp\u003e- Assist with accurate and timely regulatory filings and reporting.\u003c/p\u003e\u003cp\u003e- Support management of business licences and regulatory authorisations, including renewals and variations.\u003c/p\u003e\u003cp\u003e- Maintain licensing registers and track compliance with licence conditions.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOutcome:\u003c/strong\u003e Ongoing regulatory and licensing compliance supported by clear, auditable evidence.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Policy, Controls \u0026 Capability Uplift\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Support development and maintenance of governance and legal SOPs and templates.\u003c/p\u003e\u003cp\u003e- Contribute to training and awareness initiatives.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eOutcome:\u003c/strong\u003e Repeatable, scalable governance and legal practices.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Operating Context\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eSupporting the Head of Legal \u0026 Company Secretary and Associate Director, and forming part of the scalable foundation as the organisation grows. Reporting to Associate Director, Legal and Compliance.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e6. Success Measures\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Accuracy and timeliness of governance and regulatory filings.\u003c/p\u003e\u003cp\u003e- Consistent use of standard templates and repositories.\u003c/p\u003e\u003cp\u003e- Reduction in rework, missed actions, and document retrieval issues.\u003c/p\u003e\u003cp\u003e- Positive stakeholder feedback on reliability and responsiveness.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"25:Tc95,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eRequired Background \u0026 Experience\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Bachelor’s degree in law.\u003c/p\u003e\u003cp\u003e- 3–5 years’ experience in legal, compliance, or governance roles.\u003c/p\u003e\u003cp\u003e- Hands‑on experience supporting board and committee processes, statutory filings, and corporate records.\u003c/p\u003e\u003cp\u003e- Exposure to regulatory compliance, licensing, and routine legal or contractual matters.\u003c/p\u003e\u003cp\u003e- Very good command of written and spoken English.\u003c/p\u003e\u003cp\u003e- Experience in a multi‑entity or multi‑jurisdiction governance environment is an advantage.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eTHE BENEFITS AND PERKS\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWe appreciate and reward our colleagues who do great work every day – from excelling for our customers, to taking ownership of an issue to get it resolved. Here’s how we support our people with a range of exclusive benefits.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Generous compensation and benefit package\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Attractive salary\u003c/p\u003e\u003cp\u003e- 20-day paid annual leave and 7-day paid sick leave\u003c/p\u003e\u003cp\u003e- 13th month salary and Annual Performance Bonus \u003c/p\u003e\u003cp\u003e- Premium healthcare for yourself and family members\u003c/p\u003e\u003cp\u003e- Monthly allowance for team activities\u003c/p\u003e\u003cp\u003e- Premium welcome kit and occasional gifts of appreciation\u003c/p\u003e\u003cp\u003e- Extra benefits on your work anniversary\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Exciting career and development opportunities\u003c/strong\u003e\u003c/p\u003e\u003cp\u
