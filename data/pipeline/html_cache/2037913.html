bilities and grow together to create our future of work and workplace.\r\n\r\nIt’s more than just a career!\r\nWe believe in people with ideas and dreams, and we want you to achieve your aspirations. More than just a career, NAB Vietnam offers you the flexibility to balance your work – life, the opportunity to grow as professionals and people, and a complete set of wellbeing offerings. If you have an appetite to learn, grow and elevate others around you, this is the place for you!24:T74a,\u003cp\u003e\u003cstrong\u003eA. MAIN RESPONSIBILITIES\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eLearning \u0026 Development Programs \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Coordinate core learning programs across levels, including soft skills development, leadership capability, and mandatory learning. \u003c/p\u003e\u003cp\u003e- Lead end to end management of assigned training initiatives, including planning, scheduling, communication, vendor coordination, facilitation support, and evaluation. \u003c/p\u003e\u003cp\u003e- Manage learning systems and tools to ensure smooth learner experience and accurate reporting. \u003c/p\u003e\u003cp\u003e- Capability \u0026 Culture Enablement \u003c/p\u003e\u003cp\u003e- Support enterprise capability initiatives such as groupwide skill assessments and development pathways. \u003c/p\u003e\u003cp\u003e- Partner with People Leaders to identify learning needs and cocreate development actions that align with business goals. \u003c/p\u003e\u003cp\u003e- Contribute to initiatives that strengthen growth mindset and learning culture. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCompliance, Risk \u0026 Governance \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Oversee compliance learning for all colleagues, ensuring timely completion and accurate evidence tracking. \u003c/p\u003e\u003cp\u003e- Execute monthly and quarterly risk and compliance requirements relating to learning obligations and reporting. \u003c/p\u003e\u003cp\u003e- Maintain strong governance processes across mandatory program"])</script><script>self.__next_f.push([1,"s. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eStakeholder Partnership \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Build strong and effective relationships with People Leaders, Senior Leaders, and cross functional teams to enable smooth implementation of learning priorities. \u003c/p\u003e\u003cp\u003e- Provide guidance on learning resources, development planning, and tools available through NAB’s learning platforms. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eContinuous Improvement \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Track program effectiveness and recommend improvements. \u003c/p\u003e\u003cp\u003e- Adopt a continuous learning mindset to refine processes, efficiencies, and learner experience. \u003c/p\u003e25:Tfed,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003eB. QUALIFICATION REQUIREMENTS\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eExperience \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- 7+ years of experience in building, designing, and running dedicated training programs for large organizations. \u003c/p\u003e\u003cp\u003e- Proven experience managing learning programs or capability initiatives end to end. \u003c/p\u003e\u003cp\u003e- Experience working with learning systems (LMS) or digital learning tools is preferred. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eSkills \u0026 Competencies \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Strong stakeholder management and relationship building skills. \u003c/p\u003e\u003cp\u003e- Excellent project and time management, with strong attention to detail. \u003c/p\u003e\u003cp\u003e- Ability to manage compliance tasks and data with accuracy. \u003c/p\u003e\u003cp\u003e- Strong communication skills in English (written and spoken). \u003c/p\u003e\u003cp\u003e- Analytical, structured, and proactive in problem solving. \u003c/p\u003e\u003cp\u003e- Collaborative team player with high ownership and professionalism. \u003c/p\u003e\u003cp\u003e- Ability to establish trust quickly and collaborate effectively with diverse stakeholders. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003ePreferred Attributes \u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Experience in the financial or technology industries is an advantage. \u003c/p\u003e\u003cp\u003e- Passion for learning culture, leadership development, and talent growth. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eC. THE BENEFITS AND PERKS \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWe appreciate and reward our colleagues who do great work every day – from excelling for our customers, to taking ownership of an issue to get it resolved. Here’s how we support our people with a range of  benefits. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Generous compensation and benefit package \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eCompetitive pay and benefits \u003c/p\u003e\u003cp\u003e20-day paid annual leave and 7-day paid sick leave \u003c/p\u003e\u003cp\u003e13th month salary and Annual Performance Bonus \u003c/p\u003e\u003cp\u003ePremium healthcare for yourself and family members \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Exciting career and development opportunities \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLarge scale products with modern technologies in banking domain \u003c/p\u003e\u003cp\u003eClear roadmap for career advancement  \u003c/p\u003e\u003cp\u003eAccess to digital learning platform such as Udemy \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Professional and engaging working environment \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eHybrid working model  \u003c/p\u003e\u003cp\u003eState-of-the-art \u0026 modern Agile office \u003c/p\u003e\u003cp\u003eEmployee Assistance Program  \u003c/p\u003e\u003cp\u003eAnnual team activities and company events \u003c/p\u003e\u003cp\u003eA solid and talented team behind you – great people who love what they do \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eA DIVERSE AND INCLUSIVE WORKPLACE WORKS BETTER FOR EVERYONE \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWe know that our people make us who we are. That's why we have built a culture of respect – where everyone feels valued and appreciated for being their true authentic selves at NAB. With our focus on inclusion and diversity, and in partnership with our Employee Resource Groups, NAB is a place where First Nations colleagues, colleagues of all genders, sexualities and ages, carers and colleagues with disability, and colleagues from all cultures, races and religions have the opportunity to thrive, connect and grow. \u003c/p\u003e\u003cp\u003eWe are intent on providing an environment where you can work your way. Ask about our many flexible work options and please let us know if we can provide any adjustments throughout the recruitment process. \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eCLOUD-FIRST \u003c/strong\u003e\u003c/p\u003e\u003cp\u003eNAB is undergoing an exciting \"Cloud First\" technology transformation by taking advantage of the latest tools and techniques used by leading technology and digital companies globally. But it’s not just about the Tech, we are also investing heavily in our people, so if you have an appetite to learn, grow and elevate others around you, this is the place for you! \u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003eIt’s more than a career at NAB. It’s about more opportunity, more moments to make a difference and more focus on you.\u003c/p\u003e\u003cp\u003eYour job is just one part of your life. When you bring your ideas, energy, and hunger for growth to us, you’ll be recognised and rewarded for your contribution in return. You’ll have our support to excel for our customers, deliver positive change for our communities and grow your career.  \u003c/p\u003e"])</script><script>self.__next_f.push([1,"26:T6a0,The NAB Innovation Centre Vietnam (NAB Vietnam) is part of National Australia Bank (NAB) Technology \u0026 Enterprise Operations division, helping to deliver great technology which improves the customer experiences for NAB’s eight million customers. The mission of the NAB Vietnam is to connect the talents of Vietnam to NAB and together improve the lives of those in the Vietnam technology community.\r\n\r\nWe’re working on interesting projects to help NAB’s 8 million customers: By joining the NAB Vietnam, local software engineers will have access to a wide variety of projects and opportunities, working closely with colleagues in Australia and with global partners such as AWS and Microsoft to take advantage of the latest modern technologies. Our passion for creating value and serving our customers well means we're constantly striving to redefine our standards of excellence.\r\n\r\nWe’re investing in you: We strive to create not only a great place to work, but also the best technology centre for tech engineers to thrive. We’ll work together to create best-in-class, high performing teams focusing on development, alignment and one-way, same-way approach. We want to create ideas, elevate talent and capabilities and grow together to create our future of work and workplace.\r\n\r\nIt’s more than just a career!\r\nWe believe in people with ideas and dreams, and we want you to achieve your aspirations. More than just a career, NAB Vietnam offers you the flexibility to balance your work – life, the
