g mạng lưới phân phối và dịch vụ rộng khắp, đáp ứng nhu cầu ngày càng cao của thị trường.\r\n\r\nKhẳng định cam kết đầu tư lâu dài tại Việt Nam, Daikin đã đầu tư 10 tỷ Yên Nhật (khoảng 93,6 triệu USD) xây dựng Nhà máy sản xuất điều hòa không khí hiện đại có địa chỉ tại Lô Q1 KCN Thăng Long II, Mỹ Hào, Hưng Yên. Nhà máy chính thức khánh thành và đi vào hoạt động từ tháng 05/2018, không chỉ đáp ứng tiêu chuẩn quốc tế về chất lượng và hiệu suất năng lượng mà còn tạo dựng môi trường làm việc chuyên nghiệp, thân thiện, hướng đến sự phát triển bền vững.\r\n\r\nChi nhánh Hưng Yên - Daikin Vietnam luôn chào đón các ứng viên có đam mê, nhiệt huyết và khát vọng chinh phục những thử thách mới. Hãy gia nhập cùng chúng tôi để phát triển sự nghiệp và cùng kiến tạo những giá trị bền vững tại một trong những doanh nghiệp hàng đầu trong ngành công nghiệp điều hòa không khí.\r\n\r\nHãy ứng tuyển và gia nhập cùng Daikin ngay hôm nay!\r\n\r\n----------------------------------------------------------------------------------------------------------------------------------------------\r\nHung Yen Branch - Daikin Vietnam: Where Passion Meets Opportunity\r\n\r\nDaikin Vietnam, a proud member of the Daikin Group from Japan, is a pioneer in bringing modern and eco-friendly air solutions to Vietnam. With over 35 years of growth, Daikin has established an extensive distribution and service network, catering to the ever-increasing demands of the market.\r\n\r\nAffirming its long-term commitment to Vietnam, Daikin invested 10 billion Japanese Yen (approximately USD 93.6 million) to build a state-of-the-art air conditioning manufacturing plant at Lot Q1, Thang Long II Industrial Park, My Hao, Hung Yen. Officially inaugurated and operational since May 2018, the plant not only meets international standards for quality and energy efficiency but also fosters a professional and friendly working environment, aiming for sustainable development.\r\n\r\nThe Hung Yen Branch - Daikin Vietnam warmly welcomes
