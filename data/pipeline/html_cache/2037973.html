ed members of VIECA and ICEF, with more than 17 years of experience in the field of international study consultancy. Atlantic Overseas Studies consultancy company has helped students transition to studying in the US, the UK, Australia, New Zealand, Japan, South Korea as well as others. Atlantic Overseas Studies consultancy company has become a prestigious organization in the hearts of parents and students across the country. Atlantic has maintained a strong sub-agent network in 17 cities and provinces in Vietnam and in other countries such as France, South Korea and Japan.\r\n\r\n2.\tIn-school Programs: Atlantic began the In-school Supplementary program in 2015 and began the In-school Cambridge International Education and 5SiS program (including Primary, Academic English and IELTS) in 2018. Placing qualified native English speaking teachers into government-run schools and gifted schools across Vietnam. With many years of experience in the field, Atlantic in-school programs have improved the education of over 50,000 students across nearly 100 schools in Vietnam.\r\n\r\n3.\tForeign Language Training: Provide Academic English and IELTS exam preparation courses. We opened two Five- Star English Centers in early 2017 at 33 Lac Trung and 125 Hoang Ngan with the highest quality standards for its 5 star teaching, school facilities, 5 technology, customer service and curriculum. Through self-reflection at each stage, Atlantic is determined to give students the best possible experience and education for them to succeed in their futures. This education is not only focused on language and academic skills, but also on the soft, transferable skills that will empower and prepare students for their lives abroad. Atlantic is proud to provide the very best environment for teaching and learning to students from all parts of Vietnamese society.\r\n\r\n4. Founded in 2020, Five-Star E-Learning (FSEL) is a start-up Edtech company that is part of Atlantic Group, our mission is to make high-quality language learning available to students in Vietnam and beyond. FSEL has garnered recognition for its innovative approach to language learning. We are proud recipients of the prestigious Sao Khue Award, which acknowledges excellence in software and IT services in Vietnam. Our commitment to providing top-quality education is further validated by positive assessments from a committee of members from the National Foreign Languages Project.\r\n\r\nFSEL stands out by delivering a unique and comprehensive e-learning experience, combining the benefits of both offline and online learning. Our platform, designed with the latest AI technology, includes features such as personalized learning experiences, gamified rewards, and interactive simulations to keep students engaged. Recent student pilots have shown overwhelmingly positive results, highlighting the platform's effectiveness in enhancing English language proficiency.\r\n\r\nJoin us, where you will contribute to a dynamic and forward-thinking team dedicated to revolutionizing education and making learning accessible and enjoyable for students across Vietnam."])</script><script>self.__next_f.push([1,"24:T788,\u003cp\u003eFSEL - Khoá học Tiếng Anh E-learning đang tìm kiếm Giám đốc Kinh doanh B2B phụ trách phát triển hợp tác với các trường đại học/cao đẳng. Vị trí này trực tiếp làm việc với Ban giám hiệu và các phòng ban chuyên môn để giới thiệu giải pháp FSEL, triển khai các chương trình thử nghiệm (placement test, học kỳ pilot) và dẫn dắt quá trình ký kết hợp tác, mở rộng quy mô triển khai tại trường.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e1. Phát triển thị trường \u0026 đối tác\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Xây dựng chiến lược và mở rộng thị trường B2B trong khối trường đại học/cao đẳng\u003c/p\u003e\u003cp\u003e• Thiết lập, duy trì quan hệ với Ban giám hiệu, Hội đồng trường, Phòng đào tạo\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Tư vấn giải pháp \u0026 phát triển cơ hội\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Nghiên cứu thị trường, xây dựng proposal và giải pháp hợp tác phù hợp từng đối tác\u003c/p\u003e\u003cp\u003e• Trực tiếp thuyết trình, demo nền tảng FSEL và đề xuất chương trình thử nghiệm\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e3. Đàm phán \u0026 ký kết hợp đồng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Dẫn dắt toàn bộ quy trình kinh doanh: tiếp cận – tư vấn – đàm phán – ký kết MoU/Hợp đồng\u003c/p\u003e\u003cp\u003e• Xây dựng phương án hợp tác: lộ trình đào tạo, học phí, chia sẻ doanh thu\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e4. Triển khai \u0026 quản lý dự án\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Phối hợp với các phòng ban nội bộ và đối tác để triển khai chương trình\u003c/p\u003e\u003cp\u003e• Theo dõi tiến độ, đánh giá hiệu quả và xử lý các vấn đề phát sinh\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e5. Phát triển hợp tác dài hạn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Báo cáo kết quả, đề xuất mở rộng và nâng cấp hợp tác với đối tác\u003c/p\u003e\u003cp\u003e• Xây dựng quan hệ chiến lược, phát triển quy mô triển khai.\u003c/p\u003e25:Ta72,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1. Trình độ học vấn\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Tốt nghiệp Đại học trở lên, ưu tiên chuyên ngành Quản trị Kinh doanh, Marketing, Ngoại ngữ, Sư phạm, Quản lý Giáo dục hoặc các lĩnh vực liên quan.\u003c/p\u003e\u003cp\u003e• Có chứng chỉ sau đại học (MBA, Thạc sĩ Quản lý Giáo dục…) là một lợi thế.\u003c/p\u003e\u003cp\u003e• Thành thạo Tiếng Anh\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2. Kỹ năng\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e• Kỹ năng quản lý và phát triển dự án\u003c/p\u003e\u003cp\u003e• Kỹ năng giao tiếp, đàm phán và thuyết trình.\u003c/p\u003e\u003cp\u003e• Kỹ năng phân tích và nghiên cứu thị trường\u003c/p\u003e\u003cp\u003e• Kỹ năng xây dựng và duy trì quan hệ đối tác (Partnership)\u003c/p\u003e\u003cp\u003e• Hiểu biết về công nghệ, đặc biệt là E-Lear ence in the field, Atlantic in-school programs have improved the education of over 50,000 students across nearly 100 schools in Vietnam.\r\n\r\n3.\tForeign Language Training: Provide Academic English and IELTS exam preparation courses. We opened two Five- Star English Centers in early 2017 at 33 Lac Trung and 125 Hoang Ngan with the highest quality standards for its 5 star teaching, school facilities, 5 technology, customer service and curriculum. Through self-reflection at each stage, Atlantic is determined to give students the best possible experience and education for them to succeed in their futures. This education is not only focused on language and academic skills, but also on the soft, transferable skills that will empower and prepare students for their lives abroad. Atlantic is proud to provide the very best environment for teaching and learning to students from all parts of Vietnamese society.\r\n\r\n4. Founded in 2020, Five-Star E-Learning (FSEL) is a start-up Edtech company that is part of Atlantic Group, our mission is to make high-quality language learning available to students in Vietnam and beyond. FSEL has garnered recognition for its innovative approach to language learning. We are proud recipients of the prestigious Sao Khue Award, which acknowledges excellence in software and IT services in Vietnam. Our commitment to providing top-quality education is further validated by positive assessments from a committee of members from the National Foreign Languages Project.\r\n\r\nFSEL stands out by delivering a unique and comprehensive e-learning experience, combining the benefits of both offline and online learning. Our platform, designed with the latest AI technology, includes features such as personalized learning experiences, gamified rewards, and interactive simulations to keep students engaged. Recent student pilots have shown overwhelmingly positive results, highlighting the platform's effectiveness in enhancing English language proficiency.\r\n\r\n
