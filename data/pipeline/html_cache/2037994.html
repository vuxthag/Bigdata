ks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n28:I[331,[\"3377\",\"static/chunks/microfrontends-ebf9f1df-2cfb297355e86b6d.js\",\"4576\",\"static/chunks/microfrontends-cb53ad8b-5fcdc092b05e6ed7.js\",\"5327\",\"static/chunks/microfrontends-00bcb717-dd327dc88feccd83.js\",\"8882\",\"static/chunks/microfrontends-2908ff35-3144174da5664c1d.js\",\"2573\",\"static/chunks/microfrontends-482301e2-476a7bfba67b1e22.js\",\"6865\",\"static/chunks/microfrontends-e3cce98a-7b0b8c263264e530.js\",\"9724\",\"static/chunks/microfrontends-6fb05168-88f0db4466cd7e99.js\",\"6042\",\"static/chunks/app/%5Bslug%5D/page-fe95cd3767062684.js\"],\"default\"]\n23:Td1f,"])</script><script>self.__next_f.push([1,"Khởi đầu là một trong những doanh nghiệp tư nhân sớm nhất của Việt Nam, với khát vọng và sứ mệnh mang lại những giá trị tốt đẹp cho cộng đồng và phát triển kinh tế đất nước, năm 1993 Công ty TNHH Công nghệ \u0026 Thương mại (T\u0026T Ltd., Co.) được thành lập. Ngành nghề kinh doanh chính là phân phối các sản phẩm điện máy, Công ty T\u0026T đã nhanh chóng tạo dựng được tên tuổi và trở thành nhà phân phối chính thức, độc quyền tại miền Bắc của các thương hiệu lớn hàng đầu thế giới như Panasonic, National, Mitsuishi, Toshiba.\r\n\r\nVới sứ mệnh \"đem lại những giá trị tốt đẹp vì sự phát triển của xã hội\" trong gần 30 năm qua, Tập đoàn T\u0026T group đã có những bước phát triển mạnh mẽ và trở thành một trong những tập đoàn kinh tế tư nhân đa ngành lớn hàng đầu Việt Nam. Tập đoàn T\u0026T Group ‘mạnh về nội lực, giàu về tiềm năng’ đã luôn hoạt động với sự tín nhiệm cao nhất từ đối tác, Chính phủ và cộng đồng xã hội.\r\n\r\nT\u0026T Group đặt mục tiêu giữ vững vị trí top 10 Tập đoàn kinh tế tư nhân đa ngành lớn nhất Việt Nam và top 50 Tập đoàn có tầm ảnh hưởng tại châu Á \u0026 khu vực. Để thực thi hiệu quả, Tập đoàn đã xây dựng chiến lược phát triển phù hợp theo từng thời kỳ với định hướng lâu dài, bền vững theo các chuẩn mực quốc tế đi đôi với hoạt động quản trị minh bạch. Kinh doan  có những bước phát triển mạnh mẽ và trở thành một trong những tập đoàn kinh tế tư nhân đa ngành lớn hàng đầu Việt Nam. Tập đoàn T\u0026T Group ‘mạnh về nội lực, giàu về tiềm năng’ đã luôn hoạt động với sự tín nhiệm cao nhất từ đối tác, Chính phủ và cộng đồng xã hội.\r\n\r\nT\u0026T Group đặt mục tiêu giữ vững vị trí top 10 Tập đoàn kinh tế tư nhân đa ngành lớn nhất Việt Nam và top 50 Tập đoàn có tầm ảnh hưởng tại châu Á \u0026 khu vực. Để thực thi hiệu quả, Tập đoàn đã xây dựng chiến lược phát triển phù hợp theo từng thời kỳ với định hướng lâu dài, bền vững theo các chuẩn mực quốc tế đi đôi với hoạt động quản trị minh bạch. Kinh doanh dựa trên triết lý phát triển hài hoà giữa lợi ích kinh tế và lợi ích mang lại cho cộng đồng, xã hội; Tập đoàn đã luôn gìn giữ phát triển truyền thống văn hoá doanh nghiệp, tinh thần tự tôn dân tộc nhằm góp phần xây dựng hình ảnh đất nước Việt Nam giàu đẹp, thịnh vượng.\r\n\r\nLấy TÂM – TRÍ – TIN – TÍN – TINH – TIẾN làm giá trị cốt lõi cho toàn bộ hoạt động của Tập đoàn \u0026 hệ thống các công ty thành viên – trực thuộc; Toàn thể ban lãnh đạo và cán bộ nhân viên Tập đoàn T\u0026T Group luôn nỗ lực không ngừng để hiện thực hoá khát vọng dẫn đầu, đồng thời tạo ra các giá trị tốt đẹp cũng như lợi ích cho đối tác, cộng đồng và đất nước. Đó là:\r\n- Tận tâm \u0026 trí tuệ trong từng chi tiết để đạt tới hiệu quả cao nhất.\r\n- Đóng góp tích cực cho sự phát triển của nền kinh tế, xã hội Việt Nam \u0026 tạo dựng một cộng đồng thịnh vượng chung.\r\n- Phát triển bền vững, thượng tôn pháp luật, đặt lợi ích kinh tế gắn liền với phát triển cộng đồng \u0026 môi trường sống.\r\n- Dành cho đối tác, khách hàng những quyền lợi tốt nhất bên cạnh những sản phẩm, dịch vụ chất lượng và uy tín cao.\r\n- Kết hợp hài hoà bản sắc văn hoá Việt Nam và tinh hoa thế giới trong từng sản phẩm, dịch vụ.\r\n- Không ngừng đổi mới để đạt mục tiêu tăng trưởng bền vững \u0026 hiện thực hoá tầm nhìn trở thành người dẫn đầu."])</script><script>self.__next_f.push([1,"27:T943,"])</script><script>self.__next_f.push([1,"Chính sách lương:\r\nCông ty Cổ phần Tập đoàn T\u0026T luôn đảm bảo mọi quyền lợi của người lao động. Người lao động làm việc tại T\u0026T được hưởng mức lương cạnh tranh so với mặt bằng chung của thị trường và nâng bậc lương theo đúng quy định của pháp luật, đảm bảo công khai, công bằng, minh bạch, thể hiện được chính sách phát triển của T\u0026T. \r\nChính sách thưởng:\r\nT\u0026T luôn có chính sách khen thưởng kịp thời nhằm động viên, khuyến khích cán bộ nhân viên nỗ lực cống hiến và phấn đấu hết mình để xây dựng Công ty ngày một phát triển. Cán bộ công nhân viên tại Tập đoàn được thưởng thường niên trong các dịp lễ, tết tùy thuộc vào kết quả sản xuất kinh doanh của Tập đoàn. \r\nChế độ phúc lợi:\r\nTất cả cán bộ công nhân viên ký Hợp đồng lao động chính thức với T\u0026T đều được hưởng các chế độ BHXH, BHYT, BH thất nghiệp đúng theo quy định của nhà nước.\r\nHàng năm, T\u0026T đều tổ chức cho cán bộ nhân viên đi tham quan, nghỉ mát để mọi người có cơ hội giao lưu, thư giãn, nghỉ ngơi. Tập đoàn còn thường xuyên quan tâm, tặng quà cho người lao động và gia đình vào những ngày kỷ niệm trong năm như: ngày Quốc tế phụ nữ, ngày Quốc tế thiếu nhi, Tết Trung thu, và các ngày hiếu hỉ của người lao động. \r\nChính sách đào tạo:\r\nXuất phát từ nhận thức về tầm quan trọng của nguồn nhân lực, Tập đoàn T\u0026T rất quan tâm và coi trọng việc đào tạo, nâng cao kiến thức chuyên môn, kỹ năng làm việc nhằm tạo điều kiện cho cán bộ công nhân viên thực hiện công việc một cách hiệu quả nhất, phát triển sự nghiệp. \r\nCơ hội thăng tiến:\r\nT\u0026T luôn tạo mọi điều kiện cho người lao động có cơ hội thăng tiến trong công việc nhất là những người có tính cầu tiến, ham học hỏi, năng động, sáng tạo trong công việc. \r\nĐến với T\u0026T người lao động sẽ cảm nhận được sự thân thiện, đoàn kết  và một môi trường làm việc thật sự chuyên nghiệp."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"2a:Td1f,"])</script><script>self.__next_f.push([1,"Khởi đầu là một trong những doanh nghiệp tư nhân sớm nhất của Việt Nam, với khát vọng và sứ mệnh mang lại những giá trị tốt đẹp cho cộng đồng và phát triển kinh tế đất nước, năm 1993 Công ty TNHH Công nghệ \u0026 Thương mại (T\u0026T Ltd., Co.) được thành lập. Ngành nghề kinh doanh chính là phân phối các sản phẩm điện máy, Công ty T\u0026T đã nhanh chóng tạo dựng được tên tuổi và trở thành nhà phân phối chính thức, độc quyền tại miền Bắc của các thương hiệu lớn hàng đầu thế giới như Panasonic, National, Mitsuishi, Toshiba.\r\n\r\nVới sứ mệnh \"đem lại những giá trị tốt đẹp vì sự phát triển của xã hội\" trong gần 30 năm qua, Tập đoàn T\u0026T group đã có những bước phát triển mạnh mẽ và trở thành một trong những tập đoàn kinh tế tư nhân đa ngành lớn hàng đầu Việt Nam. Tập đoàn T\u0026T Group ‘mạnh về nội lực, giàu về tiềm năng’ đã luôn hoạt động với sự tín nhiệm cao nhất từ đối tác, Chính phủ và cộng đồng xã hội.\r\n\r\nT\u0026T Group đặt mục tiêu giữ vững vị trí top 10 Tập đoàn kinh tế tư nhân đa ngành lớn nhất Việt Nam và top 50 Tập đoàn có tầm ảnh hưởng tại châu Á \u0026 khu vực. Để thực thi hiệu quả, Tập đoàn đã xây dựng chiến lược phát triển phù hợp theo từng thời kỳ với định hướng lâu dài, bền vững theo các chuẩn mực quốc tế đi đôi với hoạt động quản trị minh bạch. Kinh doanh dựa trên triết lý phát triển hài hoà giữa lợi ích kinh tế và lợi ích mang lại cho cộng đồng, xã hội; Tập đoàn đã luôn gìn giữ phát triển truyền thống văn hoá doanh nghiệp, tinh thần tự tôn dân tộc nhằm góp phần xây dựng hình ảnh đất nước Việt Nam giàu đẹp, thịnh vượng.\r\n\r\nLấy TÂM – TRÍ – TIN – TÍN – TINH – TIẾN làm giá trị cốt lõi cho toàn bộ hoạt động của Tập đoàn \u0026 hệ thống các công ty thành viên – trực thuộc; Toàn thể ban lãnh đạo và cán bộ nhân viên Tập đoàn T\u0026T Group luôn nỗ lực không ngừng để hiện thực hoá khát vọng dẫn đầu, đồng thời tạo ra các giá trị tốt đẹp cũng như lợi ích cho đối tác, cộng đồng và đất nước. Đó là:\r\n- Tận tâm \u0026 trí tuệ trong từng chi tiết để đạt tới hiệu quả cao nhất.\r\n- Đóng góp tích cực cho sự phát triển của nền kinh tế, xã hội Việt Nam \u0026 tạo dựng một cộng đồng thịnh vượng chung.\r\n- Phát triển bền vững, thượng tôn pháp luật, đặt lợi ích kinh tế gắn liền với phát triển cộng đồng \u0026 môi trường sống.\r\n- Dành cho đối tác, khách hàng những quyền lợi tốt nhất bên cạnh những sản phẩm, dịch vụ chất lượng và uy tín cao.\r\n- Kết hợp hài hoà bản sắc văn hoá Việt Nam và tinh hoa thế giới trong từng sản phẩm, dịch vụ.\r\n- Không ngừng đổi mới để đạt mục tiêu tăng trưởng bền vững \u0026 hiện thực hoá tầm nhìn trở thành người dẫn đầu."])</script><script>self.__next_f.push([1,"2b:T136b,"])</script><script>self.__next_f.push([1,"\u003cp\u003e\u003cstrong\u003e1.\tCông tác quản trị đầu tư\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Tham mưu trong công tác điều hành đối với lĩnh vực Nông Lâm Thủy sản (NLTS), quy hoạch, sắp xếp lại ngành nghề, lĩnh vực đầu tư theo hướng tăng cường đầu tư vào các ngành triển vọng, giảm dần hoặc rút lui khỏi các ngành không có triển vọng phát triển trong tương lai dựa trên tiềm năng phát triển \u0026 lợi thế của Tập đoàn;\u003c/p\u003e\u003cp\u003e- Chủ trì/tham gia, phối hợp với các Phòng/Ban liên quan trong công tác xây dựng phương án tái cấu trúc doanh nghiệp, M\u0026A, thoái vốn các CTTV, các khoản đầu tư tại CTTV thuộc danh mục quản lý NLTS, đảm bảo hợp lý, hiệu quả, đúng trình tự, đúng quy định của pháp luật và định hướng Tập đoàn;\u003c/p\u003e\u003cp\u003e- Thực hiện lập báo cáo đầu tư sơ bộ (FS), phân tích hiệu quả đầu tư cho các dự án đầu tư/kinh doanh NLTS dựa trên lợi thế cạnh tranh của các CTTV thuộc lĩnh vực NLTS;\u003c/p\u003e\u003cp\u003e- Giám sát, quản lý các khoản đầu tư, góp vốn ra ngoài Công ty, hợp tác đầu tư, liên doanh liên kết, vay mượn... tại các CTTV thông qua việc thẩm định, định giá, đánh giá hiệu quả tài chính, đề xuất phương án phù hợp nhằm đảm bảo hiệu quả đầu tư, thu hồi vốn \u0026 giảm thiểu rủi ro;\u003c/p\u003e\u003cp\u003e- Tham gia, phối hợp với các Ban chuyên môn Tập đoàn trong việc xác định cấu trúc vốn phù hợp với nhu cầu phát triển các CTTV, dự án NLTS, đề xuất phương án huy động vốn (phương án vay, công cụ huy động, tài sản đảm bảo...) cho các khoản đầu tư, triển khai các dự án NLTS phù hợp với tiêu chí mục tiêu đề ra;\u003c/p\u003e\u003cp\u003e- Giám sát, đánh giá công tác triển khai, mức độ hoàn thành công việc liên quan đến dự án đầu tư, tái cơ cấu CTTV đối với Người đại diện của T\u0026T tại các CTTV;\u003c/p\u003e\u003cp\u003e- Chủ trì rà soát, hoàn thiện xây dựng các quy chế, quy định, quy trình và biểu mẫu, hướng dẫn liên quan đến công tác quản trị đầu tư, thoái vốn, hướng dẫn áp dụng cho Người đại diện/CTTV và triển khai áp dụng tại CTTV đảm bảo hợp lý đúng quy định của Tập đoàn và pháp luật.\u003c/p\u003e\u003cp\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp\u003e\u003cstrong\u003e2.\tCông tác quản trị tài chính\u003c/strong\u003e\u003c/p\u003e\u003cp\u003e- Đầu mối thực hiện công tác quản trị Tài chính tại các CTTV, bao gồm quản lý, giám sát tài sản lưu động (tiền, hàng tồn kho, Công cụ dụng cụ), tài sản cố định (máy móc trang thiết bị, nhà xưởng SX…), các khoản công nợ phải thu, phải trả, các loại chi phí. Đề xuất các kiến nghị, giải pháp liên quan đến sử dụng tài sản, vốn, phương án huy động vốn, quản lý chi phí....nhằm nâng cao hiệu quả SXKD, đảm bảo nguồn vốn triển khai dự án triển khai tại các CTTV;\u003c/p\u003e\u003cp\u003e- Tham gia, phối hợp với các Phòng/Ban xây dựng kế hoạch tái cấu trúc doanh nghiệp, thoái vốn các CTTV đảm bảo hợp lý, hiệu quả đúng trình tự, đúng quy định pháp luật và định hướng của Tập đoàn;\u003c/p\u003e\u003cp\u003e- Tham gia lập báo cáo định giá doanh nghiệp, báo cáo đề xuất nghiên cứu đầu tư đối với danh mục thoái vốn NN tại các CTTV phù hợp với mục tiêu, chiến lược đầu tư của Tập đoàn;\u003c/p\u003e\u003cp\u003e- Chủ trì hướng dẫn lập, thẩm định kế hoạch SXKD, giám sát và đánh giá việc thực hiện kế hoạch cũng như điều chỉnh kế hoạch SXKD nhằm đảm bảo tính khả thi của kế hoạch SXKD; \u003c/p\u003e\u003cp\u003e- Chủ trì thẩm định, đánh giá hiệu quả các phương án kinh doanh, đầu tư xây dựng cơ bản, mua sắm tài sản cố định, các nhu cầu cấp vốn theo kế hoạch phục vụ cho hoạt động SXKD của CTTV, dự án NLTS nhằm đảm bảo hiệu quả tài chính cũng như đánh giá mức độ rủi ro ảnh hưởng hiệu quả;\u003c/p\u003e\u003cp\u003e-  Chủ trì, phối hợp với các Ban chuyên môn Tập đoàn trong công tác giám sát, kiểm tra, thanh tra việc quản lý sử dụng và khai thác Tài sản (bao gồm cả cơ sở nhà đất) nhằm nâng cao giá trị đối với các Tài sản có tiềm năng, xây dựng và triển khai phương án hoàn thiện pháp lý CSNĐ tránh nguy cơ, rủi ro bị thu hồi;\u003c/p\u003e\u003cp\u003e- Chủ trì xây dựng, thực hiện triển khai áp dụng các quy chế, quy trình, biểu mẫu hưỡng dẫn liên quan đến công tác quản trị Tài chính tại các CTTV phù hợp theo từng giai đoạn, nguồn lực nội tại doanh nghiệp.\u003c/p\u003e"])</script><script>self.__next_f.push([1,"2c:T674,\u003cp\u003e- Tốt nghiệp Đại học, chuyên ngành: Kinh tế, Tài chính, kiểm toán, quản trị doanh nghiệp, đầu tư chứng khoán…;\u003c/p\u003e\u003cp\u003e- Tối thiểu 5 năm làm việc trong lĩnh vực: Tài chính, ngân hàng, đầu tư tài chính, kiểm toán,…\u003c/p\u003e\u003cp\u003e- Có kinh nghiệm quản trị tài chính, tái cấu trúc tài chính, sắp xếp doanh nghiệp, quản lý danh mục đầu tư, tái cấu trúc doanh nghiệp, M\u0026A, quản trị rủi ro sau đầu tư, quản trị rủi ro tài chính (quản lý ngân sách, thẩm định phương án đầu tư mua sắm TSCĐ, dự án đầu tư, định giá doanh nghiệp),…;\u003c/p\u003e\u003cp\u003e- Nắm vững, vận dụng và thường xuyên cập nhật các quy định pháp luật về quản lý, quản trị tài chính, đầu tư, định giá doanh nghiệp (Luật doanh nghiệp, Luật chứng khoán, Luật đầu tư, Luật đất đai, Luật Quản lý và sử dụng vốn Nhà nước đầu tư vào sản xuất, kinh doanh tại DN, Luật kinh doanh BĐS ..., các nghị định, thông tư hướng dẫn liên quan);\u003c/p\u003e\u003cp\u003e- Có sId\":136701,\"cityId\":24,\"districtId\":0,\"address\":\"31-33 Ngô Quyền, Phường Cửa Nam, Thành phố Hà Nội\",\"geoLoc\":\"$36\",\"cityName\":\"Ha Noi\",\"cityNameVI\":\"Hà Nội\"}\n34:[\"$35\"]\n38:{\"industryId\":0,\"industryName\":\"\",\"industryNameVI\":\"\"}\n37:[\"$38\"]\n3a:{\"industryV3Id\":3,\"industryV3Name\":\"Agriculture/Forestry/Aquaculture\",\"industryV3NameVI\":\"Nông nghiệp/Lâm nghiệp/Nuôi trồng thủy sản\"}\n39:[\"$3a\"]\n3d:{\"id\":66,\"name\":\"Investment\",\"nameVI\":\"Đầu Tư Tài Chính\"}\n3c:[\"$3d\"]\n3b:{\"parentId\":10,\"parentName\":\"Banking \u0026 Financial Services\",\"parentNameVI\":\"Ngân Hàng \u0026 Dịch Vụ Tài Chính\",\"children\":\"$3c\"}\n3e:[24]\n40:[\"https://images.vietnamworks.com/company_profile/66330.jpg\",\"https://images.vietnamworks.com/company_profile/66331.png\",\"https://images.vietnamworks.com/company_profile/66332.png\"]\n41:Td1f,"])</script><script>self.__next_f.push([1,"Khởi đầu là một trong những doanh nghiệp tư nhân sớm nhất của Việt Nam, với khát vọng và sứ mệnh mang lại những giá trị tốt đẹp cho cộng đồng và phát triển kinh tế đất nước, năm 1993 Công ty TNHH Công nghệ \u0026 Thương mại (T\u0026T Ltd., Co.) được thành lập. Ngành nghề kinh doanh chính là phân phối các sản phẩm điện máy, Công ty T\u0026T đã nhanh chóng tạo dựng được tên tuổi và trở thành nhà phân phối chính thức, độc quyền tại miền Bắc của các thương hiệu lớn hàng đầu thế giới như Panasonic, National, Mitsuishi, Toshiba.\r\n\r\nVới sứ mệnh \"đem lại những giá trị tốt đẹp vì sự phát triển của xã hội\" trong gần 30 năm qua, Tập đoàn T\u0026T group đã có những bước phát triển mạnh mẽ và trở thành một trong những tập đoàn kinh tế tư nhân đa ngành lớn hàng đầu Việt Nam. Tập đoàn T\u0026T Group ‘mạnh về nội lực, giàu về tiềm năng’ đã luôn hoạt động với sự tín nhiệm cao nhất từ đối tác, Chính phủ và cộng đồng xã hội.\r\n\r\nT\u0026T Group đặt mục tiêu giữ vững vị trí top 10 Tập đoàn kinh tế tư nhân đa ngành lớn nhất Việt Nam và top 50 Tập đoàn có tầm ảnh hưởng tại châu Á \u0026 khu vực. Để thực thi hiệu quả, Tập đoàn đã xây dựng chiến lược phát triển phù hợp theo từng thời kỳ với định hướng lâu dài, bền vững theo các chuẩn mực quốc tế đi đôi với hoạt động quản trị minh bạch. Kinh doanh dựa trên triết lý phát triển hài hoà giữa lợi ích kinh tế và lợi ích mang lại cho cộng đồng, xã hội; Tập đoàn đã luôn gìn giữ phát triển truyền thống văn hoá doanh nghiệp, tinh thần tự tôn dân tộc nhằm góp phần xây dựng hình ảnh đất nước Việt Nam giàu đẹp, thịnh vượng.\r\n\r\nLấy TÂM – TRÍ – TIN – TÍN – TINH – TIẾN làm giá trị cốt lõi cho toàn bộ hoạt động của Tập đoàn \u0026 hệ thống các công ty thành viên – trực thuộc; Toàn thể ban lãnh đạo và cán bộ nhân viên Tập đoàn T\u0026T Group luôn nỗ lực không ngừng để hiện thực hoá khát vọng dẫn đầu, đồng thời tạo ra các giá trị tốt đẹp cũng như lợi ích cho đối tác, cộng đồng và đất nước. Đó là:\r\n- Tận tâm \u0026 trí tuệ trong từng chi tiết để đạt tới hiệu quả cao nhất.\r\n- Đóng góp tích cực cho sự phát triển của nền kinh tế, xã hội Việt Nam \u0026 tạo dựng một cộng đồng thịnh vượng chung.\r\n- Phát triển bền vững, thượng tôn pháp luật, đặt lợi ích kinh tế gắn liền với phát triển cộng đồng \u0026 môi trường sống.\r\n- Dành cho đối tác, khách hàng những quyền lợi tốt nhất bên cạnh những sản phẩm, dịch vụ chất lượng và uy tín cao.\r\n- Kết hợp hài hoà bản sắc văn hoá Việt Nam và tinh hoa thế giới trong từng sản phẩm, dịch vụ.\r\n- Không ngừng đổi mới để đạt mục tiêu tăng trưởng bền vững \u0026 hiện thực hoá tầm nhìn trở thành người dẫn đầu."])</script><style data-styled="" data-styled-version="5.3.11"></style><script>self.__next_f.push([1,"42:T943,"])</script><script>self.__next_f.push([1,"Chính sách lương:\r\nCông ty Cổ phần Tập đoàn T\u0026T luôn đảm bảo mọi quyền lợi của người lao động. Người lao động làm việc tại T\u0026T được hưởng mức lương cạnh tranh so với mặt bằng chung của thị trường và nâng bậc lương theo đúng quy định của pháp luật, đảm bảo công khai, công bằng, minh bạch, thể hiện được chính sách phát triển của T\u0026T. \r\nChính sách thưởng:\r\nT\u0026T luôn có chính sách khen thưởng kịp thời nhằm động viên, khuyến khích cán bộ nhân viên nỗ lực cống hiến và phấn đấu hết mình để xây dựng Công ty ngày một phát triển. Cán bộ công nhân viên tại Tập đoàn được thưởng thường niên trong các dịp lễ, tết tùy thuộc vào kết quả sản xuất kinh doanh của Tập đoàn. \r\nChế độ phúc lợi:\r\nTất cả cán bộ công nhân viên ký Hợp đồng lao động chính thức với T\u0026T đều được hưởng các chế độ BHXH, BHYT, BH thất nghiệp đúng theo quy định của nhà nước.\r\nHàng năm, T\u0026T đều tổ chức cho cán bộ nhân viên đi tham quan, nghỉ mát để mọi người có cơ hội giao lưu, thư giãn, nghỉ ngơi. Tập đoàn còn thường xuyên quan tâm, tặng quà cho người lao động và gia đình vào những ngày kỷ niệm trong năm như: ngày Quốc tế phụ nữ, ngày Quốc tế thiếu nhi, Tết Trung thu, và các ngày hiếu hỉ của người lao động. \r\nChính sách đào tạo:\r\nXuất phát từ nhận thức về tầm quan trọng của nguồn nhân lực, Tập đoàn T\u0026T rất quan tâm và coi trọng việc đào tạo, nâng cao kiến thức chuyên môn, kỹ năng làm việc nhằm tạo điều kiện cho cán bộ công nhân viên thực hiện công việc một cách hiệu quả nhất, phát triển sự nghiệp. \r\nCơ hội thăng tiến:\r\nT\u0026T luôn tạo mọi điều kiện cho người lao động có cơ hội thăng tiến trong công việc nhất là những người có tính cầu tiến, ham học hỏi, năng động, sáng tạo trong công việc. \r\nĐến với T\u0026T người lao động sẽ cảm nhận được sự thân thiện, đoàn kết  và một môi trường làm việc thật sự chuyên nghiệp."])</script><script>self.__next_f.push([1,"3f:{\"companyId\":44262,\"jobImageURLs\":\"$40\",\"jobVideoURLs\":null,\"companyName\":\"T\u0026T Group\",\"companyLogoURL\":\"https://images.vietnamworks.com/pictureofcompany/68/10572150.png\",\"companySizeId\":\"\",\"companyProfile\":\"$41\",\"contactName\":\"Ban Tổ chức Nhân sự\",\"contactEmail\":\"\",\"website\":\"\",\"address\":\"Tòa nhà T\u0026T Group, Số 31-33 Ngô Quyền, Hoàn Kiếm, Hà Nội\",\"allowRedir
