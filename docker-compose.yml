version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jobrec_db
    environment:
      POSTGRES_DB: jobrec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobrec"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobrec_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db/jobrec
      SECRET_KEY: change-this-to-a-random-secret-key-min-32-chars-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      SBERT_MODEL_NAME: all-MiniLM-L6-v2
      EMBEDDING_DIM: "384"
      RETRAIN_THRESHOLD: "100"
      RETRAIN_SCHEDULE_HOURS: "1"
      MODEL_CHECKPOINT_DIR: /app/ml_checkpoints/
      MAX_UPLOAD_SIZE_MB: "10"
      SEED_DATA_PATH: /app/data/training_data.csv
      # ── Crawler settings ─────────────────────────────────────────────────
      CRAWLER_INTERVAL_MINUTES: "10"
      CRAWLER_MAX_JOBS_PER_RUN: "30"
      CRAWLER_PAGES_PER_RUN: "2"
      CRAWLER_REQUEST_DELAY: "1.5"
      CRAWLER_MAX_RETRIES: "3"
      CRAWLER_BACKOFF_FACTOR: "2.0"
      CRAWLER_TIMEOUT: "15"
      CRAWLER_EMBED_ON_INSERT: "true"
      ITVIEC_BASE_URL: https://itviec.com
      ITVIEC_JOBS_PATH: /it-jobs
      # ── Alert system (optional) ───────────────────────────────────────────
      # Set these to receive Telegram alerts when crawler is blocked:
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_CHAT_ID: ""
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ml_checkpoints:/app/ml_checkpoints
    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobrec_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  postgres_data:
  ml_checkpoints:
